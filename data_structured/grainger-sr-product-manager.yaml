description_html: '<strong>Work Location Type: </strong> <strong><strong><strong><strong>Hybrid</strong></strong></strong></strong>     <br>Req
  Number  325508 <br><strong> About Grainger </strong> <br>W.W. Grainger, Inc., is
  a leading broad line distributor with operations primarily in North America, Japan
  and the United Kingdom. At Grainger, We Keep the World Working® by serving more
  than 4.5 million customers worldwide with products and solutions delivered through
  innovative technology and deep customer relationships. Known for its commitment
  to service and award-winning culture, the Company had 2024 revenue of $17.2 billion
  across its two business models. In the High-Touch Solutions segment, Grainger offers
  approximately 2 million maintenance, repair and operating (MRO) products and services,
  including technical support and inventory management. In the Endless Assortment
  segment,  Zoro.com  offers customers access to more than 14 million products, and  MonotaRO.com  offers
  more than 24 million products. For more information, visit  www.grainger.com.   <br><strong>
  Compensation </strong> <br>The anticipated base pay compensation range for this
  position is $131,200.00  to $218,700.00. <br><strong>Rewards and Benefits</strong>
  <br>With benefits starting on day one, our programs provide choice and flexibility
  to meet team members'' individual needs, including: <br><ul> <li> Medical, dental,
  vision, and life insurance plans with coverage starting on day one of employment
  and 6 free sessions each year with a licensed therapist to support your emotional
  wellbeing. </li> <li> 18 paid time off (PTO) days annually for full-time employees
  (accrual prorated based on employment start date) and 6 company holidays per year.
  </li> <li> 6% company contribution to a 401(k) Retirement Savings Plan each pay
  period, no employee contribution required. </li> <li> Employee discounts, tuition
  reimbursement, student loan refinancing and free access to financial counseling,
  education, and tools. </li> <li> Maternity support programs, nursing benefits, and
  up to 14 weeks paid leave for birth parents and up to 4 weeks paid leave for non-birth
  parents. </li> </ul> <br>For additional information and details regarding Grainger''s
  benefits, please click on the link below: <br>https://experience100.ehr.com/grainger/Home/Tools-Resources/Key-Resources/New-Hire
  <br>The pay range provided above is not a guarantee of compensation.  The range
  reflects the potential base pay for this role at the time of this posting based
  on the job grade for this position. Individual base pay compensation will depend,
  in part, on factors such as geographic work location and relevant experience and
  skills.  <br>The anticipated compensation range described above is subject to change
  and the compensation ultimately paid may be higher or lower than the range described
  above.  <br>Grainger reserves the right to amend, modify, or terminate its compensation
  and benefit programs in its sole discretion at any time, consistent with applicable
  law. <br><strong> Position Details : </strong>   <br>We are looking for product
  managers to help guide and chart a course for Grainger''s enterprise systems and
  application development so that Grainger continues to be the destination for "the
  ones that get it done". The Senior Product Manager contributes to the product strategy,
  vision, and roadmap of future products, with  high  degree of ownership over critical
  features and  the customer  experience. You will work with engineering, design,
  and operations to develop and launch innovative aspects of a product. You are creative
  and highly analytical, able to work in a matrix organization, can synthesize a variety
  of technologies and capabilities into products and applications that customers love.
  You will report to the Director, Product  Management  and will work on a hybrid
  basis  out  of our Chicago, IL office.   <br><strong> You Will :</strong>   <br><ul>
  <li> Drive the evolution of Grainger''s customer information capabilities, enhancing
  how we curate, manage, and activate customer data to deliver measurable business
  value .   </li> </ul> <ul> <li> Engage  with  broad  network of stakeholders within
  business operations, demand generation and customer support to develop strategies
  and vision for improving our customer information assets that drive competitive
  advantage and value for Grainger.   </li> </ul> <ul> <li> Understand end-to-end
  business,  identify customer pain points, conduct competitive assessments, leverage
  data to inform product vision,  roadmap  and its prioritization.   </li> </ul> <ul>
  <li> Translate  strategy into executable product requirements. Partner closely with
  engineering, UX and Architecture to deliver high-quality solutions with shared ownership
  of outcomes and measurable business value.   </li> </ul> <ul> <li> Collaborate with  other
  Grainger product teams to operationalize the customer information capabilities across
  channels, ensuring a consistent customer experience.   </li> </ul> <ul> <li> Manage  product
  launches across business, product and engineering partners, balancing timelines,
  risk, and trade-offs to achieve successful delivery.   </li> </ul> <ul> <li> Communicate
  product vision,  key milestone updates, KPIs with senior leaders in the organization,
  tailoring messages to fit audience needs and influence decision-making.    </li>
  </ul> <br><strong> You Have :</strong>   <br><ul> <li> Bachelor''s Degree   </li>
  </ul> <ul> <li> Master''s Degree preferred   </li> </ul> <ul> <li> 5+ years of experience
  as a Product Manager or in a closely related role, leading agile teams and partnering
  with design, analytics, and business stakeholders to deliver enterprise software
  solutions.   </li> </ul> <ul> <li> Strong analytical and quantitative skills with
  the ability to  leverage data and metrics to guide decisions and measure success.   </li>
  </ul> <ul> <li> Demonstrated experience designing solutions to complex problems
  , ideally in enterprise internal tools or external websites geared towards B2B customers.    </li>
  </ul> <ul> <li> Continuous improvement and innovation mindset , with awareness of
  emerging technologies and industry best practices.    </li> </ul> <ul> <li> Experience
  influencing and guiding cross-functional teams to achieve shared outcomes in a fast-paced,
  matrixed environment.   </li> </ul> <ul> <li> High level  of ownership, accountability,
  and the ability to operate effectively amid ambiguity and competing priorities.   </li>
  </ul> <ul> <li> Excellent problem-solving, planning, and communication skills, with
  a bias for action and impac t.   </li> </ul> <br>We are committed to equal employment
  opportunity regardless of race, color, ancestry, religion, sex (including pregnancy),
  national origin, sexual orientation, age, citizenship, marital status, disability,
  gender identity or expression, protected veteran status or any other protected characteristic
  under federal, state, or local law. We are proud to be an equal opportunity workplace.
  <br>We are committed to fostering an inclusive, accessible work environment that
  includes both providing reasonable accommodations to individuals with disabilities
  during the application and hiring process as well as throughout the course of one''s
  employment, should you need a reasonable accommodation during the application and
  selection process, including, but not limited to use of our website, any part of
  the application, interview or hiring process, please advise us so that we can provide
  appropriate assistance.'
