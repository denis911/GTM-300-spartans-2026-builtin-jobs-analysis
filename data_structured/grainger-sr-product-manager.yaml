company_overview: 'Grainger is a leading broad line distributor with operations primarily
  in North America, Japan and the United Kingdom. We Keep The World Working® by serving
  more than 4.5 million customers worldwide with products delivered through innovative
  technology and deep customer relationships. We’re dedicated to providing value for
  customers, fostering an engaging culture for team members and driving strong financial
  results. Our welcoming workplace enables you to learn, grow and make a difference
  by keeping businesses running and their people safe. As the #1 Employer of Choice
  on the American Opportunity Index, a 2025 Glassdoor Best Place to Work and a Great
  Place to Work-Certified™ company, we’re looking for passionate people to join our
  team as we continue leading the industry over our next 100 years. Find your way
  with Grainger at jobs.grainger.com.'
