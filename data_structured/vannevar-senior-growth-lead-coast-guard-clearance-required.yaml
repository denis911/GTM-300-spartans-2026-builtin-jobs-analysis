description_html: '<p><p><strong>Vannevar is a defense technology company building
  AI to deter our adversaries.</strong>&nbsp;In the 21st century, conflict moves at
  algorithmic speed and foresight equals firepower. Our agentic AI is purpose-built
  to compete with China—from cross-Strait conflict to gray zone coercion. Trained
  on the most mission-relevant datasets in defense, our technology models adversary
  behavior, simulates campaigns, and recommends the best course of action to decision
  makers. Our AI systems are some of the most trusted in the industry and actively
  used on the front lines of the Indo-Pacific to keep the peace and save lives.</p><p>Exceptional
  technology starts with exceptional people. Vannevar is a small agile team combining
  world-class engineers with veteran strategists who bring deep expertise in defense
  and tradecraft. We’re building a company defined by mission impact, user empathy,
  and disciplined growth. In just three years, we grew from $3M to $80M in ARR, achieved
  early profitability, and reached unicorn status—proving that disruption doesn’t
  require an ego, and staying power doesn’t mean standing still.</p></p><b>About the
  role</b><p>We''re looking for a <strong>Strategic Growth Leader</strong> to pursue
  go-to market strategies and deliver major growth outcomes at Vannevar. This position
  is aligned to one of our greenfield growth initiatives and includes significant
  scope and responsibilities.</p><p>We''re looking for someone who brings experience
  and intuition growing defense product deployments from small-scale pilots into larger
  projects with the US Coast Guard. Growth strategists know how to launch foothold
  pilots, convert pilots into larger projects, and embed those projects within existing
  programs or invent new ones within the national security space.</p><p>We''re looking
  for someone who has firsthand experience fielding new technology and is committed
  to getting better tools into the hands of American servicemen and women. They can
  creatively problem solve around roadblocks to do so, and catalyze organizational
  change, if necessary. They are curious, visionary, and determined.</p><p>We believe
  that a necessary foundation for the ability to sell and build programs is domain
  expertise in national security technology, a sense of urgency, and relentless ground
  game. If you are successful, you will ultimately lead a business line for Vannevar
  that delivers on major growth outcomes within 12-18 months of joining the company.</p><p><p><p><p><p><strong><span>U.S.
  Persons status with at least a current Top Secret US DoD or IC clearance is required.</span></strong><span>&nbsp;</span></p></p></p></p></p><br><b>What
  you’ll do</b><ul><li><strong>Set strategy with mission team leadership.</strong>
  Create a go-to market strategy that will create new footholds to embed in current
  defense programs and develop into new category-defining programs.</li><li><strong>Deliver
  growth outcomes.</strong> Execute on this strategy to deliver growth from concept
  through contract close.</li><li><strong>Lead mission teams.</strong> You will build
  a team around the footholds you develop in your first year.</li></ul><br><b>What
  we’re looking for</b><ul><li>7+ years of experience working with U.S. government
  leaders across defense, homeland security, or national security missions, including
  experience in acquisition, program management, intelligence, or operational policy

  <ul><li>Direct experience working with the U.S. Coast Guard, ideally in or alongside:</li><li>Coast
  Guard Headquarters organizations such as CG-2 (Intelligence), CG-3 (Operations),
  or CG-7 (Mission Support)</li></ul></li><li>Innovation or rapid capability organizations
  (e.g., DIU, Raptor, RDC, or equivalent CG innovation teams)</li><li>A strong understanding
  of major Coast Guard mission initiatives, with the ability to tailor technology
  narratives to priorities such as maritime domain awareness, maritime domain dominance,
  coastal security, and operational intelligence</li><li>Demonstrated ability to start
  net-new business within a federal organization — identifying entry points, shaping
  early pilots, and guiding them toward sustained, funded programs</li><li>Experience
  (or strong intuition) translating existing products into new mission contexts —
  taking a proven capability and tailoring it to fit Coast Guard operational needs,
  constraints, and procurement realities</li><li>The ability to connect credibly with
  operational end users, speak the Coast Guard’s language, and build trust with stakeholders
  ranging from field operators to senior leadership at CG HQ</li><li>A well-established
  network across the Coast Guard ecosystem, including relationships within HQ, districts,
  acquisitions, intelligence, and innovation communities</li><li>Experience launching
  and scaling pilots with federal customers, including shaping scope, defining success
  criteria, and converting successful pilots into paid engagements</li><li>Experience
  or demonstrated judgment in building a holistic, greenfield growth strategy for
  a new federal vertical</li><li>Mission-domain experience in national security technology,
  especially where software or data platforms support operational decision-making</li></ul><br><b>What
  we offer</b><b>Competitive Salary</b><p>The salary range for this position is $200,000
  - $230,000 + equity. Within the range, individual pay is determined by experience,
  relevant education, and/or training.</p><b>Comprehensive Benefits</b><p>We’re proud
  to offer competitive benefits that support our employees. Some key highlights of
  our benefits package include:</p><ul><li>Health, dental, and vision insurance</li><li>Remote
  friendly with WeWork access</li><li>Unlimited PTO, shared downtime during the federal
  holiday calendar, and company-wide off time at the end of each year</li><li>401(k)
  match</li><li>Lifestyle &amp; wellbeing stipends</li><li>Salary top-up during military
  reserve duty</li><li>Fully paid parental leave</li><li>Child and pet care reimbursement
  during travel</li></ul><p><p>Vannevar is an equal opportunity employer, and qualified
  applicants will receive consideration for employment without regard to race, color,
  religion, sex, sexual orientation, gender perception or identity, national origin,
  age, marital status, protected veteran status, or disability status.</p><p>&nbsp;</p><p>We
  encourage candidates from all backgrounds to apply, even if you don''t feel like
  you''re a perfect fit. If you''re passionate about contributing to our mission,
  we''d love to hear from you!</p><p>&nbsp;</p><p><strong>IMPORTANT NOTICE<br>We are
  committed to protecting the privacy of all applicants. Official emails from the
  company will come from an @vannevarlabs.com domain. Under no circumstances will
  a legitimate representative from our company contact you to request passwords, financial
  information, or other sensitive personal data. Please be vigilant of potential scams.</strong></p></p>'
