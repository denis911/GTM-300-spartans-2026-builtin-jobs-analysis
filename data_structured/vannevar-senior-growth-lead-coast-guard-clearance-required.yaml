company_overview: Vannevar combines Silicon Valley innovation with former special
  operators to build AI for real-world national security outcomes. Since our founding
  in 2019, Vannevar has deployed its technology across 125 missions, safeguarding
  our service members and improving our country's deterrence. We believe our military
  service members and intelligence officers deserve access to the best technology
  American innovation can offer, and we are mobilizing frontier technology for this
  mission. Our founders have 30 years of combined experience across AI labs, national
  security strategy, intelligence agencies and special operations. We're supported
  by a number of leading VCs, including Felicis, DFJ Growth, Point72, Costanoa, and
  General Catalyst. Vannevar is one of the most capital efficient defense tech companies,
  reaching early profitability and becoming a defense tech unicorn in 2024.
