description_html: '<p><strong>ABOUT THE JOB:&nbsp;</strong>&nbsp;</p><p>Tapcheck is
  scaling rapidly, and our revenue teams need intelligent automation to move faster
  and smarter. As our GTM AI Engineer, you''ll be the architect who designs and deploys
  AI-powered solutions across BDRs, Marketing, Sales, Channel, and Customer Success.
  You''ll build the intelligent systems that transform manual processes into automated
  workflows, surface actionable insights from our data, and give every rep a productivity
  multiplier. Reporting to the VP of Revenue Operations, you''ll own the AI and automation
  roadmap that drives pipeline efficiency, accelerates deal velocity, and improves
  customer outcomes. If you''reenergized by the challenge of applying cutting-edge
  AI to real revenue problems in a high-growth fintech environment, this is your opportunity
  to make a measurable impact.</p><p><strong>This role offers both a remote and hybrid
  option.</strong> Employees located within 30 miles of Plano TX, are required to
  be in-office Tuesday through Thursday each week. Those residing beyond this radius
  may be considered for a fully remote arrangement, depending on experience and business
  needs.&nbsp;</p><p></p><p><strong>What You’ll Do:&nbsp;</strong>&nbsp;</p><p>AI-Powered
  Revenue Automation – Design and deploy intelligent workflows that automate repetitive
  tasks across the GTM organization. You''ll build systems that auto-enrich leads,
  generate personalized outreach, predict deal outcomes, and flag accounts requiring
  intervention, turning hours of manual work into automated intelligence.</p><p>BDR
  &amp; Sales Productivity Tools – Create AI agents that research accounts, synthesize
  competitive intelligence, and generate talking points before every call. Surface
  deal risks, recommend next steps, and help reps prioritize their pipeline.</p><p>Marketing
  &amp; Channel Intelligence – Develop AI-driven attribution insights and campaign
  optimization. You''ll automate lead scoring models, partner routing logic, and channel
  performance reporting.</p><p>Customer Success Automation – Build churn prediction
  models, expansion opportunity identification, and automated QBR deck generation
  that pulls real-time account data into polished presentations. You''ll extend our
  automation capabilities into proactive customer health monitoring and intervention
  triggers.</p><p>Integration &amp; Systems Architecture – Work hand-in-hand with
  RevOps and Systems to integrate AI capabilities into Salesforce, Gong, HubSpot,
  and our broader tech stack. You''ll ensure solutions are production-ready, scalable,
  and adopted by end users.</p><p>&nbsp;</p><p><strong>What You’ll Bring:&nbsp;</strong>&nbsp;</p><p>Experience
  – 3-5 years building AI/ML solutions or intelligent automation in a B2B SaaS, fintech,
  or revenue operations context. You''ve shipped production systems that real users
  rely on daily.</p><p>Technical Skills – Strong proficiency in Python, SQL, and modern
  AI/ML frameworks. Experience with LLMs (OpenAI, Claude, etc.), prompt engineering,
  and building AI agents. Familiarity with workflow automation tools (Clay, n8n, Zapier)
  and data pipelines.</p><p>Revenue Acumen – You understand the GTM motion—how leads
  flow, deals progress, and customers expand. You can translate business problems
  into technical solutions that move metrics like conversion rates, deal velocity,
  and retention.</p><p>Systems &amp; Tools – Deep familiarity with Salesforce and
  the modern revenue tech stack (Gong, HubSpot, Outreach, ZoomInfo). You''re comfortable
  with APIs, webhooks, and building integrations that connect disparate systems.</p><p>Data-Driven
  – You don''t just build tools, you measure their impact. You know how to baseline
  processes, track time savings, and make a compelling case for automation ROI.</p><p>Communication
  &amp; Collaboration – You can translate complex technical concepts for non-technical
  stakeholders. You''re equally comfortable whiteboarding architecture with engineers
  and demo''ing solutions to sales leadership.</p><p>Bias for Action – You thrive
  in fast-paced environments where priorities shift quickly. You''re scrappy, resourceful,
  and comfortable shipping 80/20 solutions that improve over time.</p><p>&nbsp;</p><p><em><strong>At
  this time, Tapcheck does not provide sponsorship for employment-based visas (e.g.,
  H-b, L-1, TN, etc.). Therefore, candidates must already possess the right to work
  in the United States without the need for employment-based visa sponsorship now
  or in the future.</strong></em>&nbsp;</p><p><em><strong>This is a remote-friendly
  role. Ideally, candidates will sit in the following states: AL, AZ, CA, CO, DC,
  DE, FL, GA, ID, IL, LA, MI, MA, MO, NC, NH, NJ, NV, NY, PA, OR, OH, RI, SC, TX,
  UT, VA, WA, WI.</strong></em>&nbsp;</p><p><strong>About Tapcheck:&nbsp;</strong>&nbsp;</p><p>Tapcheck
  is a digital platform offering an easy and convenient way to access on-demand earnings
  early. Available at no cost to employers, our app-based on-demand pay solution helps
  relieve the financial stress that many employees experience on a daily basis.&nbsp;</p><p>The
  Tapcheck team is passionate about our mission to improve financial wellness and
  boost business productivity. By giving workers the ability to transfer wages they’ve
  earned directly to their bank account or pay card without waiting for payday, Tapcheck
  eliminates the need for high-interest payday loans or employer-funded cash advances.&nbsp;</p><p><strong>How
  We Get Things Done</strong>:&nbsp;&nbsp;</p><p>Our core values act as a steadfast
  guide, directing our decisions and anchoring our actions. We consider these values
  non-negotiable, especially when it comes to our hiring process.&nbsp;&nbsp;</p><ul><li><p><strong>Humility:</strong>
  We believe in the power of humility. We value team players who are down-to-earth,
  respectful, and open to learning from others. Our employees approach challenges
  with a positive attitude, acknowledging their strengths and weaknesses while celebrating
  the achievements of their colleagues.</p></li><li><p><strong>Grit:</strong> We admire
  individuals with grit – those who demonstrate unwavering determination and resilience
  in the face of obstacles. At Tapcheck, we take pride in overcoming challenges together,
  pushing the boundaries of what is possible, and embracing failure as an opportunity
  for growth.&nbsp;</p></li><li><p><strong>Raising the Bar:</strong> Continuous improvement
  is at the heart of our culture. We are committed to setting high standards and pushing
  ourselves to exceed them. We seek employees who are innovative and strive for excellence,
  constantly seeking ways to enhance our products, services, and processes.</p></li><li><p><strong>Striving
  for Growth:</strong> We foster an environment that encourages personal and professional
  development. Our employees are driven to learn, grow, and adapt to new circumstances.
  We support individuals who take initiative, seek out new challenges, and actively
  contribute to their own growth and the growth of the company.&nbsp;</p></li></ul><p>&nbsp;<br><strong>Why
  Join Tapcheck?&nbsp;</strong>&nbsp;</p><ul><li><p>Competitive base&nbsp;</p></li><li><p>Flexible
  Time Off</p></li><li><p>Health Insurance</p></li><li><p>Dental Insurance</p></li><li><p>Vision
  Insurance</p></li><li><p>401K Match&nbsp;</p></li></ul><p><strong>Compensation:
  </strong><em>$160-190K + Bonus/Equity.</em> The actual base salary will depend on
  numerous factors such as: location, experience, training, knowledge. and skills.
  Tapcheck reserves the right to amend, change, alter, and revise pay ranges and benefits
  offerings at any time. All applicants acknowledge that by applying to this position
  you understand that this specific pay range is contingent upon meeting the qualifications
  and requirements of the role, and for the successful completion of the interview
  selection and process. It is at the Company''s discretion to determine what pay
  is provided to a candidate within the range associated with the role.&nbsp;</p><p><em><strong>Equal
  Employment Opportunity Policy</strong></em>&nbsp;</p><p><em>Tapcheck, Inc. provides
  equal employment opportunities to all employees and applicants for employment and
  prohibits discrimination and harassment of any type without regard to race, color,
  religion, age, sex, national origin, disability status, genetics, protected veteran
  status, sexual orientation, gender identity or expression, or any other characteristic
  protected by federal, state or local laws. This policy applies to all terms and
  conditions of employment, including recruiting, hiring, placement, promotion, termination,
  layoff, recall, transfer, leaves of absence, compensation and training.</em>&nbsp;</p>'
