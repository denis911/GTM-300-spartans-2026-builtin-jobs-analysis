company_overview: In March of 2002, Belvedere Trading emerged as Chicago’s newest
  market maker, soon to join the ranks of the Windy City’s elite proprietary trading
  firms. Armed with printouts of Excel workbooks and a team of eager minds, Belvedere
  established their place in the SPX pit on the floor of the Chicago Board Options
  Exchange. From the beginning, we have iteratively invested in our proprietary technology
  and made a commitment to building our software systems from the ground up. Due to
  our ultramodern proprietary technology and risk management capabilities, Belvedere
  is able to quickly capitalize on inefficiencies in the marketplace. Our trading
  models and software systems are continually re-engineered, optimized, and maintained
  to stay on top of the industry. Building and nurturing a strong culture is one of
  Belvedere’s highest priorities, and we are always looking for the best and brightest
  talent to help us in our continued success.
