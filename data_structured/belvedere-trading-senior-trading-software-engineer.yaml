description_html: '<p>Belvedere Trading is a leading proprietary trading firm with
  offices in Chicago, New York, Boulder, and Singapore. Our traders work hard to provide
  liquidity to the market through their market-making activities and are the masters
  of a diverse set of commodities, interest rates, exchange-traded funds (ETF), and
  equity index options. From the beginning, we began iteratively investing in our
  proprietary technology and committing to building our systems from the ground up.
  Our trading models and software systems are continually re-engineered, optimized,
  and maintained to stay on top of the industry. We operate best within a team environment
  where we challenge each other to deliver value consistently and share in the success
  of the company.&nbsp;&nbsp;&nbsp;</p><p><br></p><p><span>We’re looking for a Senior
  Trading Software Engineer to help push the boundaries of our trading platform. You’ll
  work side-by-side with traders and quantitative researchers to design and evolve
  the infrastructure behind our automated options trading systems. Our core platform
  is built in Java, but we’re expanding into modern C++ to drive our strategies into
  new markets. This role will have a hand in everything from trading logic to system
  performance to FPGA integrations. We operate every day with rigorous code reviews,
  automated testing, and scalable best practices. If you love optimizing every microsecond,
  solving real-time problems, and building scalable, battle-tested systems, this role
  will keep you challenged and engaged every day.</span></p><p><b>What you''ll do</b></p><ul><li>Solve
  low-latency trading problems and optimize performance-critical code.&nbsp;</li><li>Collaborate
  with fellow trading engineers to improve system performance and scalability.</li><li>Contribute
  across the tech stack: application development, network optimization, and platform
  tuning.</li><li>Partner with hardware and networking teams to drive low-latency
  performance gains.</li><li>Leverage data to drive decision-making and uncover optimization
  opportunities.</li><li>Design and implement performance-critical, low-latency solutions
  for real-time trading.</li><li>Continuously enhance our performance architecture
  to support evolving strategies.</li><li>Build new platform features and refine existing
  systems to meet the demands of high-speed trading.</li></ul><p></p><p><b>What you''ll
  need</b></p><ul><li>Proven experience in full-cycle software development in trading
  or other high-performance domains</li><li>5+ years of professional experience in
  modern C++; Java experience is a plus</li><li>Strong grasp of network programming
  (e.g., raw sockets, latency tuning, packet handling)</li><li>Demonstrated ability
  to debug, profile, and optimize complex systems</li><li>A self-directed approach
  with the ability to identify and solve system issues without handholding</li><li>Experience
  in fast-paced environments where reliability and performance are paramount</li><li>A
  proactive mindset that anticipates risk, foresees performance bottlenecks, and proposes
  forward-thinking solutions</li><li>A Bachelor''s or Master’s degree in Computer
  Science, Engineering, or a related technical field</li></ul><p></p><p></p><p><b>Work
  Schedule&nbsp;&nbsp;</b></p><p><span>Belvedere Trading is supportive of a Hybrid
  work schedule requiring two days a week in either the Chicago, Boulder, New York,
  or Singapore offices during normal business hours.&nbsp;</span></p><p><br></p><p><b>Women
  and underrepresented groups frequently apply to jobs only if they meet 100% of the
  qualifications.</b></p><p><b>We encourage you to break that mold and apply. No candidate
  is perfect; all have a lot to offer. We welcome your application.</b></p><p><br></p><p><b>Core
  Values</b></p><p>The secret to our award-winning culture is our Core Values:&nbsp;<b>Team
  Belvedere, Me In Team, Own It, Iterative Innovation, and Passionate Discourse</b>.&nbsp;We
  live and breathe these values every day.</p><p><br></p><p><b>Our Stance</b></p><p>Belvedere
  is an Equal Opportunity Employer and is committed to providing a non-discriminatory
  employment environment for its employees. Discrimination against employees and applicants
  due to race, color, religion, sex, national origin, disability, age, military, and
  veteran status is prohibited. Belvedere encourages initiatives to increase diversity
  and provide equal opportunity to all applicants and employees. Belvedere is committed
  to providing a positive environment in which team members are treated with respect,
  dignity, and courtesy. Our firm believes in a dynamic culture of inclusion and diversity,
  where people thrive on individual and organizational characteristics, values, experiences,
  and backgrounds.</p><p>&nbsp;</p><p>Please note that Belvedere Trading does not
  accept unsolicited resumes from search firms or employment agencies. Any unsolicited
  resumes will become the property of Team Belvedere. No phone calls, please.</p><p>&nbsp;</p><p>Any
  questions regarding the virtual recruiting process, please reach out to&nbsp;recruiting@belvederetrading.com.</p><p>&nbsp;</p><p>&nbsp;</p><p></p>'
