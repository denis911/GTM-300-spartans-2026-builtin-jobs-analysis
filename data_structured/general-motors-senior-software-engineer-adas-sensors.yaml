description_html: '<b>Description</b><br><strong> About Us  </strong>    <br>GM is
  developing the next generation of embedded platform software to deliver state-of-the-art
  ADAS features to our customers.  <br>The Autonomy Interface SW (AIS) team is responsible
  for building runtime software that enables robust interface contracts, system degradation
  transitions, and seamless sensing integration with the autonomy stack.    <br><strong>
  The Role </strong>  <br>As a Senior Software Engineer you''ll be responsible for
  designing, documenting, and implementing complex, highly scalable, low-latency software
  in C++ on Linux-based systems for the AIS team. Your work will be the foundational
  software which the rest of GM''s AV stack is built upon.  <br>If you are looking
  to solve one of today''s most complex engineering challenges, see the results of
  your work in hundreds of self-driving cars, and make a positive impact in the world,
  join us. <br><strong> What  </strong>  <strong> you''ll </strong>  <strong>  be
  doing (Responsibilities) </strong>  <br><ul>  <li> Develop software in C++ to interface
  with the autonomy stack with the sensors and custom hardware on the vehicle</li>  </ul>  <br><ul>  <li>
  Improve and deliver reliable software through requirements generation, continuous
  integration, automated testing, issue tracking, and code reviews</li>  </ul>  <br><ul>  <li>
  Collaborate with colleagues across multiple teams and mentor other developers</li>  </ul>  <br><ul>  <li>
  Deliver complex projects through incremental development</li>  </ul>  <br><ul>  <li>
  Lead and generates technical solutions including specifying of requirements, functional
  decomposition, analysis, development and testing for current, new and major programs</li>  </ul>  <br><ul>  <li>
  Performs as Subject Matter Expert (SME) for at least one platform or application
  component</li>  </ul>  <br><ul>  <li> Provide, communicate, and support common best
  practices among software community</li>  </ul>  <br><ul>  <li> Lead development
  of software system team design content and software anomaly corrections.</li>  </ul>  <br><ul>  <li>
  Knowledge of and experience applying software best practices</li>  </ul>  <br><ul>  <li>
  Being able to specify and balances system requirements</li>  </ul>  <br><strong>
  Your Skills &amp; Abilities (Required Qualifications)  </strong>  <br><ul>  <li>
  4+ years of experience writing production-quality software</li>  </ul>  <br><ul>  <li>
  Bachelors Degree in a relevant field or relevant work experience.</li>  <li> Demonstrated
  experience building, testing, and shipping production software</li>  <li> Knowledge
  of and experience applying software best practice</li>  <li> Performs complex design
  analysis</li>  </ul>  <br><strong> What Will Give You  </strong>  <strong> A </strong>  <strong>  Competitive
  Edge (Preferred Qualifications) </strong>  <br><ul>  <li> 7+ years of experience
  desired</li>  <li> Experience developing on and for embedded Linux / POSIX systems</li>  <li>
  Experience with safety critical development (FDA, FAA, Automotive)</li>  </ul>  <br><ul>  <li>
  Experience with embedded build systems, such as buildroot or yocto.</li>  </ul>  <br><ul>  <li>
  Experience with networking, TCP/IP and UDP.</li>  </ul>  <br><ul>  <li> Experience
  with ROS or other robotics middleware platforms</li>  </ul>  <br><ul>  <li> Experience
  with other languages: C, Python, Bash, Go</li>  </ul>  <br><ul>  <li> Experience
  with QNX, VxWorks, or similar RTOS</li>  </ul>  <br><ul>  <li> Experience working
  with Lidars, radars and cameras</li>  </ul>  <br><ul>  <li> Experience working with
  motion sensing devices such as GNSS, IMUs and wheel encoders</li>  </ul>  <br><strong>
  Compensation: </strong>  The compensation information is a good faith estimate only.
  It is based on what a successful applicant might be paid in accordance with applicable
  state laws. The compensation may not be representative for positions located outside
  of New York, Colorado, California, or Washington.   <br>•     <strong> The salary
  range for this role: </strong>  is $153,200 to $234,100. The actual base salary
  a successful candidate will be offered within this range will vary based on factors
  relevant to the position.  <br>•     <strong> Bonus Potential: </strong>  An incentive
  pay program offers payouts based on company performance, job level, and individual
  performance.  <br>•     <strong> Benefits: </strong>  GM offers a variety of health
  and wellbeing benefit programs. Benefit options include medical, dental, vision,
  Health Savings Account, Flexible Spending Accounts, retirement savings plan, sickness
  and accident benefits, life insurance, paid vacation &amp; holidays, tuition assistance
  programs, employee assistance program, GM vehicle discounts and more. <br>#GM-AV-1
  <br>This role is based remotely, but if the selected candidate lives within a specific
  mile radius of a GM hub, they will be expected to report to the location three times
  a week {or other frequency dictated by your manager}. <br>The selected candidate
  will be required to travel &lt;25% for this role. <br>This job may be eligible for
  relocation benefits. <br><b>About GM</b><br>Our vision is a world with Zero Crashes,
  Zero Emissions and Zero Congestion and we embrace the responsibility to lead the
  change that will make our world better, safer and more equitable for all.<br><b>Why
  Join Us</b><br>We believe we all must make a choice every day - individually and
  collectively - to drive meaningful change through our words, our deeds and our culture.
  Every day, we want every employee to feel they belong to one General Motors team.<br><b>Total
  Rewards | Benefits Overview</b><br>From day one, we''re looking out for your well-being-at
  work and at home-so you can focus on realizing your ambitions. Learn how GM supports
  a rewarding career that rewards you personally by visiting Total Rewards resources.
  <br><b>Non-Discrimination and Equal Employment Opportunities (U.S.)</b><br>General
  Motors is committed to being a workplace that is not only free of unlawful discrimination,
  but one that genuinely fosters inclusion and belonging. We strongly believe that
  providing an inclusive workplace creates an environment in which our employees can
  thrive and develop better products for our customers.<br>All employment decisions
  are made on a non-discriminatory basis without regard to sex, race, color, national
  origin, citizenship status, religion, age, disability, pregnancy or maternity status,
  sexual orientation, gender identity, status as a veteran or protected veteran, or
  any other similarly protected status in accordance with federal, state and local
  laws. <br>We encourage interested candidates to review the key responsibilities
  and qualifications for each role and apply for any positions that match their skills
  and capabilities. Applicants in the recruitment process may be required, where applicable,
  to successfully complete a role-related assessment(s) and/or a pre-employment screening
  prior to beginning employment. To learn more, visit How we Hire.<br><b>Accommodations</b><br>General
  Motors offers opportunities to all job seekers including individuals with disabilities.
  If you need a reasonable accommodation to assist with your job search or application
  for employment, email us [email protected] or call us at 1-800-865-7580. In your
  email, please include a description of the specific accommodation you are requesting
  as well as the job title and requisition number of the position for which you are
  applying.'
