company_overview: 'Fora is the modern travel agency, redefining what it means to be
  a travel advisor in today’s world. We’re a next-generation platform that provides
  a comprehensive, business-in-a-box solution—combining cutting-edge technology, personalized
  training, a vibrant community, and exclusive industry partnerships—all designed
  to empower anyone with a passion for travel to turn that passion into a thriving
  business. Whether you''re a travel enthusiast or an experienced professional, Fora
  equips you with everything needed to launch and scale a successful travel advisory
  business, making it the ultimate way to align work with your lifestyle.At the heart
  of Fora is our mission: to power the next generation of travel entrepreneurs to
  transform their love for travel into a fulfilling full-time or part-time career,
  offering unparalleled flexibility, autonomy, and support. We believe that everyone,
  from seasoned travel professionals to first-time entrepreneurs, can build a career
  that’s both profitable and aligned with their passions.Our platform combines innovative
  technology with the human touch, offering:Best-in-class training programs to help
  agents develop expert knowledge, no matter their starting point.A powerful suite
  of tools for booking, client management, and marketing, ensuring agents can focus
  on delivering exceptional travel experiences.Access to an engaged community of fellow
  advisors, fostering collaboration, support, and shared learning.Exclusive partnerships
  with top travel brands, providing access to competitive rates, perks, and experiences
  that elevate advisors’ offerings.Since our founding in 2021 by experienced travel
  entrepreneurs Henley Vazquez, Jake Peters, and Evan Frank, Fora has experienced
  rapid growth, expanding to a team of 130+ full-time employees based in downtown
  New York City. Earlier this year, we announced our $60 million Series B and C investment
  rounds, led by Thrive Capital and Insight Partners, with participation by previous
  investors including Forerunner and Heartcore Capital. This funding represents a
  vote of confidence in the enduring power of entrepreneurship, and secures our ability
  to build a category-defining travel brand. We have a vision for the future that
  leverages the best of humans and the best of technology to create the first truly
  unified platform for all travel needs - from staycation to the safari.'
