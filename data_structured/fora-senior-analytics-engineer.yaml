description_html: '<p><b><strong>About Fora</strong></b><p><strong>Fora</strong> is
  the modern travel agency, empowering anyone with a passion for travel to build a
  thriving advisory business. Our comprehensive, <strong>business-in-a-box</strong>
  platform combines cutting-edge technology, personalized training, a vibrant community,
  and exclusive industry partnerships, giving travel entrepreneurs everything they
  need to launch and scale successfully. At the heart of Fora is our mission: to<strong>
  power the next generation of travel entrepreneurs</strong> to transform their love
  for travel into a fulfilling full-time or part-time career, offering unparalleled
  flexibility, autonomy, and support. We believe that everyone, from seasoned travel
  professionals to first-time entrepreneurs, can build a career that’s both profitable
  and aligned with their passions.</p><p>Founded in 2021 by seasoned entrepreneurs,&nbsp;Fora
  has grown steadily since, expanding to a team of <strong>200+ full-time employees</strong>
  based in downtown <strong>New York City</strong>. <strong>In 2025,</strong> we announced
  our <strong>$60 million Series B and C investment rounds</strong>, led by<strong>
  Thrive Capital </strong>and<strong> Insight Partners</strong>, with participation
  by previous investors including <strong>Forerunner</strong> and <strong>Heartcore
  Capital.</strong> We''ve also been recognized as a LinkedIn Top Startup 2024, Fast
  Company''s Most Innovative Companies 2025 and 2023, and Built In 2025 Best Places
  to Work.</p><p>We''re building the first truly unified platform for all travel needs—leveraging
  the best of human expertise and technology to transform how people plan and book
  travel.</p></p><b><strong>About The Role</strong></b><p>Fora is hiring its first
  Senior Analytics Engineer to help scale how data is modeled, curated, and delivered
  across the company. As our centralized data team grows, we’re looking for a dedicated
  owner of the analytics transformation and metrics layer so analysts and stakeholders
  can access timely, reliable, and actionable insights.</p><p>This is a foundational
  role where you’ll establish analytics engineering standards, create trusted data
  marts and metric definitions, and improve data quality and performance across Fora’s
  data stack. This role reports to the Director, Data &amp; Analytics and works closely
  with partners in Engineering, Product, Finance and Growth.</p><b><strong>Key Responsibilities</strong></b><ul><li>Own
  and mature Fora’s analytics transformation layer, including the data models, context,
  and systems used to manage it</li><li>Build modern analytics foundations that power
  AI-driven insights and action (both in BI-tool native AI apps, as well as through
  the use of MCP servers)</li><li>Collaborate with business stakeholders to understand
  their needs, determine projects, and define requirements</li><li>Improve quality,
  reliability, and performance, including reducing latency and managing cost as our
  data scales</li><li>Promote a culture of data excellence through mentorship, documentation,
  and training</li><li>Contribute to broader Data team strategy, project prioritization,
  and the continuous evolution of analytics best practices</li></ul><b><strong>Requirements</strong></b><ul><li>5+
  years of experience in data analytics, including 2+ in an analytics engineering
  or an equivalent role</li><li>Advanced SQL skills. Experience with Python is a plus</li><li>Experience
  building and maintaining dbt projects in a production environment</li><li>Hands-on
  with data warehouses such as BigQuery, Snowflake, Databricks</li><li>Experience
  with modern BI tools such as Omni, Sigma, Hex, or Looker</li><li>Familiarity with
  data ingestion (Airbyte, Fivetran) or orchestration tools</li><li>Experience using
  LLM tools such as Claude Code, Cursor, or OpenAI Codex</li><li>Strong cross-functional
  communication skills and experience partnering with technical and non-technical
  stakeholders</li></ul><b>Compensation</b><p>Compensation for this role varies based
  on experience, with an indicative range of $130–$185K + equity. Final compensation
  will depend on the level at which the candidate is hired, as we’re considering multiple
  levels for this role.</p><ul><li>Unlimited vacation</li><li>Health Insurance (including
  an option completely covered by Fora HQ)</li><li>Dental &amp; Vision Insurance</li><li>Wellhub
  Memberships</li><li>401k plan with company match</li><li>Commuter Benefits</li><li>Supplemental
  Life Insurance</li><li>Stock Options</li></ul><p>This role is based in our beautiful
  New York City office (Tribeca/Fidi) with lots of natural light and great views.&nbsp;</p><p><b><strong>Our
  Values</strong></b><p><strong>We’re forging our own path</strong></p><p>Fora has
  always been about driving change within the industry. We’re not interested in maintaining
  the status quo.&nbsp;</p><p><strong>We’re stronger together</strong></p><p>Community
  is our cornerstone and collective power is our strength. We believe we can all go
  further when we operate together, using our combined leverage to unlock better opportunities
  and outcomes for our advisors, partners, and travelers.</p><p><strong>We believe
  in technology</strong></p><p>We believe technology is an answer to some of the most
  fundamental challenges the travel industry faces. We believe advancements in AI,
  bold investments in our platforms, and a world-class data infrastructure will transform
  the work of our advisors and our partners, while creating better travel experiences
  for travelers.</p><p><strong>We’re here to serve</strong></p><p>We operate in service
  of our community and believe that when they’re empowered to focus on what they do
  best, we all win. It’s why we relentlessly advocate for our advisors and prioritize
  their best interest every step of the way.</p><p><strong>We mean business</strong></p><p>Fora
  is equal parts fun, meaningful work and serious travel business. We’re unlocking
  opportunities for thousands of travel entrepreneurs, delivering a stream of high-quality
  guests at scale for our partners, and providing a superior travel experience for
  our travelers. It’s a better equation for the future of our industry.</p><p><strong>--</strong></p><p><strong>WORK
  AUTHORIZATION</strong></p><p>Authorization to work in the United States is required
  for full-time roles based in our New York City office. Fora is unable to sponsor
  or assist with U.S. work authorization. Roles based outside of the United States
  are not subject to this requirement.</p><p><strong>EQUAL OPPORTUNITY</strong></p><p>Fora
  is committed to an equitable hiring process and an inclusive work environment. BIPOC
  and traditionally underrepresented candidates are strongly encouraged to apply.
  We will not discriminate and will take action to ensure against discrimination in
  employment, recruitment, advertisements for employment, compensation, termination,
  upgrading, promotions, and other conditions of employment against any employee or
  job applicant on the bases of race, color, gender, national origin, age, religion,
  creed, disability, veteran''s status, sexual orientation, gender identity, gender
  expression or any other characteristic protected by law.</p></p>'
description_text: 'About Fora Fora is the modern travel agency, empowering anyone
  with a passion for travel to build a thriving advisory business. Our comprehensive,
  business-in-a-box platform combines cutting-edge technology, personalized training,
  a vibrant community, and exclusive industry partnerships, giving travel entrepreneurs
  everything they need to launch and scale successfully. At the heart of Fora is our
  mission: to power the next generation of travel entrepreneurs to transform their
  love for travel into a fulfilling full-time or part-time career, offering unparalleled
  flexibility, autonomy, and support. We believe that everyone, from seasoned travel
  professionals to first-time entrepreneurs, can build a career that’s both profitable
  and aligned with their passions. Founded in 2021 by seasoned entrepreneurs,&nbsp;Fora
  has grown steadily since, expanding to a team of 200+ full-time employees based
  in downtown New York City . In 2025, we announced our $60 million Series B and C
  investment rounds , led by Thrive Capital and Insight Partners , with participation
  by previous investors including Forerunner and Heartcore Capital. We''ve also been
  recognized as a LinkedIn Top Startup 2024, Fast Company''s Most Innovative Companies
  2025 and 2023, and Built In 2025 Best Places to Work. We''re building the first
  truly unified platform for all travel needs—leveraging the best of human expertise
  and technology to transform how people plan and book travel. About The Role Fora
  is hiring its first Senior Analytics Engineer to help scale how data is modeled,
  curated, and delivered across the company. As our centralized data team grows, we’re
  looking for a dedicated owner of the analytics transformation and metrics layer
  so analysts and stakeholders can access timely, reliable, and actionable insights.
  This is a foundational role where you’ll establish analytics engineering standards,
  create trusted data marts and metric definitions, and improve data quality and performance
  across Fora’s data stack. This role reports to the Director, Data &amp; Analytics
  and works closely with partners in Engineering, Product, Finance and Growth. Key
  Responsibilities Own and mature Fora’s analytics transformation layer, including
  the data models, context, and systems used to manage it Build modern analytics foundations
  that power AI-driven insights and action (both in BI-tool native AI apps, as well
  as through the use of MCP servers) Collaborate with business stakeholders to understand
  their needs, determine projects, and define requirements Improve quality, reliability,
  and performance, including reducing latency and managing cost as our data scales
  Promote a culture of data excellence through mentorship, documentation, and training
  Contribute to broader Data team strategy, project prioritization, and the continuous
  evolution of analytics best practices Requirements 5+ years of experience in data
  analytics, including 2+ in an analytics engineering or an equivalent role Advanced
  SQL skills. Experience with Python is a plus Experience building and maintaining
  dbt projects in a production environment Hands-on with data warehouses such as BigQuery,
  Snowflake, Databricks Experience with modern BI tools such as Omni, Sigma, Hex,
  or Looker Familiarity with data ingestion (Airbyte, Fivetran) or orchestration tools
  Experience using LLM tools such as Claude Code, Cursor, or OpenAI Codex Strong cross-functional
  communication skills and experience partnering with technical and non-technical
  stakeholders Compensation Compensation for this role varies based on experience,
  with an indicative range of $130–$185K + equity. Final compensation will depend
  on the level at which the candidate is hired, as we’re considering multiple levels
  for this role. Unlimited vacation Health Insurance (including an option completely
  covered by Fora HQ) Dental &amp; Vision Insurance Wellhub Memberships 401k plan
  with company match Commuter Benefits Supplemental Life Insurance Stock Options This
  role is based in our beautiful New York City office (Tribeca/Fidi) with lots of
  natural light and great views.&nbsp; Our Values We’re forging our own path Fora
  has always been about driving change within the industry. We’re not interested in
  maintaining the status quo.&nbsp; We’re stronger together Community is our cornerstone
  and collective power is our strength. We believe we can all go further when we operate
  together, using our combined leverage to unlock better opportunities and outcomes
  for our advisors, partners, and travelers. We believe in technology We believe technology
  is an answer to some of the most fundamental challenges the travel industry faces.
  We believe advancements in AI, bold investments in our platforms, and a world-class
  data infrastructure will transform the work of our advisors and our partners, while
  creating better travel experiences for travelers. We’re here to serve We operate
  in service of our community and believe that when they’re empowered to focus on
  what they do best, we all win. It’s why we relentlessly advocate for our advisors
  and prioritize their best interest every step of the way. We mean business Fora
  is equal parts fun, meaningful work and serious travel business. We’re unlocking
  opportunities for thousands of travel entrepreneurs, delivering a stream of high-quality
  guests at scale for our partners, and providing a superior travel experience for
  our travelers. It’s a better equation for the future of our industry. -- WORK AUTHORIZATION
  Authorization to work in the United States is required for full-time roles based
  in our New York City office. Fora is unable to sponsor or assist with U.S. work
  authorization. Roles based outside of the United States are not subject to this
  requirement. EQUAL OPPORTUNITY Fora is committed to an equitable hiring process
  and an inclusive work environment. BIPOC and traditionally underrepresented candidates
  are strongly encouraged to apply. We will not discriminate and will take action
  to ensure against discrimination in employment, recruitment, advertisements for
  employment, compensation, termination, upgrading, promotions, and other conditions
  of employment against any employee or job applicant on the bases of race, color,
  gender, national origin, age, religion, creed, disability, veteran''s status, sexual
  orientation, gender identity, gender expression or any other characteristic protected
  by law.'
