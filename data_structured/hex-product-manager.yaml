description_html: '<b>About the role</b><p>Hex is looking for a Product Manager to
  join the team and help drive the future of how teams work with data. Hex is a product-led
  company with a strong sales motion, so you’ll get to think deeply about product
  details <em>and</em> work with our sales team to make sure the product is successful
  in the market.</p><p>We’re looking for the next PM to move forward our analytical
  features: notebooks, dashboarding and our conversational AI interfaces. Our recent
  launches, specifically our AI features like Threads and the Notebook Agent, have
  driven a huge amount of momentum for the company and our next PM will help us continue
  that momentum.</p><b>What you will do</b><ul><li>Own an area of the product and
  be responsible for driving forward a coherent vision for that product that resonates
  with customers</li><li>Do early discovery and help define which problems are worth
  solving</li><li>Get deep with customers to understand their roles, what they are
  trying to accomplish and how to make them more impactful in their work</li><li>Do
  competitive research, get deep in the data and analytics space and understand our
  Market</li><li>Collaborate closely with engineering, design and GTM teams to deliver
  high-impact features</li><li>Learn from the sales process to see what’s resonating</li></ul><b>About
  you</b><ul><li>5 years+ of hands-on experience as either a Product Manager, product-engaged
  Solutions / Sales Engineer, or customer-engaged Engineer</li><li>Experience with
  technical products, and demonstrated ability to dive deep into complex systems</li><li>We’re
  a growth-stage startup, so we’re looking for PMs that can ship quickly and iterate</li><li>Preference
  for candidates with experience or strong interest in data and analytics</li></ul><br><p><em>This
  role will be hybrid (1-2 days per week in office) out of our San Francisco headquarters
  or NYC office.&nbsp;</em></p><p>In addition to our unique culture, Hex proudly offers
  a competitive total rewards package, including but not limited to, market-benched
  salary &amp; equity, comprehensive health benefits, and flexible paid time off.</p><p>The
  salary range for this role is: $178,000 - $220,000</p><p>The salary range shown
  may be a reflection of additional factors such as geographical location and skill
  ranges/levels we’re open to. Placement in the salary range will be decided upon
  completion of the interview process, taking into account factors like leaving room
  for growth, internal fairness &amp; parity, your demonstrated skills, and the depth
  of your experience. Our Recruiting team will be able to provide more details during
  the interview process.</p><p>By submitting an application the candidate consents
  to the use of their personal information in accordance with the Hex Privacy policy:&nbsp;<span>https://learn.hex.tech/docs/trust/privacy-policy</span>.</p>'
description_text: 'About the role Hex is looking for a Product Manager to join the
  team and help drive the future of how teams work with data. Hex is a product-led
  company with a strong sales motion, so you’ll get to think deeply about product
  details and work with our sales team to make sure the product is successful in the
  market. We’re looking for the next PM to move forward our analytical features: notebooks,
  dashboarding and our conversational AI interfaces. Our recent launches, specifically
  our AI features like Threads and the Notebook Agent, have driven a huge amount of
  momentum for the company and our next PM will help us continue that momentum. What
  you will do Own an area of the product and be responsible for driving forward a
  coherent vision for that product that resonates with customers Do early discovery
  and help define which problems are worth solving Get deep with customers to understand
  their roles, what they are trying to accomplish and how to make them more impactful
  in their work Do competitive research, get deep in the data and analytics space
  and understand our Market Collaborate closely with engineering, design and GTM teams
  to deliver high-impact features Learn from the sales process to see what’s resonating
  About you 5 years+ of hands-on experience as either a Product Manager, product-engaged
  Solutions / Sales Engineer, or customer-engaged Engineer Experience with technical
  products, and demonstrated ability to dive deep into complex systems We’re a growth-stage
  startup, so we’re looking for PMs that can ship quickly and iterate Preference for
  candidates with experience or strong interest in data and analytics This role will
  be hybrid (1-2 days per week in office) out of our San Francisco headquarters or
  NYC office.&nbsp; In addition to our unique culture, Hex proudly offers a competitive
  total rewards package, including but not limited to, market-benched salary &amp;
  equity, comprehensive health benefits, and flexible paid time off. The salary range
  for this role is: $178,000 - $220,000 The salary range shown may be a reflection
  of additional factors such as geographical location and skill ranges/levels we’re
  open to. Placement in the salary range will be decided upon completion of the interview
  process, taking into account factors like leaving room for growth, internal fairness
  &amp; parity, your demonstrated skills, and the depth of your experience. Our Recruiting
  team will be able to provide more details during the interview process. By submitting
  an application the candidate consents to the use of their personal information in
  accordance with the Hex Privacy policy:&nbsp; https://learn.hex.tech/docs/trust/privacy-policy
  .'
