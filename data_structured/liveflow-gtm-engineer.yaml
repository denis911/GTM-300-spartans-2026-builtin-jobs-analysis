description_html: '<b>About LiveFlow</b><p>We are building the next-generation accounting
  and finance platform to enable lean finance teams to run massive enterprises.</p><p>We
  have raised over $21M from top-tier investors including: YC, YC Continuity, Valar,
  Seedcamp, WndrCo, Moonfire, Bradley Horowitz (VP Product, Google) and more.</p><p>We
  are helping thousands of companies streamline their financial workflows and have
  hundreds of 5/5 ratings on G2.</p><p>Our founding team previously worked at Europe’s
  fastest growing fintech, Revolut.</p><p></p><b>About the Role</b><p>As a <strong>GTM
  Engineer</strong>, you’ll start with having direct ownership of new AI initiatives
  driving LiveFlow’s Go-To-Market strategy for CFOs. You’ll ultimately strengthen
  demand from finance professionals across various channels and automate a lot of
  processes with AI. </p><p></p><b>What You Will Do</b><ul><li><p>Develop a thorough
  understanding of LiveFlow’s ICP </p></li><li><p>Create reports to extract actionable
  metrics and inform decisions for GTM and content strategy</p></li><li><p>Identify
  key initiatives to drive 0 to 1 expand your role (in AI or other strategic domains)
  by forming hypotheses, conducting analysis, and delivering executive-level proposals</p></li><li><p>Drive
  efforts across a broad range of teams (e.g., Sales, Customer Success, Business Development,
  RevOps, Product) to problem-solve, build, and lead projects fueling LiveFlow’s growth</p></li><li><p>Stay
  adaptable and open to new opportunities directly under our CEO and COO</p></li></ul><p></p><b>What
  We’re Looking For</b><ul><li><p>At least 2 years of experience in a fast-paced environment
  (e.g., investment banking, private equity, management consulting, early-stage startups)</p></li><li><p>Excellent
  communication skills</p></li><li><p>Familiarity with sales and marketing, or the
  ability to learn quickly</p></li><li><p>Comfort with ambiguity and testing/failing/learning
  to solve blue-sky problems</p></li><li><p>Strong interest in and ability to stay
  up-to-date with emerging technologies in AI and search</p></li><li><p>Prior experience
  using AI tools like Clay, Claude, ChatGPT for automating workflows</p></li><li><p>Hands-on
  experience moving data across systems via APIs and webhooks</p></li></ul><p></p><b>Benefits</b><ul><li><p>Substantial
  equity package</p></li><li><p>Medical, dental, and vision coverage</p></li><li><p>All
  the latest tech you need (MacBook, monitors, etc.)</p></li><li><p>Monthly budget
  for books and conferences</p></li><li><p>Unlimited PTO policy</p></li></ul><p>Missing
  something? Let us know and we can talk about it.</p><p></p><b>Interview Process</b><ul><li><p>Intro/screening
  call</p></li><li><p>Take-home assessment</p></li><li><p>Technical &amp; career history
  interview</p></li><li><p>Founder’s interview</p></li></ul><p>We are an equal opportunity
  employer and value diversity at our company. We do not discriminate on the basis
  of race, religion, color, national origin, gender, sexual orientation</p>'
