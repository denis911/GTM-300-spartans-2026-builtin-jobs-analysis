description_html: <b> Job Description </b><br>At Citadel, our mission is to be the
  most successful investment team in the world. Quantitative Researchers play a key
  role in this mission by developing next-generation models and trading approaches
  for a range of investment strategies. You'll get to challenge the impossible in
  quantitative research by applying sophisticated and complex statistical techniques
  to financial markets, some of the most complex data sets in the world.<br>Your Objectives
  <br><ul> <li>Use statistics, machine learning (e.g. deep learning, NLP) to extract
  patterns from various kinds of datasets through innovative and rigorous research
  </li> <li>Implement algorithms in high-quality code </li> <li>Work with large data
  sets, including unconventional and unstructured data sources </li> <li>Back-test
  models and document research findings </li> </ul><br>Your Skills &amp; Talents <br><ul>
  <li>PhD degree in mathematics, statistics, physics, computer science, or another
  highly quantitative field </li> <li>Advanced training and a strong research track
  record in machine learning, statistics, deep learning, natural language processing,
  artificial intelligence, or a closely related quantitative field</li> <li>Prior
  experience working in a data driven detailed research environment</li> <li>Hands
  on programming experience in Python or C++</li> <li>A background demonstrating strong
  problem-solving skills </li> <li>An ability to communicate advanced concepts in
  a concise and logical way </li> <li>Proficiency in creating and using algorithms
  to meticulously investigate and work through large data or error-checking problems
  </li> </ul><br>Opportunities available in New York.<br>In accordance with applicable
  law, the base salary range for this role is $225,000 to $300,000. <br>In addition,
  the employee who fills this role will be eligible to participate in a discretionary
  incentive compensation program, as well as a wide array of benefit programs, such
  as medical and life insurance, retirement and tax-free savings plans, and access
  to other healthcare programs. <br><b> About Citadel </b><br>Citadel is one of the
  world's leading alternative investment managers. We manage capital on behalf of
  many of the world's preeminent private, public and nonprofit institutions. We seek
  the highest and best use of investor capital in order to deliver market leading
  results and contribute to broader economic growth. For over 30 years, Citadel has
  cultivated a culture of learning and collaboration among some of the most talented
  and accomplished investment professionals, researchers and engineers in the world.
  Our colleagues are empowered to test their ideas and develop commercial solutions
  that accelerate their growth and drive real impact.
