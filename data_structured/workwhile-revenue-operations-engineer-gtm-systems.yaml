  translating business requirements into robust, scalable system configurations Regularly
  present technical strategy, system launches, and performance metrics to leadership
  Drive alignment across Sales, Marketing, and Customer Success — holding stakeholders
  accountable to outcomes Build a culture of execution rigor, structured problem-solving,
  and continuous operational improvement What We''re Looking For Required: 3–6 years
  of experience in Revenue Operations, Sales Operations, GTM Engineering, or CRM Administration
  — or equivalent experience in a fast-paced startup or marketplace environment Deep,
  hands-on Salesforce administration experience , including Flows, custom objects,
  validation rules, reports, and dashboards (Salesforce Admin certification a strong
  plus) Proficiency with sales engagement and enablement platforms (Outreach, Gong,
  Nooks or equivalents) Highly analytical with a strong ability to architect complex
  business workflows and measure their impact on revenue and pipeline Strong communication
  and influence skills — able to synthesize technical complexity for audiences ranging
  from ICs to the C-suite Bonus Points: Experience building in AI-native automation
  tools like Clay or n8n to drive GTM efficiency Familiarity with HubSpot for marketing
  automation and operations Background in B2B SaaS, marketplace businesses, or high-growth
  startups Exposure to SQL or BI tools (Metabase, Mode, Tableau, etc.) for advanced
  reporting You''ll thrive here if you: Have a strong bias for action and aren''t
  afraid to build something imperfect, then improve it Are comfortable flexing between
  high-level strategy and deep technical execution Thrive in ambiguity and take pride
  in bringing clarity to messy problems Are intellectually curious and always looking
  for a smarter, faster way to do things Benefits &amp; Perks Hybrid in-office work
  from hub in San Francisco In-person company off-sites Medical, dental &amp; vision
  coverage Flexible time off 401(k) with employer match WFH stipend to support your
  home office setup WorkWhile is an Equal Opportunity Employer. Women, minorities,
  individuals with disabilities, and protected veterans are encouraged to apply. We
  have a diverse, mission-driven culture — we look for people who want to take ownership,
  are energized by ambiguity, and want to make a lasting impact.'
