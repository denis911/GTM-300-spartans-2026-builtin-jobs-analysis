description_html: '<b><strong>About WorkWhile</strong></b><p>WorkWhile is on a mission
  to help workers earn a better living and live better lives. 83 million Americans
  work hourly jobs — often with unpredictable schedules, near-minimum wages, and no
  benefits — leading to real financial instability. We''re changing that.</p><p>WorkWhile
  matches the best hourly workers with shifts that fit their skills, schedule, and
  location. Businesses get a reliable, quality workforce. Workers get stable income
  and real benefits: next-day pay, free telehealth, and financial services built for
  them.</p><p>Backed by Khosla Ventures and recognized by the Inc. 5000 for 10x growth,
  we''re disrupting the $650 billion staffing and recruiting market — and we''re just
  getting started.</p><p></p><b><strong>The Opportunity</strong></b><p>This is a rare
  chance to own the entire technical foundation of a high-growth company''s go-to-market
  engine. You won''t be maintaining someone else''s system — you''ll be architecting
  it.</p><p>As our Revenue Operations Engineer, you''ll sit at the intersection of
  RevOps, Sales Operations, and GTM Engineering, turning strategy into working systems.
  You''ll be the person who makes our sales and marketing teams measurably faster
  and smarter — and you''ll have the autonomy and leadership support to do it your
  way.</p><p>If you''re energized by building AI-native workflows, love untangling
  a messy CRM data model, and want to present your technical strategy directly to
  executives, this role is for you.</p><p></p><b><strong>What You''ll Own</strong></b><b><strong>GTM
  Systems Administration &amp; CRM Ownership</strong></b><ul><li><p>Own the technical
  health, architecture, and administration of our full GTM tech stack: Salesforce
  (Flows, Custom Objects, Reports), Outreach, Nooks, Clay and Gong</p></li><li><p>Maintain
  a clean, well-documented CRM data model that supports accurate pipeline reporting,
  revenue forecasting, and customer segmentation</p></li><li><p>Serve as the internal
  Salesforce administrator and subject matter expert across the organization</p></li><li><p>Manage
  integrations across sales, marketing, and customer success tools to ensure a unified,
  reliable data layer</p></li></ul><b><strong>Workflow Automation &amp; AI-Powered
  Sales Enablement</strong></b><ul><li><p>Architect and deploy AI-powered GTM workflows
  — from automating contracting and onboarding to building intelligent prospecting
  cadences</p></li><li><p>Lead the company''s shift to an AI-first operations model,
  leveraging tools like Clay to accelerate prospecting, enrichment, and deal execution</p></li><li><p>Design
  and implement scalable automations that improve funnel conversion and eliminate
  manual work for sellers</p></li><li><p>Partner with marketing to support HubSpot
  campaign operations and marketing automation workflows</p></li></ul><b><strong>Leadership
  &amp; Cross-Functional Influence</strong></b><ul><li><p>Act as the go-to technical
  expert across the org, translating business requirements into robust, scalable system
  configurations</p></li><li><p>Regularly present technical strategy, system launches,
  and performance metrics to leadership</p></li><li><p>Drive alignment across Sales,
  Marketing, and Customer Success — holding stakeholders accountable to outcomes</p></li><li><p>Build
  a culture of execution rigor, structured problem-solving, and continuous operational
  improvement</p></li></ul><p></p><b><strong>What We''re Looking For</strong></b><p>Required:</p><ul><li><p>3–6
  years of experience in Revenue Operations, Sales Operations, GTM Engineering, or
  CRM Administration — or equivalent experience in a fast-paced startup or marketplace
  environment</p></li><li><p><strong>Deep, hands-on Salesforce administration experience</strong>,
  including Flows, custom objects, validation rules, reports, and dashboards (Salesforce
  Admin certification a strong plus)</p></li><li><p>Proficiency with sales engagement
  and enablement platforms (Outreach, Gong, Nooks or equivalents)</p></li><li><p>Highly
  analytical with a strong ability to architect complex business workflows and measure
  their impact on revenue and pipeline</p></li><li><p>Strong communication and influence
  skills — able to synthesize technical complexity for audiences ranging from ICs
  to the C-suite</p></li></ul><p>Bonus Points:</p><ul><li><p>Experience building in
  AI-native automation tools like Clay or n8n to drive GTM efficiency</p></li><li><p>Familiarity
  with HubSpot for marketing automation and operations</p></li><li><p>Background in
  B2B SaaS, marketplace businesses, or high-growth startups</p></li><li><p>Exposure
  to SQL or BI tools (Metabase, Mode, Tableau, etc.) for advanced reporting</p></li></ul><p>You''ll
  thrive here if you:</p><ul><li><p>Have a strong bias for action and aren''t afraid
  to build something imperfect, then improve it</p></li><li><p>Are comfortable flexing
  between high-level strategy and deep technical execution</p></li><li><p>Thrive in
  ambiguity and take pride in bringing clarity to messy problems</p></li><li><p>Are
  intellectually curious and always looking for a smarter, faster way to do things</p></li></ul><p></p><b><strong>Benefits
  &amp; Perks</strong></b><ul><li><p>Hybrid in-office work from hub in San Francisco</p></li><li><p>In-person
  company off-sites</p></li><li><p>Medical, dental &amp; vision coverage</p></li><li><p>Flexible
  time off</p></li><li><p>401(k) with employer match</p></li><li><p>WFH stipend to
  support your home office setup</p></li></ul><p></p><p><em>WorkWhile is an Equal
  Opportunity Employer. Women, minorities, individuals with disabilities, and protected
  veterans are encouraged to apply. We have a diverse, mission-driven culture — we
  look for people who want to take ownership, are energized by ambiguity, and want
  to make a lasting impact.</em></p>'
