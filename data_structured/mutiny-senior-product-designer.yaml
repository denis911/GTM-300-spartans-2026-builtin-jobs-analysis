  Capital, Tiger Global, Insight Partners, and Y Combinator. About the Role We’re
  looking for a Senior Product Designer to join our product team in New York. You’ll
  own the design of our Campaign Builder and Creative Agent experiences—core surfaces
  that let marketers and sellers generate, edit, and launch personalized campaigns
  across accounts. This role is central to how Mutiny brings our agentic vision to
  life: helping enterprise teams go from idea to personalized assets with speed, trust,
  and quality. You’ll partner closely with PM and Eng to define the end-to-end experience—from
  conversational AI collaboration to guardrails for brand consistency. 📍 This role
  is based in NYC and requires being in-person 5 days a week . What You’ll Do Lead
  design for the Campaign Builder and Creative Agent workflows, balancing AI automation
  with marketer oversight Translate complex enterprise user needs (ABM, demand gen,
  sales collaboration) into intuitive flows that feel simple and empowering Design
  experiences that scale—from 1:1 account personalization to 1:many campaigns —while
  maintaining quality and trust Collaborate in person with PMs and engineers, and
  senior leadership team to prototype, validate, and ship new features quickly Establish
  design patterns and systems that unify co-pilot chat, visual editing, and approval
  workflows Advocate for the end user, ensuring every change is checked against the
  full flow and end-to-end experience What We’re Looking For 5+ years of product design
  experience, ideally in SaaS or enterprise tools Strong portfolio demonstrating thoughtful
  UX for complex workflows and creative tools Ability to design for AI-driven experiences:
  balancing automation, transparency, and human control Comfort working from 0→1:
  shaping ambiguous problem spaces into clear, elegant solutions Excellent collaboration
  and communication skills—you thrive in cross-functional teams Bonus: experience
  designing for marketing, sales, or creative platforms Bonus: technical literacy;
  experience with vibe coding and a broad set of AI tools Why Join Mutiny Impact :
  Your work will shape the core creative workflows that define our product strategy
  for the next 18 months. Velocity : We move fast, ship often, and learn directly
  from enterprise customers. Collaboration : Partner with a high-caliber, supportive
  team committed to building the future of enterprise GTM. Growth : Be part of a fast-scaling
  startup where design has a seat at the table and drives product direction. Hiring
  Process Our process typically takes 2–3 weeks end-to-end. Hiring Manager Screen
  (30 min): Chat with our Head of Product about your past work, design approach, and
  what you’re looking for in your next role. Design Exercise: Async Loom walkthrough
  of 2 projects (5–10 min) 1 hour in-person portfolio deep dive with panel Cross-Functional
  Interviews (3 x 30 min): With your PM counterpart, Engineering counterpart and a
  member of our CX team. Executive Interview: A final conversation with Jaleh (CEO
  &amp; Cofounder) before making things official. Our Values 😜 Work should feel like
  play 🏃 Faster always wins 🍯 Stir the pot, regularly 👀 Do the right thing when no
  one’s watching 🛥 All hands on deck 🌎 Live in the world you want to change We are
  committed to empowering individuals of all backgrounds, experiences, and identities
  to reach their potential. We believe in balanced teams, which is why we have maintained
  a 50% male-to-female ratio in our investors and are committed to maintaining diversity
  of gender, lifestyle, ethnicity, and thinking in our team as we scale. Compensation
  We offer a competitive package including base salary, equity, and full benefits.
  The estimated salary range for this role is $180,000–$230,000 , depending on experience.
  Additional Benefits Flexible paid time off Generous parental leave 100% medical,
  dental, and vision coverage Lunch provided daily in our NYC office Office-first
  culture with a vibrant HQ in Flatiron/Union Square H1-B sponsorship available Mutiny
  does not accept agency-submitted candidates for this posting.'
