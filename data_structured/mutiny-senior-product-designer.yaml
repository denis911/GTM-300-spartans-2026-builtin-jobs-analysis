description_html: '<p>Mutiny is building a first-class agentic GTM platform that unifies
  sales and marketing to help companies close enterprise deals faster. Our customers
  are enterprise marketing and sales teams who face a fundamental challenge: <i>what
  works isn’t scalable, and what’s scalable doesn’t work.</i> Mutiny is solving this
  by combining AI agents, creative workflows, and deep integrations to deliver personalized
  marketing and sales experiences at scale.</p><p>Our customers include some of the
  fastest-growing B2B companies—Uber, Amplitude, Qualtrics, and LaunchDarkly. We are
  backed by Sequoia Capital, Tiger Global, Insight Partners, and Y Combinator.</p><h3><strong>About
  the Role</strong></h3><p>We’re looking for a <strong>Senior Product Designer</strong>
  to join our product team in New York. You’ll own the design of our <strong>Campaign
  Builder</strong> and <strong>Creative Agent</strong> experiences—core surfaces that
  let marketers and sellers generate, edit, and launch personalized campaigns across
  accounts.</p><p>This role is central to how Mutiny brings our agentic vision to
  life: helping enterprise teams go from idea to personalized assets with speed, trust,
  and quality. You’ll partner closely with PM and Eng to define the end-to-end experience—from
  conversational AI collaboration to guardrails for brand consistency.</p><p>📍 This
  role is <strong>based in NYC</strong> and requires being <strong>in-person 5 days
  a week</strong>.</p><h3>What You’ll Do</h3><ul><li>Lead design for the <strong>Campaign
  Builder</strong> and <strong>Creative Agent</strong> workflows, balancing AI automation
  with marketer oversight</li><li>Translate complex enterprise user needs (ABM, demand
  gen, sales collaboration) into intuitive flows that feel simple and empowering</li><li>Design
  experiences that scale—from <strong>1:1 account personalization</strong> to <strong>1:many
  campaigns</strong>—while maintaining quality and trust</li><li>Collaborate in person
  with PMs and engineers, and senior leadership team to prototype, validate, and ship
  new features quickly</li><li>Establish design patterns and systems that unify co-pilot
  chat, visual editing, and approval workflows</li><li>Advocate for the end user,
  ensuring every change is checked against the <i>full flow and end-to-end experience</i></li></ul><h3>What
  We’re Looking For</h3><ul><li>5+ years of product design experience, ideally in
  SaaS or enterprise tools</li><li>Strong portfolio demonstrating thoughtful UX for
  complex workflows and creative tools</li><li>Ability to design for AI-driven experiences:
  balancing automation, transparency, and human control</li><li>Comfort working from
  0→1: shaping ambiguous problem spaces into clear, elegant solutions</li><li>Excellent
  collaboration and communication skills—you thrive in cross-functional teams</li><li>Bonus:
  experience designing for marketing, sales, or creative platforms</li><li>Bonus:
  technical literacy; experience with vibe coding and a broad set of AI tools</li></ul><h3>Why
  Join Mutiny</h3><ul><li><strong>Impact</strong>: Your work will shape the core creative
  workflows that define our product strategy for the next 18 months.</li><li><strong>Velocity</strong>:
  We move fast, ship often, and learn directly from enterprise customers.</li><li><strong>Collaboration</strong>:
  Partner with a high-caliber, supportive team committed to building the future of
  enterprise GTM.</li><li><strong>Growth</strong>: Be part of a fast-scaling startup
  where design has a seat at the table and drives product direction.</li></ul><h3>Hiring
  Process</h3><p>Our process typically takes 2–3 weeks end-to-end.</p><ol><li><strong>Hiring
  Manager Screen (30 min):</strong> Chat with our Head of Product about your past
  work, design approach, and what you’re looking for in your next role.</li><li><strong>Design
  Exercise:</strong><ul><li>Async Loom walkthrough of 2 projects (5–10 min)</li><li>1
  hour in-person portfolio deep dive with panel</li></ul></li><li><strong>Cross-Functional
  Interviews (3 x 30 min):</strong> With your PM counterpart, Engineering counterpart
  and a member of our CX team.</li><li><strong>Executive Interview:</strong> A final
  conversation with Jaleh (CEO &amp; Cofounder) before making things official.</li></ol><h3>Our
  Values</h3><p>😜 Work should feel like play</p><p>🏃 Faster always wins</p><p>🍯 Stir
  the pot, regularly</p><p>👀 Do the right thing when no one’s watching</p><p>🛥 All
  hands on deck</p><p>🌎 Live in the world you want to change</p><p>We are committed
  to empowering individuals of all backgrounds, experiences, and identities to reach
  their potential. We believe in balanced teams, which is why we have maintained a
  50% male-to-female ratio in our investors and are committed to maintaining diversity
  of gender, lifestyle, ethnicity, and thinking in our team as we scale.</p><h3>Compensation</h3><p>We
  offer a competitive package including base salary, equity, and full benefits.</p><p>The
  estimated salary range for this role is <strong>$180,000–$230,000</strong>, depending
  on experience.</p><h3>Additional Benefits</h3><ul><li>Flexible paid time off</li><li>Generous
  parental leave</li><li>100% medical, dental, and vision coverage</li><li>Lunch provided
  daily in our NYC office</li><li>Office-first culture with a vibrant HQ in Flatiron/Union
  Square</li><li>H1-B sponsorship available</li></ul><p>Mutiny does not accept agency-submitted
  candidates for this posting.</p>'
