  roadmaps. Common Services &amp; API Strategy Define and own the enterprise strategy
  for common services and APIs that enable access to AI platform data, models, agents,
  and related capabilities. Lead the design, development, and lifecycle management
  of reusable services to ensure consistency, reliability, and scalability across
  the enterprise. Design and deliver solutions with reusability in mind, balancing
  immediate business needs with future use cases by anticipating and forecasting evolving
  requirements. Establish and enforce standards for API design, documentation, versioning,
  security, and performance. Platform Integrations &amp; Digital Enablement Drive
