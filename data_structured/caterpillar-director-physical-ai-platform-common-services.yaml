description_html: <strong>Career Area:</strong><br>Technology, Digital and Data<br><strong>Job
  Description:</strong><br><strong>Your Work Shapes the World at Caterpillar Inc.
  </strong><br>When you join Caterpillar, you're joining a global team who cares not
  just about the work we do - but also about each other. We are the makers, problem
  solvers, and future world builders who are creating stronger, more sustainable communities.
  We don't just talk about progress and innovation here - we make it happen, with
  our customers, where we work and live. Together, we are building a better world,
  so we can all enjoy living in it.<br><strong>Role Summary</strong><br>The Director,
  Physical AI Platform Common Services is responsible for designing, building, and
  scaling machine and jobsite common services that enable seamless integration of
  Caterpillar's Physical AI platform with digital applications. This role leads the
  strategy and execution of shared services, APIs, and platform integrations that
  allow AI models, agents, and simulations to be safely, reliably, and efficiently
  consumed across the company's digital portfolio.<br>This leader partners closely
  with Data, AI, Digital Product, Engineering, Security, and Architecture teams to
  ensure platform capabilities are reusable, governed, and aligned to enterprise standards
  while accelerating business innovation.<br><strong>Platform &amp; AI Integration</strong><br><ul><li>Lead
  the development and integration of common services for Caterpillar's Physical AI
  platform with existing digital platforms.</li><li>Ensure AI models, agents, simulations,
  and insights are accessible through standardized, scalable platform services.</li><li>Partner
  with AI, data engineering, and architecture teams to align platform capabilities
  with enterprise roadmaps.</li></ul><br><strong>Common Services &amp; API Strategy</strong><br><ul><li>Define
  and own the enterprise strategy for common services and APIs that enable access
  to AI platform data, models, agents, and related capabilities. </li><li>Lead the
  design, development, and lifecycle management of reusable services to ensure consistency,
  reliability, and scalability across the enterprise. </li><li>Design and deliver
  solutions with reusability in mind, balancing immediate business needs with future
  use cases by anticipating and forecasting evolving requirements. </li><li>Establish
  and enforce standards for API design, documentation, versioning, security, and performance.</li></ul><br><strong>Platform
  Integrations &amp; Digital Enablement</strong><br><ul><li>Drive platform integrations
  that embed AI and simulation capabilities into applications across the company's
  digital portfolio.</li><li>Enable simulation and advanced analytics integration
  into customer-facing and internal applications.</li><li>Ensure integrations are
  cloud-native, resilient, and aligned with enterprise integration patterns.</li></ul><br><strong>Governance,
  Security &amp; Reliability</strong><br><ul><li>Partner with Security, Risk, and
  Compliance teams to ensure platform services meet enterprise security, privacy,
  and regulatory requirements.</li><li>Establish governance models for service ownership,
  access, and usage across teams.</li><li>Drive operational excellence through monitoring,
  observability, reliability, and performance management.</li></ul><br><strong>Leadership
  &amp; Collaboration</strong><br><ul><li>Lead and develop high-performing engineering
  and platform teams.</li><li>Collaborate with business leaders, product managers,
  and technology partners to translate business needs into scalable platform capabilities.</li><li>Influence
  enterprise architecture and technology strategy related to AI, data, and platform
  services.</li></ul><br><strong>Top candidates will have:</strong><br><ul><li>Bachelor's
  degree in Computer Science, Engineering, or a related field (Master's preferred).</li><li>10+
  years of experience in platform engineering, software engineering, or enterprise
  architecture, including leadership roles.</li><li>Extensive knowledge of API management
  platforms, microservices architectures, and event-driven systems.</li><li>Strong
  understanding of data platforms, AI/ML platforms, digital-twins, simulation and
  cloud-native architectures.</li><li>Experience enabling enterprise AI platforms,
  including model, agent, or simulation consumption at scale.</li><li>Experience integrating
  platforms across a broad digital application ecosystem.</li></ul><br><strong>Key
  Competencies</strong><br><ul><li>Enterprise platform strategy</li><li>AI and data
  platform integration</li><li>API and common services design</li><li>Cloud-native
  and scalable architectures</li><li>Cross-functional leadership and influence</li></ul><br><strong>Additional
  Details:</strong><br><ul><li>This position requires the candidate to be based in
  either Peoria, IL ; Chicago, IL or Dallas, TX</li><li>Domestic relocation assistance
  is available for this position.</li><li>Visa sponsorship is NOT available with this
  position.</li></ul><br>#LI<br><strong>Summary Pay Range:</strong><br>$189,080.00
  - $283,630.00<br>Compensation and benefits offered may vary depending on multiple
  individualized factors, job level, market location, job-related knowledge, skills,
  individual performance and experience. Please note that salary is only one component
  of total compensation at Caterpillar. <br><strong>Benefits:</strong><br>Subject
  to plan eligibility, terms, and guidelines. This is a summary list of benefits.<br><ul><li>Medical,
  dental, and vision benefits*</li><li>Paid time off plan (Vacation, Holidays, Volunteer,
  etc.)*</li><li>401(k) savings plans*</li><li>Health Savings Account (HSA)*</li><li>Flexible
  Spending Accounts (FSAs)*</li><li>Health Lifestyle Programs*</li><li>Employee Assistance
  Program*</li><li>Voluntary Benefits and Employee Discounts*</li><li>Career Development*</li><li>Incentive
  bonus*</li><li>Disability benefits</li><li>Life Insurance</li><li>Parental leave</li><li>Adoption
  benefits</li><li>Tuition Reimbursement</li></ul><br>* These benefits also apply
  to part-time employees<br>This position requires working onsite five days a week.<br>Relocation
  is available for this position.<br>Visa Sponsorship is not available for this position.
  This employer is not currently hiring foreign national applicants that require or
  will require sponsorship tied to a specific employer, such as, H, L, TN, F, J, E,
  O. As a global company, Caterpillar offers many job opportunities outside of the
  U.S which can be found through our employment website at www.caterpillar.com/careers.<br><strong>Posting
  Dates:</strong><br>March 6, 2026 - March 15, 2026<br>Any offer of employment is
  conditioned upon the successful completion of a drug screen. <br>Caterpillar is
  an Equal Opportunity Employer, Including Veterans and Individuals with Disabilities.
  Qualified applicants of any age are encouraged to apply.<br>Not ready to apply?
  Join our Talent Community.
