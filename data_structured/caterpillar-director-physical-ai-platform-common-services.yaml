  across the company''s digital portfolio. Enable simulation and advanced analytics
  integration into customer-facing and internal applications. Ensure integrations
  are cloud-native, resilient, and aligned with enterprise integration patterns. Governance,
  Security &amp; Reliability Partner with Security, Risk, and Compliance teams to
  ensure platform services meet enterprise security, privacy, and regulatory requirements.
  Establish governance models for service ownership, access, and usage across teams.
  Drive operational excellence through monitoring, observability, reliability, and
  performance management. Leadership &amp; Collaboration Lead and develop high-performing
  engineering and platform teams. Collaborate with business leaders, product managers,
  and technology partners to translate business needs into scalable platform capabilities.
  Influence enterprise architecture and technology strategy related to AI, data, and
  platform services. Top candidates will have: Bachelor''s degree in Computer Science,
  Engineering, or a related field (Master''s preferred). 10+ years of experience in
  platform engineering, software engineering, or enterprise architecture, including
  leadership roles. Extensive knowledge of API management platforms, microservices
  architectures, and event-driven systems. Strong understanding of data platforms,
  AI/ML platforms, digital-twins, simulation and cloud-native architectures. Experience
  enabling enterprise AI platforms, including model, agent, or simulation consumption
  at scale. Experience integrating platforms across a broad digital application ecosystem.
  Key Competencies Enterprise platform strategy AI and data platform integration API
  and common services design Cloud-native and scalable architectures Cross-functional
  leadership and influence Additional Details: This position requires the candidate
  to be based in either Peoria, IL ; Chicago, IL or Dallas, TX Domestic relocation
  assistance is available for this position. Visa sponsorship is NOT available with
  this position. #LI Summary Pay Range: $189,080.00 - $283,630.00 Compensation and
  benefits offered may vary depending on multiple individualized factors, job level,
  market location, job-related knowledge, skills, individual performance and experience.
  Please note that salary is only one component of total compensation at Caterpillar.
  Benefits: Subject to plan eligibility, terms, and guidelines. This is a summary
  list of benefits. Medical, dental, and vision benefits* Paid time off plan (Vacation,
  Holidays, Volunteer, etc.)* 401(k) savings plans* Health Savings Account (HSA)*
  Flexible Spending Accounts (FSAs)* Health Lifestyle Programs* Employee Assistance
  Program* Voluntary Benefits and Employee Discounts* Career Development* Incentive
  bonus* Disability benefits Life Insurance Parental leave Adoption benefits Tuition
  Reimbursement * These benefits also apply to part-time employees This position requires
  working onsite five days a week. Relocation is available for this position. Visa
  Sponsorship is not available for this position. This employer is not currently hiring
  foreign national applicants that require or will require sponsorship tied to a specific
