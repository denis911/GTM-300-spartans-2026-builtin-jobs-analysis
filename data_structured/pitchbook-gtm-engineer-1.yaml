title: GTM Engineer
company: PitchBook
category: Fintech
location: Seattle, Washington, USA
date_posted: '2026-03-08'
description_html: '<p><p><span>At PitchBook, a Morningstar company, we are always
  looking forward. We continue to innovate, evolve, and invest in ourselves to bring
  out the best in everyone. We’re deeply collaborative and thrive on the excitement,
  energy, and fun that reverberates throughout the company.&nbsp;</span></p><p><span>Our
  extensive learning programs and mentorship opportunities help us create a culture
  of curiosity that pushes us to always find new solutions and better ways of doing
  things. The combination of a rapidly evolving industry and our high ambitions means
  there’s going to be some ambiguity along the way, but we excel when we challenge
  ourselves. We’re willing to take risks, fail fast, and do it all over again in the
  pursuit of excellence. </span></p><p><span>If you have a good attitude and are willing
  to roll up your sleeves to get things done, PitchBook is the place for you.&nbsp;</span></p></p><p><span><strong>About
  the Role:</strong></span></p><p><span>Lumonic, a subsidiary of PitchBook, is a private
  credit management platform founded and designed to automate reporting and compliance
  for private credit lenders. Its proprietary platform streamlines borrower financial
  data collection and verification, enabling investors to monitor compliance, covenant
  adherence, and financial health across their lending portfolios in real-time.</span></p><p><span>Lumonic’s
  Growth Marketing Lead builds and scales Lumonic’s revenue engine. This role owns
  pipeline creation end‑to‑end—designing and optimizing automated, multi‑channel programs
  that drive predictable growth from first touch to conversion.</span></p><p><span>This
  is a hands‑on role combining growth strategy, technical execution, and experimentation.
  It will own the full demand stack—outbound, paid, ABM, content, events, data, and
  automation—while working closely with Lumonic founders and PitchBook senior leaders.
  The focus: rapid experimentation, automation, and ruthless prioritization to drive
  outsized impact with limited resources.</span></p><p><span><strong>Primary Job Responsibilities:</strong></span></p><ul><li><span>Design
  and implement automated workflows (Clay, Apollo, Smartlead, etc.) that generate
  qualified pipeline at scale—outbound sequences, inbound routing, signal-based campaigns,
  website conversion, and more</span></li><li><span>Design and execute integrated
  campaigns across outbound, paid channels, and content to generate qualified demos.
  Tap into PitchBook''s resources—SEO, social media, PR, events, and cross-sell initiatives—to
  maximize conversion efficiency and lower customer acquisition costs</span></li><li><span>Own
  critical KPIs and establish comprehensive tracking systems to monitor performance
  and inform strategic decisions</span></li><li><span>Launch rapid-fire experiments
  across channels with disciplined analysis. Validate assumptions quickly, kill underperformers
  fast, and scale proven tactics aggressively</span></li><li><span>Create data enrichment
  workflows, predictive lead scoring, and intelligent CRM automation that transform
  prospects into pipeline</span></li><li><span>Develop content and positioning that
  speaks directly to private credit and private equity decision-makers, delivering
  value and driving high-intent engagement</span></li><li><span>Address strategic
  growth problems including cross-sell channel optimization and seller enablement,
  implementing new innovative customer acquisition strategies etc.</span></li><li><span>Support
  the vision and values of the company through role modeling and encouraging desired
  behaviors&nbsp;</span></li><li><span>Participate in various company initiatives
  and projects as requested&nbsp;</span></li></ul><p><span><strong>Skills and Qualifications:</strong></span></p><ul><li><span>Bachelor’s
  degree</span></li><li><span>8+ years in B2B demand generation, growth, or RevOps,
  ideally at a high-growth startup</span></li><li><span>Experience building systems
  that drive pipeline</span></li><li><span>Experience with Clay, Apollo, SmartLead,
  Octave, or similar. Bonus points for SQL, Python, or scripting experience</span></li><li><span>Ability
  to work through complex distribution challenges focused on designing repeatable,
  scalable systems rather than pursuing short-term gains</span></li><li><span>Self-motivated
  and goal-oriented, with a collaborative mindset and ability to thrive in team environments</span></li><li><span>Operate
  with a strong sense of urgency and consistently delivers results under pressure</span></li><li><span>Highly
  curious and solutions-focused, with a positive and resilient attitude</span></li><li><span>High
  emotional intelligence and the ability to build trust across diverse teams and stakeholders</span></li><li><span>Outstanding
  verbal and written communication skills, with the ability to influence at all levels</span></li><li><span>Proficiency
  in Microsoft Office Suite, including Outlook, Word, and Excel, with a demonstrated
  ability to quickly learn new systems and software</span></li><li><span>Must be authorized
  to work in the United States without the need for visa sponsorship now or in the
  future</span></li></ul><p><span><strong>Benefits + Compensation at PitchBook:</strong></span></p><p><span>Physical
  Health&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;</span></p><ul><li><span>Comprehensive
  health benefits</span></li><li><span>Additional medical wellness incentives&nbsp;</span></li><li><span>STD,
  LTD, AD&amp;D, and life insurance</span></li></ul><p><span>Emotional Health&nbsp;</span></p><ul><li><span>Paid
  sabbatical program after four years</span></li><li><span>Paid family and paternity
  leave&nbsp;</span></li><li><span>Annual educational stipend</span></li><li><span>Ability
  to apply for tuition reimbursement</span></li><li><span>CFA exam stipend&nbsp;</span></li><li><span>Robust
  training programs on industry and soft skills&nbsp;</span></li><li><span>Employee
  assistance program</span></li><li><span>Generous allotment of vacation days, sick
  days, and volunteer days</span></li></ul><p><span>Social Health&nbsp;</span></p><ul><li><span>Matching
  gifts program</span></li><li><span>Employee resource groups</span></li><li><span>Subsidized
  emergency childcare&nbsp;&nbsp;</span></li><li><span>Dependent Care FSA</span></li><li><span>Company-wide
  events</span></li><li><span>Employee referral bonus program&nbsp;&nbsp;</span></li><li><span>Quarterly
  team building events</span></li></ul><p><span>Financial Health&nbsp;</span></p><ul><li><span>401k
  match</span></li><li><span>Shared ownership employee stock program&nbsp;</span></li><li><span>Monthly
  transportation stipend</span></li></ul><p><span><em>*Please be aware the above PitchBook
  benefit and perk offerings are subject to corresponding plan and policy documents
  and may change during the course of your employment.</em></span><span><em>&nbsp;</em></span></p><p><span>Compensation</span></p><ul><li><span>Annual
  base salary: $140,000-$160,000</span></li><li><span>Target annual bonus percentage:
  10%</span></li></ul><p><span><strong>Working Conditions:</strong></span></p><p><span>At
  the heart of our company is a belief in the power of in-person collaboration. Being
  together in the office fuels our creativity, strengthens our connections, and drives
  the innovation that sets us apart. Our culture is built on spontaneous moments—those
  hallway conversations, whiteboard brainstorms, and shared celebrations in each of
  our global offices—that simply can’t be replicated remotely. This role is expected
  to be in the office 5 days a week.</span></p><p><span>The job conditions for this
  position are in a standard office setting. Employees in this position use PC and
  phone on an on-going basis throughout the day. Limited corporate travel may be required
  to remote offices or other business meetings and events.</span></p><p><span>We are
  excited to get to know you and your background. Concerned that you might not meet
  every requirement? We encourage you to still apply as you might be the right candidate
  for the role or other roles at PitchBook.</span></p><p><span>#LI-KL1</span></p><p><span>#LI-Onsite</span></p>'
