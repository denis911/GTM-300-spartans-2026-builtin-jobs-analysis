description_html: "<p><strong>About Us</strong></p><p></p><p>Perk (formerly TravelPerk)\
  \ is the intelligent platform for travel and spend management. Built to tackle the\
  \ time-consuming, manual work that gets in the way of real work, our tools automate\
  \ everything from travel bookings to expenses, invoice processing, and more. By\
  \ eliminating this shadow work that wastes hours, erodes morale, and saps innovation,\
  \ we’re on a mission to power real work, with real impact.</p><p></p><p>We’re trusted\
  \ by more than 10,000 companies worldwide, including Wise, On Running, Breitling,\
  \ and Fabletics, and we’re tackling the 7 hours of lost productivity per employee\
  \ each week, <u>a $1.7 trillion problem</u>.</p><p></p><p>Founded in 2015, Perk\
  \ has grown into a global company of more than 1,800 people across 12 offices globally,\
  \ with headquarters in London and Boston. We combine innovation, control, and simplicity\
  \ to transform how businesses work and how people feel at work.</p><p></p><p>At\
  \ Perk, we’re driven by our values, like being an owner, delivering a 7-star experience,\
  \ and working as one team. We value curiosity, purpose, and mindset, not just knowledge,\
  \ to unlock the power in your potential. Our talent team brings together leading\
  \ minds from the travel and SaaS industries, representing over 70 countries. If\
  \ you’re excited about having a real impact and shaping how millions of people experience\
  \ work, we’d love you on the team.</p><p></p><p>Visit <u>www.perk.com</u> to learn\
  \ more.</p><p><p></p></p><p><strong>The Role:</strong></p><p>At Perk, we are actively\
  \ building a modern, scalable outbound and pipeline generation motion in close partnership\
  \ with Sales and Marketing leadership.</p><p>The Revenue Systems and GTM Engineering\
  \ function is driving this transformation by combining data, systems, and process\
  \ enablement to help revenue teams perform at their best. As AI and automation continue\
  \ to reshape B2B sales, our focus is on applying these capabilities pragmatically\
  \ - enhancing human execution with reliable systems, high-quality data, and repeatable\
  \ workflows.</p><p>The NAM GTM Engineer is a hands-on technical and operational\
  \ role within the Revenue Systems team. This position provides <strong>local execution\
  \ and systems support</strong> for NAM Sales teams, ensuring outbound workflows,\
  \ account and contact data, and sales productivity tools operate reliably during\
  \ core business hours. The role reports to the Senior Manager, Revenue Systems Team\
  \ and works closely with the central GTM Engineering team, Revenue Operations, and\
  \ Sales leadership.</p><p>With significant expectations for pipeline generation\
  \ and scale, this role offers the opportunity to have a direct, visible impact on\
  \ how Perk builds, operates, and continuously improves its commercial engine - while\
  \ staying closely aligned with global standards and strategy.<strong>What </strong></p><p></p><p><strong>You\
  \ Will Do:</strong></p><p></p><p><strong>GTM Systems &amp; Enablement</strong></p><ul><li><p>Support,\
  \ configure, and maintain GTM systems and workflows, including Salesforce, Outreach,\
  \ Gong, and Clay.</p></li><li><p>Ensure reliable system performance during NAM business\
  \ hours to support high-volume outbound activity and pipeline generation.</p></li></ul><p><strong>Data\
  \ Quality &amp; Enrichment Support</strong></p><ul><li><p>Maintain accurate and\
  \ complete account and contact data across Salesforce and connected GTM tools.</p></li><li><p>Support\
  \ TAM sourcing, enrichment, and hygiene workflows to ensure sales teams can operate\
  \ at peak efficiency.</p></li></ul><p><strong>Sales Productivity &amp; Automation</strong></p><ul><li><p>Partner\
  \ with NAM Sales teams to achieve aggressive productivity targets, including high-volume\
  \ dialing and automated outbound campaigns.</p></li><li><p>Rapidly troubleshoot\
  \ system or workflow issues to prevent lost selling time.</p></li></ul><p><strong>Operational\
  \ Support &amp; Iteration</strong></p><ul><li><p>Provide on-the-ground systems support\
  \ to resolve issues without waiting for Europe-based teams.</p></li><li><p>Enable\
  \ faster iteration of GTM processes while maintaining alignment with global standards.</p></li></ul><p><strong>Cross-Functional\
  \ Collaboration</strong></p><ul><li><p>Serve as the primary NAM contact for Revenue\
  \ Systems and GTM Engineering support.</p></li><li><p>Coordinate with central teams\
  \ to share learnings, improvements, and best practices globally.</p></li></ul><p><strong>Roadmap\
  \ Execution</strong></p><ul><li><p>Execute against the Revenue Systems and GTM Engineering\
  \ roadmap in partnership with the Senior Manager of Revenue Systems Team and central\
  \ GTM Engineer.</p></li><li><p>Provide NAM-specific feedback to inform prioritization,\
  \ operational improvements, and continuous enhancement of GTM systems.<br></p></li></ul><p><strong>What\
  \ You Will Need</strong></p><ul><li><p>5+ years in Revenue Operations, Sales Operations,\
  \ or related technical roles in a B2B SaaS environment.</p></li><li><p>Hands-on\
  \ experience supporting GTM workflows, CRM tools, and revenue systems (Salesforce\
  \ preferred).</p></li><li><p>Experience with sales engagement platforms (Outreach,\
  \ SalesLoft) and other revenue tools (Gong, Clay, or similar).</p></li><li><p>Proven\
  \ ability to troubleshoot systems, automate workflows, and maintain high data quality\
  \ to support high-volume sales activity.</p></li><li><p>Strong collaboration and\
  \ communication skills, able to translate technical concepts into actionable business\
  \ solutions.</p></li><li><p>Comfortable managing competing priorities in a fast-paced\
  \ environment and supporting ambitious productivity targets.</p></li></ul><p></p><p><strong>Benefits:</strong></p><ul><li><p>Receive\
  \ competitive compensation and equity ownership in Perk</p></li><li><p>Rest and\
  \ recharge with our generous allocation of 20 vacation days and 12 public holidays</p></li><li><p>Enjoy\
  \ the flexibility of three medical plans to choose from, with company contributions\
  \ and an HSA when enrolling in an HDHP medical plan</p></li><li><p>Take control\
  \ of your physical health with additional comprehensive benefit plans, covering\
  \ dental, vision and Wellhub’s gym subscription from your start date</p></li><li><p>Rest\
  \ assured that you’re covered by life and disability policies from your start date,\
  \ with options to add extra protection through voluntary buy-up plans</p></li><li><p>Plan\
  \ for your future with our 401(k) plan with company matching contributions</p></li><li><p>Care\
  \ for your furry friends through partner discounts on pet insurance</p></li><li><p>Join\
  \ our unforgettable Perk events, including our spectacular annual summer party</p></li><li><p>Always\
  \ feel supported with Spring Health, our market-leading wellbeing partner, providing\
  \ fast, comprehensive access to 12x therapy and 12x coaching sessions for you and\
  \ your loved ones</p></li><li><p>Focus on your family with 12-16 weeks’ paid parental\
  \ leave</p></li><li><p>Contribute to your community with 16 paid hours per year\
  \ to spend volunteering for your dearest charitable causes</p></li><li><p>Broaden\
  \ your horizons with up to 20 \"Work from Anywhere\" days per year</p></li><li><p>Follow\
  \ your passions and take a four-week, fully paid sabbatical once you reach 5 years</p></li><li><p>Let\
  \ us help you move to one of our hubs with relocation support</p></li></ul><p></p><p><strong>Compensation:</strong></p><p>Compensation\
  \ for this role is a combination of salary and stock options. The anticipated base\
  \ salary range is $136,000 - $160,000 per year. Actual compensation may vary based\
  \ on specific qualifications, experience, and other job-related factors \t</p><p><strong>How\
  \ We Work</strong></p><p>At Perk, we take an IRL-first approach to work, where our\
  \ team works together in-person 3 days a week. As such, this role requires you to\
  \ be based within commuting distance of our hubs. We fundamentally believe in the\
  \ value of meeting in real life to improve connectivity, productivity, creativity\
  \ and ultimately making us a great place to work.</p><p>For certain roles, we can\
  \ help with relocation from anywhere in the world, English is the official language\
  \ at the office. Please submit your resume in English if you choose to apply. Do\
  \ not forget to submit an updated portfolio and/or resume.</p><p>Perk is a global\
  \ company with a diverse customer base, and we want to make sure the people behind\
  \ our product reflect that. We’re an equal opportunity employer, which means you’re\
  \ welcome at Perk regardless of how you look, where you’re from, or anything else\
  \ that makes you, well, you.</p><p></p><p><strong>Protect Yourself from Recruitment\
  \ Scams</strong></p><p>All official communication from Perk will always come from\
  \ email addresses ending in @perk.com or @externalperk.com, our verified social\
  \ media channels, or recruiters listed on our official LinkedIn page. We will never\
  \ ask you to pay for equipment, training, or fees, request sensitive personal information\
  \ such as bank details early in the process, or communicate through unofficial apps\
  \ like WhatsApp, Telegram, or Signal. If you receive a message claiming to be from\
  \ Perk that seems suspicious, please do not respond. Forward it to <u>security [at]\
  \ perk .com</u>, and we will confirm whether it is legitimate.</p>"
description_text: 'About Us Perk (formerly TravelPerk) is the intelligent platform
  for travel and spend management. Built to tackle the time-consuming, manual work
  that gets in the way of real work, our tools automate everything from travel bookings
  to expenses, invoice processing, and more. By eliminating this shadow work that
  wastes hours, erodes morale, and saps innovation, we’re on a mission to power real
  work, with real impact. We’re trusted by more than 10,000 companies worldwide, including
  Wise, On Running, Breitling, and Fabletics, and we’re tackling the 7 hours of lost
  productivity per employee each week, a $1.7 trillion problem . Founded in 2015,
  Perk has grown into a global company of more than 1,800 people across 12 offices
  globally, with headquarters in London and Boston. We combine innovation, control,
  and simplicity to transform how businesses work and how people feel at work. At
  Perk, we’re driven by our values, like being an owner, delivering a 7-star experience,
  and working as one team. We value curiosity, purpose, and mindset, not just knowledge,
  to unlock the power in your potential. Our talent team brings together leading minds
  from the travel and SaaS industries, representing over 70 countries. If you’re excited
  about having a real impact and shaping how millions of people experience work, we’d
  love you on the team. Visit www.perk.com to learn more. The Role: At Perk, we are
  actively building a modern, scalable outbound and pipeline generation motion in
  close partnership with Sales and Marketing leadership. The Revenue Systems and GTM
  Engineering function is driving this transformation by combining data, systems,
  and process enablement to help revenue teams perform at their best. As AI and automation
  continue to reshape B2B sales, our focus is on applying these capabilities pragmatically
  - enhancing human execution with reliable systems, high-quality data, and repeatable
  workflows. The NAM GTM Engineer is a hands-on technical and operational role within
  the Revenue Systems team. This position provides local execution and systems support
  for NAM Sales teams, ensuring outbound workflows, account and contact data, and
  sales productivity tools operate reliably during core business hours. The role reports
  to the Senior Manager, Revenue Systems Team and works closely with the central GTM
  Engineering team, Revenue Operations, and Sales leadership. With significant expectations
  for pipeline generation and scale, this role offers the opportunity to have a direct,
  visible impact on how Perk builds, operates, and continuously improves its commercial
  engine - while staying closely aligned with global standards and strategy. What
  You Will Do: GTM Systems &amp; Enablement Support, configure, and maintain GTM systems
  and workflows, including Salesforce, Outreach, Gong, and Clay. Ensure reliable system
  performance during NAM business hours to support high-volume outbound activity and
  pipeline generation. Data Quality &amp; Enrichment Support Maintain accurate and
  complete account and contact data across Salesforce and connected GTM tools. Support
  TAM sourcing, enrichment, and hygiene workflows to ensure sales teams can operate
  at peak efficiency. Sales Productivity &amp; Automation Partner with NAM Sales teams
  to achieve aggressive productivity targets, including high-volume dialing and automated
  outbound campaigns. Rapidly troubleshoot system or workflow issues to prevent lost
  selling time. Operational Support &amp; Iteration Provide on-the-ground systems
  support to resolve issues without waiting for Europe-based teams. Enable faster
  iteration of GTM processes while maintaining alignment with global standards. Cross-Functional
  Collaboration Serve as the primary NAM contact for Revenue Systems and GTM Engineering
  support. Coordinate with central teams to share learnings, improvements, and best
  practices globally. Roadmap Execution Execute against the Revenue Systems and GTM
  Engineering roadmap in partnership with the Senior Manager of Revenue Systems Team
  and central GTM Engineer. Provide NAM-specific feedback to inform prioritization,
  operational improvements, and continuous enhancement of GTM systems. What You Will
  Need 5+ years in Revenue Operations, Sales Operations, or related technical roles
  in a B2B SaaS environment. Hands-on experience supporting GTM workflows, CRM tools,
  and revenue systems (Salesforce preferred). Experience with sales engagement platforms
  (Outreach, SalesLoft) and other revenue tools (Gong, Clay, or similar). Proven ability
  to troubleshoot systems, automate workflows, and maintain high data quality to support
  high-volume sales activity. Strong collaboration and communication skills, able
  to translate technical concepts into actionable business solutions. Comfortable
  managing competing priorities in a fast-paced environment and supporting ambitious
  productivity targets. Benefits: Receive competitive compensation and equity ownership
  in Perk Rest and recharge with our generous allocation of 20 vacation days and 12
  public holidays Enjoy the flexibility of three medical plans to choose from, with
  company contributions and an HSA when enrolling in an HDHP medical plan Take control
  of your physical health with additional comprehensive benefit plans, covering dental,
  vision and Wellhub’s gym subscription from your start date Rest assured that you’re
  covered by life and disability policies from your start date, with options to add
  extra protection through voluntary buy-up plans Plan for your future with our 401(k)
  plan with company matching contributions Care for your furry friends through partner
  discounts on pet insurance Join our unforgettable Perk events, including our spectacular
  annual summer party Always feel supported with Spring Health, our market-leading
  wellbeing partner, providing fast, comprehensive access to 12x therapy and 12x coaching
  sessions for you and your loved ones Focus on your family with 12-16 weeks’ paid
  parental leave Contribute to your community with 16 paid hours per year to spend
  volunteering for your dearest charitable causes Broaden your horizons with up to
  20 "Work from Anywhere" days per year Follow your passions and take a four-week,
  fully paid sabbatical once you reach 5 years Let us help you move to one of our
  hubs with relocation support Compensation: Compensation for this role is a combination
  of salary and stock options. The anticipated base salary range is $136,000 - $160,000
  per year. Actual compensation may vary based on specific qualifications, experience,
  and other job-related factors How We Work At Perk, we take an IRL-first approach
  to work, where our team works together in-person 3 days a week. As such, this role
  requires you to be based within commuting distance of our hubs. We fundamentally
  believe in the value of meeting in real life to improve connectivity, productivity,
  creativity and ultimately making us a great place to work. For certain roles, we
  can help with relocation from anywhere in the world, English is the official language
  at the office. Please submit your resume in English if you choose to apply. Do not
  forget to submit an updated portfolio and/or resume. Perk is a global company with
  a diverse customer base, and we want to make sure the people behind our product
  reflect that. We’re an equal opportunity employer, which means you’re welcome at
  Perk regardless of how you look, where you’re from, or anything else that makes
  you, well, you. Protect Yourself from Recruitment Scams All official communication
  from Perk will always come from email addresses ending in @perk.com or @externalperk.com,
  our verified social media channels, or recruiters listed on our official LinkedIn
  page. We will never ask you to pay for equipment, training, or fees, request sensitive
  personal information such as bank details early in the process, or communicate through
  unofficial apps like WhatsApp, Telegram, or Signal. If you receive a message claiming
  to be from Perk that seems suspicious, please do not respond. Forward it to security
  [at] perk .com , and we will confirm whether it is legitimate.'
