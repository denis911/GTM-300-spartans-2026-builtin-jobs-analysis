description_html: '<p><span style="background-color: rgba(0, 0, 0, 0); color: rgba(0,
  0, 0, 1)">Tracebit is helping some of the world’s best security teams at Snyk, Docker,
  Riot Games and many more to ‘assume breach’ at scale. Tracebit detects intrusions
  in cloud environments using canaries - decoy assets deployed to deceive attackers.</span></p><p><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">We''re at a
  massive inflection point and there has never been a more exciting time to join us:</span></p><ul><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">We are backed
  by some of the very best investors (Accel, Tapestry and more).</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">We are growing
  very quickly (we doubled ARR last quarter and will triple this year), having recently
  closed some incredible customers that we can’t disclose publicly!</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">We are one of
  the most exciting startups to be part of in the UK, have seen some great feedback
  from the market and are ready for explosive growth.</span></li><li><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Regularly featured on top startup lists
  from industry veterans… Creandum’s </span><span style="background-color: rgba(0,
  0, 0, 0); color: rgba(17, 85, 204, 1)"><u>Euro Seed top 50 list</u></span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">, Sifted’s </span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>2025
  London Startups To Watch</u></span><span style="background-color: rgba(0, 0, 0,
  0); color: rgba(0, 0, 0, 1)">, Notions </span><span style="background-color: rgba(0,
  0, 0, 0); color: rgba(17, 85, 204, 1)"><u>Cloud Top 100</u></span><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">, AlbionVC’s </span><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>NHI Breakdown</u></span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">, MMCs </span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>Proactive
  Security Analysis</u></span><span style="background-color: rgba(0, 0, 0, 0); color:
  rgba(0, 0, 0, 1)">, Accel’s </span><span style="background-color: rgba(0, 0, 0,
  0); color: rgba(17, 85, 204, 1)"><u>Euroscape Top Startups 2024</u></span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">, etc.</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>Our research</u></span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)"> has recently
  helped fix a P1 security flaw in Google’s Gemini CLI.</span></li><li><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">We''re Seed stage, and have grown the
  company from 2 to 14 people in 18 months,, with plans to triple this in the coming
  year.</span></li></ul><p><span style="background-color: rgba(0, 0, 0, 0); color:
  rgba(0, 0, 0, 1)">We have strong traction in the US (80% of our customer base and
  forward-looking business). We''ve done this with a small team based in London. We''ve
  hit product-market fit and it''s time to accelerate our growth by building our US
  sales team in New York.</span></p><p><span style="background-color: rgba(0, 0, 0,
  0); color: rgba(0, 0, 0, 1)">Therefore, we are searching for a highly driven, emotionally
  intelligent and energetic individual to join Tracebit to help build our GTM practice
  from the ground up.</span></p><p><span style="background-color: rgba(0, 0, 0, 0);
  color: rgba(0, 0, 0, 1)">You will report to our Founding </span><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>Sales Lead</u></span><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">, who previously spent 5 years at Snyk
  as an early employee during a hyper-growth period from $18M to $300M ARR and 200
  to 1,200 employees. You will also work closely with Tracebit''s Co-Founders, </span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>CEO</u></span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)"> and </span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(17, 85, 204, 1)"><u>CTO</u></span><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">, who were both
  early employees at Tessian which was sold to Proofpoint in 2023.</span></p><p><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">This is a unique
  opportunity to join an early-stage, high-growth cybersecurity company, where you''ll
  have real influence on our business growth with the opportunity to expedite your
  career as Tracebit grows.</span></p><h3><span style="background-color: rgba(0, 0,
  0, 0); color: rgba(0, 0, 0, 1)">About The Role:</span></h3><p><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">As our first US-based Account Executives,
  you''ll be instrumental in building our US GTM engine. You''ll work closely with
  our London-based Founding Sales Lead to establish repeatable sales processes while
  closing your own deals.</span></p><p><span style="background-color: rgba(0, 0, 0,
  0); color: rgba(0, 0, 0, 1)">What you''ll do:</span></p><ul><li><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Close deals with some of the most exciting
  logos globally. You will own the full sales cycle from discovery through to contract
  signature on key deals into the $50-100k + ARR range, working across SMB and Mid-Market
  companies.</span></li><li><span style="background-color: rgba(0, 0, 0, 0); color:
  rgba(0, 0, 0, 1)">Work both inbound and outbound opportunities. Convert warm inbound
  leads from our growing user base and product-led motion. Run targeted outbound campaigns
  into accounts that match our ICP. You’ll own your own business.</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Help build our
  sales playbook. We have GTM motions in place, but we want you to help re-write them.
  You will help to design a sales function - refining our discovery questions, demo
  flow, objection handling, and closing tactics.</span></li><li><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Partner with the product and customer
  success teams. Provide feedback on what prospects share and what would accelerate
  deals. You’ll learn a lot about the product and help shape our roadmap based on
  market feedback.</span></li><li><span style="background-color: rgba(0, 0, 0, 0);
  color: rgba(0, 0, 0, 1)">Represent Tracebit at industry events. Attend key cybersecurity
  conferences (Black Hat, RSA, etc.) to build pipeline and strengthen relationships
  with prospects.</span></li><li><span style="background-color: rgba(0, 0, 0, 0);
  color: rgba(0, 0, 0, 1)">Operate with high velocity. You''ll be managing multiple
  deals simultaneously, moving fast while maintaining deal quality. Expect to run
  many active opportunities.</span></li></ul><p><span style="background-color: rgba(0,
  0, 0, 0); color: rgba(0, 0, 0, 1)">This is a hands-on closing role in a fast-moving
  startup. You''ll have autonomy to experiment, direct access to founders, and the
  opportunity to grow at a rapid place.&nbsp;</span></p><h3><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Who we''re looking for:</span></h3><ul><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">You''ve sold
  technical products before. 3-5 years selling B2B SaaS, ideally in cybersecurity
  or developer tooling. You''ve closed deals in the $50K-100K+ range and know how
  to navigate technical buyers. You don''t need to be an engineer, but you can hold
  your own in conversations with CISOs and security engineers.</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">You can own
  the full sales cycle. You''ve run deals from the first call to the signed contract.
  You know how to qualify, demo, handle objections, navigate procurement, and close.
  You''re comfortable with both 30-day velocity deals and longer complex sales cycles.</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">You''re a builder,
  not just an executor. You''ve ideally been an early sales hire before (or want to
  be). You''re excited about figuring things out as you go rather than following a
  prescriptive playbook. You''ll help refine our pitch, messaging, and sales process
  based on what you''re learning in the field.</span></li><li><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">You''re hungry and self-sufficient. You
  don''t wait for leads to be handed to you. You''re comfortable building your own
  pipeline, working inbound opportunities, and finding creative ways to get in front
  of the right people.</span></li><li><span style="background-color: rgba(0, 0, 0,
  0); color: rgba(0, 0, 0, 1)">You thrive in startup environments. You''re energized
  by fast iteration, ambiguity, and working closely with founders and product teams.
  You''ve experienced the pace of an early-stage company and know it''s not for everyone.</span></li><li><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">The right characteristics.
  We think the Founding Account Executives at Tracebit will succeed by being highly
  emotionally intelligent, have great hunger and grit, demonstrate attention to detail
  and are hard-working, entrepreneurial individuals.</span></li><li><span style="background-color:
  rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Bonus points if: You were among the first
  AEs at a startup and/or you''ve sold into security or technical teams.</span></li></ul><p><br>&nbsp;</p><h3><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">FAQs</span></h3><p><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Where is the
  office?</span></p><p><span style="background-color: rgba(0, 0, 0, 0); color: rgba(0,
  0, 0, 1)">We''re setting up our New York office in Manhattan. You''ll work closely
  with our London-based team and eventually other US-based team members as we grow.</span></p><p><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Are you doing
  hybrid/remote?</span></p><p><span style="background-color: rgba(0, 0, 0, 0); color:
  rgba(0, 0, 0, 1)">Short answer: No, but flexible on a day-to-day basis.</span></p><p><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Long answer:
  We are building the company on a foundation of office-based culture. We think we''ll
  build the best company at the fastest pace while having a lot of fun by physically
  working together 5 days a week. On a case-by-case basis (leaving early for a holiday,
  staying home for a builder, working remote for a few days to visit family, etc.)
  we''re very reasonable and flexible. We respect that this is not for everyone.</span></p><p><span
  style="background-color: rgba(0, 0, 0, 0); color: rgba(0, 0, 0, 1)">Can you sponsor
  visas?</span></p><p><span style="background-color: rgba(0, 0, 0, 0); color: rgba(0,
  0, 0, 1)">We are not able to sponsor visas for this role.</span></p>'
description_text: 'Tracebit is helping some of the world’s best security teams at
  Snyk, Docker, Riot Games and many more to ‘assume breach’ at scale. Tracebit detects
  intrusions in cloud environments using canaries - decoy assets deployed to deceive
  attackers. We''re at a massive inflection point and there has never been a more
  exciting time to join us: We are backed by some of the very best investors (Accel,
  Tapestry and more). We are growing very quickly (we doubled ARR last quarter and
  will triple this year), having recently closed some incredible customers that we
  can’t disclose publicly! We are one of the most exciting startups to be part of
  in the UK, have seen some great feedback from the market and are ready for explosive
  growth. Regularly featured on top startup lists from industry veterans… Creandum’s
  Euro Seed top 50 list , Sifted’s 2025 London Startups To Watch , Notions Cloud Top
  100 , AlbionVC’s NHI Breakdown , MMCs Proactive Security Analysis , Accel’s Euroscape
  Top Startups 2024 , etc. Our research has recently helped fix a P1 security flaw
  in Google’s Gemini CLI. We''re Seed stage, and have grown the company from 2 to
  14 people in 18 months,, with plans to triple this in the coming year. We have strong
  traction in the US (80% of our customer base and forward-looking business). We''ve
  done this with a small team based in London. We''ve hit product-market fit and it''s
  time to accelerate our growth by building our US sales team in New York. Therefore,
  we are searching for a highly driven, emotionally intelligent and energetic individual
  to join Tracebit to help build our GTM practice from the ground up. You will report
  to our Founding Sales Lead , who previously spent 5 years at Snyk as an early employee
  during a hyper-growth period from $18M to $300M ARR and 200 to 1,200 employees.
  You will also work closely with Tracebit''s Co-Founders, CEO and CTO , who were
  both early employees at Tessian which was sold to Proofpoint in 2023. This is a
  unique opportunity to join an early-stage, high-growth cybersecurity company, where
  you''ll have real influence on our business growth with the opportunity to expedite
  your career as Tracebit grows. About The Role: As our first US-based Account Executives,
  you''ll be instrumental in building our US GTM engine. You''ll work closely with
  our London-based Founding Sales Lead to establish repeatable sales processes while
  closing your own deals. What you''ll do: Close deals with some of the most exciting
  logos globally. You will own the full sales cycle from discovery through to contract
  signature on key deals into the $50-100k + ARR range, working across SMB and Mid-Market
  companies. Work both inbound and outbound opportunities. Convert warm inbound leads
  from our growing user base and product-led motion. Run targeted outbound campaigns
  into accounts that match our ICP. You’ll own your own business. Help build our sales
  playbook. We have GTM motions in place, but we want you to help re-write them. You
  will help to design a sales function - refining our discovery questions, demo flow,
  objection handling, and closing tactics. Partner with the product and customer success
  teams. Provide feedback on what prospects share and what would accelerate deals.
  You’ll learn a lot about the product and help shape our roadmap based on market
  feedback. Represent Tracebit at industry events. Attend key cybersecurity conferences
  (Black Hat, RSA, etc.) to build pipeline and strengthen relationships with prospects.
  Operate with high velocity. You''ll be managing multiple deals simultaneously, moving
  fast while maintaining deal quality. Expect to run many active opportunities. This
  is a hands-on closing role in a fast-moving startup. You''ll have autonomy to experiment,
  direct access to founders, and the opportunity to grow at a rapid place.&nbsp; Who
  we''re looking for: You''ve sold technical products before. 3-5 years selling B2B
  SaaS, ideally in cybersecurity or developer tooling. You''ve closed deals in the
  $50K-100K+ range and know how to navigate technical buyers. You don''t need to be
  an engineer, but you can hold your own in conversations with CISOs and security
  engineers. You can own the full sales cycle. You''ve run deals from the first call
  to the signed contract. You know how to qualify, demo, handle objections, navigate
  procurement, and close. You''re comfortable with both 30-day velocity deals and
  longer complex sales cycles. You''re a builder, not just an executor. You''ve ideally
  been an early sales hire before (or want to be). You''re excited about figuring
  things out as you go rather than following a prescriptive playbook. You''ll help
  refine our pitch, messaging, and sales process based on what you''re learning in
  the field. You''re hungry and self-sufficient. You don''t wait for leads to be handed
  to you. You''re comfortable building your own pipeline, working inbound opportunities,
  and finding creative ways to get in front of the right people. You thrive in startup
  environments. You''re energized by fast iteration, ambiguity, and working closely
  with founders and product teams. You''ve experienced the pace of an early-stage
  company and know it''s not for everyone. The right characteristics. We think the
  Founding Account Executives at Tracebit will succeed by being highly emotionally
  intelligent, have great hunger and grit, demonstrate attention to detail and are
  hard-working, entrepreneurial individuals. Bonus points if: You were among the first
  AEs at a startup and/or you''ve sold into security or technical teams. &nbsp; FAQs
  Where is the office? We''re setting up our New York office in Manhattan. You''ll
  work closely with our London-based team and eventually other US-based team members
  as we grow. Are you doing hybrid/remote? Short answer: No, but flexible on a day-to-day
  basis. Long answer: We are building the company on a foundation of office-based
  culture. We think we''ll build the best company at the fastest pace while having
  a lot of fun by physically working together 5 days a week. On a case-by-case basis
  (leaving early for a holiday, staying home for a builder, working remote for a few
  days to visit family, etc.) we''re very reasonable and flexible. We respect that
  this is not for everyone. Can you sponsor visas? We are not able to sponsor visas
  for this role.'
