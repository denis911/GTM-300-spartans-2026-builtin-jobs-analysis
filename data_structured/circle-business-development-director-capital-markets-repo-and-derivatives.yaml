company_overview: 'Circle (NYSE: CRCL) is a global, internet financial platform company
  powering the foundation of an open, borderless, and programmable economy. Circle
  connects financial institutions, enterprises, and developers to the next generation
  of the internet financial system through digital assets such as USDC, Circle Payments
  Network for global money movement, and Arc, an enterprise-grade blockchain designed
  to become the Economic OS for the internet. Supporting trillions of dollars in economic
  activity and serving hundreds of millions of users worldwide, Circle enables value
  to move with the speed, security, and transparency of the internet.Circle is committed
  to visibility and stability in everything we do. As we grow as an organization,
  we''re expanding into some of the world''s strongest jurisdictions. Speed and efficiency
  are motivators for our success and our employees live by our company values: High
  Integrity, Future Forward, Multistakeholder, Mindful, and Driven by Excellence.
  We have built a flexible work environment where new ideas are encouraged and everyone
  is a stakeholder.'
