description_html: 'Circle (NYSE: CRCL) is one of the world''s leading internet financial
  platform companies, building the foundation of a more open, global economy through
  digital assets, payment applications, and programmable blockchain infrastructure.
  Circle''s platform includes the world''s largest regulated stablecoin network anchored
  by USDC, Circle Payments Network for global money movement, and Arc, an enterprise-grade
  blockchain designed to become the Economic OS for the internet. Enterprises, financial
  institutions, and developers use Circle to power trusted, internet-scale financial
  innovation. Learn more at circle.com .<br><b>What you''ll be part of:</b><br>Circle
  is committed to visibility and stability in everything we do. As we grow as an organization,
  we''re expanding into some of the world''s strongest jurisdictions. Speed and efficiency
  are motivators for our success and our employees live by our company values : High
  Integrity, Future Forward, Multistakeholder, Mindful, and Driven by Excellence.
  We have built a flexible work environment where new ideas are encouraged and everyone
  is a stakeholder.<br><b><b>What you''ll be responsible for: </b></b><br>Reporting
  to the Global Head of Capital Markets, you are a capital markets specialist to drive
  USDC adoption across the repo and swap dealer ecosystem. This role will focus on
  integrating USDC into secured financing, derivatives margining, and dealer balance-sheet
  workflows, working directly with primary dealers, swap dealers, clearinghouses,
  and market infrastructure providers. <br>This is a hands-on role at the intersection
  of market structure, regulation, and product execution. <br><b><b>What you''ll work
  on: </b></b><br>Dealer &amp; Market Infrastructure Engagement:  <br><ul><li> Leading
  technical engagement with swap dealers, primary dealers, FCMs, CCPs, custodians,
  and tri-party agents.</li><li> Acting as a credible counterpart to dealer treasury
  and funding teams, and drive pilots from design through live execution in coordination
  with internal product and engineering teams.</li></ul><br>Regulatory &amp; Risk
  Alignment:  <br><ul><li> Partnering with legal, compliance, and risk teams to ensure
  USDC integrations align with applicable derivatives and market regulations.</li><li>
  Anticipating regulatory and risk concerns from counterparties and help structure
  use cases that are scalable and defensible.</li></ul><br>Internal Leadership &amp;
  Expertise:  <br><ul><li> Serving as the internal expert on repo markets, dealer
  balance sheets, and derivatives market structure.</li><li> Advising senior leadership
  on where USDC can deliver meaningful capital, liquidity, and operational benefits.</li></ul><br><b><b>What
  you''ll bring to Circle: </b></b><br>Core Requirements: <br><ul><li> 12+ years of
  extensive experience in traditional capital markets, with direct exposure to repo
  markets, swap dealers, derivatives margining, or collateral management. Experience
  with primary dealers, swap dealers, FCMs, CCPs, custodians, or major market infrastructure
  providers.</li><li> Strong understanding of dealer funding models, balance-sheet
  constraints, and regulatory capital considerations.</li><li> Familiarity with margin
  frameworks, netting, segregation, rehypothecation, and liquidity requirements will
  be essential for success in this role.</li><li> Proven capability in negotiating
  and securing high-impact strategic deals at a C-level audience level, exhibiting
  strong persuasive and communication skills.</li><li> Familiarity with generative
  AI models (ChatGPT, Gemini, etc.) and prompt development</li></ul><br>Preferred
  Requirements: <br><ul><li> Previous experience with cryptocurrency industries, including
  key players, products, and trends.</li><li> Experience/familiarity with Slack, Apple
  MacOS and GSuite.</li></ul><br><b><b>Additional Information:</b></b><br><ul><li>
  This position is eligible for day-one PERM sponsorship for qualified candidates</li></ul><br>Circle
  is on a mission to create an inclusive financial future, with transparency at our
  core. We consider a wide variety of elements when crafting our compensation ranges
  and total compensation packages. <br>Starting pay is determined by various factors,
  including but not limited to: relevant experience, skill set, qualifications, and
  other business and organizational needs. Please note that compensation ranges may
  differ for candidates in other locations. <br>We are an <b>equal opportunity employer</b>.
  We do not discriminate on the basis of race, religion, color, national origin, gender,
  sexual orientation, age, marital status, veteran status, or disability status, or
  any other protected status required by the laws in the locations where we hire.
  Additionally, Circle participates in the E-Verify Program in certain locations,
  as required by law.<br>Should you require accommodations or assistance in our interview
  process because of a disability, please reach out to  accommodations@circle.com  for
  support. We respect your privacy and will connect with you separately from our interview
  process to accommodate your needs. <br>#LI-Remote'
