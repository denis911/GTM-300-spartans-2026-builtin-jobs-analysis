description_html: '<b><strong>About the Company</strong></b><p>Rain makes the next
  generation of payments possible across the globe. We’re a lean and mighty team of
  passionate builders and veteran founders. Our infrastructure makes stablecoins usable
  in the real-world by powering card transactions, cross-border payments, B2B purchases,
  remittances, and more. We partner with fintechs, neobanks, and institutions to help
  them launch solutions that are global, inclusive, and efficient. You will have the
  opportunity to deliver massive impact at a hypergrowth company that is funded by
  some of the top investors in fintech, crypto, and SaaS, including Sapphire Ventures,
  Norwest, Galaxy Ventures, Lightspeed, Khosla, and several more. If you’re curious,
  bold, and excited to help shape a borderless financial future, we’d love to talk.</p><p></p><b><strong>Our
  Ethos</strong></b><p>We believe in an open and flat structure. You will be able
  to grow into the role that most aligns with your goals. Our team members at all
  levels have the freedom to explore ideas and impact the roadmap and vision of our
  company.</p><p></p><b><strong>About the Role</strong></b><p>We''re looking for a
  hands-on AI Operations Lead to help us move faster and smarter as we scale. This
  person will serve as the connective tissue between our business challenges and the
  technology solutions that solve them — identifying operational bottlenecks, prioritizing
  ruthlessly, and building automations, AI agents, and workflows that eliminate manual
  work and increase leverage across the company.</p><p>Reporting to the Head of Business
  Operations, you''ll work cross-functionally with every part of the organization
  (GTM/CX/Product/etc.). You''ll go deep into our business, map inefficiencies, build
  working solutions, and drive adoption across teams. Equally important, you''ll develop
  the documentation, processes, and core primitives that form Rain''s internal AI
  foundation. You won’t just be helping accelerate the team today; you''ll be creating
  the infrastructure and institutional knowledge that compounds over time.</p><p></p><p><strong>What
  You''ll Do</strong></p><ul><li><p><strong>Diagnose &amp; Prioritize:</strong> Proactively
  audit workflows across teams to identify the highest-impact automation and AI opportunities.
  Translate business pain points into a prioritized roadmap with clear ROI.</p></li><li><p><strong>Build
  &amp; Ship:</strong> Design and deploy AI-powered automations, agents, and workflows
  using a mix of code and no-code/low-code tools. Own solutions end-to-end from prototype
  to production.</p></li><li><p><strong>Drive Adoption:</strong> Partner with internal
  stakeholders to ensure solutions are actually used. Run enablement sessions, create
  documentation, and build internal champions who sustain long-term impact.</p></li><li><p><strong>Manage
  Stakeholders:</strong> Communicate progress, tradeoffs, and results clearly to the
  team and to our leadership. Manage expectations, surface risks early, and maintain
  alignment across competing priorities.</p></li><li><p><strong>Establish Operational
  Rigor:</strong> Define success metrics for every initiative. Build dashboards to
  track performance, measure adoption, and demonstrate business impact. Iterate based
  on data and feedback.</p></li><li><p><strong>Build Internal AI Foundations:</strong>
  Develop the core primitives — documentation, prompt libraries, standard operating
  procedures, integration patterns, and governance frameworks — that enable Rain to
  build and deploy AI agents and tools reliably and consistently.</p></li></ul><p><strong>Who
  You Are</strong></p><ul><li><p><strong>CS background or strong technical fluency.</strong>
  You don''t need to be a full-time software engineer, but you should be comfortable
  with code, APIs, data structures, SQL, and scripting. You can read, write, and test
  code to get things done (alongside LLMs, of course).</p></li><li><p><strong>AI Native.</strong>
  You already use AI tools extensively in your daily work — Claude Code, ChatGPT,
  Cursor, or similar. You have hands-on experience building with LLM APIs, prompt
  engineering, and agentic workflows.</p></li><li><p><strong>Hands-on builder.</strong>
  You can take an ambiguous problem, scope it, and ship a working solution without
  waiting for an engineering team. You''re comfortable with no-code platforms and
  writing custom code when needed.</p></li><li><p><strong>Analytical problem-solver.</strong>
  You use data to identify patterns, prioritize opportunities, and measure results.</p></li><li><p><strong>Excellent
  communicator.</strong> You can translate technical concepts for non-technical stakeholders
  and translate business requirements into technical specs. You write crisp docs and
  run effective meetings.</p></li><li><p><strong>Systems builder.</strong> You naturally
  create clarity out of chaos — writing SOPs, building templates, defining standards,
  and structuring knowledge so that humans and agents can build on your work. You
  understand that good documentation is infrastructure, not overhead.</p></li><li><p><strong>Comfortable
  with ambiguity and speed.</strong> You thrive in fast-paced startup environments
  where priorities shift and you need to figure things out on the fly. You have high
  agency and don''t wait to be told what to do.</p></li><li><p><strong>3–6 years of
  experience</strong> in some combination of: product management, business operations,
  technical program management, forward deployed/solutions engineering, consulting,
  or a similar role where you both identified problems and built technical solutions.</p></li></ul><p><strong>Nice
  to Have</strong></p><ul><li><p>Experience at a Series A–C startup or high-growth
  startup company (or former founder)</p></li><li><p>Familiarity with compliance,
  finance, or payments workflows</p></li><li><p>Experience with workflow orchestration
  and integration architecture (webhooks, auth flows, data pipelines)</p></li><li><p>Background
  in change management or internal enablement programs</p></li><li><p>Experience with
  data platforms (Google Cloud, DBT) or data modeling</p></li><li><p>Track record
  of driving measurable adoption of internal tools or processes</p></li><li><p>Experience
  building internal knowledge bases, technical SOPs, or developer-facing documentation</p></li></ul><p></p><b><strong>Things
  that enable a fulfilling, healthy and happy experience at Rain:</strong></b><p><strong>Unlimited
  time off</strong> 🌴Unlimited vacation can be daunting, so we require Rainmakers
  to take 10 days minimum for themselves.</p><p><strong>Flexible working</strong>
  ☕ We support a flexible workplace, if you feel comfortable at home please work from
  home. If you’d like to work with others in an office feel free to come in. We want
  everyone to be able to work in the environment in which they are their most confident
  and productive selves. New Rainmakers will have a stipend to create a comfortable
  atmosphere at home.</p><p><strong>Easy to access benefits </strong>🧠For US Rainmakers,
  we offer comprehensive health, dental and vision plans for you and your dependents,
  as well as a 100% company subsidized life insurance plan.</p><p><strong>Retirement
  goals</strong>💡Plan for the future with confidence. We offer a 401(k) with a 4%
  company match.</p><p><strong>Equity plan </strong>📦 We offer every Rainmakers an
  equity option plan so we can all can benefit from our success.</p><p><strong>Rain
  Cards</strong> 🌧️ We want Rainmakers to be knowledgeable about our core products
  and services. To support this mission, we issue a card for our team to utilize the
  card for testing.</p><p><strong>Health and Wellness</strong> 📚 High performance
  begins from within. Rainmakers are welcome to use their card for eligible health
  and wellness spending like gym memberships/fitness classes, massages, acupuncture
  - whatever recharges you!</p><p><strong>Team summits</strong> ✨ Summits play an
  important role at Rain! Time spent together helps us get to know each other, strengthen
  our relationships, and build a common destiny. Expect team and company offsites
  both domestically and internationally.</p>'
