description_html: '<p><u><b>Job Description:</b></u></p>At Remitly, we believe everyone
  deserves the freedom to access, move, and manage their money wherever life takes
  them. Since 2011, we''ve tirelessly delivered on our promise to customers sending
  money globally, providing secure, simple, and reliable ways to manage their money,
  ensuring true peace of mind. Whether it''s supporting loved ones back home, growing
  a business across continents, or pursuing new opportunities abroad, we''re not just
  here to move money— we''re here to move our global customers forward.<br>We''re
  looking for builders, reimaginers, and global thinkers who want to work at the intersection
  of technology, trust, and transformation. If that''s you and you''re ready to do
  the most meaningful work of your career—we invite you to join over 2,800 passionate
  Remitlians worldwide who are united by our vision to transform lives with trusted
  financial services that transcend borders.<p><b>About the Role:</b></p><p>We are
  looking for a Pricing Analyst II to join our Americas team. This is a role for a
  technically-grounded analyst who leans toward the data science domain—prioritizing
  hypothesis generation and experimental design over standard business reporting.
  You will focus on the "why" and "what''s next" rather than the "what happened."
  You will be responsible for building the pricing engines for our Small/Micro Business
  (SMB) line of business and our core remittance business in Canada, deep diving into
  behavior across different segments and geographies.</p><p>Within this role, you
  will execute high-impact pricing experiments and build predictive models to enhance
  profitability. While you will interact with GM, Product, and Finance teams, your
  core value lies in your ability to transform complex datasets into rigorous experimental
  frameworks. This role is based in our Arlington, VA office with a standard 3-day
  in-office requirement and will report to our Head of Pricing, Americas leader.</p><p><b>You
  Will:</b></p><ul><li><b>Design and Execute Experiments: </b>Develop robust hypotheses
  and design A/B and multivariate pricing tests to measure customer price elasticity
  and lifetime value impact.</li><li><b>Build Predictive Engines: </b>Develop and
  maintain financial and predictive models to optimize pricing structures and build
  revenue predictability within our core remittance business.</li><li><b>Perform Deep-Dive
  Analysis: </b>Conduct rigorous statistical analysis of market trends, competitor
  movements, and segmented customer behavior.</li><li><b>Scale Pricing Logic: </b>Implement
  and refine the quantitative logic that powers our pricing across the Americas.</li><li><b>Synthesize
  Results: </b>Distill complex experimental outcomes into clear, technical recommendations
  for leadership, focusing on measurable business impact.</li><li></li></ul><p><b>You
  Have:</b></p><ul><li><b>Experience</b>: 3+ years of professional experience in a
  quantitative data analyst or data science-leaning role.</li><li><b>Education</b>:
  Bachelor''s degree in Mathematics, Engineering, Economics, or a similarly quantitative
  field.</li><li><b>Technical Proficiency</b>: You are fluent in SQL and have used
  it/its outputs for advanced statistical analysis. Bonus points for using Python/R
  in predictive modeling.</li><li><b>Statistical Rigor</b>: Demonstrated mastery of
  statistical concepts, including probability theory, forecasting, and causal inference
  in an experimental setting.</li><li><b>Hypothesis-Driven Mindset</b>: Proven ability
  to identify a business problem, develop a testable hypothesis, and execute an analytical
  framework to prove or disprove it.</li><li><b>Outcome Ownership</b>: A track record
  of delivering measurable results through data-driven implementation rather than
  just dashboard creation.</li><li><b>Communication</b>: Ability to translate analytical
  findings into objective business recommendations.</li></ul><p><b>Compensation Details.
  </b>The starting base salary range for this position is typically $115,000 - $130,500.
  In the U.S., Remitly employees are shareholders in our Company and equity is part
  of our total compensation plan. Your recruiter can share more information about
  medical benefits offered, as well as other financial benefits and total compensation
  components offered with this role.</p><p>#LI-HYBRID</p><p>This is a hybrid remote/in-office
  role.</p><p><b>Our Benefits:</b></p><ul><li>Flexible paid time off</li><li>Health,
  dental, and vision + 401k plan with company matching</li><li>Paid parental, medical,
  military and family care leave</li><li>Mental Health &amp; Family Forming Benefits</li><li>Employee
  Stock Purchase Plan (ESPP)</li><li>Continuing education and travel benefits</li></ul><p><b>Our
  Connected Work Culture: Driving Innovation, Together</b></p><p>At Remitly, we believe
  that true innovation sparks when we come together. Our Connected Work Culture fosters
  dynamic in-person collaboration, where ideas ignite and challenging problems find
  solutions faster. For corporate team members, we have an in-office expectation of
  at least 50% of the time monthly, typically achieved by coming in three days a week.
  This creates a consistent, meaningful overlap that supports team norms and business
  needs. Managers also have the flexibility to set higher expectations based on their
  team''s specific needs. These intentional in-office moments are vital for deepening
  relationships, fueling creativity, and ensuring your impact is felt where it matters
  most.</p><p><b>Remitly is an E-Verify Employer</b></p><p>At Remitly, we are dedicated
  to ensuring that our workplace offers equal employment opportunities to all employees
  and candidates, in full compliance with applicable laws and regulations.</p><p>Remitly
  is an equal opportunity employer. We celebrate diversity and are committed to creating
  an inclusive environment for all employees.</p>'
