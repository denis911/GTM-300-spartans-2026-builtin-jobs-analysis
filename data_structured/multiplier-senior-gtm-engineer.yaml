company_overview: Multiplier is a leading global employment platform that makes it
  easy for companies to employ teams internationally. Its proprietary technology simplifies
  the employment process by managing the complexities of local compliance, labour
  contracts, payroll, benefits and taxes.We enable companies to manage their distributed
  teams via a simple dashboard while taking responsibility for local labor law compliance
  on their behalf. We are passionate about creating a world where people can get a
  job they love, without having to leave the people they love.
