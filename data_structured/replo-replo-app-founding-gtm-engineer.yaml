description_html: <b>What this role means for you...</b><ul><li><p>Automate all the
  things — we are aggressive users of n8n, virtual assistants, GPT (and all other
  AI tools) to automate all processes and things.</p></li><li><p>Setup GTM infrastructure
  (Hubspot, Clay, Apollo automations). Can you send over 10,000 cold emails/day?</p></li><li><p>Set
  up cold email infrastructure (Smartleads, Instantly).</p></li><li><p>Manage influencer/creator
  marketing, calculate/manage CPMs</p></li><li><p>Build and manage lightweight financial
  models to help inform budgets.</p></li><li><p>Partner with leadership on cross-functional
  projects to get them across the finish line.</p></li><li><p>Take ambiguous problems
  and turn them into clear experiments, plans, and processes.</p></li><li><p>Own internal
  ops — from improving team workflows to managing our office and vendors.</p></li><li><p>Jump
  in wherever the company needs help — ordering snacks, coordinating legal documents,
  or getting a launch over the line.</p></li></ul><b>Looking for someone who is...</b><ul><li><p>1-4
  years into your career — likely from another startup.</p></li><li><p>Likes to jump
  around, you should want to automate yourself out of a job so you can move onto the
  next big problem/opportunity at Replo</p></li><li><p>Comfortable with Python/scripting
  work (with or without GPT) to get stuff done</p></li><li><p>Fast learner who thrives
  on feedback and moving quickly.</p></li><li><p>Strong communicator across Slack,
  async docs, and live conversations.</p></li><li><p>Organized and able to prioritize
  competing projects.</p></li><li><p>Resourceful — you can figure things out yourself,
  but also know when to ask meaningful questions.</p></li><li><p>Technically fluent
  and able to communicate cross-functionally, especially with those in technical roles.</p></li><li><p>Experienced
  in conducting candidate interviews.</p></li><li><p>Excited about coming into the
  SF office 3 days/week.</p></li></ul><b>Bonus points if you...</b><ul><li><p>Have
  a technical or quantitative background (STEM, economics, etc)</p></li><li><p>Have
  helped cross-functionally support or run operations in a fast-moving company.</p></li><li><p>Some
  real-life projects you’d work on...</p></li><li><p>Setup 1,000 cold email accounts
  for cold outbound.</p></li><li><p>Setup ETL processes between our product database
  and Snowflake.</p></li><li><p>Structuring product feedback from GTM calls and initiatives
  for the R&amp;D team to act on.</p></li><li><p>Working with the success team on
  customer operations.</p></li></ul>
