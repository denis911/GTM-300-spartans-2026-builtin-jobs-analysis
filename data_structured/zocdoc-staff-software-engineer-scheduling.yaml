description_html: <p><p><strong>Our Mission<br></strong></p><p><span>Healthcare should
  work for patients, but it doesn’t. In their time of need, they call down outdated
  insurance directories. Then wait on hold. Then wait weeks for the privilege of a
  visit. Then wait in a room solely designed for waiting. Then wait for a surprise
  bill. In any other consumer industry, the companies delivering such a poor customer
  experience would not survive. But in healthcare, patients lack market power. Which
  means they are expected to accept the unacceptable.</span></p><br><p><span>Zocdoc’s
  mission is to give power to the patient. To do that, we’ve built the leading healthcare
  marketplace that makes it easy to find and book in-person or virtual care in all
  50 states, across +200 specialties and +12k insurance plans. By giving patients
  the ability to see and choose, we give them power. In doing so, we can make healthcare
  work like every other consumer sector, where businesses compete for customers, not
  the other way around. In time, this will drive quality up and prices down.&nbsp;</span></p><br><p><span>We’re
  18 years old and the leader in our space, but we are still just getting started.
  If you like solving important, complex problems alongside deeply thoughtful, driven,
  and collaborative teammates, read on.</span></p><br></p><p><strong>Your Impact on
  our Mission</strong></p><p>Zocdoc’s most important asset is our people.&nbsp; As
  a Staff Software Engineer on the Scheduling team, you’ll play a meaningful role
  in building the best healthcare journey for our patients and providers possible.
  You will help develop experiences not just in Zocdoc, but integrate with other ecosystems
  to reach patients where they are.&nbsp;</p><p>At our best, we empower patients to
  make informed healthcare decisions with confidence while driving a significant,
  high-visibility impact on Zocdoc’s business. You’ll tackle complex technical challenges,
  simplifying an array of complex domains. These domains are across the tech stack;
  from our modern backend, to frontend experiences that are deployed on Zocdoc and
  on client’s own interfaces.. You will ensure scalability, resilience, and user experience
  are at the forefront of everything we build.&nbsp;</p><p>As a Staff Software Engineer,
  you’ll design, build, and optimize Zocdoc’s applications, ensuring they are scalable,
  secure, and intuitive. You’ll collaborate closely with product, design, and backend
  teams, shaping the future of our scheduling experience while mentoring other engineers
  and championing best practices across the organization.</p><br><p><strong>You’ll
  enjoy this role if you are…</strong></p><ul><li>Personally motivated by building
  user facing applications that are changing the healthcare experience for patients</li><li>A
  product-driven engineer who loves working in a highly collaborative and supportive
  environment</li><li>Motivated by building products that make healthcare easier</li><li>Passionate
  about building diverse and inclusive teams and culture</li><li>Excited to lead the
  development of projects and to work as part of a cross functional development team.</li></ul><br><p><strong>Your
  day to day is…</strong></p><ul><li>Making a meaningful impact as you participate
  in all phases of product development, including the design, development, testing,
  and release of provider and patient-facing features&nbsp;</li><li>Lead large, high
  visibility projects.&nbsp;</li><li>Manage deadlines and navigate ambiguity.</li><li>Shipping
  scalable production code across the development stack</li><li>Ownership of the software
  development lifecycle - including architecture, development, testing, and observability</li><li>Building
  and fostering relationships with our agile team of engineers, product managers,
  and designers</li><li>Mentoring your peers, with the notion that helping others
  means learning and growing yourself</li><li>Promote new technologies and new process
  to improve the way we work.&nbsp;</li><li>Working with cutting edge GenAI tools
  and technology</li></ul><br><p><strong>You’ll be successful in this role if you
  have…</strong></p><ul><li>Meaningful (7+ years) experience in full stack software
  development</li><li>A results oriented mindset. You are always striving to deliver
  quickly and reliably.</li><li>The ability to integrate generative AI tools into
  daily workflows to automate tasks, foster innovation, and maximize productivity</li><li>Passion
  for technology and the ability to think critically about performance, scalability,
  and reliability of software&nbsp;</li><li>A compassionate but consultative, and
  confident approach to working with Product partners to deliver high quality products
  to our patients and providers.</li><li>A strong understanding of system design and
  architecture</li><li>The mentality of an entrepreneur/owner and a strong bias to
  action.&nbsp;</li><li>Superb communication skills! You believe in keeping all of
  your stakeholders in the loop and know that multiple mediums of communication are
  the key to success</li><li>Passion for technology and the ability to think critically
  about performance, scalability, and reliability of software&nbsp;</li><li>Humility.
  You believe in treating all people with dignity and respect, regardless of title
  or tenure&nbsp;</li><li>An unrelenting desire to build more equitable, inclusive
  and diverse workplaces.&nbsp; You view this role as an opportunity to create positive
  change</li></ul><br><p><strong>Benefits:&nbsp;</strong></p><ul><li>Flexible, hybrid
  work environment at our convenient Soho location</li><li>Unlimited Vacation</li><li>100%
  paid employee health benefit options (including medical, dental, and vision)</li><li>Commuter
  Benefits</li><li>401(k) with employer funded match</li><li>Corporate wellness programs
  with Headspace and Peloton</li><li>Sabbatical leave (for employees with 5+ years
  of service)</li><li>Competitive paid parental leave and fertility/family planning
  reimbursement</li><li>Cell phone reimbursement</li><li>Catered lunch everyday along
  with beverages and snacks</li><li>Employee Resource Groups and ZocClubs to promote
  shared community and belonging</li><li>Great Place to Work Certified</li></ul><br><p><p><p><span>Zocdoc
  is committed to fair and equitable compensation practices. Salary ranges are determined
  through alignment with market data. Base salary offered is determined by a number
  of factors including the candidate’s experience, qualifications, and skills. Certain
  positions are also eligible for variable pay and/or equity; your recruiter will
  discuss the full compensation package details.</span></p><p>Remote Base Salary Range</p><p><span>$180,000</span><span>—</span><span>$270,000
  USD</span></p></p></p><p><p><strong>About us<br></strong><span>Zocdoc is the country’s
  leading digital health marketplace that helps patients easily find and book the
  care they need. Each month, millions of patients use our free service to find nearby,
  in-network providers, compare choices based on verified patient reviews, and instantly
  book in-person or video visits online. Providers participate in Zocdoc’s Marketplace
  to reach new patients to grow their practice, fill their last-minute openings, and
  deliver a better healthcare experience. Founded in 2007 with a mission to give power
  to the patient, our work each day in pursuit of that mission is guided by our</span>
  <span>six core values</span><span>. Zocdoc is a private company backed by some of
  the world’s leading investors, and we believe we’re still only scratching the surface
  of what we plan to accomplish.&nbsp;<br></span></p><p><span>Zocdoc is a mission-driven
  organization dedicated to building teams as diverse as the patients and providers
  we aim to serve. In the spirit of one of our core values - </span><em><span>Together,
  Not Alone</span></em><span>, we are a company that prides itself on being highly
  collaborative, and we believe that diverse perspectives, experiences and contributors
  make our community and our platform better.&nbsp; We’re an equal opportunity employer
  committed to providing employees with a work environment free of discrimination
  and harassment. Applicants are considered for employment regardless of race, color,
  ethnicity, ancestry, religion, national origin, gender, sex, gender identity, gender
  expression, sexual orientation, age, citizenship, marital or parental status, disability,
  veteran status, or any other class protected by applicable laws.<br></span>Job Applicant
  Privacy Notice</p><br></p>
