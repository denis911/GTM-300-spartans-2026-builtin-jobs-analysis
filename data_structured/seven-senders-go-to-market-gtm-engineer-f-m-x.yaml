description_html: '<b>Company Description</b><p></p><p>At Seven Senders, we connect
  people and markets, making international shipping a simple matter.</p><p>We are
  the leading platform for cross-border parcel delivery in Europe. We support e-commerce
  companies in successfully implementing their growth and internationalization plans
  and connecting millions of consumers with their desired products.&nbsp; Whether
  the focus is on speed or cost efficiency, we provide direct access to Europe''s
  premier local carriers. Responsible for the daily end-to-end supply chain from the
  warehouse to the customer''s doorstep, we ensure the parcels reach their destination
  efficiently and reliably.</p><p><strong>Our mission</strong> is to connect markets
  with unparalleled ease using our innovative platform, which combines the best European
  delivery services with local logistics expertise. Since Johannes Plehn and Thomas
  Hagemann founded the company in Berlin in 2015, we''ve grown into a dedicated team
  of over 200 professionals. Today, we''re proud to serve renowned clients such as
  Flaconi, Shop Apotheke and Tamaris, continually advancing our journey as a European
  operating champion.</p><p></p><b>Job Description</b><p></p><p>At Seven Senders and
  claim.me, we’re on a mission to make international shipping and parcel claiming
  smooth, smart, and scalable. To fuel our next stage of growth, we’re looking for
  a GTM Engineer – a hands-on systems thinker who will take full ownership of our
  sales and marketing automation stack and generate leads for our sales teams.</p><p>If
  you love connecting tools like Clay, Lemlist, and Salesforce, turning data into
  action, and ensuring our GTM engine runs flawlessly – this is your role.</p><p>As
  our GTM Engineer, you’ll be the backbone of our go-to-market operations. You’ll
  make sure every automation, campaign, and data flow works seamlessly — for reaching
  the right audience, with the right message, at the right time. We value clean, reliable
  data, so you’ll work meticulously, anticipate multiple scenarios, and prevent duplicates
  across all systems.</p><p><strong>The essence of your role </strong></p><ul><li>Own
  AI-driven outbound campaigns, from initial outreach to booked meetings.</li><li>Own
  and optimize our GTM tech stack (Clay, Lemlist, Salesforce) to ensure smooth operations
  and scalability.</li><li>Design and maintain data integrations and workflows for
  reliable, real-time information flow across systems.</li><li>Develop dashboards
  and reports that turn complex data into actionable insights.</li><li>Partner closely
  with Sales, Marketing, Management, and RevOps teams to streamline processes and
  improve campaign performance.</li></ul><p></p><b>Qualifications</b><p></p><p><strong>This
  is what you need to succeed</strong></p><ul><li>Hands-on expertise with Clay, Salesforce,
  Lemlist, or similar GTM tools, with proven experience in CRM management and workflow
  automation.</li><li>Solid understanding of sales and marketing automation processes,
  including AI-driven outbound campaigns from first outreach to booked meetings.</li><li>Ability
  to design, build, and maintain workflows, ensuring clean CRM structures, reliable
  data flows, and prevention of duplicates.</li><li>Experience with API-based integrations
  and automation tools (e.g., Make, Zapier) and strong analytical skills to turn data
  into actionable insights.</li><li>Independent, proactive, and detail-oriented problem-solver,
  fluent in English and German, who takes ownership, optimizes campaigns, and collaborates
  effectively across teams.</li></ul><p></p><b>Additional Information</b><p></p><p><strong>What
  we offer:</strong></p><p><strong>Flexible &amp; Hybrid Work:&nbsp;</strong>Our office
  is in Berlin, but in this role, we offer a remote contract within Germany. And if
  you wish, you can work from almost anywhere for up to 2 months per year.</p><p><strong>Benefits:
  </strong>We offer company lunches twice per month, a corporate benefits platform,
  and German language courses .</p><p><strong>Mission Zero: </strong>Climate-neutral
  and long-term impact. With our green initiatives, we are reaching climate neutrality
  for ourselves, and hopefully, we''re inspiring the entire logistics sector to join
  us to create a sustainable future.</p><p><strong>Vibrant Culture &amp; Community:
  </strong>We embody collaboration, open doors, and no-fuss results focus, and we
  are successful with our data-driven and efficient working approach. We like to celebrate
  and come together, and we strive for a workplace buzzing with energy and camaraderie,
  highlighted by regular team events, BBQs, and company-wide celebrations.</p><p><strong>Inclusive
  Environment:</strong> We value diversity and welcome all applicants regardless of
  ethnicity, religion, national origin, sexual orientation, gender identity, age,
  or disability.</p><p>If you meet the above qualifications and are excited about
  the opportunity to join our team, we encourage you to submit your application today.
  Please scroll down to submit your English CV. We look forward to hearing from you!</p><p></p>'
description_text: 'Company Description At Seven Senders, we connect people and markets,
  making international shipping a simple matter. We are the leading platform for cross-border
  parcel delivery in Europe. We support e-commerce companies in successfully implementing
  their growth and internationalization plans and connecting millions of consumers
  with their desired products.&nbsp; Whether the focus is on speed or cost efficiency,
  we provide direct access to Europe''s premier local carriers. Responsible for the
  daily end-to-end supply chain from the warehouse to the customer''s doorstep, we
  ensure the parcels reach their destination efficiently and reliably. Our mission
  is to connect markets with unparalleled ease using our innovative platform, which
  combines the best European delivery services with local logistics expertise. Since
  Johannes Plehn and Thomas Hagemann founded the company in Berlin in 2015, we''ve
  grown into a dedicated team of over 200 professionals. Today, we''re proud to serve
  renowned clients such as Flaconi, Shop Apotheke and Tamaris, continually advancing
  our journey as a European operating champion. Job Description At Seven Senders and
  claim.me, we’re on a mission to make international shipping and parcel claiming
  smooth, smart, and scalable. To fuel our next stage of growth, we’re looking for
  a GTM Engineer – a hands-on systems thinker who will take full ownership of our
  sales and marketing automation stack and generate leads for our sales teams. If
  you love connecting tools like Clay, Lemlist, and Salesforce, turning data into
  action, and ensuring our GTM engine runs flawlessly – this is your role. As our
  GTM Engineer, you’ll be the backbone of our go-to-market operations. You’ll make
  sure every automation, campaign, and data flow works seamlessly — for reaching the
  right audience, with the right message, at the right time. We value clean, reliable
  data, so you’ll work meticulously, anticipate multiple scenarios, and prevent duplicates
  across all systems. The essence of your role Own AI-driven outbound campaigns, from
  initial outreach to booked meetings. Own and optimize our GTM tech stack (Clay,
  Lemlist, Salesforce) to ensure smooth operations and scalability. Design and maintain
  data integrations and workflows for reliable, real-time information flow across
  systems. Develop dashboards and reports that turn complex data into actionable insights.
  Partner closely with Sales, Marketing, Management, and RevOps teams to streamline
  processes and improve campaign performance. Qualifications This is what you need
  to succeed Hands-on expertise with Clay, Salesforce, Lemlist, or similar GTM tools,
  with proven experience in CRM management and workflow automation. Solid understanding
  of sales and marketing automation processes, including AI-driven outbound campaigns
  from first outreach to booked meetings. Ability to design, build, and maintain workflows,
  ensuring clean CRM structures, reliable data flows, and prevention of duplicates.
  Experience with API-based integrations and automation tools (e.g., Make, Zapier)
  and strong analytical skills to turn data into actionable insights. Independent,
  proactive, and detail-oriented problem-solver, fluent in English and German, who
  takes ownership, optimizes campaigns, and collaborates effectively across teams.
  Additional Information What we offer: Flexible &amp; Hybrid Work:&nbsp; Our office
  is in Berlin, but in this role, we offer a remote contract within Germany. And if
  you wish, you can work from almost anywhere for up to 2 months per year. Benefits:
  We offer company lunches twice per month, a corporate benefits platform, and German
  language courses . Mission Zero: Climate-neutral and long-term impact. With our
  green initiatives, we are reaching climate neutrality for ourselves, and hopefully,
  we''re inspiring the entire logistics sector to join us to create a sustainable
  future. Vibrant Culture &amp; Community: We embody collaboration, open doors, and
  no-fuss results focus, and we are successful with our data-driven and efficient
  working approach. We like to celebrate and come together, and we strive for a workplace
  buzzing with energy and camaraderie, highlighted by regular team events, BBQs, and
  company-wide celebrations. Inclusive Environment: We value diversity and welcome
  all applicants regardless of ethnicity, religion, national origin, sexual orientation,
  gender identity, age, or disability. If you meet the above qualifications and are
  excited about the opportunity to join our team, we encourage you to submit your
  application today. Please scroll down to submit your English CV. We look forward
  to hearing from you!'
