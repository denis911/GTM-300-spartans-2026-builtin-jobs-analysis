description_html: '<b><strong>About RapDev</strong></b><p>We specialize in modern
  ITOM &amp; DevOps ServiceNow delivery, and implementations &amp; integrations for
  Datadog. Our experienced team of SREs and DevOps engineers powerfully brings together
  these two ecosystems to drive better observability, availability, and deployment
  velocity across organizations of all sizes.</p><b><strong>About the job</strong></b><p>We’re
  looking for a Senior Technical Program Manager to lead projects and work streams
  that interface with complex, client-facing ServiceNow programs from strategy through
  delivery. This role sits at the intersection of customers, engineers, architects,
  and leadership, ensuring programs stay aligned, risks are managed, and value is
  delivered predictably.</p><p>You’ll own program level reporting and interface responsibilities
  across multiple worksteams, guide clients through ambiguity, and keep delivery teams
  focused and unblocked — all while maintaining strong technical credibility in the
  ServiceNow ecosystem.</p><p><strong>This role will be based in our Boston office,
  with an expectation of coming into the office Tuesday-Thursday each week.</strong></p><b><strong>What
  you’ll do</strong></b><ul><li><p>Own end-to-end delivery of large, multi-stream
  ServiceNow programs (e.g., platform implementations, transformations, expansions,
  or managed initiatives)</p></li><li><p>Perform day-to-day project management of
  key workstreams while interfacing with other project managers and the overarching
  program governance</p></li><li><p>Serve as the primary program-level point of contact
  for client stakeholders, including senior leadership and steering committee members</p></li><li><p>Translate
  business objectives into executable delivery plans, milestones, and success metrics</p></li><li><p>Coordinate
  across architects, developers, consultants, and client teams to manage scope, dependencies,
  and timelines<br>Proactively identify risks, constraints, and trade-offs; drive
  mitigation and decision-making early</p></li><li><p>Lead executive-level status
  reviews, roadmap discussions, and delivery readouts</p></li><li><p>Ensure alignment
  between technical design decisions and client business outcomes</p></li><li><p>Drive
  delivery rigor while remaining adaptable to client needs and changing priorities</p></li><li><p>Mentor
  project managers and delivery team members on program management best practices</p></li><li><p>Continuously
  improve delivery processes, tooling, and client experience<br></p></li></ul><p></p><b><strong>What
  you have</strong></b><ul><li><p>10+ years of experience in project management and
  5+ years of experience in program management, with significant client-facing experience</p></li><li><p>4+
  years working with ServiceNow in delivery, technical, or program leadership roles</p></li><li><p>Strong
  understanding of ServiceNow architecture, modules, and implementation lifecycles</p></li><li><p>Proven
  experience managing complex, multi-workstream programs with distributed teams</p></li><li><p>Excellent
  stakeholder management skills, including experience presenting to executives</p></li><li><p>Ability
  to influence without authority and drive alignment across teams and clients</p></li><li><p>Strong
  written communication skills — clear, concise, and client-ready</p></li><li><p>Comfort
  operating in fast-paced, ambiguous environments</p></li></ul><p><strong>Compensation</strong></p><ul><li><p>Base
  Salary: $110,000-$170,000 annually, depending on experience</p></li></ul><p><strong>Benefits</strong></p><ul><li><p>100%
  Employee Healthcare Coverage (Medical, Dental &amp; Vision)</p></li><li><p>Retirement
  Plan (5% 401k Match, IRA)</p></li><li><p>Unlimited Paid Time Off (4-week minimum)
  (Vacation, Sick &amp; Public Holidays)</p></li><li><p>Family Leave (Maternity, Paternity)</p></li><li><p>Equity</p></li><li><p>Hybrid
  Work Opportunities</p></li><li><p>Fitness &amp; Commuter Subsidies available</p></li><li><p>SL
  &amp; LT Disability</p></li></ul><p>RapDev is an Equal Opportunity Employer. We
  are committed to providing equal employment opportunities to all applicants and
  employees without regard to race, color, religion, sex, national origin, age, disability,
  veteran status, or any other protected characteristic.</p>'
