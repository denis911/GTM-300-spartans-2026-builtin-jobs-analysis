company_overview: 'Ushur delivers the world’s first AI-powered Customer Experience
  Automation™ platform that has been purpose-built, from the ground up, to intelligently
  automate entire customer journeys, end to end. Designed to deliver delightful, hyper-personalized
  customer experiences through rapid issue resolution and unified, omnichannel engagement,
  Ushur is the first-of-its-kind system of intelligence. It combines Conversational
  Automation and Knowledge Work Automation in a No-Code, Cloud-native, SaaS platform
  to digitally transform every step of the complete enterprise customer experience
  – from Micro-engagements™ to entire customer journeys.Backed by leading investors
  including Third Point Ventures, 8VC, Pentland Ventures, Aflac Ventures and Iron
  Pillar, Ushur’s Customer Experience Automation™ solutions are currently in production
  at some of the leading insurance providers across the globe including Irish Life,
  Unum, Aetna, Cigna and Tower Insurance.Learn more at: www.ushur.com'
