description_html: '<p>Ushur is an agentic CX automation platform purpose-built for
  regulated industries to streamline journeys across the entire customer lifecycle.
  Ushur sets the standard for best-in-class self-service customer experiences, enabling
  customers to start, navigate, and complete complex requests end to end—without handoffs,
  callbacks, or loss of context.&nbsp;</p><p>Designed from the ground up for healthcare,
  insurance, and financial services, Ushur AI agents operate at the highest levels
  of security, compliance, auditability, and control, ensuring trust is never compromised.
  The platform uniquely combines intelligent, agentic automation with seamless human
  handoff and industry-leading outbound capabilities, enabling proactive, two-way
  engagement across text, email, voice, and chat. At enterprise scale, Ushur helps
  organizations improve customer retention and customer growth, while reducing staff
  burden for customer service and delivering the fastest time to value through a no-code
  deployment.</p><p><strong>About the Role</strong></p><p>Ushur is hiring a GTM Engineer
  to build the execution layer behind our revenue engine, sitting at the intersection
  of Marketing, Sales, Customer Success, and Product. This role partners closely with
  the Senior Manager, Growth Marketing, ensuring demand generation programs connect
  seamlessly into pipeline conversion, SDR execution, and expansion outcomes. This
  is a highly execution-oriented role, approximately:</p><ul><li>70% GTM technical
  + revenue operations workflows</li><li>30% marketing enablement + buyer journey
  support</li></ul><p>For remote positions, Ushur’s U.S. hiring is open to candidates
  who are residents of the following states: AZ, CA, CO, FL, GA, HI, ID, IL, MD, ME,
  MI, MN, MO, MA, NE, NJ, NC, OH, PA, SC, TX, UT, VA, WA, NY.</p><p>If are you located
  approximately within 25 miles of our HQ in Santa Clara, CA (a minimum of 3 days
  in office). Details of hybrid requirements will be determined and provided by your
  manager.</p><p><strong>What You''ll Do&nbsp;</strong></p><ul><li>Build and maintain
  <strong>lead routing and sales automation workflows</strong> across HubSpot, Planhat,
  SDR processes, improving speed-to-lead and pipeline handoffs.</li><li>Improve <strong>CRM
  data hygiene and infrastructure</strong>, ensuring accurate account/contact data,
  lifecycle stages, pipeline consistency, and clean reporting.</li><li>Develop <strong>AI
  Agents and automated GTM plays</strong> that proactively trigger next-best actions
  across the funnel (e.g., outreach, nurture, expansion prompts), aligned to personas
  and revenue motion.</li><li>Translate <strong>product usage signals into revenue
  actions</strong>, triggering GTM plays when users hit thresholds, invite teammates,
  approach limits, or show expansion behavior.</li><li>Develop and optimize <strong>intent
  + account scoring models</strong> using signals such as website engagement, content
  consumption, HubSpot activity, third-party intent data, and in-product expansion
  indicators.</li><li>Enable SDR teams with <strong>AI-assisted outreach personalization</strong>,
  including auto-generated account-specific email snippets, persona-based playbooks,
  and testing frameworks to improve outbound conversion.</li><li>Build <strong>GTM
  analytics and forecasting dashboards</strong>, tracking funnel conversion by stage,
  pipeline velocity, retention cohorts, and CAC vs LTV by segment.</li><li>Drive <strong>experimentation</strong>
  across routing, scoring, nurture, outbound personalization, and expansion-trigger
  programs, building tight feedback loops with Growth Marketing.</li><li><strong>Identify
  gaps in tactics &amp; collateral across the buyer journey</strong> and coordinate
  creation new assets to support GTM motions such as interactive demos, persona-specific
  enablement assets, and stage-based content bundles.</li><li>Support sales enablement
  systems with automation so reps can quickly surface the right case studies, proof
  points, and content based on deal stage and industry.</li></ul><p><strong>What You
  Bring&nbsp;</strong></p><ul><li>2+ years in B2B Saas company&nbsp;</li><li>Bachelors
  degree in Computer Science and MBA&nbsp;</li><li>Proven ability to operationalize
  lead routing, scoring, pipeline workflows, and funnel performance reporting.</li><li>Experience
  working in modern CRMs, especially <strong>Planhat or similar AI-native platforms</strong>.</li><li>Strong
  experience with <strong>Marketing Automation (e.g. HubSpot) workflows, </strong>lifecycle
  automation, and ABM platforms (e.g., 6Sense, Demandbase, Rollworks)&nbsp;</li><li>Experience
  with <strong>AI Agents for GTM and B2B growth marketing</strong>, supporting personalized,
  data-driven revenue acceleration.&nbsp;</li><li>Experience with SEO/GEO, paid acquisition,
  lead nurture, and website conversion optimization</li><li>Strong analytical rigor
  across attribution, forecasting, and revenue efficiency metrics.</li><li>Comfortable
  partnering daily with Sales, Marketing, Product, and Data teams in a fast-paced
  environment..</li></ul><p>The pay range for this position is $140,000- $220,000
  plus bonus and equity. However, base pay offered may vary depending on skills, experience,
  job-related knowledge and location.</p><p><strong>AI-First Mindset &amp; Enablement</strong></p><p>As
  an AI-first company, Ushur encourages all team members—across every function—to
  embrace the opportunities AI brings to our work and our customers. We’re building
  a culture where continuously deepening our understanding of AI technologies and
  their practical applications is part of how we grow and deliver value.</p><p>Team
  members are expected to leverage AI tools to enhance productivity, collaboration,
  and customer outcomes—and to support the adoption of Ushur’s AI-powered capabilities
  wherever they can drive impact. The ideal candidate is curious, adaptable, and proactive
  in exploring how AI can transform the way we work.</p><p><strong>Why Join Us?&nbsp;</strong></p><p><em>Thriving
  Company Culture.</em> At Ushur, we foster a values-driven culture that prioritizes
  respect, inclusion, and collaboration. We empower every individual to thrive, contribute
  innovative ideas, and make a meaningful impact in a supportive and dynamic environment.</p><p><em>Bring
  Your Whole Self to Work.</em> We celebrate diversity and believe that innovative
  ideas thrive in an inclusive environment where every team member is valued. As a
  dynamic start-up, we recognize that every individual makes a significant impact.</p><p><em>Rest
  and Recharge. </em>Take advantage of unlimited PTO, paid holidays (10 holidays +
  full week off at the end of December), and more to prioritize your well-being and
  maintain balance.&nbsp;</p><p><em>Comprehensive Health Benefits.</em> We’ve got
  you covered with health, dental, and vision plans tailored to meet the needs of
  you and your loved ones, plus additional offerings like life insurance, accident
  coverage, and more.</p><p><em>Invest in Your Future. </em>We provide a 401(k) plan
  to support your retirement savings and stock options to give you a stake in our
  company’s success and growth.</p><p><em>Embrace Growth.</em> One of our core values
  is Growth Mindset – we believe in lifelong learning. We offer opportunities to support
  your development, including assistance with certifications and continuing education
  related to your role at Ushur.</p><p><em>Flexible Work Options.</em> We understand
  the importance of flexibility. For employees based near our HQ, we offer a hybrid
  work model that balances collaboration and autonomy. Fully remote roles are available
  for employees located outside of the HQ area, ensuring everyone can thrive in an
  environment that works best for them.</p>'
