description_html: <b>About Us:</b><p>Notion helps you build beautiful tools for your
  life’s work. In today's world of endless apps and tabs, Notion provides one place
  for teams to get everything done, seamlessly connecting docs, notes, projects, calendar,
  and email—with AI built in to find answers and automate work. Millions of users,
  from individuals to large organizations like Toyota, Figma, and OpenAI, love Notion
  for its flexibility and choose it because it helps them save time and money. .</p><p></p><p>In-person
  collaboration is essential to Notion's culture. We require all team members to work
  from our offices on Mondays, Tuesdays, and Thursdays, our designated Anchor Days.
  Certain teams or positions may require additional in-office workdays.</p><p><br></p><b>About
  The Role:</b><p>As a Forward Deployed Engineer within Go-To-Market, you will lead
  complex customer engineering engagements from end to end, spanning large-scale migrations,
  integrating Notion with third party systems and tools, and production AI/agentic
  deployments.</p><p>You’ll embed with enterprise customers to design and build solutions
  that integrate Notion deeply into their technical and operational environments.
  This includes writing and maintaining custom code, designing and deploying production-grade
  custom agents and AI workflows with MCP, Agent APIs, and Notion’s automation and
  execution infrastructure, building data pipelines, and resolving complex challenges
  around scale, permissions, and governance.</p><p>Your work as a customer-facing
  engineer will help shape best practices for how we support complex customer needs
  and ensure Notion’s platform is ready for scale.</p><p><br></p><b>What You'll Achieve:</b><ul><li><p>Own
  the hands-on technical delivery of customer engagements, including deep technical
  discovery, requirements gathering, solution design, and end to end implementation.</p></li><li><p>Act
  as a trusted technical advisor, helping customers make informed architectural decisions
  and identify opportunities to expand and deepen their use of Notion.</p></li><li><p>Design,
  build, and operate custom agents, integrations, automations, and data pipelines
  that connect Notion with customers’ systems and workflows.</p></li><li><p>Lead the
  design and execution of large-scale content and data migrations, including discovery,
  scoping, data modeling, transformation logic, validation, and post-migration optimization.</p></li><li><p>Work
  closely with client stakeholders to gather business and technical requirements and
  translate them into well-architected solutions that maximize the value of the Notion
  platform within their broader technical ecosystem.</p></li><li><p>Design and build
  customer integrations, automations, and custom tooling as a part of Notion implementations.</p></li><li><p>Design
  and operate feedback loops with Product, CX, and Engineering, translating real-world
  implementation challenges into actionable insights, technical requirements, and
  tooling improvements that directly influence Notion’s Product Roadmap and our Customers</p></li><li><p>Build
  foundational discovery frameworks, technical standards, and internal tooling that
  define how Services delivers complex migrations and implementations at scale.</p></li><li><p>Contribute
  to the evolution of the Services team by developing repeatable methodologies, scoping
  artifacts, internal tooling, and contributing best practices as the team and customer
  footprint grow.</p><p><br></p></li></ul><b>Skills You'll Need to Bring:</b><ul><li><p>4+
  years of experience in a customer-facing engineering role, forward deployed engineering,
  or similar role, preferably in a SaaS or enterprise software environment.</p></li><li><p>Proficiency
  in at least one programming language such as Java, JavaScript, Node.js, SQL, or
  Python and comfort with writing production-quality code in customer-facing or internal
  engineering contexts.</p></li><li><p>Hands-on experience with APIs and data integration.</p></li><li><p>Strong
  written and verbal communication skills, with the ability to engage both technical
  and business audiences effectively.</p></li><li><p>A track record of delivering
  customer value by translating technical challenges into solutions that drive value
  for customers at scale.<br></p><p></p></li></ul><b>Nice to Haves:</b><ul><li><p>Experience
  working in SaaS professional services, preferably in a startup or high-growth environment.</p></li><li><p>Experience
  deploying AI agents autonomously in complex coding or business workflows.</p></li><li><p>Background
  in developing technical frameworks, discovery methodologies, or internal tooling
  from the ground up.</p></li><li><p>Strong history of collaboration with product
  and engineering teams, including influencing roadmaps or architectural decisions.</p></li><li><p>Experience
  supporting pre-sales or early engagement phases, including technical discovery,
  migration scoping, feasibility analysis, effort estimation, and building prototypes
  or custom scripts to validate approaches.</p></li><li><p>Strong track record of
  successful enterprise customer implementations.</p></li></ul><p></p><p>We hire talented
  and passionate people from a variety of backgrounds because we want our global employee
  base to represent the wide diversity of our customers. If you’re excited about a
  role but your past experience doesn’t align perfectly with every bullet point listed
  in the job description, we still encourage you to apply. If you’re a builder at
  heart, share our company values, and enthusiastic about making software toolmaking
  ubiquitous, we want to hear from you.</p><p></p><p>Notion is proud to be an equal
  opportunity employer. We do not discriminate in hiring or any employment decision
  based on race, color, religion, national origin, age, sex (including pregnancy,
  childbirth, or related medical conditions), marital status, ancestry, physical or
  mental disability, genetic information, veteran status, gender identity or expression,
  sexual orientation, or other applicable legally protected characteristic. Notion
  considers qualified applicants with criminal histories, consistent with applicable
  federal, state and local law. Notion is also committed to providing reasonable accommodations
  for qualified individuals with disabilities and disabled veterans in our job application
  procedures. If you need assistance or an accommodation due to a disability, please
  let your recruiter know.<br>Notion is committed to providing highly competitive
  cash compensation, equity, and benefits. The compensation offered for this role
  will be based on multiple factors such as location, the role’s scope and complexity,
  and the candidate’s experience and expertise, and may vary from the range provided
  below. For roles based in San Francisco or New York City, the estimated range for
  total on target earnings (including base salary and on target incentive pay) for
  this role is $175,000 - $240,000 per year.</p><p></p><p>By clicking “Submit Application”,
  I understand and agree that Notion and its affiliates and subsidiaries will collect
  and process my information in accordance with Notion’s <u>Global Recruiting Privacy
  Policy</u> and <u>NYLL 144</u>.</p><p></p><p>#LI-Osite&nbsp;</p>
