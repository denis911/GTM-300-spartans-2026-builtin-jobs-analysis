description_html: '<p><p>Our mission is to transform how people and machines work
  together to push the boundaries of human productivity. A leader in Industrial AI,
  Augury helps the world’s manufacturers leverage real-time production insights to
  drive new levels of efficiency. Combining predictive and prescriptive AI technology
  with industry expertise, production teams can proactively address alerts, minimize
  downtime, reduce asset costs, and maximize yield and capacity. Our customers achieve
  payback in six months or less, enabling global scale. We''re looking for team members
  excited to partner with the world''s manufacturers and build the future of production
  together.</p></p><p><strong>As a Sales and Value Engineer, you will partner with
  Augury Account Executives in selling our Machine Health Solution by leading technical
  discussions with enterprise prospects and customers to drive global expansion.&nbsp;</strong></p><p><strong>A
  Day In Your Life</strong></p><ul><li>Develop a strong knowledge base of the Augury
  platform and its value proposition to increase time to value (TTV) for customers
  and partners.</li><li>Be the primary point of contact in scoping integration solutions
  between Augury Production Health Platform and customer’s manufacturing systems</li><li>Be
  a strategic partner to our Sales and Partnerships teams to drive technical value
  throughout the presales process and help close large complex deals.&nbsp;</li><li>Engage
  with customers in a consultative way to build credibility and position Augury as
  the preferred long-term, strategic partner.</li><li>Set framework for value expectations
  with customers to be used by commercial operations to demonstrate Augury’s value
  to the customer over time since inception.&nbsp;</li><li>Deliver technical presentations
  to current and prospective customers and articulate how Augury’s platform will enable
  their business to succeed</li><li>Create end-to-end use case-specific demonstrations
  mapped to a prospect''s strategic objectives across industries.</li><li>Act as the
  front-line liaison to shape the direction of Augury''s platform based on a prospect’s
  needs.</li><li>Mentor others and serve as an evangelist for the Sales and Value
  Engineering organization.</li><li>Must be open to traveling up to 75% of the time</li></ul><p><strong>What
  You Bring</strong></p><ul><li><strong>Drive: </strong>A love of cutting-edge technology,
  industrial businesses, technical selling, and can think on your feet. And are looking
  for an opportunity to join a company that is changing the manufacturing industry</li><li><strong>Experience:</strong>
  You have 10+ years of professional experience with a minimum of 5 years as a sales
  or solutions engineer selling SaaS solutions to large, complex enterprises. Strong
  understanding of process equipment and functionality. You have an in-depth understanding
  of current reliability best practices and methodologies, including experience working
  in Reliability, Maintenance, Operations, and/or Condition Monitoring Technologies
  such as Vibration Analysis. Vibration Analysis Experience is highly desirable.&nbsp;</li><li><strong>Relationship
  driven:</strong> You possess excellent customer-facing skills with demonstrated
  success in interfacing with enterprise clients. You have successfully partnered
  with sales teams to drive the sales process and close large enterprise deals. You
  are relentless when it comes to working with internal teams to improve process and
  workflows.</li><li><strong>Your playground:</strong> You have a technical understanding
  of IT, IoT, and data sources with strong knowledge of Industrial MFG/SC, IoT, and
  Industrial systems like CMMS and MES. Your experience with data science/data engineering
  is a plus.</li><li><strong>Superb communication skills: </strong>You love presenting
  to customers and have the ability to drive complex, technical discussions at all
  levels within an enterprise organization. Engage in storytelling with the customer
  to drive value realization in the Presales phase. Craft questions for customers
  to identify pain points to intersect a solution fit.&nbsp;</li></ul><br><p>We offer
  several perks that include flexible PTO, medical/dental/vision insurance, 401(k)
  match, stock options, paid parental leave, and WFH and phone stipend.</p><p>The
  pay range for this position in Colorado, California and New York City is $160,000-$200,000
  that is composed of a 75/25 split of base salary + variable. This is the lowest
  to highest salary we in good faith believe we would pay for this role at the time
  of this posting. The pay offered may vary depending on several factors including,
  but not limited to, relevant education, qualifications, certifications, and experience.</p><p>Augury
  is a people-first organization. We believe in fostering an inclusive environment
  in which employees feel encouraged to share their unique perspectives, leverage
  their strengths, and act authentically. We know that diverse teams are strong teams,
  and we welcome those from all backgrounds and varying experiences. We are committed
  to providing employees with a work environment free of discrimination and harassment.
  We believe that diversity is more than just good intentions, and we are committed
  to creating an inclusive environment for all employees.</p><p>Augury is a proud
  equal opportunity employer, we strive to create a work environment in which everyone,
  all applicants, employees, customers, guests, and vendors feel safe and comfortable.
  We commit to maintain a workplace that is free of any type of harassment and does
  not tolerate anyone intimidating, humiliating, or hurting others. We prohibit willful
  discrimination based on age, gender, ethnicity, race, color, religion, political
  opinions, sexual orientation, sexual identity or expression, military or veteran
  status, disability or any other characteristic protected by law.</p><p><p>Augury
  is a people-first organization. We believe in fostering an inclusive environment
  in which employees feel encouraged to share their unique perspectives, leverage
  their strengths, and act authentically. We know that diverse teams are strong teams,
  and we welcome those from all backgrounds and varying experiences. We are committed
  to providing employees with a work environment free of discrimination and harassment.
  We believe that diversity is more than just good intentions, and we are committed
  to creating an inclusive environment for all employees.</p><p>Augury is a proud
  equal opportunity employer, we strive to create a work environment in which everyone,
  all applicants, employees, customers, guests, and vendors feel safe and comfortable.
  We commit to maintain a workplace that is free of any type of harassment and does
  not tolerate anyone intimidating, humiliating, or hurting others. We prohibit willful
  discrimination based on age, gender, ethnicity, race, color, religion, political
  opinions, sexual orientation, sexual identity or expression, military or veteran
  status, disability or any other characteristic protected by law.</p></p>'
