description_html: '<p>Location: Remote (US) | Travel to San Jose / Bay Area as needed&nbsp;</p><p><span
  style="color: rgba(54, 95, 145, 1)"><strong>About TheDomes.com&nbsp;</strong></span></p><p>TheDomes.com
  is launching The Domes—a new immersive entertainment platform featuring multiple
  dome theaters designed for branded experiences, live events, sponsorships, and cultural
  programming. Our first flagship venue, The Domes: San Jose, is launching in Silicon
  Valley, California, with additional locations planned nationally.&nbsp;</p><p>TheDomes.com
  was launched by the team behind Omnispace360, an experience-based XR technology
  company with over 10 years of experience creating immersive environments that delight
  audiences and elevate brands. Our work spans planetariums, fulldome theaters, VR
  environments, digital twins, projection mapping, and large-scale immersive installations.&nbsp;</p><p>Brand
  partners and customers include the NFL, Marriott Hotels, The PGA Tour, PepsiCo,
  Seattle International Film Festival, Austin City Limits Festival, and Sundance Film
  Festival.&nbsp;</p><p><span style="color: rgba(54, 95, 145, 1)"><strong>The Role&nbsp;</strong></span></p><p>We
  are seeking a Director of Business Development to play a critical role across revenue
  generation and investor pipeline development.&nbsp;</p><p>This is a senior, hands-on
  role responsible for:&nbsp;</p><ul><li>Sponsorship and event sales for the national
  venue network, starting with The Domes: San Jose</li><li>Strategic partnerships
  and branded activations</li><li>Supporting fundraising and investor pipeline development&nbsp;</li></ul><p>&nbsp;</p><p>This
  role reports directly to the CEO and will work closely with creative, production,
  and executive teams. While the position can be fully remote, candidates should be
  able to travel to San Jose for a few days once a month.&nbsp;</p><p><span style="color:
  rgba(54, 95, 145, 1)"><strong>Key Responsibilities&nbsp;</strong></span></p><p><span
  style="color: rgba(79, 129, 189, 1)"><strong>Revenue &amp; Partnerships&nbsp;</strong></span></p><ul><li>Develop
  and manage a high-activity sales funnel from outreach to close</li><li>Drive sponsorship
  sales, branded events, and venue partnerships for The Domes</li><li>Build relationships
  with brands, agencies, event producers, and corporate partners</li><li>Negotiate
  sponsorship packages, event deals, and long-term partnerships</li><li>Collaborate
  with internal creative and production teams to deliver compelling proposals&nbsp;</li></ul><p><span
  style="color: rgba(79, 129, 189, 1)"><strong>Fundraising &amp; Investor Pipeline&nbsp;</strong></span></p><ul><li>Support
  fundraising initiatives for The Domes</li><li>Support and manage an investor pipeline
  (angels, strategic investors, funds)</li><li>Coordinate investor outreach, meetings,
  and follow-ups</li><li>Help prepare pitch materials, decks, and supporting documentation</li><li>Maintain
  organized CRM records for investors and partners&nbsp;</li></ul><p><span style="color:
  rgba(79, 129, 189, 1)"><strong>Strategy &amp; Execution&nbsp;</strong></span></p><ul><li>Develop
  go-to-market strategies for new venues and events</li><li>Support representing The
  Domes at occasional conferences and networking events</li><li>Track pipeline performance
  and report on progress toward revenue goals</li><li>Maintain disciplined CRM usage
  and sales administration&nbsp;</li></ul><p><span style="color: rgba(54, 95, 145,
  1)"><strong>Qualifications&nbsp;</strong></span></p><ul><li>5+ years experience
  in business development, strategic partnerships, sponsorship sales, or enterprise
  sales</li><li>Proven track record closing five- or six-figure deals or sponsorships</li><li>Experience
  working with C-level executives, brand leaders, or investors</li><li>Strong written
  and verbal communication skills</li><li>Comfortable operating in a fast-paced, evolving
  environment</li><li>Highly self-motivated, organized, and professional</li><li>Experience
  in experiential marketing, live events, media, tech, or entertainment is strongly
  preferred</li><li>Bay Area network and familiarity with San Jose / Silicon Valley
  is a major plus&nbsp;</li></ul><p><span style="color: rgba(54, 95, 145, 1)"><strong>You
  Might Be a Fit If...&nbsp;</strong></span></p><ul><li>You’ve sold sponsorships for
  festivals, conferences, or live entertainment</li><li>You’ve worked at an experiential
  agency and want to move to the venue/brand side</li><li>You’ve helped raise capital
  or build investor relationships</li><li>You’ve managed brand partnerships at a sports
  property, entertainment venue, or media company</li><li>You’re excited by immersive
  technology and want to help shape an emerging category&nbsp;</li></ul><p><span style="color:
  rgba(54, 95, 145, 1)"><strong>Compensation &amp; Benefits&nbsp;</strong></span></p><ul><li>Base
  salary: $80,000–$120,000+ (Depending on experience)</li><li>Commission &amp; performance
  incentives</li><li>Meaningful equity participation with standard vesting</li><li>Flexible
  remote work environment</li><li>Opportunity to help build and scale a new immersive
  venue platform from the ground up</li><li>Starting immediately/ASAP&nbsp;</li></ul><p><span
  style="color: rgba(54, 95, 145, 1)"><strong>Why This Role Is Special&nbsp;</strong></span></p><p>This
  is not a traditional sales role.&nbsp;</p><p>You will:&nbsp;</p><ul><li>Work at
  the intersection of technology, exhibitions, and culture</li><li>Have real ownership
  over partnerships and fundraising outcomes</li><li>Be a part of the future of immersive
  entertainment&nbsp;</li></ul><p><span style="color: rgba(54, 95, 145, 1)"><strong>How
  to Apply&nbsp;</strong></span></p><p>Please submit:&nbsp;</p><ul><li>Your resume
  to the email provided</li><li>Required Step - As part of our initial screening process,
  we ask all applicants to submit a short video introduction <span style="color: rgba(0,
  0, 255, 1)"><u>https://www.videoask.com/f0mahhttx</u></span>&nbsp;</li></ul>'
