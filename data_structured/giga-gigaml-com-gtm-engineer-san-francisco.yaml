title: GTM Engineer - San Francisco
company: Giga (gigaml.com)
category: Software
location: San Francisco, California, USA
date_posted: '2026-03-08'
description_html: '<b><strong>About Giga</strong></b><p>Giga has recently raised a
  $61M Series A and has several paying customers, including DoorDash. We’re building
  the next generation of customer experience - real-time AI agents that can understand
  emotion, resolve issues instantly, and scale across the world’s largest enterprises.</p><p>It’s
  an exciting inflection point for the company. While we have been successful, we
  have larger ambitions. Our goal is to become the go-to AI platform for all enterprise
  automation, powered by our voice superintelligence. To achieve this, we need more
  great engineers.</p><p>The work affects millions of people every day and our engineers
  have autonomy and make true impact. This opportunity is unique because we have brilliant
  founders, have found commercial success, and see a clear path to becoming a generational
  company. Some further info about us:</p><ul><li><p><u>Voice AI startup Giga raises
  $61M Series A</u></p></li><li><p><u>DoorDash and Giga Partnership</u></p></li></ul><p>Giga
  builds AI agents trusted by the largest B2C companies in the world. Industry leaders
  like DoorDash rely on Giga to automate their most complex support and operations
  workflows across voice, chat, and email. If being a part of this resonates with
  you, please apply!</p><p></p><b><strong>About the Role</strong></b><p>Giga is seeking
  a GTM Engineer to architect, automate, and scale the systems that power Giga''s
  revenue engine. This role is for someone who is growth minded and technical. They
  understand business context and requirements, formulate unique ideas and perspectives,
  then go execute them from end to end.</p><p>Working closely with Sales, Sales Development,
  Solutions Engineering, Marketing, and RevOps leadership, you''ll own the technical
  infrastructure that turns go-to-market strategy into pipeline. You''ll integrate
  modern technology solutions, build with AI, engineer data flows, and deploy intelligent
  automation across the full GTM motion - from prospect signal detection to customer
  renewal.</p><p>The person in this role will make sure our own go-to-market runs
  with the same precision and intelligence we deliver to our customers. This person
  must be a self-starter and be able to work with high-autonomy - you''ll be building
  the revenue engine for a company whose customers trust us to talk to millions of
  their customers every day.</p><b></b><b><strong>What You''ll Do</strong></b><ul><li><p><strong>Architect
  the GTM tech stack:</strong> Build an AI native tech stack with seamless integrations.
  Build a cohesive, automated engine that centralizes data in CRM and eventually data
  warehouse. (Salesforce, Gong, Clay, Claude Cowork)<br></p></li><li><p><strong>Automate
  what slows us down:</strong> Identify repetitive work across the GTM org - account
  research, CRM hygiene, post-call follow-ups - and replace it with intelligent automation
  using APIs, webhooks, and AI agents.<br></p></li><li><p><strong>Own data integrity
  end-to-end:</strong> Build and maintain the data flows, enrichment logic, and sync
  architecture that keep our systems accurate, deduped, and trustworthy.<br></p></li><li><p><strong>Turn
  strategy into systems:</strong> Partner with leadership to translate GTM strategy
  into automated playbooks, dynamic scoring models, and signal-based workflows that
  drive measurable revenue outcomes.</p></li></ul><p></p><ul><li><p><strong>Systematic
  pipeline generation:</strong> Build the outbound engine from scratch - enrichment
  logic, intent triggers, AI-personalized touchpoints, and human review checkpoints
  - all wired to a single output: qualified meetings booked.</p></li></ul><p></p><b><strong>You
  May Be a Good Fit If You:</strong></b><ul><li><p><strong>Have 3–5+ years of experience</strong>
  operating in a Growth, GTM Engineer, or Revenue Operations role. We are open to
  candidates that have a technical background that have worked with a GTM team in
  other capacities.</p></li><li><p><strong>Are a builder and systems thinker:</strong>
  You want to build moonshot ideas, not just toggle settings. You''re the person who
  sees a manual process and immediately starts thinking about the API call or AI agent
  that replaces it. You see the GTM stack as an interconnected machine, not a collection
  of point solutions.</p></li><li><p><strong>Constant iteration:</strong> Be a Kaizen
  methodology champion by building, shipping and iterating fast. You thrive in ambiguity,
  operate with high ownership, and move fast without waiting for perfect requirements.
  But you know when to slow down and ensure you’re shipping the highest quality work
  possible.</p></li><li><p><strong>Are technically capable:</strong> Comfortable working
  with APIs, webhooks, and data integrations. You''ve worked with Python, JavaScript,
  or SQL in a professional context and can navigate technical documentation without
  hand-holding.</p></li><li><p><strong>Are GTM-fluent:</strong> You understand the
  GTM funnel - not just the data model, but the logic behind every stage. You know
  what actually converts pipeline because you''ve worked in or alongside GTM teams.</p></li></ul><p></p><b><strong>Strong
  Candidates May Also Have:</strong></b><ul><li><p>Background at a fast-moving B2B
  SaaS / AI startup or even in an agency landscape helping similar companies</p></li><li><p>Hands-on
  experience with CRM’s and Clay, bonus points for building data warehouses</p></li><li><p>Experience
  designing enrichment waterfalls and managing complex data sourcing across multiple
  providers</p></li><li><p>Experience centralizing selling signals from multiple data
  sources into a single location</p></li><li><p>You''ve built or deployed AI agents
  for GTM use cases - from ideation to realization</p></li><li><p>You''ve automated
  an outbound or inbound motion end-to-end and can point to the pipeline it created</p></li></ul><p></p><b><strong>Perks
  &amp; Benefits</strong></b><ul><li><p>Competitive equity</p></li><li><p>Catered
  lunch daily + dinner stipend</p></li><li><p>$150/month wellness benefit (gym, fitness
  classes, mental health)</p></li><li><p>Medical, dental, and vision coverage</p></li><li><p>401(k)
  plan</p></li><li><p>Commuter benefits</p></li></ul><p>---</p><p>Giga is an equal
  opportunity employer. We''re committed to providing equal employment opportunities
  regardless of race, color, religion, sex, sexual orientation, gender identity, national
  origin, age, disability, veteran status, or any other characteristic protected by
  law.</p>'
description_text: 'About Giga Giga has recently raised a $61M Series A and has several
  paying customers, including DoorDash. We’re building the next generation of customer
  experience - real-time AI agents that can understand emotion, resolve issues instantly,
  and scale across the world’s largest enterprises. It’s an exciting inflection point
  for the company. While we have been successful, we have larger ambitions. Our goal
  is to become the go-to AI platform for all enterprise automation, powered by our
  voice superintelligence. To achieve this, we need more great engineers. The work
  affects millions of people every day and our engineers have autonomy and make true
  impact. This opportunity is unique because we have brilliant founders, have found
  commercial success, and see a clear path to becoming a generational company. Some
  further info about us: Voice AI startup Giga raises $61M Series A DoorDash and Giga
  Partnership Giga builds AI agents trusted by the largest B2C companies in the world.
  Industry leaders like DoorDash rely on Giga to automate their most complex support
  and operations workflows across voice, chat, and email. If being a part of this
  resonates with you, please apply! About the Role Giga is seeking a GTM Engineer
  to architect, automate, and scale the systems that power Giga''s revenue engine.
  This role is for someone who is growth minded and technical. They understand business
  context and requirements, formulate unique ideas and perspectives, then go execute
  them from end to end. Working closely with Sales, Sales Development, Solutions Engineering,
  Marketing, and RevOps leadership, you''ll own the technical infrastructure that
  turns go-to-market strategy into pipeline. You''ll integrate modern technology solutions,
  build with AI, engineer data flows, and deploy intelligent automation across the
  full GTM motion - from prospect signal detection to customer renewal. The person
  in this role will make sure our own go-to-market runs with the same precision and
  intelligence we deliver to our customers. This person must be a self-starter and
  be able to work with high-autonomy - you''ll be building the revenue engine for
  a company whose customers trust us to talk to millions of their customers every
  day. What You''ll Do Architect the GTM tech stack: Build an AI native tech stack
  with seamless integrations. Build a cohesive, automated engine that centralizes
  data in CRM and eventually data warehouse. (Salesforce, Gong, Clay, Claude Cowork)
  Automate what slows us down: Identify repetitive work across the GTM org - account
  research, CRM hygiene, post-call follow-ups - and replace it with intelligent automation
  using APIs, webhooks, and AI agents. Own data integrity end-to-end: Build and maintain
  the data flows, enrichment logic, and sync architecture that keep our systems accurate,
  deduped, and trustworthy. Turn strategy into systems: Partner with leadership to
  translate GTM strategy into automated playbooks, dynamic scoring models, and signal-based
  workflows that drive measurable revenue outcomes. Systematic pipeline generation:
  Build the outbound engine from scratch - enrichment logic, intent triggers, AI-personalized
  touchpoints, and human review checkpoints - all wired to a single output: qualified
  meetings booked. You May Be a Good Fit If You: Have 3–5+ years of experience operating
  in a Growth, GTM Engineer, or Revenue Operations role. We are open to candidates
  that have a technical background that have worked with a GTM team in other capacities.
  Are a builder and systems thinker: You want to build moonshot ideas, not just toggle
  settings. You''re the person who sees a manual process and immediately starts thinking
  about the API call or AI agent that replaces it. You see the GTM stack as an interconnected
  machine, not a collection of point solutions. Constant iteration: Be a Kaizen methodology
  champion by building, shipping and iterating fast. You thrive in ambiguity, operate
  with high ownership, and move fast without waiting for perfect requirements. But
  you know when to slow down and ensure you’re shipping the highest quality work possible.
  Are technically capable: Comfortable working with APIs, webhooks, and data integrations.
  You''ve worked with Python, JavaScript, or SQL in a professional context and can
  navigate technical documentation without hand-holding. Are GTM-fluent: You understand
  the GTM funnel - not just the data model, but the logic behind every stage. You
  know what actually converts pipeline because you''ve worked in or alongside GTM
  teams. Strong Candidates May Also Have: Background at a fast-moving B2B SaaS / AI
  startup or even in an agency landscape helping similar companies Hands-on experience
  with CRM’s and Clay, bonus points for building data warehouses Experience designing
  enrichment waterfalls and managing complex data sourcing across multiple providers
  Experience centralizing selling signals from multiple data sources into a single
  location You''ve built or deployed AI agents for GTM use cases - from ideation to
  realization You''ve automated an outbound or inbound motion end-to-end and can point
  to the pipeline it created Perks &amp; Benefits Competitive equity Catered lunch
  daily + dinner stipend $150/month wellness benefit (gym, fitness classes, mental
  health) Medical, dental, and vision coverage 401(k) plan Commuter benefits --- Giga
  is an equal opportunity employer. We''re committed to providing equal employment
  opportunities regardless of race, color, religion, sex, sexual orientation, gender
  identity, national origin, age, disability, veteran status, or any other characteristic
  protected by law.'
