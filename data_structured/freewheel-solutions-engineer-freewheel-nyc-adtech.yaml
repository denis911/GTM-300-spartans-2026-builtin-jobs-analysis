  business needs and technical feasibility for clients based on current technology
  architecture, and develops and documents strategic, cost-effective business and
  technical solutions Participates in the product release cycle through requirements
  gathering Captures technical details of client-specific implementations, and maintain
  this information within well-updated documentation of clients'' technology architecture
  Assists in preparation of materials for client renewal opportunities, product upsells,
  business reviews, account plans, etc. Employees at all levels are expected to: Understand
  our Operating Principles; make them the guidelines for how you do your job. Own
  the customer experience - think and act in ways that put our customers first, give
  them seamless digital options at every touchpoint, and make them promoters of our
  products and services. Know your stuff - be enthusiastic learners, users and advocates
  of our game-changing technology, products and services, especially our digital tools
  and experiences. Win as a team - make big things happen by working together and
  being open to new ideas. Be an active part of the Net Promoter System - a way of
  working that brings more employee and customer feedback into the company - by joining
  huddles, making call backs and helping us elevate opportunities to do better for
  our customers. Drive results and growth. Support a culture of inclusion in how you
  work and lead. Do what''s right for each other, our customers, investors and our
  communities. Disclaimer: This information has been designed to indicate the general
