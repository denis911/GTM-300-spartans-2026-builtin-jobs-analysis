description_html: 'FreeWheel, a Comcast company, provides comprehensive ad platforms
  for publishers, advertisers, and media buyers. Powered by premium video content,
  robust data, and advanced technology, we''re making it easier for buyers and sellers
  to transact across all screens, data types, and sales channels. As a global company,
  we have offices in nine countries and can insert advertisements around the world.<br><b>Job
  Summary</b><br>FreeWheel''s Client Solutions team takes an innovative, collaborative,
  and white-glove approach in providing best-in-class services and forward-looking
  business solutions to the top players in the Television industry. We seek an experienced,
  passionate, and highly motivated Solutions Engineer to help customers achieve their
  business goals by providing technical scoping, industry expertise, and custom solutions
  - while building long term relationships within the industry.  The Client Solutions
  team is tasked with developing creative and pioneering solutions to the business
  challenges faced by the world''s largest media companies. We are a vital partner
  for multiple teams, and your technical communication skills, passion for media and
  big data, and business acumen will all contribute to the development of complex
  solutions to power the future of Television. Your solutions will take many forms,
  from POCs and demos, to large multi-faceted deployments. Working across the entire
  organization, you will have the opportunity to work directly on first-of-their-kind
  solutions in delivery models and monetization that are changing the way the world
  consumes media.  Candidates with industry experience will be prioritized.  This
  position is not eligible for visa sponsorship.  Applicants must be authorized to
  work for Comcast in the United States without a current or potential future need
  for sponsorship.<br><b>Job Description</b><br>Qualifications:<br><ul><li>Degree
  in STEM, or equivalent practical experience</li><li>Experience working within technology
  and/or the advertising and media industry</li><li>Experience working in advertising
  technology or related SaaS role</li><li>Experience working in a sales engineering
  or customer facing role</li><li>Experience working directly with 3rd party technology
  vendors</li><li>Experience with SQL or equivalent</li><li>Familiarity with RESTful
  APIs and HTTP methods for customer implementation guidance</li><li>Ability to analyze
  large data sets to inform business decisions</li><li>Experience with data visualization
  tools such as Kibana, Grafana, or equivalent BI software</li></ul><br>Working Knowledge
  of the following a big plus:<br><ul><li>Familiarity with IAB standards including
  openRTB</li><li>Object Oriented Programming: JS, Python, etc</li><li>Web technologies
  such as: HTTP, HTML5, JSON, XML, etc</li></ul><br>Responsibilities:<br><ul><li>As
  a trusted partner, providing technical guidance on how to optimize the usage of
  our platform on a day-to-day basis with clients.</li><li>Execution of implementation
  projects, working to grow clients'' product usage through new integrations</li><li>Analyzes
  business needs and technical feasibility for clients based on current technology
  architecture, and develops and documents strategic, cost-effective business and
  technical solutions</li><li>Participates in the product release cycle through requirements
  gathering</li><li>Captures technical details of client-specific implementations,
  and maintain this information within well-updated documentation of clients'' technology
  architecture</li><li>Assists in preparation of materials for client renewal opportunities,
  product upsells, business reviews, account plans, etc.</li></ul><br><b>Employees
  at all levels are expected to:</b><br><ul><li>Understand our Operating Principles;
  make them the guidelines for how you do your job.</li><li>Own the customer experience
  - think and act in ways that put our customers first, give them seamless digital
  options at every touchpoint, and make them promoters of our products and services.</li><li>Know
  your stuff - be enthusiastic learners, users and advocates of our game-changing
  technology, products and services, especially our digital tools and experiences.</li><li>Win
  as a team - make big things happen by working together and being open to new ideas.</li><li>Be
  an active part of the Net Promoter System - a way of working that brings more employee
  and customer feedback into the company - by joining huddles, making call backs and
  helping us elevate opportunities to do better for our customers.</li><li>Drive results
  and growth.</li><li>Support a culture of inclusion in how you work and lead.</li><li>Do
  what''s right for each other, our customers, investors and our communities.</li></ul><br><b>Disclaimer:</b><br><ul><li>This
  information has been designed to indicate the general nature and level of work performed
  by employees in this role. It is not designed to contain or be interpreted as a
  comprehensive inventory of all duties, responsibilities and qualifications.</li></ul><br>Comcast
  is an equal opportunity workplace.  We will consider all qualified applicants for
  employment without regard to race, color, religion, age, sex, sexual orientation,
  gender identity, national origin, disability, veteran status, genetic information,
  or any other basis protected by applicable law.<br><b>Skills:</b><br>Technical Documents;
  Problem Solving; Troubleshooting; Critical Thinking; Solution Engineering<br><b>Salary:</b><br>Primary
  Location Pay Range: $90,527.19 - $135,790.78<br>Comcast intends to offer the selected
  candidate base pay within this range, dependent on job-related, non-discriminatory
  factors such as experience. The application window is 30 days from the date job
  is posted, unless the number of applicants requires it to close sooner or later.<br>Base
  pay is one part of the Total Rewards that Comcast provides to compensate and recognize
  employees for their work. Most sales positions are eligible for a Commission under
  the terms of an applicable plan, while most non-sales positions are eligible for
  a Bonus. Additionally, Comcast provides best-in-class Benefits to eligible employees.
  We believe that benefits should connect you to the support you need when it matters
  most, and should help you care for those who matter most. That?s why we provide
  an array of options, expert guidance and always-on tools, that are personalized
  to meet the needs of your reality ? to help support you physically, financially
  and emotionally through the big milestones and in your everyday life. Please visit
  the  compensation and benefits summary  on our careers site for more details.<br><b>Education</b><br>Bachelor''s
  Degree<br>While possessing the stated degree is preferred, Comcast also may consider
  applicants who hold some combination of coursework and experience, or who have extensive
  related professional experience.<br><b>Relevant Work Experience</b><br>2-5 Years'
