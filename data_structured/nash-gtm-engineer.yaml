description_html: '<p></p><b><strong>Background</strong></b><p>Nash powers the delivery
  infrastructure behind some of the most recognizable brands in commerce: Walmart,
  Urban Outfitters, 7-Eleven, and platforms like Shopify and Toast. As we scale, our
  GTM motion needs to keep pace. We need someone who can turn our growth systems into
  a competitive advantage, building the infrastructure that finds, captures, and converts
  demand across segments.<br></p><b><strong>The Role</strong></b><p>We''re hiring
  a GTM Engineer to own Nash''s growth infrastructure: the systems, tooling, and workflows
  that find, capture, and scale our customer base across Enterprise and Mid-Market
  segments.<br></p><p>This is a hands-on role for someone who builds systems and campaigns.
  You''ll own the growth stack (Clay, Apollo, HubSpot, Customer.io, Webflow), architect
  automation that drives pipeline, and work cross-functionally with Product, Data,
  Sales, and Partnerships to turn signals into action. You''ll move fast, connect
  dots across outbound, inbound, lifecycle, and CRO, and scale what works.<br><strong>What
  You''ll Do</strong></p><ul><li><p>Build automated outbound engines that scale targeted
  outreach across ICPs and target personas across Enterprise and Mid-Market segments</p></li><li><p>Turn
  signals (site activity, content consumption, intent) into automated actions</p></li><li><p>Own
  nurture tracks across early interest, evaluation, rollout, and expansion</p></li><li><p>Lead
  CRO across key touchpoints using structured experiments</p></li><li><p>Own demand
  capture: SEO, paid search, targeted social, retargeting</p></li><li><p>Build inbound
  routing, scoring, and follow-up systems</p></li><li><p>Create ADR-ready systems:
  cadences, messaging, triggers, follow-up logic</p></li><li><p>Build partner-driven
  demand loops</p></li><li><p>Build full-funnel reporting exposing friction and opportunity</p></li><li><p>Test
  new channels and double down on what drives pipeline<br></p></li></ul><b><strong>Requirements</strong></b><ul><li><p>Strong
  experience in growth marketing, growth PM, marketing engineering, revenue engineering,
  or GTM systems roles</p></li><li><p>Proven ability to build outbound, inbound, nurture,
  and CRO programs end-to-end</p></li><li><p>Comfortable with Clay, Apollo, HubSpot,
  Customer.io, Webflow, and adjacent tools</p></li><li><p>Fluency in automation, scoring,
  segmentation, and full-funnel analysis</p></li><li><p>Experience supporting ADR/SDR
  workflows</p></li><li><p>Operates with high ownership and pragmatic execution</p></li><li><p>Comfortable
  experimenting with small budgets and iterating quickly</p></li><li><p>Bonus: logistics,
  commerce infrastructure, or AI exposure<br></p></li></ul><b><strong>Requirements</strong></b><ul><li><p>7+
  years experience experience in growth marketing, growth PM, marketing engineering,
  revenue engineering, or GTM systems roles</p></li><li><p>Proven ability to build
  outbound, inbound, nurture, and CRO programs end-to-end</p></li><li><p>Comfortable
  with Clay, Apollo, HubSpot, Customer.io, Webflow, and adjacent tools</p></li><li><p>Fluency
  in automation, scoring, segmentation, and full-funnel analysis</p></li><li><p>Experience
  supporting ADR/SDR workflows</p></li><li><p>Operates with high ownership and pragmatic
  execution</p></li><li><p>Comfortable experimenting with small budgets and iterating
  quickly</p></li><li><p>Bonus: logistics, commerce infrastructure, or AI exposure</p></li></ul><p></p><b><strong>More
  about Nash.AI</strong></b><b><strong>Nash is building the logistics infrastructure
  for the internet</strong></b><p>Last mile is a $500B industry powering digital commerce
  but managed largely with self managed API integrations. Nash approaches last mile
  orchestration with information completeness solutions from checkout, courier management,
  customer engagement, and post-purchase experience. Doing this enables merchants
  and customers to capture immense efficiencies, drive better customer experience,
  reliability and business outcomes.</p><p>We are working towards a mission of processing
  a double digit percentage of every physical last-mile transaction. We achieve this
  by providing top of the market modules for each step of the customer journey and
  leveraging the network effects from having more information that allows traditional
  competitors to collaborate. It’s a big mission, but we are already seeing strong
  market pull as we are already serving some of the largest retailers in the world
  like Walmart, 7-Eleven and Woolworths.</p><p>Nash was founded in 2021 by Mahmoud
  Ghulman (2x Founder, MIT) and Aziz Alghunaim (2x Founder, 2x YC, Ex-Palantir, MIT)
  and has raised funding from top investors, including Y-Combinator and a16z, to build
  the world’s best logistics infrastructure platform. We are based in SF.</p><p></p><b><strong>What
  You’ll Love About Us</strong></b><p>✅ Early-stage, well-funded startup – directly
  impact the company and grow your career!<br>✅ Quarterly broader team on-sites to
  bond with teammates<br>✅ Competitive compensation and opportunity for equity<br>✅
  Flexible paid time off<br>✅ Health, dental, and vision insurance</p><p></p><br>#BI-Remote'
