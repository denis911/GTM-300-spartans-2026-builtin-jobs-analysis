description_html: '<p>Netic is the AI revenue engine for essential services who are
  the backbone of the American economy. </p><p><strong>With $43M in funding from Founders
  Fund, Greylock, Hanabi, and Dylan Field who led our Series B, we helped our customers
  book hundreds of thousands of jobs across services industries in North America.</strong>
  There are now companies operating entirely AI-first on Netic. </p><p>You’ll join
  our team with relentless builders from Scale, Databricks, HRT, Meta, MIT, Stanford,
  and Harvard in bringing frontier AI to the physical economy, where the problems
  are hard, the data is complex, and the impact is immediate and tangible.</p><b>About
  the role</b><p>We are looking for a GTM Engineer to set the standard for how we
  use data and systems to not only build our own GTM engine but also help our customers
  build theirs.</p><p>At Netic, we currently are laying the foundation for the best
  GTM engine in tech. We need to build the TAM, track signals against it, choose the
  right set of tools to buy vs. build, set up an environment for all marketers and
  sellers to effectively leverage AI and much more.</p><p>Four our customers, we get
  to do the same.</p><p>This is a perfect opportunity for the hungriest of GTM Engineers
  that cares about building sophisticated systems that have an outsized impact on
  revenue. If you’re interested, send a 2 minute video of something you’ve built to
  <u>noah@netic.ai</u>.</p><p></p><b>What you’ll do</b><ul><li><p>Level up how we
  map the essential service TAM across the US</p></li><li><p>Come up with, test, and
  monitor the best intent signals against our database</p></li><li><p>Help inform
  a lot of Netic’s early tech stack</p></li><li><p>Build the foundational internal
  tools, workflows, and automations for sales and marketing at Netic to use &amp;
  leverage AI to be more effective</p></li><li><p>Come up with ways to use GTM Engineering
  principles to help our customers be more successful</p></li><li><p>Build a flywheel
  based on customer conversations to accelerate our understanding of our users</p></li><li><p>Dig
  into the Netic customer usage data to inform TOF campaigns and messaging</p></li><li><p>Chip
  in wherever is needed as we scale the team</p></li></ul><p></p><b>What you’ll bring</b><ul><li><p><strong>3+
  years in GTM Engineering,</strong> sales, growth, RevOps or a MarketingOps role</p></li><li><p><strong>Strong
  technical foundations</strong> – you can write some amount of code yourself and
  you understand how to set up the right architecture for systems that can scale</p></li><li><p><strong>Great
  business intuition.</strong> You have demonstrated experience moving the needle
  on the most important metrics you have owned and choosing the right set of initiatives
  to focus on</p></li><li><p><strong>Deep curiosity. </strong>You tinker in your free
  time and have demonstrated high levels of curiosity + running down rabbit holes.</p></li><li><p><strong>Hustle
  and grit.</strong> You thrive in ambiguity, take ownership of new problems, and
  iterate quickly until you land what works.</p></li><li><p><strong>Exceptional cross-functional
  skills.</strong> You build strong partnerships with Sales and internal partners
  to build systems that are aligned, high leverage, and easy to execute against.</p></li><li><p><strong>High-ownership
  leader.</strong> You set the standard, lead from the front, and take full accountability
  for outcomes.</p></li></ul><p></p><p>We believe fulfillment comes from producing
  your best work with the smartest people together in one room. <strong>All roles
  are in person, in SF (our office is in Jackson Square). </strong>What brings us
  together is our commitment to:</p><ul><li><p>Live to build</p></li><li><p>Run through
  walls and win</p></li><li><p>Obsess over customers in each line of code</p></li><li><p>Lose
  sleep over the "almost perfect"</p></li><li><p>Show internal locus of control</p></li><li><p>Prioritize
  finesse: refinement of first principles thinking, execution, and craftsmanship</p></li></ul><p></p><p><em>We
  are an equal opportunity employer and do not discriminate on the basis of race,
  religion, national origin, gender, sexual orientation, age, veteran status, disability
  or any other legally protected status. </em></p>'
description_text: 'Netic is the AI revenue engine for essential services who are the
  backbone of the American economy. With $43M in funding from Founders Fund, Greylock,
  Hanabi, and Dylan Field who led our Series B, we helped our customers book hundreds
  of thousands of jobs across services industries in North America. There are now
  companies operating entirely AI-first on Netic. You’ll join our team with relentless
  builders from Scale, Databricks, HRT, Meta, MIT, Stanford, and Harvard in bringing
  frontier AI to the physical economy, where the problems are hard, the data is complex,
  and the impact is immediate and tangible. About the role We are looking for a GTM
  Engineer to set the standard for how we use data and systems to not only build our
  own GTM engine but also help our customers build theirs. At Netic, we currently
  are laying the foundation for the best GTM engine in tech. We need to build the
  TAM, track signals against it, choose the right set of tools to buy vs. build, set
  up an environment for all marketers and sellers to effectively leverage AI and much
  more. Four our customers, we get to do the same. This is a perfect opportunity for
  the hungriest of GTM Engineers that cares about building sophisticated systems that
  have an outsized impact on revenue. If you’re interested, send a 2 minute video
  of something you’ve built to noah@netic.ai . What you’ll do Level up how we map
  the essential service TAM across the US Come up with, test, and monitor the best
  intent signals against our database Help inform a lot of Netic’s early tech stack
  Build the foundational internal tools, workflows, and automations for sales and
  marketing at Netic to use &amp; leverage AI to be more effective Come up with ways
  to use GTM Engineering principles to help our customers be more successful Build
  a flywheel based on customer conversations to accelerate our understanding of our
  users Dig into the Netic customer usage data to inform TOF campaigns and messaging
  Chip in wherever is needed as we scale the team What you’ll bring 3+ years in GTM
  Engineering, sales, growth, RevOps or a MarketingOps role Strong technical foundations
  – you can write some amount of code yourself and you understand how to set up the
  right architecture for systems that can scale Great business intuition. You have
  demonstrated experience moving the needle on the most important metrics you have
  owned and choosing the right set of initiatives to focus on Deep curiosity. You
  tinker in your free time and have demonstrated high levels of curiosity + running
  down rabbit holes. Hustle and grit. You thrive in ambiguity, take ownership of new
  problems, and iterate quickly until you land what works. Exceptional cross-functional
  skills. You build strong partnerships with Sales and internal partners to build
  systems that are aligned, high leverage, and easy to execute against. High-ownership
  leader. You set the standard, lead from the front, and take full accountability
  for outcomes. We believe fulfillment comes from producing your best work with the
  smartest people together in one room. All roles are in person, in SF (our office
  is in Jackson Square). What brings us together is our commitment to: Live to build
  Run through walls and win Obsess over customers in each line of code Lose sleep
  over the "almost perfect" Show internal locus of control Prioritize finesse: refinement
  of first principles thinking, execution, and craftsmanship We are an equal opportunity
  employer and do not discriminate on the basis of race, religion, national origin,
  gender, sexual orientation, age, veteran status, disability or any other legally
  protected status.'
