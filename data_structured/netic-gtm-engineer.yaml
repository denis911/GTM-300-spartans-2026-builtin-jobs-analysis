company_overview: We help essential service industries grow on autopilot.Essential
  services power the real economy. Every one of us interacts with these industries
  repeatedly throughout our lives.But these large businesses face real-world constraints—human
  labor, external volatility, compliance, logistics, and physical infrastructure.
  Their operations are complex and often rely on outdated systems and manual workflows,
  and they can’t access the frontier technologies that drive digital-first businesses.In
  a world where startups mostly build for startups, we serve the large enterprises
  in real industries and end users that keep America running. We're a small team of
  relentless builders, ex-founders, and immigrants from top CS schools and tech companies
  who thrive on solving hard problems and making a tangible impact.We are backed by
  the best investors and founders of our generation.
