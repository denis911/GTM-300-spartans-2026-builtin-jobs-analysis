  containerization (Docker), Helm charts 3+ years of experience with observability
  tools: Prometheus/Grafana, Splunk, etc 3+ years of experience with SonarQube, and
  quality gating practices *All Telecommuters will be required to adhere to UnitedHealth
  Group''s Telecommuter Policy. Pay is based on several factors including but not
  limited to local labor markets, education, work experience, certifications, etc.
  In addition to your salary, we offer benefits such as, a comprehensive benefits
  package, incentive and recognition programs, equity stock purchase and 401k contribution
  (all benefits are subject to eligibility requirements). No matter where or when
  you begin a career with us, you''ll find a far-reaching choice of benefits and incentives.
  The salary for this role will range from $72,800 to $130,000 annually based on full-time
  employment. We comply with all minimum wage laws as applicable. Pursuant to the
  San Francisco Fair Chance Ordinance, we will consider for employment qualified applicants
  with arrest and conviction records. Application Deadline: This will be posted for
  a minimum of 2 business days or until a sufficient candidate pool has been collected.
  Job posting may come down early due to volume of applicants. At UnitedHealth Group,
  our mission is to help people live healthier lives and make the health system work
  better for everyone. We believe everyone-of every race, gender, sexuality, age,
  location, and income-deserves the opportunity to live their healthiest life. Today,
  however, there are still far too many barriers to good health which are disproportionately
  experienced by people of color, historically marginalized groups, and those with
  lower incomes. We are committed to mitigating our impact on the environment and
  enabling and delivering equitable care that addresses health disparities and improves
  health outcomes - an enterprise priority reflected in our mission. UnitedHealth
  Group is an Equal Employment Opportunity employer under applicable law and qualified
  applicants will receive consideration for employment without regard to race, national
  origin, religion, age, color, sex, sexual orientation, gender identity, disability,
  or protected veteran status, or any other characteristic protected by local, state,
