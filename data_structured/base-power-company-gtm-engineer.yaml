company_overview: Our mission at Base is to fix the power grid and enable affordable
  and reliable electricity for all. As America electrifies, our outdated power systems
  strain leaving families vulnerable to outages and rising costs. Base deploys home
  batteries that maintain household power during outages while stabilizing the grid
  day-to-day.By creating a distributed energy storage network across Texas, we're
  making electricity more reliable & affordable, and laying the foundation for energy
  abundance at scale.
