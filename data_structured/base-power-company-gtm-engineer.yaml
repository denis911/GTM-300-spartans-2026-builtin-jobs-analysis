description_html: <b><strong>About Base</strong></b><p>Base is America’s next-generation
  power company. We’re rebuilding the foundation of modern civilization–electricity–by
  deploying a vast network of distributed batteries that is transforming today’s fragile,
  centralized grid into a resilient and abundant system. We are engineers, operators,
  and creatives solving some of the most complex, interdisciplinary challenges of
  our time.</p><p></p><b><strong>About the Role</strong></b><p>This role exists to
  build the systems that keep our GTM engine fast, accurate, and scalable. We’re looking
  for a technical, systems-minded individual<strong> </strong>with experience improving
  how GTM teams operate. You’ll work across Sales, Marketing, and Engineering to design
  better workflows, connect data across systems, and build tools that help our teams
  move faster and operate more effectively.</p><p></p><p>This role is ideal for someone
  who enjoys understanding how people work, translating that into system design, and
  building lightweight technical solutions when needed. You won’t be expected to be
  a full-time engineer, but you should feel comfortable working with data, APIs, and
  internal tools to bring ideas to life.</p><p></p><p><strong>What You’ll Do</strong></p><ul><li><p>Work
  with Sales, Marketing, and other GTM teams to optimize how leads, customers, and
  processes move through our systems.</p></li><li><p>Identify bottlenecks and improve
  operational efficiency.</p></li><li><p>Design workflows, automations, and internal
  tools that improve the speed and quality of GTM execution.</p></li><li><p>Collaborate
  with Engineering to ensure clean and consistent data pipelines and integrations
  across CRM and internal tools.</p></li><li><p>Build scalable, lightweight prototypes
  or automations, leveraging AI and cutting-edge technologies to drive process innovation.</p></li><li><p>Improve
  the operating system that connects Sales, Marketing, and CS by identifying gaps
  and shipping fixes.</p></li><li><p>Build a roadmap based on GTM needs, data insights,
  and your own observations.</p><p></p></li></ul><p><strong>What You'll Bring</strong></p><ul><li><p>2+
  years in a product, growth, sales ops, revops, data engineering, or other ops roles.</p></li><li><p>You’re
  a systems thinker who likes understanding how processes fit together across teams.</p></li><li><p>Experience
  with CRM tools or working with GTM teams.</p></li><li><p>You’re comfortable with
  technical concepts, including APIs, automation tools, and data structures.</p></li><li><p>You
  can build simple tools or prototypes using workflow automation (Zapier), no/low-code
  app builders (Retool), basic full-stack apps (Next.js/FastAPI).</p></li><li><p>You
  communicate well with both technical and non-technical stakeholders.</p></li><li><p>Familiarity
  with SQL, scripting, or lightweight coding.</p></li><li><p>Ability to quickly build
  reports, analyze results, and drive action from insights.</p></li></ul><b></b><p></p><b><strong>Our
  Values</strong></b><ul><li><p><strong>First Principles Thinking:</strong> Question
  assumptions. Principles &gt; rules.</p></li><li><p><strong>Operate at Base Pace:</strong>
  Focus on what matters, act quickly, and learn by doing.</p></li><li><p><strong>Give
  &amp; Get Feedback:</strong> Be direct, be humble, and maintain a growth mindset.</p></li><li><p><strong>Everyone’s
  an Owner:</strong> Follow through on commitments and own results.</p></li><li><p><strong>Strong
  Opinions, Loosely Held:</strong> Drive clarity and make calls with imperfect information.</p></li><li><p><strong>Committed
  to the Mission:</strong> Rebuilding the grid is a big challenge. We work hard because
  we care deeply about the impact we’re creating. We work in-person. It’s not a 9-to-5.
  We are all-in.</p></li><li><p><strong>Fun &amp; Optimism Coexist with Grit:</strong>
  Collaboration and celebration coincide with the intensity of building real things.</p></li></ul><p></p><b><strong>Do
  the best work of your life at Base.</strong></b>
description_text: 'About Base Base is America’s next-generation power company. We’re
  rebuilding the foundation of modern civilization–electricity–by deploying a vast
  network of distributed batteries that is transforming today’s fragile, centralized
  grid into a resilient and abundant system. We are engineers, operators, and creatives
  solving some of the most complex, interdisciplinary challenges of our time. About
  the Role This role exists to build the systems that keep our GTM engine fast, accurate,
  and scalable. We’re looking for a technical, systems-minded individual with experience
  improving how GTM teams operate. You’ll work across Sales, Marketing, and Engineering
  to design better workflows, connect data across systems, and build tools that help
  our teams move faster and operate more effectively. This role is ideal for someone
  who enjoys understanding how people work, translating that into system design, and
  building lightweight technical solutions when needed. You won’t be expected to be
  a full-time engineer, but you should feel comfortable working with data, APIs, and
  internal tools to bring ideas to life. What You’ll Do Work with Sales, Marketing,
  and other GTM teams to optimize how leads, customers, and processes move through
  our systems. Identify bottlenecks and improve operational efficiency. Design workflows,
  automations, and internal tools that improve the speed and quality of GTM execution.
  Collaborate with Engineering to ensure clean and consistent data pipelines and integrations
  across CRM and internal tools. Build scalable, lightweight prototypes or automations,
  leveraging AI and cutting-edge technologies to drive process innovation. Improve
  the operating system that connects Sales, Marketing, and CS by identifying gaps
  and shipping fixes. Build a roadmap based on GTM needs, data insights, and your
  own observations. What You''ll Bring 2+ years in a product, growth, sales ops, revops,
  data engineering, or other ops roles. You’re a systems thinker who likes understanding
  how processes fit together across teams. Experience with CRM tools or working with
  GTM teams. You’re comfortable with technical concepts, including APIs, automation
  tools, and data structures. You can build simple tools or prototypes using workflow
  automation (Zapier), no/low-code app builders (Retool), basic full-stack apps (Next.js/FastAPI).
  You communicate well with both technical and non-technical stakeholders. Familiarity
  with SQL, scripting, or lightweight coding. Ability to quickly build reports, analyze
  results, and drive action from insights. Our Values First Principles Thinking: Question
  assumptions. Principles &gt; rules. Operate at Base Pace: Focus on what matters,
  act quickly, and learn by doing. Give &amp; Get Feedback: Be direct, be humble,
  and maintain a growth mindset. Everyone’s an Owner: Follow through on commitments
  and own results. Strong Opinions, Loosely Held: Drive clarity and make calls with
  imperfect information. Committed to the Mission: Rebuilding the grid is a big challenge.
  We work hard because we care deeply about the impact we’re creating. We work in-person.
  It’s not a 9-to-5. We are all-in. Fun &amp; Optimism Coexist with Grit: Collaboration
  and celebration coincide with the intensity of building real things. Do the best
  work of your life at Base.'
