description_html: '<b>Alloy is where you belong!</b><p><span>Alloy helps solve the
  identity risk problem for companies that offer financial products by enabling them
  to outpace fraud and confidently serve more people around the world. Over 700 of
  the world’s largest financial institutions and fintechs turn to Alloy to take control
  of fraud, credit, and compliance risk, and grow with the clearest picture of their
  customers.</span></p><p><span>Through our values: Be Bold, Get Scrappy, Collaborate,
  and Celebrate Our Differences, we are creating a workplace where you can grow, thrive,
  and belong. See how we’ve been continuously recognized and named one of&nbsp;Inc.
  Magazine’s Best Workplaces,&nbsp;Forbes America’s Best Startup Employers,&nbsp;Best
  Fintech to Work for by American Banker, year after year.</span></p><p><span>Check
  out our investors and read more about us here.</span></p><b><strong>About the team</strong></b><p>The
  Client Insights team focuses on helping clients get the most value out of their
  data. We rely on analytics and machine learning to help clients improve their policies,
  better detect fraud, and stay up to date with industry best practices. The Client
  Insights team is made up of data scientists and full stack engineers who are working
  to deliver customer-facing tools that leverage client data to enhance the agent
  experience and quicker detect fraud.&nbsp;</p><p>Alloy operates in a hybrid-work
  environment. We look to foster collaboration and community by having our local employees
  onsite twice a week, and remote employees onsite once a quarter.</p><b><strong>What
  you’ll be doing</strong></b><p>At Alloy, we aim to help our clients protect themselves
  from the rapidly increasing and ever-changing threat of fraud, and our Client Insights
  team is part of the core foundation supporting that effort. With thousands of attributes
  coming from our portfolio of data partners tied to hundreds of millions of entities
  across our customer base, we have a massive trove of data assets at our disposal
  that we’ve only just begun to take advantage of. As a Senior Data Scientist on Client
  Insights, you will own and evolve critical components of Alloy’s predictive modeling
  ecosystem. This is a hands-on senior individual contributor role for someone who
  blends deep modeling expertise with strong production engineering instincts and
  product intuition.</p><p>Your responsibilities will be to:</p><ul><li>Design, develop,
  and deploy advanced statistical and machine learning models that directly impact
  fraud detection and risk decisioning across Alloy’s platform.</li><li>Own the end-to-end
  model lifecycle — from problem framing and feature engineering to deployment, monitoring,
  retraining, and performance optimization.</li><li>Build high-quality, production-ready
  code including feature pipelines, training workflows, evaluation frameworks, and
  observability tooling.</li><li>Partner closely with Engineering and ML Platform
  teams to ensure models are scalable, reliable, and seamlessly integrated into real-time
  and batch decision systems.</li><li>Improve Alloy’s experimentation capabilities
  by designing statistical tests, building evaluation frameworks, and translating
  results into clear, actionable recommendations.</li><li>Advance our ML capabilities
  by introducing reusable modeling components, improving documentation standards,
  and contributing to long-term roadmap planning.</li><li>Conduct exploratory research
  and bespoke analyses to unlock new fraud prevention strategies and support future
  product innovation.</li><li>Provide technical leadership and mentorship to other
  data scientists and cross-functional partners.</li></ul><b><strong>Who we’re looking
  for</strong></b><p>You are:</p><ul><li>Product-minded and business-oriented — you
  understand how modeling decisions translate into customer and company impact.</li><li>Fluent
  in both technical depth and executive communication.</li><li>Comfortable turning
  ambiguous business problems into measurable modeling strategies.</li><li>Passionate
  about building scalable, repeatable, and maintainable ML systems.</li><li>Proactive,
  curious, and driven to raise the bar on data science quality and rigor.</li></ul><p>You
  have:</p><ul><li>6+ years of experience in data science, applied statistics, or
  machine learning in a production environment.</li><li>2+ years leading complex projects
  or initiatives.</li><li>Expert-level proficiency in Python (pandas, NumPy, scikit-learn,
  etc.) and strong SQL skills.</li><li>Experience developing and deploying production
  models, including monitoring, retraining, and performance management.</li><li>Strong
  foundation in statistical methods, experiment design, feature engineering, and model
  interpretability.</li><li>Experience working with unbalanced datasets.</li><li>Experience
  collaborating with engineering teams to productionize models.</li></ul><p>Nice to
  Haves:</p><ul><li>Professional experience in fraud detection</li><li>Experience
  with AWS SageMaker</li><li>Experience using: Airflow, Spark, Dbt, Git, Hex, Looker</li></ul><p>Alloy
  is committed to fair and equitable compensation practices. Below is the anticipated
  starting base compensation range for this role; however, pay may vary depending
  on job-related knowledge, in-demand skills, relevant experience, and/or geography.
  In addition to a competitive base salary, this position is also eligible for equity
  awards in the form of stock options (ISOs) as well as a competitive total benefits
  package. Your recruiter will be happy to walk you through the details and what compensation
  could look like for you specifically!</p><p><em><em>This position has a salary range
  of $165,000 to $230,000.&nbsp;</em></em></p><b><strong>Benefits and Perks&nbsp;</strong></b><ul><li>Unlimited
  PTO and flexible work policy</li><li>Employee stock options</li><li>Medical, dental,
  vision plans with HSA (monthly employer contribution) and FSA options</li><li>401k
  with 100% match up to 4% of annual employee compensation&nbsp;</li><li>Eligible
  new parents receive 16 weeks of paid parental leave&nbsp;</li><li>Home office stipend
  for new employees</li><li>Annual Learning &amp; Development annual stipend</li><li>Well-being
  benefits include access to ClassPass, OneMedical, and Spring Health&nbsp;</li><li>Hybrid
  work environment: our employees local to NYC are expected to work Tuesdays and Thursdays
  from our HQ in Union Square, Manhattan. Tasty lunches catered from a variety of
  local restaurants and frequent employee-organized cultural events contribute to
  our positive office energy. On Monday/Wednesday/Friday most employees Zoom into
  work from home while some take advantage of the quieter office.</li></ul><p>We''re
  a lean team, so your impact will be felt immediately. If this all sounds like a
  good fit for you, why not join us?</p><b><strong>How to Apply</strong></b><p>Apply
  right here. You''ve found the application!</p><p>Alloy is proud to be an equal opportunity
  workplace and employer. We’re committed to equal opportunity regardless of race,
  color, ancestry, religion, gender, gender identity, parental or pregnancy status,
  national origin, sexual orientation, age, citizenship, marital status, disability,
  or veteran status. We are committed to an inclusive interview experience and provide
  reasonable accommodations to applicants with visible and invisible disabilities.
  We encourage applicants to share needed accommodations with their recruiter.</p><p>All
  Alloy jobs are listed on our careers page. Any communication during the recruitment
  process, including interview requests or job offers, will come directly from a recruiting
  team member with an alloy.com email address. We do not use outside applications
  or automated text messaging in our recruiting process. We will not ask for any sensitive
  financial or identification information during the recruiting process. If you’re
  ever unsure, please contact us directly via our website before sharing personal
  information.</p>'
