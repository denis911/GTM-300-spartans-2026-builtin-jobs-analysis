description_html: '<br><b><strong>Who We Are</strong></b><p>Headquartered in New York
  City, Take-Two Interactive Software, Inc. is a leading developer, publisher, and
  marketer of interactive entertainment for consumers around the globe. We develop
  and publish products principally through Rockstar Games, 2K, and Zynga. Our strategy
  is to create hit entertainment experiences, delivered on every platform relevant
  to our audience through a variety of sound business models. Our pillars - creativity,
  innovation, and efficiency - guide us as we strive to create the highest quality,
  most captivating experiences for our consumers. The Company’s common stock is publicly
  traded on NASDAQ under the symbol TTWO. For more corporate and product information
  please visit our website at http://www.take2games.com.</p><p>While our offices (physical
  and virtual) are casual and inviting, we are deeply committed to our core tenets
  of creativity, innovation and efficiency, and individual and team development opportunities.
  Our industry and business are continually evolving and fast-paced, providing numerous
  opportunities to learn and hone your skills. We work hard, but we also like to have
  fun, and believe that we provide a great place to come to work each day to pursue
  your passions.</p><b>&nbsp;</b><b><strong>The Challenge</strong></b><p>The Sr. Workday
  Integration &amp; Extend Developer, will work directly with internal stakeholders
  to design, develop, deploy, and maintain system integrations that transform Workday
  data into consumable and actionable insights.</p><p>The ideal candidate will be
  naturally curious and driven to pursue answers and insights through systems integration,
  data analysis and will have an outstanding ability to communicate requirements,
  design, and solutions in a clear, precise, and actionable manner. They will work
  independently, or collaboratively as part of a team retaining an “end-user perspective”
  seeking to deliver meaningful and purpose driven integration in the most efficient
  way possible.</p><b>&nbsp;</b><b><strong>What You’ll Take On</strong></b><ul><li>Design,
  build and support testing of Workday Extend applications based on client application
  requirements, incorporating functional, security, technical, performance, quality,
  and operations consideration through deployment.</li><li>Support Extend applications,
  enhancements and software releases including making updates, testing, and documentation.</li><li>Use
  existing HR systems to develop and deliver ad hoc, recurring, and self-service integrations.</li><li>Address
  Workday integration and application needs for entire organization, creating new,
  updating existing, maintaining integration systems and applications and other enhancement
  requests.</li><li>Support new system implementations, upgrades and software releases
  from the integrations'' standpoint including making updates, testing and documentation.</li><li>Recommend
  system enhancements to improve system integration capabilities across the organization.</li><li>Support
  mass data upload using Workday EIB.</li><li>Partner with business leaders in designing
  new integrations or enhancing current ones.</li><li>Provide ongoing Workday case
  support in collaboration with HR Data Engineering and HR Technology team members.</li><li>Participate
  in planning, validation and testing of service updates and new releases from Workday.</li><li>Ensure
  data privacy and integrity.</li></ul><b>&nbsp;</b><b><strong>What You Bring</strong></b><ul><li>5+
  years of experience with Workday Studio building sophisticated, multi-endpoint orchestrations,
  EIB &amp; Core Connectors, for specialized modules (like Benefits or Payroll), Workday
  Reporting (RaaS) and Calculated Fields.</li><li>5+ years of experience with Web
  Technologies &amp; Programming, with REST and SOAP APIs, including authentication
  protocols like OAuth 2.0 and SAML, expert-level knowledge of XML, XSLT, XPath, and
  JSON, and MVEL &amp; JavaScript/Java.</li><li>3+ years of experience with Workday
  Extend App Components, Page Builder, and PMD, including Workday Orchestrations,
  Custom Objects &amp; Business Processes. Familiarity with Workday Copilot is a plus.</li><li>Validated
  ability to synthesize information and translate complex information in an easy to
  understand, effective format that is both fit for purpose and audience appropriate.</li><li>Strong
  working knowledge of HR systems, functions, processes and advanced reporting environments.</li><li>Analytical
  skills - the ability to synthesize change quickly using subject and process knowledge.</li><li>Independent
  problem solving – ability to articulate issues across projects and the business.</li><li>Desire
  to learn new tools and think creatively.</li><li>Attention to detail, strong organization
  skills, ability to multitask.</li><li>Highly proficient with Excel and other Office
  products.</li><li>Ability to maintain a high degree of confidentiality.</li><li>Excellent
  oral and written communication skills.</li></ul><b>&nbsp;</b><b><strong>What We
  Offer You</strong></b><ul><li><strong>Great Company Culture</strong>. Ranked as
  one of the most creative and innovative places to work, creativity, innovation,
  efficiency, diversity and philanthropy are among the core tenets of our organization
  and are integral drivers of our continued success.</li><li><strong>Growth</strong>:
  As a global entertainment company, we pride ourselves on creating environments where
  employees are encouraged to be themselves, inquisitive, collaborative and to grow
  within and around the company.</li><li><strong>Work Hard, Play Hard.</strong> Our
  employees bond, blow-off steam, and flex some creative muscles – through corporate
  boot camp classes, company parties, game release events, monthly socials, and team
  challenges.</li><li><strong>Benefits</strong>. Medical (HSA &amp; FSA), dental,
  vision, 401(k) with company match, employee stock purchase plan, commuter benefits,
  in-house wellness program, broad learning &amp; development opportunities, a charitable
  giving platform with company match and more!</li><li><strong>Perks</strong>. Fitness
  allowance, employee discount programs, free games &amp; events and stocked pantries.</li></ul><br><p><em>Please
  be aware that Take-Two does not conduct job interviews or make job offers over third-party
  messaging apps such as Telegram, WhatsApp, or others. Take-Two also does not engage
  in any financial exchanges during the recruitment or onboarding process, and the
  Company will never ask a candidate for their personal or financial information over
  an app or other unofficial chat channel. Any attempt to do so may be the result
  of a scam or phishing exercise. Take-Two’s in-house recruitment team will only contact
  individuals through their official Company email addresses (i.e., via a take2games.com
  email domain). If you need to report an issue or otherwise have questions, please
  contact Careers@take2games.com.</em></p><p><em>As an equal opportunity employer,
  Take-Two Interactive Software, Inc. (“Take-Two”) is committed to fostering and celebrating
  the diverse thoughts, cultures, and backgrounds of its talent, partners, and communities
  throughout its organization. Consistent with this commitment, Take-Two does not
  discriminate or retaliate against any employee or job applicant because of their
  race, color, religion, sex (including pregnancy, sexual orientation, and gender
  identity), national origin, age, disability, and genetic information (including
  family medical history), or on the basis of any other trait protected by applicable
  law. If you need to report a concern or have questions regarding Take-Two’s equal
  opportunity commitment, please contact Careers@take2games.com.</em></p><br>'
