description_html: '<p><p>PartsSource is the<strong> leading technology and software
  platform for managing mission-critical healthcare equipment</strong>. Trusted by
  over 5,000 US hospitals and 15,000 clinical sites, PartsSource empowers providers
  and service organizations to maximize clinical availability for patient care and
  automates the procurement of parts, services and training through a unique digital
  experience.</p><p>PartsSource team members are deeply committed to our mission of
  <strong>Ensuring Healthcare is Always On®</strong>, which is foundational to our
  success and growth. Our vibrant culture is built upon aligned values, shared ownership,
  mutual respect, and a passion for collaborating to solve complex customer problems.</p></p><br><b>About
  the Job Opportunity</b><p>The <strong>GTM Data Engineer</strong> is responsible
  for building and maintaining a single, trusted customer and revenue data foundation
  across Marketing, Sales, and Customer Success. This role partners closely with Revenue
  Operations to ensure all GTM teams operate from a consistent source of truth for
  pipeline, revenue, retention, and growth. You will own how GTM data is structured,
  enriched, validated, and made available—eliminating data ambiguity and enabling
  confident, data-driven decision making.</p><b>What You’ll Do</b><b>GTM Data Modeling
  &amp; Governance</b><p><em>(Technology – Data Engineering: Data Modeling &amp; Architecture,
  Data Quality &amp; Governance)</em></p><ul><li><p>Design and maintain the canonical
  customer, account, and revenue data model across GTM systems</p></li><li><p>Resolve
  identity across contacts, accounts, users, assets, services, and subscriptions</p></li><li><p>Define
  authoritative objects and metrics for pipeline, bookings, renewals, expansion, and
  churn</p></li><li><p>Ensure historical accuracy, data lineage, and consistent metric
  definitions</p></li></ul><b>Data Enrichment, Integration &amp; Pipelines</b><p><em>(Technology
  – Data Engineering: ETL &amp; Data Integration, Data Pipeline Development)</em></p><ul><li><p>Build
  and manage data pipelines across CRM, marketing automation, services, and financial
  systems</p></li><li><p>Identify data gaps and implement enrichment strategies to
  improve completeness and usability</p></li><li><p>Merge datasets into unified customer
  and account views with clear conflict-resolution rules</p></li><li><p>Own schema
  changes, backfills, reprocessing, and validation as systems evolve</p></li></ul><b>Attribution,
  Revenue Logic &amp; Reporting Enablement</b><p><em>(Sales Revenue Operations: Performance
  Metrics &amp; Reporting, Sales Analytics)</em></p><ul><li><p>Implement approved
  attribution and revenue logic consistently across channels and time periods</p></li><li><p>Validate
  sourced, influenced, and assisted revenue before executive reporting</p></li><li><p>Enable
  trusted funnel, pipeline, retention, and expansion reporting within systems of record</p></li><li><p>Reduce
  reliance on spreadsheets and manual reconciliation</p></li></ul><b>GTM Architecture,
  CDP &amp; AI Readiness</b><p><em>(Technology – Systems &amp; Applications: Systems
  Integration, Systems Thinking)</em></p><ul><li><p>Support a warehouse-centric or
  composable CDP approach for GTM data</p></li><li><p>Partner with GTM leadership
  to evolve long-term data architecture</p></li><li><p>Prepare high-quality, LLM-ready
  datasets for AI-enabled GTM workflows</p></li><li><p>Ensure access controls, privacy,
  and compliance requirements are met</p></li></ul><b>What You’ll Bring</b><p><strong>Your
  Background</strong></p><ul><li><p>5+ years in data engineering, analytics engineering,
  or GTM data roles</p></li><li><p>Strong experience with CRM and GTM data models</p></li><li><p>Advanced
  SQL skills and experience with modern data stacks and ETL tools</p></li><li><p>Experience
  supporting attribution, lifecycle, and revenue reporting</p></li><li><p>Familiarity
  with Customer Data Platforms or warehouse-centric CDP approaches</p></li><li><p>Ability
  to work cross-functionally with Marketing, Sales, Customer Success, Finance, and
  RevOps</p></li></ul><b>Who We Want to Meet</b><ul><li><p><strong>Act Like an Owner
  – <em>Accountability &amp; Execution</em></strong>: You take full ownership of GTM
  data quality and follow through to reliable outcomes.</p></li><li><p><strong>Serve
  with Purpose – <em>Business Impact</em></strong>: You connect data architecture
  decisions to revenue visibility and GTM effectiveness.</p></li><li><p><strong>Adapt
  to Thrive – <em>Managing Ambiguity</em></strong>: You remain productive amid evolving
  systems, definitions, and priorities.</p></li><li><p><strong>Collaborate to Win
  – <em>Influence &amp; Communication</em></strong>: You partner effectively with
  RevOps and GTM teams to align on shared metrics.</p></li><li><p><strong>Challenge
  the Status Quo – <em>Data-Informed Decision Making</em></strong>: You use evidence
  and clarity to replace assumptions and debates.</p></li></ul><br><p><p><strong><span>Benefits
  &amp; Perks</span></strong><span> </span><span>&nbsp;</span></p><ul><li><span>Competitive
  compensation package with&nbsp;salary, incentives,&nbsp;company ownership/equity,
  and comprehensive benefits (401k match, health, college debt reduction,&nbsp;and&nbsp;more!)</span><span>&nbsp;</span></li></ul><ul><li><span>Career&nbsp;and
  professional development&nbsp;through training,&nbsp;coaching&nbsp;and new&nbsp;experiences.</span><span>&nbsp;</span></li></ul><ul><li><span>Hybrid
  culture with new &amp; beautiful&nbsp;workspaces&nbsp;that balance flexibility,
  collaboration, and productivity.</span><span>&nbsp;</span></li></ul><ul><li><span>Inclusive
  and diverse community of passionate professionals&nbsp;learning and growing together.</span><span>&nbsp;</span></li></ul><p><span> </span><span>&nbsp;</span></p><p><strong><span>Interested?</span></strong><span> </span><span>&nbsp;</span></p><p><span>We’d&nbsp;love
  to hear from you!&nbsp;&nbsp;Submit your resume and an optional cover letter explaining
  why&nbsp;you’d&nbsp;be a great fit.</span><span>&nbsp;</span></p><p><strong>About
  PartsSource</strong></p><p>Since 2001, PartsSource has evolved into the leading
  technology and software platform for managing mission-critical equipment, serving
  over half of the U.S. hospital infrastructure. Our digital systems modernize and
  automate the procurement of parts, services, technical support, and training for
  HTM professionals to efficiently and effectively maintain their mission-critical
  equipment. PartsSource employs over 700 employees nationwide that committed to supporting
  healthcare providers and ensuring healthcare always on.</p><p>In 2021, Bain Capital
  invested in the business, further accelerating our growth and positive impact within
  the healthcare industry.</p><p><strong>Read more about us here:</strong></p><p>·
  PartsSource Named to Newsweek’s List of the Top 200 America’s Most Loved Workplaces
  for 2024 </p><p>· PartsSource® Named Among the Top 50 Healthcare Technology Companies
  of 2025 </p><p>· PartsSource® Named Among the Top 25 Healthcare Software Companies
  of 2025 </p><p>· PartsSource President and CEO Philip Settimi Named to Top 50 Healthcare
  Technology CEO List 2025 </p><p>· WSJ: Bain Capital Private Equity Scoops Up PartsSource</p><br><p><strong>EEO</strong></p><p>PartsSource,
  Inc., and its affiliates and subsidiaries, provides equal employment opportunities
  to all employees and applicants for employment and prohibits discrimination and
  harassment of any type without regard to race, color, religion, age, sex, national
  origin, disability status, genetics, protected veteran status, sexual orientation,
  gender identity or expression, or any other characteristic protected by federal,
  state or local laws.</p><p>&nbsp;</p><p>This policy applies to all terms and conditions
  of employment, including recruiting, hiring, placement, promotion, termination,
  layoff, recall, transfer, leaves of absence, compensation and training.</p><br><p>Legal
  authorization to work in the U.S. is required.</p><br></p>'
description_text: 'PartsSource is the leading technology and software platform for
  managing mission-critical healthcare equipment . Trusted by over 5,000 US hospitals
  and 15,000 clinical sites, PartsSource empowers providers and service organizations
  to maximize clinical availability for patient care and automates the procurement
  of parts, services and training through a unique digital experience. PartsSource
  team members are deeply committed to our mission of Ensuring Healthcare is Always
  On® , which is foundational to our success and growth. Our vibrant culture is built
  upon aligned values, shared ownership, mutual respect, and a passion for collaborating
  to solve complex customer problems. About the Job Opportunity The GTM Data Engineer
  is responsible for building and maintaining a single, trusted customer and revenue
  data foundation across Marketing, Sales, and Customer Success. This role partners
  closely with Revenue Operations to ensure all GTM teams operate from a consistent
