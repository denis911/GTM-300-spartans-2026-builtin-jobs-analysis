  and enabling confident, data-driven decision making. What You’ll Do GTM Data Modeling
  &amp; Governance (Technology – Data Engineering: Data Modeling &amp; Architecture,
  Data Quality &amp; Governance) Design and maintain the canonical customer, account,
  and revenue data model across GTM systems Resolve identity across contacts, accounts,
  users, assets, services, and subscriptions Define authoritative objects and metrics
  for pipeline, bookings, renewals, expansion, and churn Ensure historical accuracy,
  data lineage, and consistent metric definitions Data Enrichment, Integration &amp;
  Pipelines (Technology – Data Engineering: ETL &amp; Data Integration, Data Pipeline
  Development) Build and manage data pipelines across CRM, marketing automation, services,
  and financial systems Identify data gaps and implement enrichment strategies to
  improve completeness and usability Merge datasets into unified customer and account
  views with clear conflict-resolution rules Own schema changes, backfills, reprocessing,
  and validation as systems evolve Attribution, Revenue Logic &amp; Reporting Enablement
  (Sales Revenue Operations: Performance Metrics &amp; Reporting, Sales Analytics)
  Implement approved attribution and revenue logic consistently across channels and
  time periods Validate sourced, influenced, and assisted revenue before executive
  reporting Enable trusted funnel, pipeline, retention, and expansion reporting within
  systems of record Reduce reliance on spreadsheets and manual reconciliation GTM
  Architecture, CDP &amp; AI Readiness (Technology – Systems &amp; Applications: Systems
  Integration, Systems Thinking) Support a warehouse-centric or composable CDP approach
  for GTM data Partner with GTM leadership to evolve long-term data architecture Prepare
  high-quality, LLM-ready datasets for AI-enabled GTM workflows Ensure access controls,
  privacy, and compliance requirements are met What You’ll Bring Your Background 5+
  years in data engineering, analytics engineering, or GTM data roles Strong experience
  with CRM and GTM data models Advanced SQL skills and experience with modern data
  stacks and ETL tools Experience supporting attribution, lifecycle, and revenue reporting
  Familiarity with Customer Data Platforms or warehouse-centric CDP approaches Ability
  to work cross-functionally with Marketing, Sales, Customer Success, Finance, and
  RevOps Who We Want to Meet Act Like an Owner – Accountability &amp; Execution :
  You take full ownership of GTM data quality and follow through to reliable outcomes.
  Serve with Purpose – Business Impact : You connect data architecture decisions to
  revenue visibility and GTM effectiveness. Adapt to Thrive – Managing Ambiguity :
  You remain productive amid evolving systems, definitions, and priorities. Collaborate
  to Win – Influence &amp; Communication : You partner effectively with RevOps and
  GTM teams to align on shared metrics. Challenge the Status Quo – Data-Informed Decision
  Making : You use evidence and clarity to replace assumptions and debates. Benefits
  &amp; Perks &nbsp; Competitive compensation package with&nbsp;salary, incentives,&nbsp;company
  ownership/equity, and comprehensive benefits (401k match, health, college debt reduction,&nbsp;and&nbsp;more!)
  &nbsp; Career&nbsp;and professional development&nbsp;through training,&nbsp;coaching&nbsp;and
  new&nbsp;experiences. &nbsp; Hybrid culture with new &amp; beautiful&nbsp;workspaces&nbsp;that
  balance flexibility, collaboration, and productivity. &nbsp; Inclusive and diverse
  community of passionate professionals&nbsp;learning and growing together. &nbsp;
  &nbsp; Interested? &nbsp; We’d&nbsp;love to hear from you!&nbsp;&nbsp;Submit your
  resume and an optional cover letter explaining why&nbsp;you’d&nbsp;be a great fit.
  &nbsp; About PartsSource Since 2001, PartsSource has evolved into the leading technology
  and software platform for managing mission-critical equipment, serving over half
  of the U.S. hospital infrastructure. Our digital systems modernize and automate
  the procurement of parts, services, technical support, and training for HTM professionals
  to efficiently and effectively maintain their mission-critical equipment. PartsSource
  employs over 700 employees nationwide that committed to supporting healthcare providers
  and ensuring healthcare always on. In 2021, Bain Capital invested in the business,
