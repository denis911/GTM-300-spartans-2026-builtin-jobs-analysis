company_overview: PartsSource is the leading evidence-based B2B vertical marketplace
  and supply chain software platform used by the healthcare provider and supplier
  ecosystem to improve essential clinical operations, staff productivity, costs, asset
  uptime and supply chain resiliency. Today we help more than 5,000 member hospitals
  and more than 15,000 clinical sites achieve sustainable savings and efficiencies.As
  healthcare’s leading source of the knowledge, processes and components – we can
  transform your supply chain, the way you work and most importantly, ensure healthcare
  is always available. In addition to automating the highly complex workflow associated
  with procurement and vendor management, our team can work with you to identify new
  opportunities for efficiencies and improved availability, so that your healthcare
  is always on
