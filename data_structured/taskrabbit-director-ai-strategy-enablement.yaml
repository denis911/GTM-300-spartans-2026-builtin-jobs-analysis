description_html: <p><b><span><strong>About Taskrabbit:</strong></span></b><p>Taskrabbit
  is a marketplace platform that conveniently connects people with Taskers to handle
  everyday home to-do’s, such as furniture assembly, handyman work, moving help, and
  much more.</p><p>At Taskrabbit, we want to transform lives one task at a time. As
  a company we celebrate innovation, inclusion and hard work. Our culture is collaborative,
  pragmatic, and fast-paced. We’re looking for talented, entrepreneurially minded
  and data-driven people who also have a passion for helping people do what they love.&nbsp;Together
  with IKEA, we’re creating more opportunities for people to earn a consistent, meaningful
  income on their own terms by building lasting relationships with clients in communities
  around the world.</p><p>Taskrabbit is a hybrid company with employees distributed
  across the US and EU and a Built In — Best Places to Work (2022, 2023, 2024) continually
  ranked across multiple national and regional categories.&nbsp;Join us at Taskrabbit,
  where your work will be meaningful, your ideas valued, and your potential unleashed!</p></p><p><strong>This
  role operates on a hybrid schedule requiring two days of in-office collaboration
  per week (Tues + Weds). The position can be based in either our San Francisco office
  or our new New York City office.</strong></p><b><strong>About the Role:&nbsp;</strong></b><p>We
  are seeking a visionary technology leader to define, drive, and execute our company-wide
  AI strategy and enablement. This role is pivotal in transforming how we work, serve
  customers, and deliver value through the integration of AI, automation, and intelligent
  workflows. It supports not only our employees and their ability to use AI, but also
  our clients and Taskers, as we increasingly leverage AI across our Product teams
  to improve the user experience. You will operate cross-functionally to identify
  opportunities, build capabilities, and embed AI-driven thinking into the company’s
  strategic and operational core.</p><p>The Director of AI Strategy and Enablement
  will be a critical leader in developing, championing, and executing Taskrabbit’s
  AI strategy, governance, and priority use cases across all functions. This role
  reports directly to the CEO and serves as a strategic thought partner to the Senior
  Leadership Team on all AI efficiency and productivity initiatives. You will lead
  the company’s most critical cross-functional AI initiatives from concept to execution,
  working closely with the CEO and SLT. This leader is not only highly analytical,
  execution-oriented, and hands-on, but also technically strong.&nbsp; You will be
  responsible for turning AI strategy into measurable outcomes by identifying and
  prioritizing high-impact use cases. You’ll build AI-based solutions and teach others
  how to scale this way of working.</p><p>You also have a bias for action, an appetite
  for risk and innovation, and a passion for AI tools. You use and test them regularly
  and are seen as an expert in the domain. You’re able to ideate at the executive
  level, build a plan, orchestrate workstreams across departments, and personally
  drive initiatives to completion.</p><b><strong>Key Responsibilities:&nbsp;</strong></b><ul><li>Develop
  and execute AI strategy, partnering with the Senior Leadership Team to ensure alignment
  across all initiatives. You will create clarity in uncertainty by translating complex
  AI trends into actionable strategies that align with business priorities.</li><li>Partner
  with process owners and functional leaders to reimagine workflows using AI, automation,
  and intelligent decisioning.</li><li>Assist teams in identifying, enabling, testing
  and scaling commercial opportunities via AI.</li><li>Communicate to inspire action
  by evangelizing AI’s potential across Taskrabbit, influencing stakeholders at all
  levels, and fostering a culture of innovation and responsible enablement.</li><li>Support
  functional and business unit leaders in developing and continually refreshing their
  AI strategies, incorporating the latest innovations in AI and identifying opportunities
  where AI can help accelerate strategic business priorities.</li><li>Apply your expertise
  in Machine Learning, Data, Generative AI, and Agentic AI, to contribute to innovative
  solutions to drive individual productivity across Taskrabbit and functional efficiencies
  by building AI solutions across the organization</li><li>Lead the establishment
  and execution of operational frameworks and governance, ensuring cross-functional
  communication and integration across functions. Evaluate tools that will help the
  company scale more effectively.&nbsp;</li><li>Monitor, analyze, and report on the
  progress and impact of AI initiatives.</li><li>Directly lead a small team and indirectly
  lead broader teams through ambiguity and change, inspiring resilience and continuous
  improvement.</li><li>Stay current on AI trends and implement relevant technologies
  (e.g., LLMs, RPA, ML platforms).</li><li>Identify high-impact opportunities, pilot
  solutions, and scale successful initiatives.</li><li>Define and track metrics to
  measure the value and ROI of AI initiatives.</li><li>Serve as a trusted advisor
  to executives and educate teams on AI’s role and value.</li><li>Establish AI ethics,
  security, and compliance guidelines in partnership with Legal, Security, and Data
  Governance.</li><li>Define ways to scale the use of AI tools across the company,
  including partnering with the L&amp;D team on training across the organization.</li></ul><p><strong>Qualifications</strong></p><ul><li>15+
  years in technology, innovation, or transformation roles, with 3–5 years in AI/ML
  or intelligent automation.</li><li>Proven success in implementing enterprise AI
  strategies that deliver measurable business value.</li><li>Strong foundation in
  business process engineering and automation platforms.</li><li>Highly skilled with
  AI technologies, including NLP, generative AI, ML, and computer vision.</li><li>Experience
  collaborating across business, engineering, and product teams.</li><li>Executive
  presence and ability to influence at all levels.</li><li>Knowledge of AI ethics
  and governance frameworks is a must.</li><li>Bachelor’s degree in Computer Science,
  Engineering, Data Science, Business, or related field.</li><li>Broad passion for
  and understanding of emerging technologies in AI/ML.</li><li>Effective project management
  and teamwork skills, with the ability to communicate across multiple management
  levels and thrive in cross-functional settings.</li></ul><b><strong>Compensation
  &amp; Benefits:&nbsp;</strong></b><p>At Taskrabbit, our approach to compensation
  is designed to be competitive, transparent, and equitable. Total compensation consists
  of base pay + bonus + benefits + perks. The base pay range for this position is
  $180,000 - $250,000. This range is representative of base pay only, and does not
  include any other total cash compensation amounts, such as company bonus or benefits.
  Final offer amounts may vary from the amounts listed above and will be determined
  by factors including, but not limited to, relevant experience, qualifications, geography,
  and level.</p><p><b><span><strong>You’ll love working here because:</strong></span></b><ul><li><strong>Taskrabbit
  is a Hybrid Company.</strong> We value flexibility and choice but also stay committed
  to regular in-person connection.</li><li><strong>The People.</strong> You will be
  surrounded by some of the most talented, supportive, smart, and kind leaders and
  teams -- people you can be proud to work with!</li><li><strong>The Diverse Culture.</strong>
  We believe that we make better decisions when our workforce reflects the diversity
  of the communities in which we operate. Women make up half of our leadership team
  and our diversity representation is above that of the tech industry average.</li><li><strong>The
  Perks.</strong> Taskrabbit offers our employees with employer-paid health insurance
  and a 401k match with immediate vesting for our US based employees. We offer all
  of our global employees generous and flexible time off with 2 company-wide closure
  weeks, Taskrabbit product stipends, wellness + productivity + education stipends,
  IKEA discounts, reproductive health support, and more. <strong>Benefits vary by
  country of employment.&nbsp;</strong></li></ul><b><span><strong>Taskrabbit’s commitment
  to Diversity and Inclusion:</strong></span></b><p>An Active Commitment to Equity
  within our Company and Platform. We are an inclusive community where all who share
  our mission and values belong. Our diverse team represents the communities we serve,
  breaking down systemic barriers, and transforming lives- one action at a time.</p><p>Taskrabbit
  is an equal opportunity employer and values diversity at our company. We do not
  discriminate on the basis of race, religion, color, national origin, ancestry, citizenship,
  sex, gender, gender identity, sexual orientation, age, marital status, military/veteran
  status, or disability status. Taskrabbit is committed to working with and providing
  reasonable accommodation to applicants with physical and mental disabilities.&nbsp;</p><p>Taskrabbit
  will consider for employment all qualified applicants with criminal histories in
  a manner consistent with applicable law.&nbsp;</p><p><strong>Taskrabbit will never
  use text or chat applications to conduct interviews. We have a thoughtful and interactive
  interview process that includes an initial recruiter phone screen and several video-based
  interviews with our hiring teams. Communications will always be conducted by taskrabbit.com
  domain names.</strong></p></p>
