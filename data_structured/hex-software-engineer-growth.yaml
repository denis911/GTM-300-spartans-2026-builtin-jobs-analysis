description_html: '<b>The role</b><p>We’re looking for an experienced full-stack <strong>Software
  Engineer</strong> to join our Growth &amp; Monetization group. This group spans
  several work streams — including product-led growth (PLG), user activation, pricing
  and billing, and new product bets —solving complex challenges that help thousands
  of customers, from startups to Fortune 500 companies, get the most out of Hex.</p><p>This
  role is ideal for an engineer who thinks like a business owner and has strong product
  sense. You won''t just write code—you''ll obsess over conversion rates, user experience,
  business tradeoffs, and what makes a user go from "this is interesting" to "I can''t
  live without this." Together with your Product, Design, Data, and Marketing partners,
  you’ll be responsible for driving key business outcomes for Hex.</p><p>Our PLG motion
  is core to how Hex grows. Every day, thousands of data scientists and analysts discover
  Hex, sign up, and explore. You’ll be a key member of the team turning that interest
  into lasting engagement and revenue—through experimentation, product improvements,
  and an unrelenting focus on moving the dial for the business. If you''ve ever wished
  you could combine the rigor of engineering with the impact of running a business,
  this is the role.</p><p>This is a full-time role that can be held from one of our
  New York, NY or San Francisco, CA hubs, or remotely in the United States.</p><b>What
  You''ll Do at Hex</b><ul><li><strong>Build growth-focused product features</strong>:
  Create full-stack experiences (in React, Typescript, Python, and more) like onboarding
  flows, core product features, activation nudges, and billing experiences that feel
  delightful and drive results.</li><li><strong>Balance experimentation with product
  sense</strong>: Design, run, and iterate on A/B tests across the funnel when it’s
  appropriate; lean on product sense and customer input when it’s not.</li><li><strong>Drive
  growth metrics</strong>: With your team, take responsibility for key business outcomes
  like trial-to-paid conversion, user activation rates, expansion revenue, or product-led
  pipeline.</li><li><strong>Collaborate across the business</strong>: Work closely
  with Product, Design, Data, and Marketing to identify opportunities and align on
  growth priorities. You''ll have a seat at the table when we discuss strategy.</li><li><strong>Instrument
  and analyze everything</strong>: Build robust tracking, define success metrics,
  and use data to inform every decision. At Hex, you''ll have the best data tools
  at your fingertips (we literally build them), as well as a strong foundation of
  tracking and experiment infrastructure (Eppo, LanchDarkly, Ampli).</li></ul><b>About
  you</b><ul><li>You have 2+ years of experience as a full-stack software engineer—comfortable
  building across frontend (React/TypeScript) and backend systems.</li><li>You operate
  with a “business owner" mindset: driving business outcomes and delivering value
  to customers matter more to you than writing perfect code.</li><li>You’re pragmatic
  with good data intuition. You’re just as comfortable making fast decisions on imperfect
  data as you are setting up tracking and running stat-sig experiments.</li><li>You
  default to action—shipping fast, learning quickly, and iterating relentlessly.</li><li>You’re
  familiar with B2B SaaS, experimentation, billing, and/or collaboration products.</li></ul><b>It’s
  a bonus if you have:</b><ul><li>Experience at a product-led growth (PLG) company</li><li>Background
  in analytics, data tools, or developer-focused products</li><li>Familiarity with
  growth loops, funnel optimization, and activation frameworks (extra bonus if you''re
  an Elena Verna or Lenny’s Newsletter subscriber)</li><li>Previous founder or early-stage
  startup experience—you know what it means to own outcomes and wear multiple hats.</li></ul><b>Location
  &amp; Compensation</b><p>This is a full-time role, based out of our New York, NY
  office hub. Employees are encouraged to come into the office at least twice a week,
  with Tuesdays and Thursdays being our main in-person days. Outstanding candidates
  based out of our San Francisco, CA office hub or remote in the US will also be considered.</p><p>In
  addition to our unique culture, Hex proudly offers a competitive total rewards package,
  including but not limited to, market-benched salary &amp; equity, comprehensive
  health benefits, and flexible paid time off.</p><p><strong>Salary range:</strong>
  $176,000-$220,000</p><p>The salary range shown may be a reflection of additional
  factors such as geographical location and skill ranges/levels we''re open to. Placement
  in the salary range will be decided upon completion of the interview process, taking
  into account factors like leaving room for growth, internal fairness &amp; parity,
  your demonstrated skills, and the depth of your experience. Our Recruiting team
  will be able to provide more details during the interview process.</p><br><p>By
  submitting an application the candidate consents to the use of their personal information
  in accordance with the Hex Privacy policy:&nbsp;<span>https://learn.hex.tech/docs/trust/privacy-policy</span>.</p>'
description_text: 'The role We’re looking for an experienced full-stack Software Engineer
  to join our Growth &amp; Monetization group. This group spans several work streams
  — including product-led growth (PLG), user activation, pricing and billing, and
  new product bets —solving complex challenges that help thousands of customers, from
  startups to Fortune 500 companies, get the most out of Hex. This role is ideal for
  an engineer who thinks like a business owner and has strong product sense. You won''t
  just write code—you''ll obsess over conversion rates, user experience, business
  tradeoffs, and what makes a user go from "this is interesting" to "I can''t live
  without this." Together with your Product, Design, Data, and Marketing partners,
  you’ll be responsible for driving key business outcomes for Hex. Our PLG motion
  is core to how Hex grows. Every day, thousands of data scientists and analysts discover
  Hex, sign up, and explore. You’ll be a key member of the team turning that interest
  into lasting engagement and revenue—through experimentation, product improvements,
  and an unrelenting focus on moving the dial for the business. If you''ve ever wished
  you could combine the rigor of engineering with the impact of running a business,
  this is the role. This is a full-time role that can be held from one of our New
  York, NY or San Francisco, CA hubs, or remotely in the United States. What You''ll
  Do at Hex Build growth-focused product features : Create full-stack experiences
  (in React, Typescript, Python, and more) like onboarding flows, core product features,
  activation nudges, and billing experiences that feel delightful and drive results.
  Balance experimentation with product sense : Design, run, and iterate on A/B tests
  across the funnel when it’s appropriate; lean on product sense and customer input
  when it’s not. Drive growth metrics : With your team, take responsibility for key
  business outcomes like trial-to-paid conversion, user activation rates, expansion
  revenue, or product-led pipeline. Collaborate across the business : Work closely
  with Product, Design, Data, and Marketing to identify opportunities and align on
  growth priorities. You''ll have a seat at the table when we discuss strategy. Instrument
  and analyze everything : Build robust tracking, define success metrics, and use
  data to inform every decision. At Hex, you''ll have the best data tools at your
  fingertips (we literally build them), as well as a strong foundation of tracking
  and experiment infrastructure (Eppo, LanchDarkly, Ampli). About you You have 2+
  years of experience as a full-stack software engineer—comfortable building across
  frontend (React/TypeScript) and backend systems. You operate with a “business owner"
  mindset: driving business outcomes and delivering value to customers matter more
  to you than writing perfect code. You’re pragmatic with good data intuition. You’re
  just as comfortable making fast decisions on imperfect data as you are setting up
  tracking and running stat-sig experiments. You default to action—shipping fast,
  learning quickly, and iterating relentlessly. You’re familiar with B2B SaaS, experimentation,
  billing, and/or collaboration products. It’s a bonus if you have: Experience at
  a product-led growth (PLG) company Background in analytics, data tools, or developer-focused
  products Familiarity with growth loops, funnel optimization, and activation frameworks
  (extra bonus if you''re an Elena Verna or Lenny’s Newsletter subscriber) Previous
  founder or early-stage startup experience—you know what it means to own outcomes
  and wear multiple hats. Location &amp; Compensation This is a full-time role, based
  out of our New York, NY office hub. Employees are encouraged to come into the office
  at least twice a week, with Tuesdays and Thursdays being our main in-person days.
  Outstanding candidates based out of our San Francisco, CA office hub or remote in
  the US will also be considered. In addition to our unique culture, Hex proudly offers
  a competitive total rewards package, including but not limited to, market-benched
  salary &amp; equity, comprehensive health benefits, and flexible paid time off.
  Salary range: $176,000-$220,000 The salary range shown may be a reflection of additional
  factors such as geographical location and skill ranges/levels we''re open to. Placement
  in the salary range will be decided upon completion of the interview process, taking
  into account factors like leaving room for growth, internal fairness &amp; parity,
  your demonstrated skills, and the depth of your experience. Our Recruiting team
  will be able to provide more details during the interview process. By submitting
  an application the candidate consents to the use of their personal information in
  accordance with the Hex Privacy policy:&nbsp; https://learn.hex.tech/docs/trust/privacy-policy
  .'
