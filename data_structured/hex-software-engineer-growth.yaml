company_overview: Hex is changing the way people work with data. Our platform makes
  analytics workflows more powerful, collaborative, and shareable. Hex solves key
  pain points with today's data and analytics tooling, and is loved by thousands of
  users all over the world for the beautiful UI, new superpowers, and boundless flexibility.We
  are a tight-knit crew of engineers, designers, and data aficionados. Our roadmap
  is full of big ideas and little details, and we would love your help bringing them
  to life.Hex has raised over $100m from great VCs and angels, giving us many years
  of runway and the ability to pay competitive salaries, offer great benefits, and
  provide meaningful equity.
