description_html: '<p><span><b>Luxury Presence </b>is building the AI growth platform
  for real estate. Backed by Bessemer Venture Partners and other top investors, we''re
  a Series C company on track to hit $100M in annual recurring revenue in the next
  six months. More than 87,000 real estate professionals, including over </span><span>30%
  of the WSJ Real Trends top 100 agents in the United States, use us to run and grow
  their business.</span></p><p><br></p><p><b>Position</b></p><p><span>Title: </span><b>Sr.
  Data Analyst</b></p><p><span>Location: U.S. Based, Remote</span></p><p><span>Compensation:
  120k-170k, Stock Options, Flex PTO, Health/Vision/Dental, Retreats</span></p><p><br></p><p><b>Why
  Now?</b></p><p><span>We’ve enjoyed tremendous growth over the last 5 years. With
  that growth comes a treasure trove of data that is valuable to us, and our customers.
  We need experienced and passionate data analysts to help us realize that value and
  unlock the insights that exist at the intersection of our operational, financial,
  and product data. This is a unique opportunity to join a fast growing startup and
  build our data team, culture, and processes from the ground up.</span></p><p><b>What
  You’ll Do</b></p><ul><li>Deliver recommendations and actionable insights to key
  stakeholders to help drive revenue</li><li>Use strong technical and business intuition
  to optimize GTM motions, ensuring data-driven approaches drive efficiency, revenue
  growth, and customer acquisition.</li><li>Solve difficult open ended up problems
  through novel data solutions and analytics.</li><li>Support development of predictive
  models to support strategic and operational initiatives</li><li>Build dashboards,
  data products, and ad hoc report studies to analyze and present data associated
  with GTM analytics, product performance, business operations, and strategic decision
  making</li><li>Work with key stakeholders and the leadership team to define and
  monitor KPIs across the company</li><li>Build production-ready data models and schemas
  using DBT to support downstream analytics</li></ul><p></p><p><b>Must Haves</b></p><ul><li>Proficiency
  in SQL</li><li>Proficiency in any statistical programming language (i.e, Python
  or R)</li><li>5+ years in doing analytics with a robust understanding of statistical
  concepts</li><li>Experience working with BI tools (Sigma, Tableau, SiSense, Hex,
  or Looker etc)</li><li>Experience building predictive/forecasting models</li><li>Ability
  to work independently, and lead projects from start to finish</li><li>Ability to
  handle multiple stakeholders, and prioritize competing requests</li><li>Ability
  to identify and push for process improvements for the teams we support</li><li>Ability
  to communicate technical concepts to both technical and non-technical audiences
  through visualizations and presentations</li><li>Ability to partner with leadership
  and stakeholders across the company to understand business needs and how these can
  be addressed through analytics</li><li>Experience supporting any GTM teams including
  Sales, Marketing, or Customer Success</li></ul><p></p><p><b>Nice to Haves</b></p><ul><li>M.S.
  in Math, Statistics, or closely related quantitative field</li><li>Experience with
  Snowflake and dbt</li><li>Experience building supervised and unsupervised learning
  models</li><li>Experience working in a B2B or SaaS company</li></ul><p></p><p></p><p><span><b>Join
  us in shaping the future of real estate</b></span></p><p><br></p><p><span>The real
  estate industry is in the midst of a seismic shift, and the future belongs to those
  who break new ground. As one of the fastest-growing companies in the proptech and
  marketing sectors, Luxury Presence challenges the status quo of what technology
  can do for real estate agents, leaders, and brokerages.</span></p><p><br></p><p><span>We''re
  a team of agile and tenacious innovators working collaboratively to drive the industry
  forward. Together, we build game-changing products that empower modern real estate
  entrepreneurs to dominate their markets. From award-winning web design to agile
  SEO solutions to cutting-edge AI tools, we deliver tech that anticipates market
  shifts and keeps our clients ahead of their competition.</span></p><p><br></p><p><span>Founded
  in 2016 by Stanford Business School alum Malte Kramer, Luxury Presence has grown
  to a global team ranked on the Inc. 5000 fastest-growing companies list three years
  in a row. We''re backed by world-class investors, including Bessemer Venture Partners,
  NextEquity Partners, Toba Capital, and Switch Ventures, and have raised $89 million
  to date.</span></p><p><br></p><p><span>More than 18,000 real estate businesses rely
  on our platform, including 30% of the Wall Street Journal RealTrends top agents
  and teams. Additionally, many of the industry''s most powerful brokerages rely on
  Luxury Presence as a trusted business partner.</span></p><p><br></p><p><span>Every
  year since 2020, Luxury Presence has ranked on BuiltIn''s Best Place to Work lists.
  HousingWire named our founder and CEO a 2024 Tech Trendsetter, we''ve received several
  Tech100 Awards, and we just scored an Inman Innovation Award for Best AI-Powered
  Platform.</span></p><p><br></p><p><b><span>Luxury Presence is an Equal Opportunity
  Employer.</span></b><span> All qualified applicants will receive consideration for
  employment without regard to race, color, religion, sex, sexual orientation, gender
  identity, or national origin.</span></p><p></p>'
