title: GTM Engineer
company: Flock Homes
category: Real Estate
location: Denver, Colorado, USA
date_posted: '2026-03-09'
description_html: '<p><strong>About Flock</strong></p><p>There are 17 million Americans
  who own rental property. Most don''t want to be landlords anymore, but selling isn’t
  a good option. Why? You’d lose income and appreciation, trigger tax liabilities,
  kick out your tenants, have to fix up the house – the list goes on! Flock is here
  to help.</p><p>Flock’s mission is to provide every retiring landlord with the most
  cost-efficient and seamless exit. Our first product is a tech-enabled 721 Exchange
  for Single Family Rental landlords. Owners contribute properties into our professionally
  managed Fund, in exchange for passive equity ownership. It''s a modern UPREIT model
  designed for sophisticated owners who want access to continued cashflows, liquidity,
  and diversification without triggering capital gains, disturbing tenants, or dealing
  with disposition friction. We’re now growing fast into the commercial and multifamily
  space and are looking for smart, entrepreneurial hustlers who want to help build
  something category-defining.&nbsp;</p><p>We recently raised our Series B, led by
  Renegade Partners, and are also backed by other top tier investors, including Andreessen
  Horowitz, Primary Ventures, SUSA Ventures, 1Sharpe Ventures, and leaders from Invitation
  Homes and Opendoor.&nbsp;</p><p><strong>About the Role</strong></p><p>Flock is hiring
  a <strong>GTM Engineer</strong> to join our team to be the architect of our revenue
  engine. You’ll drive growth by developing successful and scalable workflows combining
  our GTM tech stack with AI and code-based tools, helping our sales team to qualify
  more leads faster. This role is perfect for a developer tired of feeling like a
  cog in the machine and interested in a real, immediate impact.</p><p><strong>What
  You’ll Do</strong></p><ul><li><strong>Systematize and Automate the GTM Motion:</strong>
  Code scalable workflows (Python, SQL, API) that streamline prospecting, lead routing,
  and pipeline generation.</li><li><strong>Build Data-Driven Feedback Loops: </strong>Own
  reporting, analytics, and insights on GTM efficiency, conversion, and ROI.</li><li><strong>Identify
  and Score Clients: </strong>Identify and score high-priority target clients using
  both public and private data sources.</li><li><strong>Personalize at Scale: </strong>Design
  AI-powered workflows to reach out to prospects at the right time while referencing
  organizational and personal context.</li><li><strong>Detect Signals: </strong>Build
  workflows to detect buying signals from internal and publicly available data.</li><li><strong>Run
  Growth Experiments: </strong>Design and run scrappy GTM experiments across channels
  to identify new avenues worth scaling.</li><li><strong>Collaborate Across Teams:
  </strong>Work closely with marketing, sales, and product to align initiatives and
  maximize pipeline impact.</li></ul><p><strong>About You</strong></p><ul><li><strong>Software
  Engineer Background: </strong>You’ve built systems from scratch using Python, SQL,
  and APIs, continually iterating on what works.</li><li><strong>Systems and Data-Driven:
  </strong>You break complex processes into structured, repeatable systems, measuring
  and translating metrics into meaningful action.</li><li><strong>Business Sense:
  </strong>You’re curious about the business, why a marketing campaign may or may
  not work, and how success is measured.</li><li><strong>GTM Fluent:&nbsp;</strong>You
  understand GTM pipelines/systems and explain your impact on revenue.</li><li><strong>Hands-On
  with Automation:</strong> You design and execute automations that replace repetitive
  work.</li><li><strong>Strong Collaborator:&nbsp;</strong>You work well cross-functionally
  with GTM, engineering, and leadership teams.</li><li><strong>Ownership:&nbsp;</strong>Desire
  to grow your impact, balancing speed of delivery with judicious prioritization.</li><li><strong>Grit:</strong>
  A proactive mindset and the ability to manage multiple tight deadlines without sacrificing
  attention to detail.</li><li><strong>Problem Solver: </strong>Ability to think on
  your feet, handle objections, and find creative solutions.</li><li><strong>Ethical:&nbsp;</strong>Conduct
  business with the highest level of integrity and professionalism.</li></ul><p><em>Even
  if you don’t meet 100% of the qualifications, we recommend applying to the role!&nbsp;&nbsp;</em></p><p>The
  target annual salary for this role is $140-180k, plus equity and benefits (medical/dental/vision
  insurance, 401k, and unlimited PTO).</p>'
description_text: 'About Flock There are 17 million Americans who own rental property.
  Most don''t want to be landlords anymore, but selling isn’t a good option. Why?
  You’d lose income and appreciation, trigger tax liabilities, kick out your tenants,
  have to fix up the house – the list goes on! Flock is here to help. Flock’s mission
  is to provide every retiring landlord with the most cost-efficient and seamless
  exit. Our first product is a tech-enabled 721 Exchange for Single Family Rental
  landlords. Owners contribute properties into our professionally managed Fund, in
  exchange for passive equity ownership. It''s a modern UPREIT model designed for
  sophisticated owners who want access to continued cashflows, liquidity, and diversification
  without triggering capital gains, disturbing tenants, or dealing with disposition
  friction. We’re now growing fast into the commercial and multifamily space and are
  looking for smart, entrepreneurial hustlers who want to help build something category-defining.&nbsp;
  We recently raised our Series B, led by Renegade Partners, and are also backed by
  other top tier investors, including Andreessen Horowitz, Primary Ventures, SUSA
  Ventures, 1Sharpe Ventures, and leaders from Invitation Homes and Opendoor.&nbsp;
  About the Role Flock is hiring a GTM Engineer to join our team to be the architect
  of our revenue engine. You’ll drive growth by developing successful and scalable
  workflows combining our GTM tech stack with AI and code-based tools, helping our
  sales team to qualify more leads faster. This role is perfect for a developer tired
  of feeling like a cog in the machine and interested in a real, immediate impact.
  What You’ll Do Systematize and Automate the GTM Motion: Code scalable workflows
  (Python, SQL, API) that streamline prospecting, lead routing, and pipeline generation.
  Build Data-Driven Feedback Loops: Own reporting, analytics, and insights on GTM
  efficiency, conversion, and ROI. Identify and Score Clients: Identify and score
  high-priority target clients using both public and private data sources. Personalize
  at Scale: Design AI-powered workflows to reach out to prospects at the right time
  while referencing organizational and personal context. Detect Signals: Build workflows
  to detect buying signals from internal and publicly available data. Run Growth Experiments:
  Design and run scrappy GTM experiments across channels to identify new avenues worth
  scaling. Collaborate Across Teams: Work closely with marketing, sales, and product
  to align initiatives and maximize pipeline impact. About You Software Engineer Background:
  You’ve built systems from scratch using Python, SQL, and APIs, continually iterating
  on what works. Systems and Data-Driven: You break complex processes into structured,
  repeatable systems, measuring and translating metrics into meaningful action. Business
  Sense: You’re curious about the business, why a marketing campaign may or may not
  work, and how success is measured. GTM Fluent:&nbsp; You understand GTM pipelines/systems
  and explain your impact on revenue. Hands-On with Automation: You design and execute
  automations that replace repetitive work. Strong Collaborator:&nbsp; You work well
  cross-functionally with GTM, engineering, and leadership teams. Ownership:&nbsp;
  Desire to grow your impact, balancing speed of delivery with judicious prioritization.
  Grit: A proactive mindset and the ability to manage multiple tight deadlines without
  sacrificing attention to detail. Problem Solver: Ability to think on your feet,
  handle objections, and find creative solutions. Ethical:&nbsp; Conduct business
  with the highest level of integrity and professionalism. Even if you don’t meet
  100% of the qualifications, we recommend applying to the role!&nbsp;&nbsp; The target
  annual salary for this role is $140-180k, plus equity and benefits (medical/dental/vision
  insurance, 401k, and unlimited PTO).'
