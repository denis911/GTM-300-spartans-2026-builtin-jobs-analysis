description_html: '<p><p>At Hi Marley, we’re not just a technology company—we’re on
  a mission to revolutionize the insurance industry with our conversational platform
  that makes communication simple, efficient, and delightful. Built for carriers,
  powered by SMS, and designed by insurance experts, Hi Marley connects people through
  seamless, friendly conversations that save time, money, and hassle. Our platform
  helps insurance carriers strengthen customer relationships while streamlining operations.
  With a focus on collaboration, coaching, and powerful analytics, we deliver the
  insights insurance teams need when they need them—creating a smooth, frictionless
  experience for customers along the way.</p></p><p><span>Hi Marley&nbsp;is building
  the future of insurance communication, and&nbsp;we’re&nbsp;looking for a&nbsp;</span><strong><span>Sr.
  Design Technologist / Design Engineer</span></strong><span>&nbsp;to help lead the
  design and execution of our new AI</span><span>‑</span><span>first Service experience.</span>
  <span>This role is for a designer who can think&nbsp;in&nbsp;systems, prototypes&nbsp;in
  real code, and partners&nbsp;deeply with engineering to bring complex, AI</span><span>‑</span><span>powered
  workflows to life.</span> <span>You’ll&nbsp;report to the Director of Design and
  partner closely with Engineering and Product leaders within the Service domain.
  This role owns the Service product experience and contributes to our evolving design
  systems.</span><span> <em><span>Teamwork and shared enthusiasm&nbsp;is&nbsp;a core
  part of our culture, which is why this role involves joining us in the Boston office
  for two days each week.</span></em><span>&nbsp;</span></span></p><p><span><strong><span>What
  You’ll Do:</span></strong></span></p><ul><li><strong><span>Lead&nbsp;design execution
  for key areas of&nbsp;the Service experience</span></strong><span>: Translate service
  workflows, AI capabilities, and product strategy into intuitive, production</span><span>‑</span><span>ready
  experiences.</span></li><li><strong><span>Prototype at multiple levels</span></strong><span>:
  From interaction models and high</span><span>‑</span><span>fidelity prototypes to&nbsp;real
  front</span><span>‑</span><span>end&nbsp;implementations that inform engineering
  direction.</span></li><li><strong><span>Strengthen collaboration between Product
  Design and Engineering within the Service domain</span></strong><span>: Act as a&nbsp;partner
  who&nbsp;improves&nbsp;speed, quality, and shared understanding.</span></li><li><strong><span>Design
  for AI with intention</span></strong><span>:&nbsp;Partner with the Director of Design
  and Engineering to evolve how AI agents, automation, and intelligent&nbsp;assistance&nbsp;appear
  within the Service experience to balance power, clarity, and trust.</span></li><li><strong><span>Create
  scalable systems</span></strong><span>:&nbsp;Establish&nbsp;reusable patterns, components,
  and interaction models that support long</span><span>‑</span><span>term growth of
  the Service product.</span></li><li><strong><span>Stay close to users</span></strong><span>:
  Partner with Product to learn directly from service teams, frontline reps, and customers&nbsp;to
  ensure solutions solve real workflow challenges.</span><span>&nbsp;</span></li></ul><p><span><strong><span>What
  We’re Looking For:</span></strong><span>&nbsp;</span></span></p><ul><li><span>6+&nbsp;years
  experience&nbsp;in Product Design, Design Engineering, or Design Technology roles</span></li><li>A
  strong portfolio demonstrating shipped work, systems thinking, and technical depth</li><li>Comfort
  working in or alongside modern front<span>‑</span><span>end frameworks (React, design
  systems, prototyping in code, etc.)</span></li><li>Experience collaborating closely
  with engineers on complex products</li><li>Strong product intuition and ability
  to reason about tradeoffs</li><li>Experience designing user-facing AI workflows
  (LLMs, automation, or intelligent assistance) is preferred; deep ML or platform-level
  expertise is not required.</li><li>Experience with B2B, SaaS, or workflow-heavy
  products is a plus</li></ul><p><span><span><span><strong>Compensation, Benefits
  &amp; Perks:</strong></span>&nbsp;</span></span><span><span>&nbsp;</span></span><span><br></span><span><span>At
  Hi Marley, we are committed to fair and transparent pay practices. The annual base
  salary for this role is expected to fall within the range of [$111,300–$206,700],
  depending on experience, skills, qualifications, and location. Offers are </span><span>determined</span><span>&nbsp;based
  on these factors as well as internal peer equity.&nbsp;</span><span>It’s</span><span>&nbsp;most
  common for new hires to start near the midpoint of the range, allowing room for
  growth as employees develop in their role.</span></span><span>&nbsp;</span></p><p><p>In
  addition to base pay, we offer a comprehensive total rewards package that supports
  both your wellbeing and professional growth, including:</p><ul><li>Equity grants
  for all employees</li><li>A 4% matching 401(k) program</li><li>Medical, dental,
  vision, disability, and life insurance coverage for employees working 30+ hours
  per week</li><li>Monthly wellness stipend</li><li>Paid parental leave</li><li>A
  flexible vacation policy - we all work hard and take time when we need it</li></ul><p><span><strong>Who
  We Are:</strong></span><br>At Hi Marley, our culture is built on three core values
  that every employee embodies:</p><ul><li><strong>Max Courage</strong>&nbsp;– We
  encourage our team, our customers, and their customers to dream big, try new ideas,
  and maximize impact by measuring risk.</li><li><strong>Be Humble</strong>&nbsp;–
  We lead with appreciation and promote a culture of humility, compassion, and openness
  to learn from anyone, anywhere.</li><li><strong>Ubuntu (“I am because we are”)</strong>&nbsp;–
  We believe true success is much bigger than any single individual or company. By
  aligning our individual aims behind a shared purpose, we can achieve our fullest
  potential — together.</li></ul><p><span><strong>Life at Hi Marley:</strong></span></p><p><p>Life
  at Hi Marley is shaped by collaboration, learning, and genuine connection. We’re
  proud to foster an environment where people can do their best work, feel supported,
  and grow alongside a team that celebrates both individuality and shared purpose.</p><ul><li>A
  fun, lively startup culture that embraces creativity and innovation</li><li>Core
  values-based leadership that guides our decision-making and daily interactions</li><li>A
  culture of engagement, diversity, inclusion, and belonging — everyone’s voice matters</li><li>Flexible,
  hybrid work environment that values balance and trust</li><li>Ample opportunities
  to learn, take on new challenges, and make an impact in a fast-growing organization</li><li>Meaningful
  work that directly supports our mission to help people and organizations communicate
  with empathy and clarity</li></ul></p><p><em>Hi Marley is proud to be an equal employment
  opportunity employer. We celebrate diversity and do not discriminate based on gender,
  sexual orientation, gender identity, religion, race, veteran status, disability
  status, or any other characteristic protected by applicable law. We are committed
  to building an inclusive work environment representing a variety of backgrounds,
  perspectives, and skills, where all employees are encouraged to be their authentic
  selves.</em></p><p><em>Hi Marley participates in E-Verify and will provide the federal
  government with your Form I-9 information to confirm that you are authorized to
  work in the U.S. For more information, please review the documents under "E-Verify
  Poster" here:</em> https://e-verify.uscis.gov/web/OnlineResources.aspx</p></p>'
description_text: 'At Hi Marley, we’re not just a technology company—we’re on a mission
  to revolutionize the insurance industry with our conversational platform that makes
  communication simple, efficient, and delightful. Built for carriers, powered by
  SMS, and designed by insurance experts, Hi Marley connects people through seamless,
  friendly conversations that save time, money, and hassle. Our platform helps insurance
  carriers strengthen customer relationships while streamlining operations. With a
  focus on collaboration, coaching, and powerful analytics, we deliver the insights
  insurance teams need when they need them—creating a smooth, frictionless experience
  for customers along the way. Hi Marley&nbsp;is building the future of insurance
  communication, and&nbsp;we’re&nbsp;looking for a&nbsp; Sr. Design Technologist /
  Design Engineer &nbsp;to help lead the design and execution of our new AI ‑ first
  Service experience. This role is for a designer who can think&nbsp;in&nbsp;systems,
  prototypes&nbsp;in real code, and partners&nbsp;deeply with engineering to bring
  complex, AI ‑ powered workflows to life. You’ll&nbsp;report to the Director of Design
  and partner closely with Engineering and Product leaders within the Service domain.
  This role owns the Service product experience and contributes to our evolving design
  systems. Teamwork and shared enthusiasm&nbsp;is&nbsp;a core part of our culture,
  which is why this role involves joining us in the Boston office for two days each
  week. &nbsp; What You’ll Do: Lead&nbsp;design execution for key areas of&nbsp;the
  Service experience : Translate service workflows, AI capabilities, and product strategy
  into intuitive, production ‑ ready experiences. Prototype at multiple levels : From
  interaction models and high ‑ fidelity prototypes to&nbsp;real front ‑ end&nbsp;implementations
  that inform engineering direction. Strengthen collaboration between Product Design
  and Engineering within the Service domain : Act as a&nbsp;partner who&nbsp;improves&nbsp;speed,
  quality, and shared understanding. Design for AI with intention :&nbsp;Partner with
  the Director of Design and Engineering to evolve how AI agents, automation, and
  intelligent&nbsp;assistance&nbsp;appear within the Service experience to balance
  power, clarity, and trust. Create scalable systems :&nbsp;Establish&nbsp;reusable
  patterns, components, and interaction models that support long ‑ term growth of
  the Service product. Stay close to users : Partner with Product to learn directly
  from service teams, frontline reps, and customers&nbsp;to ensure solutions solve
  real workflow challenges. &nbsp; What We’re Looking For: &nbsp; 6+&nbsp;years experience&nbsp;in
  Product Design, Design Engineering, or Design Technology roles A strong portfolio
  demonstrating shipped work, systems thinking, and technical depth Comfort working
  in or alongside modern front ‑ end frameworks (React, design systems, prototyping
  in code, etc.) Experience collaborating closely with engineers on complex products
  Strong product intuition and ability to reason about tradeoffs Experience designing
  user-facing AI workflows (LLMs, automation, or intelligent assistance) is preferred;
  deep ML or platform-level expertise is not required. Experience with B2B, SaaS,
  or workflow-heavy products is a plus Compensation, Benefits &amp; Perks: &nbsp;
  &nbsp; At Hi Marley, we are committed to fair and transparent pay practices. The
  annual base salary for this role is expected to fall within the range of [$111,300–$206,700],
  depending on experience, skills, qualifications, and location. Offers are determined
  &nbsp;based on these factors as well as internal peer equity.&nbsp; It’s &nbsp;most
  common for new hires to start near the midpoint of the range, allowing room for
  growth as employees develop in their role. &nbsp; In addition to base pay, we offer
  a comprehensive total rewards package that supports both your wellbeing and professional
  growth, including: Equity grants for all employees A 4% matching 401(k) program
  Medical, dental, vision, disability, and life insurance coverage for employees working
  30+ hours per week Monthly wellness stipend Paid parental leave A flexible vacation
  policy - we all work hard and take time when we need it Who We Are: At Hi Marley,
  our culture is built on three core values that every employee embodies: Max Courage
  &nbsp;– We encourage our team, our customers, and their customers to dream big,
  try new ideas, and maximize impact by measuring risk. Be Humble &nbsp;– We lead
  with appreciation and promote a culture of humility, compassion, and openness to
  learn from anyone, anywhere. Ubuntu (“I am because we are”) &nbsp;– We believe true
  success is much bigger than any single individual or company. By aligning our individual
  aims behind a shared purpose, we can achieve our fullest potential — together. Life
  at Hi Marley: Life at Hi Marley is shaped by collaboration, learning, and genuine
  connection. We’re proud to foster an environment where people can do their best
  work, feel supported, and grow alongside a team that celebrates both individuality
  and shared purpose. A fun, lively startup culture that embraces creativity and innovation
  Core values-based leadership that guides our decision-making and daily interactions
  A culture of engagement, diversity, inclusion, and belonging — everyone’s voice
  matters Flexible, hybrid work environment that values balance and trust Ample opportunities
  to learn, take on new challenges, and make an impact in a fast-growing organization
  Meaningful work that directly supports our mission to help people and organizations
  communicate with empathy and clarity Hi Marley is proud to be an equal employment
  opportunity employer. We celebrate diversity and do not discriminate based on gender,
  sexual orientation, gender identity, religion, race, veteran status, disability
  status, or any other characteristic protected by applicable law. We are committed
  to building an inclusive work environment representing a variety of backgrounds,
  perspectives, and skills, where all employees are encouraged to be their authentic
  selves. Hi Marley participates in E-Verify and will provide the federal government
  with your Form I-9 information to confirm that you are authorized to work in the
  U.S. For more information, please review the documents under "E-Verify Poster" here:
  https://e-verify.uscis.gov/web/OnlineResources.aspx'
