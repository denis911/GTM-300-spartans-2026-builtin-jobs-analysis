company_overview: Hi Marley is the first intelligent conversational platform built
  for P&C insurance and powered by SMS. Designed by insurance professionals, Hi Marley
  enables lovable, convenient conversations across the entire ecosystem, saving money
  and time for carriers while building customer loyalty through delightful interactions.
  Hi Marley's industry-leading collaboration, coaching and analytics capabilities
  deliver crucial insights that streamline carrier operations while enabling a frictionless
  customer engagement experience. The solution is made for the enterprise; it’s fast
  to deploy, easy to use and seamlessly integrates with core insurance systems. Through
  its advanced conversational technology, Hi Marley reduces friction – empowering
  innovative carriers to reinvent the customer and employee experience.
