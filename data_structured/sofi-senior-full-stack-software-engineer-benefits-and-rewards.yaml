description_html: '<p><p><strong>Employee Applicant Privacy Notice</strong></p><p><strong>Who
  we are:</strong></p><p><p>Shape a brighter financial future with us.</p><p>Together
  with our members, we’re changing the way people think about and interact with personal
  finance.</p><p>We’re a next-generation financial services company and national bank
  using innovative, mobile-first technology to help our millions of members reach
  their goals. The industry is going through an unprecedented transformation, and
  we’re at the forefront. We’re proud to come to work every day knowing that what
  we do has a direct impact on people’s lives, with our core values guiding us every
  step of the way. <strong>Join us to invest in yourself, your career, and the financial
  world.</strong></p></p></p><p><strong>The role:</strong></p><p>We are seeking a
  Senior Full-Stack Engineer for the Member Benefits and Rewards team. We are responsible
  for member-facing SoFi Plus benefits like credit card cash back and the 1% investment
  match. We are also responsible for SoFi''s newest subscription - SoFi Plus, which
  is an important project for the company. Our team manages member-facing features
  in SoFi''s app and website as well as the backend streaming services that support
  this front-end experience. This provides ample opportunities for the SDE to gain
  full-stack experience and showcase their skill set in a company priority initiative.</p><br><p><strong>What
  you''ll do:</strong></p><ul><li>Architect and scale high-performance systems and
  services that drive member growth and engagement.</li><li>Collaborate cross-functionally
  with Product, Design, Engineering, and Data Science teams to translate business
  needs into scalable technical solutions.</li><li>Mentor and inspire engineers through
  code reviews, technical leadership, and fostering a culture of innovation and collaboration.</li><li>Solve
  complex challenges across infrastructure, data pipelines, and backend services to
  ensure systems are robust, reliable, and future-proof.</li><li>Drive innovation
  by identifying opportunities for new technologies, AI/ML-driven marketing, and process
  improvements to member adaption, engagement</li><li>Own the full lifecycle of projects—from
  ideation to deployment, monitoring, and continuous improvement.</li></ul><br><p><strong>What
  you’ll need:</strong></p><ul><li>Bachelor’s Degree in Computer Science or related
  field.</li><li>5+ years of software engineering experience, with a proven track
  record of delivering scalable, production-grade applications.</li><li>Full-stack
  experience, including frontend (React, TypeScript)&nbsp;</li><li>Strong backend
  expertise in Java, Kotlin, or C#, with experience in frameworks like Spring Boot.</li><li>Experience
  designing and deploying microservices in a cloud-native environment (Kubernetes,
  Docker, Kafka, AWS).</li><li>Proficiency in relational databases (PostgreSQL) and
  ORMs with an ability to optimize data access patterns.</li><li>Ability to balance
  engineering excellence with business impact, prioritizing high-value initiatives.</li><li>Strong
  problem-solving skills and a passion for delivering efficient, well-tested, and
  maintainable solutions.</li><li>Excellent communication skills and ability to collaborate
  cross-functionally with marketing, product, and data teams.</li></ul><br><p><strong>Nice
  to have:</strong></p><ul><li>Interest in personal finance, fintech, or SoFi’s mission.</li></ul><p><p><strong>Compensation
  and Benefits</strong></p><p>The base pay range for this role is listed below. Final
  base pay offer will be determined based on individual factors such as the candidate’s
  experience, skills, and location.&nbsp;</p><p>&nbsp;</p><p>To view all of our comprehensive&nbsp;and
  competitive&nbsp;benefits, visit our&nbsp;<strong>Benefits at SoFi&nbsp;</strong>page!</p><b><span>SoFi
  provides equal employment opportunities (EEO) to all employees and applicants for
  employment without regard to race, color, religion (including religious dress and
  grooming practices), sex (including pregnancy, childbirth and related medical conditions,
  breastfeeding, and conditions related to breastfeeding), gender, gender identity,
  gender expression, national origin, ancestry, age (40 or over), physical or medical
  disability, medical condition, marital status, registered domestic partner status,
  sexual orientation, genetic information, military and/or veteran status, or any
  other basis prohibited by applicable state or federal law.</span></b><b><span>The
  Company hires the best qualified candidate for the job, without regard to protected
  characteristics.</span></b><b><span>Pursuant to the San Francisco Fair Chance Ordinance,
  we will consider for employment qualified applicants with arrest and conviction
  records.</span></b><b><span>New York applicants: Notice of Employee Rights</span></b><b><span>SoFi
  is committed to an inclusive culture. As part of this commitment, </span><span>SoFi
  </span><span>offers reasonable accommodations to candidates with physical or mental
  disabilities. If you need accommodations to participate in the job application or
  interview process, please let your recruiter know or email </span>accommodations@sofi.com.</b><b><span>Due
  to insurance coverage issues, we are unable to accommodate remote work from Hawaii
  or Alaska at this time.</span></b><p><strong>Internal Employees</strong></p><p>If
  you are a current employee, do not apply here - please navigate to our Internal
  Job Board in Greenhouse to apply to our open roles.</p></p>'
description_text: 'Employee Applicant Privacy Notice Who we are: Shape a brighter
  financial future with us. Together with our members, we’re changing the way people
  think about and interact with personal finance. We’re a next-generation financial
  services company and national bank using innovative, mobile-first technology to
  help our millions of members reach their goals. The industry is going through an
  unprecedented transformation, and we’re at the forefront. We’re proud to come to
  work every day knowing that what we do has a direct impact on people’s lives, with
  our core values guiding us every step of the way. Join us to invest in yourself,
  your career, and the financial world. The role: We are seeking a Senior Full-Stack
  Engineer for the Member Benefits and Rewards team. We are responsible for member-facing
  SoFi Plus benefits like credit card cash back and the 1% investment match. We are
  also responsible for SoFi''s newest subscription - SoFi Plus, which is an important
  project for the company. Our team manages member-facing features in SoFi''s app
  and website as well as the backend streaming services that support this front-end
  experience. This provides ample opportunities for the SDE to gain full-stack experience
  and showcase their skill set in a company priority initiative. What you''ll do:
  Architect and scale high-performance systems and services that drive member growth
  and engagement. Collaborate cross-functionally with Product, Design, Engineering,
  and Data Science teams to translate business needs into scalable technical solutions.
  Mentor and inspire engineers through code reviews, technical leadership, and fostering
  a culture of innovation and collaboration. Solve complex challenges across infrastructure,
  data pipelines, and backend services to ensure systems are robust, reliable, and
  future-proof. Drive innovation by identifying opportunities for new technologies,
  AI/ML-driven marketing, and process improvements to member adaption, engagement
  Own the full lifecycle of projects—from ideation to deployment, monitoring, and
  continuous improvement. What you’ll need: Bachelor’s Degree in Computer Science
  or related field. 5+ years of software engineering experience, with a proven track
  record of delivering scalable, production-grade applications. Full-stack experience,
  including frontend (React, TypeScript)&nbsp; Strong backend expertise in Java, Kotlin,
  or C#, with experience in frameworks like Spring Boot. Experience designing and
  deploying microservices in a cloud-native environment (Kubernetes, Docker, Kafka,
  AWS). Proficiency in relational databases (PostgreSQL) and ORMs with an ability
  to optimize data access patterns. Ability to balance engineering excellence with
  business impact, prioritizing high-value initiatives. Strong problem-solving skills
  and a passion for delivering efficient, well-tested, and maintainable solutions.
  Excellent communication skills and ability to collaborate cross-functionally with
  marketing, product, and data teams. Nice to have: Interest in personal finance,
  fintech, or SoFi’s mission. Compensation and Benefits The base pay range for this
  role is listed below. Final base pay offer will be determined based on individual
  factors such as the candidate’s experience, skills, and location.&nbsp; &nbsp; To
  view all of our comprehensive&nbsp;and competitive&nbsp;benefits, visit our&nbsp;
  Benefits at SoFi&nbsp; page! SoFi provides equal employment opportunities (EEO)
  to all employees and applicants for employment without regard to race, color, religion
  (including religious dress and grooming practices), sex (including pregnancy, childbirth
  and related medical conditions, breastfeeding, and conditions related to breastfeeding),
  gender, gender identity, gender expression, national origin, ancestry, age (40 or
  over), physical or medical disability, medical condition, marital status, registered
  domestic partner status, sexual orientation, genetic information, military and/or
  veteran status, or any other basis prohibited by applicable state or federal law.
  The Company hires the best qualified candidate for the job, without regard to protected
  characteristics. Pursuant to the San Francisco Fair Chance Ordinance, we will consider
  for employment qualified applicants with arrest and conviction records. New York
  applicants: Notice of Employee Rights SoFi is committed to an inclusive culture.
  As part of this commitment, SoFi offers reasonable accommodations to candidates
  with physical or mental disabilities. If you need accommodations to participate
  in the job application or interview process, please let your recruiter know or email
  accommodations@sofi.com. Due to insurance coverage issues, we are unable to accommodate
  remote work from Hawaii or Alaska at this time. Internal Employees If you are a
  current employee, do not apply here - please navigate to our Internal Job Board
  in Greenhouse to apply to our open roles.'
