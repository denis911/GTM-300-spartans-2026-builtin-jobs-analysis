description_html: '<b><strong>ABOUT RETELL AI</strong></b><p>Retell AI is using the
  first principles to reimagine the call center with cutting edge voice AI.</p><p>Since
  launching 18 months ago, thousands of companies now utilize Retell’s AI voice agents
  to handle sales, support, and logistics calls that once required large teams of
  human agents. Backed by Y Combinator, Alt Capital, and other leading investors,
  we have scaled to $36M ARR with a team of 20 people, up from $5M at the start of
  2025.</p><p>Our vision for 2026 is to build a modern CX platform where entire contact
  centers are powered by AI. Instead of basic automation that needs constant human
  tuning, we’re creating intelligent AI “workers” that can act as frontline agents,
  QA analysts, and managers — continuously executing, monitoring, and improving customer
  interactions.</p><p>We’re growing quickly and looking for ambitious builders who
  want to tackle hard technical problems, move fast, and have real impact at one of
  the fastest-growing voice AI startups.</p><p>Let’s build the future together.</p><ul><li><p>We’re
  a top 50 AI app in a16z list: https://tinyurl.com/5853dt2x</p></li><li><p>#4 on
  Brex''s Fast-Growing Software Vendors of 2025: https://www.brex.com/journal/brex-benchmark-december-2025</p></li><li><p>We''re
  also one of the top ranking startups on: https://leanaileaderboard.com/</p></li></ul><p></p><b><strong>ABOUT
  THE ROLE</strong></b><p>We’re looking for a Senior GTM Engineer who sits at the
  intersection of engineering, data, and revenue. This role is focused on building
  and owning the systems that power our go-to-market motion — from lead flow and enrichment
  to routing, automation, and reporting. You’ll partner closely with sales, growth,
  and product to design scalable workflows that directly impact pipeline and revenue.</p><p>This
  is a hands-on, builder-first role. You won’t just configure tools — you’ll write
  code, ship integrations, and create the infrastructure that makes our GTM engine
  faster, smarter, and more reliable.</p><p></p><b><strong>KEY RESPONSIBILITIES</strong></b><ul><li><p>Design
  and implement end-to-end GTM workflows across lead capture, enrichment, routing,
  and outreach</p></li><li><p>Build and maintain integrations using Python, SQL, or
  JavaScript to connect internal systems and external tools</p></li><li><p>Own and
  optimize our GTM stack, including tools like Clay, Salesforce, enrichment APIs (e.g.,
  Apollo, Clearbit), and automation layers such as n8n, Gumloop, or Zapier</p></li><li><p>Ensure
  data quality and consistency across the funnel, from top-of-funnel acquisition through
  closed-won</p></li><li><p>Create internal tools, scripts, and dashboards that improve
  sales team efficiency and visibility</p></li><li><p>Continuously test, iterate,
  and ship improvements that measurably impact pipeline generation and conversion</p></li></ul><p></p><b><strong>YOU
  MIGHT THRIVE IF</strong></b><ul><li><p>You have 3+ years in a GTM Engineer, Sales
  Engineer, or Technical RevOps role</p></li><li><p>You can code comfortably (Python,
  SQL, or JavaScript) and have built real integrations or automation systems</p></li><li><p>You
  deeply understand the modern GTM stack and how different tools connect across the
  funnel</p></li><li><p>You think beyond tooling — you understand why data matters
  and how it influences sales outcomes</p></li><li><p>You’ve shipped workflows, tools,
  or systems that materially changed how a sales team operates</p></li><li><p>You
  enjoy owning ambiguous problems and turning them into scalable, automated solutions</p></li></ul><p></p><b><strong>JOB
  DETAILS</strong></b><ul><li><p>Cash: $190,000 – $230,000 base</p></li><li><p>Equity:
  Offer Equity</p></li><li><p>Location: Redwood City, CA <strong>(Relocation Provided)</strong></p></li><li><p>US
  Visas: Retell AI is open to sponsoring work authorization for qualified candidates,
  including H-1B, TN, L-1, E-3, F-1 (OPT/CPT), and O-1 visas.</p></li></ul><p></p><b><strong>OTHER
  BENEFITS</strong></b><ul><li><p>100% coverage for medical, dental, and vision insurance</p></li><li><p>$70/day
  DoorDash credit for unlimited breakfast, lunch, dinner, and snacks</p></li><li><p>$200/month
  wellness reimbursement (gym, fitness classes, etc.)</p></li><li><p>$300/month commuter
  reimbursement (gas, Caltrain, etc.)</p></li><li><p>$75/month phone bill reimbursement</p></li><li><p>$50/month
  internet reimbursement</p></li></ul><p></p><b><strong>COMPENSATION PHILOSOPHY</strong></b><ul><li><p>Best
  Offer Upfront: Choose from three cash-equity balance options; no negotiation needed.</p></li><li><p>Top
  1% Talent: Above-market pay (top 5 percentile) to attract exceptional builders.</p></li><li><p>High
  Ownership: Small teams, &gt;$1M revenue/employee, and significant equity.</p></li><li><p>Performance-Based:
  Offers tied to interview performance, not experience or past salaries.</p></li></ul><p></p><b><strong>INTERVIEW
  PROCESS</strong></b><p><strong>1. Recruiter Screen (15 mins): </strong>Introductory
  conversation to review your background, past automation/integration work, and overall
  fit for the role.</p><p><strong>2. GTM Systems Design (45 mins): </strong>You’ll
  be given a realistic GTM problem and asked to design an end-to-end automation approach
  live. We’re assessing systems thinking, tool fluency, and how you operate with ambiguity.</p><p><strong>3.
  CRM Audit &amp; Segmentation Design (1 hr): </strong>You’ll analyze a sample CRM
  dataset, identify what’s broken or underutilized, and propose a clear segmentation
  and activation framework that ties back to business impact.</p><p><strong>4. Onsite
  (3 hrs): </strong>Includes a hands-on GTM automation build, a cross-functional conversation
  with a business stakeholder, and a final discussion focused on strategy, vision,
  and long-term fit.</p>'
description_text: 'ABOUT RETELL AI Retell AI is using the first principles to reimagine
  the call center with cutting edge voice AI. Since launching 18 months ago, thousands
  of companies now utilize Retell’s AI voice agents to handle sales, support, and
  logistics calls that once required large teams of human agents. Backed by Y Combinator,
  Alt Capital, and other leading investors, we have scaled to $36M ARR with a team
  of 20 people, up from $5M at the start of 2025. Our vision for 2026 is to build
  a modern CX platform where entire contact centers are powered by AI. Instead of
  basic automation that needs constant human tuning, we’re creating intelligent AI
  “workers” that can act as frontline agents, QA analysts, and managers — continuously
  executing, monitoring, and improving customer interactions. We’re growing quickly
  and looking for ambitious builders who want to tackle hard technical problems, move
  fast, and have real impact at one of the fastest-growing voice AI startups. Let’s
  build the future together. We’re a top 50 AI app in a16z list: https://tinyurl.com/5853dt2x
  #4 on Brex''s Fast-Growing Software Vendors of 2025: https://www.brex.com/journal/brex-benchmark-december-2025
  We''re also one of the top ranking startups on: https://leanaileaderboard.com/ ABOUT
  THE ROLE We’re looking for a Senior GTM Engineer who sits at the intersection of
  engineering, data, and revenue. This role is focused on building and owning the
  systems that power our go-to-market motion — from lead flow and enrichment to routing,
  automation, and reporting. You’ll partner closely with sales, growth, and product
  to design scalable workflows that directly impact pipeline and revenue. This is
  a hands-on, builder-first role. You won’t just configure tools — you’ll write code,
  ship integrations, and create the infrastructure that makes our GTM engine faster,
  smarter, and more reliable. KEY RESPONSIBILITIES Design and implement end-to-end
  GTM workflows across lead capture, enrichment, routing, and outreach Build and maintain
  integrations using Python, SQL, or JavaScript to connect internal systems and external
  tools Own and optimize our GTM stack, including tools like Clay, Salesforce, enrichment
  APIs (e.g., Apollo, Clearbit), and automation layers such as n8n, Gumloop, or Zapier
  Ensure data quality and consistency across the funnel, from top-of-funnel acquisition
  through closed-won Create internal tools, scripts, and dashboards that improve sales
  team efficiency and visibility Continuously test, iterate, and ship improvements
  that measurably impact pipeline generation and conversion YOU MIGHT THRIVE IF You
  have 3+ years in a GTM Engineer, Sales Engineer, or Technical RevOps role You can
  code comfortably (Python, SQL, or JavaScript) and have built real integrations or
  automation systems You deeply understand the modern GTM stack and how different
  tools connect across the funnel You think beyond tooling — you understand why data
  matters and how it influences sales outcomes You’ve shipped workflows, tools, or
  systems that materially changed how a sales team operates You enjoy owning ambiguous
  problems and turning them into scalable, automated solutions JOB DETAILS Cash: $190,000
  – $230,000 base Equity: Offer Equity Location: Redwood City, CA (Relocation Provided)
  US Visas: Retell AI is open to sponsoring work authorization for qualified candidates,
  including H-1B, TN, L-1, E-3, F-1 (OPT/CPT), and O-1 visas. OTHER BENEFITS 100%
  coverage for medical, dental, and vision insurance $70/day DoorDash credit for unlimited
  breakfast, lunch, dinner, and snacks $200/month wellness reimbursement (gym, fitness
  classes, etc.) $300/month commuter reimbursement (gas, Caltrain, etc.) $75/month
  phone bill reimbursement $50/month internet reimbursement COMPENSATION PHILOSOPHY
  Best Offer Upfront: Choose from three cash-equity balance options; no negotiation
  needed. Top 1% Talent: Above-market pay (top 5 percentile) to attract exceptional
  builders. High Ownership: Small teams, &gt;$1M revenue/employee, and significant
  equity. Performance-Based: Offers tied to interview performance, not experience
  or past salaries. INTERVIEW PROCESS 1. Recruiter Screen (15 mins): Introductory
  conversation to review your background, past automation/integration work, and overall
  fit for the role. 2. GTM Systems Design (45 mins): You’ll be given a realistic GTM
  problem and asked to design an end-to-end automation approach live. We’re assessing
  systems thinking, tool fluency, and how you operate with ambiguity. 3. CRM Audit
  &amp; Segmentation Design (1 hr): You’ll analyze a sample CRM dataset, identify
  what’s broken or underutilized, and propose a clear segmentation and activation
  framework that ties back to business impact. 4. Onsite (3 hrs): Includes a hands-on
  GTM automation build, a cross-functional conversation with a business stakeholder,
  and a final discussion focused on strategy, vision, and long-term fit.'
