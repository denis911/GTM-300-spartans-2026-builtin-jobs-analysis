description_html: '<p>GTM Engineer @ Delve<br><strong>Full-time · In-Person · San
  Francisco</strong><br><strong>TL;DR:</strong> We need a technical, scrappy, systems-obsessed
  operator to join what we genuinely believe is one of the best growth teams on the
  planet. You''ll work directly with our growth leadership to build the automations,
  data pipelines, and AI-first workflows that have helped us generate over <strong>$100M
  in pipeline in the last 12 months</strong> — at a compliance startup. Yeah, you
  read that right.</p><b>About Delve</b><p>Delve is building an AI-native platform
  that transforms compliance from tedious, manual work into effortless, automated
  workflows. We''re the fastest growing compliance company on the market — helping
  hundreds of companies save hundreds of hours (Lovable, 11x, WisprFlow, and many
  more) by eliminating compliance busywork so they can focus on what actually matters:
  securely supporting their customers.<br>Our team is a tight-knit group of builders
  — former founders, operators, and engineers — obsessed with solving real problems
  for real customers. We come from Stanford, MIT, Berkeley, OpenAI, and international
  olympiads. Backed by <strong>Insight Partners</strong>, <strong>General Catalyst</strong>,
  <strong>Y Combinator</strong>, and top-tier investors, we just raised our <strong>$32M
  Series A</strong> and are scaling quickly.<br>One step at a time, we''re on a mission
  to eliminate busywork for humanity.</p><b>Why this role matters</b><p>Our growth
  team is world-famous. Not "we put it on a slide deck" famous — <strong>actually
  famous</strong>. We''re known for our growth hacks, our brand, our culture, and
  the absolutely ridiculous speed at which we execute. We''ve outbounded state senators
  on vacation. We''ve closed six-figure deals from a surf house in Hawaii. We''ve
  turned compliance — <em>compliance</em> — into something people actually talk about
  on Twitter.<br>But here''s the thing: we''re just getting started, and our systems
  need to scale as fast as our ambition. That''s where you come in.<br>Your north
  star is simple: <strong>reactivate deals and generate demos.</strong> Everything
  you build, every workflow you ship, every automation you dream up — it all ladders
  up to putting more qualified conversations on our AEs'' calendars and making sure
  no deal ever dies quietly in the CRM.</p><b>What you''ll do</b><p><strong>Build
  the pipeline machine.</strong> You''ll design and ship nurture sequences that keep
  prospects warm and move them through the funnel — not generic drip campaigns, but
  smart, signal-driven sequences that hit the right person with the right message
  at the right time. You''ll also build reactivation sequences that breathe life back
  into closed-lost and stalled deals, because there''s a goldmine sitting in our CRM
  and we need someone to go extract it.<br><strong>Arm our AEs for battle.</strong>
  You''ll build cold calling cockpits that give our ramping AEs everything they need
  to pick up the phone with confidence — account context, talking points, recent activity,
  competitive intel, all in one view. You''ll also create automatic morning deal briefings
  so every AE walks into their demos knowing exactly what''s happening with each account,
  what to watch for, and how to close.<br><strong>Be our eyes on the funnel.</strong>
  You''ll set up real-time alerts and notifications for high-value signals — logos
  entering the router, growing customers hitting expansion triggers, champion job
  changes, intent spikes. If something important happens in our pipeline, you''ll
  make sure the right person knows about it before they''ve finished their coffee.<br><strong>Own
  and orchestrate our GTM stack.</strong> We run a serious toolkit — Default, Unify,
  Clay, HeyGen, HeyReach, and more. You''ll be the person who makes all of these tools
  actually talk to each other, building the integrations, data flows, and automations
  that turn a collection of point solutions into a single, high-performance GTM engine.
  You''ll evaluate new tools, sunset what isn''t working, and make sure everything
  runs clean.<br><strong>Systematize what''s working.</strong> We move fast and break
  things (in a good way). You''ll take the scrappy plays that are generating pipeline
  and turn them into repeatable, scalable systems. Scoring, routing, enrichment, lifecycle
  management, usage signals — you''ll design and ship all of it.<br><strong>Run experiments,
  scale the winners.</strong> $100M in pipeline is great. We want more. You''ll dream
  up and execute differentiated outbound campaigns, A/B test everything, track what
  hits, kill what doesn''t, and scale the winners fast. Every experiment should have
  a clear line to demos booked or deals reactivated.<br><strong>Make us more AI-first
  than we already are.</strong> We sell AI. We should be using it everywhere. You''ll
  constantly find new ways to replace manual work with agents, workflows, and automation
  across every GTM function — from personalized video outreach with HeyGen to AI-powered
  account research to automated QBR prep.<br><strong>Partner across the org.</strong>
  Sales, Marketing, Customer Success, Product — you''ll work across all of them. You''ll
  sit with AEs to understand what''s slowing them down, shadow demos to understand
  what''s converting, and talk to CS to figure out which accounts are ready to expand.
  No silos. No politics. Just speed.</p><b>Your core KPIs</b><p>Let''s be real about
  what success looks like:</p><ul><li><p><strong>Demos generated</strong> — net new
  qualified meetings on AE calendars from your outbound, nurture, and reactivation
  workflows</p></li><li><p><strong>Deals reactivated</strong> — closed-lost and stalled
  opps brought back to life and re-entering pipeline</p></li><li><p><strong>AE efficiency</strong>
  — time saved per rep per day through briefings, cockpits, and automation</p></li><li><p><strong>Pipeline
  velocity</strong> — how fast deals move through stages thanks to your systems and
  signals</p></li></ul><p>If those numbers are going up and to the right, you''re
  winning.</p><b>Who you are</b><p>You''ve got <strong>5+ years</strong> in GTM operations,
  RevOps, growth engineering, or something adjacent — and you''ve got the technical
  chops to back it up. You''ve actually <em>built</em> things: scoring models, routing
  logic, outbound infrastructure, enrichment pipelines, nurture engines, calling workflows.
  Not managed them. Built them.<br>You''re deep in the modern GTM tooling world. Clay,
  Unify, Default, HeyGen, HeyReach, Zapier, n8n — you know what''s best-in-class and
  you have strong opinions about it. You write SQL. You mess with APIs. You might
  even write scripts when the no-code tool isn''t cutting it.<br>You''re a systems
  thinker who simplifies complexity instead of adding to it. You have a bias for automation
  and an allergic reaction to manual processes. You thrive in fast-paced environments
  where priorities shift and you''re expected to figure things out on your own.<br>You
  care about craft. Not just shipping — shipping <em>well</em>. The small details
  matter to you because you know that''s where the compounding gains live.<br><strong>Bonus
  points if:</strong> you have a CS degree, you''ve worked at a high-growth B2B SaaS
  startup, you''ve built cold calling cockpits or deal intelligence systems before,
  or you''ve ever resurrected a dead pipeline and turned it into real revenue.</p><b>Why
  in-person in SF matters</b><p>This is a fully in-person role at our San Francisco
  office. Here''s why we don''t apologize for that:</p><ul><li><p><strong>You''ll
  work shoulder-to-shoulder with an exceptional team.</strong> Decisions happen live,
  not in backlogged async threads.</p></li><li><p><strong>A players work with A players.</strong>
  There''s a buzzing energy in the office. Hit the whiteboard with anyone here and
  you''ll understand why.</p></li><li><p><strong>Speed requires proximity.</strong>
  The kind of experiments we run and the pace at which we ship — that happens when
  you can tap someone on the shoulder, not schedule a Zoom.</p></li></ul><b>Compensation
  &amp; Benefits</b><p><strong>$140,000 – $220,000</strong> base salary (depending
  on experience) + meaningful equity in a rocketship.</p><ul><li><p>100% medical,
  dental &amp; vision coverage (for you; partial for dependents)</p></li><li><p>401k
  with employer match</p></li><li><p>Unlimited PTO + federal holidays</p></li><li><p>GrubHub
  stipend + all meals covered in-office</p></li><li><p>Gym membership covered</p></li><li><p>Frequent
  team dinners, events, and off-sites (yes, including the Hawaii hackathons)</p></li><li><p>The
  chance to be an early member of a growth team that people will study for years</p></li><li><p>A
  culture that values speed, creativity, and ownership over titles and bureaucracy</p></li></ul><b>One
  more thing</b><p>We don''t care where you went to school. We don''t care about your
  resume formatting. We care about what you''ve built, how you think, and whether
  you can keep up. If you''ve ever looked at a stale CRM full of dead deals and thought
  "I could turn half of these into demos by next Friday" — we want to talk to you.<br><strong>Delve
  is an equal opportunity employer.</strong> We don''t discriminate based on gender,
  ethnicity, sexual orientation, religion, age, disability, race, or anything else.
  We want the best people, period.</p>'
