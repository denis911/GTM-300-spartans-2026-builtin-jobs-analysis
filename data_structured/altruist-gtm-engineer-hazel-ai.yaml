company_overview: Altruist is on a mission to make independent financial advice better,
  more affordable, and accessible. We’ve built an all-in-one platform that reduces
  barriers for financial advisors to deliver great advice. Our software makes advisors
  more efficient and gives them the freedom to charge less. This means clients pay
  less, make more, and gain confidence. We want to help tens of millions of people
  have an amazing experience with their money by supporting thousands of financial
  professionals.
