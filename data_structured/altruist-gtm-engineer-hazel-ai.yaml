description_html: <p><p><span><strong>About Altruist</strong></span></p><p>Altruist
  is transforming the multi-trillion dollar wealth management industry by building
  an AI platform for wealth professionals. We partner with financial advisors nationwide,
  empowering them to grow, optimize time and resources, and deliver superior outcomes
  for their clients.</p><p>We're looking for exceptional talent to help us achieve
  our mission of making financial advice better, more affordable, and accessible to
  all. If you're passionate about challenging the status quo and want to do the most
  important work of your life, we'd love to meet you!</p><p><span><strong>But first,
  our values</strong></span></p><p><strong>Kindness</strong> - Kindness doesn’t <em>just</em>
  equal niceness. We listen to understand. We embrace, and encourage healthy debate
  and diverse perspectives. We approach conflict openly, honestly, and respectfully.<br><strong>Brilliance</strong>
  - Humility is the skill we’re most proud of and possessing a growth mindset is always
  top of mind. We take ownership in everything we touch; regularly using our unique
  superpowers to reach a common goal as a team. We succeed and fail as one.<br><strong>Grit</strong>
  - When challenges arise, we stay laser focused on achieving our mission and finding
  a way forward, even when it’s hard. We are nimble and maintain a sense of urgency,
  swiftly adapting to change and overcoming obstacles.</p></p><p><span><span><strong>About
  Hazel</strong></span></span></p><p>Hazel is building the AI engine for wealth management
  that helps unlock 10x growth, efficiency and value for financial advisors and their
  clients in a regulated industry. Since its launch last September, Hazel has organically
  and rapidly grown its user base.</p><p>Hazel is a part of Altruist’s broader mission
  to make financial advice better, more affordable, and accessible to all.</p><p><span><span><strong>The
  opportunity</strong></span></span></p><p>Architect the commercial infrastructure
  for Hazel. You’ll sit at the intersection of sales, marketing, product, and data,
  turning GTM strategy into automated systems that generate pipeline, accelerate deals,
  and surface the insights that drive our business strategy.&nbsp;As one of the first
  GTM Engineers at Hazel, you’ll build foundational systems that will power our growth
  for years. If you love writing code as much as you love closing revenue loops —
  and you want to do it inside one of the most exciting AI companies in fintech —
  this is the role for you.</p><p><span><strong>What you'll do</strong></span></p><ul><li>Design,
  build, and own Hazel’s GTM tech stack – including CRM (HubSpot/Salesforce), marketing
  automation, data enrichment, and outbound sequencing tools.</li><li>Build automated
  workflows and AI-powered systems to support lead scoring, lifecycle marketing, outbound
  prospecting, and account-based motion.</li><li>Write Python and/or JavaScript to
  connect data sources, automate enrichment pipelines, and extend CRM capabilities
  through APIs and custom integrations.</li><li>Instrument the full funnel – from
  top-of-funnel awareness through activation and expansion – to surface actionable
  insights and revenue attribution to GTM leadership.</li><li>Partner with Sales,
  Marketing, and Product to translate business needs into scalable technical solutions;
  own delivery end-to-end.</li><li>Build and maintain a clean, reliable data foundation
  in our revenue data warehouse, enabling accurate forecasting and pipeline analytics.</li><li>Evaluate
  and implement AI tools (e.g., Clay, Apollo, Instantly, and emerging LLM-based GTM
  tools) to amplify rep productivity and pipeline quality.</li><li>Reduce manual ops
  overhead by automating repetitive GTM tasks so the team can focus on high-leverage
  activities.</li><li>Willingness and comfort serving as technical support for AEs
  on sales calls.</li></ul><p><strong>What you'll bring</strong></p><ul><li>2-4 years
  of experience in Product/GTM Engineering at a high-growth SaaS or fintech company.</li><li>Demonstrated
  ability to write production-quality code in Python, TypeScript or Javascript to
  build integrations, automation workflows, and data pipelines.</li><li>Have built
  or prototyped AI-powered workflows using LLM APIs, Claude Code and/or OpenClaw.</li><li>Hands-on
  experience with CRM platforms (HubSpot or Salesforce), marketing automation, and
  sales engagement tools (Outreach, Salesloft, Apollo, or similar).</li><li>Strong
  SQL skills and comfort working with data warehouses (Snowflake, BigQuery, or Databricks)
  to build revenue dashboards and funnel analytics.</li><li>Experience with data enrichment
  and orchestration tools (Clay, Clearbit, ZoomInfo, or similar) to build intelligent
  lead flows.</li><li>A systems-thinker who can design scalable GTM architecture,
  not just patch point solutions.</li><li>Strong cross-functional communication skills
  – you’ll translate between business stakeholders and technical systems regularly.</li><li>Comfort
  with ambiguity and early-stage pace – you move fast, prioritize ruthlessly, and
  iterate on the fly.</li></ul><p><span><strong>Bonus points</strong></span></p><ul><li>Experience
  building GTM systems for AI-native products, where the sales motion and buyer education
  are non-standard.</li><li>Experience with LLM APIs (OpenAI, Anthropic, or similar)
  to build AI-powered GTM workflows – lead qualification agents, email personalization,
  call summarization, etc.</li><li>Background in data engineering or analytics engineering
  (dbt, Fivetran, Segment, or similar).</li><li>Prior experience at an early-stage
  startup where you were the first or one of the first technical hires on the GTM
  side.</li></ul><p><span><strong>Leveling &amp; compensation</strong></span></p><p>This
  role has a target compensation range of $200,000-$225,000. Final level and compensation
  is individualized and will be determined based on overall experience, qualifications,
  and interview performance.</p><p><p><span><strong>What we bring</strong></span></p><p>Attracting
  and retaining top-tier talent is a priority. We are proud of the culture we’ve built
  and are cognizant of the ever-changing professional landscape. Our dynamic offering
  of perks and benefits are tailored for you to feel your best while doing your best.</p><ul><li>A
  hybrid work schedule for most positions to promote strong, in-person collaboration.</li><li>Stunning,
  amenity-filled office spaces in Culver City, CA, San Francisco, CA, and Dallas,
  TX. Our offices are intentionally designed for comfort, collaboration, and productivity.&nbsp;</li><li>Competitive
  pay and equity for eligible positions.</li><li>Premium healthcare, dental, and vision
  insurance plans (HMO and PPO).</li><li>401k savings plan with a 4% match and immediate
  vesting.</li><li>16 week paid parental leave.</li><li>Professional growth and development
  opportunities including an employee mobility program and an annual L&amp;D budget
  allocation for each employee.</li><li>Company perks program (includes discounts
  on pet insurance, fitness, cell phone plans, and travel, etc.).</li><li>Financial
  guidance program (includes counseling on navigating debt, tracking personal spend,
  saving and planning goals, home-purchasing preparedness, etc.).</li><li>One month
  work from anywhere policy (with the exception of a few countries).</li></ul><p><em><span>Total
  compensation includes a competitive benefits package, along with equity in the form
  of Stock Options (ISOs) for eligible roles. For salaried positions, a salary offer
  will be determined by a number of factors including experience, skill level, internal
  pay equity, geographic location, and other relevant business considerations. We
  review all employee pay and compensation programs regularly to ensure&nbsp;</span><span>fair,
  equitable, and competitive pay. At Altruist, we are committed to providing fair,
  equitable, and competitive compensation by leveraging market data to inform our
  pay bands. Base salaries will be reviewed at regular intervals throughout the year,
  typically in conjunction with performance review cycles. By evaluating compensation
  on a regular basis, we are able to reward high performance and ensure all employees
  have opportunities for growth.</span></em></p><p><em><span>Don’t meet every single
  requirement? Studies have shown that women and people of color are less likely to
  apply to jobs unless they meet every single qualification. At Altruist we are dedicated
  to building a diverse, inclusive, and authentic workplace, so if you’re excited
  about this role, but your past experience doesn’t align perfectly with every qualification
  in the job description, we encourage you to apply anyways. You may be just the right
  candidate for this or other roles.</span></em></p></p>
description_text: About Altruist Altruist is transforming the multi-trillion dollar
  wealth management industry by building an AI platform for wealth professionals.
  We partner with financial advisors nationwide, empowering them to grow, optimize
  time and resources, and deliver superior outcomes for their clients. We're looking
  for exceptional talent to help us achieve our mission of making financial advice
  better, more affordable, and accessible to all. If you're passionate about challenging
  the status quo and want to do the most important work of your life, we'd love to
  meet you! But first, our values Kindness - Kindness doesn’t just equal niceness.
  We listen to understand. We embrace, and encourage healthy debate and diverse perspectives.
  We approach conflict openly, honestly, and respectfully. Brilliance - Humility is
  the skill we’re most proud of and possessing a growth mindset is always top of mind.
  We take ownership in everything we touch; regularly using our unique superpowers
  to reach a common goal as a team. We succeed and fail as one. Grit - When challenges
  arise, we stay laser focused on achieving our mission and finding a way forward,
  even when it’s hard. We are nimble and maintain a sense of urgency, swiftly adapting
  to change and overcoming obstacles. About Hazel Hazel is building the AI engine
  for wealth management that helps unlock 10x growth, efficiency and value for financial
  advisors and their clients in a regulated industry. Since its launch last September,
  Hazel has organically and rapidly grown its user base. Hazel is a part of Altruist’s
  broader mission to make financial advice better, more affordable, and accessible
  to all. The opportunity Architect the commercial infrastructure for Hazel. You’ll
  sit at the intersection of sales, marketing, product, and data, turning GTM strategy
  into automated systems that generate pipeline, accelerate deals, and surface the
  insights that drive our business strategy.&nbsp;As one of the first GTM Engineers
  at Hazel, you’ll build foundational systems that will power our growth for years.
  If you love writing code as much as you love closing revenue loops — and you want
  to do it inside one of the most exciting AI companies in fintech — this is the role
  for you. What you'll do Design, build, and own Hazel’s GTM tech stack – including
  CRM (HubSpot/Salesforce), marketing automation, data enrichment, and outbound sequencing
  tools. Build automated workflows and AI-powered systems to support lead scoring,
  lifecycle marketing, outbound prospecting, and account-based motion. Write Python
  and/or JavaScript to connect data sources, automate enrichment pipelines, and extend
  CRM capabilities through APIs and custom integrations. Instrument the full funnel
  – from top-of-funnel awareness through activation and expansion – to surface actionable
  insights and revenue attribution to GTM leadership. Partner with Sales, Marketing,
  and Product to translate business needs into scalable technical solutions; own delivery
  end-to-end. Build and maintain a clean, reliable data foundation in our revenue
  data warehouse, enabling accurate forecasting and pipeline analytics. Evaluate and
  implement AI tools (e.g., Clay, Apollo, Instantly, and emerging LLM-based GTM tools)
  to amplify rep productivity and pipeline quality. Reduce manual ops overhead by
  automating repetitive GTM tasks so the team can focus on high-leverage activities.
  Willingness and comfort serving as technical support for AEs on sales calls. What
  you'll bring 2-4 years of experience in Product/GTM Engineering at a high-growth
  SaaS or fintech company. Demonstrated ability to write production-quality code in
  Python, TypeScript or Javascript to build integrations, automation workflows, and
  data pipelines. Have built or prototyped AI-powered workflows using LLM APIs, Claude
  Code and/or OpenClaw. Hands-on experience with CRM platforms (HubSpot or Salesforce),
  marketing automation, and sales engagement tools (Outreach, Salesloft, Apollo, or
  similar). Strong SQL skills and comfort working with data warehouses (Snowflake,
  BigQuery, or Databricks) to build revenue dashboards and funnel analytics. Experience
  with data enrichment and orchestration tools (Clay, Clearbit, ZoomInfo, or similar)
  to build intelligent lead flows. A systems-thinker who can design scalable GTM architecture,
  not just patch point solutions. Strong cross-functional communication skills – you’ll
  translate between business stakeholders and technical systems regularly. Comfort
  with ambiguity and early-stage pace – you move fast, prioritize ruthlessly, and
  iterate on the fly. Bonus points Experience building GTM systems for AI-native products,
  where the sales motion and buyer education are non-standard. Experience with LLM
  APIs (OpenAI, Anthropic, or similar) to build AI-powered GTM workflows – lead qualification
  agents, email personalization, call summarization, etc. Background in data engineering
  or analytics engineering (dbt, Fivetran, Segment, or similar). Prior experience
  at an early-stage startup where you were the first or one of the first technical
  hires on the GTM side. Leveling &amp; compensation This role has a target compensation
  range of $200,000-$225,000. Final level and compensation is individualized and will
  be determined based on overall experience, qualifications, and interview performance.
  What we bring Attracting and retaining top-tier talent is a priority. We are proud
  of the culture we’ve built and are cognizant of the ever-changing professional landscape.
  Our dynamic offering of perks and benefits are tailored for you to feel your best
  while doing your best. A hybrid work schedule for most positions to promote strong,
  in-person collaboration. Stunning, amenity-filled office spaces in Culver City,
  CA, San Francisco, CA, and Dallas, TX. Our offices are intentionally designed for
  comfort, collaboration, and productivity.&nbsp; Competitive pay and equity for eligible
  positions. Premium healthcare, dental, and vision insurance plans (HMO and PPO).
  401k savings plan with a 4% match and immediate vesting. 16 week paid parental leave.
  Professional growth and development opportunities including an employee mobility
  program and an annual L&amp;D budget allocation for each employee. Company perks
  program (includes discounts on pet insurance, fitness, cell phone plans, and travel,
  etc.). Financial guidance program (includes counseling on navigating debt, tracking
  personal spend, saving and planning goals, home-purchasing preparedness, etc.).
  One month work from anywhere policy (with the exception of a few countries). Total
  compensation includes a competitive benefits package, along with equity in the form
  of Stock Options (ISOs) for eligible roles. For salaried positions, a salary offer
  will be determined by a number of factors including experience, skill level, internal
  pay equity, geographic location, and other relevant business considerations. We
  review all employee pay and compensation programs regularly to ensure&nbsp; fair,
  equitable, and competitive pay. At Altruist, we are committed to providing fair,
  equitable, and competitive compensation by leveraging market data to inform our
  pay bands. Base salaries will be reviewed at regular intervals throughout the year,
  typically in conjunction with performance review cycles. By evaluating compensation
  on a regular basis, we are able to reward high performance and ensure all employees
  have opportunities for growth. Don’t meet every single requirement? Studies have
  shown that women and people of color are less likely to apply to jobs unless they
  meet every single qualification. At Altruist we are dedicated to building a diverse,
  inclusive, and authentic workplace, so if you’re excited about this role, but your
  past experience doesn’t align perfectly with every qualification in the job description,
  we encourage you to apply anyways. You may be just the right candidate for this
  or other roles.
