description_html: '<p><strong>About the Role:</strong> We are looking for an <strong>GTM
  Engineer</strong> where you won’t just be using our tools—you’ll be the "First Customer,"
  building the AI-native systems that power our technical support, onboarding, and
  customer success engines.</p><p>You will own the technical roadmap for how LangChain
  supports its users. Your goal is to drive massive <strong>case deflection</strong>
  and a premium <strong>onboarding experience</strong> by building autonomous agents
  that solve complex technical problems before a human ever needs to step in. This
  is a role for a <strong>builder-operator</strong> who can identify a friction point
  in the customer journey and ship a production-grade agentic solution to fix it.</p><p></p><b><strong>You
  Will:</strong></b><ul><li><p><strong>Architect Customer Agents:</strong> Design
  and deploy production-grade agents (using LangGraph and LangSmith) that handle technical
  support queries, troubleshoot integrations, and guide users through complex onboarding
  flows.</p></li><li><p><strong>Drive Case Deflection:</strong> Analyze customer friction
  points and build self-service AI systems that significantly reduce support volume
  while improving the quality of the customer experience.</p></li><li><p><strong>Own
  the Domain:</strong> Act as the product owner and the technical muscle proactively
  identifying opportunities for improvement, propose architectures, and own the full
  lifecycle of the systems you build.</p></li><li><p><strong>Dogfood the Stack:</strong>
  Be a key member of the feedback loop for our product team. As you build complex
  systems for our customers, you’ll identify gaps in our frameworks and contribute
  back to the <strong>LangChain</strong> and <strong>LangGraph</strong> open-source
  ecosystem.</p></li><li><p><strong>Build Onboarding Workflows:</strong> Develop "AI-native
  onboarding" experiences that help enterprise customers move from prototypes to production
  faster by automating documentation retrieval and code generation.</p></li></ul><b>What
  we are looking for:</b><ul><li><p><strong>AI-Native Developer:</strong> You have
  a deep understanding of the LLM stack: prompting, retrieval (RAG), cognitive architectures,
  and agentic loops. You have likely already built with LangChain or LangGraph.</p></li><li><p><strong>Engineering
  Foundation:</strong> You are a strong software engineer (typically 3+ years) with
  at least 1 year of experience specifically shipping LLM systems in production.</p></li><li><p><strong>Self-Directed
  "Founder" Mentality:</strong> You don''t need a ticket to tell you what to fix.
  You are comfortable navigating ambiguity, identifying high-impact problems, and
  driving them to completion autonomously.</p></li><li><p><strong>Full-Stack Capability:</strong>
  Strong coding skills in <strong>Python</strong> or <strong>TypeScript</strong> (ideally
  both) and the ability to build end-to-end applications.</p></li><li><p><strong>Customer-Centric:</strong>
  You enjoy the intersection of high-level engineering and direct customer impact.
  You can translate a customer''s technical pain point into a scalable system architecture.</p></li></ul><p><strong>Nice
  to Haves:</strong></p><ul><li><p>Expertise with <strong>LangSmith</strong> for evaluation
  and monitoring.</p></li><li><p>Experience building or maintaining <strong>open-source</strong>
  projects.</p></li><li><p>A background in technical consulting, solutions engineering,
  or high-growth GTM teams.</p></li></ul><p><strong>Compensation</strong>:</p><ul><li><p>We
  offer competitive compensation that includes base salary, meaningful equity, benefits,
  and perks. Benefits include things like medical, dental, and vision coverage, flexible
  vacation, a 401(k) plan, and life insurance.</p></li><li><p><strong>Salary: </strong>$160K
  - $180K</p></li></ul>'
description_text: 'About the Role: We are looking for an GTM Engineer where you won’t
  just be using our tools—you’ll be the "First Customer," building the AI-native systems
  that power our technical support, onboarding, and customer success engines. You
  will own the technical roadmap for how LangChain supports its users. Your goal is
  to drive massive case deflection and a premium onboarding experience by building
  autonomous agents that solve complex technical problems before a human ever needs
  to step in. This is a role for a builder-operator who can identify a friction point
  in the customer journey and ship a production-grade agentic solution to fix it.
  You Will: Architect Customer Agents: Design and deploy production-grade agents (using
  LangGraph and LangSmith) that handle technical support queries, troubleshoot integrations,
  and guide users through complex onboarding flows. Drive Case Deflection: Analyze
  customer friction points and build self-service AI systems that significantly reduce
  support volume while improving the quality of the customer experience. Own the Domain:
  Act as the product owner and the technical muscle proactively identifying opportunities
  for improvement, propose architectures, and own the full lifecycle of the systems
  you build. Dogfood the Stack: Be a key member of the feedback loop for our product
  team. As you build complex systems for our customers, you’ll identify gaps in our
  frameworks and contribute back to the LangChain and LangGraph open-source ecosystem.
  Build Onboarding Workflows: Develop "AI-native onboarding" experiences that help
  enterprise customers move from prototypes to production faster by automating documentation
  retrieval and code generation. What we are looking for: AI-Native Developer: You
  have a deep understanding of the LLM stack: prompting, retrieval (RAG), cognitive
  architectures, and agentic loops. You have likely already built with LangChain or
  LangGraph. Engineering Foundation: You are a strong software engineer (typically
  3+ years) with at least 1 year of experience specifically shipping LLM systems in
  production. Self-Directed "Founder" Mentality: You don''t need a ticket to tell
  you what to fix. You are comfortable navigating ambiguity, identifying high-impact
  problems, and driving them to completion autonomously. Full-Stack Capability: Strong
  coding skills in Python or TypeScript (ideally both) and the ability to build end-to-end
  applications. Customer-Centric: You enjoy the intersection of high-level engineering
  and direct customer impact. You can translate a customer''s technical pain point
  into a scalable system architecture. Nice to Haves: Expertise with LangSmith for
  evaluation and monitoring. Experience building or maintaining open-source projects.
  A background in technical consulting, solutions engineering, or high-growth GTM
  teams. Compensation : We offer competitive compensation that includes base salary,
  meaningful equity, benefits, and perks. Benefits include things like medical, dental,
  and vision coverage, flexible vacation, a 401(k) plan, and life insurance. Salary:
  $160K - $180K'
