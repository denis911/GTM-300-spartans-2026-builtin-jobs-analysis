  shaping the architecture, design, and execution of critical systems that power Adyen’s
  global financial products. You’ll work closely with engineering teams, product partners,
  and cross-functional stakeholders to solve complex technical challenges, drive technical
  excellence, and ensure our solutions scale with the needs of our global business.
  Your expertise will guide the direction of our technology stack, influence best
