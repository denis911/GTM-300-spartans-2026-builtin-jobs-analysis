description_html: <p><strong>This is Adyen</strong></p><p><span>Adyen provides payments,
  data, and financial products in a single solution for customers like Meta, Uber,
  H&amp;M, and Microsoft - making us the financial technology platform of choice.
  At Adyen, everything we do is engineered for ambition.&nbsp;</span></p><p><span>For
  our teams, we create an environment with opportunities for our people to succeed,
  backed by the culture and support to ensure they are enabled to truly own their
  careers. We are motivated individuals who tackle unique technical challenges at
  scale and solve them as a team. Together, we deliver innovative and ethical solutions
  that help businesses achieve their ambitions faster.</span></p><p><strong>Staff
  Engineer - Financial Products</strong></p><p>In this role, you will be a technical
  leader and trusted advisor, shaping the architecture, design, and execution of critical
  systems that power Adyen’s global financial products. You’ll work closely with engineering
  teams, product partners, and cross-functional stakeholders to solve complex technical
  challenges, drive technical excellence, and ensure our solutions scale with the
  needs of our global business. Your expertise will guide the direction of our technology
  stack, influence best practices, and help set the technical vision for the organization.</p><p>You
  thrive in a fast-paced, global environment and are passionate about building robust,
  scalable systems that deliver real value to Adyen’s customers. You’re not afraid
  to challenge the status quo, advocate for innovation, and mentor others to raise
  the bar across the engineering organization. This is a pivotal moment to shape the
  future of Financial Products at Adyen, and your impact will be felt across the company
  and beyond.</p><p><strong>What you'll do</strong></p><ul><li>Scale and expand our
  foundation that supports the needs of all Adyen products;</li><li>Provide architectural
  and design leadership to build a strong foundation for our Financial Products offering;</li><li>Design
  and build new rails as Adyen expands their financial products;</li><li>Mentor engineers
  to uphold high standards of and technical excellence;</li><li>Drive a culture of
  continuous innovation by challenging the status quo and introducing transformative
  ideas.<br></li></ul><b><strong>Who you are</strong></b><ul><li><strong>Must have:</strong></li><ul><li>2+
  years of experience in the financial industry, preferably in the banking or fintech
  sector;</li><li>10+ years of hands-on development experience in a modern engineering
  environment;</li><li>Technical leadership experience, including mentoring engineers
  and leading an engineering strategy;</li><li>Hands-on experience designing and building
  large scale distributed systems;</li><li>Strong background and hands-on experience
  coding with Java;</li><li>Platform mindset. Able to generalize complex processes
  and create simple and flexible services to support multiple products;</li><li>Proactive
  relationship-builder with strong communication skills and the ability to work closely
  with diverse stakeholders across cultures;</li><li>Self-starter who can identify
  problems and figure out solutions</li></ul></ul><br><br><p><span>This role's annual
  base salary range is $235k–$317k, plus RSUs. To</span><em><span> learn more about
  our compensation philosophy, please click </span><span>here</span><span>.</span></em></p><br><p><strong>Our
  Diversity, Equity and Inclusion commitments&nbsp;</strong></p><p><span>Our unique
  approach is a product of our diverse perspectives. This diversity of backgrounds
  and cultures is essential in helping us maintain our momentum. Our business and
  technical challenges are unique, and we need as many different voices as possible
  to join us in solving them - voices like yours. No matter who you are or where you’re
  from, we welcome you to be your true self at Adyen.&nbsp;</span></p><p><span>Studies
  show that women and members of underrepresented communities apply for jobs only
  if they meet 100% of the qualifications. Does this sound like you? If so, Adyen
  encourages you to reconsider and apply. We look forward to your application!</span></p><br><p><strong>What’s
  next?</strong></p><p><span>Ensuring a smooth and enjoyable candidate experience
  is critical for us. We aim to get back to you regarding your application within
  5 business days. Our interview process tends to take about 4 weeks to complete,
  but may fluctuate depending on the role. </span><span>Learn more about our hiring
  process here</span><span>. Don’t be afraid to let us know if you need more flexibility.</span></p><p><span>Adyen
  is an equal opportunity employer. We do not discriminate based on race, color, ethnicity,
  ancestry, national origin, religion, sex, gender, gender identity, gender expression,
  sexual orientation, age, disability, veteran status, genetic information, marital
  status or any legally protected status.</span></p><p><span>All your information
  will be kept confidential according to EEO guidelines.</span></p><p>You must be
  work authorized in the United States without the need for new visa sponsorship.
  The company can support visa transfers but will not sponsor individuals for H-1B
  CAP applications.</p><br><br>
