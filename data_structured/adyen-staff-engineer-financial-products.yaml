  systems that deliver real value to Adyen’s customers. You’re not afraid to challenge
  the status quo, advocate for innovation, and mentor others to raise the bar across
  the engineering organization. This is a pivotal moment to shape the future of Financial
  Products at Adyen, and your impact will be felt across the company and beyond. What
  you''ll do Scale and expand our foundation that supports the needs of all Adyen
  products; Provide architectural and design leadership to build a strong foundation
  for our Financial Products offering; Design and build new rails as Adyen expands
  their financial products; Mentor engineers to uphold high standards of and technical
  excellence; Drive a culture of continuous innovation by challenging the status quo
  and introducing transformative ideas. Who you are Must have: 2+ years of experience
  in the financial industry, preferably in the banking or fintech sector; 10+ years
  of hands-on development experience in a modern engineering environment; Technical
  leadership experience, including mentoring engineers and leading an engineering
  strategy; Hands-on experience designing and building large scale distributed systems;
  Strong background and hands-on experience coding with Java; Platform mindset. Able
  to generalize complex processes and create simple and flexible services to support
  multiple products; Proactive relationship-builder with strong communication skills
  and the ability to work closely with diverse stakeholders across cultures; Self-starter
  who can identify problems and figure out solutions This role''s annual base salary
  range is $235k–$317k, plus RSUs. To learn more about our compensation philosophy,
  please click here . Our Diversity, Equity and Inclusion commitments&nbsp; Our unique
  approach is a product of our diverse perspectives. This diversity of backgrounds
  and cultures is essential in helping us maintain our momentum. Our business and
  technical challenges are unique, and we need as many different voices as possible
  to join us in solving them - voices like yours. No matter who you are or where you’re
  from, we welcome you to be your true self at Adyen.&nbsp; Studies show that women
  and members of underrepresented communities apply for jobs only if they meet 100%
  of the qualifications. Does this sound like you? If so, Adyen encourages you to
  reconsider and apply. We look forward to your application! What’s next? Ensuring
  a smooth and enjoyable candidate experience is critical for us. We aim to get back
  to you regarding your application within 5 business days. Our interview process
  tends to take about 4 weeks to complete, but may fluctuate depending on the role.
  Learn more about our hiring process here . Don’t be afraid to let us know if you
  need more flexibility. Adyen is an equal opportunity employer. We do not discriminate
  based on race, color, ethnicity, ancestry, national origin, religion, sex, gender,
  gender identity, gender expression, sexual orientation, age, disability, veteran
  status, genetic information, marital status or any legally protected status. All
  your information will be kept confidential according to EEO guidelines. You must
  be work authorized in the United States without the need for new visa sponsorship.
  The company can support visa transfers but will not sponsor individuals for H-1B
  CAP applications.'
