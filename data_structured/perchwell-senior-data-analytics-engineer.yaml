description_html: '<p><strong>Who We Are</strong></p><p>Perchwell is the modern real
  estate listings platform built for agents to search smarter, collaborate better,
  and close deals faster. We are building the future of residential real estateʼs
  critical listings infrastructure: a platform where market&nbsp; research and client&nbsp;collaboration
  converge. Our modern architecture enables continuous innovation at a pace legacy
  systems cannot match, with AI-powered features and mobile-first capabilities designed
  for how agents actually work. As consumer expectations and technology evolve, Perchwell
  remains focused on our core vision:&nbsp; empowering real estate professionals with
  the most intelligent, data-driven, and connected platform in the industry.</p><p>Backed
  by leading venture capital firms including Lux Capital and Founders Fund, along
  with strategic partnerships with some of the country''s top Multiple Listing Services
  (MLSs), Perchwell represents the first major new platform to enter the listings
  technology market in decades. This unique combination of institutional investment
  and deep industry alignment provides both the resources and market validation needed
  to transform the multi-trillion dollar residential real estate industry.</p><p></p><b><strong>What
  we''re looking for</strong></b><p>Perchwell is rapidly expanding across the US to
  new MLS clients with both unique data sources that must be integrated into our data
  layer and sophisticated analytics requirements. Robust data management and analytics
  capabilities are therefore key to our future success. We are looking for a senior
  data analyst to propel our data integration strategies forward, establish and maintain
  data quality KPIs at scale, and lead a team of junior analysts to meet our customers’
  needs.</p><p></p><p><strong>What you’ll do</strong></p><ul><li><p>Deliver MLS implementations
  and onboard customer data into our data layer, partnering cross-functionally to
  ensure smooth launches.</p></li><li><p>Build validation frameworks to ensure customer
  data is complete, accurate, and consistent.</p></li><li><p>Improve our BI layer
  by strengthening semantic models, metric definitions, and query performance to power
  trusted dashboards and reporting.</p></li><li><p>Partner with Analytics Engineering
  to refine, document, and test dbt models, supporting QA and transformation validation.</p></li><li><p>Investigate
  ingestion anomalies and proactively surface data quality issues before they affect
  downstream reporting.</p></li><li><p>Work with internal and customer-facing teams
  to translate reporting needs into scalable data models and actionable visibility.</p></li><li><p>Standardize
  dashboards and reporting patterns, balancing customer-specific requests with reusable
  solutions.</p></li><li><p>Support planning and scaling of the Data Analytics team.</p></li></ul><p></p><p><strong>Required
  for the role</strong></p><ul><li><p><strong>6+</strong> years of experience in a
  data analyst or analytics engineering role, preferably working with third-party
  data sources or customer integrations.</p></li><li><p>Advanced SQL expertise, including
  complex joins, window functions, and efficient use of CTEs and nested subqueries
  to create readable, performant, and reusable <strong>query logic</strong>.</p></li><li><p>Intermediate
  Python skills for data validation, automation, or light scripting (e.g., pandas,
  data profiling).</p></li><li><p>Strong attention to detail and a passion for data
  quality, integrity, and repeatable processes.</p></li><li><p>Experience working
  in a modern data warehouse (e.g., Redshift, Snowflake, BigQuery) and tools like
  dbt.</p></li><li><p>Ability to work cross-functionally to translate ambiguous requirements
  into structured workflows.</p></li><li><p>Strong communication skills, including
  the ability to explain data issues to non-technical stakeholders.</p></li></ul><p></p><p><strong>Preferred
  Qualifications</strong></p><ul><li><p>Experience mapping external schemas into internal
  data models during customer onboarding.</p></li><li><p>Familiarity with version-controlled
  analytics workflows (Git), JIRA/ticketing systems, and collaborative documentation
  tools.</p></li><li><p>Exposure to data observability tools (e.g., Monte Carlo, Great
  Expectations, or custom logging frameworks).</p></li><li><p>Understanding of dimensional
  modeling and data warehouse best practices.</p></li><li><p>Apply best practices
  in <strong>data modeling and semantic layer design</strong> to support scalable
  reporting and self-service analytics.</p></li></ul><p></p><p><strong>Salary Information</strong></p><p>To
  provide greater transparency to candidates, we share base salary ranges for all
  US-based job postings regardless of state. Our ranges are based on function and
  level benchmarked against similar stage growth companies. Final offer amounts are
  determined by multiple factors including skills, job-related knowledge and depth
  of work experience.</p><p>The base compensation range for this position is expected
  to be between $140,000-$170,000/year + equity + benefits.</p><p></p><p><strong>Why
  Join Us</strong></p><ul><li><p>Join a collaborative, data-driven team focused on
  data quality, analytics excellence, and impactful product development across a $50B+
  industry</p></li><li><p>Work from our beautiful office in Soho, Manhattan with a
  stocked kitchen, catered breakfast and lunch once per week, happy hours and meet-ups</p></li><li><p>Competitive
  salary and equity</p></li><li><p>Full health benefits, 401(k), flexible PTO, commuter
  benefits, and more</p></li></ul>'
description_text: 'Who We Are Perchwell is the modern real estate listings platform
  built for agents to search smarter, collaborate better, and close deals faster.
  We are building the future of residential real estateʼs critical listings infrastructure:
  a platform where market&nbsp; research and client&nbsp;collaboration converge. Our
  modern architecture enables continuous innovation at a pace legacy systems cannot
  match, with AI-powered features and mobile-first capabilities designed for how agents
  actually work. As consumer expectations and technology evolve, Perchwell remains
  focused on our core vision:&nbsp; empowering real estate professionals with the
  most intelligent, data-driven, and connected platform in the industry. Backed by
  leading venture capital firms including Lux Capital and Founders Fund, along with
  strategic partnerships with some of the country''s top Multiple Listing Services
  (MLSs), Perchwell represents the first major new platform to enter the listings
  technology market in decades. This unique combination of institutional investment
  and deep industry alignment provides both the resources and market validation needed
  to transform the multi-trillion dollar residential real estate industry. What we''re
  looking for Perchwell is rapidly expanding across the US to new MLS clients with
  both unique data sources that must be integrated into our data layer and sophisticated
  analytics requirements. Robust data management and analytics capabilities are therefore
  key to our future success. We are looking for a senior data analyst to propel our
  data integration strategies forward, establish and maintain data quality KPIs at
  scale, and lead a team of junior analysts to meet our customers’ needs. What you’ll
  do Deliver MLS implementations and onboard customer data into our data layer, partnering
  cross-functionally to ensure smooth launches. Build validation frameworks to ensure
  customer data is complete, accurate, and consistent. Improve our BI layer by strengthening
  semantic models, metric definitions, and query performance to power trusted dashboards
  and reporting. Partner with Analytics Engineering to refine, document, and test
  dbt models, supporting QA and transformation validation. Investigate ingestion anomalies
  and proactively surface data quality issues before they affect downstream reporting.
  Work with internal and customer-facing teams to translate reporting needs into scalable
  data models and actionable visibility. Standardize dashboards and reporting patterns,
  balancing customer-specific requests with reusable solutions. Support planning and
  scaling of the Data Analytics team. Required for the role 6+ years of experience
  in a data analyst or analytics engineering role, preferably working with third-party
  data sources or customer integrations. Advanced SQL expertise, including complex
  joins, window functions, and efficient use of CTEs and nested subqueries to create
  readable, performant, and reusable query logic . Intermediate Python skills for
  data validation, automation, or light scripting (e.g., pandas, data profiling).
  Strong attention to detail and a passion for data quality, integrity, and repeatable
  processes. Experience working in a modern data warehouse (e.g., Redshift, Snowflake,
  BigQuery) and tools like dbt. Ability to work cross-functionally to translate ambiguous
  requirements into structured workflows. Strong communication skills, including the
  ability to explain data issues to non-technical stakeholders. Preferred Qualifications
  Experience mapping external schemas into internal data models during customer onboarding.
  Familiarity with version-controlled analytics workflows (Git), JIRA/ticketing systems,
  and collaborative documentation tools. Exposure to data observability tools (e.g.,
  Monte Carlo, Great Expectations, or custom logging frameworks). Understanding of
  dimensional modeling and data warehouse best practices. Apply best practices in
  data modeling and semantic layer design to support scalable reporting and self-service
  analytics. Salary Information To provide greater transparency to candidates, we
  share base salary ranges for all US-based job postings regardless of state. Our
  ranges are based on function and level benchmarked against similar stage growth
  companies. Final offer amounts are determined by multiple factors including skills,
  job-related knowledge and depth of work experience. The base compensation range
  for this position is expected to be between $140,000-$170,000/year + equity + benefits.
  Why Join Us Join a collaborative, data-driven team focused on data quality, analytics
  excellence, and impactful product development across a $50B+ industry Work from
  our beautiful office in Soho, Manhattan with a stocked kitchen, catered breakfast
  and lunch once per week, happy hours and meet-ups Competitive salary and equity
  Full health benefits, 401(k), flexible PTO, commuter benefits, and more'
