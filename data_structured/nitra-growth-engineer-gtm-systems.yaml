company_overview: Nitra’s mission is to overhaul the healthcare industry with radically
  efficient and transparent solutions. Nitra empowers providers to find the right
  balance between supporting their patients and running their practice – starting
  with tools that deliver a simpler, smarter way to manage their spending.Nitra solutions
  integrate seamlessly with the complex business processes of the industry. Our goal
  is to provide an ecosystem that helps doctors better manage their practices, so
  they can focus on their patients.Starting with the first business card built specifically
  for doctors, Nitra will expand to bring physicians and medical clinics around the
  country the loans, accounts, payments, and expense management products they expect,
  in an all-in-one platform powered by machine learning and blockchain technologies.The
  company was created by unicorn founders who have successfully scaled to thousands
  of customers. They are joined by an ambitious and experienced team from Amazon,
  American Express, Citi, Dropbox, Facebook, Mastercard and PayPal.The team is supported
  by an expert group of Advisors such as the cofounders of Square and Xendit, executives
  from Intuit, Governors and White House senior staffers, and is backed by some of
  the world’s leading VCs such as Andreessen Horowitz and NEA.Interested? We are growing
  fast and actively building our team. Look at our job postings and let us know where
  you fit!
