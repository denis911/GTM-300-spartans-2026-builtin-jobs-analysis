description_html: <p><b>Who we are</b><span>:</span></p><p><span>Nitra's mission is
  to build a more efficient healthcare system and the technology that makes it possible.&nbsp;
  Our goal is to provide an ecosystem of fintech and software solutions that help
  doctors better manage their practices, so they can have time back to focus on what
  matters to them most.</span></p><p><br></p><p><span>We operate with urgency, intensity,
  and ambition. The bar is high because the opportunity is massive. We expect excellence,
  ownership, and intellectual rigor from every team member. We move fast, make bold
  decisions, and hold ourselves accountable to results. At the same time, we believe
  great companies are built on trust and respect. Every voice matters. Every contribution
  counts. When we win, we win together.</span></p><p><br></p><p><span>We are scaling
  rapidly and on a clear trajectory toward becoming a unicorn this year — and beyond.
  Our growth is not accidental; it’s the result of disciplined execution, relentless
  focus, and a team that refuses to settle. We are building a category-defining company,
  and we’re looking for people who want to do the most meaningful work of their careers.</span></p><p><br></p><p><span>If
  you want comfort, this isn’t the place.</span></p><p><span>If you want impact, ownership,
  and the chance to help build a generational fintech company, welcome.</span></p><p><br></p><p><span>Nitra
  was created by unicorn founders who have successfully scaled to thousands of customers
  and exited $1B+ public offerings. They are joined by an ambitious and experienced
  team from American Express, Citi, PayPal, Capsule, Plaid, Bloomberg, Meta, Facebook,
  and Mastercard. The team is backed by some of the world’s leading VCs (Andreessen
  Horowitz, NEA, etc.) and is supported by an expert group of advisors including the
  cofounders of Square and Xendit, executives from Intuit, former Governors, White
  House senior staffers, and a co-founder of CityMD.</span></p><p><br></p><p><span>Nitra
  maintains a hybrid work policy, with team members working from the office four days
  per week and Wednesdays designated as a work-from-home day.</span></p><p><br></p><p><b>We're
  looking for:</b></p><p>A Growth Engineer (GTM Systems) who will be the technical
  architect of our engine for scale. We need a high-achieving individual to own the
  intersection of marketing, sales, and engineering—building the automated systems,
  data pipelines, and sophisticated tooling that power Nitra’s rapid expansion. You
  are someone who thrives on technical complexity and is obsessed with optimizing
  the lead-to-revenue lifecycle.</p><p><b>Your responsibilities will include:</b></p><ul><li>Building
  and maintaining robust data pipelines using Fivetran, BigQuery, and Sigma to ensure
  a single source of truth for GTM data</li><li>Architecting deep lead enrichment
  workflows and automated outbound campaigns to drive high-volume, high-quality pipeline</li><li>Managing
  the full marketing tech stack, including CRM integrations, drip campaigns, cookie
  tracking, and the ingestion of intent signals</li><li>Owning Salesforce (SFDC) administration,
  including managing complex integrations via APIs and ensuring data integrity across
  the ecosystem</li><li>Setting up and maintaining web properties on Replit and leveraging
  Clay for advanced sales automation</li><li>Deploying AI tools to automate repetitive
  marketing tasks and enhance SEO campaign efficiency</li><li>Collaborating with cross-functional
  teams to translate business requirements into scalable technical infrastructure</li></ul><p></p><p><b>You
  have:</b></p><ul><li>A Salesforce (SFDC) Certification (Required)</li><li>A Bachelor’s
  degree in Computer Science, Software Engineering, or a related Engineering field.
  You approach GTM problems with the mindset of a full-stack engineer, prioritizing
  scalability, security, and clean architecture.</li><li>Advanced skills in Python
  (for data manipulation and automation scripts), TypeScript/JavaScript (for web development
  and server-side logic), and SQL (for complex data modeling and warehouse management).</li><li>Deep
  expertise in data warehouse management and data pipeline tools (Fivetran, BigQuery,
  Sigma, or similar)</li><li>Proven experience managing APIs and complex integrations
  between CRM and third-party marketing tools</li><li>Expertise in sales and marketing
  automation platforms, specifically Clay and specialized drip campaign software</li><li>A
  strong understanding of the modern marketing tech stack, including SEO tools, cookie
  tracking, and intent data providers</li><li>Hands-on experience using Replit for
  web development and deployment</li><li>A track record of using AI tools to drive
  efficiency in GTM operations</li></ul><p></p><p><b>We offer:</b></p><ul><li>Equity
  - Everyone at Nitra is an owner. When the company wins, you win.</li><li>Competitive
  Salary - You’re the best of the best, and your salary will reflect your experience
  and reward your contributions to Nitra.</li><li>Health Care - Your health comes
  first. We offer comprehensive health, vision, and dental insurance options.</li><li>Retirement
  Benefits - Your financial stability matters to us so we provide a generous employer
  401K match.</li><li>Hybrid Policy - Nitra maintains a hybrid work policy, with team
  members working from the office four days per week and Wednesdays designated as
  a work-from-home day.</li></ul><p></p><p></p><p><span>The base salary range for
  this full-time position is $150k - $190k + bonus + equity + benefits. Our salary
  ranges are determined by role, level, and location. The range displayed reflects
  the minimum and maximum target for new hire salaries for the position across all
  US locations. Within the range, individual pay is determined by work location and
  additional factors, including job-related skills, experience, and relevant education
  or training. Please note that the compensation details listed reflect the base salary
  only, and do not include bonus, equity, or benefits.</span></p><p><br></p><p><span>Nitra
  values diversity. We are committed to equal opportunities and creating an inclusive
  environment for all our employees. We welcome applicants regardless of ethnicity,
  national origin or ancestry, gender, race, religious beliefs, disability, sex, sexual
  orientation, age, veteran status, genetic information, citizenship, or any other
  characteristic protected by law.</span></p><p></p>
