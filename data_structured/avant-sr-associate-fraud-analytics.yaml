description_html: <p>Avant is looking for knowledgeable fraud professionals to join
  our Fraud Operations team in Chicago. This position is critical in utilizing data
  to identify fraud trends, and developing and deploying strategies to fight against
  fraud attacks throughout the entire customer lifecycle, which includes application
  and synthetic identity fraud, first and third party fraud.&nbsp;</p><p><b><b>What
  You’ll Do at Avant:</b></b></p><ul><li><p><span>Train, test and deploy supervised
  and unsupervised machine learning models using algorithms such as XGBoost and Isolation
  Forest.</span></p></li><li><p><span>Build fraud strategies around outbound and inbound
  ACH transactions, check deposit and debit card transactions.</span></p></li><li><p><span>Develop
  and implement fraud rules using analytical methods like segmentation, predictive
  models, hypothesis testing, etc.</span></p></li><li><p><span>Use visualization tools
  like Databricks to build dashboards and monitor key performance indicators&nbsp;</span></p></li><li><p><span>Use
  data to understand new ways of finding impactful insights from limited data sets
  and develop recommendations&nbsp;</span></p></li><li><p><span>Own and run key processes
  to reduce fraud losses.</span></p></li><li><p><span>Analyze data, create models/strategies,
  and recommend solutions for the latest fraud trends.&nbsp;</span></p></li><li><p><span>Work
  with stakeholders throughout the company to identify opportunities for leveraging
  company data and third-party vendor data to drive business solutions</span></p></li><li><p><span>Work
  with the team to measure impact and make updates to the model/strategies and services
  as needed.</span></p></li><li><p><span>Communicate results, explain the behavior
  of models/strategies, and set appropriate expectations with stakeholders.</span></p></li><li><p><span>Strategize
  on building models and assist with deployments into production.</span></p></li><li><p><span>Doing
  ad-hoc analysis and presenting results to Sr. Management</span><br>&nbsp;</p></li></ul><p><b><b>Why
  you’re a fit at Avant:</b></b></p><ul><li><p><span>Bachelor's Degree in Technology,
  Statistics, Business Analytics, related field, or its equivalent (Master's preferred)</span></p></li><li><p><span>5+
  years of analytical experience in customer risk management at a consumer banking
  financial institution.</span></p></li><li><p><span>5+ years of experience leveraging
  data tools such as SQL, R, Python</span></p></li><li><p><span>Knowledge of check,
  ACH, wire transfer, debit/credit card and other payment channels operating rules</span></p></li><li><p><span>A
  highly motivated individual with a fraud strategy background, the ambition to drive
  change, a strong eagerness to learn, and the ability to communicate and collaborate
  effectively in complex and evolving environments.</span></p></li><li><p><span>Strong
  quantitative and problem-solving skills with key attention to detail</span></p></li><li><p><span>High
  level of inquisitiveness, initiative, and critical thinking&nbsp;</span></p></li><li><p><span>Prior
  experience in statistics and machine learning modeling techniques through coursework
  or professional experience</span></p></li></ul><p></p><p></p><p><span>This role
  is based on our downtown Chicago Office, located in the Merchandise Mart. We highly
  value collaboration and our hybrid schedule (M, T, Th in-office) enables flexibility
  to balance work and individual priorities.</span></p><p></p><p></p><p><b><b>Compensation
  Range:</b></b></p><p>The base salary range for this job is USD $100,000 - USD $130,000/
  Year</p><p></p><p></p><p><b>Employees new to Avant typically come in below the midpoint
  of the pay range.</b><span> The compensation range is based on the level outlined
  in the job posting, and compensation decisions are dependent on each applicant's
  experience, skills and abilities.&nbsp;</span></p><p><i>[If an outstanding applicant's
  experience and skill level is above or below the qualifications outlined in the
  job posting, we reserve the right to make an offer at a different level than the
  one listed in this job posting, which may have a different compensation range.]</i></p><p><span>This
  role is eligible for additional incentives, including an annual bonus. These rewards
  are allocated based on level, impact and performance in the role.</span></p><p></p><p></p><p><b>Our
  benefits include:</b></p><ul><li><p>Choice of great Medical, Dental, and Vision
  Insurance Plan options</p></li><li><p>401(k) match</p></li><li><p>Flexible Time
  Off</p></li><li><p>Flexible Work Environment - (i.e. Mon/Tues/Thurs in-person)</p></li><li><p>Generous
  Paid Parental Leave, Adoption Assistance and Post-parental leave ramp-up program&nbsp;</p></li><li><p>Lunch
  Allowance (Fooda) and In-office Snacks</p></li><li><p>Summer Fridays&nbsp;</p></li><li><p>Fun
  In-Office and Virtual Social Events</p></li><li><p><i>And who doesn’t love the swag</i></p></li></ul><p><b>Check
  out our</b><b> <u>Avant Blog</u></b><b>!</b></p><p>We believe that a diverse set
  of backgrounds and experiences helps us create the most innovative solutions for
  our customers. We invite you to apply to our positions even if you do not meet 100%
  of the qualifications listed in the description. If you’re passionate about our
  mission and aligned to our values, we hope you’ll come contribute to our awesome
  culture.</p><p><b>Why Avant is the place for you:</b></p><p>At Avant, we believe
  our values make a difference:</p><p><b>Authenticity.</b> We show up to work as our
  whole selves and make sure others can too.</p><p><b>Collaboration.</b> We can only
  succeed when we do so as a team.</p><p><b>Problem-Solving.</b> The harder the problem,
  the more satisfying the solution.</p><p><b>Customer.</b> We are all owners of the
  customer experience.</p><p><b>Initiative.</b> Plan. Adapt. Get Sh!t Done.</p><p><b>We
  believe that great ideas come from anyone and anywhere, that everyone is an owner
  who drives change, and that we have more fun when we work together. We're problem
  solvers who love collaborating with intelligent and highly-motivated people to reshape
  the face of digital banking. Avant offers terrific perks and benefits, fun social
  events with employees who actually like hanging out together, and a flexible growth
  environment where trying your hand at new projects and being the active owner of
  your career path is encouraged and supported.</b></p><p><span><span>To learn more
  about how Avant collects and uses your personal information, please see the </span></span><span><u><span>Avant
  Privacy Policy</span></u></span><span><span>.</span></span></p>
