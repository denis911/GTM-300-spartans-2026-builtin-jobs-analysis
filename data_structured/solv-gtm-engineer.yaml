company_overview: 'We’re about one thing: convenient healthcare for everyone. Solv
  allows you to book same-day doctor’s appointments and urgent care visits. Choose
  from highly-rated providers, read patient reviews and book appointments after hours
  and on the weekend.At Solv, we believe getting access to high quality, last-minute
  care should be simple, fast and effortless. Consumers should be able to know where
  they can go, when they''ll be seen and how much it will cost. That''s the future
  we''re building with Solv.For providers, Solv''s end-to-end platform revolutionizes
  the delivery of convenient care. We create tools to grow your practice, delight
  patients and boost your reputation.ATTRACT MORE PATIENTS. Dominate Google by promoting
  your clinics on Solv and UrgentCareLocations.com and optimize your own site for
  online conversion. Your branded mobile scheduling site with insurance card scanning
  turns more web traffic into clinic visits.DELIVER AN AMAZING EXPERIENCEAutomate
  patient communication that save staff time and improve patient satisfaction. Text
  message alerts keep patients up to date, reduce no-shows and handle post-visit follow
  up. Seamless queuing of both walk-ins and online bookings reduces wait times, optimizes
  patient flow and helps set expectations with patients through accurate wait time
  estimates. INCREASE LOYALTYBoost your online reputation by broadcasting reviews
  and increasing your clinic ratings to make a positive impression on new patients.
  Then keep them coming back with secure patient profiles that encourage painless
  re-bookings with your clinic. Following visits, collect valuable patient feedback
  with NPS surveys on performance, identify issues and address complaints instantly.
  Finally, mobile dashboards let you view operational data such as wait times and
  volumes so that you can make adjustments in real time.'
