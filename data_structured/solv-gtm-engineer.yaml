description_html: '<p><span>Being sick or injured is painful. Getting better shouldn’t
  be.</span></p><p><span>Most industries have been transformed by new technology.
  Healthcare is still waiting — and you can help change that.</span></p><p><span>Our
  mission is simple but ambitious: make healthcare accessible, transparent, and effortless
  for all. We put the consumer at the center, move fast and partner with forward-thinking
  providers to deliver software that makes care better, faster, and more human. This
  is work with real-world stakes — and you can help lead the way.</span></p><p><b><strong>The
  Role</strong></b></p><p><span>If you''ve spent time in traditional marketing and
  felt the friction — the siloed teams, the slow campaigns, the playbooks that were
  already outdated when they shipped — you know there''s a better way to build a revenue
  engine</span><span>.</span></p><p><br></p><p><span>The Solv Marketing &amp; Strategy
  team moves with startup speed, owns pipeline outcomes, and works directly with Sales,
  Success, and Executive Leadership to turn product capabilities into deals closed.
  We’re building the GTM operating system that’s powered by AI.</span></p><p><br></p><p><span>As
  our first GTM &amp; Revenue Engineer, you''ll own the technical infrastructure that
  powers how we close and retain customers — not just generate awareness. That means
  deal support systems, pipeline intelligence, sales enablement infrastructure, and
  the automations that tie it all together. This isn''t a top-of-funnel campaign role.
  It''s a full-funnel revenue role, built for someone who wants to own outcomes from
  first touch through renewal and expansion.</span></p><p><br></p><p><span>This role
  reports to the Senior Director of Marketing &amp; Strategy and is measured by pipeline
  generated, revenue influenced, and the operational leverage you create across the
  GTM engine.</span></p><p><br></p><p><b><strong>What You’ll Own</strong></b></p><p><b><strong>GTM
  Infrastructure &amp; Automation</strong></b></p><ul><li><span>Design and deploy
  agentic workflows that automate outbound prospecting, lead enrichment, account research,
  and follow-up sequences</span></li><li><span>Design and scale our GTM tech stack.
  We run on Claude and are powered through all the Connectors into Hubspot, Drive,
  Glean, Granola, Slack, etc.</span></li><li><span>Identify manual, high-friction
  GTM processes and replace them with scalable, AI-native solutions</span></li><li><span>Instrument
  everything: build dashboards and reporting that surface pipeline health, conversion
  trends, and campaign attribution</span></li></ul><p><b><strong>Outbound Pipeline
  Engine</strong></b></p><ul><li><span>Partner with Sales to build account prioritization
  models (propensity scoring, ICP fit, intent signals) that focus outbound effort
  where it wins</span></li><li><span>Architect multi-channel outbound sequences that
  combine personalized copy, enriched signals, and coordinated timing — not spray-and-pray</span></li><li><span>Extract
  signal from Solv''s proprietary industry data to generate narratives that support
  thought leadership and ABM</span></li><li><span>Own the feedback loop: analyze what''s
  working, kill what isn''t, iterate fast</span></li></ul><p><b><strong>GTM Enablement
  Infrastructure</strong></b></p><ul><li><span>Build tools that give Sales reps real-time
  access to account intelligence, competitive positioning, and ROI benchmarks — without
  a bespoke marketing request every time</span></li><li><span>Create scalable, templatized
  assets (pitch frameworks, ROI models, battlecards) that reps can customize and deploy
  independently</span></li><li><span>Translate product releases into deployable sales
  plays</span></li><li><span>Build workflows that support retention and expansion
  by partnering with Customer Success to automate renewal prep, surface churn signals,
  and arm CSMs with the same intelligence Sales gets</span></li><li><span>Ship internal
  web apps (deal calculators, account health dashboards, ROI snapshots) that reduce
  dependency on ad-hoc requests</span></li></ul><p><b><strong>You''ll be great for
  this role if you</strong></b></p><p><span>You''re genuinely fired up to fuel revenue
  generation — not as a byproduct of running campaigns, but as the direct outcome
  you wake up thinking about.</span></p><p><br></p><p><span>You''ve seen traditional
  marketing operate in silos, watched good ideas die in slow approval cycles, and
  wondered why more teams aren''t building the way software engineers do: ship, measure,
  iterate. You''re not here to follow the old playbook. You''re here to build a new
  one.</span></p><ul><li><span>3–6 years in a GTM, sales ops, revenue ops, or marketing
  engineering role at a B2B SaaS company</span></li><li><span>Hands-on experience
  architecting AI-powered GTM systems with Claude</span></li><li><span>Comfortable
  owning a technical project end-to-end — scoping, shipping, iterating</span></li></ul><p><b><strong>Have
  the right skills:</strong></b></p><ul><li><b><strong>Builder mindset</strong></b><span>
  — You''re more energized by shipping a working automation than writing a strategy
  doc about it</span></li><li><b><strong>AI-native</strong></b><span> — Claude, GPT,
  Perplexity, and agentic frameworks are already core to how you work. You prompt
  effectively, chain outputs, and build custom workflows for recurring tasks</span></li><li><b><strong>Systems
  thinker</strong></b><span> — You see the GTM org as a set of interconnected processes
  and markdown files, and you design for scale</span></li><li><b><strong>Claude Code-comfortable</strong></b><span>
  — You’ve maybe never written a line of code, but can still&nbsp; build and deploy
  real tools independently</span></li><li><b><strong>CRM-literate</strong></b><span>
  — You''ve worked inside Salesforce or HubSpot at the data model level, not just
  as a user. You won''t own CRM admin, but you need to build on top of it</span></li><li><b><strong>GTM-fluent</strong></b><span>
  — You understand what makes outbound land, what makes deals stall, what keeps customers,
  and what data actually matters</span></li><li><b><strong>High-agency</strong></b><span>
  — You scope your own problems, move without perfect information, and ship fast</span></li></ul><p><br></p><p><span>High
  preference for candidates based in San Francisco and able to come to our office
  1-2 days per week. </span></p><p><br></p><p><b><strong>Solv offers robust benefits
  including: </strong></b></p><ul><li><span>Medical, Dental, Vision Insurance</span></li><li><span>401k</span></li><li><span>Paid
  Parental Leave</span></li><li><span>Monthly Wellness Reimbursement</span></li><li><span>Flexible
  Time Off</span></li><li><span>Many More!</span></li></ul>'
description_text: 'Being sick or injured is painful. Getting better shouldn’t be.
  Most industries have been transformed by new technology. Healthcare is still waiting
  — and you can help change that. Our mission is simple but ambitious: make healthcare
  accessible, transparent, and effortless for all. We put the consumer at the center,
  move fast and partner with forward-thinking providers to deliver software that makes
  care better, faster, and more human. This is work with real-world stakes — and you
  can help lead the way. The Role If you''ve spent time in traditional marketing and
  felt the friction — the siloed teams, the slow campaigns, the playbooks that were
  already outdated when they shipped — you know there''s a better way to build a revenue
  engine . The Solv Marketing &amp; Strategy team moves with startup speed, owns pipeline
  outcomes, and works directly with Sales, Success, and Executive Leadership to turn
  product capabilities into deals closed. We’re building the GTM operating system
  that’s powered by AI. As our first GTM &amp; Revenue Engineer, you''ll own the technical
  infrastructure that powers how we close and retain customers — not just generate
  awareness. That means deal support systems, pipeline intelligence, sales enablement
  infrastructure, and the automations that tie it all together. This isn''t a top-of-funnel
  campaign role. It''s a full-funnel revenue role, built for someone who wants to
  own outcomes from first touch through renewal and expansion. This role reports to
  the Senior Director of Marketing &amp; Strategy and is measured by pipeline generated,
  revenue influenced, and the operational leverage you create across the GTM engine.
  What You’ll Own GTM Infrastructure &amp; Automation Design and deploy agentic workflows
  that automate outbound prospecting, lead enrichment, account research, and follow-up
  sequences Design and scale our GTM tech stack. We run on Claude and are powered
  through all the Connectors into Hubspot, Drive, Glean, Granola, Slack, etc. Identify
  manual, high-friction GTM processes and replace them with scalable, AI-native solutions
  Instrument everything: build dashboards and reporting that surface pipeline health,
  conversion trends, and campaign attribution Outbound Pipeline Engine Partner with
  Sales to build account prioritization models (propensity scoring, ICP fit, intent
  signals) that focus outbound effort where it wins Architect multi-channel outbound
  sequences that combine personalized copy, enriched signals, and coordinated timing
  — not spray-and-pray Extract signal from Solv''s proprietary industry data to generate
  narratives that support thought leadership and ABM Own the feedback loop: analyze
  what''s working, kill what isn''t, iterate fast GTM Enablement Infrastructure Build
  tools that give Sales reps real-time access to account intelligence, competitive
  positioning, and ROI benchmarks — without a bespoke marketing request every time
  Create scalable, templatized assets (pitch frameworks, ROI models, battlecards)
  that reps can customize and deploy independently Translate product releases into
  deployable sales plays Build workflows that support retention and expansion by partnering
  with Customer Success to automate renewal prep, surface churn signals, and arm CSMs
  with the same intelligence Sales gets Ship internal web apps (deal calculators,
  account health dashboards, ROI snapshots) that reduce dependency on ad-hoc requests
  You''ll be great for this role if you You''re genuinely fired up to fuel revenue
  generation — not as a byproduct of running campaigns, but as the direct outcome
  you wake up thinking about. You''ve seen traditional marketing operate in silos,
  watched good ideas die in slow approval cycles, and wondered why more teams aren''t
  building the way software engineers do: ship, measure, iterate. You''re not here
  to follow the old playbook. You''re here to build a new one. 3–6 years in a GTM,
  sales ops, revenue ops, or marketing engineering role at a B2B SaaS company Hands-on
  experience architecting AI-powered GTM systems with Claude Comfortable owning a
  technical project end-to-end — scoping, shipping, iterating Have the right skills:
  Builder mindset — You''re more energized by shipping a working automation than writing
  a strategy doc about it AI-native — Claude, GPT, Perplexity, and agentic frameworks
  are already core to how you work. You prompt effectively, chain outputs, and build
  custom workflows for recurring tasks Systems thinker — You see the GTM org as a
  set of interconnected processes and markdown files, and you design for scale Claude
  Code-comfortable — You’ve maybe never written a line of code, but can still&nbsp;
  build and deploy real tools independently CRM-literate — You''ve worked inside Salesforce
  or HubSpot at the data model level, not just as a user. You won''t own CRM admin,
  but you need to build on top of it GTM-fluent — You understand what makes outbound
  land, what makes deals stall, what keeps customers, and what data actually matters
  High-agency — You scope your own problems, move without perfect information, and
  ship fast High preference for candidates based in San Francisco and able to come
  to our office 1-2 days per week. Solv offers robust benefits including: Medical,
  Dental, Vision Insurance 401k Paid Parental Leave Monthly Wellness Reimbursement
  Flexible Time Off Many More!'
