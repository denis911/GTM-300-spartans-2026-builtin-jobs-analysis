description_html: <p>Jellyfish's Engineering team is building our Native AI future.
  We're looking for a leader who's passionate about shipping world-class products
  with exceptional engineers in a fast-paced environment.</p><p>You'll lead the team
  transforming our platform from traditional SaaS to Native AI SaaS. Your scope extends
  beyond your direct team. You'll work across infrastructure, research, and every
  feature team to build agentic chat that accesses all our platform data, analyzes
  it, and delivers expert insights and advice to engineering leaders.</p><p>Success
  requires a blend of technical depth, product sense, delivery focus, and people leadership.
  You'll guide your team through exploration and experimentation to ship real features
  that deliver value to customers. The best candidates know the state of the art in
  generative AI and have shipped AI-powered products.</p><p><strong>Let's talk about
  what you'll do:</strong></p><ul><li><p>Lead the engineering team working to transform
  our platform for the AI Native age. Start with agentic chat, then build the full
  agentic platform.</p></li><li><p>Inspire a culture of curiosity, learning, experimentation
  and ownership.</p></li><li><p>Directly manage engineers on your team and matrix-manage
  other engineers in the organization as needed.</p></li><li><p>Contributing to key
  deliverables through hands-on coding and technical decision making through architecture,
  design, or code review</p></li><li><p>Partner with a product managers on team strategy
  and roadmap</p></li><li><p>Collaborate with infrastructure, research and product
  development teams to align efforts around AI transformation of our product.</p></li><li><p>Drive
  continuous improvement in your team’s process, delivery, and quality</p></li><li><p>Work
  with other engineering leaders on alignment of your team's efforts to overall company
  strategy</p></li><li><p>Actively promote a culture supportive of growth and inclusion</p></li></ul><p><strong>Let’s
  talk about what you need to excel:</strong></p><ul><li><p>Strong interest or experience
  building and leading teams developing AI features for SaaS platforms, including
  shaping team structures and ways of working</p></li><li><p>Strong interest or experience
  building product capabilities on top of LLM technologies</p></li><li><p>Ability
  to communicate clearly and effectively to technical and non-technical audiences,
  at all levels from peer collaborators to an executive audience or customers.</p></li><li><p>Great
  at asking questions, figuring out what needs to be done, building consensus, and
  executing</p></li><li><p>Love of learning new things and teaching others what you
  know</p></li><li><p>Excited about data, and measuring and quantifying the things
  that make successful engineering teams</p></li></ul><p>A list of job experiences
  and qualification requirements is great, but humility, a performance-driven attitude,
  and a team-player approach are most important to us. We love to have fun and win
  in the process. We only hire people who have a passion for building great companies
  in an environment where a sense of humor is a must.</p><p>Occasional travel may
  be required.</p><p>Applicants must be authorized to work for <strong>any</strong>
  employer in the US. <strong>We are unable to sponsor or take over sponsorship of
  an employment visa at this time.</strong></p><p></p><p><strong>Let’s talk about
  us!</strong><br>This is all about you, but you want to know a little about us. <u>Jellyfish</u>
  enables leaders to effectively build AI-integrated engineering teams, align engineering
  decisions with business initiatives and deliver the right software efficiently and
  on time. AI tools alone won’t transform your org—Jellyfish shows you what’s working,
  what’s not, and how to build high-performing teams that know how to use AI the right
  way.</p>
