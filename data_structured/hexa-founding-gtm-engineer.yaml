description_html: '<p>Founded in 2026 by&nbsp;Robin&nbsp;and&nbsp;Maxime,</p><p>Waniwani
  is backed by&nbsp;Hexa&nbsp;(eFounders), the pioneer startup studio in Europe, having
  launched 40+ companies, including unicorns like Front, Aircall and Spendesk combining
  €230m+ ARR and €750m raised.</p><p><br></p><p>Founding GTM Engineer</p><p><b>Your
  job is to outperform Waniwani’s first growth experiment :</b></p><p>We issued a
  press release announcing OpenAI’s approval of the first insurance app inside ChatGPT.
  It triggered $26B in market-cap losses for the world’s largest brokers forcing every
  CEO in the industry to have an AI distribution strategy. → Now we are looking for
  someone to build the systems that turn that momentum into a scalable machine.</p><p><br></p><p>The
  Company</p><p><b>Waniwani is building the AI distribution infrastructure for the
  $10T services economy.</b> We enable companies to sell quote-based services—insurance,
  mortgages, legal—directly inside LLMs, where buying decisions are moving. Think
  Shopify, but for services. We''re building the rails for AI-native commerce.</p><p><b>This
  is Day 1 of a platform shift.</b> Our ChatGPT insurance launch triggered $26B in
  market cap losses for the world''s largest brokers in 48 hours. The press called
  it "the industry''s ChatGPT moment." We call it Day 1.</p><p><br></p><p>Why This
  Role Exists</p><p>We have traction. What we need now is infrastructure. Not the
  backend kind. The go-to-market kind: the systems, tools, automations, and experiments
  that turn interest into pipeline and pipeline into revenue.</p><p>This role is for
  someone who builds <b>agentic distribution systems</b> for the AI era. You don''t
  just plan campaigns—you architect the modern growth stack: AI agents that capture
  signals, qualify leads, and convert autonomously. You ship landing pages, vibecode
  demo apps, wire up dashboards, build custom agents, and instrument every step of
  an exponential funnel.</p><p>You''ll be at the forefront of the AI growth revolution,
  building the systems that let companies scale distribution exponentially through
  AI. You think in agentic loops and compounding systems, not tasks and tickets.</p><p><b>We
  eat our own dog food.</b> You''ll use Waniwani''s infrastructure to build Waniwani''s
  growth engine—then sell that playbook to your peers.</p><p><br></p><p>What You''ll
  Actually Do</p><p><b>Build the growth stack.</b> Own the full funnel: CRM, outbound
  tooling, analytics, attribution. You''ll be the first and biggest user of Waniwani''s
  infrastructure—building with the same tools you''re selling.</p><p><b>Ship experiments,
  fast.</b> Launch growth tests across channels: sequences, landing pages, lead magnets,
  paid ads. Measure ruthlessly. Kill losers. Scale winners.</p><p><b>Vibecode apps
  and demos.</b> Build interactive experiences that show what Waniwani can do. Ship
  them everywhere: social, partners, direct outreach.</p><p><b>Own the dashboards.</b>
  Build the reporting layer that tracks pipeline, conversion, and experiment results.
  Make data visible to everyone.</p><p><b>Design distribution loops.</b> Build repeatable
  mechanisms: referrals, integrations, self-serve funnels, viral formats. Engineer
  for leverage.</p><p><b>Automate outbound.</b> Build scalable prospecting systems:
  enrichment, sequencing, personalization at scale. Build a machine, not a task list.</p><p>You''ll
  work directly with the CEO and CTO. The tools are yours to choose. The stack is
  yours to build. And you''ll use it every day.</p><p><br></p><p>This Role Is for
  You If</p><p>You''re a builder who happens to work in growth. Engineering background
  welcomed. You''ve sold online or digital products. You get shit done—no hand-holding
  needed. Extremely curious and self-directed.</p><p>You think in systems. When something
  works, you make it repeatable and scalable.</p><p>1-4 years into your career, ready
  to own the entire growth function at a company building something genuinely new.</p><p>Native
  or bilingual English required. French is a plus.</p><p><br></p><p>Pluses</p><p>Launched
  side projects or products that found traction</p><p>Can write code (Python, JS,
  no-code tools, whatever ships)</p><p>Experience with CRM setup, outbound automation,
  or data tooling</p><p>Built and grown a social following or community</p><p>Familiarity
  with paid acquisition and unit economics</p><p>Active in online communities (Reddit,
  LinkedIn, HN, Product Hunt)</p><p>Comfort with AI tooling and prompt-driven workflows</p><p><br></p><p>Why
  Waniwani</p><p><b>Ruthless execution:</b> Execution is what differentiates average
  outcomes and startup failure from massive impact. You will learn to execute surrounded
  by relentless doers and extremely ambitious teammates.</p><p><b>Ownership.</b> You''ll
  build the entire growth infrastructure from scratch</p><p><b>Category creation.</b>
  You won''t join a market. You''ll contribute to defining a category.</p><p><b>Global:</b>
  We sell global from day 0 : US, Australia, Middle East, Korea… and with offices
  in Paris, San Francisco, New York</p><p><b>Real equity.</b> Meaningful ownership
  at the earliest stage</p><p><b>Best prep for founding.</b> If you want to start
  your own VC backed venture, this is the best battle field to train on.</p><p><br></p><p><i>Interested?
  Reach out.</i></p>'
description_text: 'Founded in 2026 by&nbsp;Robin&nbsp;and&nbsp;Maxime, Waniwani is
  backed by&nbsp;Hexa&nbsp;(eFounders), the pioneer startup studio in Europe, having
  launched 40+ companies, including unicorns like Front, Aircall and Spendesk combining
  €230m+ ARR and €750m raised. Founding GTM Engineer Your job is to outperform Waniwani’s
  first growth experiment : We issued a press release announcing OpenAI’s approval
  of the first insurance app inside ChatGPT. It triggered $26B in market-cap losses
  for the world’s largest brokers forcing every CEO in the industry to have an AI
  distribution strategy. → Now we are looking for someone to build the systems that
  turn that momentum into a scalable machine. The Company Waniwani is building the
  AI distribution infrastructure for the $10T services economy. We enable companies
  to sell quote-based services—insurance, mortgages, legal—directly inside LLMs, where
  buying decisions are moving. Think Shopify, but for services. We''re building the
  rails for AI-native commerce. This is Day 1 of a platform shift. Our ChatGPT insurance
  launch triggered $26B in market cap losses for the world''s largest brokers in 48
  hours. The press called it "the industry''s ChatGPT moment." We call it Day 1. Why
  This Role Exists We have traction. What we need now is infrastructure. Not the backend
  kind. The go-to-market kind: the systems, tools, automations, and experiments that
  turn interest into pipeline and pipeline into revenue. This role is for someone
  who builds agentic distribution systems for the AI era. You don''t just plan campaigns—you
  architect the modern growth stack: AI agents that capture signals, qualify leads,
  and convert autonomously. You ship landing pages, vibecode demo apps, wire up dashboards,
  build custom agents, and instrument every step of an exponential funnel. You''ll
  be at the forefront of the AI growth revolution, building the systems that let companies
  scale distribution exponentially through AI. You think in agentic loops and compounding
  systems, not tasks and tickets. We eat our own dog food. You''ll use Waniwani''s
  infrastructure to build Waniwani''s growth engine—then sell that playbook to your
  peers. What You''ll Actually Do Build the growth stack. Own the full funnel: CRM,
  outbound tooling, analytics, attribution. You''ll be the first and biggest user
  of Waniwani''s infrastructure—building with the same tools you''re selling. Ship
  experiments, fast. Launch growth tests across channels: sequences, landing pages,
  lead magnets, paid ads. Measure ruthlessly. Kill losers. Scale winners. Vibecode
  apps and demos. Build interactive experiences that show what Waniwani can do. Ship
  them everywhere: social, partners, direct outreach. Own the dashboards. Build the
  reporting layer that tracks pipeline, conversion, and experiment results. Make data
  visible to everyone. Design distribution loops. Build repeatable mechanisms: referrals,
  integrations, self-serve funnels, viral formats. Engineer for leverage. Automate
  outbound. Build scalable prospecting systems: enrichment, sequencing, personalization
  at scale. Build a machine, not a task list. You''ll work directly with the CEO and
  CTO. The tools are yours to choose. The stack is yours to build. And you''ll use
  it every day. This Role Is for You If You''re a builder who happens to work in growth.
  Engineering background welcomed. You''ve sold online or digital products. You get
  shit done—no hand-holding needed. Extremely curious and self-directed. You think
  in systems. When something works, you make it repeatable and scalable. 1-4 years
  into your career, ready to own the entire growth function at a company building
  something genuinely new. Native or bilingual English required. French is a plus.
  Pluses Launched side projects or products that found traction Can write code (Python,
  JS, no-code tools, whatever ships) Experience with CRM setup, outbound automation,
  or data tooling Built and grown a social following or community Familiarity with
  paid acquisition and unit economics Active in online communities (Reddit, LinkedIn,
  HN, Product Hunt) Comfort with AI tooling and prompt-driven workflows Why Waniwani
  Ruthless execution: Execution is what differentiates average outcomes and startup
  failure from massive impact. You will learn to execute surrounded by relentless
  doers and extremely ambitious teammates. Ownership. You''ll build the entire growth
  infrastructure from scratch Category creation. You won''t join a market. You''ll
  contribute to defining a category. Global: We sell global from day 0 : US, Australia,
  Middle East, Korea… and with offices in Paris, San Francisco, New York Real equity.
  Meaningful ownership at the earliest stage Best prep for founding. If you want to
  start your own VC backed venture, this is the best battle field to train on. Interested?
  Reach out.'
