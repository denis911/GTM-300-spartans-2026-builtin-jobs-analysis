company_overview: 'Hexa is a startup studio.It all started in 2011 with startup studio
  eFounders, which pioneered a new way of entrepreneurship, became a reference in
  the B2B SaaS world, and launched over 50 companies including 3 unicorns (Front,
  Aircall, Spendesk). In 2022, eFounders became Hexa, to scale our ambitions further
  and launch startups in new verticals: AI, web3, fintech, future of work, health.With
  Hexa, we’re on a mission to democratize a new way for entrepreneurship, one centered
  around building companies in teams. In numbers? We’re an entrepreneurial ecosystem
  made up of:- +40 companies launched- +2800 jobs created- 3 unicorns (Spendesk, Aircall,
  Front)- +$4.5 billion combined companies valuation'
