description_html: '<b><strong>What Do We Do?</strong></b><p>Triple Whale is the complete
  intelligence platform that helps ecommerce brands confidently understand what''s
  working in their business, what''s not, and what they should do next.<br>We pull
  all your data into one place, give you the measurement tools to actually trust it,
  then use the smartest AI in the industry to translate it into insights and recommendations.
  From there, you get tools to put those insights to work — from AI agents that generate
  creative and take action on your behalf, to automations that make the rest of your
  tech stack smarter and more effective.<br>More than 50,000 brands like Pressed Juicery,
  Ouai and True Classic trust Triple Whale to grow faster with fewer resources — uncovering
  opportunities and acting on them at a scale that would be impossible manually.</p><b><strong>What
  You’re Applying To:</strong></b><p>The GTM Engineer will play a pivotal role in
  enabling and optimizing AI-powered workflows across our Go-to-Market (GTM) and Product
  teams.</p><p>This role sits at the intersection of business strategy and AI implementation,
  acting as a bridge between technical capabilities and practical business applications.
  The primary mission is to drive the adoption and optimization of our AI features
  across internal teams. This involves implementing and maintaining AI models and
  data pipelines, monitoring performance, troubleshooting issues, and collaborating
  with technical and business teams to align AI solutions with organizational goals</p><b><strong>What
  You''ll Do:</strong></b><p><strong>Cross-Functional AI Strategy &amp; Enablement:</strong></p><ul><li><strong>Democratize
  AI:</strong> Embed intelligent automation into daily workflows across all four departments,
  ensuring teams have the tools and training to leverage AI effectively.</li><li><strong>Identify
  Opportunities:</strong> Work with business leaders to pinpoint processes that can
  be improved or automated with AI (e.g., lead scoring, content generation, churn
  prediction, product analytics).</li><li><strong>Drive Adoption:</strong> Lead company-wide
  AI training workshops and best-practice sharing to foster an AI-forward culture
  and measure the impact of AI initiatives.</li><li><strong>Feedback Loop:</strong>
  Establish a robust feedback loop to translate departmental needs and customer insights
  into AI feature requirements for the Product and Data Science teams.&nbsp;</li></ul><p><strong>Marketing
  &amp; Sales Operations:</strong></p><ul><li><strong>Campaign Optimization:</strong>
  Implement AI agents or AI software to analyze cross-channel marketing data, optimize
  budget allocation, and provide actionable recommendations to improve ROI.</li><li><strong>Sales
  Intelligence:</strong> Use AI to generate customer-centric sales intelligence, enrich
  CRM data, and automate the creation of personalized pitch materials.</li><li><strong>Lead
  Management:</strong> Refine AI-driven lead scoring and routing models to prioritize
  high-potential opportunities and ensure prompt follow-up, boosting conversion rates.&nbsp;</li></ul><p><strong>Product
  &amp; Customer Success Operations:</strong></p><ul><li><strong>Product Insights:</strong>
  Leverage AI to analyze customer feedback, support tickets, and usage patterns to
  surface insights for product enhancements and roadmap prioritization.</li><li><strong>Onboarding
  &amp; Retention:</strong> Design and implement AI-powered workflows to assist with
  seamless customer onboarding and identify potential churn risks, facilitating proactive
  retention efforts.</li><li><strong>Performance Monitoring:</strong> Monitor the
  performance of AI features within the product and ensure they meet customer needs
  and business goals.&nbsp;</li></ul><p><strong>Technical Operations &amp; Management:</strong></p><ul><li><strong>AI
  System Management:</strong> Oversee the day-to-day management, monitoring, and operational
  support of the organization''s AI systems and data pipelines.</li><li><strong>Data
  Integrity:</strong> Ensure data quality and seamless data flow between marketing
  automation, CRM (e.g., Salesforce), and product analytics platforms.</li><li><strong>Compliance:</strong>
  Ensure all AI operations and data handling adhere to ethical guidelines, data privacy
  regulations (e.g., GDPR, CCPA), and company policies.&nbsp;</li></ul><b><strong>What
  You''ll Bring:</strong></b><ul><li><strong>Experience:</strong> 3+ years in operations,
  Business Intelligence (BI), or a similar role, with demonstrable experience in implementing
  automation or AI/ML solutions</li><li><strong>Education:</strong> Bachelor''s degree
  in Business, Computer Science, Data/Information Systems, or a related field. .</li><li><strong>AI/ML
  Knowledge:</strong> Hands-on experience with generative AI platforms and APIs (e.g.,
  OpenAI, Claude) and a strong understanding of AI models and their application in
  business.</li><li><strong>Technical Skills:</strong> Proficiency with data analysis
  tools, CRM systems (HubSpot), GTM systems (Clay, Avoma, Zapier, etc) and potentially
  basic programming/scripting knowledge (Python, SQL preferred).</li><li><strong>Soft
  Skills:</strong> Excellent cross-functional communication, problem-solving, and
  change management skills, with the ability to explain complex AI concepts to non-technical
  stakeholders.</li></ul><b><strong>Our Values</strong></b><ul><li><strong>We Are
  Customer Obsessed</strong>: From our mission to every detailed project, everything
  we do is designed to create a positive impact for our customers.</li><li><strong>We
  Move (Very!) Quickly</strong>: The speed at which we work, iterate, and deliver
  value is our most competitive advantage.&nbsp;</li><li><strong>We Are Trustworthy</strong>:
  Candor, directness, and honest communication helps us learn, grow and improve so
  we can win together.&nbsp;</li><li><strong>We Are Curious</strong>: We extend beyond
  our comfort zone and ask questions that guide us towards new, creative, and bold
  paths.</li><li><strong>We Act Like A Mensch</strong>: We act with honor, integrity
  and empathy, and have deep respect for our customers and each other.</li></ul><p><strong>Base
  Compensation Range: $105,000 - $125,000</strong></p><p>​​Our compensation ranges
  are set using benchmarks from growth-stage companies and factor in function, level,
  and location- so everything stays above board and whale-balanced.&nbsp; The range
  you <em>sea</em> on each job posting shows the minimum and maximum target salary
  for new hires across all U.S. locations.</p><p>Triple Whale is an equal opportunity
  employer. We celebrate diversity and are committed to creating an inclusive environment
  for all employees.</p><b><strong>Join Us in Making Waves</strong></b><p>If you’re
  looking for more than just a job and want to be part of a movement reshaping the
  future of Ecommerce, Triple Whale is the place for you. We’re on the lookout for
  driven, curious, and creative individuals ready to thrive in a fast-paced environment.</p><p><strong>Referred?</strong>
  &nbsp;Got here thanks to a friend? Splash some gratitude their way!&nbsp; They''ll
  need to submit your application through our referral system to make it official.</p><p>#LI-Remote&nbsp;</p>'
