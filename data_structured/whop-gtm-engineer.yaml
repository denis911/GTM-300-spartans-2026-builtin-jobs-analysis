description_html: '<b><strong>What we’re looking for, ranked:</strong></b><ol><li>Cracked
  developer who has built lots of bots/scripts</li><li>Strong experience using AI
  to automate tasks</li><li>Experience making money on the internet as a side or main
  project.</li><li>Excellent communication skills (written and verbal)</li></ol><b><strong>About
  Whop</strong></b><p>Whop is a financial technology company on a mission to provide
  the world with sustainable income. Our vision is to create the world’s largest internet
  market, where people can create, connect, and transact all from a single platform.
  Whop enables individuals and businesses to accept payments, launch ventures, and
  engage with others across the network.&nbsp;</p><p>Today, Whop facilitates over
  $3 billion in annual payouts to people in 144 countries. Growth continues to accelerate,
  with gross transaction volume increasing roughly 25% month over month.&nbsp;</p><p>Whop
  has raised hundreds of millions from institutional investors like Insight, Bain
  Capital Ventures, A*, and Peter Thiel — including a recent strategic investment
  from Tether, the largest stablecoin company in the world.</p><p>Our current team
  is made up of young, passionate entrepreneurs who grew up on the internet — over
  75% built a business before joining Whop, including 53 former founders and 30 who
  scaled past $1M in revenue. Product leadership includes backgrounds from Meta and
  Robinhood.</p><p>For more information, visit whop.com.</p><b><strong>About the role</strong></b><p>Whop
  is building institution-grade financial infrastructure to power the next generation
  of digital entrepreneurship. We’re looking for a GTM Engineer to partner with our
  Head of Partnerships to automate as much of the day to day process of onboarding
  new businesses to Whop. This role is responsible for automating everything from
  finding the right businesses to go after to ensuring they are successfully ramping
  on Whop. Over the next two years this role will automate every part of sales to
  the point where we could remove nearly all humans.&nbsp;</p><p>This role will partner
  with our Head of Partnerships.</p><b><strong>Scope:</strong></b><ul><li>Automate
  inbound lead qualification</li><li>Identify all leads we should be targeting&nbsp;</li><li>Automate
  all cold outreach (email &amp; sms)</li><li>Create loss reports for each lost deal
  (why did we lose, what could we have done differently)</li><li>Automated call review
  (upload call recording and get instant feedback on where you could have improved)</li></ul><b><strong>What
  we’re looking for</strong></b><ul><li>Cracked</li><li>Have built successful scripts/bots</li><li>Experience
  using AI to automate previously human-done tasks</li><li>Have made money on the
  internet on side projects or your own businesses</li><li>High attention to detail;
  cares deeply about correctness</li><li>Low-ego, non-performative, and process-driven</li><li>Want
  to take over the world and are not satisfied with anything other than being the
  best</li><li>A scrappy, experiment-driven mindset: no task too small, no idea too
  big</li></ul><b><strong>Your first 90 days will look like the following:</strong></b><ul><li>Within
  30 days, you will automate tasks like automatic call review, and loss report bot.</li><li>Within
  60 days, you will automate inbound lead qualification, and lead identification.</li><li>Within
  90 days, you will be fully ramped up &amp; constantly automating new tasks that
  optimize the team as much as possible.</li></ul><b><strong>Benefits Overview</strong></b><p>✅
  Base salary of $190,000 - $240,000 + bonus + a competitive equity package&nbsp;</p><p>❤️
  Unlimited PTO, with full health, vision, dental coverage</p><p>🍕 Lunch &amp; dinner
  paid for Monday thru Friday + free Equinox membership + Citibike membership + free
  Ubers home after 10pm + $9k annual rent subsidy if you live within 4 blocks of our
  300 Kent office</p><p>💻&nbsp; The latest Macbook Pro &amp; tech accessories</p>'
description_text: 'What we’re looking for, ranked: Cracked developer who has built
  lots of bots/scripts Strong experience using AI to automate tasks Experience making
  money on the internet as a side or main project. Excellent communication skills
  (written and verbal) About Whop Whop is a financial technology company on a mission
  to provide the world with sustainable income. Our vision is to create the world’s
  largest internet market, where people can create, connect, and transact all from
  a single platform. Whop enables individuals and businesses to accept payments, launch
  ventures, and engage with others across the network.&nbsp; Today, Whop facilitates
  over $3 billion in annual payouts to people in 144 countries. Growth continues to
  accelerate, with gross transaction volume increasing roughly 25% month over month.&nbsp;
  Whop has raised hundreds of millions from institutional investors like Insight,
  Bain Capital Ventures, A*, and Peter Thiel — including a recent strategic investment
  from Tether, the largest stablecoin company in the world. Our current team is made
  up of young, passionate entrepreneurs who grew up on the internet — over 75% built
  a business before joining Whop, including 53 former founders and 30 who scaled past
  $1M in revenue. Product leadership includes backgrounds from Meta and Robinhood.
  For more information, visit whop.com. About the role Whop is building institution-grade
  financial infrastructure to power the next generation of digital entrepreneurship.
  We’re looking for a GTM Engineer to partner with our Head of Partnerships to automate
  as much of the day to day process of onboarding new businesses to Whop. This role
  is responsible for automating everything from finding the right businesses to go
  after to ensuring they are successfully ramping on Whop. Over the next two years
  this role will automate every part of sales to the point where we could remove nearly
  all humans.&nbsp; This role will partner with our Head of Partnerships. Scope: Automate
  inbound lead qualification Identify all leads we should be targeting&nbsp; Automate
  all cold outreach (email &amp; sms) Create loss reports for each lost deal (why
  did we lose, what could we have done differently) Automated call review (upload
  call recording and get instant feedback on where you could have improved) What we’re
  looking for Cracked Have built successful scripts/bots Experience using AI to automate
  previously human-done tasks Have made money on the internet on side projects or
  your own businesses High attention to detail; cares deeply about correctness Low-ego,
  non-performative, and process-driven Want to take over the world and are not satisfied
  with anything other than being the best A scrappy, experiment-driven mindset: no
  task too small, no idea too big Your first 90 days will look like the following:
  Within 30 days, you will automate tasks like automatic call review, and loss report
  bot. Within 60 days, you will automate inbound lead qualification, and lead identification.
  Within 90 days, you will be fully ramped up &amp; constantly automating new tasks
  that optimize the team as much as possible. Benefits Overview ✅ Base salary of $190,000
  - $240,000 + bonus + a competitive equity package&nbsp; ❤️ Unlimited PTO, with full
  health, vision, dental coverage 🍕 Lunch &amp; dinner paid for Monday thru Friday
  + free Equinox membership + Citibike membership + free Ubers home after 10pm + $9k
  annual rent subsidy if you live within 4 blocks of our 300 Kent office 💻&nbsp; The
  latest Macbook Pro &amp; tech accessories'
