description_html: '<p><p>At Jungle Scout, we are on a mission to build the best Amazon
  competitive intelligence tools for Amazon sellers and brands.</p></p><p>About the
  Role</p><p>We’re looking for a <strong>GTM Engineer</strong> who combines strong
  technical expertise with a deep understanding of go-to-market strategy and model
  quality control. This role sits at the intersection of Revenue Operations, Data,
  Marketing, and Sales — ensuring that our GTM systems, analytics models, and automated
  outputs are accurate, scalable, and continuously improving.</p><p>A core focus of
  this role will be <strong>training, evaluating, and improving analytical and AI-driven
  models</strong> through structured output reviews, feedback loops, and quality control
  processes.</p><p>You will help design the data foundation that powers revenue decisions
  while implementing rigorous validation frameworks to ensure confidence in our insights
  and automation.<br>Role will be based in Chicago, hybrid 3 days in the office.</p><br><p>What
  You’ll Do</p><p>Model Training, Review &amp; Quality Control</p><ul><li>Design and
  implement structured output review processes to validate model and analytics accuracy</li><li>Perform
  systematic quality audits on segmentation models, forecasting outputs, attribution
  models, and AI-driven insights</li><li>Develop feedback loops to retrain and refine
  models based on performance data and business outcomes</li><li>Establish clear quality
  benchmarks and monitoring dashboards for model performance</li><li>Partner with
  Data and Product teams to improve training datasets and reduce bias, drift, and
  inconsistencies</li><li>Document evaluation frameworks and ensure reproducibility
  of model validation processes</li></ul><p>Data &amp; Systems Engineering</p><ul><li>Write
  and optimize advanced SQL queries to support modeling, reporting, and validation
  workflows</li><li>Manage and maintain relational databases and data warehouse structures</li><li>Design
  scalable data models that support GTM analytics and operational systems</li><li>Build
  and maintain data transformations and QA checks across pipelines</li><li>Improve
  system interoperability across CRM, marketing automation, billing, and product analytics
  tools</li></ul><p>GTM Strategy &amp; Revenue Operations</p><ul><li>Translate business
  strategy into measurable models and scalable technical solutions</li><li>Support
  territory planning, lead scoring, segmentation, and pipeline forecasting</li><li>Identify
  performance gaps across the funnel and design data-backed solutions</li><li>Build
  reporting frameworks that drive strategic decision-making</li><li>Ensure GTM systems
  align with evolving business objectives</li></ul><p>What You Bring</p><p>Technical
  Skills</p><ul><li>Advanced SQL proficiency (complex joins, window functions, aggregations,
  query optimization)</li><li>Strong understanding of relational databases and data
  warehousing concepts</li><li>Experience with data modeling and ETL processes</li><li>Familiarity
  with CRM and marketing automation platforms (Salesforce, HubSpot, Marketo, etc.)</li><li>Experience
  working with BI tools (Looker, Tableau, Sigma, etc.)</li><li>Exposure to model validation,
  performance monitoring, or AI/ML quality frameworks</li></ul><p>GTM &amp; Business
  Acumen</p><ul><li>Deep understanding of SaaS go-to-market processes across Marketing,
  Sales, and Customer Success</li><li>Experience supporting pipeline analytics, revenue
  forecasting, and attribution</li><li>Strong understanding of SaaS metrics (ARR,
  CAC, LTV, churn, conversion rates, pipeline coverage)</li><li>Ability to connect
  model outputs to business impact</li></ul><p>Quality &amp; Analytical Mindset</p><ul><li>Strong
  attention to detail and commitment to data integrity</li><li>Experience designing
  QA processes or review frameworks</li><li>Ability to identify anomalies, inconsistencies,
  and sources of model drift</li><li>Systems thinker who balances automation with
  oversight</li></ul><p>Nice to Have</p><ul><li>Experience in B2B SaaS or ecommerce</li><li>Python
  or scripting experience for automation and data validation</li><li>Experience working
  with product usage data</li><li>Familiarity with experimentation frameworks (A/B
  testing, cohort analysis)</li></ul><p><p><em><strong>Note: </strong>The one constant
  in our evolving, dynamic environment is change. Needless to say, you’ll never get
  bored ;) </em><em>The responsibilities listed above are our needs today but we are
  keeping future needs &amp; opportunities in mind when hiring for this position.
  We value adaptability and a growth mindset in team members. Although it’s not promised,
  the successful candidate should be prepared for the possibility that their role
  may evolve over time as our business strategies and priorities change.</em></p><p><strong>What
  you’ll get:</strong></p><p>💥<strong>The BEST team</strong>. You’ll work alongside
  the smartest, most passionate, and kindest humans day in and day out making work
  fun.</p><p>💥 <strong>A growth culture!</strong> We have tons of opportunities for
  you to elevate your skills and take you to that next step; we are here to help you
  find the ones that matter most to you through exposure and training.</p><p>💥 <strong>Ability
  to make impact!</strong> Although it’s a highly collaborative culture, team members
  are empowered to work autonomously and take extreme ownership of their work. You''ll
  have the opportunity to truly make a difference and impact our customers.</p><p>💥
  <strong>Competitive compensation packages!</strong> We structure our compensation
  packages to reward our team members'' contributions to our company''s success -
  you’ll have a bonus tied to performance and will be invested into our long-term
  success with Equity.&nbsp;</p><p>💥 <strong>Flexible Time Off. </strong><span>With
  our generous PTO and recognition of local holidays, escape to the beach, recharge
  mentally, or use your Volunteer Time Off (VTO) to give back through volunteering.</span></p><p>💥
  <strong>Comprehensive Health Benefits &amp; Retirement Program.</strong> We offer
  comprehensive healthcare and retirement matching plans for eligible employees.</p><p>💥
  <strong><span>Paid Parental Leave Policy</span>. </strong>Jungle Scout values the
  importance of family and offers a paid parental leave that provides the support
  and flexibility you need to embrace this special time in your life. We also offer
  a ramp-back period for a seamless transition for you and your family.</p><p><strong>About
  Jungle Scout</strong></p><p><span>Jungle Scout is the leading all-in-one platform
  for selling on Amazon, supporting more than $50 billion in annual Amazon revenue
  and 10 global Amazon marketplaces. Founded in 2015 as the first Amazon product research
  tool, Jungle Scout today features a full suite of best-in-class business management
  solutions and powerful market intelligence resources to help entrepreneurs and brands
  manage their e</span><span>commerce businesses.&nbsp;</span></p><p><span>The Jungle
  Scout team is a group of smart, motivated, and fun-loving professionals working
  hard to help our customers achieve success.&nbsp;</span></p><p><strong>We prioritize
  Diversity, Equity, and Inclusion&nbsp;</strong></p><p>At Jungle Scout, we recognize
  the value of different experiences, backgrounds and cultures. We hire intentionally,
  with this in mind.</p><p><span>Jungle Scout is committed to creating a diverse environment
  and is proud to be an equal opportunity employer. All qualified applicants will
  receive consideration for employment without regard to race, color, religion, gender,
  gender identity or expression, sexual orientation, national origin, genetics, disability,
  age, or veteran status.</span></p><p><em><span>All offers of employment at Jungle
  Scout are contingent upon clear results of a comprehensive background check. Background
  checks will be conducted on all final candidates prior to start date.</span></em></p><br></p>'
