description_html: <p><strong>Payabli i</strong>s a next-generation Payments Infrastructure
  and Monetization Platform purpose-built for vertical software companies. Through
  a single, developer-friendly API with low-code embedded payment components, Payabli
  enables platforms to seamlessly embed, monetize, and operationalize payments—making
  payments a core part of their platform and business model.</p><p></p><p>By unifying
  payment acceptance, payment issuance, and advanced payment operations tooling, Payabli
  empowers software companies to manage and move money through a single infrastructure
  stack that delivers total control over the payments experience. Built to scale with
  PCI DSS 4.0 and SOC 2-compliant security, Payabli’s infrastructure delivers enterprise-grade
  reliability and trust while leveraging AI-driven intelligence to enhance visibility,
  streamline operations, and drive revenue growth.</p><p></p><p>Backed by leading
  fintech investors including QED Investors, Fika Ventures, TTV Capital, and Bling
  Capital, Payabli is setting the standard for embedded payments infrastructure powering
  the next generation of vertical SaaS.</p><p></p><b><strong>The Role</strong></b><p>We're
  seeking a technically-minded operator who can supercharge our sales team's efficiency
  through automation, data optimization, and intelligent tooling. As our Go-To-Market
  Engineer, you'll build and maintain the technical infrastructure that powers our
  sales motion—from prospect identification and enrichment to outreach automation
  and pipeline analytics.</p><p>This role sits at the intersection of sales operations,
  data engineering, and growth automation. You'll work directly with our Head of Sales,
  department heads across operations, marketing, customer success, and AI to identify
  bottlenecks, implement solutions, and continuously optimize our go-to-market engine
  using modern sales enablement tools and custom integrations.</p><p></p><b><strong>What
  You'll Do:</strong></b><p><strong>Sales Enablement &amp; Automation</strong></p><ul><li><p>Build
  and optimize automated workflows for prospect outreach using tools like AmpleMarket,
  Knode.ai, and other sales engagement platforms</p></li><li><p>Integrate and configure
  AI-powered sales tools (including Claude integrations and Amigo AI agent) to enhance
  team productivity</p></li><li><p>Create scripts and automations that enrich prospect
  data, prioritize leads, and personalize outreach at scale</p></li><li><p>Implement
  and maintain integrations between our CRM, sales engagement platforms, and other
  GTM tools</p></li></ul><p><strong>Revenue Operations</strong></p><ul><li><p>Manage
  and optimize our sales tech stack to ensure data flows seamlessly between systems</p></li><li><p>Build
  dashboards and reporting that provide actionable insights into pipeline health,
  conversion metrics, and team performance</p></li><li><p>Maintain data hygiene across
  our CRM and sales tools, implementing validation rules and cleanup processes</p></li><li><p>Design
  and implement lead scoring models, territory assignments, and routing logic</p></li></ul><p><strong>Prospect
  Research &amp; ICP Refinement</strong></p><ul><li><p>Develop systematic approaches
  to identify and qualify prospects that match our ideal customer profile across target
  verticals</p></li><li><p>Build tools and processes for competitive intelligence
  gathering and market research</p></li><li><p>Create data-driven frameworks for account
  prioritization and territory planning</p></li><li><p>Analyze closed-won and closed-lost
  deals to continuously refine targeting criteria</p></li></ul><p><strong>Process
  Optimization &amp; Experimentation</strong></p><ul><li><p>Identify opportunities
  to eliminate manual work and accelerate the sales cycle through technical solutions</p></li><li><p>Run
  experiments on outreach sequences, messaging variations, and channel optimization</p></li><li><p>Document
  processes and create training materials for sales team adoption of new tools</p></li><li><p>Stay
  current on emerging sales tech and AI tools that could enhance team effectiveness</p></li></ul><p><strong>Analytics
  &amp; Insights</strong></p><ul><li><p>Build custom reports and analyses to support
  sales strategy and forecasting</p></li><li><p>Track and report on key GTM metrics
  including pipeline velocity, conversion rates, and tool ROI</p></li><li><p>Provide
  data-driven recommendations to sales leadership on resource allocation and strategy</p></li><li><p>Create
  performance benchmarks and accountability frameworks for the sales team</p></li></ul><p></p><b><strong>What
  You Bring</strong></b><p><strong>Required:</strong></p><ul><li><p>4+ years of experience
  in revenue operations, sales operations, marketing operations, or growth engineering</p></li><li><p>Strong
  technical skills including proficiency with APIs, SQL, and scripting languages (Python,
  JavaScript, or similar)</p></li><li><p>Hands-on experience with modern sales engagement
  platforms and CRM systems (Salesforce, HubSpot, Outreach, Apollo, etc.)</p></li><li><p>Demonstrated
  ability to build automations, integrations, and workflows that drive measurable
  business impact</p></li><li><p>Data analysis skills with ability to translate metrics
  into actionable insights</p></li><li><p>Self-starter mentality with a bias toward
  experimentation and continuous improvement</p></li><li><p>Excellent project management
  and stakeholder communication skills</p></li></ul><p><strong>Preferred:</strong></p><ul><li><p>Experience
  implementing AI-powered sales tools and LLM integrations</p></li><li><p>Background
  in B2B SaaS, fintech, or payments companies</p></li><li><p>Familiarity with vertical
  SaaS business models and multi-vertical go-to-market strategies</p></li><li><p>Experience
  with data enrichment tools (ZoomInfo, Clearbit, Clay etc.) and intent data platforms</p></li><li><p>Knowledge
  of modern data stack tools (Segment, Fivetran, dbt, etc.)</p></li><li><p>Understanding
  of payment processing or embedded finance concepts</p></li></ul><p></p><b><strong>Why
  Join Payabli</strong></b><ul><li><p><strong>High-Impact Role:</strong> Your work
  will directly accelerate revenue growth and team productivity</p></li><li><p><strong>Technical
  Autonomy:</strong> Freedom to experiment with new tools and build custom solutions</p></li><li><p><strong>Cross-Functional
  Exposure:</strong> Work closely with sales, marketing, product, and data teams</p></li><li><p><strong>Growth
  Opportunity:</strong> Join a well-funded company in expansion mode with evolving
  operational needs</p></li><li><p><strong>Innovation Culture:</strong> Embrace AI
  and automation to stay at the forefront of modern sales operations</p></li></ul><p>We
  build technology that gets noticed and a workplace where people want to grow their
  careers.. Our work has been recognized by some of the industry’s most respected
  organizations, including the <strong>2026 Forbes Fintech 50 list</strong>, which
  highlights the most innovative private companies in financial technology, <strong>Inc.’s
  2025 Best Workplaces</strong>, and <strong>Built In’s 2026 Best Places to Work in
  Miami.</strong></p><p></p><b><strong>Compensation &amp; Benefits</strong></b><ul><li><p>Competitive
  base salary plus performance bonus</p></li><li><p>Equity participation</p></li><li><p>Comprehensive
  health, dental, and vision insurance</p></li><li><p>401(k) plan</p></li><li><p>Flexible
  PTO policy</p></li><li><p>Remote-first culture with home office stipend</p></li><li><p>Professional
  development and tool budget</p></li></ul><p></p><p><strong>Payabli </strong>is an
  equal opportunity employer and values a diverse, inclusive workplace.</p><p></p><p><strong>Principals
  only.</strong> No external agency submissions. Candidates must apply directly; We
  will not accept submissions from third-party recruiters or staffing agencies.</p><p></p>
