description_html: '<p><strong>About Cryptio</strong></p><p>We’re Cryptio. We build
  infrastructure to bring financial integrity to the crypto economy. Our enterprise-grade
  back-office and data platform power mission-critical accounting, reporting, and
  operational workflows for institutions, corporates, and crypto-native organisations.</p><p>We’re
  trusted by leaders like Circle, Societe Generale, Uniswap, Gemini, and the Government
  of El Salvador. We’ve raised $26m from top investors including Point Nine, 1kx,
  Tim Draper, and Ledger Cathay.</p><p></p><p><strong>The role</strong></p><p>We’re
  hiring a <strong>GTM Engineer </strong>to take ownership of HubSpot and our automation
  stack. You’ll design clean processes, build reporting, and use AI tools to scale
  our go-to-market engine. This role is high-impact and cross-functional; ideal for
  someone who loves systems, process, and growth.</p><p></p><p><strong>What you’ll
  do</strong></p><ul><li><p>Audit and optimise HubSpot CRM (data, workflows, reporting).</p></li><li><p>Design
  Clay + Ocean outbound flows with AI-driven enrichment.</p></li><li><p>Define ICPs,
  build lead pipelines, and enforce attribution standards.</p></li><li><p>Create dashboards
  for pipeline health and ROI.</p></li><li><p>Partner with Sales &amp; Growth to run
  and refine outbound plays.</p></li></ul><p></p><p><strong>We’re looking for someone
  who</strong></p><ul><li><p>Brings HubSpot/RevOps expertise (workflows, routing,
  reporting).</p></li><li><p>Has hands-on AI &amp; automation skills (Clay, Ocean,
  Zapier/Make, LLMs).</p></li><li><p>Thinks in systems and can ship MVPs quickly.</p></li><li><p>Understands
  outbound craft: ICPs, messaging, list hygiene.</p></li><li><p>Communicates clearly
  and enjoys collaboration.</p></li></ul><p></p><p><strong>Why you’ll love this role</strong></p><ul><li><p>Play
  a central role in scaling GTM systems at a fast-growing company.</p></li><li><p>See
  your work directly improve pipeline and revenue.</p></li><li><p>Build with cutting-edge
  AI and automation tools.</p></li></ul><p></p><p><strong>Interview Process</strong></p><p>Here’s
  what to expect as we get to know each other:</p><ul><li><p>Talent Screen (15-30
  min): An introductory video call to discuss your application, clarify the responsibilities
  of the role, and answer your questions about Cryptio.</p></li><li><p>1st Interview
  (45 min): Meet with our Head of Sales for a deeper conversation to review your CV
  in detail.</p></li><li><p>Loom/Case Study: Showcase how you would build a workflow.</p></li><li><p>Case
  Study Interview (60 min): Discuss what you’ve put together and participate in a
  Q&amp;A session.</p></li><li><p>Final Interview (30 min).</p></li></ul><p></p><p><strong>Perks</strong></p><p>👩‍💻
  Remote or Hybrid working</p><p>🏝️ 25 days paid holiday plus bank holidays</p><p>🙌
  One additional day of annual leave each year, up to 30 total days</p><p>🎂 Your birth
  off</p><p>🧘 Mental health resources, wellbeing programs, and professional coaching</p><p>🫶
  Family-friendly policies</p><p>💪 Fitness and wellness budget</p><p>💻 MacBook Pro</p><p>🖥️
  $200 home office setup budget</p><p>🎓Training and development budget</p><p>*** we
  have additional benefits depending on location </p><p></p><p><strong>If this sounds
  like you, we would love to hear from you 🙌</strong></p><p></p><p><em>At Cryptio,
  we move fast and take ownership of outcomes. We learn from failures, celebrate wins,
  and let humility, curiosity, and a passion for crypto guide how we work. If you
  value collaboration and want to build with purpose, you’ll feel right at home here.</em></p>'
description_text: 'About Cryptio We’re Cryptio. We build infrastructure to bring financial
  integrity to the crypto economy. Our enterprise-grade back-office and data platform
  power mission-critical accounting, reporting, and operational workflows for institutions,
  corporates, and crypto-native organisations. We’re trusted by leaders like Circle,
  Societe Generale, Uniswap, Gemini, and the Government of El Salvador. We’ve raised
  $26m from top investors including Point Nine, 1kx, Tim Draper, and Ledger Cathay.
  The role We’re hiring a GTM Engineer to take ownership of HubSpot and our automation
  stack. You’ll design clean processes, build reporting, and use AI tools to scale
  our go-to-market engine. This role is high-impact and cross-functional; ideal for
  someone who loves systems, process, and growth. What you’ll do Audit and optimise
  HubSpot CRM (data, workflows, reporting). Design Clay + Ocean outbound flows with
  AI-driven enrichment. Define ICPs, build lead pipelines, and enforce attribution
  standards. Create dashboards for pipeline health and ROI. Partner with Sales &amp;
  Growth to run and refine outbound plays. We’re looking for someone who Brings HubSpot/RevOps
  expertise (workflows, routing, reporting). Has hands-on AI &amp; automation skills
  (Clay, Ocean, Zapier/Make, LLMs). Thinks in systems and can ship MVPs quickly. Understands
  outbound craft: ICPs, messaging, list hygiene. Communicates clearly and enjoys collaboration.
  Why you’ll love this role Play a central role in scaling GTM systems at a fast-growing
  company. See your work directly improve pipeline and revenue. Build with cutting-edge
  AI and automation tools. Interview Process Here’s what to expect as we get to know
  each other: Talent Screen (15-30 min): An introductory video call to discuss your
  application, clarify the responsibilities of the role, and answer your questions
  about Cryptio. 1st Interview (45 min): Meet with our Head of Sales for a deeper
  conversation to review your CV in detail. Loom/Case Study: Showcase how you would
  build a workflow. Case Study Interview (60 min): Discuss what you’ve put together
  and participate in a Q&amp;A session. Final Interview (30 min). Perks 👩‍💻 Remote
  or Hybrid working 🏝️ 25 days paid holiday plus bank holidays 🙌 One additional day
  of annual leave each year, up to 30 total days 🎂 Your birth off 🧘 Mental health
  resources, wellbeing programs, and professional coaching 🫶 Family-friendly policies
  💪 Fitness and wellness budget 💻 MacBook Pro 🖥️ $200 home office setup budget 🎓Training
  and development budget *** we have additional benefits depending on location If
  this sounds like you, we would love to hear from you 🙌 At Cryptio, we move fast
  and take ownership of outcomes. We learn from failures, celebrate wins, and let
  humility, curiosity, and a passion for crypto guide how we work. If you value collaboration
  and want to build with purpose, you’ll feel right at home here.'
