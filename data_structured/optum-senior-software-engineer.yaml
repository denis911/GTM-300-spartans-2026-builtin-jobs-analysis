description_html: '<b>Requisition Number: 2349100</b><br>Optum is a global organization
  that delivers care, aided by technology to help millions of people live healthier
  lives. The work you do with our team will directly improve health outcomes by connecting
  people with the care, pharmacy benefits, data and resources they need to feel their
  best. Here, you will find a culture guided by diversity and inclusion, talented
  peers, comprehensive benefits and career development opportunities. Come make an
  impact on the communities we serve as you help us advance health equity on a global
  scale. Join us to start <strong>Caring. Connecting. Growing together.</strong> <br>The
  Optum Technology Digital team is on a mission to disrupt the healthcare industry,
  transforming UHG into an industry-leading Consumer brand. We deliver hyper-personalized
  digital solutions that empower direct-to-consumer, digital-first experiences, educating,
  guiding, and empowering consumers to access the right care at the right time. Our
  mission is to revolutionize healthcare for patients and providers by delivering
  cutting-edge, personalized and conversational digital solutions. We''re Consumer
  Obsessed, ensuring they receive exceptional support throughout their healthcare
  journeys. As we drive this transformation, we''re revolutionizing customer interactions
  with the healthcare system, leveraging AI, cloud computing, and other disruptive
  technologies to tackle complex challenges. Serving UnitedHealth Group''s digital
  technology needs, the Consumer Engineering team impacts millions of lives through
  UnitedHealthcare &amp; Optum. <br>The Optum Technology Chief Digital Office (CDO)
  Leadership team is transforming Optum to be an industry-leading Consumer brand.
  We are on a journey towards delivering a best-in-the-industry consumer experience
  to our patients and providers by delivering personalized digital solutions that
  support our consumers throughout their healthcare journeys. This team is transforming
  to meet the moment - to begin radically altering the way our customers engage with
  the healthcare system using modern tech to solve some of the most complex problems
  experienced along the way. <br>Serving all of UnitedHealth Group''s digital technology
  needs, the CDO team is responsible for driving outcomes across nearly 30 million+
  human lives with UnitedHealthcare insurance, a number which puts UHC at the top
  of the pack as the largest managed care provider in the United States. <br>If you
  reside in Minnesota, you''ll enjoy the flexibility to telecommute* as you take on
  some tough challenges. <br><strong>Primary Responsibilities:</strong> <br><ul><li>
  Hands-on experience with Programming languages such as Net, C#, Python </li><li>
  Hands-on experience with Azure Cloud, CI/CD pipelines, IaC </li><li> Design, implement,
  and manage cloud infrastructure and CI/CD pipelines on Microsoft Azure </li><li>
  Collaborate with development and operations teams to automate software delivery,
  optimize performance, ensure reliability, and maintain security and compliance within
  the Azure environment </li><li> Design, develop, and deploy AI-powered solutions
  to address complex business challenges with emphasis on responsible use of AI </li><li>
  Leverage enterprise-approved AI tools to streamline workflows, automate tasks, and
  drive continuous improvement </li><li> Evaluate emerging trends to inform solution
  design and strategic innovation </li><li> AI Builder : Design, develop, and deploy
  AI-powered solutions using no-code, low-code, and advanced platforms, translating
  business needs into scalable applications that enhance products, workflows and decision-making
  </li></ul><br>You''ll be rewarded and recognized for your performance in an environment
  that will challenge you and give you clear directions on what it takes to succeed
  in your role as well as provide development for other roles you may be interested
  in. <br><strong>Required Qualifications:</strong> <br><ul><li> 6+ years of experience
  in software development and platform administration </li><li> 4+ years of experience
  with Programming languages such as Python, Net, C#, Java </li><li> 4+ years of experience
  with Azure Cloud, CI/CD pipelines, IaC </li><li> 4+ years of experience with Azure
  cloud services </li><li> 2+ years of experience with automation tools like Power
  Automate, shell scripting, or PowerShell </li><li> 1+ years of experience using
  Copilot (Github, Azure, etc): Code Generation, Test case generation, Error troubleshooting
  and code refactoring, Insights Generation, etc. </li><li> 1+ years of experience
  in the healthcare domain </li></ul><br><strong>Preferred Qualifications:</strong>
  <br><ul><li> Graduate Degree in Computer Science, Engineering, or a related field
  or equivalent experience </li><li> Microsoft Copilot Studio + Power Automate: Create
  AI Agents for Automation and Productivity enhancement </li><li> 2+ years of experience
  in Windows and Unix administration </li><li> Experience with Terraform for managing
  Infrastructure as Code (IaC) based platforms </li><li> Familiarity with front-end
  technologies </li><li> Proven excellent communication skills - verbal, written,
  and interpersonal </li><li> Proven analytical and decision-making skills with the
  ability to justify technical choices </li><li> Proven detail-oriented with solid
  organizational and leadership capabilities </li><li> Demonstrated ability to thrive
  in dynamic environments with shifting priorities </li><li> Demonstrated ability
  to build and maintain positive working relationships across teams and leadership
  levels </li><li> Demonstrated expertise in debugging, data analysis, and vulnerability
  management </li></ul><br>*All Telecommuters will be required to adhere to UnitedHealth
  Group''s Telecommuter Policy. <br>Pay is based on several factors including but
  not limited to local labor markets, education, work experience, certifications,
  etc. In addition to your salary, we offer benefits such as, a comprehensive benefits
  package, incentive and recognition programs, equity stock purchase and 401k contribution
  (all benefits are subject to eligibility requirements). No matter where or when
  you begin a career with us, you''ll find a far-reaching choice of benefits and incentives.
  The salary for this role will range from $91,700 to $163,700 annually based on full-time
  employment. We comply with all minimum wage laws as applicable. <br>At UnitedHealth
  Group, our mission is to help people live healthier lives and make the health system
  work better for everyone. We believe everyone-of every race, gender, sexuality,
  age, location, and income-deserves the opportunity to live their healthiest life.
  Today, however, there are still far too many barriers to good health which are disproportionately
  experienced by people of color, historically marginalized groups, and those with
  lower incomes. We are committed to mitigating our impact on the environment and
  enabling and delivering equitable care that addresses health disparities and improves
  health outcomes - an enterprise priority reflected in our mission. <br>UnitedHealth
  Group is an Equal Employment Opportunity employer under applicable law and qualified
  applicants will receive consideration for employment without regard to race, national
  origin, religion, age, color, sex, sexual orientation, gender identity, disability,
  or protected veteran status, or any other characteristic protected by local, state,
  or federal laws, rules, or regulations. <br>UnitedHealth Group is a drug - free
  workplace. Candidates are required to pass a drug test before beginning employment.
  <br>#RPO #YELLOW'
