description_html: 'Job Description:<br><b>Our Opportunity:</b><br>Chewy''s mission
  is to be the most trusted and convenient destination for pet parents and partners
  everywhere.<br>The Identity team ensures account creation and access are frictionless,
  flexible, and future proof. They develop adaptive, intelligent authentication systems
  that evolve with our customers. These systems link every part of the customer''s
  journey at Chewy, including shopping and services.<br>Join Chewy as a <b>Senior
  Product Manager - Identity </b> where you will play a pivotal role in crafting our
  customer experience. This outstanding opportunity will allow you to lead the vision,
  roadmap, and delivery of user-focused account setup, login processes, and profile
  management experiences at Chewy. You will directly own how customers build accounts,
  sign-in, and maintain trusted access across every Chewy surface - from ecommerce
  and subscriptions to health plans, services, and partner experiences.<br>You will
  be responsible for driving the strategic direction, plan, and implementation of
  the customer-facing account registration, sign-in, and profile management experiences
  at Chewy. You will oversee how customers set up accounts, sign in, and preserve
  trusted access on every Chewy platform. Chewy platform. This covers online retail,
  recurring orders, health offerings, and partner interactions.<br>This high-impact
  chance to lead one of Chewy''s key customer-facing product domains. Your role includes
  evolving and improving a high-scale service. You will also promote ongoing progress
  in a complex, cross-functional setting. You will ensure access experiences are straightforward,
  inviting, and secure. This builds customer trust and deepens their connection with
  Chewy.<br><b>What You''ll Do:</b><br><ul><li>Own the end-to-end customer experience
  for account creation, sign-in, recovery, and ongoing account management across all
  Chewy surfaces.</li><li>Develop customer flows that are intuitive, inclusive, and
  accessible while meeting high standards for security, privacy, and reliability.</li><li>Reduce
  friction across the customer lifecycle - from guest to registered customer to services
  adopter - while preserving trust and safety.</li><li>Use qualitative and quantitative
  customer insights to find opportunities to improve access, continuity, and confidence
  across Chewy experiences.</li><li>Define and evolve the long-term product vision
  and strategy for identity, authentication, and account foundations.</li><li>Balance
  near-term delivery with long-term platform health, scalability, and extensibility.</li><li>Translate
  complex technical capabilities into clear, compelling narratives that align cross
  functional partners around priorities and trade-offs.</li><li>Translate strategy
  and insights into clear product requirements, user stories, and documentation.</li><li>Own
  and prioritize the product roadmap and backlog based on customer impact, risk, and
  business value.</li><li>Establish success metrics and inspection mechanisms to evaluate
  platform adoption, reliability, and experience quality.</li><li>Partner closely
  with engineering, security, and architecture teams to deliver resilient, compliant,
  and future-proof solutions.</li><li>Proactively identify risks related to security,
  scale, performance, or dependency management and drive mitigation plans.</li><li>Track
  post-launch outcomes and continuously iterate based on data, feedback, and evolving
  business needs.</li><li>Work cross functionally with product, engineering, user
  experience, security, fraud, legal/compliance, data, and downstream platform and
  experience teams.</li><li>Serve as a trusted partner and advisor to cross functional
  teams, ensuring identity and access decisions support cohesive, trustworthy customer
  journeys.</li><li>Drive alignment across highly interdependent teams in an environment
  with ambiguity and competing priorities.</li></ul><br><b>What You''ll Need:</b><br><ul><li>6+
  years of professional experience in product management or an equivalent area.</li><li>Bachelor''s
  degree or equivalent experience in Computer Science, Engineering, Business, or related
  team.</li><li>Proven experience owning products or platforms end-to-end from discovery
  through delivery and iteration.</li><li>Strong ability to define strategy for platform
  or foundational systems, not just surface level features.</li><li>Demonstrated success
  balancing customer experience, technical constraints, and long-term architectural
  considerations.</li><li>Comfort operating at multiple levels: setting vision while
  diving into detailed requirements and trade-offs.</li><li>Clear, effective communicator
  who can align diverse partners across teams and levels.</li><li>Skilled at building
  trust, navigating healthy debate, and driving decisions in complex environments.</li><li>Able
  to translate technical concepts into accessible narratives for non-technical audiences.</li><li>Data
  informed decision maker with excellent judgment in ambiguous or high-risk problem
  spaces.</li><li>Detail oriented while maintaining focus on outcomes and customer
  value.</li><li>Comfortable prioritizing and delivering results in a fast paced,
  platform dependent ecosystem.</li></ul><br><b>Bonus:</b><br><ul><li>Experience with
  identity, authentication, authorization, or account management systems.</li><li>Familiarity
  with security, privacy, or compliance considerations in consumer-facing platforms.</li><li>Experience
  delivering large-scale, customer facing identity or access experiences used by millions
  of users.</li><li>Background in large-scale consumer or e-commerce environments.</li></ul><br><b>Work
  Arrangement:</b><br><ul><li>Hub Locations: Bellevue, WA or Boston, MA</li><li>Hybrid
  Model: 3+ days in hub location per week</li><li>Remote: This role is NOT a remote
  role.</li></ul><br>The base salary range for this role is $141,000 - $225,500.<ul><li>The
  specific salary offered to a candidate may be influenced by a variety of factors
  including but not limited to the candidate''s relevant experience, education, and
  work location. In addition, this position is eligible for 401k and a new hire and
  annual equity grant. C08+ positions may also be eligible for annual bonus.</li></ul><br>We
  offer different types of insurance and benefits, such as medical/Rx, vision, dental,
  life, disability, hospital indemnity, critical illness, and accident. We offer parental
  leave, family services benefits, backup dependent care, flexible spending accounts,
  telemedicine, pet adoption reimbursement, employee assistance program, and many
  discounts including 10% off pet insurance and 20% off at Chewy.com.<br>Exempt salary
  team members have unlimited PTO, subject to manager approval. Team members will
  receive six paid holidays per year. Team members may be eligible for paid sick and
  family leave in compliance with applicable state and local regulations.<br>Chewy
  is an equal opportunity employer. All qualified applicants will receive consideration
  for employment without regard to race, color, ancestry, national origin, gender,
  citizenship, marital status, religion, age, disability, gender identity, results
  of genetic testing, veteran status, as well as any other legally-protected characteristic.
  If you have a disability under the Americans with Disabilities Act or similar law,
  and you need an accommodation during the application process or to perform these
  job requirements, or if you need a religious accommodation, please contact CAAR@chewy.com.<br>To
  access Chewy''s California CPRA Job Applicant Privacy Policy, please click here.'
description_text: 'Job Description: Our Opportunity: Chewy''s mission is to be the
  most trusted and convenient destination for pet parents and partners everywhere.
  The Identity team ensures account creation and access are frictionless, flexible,
  and future proof. They develop adaptive, intelligent authentication systems that
  evolve with our customers. These systems link every part of the customer''s journey
  at Chewy, including shopping and services. Join Chewy as a Senior Product Manager
  - Identity where you will play a pivotal role in crafting our customer experience.
  This outstanding opportunity will allow you to lead the vision, roadmap, and delivery
  of user-focused account setup, login processes, and profile management experiences
  at Chewy. You will directly own how customers build accounts, sign-in, and maintain
  trusted access across every Chewy surface - from ecommerce and subscriptions to
  health plans, services, and partner experiences. You will be responsible for driving
  the strategic direction, plan, and implementation of the customer-facing account
  registration, sign-in, and profile management experiences at Chewy. You will oversee
  how customers set up accounts, sign in, and preserve trusted access on every Chewy
  platform. Chewy platform. This covers online retail, recurring orders, health offerings,
  and partner interactions. This high-impact chance to lead one of Chewy''s key customer-facing
  product domains. Your role includes evolving and improving a high-scale service.
  You will also promote ongoing progress in a complex, cross-functional setting. You
  will ensure access experiences are straightforward, inviting, and secure. This builds
  customer trust and deepens their connection with Chewy. What You''ll Do: Own the
  end-to-end customer experience for account creation, sign-in, recovery, and ongoing
  account management across all Chewy surfaces. Develop customer flows that are intuitive,
  inclusive, and accessible while meeting high standards for security, privacy, and
  reliability. Reduce friction across the customer lifecycle - from guest to registered
  customer to services adopter - while preserving trust and safety. Use qualitative
  and quantitative customer insights to find opportunities to improve access, continuity,
  and confidence across Chewy experiences. Define and evolve the long-term product
  vision and strategy for identity, authentication, and account foundations. Balance
  near-term delivery with long-term platform health, scalability, and extensibility.
  Translate complex technical capabilities into clear, compelling narratives that
  align cross functional partners around priorities and trade-offs. Translate strategy
  and insights into clear product requirements, user stories, and documentation. Own
  and prioritize the product roadmap and backlog based on customer impact, risk, and
  business value. Establish success metrics and inspection mechanisms to evaluate
  platform adoption, reliability, and experience quality. Partner closely with engineering,
  security, and architecture teams to deliver resilient, compliant, and future-proof
  solutions. Proactively identify risks related to security, scale, performance, or
  dependency management and drive mitigation plans. Track post-launch outcomes and
  continuously iterate based on data, feedback, and evolving business needs. Work
  cross functionally with product, engineering, user experience, security, fraud,
  legal/compliance, data, and downstream platform and experience teams. Serve as a
  trusted partner and advisor to cross functional teams, ensuring identity and access
  decisions support cohesive, trustworthy customer journeys. Drive alignment across
  highly interdependent teams in an environment with ambiguity and competing priorities.
  What You''ll Need: 6+ years of professional experience in product management or
  an equivalent area. Bachelor''s degree or equivalent experience in Computer Science,
  Engineering, Business, or related team. Proven experience owning products or platforms
  end-to-end from discovery through delivery and iteration. Strong ability to define
  strategy for platform or foundational systems, not just surface level features.
  Demonstrated success balancing customer experience, technical constraints, and long-term
  architectural considerations. Comfort operating at multiple levels: setting vision
  while diving into detailed requirements and trade-offs. Clear, effective communicator
  who can align diverse partners across teams and levels. Skilled at building trust,
  navigating healthy debate, and driving decisions in complex environments. Able to
  translate technical concepts into accessible narratives for non-technical audiences.
  Data informed decision maker with excellent judgment in ambiguous or high-risk problem
  spaces. Detail oriented while maintaining focus on outcomes and customer value.
  Comfortable prioritizing and delivering results in a fast paced, platform dependent
  ecosystem. Bonus: Experience with identity, authentication, authorization, or account
  management systems. Familiarity with security, privacy, or compliance considerations
  in consumer-facing platforms. Experience delivering large-scale, customer facing
  identity or access experiences used by millions of users. Background in large-scale
  consumer or e-commerce environments. Work Arrangement: Hub Locations: Bellevue,
  WA or Boston, MA Hybrid Model: 3+ days in hub location per week Remote: This role
  is NOT a remote role. The base salary range for this role is $141,000 - $225,500.
  The specific salary offered to a candidate may be influenced by a variety of factors
  including but not limited to the candidate''s relevant experience, education, and
  work location. In addition, this position is eligible for 401k and a new hire and
  annual equity grant. C08+ positions may also be eligible for annual bonus. We offer
  different types of insurance and benefits, such as medical/Rx, vision, dental, life,
  disability, hospital indemnity, critical illness, and accident. We offer parental
  leave, family services benefits, backup dependent care, flexible spending accounts,
  telemedicine, pet adoption reimbursement, employee assistance program, and many
  discounts including 10% off pet insurance and 20% off at Chewy.com. Exempt salary
  team members have unlimited PTO, subject to manager approval. Team members will
  receive six paid holidays per year. Team members may be eligible for paid sick and
  family leave in compliance with applicable state and local regulations. Chewy is
  an equal opportunity employer. All qualified applicants will receive consideration
  for employment without regard to race, color, ancestry, national origin, gender,
  citizenship, marital status, religion, age, disability, gender identity, results
  of genetic testing, veteran status, as well as any other legally-protected characteristic.
  If you have a disability under the Americans with Disabilities Act or similar law,
  and you need an accommodation during the application process or to perform these
  job requirements, or if you need a religious accommodation, please contact CAAR@chewy.com.
  To access Chewy''s California CPRA Job Applicant Privacy Policy, please click here.'
