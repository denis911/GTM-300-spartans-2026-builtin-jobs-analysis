date_posted: '2026-03-07'
description_html: '<h3>The Role</h3><p>You''ll be the founding engineer at Nero, working
  directly with the CTO to scale our platform and build features that don''t exist
  yet.</p><p>We need someone who can own complex technical problems end-to-end—from
  database design to deployment pipelines to UI.</p><p>You''ll have significant autonomy
  to identify opportunities, solve problems, and ship code that directly impacts 100k+
  artists and fans per month. Over time, you''ll shape both the technical architecture
  and what we actually build.</p><h3>What you''ll work on:</h3><ul><li>Building new
  features from scratch (fan CRM systems, peer-to-peer payments, automated clipping
  engines). You''ll ship complete products.</li><li>You''ll own infrastructure and
  reliability as we scale to hundreds of thousands of concurrent users. This means
  implementing CI/CD, monitoring, and deployment systems that let us move fast without
  breaking things.</li><li>You''ll architect real-time systems - websockets for live
  queues, payment processing for fan submissions … aka infrastructure I think is interesting
  to build (and you should too!)</li></ul><h3>Who You Are</h3><h3>Must-haves:</h3><ul><li>1+
  years of professional experience (open to new grads with strong internship experience)</li><li>Experience
  with TypeScript, React, Node.js, and PostgreSQL</li><li>You''re fluent in Claude
  Code/Cursor/Windsurf</li><li>Opinionated on visual and technical design</li><li>You
  know what looks good and can implement it</li><li>You own problems and execute quickly
  (without hand-holding)</li><li>Willing to work 50+ hour weeks</li></ul><h3>Nice-to-haves:</h3><ul><li>Built
  products from 0 → 1 with real users and revenue</li><li>Side projects that show
  you building in public</li><li>You go to hackathons</li><li>Experience with DevOps,
  monitoring, or distributed systems a plus</li><li>Interest in music, creator economy,
  or livestreaming</li></ul><h3>Personality-wise:</h3><ul><li>You love music and want
  to help artists and creators</li><li>You''re down for adventure. We''ve worked from
  Mexico for a month, traveled to music conferences around the US, stuff like that.</li></ul><p><i><strong>Note:</strong>
  Please consider applying even if you don''t meet these qualifications. Ultimately,
  we are just looking for someone who is smart, can learn quickly, and can own problems
  and execute on solutions!</i></p><h3>About Nero</h3><p>Nero is building the monetization
  rails for interactive livestreaming. We''re infrastructure that works alongside
  existing platforms like Twitch, Instagram and TikTok to let creators monetize their
  audiences. We''re starting with music, but the model extends to gaming, sports,
  chess, and any vertical where fans pay for direct creator engagement. Watch one
  of our artists, Sonny Digital, explaining it:</p><p>&nbsp;</p><p>And if you couldn''t
  tell already, we aren''t another enterprise SaaS company or an AI wrapper startup.
  We''re literally reshaping the way artists earn money through livestreams. Creators
  have earned over $1.5M reviewing fan-submitted songs and we''ve raised capital from
  Yamaha Music Innovation Fund, Antler, and various angels from the music industry.</p><h3>Interview
  Process</h3><ol><li>30-minute phone screen</li><li>1-hour technical interview OR
  2-3 hour Takehome</li><li>1 hour review and conversation with Eddie (CEO)</li></ol><h3>Compensation
  &amp; Logistics</h3><ul><li>$140k-$180k based on experience</li><li><span style="color:
  rgba(255, 255, 255, 1)">:</span>0.25%-1.0%</li><li>San Francisco, hybrid</li><li>Start
  Date: ASAP</li></ul>'
