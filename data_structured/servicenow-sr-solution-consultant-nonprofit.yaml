description_html: '<b>Company Description</b><br>It all started in sunny San Diego,
  California in 2004 when a visionary engineer, Fred Luddy, saw the potential to transform
  how we work. Fast forward to today - ServiceNow stands as a global market leader,
  bringing innovative AI-enhanced technology to over 8,100 customers, including 85%
  of the Fortune 500®. Our intelligent cloud-based platform seamlessly connects people,
  systems, and processes to empower organizations to find smarter, faster, and better
  ways to work. But this is just the beginning of our journey. Join us as we pursue
  our purpose to make the world work better for everyone.<br><b>Job Description</b><br>As
  a member of our Americas ServiceNow.org Solution Consulting team, you will have
  a major impact on our future success by supporting reimagine work experiences through
  ServiceNow''s AI + Data + Workflow Platform. <br>You will guide revenue for one
  of our Technology Solutions with the support and partnership of Sales, Product Management,
  and the executive team. This is a hands-on technical consultant who can go wide
  and deep on solution delivery and solution positioning during sales cycles. <br>You
  will have a major impact on our future success by supporting the Employee Experience,
  Customer Workflow, ITX Solution Sales. You will help guide revenue for one of our
  products with the support and partnership of Sales, Product Management, and the
  executive team. This is a hands-on technical consultant who can go wide and deep
  on solution delivery and solution positioning during sales cycles.<br>What you get
  to do in this role:  <br>The Solution Consultant is a technical consultant with
  the advanced ability to develop, position and provide product-specific solutions
  during sales cycles while achieving quarterly and annual sales goals for an assigned
  territory. <br><ul><li>Support product sales as a technical and domain expert of
  a client-facing sales team that pursues customers and prospects across non-profit
  industries.</li><li>Lead discovery workshops to determine customers'' challenges</li><li>Design
  and deliver tailored demonstrations of ServiceNow''s AI-powered experiences to align
  our solution with customer needs</li><li>Build and configure end-to-end demo flows
  that showcase AI-enhanced self-service, automation, and insight.</li><li>Develop
  client partner relationships</li><li>Guide strategic programs in top accounts such
  as customer journey sessions for roadmap and outcome agreement</li><li>Provide feedback
  to product management about product enhancements that can address customer needs
  and provide additional value</li><li>Share and learn best practices and re-usable
  assets with other Solution Consultants to enhance the quality and efficiency of
  the team</li><li>Stay current on competitive analysis and market differentiation</li><li>Support
  marketing events including executive briefings, conferences, user groups, and trade
  shows</li></ul><br><b>Qualifications</b><br>Technical Expertise: <br><ul><li>5+
  years of experience</li></ul><ul><li>Deep technical expertise with ServiceNow or
  similar enterprise platforms (e.g., Salesforce, Workday, Oracle, Microsoft Dynamics).</li></ul><ul><li>Exceptional
  executive presence and storytelling.</li></ul><ul><li>Trusted advisor with strong
  sales acumen and technical leadership.</li><li>Drives solution strategy for high-value,
  strategic opportunities.</li><li>Influences product direction and leads executive-level
  engagements.</li><li>Territory management skills, including pipeline building and
  working with Sales counterpart to promote execution excellence.</li><li>Operates
  across multiple accounts or regions.</li><li>Experience working collaboratively
  with product management, product marketing, partners, and professional services</li><li>Travel
  : 30%</li><li>Boston Area preferred</li></ul><br>For positions in this location,
  we offer a base pay of $84,075 - $118,500, plus equity (when applicable), variable/incentive
  compensation and benefits. Sales positions generally offer a competitive On Target
  Earnings (OTE) incentive compensation structure. Please note that the base pay shown
  is a guideline, and individual total compensation will vary based on factors such
  as qualifications, skill level, competencies, and work location. We also offer health
  plans, including flexible spending accounts, a 401(k) Plan with company match, ESPP,
  matching donations, a flexible time away plan and family leave programs. Compensation
  is based on the geographic location in which the role is located and is subject
  to change based on work location.<br><b>Additional Information</b><br><strong>Work
  Personas</strong><br>We approach our distributed world of work with flexibility
  and trust. Work personas (flexible, remote, or required in office) are categories
  that are assigned to ServiceNow employees depending on the nature of their work
  and their assigned work location. Learn more here . To determine eligibility for
  a work persona, ServiceNow may confirm the distance between your primary residence
  and the closest ServiceNow office using a third-party service.<br><strong>Equal
  Opportunity Employer</strong><br>ServiceNow is an equal opportunity employer. All
  qualified applicants will receive consideration for employment without regard to
  race, color, creed, religion, sex, sexual orientation, national origin or nationality,
  ancestry, age, disability, gender identity or expression, marital status, veteran
  status, or any other category protected by law. In addition, all qualified applicants
  with arrest or conviction records will be considered for employment in accordance
  with legal requirements. <br><strong>Accommodations</strong><br>We strive to create
  an accessible and inclusive experience for all candidates. If you require a reasonable
  accommodation to complete any part of the application process, or are unable to
  use this online application and need an alternative method to apply, please contact
  globaltalentss@servicenow.com for assistance. <br><strong>Export Control Regulations</strong><br>For
  positions requiring access to controlled technology subject to export control regulations,
  including the U.S. Export Administration Regulations (EAR), ServiceNow may be required
  to obtain export control approval from government authorities for certain individuals.
  All employment is contingent upon ServiceNow obtaining any export license or other
  approval that may be required by relevant export control authorities. <br>From Fortune.
  ©2025 Fortune Media IP Limited. All rights reserved. Used under license.'
description_text: 'Company Description It all started in sunny San Diego, California
  in 2004 when a visionary engineer, Fred Luddy, saw the potential to transform how
  we work. Fast forward to today - ServiceNow stands as a global market leader, bringing
  innovative AI-enhanced technology to over 8,100 customers, including 85% of the
  Fortune 500®. Our intelligent cloud-based platform seamlessly connects people, systems,
  and processes to empower organizations to find smarter, faster, and better ways
  to work. But this is just the beginning of our journey. Join us as we pursue our
  purpose to make the world work better for everyone. Job Description As a member
  of our Americas ServiceNow.org Solution Consulting team, you will have a major impact
  on our future success by supporting reimagine work experiences through ServiceNow''s
  AI + Data + Workflow Platform. You will guide revenue for one of our Technology
  Solutions with the support and partnership of Sales, Product Management, and the
  executive team. This is a hands-on technical consultant who can go wide and deep
  on solution delivery and solution positioning during sales cycles. You will have
  a major impact on our future success by supporting the Employee Experience, Customer
  Workflow, ITX Solution Sales. You will help guide revenue for one of our products
  with the support and partnership of Sales, Product Management, and the executive
  team. This is a hands-on technical consultant who can go wide and deep on solution
  delivery and solution positioning during sales cycles. What you get to do in this
  role: The Solution Consultant is a technical consultant with the advanced ability
  to develop, position and provide product-specific solutions during sales cycles
  while achieving quarterly and annual sales goals for an assigned territory. Support
  product sales as a technical and domain expert of a client-facing sales team that
  pursues customers and prospects across non-profit industries. Lead discovery workshops
  to determine customers'' challenges Design and deliver tailored demonstrations of
  ServiceNow''s AI-powered experiences to align our solution with customer needs Build
  and configure end-to-end demo flows that showcase AI-enhanced self-service, automation,
  and insight. Develop client partner relationships Guide strategic programs in top
  accounts such as customer journey sessions for roadmap and outcome agreement Provide
  feedback to product management about product enhancements that can address customer
  needs and provide additional value Share and learn best practices and re-usable
  assets with other Solution Consultants to enhance the quality and efficiency of
  the team Stay current on competitive analysis and market differentiation Support
  marketing events including executive briefings, conferences, user groups, and trade
  shows Qualifications Technical Expertise: 5+ years of experience Deep technical
  expertise with ServiceNow or similar enterprise platforms (e.g., Salesforce, Workday,
  Oracle, Microsoft Dynamics). Exceptional executive presence and storytelling. Trusted
  advisor with strong sales acumen and technical leadership. Drives solution strategy
  for high-value, strategic opportunities. Influences product direction and leads
  executive-level engagements. Territory management skills, including pipeline building
  and working with Sales counterpart to promote execution excellence. Operates across
  multiple accounts or regions. Experience working collaboratively with product management,
  product marketing, partners, and professional services Travel : 30% Boston Area
  preferred For positions in this location, we offer a base pay of $84,075 - $118,500,
  plus equity (when applicable), variable/incentive compensation and benefits. Sales
  positions generally offer a competitive On Target Earnings (OTE) incentive compensation
  structure. Please note that the base pay shown is a guideline, and individual total
  compensation will vary based on factors such as qualifications, skill level, competencies,
  and work location. We also offer health plans, including flexible spending accounts,
  a 401(k) Plan with company match, ESPP, matching donations, a flexible time away
  plan and family leave programs. Compensation is based on the geographic location
  in which the role is located and is subject to change based on work location. Additional
  Information Work Personas We approach our distributed world of work with flexibility
  and trust. Work personas (flexible, remote, or required in office) are categories
  that are assigned to ServiceNow employees depending on the nature of their work
  and their assigned work location. Learn more here . To determine eligibility for
  a work persona, ServiceNow may confirm the distance between your primary residence
  and the closest ServiceNow office using a third-party service. Equal Opportunity
  Employer ServiceNow is an equal opportunity employer. All qualified applicants will
  receive consideration for employment without regard to race, color, creed, religion,
  sex, sexual orientation, national origin or nationality, ancestry, age, disability,
  gender identity or expression, marital status, veteran status, or any other category
  protected by law. In addition, all qualified applicants with arrest or conviction
  records will be considered for employment in accordance with legal requirements.
  Accommodations We strive to create an accessible and inclusive experience for all
  candidates. If you require a reasonable accommodation to complete any part of the
  application process, or are unable to use this online application and need an alternative
  method to apply, please contact globaltalentss@servicenow.com for assistance. Export
  Control Regulations For positions requiring access to controlled technology subject
  to export control regulations, including the U.S. Export Administration Regulations
  (EAR), ServiceNow may be required to obtain export control approval from government
  authorities for certain individuals. All employment is contingent upon ServiceNow
  obtaining any export license or other approval that may be required by relevant
  export control authorities. From Fortune. ©2025 Fortune Media IP Limited. All rights
  reserved. Used under license.'
