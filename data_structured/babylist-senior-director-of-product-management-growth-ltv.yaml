description_html: '<p><strong>Who We Are</strong></p><p>Babylist is the leading registry,
  e-commerce, and content platform for growing families. More than 9 million people
  shop with Babylist every year, making it the go-to destination for seamless purchasing,
  trusted guidance, and expert product recommendations for new parents and the people
  who love them. What began as a universal registry has grown into a full ecosystem
  for new parents, including the Babylist Shop, Babylist Health, and a flagship showroom
  in Los Angeles. Hundreds of brands in baby and beyond partner with Babylist to engage
  meaningfully with families during one of life’s most important transitions. With
  over $1 billion in annual GMV, and more than $500 million in 2024 revenue, Babylist
  is reshaping the $320 billion baby product industry. We’re helping parents feel
  confident, connected, and cared for at every step. As we build the generational
  brand in baby, our mission remains simple: to connect growing families with everything
  they need to thrive.To learn more, visit www.babylist.com.</p><p><strong>Our Ways
  of Working</strong></p><p>Babylist thrives as a remote-first company, with HQ team
  members located across the U.S. and Canada. We meet in person twice a year—once
  as a company and once by department to strengthen the relationships that power our
  work.<strong>This role requires travel approximately 4 times per year total, including
  these gatherings and additional team collaboration sessions</strong>.We show up
  consistently, stay purpose-driven, leverage AI to amplify our impact, and achieve
  results—together, from anywhere.</p><p><strong>What the Role Is</strong></p><p>Babylist
  is looking for a highly experienced <strong>Senior Director of Product Management</strong>
  to lead a set of product teams oriented around business growth &amp; LTV programs.
  These teams are responsible for user experiences and technology platforms utilized
  by partner teams in Growth Marketing, CRM, Content, Education, Health, and more.
  They are also responsible for the growth and success of critical babylist LTV programs
  such as Babylist Health.&nbsp;&nbsp;</p><p>This role is highly cross-functional,
  partnering daily with Marketing and Commercial program leaders to ensure that our
  user experiences and technology investments support business growth and serve our
  customers.&nbsp; In addition, you will provide leadership support to the VP of Product
  helping to shape the Product Management function and broader Consumer Product organization.
  This role reports to the VP of Consumer Product and will lead a team of 3-4 Product
  Managers.</p><p><strong>Who You Are</strong></p><ul><li>Exceptional people manager:
  6+ years of experience hiring and managing highly experienced, high-performing product
  managers, demonstrated experience developing talent</li><li>Proven track record
  of defining product strategy for complex areas of the business and leading cross-functional
  execution.&nbsp; This means you have held Sr. Director or VP level roles.</li><li>Experience
  in growth, retention, and/or content marketing – You will speak the language of
  your partners in marketing and you understand their value to our business.</li><li>Experience
  nurturing and growing businesses at both 0-1 and 1-scale maturity.&nbsp; You will
  partner with multiple GMs across our organization to grow important LTV programs
  built on top of the success of our registry, including our Babylist Health product
  vertical</li><li>Results-oriented with a people-first leadership style that builds
  trust and drives outcomes</li><li>You’re data-driven utilizing quantitative and
  qualitative data to solve challenging customer problems and have experience running
  consumer facing A/B tests.&nbsp;</li><li>You find opportunity in ambiguity; able
  to identify, advocate for, and execute on new opportunities in the absence of a
  clear mandate.</li><li>You’re able to ruthlessly prioritize in order to get the
  right things done with the adaptability to pivot into different focus areas.</li><li>Comfortable
  operating in a fast-paced, high-change environment</li></ul><p><strong>How You Will
  Make An Impact</strong></p><ul><li>Drive Babylist company strategy forward as a
  key partner unlocking marketing growth and growing important Babylist programs</li><li>Demonstrate
  exceptional judgment about tradeoffs between business goals and user experience;
  leading with conviction about what makes a great customer experience</li><li>Partner
  across large parts of the Babylist ecosystem to find and create value for both customers
  and partners.</li><li>Lead your team with intentional focus, making tough decisions
  that create clarity and drive results</li><li>Think big and act small – you have
  experience bringing new ideas from 0-1 and managing at scale.</li><li>Shape the
  product management function as a key people leader within the Consumer team.&nbsp;</li><li>Be
  a strong advocate for a data-driven approach to improving customer experience, leveraging
  both qualitative and quantitative research methods to understand our customer’s
  needs.</li></ul><p><strong>Why You Will Love Working At Babylist</strong></p><p><strong>Our
  Culture</strong></p><ul><li>We work with focus and intention, then step away to
  recharge</li><li>We believe in exceptional management and invest in tools and opportunities
  to connect with colleagues</li><li>We build products that positively impact millions
  of people''s lives</li><li>AI is intentionally embedded in how we work, create,
  and scale—supporting innovation and impact</li></ul><p><strong>Growth &amp; Development</strong></p><ul><li>Competitive
  pay and meaningful opportunities for career advancement</li><li>We believe technology
  and data can solve hard problems</li><li>We''re committed to career progression
  and performance-based advancement</li></ul><p><strong>Compensation &amp; Benefits</strong></p><ul><li>Competitive
  salary with equity and bonus opportunities</li><li>Company-paid medical, dental,
  and vision insurance</li><li>Retirement savings plan with company matching and flexible
  spending accounts</li><li>Generous paid parental leave and PTO</li><li>Remote work
  stipend to set up your office</li><li>Perks for physical, mental, and emotional
  health, parenting, childcare, and financial planning</li></ul><p><strong>About Compensation</strong></p><p>We
  use a market-based approach to compensation. The starting salary range for this
  role is:</p><p><span><strong>US: $252,112 to $302,535 USD</strong></span></p><p><span><strong>Canada:&nbsp;$260,500
  to $325,750 CAD</strong></span></p><p>Your starting salary will be based on your
  location, experience, and qualifications, with increases over time tied to performance,
  role growth, and internal pay equity.</p><b><strong>Important Notices</strong></b><p><strong>Interview
  Process &amp; Consent</strong><strong><br></strong>Babylist uses AI to record and
  transcribe all interviews for evaluation purposes in accordance with CCPA and GDPR.
  By participating in an interview, you consent to this recording and transcription.</p><p><strong>Interview
  Integrity</strong><strong><br></strong>During the interview process, we''re evaluating
  your individual problem-solving skills, creativity, and approach to challenges.
  While AI tools like ChatGPT, Claude, and Cursor are part of your daily toolkit once
  you join Babylist, all interviews, assessments, and take-home assignments must be
  completed independently.&nbsp;</p><p>You may not use AI tools, third-party services,
  coaching platforms, or content-farming services during any part of the interview
  process unless we explicitly permit it. We will clearly communicate when AI tools
  are allowed for specific assessments.</p><p>Any indication of third-party assistance
  or AI-generated responses will result in immediate disqualification. We may also
  verify educational credentials through third-party sources—providing false or misleading
  information will result in removal from consideration.</p><p><strong>Official Communication</strong><strong><br></strong>All
  communication will come only from the Babylist Talent Team via an @babylist.com
  email address. We will never request payment, bank information, or personal financial
  details. Be cautious of fraudulent outreach via non-company email addresses, messaging
  platforms (e.g., WhatsApp, Telegram), or unsolicited phone calls. Verify legitimate
  opportunities on our careers page.</p><p><strong>SMS Consent</strong><strong><br></strong>You
  may opt in to receive text message updates about your application or interviews.
  Opting out will not affect your application status—communication will continue via
  email or phone. Message and data rates may apply. Reply STOP to unsubscribe or HELP
  for assistance. See our Privacy Policy for more information.</p><br>'
