  Experience maturing and developing team processes, ceremonies, and risk/dependency
  management​​Prior experience with SaaS deployment planning and release management
  2+ years in project management experience in Software Development Lifecycle. Expertise
  and practice with Agile, Predictive, SixSigma and other program management frameworks
  Comfort in developing effective relationships with cross functional stakeholders,
  senior leadership, and scrum teams across the organization Comfort working with
  engineering teams and modern delivery practices (flags, rollouts, incident/bug triage).
  Working knowledge of key construction workflows and concepts (examples: job costing,
  WIP, billing/invoicing, change orders, commitments, subcontractor management, retainage,
  closeout) One or more industry certifications such as: PMP, PMI-ACP, CSM, etc. Who
  You Are You’re energized by turning chaos into clarity — and you know when to keep
  things lightweight. You’re comfortable in a fast-moving environment and can navigate
  shifting priorities with calm structure. You take ownership, close loops, and build
  strong relationships across teams. You’re curious, humble, and direct — you learn
  fast and communicate clearly. A strategic thinker who thrives in a high-growth startup
  environment Comfortable navigating ambiguity and solving complex problems A self-starter
  who takes ownership and delivers results Collaborative, curious, and eager to learn
  from others A team player with integrity, grit, and a strong work ethic Compensation
  $136,000.00 - $160,000.00 base&nbsp;salary + bonus (LA hub). What we offer: Generous
  equity grant, become an owner in our company! Macbook computer provided A comprehensive
  benefits package Flexible PTO and hybrid work schedules Work from home stipend Hubs
  in Los Angeles, San Francisco, Toronto, and Raleigh with hybrid work schedules and
  lunch provided for in-office days Company events like BBQs and team-building activities,
  both in-person and virtual Fast-paced, collaborative, and dynamic work environment
  Opportunities for growth and career advancement Chance to work with cutting-edge
  technology and innovative solutions The chance to get in on the ground floor and
  build something truly groundbreaking for ourselves and our amazing customers We
  welcome applicants from across the U.S. where we are registered to do business and
  able to support employment. Currently, this excludes the following states: Alabama,
  Alaska, Connecticut, Hawaii, Kentucky, Mississippi, Nebraska, New Mexico, North
  Dakota, Rhode Island, South Dakota, West Virginia, and Wyoming. This list is based
  solely on operational and compliance considerations and is reviewed from time to
  time as our footprint grows. About BuildOps Join BuildOps, the largest commercial
  trade platform in the country, as we transform the multi-billion dollar commercial
  contracting industry! We’re not just talking incremental improvements—we’re talking
  a full-scale revolution, empowering the hardworking heroes who build and maintain
  the infrastructure that keeps our world running. See why contractors choose Buildops&nbsp;here.
  This is your chance to be part of a rocketship. We’re fresh off a $1 billion valuation
  and a $127M Series C funding round (part of over $275M raised to date) led by industry-leading
  investors like Meritech Capital, BOND, and SE Ventures, backed by Schneider Electric
  (Reuters,&nbsp;TechCrunch,&nbsp;LA Business Journal) . Our latest investors join
  our team of industry heavyweights like Next47, former Twitter CEO Dick Costolo,
  former Salesforce President Gavin Patterson, and Boost Mobile CEO Stephen Stokols.
  Their investment is fueling our aggressive growth and our commitment to equipping
  contractors with AI-driven tools to conquer chaos, boost efficiency, skyrocket profitability,
  and ultimately, deliver exceptional service. At BuildOps, we’re changing the game
  and doing the best work of our careers. You’ll be a key player in a company that’s
  truly making a difference for the backbone of our economy. If you’re ready to tackle
  big challenges, work with a passionate team, and build something extraordinary,
  BuildOps is the place for you. 🚀 BuildOps is an equal opportunity employer. We consider
  all qualified applicants without regard to race, color, religion, sex (including
  pregnancy, gender identity, and sexual orientation), national origin, age, disability,
  genetic information, veteran status, or any other status protected by applicable
  federal, state, or local law. BuildOps will consider qualified applicants with a
  criminal history pursuant to the California Fair Chance Act pursuant to applicable
  local and state laws.'
