description_html: '<b><strong>About the Job</strong></b><p><span>At BuildOps, we’re
  building a groundbreaking software solution designed to empower today’s commercial
  contractors. From service management to project execution, we’re reimagining how
  our customers operate. Our team thrives on ambition, innovation, and collaboration—qualities
  we look for in every new hire.</span></p><p><span>As a <strong>Technical Program
  Operations Manager</strong>, you will drive Program and Project delivery for the
  EPD Team. This will include owning the complete lifecycle of initiating, planning,
  execution, deployment, and communication. You are required to work with technical
  staff and lead agile processes and workflows for multiple scrum teams, as well as
  administrate core tooling (Jira, Jellyfish, etc.). You will apply your technical
  and organizational skills to define goals, ensure clear requirements, plan for dependencies,
  measure progress, and manage change. You know how to apply technology to solve problems.
  You are both a diplomat and an advocate, and will be trusted to represent these
  teams to stakeholders and partners, internal and external.&nbsp; This role reports
  to the Senior Product Operations Manager.</span></p><b><span><strong>What You’ll
  Do</strong></span></b><ul><li><span><strong>Manage and supervise Tech projects from
  beginning to end,</strong> mapping out milestones needed to implement project objective
  and achieve success criteria</span></li><li><span><strong>Identify, assess, and
  manage risk mitigation and acceptance plans,</strong> exercising judgment in selecting
  methodologies, evaluating criteria, and determining the path to program success&nbsp;&nbsp;</span></li><li><span><strong>Administer
  Jira for the purpose of leveraging and modifying Jira dashboards, workflows, forms,
  as well as other features, to enable Jira to better support our team&nbsp;</strong></span></li><li><span><strong>Build
  the customer-signal → decision loop:</strong> synthesize qualitative and quantitative
  feedback (Gong, Support tickets, surveys) into clear themes, severity, and recommended
  actions.=</span></li><li><span><strong>Standardize release management:</strong>
  define lightweight “definition of ready/done,” rollout plans (flags/permissions),
  escalation paths, and comms norms that reduce last-minute chaos.</span></li><li><span><strong>Improve
  cross-functional execution:</strong> refine rituals (triage, reviews, office hours)
  and tighten handoffs between Product/Eng/Support/CS/Implementation.</span></li><li><span><strong>Own
  and evolve the product tech stack:</strong> evaluate, implement, and govern tools
  that support planning, launches, feedback, and reporting (and ensure teams actually
  use them).</span></li><li><span><strong>Measure what matters: </strong>define key
  metrics (launch quality, adoption, bug escape rate, time-to-value signals) and create
  dashboards/updates leaders rely on.</span></li></ul><p><span><strong>What We Look
  For</strong></span></p><ul><li><span>The ideal candidate will also be able to converse
  in technical language and possess knowledge of SaaS development, IT operations,
  systems integrations, application development, service delivery and support, and
  related services</span></li><li><span>This role will need a working understanding
  of a variety of systems and technologies, as well as integrations between these
  systems and the various business teams they are designed to support</span></li><li><span>Experience
  maturing and developing team processes, ceremonies, and risk/dependency management​​Prior
  experience with SaaS deployment planning and release management</span></li><li><span>2+
  years in project management experience in Software Development Lifecycle.</span></li><li><span>Expertise
  and practice with Agile, Predictive, SixSigma and other program management frameworks</span></li><li><span>Comfort
  in developing effective relationships with cross functional stakeholders, senior
  leadership, and scrum teams across the organization </span></li><li><span>Comfort
  working with engineering teams and modern delivery practices (flags, rollouts, incident/bug
  triage).</span></li><li><span>Working knowledge of key construction workflows and
  concepts (examples: job costing, WIP, billing/invoicing, change orders, commitments,
  subcontractor management, retainage, closeout)</span></li><li><span>One or more
  industry certifications such as: PMP, PMI-ACP, CSM, etc.</span></li></ul><b><span>Who
  You Are</span></b><ul><li><span>You’re energized by turning chaos into clarity —
  and you know when to keep things lightweight.</span></li><li><span>You’re comfortable
  in a fast-moving environment and can navigate shifting priorities with calm structure.</span></li><li><span>You
  take ownership, close loops, and build strong relationships across teams.</span></li><li><span>You’re
  curious, humble, and direct — you learn fast and communicate clearly.</span></li><li><span>A
  strategic thinker who thrives in a high-growth startup environment</span></li><li><span>Comfortable
  navigating ambiguity and solving complex problems</span></li><li><span>A self-starter
  who takes ownership and delivers results</span></li><li><span>Collaborative, curious,
  and eager to learn from others</span></li><li><span>A team player with integrity,
  grit, and a strong work ethic</span></li></ul><b><span><strong>Compensation</strong></span></b><ul><li><span>$136,000.00
  - $160,000.00 base&nbsp;salary + bonus (LA hub).</span></li></ul><p><p><strong>What
  we offer:</strong></p><ul><li>Generous equity grant, become an owner in our company!</li><li>Macbook
  computer provided</li><li>A comprehensive benefits package</li><li>Flexible PTO
  and hybrid work schedules</li><li>Work from home stipend</li><li>Hubs in Los Angeles,
  San Francisco, Toronto, and Raleigh with hybrid work schedules and lunch provided
  for in-office days</li><li>Company events like BBQs and team-building activities,
  both in-person and virtual</li><li>Fast-paced, collaborative, and dynamic work environment</li><li>Opportunities
  for growth and career advancement</li><li>Chance to work with cutting-edge technology
  and innovative solutions</li><li>The chance to get in on the ground floor and build
  something truly groundbreaking for ourselves and our amazing customers</li></ul><p><em>We
  welcome applicants from across the U.S. where we are registered to do business and
  able to support employment. Currently, this excludes the following states: Alabama,
  Alaska, Connecticut, Hawaii, Kentucky, Mississippi, Nebraska, New Mexico, North
  Dakota, Rhode Island, South Dakota, West Virginia, and Wyoming. This list is based
  solely on operational and compliance considerations and is reviewed from time to
  time as our footprint grows.</em></p><b>About BuildOps</b><p>Join BuildOps, the
  largest commercial trade platform in the country, as we transform the multi-billion
  dollar commercial contracting industry!</p><p>We’re not just talking incremental
  improvements—we’re talking a full-scale revolution, empowering the hardworking heroes
  who build and maintain the infrastructure that keeps our world running. See why
  contractors choose Buildops&nbsp;here.</p><p>This is your chance to be part of a
  rocketship. We’re fresh off a $1 billion valuation and a $127M Series C funding
  round (part of over $275M raised to date) led by industry-leading investors like
  Meritech Capital, BOND, and SE Ventures, backed by Schneider Electric (Reuters,&nbsp;TechCrunch,&nbsp;LA
  Business Journal) . Our latest investors join our team of industry heavyweights
  like Next47, former Twitter CEO Dick Costolo, former Salesforce President Gavin
  Patterson, and Boost Mobile CEO Stephen Stokols. Their investment is fueling our
  aggressive growth and our commitment to equipping contractors with AI-driven tools
  to conquer chaos, boost efficiency, skyrocket profitability, and ultimately, deliver
  exceptional service.</p><p>At BuildOps, we’re changing the game and doing the best
  work of our careers. You’ll be a key player in a company that’s truly making a difference
  for the backbone of our economy. If you’re ready to tackle big challenges, work
  with a passionate team, and build something extraordinary, BuildOps is the place
  for you. 🚀</p><p><em>BuildOps is an equal opportunity employer. We consider all
  qualified applicants without regard to race, color, religion, sex (including pregnancy,
  gender identity, and sexual orientation), national origin, age, disability, genetic
  information, veteran status, or any other status protected by applicable federal,
  state, or local law.</em></p><p><em>BuildOps will consider qualified applicants
  with a criminal history pursuant to the California Fair Chance Act pursuant to applicable
  local and state laws.</em></p></p>'
description_text: 'About the Job At BuildOps, we’re building a groundbreaking software
  solution designed to empower today’s commercial contractors. From service management
  to project execution, we’re reimagining how our customers operate. Our team thrives
  on ambition, innovation, and collaboration—qualities we look for in every new hire.
  As a Technical Program Operations Manager , you will drive Program and Project delivery
  for the EPD Team. This will include owning the complete lifecycle of initiating,
  planning, execution, deployment, and communication. You are required to work with
  technical staff and lead agile processes and workflows for multiple scrum teams,
  as well as administrate core tooling (Jira, Jellyfish, etc.). You will apply your
  technical and organizational skills to define goals, ensure clear requirements,
  plan for dependencies, measure progress, and manage change. You know how to apply
