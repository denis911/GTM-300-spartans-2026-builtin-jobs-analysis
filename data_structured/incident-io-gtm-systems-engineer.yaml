company_overview: Think about the last time you had an outage. Was it calm, collected
  and organised? Or chaotic, Slack channels ablaze, questions flying in from all directions
  in 5 different threads?We’ve been there, and we know it doesn’t have to be this
  way. We’re building a single way for your entire company to respond, review and
  learn when things go wrong, big or small. A product that everyone loves using, and
  which helps them solve any type of incident, at any scale.
