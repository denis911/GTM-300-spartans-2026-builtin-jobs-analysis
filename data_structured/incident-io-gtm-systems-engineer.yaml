description_html: <b><strong>About </strong><strong>incident.io</strong></b><p>incident.io
  is the leading AI incident response platform, built to help teams dramatically reduce
  incident response time and improve reliability. We bring together on-call, incident
  response, AI SRE, and status pages in a single platform, giving teams everything
  they need to respond quickly, reduce downtime, and keep customers in the loop.</p><p>Since
  launching in 2021, we’ve helped over 1,500 companies, including Netflix, Airbnb,
  and Block, run more than 500,000 incidents. Every month, tens of thousands of responders
  across Engineering, Product, and Support use incident.io to restore services faster,
  stay aligned under pressure, and focus on building what matters.</p><p>We’re a fast-growing,
  highly ambitious team that cares deeply about our customers, product quality, and
  making it magic. We’ve raised $100M from Index Ventures, Insight Partners, and Point
  Nine, alongside founders and executives from world-class technology companies.</p><p></p><p></p><b><strong>The
  Team</strong></b><p>Revenue Operations at incident.io is a small, high-impact team
  that partners closely with Sales, Marketing, and Customer Success to drive revenue
  growth and maximize GTM productivity.</p><p>As GTM Systems Manager, you'll own and
  evolve our entire sales and marketing tech stack ensuring our tools actively enable
  (rather than slow down) the business. You'll work closely with our CRO, CMO, and
  GTM leadership to implement new systems, improve existing workflows, and build the
  foundation for 2x–3x growth in the coming years.</p><p>This is a hands-on role in
  a fast-moving environment. If you see an opportunity to experiment with a new tool,
  automate a manual process, or connect systems in a smarter way, you'll be encouraged
  and trusted to run with it. If successful, there's an opportunity to build and lead
  a GTM systems team as we scale.</p><p></p><b>What you’ll be doing</b><ul><li><p><strong>Own
  and optimize</strong> our GTM tech stack, including Salesforce, Clay, HubSpot, Outreach,
  Gong, Qualified, CommonRoom, Zapier and more ensuring everything is properly configured,
  integrated, and aligned to our go-to-market strategy.</p></li><li><p><strong>Lead
  systems</strong> projects end-to-end, from scoping and requirements gathering to
  rollout and training whether that's deploying a new prospecting tool, building advanced
  dashboards, or rolling out CPQ.</p></li><li><p><strong>Maintain</strong> data quality
  across systems, fixing sync issues, deduplicating records, and ensuring our reporting
  is reliable and trusted.</p></li><li><p><strong>Operate</strong> as a service desk
  for GTM teams fielding requests, troubleshooting issues, onboarding users, and enabling
  teams to get the most from our tools.</p></li><li><p><strong>Partner with</strong>
  Sales and Marketing leadership to align technology with strategy, recommending tools
  or process changes that unlock growth and efficiency.</p></li></ul><p></p><b>What
  you need to be successful</b><ul><li><p><strong>Experience in</strong> Revenue Operations,
  Sales Operations, or Marketing Operations, with hands-on experience administering
  Salesforce and modern GTM tools (Clay, Gong, Outreach, HubSpot, Common Room, Qualified,
  Zapier, or similar).</p></li><li><p><strong>Technical fluency</strong> you're comfortable
  with integrations, data flows, light scripting, and troubleshooting when things
  break.</p></li><li><p><strong>A builder's mindset</strong> you take initiative,
  create structure from ambiguity, and don't wait for a playbook.</p></li><li><p><strong>Strong
  project management</strong> skills, with the ability to juggle multiple workstreams
  and drive accountability.</p></li><li><p><strong>Excellent</strong> communication
  skills, with the ability to translate between technical and non-technical stakeholders.</p></li></ul><p></p><b>What
  we offer:</b><p>We’re building a place where great people can do their best work—and
  that means looking after you and your family with benefits that support health and
  personal growth.</p><ul><li><p>Market leading private medical insurance</p></li><li><p>Generous
  parental leave</p></li><li><p>First Friday of the month off</p></li><li><p>Generous
  annual leave/PTO allowance</p></li><li><p>Competitive salary and equity</p></li><li><p>Remote
  working and personal development budget</p></li><li><p>Enhanced pension/401k</p></li></ul>
description_text: 'About incident.io incident.io is the leading AI incident response
  platform, built to help teams dramatically reduce incident response time and improve
  reliability. We bring together on-call, incident response, AI SRE, and status pages
  in a single platform, giving teams everything they need to respond quickly, reduce
  downtime, and keep customers in the loop. Since launching in 2021, we’ve helped
  over 1,500 companies, including Netflix, Airbnb, and Block, run more than 500,000
  incidents. Every month, tens of thousands of responders across Engineering, Product,
  and Support use incident.io to restore services faster, stay aligned under pressure,
  and focus on building what matters. We’re a fast-growing, highly ambitious team
  that cares deeply about our customers, product quality, and making it magic. We’ve
  raised $100M from Index Ventures, Insight Partners, and Point Nine, alongside founders
  and executives from world-class technology companies. The Team Revenue Operations
  at incident.io is a small, high-impact team that partners closely with Sales, Marketing,
  and Customer Success to drive revenue growth and maximize GTM productivity. As GTM
  Systems Manager, you''ll own and evolve our entire sales and marketing tech stack
  ensuring our tools actively enable (rather than slow down) the business. You''ll
  work closely with our CRO, CMO, and GTM leadership to implement new systems, improve
  existing workflows, and build the foundation for 2x–3x growth in the coming years.
  This is a hands-on role in a fast-moving environment. If you see an opportunity
  to experiment with a new tool, automate a manual process, or connect systems in
  a smarter way, you''ll be encouraged and trusted to run with it. If successful,
  there''s an opportunity to build and lead a GTM systems team as we scale. What you’ll
  be doing Own and optimize our GTM tech stack, including Salesforce, Clay, HubSpot,
  Outreach, Gong, Qualified, CommonRoom, Zapier and more ensuring everything is properly
  configured, integrated, and aligned to our go-to-market strategy. Lead systems projects
  end-to-end, from scoping and requirements gathering to rollout and training whether
  that''s deploying a new prospecting tool, building advanced dashboards, or rolling
  out CPQ. Maintain data quality across systems, fixing sync issues, deduplicating
  records, and ensuring our reporting is reliable and trusted. Operate as a service
  desk for GTM teams fielding requests, troubleshooting issues, onboarding users,
  and enabling teams to get the most from our tools. Partner with Sales and Marketing
  leadership to align technology with strategy, recommending tools or process changes
  that unlock growth and efficiency. What you need to be successful Experience in
  Revenue Operations, Sales Operations, or Marketing Operations, with hands-on experience
  administering Salesforce and modern GTM tools (Clay, Gong, Outreach, HubSpot, Common
  Room, Qualified, Zapier, or similar). Technical fluency you''re comfortable with
  integrations, data flows, light scripting, and troubleshooting when things break.
  A builder''s mindset you take initiative, create structure from ambiguity, and don''t
  wait for a playbook. Strong project management skills, with the ability to juggle
  multiple workstreams and drive accountability. Excellent communication skills, with
  the ability to translate between technical and non-technical stakeholders. What
  we offer: We’re building a place where great people can do their best work—and that
  means looking after you and your family with benefits that support health and personal
  growth. Market leading private medical insurance Generous parental leave First Friday
  of the month off Generous annual leave/PTO allowance Competitive salary and equity
  Remote working and personal development budget Enhanced pension/401k'
