description_html: '<p>Own the execution of our Tier 3 conferences, in-territory events,
  and chapter/association sponsorships. You’ll help define and scale a field marketing
  motion that’s grounded in experimentation, anchored in data, and focused relentlessly
  on generating pipeline and helping reps close deals. Expect to get your hands dirty—this
  is a full-stack role across strategy, logistics, on-site execution, and post-event
  excellence.</p><b><strong>What you’ll do</strong></b><p><strong>Run and refine regional
  events that drive pipeline:</strong></p><ul><li>Own execution of Tier 3 conferences,
  roadshow-style events, association and chapter activations, partner events, and
  localized experiences (dinners, roundtables, panels, VIP activities).</li><li>Build,
  test, and optimize a field playbook—standardizing timelines, pre/post workflows,
  outreach sequences, lead capture, follow-up SLAs, and field enablement.</li><li>Develop
  a city rotation strategy rooted in pipeline, intent, and customer density—ensuring
  every event is staged with a revenue outcome in mind.</li></ul><p><strong>Deliver
  flawless execution:</strong></p><ul><li>Manage end-to-end logistics: venue/vendor
  sourcing, budgeting, attendee comms, on-site setup, and staffing.</li><li>Partner
  with Sales to ensure territory reps are bought in, prepared, and supported with
  the right assets.</li><li>Maintain brand consistency across events—from signage
  and swag to tone and vibe.</li><li>Support cross-functional campaigns with field
  activations tied to product launches, partner pushes, and customer communities.</li></ul><p><strong>Track,
  measure, and improve:</strong></p><ul><li>In collaboration with the Senior Events
  Manager and Director of Demand Generation, define goals for every event and build
  reporting dashboards that track attendance, spend, lead quality, follow-up activity,
  and revenue influence.</li><li>Share post-mortems and recommendations to inform
  event prioritization and forecast quarterly field performance.</li><li>Test new
  formats, vendors, and tactics—learning what works for each segment and region.</li></ul><b><strong>What
  success looks like (6–12 months)</strong></b><ul><li>Built a consistent field cadence
  in core territories with strong alignment between Marketing and Sales.</li><li>Documented,
  repeatable playbook for Tier 3 and down-market events.</li><li>Events influence
  measurable pipeline and sales cycle acceleration.</li><li>Reliable cost-per-lead
  and ROI benchmarks for each event type.</li><li>A cycle of experimentation that
  informs broader event strategy.</li></ul><b><strong>What you bring</strong></b><ul><li>5+
  years of field or event marketing experience, ideally in B2B SaaS or FinTech.</li><li>Proven
  ability to plan and execute events that generate pipeline and elevate brand credibility.</li><li>Comfortable
  rolling up your sleeves—you’re as excited to build strategy as you are to haul gear
  or set up a booth.</li><li>Strong project management skills—you can juggle logistics,
  vendors, timelines, and internal stakeholders without breaking a sweat.</li><li>Obsessed
  with outcomes—you care less about event checklists and more about impact on sales
  performance.</li><li>Data-driven and results-oriented—you know your numbers, track
  them closely, and iterate fast.</li><li>Excellent communicator, collaborator, and
  brand steward.</li></ul><p><strong>Tools you may use here</strong></p><p><strong>Event
  logistics &amp; ops:</strong> Splash, Bizzabo, ZoomInfo Events, Asana</p><p><strong>Marketing
  &amp; CRM:</strong> HubSpot, Salesforce</p><p><strong>Sales alignment &amp; follow-up:</strong>
  Outreach, Qualified, LinkedIn Sales Navigator</p><p><strong>Reporting &amp; analytics:</strong>
  Salesforce dashboards, Looker/Tableau</p><p>(Event tool stack is evolving—flexibility
  and willingness to experiment is key.)</p><br><p><strong>This is a hybrid position
  for candidates currently located in Raleigh, North Carolina, United States.<span>&nbsp;</span></strong></p><p><p><strong>What
  we offer:</strong></p><ul><li>Generous equity grant, become an owner in our company!</li><li>Macbook
  computer provided</li><li>A comprehensive benefits package</li><li>Flexible PTO
  and hybrid work schedules</li><li>Work from home stipend</li><li>Hubs in Los Angeles,
  San Francisco, Toronto, and Raleigh with hybrid work schedules and lunch provided
  for in-office days</li><li>Company events like BBQs and team-building activities,
  both in-person and virtual</li><li>Fast-paced, collaborative, and dynamic work environment</li><li>Opportunities
  for growth and career advancement</li><li>Chance to work with cutting-edge technology
  and innovative solutions</li><li>The chance to get in on the ground floor and build
  something truly groundbreaking for ourselves and our amazing customers</li></ul><p><em>We
  welcome applicants from across the U.S. where we are registered to do business and
  able to support employment. Currently, this excludes the following states: Alabama,
  Alaska, Connecticut, Hawaii, Kentucky, Mississippi, Nebraska, New Mexico, North
  Dakota, Rhode Island, South Dakota, West Virginia, and Wyoming. This list is based
  solely on operational and compliance considerations and is reviewed from time to
  time as our footprint grows.</em></p><b>About BuildOps</b><p>Join BuildOps, the
  largest commercial trade platform in the country, as we transform the multi-billion
  dollar commercial contracting industry!</p><p>We’re not just talking incremental
  improvements—we’re talking a full-scale revolution, empowering the hardworking heroes
  who build and maintain the infrastructure that keeps our world running. See why
  contractors choose Buildops&nbsp;here.</p><p>This is your chance to be part of a
  rocketship. We’re fresh off a $1 billion valuation and a $127M Series C funding
  round (part of over $275M raised to date) led by industry-leading investors like
  Meritech Capital, BOND, and SE Ventures, backed by Schneider Electric (Reuters,&nbsp;TechCrunch,&nbsp;LA
  Business Journal) . Our latest investors join our team of industry heavyweights
  like Next47, former Twitter CEO Dick Costolo, former Salesforce President Gavin
  Patterson, and Boost Mobile CEO Stephen Stokols. Their investment is fueling our
  aggressive growth and our commitment to equipping contractors with AI-driven tools
  to conquer chaos, boost efficiency, skyrocket profitability, and ultimately, deliver
  exceptional service.</p><p>At BuildOps, we’re changing the game and doing the best
  work of our careers. You’ll be a key player in a company that’s truly making a difference
  for the backbone of our economy. If you’re ready to tackle big challenges, work
  with a passionate team, and build something extraordinary, BuildOps is the place
  for you. 🚀</p><p><em>BuildOps is an equal opportunity employer. We consider all
  qualified applicants without regard to race, color, religion, sex (including pregnancy,
  gender identity, and sexual orientation), national origin, age, disability, genetic
  information, veteran status, or any other status protected by applicable federal,
  state, or local law.</em></p><p><em>BuildOps will consider qualified applicants
  with a criminal history pursuant to the California Fair Chance Act pursuant to applicable
  local and state laws.</em></p></p>'
