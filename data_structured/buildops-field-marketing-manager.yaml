company_overview: BuildOps is the only all-in-one management software built specifically
  for the modern commercial contractor, combining service and project management and
  everything in between. Focused on serving the commercial Mechanical, Electrical,
  Plumbing (MEP) market, the BuildOps platform enables contractors to prove out current
  market trends, optimize their business for higher profits, and stay ahead of the
  competition.
