title: Insurance Product Manager (Remote, US)
company: Openly
category: Insurance
location: USA
date_posted: '2026-03-09'
description_html: '<p><b><span></span></b><b><span>Why Openly</span></b><p><span>Openly
  is rebuilding insurance from the ground up. We are re-envisioning and enhancing
  every aspect of the customer experience. Doing this requires a rapidly growing team
  of exceptional, curious, empathetic people with a wide range of skill sets, spanning
  technology, data science, product, marketing, sales, service, claims handling, finance,
  etc. </span></p><b><span>The Openly Difference</span></b><p><span>We created Openly
  because we saw an evident gap in the market for premium insurance made simple. Consumers
  deserve more complete coverage at competitive prices. </span></p><ul><li><span><span><strong>The
  Price Difference</strong>: </span>Using cutting-edge data and technology, we provide
  you with customizable, competitive prices to protect your most valuable assets.</span></li><li><span><strong><span>The
  Policy Difference:</span></strong> Coverages are truly customizable to meet your
  individual protection needs, for both standard coverages and optional add-ons.</span></li><li><span><span><strong>The
  Experience Difference:</strong></span> From tailored claims handling to highly responsive
  customer service, we are focused on making the home insurance purchasing process
  a better overall experience.</span></li></ul><b><span>Welcome to your next adventure.</span></b><p>At
  Openly, our people are just as important as our product. For us, collaboration,
  communication, and work-life balance are more than nice-to-haves— they’re the must-haves
  that make us who we are. We believe a great company is the result of a shared set
  of values, so we look for these qualities in every candidate we hire.&nbsp;</p><ul><li>Integrity</li><li>Empathy</li><li>Teamwork</li><li>Curiosity</li><li>Urgency</li></ul><p><span>We''ve
  designed our hiring process with you, the candidate, in mind. At every step, you
  have the chance to present your strengths and learn more about what makes Openly
  a great place to work.</span></p><b><span>We''re committed to Diversity, Equity,
  &amp; Inclusion</span></b><p><span>We embrace individuality and believe diverse
  teams are winning teams. Our commitment to inclusion across race, gender, age, religion,
  identity, and experience drives us forward every day.</span></p></p><p><strong>Job
  Details&nbsp;</strong></p><p>We are seeking an <strong>Insurance Product Manager
  </strong>to help drive our state expansion efforts and bring Openly insurance products
  to independent agents across the country. Reporting to the Director of Insurance
  Product Management, this highly visible role offers the opportunity to lead key
  insurance product management initiatives and interact with business leaders across
  Technology and Operations Teams. This role requires a self-motivated, high-energy
  individual who can efficiently function in a fast-paced, performance-driven environment.</p><br><p><strong>Key
  Responsibilities&nbsp;</strong></p><ul><li>Developing and calibrating Openly’s homeowners
  program for established states and new state entries including UW eligibility, coverage
  offerings, premium rates, and Openly proprietary models</li><li>Assisting with rate
  filings and DOI correspondence to ensure timely regulatory approval</li><li>Collaborating
  with our Technology and Operations teams to successfully implement and launch the
  product in new states</li><li>Analyzing key performance indicators and drivers of
  profitability, including loss ratios, actuarial indications, frequency/severity
  trends, sales conversion, persistency, and other data as we continue to grow our
  geographic footprint</li><li>Leading other product management initiatives, such
  as external data evaluations, market/competitor intelligence, and new product development</li></ul><br><p><strong>Requirements</strong></p><ul><li>3-5
  years of experience in insurance product management and product development roles</li><li>A
  degree in Mathematics, Actuarial Science, Economics, Statistics, or similar study</li><li>Solid
  technical (SQL) and analytical skills, capable of developing quantitative analyses
  through data manipulation</li><li>Ability to identify and define complex business
  problems and develop relevant analytical frameworks to deliver solutions, often
  operating in ambiguity and leveraging creativity</li><li>Strong communication and
  project management skills, and the ability to collaborate effectively with people
  at all levels across the company</li><li>Strong decision-making skills</li><li>P&amp;C
  insurance experience is required, and homeowners insurance experience is a plus</li><li>Insurance
  product compliance and/or state launch experience is a plus</li></ul><p><p><p><p><strong>Compensation
  &amp; Benefits:</strong>&nbsp;</p><p>Below is the&nbsp;<strong>budgeted</strong><strong>
  salary range</strong>&nbsp;for this position.&nbsp; Actual compensation for this
  position will be determined based on the successful candidate''s experience and
  skills. We are committed to providing a compensation package that not only reflects
  the responsibilities and requirements of the role, but also the unique expertise
  that the chosen candidate will bring to our team.</p></p><p>Budgeted Salary Range</p><p><span>$115,680</span><span>—</span><span>$137,370
  USD</span></p></p><p><p><p>The full salary range shows the min to max salary range
  for this position.&nbsp; Actual compensation will be commensurate with experience
  and qualifications and determined based on various factors including the candidate''s
  qualifications, skills, and experience.</p></p><p>Full Salary Range</p><p><span>$108,450</span><span>—</span><span>$180,750
  USD</span></p></p></p><p><p><span><strong>Benefits &amp; Perks</strong></span></p><ul><li><span>Remote-First
  Culture - We supported #remotelife long before it was a given. We''ll keep promoting
  it.</span></li><li><span>Competitive Salary &amp; Equity</span></li><li><span>Comprehensive
  Medical, Dental, and Vision Plan Offerings</span></li><li><span>Life and disability
  coverage including voluntary options</span></li><li><span>Parental Leave - up to
  8 weeks (320 hours) of paid parental leave based on meeting eligibility requirements<br>(Birthing
  parents may be eligible for additional leave through STD)</span></li><li><span>401K
  Company Contribution - Openly contributes 3% of the employee''s gross income, even
  if the employee does not contribute.</span></li><li><span>Work-from-home stipend
  - We provide a $1,500 allowance to spend on setting up your home workplace</span></li><li><span>Annual
  Professional Development Fund: Each employee has $2,000 in professional development
  (PD) funds to spend on activities or resources annually. We want each Openly employee
  to achieve personal and professional success and to feel supported, confident, and
  informed about improving their efficiency and productivity.</span></li><li><span>Be
  Well Program - Employees receive $50 per month to use towards your overall well-being</span></li><li><span>Paid
  Volunteer Service Hours</span></li><li><span>Referral Program and Reward</span></li></ul><p><span>Depending
  on position, Employees generally are eligible for cash incentive compensation, including
  commissions for sales eligible roles. In all cases, eligibility for compensation
  and benefits is subject to applicable plan and policy terms in effect from time
  to time.</span></p><p><span>U.S. Citizens, Green Card Holders, and those authorized
  to work in the U.S. for any employer and currently residing in the US will be considered.</span></p><p><span>Openly
  is committed to equal employment opportunity and non-discrimination for all employees
  and qualified applicants without regard to a person''s race, color, sex, gender
  identity or expression, age, religion, national origin, ancestry, ethnicity, disability,
  veteran status, genetic information, sexual orientation, marital status, or any
  characteristic protected under applicable law. Openly is an E-Verify Employer in
  the United States. Openly will make reasonable accommodations for qualified individuals
  with known disabilities under applicable law.</span></p><br><p><em><span>We strive
  to provide an exceptional applicant and candidate journey when you engage with us.
  In an effort to respond to applicants in a timely manner, we leverage AI to organize
  applications and resumes based on required and applicable skills and experience.
  To allow our applicants to drive their initial interview experience with us, we
  may leverage an AI-supported scheduling tool so you can choose when to meet with
  our team. While AI assists with efficiency, all hiring decisions are made by our
  team members. Rest assured, your data is protected according to privacy laws and
  company policies. Contact our recruitment team with any questions about our AI-assisted
  hiring process.</span></em></p></p>'
