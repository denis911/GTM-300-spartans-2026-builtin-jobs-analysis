description_html: '<p><strong>About EliseAI</strong></p><p>At EliseAI, we''re improving
  the industries that matter most: housing and healthcare. Everyone needs a place
  to live and access to quality healthcare, yet both are often harder to secure than
  they should be. <br>By integrating AI agents deeply into existing workflows, we
  make them more efficient, reduce costs, and improve the experience for everyone.</p><p></p><ul><li><p><strong>Housing</strong>:
  We simplify how renters tour apartments, sign leases, submit maintenance requests,
  and stay connected with their property team—bringing everything they need for their
  home into one place.</p></li></ul><ul><li><p><strong>Healthcare</strong>: We make
  it easy to schedule appointments, complete intake forms, and we help patients communicate
  with providers, so everyone can focus on health instead of paperwork.</p><p></p></li></ul><p>With
  EliseAI, organizations reduce manual work, improve accessibility, and deliver a
  seamless experience across essential services. We recently raised a <u>$250 million
  Series E round</u> led by Andreessen Horowitz to accelerate this mission.</p><p></p><p><strong>About
  The Role</strong></p><p>We’re looking for a founding GTM Engineer to overhaul the
  systems that power our revenue engine in the AI-first era. Your job will be to uncover
  opportunities to leverage AI to improve our GTM workflows, design and build new
  systems from first-principles, and ensure successful rollout of those solutions
  across the organization. You’ll collaborate with Sales Leadership, AEs, SDRs, Marketing,
  Customer Success, Revenue Operations, Recruiting, and our CEO, driving initiatives
  from 0 to 1. This role is an opportunity to create an AI center of excellence and
  pioneer how modern go-to-market teams operate.</p><p></p><p><strong>Key Responsibilities</strong></p><ul><li><p>Partner
  cross-functionally to deeply understand our GTM processes and workflows.</p></li><li><p>Identify
  and action opportunities to apply AI to automate or augment our GTM workflows, while
  ensuring both accuracy and scalability.</p></li><li><p>Leverage out-of-the-box tools
  (e.g. Clay, Attention, Zapier) and build custom solutions (using APIs, Python, JavaScript,
  and/or Google Apps Scripts).</p></li><li><p>Own projects end-to-end: from experimentation
  and prototyping to implementation, rollout, and training.</p></li><li><p>Track performance,
  adoption, and ROI of new systems, and iterate based on results.</p></li><li><p>Monitor
  performance and ROI of experiments rolled out.</p></li><li><p>Continuously experiment
  with emerging tools and approaches to push GTM innovation forward</p></li><li><p>Act
  as an internal subject-matter expert on AI GTM tooling.</p></li><li><p>Attract top-tier
  talent to join our driven team</p></li></ul><p></p><p><strong>Move at rocket speed,
  build something massive.</strong></p><p>We’re scaling fast, solving real client
  problems with precision and ambition. Here, you own your impact; full autonomy,
  no micromanagement, no fluff. We hire the best, expect the best, and give you the
  masterclass of your career. It’s hard, it’s intense, and it’s the most rewarding
  work you’ll ever do. If you’re hungry, driven, and ready to build something massive,
  climb aboard.</p><p></p><p><strong>Requirements</strong></p><p><em>We recognize
  that GTM Engineering is a brand new role in the industry and that candidates may
  not have all of the qualifications listed below. As such, we’re looking for curious
  builders who are excited by the role, not just those who check every box.</em></p><ul><li><p>2+
  years in a technical or operations role, with experience improving or automating
  workflows using code (vibe-coding is fine!) and low-code/no-code tools (e.g. Zapier,
  Clay, Gong, Attention).</p></li><li><p>Practical experience pushing and pulling
  data across systems via APIs and webhooks</p></li><li><p>Proven ability to take
  projects from 0→1: from experimentation and prototyping through rollout and adoption.</p></li><li><p>Curious,
  scrappy builder with a love for experimentation who thrives in ambiguity, enjoys
  automating manual work, and owns projects end-to-end.</p></li><li><p>Experience
  with and strong interest in AI systems.</p></li><li><p>Excellent cross-functional
  collaboration and communication skills; able to partner effectively with both technical
  and non-technical stakeholders at all levels (individual contributors up to C-suite).</p></li><li><p>Strong
  analytical mindset, with the ability to track ROI, adoption, and system performance.</p></li><li><p>Hands-on
  experience with, or deep empathy for, GTM processes (sales, marketing, customer
  success, revenue operations, recruiting).</p></li></ul><ul><li><p>Bonus:</p><ul><li><p>Proficiency
  in Python, JavaScript, or SQL.</p></li><li><p>Admin-level experience with GTM tools
  like Salesforce, HubSpot, Gong, Attention, or Outreach.</p></li></ul></li></ul><ul><li><p>Willingness
  to work in person at our office 4-5 days a week<br></p></li></ul><p><strong>Why
  Join</strong></p><p>Growth and impact. It’s not often that you can get in on the
  ground floor of a funded (<u>unicorn!</u>) startup that’s scaling so fast. That
  means that instead of following a playbook, you’ll be writing it. Every single day
  you will be challenged to identify how we can scale and execute on it. You’ll learn
  what works when you succeed and what doesn’t when you fail. Either way, the rest
  of the team will be here to support you.</p><p></p><p><strong>Benefits</strong></p><p>In
  addition to the growth and impact you’ll have at EliseAI, we offer competitive salaries
  along with the following benefits:</p><ul><li><p>Equity in the company</p></li><li><p>Medical,
  Dental and Vision premiums covered at 100%</p></li><li><p>Fully paid parental leave</p></li><li><p>Commuter
  benefits</p></li><li><p>401k benefits</p></li><li><p>Fitness &amp; home services
  stipend to cover part of your expenses so you can focus on what matters</p></li><li><p>A
  collaborative in-office environment with an open floor plan, fully stocked kitchen,
  and all meals covered in the office</p></li><li><p>Unlimited vacation and paid holidays</p></li><li><p>We''ll
  cover relocation packages and make the move exciting, not painful!</p></li></ul><p></p><p><strong>Job
  Compensation Range</strong></p><p>The salary range for this role is $100,000–$200,000.
  &nbsp;EliseAI offers a competitive total rewards package which includes base salary,
  equity, and a comprehensive benefits &amp; perks package. Exact compensation is
  determined based on a number of factors including experience, skill level, location
  and qualifications which are assessed during the interview process. Additional details
  about total compensation and benefits will be provided by our Recruiting Team during
  the hiring process.</p><p>&nbsp;</p><p>EliseAI provides equal employment opportunities
  to all employees and applicants for employment and prohibits discrimination and
  harassment of any type without regard to race, color, religion, age, sex, national
  origin, disability status, genetics, protected veteran status, sexual orientation,
  gender identity or expression, or any other characteristic protected by federal,
  state or local laws.</p><p></p><p>Please note that employment with EliseAI is on
  an "at-will" basis, which means that either the employee or the company may terminate
  the employment relationship at any time, with or without cause or notice.</p><p></p><p>Pursuant
  to the San Francisco Fair Chance Ordinance, we will consider for employment qualified
  applicants with arrest and conviction records.</p><p></p><p>If you need assistance
  and/or a reasonable accommodation in the application or recruiting process due to
  a disability, please contact us at recruiting@eliseai.com</p>'
