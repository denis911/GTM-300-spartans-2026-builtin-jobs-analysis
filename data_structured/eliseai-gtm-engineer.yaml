company_overview: 'EliseAI builds vertical AI agents for housing and healthcare —
  sectors that together make up nearly 40% of household spending. These agents automate
  high-volume workflows like leasing, maintenance, renewals, and patient intake, helping
  organizations cut costs, improve efficiency, and deliver better experiences.How
  does it work?EliseAI integrates directly into operational workflows:Housing: Manages
  leasing, maintenance, renewals, billing, and resident communication.Healthcare:
  Handles intake, scheduling, call-center operations, and patient follow-up.Unlike
  traditional chatbots that only answer questions, EliseAI agents complete full workflows
  end-to-end — from scheduling and payments to work orders and record updates.We’re
  building a future of fully autonomous buildings and healthcare systems, similar
  to autonomous cars. Our technology takes on the repetitive, manual tasks that slow
  teams down, allowing them to monitor, decide, and act through AI. This reduces operational
  overhead while empowering people to focus on higher-value work.Right now, we''re
  in the process of expanding our offerings from the multifamily industry to encompass
  more industries, including healthcare. We''re seeking founder-minded candidates
  to join our fast-paced environment and tight-knit team committed to making a positive
  impact. Discover opportunities: https://www.eliseai.com/careers'
