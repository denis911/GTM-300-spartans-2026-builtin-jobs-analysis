description_html: <p><p><strong>Who we are:</strong></p><p>Motive empowers the people
  who run physical operations with tools to make their work safer, more productive,
  and more profitable. For the first time ever, safety, operations and finance teams
  can manage their drivers, vehicles, equipment, and fleet related spend in a single
  system. Combined with industry leading AI, the Motive platform gives you complete
  visibility and control, and significantly reduces manual workloads by automating
  and simplifying tasks.</p><p>Motive serves nearly 100,000 customers – from Fortune
  500 enterprises to small businesses – across a wide range of industries, including
  transportation and logistics, construction, energy, field service, manufacturing,
  agriculture, food and beverage, retail, and the public sector.</p><p>Visit gomotive.com
  to learn more.</p></p><p><strong>Who We Are:</strong></p><p>Motive empowers the
  people who run physical operations with tools to make their work safer, more productive,
  and more profitable. We combine IoT hardware with AI-powered applications to automate
  vehicle and equipment tracking, driver safety, compliance, maintenance, spend management,
  and more. Motive serves more than 120,000 customers – from Fortune 500 enterprises
  to small businesses – across a wide range of industries, including transportation
  and logistics, construction, field service, and the public sector.</p><p><strong>About
  the Role:</strong></p><p>We are seeking a Lead Product Manager&nbsp; for our Telematics
  Platform. This team is at the center of Motive's product ecosystem, responsible
  for the centralized platform that collects, ingests, processes, and serves all vehicle
  and device data. You will be a key voice in the long-term vision, strategy, and
  execution for this platform, which is the foundation of our most critical customer-facing
  products.</p><p>You will be the partner for all other product teams who build their
  experiences on telematics platforms. You will also lead the charge in productizing
  our telematics data directly, building API-first products and rich integrations
  for our largest Enterprise customers.</p><p>This is a deeply technical, strategic,
  and high-impact role. You will be the central pillar of product leadership, wrestling
  with complex engineering challenges and driving alignment across the company to
  shape the future of Motive's data platform.</p><p><strong>What You'll Do:</strong></p><ul><li>Own
  the long-term vision, strategy, and roadmap for the Telematics data platform, balancing
  enterprise-grade reliability with feature innovation.</li><li>Partner closely with
  R&amp;D leads to solve core platform challenges and deliver enterprise-grade reliability
  for key data services.</li><li>Lead defining and launching customer-facing Telematics
  APIs, webhooks, and data integrations for the Enterprise segment.</li><li>Drive
  platform readiness for strategic initiatives, including international expansion.</li><li>Collaborate
  with AI teams to make telematics data a core component of Motive's AI differentiation,
  including new analytics and automated workflows.</li><li>Mentor and coach other
  Product Managers on the team to scale the product function within this critical
  domain.</li><li>Lead the charge in productizing telematics data directly by building
  API-first products and rich integrations for the largest Enterprise customers.</li><li>Serve
  as the central pillar of product leadership, wrestling with complex engineering
  challenges and driving alignment across the company.</li></ul><p><strong>What We're
  Looking For:</strong></p><ul><li>Possess 8+ years of product management experience,
  with a proven track record in a lead role.</li><li>Hold a Bachelor's degree in Computer
  Science, Engineering, or a related technical field (or equivalent practical experience).</li><li>Exhibit
  experience building and scaling complex data platforms, API-first products, IoT
  systems, or large-scale distributed systems.</li><li>Know how to manage a platform
  as a product, balancing the needs of multiple internal stakeholders with external
  customer requirements.</li><li>Demonstrate the ability to drive alignment, influence
  roadmaps, and build consensus across numerous product, engineering, and GTM teams
  without direct authority.</li><li>Be able to dive deep into data to understand platform
  health while also engaging with enterprise customers to understand their integration
  needs.</li><li>Thrive in a fast-paced environment and be comfortable navigating
  ambiguity and complexity.</li></ul><p><p><p><p><em><span><strong>Pay Transparency</strong><br>Your
  compensation may be based on several factors, including education, work experience,
  and certifications. For certain roles, total compensation may include restricted
  stock units. Motive offers benefits including health, pharmacy, optical and dental
  care benefits, paid time off, sick time off, short term and long term disability
  coverage, life insurance as well as 401k contribution (all benefits are subject
  to eligibility requirements). Learn more about our benefits by visiting Motive Perks
  &amp; Benefits.<br>The compensation range for this position will depend on where
  you reside. For this role, the compensation range is:</span></em></p></p><p>United
  States</p><p><span>$162,000</span><span>—</span><span>$230,000 USD</span></p></p></p><p><p><em>Creating
  a diverse and inclusive workplace is one of Motive's core values. We are an equal
  opportunity employer and welcome people of different backgrounds, experiences, abilities
  and perspectives.&nbsp;</em></p><p><em>Please review our Candidate Privacy Notice&nbsp;here.</em></p><p><em>UK
  Candidate Privacy Notice here.</em></p><p><em><span>The applicant must be authorized
  to receive and access those commodities and technologies controlled under U.S. Export
  Administration Regulations.&nbsp;</span>It is Motive's policy to require that employees
  be authorized to receive access to Motive products and technology.&nbsp;</em></p></p>
description_text: 'Who we are: Motive empowers the people who run physical operations
  with tools to make their work safer, more productive, and more profitable. For the
  first time ever, safety, operations and finance teams can manage their drivers,
  vehicles, equipment, and fleet related spend in a single system. Combined with industry
  leading AI, the Motive platform gives you complete visibility and control, and significantly
  reduces manual workloads by automating and simplifying tasks. Motive serves nearly
  100,000 customers – from Fortune 500 enterprises to small businesses – across a
  wide range of industries, including transportation and logistics, construction,
  energy, field service, manufacturing, agriculture, food and beverage, retail, and
  the public sector. Visit gomotive.com to learn more. Who We Are: Motive empowers
  the people who run physical operations with tools to make their work safer, more
  productive, and more profitable. We combine IoT hardware with AI-powered applications
  to automate vehicle and equipment tracking, driver safety, compliance, maintenance,
  spend management, and more. Motive serves more than 120,000 customers – from Fortune
  500 enterprises to small businesses – across a wide range of industries, including
  transportation and logistics, construction, field service, and the public sector.
  About the Role: We are seeking a Lead Product Manager&nbsp; for our Telematics Platform.
  This team is at the center of Motive''s product ecosystem, responsible for the centralized
  platform that collects, ingests, processes, and serves all vehicle and device data.
  You will be a key voice in the long-term vision, strategy, and execution for this
  platform, which is the foundation of our most critical customer-facing products.
  You will be the partner for all other product teams who build their experiences
  on telematics platforms. You will also lead the charge in productizing our telematics
  data directly, building API-first products and rich integrations for our largest
  Enterprise customers. This is a deeply technical, strategic, and high-impact role.
  You will be the central pillar of product leadership, wrestling with complex engineering
  challenges and driving alignment across the company to shape the future of Motive''s
  data platform. What You''ll Do: Own the long-term vision, strategy, and roadmap
  for the Telematics data platform, balancing enterprise-grade reliability with feature
  innovation. Partner closely with R&amp;D leads to solve core platform challenges
  and deliver enterprise-grade reliability for key data services. Lead defining and
  launching customer-facing Telematics APIs, webhooks, and data integrations for the
  Enterprise segment. Drive platform readiness for strategic initiatives, including
  international expansion. Collaborate with AI teams to make telematics data a core
  component of Motive''s AI differentiation, including new analytics and automated
  workflows. Mentor and coach other Product Managers on the team to scale the product
  function within this critical domain. Lead the charge in productizing telematics
  data directly by building API-first products and rich integrations for the largest
  Enterprise customers. Serve as the central pillar of product leadership, wrestling
  with complex engineering challenges and driving alignment across the company. What
  We''re Looking For: Possess 8+ years of product management experience, with a proven
  track record in a lead role. Hold a Bachelor''s degree in Computer Science, Engineering,
  or a related technical field (or equivalent practical experience). Exhibit experience
  building and scaling complex data platforms, API-first products, IoT systems, or
  large-scale distributed systems. Know how to manage a platform as a product, balancing
  the needs of multiple internal stakeholders with external customer requirements.
  Demonstrate the ability to drive alignment, influence roadmaps, and build consensus
  across numerous product, engineering, and GTM teams without direct authority. Be
  able to dive deep into data to understand platform health while also engaging with
  enterprise customers to understand their integration needs. Thrive in a fast-paced
  environment and be comfortable navigating ambiguity and complexity. Pay Transparency
  Your compensation may be based on several factors, including education, work experience,
  and certifications. For certain roles, total compensation may include restricted
  stock units. Motive offers benefits including health, pharmacy, optical and dental
  care benefits, paid time off, sick time off, short term and long term disability
  coverage, life insurance as well as 401k contribution (all benefits are subject
  to eligibility requirements). Learn more about our benefits by visiting Motive Perks
  &amp; Benefits. The compensation range for this position will depend on where you
  reside. For this role, the compensation range is: United States $162,000 — $230,000
  USD Creating a diverse and inclusive workplace is one of Motive''s core values.
  We are an equal opportunity employer and welcome people of different backgrounds,
  experiences, abilities and perspectives.&nbsp; Please review our Candidate Privacy
  Notice&nbsp;here. UK Candidate Privacy Notice here. The applicant must be authorized
  to receive and access those commodities and technologies controlled under U.S. Export
  Administration Regulations.&nbsp; It is Motive''s policy to require that employees
  be authorized to receive access to Motive products and technology.&nbsp;'
