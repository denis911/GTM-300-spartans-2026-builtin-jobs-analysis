company_overview: We view pets and pet parents as family and are obsessed with meeting
  their needs and exceeding customer expectations through every interaction. Behind
  the scenes, our talented teams are made up of innovators, delighters, big-thinkers
  and of course, passionate pet people—creating a place where you'll be empowered
  to build, grow and unleash your fullest potential.We don’t just stand by our company
  mission—we’re obsessed with it. We seek to be the most trusted and convenient destination
  for pet parents and partners, everywhere. And we’re constantly finding new ways
  to do just that.At Chewy, we understand pet parenthood is full of joyful highs and
  anxious lows. That’s why we’re here, standing alongside pet parents, providing everything
  their pets need for a happy, healthy life. We’re a leading online source for pet
  products, supplies, and prescriptions. We offer a broad selection of high-quality
  products and services at competitive prices with an exceptional level of customer
  care and a personal touch.Since launching in 2011, we’ve combined the personalized
  service of your neighborhood pet store with the convenience and speed of e-commerce.
  We pride ourselves on being the only brand available 24/7/365 to support pet parents
  throughout their journey.We have a rich history of being recognized for our deep
  care and personalization while going above and beyond for our customers and their
  pets.We view pets and their people as more than just customers and look forward
  to meeting their needs and exceeding expectations through every interaction. With
  Chewy, no one pet-parents alone.Our culture is for those who thrive on delivering
  results and becoming your best—no matter your role or location. At Chewy, our Operating
  Principles serve as a common language, or framework, that connects two of Chewy's
  most valuable elements—our people and our culture. The Operating Principles guide
  our character, capabilities, imagination, and methods for execution in support of
  our company's mission.
