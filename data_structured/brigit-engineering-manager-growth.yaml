company_overview: 'We help everyday Americans build a brighter financial future. With
  a business model that is aligned with our customers, we create transparent, fair,
  and simple financial products that put money back in the hands of our members, help
  them spend wisely, and avoid unfair fees. We don’t just reduce stress — we promote
  sustainable financial health.Our team comes from diverse backgrounds, but are united
  in the fight for our members’ financial security and freedom. With experience at
  Amazon, Deutsche Bank, Palantir, Two Sigma and more, our experts not only have the
  tools to solve financial insecurity—they’ve witnessed the problem firsthand. At
  big banks we’ve seen the injustice of inequality. At leading tech companies we’ve
  learned to build from the best. Now we’re putting both to use to change lives every
  day.To learn more about what is happening at Brigit, check out the latest press
