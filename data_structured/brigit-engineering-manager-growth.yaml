description_html: <p>Hi, we're Brigit! A holistic financial health company helping
  everyday Americans build a brighter financial future. With a business model that
  is aligned with our customers, we create transparent, fair, and simple financial
  products that put money back in the hands of our members, help them spend wisely,
  avoid unfair fees and build their credit quickly. If autonomy, ownership, and having
  meaningful input at the company you work for is important to you, come join our
  growing team!</p><p></p><p>Brigit is doing innovative and exciting work, but don’t
  just take our word for it, our work is being recognized by others:</p><ul><li><p>Built
  In's 2026 Best Midsize Companies to Work For in New York City</p></li><li><p><u>Built
  In's 2025 Best Places to Work For In New York City</u></p></li><li><p><u>Built In’s
  2024 &amp; 2025 Best Startups to Work For In the U.S.</u></p></li><li><p><u>Built
  In’s 2023 - 2025 Best Startups to Work For In New York City</u></p></li><li><p><u>Fast
  Company’s Most Innovative Companies of 2022</u></p></li><li><p><u>Business Insider’s
  Most Promising Consumer Startups 2022</u></p></li><li><p><u>Forbes Fintech 50 2022</u></p></li></ul><p></p><p><strong>Role
  overview:</strong></p><p>We are looking for a highly skilled and mission-driven
  Engineering Manager to join our Growth team. Our Growth organization plays a critical
  role in expanding access to Brigit by helping more low-income Americans discover,
  adopt, and realize value from our products. In this role, you will partner closely
  with a cross-functional growth team—including product, design, data, marketing,
  and business operations—to drive impact across the top of our user funnel. You will
  lead a team of engineers focused on rapid experimentation, learning, and iteration,
  while maintaining a high bar for engineering quality. As an Engineering Manager,
  you will bring out the best in your team by coaching individuals, evolving processes
  to maximize learning and velocity, and creating an inclusive, supportive environment
  where engineers can do their best work and take ownership of outcomes.</p><p></p><p><strong>What
  you’ll be doing:</strong></p><ul><li><p>Lead and grow a high performance and diverse
  team of engineers and technologists of varying seniority levels</p></li><li><p>Support
  engineers in their career development through regular 1:1s, feedback, and coaching</p></li><li><p>Collaborate
  with product, design, data, business, and marketing partners to shape growth-focused
  roadmaps, define scope, and make tradeoffs</p></li><li><p>Drive small, fast iterations
  and experimentation, balancing speed with quality to maximize learning and impact</p></li><li><p>Structure
  and improve your team’s processes to enhance execution velocity, making tactical
  tradeoffs between business priorities and resources</p></li><li><p>Drive sprint
  planning, capacity allocation, and prioritization to ensure timely and high-quality
  delivery</p></li><li><p>Own and be accountable for key product and growth KPIs,
  using data and experimentation results to inform decisions and direction</p></li><li><p>Ensure
  technical architecture and delivery meet quality standards, with strong monitoring,
  testing, and scalability built in</p></li><li><p>Contribute to technical direction
  by evaluating large strategic decisions, and by evaluating design documents for
  engineering initiatives</p></li></ul><p></p><p><strong>What you have:</strong></p><ul><li><p>7+
  years of hands-on professional software development experience</p></li><li><p>1+
  years of software engineering management and mentorship experience</p></li><li><p>A
  desire to build an inclusive, diverse, and high performing team. Even better if
  you've done that many times already in a startup environment.</p></li><li><p>Experience
  regularly collaborating with product and design teams, and partnering closely with
  marketing stakeholders</p></li><li><p>Experience building or operating product growth
  funnels, including instrumentation, experimentation, and metric-driven iteration</p></li><li><p>​​You've
  built large and complex projects at scale, and maintained them over many release
  cycles</p></li><li><p>We use Java running in GCP, and React Native. If you have
  experience in that stack, all the better, but it’s not strictly necessary.</p><p></p></li></ul><p>The
  anticipated annual base salary for this position is $180,000 - $230,000. This range
  does not include any other compensation components or other benefits for which an
  individual may be eligible (other benefits listed below). The actual base salary
  offered depends on a variety of factors, which may include as applicable, the qualifications
  of the individual applicant for the position, years of relevant experience, specific
  and unique skills, level of education attained, certifications or other professional
  licenses held, and the location in which the applicant lives and/or from which they
  will be performing the job.</p><p></p><p><strong>Our Benefits and Team:</strong></p><ul><li><p>Medical,
  dental, and vision insurance</p></li><li><p>Flexible PTO Policy</p></li><li><p>401k
  plan</p></li><li><p>Paid Parental Leave</p></li><li><p>Physical and mental wellbeing
  benefits including Wellhub for access to virtual workouts and discounted gym memberships,
  and Headspace Care for covered virtual therapy sessions and unlimited on demand
  health support</p></li><li><p>Monthly reimbursements to use against wifi and cell
  phone bills</p></li><li><p>Annual reimbursement for Learning &amp; Development</p></li><li><p>Help
  hard working Americans build a brighter financial future</p></li><li><p>High-growth
  company</p></li><li><p>A dynamic, flexible and collaborative start-up work environment
  with a highly talented team</p><p></p></li></ul><p>Brigit is committed to providing
  equal employment opportunities for all applicants and employees without regard to
  race, religion, color, sex, pregnancy (including breast feeding and related medical
  conditions), national origin, citizenship status, uniform service member status,
  age, genetic information, disability, or any other protected status in accordance
  with all applicable federal, state and local laws. We are proud to be an equal opportunity
  workplace.</p><p></p><p>If you require reasonable accommodation in completing an
  application, interviewing, completing any pre-employment testing, or otherwise participating
  in the employee selection process, please email accommodations@hellobrigit.com.</p><p></p><p>Disclosures:</p><ul><li><p>For
  information on our data privacy policies, see the Brigit California Personnel Privacy
  Policy.</p></li><li><p>Brigit uses E-Verify for employment authorization. See the
  E-Verify and Department of Justice websites for more details.</p></li></ul>
