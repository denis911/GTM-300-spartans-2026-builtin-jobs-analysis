description_html: '<b><strong>About Blacksmith</strong></b><ul><li><p>We started by
  building infrastructure to run CI workloads really fast. Our first product helps
  companies run GitHub Actions substantially faster and cheaper by owning and operating
  our own global fleet of bare-metal machines rather than renting generic cloud VMs.</p></li><li><p>Today,
  we orchestrate tens of millions of Firecracker VMs each month, running CI for 2,000+
  companies and hit ~$10M in ARR in less than 2 years.</p></li><li><p>We operate thousands
  of bare-metal machines across multiple regions, regularly schedule 50k+ vCPUs concurrently,
  and run a petabyte-scale Ceph cluster that we manage ourselves.</p></li><li><p>We’ve
  raised $13.5M across Seed and Series A, led by Google Ventures (GV), and we’re intentionally
  building a small, but exceptional team.</p></li><li><p>Blacksmith was founded by
  a team with deep systems and scaling experience, including building search/ads infrastructure
  at Faire, and operating large distributed systems at Cockroach Labs. Our GTM is
  led by Jon Boyer, formerly Head of Sales at Zapier.</p></li><li><p>We’re now extending
  the same CI infrastructure into a broader platform: running agent sandboxes at scale
  and building our own background coding agent on top of it.</p></li></ul><p></p><b><strong>What
  You’ll Do</strong></b><p></p><b><strong>Partner with Sales to secure the technical
  win</strong></b><ul><li><p>Lead <strong>technical discovery</strong>, scoping sessions,
  and qualification calls with engineering, DevOps, and platform teams.</p></li><li><p>Deliver
  high-impact <strong>product demos</strong>, whiteboard sessions, and tailored technical
  deep dives.</p></li><li><p>Design and execute <strong>POCs</strong>, including benchmarking
  CI performance, optimizing pipeline architecture, and validating ROI models.<br></p></li></ul><b><strong>Act
  as a trusted technical advisor to customers</strong></b><ul><li><p>Build credibility
  with architects, engineering managers, SREs, and CTO-level stakeholders.</p></li><li><p>Translate
  engineering pain into clear solution designs using Blacksmith’s CI cloud.</p></li><li><p>Guide
  customers on best practices for CI modernization, ephemeral compute, cost optimization,
  and migration off hyperscalers.<br></p></li></ul><b><strong>Solve technical challenges
  in real time</strong></b><ul><li><p>Assist customers in debugging CI performance
  bottlenecks, runner reliability issues, or pipeline misconfigurations.</p></li><li><p>Help
  teams optimize GitHub Actions at scale and adopt ephemeral runners effectively.</p></li><li><p>Maintain
  deep technical understanding of Blacksmith’s architecture and how it integrates
  into complex enterprise environments.<br></p></li></ul><b><strong>Influence product
  direction</strong></b><ul><li><p>Capture customer feedback and use cases, advocating
  for features and improvements that accelerate adoption.</p></li><li><p>Collaborate
  with Engineering and Product to validate requirements, shape roadmap decisions,
  and improve usability for large-scale CI teams.<br></p></li></ul><b><strong>Support
  expansion and long-term success</strong></b><ul><li><p>Participate in strategic
  account planning with AEs, CSMs, and leadership.</p></li><li><p>Identify technical
  expansion opportunities within existing customers.</p></li><li><p>Ensure smooth
  handoff from evaluation to onboarding, working closely with post-sales teams.</p></li></ul><p></p><b><strong>You’ll
  Be a Great Fit If You Have</strong></b><p></p><b><strong>Strong technical fluency</strong></b><ul><li><p>Experience
  in <strong>solutions engineering, field engineering, pre-sales, DevOps, or consulting</strong>.</p></li><li><p>Hands-on
  understanding of modern CI/CD tooling (GitHub Actions preferred), pipelines, and
  DevOps workflows.</p></li><li><p>Familiarity with cloud infrastructure (AWS/GCP/Azure),
  containerization, or ephemeral compute systems.<br></p></li></ul><b><strong>Comfort
  working directly with developers</strong></b><ul><li><p>You can read logs, diagnose
  failures, and reason about CI performance bottlenecks.</p></li><li><p>You don’t
  need to be a full-time engineer — but you should be able to debug environments,
  understand code snippets, and think like a practitioner.<br></p></li></ul><b><strong>Exceptional
  communication &amp; storytelling skills</strong></b><ul><li><p>Ability to present
  confidently to engineering ICs, architects, and CTOs.</p></li><li><p>Skilled at
  simplifying complex concepts and tying technical value to business impact.<br></p></li></ul><b><strong>Customer-obsessed
  problem solver</strong></b><ul><li><p>You anticipate needs, remove friction, and
  help customers realize the full value of Blacksmith.</p></li><li><p>You thrive in
  ambiguity and enjoy building new processes from scratch.<br></p></li></ul><b><strong>Startup
  DNA</strong></b><ul><li><p>Scrappy, resourceful, fast-moving.</p></li><li><p>Comfortable
  in a high-velocity, evolving technical and GTM environment.</p></li><li><p>Energized
  by being part of a small, senior, talent-dense team shaping a new product category.</p></li></ul><p></p><b><strong>Bonus
  Points</strong></b><ul><li><p>Experience with DevOps tooling, infrastructure automation,
  or ephemeral compute systems.</p></li><li><p>Understanding of CI benchmarking, cloud
  cost analysis, or hyperscaler limitations.</p></li><li><p>Experience supporting
  enterprise evaluations at scale (security reviews, architecture sessions, procurement
  support).</p></li><li><p>Familiarity with Terraform, Docker, Kubernetes, or observability
  tools.</p></li><li><p>Deep curiosity about engineering productivity and developer
  experience.</p></li></ul><p></p><b><strong>Compensation &amp; Benefits</strong></b><ul><li><p>Competitive
  salary + meaningful equity</p></li><li><p>Medical, dental, and vision insurance</p></li><li><p>401K
  match</p></li><li><p>Unlimited PTO</p></li><li><p>Early-exercise stock options</p></li><li><p>12
  weeks fully paid parental leave (U.S.)</p></li><li><p>Annual offsite.</p></li></ul>'
description_text: 'About Blacksmith We started by building infrastructure to run CI
  workloads really fast. Our first product helps companies run GitHub Actions substantially
  faster and cheaper by owning and operating our own global fleet of bare-metal machines
  rather than renting generic cloud VMs. Today, we orchestrate tens of millions of
  Firecracker VMs each month, running CI for 2,000+ companies and hit ~$10M in ARR
  in less than 2 years. We operate thousands of bare-metal machines across multiple
  regions, regularly schedule 50k+ vCPUs concurrently, and run a petabyte-scale Ceph
  cluster that we manage ourselves. We’ve raised $13.5M across Seed and Series A,
  led by Google Ventures (GV), and we’re intentionally building a small, but exceptional
  team. Blacksmith was founded by a team with deep systems and scaling experience,
  including building search/ads infrastructure at Faire, and operating large distributed
  systems at Cockroach Labs. Our GTM is led by Jon Boyer, formerly Head of Sales at
  Zapier. We’re now extending the same CI infrastructure into a broader platform:
  running agent sandboxes at scale and building our own background coding agent on
  top of it. What You’ll Do Partner with Sales to secure the technical win Lead technical
  discovery , scoping sessions, and qualification calls with engineering, DevOps,
  and platform teams. Deliver high-impact product demos , whiteboard sessions, and
  tailored technical deep dives. Design and execute POCs , including benchmarking
  CI performance, optimizing pipeline architecture, and validating ROI models. Act
  as a trusted technical advisor to customers Build credibility with architects, engineering
  managers, SREs, and CTO-level stakeholders. Translate engineering pain into clear
  solution designs using Blacksmith’s CI cloud. Guide customers on best practices
  for CI modernization, ephemeral compute, cost optimization, and migration off hyperscalers.
  Solve technical challenges in real time Assist customers in debugging CI performance
  bottlenecks, runner reliability issues, or pipeline misconfigurations. Help teams
  optimize GitHub Actions at scale and adopt ephemeral runners effectively. Maintain
  deep technical understanding of Blacksmith’s architecture and how it integrates
  into complex enterprise environments. Influence product direction Capture customer
  feedback and use cases, advocating for features and improvements that accelerate
  adoption. Collaborate with Engineering and Product to validate requirements, shape
  roadmap decisions, and improve usability for large-scale CI teams. Support expansion
  and long-term success Participate in strategic account planning with AEs, CSMs,
  and leadership. Identify technical expansion opportunities within existing customers.
  Ensure smooth handoff from evaluation to onboarding, working closely with post-sales
  teams. You’ll Be a Great Fit If You Have Strong technical fluency Experience in
  solutions engineering, field engineering, pre-sales, DevOps, or consulting . Hands-on
  understanding of modern CI/CD tooling (GitHub Actions preferred), pipelines, and
  DevOps workflows. Familiarity with cloud infrastructure (AWS/GCP/Azure), containerization,
  or ephemeral compute systems. Comfort working directly with developers You can read
  logs, diagnose failures, and reason about CI performance bottlenecks. You don’t
  need to be a full-time engineer — but you should be able to debug environments,
  understand code snippets, and think like a practitioner. Exceptional communication
  &amp; storytelling skills Ability to present confidently to engineering ICs, architects,
  and CTOs. Skilled at simplifying complex concepts and tying technical value to business
  impact. Customer-obsessed problem solver You anticipate needs, remove friction,
  and help customers realize the full value of Blacksmith. You thrive in ambiguity
  and enjoy building new processes from scratch. Startup DNA Scrappy, resourceful,
  fast-moving. Comfortable in a high-velocity, evolving technical and GTM environment.
  Energized by being part of a small, senior, talent-dense team shaping a new product
  category. Bonus Points Experience with DevOps tooling, infrastructure automation,
  or ephemeral compute systems. Understanding of CI benchmarking, cloud cost analysis,
  or hyperscaler limitations. Experience supporting enterprise evaluations at scale
  (security reviews, architecture sessions, procurement support). Familiarity with
  Terraform, Docker, Kubernetes, or observability tools. Deep curiosity about engineering
  productivity and developer experience. Compensation &amp; Benefits Competitive salary
  + meaningful equity Medical, dental, and vision insurance 401K match Unlimited PTO
  Early-exercise stock options 12 weeks fully paid parental leave (U.S.) Annual offsite.'
