description_html: '<p>The Data Science &amp; Machine Learning team is looking for
  a Machine Learning Systems Engineer to scale and support our team capabilities.
  We are modeling experts who solve business challenges with durable data science
  solutions. We work cross-functionally to enable Squarespace to integrate data science
  models into the product and the company.</p><p>You will work closely with other
  Machine Learning Engineers to develop and maintain the machine learning platform
  that underpins all production data science models to unlock value for Squarespace
  and its customers. You will also have the opportunity to design, train, and update
  models alongside Data Scientists. The Machine Learning Systems function is focused
  on Data Scientist success: our goal is to enable Data Scientists to move fast and
  succeed, whether via tooling, partnership, or hands-on operational support.</p><p>This
  is an opportunity for you to play a role in the deployment, scaling, and evolution
  of machine learning models using Google''s Vertex AI platform. You will contribute
  to the strategy and implementation work to enable and unlock our growing machine
  learning capabilities.</p><p>This is a hybrid role working from our NYC office 3
  days per week. You will report to the Manager of Machine Learning Systems.</p><b>You''ll
  Get To…</b><ul><li>Collaborate with Data Scientists, ML Engineers, Site Reliability
  Engineers, and Product Engineers to identify opportunities and work around constraints
  to deliver ML systems</li><li>Deploy, monitor, evaluate, and optimize production
  machine learning models in 24/7 customer-facing applications.</li><li>Pair with
  team members or independently execute model training and updates</li><li>Implement
  scalable and reliable systems to handle model inference at scale</li><li>Develop
  and maintain automated pipelines for model training, testing, and deployment</li><li>Improve
  CI/CD practices to enable rapid and reliable model updates to speed up iterative
  learning</li><li>Respond to alerts and troubleshoot issues related to model deployment
  and infrastructure</li><li>Design and develop robust endpoint APIs to enable software
  engineers across the product to integrate ML APIs into applications</li><li>Develop,
  deploy, maintain and extend new technologies to enable and enhance data scientists''
  capabilities for every step of the ML model life cycle</li></ul><b>Who We''re Looking
  For</b><ul><li>Bachelor''s Degree with 4+ years of experience working in a Machine
  Learning or similar role</li><li>Strong competency with Python, proficiency with
  SQL</li><li>Experience with cloud platforms. Knowledge of Google Cloud Platform
  and Vertex AI is a plus</li><li>Experience deploying and scaling ML models in production.
  Experience training models is a plus.</li><li>Knowledge of emerging ML technologies,
  tools, and industry best practices (e.g. vector databases, embedding models, open-source
  ecosystems)</li></ul><b>Benefits &amp; Perks</b><ul><li>A choice between medical
  plans with an option for 100% covered premiums including medical, dental, and vision</li><li>Supplemental
  Life and Disability Insurance plans</li><li>Fertility and adoption benefits</li><li>Headspace
  mindfulness app subscription</li><li>Global Employee Assistance Program</li><li>Retirement
  benefits with employer match</li><li>Flexible paid time off</li><li>12 weeks paid
  parental leave and family care leave</li><li>Pretax commuter benefit</li><li>Education
  reimbursement</li><li>Employee donation match to community organizations</li><li>7
  Global Employee Resource Groups (ERGs)</li><li>Dog-friendly workplace</li><li>Free
  lunch and snacks</li><li>Private rooftop</li><li>Hack week twice per year</li></ul><b>Cash
  Compensation Range: $128,000 - $207,000 USD</b><p>The base salary for this position
  will vary based on job-related criteria including relevant skills, experience, and
  location, among other factors.</p><p>In addition to the cash compensation above
  (which includes base salary and, where applicable for eligible roles, may include
  overtime pay), Squarespace employees are eligible to be granted an option to purchase
  our common stock. Sales positions generally offer a competitive On Target Earnings
  (OTE) incentive structure in addition to base salary.</p><b>About Squarespace</b><p>Squarespace
  is a design-driven platform helping entrepreneurs build brands and businesses online.
  We empower millions of customers in more than 200 countries and territories with
  all the tools they need to create an online presence, build an audience, monetize,
  and scale their business. Our suite of products range from websites, domains, ecommerce,
  and marketing tools, as well as tools for scheduling with Acuity and creating and
  managing social media presence with Bio Sites and Unfold. Our team of more than
  1,700 is headquartered in New York City, with offices in Dublin, Ireland, and Aveiro,
  Portugal. For more information about our company, visit https://www.squarespace.com/about/careers.</p><b>Our
  Commitment</b><p>Today, more than a million people around the globe use Squarespace
  to share different perspectives and experiences with the world. Not only do we embrace
  and celebrate the diversity of our customers, but we also work toward the same in
  our employees. At Squarespace, we are committed to equal employment opportunity
  regardless of race, color, ethnicity, ancestry, religion, national origin, gender,
  sex, gender identity or expression, sexual orientation, age, citizenship, marital
  or parental status, disability, veteran status, or other class protected by applicable
  law. We are proud to be an equal opportunity workplace.</p><br><p>#LI-Hybrid</p><p><p><strong>Thank
  you in advance for providing the following details about your work history from
  your resume! This helps us ensure that your candidate information is accurate and
  consistent during the hiring process.</strong></p><p>&nbsp;</p><p><strong>Squarespace
  will never solicit your personal banking information or ask you to transfer money
  in connection with a job offer or interview. We also will not reach out to you via
  phone or SMS without your permission or knowledge.</strong></p></p>'
