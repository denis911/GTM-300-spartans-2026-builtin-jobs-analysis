description_html: '<b>Our Purpose</b> <br>Mastercard powers economies and empowers
  people in 200+ countries and territories worldwide. Together with our customers,
  we''re helping build a sustainable economy where everyone can prosper. We support
  a wide range of digital payments choices, making transactions secure, simple, smart
  and accessible. Our technology and innovation, partnerships and networks combine
  to deliver a unique set of products and services that help people, businesses and
  governments realize their greatest potential. <br><b>Title and Summary</b><br>Director,
  Client Growth and Optimization<br>Who is Mastercard?<br>Mastercard is a global technology
  company in the payments industry. Our mission is to connect and power an inclusive,
  digital economy that benefits everyone, everywhere by making transactions safe,
  simple, smart, and accessible. Using secure data and networks, partnerships and
  passion, our innovations and solutions help individuals, financial institutions,
  governments, and businesses realize their greatest potential. Our decency quotient,
  or DQ, drives our culture and everything we do inside and outside of our company.
  With connections across more than 210 countries and territories, we are building
  a sustainable world that unlocks priceless possibilities for all.<br>Corporate Solutions
  Overview:<br>Join us in unlocking infinite opportunity in Mastercard''s Corporate
  Solutions organization! <br>In Corporate Solutions, we empower our customer''s businesses
  to succeed through innovative, trusted payment solutions that deliver a seamless
  digital-first experience around the world. We are disrupting the industry by developing
  world-class travel and B2B solutions for our corporate clients around the globe.
  <br>As a key player in our organization''s digital transformation journey, you will
  play a critical role in revolutionizing the global financial ecosystem. You will
  have the opportunity to make data-driven decisions, build and sell first-in-class
  corporate solutions, and partner with industry leaders to deliver innovative products
  and solutions for our global clients.<br>The director of Client Growth Optimization
  will sit within Corporate Solutions Commercialization function. The Commercialization
  function is focused on driving a structured go-to-market approach, ensuring solutions
  reach customers, scale effectively, and deliver sustainable growth. This director
  will define and execute a global client growth strategy focused on maximizing customer
  lifecycle value. <br>Key Activities:<br>- Analyze global Corporate Solutions client
  portfolio to determine opportunities to drive incremental growth through existing
  client relationship<br>- Partner with data science and enablement teams to establish
  KPIs and measurement frameworks for optimization and customer success evaluation,
  defining optimization for corporate portfolios <br>- Define optimization plays and
  plans based on client segmentation <br>- Collaborate across product, services, and
  regional teams to operationalize optimization strategies and ensure alignment.<br>-
  Work with regional teams to create processes, documentation, and best practices
  for customer success planning<br>- Monitor, track, and quantify progress made against
  optimization initiatives by region<br>- Determine resourcing, go-to-market collateral,
  and tooling needed to manage clients across full-lifecycle<br>- Enable client life
  cycle process improvements inclusive of client implementation and activation <br>Required
  Skills &amp; Experience:<br>- 10+ years of experience in client success, revenue
  operations, commercial strategy, product commercialization, or related functions
  within payments, financial services, SaaS, or B2B technology.<br>- Strong analytical
  and quantitative skills, with experience analyzing global client portfolios, identifying
  growth opportunities, and making data-driven decisions.<br>- Proven experience defining
  and operationalizing customer lifecycle strategies, upsell/cross-sell motions, and
  customer value optimization.<br>- Experience working with data science and analytics
  teams to design KPIs, dashboards, measurement frameworks, and performance tracking
  models.<br>- Demonstrated success driving structured go-to-market motions<br>- Ability
  to influence and collaborate across matrixed global organizations, working effectively
  with product, services, marketing, sales, and regional leadership teams.<br>- Strong
  program management and execution skills, with the ability to lead complex multi-region
  initiatives from concept to activation.<br>- Experience with customer success planning,
  including the creation of playbooks, processes, and best practices to support client
  lifecycle management.<br>- Comfort operating in a fast-paced, high-growth environment;
  ability to navigate ambiguity and set clear priorities.<br>- Excellent communication
  and executive-level storytelling skills, including the ability to articulate insights,
  strategy, and progress to senior stakeholders.Preferred Qualifications:<br>- Experience
  in corporate spend management, virtual cards, or B2B payment solutions.<br>- Background
  in consulting (strategy, growth, or digital transformation) or product commercialization.<br>-
  Familiarity with Salesforce, customer success platforms, or lifecycle management
  tools.<br>- Master''s degree in Business, Analytics, Strategy, or related field
  (MBA preferred).<br>Leadership &amp; Behavioral Competencies<br>- Strategic thinker
  with the ability to define long-term optimization frameworks and translate them
  into actionable plans.<br>- Customer-centric mindset, always advocating for solutions
  that drive mutual value.<br>- High ownership and accountability, with a track record
  of delivering measurable growth.<br>- Strong stakeholder management, able to align
  diverse teams and balance global/regional needs.<br>- Innovative problem-solver,
  comfortable building new processes and scaling new functions.<br>Mastercard is a
  merit-based, inclusive, equal opportunity employer that considers applicants without
  regard to gender, gender identity, sexual orientation, race, ethnicity, disabled
  or veteran status, or any other characteristic protected by law. We hire the most
  qualified candidate for the role. In the US or Canada, if you require accommodations
  or assistance to complete the online application process or during the recruitment
  process, please contact reasonable_accommodation@mastercard.com and identify the
  type of accommodation or assistance you are requesting. Do not include any medical
  or health information in this email. The Reasonable Accommodations team will respond
  to your email promptly.<br><b>Corporate Security Responsibility</b><br>All activities
  involving access to Mastercard assets, information, and networks comes with an inherent
  risk to the organization and, therefore, it is expected that every person working
  for, or on behalf of, Mastercard is responsible for information security and must:<br><ul><li>Abide
  by Mastercard''s security policies and practices;</li><li>Ensure the confidentiality
  and integrity of the information being accessed;</li><li>Report any suspected information
  security violation or breach, and</li><li>Complete all periodic mandatory security
  trainings in accordance with Mastercard''s guidelines.</li></ul><br>In line with
  Mastercard''s total compensation philosophy and assuming that the job will be performed
  in the US, the successful candidate will be offered a competitive base salary and
  may be eligible for an annual bonus or commissions depending on the role. The base
  salary offered may vary depending on multiple factors, including but not limited
  to location, job-related knowledge, skills, and experience. Mastercard benefits
  for full time (and certain part time) employees generally include: insurance (including
  medical, prescription drug, dental, vision, disability, life insurance); flexible
  spending account and health savings account; paid leaves (including 16 weeks of
  new parent leave and up to 20 days of bereavement leave); 80 hours of Paid Sick
  and Safe Time, 25 days of vacation time and 5 personal days, pro-rated based on
  date of hire; 10 annual paid U.S. observed holidays; 401k with a best-in-class company
  match; deferred compensation for eligible roles; fitness reimbursement or on-site
  fitness facilities; eligibility for tuition reimbursement; and many more. Mastercard
  benefits for interns generally include: 56 hours of Paid Sick and Safe Time; jury
  duty leave; and on-site fitness facilities in some locations.<br><b>Pay Ranges</b><br>New
  York City, New York: $172,000 - $283,000 USD'
