description_html: '<p><strong>SENIOR MANAGER, CREDIT RISK</strong></p><p>Current is
  a leading consumer fintech platform transforming financial access for everyday Americans
  with over five million members. We provide access to financial solutions that seamlessly
  work together to solve the needs of our members and enable all Americans to build
  better financial futures. Based in NYC, our results-driven environment drives us
  to build better products, grow faster and empower everyone on our team to have an
  impact on our business and mission to improve financial outcomes.</p><p><strong>ABOUT
  THE ROLE:</strong></p><p>We are looking for a Senior Manager, Credit Risk to join
  our team and drive the growth of our Credit and Liquidity products and business.
  This is a critical role for Current at a time of rapid growth. The key objectives
  of this role are to enable profitable growth of our Credit and liquidity products/businesses
  by focusing on Credit/underwriting strategy, design, execution, management and continuous
  improvement. We are looking for a person with exceptional analytical skills, a hands-on
  approach, and a business owner mentality.</p><p><strong>KEY RESPONSIBILITIES:</strong></p><ul><li>Develop
  strategy and roadmap for underwriting of products; drive continuous improvement
  of existing products to achieve business objectives</li><li>As an individual contributor,
  frame the credit product design, approach to underwriting analysis and modeling
  from beginning to end and simulate, iterate, validate the credit underwriting, offer
  terms</li><li>Be a hands-on leader that works with data analysts, cross-functionally
  and with external vendors to design, test, deliver, and monitor new underwriting
  and ongoing account management for our credit/ liquidity products including Paycheck
  Advance, Overdraft, and Credit Builder.</li><li>Work closely with internal stakeholders
  including: Finance to ensure a well-managed process for provisioning, true-up and
  release of loss allowances, and for funding strategy and execution; Legal/compliance
  for regulatory requirements</li><li>Interface with Bank partners on risk-related
  agenda and processes</li></ul><p><strong>ABOUT YOU:</strong></p><ul><li>Credit Risk
  strategist - Has experience in credit risk domain throughout the lifecycle of credit
  and liquidity products</li><li>Critical thinker - consider problems from all angles
  to remove bias and touch bottom on key assumptions</li><li>Creative problem-solver
  - able to find creative solutions that finds win win across constraints and objectives</li><li>Results-oriented
  - You ground contributions in real business and customer impact and prioritize effectively
  to maximize speed-to-impact.&nbsp;</li><li>Fast learner - you have no problem picking
  up new skills or tools to get the job done.</li><li>Intellectually curious - seek
  to understand the why behind the numbers and love nerding out over a new insight</li><li>Exceptional
  written and oral communication skills. You drive alignment through grounded arguments,
  interpersonal skills, and negotiation skills.&nbsp;&nbsp;</li><li>Thrive when working
  in a fast-moving, ambiguous environment</li></ul><ul><li>Excited by large breadth
  of problem areas</li></ul><p><strong>REQUIREMENTS:</strong></p><ul><li>6+ years
  of management experience in standing up successful new underwriting for credit /
  liquidity products in digital and start-up environments</li><li>Deep knowledge and
  experience of underwriting and credit management domains including cash flow and
  credit data based underwriting, credit and banking data environments, successful
  underwriting / offer principles that balance revenue and risk, experiment design
  related to credit, customer behavior, risk modeling and ongoing portfolio management
  processes</li><li>Demonstrated competencies and capabilities in credit risk analytics
  across the lifecycle for different products including technical skills in SQL, Python
  and other modeling tools</li><li>Masters or Undergraduate degree with a quantitative
  concentration</li><li>Exceptional written and oral communication skills.</li><li>Strong
  people leader and collaborator.</li><li>Able to handle competing priorities and
  influence leadership decision-making</li></ul><p>This role has a base salary range
  of $180,000.00 to $250,000.00. Compensation is determined based on experience, skill
  level, and qualifications, which are assessed during the interview process. Current
  offers a competitive total rewards package which includes base salary, equity, and
  comprehensive benefits.</p><p><strong>BENEFITS:</strong></p><ul><li>Competitive
  salary&nbsp;</li><li>Meaningful equity in the form of stock options&nbsp;</li><li>401(k)
  plan</li><li>Discretionary performance bonus program&nbsp;</li><li>Biannual performance
  reviews</li><li>Medical, Dental and Vision premiums covered at 100% for you and
  your dependents&nbsp;</li><li>Flexible time off and paid holidays&nbsp;</li><li>Generous
  parental leave policy</li><li>Commuter benefits&nbsp;</li><li>Fitness benefits</li><li>Healthcare
  and Dependent care FSA benefit&nbsp;</li><li>Employee Assistance Programs focused
  on mental health&nbsp;</li><li>Healthcare advocacy program for all employees&nbsp;</li><li>Access
  to mental health apps&nbsp;</li><li>Team building activities</li><li>Our modern
  Chelsea-based office with open floor plan, stocked kitchen, and catered lunches</li></ul>'
description_text: 'SENIOR MANAGER, CREDIT RISK Current is a leading consumer fintech
  platform transforming financial access for everyday Americans with over five million
  members. We provide access to financial solutions that seamlessly work together
  to solve the needs of our members and enable all Americans to build better financial
  futures. Based in NYC, our results-driven environment drives us to build better
  products, grow faster and empower everyone on our team to have an impact on our
  business and mission to improve financial outcomes. ABOUT THE ROLE: We are looking
  for a Senior Manager, Credit Risk to join our team and drive the growth of our Credit
  and Liquidity products and business. This is a critical role for Current at a time
  of rapid growth. The key objectives of this role are to enable profitable growth
  of our Credit and liquidity products/businesses by focusing on Credit/underwriting
  strategy, design, execution, management and continuous improvement. We are looking
  for a person with exceptional analytical skills, a hands-on approach, and a business
  owner mentality. KEY RESPONSIBILITIES: Develop strategy and roadmap for underwriting
  of products; drive continuous improvement of existing products to achieve business
  objectives As an individual contributor, frame the credit product design, approach
  to underwriting analysis and modeling from beginning to end and simulate, iterate,
  validate the credit underwriting, offer terms Be a hands-on leader that works with
  data analysts, cross-functionally and with external vendors to design, test, deliver,
  and monitor new underwriting and ongoing account management for our credit/ liquidity
  products including Paycheck Advance, Overdraft, and Credit Builder. Work closely
  with internal stakeholders including: Finance to ensure a well-managed process for
  provisioning, true-up and release of loss allowances, and for funding strategy and
  execution; Legal/compliance for regulatory requirements Interface with Bank partners
  on risk-related agenda and processes ABOUT YOU: Credit Risk strategist - Has experience
  in credit risk domain throughout the lifecycle of credit and liquidity products
  Critical thinker - consider problems from all angles to remove bias and touch bottom
  on key assumptions Creative problem-solver - able to find creative solutions that
  finds win win across constraints and objectives Results-oriented - You ground contributions
  in real business and customer impact and prioritize effectively to maximize speed-to-impact.&nbsp;
  Fast learner - you have no problem picking up new skills or tools to get the job
  done. Intellectually curious - seek to understand the why behind the numbers and
  love nerding out over a new insight Exceptional written and oral communication skills.
  You drive alignment through grounded arguments, interpersonal skills, and negotiation
  skills.&nbsp;&nbsp; Thrive when working in a fast-moving, ambiguous environment
  Excited by large breadth of problem areas REQUIREMENTS: 6+ years of management experience
  in standing up successful new underwriting for credit / liquidity products in digital
  and start-up environments Deep knowledge and experience of underwriting and credit
  management domains including cash flow and credit data based underwriting, credit
  and banking data environments, successful underwriting / offer principles that balance
  revenue and risk, experiment design related to credit, customer behavior, risk modeling
  and ongoing portfolio management processes Demonstrated competencies and capabilities
  in credit risk analytics across the lifecycle for different products including technical
  skills in SQL, Python and other modeling tools Masters or Undergraduate degree with
  a quantitative concentration Exceptional written and oral communication skills.
  Strong people leader and collaborator. Able to handle competing priorities and influence
  leadership decision-making This role has a base salary range of $180,000.00 to $250,000.00.
  Compensation is determined based on experience, skill level, and qualifications,
  which are assessed during the interview process. Current offers a competitive total
  rewards package which includes base salary, equity, and comprehensive benefits.
  BENEFITS: Competitive salary&nbsp; Meaningful equity in the form of stock options&nbsp;
  401(k) plan Discretionary performance bonus program&nbsp; Biannual performance reviews
  Medical, Dental and Vision premiums covered at 100% for you and your dependents&nbsp;
  Flexible time off and paid holidays&nbsp; Generous parental leave policy Commuter
  benefits&nbsp; Fitness benefits Healthcare and Dependent care FSA benefit&nbsp;
  Employee Assistance Programs focused on mental health&nbsp; Healthcare advocacy
  program for all employees&nbsp; Access to mental health apps&nbsp; Team building
  activities Our modern Chelsea-based office with open floor plan, stocked kitchen,
  and catered lunches'
