description_html: '<b>Why Numeric</b><p>Every business relies on accounting. Yet most
  software in the space was built in the early 2000s — clunky, slow, and miles behind
  where AI is today. At the same time, accounting teams are being crushed by a growing
  data problem: more systems, more volume, more complexity, and not enough people
  to keep up.</p><p><br><strong>Numeric is building the modern financial data platform
  for accounting and finance.</strong> We weave together data, workflows, and AI-first
  products so accounting teams can move from manually pushing numbers in spreadsheets
  to architecting the financial data set and designing workflows that do the work
  for them.</p><p>We have strong product–market fit and a growing base of customers
  who love our product — including Plaid, Brex, OpenAI, and many more. We’re backed
  by top-tier investors including Menlo Ventures, IVP, Founders Fund, and 8VC, along
  with founders and executives from Ramp, Segment, and other category-defining companies.<br></p><b>About
  the role</b><p>We’re building a world-class growth engine, and we’re missing a very
  specific type of person: someone who operates like a <strong>product manager for
  the go-to-market org.</strong></p><p>Your mandate is to:</p><ul><li><p>Work horizontally
  across marketing, sales, and post-sales</p></li><li><p>Understand how work really
  gets done</p></li><li><p>Design and ship internal tools, automations, and micro-products
  that 10x the output of the team</p></li></ul><p>If successful, you''ll impact the
  growth trajectory of the entire company and employ the same diagnostic acumen +
  problem solving prowess that a best in class PM leverages. <br></p><b>What you’ll
  do<br>Your first big tour of duty will be <strong>building the engine behind our
  content program</strong>:</b><p>We already produce excellent content (webinars,
  interviews, long-form pieces, templates). Today, we’re probably using ~5% of what
  that content <em>could</em> do for us.</p><p>Your job is to turn that content into
  a <strong>compounding, systematized growth engine</strong> — something that makes
  our “company brain” a little smarter with every piece of content.</p><p>Over time,
  you’ll expand this approach beyond content into events, ABM, ads, product marketing,
  partnerships, and sales to ensure every person on the GTM is operating at the highest
  possible level. <br>This means:</p><ul><li><p><strong>Own the full lifecycle of
  internal “products”</strong><br>From problem discovery → spec → build → rollout
  → adoption → iteration. Talk to your “users” (our internal GTM teams), look at usage
  data, and continually refine.</p></li><li><p><strong>Building internal tools, micro-products,
  and automations</strong><br>Use no-code / low-code / light code (Zapier, Make, n8n,
  Notion, Airtable, Webflow, Supabase, scripts, AI agents, etc.) to ship scrappy but
  powerful tools that do things like:</p><ul><li><p>Turn a single webinar into dozens
  of assets across channels</p></li><li><p>Transform Gong calls into structured insights
  our team can actually use</p></li><li><p>Make it trivial to spin up and measure
  repeatable campaigns</p></li></ul></li><li><p><strong>Turn our data into a “second
  brain” for go-to-market</strong><br>Design systems that ingest customer conversations,
  content, and campaign performance, and make that knowledge searchable, reusable,
  and actionable for marketing, sales, and solutions.</p></li><li><p><strong>Drive
  experiments that move real numbers</strong><br>Prototype and run experiments that
  increase reach, speed, personalization, and conversion. Instrument them, measure
  what matters, and kill what doesn’t work quickly.</p><p></p></li></ul><b>What makes
  us excited about you</b><ul><li><p><strong>You’re a systems thinker who loves to
  build.</strong><br>You see funnels, workflows, and messy processes and instinctively
  start drawing boxes and arrows. You get energy from turning chaos into clean systems
  that actually run.</p></li><li><p><strong>You’re obsessed with new tools and the
  frontier.</strong><br>You play with AI tools (Claude, GPT, etc.), no-code platforms,
  and prototypes on nights and weekends — not because you have to, but because you’re
  genuinely curious. You’ve built or glued together workflows using tools like Zapier,
  Make, n8n, Notion, Airtable, Webflow, Supabase, Google Sheets, AirOps, Retool, Replit,
  etc. You’ve “vibe-coded” a few side projects for fun.</p></li><li><p><strong>You’re
  comfortable living close to the data.</strong><br>You’re happy pulling from CRMs,
  analytics tools, content libraries, and call transcripts, and shaping them into
  something people can actually use.</p></li><li><p><strong>You care about outcomes,
  not just output.</strong><br>You want to see a chart move: more qualified leads,
  higher conversion, faster cycle times. You’re comfortable defining success and being
  measured against it.</p></li><li><p><strong>You communicate clearly and work cross-functionally.</strong><br>You
  can sit with a content marketer, a BDR, and a solutions lead, understand their world,
  and translate it into tooling and workflows that make them say, “Oh my god, this
  makes my life so much easier.”</p></li><li><p><strong>You’re creative as hell —
  and okay being wrong a lot.</strong><br>You have a fountain of ideas. Many will
  be bad; that doesn’t bother you. You run experiments, learn quickly, and keep moving.</p><p></p></li></ul><b>How
  we work</b><p>We work in person out of our offices in <strong>San Francisco, New
  York, and London</strong><br>(in-office by default, with flexibility to manage your
  schedule like an adult).</p><p>We strongly believe we’ll only be successful if everyone
  on the team is anchored in a shared set of principles:</p><ul><li><p><strong>Brick
  by Brick</strong> – We win by executing every day, in every domain. No silver bullets.</p></li><li><p><strong>Love
  the Game</strong> – We care a lot. About the craft, the details, and the people
  we work with.</p></li><li><p><strong>SALY (Same As Last Year) is banned</strong>
  – We don’t copy old patterns just because “that’s how it’s done.” We take a first-principles
  approach, especially in a field that’s been stale for decades.</p></li><li><p><strong>Own
  the Outcome</strong> – High trust, high ownership. We hire builders and expect them
  to solve real problems, not just ship tasks.</p></li><li><p><strong>Earn the Right</strong>
  – Come in, crush it, and doors will open. We hire for slope over y-intercept and
  extend people large mandates. <br></p></li></ul><p>And equally important: We take
  building the business seriously, but <strong>we don’t take ourselves too seriously.</strong><br>If
  you read this and thought, “That sounds like exactly how I like to work,” we’d love
  to talk.</p>'
description_text: 'Why Numeric Every business relies on accounting. Yet most software
  in the space was built in the early 2000s — clunky, slow, and miles behind where
  AI is today. At the same time, accounting teams are being crushed by a growing data
  problem: more systems, more volume, more complexity, and not enough people to keep
  up. Numeric is building the modern financial data platform for accounting and finance.
  We weave together data, workflows, and AI-first products so accounting teams can
  move from manually pushing numbers in spreadsheets to architecting the financial
  data set and designing workflows that do the work for them. We have strong product–market
  fit and a growing base of customers who love our product — including Plaid, Brex,
  OpenAI, and many more. We’re backed by top-tier investors including Menlo Ventures,
  IVP, Founders Fund, and 8VC, along with founders and executives from Ramp, Segment,
  and other category-defining companies. About the role We’re building a world-class
  growth engine, and we’re missing a very specific type of person: someone who operates
  like a product manager for the go-to-market org. Your mandate is to: Work horizontally
  across marketing, sales, and post-sales Understand how work really gets done Design
  and ship internal tools, automations, and micro-products that 10x the output of
  the team If successful, you''ll impact the growth trajectory of the entire company
  and employ the same diagnostic acumen + problem solving prowess that a best in class
  PM leverages. What you’ll do Your first big tour of duty will be building the engine
  behind our content program : We already produce excellent content (webinars, interviews,
  long-form pieces, templates). Today, we’re probably using ~5% of what that content
  could do for us. Your job is to turn that content into a compounding, systematized
  growth engine — something that makes our “company brain” a little smarter with every
  piece of content. Over time, you’ll expand this approach beyond content into events,
  ABM, ads, product marketing, partnerships, and sales to ensure every person on the
  GTM is operating at the highest possible level. This means: Own the full lifecycle
  of internal “products” From problem discovery → spec → build → rollout → adoption
  → iteration. Talk to your “users” (our internal GTM teams), look at usage data,
  and continually refine. Building internal tools, micro-products, and automations
  Use no-code / low-code / light code (Zapier, Make, n8n, Notion, Airtable, Webflow,
  Supabase, scripts, AI agents, etc.) to ship scrappy but powerful tools that do things
  like: Turn a single webinar into dozens of assets across channels Transform Gong
  calls into structured insights our team can actually use Make it trivial to spin
  up and measure repeatable campaigns Turn our data into a “second brain” for go-to-market
  Design systems that ingest customer conversations, content, and campaign performance,
  and make that knowledge searchable, reusable, and actionable for marketing, sales,
  and solutions. Drive experiments that move real numbers Prototype and run experiments
  that increase reach, speed, personalization, and conversion. Instrument them, measure
  what matters, and kill what doesn’t work quickly. What makes us excited about you
  You’re a systems thinker who loves to build. You see funnels, workflows, and messy
  processes and instinctively start drawing boxes and arrows. You get energy from
  turning chaos into clean systems that actually run. You’re obsessed with new tools
  and the frontier. You play with AI tools (Claude, GPT, etc.), no-code platforms,
  and prototypes on nights and weekends — not because you have to, but because you’re
  genuinely curious. You’ve built or glued together workflows using tools like Zapier,
  Make, n8n, Notion, Airtable, Webflow, Supabase, Google Sheets, AirOps, Retool, Replit,
  etc. You’ve “vibe-coded” a few side projects for fun. You’re comfortable living
  close to the data. You’re happy pulling from CRMs, analytics tools, content libraries,
  and call transcripts, and shaping them into something people can actually use. You
  care about outcomes, not just output. You want to see a chart move: more qualified
  leads, higher conversion, faster cycle times. You’re comfortable defining success
  and being measured against it. You communicate clearly and work cross-functionally.
  You can sit with a content marketer, a BDR, and a solutions lead, understand their
  world, and translate it into tooling and workflows that make them say, “Oh my god,
  this makes my life so much easier.” You’re creative as hell — and okay being wrong
  a lot. You have a fountain of ideas. Many will be bad; that doesn’t bother you.
  You run experiments, learn quickly, and keep moving. How we work We work in person
  out of our offices in San Francisco, New York, and London (in-office by default,
  with flexibility to manage your schedule like an adult). We strongly believe we’ll
  only be successful if everyone on the team is anchored in a shared set of principles:
  Brick by Brick – We win by executing every day, in every domain. No silver bullets.
  Love the Game – We care a lot. About the craft, the details, and the people we work
  with. SALY (Same As Last Year) is banned – We don’t copy old patterns just because
  “that’s how it’s done.” We take a first-principles approach, especially in a field
  that’s been stale for decades. Own the Outcome – High trust, high ownership. We
  hire builders and expect them to solve real problems, not just ship tasks. Earn
  the Right – Come in, crush it, and doors will open. We hire for slope over y-intercept
  and extend people large mandates. And equally important: We take building the business
  seriously, but we don’t take ourselves too seriously. If you read this and thought,
  “That sounds like exactly how I like to work,” we’d love to talk.'
