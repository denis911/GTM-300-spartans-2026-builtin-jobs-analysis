description_html: <b><strong>About Posh</strong></b><p>We are all social creatures,
  but the dominant “social” companies today have evolved into digital loneliness machines,
  driving isolation, anxiety, and mental health challenges around the world.</p><p>Human
  connection is lost. Posh is a beacon guiding us back.</p><p>Posh enables anyone
  to build an IRL community based on shared interests, while connecting consumers
  with the communities of people just like them. Founded by event organizers who were
  frustrated with the growing loneliness epidemic and the tools available to build
  their own event brand, we’ve built the ultimate platform for launching, monetizing,
  and finding IRL communities of people just like you. In just 5 years, Posh has grown
  to a team of 65, expanded to 7M+ users, secured $70m in venture funding, and facilitated
  over $300M in transactions.</p><b></b><b><strong>About the Role</strong></b><p>We’re
  hiring a <strong>GTM Engineer</strong> to build and own the revenue systems that
  power Sales, Success, and Partnerships. You will report to the Director of Revenue
  Operations.</p><p>This role combines <strong>systems administration and GTM engineering</strong>.
  You will be the owner of our GTM tools and the builder of the automation and AI
  agents that remove manual work from our go-to-market motion.</p><p>Your mandate
  is to keep core systems stable, clean, and trusted, while continuously engineering
  workflows and agents that reduce human effort and increase GTM velocity.</p><p><strong>This
  is an in-person role based in our New York City office in the heart of SoHo</strong>.
  Building live experiences and building with soul are important for our customers,
  and we believe being and working together as a team is the best way for Posh to
  feel and achieve this. Events on Posh should be fun, alive, and driven with passion
  and we want to mirror this in our teams every day!</p><p></p><b><strong>What You’ll
  Own:</strong></b><p><strong>GTM Systems &amp; Integrations</strong></p><ul><li><p>Serve
  as the primary admin and technical owner for HubSpot &amp; Planhat</p></li><li><p>Evaluate
  new AI and GTM tools, make recommendations, and implement new tools</p></li><li><p>Manage
  pipelines, lifecycle logic, routing rules, fields, and data models</p></li><li><p>Maintain
  clean data flows and resolve identity and sync issues</p></li><li><p>Document systems
  and train GTM teams to ensure adoption and trust</p></li></ul><p><strong>Automation
  &amp; AI Agents</strong></p><ul><li><p>Design, build, and own AI-driven agents that
  automate recurring GTM workflows</p></li><li><p>Deliver automations that drive core
  Sales metrics such as inbound lead counts, reply rates, meeting to close win rate,
  etc., with dashboards and attribution tactics that reflect impact clearly. Bonus
  if you can successfully source and close deals on a completely automated basis.</p></li><li><p>Identify
  manual GTM work that should not require human intervention and eliminate it</p></li><li><p>Build
  end-to-end automations across HubSpot, Planhat, Clay, Zapier, and APIs</p></li><li><p>Embed
  intelligence into routing, enrichment, follow-ups, alerts, and handoffs</p></li><li><p>Measure
  automation impact in hours saved, speed, and GTM throughput</p></li></ul><b><strong>What
  You’ll Bring:</strong></b><ul><li><p>2-4 years in GTM Engineering, RevOps, SalesOps,
  Business Systems, or similar role</p></li><li><p>Hands-on experience managing a
  modern CRM &amp; workflow tools (HubSpot, Salesforce, Zapier, etc.)</p></li><li><p>Strong
  understanding of core sales funnel metrics and how to move the needle with automations
  and AI</p></li><li><p>SQL fluency and experience connecting tools to centralized
  reporting infrastructure</p></li><li><p>Strong communication skills to collaborate
  on systems with non-technical users</p></li><li><p>Comfort with APIs and light scripting
  in Python or JavaScript</p></li></ul><b><strong>Nice to Haves</strong></b><ul><li><p>Experience
  with Clay, Gong, Default, Unity, Artisan, or similar enrichment platforms</p></li><li><p>Experience
  in marketplaces or B2B2C business models</p></li><li><p>Experience owning CRM automations
  and improvements</p></li><li><p>Comfort navigating early-stage ambiguity and fast
  execution cycles</p></li></ul><p>Posh provides equal employment opportunities to
  all employees and applicants for employment and prohibits discrimination and harassment
  of any type without regard to race, color, religion, age, sex, national origin,
  disability status, genetics, protected veteran status, sexual orientation, gender
  identity or expression, or any other characteristic protected by federal, state
  or local laws.</p><p>This policy applies to all terms and conditions of employment,
  including recruiting, hiring, placement, promotion, termination, layoff, recall,
  transfer, leaves of absence, compensation and training.</p><p>Posh is committed
  to providing reasonable accommodations for qualified individuals with disabilities
  in our job application procedures. Please let us know if you need assistance or
  accommodation due to a disability</p>
