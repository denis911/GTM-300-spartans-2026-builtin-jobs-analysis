description_html: '<b>The Opportunity</b>  <br>As a Data Analytics Engineer focused
  on Salesforce analytics within the Business Data Strategy &amp; Business Technology
  (BDSBT) team, you will play a critical role in enabling governed, actionable insights
  that improve productivity, customer experience, and operational efficiency-while
  aligning with enterprise data strategy and governance standards. Rather than simply
  building solutions, you will guide the design and implementation of analytics capabilities
  by translating complex business requirements into clear technical specifications
  for enterprise engineers. Acting as the bridge between enterprise data architecture
  and business-side reporting needs, you will ensure Salesforce data flows appropriately
  into the enterprise data warehouse, support in-app decision-making for real-time
  needs, and uphold guardrails for formal reporting through the governed semantic
  layer. Success requires deep understanding of data pipelines, models, and source
  systems, combined with the ability to influence stakeholders and maintain transparency
  through documentation and disciplined work tracking.  <br><b>The Team</b>  <br>The
  Business Data Strategy &amp; Business Technology (BDSBT) team is a dynamic group
  of data stewards, data strategists, and data analytics engineers in Operations''
  Business Intelligence, Reporting, and Analytics (BIRA) organization turning complex
  business needs into actionable technology solutions. We foster a culture of transparency,
  collaboration, and disciplined execution and regularly collaborate with Operations,
  Enterprise Technology &amp; Experience (ETX), and BIRA colleagues, serving as the
  critical connector between business priorities and technical delivery. What makes
  us unique is our ability to blend deep technical expertise with business acumen,
  ensuring every solution aligns with strategy and accelerates outcomes.  <br><b>The
  Impact </b> <br>As a Data Analytics Engineer focused on Salesforce analytics and
  other Operations platforms, you will build advanced logic using native Salesforce
  tools (Lightning App Builder, flows, context services) to create dynamic, contextual,
  and actionable analytics experiences. Your work will ensure that embedded dashboards
  and reports are not just visible, but intelligently tailored to user roles and record
  context, enabling real-time decision-making and direct action within the workflow.
  You will also design and maintain dataflows and recipes to prepare and integrate
  data for analytics, and leverage APIs to deliver personalized insights, making analytics
  a seamless and essential part of the user experience.  You will ensure Salesforce
  operational data integrates seamlessly into the Enterprise Data Warehouse and that
  in-app analytics support real-time decisions. In this role, you will apply governance
  practices to maintain data quality, standardize KPI logic, and build trust in reporting
  and collaborate with Data Engineering to deliver reliable, documented pipelines
  and partner with analytics teams to harmonize Salesforce insights with governed
  Tableau reporting. By promoting reusable components, tracking work in Jira, and
  supporting prioritization, you enable efficiency, transparency, and consistent metrics
  across platforms.  <br><b>The Minimum Qualifications</b>  <br><ul><li>Bachelor''s
  degree  in Computer Science, Engineering, Information Systems or related technical
  field.</li><li>3+ years'' experience with Salesforce</li><li>2+ years in data engineering,
  data modeling, data integration or data warehousing and working with technology
  partners.</li><li>3+ years'' experience with BI tools such as Tableau, Alteryx,
  Power BI or similar technologies.</li><li>2+ years'' experience with Master Data
  Management and Data Governance frameworks</li><li>2+ years'' experience writing
  and using SQL or SOQL.</li></ul><br><b>The Ideal Qualifications</b>  <br><ul><li>Prior
  experience in the financial services industry bridging the gap between business
  and technology data analytics and reporting needs.</li></ul><br><ul><li>Experience
  in agile environments and proficiency in using Jira</li></ul><br><ul><li>Demonstrated
  leadership in driving transparency and collaboration.</li></ul><br><b>What to Expect
  as Part of MassMutual and the Team</b>  <br><ul><li>Regular meetings with the BDSBT
  and BIRA teams.</li></ul><br><ul><li>Focused one-on-one meetings with your manager.</li></ul><br><ul><li>Networking
  opportunities including access to Asian, Hispanic/Latinx, African American, women,
  LGBTQIA+, veteran and disability-focused Business Resource Groups.</li></ul><br><ul><li>Access
  to learning content on Degreed and other informational platforms.</li></ul><br><ul><li>Your
  ethics and integrity will be valued by a company with a strong and stable ethical
  business with industry leading pay and benefits.</li></ul><br>#LI-SB1<br>MassMutual
  is an equal employment opportunity employer. We welcome all persons to apply.<br>If
  you need an accommodation to complete the application process, please contact us
  and share the specifics of the assistance you need. <br>California residents: For
  detailed information about your rights under the California Consumer Privacy Act
  (CCPA), please visit our California Consumer Privacy Act Disclosures page.<br><b>Salary
  Range:</b> $115,900-$152,100'
