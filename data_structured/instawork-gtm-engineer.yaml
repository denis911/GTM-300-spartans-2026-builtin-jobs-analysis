company_overview: 'Our digital marketplace connects thousands of businesses and more
  than six million workers, actively working to help bridge the labor demand/supply
  gap. Instawork helps businesses in food & beverage, hospitality, and warehouse/logistics
  industries fill temporary and permanent roles in more than 40 U.S. markets.We have
  been fortunate to be funded by world-class investors in Silicon Valley including:
  Benchmark (Bill Gurley), Y Combinator, Spark Capital, Google Ventures, Greylock
  Capital, Four Rivers Group, Craft Ventures, and many more. Leveraging our accelerated
  growth, we will continue to expand throughout the U.S. and globally in order to
  revolutionize the labor market.Instawork recently raised $60 million in Series D
  financing, bringing a total funding to over $160 million. The new funding round
  allows Instawork to accelerate investment in its AI-powered mobile app and platform
  that connects over 6 million skilled hourly workers with tens of thousands of businesses.Our
  values help us craft impactful products and be extraordinary colleagues to each
  other:Empathy, Trust, and CandorBeing empathetic helps build trust in our community
  and company, and fosters successful decision-making.Always Be LearningWe learn eagerly,
  from different teams within and outside the company. Respectful debate makes our
  company stronger.Act Like an OwnerWe have a strong ownership mentality. Every person
  on the team has the potential to make a huge impact.Bias for ActionWe practice high-velocity
  decision-making, despite encountering ambiguity frequently.'
