description_html: <p><p>Instawork is on a mission to create meaningful economic opportunities
  for skilled hourly professionals in communities around the globe. Our AI-powered
  labor marketplace helps local businesses scale, and enables global technology companies
  to push the frontiers of robotics and AI. Backed by world-class investors like Benchmark,
  Spark Capital, Craft Ventures, Greylock, Y Combinator, and others, we’re looking
  for exceptional talent to reimagine the way the world works.</p></p><p><strong>About
  the role<br></strong>As the GTM Engineer, you will build technical solutions to
  business problems. You will design and own tools that will have a direct impact
  on sales and productivity. This role is a blend of Revenue Operations and GTM engineering,
  all relying on an advanced use of AI. Reporting to our VP of Business Operations,
  this is an individual contributor role with potential for growth into people management.&nbsp;</p><p><strong>Who
  You Are:</strong></p><ul><li><strong>5+ years experience</strong> in revenue operations,
  GTM engineering, data analytics, management consulting, or similar roles</li><li><strong>Proficiency
  in Python and SQL is required</strong>; experience with API integration</li><li>Experience
  with the <strong>GTM Tech Stack</strong> is a plus, e.g. Salesforce, Outreach, Clay</li><li>Experience
  with <strong>AI code copilots</strong> is a plus, e.g. Claude Code, Cursor</li><li>Obsessed
  with automation and eliminating manual work</li></ul><p><strong>What You'll Do:</strong></p><ul><li><strong>Build
  GTM automation tools:</strong> Build tools to increase the efficiency of our sales
  team. You will focus on specific sales motions and find ways to 10x their impact.
  You will architect a combination of Python notebooks, n8n workflows, and other tools,
  to build things such as a referral identification system or a lead scoring model</li><li><strong>Own
  Revenue Systems &amp; core GTM processes:</strong> Own operational excellence in
  key processes including pipeline tracking, process optimization, lead enrichment.
  Maintain and enhance our revenue tech stack (CRM, automation tools, data platforms)&nbsp;</li><li><strong>Drive
  projects from idea -&gt; impact:</strong> Evaluate commercial strategy to surface
  gaps and drive prioritization across the organization. Partner with Sales and Product
  to ship GTM innovations with high velocity and ownership&nbsp;</li></ul><p><strong>For
  SF / IL / NY based applicants:</strong></p><ul><li>The base salary for this position
  is $160K - $200K</li><li>This position is eligible for equity in the form of stock
  options</li><li>This position is eligible for Instawork benefits, including:&nbsp;</li><ul><li>Medical,
  dental, and vision plans with coverage beginning on the date of hire</li><li>Flexible
  paid time off</li><li>At least 8 paid company holidays annually</li><li>Phone stipend</li><li>Commuter
  stipend</li><li>Supplemental pay on qualified leaves</li><li>Employee health savings
  accounts (HSA) contribution</li><li>Flexible spending plans</li><li>401K plan</li><li>Perkspot
  - discount program through Lumity</li></ul></ul><p>A variety of factors are considered
  when determining someone’s compensation including a candidate’s professional background,
  experience, and location. Final offer amounts may vary from the amounts listed above.</p><p><p><strong><span>Our
  Values&nbsp;</span></strong></p><ul><li><p><strong><span>Empathy, Trust &amp; Candor</span><br></strong>We
  put ourselves in the shoes of our colleagues and customers and don’t shy away from
  uncomfortable conversations, instead building trust through honest and direct feedback.</p></li><li><p><strong><span>Bias
  for Action</span><br></strong>We practice high-velocity decision-making, clear-eyed
  that we often operate with incomplete information. Growing quickly means it’s OK
  to be wrong, so long as we learn from our mistakes and course correct!</p></li><li><p><strong><span>Always
  Be Learning</span><br></strong>We’re a curious bunch, and with AI transforming our
  workplace we encourage everyone to learn from each other, compounding our knowledge
  and experience to help us change an entire industry.</p></li><li><p><strong><span>Act
  Like an Owner</span><br></strong>We work long, hard, and smart, building products
  that delight our users and drive growth. Your ability to impact Instawork is limited
  only by your courage and conviction, not your job description.</p></li></ul><p><strong><span>About
  Instawork</span></strong></p><p>Founded in 2015,&nbsp;Instawork is the nation’s
  leading online labor marketplace for food services, hospitality, light industry,
  and logistics, connecting more than 7M skilled workers with local restaurants, hotels,
  warehouses, stadiums, and more. Our AI-powered platform serves thousands of businesses
  across more than 50 major markets in the United States and Canada. We're not just
  helping fill shifts, we're supporting local economies—and we're just getting started!</p><p>Instawork
  has been featured by CBS News, The Wall Street Journal, The Washington Post, and
  the Associated Press. Forbes included us on their Next Billion Dollar Startups list;
  RetailTech Breakthrough named us Workforce Hiring Solution of the Year for 2025;
  and Inc. 5000 recognized us as one of the country's top 10% fastest-growing companies
  two years in a row. But what matters most is our impact. We're solving real problems
  for real people, and we’re doing it at scale.</p><p>Join our team to help us build
  something that matters! We’re looking for superstars who want to help us shape the
  future of work. With hubs in San Francisco, Bangalore, and Chicago, city offices
  in New York, Phoenix, and Singapore, we're back to working together in-person five
  days a week because we believe the best ideas happen when great people collaborate
  face-to-face. We also value diverse perspectives and encourage applications from
  candidates of all backgrounds.<br>Ready to make an impact? Learn more at www.instawork.com/about.</p><p>Personnel
  Privacy Policy</p><br></p>
