company_overview: Listen is an autonomous market researcher that makes research simple
  and fast. Share your business question, and our AI handles everything - designing
  the interviews, finding the right participants, and analyzing responses. Whether
  you're testing products or exploring new markets, Listen is a skilled researcher
  that works 24/7, delivering insights in hours instead of weeks. Listen is trusted
  by Google, Microsoft, SKIMS, Nestlé and hundreds of enterprises to unlock customer
  understanding at scale.
