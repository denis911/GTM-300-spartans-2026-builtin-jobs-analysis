  and energetic operator who''s excited to join a fast-growing, early-stage startup
  in a career-defining role. You''re willing to roll up your sleeves – no task is
  too small when it helps move the company forward. Min. 5+ years in GTM operations,
  sales engineering, or RevOps, ideally with experience building outbound motions
  and SDR systems. Prior experience in technical sales, data engineering, or growth/marketing
  operations is a plus. Background Listen Labs is an AI-powered research platform
  that helps teams uncover insights from customer interviews in hours — not months.
  We help customers analyze conversations, surface themes, and make faster, smarter
  product decisions. Company highlights — entirely product-led: World-Class Team:
  Founded by serial entrepreneurs (previous AI exit), former co-founders, and talent
  from Jane Street, Twitter, Stripe, Affirm, Bain, Goldman Sachs, and many more Sequoia-backed
  startups (plus IOI/ICPC backgrounds). Hypergrowth: We’re a 40-person team backed
  by Sequoia, growing from $0 to a $14M run-rate in under a year. We move fast, care
  deeply about craft, and love working with people who take ownership. Traction: Rapid
  growth across segments with enterprise wins at Google, Microsoft, Nestlé, and P&amp;G.
  Performance: Industry-leading win rate driven by a highly differentiated product.
  Market Validation: Consistently winning customers across all segments with over
  six-figure lands that lead to quick expansions. Viral Product: Interviews are shared
  with tens of thousands of viewers, fueling PLG, organic expansion, and daily inbound
  from Fortune 500s. What You’ll Do Outbound infrastructure: Design and build scalable
  systems for prospecting, enrichment, and outreach – owning the technical backbone
  of our outbound motion from data pipelines to automation workflows. SDR enablement
  &amp; optimization: Equip SDRs with world-class tooling, playbooks, and data insights
  to maximize efficiency and conversion rates across the funnel. Data &amp; targeting
  strategy: Build ICP models, scoring frameworks, and segmentation logic to ensure
  outbound efforts are laser-focused on high-intent, high-fit accounts. Tech stack
  ownership: Evaluate, implement, and optimize GTM tools (CRM, sequencing, enrichment,
  intent data) to create a seamless, high-performance outbound engine. Performance
  analytics: Track, analyze, and report on outbound metrics – from reply rates to
  pipeline contribution – and drive continuous improvement through experimentation
  and iteration. Cross-functional alignment: Work with Heads of Growth, Sales, Product,
  and Engineering to ensure outbound systems integrate seamlessly with broader GTM
  strategy and product capabilities. Who You Are You''re a tooling expert, opinionated
  about best-in-class GTM tech stacks and experienced in evaluating, implementing,
  and optimizing tools that drive outbound performance at scale. You''re hands-on
  and resourceful, comfortable shifting between high-level strategy and execution,
  from designing data models to writing SQL queries or automation scripts yourself.
  You''re highly analytical and creative, able to blend technical problem-solving
  with strategic thinking about go-to-market efficiency and scale. You care deeply
  about craft and impact, not just output. You take pride in doing great work, even
  on small details. You''re curious and collaborative, eager to learn from teammates
  across functions and energized by talking to SDRs and sales reps to understand their
  workflows and build systems that drive results. Life at Listen Labs Competitive
  Compensation: We’re backed by world-class investors, including Sequoia Capital,
  Conviction, AI Grant, and Pear VC, and offer competitive compensation packages with
  meaningful equity ownership. Over $30B in market cap has been created in adjacent
  industries (Medallia, AlphaSense, GLG, Ipsos, Kantar). Our Sequoia partner, Bryan
  Schreier , was the first investor in Qualtrics – a $12B company tackling similar
  problems to ours. Benefits that Support You: Comprehensive healthcare and dental
  coverage, flexible time off to recharge, and an environment that values balance
  and trust. Room to Grow: As an early member of the team, you’ll have the opportunity
  to have end-to-end ownership over new responsibilities, shape processes from scratch,
  and grow alongside the company. We value people who want to stretch beyond their
  role and build something lasting.'
