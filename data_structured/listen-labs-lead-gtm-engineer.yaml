description_html: '<p><strong>TL;DR:</strong> We''re hiring a Lead GTM Engineer to
  work directly with our Head of Growth to scale Listen from $XX → $XXX ARR. You''re
  a technical, systems-oriented, and energetic operator who''s excited to join a fast-growing,
  early-stage startup in a career-defining role. You''re willing to roll up your sleeves
  – no task is too small when it helps move the company forward.</p><p>Min. 5+ years
  in GTM operations, sales engineering, or RevOps, ideally with experience building
  outbound motions and SDR systems. Prior experience in technical sales, data engineering,
  or growth/marketing operations is a plus.</p><p></p><p><strong>Background</strong></p><p>Listen
  Labs is an AI-powered research platform that helps teams uncover insights from customer
  interviews in hours — not months. We help customers analyze conversations, surface
  themes, and make faster, smarter product decisions.</p><p></p><p><strong>Company
  highlights — entirely product-led:</strong></p><ul><li><p><strong>World-Class Team:</strong>
  Founded by serial entrepreneurs (previous AI exit), former co-founders, and talent
  from Jane Street, Twitter, Stripe, Affirm, Bain, Goldman Sachs, and many more Sequoia-backed
  startups (plus IOI/ICPC backgrounds).</p></li><li><p><strong>Hypergrowth:</strong>
  We’re a 40-person team backed by Sequoia, growing from $0 to a $14M run-rate in
  under a year. We move fast, care deeply about craft, and love working with people
  who take ownership.</p></li><li><p><strong>Traction: </strong>Rapid growth across
  segments with enterprise wins at Google, Microsoft, Nestlé, and P&amp;G.</p></li><li><p><strong>Performance:
  </strong>Industry-leading win rate driven by a highly differentiated product.</p></li><li><p><strong>Market
  Validation: </strong>Consistently winning customers across all segments with over
  six-figure lands that lead to quick expansions.</p></li><li><p><strong>Viral Product:</strong>
  Interviews are shared with tens of thousands of viewers, fueling PLG, organic expansion,
  and daily inbound from Fortune 500s.</p><p></p></li></ul><p><strong>What You’ll
  Do</strong></p><ul><li><p><strong>Outbound infrastructure:</strong> Design and build
  scalable systems for prospecting, enrichment, and outreach – owning the technical
  backbone of our outbound motion from data pipelines to automation workflows.</p></li><li><p><strong>SDR
  enablement &amp; optimization:</strong> Equip SDRs with world-class tooling, playbooks,
  and data insights to maximize efficiency and conversion rates across the funnel.</p></li><li><p><strong>Data
  &amp; targeting strategy:</strong> Build ICP models, scoring frameworks, and segmentation
  logic to ensure outbound efforts are laser-focused on high-intent, high-fit accounts.</p></li><li><p><strong>Tech
  stack ownership:</strong> Evaluate, implement, and optimize GTM tools (CRM, sequencing,
  enrichment, intent data) to create a seamless, high-performance outbound engine.</p></li><li><p><strong>Performance
  analytics:</strong> Track, analyze, and report on outbound metrics – from reply
  rates to pipeline contribution – and drive continuous improvement through experimentation
  and iteration.</p></li><li><p><strong>Cross-functional alignment:</strong> Work
  with Heads of Growth, Sales, Product, and Engineering to ensure outbound systems
  integrate seamlessly with broader GTM strategy and product capabilities.</p><p></p></li></ul><p><strong>Who
  You Are</strong></p><ul><li><p>You''re a tooling expert, opinionated about best-in-class
  GTM tech stacks and experienced in evaluating, implementing, and optimizing tools
  that drive outbound performance at scale.</p></li><li><p>You''re hands-on and resourceful,
  comfortable shifting between high-level strategy and execution, from designing data
  models to writing SQL queries or automation scripts yourself.</p></li><li><p>You''re
  highly analytical and creative, able to blend technical problem-solving with strategic
  thinking about go-to-market efficiency and scale.</p></li><li><p>You care deeply
  about craft and impact, not just output. You take pride in doing great work, even
  on small details.</p></li><li><p>You''re curious and collaborative, eager to learn
  from teammates across functions and energized by talking to SDRs and sales reps
  to understand their workflows and build systems that drive results.</p><p></p></li></ul><p><strong>Life
  at Listen Labs</strong></p><ul><li><p><strong>Competitive Compensation: </strong>We’re
  backed by world-class investors, including Sequoia Capital, Conviction, AI Grant,
  and Pear VC, and offer competitive compensation packages with meaningful equity
  ownership.</p><ul><li><p>Over $30B in market cap has been created in adjacent industries
  (Medallia, AlphaSense, GLG, Ipsos, Kantar). Our Sequoia partner, <u>Bryan Schreier</u>,
  was the first investor in Qualtrics – a $12B company tackling similar problems to
  ours.</p></li></ul></li><li><p><strong>Benefits that Support You:</strong> Comprehensive
  healthcare and dental coverage, flexible time off to recharge, and an environment
  that values balance and trust.</p></li><li><p><strong>Room to Grow: </strong>As
  an early member of the team, you’ll have the opportunity to have end-to-end ownership
  over new responsibilities, shape processes from scratch, and grow alongside the
  company. We value people who want to stretch beyond their role and build something
  lasting.</p></li></ul>'
description_text: 'TL;DR: We''re hiring a Lead GTM Engineer to work directly with
