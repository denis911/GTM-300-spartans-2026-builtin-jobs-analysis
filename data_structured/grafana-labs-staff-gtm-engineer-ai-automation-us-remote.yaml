company_overview: Grafana Labs provides an open and composable monitoring and observability
  stack built around Grafana, the leading open source technology for dashboards and
  visualization. There are more than 5,000 Grafana Labs customers, including Bloomberg,
  Citigroup, Dell Technologies, Salesforce, and TomTom, and more than 20 million users
  of Grafana around the world. Grafana Labs helps companies manage their observability
  strategies with the LGTM Stack, which can be run fully managed with Grafana Cloud
  or self-managed with the Grafana Enterprise offerings, both featuring scalable metrics
  (Grafana Mimir), logs (Grafana Loki), and traces (Grafana Tempo) as well as extensive
  enterprise data source plugins, dashboard management, alerting, reporting, and security.
