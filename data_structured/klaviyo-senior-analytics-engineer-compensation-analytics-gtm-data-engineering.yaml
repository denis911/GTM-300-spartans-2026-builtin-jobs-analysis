company_overview: 'Klaviyo (NYSE: KVYO) is the B2C CRM. Powered by its built-in data
  platform and AI, Klaviyo combines marketing automation, analytics, and customer
  service into one unified solution, making it easy for businesses to know their customers
  and grow faster. Klaviyo (CLAY-vee-oh) helps over 183,000 brands like Mattel, Glossier,
  Daily Harvest, and Liquid Death deliver 1:1 experiences at scale, improve efficiency,
  and drive revenue.'
