company_overview: Wise is a global technology company, building the best way to move
  and manage the world's money. With Wise Account and Wise Business, people and businesses
  can hold 40 currencies, move money between countries and spend money abroad. Large
  companies and banks use Wise technology too; an entirely new network for the world's
  money. Launched in 2011, Wise is one of the world’s fastest growing, profitable
  tech companies. In fiscal year 2025, Wise supported around 15.6 million people and
  businesses, processing over $185 billion in cross-border transactions and saving
  customers around $2.6 billion.
