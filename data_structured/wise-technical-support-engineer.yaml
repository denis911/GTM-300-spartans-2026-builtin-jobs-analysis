description_html: '<b>Company Description</b><p></p><p>Wise is a global technology
  company, building the best way to move and manage the world’s money.<br><strong>Min
  fees. Max ease. Full speed.</strong></p><p>Whether people and businesses are sending
  money to another country, spending abroad, or making and receiving international
  payments, Wise is on a mission to make their lives easier and save them money.</p><p>As
  part of our team, you will be helping us create an entirely new network for the
  world''s money.<br><strong>For everyone, everywhere.</strong></p><p>More about <strong>our
  mission</strong> and <strong>what we offer</strong>.</p><p></p><b>Job Description</b><p></p><p>Technical
  Support Engineers ensure that our partners get a rapid and effective response when
  issues arise; from general questions about the behaviour of an API or webhook, to
  acting as a first-responder for a major incident. The team are experts in the Wise
  Platform APIs, and provide 24/7 coverage - based across Singapore, Tallinn, and
  Austin - in order to maintain the highest quality and reliability for partners’
  technical integrations.</p><p>&nbsp;</p><p># The Role</p><p>&nbsp;</p><p>We’re looking
  for a Technical Support Engineer for the Integration Success Team to scale our servicing
  capabilities for the Wise Platform in North America. You’ll be part of a global
  team whose main focus is ensure that Wise API integration gets an industry leading
  level of assistance when they need it. You will often take ownership of complex
  support: from API behaviour issues, to act as first-responders in major incidents
  and collaborate across global internal teams.&nbsp;</p><p>&nbsp;</p><p># Your mission</p><p>&nbsp;</p><ul><li><p>You’ll
  help support our API customers across different support channels and time zones
  -&nbsp; primarily with email in queues and also by phone or video conferencing in
  cases of critical issues.</p></li><li><p>You’ll develop a deep expertise in Wise
  API and SWIFT products and capabilities, and solid understanding of how Wise Platform
  partnerships have integrated their solution with us. You’ll collaborate with teams
  across Wise globally.</p></li><li><p>You’ll contribute to troubleshooting and solving
  issues that partners report, both independently and collaboratively with internal
  stakeholders such as engineering and commercial teams.</p></li><li><p>You’ll contribute
  to product feedback with engineering but sharing and capturing knowledge and trends
  of issues.</p></li></ul><p>&nbsp;</p><p># About You</p><p>&nbsp;</p><ul><li><p>You
  have previous experience in a technical support engineering role in an enterprise
  environment, and are familiar with support tooling and terminology</p></li><li><p>You’re
  confident in testing and debugging REST APIs, interpreting log and querying databases</p></li><li><p>You
  have strong organisation and prioritisation skills, and you’re able to focus on
  solving complex challenges at hand while setting expectations with stakeholders</p></li><li><p>You
  thrive in a support environment, and also drive proactive improvements and initiatives
  where you identify them.</p></li><li><p>You’re cool under pressure - can navigate
  and handle the response to several high severity incidents at once - incident management
  experience is preferable.</p></li><li><p>While this is not a developer role, having
  basic knowledge of some programming languages would be desirable (eg. Python, JavaScript)</p></li><li><p>The
  team works 24/5 service levels globally, you’ll be comfortable with some regular
  out-of-hours and on-call over the weekends and holidays on a rotational basis.</p></li><li><p>You
  work well in a team with a diverse group of people from all over the global and
  cultures and in different time zones.</p></li></ul><p>&nbsp;</p><p></p><b>Qualifications</b><p></p><p>Essential
  Skills</p><ul><li><p>Experience is a technical support role for an API product</p></li><li><p>Strong
  ability to test, troubleshoot REST APIs and understand API documentation</p></li><li><p>Strong
  communicator who can articulate complex technical concepts to a non-technical audience</p></li><li><p>Experience
  and willingness to be on call outside of normal working hours (compensated)</p></li><li><p>Familiarity
  with incident management processes</p></li></ul><p>&nbsp;</p><p>Nice to have</p><ul><li><p>Experience
  in payments / fintech&nbsp;</p></li><li><p>Enterprise customer environment experience</p></li><li><p>Programming
  in any language</p></li></ul><p></p><b>Additional Information</b><p></p><p></p><p>For
  everyone, everywhere. We''re people building money without borders&nbsp; — without
  judgement or prejudice, too. We believe teams are strongest when they are diverse,
  equitable and inclusive.</p><p>We''re proud to have a truly international team,
  and we celebrate our differences.<br>Inclusive teams help us live our values and
  make sure every Wiser feels respected, empowered to contribute towards our mission
  and able to progress in their careers.</p><p>If you want to find out more about
  what it''s like to work at Wise visit&nbsp;Wise.Jobs.</p><p>Keep up to date with
  life at Wise by following us on&nbsp;LinkedIn&nbsp;and&nbsp;Instagram.</p><p></p>'
description_text: 'Company Description Wise is a global technology company, building
  the best way to move and manage the world’s money. Min fees. Max ease. Full speed.
  Whether people and businesses are sending money to another country, spending abroad,
  or making and receiving international payments, Wise is on a mission to make their
  lives easier and save them money. As part of our team, you will be helping us create
  an entirely new network for the world''s money. For everyone, everywhere. More about
  our mission and what we offer . Job Description Technical Support Engineers ensure
  that our partners get a rapid and effective response when issues arise; from general
  questions about the behaviour of an API or webhook, to acting as a first-responder
  for a major incident. The team are experts in the Wise Platform APIs, and provide
  24/7 coverage - based across Singapore, Tallinn, and Austin - in order to maintain
  the highest quality and reliability for partners’ technical integrations. &nbsp;
  # The Role &nbsp; We’re looking for a Technical Support Engineer for the Integration
  Success Team to scale our servicing capabilities for the Wise Platform in North
  America. You’ll be part of a global team whose main focus is ensure that Wise API
  integration gets an industry leading level of assistance when they need it. You
  will often take ownership of complex support: from API behaviour issues, to act
  as first-responders in major incidents and collaborate across global internal teams.&nbsp;
  &nbsp; # Your mission &nbsp; You’ll help support our API customers across different
  support channels and time zones -&nbsp; primarily with email in queues and also
  by phone or video conferencing in cases of critical issues. You’ll develop a deep
  expertise in Wise API and SWIFT products and capabilities, and solid understanding
  of how Wise Platform partnerships have integrated their solution with us. You’ll
  collaborate with teams across Wise globally. You’ll contribute to troubleshooting
  and solving issues that partners report, both independently and collaboratively
  with internal stakeholders such as engineering and commercial teams. You’ll contribute
  to product feedback with engineering but sharing and capturing knowledge and trends
  of issues. &nbsp; # About You &nbsp; You have previous experience in a technical
  support engineering role in an enterprise environment, and are familiar with support
  tooling and terminology You’re confident in testing and debugging REST APIs, interpreting
  log and querying databases You have strong organisation and prioritisation skills,
  and you’re able to focus on solving complex challenges at hand while setting expectations
  with stakeholders You thrive in a support environment, and also drive proactive
  improvements and initiatives where you identify them. You’re cool under pressure
  - can navigate and handle the response to several high severity incidents at once
  - incident management experience is preferable. While this is not a developer role,
  having basic knowledge of some programming languages would be desirable (eg. Python,
  JavaScript) The team works 24/5 service levels globally, you’ll be comfortable with
  some regular out-of-hours and on-call over the weekends and holidays on a rotational
  basis. You work well in a team with a diverse group of people from all over the
  global and cultures and in different time zones. &nbsp; Qualifications Essential
  Skills Experience is a technical support role for an API product Strong ability
  to test, troubleshoot REST APIs and understand API documentation Strong communicator
  who can articulate complex technical concepts to a non-technical audience Experience
  and willingness to be on call outside of normal working hours (compensated) Familiarity
  with incident management processes &nbsp; Nice to have Experience in payments /
  fintech&nbsp; Enterprise customer environment experience Programming in any language
  Additional Information For everyone, everywhere. We''re people building money without
  borders&nbsp; — without judgement or prejudice, too. We believe teams are strongest
  when they are diverse, equitable and inclusive. We''re proud to have a truly international
  team, and we celebrate our differences. Inclusive teams help us live our values
  and make sure every Wiser feels respected, empowered to contribute towards our mission
  and able to progress in their careers. If you want to find out more about what it''s
  like to work at Wise visit&nbsp;Wise.Jobs. Keep up to date with life at Wise by
  following us on&nbsp;LinkedIn&nbsp;and&nbsp;Instagram.'
