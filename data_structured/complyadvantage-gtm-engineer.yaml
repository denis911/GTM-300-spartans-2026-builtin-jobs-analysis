description_html: <p>We are looking for a GTM Systems Engineer to be the architect
  of our revenue engine. This is a critical mid-level role focused on blending technical
  expertise with go-to-market strategy to drive scalable and efficient growth.</p><p>The
  role is a hybrid operator who designs, builds, and maintains the systems that power
  Sales, Marketing, and Customer Success. You won't just run campaigns; you will design
  the automated infrastructure that ensures our data is clean, our outreach is hyper-targeted,
  and our revenue teams are enabled to close deals faster.</p><p>You will be the bridge
  between technical platforms and commercial outcomes, translating complex product
  capabilities into business value and ensuring a seamless, data-driven customer journey.</p><b>What
  you will be doing:&nbsp;</b><p>Your primary responsibility will be to build, optimize,
  and scale the technology backbone of our Go-To-Market efforts:</p><ul><li><strong>Revenue
  Engine Architecture:</strong> Design, build, and optimize automated workflows (lead
  qualification, nurturing, omnichannel campaigns) to convert leads into closed deals
  efficiently.</li><li><strong>Tech Stack Ownership:</strong> Own the integration
  and operation of our GTM technology stack (CRM, Marketing Automation, Outreach Tools,
  Data Enrichment, Analytics) using APIs, no-code/low-code tools, and custom scripting
  to ensure flawless data flow.</li><li><strong>Data &amp; Intelligence:</strong>
  Build and manage <strong>data pipelines</strong> for lead enrichment (firmographics,
  intent data, technographics) to ensure our data is clean, consistent, and actionable
  across all GTM teams.</li><li><strong>Sales Process Automation:</strong> Create
  automated systems that provide real-time sales support, pre-call intelligence, and
  personalized messaging to help the sales team engage leads better and accelerate
  the sales cycle.</li><li><strong>Optimization &amp; Analysis:</strong> Monitor key
  funnel metrics and conversion rates. Conduct <strong>root-cause analysis</strong>
  of bottlenecks and systematically test and iterate on GTM processes to drive continuous
  improvement.</li><li><strong>Cross-Functional Alignment:</strong> Work closely with
  Revenue Operations, Customer Experience and Sales to define requirements, gather
  feedback, and ensure the GTM systems support company-wide growth goals.</li></ul><b>What
  you'll bring:</b><ul><li><strong>Experience:</strong> 2-4 years of experience in
  a highly technical GTM role (e.g., GTM Engineer, RevOps Specialist, Sales/Marketing
  Automation Architect, or Solutions Engineer).</li><li><strong>Technical Proficiency:</strong>
  Strong hands-on experience integrating and managing GTM platforms (e.g., Salesforce,
  HubSpot, Marketo, Outreach, Clay) and comfort with technical concepts like AI, <strong>APIs</strong>
  and JSON.</li><li><strong>Systems Thinking:</strong> The ability to see the GTM
  process as a full, interconnected system and design scalable, repeatable workflows.</li><li><strong>Artificial
  Intelligence:</strong> Understanding of the AI market place specifically the GTM
  Vertical tools.</li><li><strong>Data Fluency:</strong> Proficiency in data analysis,
  data modeling, and reporting (e.g., SQL, Google Sheets/Docs, or BI tools) to define
  and track performance.</li><li><strong>Communication:</strong> Excellent ability
  to translate complex technical architectures into simple business outcomes for non-technical
  stakeholders.</li><li><strong>Mindset:</strong> You thrive in ambiguous, fast-paced
  environments and possess an exceptional ability to learn new tools and technologies
  quickly.</li></ul><b>What’s in it for you?&nbsp;</b><ul><li>Equity as we want you
  to have a part of what we are building&nbsp;</li><li>Private medical insurance designed
  to keep you ensuring peace of mind while you excel in your career</li><li>Unlimited
  Time Off Policy- A work-life balance and focus on our well-being are critical to
  keeping us performing at our best&nbsp;</li><li>We embrace a hybrid approach that
  requires employees to be in the office for two days a week. We strongly believe
  that this approach fosters collaboration and enables the building of meaningful
  relationships</li><li>You will also get a new starter budget to kit out your home
  office&nbsp;</li><li>Opportunity to work on innovative projects with smart-minded
  people keen to share their knowledge and continuously improve&nbsp;</li></ul><br><p><p><strong>About
  us:</strong></p><p>Our mission is to empower every business to eliminate financial
  crime.&nbsp;</p><p>By harnessing AI, a unified platform, and an extensive partner
  ecosystem, we help customers turn compliance into a catalyst for growth, operational
  resilience, and enduring regulatory trust.</p><p>More than 3,000 enterprises across
  75 countries rely on our end-to-end platform and the world’s most comprehensive
  financial crime risk intelligence. With full-stack agentic automation, we help organizations
  automate up to 95% of KYC, AML, and sanctions reviews, cut onboarding times by 50%,
  reduce false positives by 70%, and handle 7x more work with the same staff.</p><p>ComplyAdvantage
  is headquartered in London and has global hubs in New York, Lisbon, Singapore, and
  Cluj-Napoca. It is backed by Balderton Capital, Index Ventures, Ontario Teachers’
  Pension Plan, Goldman Sachs, and Andreessen Horowitz. Learn more about compliance
  re-engineered for the age of AI at&nbsp;complyadvantage.com.</p></p>
