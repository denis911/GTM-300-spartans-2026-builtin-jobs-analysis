description_html: '<p>Cresta is on a mission to turn every customer conversation into
  a competitive advantage by unlocking the true potential of the contact center. Our
  platform combines the best of AI and human intelligence to help contact centers
  discover customer insights and behavioral best practices, automate conversations
  and inefficient processes, and empower every team member to work smarter and faster.
  Born from the prestigious Stanford AI lab, Cresta''s&nbsp;co-founder and chairman
  is&nbsp;<u>Sebastian Thrun</u>, the genius behind Google X, Waymo, Udacity, and
  more. Our leadership also includes CEO,&nbsp;<u>Ping Wu</u>, the co-founder of Google
  Contact Center AI and Vertex AI platform, &amp; co-founder,&nbsp;<u>Tim Shi</u>,
  an early member of Open AI.</p><p>&nbsp;</p><p>We’ve assembled a world-class team
  of AI and ML experts, go-to-market leaders, and top-tier investors, including Greylock
  Partners, Sequoia, Andreessen Horowitz, and former AT&amp;T CEO John Donovan. Our
  valued customers include brands like Intuit, Cox Communications, Hilton, and Carmax,
  and we’ve been recognized by Forbes and Bain Consulting as one of the top private
  AI companies in the world.</p><p>&nbsp;</p><p>Join us on this thrilling journey
  to revolutionize the workforce with AI. The future of work is here, and it''s at
  Cresta.</p><p>&nbsp;</p><p><strong>GTM Engineer</strong><br>Cresta’s mission is
  to help companies turn conversations into their competitive advantage. We build
  AI that helps the world’s largest enterprises unlock revenue, efficiency, and insight
  from every customer interaction.<br>We are hiring a GTM Engineer to rebuild how
  go to market works. This role is about eliminating manual work, helping our teams
  focus on the right accounts, and building systems that make winning easier.&nbsp;You
  will work directly with our CEO, CRO, CMO, and Rev Ops leadership to design and
  deploy an AI native operating system for our revenue engine.</p><p>&nbsp;</p><p><strong>Location:</strong>
  Remote / Hybrid - Targeting SF or NYC, may consider additional locations across
  the US.<br><strong>What you will do</strong><br><strong>Help GTM teams prioritize
  the right accounts</strong></p><ul><li>Use AI and data to help SDR, marketing, and
  sales focus on the highest value accounts</li><li>Surface hard to find intelligence,
  such as contact center scale, BPO footprint, and tech stack</li><li>Continuously
  enrich and reprioritize accounts as signals change</li></ul><p><strong>Eliminate
  manual work</strong></p><ul><li>Replace manual research, opportunity prep, and CRM
  entry with automation and AI</li><li>Build systems that tell sellers what to focus
  on each day and what actions move deals forward</li><li>Auto-generate account plans,
  stakeholder maps, and discovery prep inside seller workflows</li></ul><p><strong>Automate
  deal execution</strong></p><ul><li>Automate quoting, approvals, and document generation
  using AI agents</li><li>Streamline order forms, security reviews, and deal documents</li><li>Create
  real-time deal signals and next steps for every opportunity</li></ul><p><strong>Own
  and optimize the GTM system</strong></p><ul><li>Write custom code and use AI coding
  tools to connect and extend our GTM stack</li><li>Integrate and maximize Salesforce,
  Gong, Clay, Centralize, Slack, Glean, Coda and more</li><li>Build systems that work
  natively inside our workflows</li><li>Rethink segmentation, territories, and coverage
  using data and AI</li><li>Take true ownership of sales effectiveness and revenue
  growth</li><li>Opportunity to earn commission based on measurable impact</li></ul><p><strong>What
  we are looking for</strong></p><ul><li>Engineer who can bridge deep technical ability
  with real GTM understanding</li><li>Entrepreneur mindset with strong ownership and
  bias to build</li><li>Strong understanding of enterprise GTM and sales workflows</li><li>Comfortable
  writing code, using APIs, automation, data systems, and AI tools</li><li>Deep familiarity
  with modern sales tech stacks</li><li>High ownership, speed, and focus on real revenue
  outcomes</li></ul><p><p><p><strong>Perks &amp; Benefits:</strong></p><p>We offer
  a comprehensive and people-first benefits package to support you at work and in
  life:</p><ul><li>Comprehensive medical, dental, and vision coverage with plans to
  fit you and your family</li><li>Flexible PTO to take the time you need, when you
  need it</li><li>Paid parental leave for all new parents welcoming a new child</li><li>Retirement
  savings plan to help you plan for the future</li><li>Remote work setup budget to
  help you create a productive home office</li><li>Monthly wellness and communication
  stipend to keep you connected and balanced</li><li>In-office meal program and commuter
  benefits provided for onsite employees</li></ul></p></p><p><strong>Compensation
  at Cresta&nbsp;</strong></p><p>Cresta’s approach to compensation is simple: recognize
  impact, reward excellence, and invest in our people. We offer competitive, location-based
  pay that reflects the market and what each individual brings to the table.</p><p>The
  posted base salary range represents what we expect to pay for this role in a given
  location. Final offers are shaped by factors like experience, skills, education,
  and geography. In addition to base pay, total compensation includes equity and a
  comprehensive benefits package for you and your family.</p><p><strong>Salary Range</strong>:
  $150,000 - $230,000 + Offers Equity&nbsp;</p><p>Range varies based on location and
  experience.</p><p>We have noticed a rise in recruiting impersonations across the
  industry, where scammers attempt to access candidates'' personal and financial information
  through fake interviews and offers. All Cresta recruiting email communications will
  always come from the @cresta.ai domain. Any outreach claiming to be from Cresta
  via other sources should be ignored.&nbsp; If you are uncertain whether you have
  been contacted by an official Cresta employee, reach out to recruiting@cresta.ai&nbsp;</p><br>'
