description_html: '<b>Description</b><br>At General Motors, our product teams are
  redefining mobility. Through a human-centered design process, we create vehicles
  and experiences that are designed not just to be seen, but to be felt. We''re turning
  today''s impossible into tomorrow''s standard -from breakthrough hardware and battery
  systems to intuitive design, intelligent software, and next-generation safety and
  entertainment features.   <br>Every day, our products move millions of people as
  we aim to make driving safer, smarter, and more connected, shaping the future of
  transportation on a global scale. <br><strong> Role Overview:    </strong>   <br>We
  are seeking a highly experienced and technically adept Senior Engineering Manager
  - AI/ML Engineering to lead our Data Foundations teams within the Embodied AI organization.
  This is a people leadership role with technical depth. You will be instrumental
  in shaping the future of Autonomous Vehicle (AV) development by setting the vision
  for and leading a dedicated team that owns the data flywheel for continuously improving
  GM''s Foundation AV model performance.  You will manage senior AI/ML Engineers and
  Engineering Managers, set the technical vision of the Data Scaling teams, collaborate
  with and set direction for partner teams across the organization. You will set best
  practices for technical execution, grow technical leaders in the team and continue
  to build and uplevel a very high impact team.   <br><strong> About the Team: </strong>   <br>The
  Data Scaling group owns the Data Flywheel for AV Foundation model development and
  successive fine tuning. It defines the composition of the data that is needed for
  the AV to learn behaviors at scale and deliver the driving behaviors necessary for
  the product success. The team owns the definition and processes for data quality
  across the data loop.   <br>The team directly works on and delivers ML models to
  the product that successively go up the Data Scaling curves, thereby improving AV
  performance through smart use of data. As part of this work, the team builds scalable
  systems and pipelines that attempt to 10x the data used, its diversity and impact
  on the models with successive major releases. The team uses existing very large
  datasets that GM has access to internally as well as defines the next generation
  of highest value datasets that GM continues to collect - both from real driving
  by GM and retail fleets, but also synthetic sim-based datasets.  <br><strong> Why
  Join Us?   </strong>   <br><ul>  <li> Scale up AV foundation model pre-training
  and fine-tuning with data to its maximum capacity - into billions+ of examples -
  across different sources, delivering the maximum value to the model through every
  additional example.</li>  <li> Work with cutting-edge technology and a collaborative,
  high-impact team of AI/ML engineers, data scientists and engineers who are passionate
  about leveraging advanced AI techniques to drive innovation for L2, L3 and L4 applications.</li>  <li>
  Contribute to the safety, reliability, and scalability of next-generation autonomous
  vehicles.</li>  </ul>  <br><strong> What You''ll Do:   </strong>   <br><ul>  <li>
  Manage an interdisciplinary team of AI/ML engineers, TLMs and EMs building and scaling
  the Data Flywheel at GM.</li>  <li> Raise the engineering bar of the team: set best
  practices, give feedback, and provide mentorship to direct and indirect reports.</li>  <li>
  Drive the technical vision for Data Foundations at GM, working with senior leadership
  and members of your team.</li>  <li> Define the project roadmap, set development
  priorities, and align the team''s work with company objectives and product milestones.</li>  <li>
  Collaborate cross-functionally with teams involved in AV model development and validation
  and ensure we meet organizational goals, product requirements and scaling needs.</li>  <li>
  Promote a collaborative, inclusive, and high-performance team culture, and champion
  the GM engineering values and principles.</li>  </ul>  <br><strong> What You Must
  Have:   </strong>   <br><ul>  <li> BS, MS, or PhD in Robotics, Computer Science,
  Engineering, or a related technical field.</li>  <li> Proven experience managing
  and scaling high-performing engineering teams with a focus on operational excellence.</li>  <li>
  Demonstrated ability to inspire and motivate teams, drive best practices, and deliver
  continuous improvement.</li>  <li> Track record delivering scalable software solutions
  to a production environment using Python.</li>  <li> Proven experience in solving
  data scaling challenges, ranging from data diversity, data quality and building
  best practices to incorporate multiple data sources in large models.</li>  <li>
  Excellent communication, collaboration, and mentoring abilities, with a passion
  for driving innovation in autonomous technology.</li>  <li> Strong organizational,
  communication, and people leadership skills.</li>  </ul>  <br><strong> Bonus Points   </strong>   <br><ul>  <li>
  A background in Robotics or the AV/ADAS industry.</li>  <li> Direct experience leveraging
  LLMs/VLMs/etc. for production workflows.</li>  <li> Experience in building and scaling
  large model training pipelines that are performant and enable quick iteration by
  distributed teams.</li>  <li> Strong data processing skills using tools like Numpy,
  Pandas, and Apache Spark.</li>  <li> Experience developing or working with safety-critical
  code and systems</li>  <li> Experience deploying foundation models into production
  environments and understanding the end-to-end process.</li>  </ul>  <br>Remote:
  This role is based remotely but if you live within a 50-mile radius of Atlanta,
  Austin, Detroit, Warren, Milford or Mountain View, you are expected to report to
  that location three times a week, at minimum.    <br>Compensation  : The compensation
  information is a good faith estimate only. It is based on what a successful applicant
  might be paid in accordance with applicable state laws. The compensation may not
  be representative for positions located outside of the California Bay Area.  <br><ul>  <li>
  The salary range for this role is $296,300.00 to $453,900.00. The actual base salary
  a successful candidate will be offered within this range will vary based on factors
  relevant to the position.</li>  <li> Bonus Potential: An incentive pay program offers
  payouts based on company performance, job level, and individual performance.</li>  </ul>  <br>Benefits:    <br><ul>  <li>
  Benefits: GM offers a variety of health and wellbeing benefit programs. Benefit
  options include medical, dental, vision, Health Savings Account, Flexible Spending
  Accounts, retirement savings plan, sickness and accident benefits, life insurance,
  paid vacation &amp; holidays, tuition assistance programs, employee assistance program,
  GM vehicle discounts and more.</li>  </ul>  <br>This job may be eligible for relocation
  benefits.  <br>Company Vehicle: Upon successful completion of a motor vehicle report
  review, you will be eligible to participate in a company vehicle evaluation program,
  through which you will be assigned a General Motors vehicle to drive and evaluate.
  Note: program participants are required to purchase/lease a qualifying GM vehicle
  every four years unless one of a limited number of exceptions applies. <br>#GM-AV-1
  <br><b>About GM</b><br>Our vision is a world with Zero Crashes, Zero Emissions and
  Zero Congestion and we embrace the responsibility to lead the change that will make
  our world better, safer and more equitable for all.<br><b>Why Join Us</b><br>We
  believe we all must make a choice every day - individually and collectively - to
  drive meaningful change through our words, our deeds and our culture. Every day,
  we want every employee to feel they belong to one General Motors team.<br><b>Total
  Rewards | Benefits Overview</b><br>From day one, we''re looking out for your well-being-at
  work and at home-so you can focus on realizing your ambitions. Learn how GM supports
  a rewarding career that rewards you personally by visiting Total Rewards resources.
  <br><b>Non-Discrimination and Equal Employment Opportunities (U.S.)</b><br>General
  Motors is committed to being a workplace that is not only free of unlawful discrimination,
  but one that genuinely fosters inclusion and belonging. We strongly believe that
  providing an inclusive workplace creates an environment in which our employees can
  thrive and develop better products for our customers.<br>All employment decisions
  are made on a non-discriminatory basis without regard to sex, race, color, national
  origin, citizenship status, religion, age, disability, pregnancy or maternity status,
  sexual orientation, gender identity, status as a veteran or protected veteran, or
  any other similarly protected status in accordance with federal, state and local
  laws. <br>We encourage interested candidates to review the key responsibilities
  and qualifications for each role and apply for any positions that match their skills
  and capabilities. Applicants in the recruitment process may be required, where applicable,
  to successfully complete a role-related assessment(s) and/or a pre-employment screening
  prior to beginning employment. To learn more, visit How we Hire.<br><b>Accommodations</b><br>General
  Motors offers opportunities to all job seekers including individuals with disabilities.
  If you need a reasonable accommodation to assist with your job search or application
  for employment, email us [email protected] or call us at 1-800-865-7580. In your
  email, please include a description of the specific accommodation you are requesting
  as well as the job title and requisition number of the position for which you are
  applying.'
