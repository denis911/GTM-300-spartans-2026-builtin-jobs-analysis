description_html: '<p><p>About <strong>Zscaler</strong></p><p>Zscaler is a pioneer
  and global leader in zero trust security. The world’s largest businesses, critical
  infrastructure organizations, and government agencies rely on Zscaler to secure
  users, branches, applications, data &amp; devices, and to accelerate digital transformation
  initiatives. Distributed across more than 160 data centers globally, the Zscaler
  Zero Trust Exchange platform combined with advanced AI combats billions of cyber
  threats and policy violations every day and unlocks productivity gains for modern
  enterprises by reducing costs and complexity.</p><p>Here, <strong>impact in your
  role matters more than title</strong> and trust is built on results. We believe
  in transparency and value <strong>constructive, honest debate</strong>—we’re focused
  on getting to the best ideas, faster. We build high-performing teams that can make
  an impact quickly and with high quality. To do this, we are building a culture of
  execution centered on <strong>customer obsession,</strong> collaboration, ownership
  and accountability.&nbsp;</p><p>We champion an “AI Forward, People First” philosophy
  to help us accelerate and innovate, empowering our people to embrace their potential.
  If you’re driven by purpose, thrive on solving complex challenges and want to make
  a positive difference on a global scale, we invite you to bring your talents to
  Zscaler to help shape the future of cybersecurity.</p></p><p><strong>Role</strong></p><p>We
  are looking for a Sr. Staff Technical Program Manager, Platform Services to join
  our Cloud Operations - Platform Services department, reporting to the Sr. Director,
  Cloud Operations - Platform Services. This position is available as a hybrid role
  at our San Jose HQ coming. You will support our maturing platform through a unique
  blend of technical program management and vendor management skills. Your expertise
  in data center services, infrastructure, and carrier networks will be critical in
  delivering creative solutions and executing high-impact projects in a dynamic global
  environment.</p><p><strong>What you’ll do (Role Expectations)</strong></p><ul><li><p>Plan,
  source, negotiate, and deliver complex data center projects globally from inception
  to deployment</p></li><li><p>Negotiate with data center and carrier providers for
  colocation space, IP transit, dark fiber, and wave services while ensuring regional
  compliance</p></li><li><p>Conduct regular business and service reviews with global
  vendors to maintain high standards of service and delivery</p></li><li><p>Collaborate
  with technical and product teams to assess business requirements and track delivery
  of services to ensure timely utilization</p></li><li><p>Communicate updates to cross-functional
  partners, tailoring messaging from executive summaries to detailed technical briefings</p></li></ul><p><strong>Who
  You Are (Success Profile)</strong></p><ul><li><p>You thrive in ambiguity. You''re
  comfortable building the path as you walk it. You thrive in a dynamic environment,
  seeing ambiguity not as a hindrance, but as the raw material to build something
  meaningful.</p></li><li><p>You act like an owner. Your passion for the mission fuels
  your bias for action. You operate with integrity because you genuinely care about
  the outcome. True ownership involves leveraging dynamic range: the ability to navigate
  seamlessly between high-level strategy and hands-on execution.</p></li><li><p>You
  are a problem-solver. You love running towards the challenges because you are laser-focused
  on finding the solution, knowing that solving the hard problems delivers the biggest
  impact.</p></li><li><p>You are a high-trust collaborator. You are ambitious for
  the team, not just yourself. You embrace our challenge culture by giving and receiving
  ongoing feedback—knowing that candor delivered with clarity and respect is the truest
  form of teamwork and the fastest way to earn trust.</p></li><li><p>You are a learner.
  You have a true growth mindset and are obsessed with your own development, actively
  seeking feedback to become a better partner and a stronger teammate. You love what
  you do and you do it with purpose.</p></li></ul><p><strong>What We’re Looking for
  (Minimum Qualifications)</strong></p><ul><li><p>8+ years of project management experience
  specifically in data center operations, global carrier services, or related infrastructure
  roles</p></li><li><p>Proven experience in vendor management, including commercial
  agreements and contract negotiations</p></li><li><p>Bachelor’s degree in Computer
  Science, Engineering, Information Technology, or a related field</p></li><li><p>Deep
  technical understanding of cloud and data center operations, infrastructure, and
  carrier networks</p></li></ul><p><strong>What Will Make You Stand Out (Preferred
  Qualifications)</strong></p><ul><li><p>Proven track record of executing on tight
  timelines and delivering high-quality work in a high-growth environment</p></li><li><p>Strategic
  thinker with an intellectually curious mindset and a drive to find answers across
  complex organizations</p></li><li><p>Expert proficiency in operational tools such
  as Jira, Asana, and Google Suite for daily project tracking and reporting</p></li></ul><p>#LI-hybrid
  #LI-JG1</p><p><p><p><p>Zscaler’s salary ranges are benchmarked and are determined
  by role and level. The range displayed on each job posting reflects the minimum
  and maximum target for new hire salaries for the position across all US locations
  and could be higher or lower based on a multitude of factors, including job-related
  skills, experience, and relevant education or training.</p><p>The base salary range
  listed for this full-time position excludes commission/ bonus/ equity (if applicable)
  + benefits.</p></p><p>Base Pay Range</p><p><span>$140,000</span><span>—</span><span>$200,000
  USD</span></p></p></p><p><p>At Zscaler, we are committed to building a team that
  reflects the communities we serve and the customers we work with. We foster an inclusive
  environment that values all backgrounds and perspectives, emphasizing collaboration
  and belonging. Join us in our mission to make doing business seamless and secure.</p><p>Our
  Benefits program is one of the most important ways we support our employees. Zscaler
  proudly offers comprehensive and inclusive benefits to meet the diverse needs of
  our employees and their families throughout their life stages, including:</p><p><ul><li>Various
  health plans</li><li>Time off plans for vacation and sick time</li><li>Parental
  leave options</li><li>Retirement options</li><li>Education reimbursement</li><li>In-office
  perks, and more!</li></ul><p>Learn more about Zscaler’s Future of Work strategy,
  hybrid working model, and benefits here.</p></p><p>By applying for this role, you
  adhere to applicable laws, regulations, and Zscaler policies, including those related
  to security and privacy standards and guidelines.</p><p>Zscaler is committed to
  providing equal employment opportunities to all individuals. We strive to create
  a workplace where employees are treated with respect and have the chance to succeed.
  All qualified applicants will be considered for employment without regard to race,
  color, religion, sex (including pregnancy or related medical conditions), age, national
  origin, sexual orientation, gender identity or expression, genetic information,
  disability status, protected veteran status, or any other characteristic protected
  by federal, state, or local laws. <em>See more information by clicking on the </em><em>Know
  Your Rights: Workplace Discrimination is Illegal </em><em>link.</em></p><p>Pay Transparency</p><p>Zscaler
  complies with all applicable federal, state, and local pay transparency rules.</p><p>Zscaler
  is committed to providing reasonable support (called accommodations or adjustments)
  in our recruiting processes for candidates who are differently abled, have long
  term conditions, mental health conditions or sincerely held religious beliefs, or
  who are neurodivergent or require pregnancy-related support.</p></p>'
