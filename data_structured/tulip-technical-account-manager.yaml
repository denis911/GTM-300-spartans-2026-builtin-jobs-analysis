description_html: <p><strong>This role is located in Somerville, MA - We are a hybrid
  work environment and are in the office 3+ days/per week.</strong></p><p>Tulip, the
  leader in AI-native frontline operations, is helping companies around the world
  equip their workforce with composable, connected apps, leading to higher quality
  work, improved efficiency, and end-to-end traceability across operations. Tulip’s
  cloud-native, no-code platform, powered by embedded AI, is driving the digital transformation
  of industrial environments through composable, human-centric solutions that go beyond
  disrupting the Manufacturing Execution System (MES) category.</p><br><p>A spinoff
  out of MIT, Tulip is headquartered in Somerville, MA, with offices in Germany, Hungary,
  Singapore, and Israel. Tulip has been recognized as a World Economic Forum Global
  Innovator, a 2024 Deloitte Technology Fast award winner, one of Energage’s Top Workplaces
  USA, and one of Built In Boston’s “Best Places to Work” and “Best Midsize Places
  to Work.”</p><br><p><strong>About You:</strong></p><p>We're looking for a Technical
  Account Manager (TAM) to join our growing Customer Success team at Tulip Interfaces.
  As a TAM, you'll bridge the gap between technical expertise and customer success,
  partnering closely with our customers and the Tulip account team to provide strategic
  and tactical guidance on technical matters that drive customer value and adoption.</p><p>You'll
  serve as the technical advisor for customers, helping them maximize their investment
  in Tulip's no-code platform while ensuring they achieve their operational excellence
  goals.</p><p>You're passionate about technology, customer success, and manufacturing
  innovation. You thrive in technical discussions while building strong relationships
  with customers and internal teams. You have a collaborative mindset and enjoy translating
  complex technical concepts for diverse audiences. You're excited about helping manufacturers
  transform their operations using cutting-edge no-code technology.</p><br><p><strong>What
  skills do I need?</strong>&nbsp;</p><p>Technical Background</p><ul><li>5-7 years
  of experience in technical customer-facing roles (Solutions Engineering, Technical
  Consulting, or similar)</li><li>3+ Years of Tulip delivery experience preferred</li><li>Strong
  understanding of manufacturing operations, Industry 4.0, or industrial software</li><li>Experience
  with APIs, system integrations, and database concepts</li><li>Familiarity with no-code/low-code
  platforms preferred</li><li>Ability to travel (estimated 20%)</li></ul><p>Communication
  &amp; Collaboration</p><ul><li>Excellent written and verbal communication skills</li><li>Ability
  to translate complex technical concepts for diverse audiences</li><li>Strong presentation
  and workshop facilitation skills</li><li>Collaborative mindset with experience working
  across teams</li></ul><p>Industry Knowledge</p><ul><li>Deep knowledge of digital
  transformation initiatives in industrial settings</li><li>Understanding of manufacturing
  processes and operational challenges</li><li>Experience with manufacturing execution
  systems (MES) and similar platforms&nbsp;</li></ul><p><strong>Key Responsibilities:</strong></p><p>Strategic
  Technical Advisory</p><ul><li>Partner with customers and the Tulip account team
  to develop and execute technical success plans for assigned accounts</li><li>Provide
  expert guidance on Tulip platform architecture, integrations, and advanced use cases</li><li>Lead
  technical discussions with customer stakeholders, from app builders to IT and Operations
  leaders</li><li>Identify opportunities for deeper platform adoption and technical
  optimization</li></ul><p>Customer Enablement &amp; Growth</p><ul><li>Conduct technical
  workshops, training sessions, and platform deep-dives</li><li>Help customers design
  scalable solutions using Tulip's no-code platform</li><li>Guide customers through
  complex technical implementations and integrations</li><li>Collaborate with customers
  to establish technical best practices and governance</li></ul><p>Cross-Functional
  Collaboration</p><ul><li>As a member of the account team, you will work closely
  with Account Executive and Customer Success Manager to ensure seamless customer
  experience and account growth</li><li>Partner with Product and Engineering teams
  to communicate customer technical requirements</li><li>Collaborate with Sales Engineering
  during expansion opportunities</li><li>Support renewal processes with technical
  value demonstrations</li></ul><p>Technical Expertise &amp; Thought Leadership</p><ul><li>Stay
  current on Tulip platform capabilities, industry trends, and manufacturing technologies</li><li>Develop
  technical content, documentation, and enablement materials</li><li>Participate in
  customer advisory boards and technical user groups</li><li>Represent Tulip at industry
  events and technical conferences</li></ul><br><p><strong>Key Collaborators:</strong></p><ul><li>Customer
  Success</li><li>Product</li><li>Engineering</li><li>Support</li></ul><br><p><strong>Working
  At Tulip</strong></p><p>We know even great candidates experience imposter syndrome.
  Even if you don’t match every requirement, applying gives you the opportunity to
  be considered.&nbsp;</p><br><p>We’re building a strong, diverse team that values
  hard work, families, and personal well-being. Benefits of working with us include:</p><br><ul><li>Direct
  impact on product and culture</li><li>Company equity</li><li>Competitive benefits
  package including Health, Dental, Vision, Short-term Disability, Long-term Disability,
  Life Insurance, AD&amp;D Insurance, Flexible Spending Account (FSA), Commuter Benefits,
  Parental Leave, and 401(K)</li><li>Flexible work schedule and unlimited vacation
  policy</li><li>Virtual company events and happy hours</li><li>Fitness subsidies</li><li>An
  inclusive, dog-friendly office with diverse and inspiring colleagues</li></ul><br><p>We
  are an equal opportunity employer. At Tulip, we celebrate all. Qualified applicants
  will receive consideration for employment without regard to race, religion, color,
  national origin, gender, sexual orientation, age, marital status, veteran status,
  or disability status. Help us build an inclusive community that will transform frontline
  operations.&nbsp;<br></p><p><p><p>The compensation information displayed on each
  job posting reflects the range for new hire pay rates for the position across all
  US locations. Within the range posted, actual compensation will be determined depending
  on multiple factors including job-related knowledge &amp; skills, experience, business
  needs, geographical location, market compensation data, and internal equity.&nbsp;<em>Expected
  compensation ranges for this role may change over time.&nbsp;</em>The estimated
  salary range for this position is $110,000 - $160,000.</p></p></p><p>It is unlawful
  in Massachusetts to require or administer a lie detector test as a condition of
  employment or continued employment. An employer who violates this law shall be subject
  to criminal penalties and civil liability.</p><p><p>It is unlawful in Massachusetts
  to require or administer a lie detector test as a condition of employment or continued
  employment. An employer who violates this law shall be subject to criminal penalties
  and civil liability.</p><p>Please note that we may use AI-based tools to support
  parts of our hiring process. All data processing is carried out in compliance with
  local data protection laws, ensuring all personal candidate information is handled
  securely and ethically.</p></p>
