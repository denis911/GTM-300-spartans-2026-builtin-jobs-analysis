description_html: '<strong> ZS </strong> is a place where passion changes lives. As
  a management consulting and technology firm focused on improving life and how we
  live it, we transform ideas into impact by <strong>bringing together data, science,
  technology</strong> and <strong>human ingenuity</strong> to deliver better outcomes
  for all. Here you''ll work side-by-side with a powerful collective of thinkers and
  experts shaping life-changing solutions for patients, caregivers and consumers,
  worldwide. ZSers drive impact by bringing a <strong>client-first mentality</strong>
  to each and every engagement. We partner collaboratively with our clients to develop
  custom solutions and technology products that create value and deliver company results
  across critical areas of their business. Bring your curiosity for learning, bold
  ideas, courage and passion to drive life-changing impact to ZS. <br><strong> ZS''s
  Strategic Alliances and Investments </strong> group focuses on identifying , designing
  and executing strategic partnerships across ZS''s global business.  Leveraging ZS''s
  unique market intelligence, broad and deep industry coverage, strong relationships
  and a track record of credibility in the market; the SAI group brings innovation
  to market and driving client impact through working with partners. <br>The Program
  Manager for Global Alliances Operations will be responsible for driving operational
  excellence across strategic technology partnerships, including AWS, Google Cloud
  Platform (GCP), Microsoft Azure, Snowflake, Databricks, Dataiku, and other IT infrastructure
  and data ecosystem partners. This role works to identify and implement mechanisms
  that improve the execution of alliance programs . The ideal candidate will have
  experience working in a highly matrixed organization across Consulting Principals,
  as well as have working knowledge of partner programs from the partners above. <br><strong>
  What you''ll do: </strong> <br><ul><li> Process Improvement: Design and implement
  scalable operational processes for alliance management. </li><li> Opportunity Management
  &amp; Submissions: Oversee partner opportunity registration and submission processes
  across multiple platforms. </li><li> Marketplace Listings &amp; Management: Manage
  listings on cloud marketplaces (AWS Marketplace, Azure Marketplace, GCP Marketplace).
  </li><li> Funding Management &amp; Execution: Identify , submit and manage funding
  programs, Administer Market Development Funds (MDF ) and co-op funding programs.
  </li><li> Competency &amp; Certification Programs: Drive achievement of partner
  competencies and equivalent certifications. </li><li> Cross-Functional Collaboration:
  Work closely with sales, marketing, product, and partner teams to align operational
  priorities. </li></ul><br><strong> What you''ll bring: </strong> <br><ul><li> Bachelor''s
  degree in Business , Technology, or related field; MBA preferred. </li><li> 5-8
  years in partner operations, alliances, or program management within technology
  or cloud ecosystems. </li><li> Proven track record managing global programs and
  complex partner ecosystems. </li><li> Familiarity with cloud platforms (AWS, Azure,
  GCP) and data infrastructure technologies (Snowflake, Databricks, Dataiku). </li><li>
  Fluency in English </li><li> Client-first mentality </li><li> Intense work ethic
  </li><li> Collaborative spirit and problem-solving approach </li></ul><br><strong>
  How you''ll grow: </strong> <br><ul><li> Cross-functional skills development &amp;
  custom learning pathways </li><li> Milestone training programs aligned to career
  progression opportunities </li><li> Internal mobility paths that empower growth
  via s-curves, individual contribution and role expansions </li></ul><br><strong>
  Hybrid working model: </strong> <br>ZS is committed to a <strong>Flexible and Connected</strong>
  way of working. ZSers are onsite at clients or ZS offices three days a week. Combined
  flexibility to work remotely two days a week is also available. The magic of ZS
  culture and innovation thrives in both planned and spontaneous face-to-face connections.
  <br><strong> Perks &amp; Benefits: </strong> <br>ZS offers a comprehensive total
  rewards package including health and well-being, financial planning, annual leave,
  personal growth and professional development. Our robust skills development programs,
  multiple career progression options and internal mobility paths and collaborative
  culture empowers you to thrive as an individual and global team member. <br><strong>
  Travel: </strong> <br>Travel is a requirement at ZS for client facing ZSers; business
  needs of your project and client are the priority. While some projects may be local,
  all client-facing ZSers should be prepared to travel as needed. Travel provides
  opportunities to strengthen client relationships, gain diverse experiences, and
  enhance professional growth by working in different environments and cultures. <br><strong>
  Considering applying? </strong> <br>At ZS, we honor the visible and invisible elements
  of our identities, personal experiences, and belief systems-the ones that comprise
  us as individuals, shape who we are, and make us unique. We believe your personal
  interests, identities, and desire to learn are integral to your success here. We
  are committed to building a team that reflects a broad variety of backgrounds, perspectives,
  and experiences. Learn more about our inclusion and belonging efforts and the networks
  ZS supports to assist our ZSers in cultivating community spaces and obtaining the
  resources they need to thrive. <br>If you''re eager to grow, contribute, and bring
  your unique self to our work, we encourage you to apply.<br>ZS is an equal opportunity
  employer and is committed to providing equal employment and advancement opportunities
  without regard to any class protected by applicable law.<br><strong>To complete
  your application:</strong><br>Candidates must possess or be able to obtain work
  authorization for their intended country of employment. An on-line application,
  including a full set of transcripts (official or unofficial), is required to be
  considered.<br>NO AGENCY CALLS, PLEASE.<br>Find Out More At:<br>www.zs.com <br>
  <b>Salary:</b> $175,000.00 - $185,000.00'
description_text: 'ZS is a place where passion changes lives. As a management consulting
  and technology firm focused on improving life and how we live it, we transform ideas
  into impact by bringing together data, science, technology and human ingenuity to
  deliver better outcomes for all. Here you''ll work side-by-side with a powerful
  collective of thinkers and experts shaping life-changing solutions for patients,
  caregivers and consumers, worldwide. ZSers drive impact by bringing a client-first
  mentality to each and every engagement. We partner collaboratively with our clients
  to develop custom solutions and technology products that create value and deliver
  company results across critical areas of their business. Bring your curiosity for
  learning, bold ideas, courage and passion to drive life-changing impact to ZS. ZS''s
  Strategic Alliances and Investments group focuses on identifying , designing and
  executing strategic partnerships across ZS''s global business. Leveraging ZS''s
  unique market intelligence, broad and deep industry coverage, strong relationships
  and a track record of credibility in the market; the SAI group brings innovation
  to market and driving client impact through working with partners. The Program Manager
  for Global Alliances Operations will be responsible for driving operational excellence
  across strategic technology partnerships, including AWS, Google Cloud Platform (GCP),
  Microsoft Azure, Snowflake, Databricks, Dataiku, and other IT infrastructure and
  data ecosystem partners. This role works to identify and implement mechanisms that
  improve the execution of alliance programs . The ideal candidate will have experience
  working in a highly matrixed organization across Consulting Principals, as well
  as have working knowledge of partner programs from the partners above. What you''ll
  do: Process Improvement: Design and implement scalable operational processes for
  alliance management. Opportunity Management &amp; Submissions: Oversee partner opportunity
  registration and submission processes across multiple platforms. Marketplace Listings
  &amp; Management: Manage listings on cloud marketplaces (AWS Marketplace, Azure
  Marketplace, GCP Marketplace). Funding Management &amp; Execution: Identify , submit
  and manage funding programs, Administer Market Development Funds (MDF ) and co-op
  funding programs. Competency &amp; Certification Programs: Drive achievement of
  partner competencies and equivalent certifications. Cross-Functional Collaboration:
  Work closely with sales, marketing, product, and partner teams to align operational
  priorities. What you''ll bring: Bachelor''s degree in Business , Technology, or
  related field; MBA preferred. 5-8 years in partner operations, alliances, or program
  management within technology or cloud ecosystems. Proven track record managing global
  programs and complex partner ecosystems. Familiarity with cloud platforms (AWS,
  Azure, GCP) and data infrastructure technologies (Snowflake, Databricks, Dataiku).
  Fluency in English Client-first mentality Intense work ethic Collaborative spirit
  and problem-solving approach How you''ll grow: Cross-functional skills development
  &amp; custom learning pathways Milestone training programs aligned to career progression
  opportunities Internal mobility paths that empower growth via s-curves, individual
  contribution and role expansions Hybrid working model: ZS is committed to a Flexible
  and Connected way of working. ZSers are onsite at clients or ZS offices three days
  a week. Combined flexibility to work remotely two days a week is also available.
  The magic of ZS culture and innovation thrives in both planned and spontaneous face-to-face
  connections. Perks &amp; Benefits: ZS offers a comprehensive total rewards package
  including health and well-being, financial planning, annual leave, personal growth
  and professional development. Our robust skills development programs, multiple career
  progression options and internal mobility paths and collaborative culture empowers
  you to thrive as an individual and global team member. Travel: Travel is a requirement
  at ZS for client facing ZSers; business needs of your project and client are the
  priority. While some projects may be local, all client-facing ZSers should be prepared
  to travel as needed. Travel provides opportunities to strengthen client relationships,
  gain diverse experiences, and enhance professional growth by working in different
  environments and cultures. Considering applying? At ZS, we honor the visible and
  invisible elements of our identities, personal experiences, and belief systems-the
  ones that comprise us as individuals, shape who we are, and make us unique. We believe
  your personal interests, identities, and desire to learn are integral to your success
  here. We are committed to building a team that reflects a broad variety of backgrounds,
  perspectives, and experiences. Learn more about our inclusion and belonging efforts
  and the networks ZS supports to assist our ZSers in cultivating community spaces
  and obtaining the resources they need to thrive. If you''re eager to grow, contribute,
  and bring your unique self to our work, we encourage you to apply. ZS is an equal
  opportunity employer and is committed to providing equal employment and advancement
  opportunities without regard to any class protected by applicable law. To complete
  your application: Candidates must possess or be able to obtain work authorization
  for their intended country of employment. An on-line application, including a full
  set of transcripts (official or unofficial), is required to be considered. NO AGENCY
  CALLS, PLEASE. Find Out More At: www.zs.com Salary: $175,000.00 - $185,000.00'
