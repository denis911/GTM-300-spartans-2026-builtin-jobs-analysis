description_html: '<b><strong>🚀 Join the Future of Commerce with Whatnot!</strong></b><p>Whatnot
  is the largest live shopping platform in North America and Europe to buy, sell,
  and discover the things you love. We’re re-defining e-commerce by blending community,
  shopping, and entertainment into a community just for you. As a remote co-located
  team, we’re inspired by innovation and anchored in our <u>values</u>. With hubs
  in the US, UK, Germany, Ireland, Poland, and Australia, we’re building the future
  of online marketplaces –together.</p><p>From fashion, beauty, and electronics to
  collectibles like trading cards, comic books, and even live plants, our live auctions
  have something for everyone.</p><p>And we’re just getting started! As one of the
  <u>fastest growing marketplaces</u>, we’re looking for bold, forward-thinking problem
  solvers across all functional areas. Check out the latest Whatnot updates on our
  <u>news</u> and <u>engineering</u> blogs and join us as we enable anyone to turn
  their passion into a business, and bring people together through commerce.</p><b><strong>
  </strong></b><b><strong>💻 Role</strong></b><p>We are looking for intellectually
  curious, highly motivated individuals to join us for a 12-16 week hybrid internship
  during Summer 2026. Our interns work in cross-functional multidisciplinary teams
  enabling you to directly impact the direction of our platform. Your code and ideas
  will contribute to solving some of the most complex technical challenges we face
  today and define future engineering initiatives. Some sample projects you might
  work on are: </p><ul><li><p>Building new features for users in our live-streams</p></li><li><p>Implementing
  growth tactics and strategies to scale our buyer and seller flows</p></li><li><p>Building
  systems at scale that help us deliver a high trust marketplace experience</p></li></ul><p>By
  the end of your internship, you will have contributed to one of the fastest growing
  marketplaces ever while gaining core industry skills of project ideation, management
  and collaboration.</p><p><strong>We offer flexibility to work from home or from
  one of our global office hubs, and we value in-person time for planning, problem-solving,
  and connection. Team members in this role must live within commuting distance of
  our New York City, Los Angeles, San Francisco or Seattle hub.</strong></p><p></p><b><strong>👋
  You</strong>  </b><p>Curious about who thrives at Whatnot? We’ve found that embodying
  a low ego, growth mindset, and high-impact drive goes a long way here. As our next
  Engineering Intern you should have some industry software engineering experience,
  plus</p><ul><li><p>Pursuing a degree in computer science or other related major
  graduating in Dec 2026 or by Summer 2027</p></li><li><p>Problem solver and out-of-the-box
  thinker</p></li><li><p>Willing to take risks and build product and systems for 1M+
  users</p></li><li><p>Ability to pick up on new technologies quickly</p></li></ul><p></p><b><strong>🎁
  Benefits</strong></b><ul><li><p>$150/month dogfooding budget </p><ul><li><p>We expect
  all employees to actively use the product!</p></li></ul></li><li><p>$150/month wifi/phone
  reimbursement </p></li></ul><b><strong>💛 EOE</strong></b><p>Whatnot is proud to
  be an Equal Opportunity Employer. We value diversity, and we do not discriminate
  on the basis of race, religion, color, national origin, gender, sexual orientation,
  age, marital status, veteran status, parental status, disability status, or any
  other status protected by local law. We believe that our work is better and our
  company culture is improved when we encourage, support, and respect the different
  skills and experiences represented within our workforce.</p>'
description_text: '🚀 Join the Future of Commerce with Whatnot! Whatnot is the largest
  live shopping platform in North America and Europe to buy, sell, and discover the
  things you love. We’re re-defining e-commerce by blending community, shopping, and
  entertainment into a community just for you. As a remote co-located team, we’re
  inspired by innovation and anchored in our values . With hubs in the US, UK, Germany,
  Ireland, Poland, and Australia, we’re building the future of online marketplaces
  –together. From fashion, beauty, and electronics to collectibles like trading cards,
  comic books, and even live plants, our live auctions have something for everyone.
  And we’re just getting started! As one of the fastest growing marketplaces , we’re
  looking for bold, forward-thinking problem solvers across all functional areas.
  Check out the latest Whatnot updates on our news and engineering blogs and join
  us as we enable anyone to turn their passion into a business, and bring people together
  through commerce. 💻 Role We are looking for intellectually curious, highly motivated
  individuals to join us for a 12-16 week hybrid internship during Summer 2026. Our
  interns work in cross-functional multidisciplinary teams enabling you to directly
  impact the direction of our platform. Your code and ideas will contribute to solving
  some of the most complex technical challenges we face today and define future engineering
  initiatives. Some sample projects you might work on are: Building new features for
  users in our live-streams Implementing growth tactics and strategies to scale our
  buyer and seller flows Building systems at scale that help us deliver a high trust
  marketplace experience By the end of your internship, you will have contributed
  to one of the fastest growing marketplaces ever while gaining core industry skills
  of project ideation, management and collaboration. We offer flexibility to work
  from home or from one of our global office hubs, and we value in-person time for
  planning, problem-solving, and connection. Team members in this role must live within
  commuting distance of our New York City, Los Angeles, San Francisco or Seattle hub.
  👋 You Curious about who thrives at Whatnot? We’ve found that embodying a low ego,
  growth mindset, and high-impact drive goes a long way here. As our next Engineering
  Intern you should have some industry software engineering experience, plus Pursuing
  a degree in computer science or other related major graduating in Dec 2026 or by
  Summer 2027 Problem solver and out-of-the-box thinker Willing to take risks and
  build product and systems for 1M+ users Ability to pick up on new technologies quickly
  🎁 Benefits $150/month dogfooding budget We expect all employees to actively use
  the product! $150/month wifi/phone reimbursement 💛 EOE Whatnot is proud to be an
  Equal Opportunity Employer. We value diversity, and we do not discriminate on the
  basis of race, religion, color, national origin, gender, sexual orientation, age,
  marital status, veteran status, parental status, disability status, or any other
  status protected by local law. We believe that our work is better and our company
  culture is improved when we encourage, support, and respect the different skills
  and experiences represented within our workforce.'
