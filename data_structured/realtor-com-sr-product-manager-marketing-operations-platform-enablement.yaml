location: Austin, Texas, USA
date_posted: '2026-03-09'
description_html: '<p><p>Recognized as the No. 1 site trusted by real estate professionals,
  Realtor.com® has been at the forefront of online real estate for over 25 years,
  connecting buyers, sellers, and renters with trusted insights and expert guidance
  to find their perfect home. Through its robust suite of tools, Realtor.com® not
  only makes a significant impact on the real estate industry at large, but for consumers,
  navigating the biggest purchase they will make in their life, by providing a user
  experience that is easy to use, easy to understand, and most of all, easy to make
  decisions.</p><p>Join us on our mission to empower more people to find their way
  home by breaking barriers to entry, making the right connections, and building confidence
  through expert guidance.</p></p><p>At&nbsp;Realtor.com® , we''re transforming the
  way people find, buy, and sell homes — and marketing plays a critical role in connecting
  millions of consumers with their next move. We''re looking for a <strong>Sr</strong>.
  <strong>Product Manager, Marketing Operations &amp; Platform Enablement</strong>
  to build and maintain the systems, tools, and data infrastructure that power our
  marketing team.</p><p>You''ll be the operational backbone for our brand awareness
  channels (YouTube, Display, and TV) while owning the governance and enablement of
  critical marketing platforms used across the team. This is an exciting opportunity
  to join a team using a next-gen AI-enabled and LLM-first system to democratize knowledge
  and automate workflows.</p><p><strong>What You''ll Do:</strong></p><ul><li>Enable
  brand awareness channel operations —&nbsp;ensure tracking, tagging, measurement,
  and data infrastructure are in place for YouTube, Display, and TV, allowing channel
  strategists to optimize effectively.</li><li>Own platform governance for Amplitude,
  Hightouch, and Fivetran —&nbsp;manage configuration, ensure data quality, define
  standards, and enable self-service usage across the marketing ops team.</li><li>Lead
  Jira and planning processes for the marketing ops team, ensuring clear prioritization,
  capacity planning, and delivery tracking.</li><li>Build and maintain marketing data
  pipelines that provide accurate, timely data for measurement and attribution across
  brand channels.</li><li>Collaborate with TV and video measurement partners (e.g.,
  iSpot, YouTube/Google DV360) to ensure tracking implementations and data integrations
  meet business needs.</li><li>Develop documentation and enablement resources that
  allow teammates to self-service platform capabilities without bottlenecks.</li><li>Troubleshoot
  and resolve data quality issues, identifying root causes and implementing fixes
  to maintain reliability at scale.</li><li>Communicate priorities, progress, and
  trade-offs clearly to stakeholders, aligning teams around shared outcomes.</li></ul><p><strong>How
  We Work:</strong></p><p>We balance creativity and innovation on a foundation of
  in-person collaboration. For most roles, our employees work three or more days in
  our offices, where they have the opportunity to collaborate in-person, adding richness
  to our culture and knitting us closer together.</p><p><strong>Who You Are:</strong></p><ul><li>A
  systems thinker who finds satisfaction in building infrastructure that enables others
  to succeed.</li><li>Enthusiastic about leveraging AI tools to accelerate decision-making,
  automate workflows, and unlock new levels of team productivity.</li><li>Skilled
  at translating marketer needs into technical requirements for tracking, data pipelines,
  and platform configuration.</li><li>Comfortable owning planning processes (Jira,
  road mapping) and hands-on platform administration (Amplitude, Hightouch, Fivetran).</li><li>Detail-oriented
  with a passion for data quality, governance, and operational reliability.</li><li>A
  strong collaborator who enables teammates through clear documentation, defined standards,
  and responsive support.</li><li>Bachelor''s degree in Engineering, Mathematics,
  Computer Science, Economics, or a related quantitative field.</li><li>8+ years of
  experience in marketing operations, data enablement, or marketing technology, with
  a focus on building systems that support marketing teams.</li><li>Demonstrated experience
  applying AI/LLMs to operational workflows — such as lead processing, data classification,
  or automated QA.</li><li>Proven experience working in or leading Agile development
  processes and planning workflows.</li><li>Proficiency with SQL and a strong understanding
  of data architecture, pipelines, and measurement.</li></ul><p><strong>Bonus Points:</strong></p><ul><li>Experience
  administering Amplitude or similar product analytics platforms.</li><li>Experience
  building AI-powered automation workflows using tools like n8n, Zapier AI, or similar
  platforms to streamline marketing operations.</li><li>Familiarity with Hightouch,
  Fivetran, or similar data integration and reverse ETL tools.</li><li>Experience
  with tagging and tracking implementations — Google Tag Manager, server-side tagging,
  or similar.</li><li>Exposure to brand/awareness channel measurement — TV attribution
  (iSpot), YouTube, or programmatic display.</li><li>Background in platform governance
  — defining standards, documentation, and enablement for shared marketing tools.</li></ul><p><strong>Why
  You''ll Love Working Here:</strong></p><p>At Realtor.com® , we''re building the
  most trusted, data-driven marketing practice in the real estate industry. You''ll
  join a team of experts passionate about solving hard problems, accelerating growth,
  and helping millions of consumers on their home journey.&nbsp;If you''re energized
  by building the systems and infrastructure that make a marketing team successful
  — we''d love to meet you.</p><p><strong>How We Reward You:</strong></p><p>Realtor.com®&nbsp;is
  committed to investing in the health and wellbeing of our employees and their families.
  Our benefits programs include, but are not limited to:</p><ul><li>Inclusive and
  Competitive medical, Rx, dental, and vision coverage</li><li>Family forming benefits</li><li>13
  Paid Holidays</li><li>Flexible Time Off</li><li>8 hours of paid Volunteer Time off</li><li>Immediate
  eligibility into Company 401(k) plan with 3.5% company match</li><li>Tuition Reimbursement
  program for degreed and non-degreed programs</li><li>1:1 personalized Financial
  Planning Sessions</li><li>Student Debt Retirement Savings Match program</li><li>Free
  snacks and refreshments in each office location</li></ul><p><p>Do the best work
  of your life at Realtor.com®</p><p>Here, you’ll partner with a diverse team of experts
  as you use leading-edge tech to empower everyone to meet a crucial goal: finding
  their way home. And you’ll find your way home too. At Realtor.com®, you’ll bring
  your full self to work as you innovate with speed, serve our consumers, and champion
  your teammates. In return, we’ll provide you with a warm, welcoming, and inclusive
  culture; intellectual challenges; and the development opportunities you need to
  grow.</p><p>Diversity is important to us, therefore, Realtor.com® is an Equal Opportunity
  Employer regardless of age, color, national origin, race, religion, creed, gender,
  sex, sexual orientation, gender identity and/or expression, marital status, status
  as a disabled veteran and/or veteran of the Vietnam Era or any other characteristic
  protected by federal, state or local law. In addition, Realtor.com® will provide
  reasonable accommodations for otherwise qualified disabled individuals.</p></p>'
