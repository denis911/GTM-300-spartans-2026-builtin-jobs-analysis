description_html: '<p>As a Senior Enablement Manager, Emerging Technology, you will
  help transform the way we work by enabling employees to confidently and effectively
  leverage AI in their day-to-day roles. Your work will accelerate AI fluency across
  the organization and help teams adopt AI in ways that drive real business impact.
  One of your core responsibilities will be to manage, iterate, and evolve our AI
  Learning Center, an employee hub for AI upskilling and knowledge sharing. This role
  is part strategist, part builder, part educator, and part evangelist. You’ll design
  programs that meaningfully raise AI capability levels at multiple levels of technical
  depth, support responsible adoption of next-generation AI technologies, and empower
  teams to innovate with AI in practical, impactful ways.</p><p><em><span>At Datadog,
  we place value in our office culture - the relationships and collaboration it builds
  and the creativity it brings to the table. We operate as a hybrid workplace to ensure
  our Datadogs can create a work-life harmony that best fits them.</span></em></p><p><strong>What
  You’ll Do:</strong></p><ul><li>Design, build, and continuously improve AI enablement
  programs that meet employees where they are — from foundational concepts to advanced
  technical content</li><li>Partner cross-functionally with Engineering, Product,
  GTM, and other teams to identify needs and deliver support such as onboarding journeys,
  role-based pathways, custom tooling, and ongoing learning initiatives</li><li>Create
  scalable playbooks, hands-on sessions, events, programs, and tools that accelerate
  AI knowledge, adoption, and responsible use across the company</li><li>Identify
  and amplify successful AI use cases across teams, turning them into repeatable processes
  and storytelling assets that inspire broader adoption</li><li>Innovate and experiment
  with AI — rapidly prototype internal agents, custom GPTs, and other solutions that
  showcase new ways Datadogs can work smarter and faster</li><li>Collaborate with
  Legal, Security, and Compliance teams to promote safe and appropriate AI use at
  Datadog</li><li>Define and measure success through business outcomes, behavioral
  data, and feedback</li><li>Serve as an internal AI subject matter expert, staying
  current with emerging technologies and translating complex concepts into practical,
  accessible enablement experiences</li></ul><p><strong>Who You Are:</strong></p><ul><li>Technical
  skillset and hands-on experience using and building with modern AI tools (e.g.,
  LLMs, agents, prompt engineering, custom GPTs)</li><li>8+ years of professional
  experience, including 5+ years of enablement, L&amp;D, technical training, or similar
  at a high-growth technology or SaaS organization</li><li>Passionate about AI, proactive
  in staying on the cutting edge, and comfortable experimenting and leading from the
  front</li><li>Demonstrated ability to translate complex AI concepts into engaging
  learning experiences for both technical and non-technical audiences</li><li>Experience
  developing initiatives from zero-to-one and iterating to improve</li><li>Highly
  effective at collaborating across teams, influencing without authority, and driving
  alignment around shared objectives</li><li>Ability to analyze data and translate
  outcomes into measurable business impact</li></ul><p><em><span>Datadog values people
  from all walks of life. We understand not everyone will meet all the above qualifications
  on day one. That''s okay. If you’re passionate about technology and want to grow
  your skills, we encourage you to apply.</span></em></p><p><strong>Benefits and Growth:</strong><span>&nbsp;</span></p><ul><li><span>Best-in-breed
  onboarding</span></li><li><span>Generous global benefits</span></li><li><span>Intra-departmental
  mentor and buddy program for in-house networking</span></li><li><span>New hire stock
  equity (RSUs) and employee stock purchase plan (ESPP)</span></li><li><span>Continuous
  professional development, product training, and career pathing</span></li><li><span>An
  inclusive company culture, able to join our Community Guilds and Inclusion Talks</span></li></ul><p><em><span>Benefits
  and Growth listed above may vary based on the country of your employment and the
  nature of your employment with Datadog.</span></em></p><p>#LI-Hybrid</p><p><p><p><p>Datadog
  offers a competitive salary and equity package, and may include variable compensation.
  Actual compensation is based on factors such as the candidate''s skills, qualifications,
  and experience. In addition, Datadog offers a wide range of best in class, comprehensive
  and inclusive employee benefits for this role including healthcare, dental, parental
  planning, and mental health benefits, a 401(k) plan and match, paid time off, fitness
  reimbursements, and a discounted employee stock purchase plan.</p></p><p>The reasonably
  estimated yearly salary for this role at Datadog is:</p><p><span>$156,000</span><span>—</span><span>$215,000
  USD</span></p></p></p><p><p><strong>About Datadog:&nbsp;</strong></p><p>Datadog
  (NASDAQ: DDOG) is a global SaaS business, delivering a rare combination of growth
  and profitability. We are on a mission to break down silos and solve complexity
  in the cloud age by enabling digital transformation, cloud migration, and infrastructure
  monitoring of our customers’ entire technology stacks. Built by engineers, for engineers,
  Datadog is used by organizations of all sizes across a wide range of industries.
  Together, we champion professional development, diversity of thought, innovation,
  and work excellence to empower continuous growth. Join the pack and become part
  of a collaborative, pragmatic, and thoughtful people-first community where we solve
  tough problems, take smart risks, and celebrate one another. Learn more about #DatadogLife
  on Instagram, LinkedIn, and Datadog Learning Center. </p><p><strong>Equal Opportunity
  at Datadog:</strong></p><p>Datadog is proud to offer equal employment opportunity
  to everyone regardless of race, color, ancestry, religion, sex, national origin,
  sexual orientation, age, citizenship, marital status, disability, gender identity,
  veteran status, and other characteristics protected by law. We also consider qualified
  applicants regardless of criminal histories, consistent with legal requirements.
  Here are our Candidate Legal Notices for your reference.&nbsp;</p><p>Datadog endeavors
  to make our Careers Page accessible to all users. If you would like to contact us
  regarding the accessibility of our website or need assistance completing the application
  process, please complete this form. This form is for accommodation requests only
  and cannot be used to inquire about the status of applications.&nbsp;</p><p><strong>Privacy
  and AI Guidelines:</strong></p><p>Any information you submit to Datadog as part
  of your application will be processed in accordance with Datadog’s&nbsp;Applicant
  and Candidate Privacy Notice. For information on our AI policy, please visit Interviewing
  at Datadog AI Guidelines.</p></p>'
