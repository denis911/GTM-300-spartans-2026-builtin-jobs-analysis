date_posted: '2026-03-09'
description_html: '<p><p>LogicGate® is the leading AI GRC platform for the Enterprise,
  helping governance, risk, and compliance teams limit surprises, strengthen resilience,
  augment program performance, and confidently quantify impact and business value.
  Built to provide a centralized view of risk and compliance, with AI intelligence
  woven into the platform''s core, LogicGate delivers real-time insights and actionable
  data to help drive current business decisions, with the flexibility to scale alongside
  evolving business needs. Recognized as a Leader in the GRC Market, LogicGate continues
  to further solidify its position as a best-in-class platform.</p><p>At LogicGate,
  our people are the foundation of everything we do. We are committed to delivering
  an exceptional experience for our employees and our customers by empowering and
  enabling our people to take ownership, make an impact, and deliver their best work.</p></p><p><strong>The
  Role</strong></p><p>(Based in Chicago)</p><p>We''re looking for a curious, technically-minded
  undergrad or recent grad to join our Growth Marketing team as a GTM Engineer Intern
  for the Summer 2026. This is not a traditional sales development or marketing internship.
  You''ll be embedded with our growth team to design, build, and ship AI-powered tools
  and automations that directly impact pipeline generation and sales productivity.</p><p>The
  capstone of this internship is building a working AI SDR — an AI-powered agent that
  can research prospects, personalize outreach, and integrate into our sales workflow.
  Along the way, you''ll work hands-on with some of the most exciting tools in the
  modern GTM stack.</p><p>How you’ll spend your time:</p><ul><li>Design and build
  an AI SDR prototype using a combination or LLM APIs (OpenAI, Claude, Gemini) and
  low code tools that automates personalized prospect research and outreach generation</li><li>Build
  and maintain automations and workflows to connect marketing and sales systems</li><li>Experiment
  with vibe-coding, AI agents, and/or prompt engineering to improve lead qualification
  and GTM orchestration</li><li>Collaborate with the Growth Marketing, Revenue Operations,
  and Sales teams to identify automation opportunities and reduce manual GTM work</li><li>Document
  your builds, workflows, and findings so the team can iterate after the summer</li></ul><p><strong>What
  We''re Looking For</strong></p><p>Required</p><ul><li>Currently pursuing a bachelor''s
  degree (junior or senior) in Computer Science, Information Systems, Marketing Technology,
  or a related field</li><li>Comfortable working with APIs — you''ve used Postman,
  written API calls in Python or JavaScript, or connected apps via REST</li><li>Familiarity
  with LLM (ChatGPT, Claude, Gemini) beyond just chatting — you''ve explored prompting,
  chaining, or building something with one</li><li>Strong curiosity and a bias for
  building — you don''t wait to be told how something works</li><li>Ability to work
  hybrid out of our Chicago HQ</li></ul><p><strong>Nice to Have</strong></p><ul><li>Prior
  experience with Clay, Zapier, n8n, or similar automation/enrichment tools</li><li>Exposure
  to Salesforce (any capacity)</li><li>Experience building a personal project, hackathon
  entry, or side tool using AI/LLMs</li><li>Interest in B2B SaaS, GRC, or revenue
  operations</li></ul><p><strong>What You''ll Walk Away With</strong></p><ul><li>A
  shipped AI SDR prototype you can demo and put in your portfolio</li><li>Hands-on
  experience with the modern GTM tech stack.</li><li>Mentorship from an experienced
  growth marketing, revenue operations, and sales leader in the B2B SaaS space</li><li>Real
  ownership — you''ll present your work to the broader GTM team at the end of the
  program</li><li>A front-row seat to how a high-growth GRC SaaS company goes to market</li></ul><p><strong>Program
  Details:</strong></p><ul><li>12-week internship starting on June 1, 2026 through
  August 28, 2026</li></ul><p><em>Note: the exact end date is flexible and will be
  discussed during the interview process</em></p><ul><li>We offer competitive, market-anchored
  pay for our interns. The anticipated hourly rate for this role is $40/hr.</li><li>Interns
  are expected to work from our office located in downtown Chicago (River North),
  2-4 days per week</li><li>Gain meaningful work experience in the field of study
  and participate in special projects.</li><li>Take part in Internship Program activities,
  including social events, development workshops, networking with company leaders,
  and more!</li><li>Assigned to a mentor to guide you throughout your internship and
  beyond!</li></ul><p><strong>Program Eligibility:</strong></p><ul><li>You are enrolled
  full time in an accredited college or university as a Junior or Senior or have recently
  graduated within the past 6 months with your Undergraduate Degree.</li><li>Are available
  to work 40 hours per week during the summer.</li><li>This position is not eligible
  for sponsorship.&nbsp;</li></ul><p><strong>Our Culture</strong></p><p>At LogicGate,
  our culture and employee experience are grounded in our core values of Be as One,
  Do the Right Thing, Embrace Curiosity, Own It, Empower Customers, and Raise the
  Bar, which guide how we show up - for each other, our customers, and all we interact
  with.</p><p>We believe that the strongest teams are made up of individuals who bring
  their different identities, experiences, and perspectives to the table. We are committed
  to fostering an inclusive work environment where all employees’ differences are
  celebrated and everyone is encouraged to bring their authentic selves to work.</p><p>We
  encourage everyone to join one of our Employee Resource Groups (AAPI @ LogicGate,
  Pride at LogicGate, and Women in LogicGate) to participate in and contribute to
  conversations that foster an inclusive culture.</p><p>LogicGate also believes strongly
  in giving back to the communities in which we live and work. To enable our teams
  to give back, we offer paid volunteer hours and company-wide charitable activities
  supporting a variety of organizations and causes.</p><p>We are proud to have been
  recognized as a top workplace by Built In, Crain’s Chicago Business, the Chicago
  Tribune, and more. Visit our website to learn about our latest recognition.</p><p>Learn
  more about our culture here.&nbsp;</p><p><strong>Excited about LogicGate but not
  familiar with GRC?&nbsp;</strong></p><ul><li>GRC stands for Governance, Risk, and
  Compliance</li><li>GRC professionals help their companies manage uncertainty, act
  with integrity, and stay on the right side of the law.&nbsp;</li><li>The GRC market
  is rapidly expanding with continuous growth opportunities. The current market size
  was valued at $50.5 billion in 2024 and is projected to reach $104.5 billion by
  2031.</li></ul>'
