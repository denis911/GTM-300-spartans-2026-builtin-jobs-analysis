description_html: '<b>We''re building a new healthcare clearinghouse</b><p>In the
  healthcare sector, the Health Insurance Portability and Accountability Act of 1996
  (HIPAA) requires that all insurance payers exchange transactions such as claims,
  eligibility checks, prior authorizations, and remittances using a standardized EDI
  format called X12 HIPAA. A small group of legacy clearinghouses process the majority
  of these transactions, offering consolidated connectivity to carriers and providers.</p><p></p><p>Stedi
  is the world''s only programmable healthcare clearinghouse. By offering modern API
  interfaces alongside traditional real-time and batch EDI processes, we enable both
  healthcare technology businesses and established players to exchange mission-critical
  transactions. Our clearinghouse product and customer-first approach have set us
  apart. Stedi was ranked by Ramp as one of the fastest-growing SaaS vendors.</p><p></p><p>Stedi
  has lightning in a bottle: engineers and designers shipping products week in and
  week out; a lean business team supporting the company’s infrastructure; passion
  for automation and eliminating toil; $142 million in funding from top investors
  like Stripe, Addition, USV, Bloomberg Beta, First Round Capital, and more. To learn
  more about how we work, watch our founder Zack’s interview with First Round Capital.</p><p></p><b><strong>What
  we’re looking for</strong></b><p>We’re looking for an experienced <strong>GTM Engineer</strong>
  to build and scale a world-class outbound engine, driving measurable deal volume
  across multiple channels (email, cold calling, LinkedIn, events, and more). This
  role sits at the intersection of marketing, sales, and operations: equal parts strategist
  and builder.</p><p>You’ll combine technical know-how with a marketer’s mindset to
  create campaigns and workflows that generate high-conversion opportunities for our
  sales team. You’ll also support and uplevel a team of BDRs, designing repeatable
  processes, automating what can be automated, and enhancing what can’t with personalization
  and human touch.</p><p>If you’re equally excited by running experiments, writing
  great messaging, and architecting systems that scale, this role is for you.</p><p></p><b><strong>Who
  you are</strong></b><ul><li><p><strong>A multi-channel outbound expert. </strong>You’ve
  built or contributed to high-performing outbound programs that drive measurable
  results across multiple channels.</p></li><li><p><strong>Technically strong. </strong>You’re
  fluent in the modern outbound tech stack, including HubSpot, Clay, Apollo, Smartlead,
  LinkedIn automation, and other enrichment tools. You’re comfortable building automations
  or light scripts to connect workflows.</p></li><li><p><strong>A marketer at heart.
  </strong>You obsess over audience, message, and positioning - it’s not just a numbers
  game to you, not just touch counts. You understand how to communicate value in a
  way that resonates.</p></li><li><p><strong>You’re a BDR force-multiplier. </strong>You
  enjoy coaching and collaborating with BDRs, creating structure and playbooks that
  make them more effective.</p></li><li><p><strong>Data-driven and experimental. </strong>You
  analyze results, identify bottlenecks, and iterate quickly to improve. You think
  in terms of pipeline and revenue impact.</p></li><li><p><strong>You’re an AI power-user.
  </strong>You use AI tools to accelerate research, personalization, and copywriting
  without losing the human touch.</p></li><li><p><strong>You have a product mindset.</strong>
  You are able to intuitively understand the product and how those features solve
  problems for your ICP. You are able to articulate those to drive interest and conversion.</p></li><li><p><strong>You
  do what it takes to get the job done.</strong> You are resourceful, self-motivating,
  self-disciplined, and don’t wait to be told what to do. You put in the hours.</p></li><li><p><strong>You
  move fast. </strong>We move fast as an organization. This requires an ability to
  match our pace and not get lost by responding with urgency, communicating what you
  are working on, and proactively asking for help or feedback when you need it.</p></li></ul><p></p><b><strong>What
  you''ll do</strong></b><ul><li><p><strong>Drive outbound deal volume across all
  channels.</strong> Design and execute multi-channel outbound strategies that generate
  qualified pipeline through email, cold calls, LinkedIn campaigns, and events.</p></li><li><p><strong>Partner
  with and support BDRs and AEs.</strong> Collaborate with BDRs and AEs to improve
  workflows, cadence design, and messaging. Automate repetitive tasks while equipping
  the team with tools, data, and copy frameworks that help them convert.</p></li><li><p><strong>Run
  experiments that scale.</strong> Develop and test new outbound tactics, targeting
  logic, and messaging angles. Measure performance and double down on what works.</p></li><li><p><strong>Automate
  and optimize workflows.</strong> Build systems that streamline prospecting, enrichment,
  and outreach using tools like Clay, Apollo, HubSpot, and Smartlead, while maintaining
  authenticity and relevance.</p></li><li><p><strong>Own campaign performance.</strong>
  Monitor key metrics across channels such as meetings booked, pipeline generated,
  and conversion rates, and use insights to continuously optimize the engine.</p></li><li><p><strong>Collaborate
  cross-functionally.</strong> Work closely with sales, marketing, and operations
  to align outbound motion with ICP, messaging, and campaign goals.</p></li><li><p><strong>Stay
  ahead of the curve.</strong> Leverage the latest AI, data, and automation capabilities
  to keep our outbound program at the leading edge.</p></li></ul><p></p><p><strong>We’ve
  been made aware of individuals impersonating the Stedi recruiting team. </strong>Please
  note:</p><ul><li><p>All official communication about roles at Stedi will <strong>only
  come from an @</strong><strong>stedi.com</strong><strong> email address.</strong></p></li><li><p>If
  you’re unsure whether a message is legitimate or have any concerns, feel free to
  <strong>contact us directly at</strong> <strong>careers@stedi.com</strong><strong>.</strong></p></li></ul><p>We
  appreciate your attention to this and your interest in joining Stedi.</p><p></p><p><em>At
  Stedi, we''re looking for people who are deeply curious and aligned to our ways
  of working. You''re encouraged to apply even if your experience doesn''t perfectly
  match the job description. </em></p>'
description_text: 'We''re building a new healthcare clearinghouse In the healthcare
  sector, the Health Insurance Portability and Accountability Act of 1996 (HIPAA)
  requires that all insurance payers exchange transactions such as claims, eligibility
  checks, prior authorizations, and remittances using a standardized EDI format called
  X12 HIPAA. A small group of legacy clearinghouses process the majority of these
  transactions, offering consolidated connectivity to carriers and providers. Stedi
  is the world''s only programmable healthcare clearinghouse. By offering modern API
  interfaces alongside traditional real-time and batch EDI processes, we enable both
  healthcare technology businesses and established players to exchange mission-critical
  transactions. Our clearinghouse product and customer-first approach have set us
  apart. Stedi was ranked by Ramp as one of the fastest-growing SaaS vendors. Stedi
  has lightning in a bottle: engineers and designers shipping products week in and
  week out; a lean business team supporting the company’s infrastructure; passion
  for automation and eliminating toil; $142 million in funding from top investors
  like Stripe, Addition, USV, Bloomberg Beta, First Round Capital, and more. To learn
  more about how we work, watch our founder Zack’s interview with First Round Capital.
  What we’re looking for We’re looking for an experienced GTM Engineer to build and
  scale a world-class outbound engine, driving measurable deal volume across multiple
  channels (email, cold calling, LinkedIn, events, and more). This role sits at the
  intersection of marketing, sales, and operations: equal parts strategist and builder.
  You’ll combine technical know-how with a marketer’s mindset to create campaigns
  and workflows that generate high-conversion opportunities for our sales team. You’ll
  also support and uplevel a team of BDRs, designing repeatable processes, automating
  what can be automated, and enhancing what can’t with personalization and human touch.
  If you’re equally excited by running experiments, writing great messaging, and architecting
  systems that scale, this role is for you. Who you are A multi-channel outbound expert.
  You’ve built or contributed to high-performing outbound programs that drive measurable
  results across multiple channels. Technically strong. You’re fluent in the modern
  outbound tech stack, including HubSpot, Clay, Apollo, Smartlead, LinkedIn automation,
  and other enrichment tools. You’re comfortable building automations or light scripts
  to connect workflows. A marketer at heart. You obsess over audience, message, and
  positioning - it’s not just a numbers game to you, not just touch counts. You understand
  how to communicate value in a way that resonates. You’re a BDR force-multiplier.
  You enjoy coaching and collaborating with BDRs, creating structure and playbooks
  that make them more effective. Data-driven and experimental. You analyze results,
  identify bottlenecks, and iterate quickly to improve. You think in terms of pipeline
  and revenue impact. You’re an AI power-user. You use AI tools to accelerate research,
  personalization, and copywriting without losing the human touch. You have a product
  mindset. You are able to intuitively understand the product and how those features
  solve problems for your ICP. You are able to articulate those to drive interest
  and conversion. You do what it takes to get the job done. You are resourceful, self-motivating,
  self-disciplined, and don’t wait to be told what to do. You put in the hours. You
  move fast. We move fast as an organization. This requires an ability to match our
  pace and not get lost by responding with urgency, communicating what you are working
  on, and proactively asking for help or feedback when you need it. What you''ll do
  Drive outbound deal volume across all channels. Design and execute multi-channel
  outbound strategies that generate qualified pipeline through email, cold calls,
  LinkedIn campaigns, and events. Partner with and support BDRs and AEs. Collaborate
  with BDRs and AEs to improve workflows, cadence design, and messaging. Automate
  repetitive tasks while equipping the team with tools, data, and copy frameworks
  that help them convert. Run experiments that scale. Develop and test new outbound
  tactics, targeting logic, and messaging angles. Measure performance and double down
  on what works. Automate and optimize workflows. Build systems that streamline prospecting,
  enrichment, and outreach using tools like Clay, Apollo, HubSpot, and Smartlead,
  while maintaining authenticity and relevance. Own campaign performance. Monitor
  key metrics across channels such as meetings booked, pipeline generated, and conversion
  rates, and use insights to continuously optimize the engine. Collaborate cross-functionally.
  Work closely with sales, marketing, and operations to align outbound motion with
  ICP, messaging, and campaign goals. Stay ahead of the curve. Leverage the latest
  AI, data, and automation capabilities to keep our outbound program at the leading
  edge. We’ve been made aware of individuals impersonating the Stedi recruiting team.
  Please note: All official communication about roles at Stedi will only come from
  an @ stedi.com email address. If you’re unsure whether a message is legitimate or
  have any concerns, feel free to contact us directly at careers@stedi.com . We appreciate
  your attention to this and your interest in joining Stedi. At Stedi, we''re looking
  for people who are deeply curious and aligned to our ways of working. You''re encouraged
  to apply even if your experience doesn''t perfectly match the job description.'
