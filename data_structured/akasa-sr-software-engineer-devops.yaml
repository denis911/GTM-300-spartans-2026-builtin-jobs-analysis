company_overview: 'American medicine is the best in the world. But the American healthcare
  system is challenged by high administrative costs that burden patients, health systems,
  and insurance companies with unnecessary expenses. We are focused on addressing
  those challenges.We use GenAI to improve the most pressing financial pain points
  in the revenue cycle. We’re one of the first companies to deploy GenAI for practical
  use cases within healthcare. That gives health systems the ability to focus on what
  really matters: helping patients.This is one of the most exciting times to join
  AKASA. Bookings for our GenAI product suite have increased 10x in the last year.
  We also recently closed our biggest deal in company history. Our customer base represents
  more than $120B+ in net patient revenue and includes the most innovative health
  systems in the country, like Stanford, Johns Hopkins, and Cleveland Clinic. And
  we’re just getting started! Some of our most recent recognitions include being named
  one of the fastest-growing GenAI startups to watch by AIM Research and an “AI Revenue
  Cycle Leader” by Black Book in 17 out of 18 categories. Our CEO was ranked among
  the “Top 50 Healthcare Technology CEOs” by the Healthcare Technology Report, and
  we have been certified as a “Great Place to Work” for the past five years in a row,
  just to name a few.'
