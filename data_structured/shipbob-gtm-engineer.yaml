company_overview: Founded in 2014, ShipBob is a tech-enabled 3PL that offers simple,
  fast and affordable fulfillment for thousands of brands with an international fulfillment
  network across the US, Canada, Europe, and Australia. ShipBob's proprietary technology
  combines order and inventory management, warehouse management, predictive data and
  analytics, as well as optimized shipping for ecommerce companies.
