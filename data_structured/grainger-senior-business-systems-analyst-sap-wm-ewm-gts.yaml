description_html: '<strong>Work Location Type: </strong> <strong><strong><strong><strong>Hybrid</strong></strong></strong></strong>     <br>Req
  Number  327144 <br><strong> About Grainger </strong> <br>W.W. Grainger, Inc., is
  a leading broad line distributor with operations primarily in North America, Japan
  and the United Kingdom. At Grainger, We Keep the World Working® by serving more
  than 4.5 million customers worldwide with products and solutions delivered through
  innovative technology and deep customer relationships. Known for its commitment
  to service and award-winning culture, the Company had 2024 revenue of $17.2 billion
  across its two business models. In the High-Touch Solutions segment, Grainger offers
  approximately 2 million maintenance, repair and operating (MRO) products and services,
  including technical support and inventory management. In the Endless Assortment
  segment,  Zoro.com  offers customers access to more than 14 million products, and  MonotaRO.com  offers
  more than 24 million products. For more information, visit  www.grainger.com.   <br><strong>
  Compensation </strong> <br>The anticipated base pay compensation range for this
  position is $87,200.00  to $145,300.00. <br><strong> "This position is not eligible
  for any form of sponsorship now or in the future.  Individuals requiring sponsorship
  (e.g. OPT or H1B visa  status) should not apply. Only individuals authorized to
  work in the United States now and for the foreseeable future will be considered
  for this position."  </strong> <br><strong>Rewards and Benefits</strong> <br>With
  benefits starting on day one, our programs provide choice and flexibility to meet
  team members'' individual needs, including: <br><ul> <li> Medical, dental, vision,
  and life insurance plans with coverage starting on day one of employment and 6 free
  sessions each year with a licensed therapist to support your emotional wellbeing.
  </li> <li> 18 paid time off (PTO) days annually for full-time employees (accrual
  prorated based on employment start date) and 6 company holidays per year. </li>
  <li> 6% company contribution to a 401(k) Retirement Savings Plan each pay period,
  no employee contribution required. </li> <li> Employee discounts, tuition reimbursement,
  student loan refinancing and free access to financial counseling, education, and
  tools. </li> <li> Maternity support programs, nursing benefits, and up to 14 weeks
  paid leave for birth parents and up to 4 weeks paid leave for non-birth parents.
  </li> </ul> <br>For additional information and details regarding Grainger''s benefits,
  please click on the link below: <br>https://experience100.ehr.com/grainger/Home/Tools-Resources/Key-Resources/New-Hire
  <br>The pay range provided above is not a guarantee of compensation.  The range
  reflects the potential base pay for this role at the time of this posting based
  on the job grade for this position. Individual base pay compensation will depend,
  in part, on factors such as geographic work location and relevant experience and
  skills.  <br>The anticipated compensation range described above is subject to change
  and the compensation ultimately paid may be higher or lower than the range described
  above.  <br>Grainger reserves the right to amend, modify, or terminate its compensation
  and benefit programs in its sole discretion at any time, consistent with applicable
  law. <br><strong> Position Details </strong> <br>The Warehouse Management Systems
  (WMS) team supports the technology that powers Grainger''s distribution centers
  and branch network for North America. We ensure the right products move efficiently
  through our supply chain to meet customer needs. <br>In this fast-paced and complex
  environment, our team builds and supports the systems that drive inventory movement,
  order fulfillment, warehouse automation, and network efficiency. We work closely
  with operations to deliver scalable, resilient solutions that enable growth and
  continuous improvement. <br>This team supports a variety of systems and software:  SAP
  EWM 7.0, S/4 Hana for EWM, SAP WM, SAP GTS, Manhattan, Kafka, Connectship, Logistiview,
  Dematic and others.  This role will focus heavily on integration, defining and solving
  for business requirements, code development and configuration, working across a
  wide range of technologies and systems while having a heavy focus on documentation
  governance. The ideal candidate brings a strong understanding of supply chain and
  warehouse management processes and technical integration between SAP and other applications,
  and a deep appreciation for documentation with a focus on scalable and maintainable
  solutions to support and evolve our critical supply chain platforms. <br><strong>
  Our Vision </strong> <br>We aim to modernize and optimize supply chain technology
  through agile engineering and close business collaboration, leveraging Generative
  AI and machine learning to anticipate disruptions, optimize inventory and flow,
  and accelerate issue resolution-while maintaining rigorous governance and security.
  Our systems must adapt quickly to change, support innovation, and ensure operational
  excellence across the DC and Branch network.  <br><strong> You will  </strong> <br><ul>
  <li> Independently configure system solutions for defined business requirements
  within an application. </li> <li> Collaborate with product owners and business users
  to refine user stories. </li> <li> Create, execute, and validate test cases across
  configuration and functional changes. </li> <li> Document functional specifications
  and user procedures. </li> <li> Troubleshoot common issues related to configuration,
  master data, and user errors. </li> <li> Maintain security, compliance and audit
  standards. </li> <li> Contribute to process improvement efforts by identifying inefficiencies
  in the rrent config and process flow.  Track and improve metrics for system effectiveness
  and delivery processes. </li> <li> Participate in release planning and ensure timely
  delivery of stories. </li> <li> Provides functional configuration and testing expertise
  in core business systems. Translates business requirements into functional specs
  and supports day-to-day system performance. </li> <li> Leads solution design and
  cross-functional configuration work. Serves as a subject matter expert and drives
  improvement of key processes and standards. </li> <li> Design and implement complex
  configuration solutions across integrated system processes (e.g., ECC into EWM or
  MM/SD into WM). </li> <li> Lead requirement gathering sessions and facilitate alignment
  across business and IT. </li> <li> Perform root cause analysis on issues and identify
  long-term fixes or design enhancements. </li> <li> Act as subject matter expert
  (SME) for specific functional areas or business processes. </li> <li> Coordinate
  with developers, testers, and interface partners to deliver complete solutions.
  </li> <li> Support test planning and execution, including defect triage and test
  coverage assurance. </li> <li> Contributes to standardization of configuration and
  documentation practices. </li> <li> Assist with evaluation of emerging technologies,
  tools or processes and advocate for adoption when valuable. </li> <li> Mentors peers
  and junior level talent. </li> </ul> <br><strong> You have </strong> <br><ul> <li>
  Bachelor''s degree; Master''s degree in Business or Information Systems is a plus.
  </li> <li> Minimum 3 years of SAP experience with increasing responsibility in analysis,
  configuration, and testing. </li> <li> Proficiency in 1-2 SAP modules; hands-on
  experience designing and implementing integrated SAP solutions.  Prefer SAP GTS,
  WM, Stockroom Management and/or EWM. </li> <li> Strong analytical thinking, root
  cause analysis, stakeholder communication, backlog refinement, E2E process mapping.
  </li> <li> Certifications: SAP module training (e.g., SAP SD, MM, S/4HANA); Agile
  Product Ownership or Scrum Master certifications are a plus. </li> <li> Experience
  with Generative AI and knowledge of Machine Learning concepts. </li> </ul><br>We
  are committed to equal employment opportunity regardless of race, color, ancestry,
  religion, sex (including pregnancy), national origin, sexual orientation, age, citizenship,
  marital status, disability, gender identity or expression, protected veteran status
  or any other protected characteristic under federal, state, or local law. We are
  proud to be an equal opportunity workplace. <br>We are committed to fostering an
  inclusive, accessible work environment that includes both providing reasonable accommodations
  to individuals with disabilities during the application and hiring process as well
  as throughout the course of one''s employment, should you need a reasonable accommodation
  during the application and selection process, including, but not limited to use
  of our website, any part of the application, interview or hiring process, please
  advise us so that we can provide appropriate assistance.'
