description_html: '<p>We’re looking for an Embedded Software Engineer who is naturally
  curious, self-motivated, and energized by building real systems that move from idea
  to deployment. This role is well suited for someone who takes initiative, works
  with a strong sense of urgency, and enjoys maintaining momentum in a fast-moving
  environment. You’ll design and develop embedded firmware that powers remotely operated
  robotic platforms, working hands-on with evolving hardware, bringing up boards,
  integrating sensors and communications systems, and optimizing performance in demanding
  real-world conditions. This is an opportunity for someone who enjoys ownership,
  takes pride in their craft, and is motivated by solving meaningful technical challenges
  while helping shape products as they mature into reliable, field-ready systems.</p><ul><li><p><strong>What
  You’ll Do / Responsibilities</strong></p><p><span style="color: rgba(0, 0, 0, 1)">&nbsp;•
  Design and implement embedded firmware for robotic systems, from R&amp;D through
  production and commercial deployment.</span></p><p><span style="color: rgba(0, 0,
  0, 1)">• Work on high-performance real-time embedded systems with multiple components
  (e.g., sensors, actuators, and communication stacks).</span></p><p><span style="color:
  rgba(0, 0, 0, 1)">• Develop robust, trustworthy code for long-term reliability.</span></p><p><span
  style="color: rgba(0, 0, 0, 1)">• Develop and integrate drivers, middleware, and
  real-time control software for high-performance embedded robotic systems.</span></p><p><span
  style="color: rgba(0, 0, 0, 1)">• Support hardware-software integration:&nbsp; bring
  up boards, debug vehicle settings, optimize for rugged environments.</span></p><p><span
  style="color: rgba(0, 0, 0, 1)">• Contribute to testing, validation, and field support.</span></p><p><span
  style="color: rgba(0, 0, 0, 1)">• Debug and optimize for real-world hardware in
  a fast-moving startup environment.</span></p><p><span style="color: rgba(0, 0, 0,
  1)">• Own significant portions of the firmware stack due to small team size.</span></p><p><strong>Required
  Qualifications</strong></p><p><span style="color: rgba(0, 0, 0, 1)">• 2-4 years
  in embedded systems/firmware (C/C++ primary, Python for tools).&nbsp;</span></p><p><span
  style="color: rgba(0, 0, 0, 1)">• Proficiency in writing robust, production-grade
  code (C/C++, Rust).</span></p><p><span style="color: rgba(0, 0, 0, 1)">• Good understanding
  of communication protocols (SPI, EtherCAT, CAN), device time-sync, and basic signal
  processing.</span></p><p><span style="color: rgba(0, 0, 0, 1)">• Comfort working
  in a small, high-ownership environment with broad responsibility.</span></p><p><span
  style="color: rgba(0, 0, 0, 1)">• Passion for robotics/hardware and shipping real
  products.</span></p><p><strong>Nice-to-Haves / Bonuses</strong></p><p><span style="color:
  rgba(0, 0, 0, 1)">• Experience with power electronics, FPGA development, camera
  sensors, or similar.</span></p><p><span style="color: rgba(0, 0, 0, 1)">• Wireless
  comms in denied environments or safety-critical software.</span></p><p><span style="color:
  rgba(0, 0, 0, 1)">• Prior work on robotic/vehicle systems, teleoperation stacks,
  or real-time OS.</span></p><p><span style="color: rgba(0, 0, 0, 1)">• Background
  in safety-critical or high-reliability embedded code.</span></p><p><strong>Other
  Details</strong></p><p><strong>• Compensation/Equity:</strong><span style="color:
  rgba(0, 0, 0, 1)"> $100,000 - $140,000 + equity</span></p><p><strong>• Travel Requirements:
  </strong><span style="color: rgba(0, 0, 0, 1)">15%</span><strong>&nbsp;</strong></p><p><strong>•
  Location:&nbsp; </strong><span style="color: rgba(0, 0, 0, 1)">Denver, CO 80239
  (Full-Time, Onsite)</span><strong> - </strong><span style="color: rgba(0, 0, 0,
  1)">This is a hands-on, onsite engineering role working directly with physical robotic
  systems.</span></p><p><strong>Why Join Stridar?</strong></p><ul><li><strong>Competitive
  Compensation:</strong> Receive industry-competitive pay with equity in a fast-growing,&nbsp;
  tech company.</li><li><strong>Health Benefits:</strong> Rather than a traditional
  group plan, we provide a monthly reimbursement benefit to help cover the cost of
  individual health insurance premiums.</li><li><strong>Generous Time Off:</strong>&nbsp;
  Flexible PTO along with company-observed holidays and a winter shutdown between
  Christmas Eve and New Year’s Day to encourage real time to disconnect and recharge.</li><li><strong>Be
  Part of Something Big:</strong> Join a company driving innovation at the cutting
  edge of technology, where your contributions make a tangible, life-saving impact
  in robotics and defense.</li><li><strong>Ground-Floor Opportunity:</strong> Shape
  the future of a growing company while building your career alongside it.</li><li><strong>Collaborative
  Culture:</strong>&nbsp; Work alongside passionate, mission-driven colleagues in
  a fast-paced, innovative setting. </li><li><strong>Continuous Learning:</strong>
  Immerse yourself in a learning-rich environment where you’ll grow professionally
  and personally every day.</li><li><strong>Purpose-Driven Work:</strong> Contribute
  to meaningful projects that prioritize safety, efficiency, and making a difference
  globally.</li><li><strong>Recognition and Ownership:</strong> Your ideas and contributions
  matter and will directly influence our success.</li><li><strong>Startup Energy:</strong>
  Enjoy a dynamic, fast-paced atmosphere where innovation thrives, and every day is
  different.</li><li><strong>Flat Hierarchy:</strong> Be part of a team where every
  voice is heard, and decisions are made collaboratively</li></ul><p>&nbsp;</p><p><i>Stridar
  is an Equal Opportunity Employer, committed to employee diversity.</i></p><p><i>Application
  Deadline: This role will remain posted until a qualified pool of candidates is identified.</i></p><p>&nbsp;</p></li></ul>'
description_text: 'We’re looking for an Embedded Software Engineer who is naturally
  curious, self-motivated, and energized by building real systems that move from idea
  to deployment. This role is well suited for someone who takes initiative, works
  with a strong sense of urgency, and enjoys maintaining momentum in a fast-moving
  environment. You’ll design and develop embedded firmware that powers remotely operated
  robotic platforms, working hands-on with evolving hardware, bringing up boards,
  integrating sensors and communications systems, and optimizing performance in demanding
  real-world conditions. This is an opportunity for someone who enjoys ownership,
  takes pride in their craft, and is motivated by solving meaningful technical challenges
  while helping shape products as they mature into reliable, field-ready systems.
  What You’ll Do / Responsibilities &nbsp;• Design and implement embedded firmware
  for robotic systems, from R&amp;D through production and commercial deployment.
  • Work on high-performance real-time embedded systems with multiple components (e.g.,
  sensors, actuators, and communication stacks). • Develop robust, trustworthy code
  for long-term reliability. • Develop and integrate drivers, middleware, and real-time
  control software for high-performance embedded robotic systems. • Support hardware-software
  integration:&nbsp; bring up boards, debug vehicle settings, optimize for rugged
  environments. • Contribute to testing, validation, and field support. • Debug and
  optimize for real-world hardware in a fast-moving startup environment. • Own significant
  portions of the firmware stack due to small team size. Required Qualifications •
  2-4 years in embedded systems/firmware (C/C++ primary, Python for tools).&nbsp;
  • Proficiency in writing robust, production-grade code (C/C++, Rust). • Good understanding
  of communication protocols (SPI, EtherCAT, CAN), device time-sync, and basic signal
  processing. • Comfort working in a small, high-ownership environment with broad
  responsibility. • Passion for robotics/hardware and shipping real products. Nice-to-Haves
  / Bonuses • Experience with power electronics, FPGA development, camera sensors,
  or similar. • Wireless comms in denied environments or safety-critical software.
  • Prior work on robotic/vehicle systems, teleoperation stacks, or real-time OS.
  • Background in safety-critical or high-reliability embedded code. Other Details
  • Compensation/Equity: $100,000 - $140,000 + equity • Travel Requirements: 15% &nbsp;
  • Location:&nbsp; Denver, CO 80239 (Full-Time, Onsite) - This is a hands-on, onsite
  engineering role working directly with physical robotic systems. Why Join Stridar?
  Competitive Compensation: Receive industry-competitive pay with equity in a fast-growing,&nbsp;
  tech company. Health Benefits: Rather than a traditional group plan, we provide
  a monthly reimbursement benefit to help cover the cost of individual health insurance
  premiums. Generous Time Off: &nbsp; Flexible PTO along with company-observed holidays
  and a winter shutdown between Christmas Eve and New Year’s Day to encourage real
  time to disconnect and recharge. Be Part of Something Big: Join a company driving
  innovation at the cutting edge of technology, where your contributions make a tangible,
  life-saving impact in robotics and defense. Ground-Floor Opportunity: Shape the
  future of a growing company while building your career alongside it. Collaborative
  Culture: &nbsp; Work alongside passionate, mission-driven colleagues in a fast-paced,
  innovative setting. Continuous Learning: Immerse yourself in a learning-rich environment
  where you’ll grow professionally and personally every day. Purpose-Driven Work:
  Contribute to meaningful projects that prioritize safety, efficiency, and making
  a difference globally. Recognition and Ownership: Your ideas and contributions matter
  and will directly influence our success. Startup Energy: Enjoy a dynamic, fast-paced
  atmosphere where innovation thrives, and every day is different. Flat Hierarchy:
  Be part of a team where every voice is heard, and decisions are made collaboratively
  &nbsp; Stridar is an Equal Opportunity Employer, committed to employee diversity.
  Application Deadline: This role will remain posted until a qualified pool of candidates
  is identified. &nbsp;'
