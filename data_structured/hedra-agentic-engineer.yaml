description_html: '<b><strong>About Hedra</strong></b><p>Hedra is an AI that bridges
  the gap between market intelligence and content generation. By analyzing your existing
  assets, Hedra ensures every new creation is deeply aligned with your audience preferences,
  market trends and your brands core identity.<br>Backed by $45 million from premier
  investors like A16Z, Index, and Abstract Ventures, we are building the world’s most
  advanced models for unified media understanding. Today, Hedra powers the creative
  workflows of 10 million users and 20% of the Fortune 500. Join our team of world-class
  researchers and engineers as we define the next generation of creative super intelligence.</p><p></p><b><strong>Summary</strong></b><p>As
  an Agentic Engineer, you will design, build, and scale the systems that power AI
  agents and agentic workflows for Hedra''s transformative products. You''ll architect
  production-grade agent infrastructure moving well beyond simple API calls. You''ll
  work with frameworks like PydanticAI, AG-UI, and A2A, implement tool calling and
  multi-agent orchestration, and establish rigorous evaluation practices.</p><p></p><b><strong>Must-Have
  Experience</strong></b><ul><li><p>Built conversational agents or agentic systems
  leveraging foundation models (OpenAI, Gemini, Claude, Grok, etc.) at critical scale</p></li><li><p>Strong
  command of TypeScript, React, Node.js, and Python</p></li><li><p>Experience with
  LangChain, LangGraph, pydantic-ai, or equivalent orchestration frameworks</p></li><li><p>Solid
  grasp of agent architecture: tool/function calling, ReAct, multi-agent orchestration,
  agent loops</p></li><li><p>Hands-on experience with agent evals: trajectory evaluation,
  tool call accuracy, benchmarking</p></li><li><p>Experience integrating LLM-based
  systems into user-facing web products</p></li><li><p>Startup or 0→1 product environment
  experience</p><p></p></li></ul><b><strong>Nice-To-Have Experience</strong></b><ul><li><p>Production
  experience with conversation memory, context window management, RAG, and memory
  summarization</p></li><li><p>Experience with agent-frontend protocols: AG-UI, SSE
  streaming, tool streaming</p></li><li><p>Background in observability and monitoring
  for agentic systems</p></li><li><p>Experience with Kubernetes<br></p></li></ul><b><strong>Benefits</strong></b><ul><li><p>Competitive
  compensation and equity</p></li><li><p>401k</p></li><li><p>Healthcare (Silver PPO
  Medical, Vision, Dental)</p></li><li><p>Lunch and snacks at the office<br></p></li></ul><p><em>We
  encourage you to apply even if you don''t fully meet all the listed requirements;
  we value potential and diverse perspectives, and your unique skills could be a great
  asset to our team.</em><br></p>'
description_text: 'About Hedra Hedra is an AI that bridges the gap between market
  intelligence and content generation. By analyzing your existing assets, Hedra ensures
  every new creation is deeply aligned with your audience preferences, market trends
  and your brands core identity. Backed by $45 million from premier investors like
  A16Z, Index, and Abstract Ventures, we are building the world’s most advanced models
  for unified media understanding. Today, Hedra powers the creative workflows of 10
  million users and 20% of the Fortune 500. Join our team of world-class researchers
  and engineers as we define the next generation of creative super intelligence. Summary
  As an Agentic Engineer, you will design, build, and scale the systems that power
  AI agents and agentic workflows for Hedra''s transformative products. You''ll architect
  production-grade agent infrastructure moving well beyond simple API calls. You''ll
  work with frameworks like PydanticAI, AG-UI, and A2A, implement tool calling and
  multi-agent orchestration, and establish rigorous evaluation practices. Must-Have
  Experience Built conversational agents or agentic systems leveraging foundation
  models (OpenAI, Gemini, Claude, Grok, etc.) at critical scale Strong command of
  TypeScript, React, Node.js, and Python Experience with LangChain, LangGraph, pydantic-ai,
  or equivalent orchestration frameworks Solid grasp of agent architecture: tool/function
  calling, ReAct, multi-agent orchestration, agent loops Hands-on experience with
  agent evals: trajectory evaluation, tool call accuracy, benchmarking Experience
  integrating LLM-based systems into user-facing web products Startup or 0→1 product
  environment experience Nice-To-Have Experience Production experience with conversation
  memory, context window management, RAG, and memory summarization Experience with
  agent-frontend protocols: AG-UI, SSE streaming, tool streaming Background in observability
  and monitoring for agentic systems Experience with Kubernetes Benefits Competitive
  compensation and equity 401k Healthcare (Silver PPO Medical, Vision, Dental) Lunch
  and snacks at the office We encourage you to apply even if you don''t fully meet
  all the listed requirements; we value potential and diverse perspectives, and your
  unique skills could be a great asset to our team.'
