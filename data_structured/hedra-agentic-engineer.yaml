company_overview: Hedra is an AI native platform for multimodal creation. The platform
  is built around their own cutting-edge proprietary video model, Character-3, which
  is the first multimodal model in production. Alongside Character-3, the platform
  also brings other leading foundation models into one ecosystem spanning generative
  images, video, and audio. Prosumer and enterprise users leverage Hedra to generate
  content ranging from viral social media to branded content marketing.
