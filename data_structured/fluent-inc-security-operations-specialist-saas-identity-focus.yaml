description_html: '<p>We''re seeking a Security Operations Specialist (SaaS &amp;
  Identity Focus) to join our team and play a critical role in maintaining and enhancing
  our security posture. This position combines technical security expertise with strong
  interpersonal skills, requiring someone who can both monitor and respond to security
  incidents while effectively collaborating with diverse stakeholders across the organization.</p><b><strong>What
  You''ll Do</strong></b><p><em><strong>Security Operations &amp; Monitoring</strong></em></p><ul><li>Monitor,
  investigate, and respond to security incidents and alerts in real-time</li><li>Manage
  and optimize security tools including Crowdstrike and Wiz</li><li>Conduct threat
  hunting and proactive security analysis to identify potential vulnerabilities</li><li>Develop
  and maintain security incident response playbooks and documentation</li><li>Perform
  log analysis and correlation to identify security events and anomalies</li></ul><p><em><strong>Compliance
  &amp; Risk Management</strong></em></p><ul><li>Support SOC2 audit preparation and
  maintain ongoing compliance requirements</li><li>Assist with other security and
  compliance certification standards and frameworks</li><li>Implement and enforce
  security policies, procedures, and controls</li><li>Conduct security assessments
  and risk evaluations</li><li>Maintain evidence collection and documentation for
  audit purposes</li></ul><p><em><strong>Collaboration &amp; Support</strong></em></p><ul><li>Serve
  as a security resource and advisor to end users, providing guidance on security
  best practices</li><li>Partner with development teams to integrate security into
  the software development lifecycle</li><li>Communicate security incidents and risks
  to both technical and non-technical stakeholders</li><li>Provide security awareness
  training and guidance across the organization</li><li>Balance security requirements
  with business needs while maintaining a customer service-oriented approach</li></ul><br><b>Requirements</b><ul><li>3+
  years of experience in security operations, incident response, or related security
  role</li><li>Hands-on experience with Crowdstrike, Okta, Entra ID (Azure AD), and
  Wiz</li><li>Demonstrated experience supporting SOC2 audits and compliance programs</li><li>Familiarity
  with additional security and compliance frameworks (ISO 27001, NIST, PCI-DSS, HIPAA,
  etc.)</li><li>Strong understanding of security incident detection, analysis, and
  response methodologies</li><li>Experience working with SIEM platforms and security
  monitoring tools</li><li>Experience with scripting or automation tools (Python,
  PowerShell, n8n, Git, Jenkins, etc.)</li><li>Proven ability to communicate effectively
  with both technical teams and end users</li><li>Customer service mindset with the
  ability to balance security requirements with user needs</li></ul><p><strong>Preferred
  Qualifications</strong></p><ul><li>Relevant security certifications (Security+,
  CISSP, CISM, CEH, or similar)</li><li>Knowledge of cloud security best practices
  (AWS, Azure, or GCP)</li><li>Understanding of DevSecOps principles and practices</li><li>Experience
  with vulnerability management and penetration testing</li><li>Background in IT support
  or helpdesk roles</li></ul><p><strong>Skills &amp; Attributes</strong></p><ul><li>Strong
  analytical and problem-solving abilities</li><li>Excellent written and verbal communication
  skills</li><li>Ability to work independently and as part of a collaborative team</li><li>Detail-oriented
  with strong organizational skills</li><li>Adaptable and able to manage multiple
  priorities in a fast-paced environment</li><li>Commitment to continuous learning
  and staying current with evolving security threats</li></ul><p><strong>About Us</strong></p><p>Fluent,
  Inc. (NASDAQ: FLNT) is a commerce media solutions provider connecting top-tier brands
  with highly engaged consumers. Leveraging diverse ad inventory, robust first-party
  data, and proprietary machine learning, Fluent unlocks additional revenue streams
  for partners and empowers advertisers to acquire their most valuable customers at
  scale. Founded in 2010, Fluent uses its deep expertise in performance marketing
  to drive monetization and increase engagement at key touchpoints across the customer
  journey. For more insights visit:https://www.fluentco.com/</p><br><b>Benefits</b><p>At
  Fluent, we like what we do, and we like who we do it with. Our team is a tight-knit
  crew of go-getters; we love to celebrate our successes! In addition, we offer a
  fully stocked kitchen, catered lunch, and our office manager keeps the calendar
  stocked with activity filled events. When we’re not eating, working out, or planning
  parties, Fluent folks can be found participating in networking events, and bonding
  across teams during quarterly outings to baseball games, fancy dinners, and a variety
  of activities. And we have all the practical benefits, too…</p><ul><li>Competitive
  compensation</li><li>Ample career and professional growth opportunities</li><li>New
  Headquarters with an open floor plan to drive collaboration</li><li>Health, dental,
  and vision insurance</li><li>Pre-tax savings plans and transit/parking programs</li><li>401K
  with competitive employer match</li><li>Volunteer and philanthropic activities throughout
  the year</li><li>Educational and social events</li><li>The amazing opportunity to
  work for a high-flying performance marketing company!</li></ul><p>Salary Range:
  $100,000 to $130,000 base, + competitive bonus. The base salary range represents
  the low and high end of the Fluent salary range for this position. Actual salaries
  will vary depending on factors including but not limited to location, experience,
  and performance.</p><p>Candidates may be at risk of targeting by malicious actors
  seeking personal information. Fluent recruiters will only reach out via LinkedIn
  or email with an @fluentco.com domain. Any outreach by Fluent via other sources
  (e.g. text, other domains etc) should be ignored.</p><p>Fluent participates in the
  E-Verify Program. As a participating employer, Fluent, LLC will provide the Social
  Security Administration (SSA) and, if necessary, the Department of Homeland Security
  (DHS), with information from each new employee’s Form I-9 to confirm work authorization.
  Fluent, LLC follows all federal regulations including those set forth by The Office
  of Special Counsel for Immigration-Related Unfair Employment Practices (OSC). The
  OSC enforces the anti-discrimination provision (§ 274B) of the Immigration and Nationality
  Act (INA), 8 U.S.C. § 1324b.</p>'
