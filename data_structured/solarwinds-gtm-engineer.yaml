company_overview: SolarWinds is a leading provider of powerful and affordable IT management
  software. Our products give organizations worldwide—regardless of type, size, or
  complexity—the power to monitor and manage their IT services, infrastructures, and
  applications; whether on-premises, in the cloud, or via hybrid models. We continuously
  engage with technology professionals—IT service and operations professionals, DevOps
  professionals, and managed services providers (MSPs)—to understand the challenges
  they face in maintaining high-performing and highly available IT infrastructures
  and applications. The insights we gain from them, in places like our THWACK® community,
  allow us to solve well-understood IT management challenges in the ways technology
  professionals want them solved. Our focus on the user and commitment to excellence
  in end-to-end hybrid IT management has established SolarWinds as a worldwide leader
  in solutions for network and IT service management, application performance, and
  managed services.
