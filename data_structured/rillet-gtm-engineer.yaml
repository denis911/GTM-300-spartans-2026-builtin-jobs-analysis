description_html: '<b><strong>What We Do</strong></b><p>Rillet serves accounting and
  finance teams. Our customers are the financial brains of their companies. Our job
  is to help them run the numbers with impossible speed, accuracy, and insight.</p><p>Rillet
  is an AI-native ERP that can drive a zero-day close. We are different because of
  our unified source-of-truth data model, hundreds of best-in-class native integrations
  (Stripe, Ramp, Salesforce, etc), automated &amp; auditable workflows, multi-entity
  consolidation, and quickly expanding army of specialized AI agents (e.g., accrual,
  audit, P&amp;L flux, board decks, etc). These earn us a consistently<u> perfect
  customer satisfaction score</u>. High-growth AI customers like Mercer, Windsurf,
  and Function Health love our ship velocity, because their financial stack needs
  to scale as quickly as they do.</p><p>This huge market is ours to take. We have
  raised $100M from leading investors (including Sequoia, a16z, Iconiq, Oak HC/FT,
  and First Round) to <strong>help everyone run their numbers at the speed of AI.</strong></p><p></p><b><strong>Who
  We Are</strong></b><p>Rillet’s pace is not for everyone. Intelligence is table stakes.
  To succeed here, you need extreme speed, agency, and flexibility.</p><p>Successful
  Rilleteers do not wait for assignments. They internalize a mission, design a strategy,
  and bring back results that are better, faster, and more creative than a manager
  could have asked for.</p><p>Work revolves around our customers. Successful Rilleteers
  are energized by delivering the most important things, even those that weren’t in
  the original plan.</p><p>In this role, you do not need to be an accountant. But
  you do need to appreciate the value that our customers can create for their own
  company when we equip them with the perfect financial tools. Successful Rilleteers
  love powering the financial core of the world’s fastest-growing companies.</p><b><strong>Who
  We Need</strong></b><p>As a GTM Engineer, you will build the technical foundation
  that powers Rillet’s growth. This team designs and operates the systems, automations,
  and data pipelines that enable marketing and the broader GTM org to move faster,
  experiment better, and scale efficiently. You will have direct impact on pipeline
  generation, activation, and how we operationalize growth across the company.</p><p>You
  are a systems-oriented engineer who is excited to apply your technical skillset
  to go-to-market problems. You care about how growth actually happens inside a company
  and want to build the infrastructure that makes it repeatable. You think beyond
  dashboards and A/B tests, and instead design end-to-end systems that compound over
  time. You are comfortable operating across ambiguity, choosing sensible abstractions,
  and iterating quickly toward impact.</p><p>We’re looking for teammates who value
  in-person collaboration and are within commutable distance of our San Francisco
  (preferred) or NYC offices (or willing to relocate). Team members are required to
  work in-office Tuesdays and Thursdays, plus one additional flexible in-office day.
  Certain roles may require additional in-office time based on function.<br></p><b><strong>What
  You’ll Do</strong></b><ul><li><p>Build internal tools and systems that scale marketing
  and GTM execution through automation and AI assistance</p></li><li><p>Develop data
  pipelines and integrations between product, GTM systems, and the data warehouse</p></li><li><p>Partner
  with marketing, growth, and PMs to prioritize and run high-impact experiments (SEO/AEO,
  programmatic content, lifecycle automation, enrichment, attribution, targeting)</p></li><li><p>Take
  projects from 0→1 across frontend, backend, and data surfaces</p></li><li><p>Design
  scalable, durable growth infrastructure rather than one-off scripts or hacks</p></li><li><p>Build
  AI-assisted workflows that automate manual GTM processes (research, enrichment,
  content generation, segmentation, routing)</p></li><li><p>Create scalable interfaces
  for marketers and operators to launch experiments without engineering support</p></li><li><p>Centralize
  and normalize GTM data ingestion from internal and third-party sources</p></li><li><p>Prototype
  and productionize growth ideas quickly, then harden the ones that work</p></li><li><p>Instrument
  systems with observability and monitoring to ensure reliability and data quality</p></li></ul><b><strong>Who
  We’re Looking For</strong></b><ul><li><p>Experience building or integrating AI/LLM-powered
  workflows in production</p></li><li><p>Strong systems thinking and ability to design
  for scale</p></li><li><p>Experience in growth, marketing engineering, data, or GTM-adjacent
  technical roles (preferred)</p></li><li><p>Experience at early-stage or fast-scaling
  startups (preferred)</p></li><li><p>Comfort working across a wide range of technologies
  and problem domains</p></li><li><p>Experience building internal tools or developer-facing
  systems</p></li><li><p>Ability to translate vague business problems into concrete
  technical solutions</p></li><li><p>Bias toward ownership, autonomy, and fast iteration</p></li><li><p>Strong
  product instincts and taste for simple, durable systems</p></li></ul><b><strong>Life
  at Rillet:</strong></b><ul><li><p><strong>Competitive Pay &amp; Benefits: </strong>Backed
  by world-class investors, we offer strong salaries plus equity so you share in our
  success. We''ve got you covered with top-tier health and dental insurance, premiums
  partially or fully covered for you, plus 90% coverage for dependents.</p></li><li><p><strong>Room
  to Grow:</strong> We''re building a team of ambitious, high-performing people who
  will grow with the company. As Rillet scales, so will your role, responsibilities,
  and compensation.</p></li><li><p><strong>Flexibility That Works: </strong>Take the
  time you need with flexible PTO and 9 company-wide holidays. We value both the flexibility
  of remote and hybrid work and the creativity and energy that comes from in-person
  collaboration at our hubs in San Francisco, NYC, and Barcelona.</p></li><li><p><strong>Build
  Real Connections: </strong>Great work happens when people connect. Join us for team
  offsites in incredible locations, our team has bonded everywhere from New York and
  San Francisco to Toronto, Italy, France, and beyond.</p></li></ul>'
