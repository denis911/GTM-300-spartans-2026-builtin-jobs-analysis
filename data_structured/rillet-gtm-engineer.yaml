company_overview: Rillet is the first accounting platform made to tailor fit the workflows
  of accountants and a full replacement for legacy ERPs like NetSuite and Sage Intacct.
  Scaling and hyper-growth companies like BitWarden, Windsurf and Postscript use Rillet
  to enable a smarter close with native integrations, automated journal entries and
  AI embedded workflows. Rillet also supports multi-entity, multi-currency and multi-geography.
  We natively integrate with industry leading solutions like Salesforce, Stripe, Ramp,
  Brex, Rippling and more. Our open API also enables custom builds. We support SaaS,
  professional services, ecommerce, fintech companies and more. We're backed by Sequoia,
  First Round Capital and Creandum with offices in New York and Barcelona.
