description_html: <p>The Senior Software Engineer is a technical pillar and a force
  multiplier within the organization. In this role, you move beyond the execution
  of features to owning the architectural integrity, long-term scalability, and strategic
  technical direction of entire domains. You are expected to operate with near-total
  autonomy, leading complex cross-functional initiatives and solving systemic issues
  that impact the broader engineering team.</p><p><b>What You'll Do</b></p><ul><li>Architect
  and lead development of production AI products including intelligent chatbots, document
  processing systems, and agentic workflows using Python and modern AI frameworks</li><li>Design
  and implement our centralized AI platform including model routing, provider management,
  vector search, and AI application frameworks with seamless MCP (Model Context Protocol)
  integrations</li><li>Build scalable AI products that integrate with diverse technologies
  including accounting systems, document repositories, and external APIs while maintaining
  robust monitoring and observability</li><li>Master context engineering and system
  design for AI applications, ensuring optimal information retrieval, context assembly,
  and multi-turn conversation management</li><li>Collaborate with Product, Engineering,
  and Security teams to ensure AI products are robust, compliant, and aligned with
  business objectives in the regulated accounting space</li><li>Provide technical
  leadership and mentorship to the growing AI team, establishing best practices for
  AI product development, deployment, and governance</li></ul><p></p><p><b>What You'll
  Bring</b></p><ul><p><b>Technical Leadership &amp; Architectural Excellence</b></p><li><b>Own</b>
  the end-to-end development of medium-to-large features and systems, ensuring they
  scale over quarters and years.</li><li><b>Demonstrate</b> deep architectural thinking
  by designing and documenting system interactions that prioritize long-term maintainability.</li><li><b>Propose
  and drive</b> technical direction at the team level, identifying and reducing systemic
  issues such as scalability bottlenecks and developer productivity hurdles.</li><li><b>Implement</b>
  visible improvements to system performance, reliability, and cost-efficiency within
  your owned domains.</li><p><b>Execution &amp; Project Delivery</b></p><li><b>Lead</b>
  the technical design, implementation, and delivery of complex systems and cross-functional
  initiatives with minimal oversight.</li><li><b>Partner</b> with Product Managers
  to establish realistic timelines and priorities, navigate feature trade-offs, and
  balance immediate business needs with long-term technical health.</li><li><b>Consistently
  meet</b> all published quarterly velocity and quality goals while maintaining high
  deployment standards.</li><p><b>Mentorship</b></p><li><b>Consistently mentor</b>
  1–2 engineers regularly and provide guidance to multiple peers across the team.</li><li><b>Act</b>
  as a "go-to" engineer within your subdomain, proactively raising and solving team-level
  technical problems.</li><li><b>Regularly provide</b> constructive feedback to improve
  the performance of others and unblock peers to maintain team momentum.</li><li><b>Influence</b>
  hiring, onboarding, and overall team culture.</li><li><b>Contribute</b> to the broader
  engineering community by writing for the FloQast engineering blog.</li><li><b>Perform</b>
  any other tasks assigned to help the company meet its goals.</li></ul><p></p><p><b>Nice
  To Haves</b></p><ul><li>Experience building chatbots or conversational AI products
  in production</li><li>Background in system integration, API design, or enterprise
  software platforms</li><li>Familiarity with accounting workflows and financial data
  processing</li><li>Experience with AI observability, debugging tools, and production
  AI monitoring</li><li>Hands-on experience with advanced RAG architectures, reranking
  systems, and retrieval optimization techniques</li><li>Knowledge of reinforcement
  learning from human feedback (RLHF) or other RL techniques for improving AI product
  performance</li><li>Experience building AI platform components like embedding pipelines,
  semantic search systems, or multi-modal processing frameworks</li></ul><p></p><p><b>Our
  Interview Process</b></p><ul><li>The evaluation process involves a multi-stage assessment
  comprising a <b>coding exercise</b>, a <b>structured code review</b>, <b>system
  design</b> and a <b>behavioral assessment</b> to evaluate your engineering approach,
  logical thinking, familiarity with best practices, and alignment with team values.</li></ul><p></p><p></p><p><span>#LI-Hyrbid</span></p><p><br></p><p><span>#LI-JM1</span></p><p><br></p><p><span>This
  job posting is for our Senior Software Engineer, the base pay range for this position
  is $144,000 - $216,000.&nbsp; Compensation is not limited to base salary. FloQast
  values our Total Rewards, and offers a competitive and elaborate Benefits Package
  including, but not limited to, Medical, Dental, Vision, Family Forming benefits,
  Life &amp; Disability Insurance, and Unlimited Vacation.&nbsp;FloQast reserves the
  right to amend, change, alter, and revise pay ranges and benefits offerings at any
  time. All applicants acknowledge that by applying to this position you understand
  that this specific pay range is contingent upon meeting the qualifications and requirements
  of the role, and for the successful completion of the interview selection and process.
  It is at the Company's discretion to determine what pay is provided to a candidate
  within the range associated with the role.</span></p><p><br></p><p><br></p><p>About
  FloQast:</p><p>FloQast is the leading Accounting Transformation Platform in accounting
  workflow automation created by actual former accountants for accountants. By streamlining
  and modernizing daily accounting tasks, FloQast helps teams collaborate more effectively
  and complete their work with greater efficiency and precision. This cloud-based,
  AI-powered software is trusted by over 3,000 accounting teams, including those at
  Snowflake, Twilio, Instacart, and The Golden State Warriors—and continues to grow.
  Our mission is to continuously elevate the accounting profession, enhancing both
  its practice and perception.</p><p><br></p><p>Our values act as a guiding compass,
  shaping every decision we make, and are non-negotiable, particularly in our hiring
  process. Alongside our employees, partners, and customers, we embody these values
  every day:</p><p><i>Unwaveringly Authentic&nbsp;</i></p><p><i>Ambitious with Integrity</i></p><p><i>Empowered
  to Grow</i></p><p><i>Committed to Collaboration</i></p><p><i>Customer Obsessed in
  All Ways</i></p><p><br></p><p>FloQast is regularly rated as a&nbsp;Best Place to
  Work!</p><p>- Inc. Magazine’s Best Workplaces in 2024, 2023, 2022, and 2021</p><p>-
  Best Places to Work by LA Business Journal since 2017 (that’s 8 years!)</p><p>-
  Built In’s ​​Best Place to Work in Los Angeles 6 years in a row!</p><p><br></p><p>Because
  we are Customer Obsessed in All Ways, check out what our customers have to say about
  FloQast on&nbsp;G2 Crowd.&nbsp;</p><p><br></p><p>If this aligns closely with what
  you are looking for, hit “Apply” and come join our growing team!</p><p><br></p><p><i>FloQast,
  Inc is committed to operating fair and unbiased recruitment procedures allowing
  all applicants an equal opportunity for employment, free from discrimination on
  the basis of religion, race, sex, age, sexual orientation, disability, color, ethnic
  or national origin, or any other classification as may be protected by applicable
  law. We aim to recruit the right people for the jobs we have to offer, and to assess
  applications on the basis of relevant skills, education, and experience. We welcome
  people of different backgrounds, experiences, abilities, and perspectives. We are
  an equal opportunity employer and strive to provide a professional and welcoming
  workplace for all employees.</i></p><p><br></p><p>Link to FloQast Recruiting AI
  Usage Policy</p><p></p>
