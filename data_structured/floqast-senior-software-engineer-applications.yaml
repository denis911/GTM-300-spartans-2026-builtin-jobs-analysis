company_overview: By automating and streamlining common accounting workflows to make
  them more efficient, FloQast is where accounting teams want to work so they can
  focus on what matters most, even when that’s just logging off on time. Whether automating
  reconciliations, documentation requests, or streamlining recurring accounting processes,
  such as the month-end close, financial reporting, or payroll, FloQast's platform
  enhances the way accounting teams already work to help them operate more efficiently.
