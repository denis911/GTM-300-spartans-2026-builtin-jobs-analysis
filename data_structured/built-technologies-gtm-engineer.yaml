  status, veteran status, or any other characteristic protected by law. Greenhouse
  Data Disclosure When you apply to a job on this site, the personal data contained
  in your application will be collected by Built Technologies (“Controller”). Your
  personal data will be processed for the purposes of managing Controller’s recruitment
  related activities, which include setting up and conducting interviews and tests
  for applicants, evaluating and assessing the results thereto, and as is otherwise
  needed in the recruitment and hiring processes. Your personal data will be shared
  with Greenhouse Software, Inc., a cloud services provider located in the United
  States of America and engaged by Controller to help manage its recruitment and hiring
  process on Controller’s behalf. Your personal data will be retained by Controller
  as long as Controller determines it is necessary to evaluate your application for
  current or future employment. You have the right to request access to your personal
  data, to request that your personal data be rectified or erased, and to request
  that processing of your personal data be restricted. You also have to right to data
  portability. If you would like to contact Controller to ask questions surrounding
  processing of your personal data or to make a request, you can send an email to&nbsp;privacy@getbuilt.com.
  California residents: Please note that Controller does not sell your personal data
  or share it with third parties outside of Greenhouse Software, Inc.'
