description_html: '<p><b><strong>About Built&nbsp;</strong></b><p><strong>Built''s
  Mission: </strong>Connect and simplify doing business in real estate.<br>Built is
  the AI-powered platform transforming the way real estate is financed, developed,
  and managed. Purpose-built for real estate and construction, Built began by fixing
  construction draw management for lenders and has grown into a comprehensive operating
  system addressing some of the industry’s most complex challenges. <br>Through its
  connected product suite, Built enables stakeholders to finance, develop, build,
  own, and operate smarter—all in one place. The platform brings together loans, deals,
  portfolios, payments, inspections, and collaboration to deliver faster execution,
  greater transparency, efficiency, and trust across the industry. <br>Today, Built
  is a partner to more than 350 lenders, over 80,000 borrowers and owners, and thousands
  of contractors, powering 86,000 active projects valued at more than $300 billion.
  Learn more at getbuilt.com:</p><ul><li>Life At Built / Built Cares</li><li>Series
  D Financing Round</li><li>Built Recognized in Two American Business Award Categories</li><li>Built
  Secures Investment from Citi</li></ul></p><b><strong>About the Role</strong></b><p>Built
  is hiring a Go-To-Market Engineer (GTME) to design, operate, and continuously improve
  the systems and campaigns that drive lender pipeline and revenue.</p><p>This role
  sits at the intersection of campaign execution, marketing automation, AI-driven
  workflows, data, and enablement. You will not just build GTM infrastructure — you
  will actively run it day to day. From executing and optimizing campaigns in HubSpot,
  to automating enrichment and outbound workflows, to creating playbooks and operating
  models that teams rely on, this role owns the execution and evolution of our lender
  go-to-market engine.</p><p>This is a high-ownership, hands-on role. You’ll help
  define how GTM is executed at Built, translate strategy into technical and operational
  reality, and ensure our systems are scalable, trusted, and revenue-driving.</p><p>If
  you’re excited by shipping campaigns, wiring together APIs, orchestrating Clay and
  AirOps workflows, building AI-powered automations, and proving business impact through
  data — this role is for you.</p><p><strong>What You’ll Do</strong></p><b><strong>Own
  Campaign Execution &amp; GTM Operations</strong></b><ul><li>Own end-to-end campaign
  execution for the lender business in HubSpot, including email, lifecycle, nurture,
  paid ads, routing, and lead management programs</li><li>Build, launch, measure,
  and optimize campaigns based on performance and pipeline impact</li><li>Own day-to-day
  operation and optimization of the GTM tech stack (HubSpot, Clay, AirOps, Lemlist)</li><li>Build
  and maintain lead scoring models, routing logic, lifecycle stages, and SLAs</li><li>Ensure
  data quality, attribution accuracy, and system reliability across GTM systems</li><li>Partner
  closely with Marketing, Sales and Product Marketing to operationalize GTM strategy
  into execution</li></ul><b><strong>Build &amp; Scale Automation and AI Workflows</strong></b><ul><li>Design,
  improve, build and maintain automated workflows using tools like n8n, Lemlist, Clay,
  and AirOps</li><li>Build AI-powered enrichment, outbound, and intent-detection pipelines</li><li>Integrate
  GTM tools and data sources via APIs and automation platforms</li><li>Replace manual,
  repetitive processes with scalable, reliable workflows</li><li>Rapidly prototype,
  test, and iterate on GTM experiments to improve conversion and efficiency<br></li></ul><b><strong>Analytics,
  Enablement &amp; Operating Models</strong></b><ul><li>Own marketing attribution,
  pipeline analytics, and GTM performance reporting</li><li>Build and maintain dashboards
  and automated reporting pipelines (Salesforce, HubSpot, Sheets, Looker or similar)</li><li>Create
  playbooks, SOPs, and documentation for GTM systems, campaigns, and workflows</li><li>Train
  and enable Marketing and Revenue teams on tools, processes, and best practices</li><li>Establish
  guardrails and operating models to ensure adoption, consistency, and trust in GTM
  systems</li><li>Act as the internal owner for “how we run Marketing GTM”<br></li></ul><p><strong>What
  You Bring</strong></p><b><strong>Must-Haves</strong></b><ul><li>5+ years in Marketing
  Ops, Revenue Ops, or Go-To-Market / Growth Engineering roles</li><li>Hands-on experience
  executing and optimizing campaigns end-to-end in HubSpot</li><li>Strong experience
  with GTM automation and enrichment tools (Clay, AirOps, n8n, or similar)</li><li>Salesforce
  proficiency (reports, dashboards, data structure)</li><li>Strong API and integration
  experience across GTM systems</li><li>Analytical fluency (SQL, advanced spreadsheets,
  or both)</li><li>Strong systems thinking and ownership mindset — you own outcomes,
  not just tools</li><li>Comfort operating without a fully defined playbook</li></ul><b><strong>Nice-to-Haves</strong></b><ul><li>Experience
  with ABM platforms (6sense, Demandbase, or similar)</li><li>Python or JavaScript
  for custom scripts and integrations</li><li>Experience using AI/LLM tools for GTM
  workflows or data processing</li><li>B2B SaaS experience, ideally in fintech or
  construction tech</li></ul><p>Built’s salary range for this position is $155,000
  - 175,000 USD per year. The pay range is designed to accommodate upward mobility
  in the role, therefore it encompasses the full span of proficiency levels for this
  role and we believe that the midpoint of the range is competitive in the market.
  Salary is just one component of Built''s total compensation package for employees.
  Your total rewards package at Built will include equity, top-notch medical, dental
  and vision coverage, an unlimited PTO policy, and other benefits.</p><p><p><strong>Travel
  Requirement:</strong> Remote teammates (i.e. not based in Nashville metro) must
  be able to travel at minimum twice per year to Nashville, TN or another designated
  location for company-wide events (e.g., "Connect Week"). Additional travel may be
  required based on business needs and role responsibilities.</p><p><strong><br>Perks:</strong></p><ul><li><span>The
  rare opportunity to radically disrupt a $1.5T industry</span></li><li><span>Competitive
  benefits including: uncapped vacation, health, dental &amp; vision insurance</span></li><li><span>401k
  with match and expedited vesting&nbsp;</span></li><li><span>Robust compensation
  package, including equity in the form of stock options&nbsp;&nbsp;</span></li><li><span>Flexible
  working hours, paid family leave, ERGs &amp; Mentorship opportunities&nbsp;</span></li><li><span>Learning
  grant program to support ongoing professional development</span></li></ul><p>Built
  brings together passionate people who are driven in a variety of disciplines, each
  bringing their unique perspective to everything they do.&nbsp;</p><p>We’re committed
  to building a safe, inclusive workplace where every employee can succeed, and we
  recruit, hire, and promote fairly - without bias based on race, color, religion,
  sex, sexual orientation, gender identity, marital status, veteran status, or any
  other characteristic protected by law.<br><em><span><strong>Greenhouse Data Disclosure</strong></span></em></p><b><em><span>When
  you apply to a job on this site, the personal data contained in your application
  will be collected by Built Technologies (“Controller”). Your personal data will
  be processed for the purposes of managing Controller’s recruitment related activities,
  which include setting up and conducting interviews and tests for applicants, evaluating
  and assessing the results thereto, and as is otherwise needed in the recruitment
  and hiring processes. </span></em><em><span>Your personal data will be shared with
  Greenhouse Software, Inc., a cloud services provider located in the United States
  of America and engaged by Controller to help manage its recruitment and hiring process
  on Controller’s behalf. </span></em><em><span>Your personal data will be retained
  by Controller as long as Controller determines it is necessary to evaluate your
  application for current or future employment. You have the right to request access
  to your personal data, to request that your personal data be rectified or erased,
  and to request that processing of your personal data be restricted. You also have
  to right to data portability.</span></em></b><b><em><span>If you would like to contact
  Controller to ask questions surrounding processing of your personal data or to make
  a request, you can send an email to&nbsp;privacy@getbuilt.com. </span></em><em><span>California
  residents: Please note that Controller does not sell your personal data or share
  it with third parties outside of Greenhouse Software, Inc.</span></em></b></p>'
