  package, including equity in the form of stock options&nbsp;&nbsp; Flexible working
  hours, paid family leave, ERGs &amp; Mentorship opportunities&nbsp; Learning grant
  program to support ongoing professional development Built brings together passionate
  people who are driven in a variety of disciplines, each bringing their unique perspective
  to everything they do.&nbsp; We’re committed to building a safe, inclusive workplace
