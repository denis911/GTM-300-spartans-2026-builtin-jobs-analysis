company_overview: Portex is an easy-to-use freight procurement and management software
  that helps shippers organize and save time on all logistics-related workflows across
  their existing carriers in one place. Shippers of all sizes can centralize FTL,
  LTL, or international spot quotes and bids into one view, communicate across all
  their existing brokers/carriers via automated workflows and instant chat, view live
  shipment status, track carrier performance, and review pricing trends via auto-generated
  reports. By using Portex shippers have eliminated hundreds of emails and often 20+
  hours of weekly manual tasks. In less than 10 minutes, you can start managing your
  existing freight relationships more efficiently. You’ll save time, be more organized,
  and be equipped with the freight data needed to make more strategic decisions for
  the business. Learn more at www.portexpro.com.
