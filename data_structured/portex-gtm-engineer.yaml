description_html: <p><br></p><p><span>We are looking for a GTM Engineer to build Portex
  from the ground up. This person must have prior B2B SaaS experience at an early-stage
  startup (Seed or Series A).&nbsp;</span></p><p><br></p><p><span>In this role, you
  must not only be comfortable, but you can thrive while balancing 5+ projects at
  once across various workstreams. No task is too big or too small, you are a generalist
  who is down to roll up your sleeves and do the work. You must be comfortable putting
  in 60+ hours a week as we push to hit our next crucial milestones.&nbsp;</span></p><p><br></p><p><span>The
  role is an incredible opportunity to have a massive impact and help define the strategy
  of an early-stage startup disrupting an insanely large and critical industry. If
  you are scrappy, analytical, entrepreneurial, and love to move fast, we want to
  hear from you.</span></p><p><br></p><p><span>The main functions you will be helping
  to drive are:</span></p><ul><li><span>GTM operations</span></li><li><span>GTM system
  engineering</span></li><li><span>Lead generation</span></li><li><span>GTM analytics</span></li><li><span>Product
  analytics</span></li><li><span>Sales Ops, Onboarding, and Customer Success</span></li></ul><p><br></p><p><span>As
  our GTM Engineer, you’ll:</span></p><ul><li><span>Work directly with the CEO (former
  leading salesperson at both Flexport and Uber) and Head of Operations as a thought
  partner to develop our strategy and planning&nbsp;</span></li><li><span>Build, optimize,
  and measure lead generation strategies including cold outreach</span></li><li><span>Operations,
  tracking, and assessment of lead generation, customer management, and product analytics</span></li><li><span>Oversee
  the daily operations, tracking, and assessment of the business across company strategy/goals,
  growth/usage metrics</span></li><li><span>Build out early business functions and
  prepare a process and playbook to scale them (ideally, you’ll eventually hire to
  hand over these functions)</span></li><li><span>Support sales ops, GTM ops, and
  customer success to ensure we hit our customer growth goals</span></li><li><span>Manage
  and integrate tools and systems in an efficient manner to drive efficiency and performance</span></li><li><span>Support
  building GTM and customer materials including self-service materials</span></li><li><span>Operationalize
  and manage manual tests of potential revenue-generating opportunities</span></li><li><span>Oversee
  product and customer analytics to build dashboards and reporting for recurring and
  one-off needs</span></li><li><span>Drive special projects and constantly think of
  new ways to add value to the business (e.g. through partnerships, growth/product
  ideas, experiments, etc)</span></li></ul><p><br></p><p><span>We’re looking for someone
  who:</span></p><ul><li><span>Has 3+ years of GTM Ops, GTM Engineering, Growth Operations,
  or similar experience</span></li><li><span>Has 1-3 years in an operating role at
  an early-stage B2B SaaS startup (Seed or Series A)</span></li><li><span>Can operate
  at a strategic level, own and manage areas of the business, and possesses the independence
  of thought critical to building a high-growth, constantly-evolving business&nbsp;</span></li><li><span>Can
  get into the weeds and execute at a high level even when given relatively little
  direction&nbsp;</span></li><li><span>Is able to quickly identify signals from noise
  and the highest-efficiency tactics to solve any problem</span></li><li><span>Is
  highly efficient at getting things done and can right-size the quality of their
  work to what is needed for the specific task or project&nbsp;</span></li><li><span>Is
  not only organized themselves but excellent at organizing and aligning the team
  against the work that needs to be done to accomplish our goals&nbsp;</span></li><li><span>Is
  able to build a disciplined operating rhythm for the business yet flexible enough
  to respond to high-value opportunities in real-time&nbsp;</span></li></ul><p><br></p><p><span>Skills:</span></p><ul><li><span>GTM
  tool stack</span></li><li><ul><li><span>Salesforce</span></li><li><span>Outreach</span></li><li><span>Clay</span></li><li><span>ZoomInfo</span></li></ul></li><li><span>AI
  Prompt Engineering</span></li><li><span>Data Analytics</span></li><li><span>SQL</span></li></ul><p><br></p><p><span>It
  is important that this person is based in the Bay Area to partner and work with
  the CEO in-person at least 3x days per week.</span></p><p><br></p><p><span>We offer
  a competitive salary and equity package, additional benefits include:</span></p><ul><li><span>Medical,
  dental and vision insurance</span></li><li><span>Unlimited vacation policy</span></li><li><span>Your
  choice of laptop and other home office equipment</span></li></ul><p><br></p><p><span>Diversity
  and inclusion are important to us, and we provide equal opportunity for all applicants
  and employees. We are building a company that represents a variety of backgrounds,
  perspectives, and skills and know that more inclusion only makes our work and work
  environment better.</span></p><p><br></p><p><span>If you have any questions please
  reach out to </span><u><span>careers@portexpro.com</span></u><span>.</span></p>
