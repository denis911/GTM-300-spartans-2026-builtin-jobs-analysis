description_html: '<b><strong>About Glimpse</strong></b><p>Glimpse helps leading consumer
  brands unlock retail cashflow by building AI agents to automate critical finance
  workflows like revenue recovery, accounting reconciliation, and trade spend management.
  We work with 200+ food/beverage/health/beauty brands including IQ Bar, Sauz, Bero,
  and more.</p><p></p><b><strong>About the Role</strong></b><p>We''re looking for
  a high-agency GTM Engineer to own and scale the systems that power Glimpse''s outbound
  engine. You''ll build the automation infrastructure, data pipelines, and AI-powered
  workflows that enable our team to move faster, experiment continuously, and convert
  pipeline efficiently as we scale to eight figures this year.</p><p>This role sits
  at the intersection of revenue operations, growth engineering, and pipeline generation.
  You''ll own the technical execution of our GTM motion - from programmatic outbound
  to revenue system optimization to experiment execution - and be responsible for
  designing and hardening a repeatable outbound engine.</p><p></p><b><strong>What
  You''ll Do</strong></b><p><strong>Own Revenue Operations &amp; GTM Systems</strong></p><ul><li><p>Manage
  and optimize our GTM tech stack (HubSpot, Apollo, Clay to start)</p></li><li><p>Build
  and maintain data pipelines between CRM, sales tools, and analytics platforms to
  enable real-time reporting and multi-attribution</p></li><li><p>Design lead workflows
  that improve conversion rates across the funnel</p></li><li><p>Ensure data quality,
  hygiene, and observability across all GTM systems</p></li></ul><p><strong>Build
  Programmatic Outbound Infrastructure</strong></p><ul><li><p>Design and implement
  AI-powered outbound sequences that personalize at scale</p></li><li><p>Own email
  deliverability infrastructure including domain health, warming strategies, and sender
  reputation monitoring</p></li><li><p>Build automated research and trigger workflows
  using tools like Clay to improve targeting and personalization</p></li><li><p>Test
  and optimize outbound platforms to ensure consistent pipeline generation</p></li></ul><p><strong>Drive
  Growth Through Experimentation</strong></p><ul><li><p>Ship high-velocity experiments:
  website widgets, landing page variants, email sequences, etc.</p></li><li><p>Build
  internal tools that enable marketing and sales to launch tests without engineering
  support</p></li><li><p>Instrument conversion funnels with proper tracking and analytics
  to measure what''s working</p></li><li><p>Proactively identify bottlenecks and friction
  points in the GTM motion and automate resilient solutions</p></li></ul><p><strong>Scale
  Through AI &amp; Automation</strong></p><ul><li><p>Build LLM-powered workflows for
  prospect research, personalization, content generation, and lead qualification</p></li><li><p>Automate
  manual processes across marketing, sales, and operations to reduce drag on revenue
  teams</p></li><li><p>Create scalable systems that compound over time, not one-off
  scripts or hacks</p></li></ul><p></p><b><strong>Who You Are</strong></b><p><strong>Required:</strong></p><ul><li><p>2+
  years in GTM, RevOps, or Growth engineering roles at B2B SaaS companies</p></li><li><p>Hands-on
  experience with HubSpot and Apollo (or similar outbound automation platforms)</p></li><li><p>Strong
  technical skills: comfortable with APIs, webhooks, light scripting (Python/JavaScript),
  and SQL</p></li><li><p>Comfortable vibe coding and prototyping quickly</p></li><li><p>Track
  record of rapid experimentation and shipping growth initiatives that drive measurable
  results</p></li><li><p>High agency and bias toward action - you see a problem and
  fix it rather than wait for direction</p></li></ul><p><strong>Bonus:</strong></p><ul><li><p>Experience
  building automated outbound systems and understanding email deliverability best
  practices</p></li><li><p>Familiarity with Hubspot, Clay, Apollo, or other modern
  growth tools</p></li><li><p>Background in CPG, Retail, or vertical SaaS</p></li></ul><p></p><b><strong>What
  Success Looks Like</strong></b><ul><li><p>Pipeline generation increases measurably
  through outbound systems you build and optimize</p></li><li><p>GTM teams spend less
  time on prospecting and more time on selling</p></li><li><p>Experiments ship weekly,
  not monthly</p></li><li><p>Data flows reliably between systems and powers real-time
  observability</p></li><li><p>You proactively identify opportunities for automation
  and deliver solutions end-to-end</p></li></ul><p></p><b><strong>Benefits</strong></b><ul><li><p>Competitive
  salary and equity options</p></li><li><p>Relocation assistance provided to New York
  City</p></li><li><p>Comprehensive medical, dental, and vision insurance</p></li><li><p>401(k)
  plan</p></li><li><p>Unlimited PTO</p></li><li><p>Samples from our food and beverage
  customers!!</p></li></ul><p></p>'
