company_overview: Volt AI is real-time video intelligence designed for security teams
  who never want to miss an incident again. Unlike other solutions that focus on individual
  camera analytics, Volt unifies your existing systems, allowing for visual tracking
  of people and objects across various locations on an intuitive 3D map. Volt provides
  one-click access to critical information, streamlining the incident management process
  and transforming weeks of work into instant, actionable insights.
