description_html: <p><span>VOLT AI is looking for a GTM Engineer to design, build,
  and automate the systems that power our go-to-market motion.</span></p><p><span>This
  is a technical role, not a traditional marketing or RevOps position. You will apply
  software engineering, data, and automation to scale how we generate demand, qualify
  leads, convert pipeline, and learn from customer interactions.</span></p><p><span>You
  will work across CRM systems, marketing platforms, data pipelines, and the website
  to build end-to-end GTM automation—from first touch through revenue and expansion.</span></p><p><span>This
  role is ideal for someone who enjoys engineering leverage into sales and marketing
  systems and wants to build scalable, measurable GTM infrastructure.</span></p><p><b>Key
  Responsibilities</b></p><ul><li><b>Own CRM data integrity</b>, including custom
  objects and integrations, pipeline hygiene, attribution and reporting accuracy,
  and integration with marketing, product, and analytics systems</li><li><b>Develop
  internal GTM tooling using code and automation</b>, including APIs, webhooks, and
  event-driven integrations, Python and scripting for data processing and automation,
  and automation that reduces manual work for sales and marketing teams</li><li><b>Integrate
  product usage and behavioral data into GTM systems</b> to improve customer delight
  and retention, trigger contextual outreach and follow-ups, and support expansion
  and upsell workflows</li><li><b>Build dashboards and analytics</b> that provide
  funnel visibility from lead to revenue, conversion, velocity, and drop-off insights,
  and feedback loops for continuous GTM optimization</li><li><b>Partner closely with
  sales, marketing, and product</b> to translate GTM strategy into automated systems,
  rapidly test and iterate on GTM experiments, and scale what works while eliminating
  manual or low-leverage processes</li></ul><p></p><p><b>Required Qualifications</b></p><ul><li>5+
  years of experience in GTM Engineering, Growth Engineering, or Automation Engineering</li><li>Strong
  engineering mindset with hands-on coding experience</li><li>Proficiency in Python,
  JavaScript, or similar languages for automation</li><li>Experience working with
  CRMs (e.g., HubSpot, Salesforce) at a systems level</li><li>Experience integrating
  CRM, enrichment platforms (e.g., Clay, Apollo), and analytics systems</li><li>Strong
  understanding of data flows, APIs, and event-driven systems</li><li>Ability to work
  cross-functionally with sales, marketing, and product teams</li></ul><p></p><p><b>Preferred
  Qualifications</b></p><ul><li>Experience with HubSpot CRM platform</li><li>Experience
  with marketing automation tools and analytics platforms</li><li>Experience building
  or optimizing high-conversion websites</li><li>Background in growth engineering
  or data-driven marketing</li><li>Experience in B2B SaaS or enterprise GTM environments</li><li>Comfort
  operating in fast-moving startup environments</li></ul><p></p><p><b>What Success
  Looks Like</b></p><ul><li>GTM systems are integrated, workflows are automated, reliable,
  and scalable</li><li>Sales and marketing teams spend less time on manual tasks</li><li>Funnel
  performance and attribution are clearly visible and trusted</li><li>Conversion rates
  and pipeline velocity improve measurably</li><li>GTM systems become a competitive
  advantage for VOLT AI</li></ul><p></p><p></p><p><span>At VOLT AI, you’ll apply engineering
  leverage to revenue generation, building systems that directly impact growth and
  scale.This role is for someone who wants to build GTM infrastructure, not just manage
  tools, and who believes GTM systems deserve the same engineering rigor as product
  systems.</span></p><p></p>
description_text: VOLT AI is looking for a GTM Engineer to design, build, and automate
  the systems that power our go-to-market motion. This is a technical role, not a
  traditional marketing or RevOps position. You will apply software engineering, data,
  and automation to scale how we generate demand, qualify leads, convert pipeline,
  and learn from customer interactions. You will work across CRM systems, marketing
  platforms, data pipelines, and the website to build end-to-end GTM automation—from
  first touch through revenue and expansion. This role is ideal for someone who enjoys
  engineering leverage into sales and marketing systems and wants to build scalable,
  measurable GTM infrastructure. Key Responsibilities Own CRM data integrity , including
  custom objects and integrations, pipeline hygiene, attribution and reporting accuracy,
  and integration with marketing, product, and analytics systems Develop internal
  GTM tooling using code and automation , including APIs, webhooks, and event-driven
  integrations, Python and scripting for data processing and automation, and automation
  that reduces manual work for sales and marketing teams Integrate product usage and
  behavioral data into GTM systems to improve customer delight and retention, trigger
  contextual outreach and follow-ups, and support expansion and upsell workflows Build
  dashboards and analytics that provide funnel visibility from lead to revenue, conversion,
  velocity, and drop-off insights, and feedback loops for continuous GTM optimization
  Partner closely with sales, marketing, and product to translate GTM strategy into
  automated systems, rapidly test and iterate on GTM experiments, and scale what works
  while eliminating manual or low-leverage processes Required Qualifications 5+ years
  of experience in GTM Engineering, Growth Engineering, or Automation Engineering
  Strong engineering mindset with hands-on coding experience Proficiency in Python,
  JavaScript, or similar languages for automation Experience working with CRMs (e.g.,
  HubSpot, Salesforce) at a systems level Experience integrating CRM, enrichment platforms
  (e.g., Clay, Apollo), and analytics systems Strong understanding of data flows,
  APIs, and event-driven systems Ability to work cross-functionally with sales, marketing,
  and product teams Preferred Qualifications Experience with HubSpot CRM platform
  Experience with marketing automation tools and analytics platforms Experience building
  or optimizing high-conversion websites Background in growth engineering or data-driven
  marketing Experience in B2B SaaS or enterprise GTM environments Comfort operating
  in fast-moving startup environments What Success Looks Like GTM systems are integrated,
  workflows are automated, reliable, and scalable Sales and marketing teams spend
  less time on manual tasks Funnel performance and attribution are clearly visible
  and trusted Conversion rates and pipeline velocity improve measurably GTM systems
  become a competitive advantage for VOLT AI At VOLT AI, you’ll apply engineering
  leverage to revenue generation, building systems that directly impact growth and
  scale.This role is for someone who wants to build GTM infrastructure, not just manage
  tools, and who believes GTM systems deserve the same engineering rigor as product
  systems.
