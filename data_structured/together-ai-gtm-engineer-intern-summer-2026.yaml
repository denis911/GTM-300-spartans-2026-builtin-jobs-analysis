description_html: <b><strong>About Together AI</strong></b><p>Together AI is a research-driven
  artificial intelligence company. We believe open and transparent AI systems will
  drive innovation and create the best outcomes for society, and together we are on
  a mission to significantly lower the cost of modern AI systems by co-designing software,
  algorithms, and models. We have contributed to leading open-source research, models,
  and datasets to advance the frontier of AI, and our team has been behind technological
  advancements such as FlashAttention, Mamba, FlexGen, SWARM Parallelism, Mixture
  of Agents, and RedPajama.</p><b><strong>Role Overview</strong></b><p>As a <strong>Go-To-Market
  Engineer Intern</strong>, you'll be the systems thinker and builder who operationalizes
  marketing and sales strategy into scalable, automated execution. You’ll have the
  opportunity to build Go-To-Market infrastructure that will improve the team’s workflows
  and broaden your exposure to technical solutions that span SaaS applications such
  as CRM platforms, or business system integrations.</p><p>In this role, you will
  have the opportunity to learn and implement a breadth of marketing and sales operations
  activities by working alongside our team of Revenue Operations Leaders.</p><b><strong>Responsibilities&nbsp;</strong></b><ul><li>Build
  sales automation workflows using low-code tools like Clay, N8N, or Make to help
  streamline outbound outreach and campaign operations</li><li>Creating sales enablement
  resources to help the sales team work more efficiently</li><li>Work with APIs and
  web hooks to connect systems, trigger workflows, and move data across the GTM tech
  stack</li><li>Collaborate cross-functionally with SDRs, design, and content teams
  to support multi-channel ABM campaigns and demand generation programs</li><li>Partnering
  with Salesforce admins to implement automation, updates, data uploads, and maintenance</li></ul><b><strong>Minimum
  Qualifications</strong></b><ul><li>Currently pursuing a degree in Business, Information
  Systems, or a related degree</li><li>Interest in building technical solutions that
  span SaaS applications such as CRM platforms, or business systems integration</li><li>Strong
  communication skills, with comfort working closely with both technical and non-technical
  partners</li><li>Familiarity with Salesforce or similar CRM systems (coursework,
  Trailhead badges, internships, or projects are all great signals)</li></ul><b><strong>Preferred
  Qualifications</strong></b><ul><li>Eager to understand how technology and data underpin
  GTM and business processes</li><li>Basic understanding of databases, APIs, or data
  integration concepts</li><li>Experience building workflows and automations with
  Clay, Gumloop, Zapier, or similar platforms</li></ul><p><strong>Internship Program
  Details</strong></p><p>Our summer internship program spans over 12 weeks where you’ll
  have the opportunity to work with industry-leading engineers building a cloud from
  the ground up and possibly contribute to influential open source projects. Our internship
  dates are May 18th to August 7th or June 15th to September 4th.&nbsp;</p><b><strong>Compensation</strong></b><p>We
  offer competitive compensation, housing stipends, and other competitive benefits.
  The estimated US hourly rate for this role is $35/hr. Our hourly rates are determined
  by location, level and role. Individual compensation will be determined by experience,
  skills, and job-related knowledge</p><b><strong>Equal Opportunity</strong></b><p>Together
  AI is an Equal Opportunity Employer and is proud to offer equal employment opportunity
  to everyone regardless of race, color, ancestry, religion, sex, national origin,
  sexual orientation, age, citizenship, marital status, disability, gender identity,
  veteran status, and more.</p><p>Please see our privacy policy at https://www.together.ai/privacy</p>
