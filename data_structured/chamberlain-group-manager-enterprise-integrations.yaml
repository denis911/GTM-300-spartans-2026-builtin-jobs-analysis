description_html: '<p>Chamberlain Group (CG) is a global leader in intelligent access
  and Blackstone portfolio company. Powered by our myQ technology, we make access
  simple and secure for millions of homeowners, businesses, and communities worldwide.
  Our flagship brands, LiftMaster®&nbsp; and Chamberlain®&nbsp;, are found in 51+
  million homes, and 14 million+ people rely on the myQ®&nbsp; app daily.</p>

  <p>The Enterprise Integration Manager is a hands-on technical leader responsible
  for defining, implementing, and managing the enterprise-wide integration strategy
  across cloud and on-premise systems. This role oversees architecture, development,
  and maintenance of scalable, secure, and reliable integration solutions that connect
  core platforms such as SAP, Salesforce, Data warehouse and other enterprise applications.
  The Integration Manager leads a team of developers and collaborates closely with
  IT, business stakeholders, and external partners to ensure seamless data flow, operational
  efficiency, and alignment with organizational goals. This position reports directly
  to Director of Enterprise Architecture and Application Development and plays a critical
  role in enabling digital transformation through modern integration practices, including
  API-led connectivity, event-driven architecture, and cloud-native integration platforms.</p><p><b>Essential
  Duties and Responsibilities </b></p><ul><li><p>Provide technical leadership as a
  working manager with deep integration expertise. Lead and mentor Integrations team,
  prioritizing work and offering guidance on integration tools (SAP Integration Suite,Boomi,
  webMethods, Seeburger, etc.).</p></li><li><p>Lead design and implementation of system
  integrations, define the end-to-end integration strategy, patterns, and data flows
  across all core platforms (e.g. SAP, Salesforce) and third-party or cloud systems.</p></li><li><p>Establish
  integration standards and governance to ensure solutions are scalable, efficient,
  and aligned with the enterprise architecture.</p></li><li><p>Partner closely with
  application owners and other IT teams (Enterprise Applications, Data &amp; Analytics,
  InfoSec, IT Operations, Product teams) as well as business stakeholders to plan
  and lead integration projects.</p></li><li><p>Gather and validate integration requirements
  with stakeholders, making sure solutions meet business needs within SDLC standards.
  Ensure integration initiatives maintain architectural integrity across the full
  enterprise application ecosystem and support seamless data flows.</p></li><li><p>Translate
  functional requirements into scalable technical integration designs, mapping data
  fields, defining API interactions, orchestrating workflows, and documenting system
  interdependencies.</p></li><li><p>Oversee the development and configuration of integration
  processes and workflows, ensuring thorough</p></li><li><p>documentation of specifications,
  system diagrams, and data models maintained for each integration.</p></li><li><p>Create
  and enforce reusable integration frameworks, components, and patterns that accelerate
  development (e.g. common APIs or data transformation modules).</p></li><li><p>Standardize
  error handling, logging, and naming conventions across all integrations to improve
  reliability and simplify maintenance.</p></li><li><p>Ensure consistent data flow
  across systems to maintain data integrity and enable reliable reporting.</p></li><li><p>Partner
  with ERP/CRM/Data Warehouse data owners to define and enforce enterprise data standards,
  naming conventions, and data governance practices within integration solutions,
  so that connected systems share a single source of truth.</p></li><li><p>Manage
  full SDLC for integration solutions, from requirements and design through development,
  testing, deployment, and post-production support. Coordinate QA/testing for all
  integration changes.</p></li><li><p>Implement version control and CI/CD pipelines
  for integration code, and ensure all changes follow formal change management and
  documentation processes before deployment to production.</p></li><li><p>Work closely
  with other teams to prioritize integration deployments alongside application releases,
  minimizing disruption to business operations.</p></li><li><p>Implement proactive
  monitoring and alerting for integration workflows to quickly detect performance
  bottlenecks or errors.</p></li><li><p>Act as the escalation point for complex integration
  issues, troubleshooting and resolving cross-system challenges in a timely manner.</p></li><li><p>Lead
  post-release &amp; post-deployment validation and continuously optimize integrations
  to improve stability and performance.</p></li><li><p>Collaborate with Information
  Security and IT Ops to ensure all integrations meet strict security, compliance,
  and infrastructure standards.</p></li><li><p>Implement best practices for API security,
  authentication/authorization, data encryption in transit, and access controls. Maintain
  audit-ready documentation of integration processes and changes and ensure data privacy
  and governance policies are followed in all integration activities.</p></li><li><p>Comply
  with health and safety guidelines and rules; managers should also ensure compliance
  across their teams.</p></li><li><p>Protect Chamberlain Group’s reputation by keeping
  information confidential. Maintain professional and technical knowledge by attending
  educational workshops, reading professional publications, establishing personal
  networks, and participating in professional societies.</p></li><li><p>Contribute
  to the team effort by accomplishing related results and participating on projects
  as needed.</p></li><li><p>Supervision Exercised</p></li><li><p>Motivate and lead
  a high performance team by attracting, developing, engaging and retaining team members</p></li><li><p>Drive
  the performance management and compensation processes by communicating job expectations,
  monitoring and evaluating performance, providing feedback and facilitating employee
  development per the company’s policies</p></li><li><p>Maintain transparent communication
  by appropriately communicating organization information to team through department
  meetings, one-on-one meetings, appropriate email, IM and regular interpersonal communications</p></li><li><p>Lead
  and motivate individuals and teams to create a workplace culture that is consistent
  with the CG mission, vision and values.</p></li></ul><p><b>Minimum Qualifications
  </b></p><p><b>Education/Certifications:</b></p><ul><li><p>Bachelor’s degree in Computer
  Science, Information Systems, or a related field.</p></li></ul><p><b><u>Experience:
  </u></b></p><ul><li><p>5+ years of integration design and development experience,
  preferably across Salesforce, ERP, and API-based ecosystems</p></li><li><p>7+ years
  of IT experience using Integration platforms</p></li><li><p>3+ years of experience
  in managing Integrations team in a global organization · Experience with SAP Integration
  Suite (or similar iPaaS platforms), including process orchestration, error handling,
  and deployment pipelines</p></li></ul><p><u><b>Knowledge, Skills, and Abilities:</b></u></p><ul><li><p>Deep
  understanding of enterprise integration concepts, including API-led connectivity,
  event-driven architecture, middleware, and data orchestration.</p></li><li><p>Expertise
  in integration platforms such as SAP Integration Suite, Boomi, webMethods, Seeburger,
  and related technologies.</p></li><li><p>Familiarity with cloud-based and hybrid
  integration models, including iPaaS solutions and cloud-native architectures.</p></li><li><p>Strong
  documentation skills, including the ability to create technical specifications,
  data flow diagrams, and integration architecture artifacts.</p></li><li><p>Effective
  communication and interpersonal skills to collaborate with cross-functional teams,
  business stakeholders, and external partners.</p></li><li><p>Translate business
  requirements into technical integration solutions that align with architectural
  standards.</p></li><li><p>Manage integration environments and ensure reliable deployment
  pipelines across development, testing, and production.</p></li><li><p>Enforce integration
  governance, standards, and best practices across the organization.</p></li><li><p>Ability
  to stay current with emerging integration technologies and trends and apply them
  to improve</p></li><li><p>integration capabilities.</p></li><li><p>Work independently
  and make informed decisions in a fast-paced, dynamic environment.</p></li></ul><p><b>Other:</b></p><p><b>Preferred
  Qualifications</b></p><p><b>Education/Certifications:</b></p><ul><li><p>Integration
  related certification preferred</p></li></ul><p>#LI-Hybrid</p><p>#LI-JM2</p>

  The pay range for this position is $102,600.00 - $193,425.00; base pay offered may
  vary depending on a number of factors including, but not limited to, the position
  offered, location, education, training, and/or experience. In addition to base pay,
  also offered is a comprehensive benefits package and 401k contribution (all benefits
  are subject to eligibility requirements). This position is eligible for participation
  in a short-term incentive plan subject to the terms of the applicable plans and
  policies.


  <p>Chamberlain Group wants all of its employees to succeed and encourages people
  of all backgrounds to apply. We’re proud to be an Equal Opportunity Employer, and
  you’ll be considered for this role regardless of race, color, religion, sex, national
  origin, age, sexual orientation, ancestry; marital, disabled or veteran status.
  We’re committed to fostering an environment where people of all lived experiences
  feel welcome.&nbsp;&nbsp;</p><p></p><p>Persons with disabilities who anticipate
  needing accommodations for any part of the application process may contact, in confidence
  <span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span><span>Recruiting@Chamberlain.com</span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span></span>.</p><p><br>NOTE:
  Staffing agencies, headhunters, recruiters, and/or placement agencies, please do
  not contact our hiring managers directly.</p>'
