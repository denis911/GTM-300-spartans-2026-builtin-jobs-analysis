description_html: <p>Agora is a leading SaaS and FinTech platform transforming how
  real estate investment firms manage their capital, investors, and operations. Trusted
  by 1000+ GPs, owners/operators, and investment firms globally, we help teams streamline
  the full lifecycle of investment management—from fundraising and onboarding to reporting,
  distributions, tax, and back-office automation.</p><p>But we’re more than just software.
  We’re a team of bold thinkers, innovators, and real estate enthusiasts who believe
  complex processes should feel simple. Our platform combines modern technology with
  expert services, helping our customers raise more capital, deliver a better investor
  experience, and scale their businesses smarter.</p><p>Agora is backed by top-tier
  VCs like Insight Partners and Qumra Capital, and we’re growing fast. We’ve been
  named one of Globes’ Most Promising Startups, recognized as a Best Start-Up Companies
  to Work For by Duns 100, and one of Business Insider’s Hottest PropTech Startups.&nbsp;</p><p><strong>About
  the Role</strong></p><p>We are seeking a <strong>Director of Go-to-Market Enablement</strong>
  to build and lead our GTM Enablement function. This strategic, hands-on role, based
  in <strong>New York City, </strong>is responsible for increasing the productivity,
  effectiveness, and consistency of our revenue-generating teams including SDRs, Account
  Executives, and Customer Success across the full Go-to-Market funnel.</p><p>The
  Director will combine strategic thinking with practical execution, analyzing performance,
  identifying gaps, building enablement frameworks, and ensuring teams are equipped
  to perform at scale in a high-volume SMB sales environment. This is a hands-on role
  for someone who can hit the ground running, owning and executing enablement initiatives
  from day one while quickly diagnosing what’s working and what’s not. Over time,
  this leader will build, manage, and scale a small enablement team. The role reports
  directly to the CRO/CEO and works closely with RevOps, Sales Leadership, Product
  Marketing, and Customer Success.</p><ul><li>Proven experience in Go-to-Market, Revenue,
  or Sales Enablement</li><li>Proven experience managing a small team of Sales and
  CS enablement</li><li>Strong understanding of SDR motions, SMB sales, and AE workflows</li><li>Hands-on
  experience building enablement programs, playbooks, and training frameworks for
  Sales and Customer Success within a B2B SaaS product</li><li>Strong analytical skills
  and experience with performance data and metrics</li><li>Experience partnering with
  RevOps, Sales Operations, Customer Success Operations and Product</li><li>Ability
  to lead cross-functional initiatives without formal authority</li><li>Familiarity
  with CRM systems, enablement platforms, and BI tools</li><li>Experience in a fast-growing
  SaaS company (preferred)</li><li>Experience building a new function or capability
  from scratch (preferred)</li><li>Excellent communication skills in English</li></ul><p><strong>Compensation:</strong>
  $200k+ Compensation is flexible and based on experience, with additional upside
  potential.</p>
description_text: 'Agora is a leading SaaS and FinTech platform transforming how real
  estate investment firms manage their capital, investors, and operations. Trusted
  by 1000+ GPs, owners/operators, and investment firms globally, we help teams streamline
