  Success. Proven experience in Go-to-Market, Revenue, or Sales Enablement Proven
  experience managing a small team of Sales and CS enablement Strong understanding
  of SDR motions, SMB sales, and AE workflows Hands-on experience building enablement
  programs, playbooks, and training frameworks for Sales and Customer Success within
  a B2B SaaS product Strong analytical skills and experience with performance data
  and metrics Experience partnering with RevOps, Sales Operations, Customer Success
  Operations and Product Ability to lead cross-functional initiatives without formal
  authority Familiarity with CRM systems, enablement platforms, and BI tools Experience
  in a fast-growing SaaS company (preferred) Experience building a new function or
  capability from scratch (preferred) Excellent communication skills in English Compensation:
  $200k+ Compensation is flexible and based on experience, with additional upside
  potential.'
