  About the Role We are seeking a Director of Go-to-Market Enablement to build and
  lead our GTM Enablement function. This strategic, hands-on role, based in New York
  City, is responsible for increasing the productivity, effectiveness, and consistency
  of our revenue-generating teams including SDRs, Account Executives, and Customer
  Success across the full Go-to-Market funnel. The Director will combine strategic
  thinking with practical execution, analyzing performance, identifying gaps, building
  enablement frameworks, and ensuring teams are equipped to perform at scale in a
  high-volume SMB sales environment. This is a hands-on role for someone who can hit
  the ground running, owning and executing enablement initiatives from day one while
