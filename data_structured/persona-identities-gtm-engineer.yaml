company_overview: Persona helps businesses manage KYC/AML/KYB programs, fight fraud,
  and build trust by automating any identity-related use case with our flexible identity
  infrastructure. For example, we help Branch automate their KYC process and Coursera
  verify learners’ identities before delivering course credentials.Beyond securely
  collecting and verifying user information such as PII, government IDs, and biometric
  selfies, our platform also provides flexible case review and orchestration tools
  to help businesses streamline and automate their identity operations — from setting
  custom rules to ingesting third-party data and triggering external actions.
