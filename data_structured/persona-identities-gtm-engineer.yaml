description_html: <p><strong>About Persona</strong></p><p><u>Persona</u> is the configurable
  identity platform built for businesses in a digital-first world. Verifying individuals
  and organizations is harder — but more important — than ever, with AI enabling fraudsters
  to launch sophisticated accounts at scale and regulations evolving rapidly.</p><p>We’ve
  built Persona to support practically every use case and industry — that’s why we’re
  able to serve a wide range of leading companies. For example, Reddit relies on Persona
  for age assurance and verification to comply with online safety regulations, protecting
  younger users while maintaining a seamless experience. Meanwhile, OpenAI relies
  on Persona to keep bad actors out, protecting one of the world’s most powerful AI
  platforms from large-scale abuse in a time when AI is reshaping the way we work
  and live.</p><p>We’re growing rapidly and looking for exceptional people to join
  us!</p><b><strong>About the Role</strong></b><p>We’re looking for a GTM Engineer
  to join our high-performing Revenue Operations team and support Persona’s next phase
  of growth. This role is ideal for someone with a strong technical foundation in
  Salesforce administration and GTM systems who thrives on building, optimizing, and
  integrating tools that enable our Sales and Marketing teams to operate efficiently
  and scale effectively.</p><p>You’ll partner closely with Sales, Marketing, Finance
  and Ops to ensure our GTM systems — from Salesforce to Outreach, Qualified.com,
  Clay, Dust and other tools — work seamlessly together. This role blends technical
  expertise with process thinking and is a great fit for someone who enjoys both problem-solving
  and driving impact across multiple teams.</p><p>You’ll report directly to the Senior
  Director of Revenue Operations and collaborate closely with our two existing Salesforce
  Admins and the broader RevOps organization.</p><p></p><b><strong>What You’ll Do
  at Persona</strong></b><p><strong>System Ownership &amp; Development</strong></p><ul><li><p>Serve
  as the technical owner for Salesforce and related GTM tools, ensuring data accuracy,
  system reliability, and scalability.</p></li><li><p>Design, build, and maintain
  integrations across systems such as Outreach, Qualified.com, Clay, Marketo, and
  other platforms.</p></li><li><p>Manage user access, permissions, and configurations
  to support evolving team needs.</p></li><li><p>Implement automation and process
  improvements to streamline Sales and Marketing workflows.</p></li></ul><p><strong>Tooling
  &amp; Process Optimization</strong></p><ul><li><p>Evaluate and optimize our existing
  GTM tech stack to improve efficiency and reduce manual effort.</p></li><li><p>Document
  best practices and develop internal enablement materials to ensure teams are equipped
  to leverage tools effectively.</p></li><li><p>Partner with stakeholders to define
  requirements for new tools, integrations, or enhancements to support strategic initiatives.</p></li></ul><p><strong>Cross-Functional
  Collaboration</strong></p><ul><li><p>Work closely with Sales, Marketing, Finance,
  and Ops to translate business needs into scalable systems and processes.</p></li><li><p>Collaborate
  with the Monetization team to ensure accurate data flow for reporting and forecasting.</p></li><li><p>Act
  as the technical liaison between RevOps and external vendors for implementation
  and support.</p></li></ul><p><strong>Data Integrity &amp; Reporting Support</strong></p><ul><li><p>Monitor
  data quality across systems, troubleshoot sync issues, and ensure information flows
  correctly between tools.</p></li><li><p>Support reporting and dashboard initiatives
  by ensuring consistent data definitions and structures across platforms.</p></li></ul><b><strong>What
  You’ll Bring to Persona</strong></b><ul><li><p>3–5 years of experience in Salesforce
  Administration, Revenue Operations, or GTM Systems roles at a high-growth SaaS or
  B2B company.</p></li><li><p>Deep knowledge of Salesforce, including object relationships,
  flows, validation rules, and automation.</p></li><li><p>Hands-on experience managing
  or integrating tools such as Outreach, Qualified.com, <strong>Clay</strong>, <strong>Dust</strong>,
  and Marketo.</p></li><li><p>Strong analytical and problem-solving skills; able to
  translate operational pain points into technical solutions.</p></li><li><p>Excellent
  communication and organizational skills, with the ability to work effectively cross-functionally.</p></li><li><p>A
  proactive, resourceful, and detail-oriented mindset — someone who takes ownership
  and thrives in a fast-paced environment.</p></li></ul><p><strong>Full-time Employee
  Benefits and Perks</strong></p><p>For full-time employees (excluding internship
  and contractor opportunities), Persona offers a wide range of benefits, including
  medical, dental, and vision, 3% 401(k) contribution, unlimited PTO, quarterly mental
  health days, family planning benefits, professional development stipend, wellness
  benefits, among others. While we believe competitive compensation and benefits are
  a critical aspect of you deciding to join us, we do hope you consider why our core
  values and culture are right for you. If you’d like to better understand what it’s
  like working at Persona, feel free to check out our reviews on <u>Glassdoor</u>.</p>
description_text: About Persona Persona is the configurable identity platform built
  for businesses in a digital-first world. Verifying individuals and organizations
  is harder — but more important — than ever, with AI enabling fraudsters to launch
  sophisticated accounts at scale and regulations evolving rapidly. We’ve built Persona
  to support practically every use case and industry — that’s why we’re able to serve
  a wide range of leading companies. For example, Reddit relies on Persona for age
  assurance and verification to comply with online safety regulations, protecting
  younger users while maintaining a seamless experience. Meanwhile, OpenAI relies
  on Persona to keep bad actors out, protecting one of the world’s most powerful AI
  platforms from large-scale abuse in a time when AI is reshaping the way we work
  and live. We’re growing rapidly and looking for exceptional people to join us! About
  the Role We’re looking for a GTM Engineer to join our high-performing Revenue Operations
  team and support Persona’s next phase of growth. This role is ideal for someone
  with a strong technical foundation in Salesforce administration and GTM systems
  who thrives on building, optimizing, and integrating tools that enable our Sales
  and Marketing teams to operate efficiently and scale effectively. You’ll partner
  closely with Sales, Marketing, Finance and Ops to ensure our GTM systems — from
  Salesforce to Outreach, Qualified.com, Clay, Dust and other tools — work seamlessly
  together. This role blends technical expertise with process thinking and is a great
  fit for someone who enjoys both problem-solving and driving impact across multiple
  teams. You’ll report directly to the Senior Director of Revenue Operations and collaborate
  closely with our two existing Salesforce Admins and the broader RevOps organization.
  What You’ll Do at Persona System Ownership &amp; Development Serve as the technical
  owner for Salesforce and related GTM tools, ensuring data accuracy, system reliability,
  and scalability. Design, build, and maintain integrations across systems such as
  Outreach, Qualified.com, Clay, Marketo, and other platforms. Manage user access,
  permissions, and configurations to support evolving team needs. Implement automation
  and process improvements to streamline Sales and Marketing workflows. Tooling &amp;
  Process Optimization Evaluate and optimize our existing GTM tech stack to improve
  efficiency and reduce manual effort. Document best practices and develop internal
  enablement materials to ensure teams are equipped to leverage tools effectively.
  Partner with stakeholders to define requirements for new tools, integrations, or
  enhancements to support strategic initiatives. Cross-Functional Collaboration Work
  closely with Sales, Marketing, Finance, and Ops to translate business needs into
  scalable systems and processes. Collaborate with the Monetization team to ensure
  accurate data flow for reporting and forecasting. Act as the technical liaison between
  RevOps and external vendors for implementation and support. Data Integrity &amp;
  Reporting Support Monitor data quality across systems, troubleshoot sync issues,
  and ensure information flows correctly between tools. Support reporting and dashboard
  initiatives by ensuring consistent data definitions and structures across platforms.
  What You’ll Bring to Persona 3–5 years of experience in Salesforce Administration,
  Revenue Operations, or GTM Systems roles at a high-growth SaaS or B2B company. Deep
  knowledge of Salesforce, including object relationships, flows, validation rules,
  and automation. Hands-on experience managing or integrating tools such as Outreach,
  Qualified.com, Clay , Dust , and Marketo. Strong analytical and problem-solving
  skills; able to translate operational pain points into technical solutions. Excellent
  communication and organizational skills, with the ability to work effectively cross-functionally.
  A proactive, resourceful, and detail-oriented mindset — someone who takes ownership
  and thrives in a fast-paced environment. Full-time Employee Benefits and Perks For
  full-time employees (excluding internship and contractor opportunities), Persona
  offers a wide range of benefits, including medical, dental, and vision, 3% 401(k)
  contribution, unlimited PTO, quarterly mental health days, family planning benefits,
  professional development stipend, wellness benefits, among others. While we believe
  competitive compensation and benefits are a critical aspect of you deciding to join
  us, we do hope you consider why our core values and culture are right for you. If
  you’d like to better understand what it’s like working at Persona, feel free to
  check out our reviews on Glassdoor .
