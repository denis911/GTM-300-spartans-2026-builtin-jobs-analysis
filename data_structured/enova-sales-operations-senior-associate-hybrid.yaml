description_html: '<p><em>We are interested in every qualified candidate who is eligible
  to work in the United States. However, we are not able to sponsor visas or take
  over sponsorship at this time.</em></p><p><strong>About the Role:</strong></p><p>The
  Sales Operations Senior Associate role acts as a liaison between Sales Leadership
  and cross-functional teams to drive change management, process improvement, and
  product adoption within the SMB Sales org. It supports new initiatives by gathering
  requirements, facilitating implementation with Product Managers, and managing post-launch
  troubleshooting. Clear communication is key—translating complex updates for both
  leadership and frontline teams to ensure alignment and action. The role also oversees
  intake for technical issues and supports operational needs with Sales Ops administration.
  Overall, it ensures smooth execution of projects and tools that enable sales effectiveness
  and growth.</p><p><strong>Responsibilities:&nbsp;</strong></p><ul><li>Daily connection
  with Sales Leadership and supporting functions, serving as a conduit for progress,
  change management, and transformation.</li><li>Intake and point of contact for troubleshooting,
  application errors, or system malfunctions for the internal Sales Organization,
  gathering requirements and facilitating with key business partners to develop solutions
  and fixes.&nbsp;</li><li>Present complex information in an easy-to-understand way
  to Sales Leadership and Frontline Teams (Reps) across various lines of business
  - soliciting buy-in and action from the Sales Org and Leadership.</li><li>Work cross-functionally
  to form actionable requirements for implementation<strong> </strong>of new or enhanced
  technological and AI tools, processes, and integrations.</li><li>Provide ongoing
  support and troubleshooting for program and feature launches to identify and resolve
  issues post-deployment.</li><li>Develop and maintain lines of communication between
  multiple departments, able to absorb, organize, and address feedback from various
  internal stakeholders.</li></ul><p><strong>Qualifications: </strong></p><ul><li>Subject
  matter expert on Sales Operations and Sales Enablement within a Small Business Lending
  business model.</li><li>Sales Technology Stack knowledge base, to include Salesforce
  (CRM), LeanData, Genesys, Calendly, Docusign or similar applications.</li><li>Familiarity
  developing and implementing AI-based features that improve operational efficiency.
  &nbsp;</li><li>Experience in Credit or Lending Operations, inclusive of loan processing,
  underwriting, and credit evaluation.</li><li>Background in program execution, inclusive
  of building a roadmap for implementation with key priorities, defining roles and
  responsibilities, and defining tactical action items.</li><li>Ability to deliver
  informational sessions and training to end-users on effectively using tool features,
  functionality, and best practices.</li><li>Experience creating and delivering presentations
  using PowerPoint or Google Slides.</li><li>Experience organizing and analyzing data
  in spreadsheets and BI Tools (i.e. Snowflake, Tableau, MicroStrategy).</li><li>An
  emphasis on customer-focused solutions that drive efficiency and promote growth.</li></ul><p><strong>Requirements:&nbsp;</strong></p><ul><li>5+
  years experience within sales/revenue operations and/or sales enablement.</li><li>3+
  years demonstrated experience in driving sales performance and efficiency.</li><li>Analytical
  and results driven.</li><li>Bachelor’s degree required.</li><li>Salesforce experience
  is strongly preferred.</li><li>Strong communicator and experience presenting&nbsp;using
  PowerPoint or Google Slides.</li></ul><p><strong>Compensation:&nbsp;</strong></p><p>The
  budgeted annual salary range for this position is $75,000 to $109,000. Actual annual
  salary will be determined based on qualifications, skills, experience, and level
  assessed during the hiring process and may fall outside of the range shown. Additional
  compensation for this role may include a bonus. All full-time employees are eligible
  to participate in Company benefits, described in more detail here.</p><p>&nbsp;<strong>#BI-Hybrid&nbsp;
  &nbsp; #LI-Hybrid</strong></p><p><p><strong>Benefits &amp; Perks:</strong></p><ul><li>Our
  hybrid roles require in-office work Tuesday through Thursday, with remote flexibility
  on Mondays and Fridays. This schedule fosters collaboration, team connection, and
  strategic planning, enhancing communication and effectiveness to drive results.</li><li><span>Health,
  dental, and vision insurance including mental health benefits</span></li><li><span>401(k)
  matching plus a roth option (U.S. Based employees only)</span></li><li><span>PTO
  &amp; paid holidays off</span></li><li><span>Sabbatical program (for eligible roles)</span></li><li><span>Summer
  hours (for eligible roles)</span></li><li><span>Paid parental leave</span></li><li><span>DEI
  groups (B.L.A.C.K. @ Enova, HOLA @ Enova, Women @ Enova, Pride @ Enova, South Asians
  @ Enova, APEX @ Enova, and Parents @ Enova)</span></li><li><span>Employee recognition
  and rewards program</span></li><li><span>Charitable matching and a paid volunteer
  day…Plus so much more!</span></li></ul><p><strong>About Enova</strong></p><p><span>Enova
  International is a leading financial technology company that provides online financial
  services through our AI and machine learning-powered Colossus™platform. We serve
  non-prime consumers and businesses alike, while offering world-class technology
  and services to traditional banks—in order to create accessible credit for millions.</span><span>&nbsp;</span></p><p><span>Being
  a values-driven organization is at the core of Enova’s success. We live our values
  by listening to our customers, challenging assumptions, thinking big, setting high
  expectations, and hiring and developing the best. Through our values and our commitment
  to making Enova an awesome place to work, we maintain an environment of inclusion
  and culture where our employees can thrive. You can learn more about Enova’s values
  and culture </span><span>here</span><span>.&nbsp;</span></p><p><span>It is our policy
  to provide equal employment opportunity for all persons and not discriminate in
  employment decisions by placing the most qualified person in each job, without regard
  to any other classification protected by federal, state, or local law. California
  Applicants: Click</span><span> </span><span>here</span><span> to review our California
  Privacy Policy for Job Applicants.</span></p></p>'
