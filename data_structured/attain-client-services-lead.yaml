description_html: '<p><strong>About Attain&nbsp;</strong></p><p>Built for consumers
  and companies, alike. In a world driven by data, we believe consumers and businesses
  can coexist. Our founders had a vision to empower consumers to leverage their greatest
  asset—their data—in exchange for modern financial services. Built with this vision
  in mind, our platform allows consumers to access savings tools, earned wages and
  rewards without cost or hidden fees. In exchange, they give permission to use their
  real-time data for research, insights and targeted advertising.</p><p>At Attain,
  your contribution will help us build a more equitable and efficient data sharing
  ecosystem—whether helping consumers access modern financial services or businesses
  leverage data to achieve better outcomes. You’ll have the opportunity to work directly
  with hands-on leaders and mission-driven individuals everyday.</p><p><em>We are
  hiring this role to be based out of either Chicago, IL or New York, NY. At the moment,
  we are targeting candidates who are currently based in those markets. Thank you
  for understanding!&nbsp;</em></p><p><strong>About the role&nbsp;</strong></p><p>As
  our Sales Team continues to grow, we are looking for a Client Services Lead who
  will serve as a primary strategic partner for Attain’s key advertiser and agency
  relationships. Reporting to the Associate Director of Client Services, you will
  be responsible for the end-to-end success of client campaigns—from strategic planning
  and data activation to performance measurement and long-term retention.</p><p>You
  are a hands-on expert in the programmatic and data landscape, acting as a trusted
  advisor to clients while ensuring operational excellence in every engagement. Your
  digital media expertise and relationship-building skills will be the foundation
  that helps our customer base scale as our offerings expand beyond insights, programmatic
  media, and measurement.</p><p><strong>Preferred Qualifications</strong></p><ul><li>5+
  years of experience in digital advertising, programmatic media, or data-driven marketing.</li><li>Deep
  expertise in the ad-tech ecosystem, including DSPs, SSPs, DMPs, and data-driven
  insights.</li><li>Bachelor’s degree in Marketing, Business, or a related field.</li><li>Proven
  ability to build and upsell media execution and measurement strategies to traders,
  agency teams, and executives.</li><li>Strong analytical skills with the ability
  to translate complex data into actionable strategic insights for clients.</li><li>Excellent
  presentation and organizational skills, with experience managing multiple high-value
  priorities in a fast-paced environment.</li></ul><p><strong>What a typical week
  might look like</strong></p><ul><li><strong>Strategic Account Management:</strong>
  Lead the day-to-end relationship for a portfolio of high-value accounts, acting
  as their primary point of contact to ensure strategic alignment and satisfaction.</li><li><strong>Campaign
  Strategy &amp; Execution:</strong> Oversee the entire lifecycle—from initial kick-off
  and onboarding to final reporting—ensuring measurable business growth through data-driven
  recommendations.</li><li><strong>Growth &amp; Retention: </strong>Partner with Sales
  to identify upsell opportunities and expand Attain’s data activation and measurement
  footprint within existing accounts.</li><li><strong>Cross-Functional Collaboration:
  </strong>Work with Product and Engineering teams to surface client feedback and
  influence the development of new data and measurement solutions.</li><li><strong>Process
  Innovation:</strong> Contribute to the development of scalable playbooks and best
  practices for campaign management and client communication.</li><li><strong>Mentorship:
  </strong>Provide guidance and share best practices with Client Services Managers
  and Specialists on the team.</li></ul><p><strong>At the end of your first year,
  you’ll have helped us</strong></p><ul><li>Successfully managed and grown a portfolio
  of key accounts with high retention and satisfaction rates.</li><li>Onboarded net-new
  business while building the operational components of our measurement and data activation
  offerings.</li><li>Raised the bar of our organizational expertise in the marketplace
  by leading cross-functional education sessions.</li><li>Utilized your programmatic
  experience to collaborate with sellers and grow our outbound go-to-market strategies.</li></ul><p><em>We’re
  excited to hear from you. At Attain, we are passionate about finding people to continuously
  help us grow our organization. We encourage you to apply, even if your experience
  doesn’t match every detail of the job description.</em></p>'
description_text: 'About Attain&nbsp; Built for consumers and companies, alike. In
  a world driven by data, we believe consumers and businesses can coexist. Our founders
  had a vision to empower consumers to leverage their greatest asset—their data—in
  exchange for modern financial services. Built with this vision in mind, our platform
  allows consumers to access savings tools, earned wages and rewards without cost
  or hidden fees. In exchange, they give permission to use their real-time data for
  research, insights and targeted advertising. At Attain, your contribution will help
  us build a more equitable and efficient data sharing ecosystem—whether helping consumers
  access modern financial services or businesses leverage data to achieve better outcomes.
  You’ll have the opportunity to work directly with hands-on leaders and mission-driven
  individuals everyday. We are hiring this role to be based out of either Chicago,
  IL or New York, NY. At the moment, we are targeting candidates who are currently
  based in those markets. Thank you for understanding!&nbsp; About the role&nbsp;
  As our Sales Team continues to grow, we are looking for a Client Services Lead who
  will serve as a primary strategic partner for Attain’s key advertiser and agency
  relationships. Reporting to the Associate Director of Client Services, you will
  be responsible for the end-to-end success of client campaigns—from strategic planning
  and data activation to performance measurement and long-term retention. You are
  a hands-on expert in the programmatic and data landscape, acting as a trusted advisor
  to clients while ensuring operational excellence in every engagement. Your digital
  media expertise and relationship-building skills will be the foundation that helps
  our customer base scale as our offerings expand beyond insights, programmatic media,
  and measurement. Preferred Qualifications 5+ years of experience in digital advertising,
  programmatic media, or data-driven marketing. Deep expertise in the ad-tech ecosystem,
  including DSPs, SSPs, DMPs, and data-driven insights. Bachelor’s degree in Marketing,
  Business, or a related field. Proven ability to build and upsell media execution
  and measurement strategies to traders, agency teams, and executives. Strong analytical
  skills with the ability to translate complex data into actionable strategic insights
  for clients. Excellent presentation and organizational skills, with experience managing
  multiple high-value priorities in a fast-paced environment. What a typical week
  might look like Strategic Account Management: Lead the day-to-end relationship for
  a portfolio of high-value accounts, acting as their primary point of contact to
  ensure strategic alignment and satisfaction. Campaign Strategy &amp; Execution:
  Oversee the entire lifecycle—from initial kick-off and onboarding to final reporting—ensuring
  measurable business growth through data-driven recommendations. Growth &amp; Retention:
  Partner with Sales to identify upsell opportunities and expand Attain’s data activation
  and measurement footprint within existing accounts. Cross-Functional Collaboration:
  Work with Product and Engineering teams to surface client feedback and influence
  the development of new data and measurement solutions. Process Innovation: Contribute
  to the development of scalable playbooks and best practices for campaign management
  and client communication. Mentorship: Provide guidance and share best practices
  with Client Services Managers and Specialists on the team. At the end of your first
  year, you’ll have helped us Successfully managed and grown a portfolio of key accounts
  with high retention and satisfaction rates. Onboarded net-new business while building
  the operational components of our measurement and data activation offerings. Raised
  the bar of our organizational expertise in the marketplace by leading cross-functional
  education sessions. Utilized your programmatic experience to collaborate with sellers
  and grow our outbound go-to-market strategies. We’re excited to hear from you. At
  Attain, we are passionate about finding people to continuously help us grow our
  organization. We encourage you to apply, even if your experience doesn’t match every
  detail of the job description.'
