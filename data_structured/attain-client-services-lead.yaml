company_overview: Attain is the most trusted and comprehensive source for permissioned,
  real-time purchase data in the United States. By connecting directly with over 10
  million consumers, Attain delivers unmatched accuracy and scale across audience
  activation, insights, and in-flight optimization, and measurement, helping marketers
  tie every dollar of media to real-world sales outcomes. Attain’s portfolio of owned
  and operated apps, spanning financial wellness and shopping rewards, empowers consumers
  to receive everyday value in exchange for the explicit permission to use their data
  for research, insights, and targeted advertising.
