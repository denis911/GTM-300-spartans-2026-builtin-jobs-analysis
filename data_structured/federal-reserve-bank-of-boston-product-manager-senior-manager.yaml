company_overview: As part of the Central bank of the United States, the Boston Fed
  works to promote sound growth and financial stability in New England and the nation.
  We contribute to communities, the region, and the nation by conducting economic
  research, participating in monetary policy-making, supervising certain financial
  institutions, providing financial services and payments, playing a leadership role
  in the payments industry, and supporting economic well-being in communities through
  a variety of efforts.
