description_html: '<b><b>Company</b></b><br>Federal Reserve Bank of Boston<br>Federal
  Reserve Financial Services (FRFS) delivers a suite of payments services to financial
  institutions via FedLine® Solutions, FedNowSM, Fedwire®, National Settlement Service
  (NSS), FedCash®, FedACH® (Automated Clearing House), and Check Services. We are
  currently leading a strategic effort to transform FRFS to a national, enterprise-focused
  organization. Through our evolved structure, we will meet the needs of the marketplace
  for new products and services more quickly, seek to provide a more robust and unified
  customer experience across our financial service offerings, and create new career
  growth opportunities for FRFS staff.<br>The Federal Reserve has developed a new
  interbank 24x7x365 real-time gross settlement (RTGS) service with integrated clearing
  functionality, called the FedNow Service. This service enables financial institutions
  to provide their customers with the ability to send and receive payments any time,
  any day, and have full access to those funds within seconds.  This position is a
  unique opportunity to be part of this mission-critical Federal Reserve initiative
  that is transforming the payments landscape in the United States.<br>The position
  will be primarily on-site with residency commutable to one of our offices required.<br><b>Position
  Contributions</b> <br><ul><li>The Product Strategy Senior Manager will have the
  opportunity to drive innovation and shape the future of payments in the US by helping
  to formulate a vision and strategy for future value-add products and defining the
  customer and ecosystem value proposition.</li></ul><br><ul><li>The Product Strategy
  Senior Manager will be a subject matter expert on features and functionality of
  payments broadly, and the FedNow service specifically, and will be responsible for
  overseeing the analysis and strategy of a subset of current and future roadmap features.</li></ul><br><ul><li>The
  Product Strategy Senior Manager will need to understand the instant payments ecosystem,
  key players, competitive landscape, and product strategy to make new feature recommendations
  for the FedNow Service.</li></ul><br><ul><li>The Product Strategy Senior Manager
  should be a thought leader and have an educated perspective on multiple payment-adjacent
  topics, for example stablecoins, tokenized deposits, cryptofinance, QR Codes, digital
  wallets, and/or agentic payments.</li></ul><br><ul><li>This role will work closely
  with partners such as product delivery, credit risk, legal, risk, Board of Governors,
  marketing, program management, operations and technology to bring to market new
  capabilities and solution enhancements that are aligned with Federal Reserve objectives,
  industry needs, and business goals.</li></ul><br><ul><li>The Product Strategy Senior
  Manager is a people leader with skills and a passion for delivering high-quality
  products. You will manage and lead a team by continuously iterating ideas and defining
  our value proposition.</li></ul><br><b>What you''ll be doing</b> <br><ul><li>As
  a Product Senior Manager, you''ll help bring FedNow''s vision for instant payments
  to life: making us the method of choice for Financial Institutions, Billers, and
  Fintechs.</li></ul><br><ul><li>Help drive product features from ideation to launch,
  collaborating with designers, engineers, and cross-functional partners such as sales
  and legal.</li></ul><br><ul><li>Evaluate product/market fit in new markets or verticals
  by analyzing customer pain points, alternatives, and willingness to pay.</li></ul><br><ul><li>Develop
  a deep understanding of our users'' needs, operational landscape, and competitive
  environment across payments markets.</li></ul><br><ul><li>Product Strategy and Discovery:
  Assist in development of a multi-year FedNow product roadmap to ensure our services
  truly meet customer needs, stay ahead of emerging trends, and deliver business value.
  Lead and oversee specific product discovery analysis by identifying a business case,
  assessing the risks, and delivering a recommendation. Identify the business impact
  of solutions to inform decision making and prioritization.</li></ul><br><ul><li>Team
  culture and collaboration: Be an active contributor to the team''s collaborative
  and inclusive culture. Ensure clear and transparent communication with team members
  and partners.</li></ul><br><b>What will be expected of you</b> <br><ul><li>Strategic
  thinking: Establish the vision, overseeing analysis of customer trends, understanding
  industry needs, and identifying opportunities to enhance the FedNow Service. Take
  ownership and drive initiatives from concept through implementation.</li></ul><br><ul><li>Collaboration
  &amp; adaptability: Be a strong and collaborative team player with the ability to
  effectively partner with cross functional stakeholders across the organization.
  Be flexible and quick to adapt to new information, market shifts, and evolving business
  priorities. Explore innovative ways to have the team deliver efficiently.</li></ul><br><ul><li>Focus
  on the customer: Be a strong advocate for financial institutions and service providers
  by understanding their challenges and needs through industry engagement.</li></ul><br><ul><li>People
  Leader: Inspire, enable and empower your team to bring innovative ideas and solutions
  forward. Prioritize, negotiate, and champion strategic initiatives and recommendations.</li></ul><br><ul><li>Execution
  and delivery: Oversee the execution of strategic priorities ensuring timely delivery
  of product discovery analysis and product proposals. Lead product discovery of potential
  new capabilities by defining the customer problem, conduct market analysis, assess
  opportunities and risks, and present a recommendation.</li></ul><br><ul><li>Communication:
  Exceptional communication skills and at ease presenting to leadership teams.</li></ul><br><ul><li>Significant
  travel may be required.</li></ul><br><ul></ul><br><b>Expertise you would bring</b>
  <br><ul><li>7+ years of hands-on product management, analytics, and strategy experience,
  ideally in fintech, payments, crypto, or digital banking</li></ul><br><ul><li>3+
  years of experience managing people and/or cross-functional product teams</li></ul><br><ul><li>Experience
  integrating APIs, managing developer platforms, or building ecosystem-driven products.</li></ul><br><ul><li>Proven
  experience in and passion for ideating, building and implementing financial related
  products</li></ul><br><ul><li>Knowledge of the instant payment landscape and related
  payments policy; financial industry operational and payment system requirements
  and market practices</li></ul><br><ul><li>Ability to adjust to evolving business
  priorities</li></ul><br><ul><li>Proactive and intentional learner willing to quickly
  understand new systems and methods</li></ul><br><ul><li>Ability to think strategically,
  problem-solve, and clearly communicate complex ideas to stakeholders</li></ul><br><ul><li>Proven
  ability to lead a team and deliver results across cross-functional stakeholders</li></ul><br><ul><li>Courage
  and ability to think differently, and appropriately push for meaningful and impactful
  change; storyteller that can get others to buy-in to new ideas while clearly communicating
  the "why"</li></ul><br><ul><li>Strong analytical and problem-solving skills; ability
  to use data and metrics to back up assumptions and evaluate outcomes; ability to
  quickly gather, analyze and synthesize complex information <br>Superior written
  and verbal communication skills, with ability to express ideas in a clear, concise
  and <br>compelling manner and tailor communications for different audiences</li></ul><br><ul><li>Bachelor''s
  degree in finance, business administration, public policy, economics, marketing
  or related field or a combination of commensurate education and experience; MBA/MA
  preferred</li></ul><br>The Federal Reserve believes in salary transparency. The
  final salary and offer will be determined by the applicant''s background, skills,
  internal equity, and alignment with market data. Whether you''re developing into
  the job or are a more seasoned candidate, we aim to pay competitively. The salary
  range for this position is $170,200 - $212,800 - $255,400.<br>The Federal Reserve
  Bank of Boston is committed to provide equal employment opportunities to all persons
  without regard to race, color, religion, national origin, sex, sexual orientation,
  gender identity, age, genetic information, disability, or military service.<br>All
  employees assigned to this position will be subject to FBI fingerprint/ criminal
  background and Patriot Act/ Office of Foreign Assets Control (OFAC) watch list checks
  at least once every five years. <br>For this job, any offer of employment is contingent
  upon successfully passing a two-phase security screening. The first phase consists
  of the satisfactory completion of a physical examination (including a drug screening),
  reference checks, and a security investigation consisting of credit and criminal
  history checks. <br>The second phase, which might not be complete until after you
  begin working at the Reserve Bank, is an additional risk-based security screening
  determined by the risk rating of the position.  Depending upon the sensitivity of
  the position, this phase may include, and is not limited to, work and residency
  eligibility verification, and personal interviews with the candidate, references,
  and prior employers. <br>All applicants must have resided in the United States for
  at least three (3) years.<br><b><b>Full Time / Part Time</b></b><br>Full time<br><b><b>Regular
  / Temporary</b></b><br>Regular<br><b><b>Job Exempt (Yes / No)</b></b><br>Yes<br><b><b>Job
  Category</b></b><br>Project/Product Management Family Group<br><b><b>Work Shift</b></b><br>First
  (United States of America)<br>The Federal Reserve Banks are committed to equal employment
  opportunity for employees and job applicants in compliance with applicable law and
  to an environment where employees are valued for their differences.<br>Always verify
  and apply to jobs on Federal Reserve System Careers (https://rb.wd5.myworkdayjobs.com/FRS)
  or through verified Federal Reserve Bank social media channels.<br>Privacy Notice'
description_text: 'Company Federal Reserve Bank of Boston Federal Reserve Financial
  Services (FRFS) delivers a suite of payments services to financial institutions
  via FedLine® Solutions, FedNowSM, Fedwire®, National Settlement Service (NSS), FedCash®,
  FedACH® (Automated Clearing House), and Check Services. We are currently leading
  a strategic effort to transform FRFS to a national, enterprise-focused organization.
  Through our evolved structure, we will meet the needs of the marketplace for new
  products and services more quickly, seek to provide a more robust and unified customer
  experience across our financial service offerings, and create new career growth
  opportunities for FRFS staff. The Federal Reserve has developed a new interbank
  24x7x365 real-time gross settlement (RTGS) service with integrated clearing functionality,
  called the FedNow Service. This service enables financial institutions to provide
  their customers with the ability to send and receive payments any time, any day,
  and have full access to those funds within seconds. This position is a unique opportunity
  to be part of this mission-critical Federal Reserve initiative that is transforming
  the payments landscape in the United States. The position will be primarily on-site
  with residency commutable to one of our offices required. Position Contributions
  The Product Strategy Senior Manager will have the opportunity to drive innovation
  and shape the future of payments in the US by helping to formulate a vision and
  strategy for future value-add products and defining the customer and ecosystem value
  proposition. The Product Strategy Senior Manager will be a subject matter expert
  on features and functionality of payments broadly, and the FedNow service specifically,
  and will be responsible for overseeing the analysis and strategy of a subset of
  current and future roadmap features. The Product Strategy Senior Manager will need
  to understand the instant payments ecosystem, key players, competitive landscape,
  and product strategy to make new feature recommendations for the FedNow Service.
  The Product Strategy Senior Manager should be a thought leader and have an educated
  perspective on multiple payment-adjacent topics, for example stablecoins, tokenized
  deposits, cryptofinance, QR Codes, digital wallets, and/or agentic payments. This
  role will work closely with partners such as product delivery, credit risk, legal,
  risk, Board of Governors, marketing, program management, operations and technology
  to bring to market new capabilities and solution enhancements that are aligned with
  Federal Reserve objectives, industry needs, and business goals. The Product Strategy
  Senior Manager is a people leader with skills and a passion for delivering high-quality
  products. You will manage and lead a team by continuously iterating ideas and defining
  our value proposition. What you''ll be doing As a Product Senior Manager, you''ll
  help bring FedNow''s vision for instant payments to life: making us the method of
  choice for Financial Institutions, Billers, and Fintechs. Help drive product features
  from ideation to launch, collaborating with designers, engineers, and cross-functional
  partners such as sales and legal. Evaluate product/market fit in new markets or
  verticals by analyzing customer pain points, alternatives, and willingness to pay.
  Develop a deep understanding of our users'' needs, operational landscape, and competitive
  environment across payments markets. Product Strategy and Discovery: Assist in development
  of a multi-year FedNow product roadmap to ensure our services truly meet customer
  needs, stay ahead of emerging trends, and deliver business value. Lead and oversee
  specific product discovery analysis by identifying a business case, assessing the
  risks, and delivering a recommendation. Identify the business impact of solutions
  to inform decision making and prioritization. Team culture and collaboration: Be
  an active contributor to the team''s collaborative and inclusive culture. Ensure
  clear and transparent communication with team members and partners. What will be
  expected of you Strategic thinking: Establish the vision, overseeing analysis of
  customer trends, understanding industry needs, and identifying opportunities to
  enhance the FedNow Service. Take ownership and drive initiatives from concept through
  implementation. Collaboration &amp; adaptability: Be a strong and collaborative
  team player with the ability to effectively partner with cross functional stakeholders
  across the organization. Be flexible and quick to adapt to new information, market
  shifts, and evolving business priorities. Explore innovative ways to have the team
  deliver efficiently. Focus on the customer: Be a strong advocate for financial institutions
  and service providers by understanding their challenges and needs through industry
  engagement. People Leader: Inspire, enable and empower your team to bring innovative
  ideas and solutions forward. Prioritize, negotiate, and champion strategic initiatives
  and recommendations. Execution and delivery: Oversee the execution of strategic
  priorities ensuring timely delivery of product discovery analysis and product proposals.
  Lead product discovery of potential new capabilities by defining the customer problem,
  conduct market analysis, assess opportunities and risks, and present a recommendation.
  Communication: Exceptional communication skills and at ease presenting to leadership
  teams. Significant travel may be required. Expertise you would bring 7+ years of
  hands-on product management, analytics, and strategy experience, ideally in fintech,
  payments, crypto, or digital banking 3+ years of experience managing people and/or
  cross-functional product teams Experience integrating APIs, managing developer platforms,
  or building ecosystem-driven products. Proven experience in and passion for ideating,
  building and implementing financial related products Knowledge of the instant payment
  landscape and related payments policy; financial industry operational and payment
  system requirements and market practices Ability to adjust to evolving business
  priorities Proactive and intentional learner willing to quickly understand new systems
  and methods Ability to think strategically, problem-solve, and clearly communicate
  complex ideas to stakeholders Proven ability to lead a team and deliver results
  across cross-functional stakeholders Courage and ability to think differently, and
  appropriately push for meaningful and impactful change; storyteller that can get
  others to buy-in to new ideas while clearly communicating the "why" Strong analytical
  and problem-solving skills; ability to use data and metrics to back up assumptions
  and evaluate outcomes; ability to quickly gather, analyze and synthesize complex
  information Superior written and verbal communication skills, with ability to express
  ideas in a clear, concise and compelling manner and tailor communications for different
  audiences Bachelor''s degree in finance, business administration, public policy,
  economics, marketing or related field or a combination of commensurate education
  and experience; MBA/MA preferred The Federal Reserve believes in salary transparency.
  The final salary and offer will be determined by the applicant''s background, skills,
  internal equity, and alignment with market data. Whether you''re developing into
  the job or are a more seasoned candidate, we aim to pay competitively. The salary
  range for this position is $170,200 - $212,800 - $255,400. The Federal Reserve Bank
  of Boston is committed to provide equal employment opportunities to all persons
  without regard to race, color, religion, national origin, sex, sexual orientation,
  gender identity, age, genetic information, disability, or military service. All
  employees assigned to this position will be subject to FBI fingerprint/ criminal
  background and Patriot Act/ Office of Foreign Assets Control (OFAC) watch list checks
  at least once every five years. For this job, any offer of employment is contingent
  upon successfully passing a two-phase security screening. The first phase consists
  of the satisfactory completion of a physical examination (including a drug screening),
  reference checks, and a security investigation consisting of credit and criminal
  history checks. The second phase, which might not be complete until after you begin
  working at the Reserve Bank, is an additional risk-based security screening determined
  by the risk rating of the position. Depending upon the sensitivity of the position,
  this phase may include, and is not limited to, work and residency eligibility verification,
  and personal interviews with the candidate, references, and prior employers. All
  applicants must have resided in the United States for at least three (3) years.
  Full Time / Part Time Full time Regular / Temporary Regular Job Exempt (Yes / No)
  Yes Job Category Project/Product Management Family Group Work Shift First (United
