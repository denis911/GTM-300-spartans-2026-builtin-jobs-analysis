description_html: '<strong>Available Location: Washington D.C., Virginia, North Carolina</strong>
  <strong>What you''ll do as a Senior Solutions Engineer</strong> <br>The Pre-Sales
  Solution Engineering organization owns the technical sales of the Cloudflare solution
  portfolio, ensuring maximal business value, fit-for-purpose solution design and
  adoption roadmap for our customers. Solution Engineering is made up of individuals
  from a wide range of backgrounds including but not limited to Sales Consultants,
  Technical Consultants, Technical Support and Program Managers. <br>You are a customer
  facing technologist within the Cloudflare Solutions Engineering team. You have experience
  in working in a pre-sales or other technical customer facing role supporting large
  enterprise accounts or acquiring new enterprise customers, as well as excellent
  verbal and written communication skills suited to explain the benefits of CloudFlare
  products and services to existing and potential customers. In this role you will
  be responsible for partnering with the sales team to understand customer requirements
  and provide sales support, prepare and deliver technical presentations and demos
  explaining the benefits of Cloudflare products to existing and potential customers,
  and run proof of concept trials for customers.<br>Specifically, we are looking for
  you to:<br><ul> <li>Identify and map customer initiatives and business problems
  to Cloudflare solutions</li> <li>Build relationships and technical champions within
  customer accounts</li> <li>Develop and present customer presentations at every Enterprise
  Customer''s organization level</li> <li>Lead demo and proof-of-concept activities
  for Cloudflare prospects and customers</li> <li>Demonstrate your expertise of Cloudflare
  with your peers  through the creation of professional content, including white papers,
  blog posts and other knowledge sharing activities</li> <li>Represent and evangelize
  Cloudflare externally at Developer, Community, Technology, Cybersecurity and Industry
  focused events with thought leadership and expertise.</li> <li>Apply in-depth vertical
  knowledge or domain expertise. Advise on best practices.</li> </ul> <br><strong>Basic
  Requirements</strong><br><ul> <li>Previous experience as a Solutions Engineer or
  other customer facing technical role with CDN, Security, Networking or SaaS</li>
  <li>Solid communication, written and presentation skills</li> <li>Ability to work
  on several projects and activities concurrently</li> <li>Highly driven individuals
  that are curious, team players and work with a sense of urgency</li> <li>Bachelor''s
  Degree or equivalent in relevant work experience</li> <li>The role requires up to
  50% travel to attend meetings with prospects or customers, attend conferences and
  other industry events, and to collaborate with your Cloudflare teammates.</li> </ul>   <br><strong>Examples
  of one or more desirable skills, knowledge and experience</strong><br><ul> <li>Fundamental
  understanding of customer network and/or application architectures. </li> <li>Detailed
  understanding of workflow from user to application including hybrid architectures
  with Azure, AWS, GCP.</li> <li>Understanding, knowledge or experience of application
  and/or network security </li> <li>Understanding, knowledge or experiences with SaaS
  application environments</li> <li>Understanding, knowledge or experience with VPN
  and remote access challenges</li> <li>Understanding, knowledge or experience with
  SIEM and log analytics platforms </li> <li>Client OS fundamentals and software distribution</li>
  </ul> <br><strong>Other desirable skills areas include:</strong><br><ul> <li>Experience
  interacting with senior level/executives to communicate a message of network and
  security transformation</li> <li>Routing, subnetting, split tunnels. SD-WAN, local
  internet breakout</li> <li>End user and application security risks - DDoS, malware,
  phishing, viruses</li> <li>Knowledge of competitive market  around CDN providers
  and internet security technologies</li> </ul> <br><strong>Compensation</strong><br>Compensation
  may be adjusted depending on work location.<br><ul> <li>For Maryland based hires:
  Estimated annual salary of $184,000 - $253,000.</li> <li>For New York City, New
  Jersey and Washington D.C. based hires: Estimated annual salary of $202,000 - $278,000.</li>
  </ul> <br>This role is eligible to earn incentive compensation under Cloudflare''s
  Sales Compensation Plan. The estimated annual salary range includes the on-target
  incentive compensation that may be attained in this role under the Sales Compensation
  Plan.<br><strong>Equity</strong><br>This role is eligible to participate in Cloudflare''s
  equity plan.<br><strong>Benefits</strong><br>Cloudflare offers a complete package
  of benefits and programs to support you and your family.  Our benefits programs
  can help you pay health care expenses, support caregiving, build capital for the
  future and make life a little easier and fun!  The below is a description of our
  benefits for employees in the United States, and benefits may vary for employees
  based outside the U.S.<br><strong>Health &amp; Welfare Benefits</strong><br><ul>
  <li>Medical/Rx Insurance</li> <li>Dental Insurance</li> <li>Vision Insurance</li>
  <li>Flexible Spending Accounts</li> <li>Commuter Spending Accounts</li> <li>Fertility
  &amp; Family Forming Benefits</li> <li>On-demand mental health support and Employee
  Assistance Program</li> <li>Global Travel Medical Insurance</li> </ul> <br><strong>Financial
  Benefits</strong><br><ul> <li>Short and Long Term Disability Insurance</li> <li>Life
  &amp; Accident Insurance</li> <li>401(k) Retirement Savings Plan</li> <li>Employee
  Stock Participation Plan</li> </ul> <br><strong>Time Off</strong><br><ul> <li>Flexible
  paid time off covering vacation and sick leave</li> <li>Leave programs, including
  parental, pregnancy health, medical, and bereavement leave</li> </ul>'
description_text: 'Available Location: Washington D.C., Virginia, North Carolina What
  you''ll do as a Senior Solutions Engineer The Pre-Sales Solution Engineering organization
  owns the technical sales of the Cloudflare solution portfolio, ensuring maximal
  business value, fit-for-purpose solution design and adoption roadmap for our customers.
  Solution Engineering is made up of individuals from a wide range of backgrounds
  including but not limited to Sales Consultants, Technical Consultants, Technical
  Support and Program Managers. You are a customer facing technologist within the
  Cloudflare Solutions Engineering team. You have experience in working in a pre-sales
  or other technical customer facing role supporting large enterprise accounts or
  acquiring new enterprise customers, as well as excellent verbal and written communication
  skills suited to explain the benefits of CloudFlare products and services to existing
  and potential customers. In this role you will be responsible for partnering with
  the sales team to understand customer requirements and provide sales support, prepare
  and deliver technical presentations and demos explaining the benefits of Cloudflare
  products to existing and potential customers, and run proof of concept trials for
  customers. Specifically, we are looking for you to: Identify and map customer initiatives
  and business problems to Cloudflare solutions Build relationships and technical
  champions within customer accounts Develop and present customer presentations at
  every Enterprise Customer''s organization level Lead demo and proof-of-concept activities
  for Cloudflare prospects and customers Demonstrate your expertise of Cloudflare
  with your peers through the creation of professional content, including white papers,
  blog posts and other knowledge sharing activities Represent and evangelize Cloudflare
  externally at Developer, Community, Technology, Cybersecurity and Industry focused
  events with thought leadership and expertise. Apply in-depth vertical knowledge
  or domain expertise. Advise on best practices. Basic Requirements Previous experience
  as a Solutions Engineer or other customer facing technical role with CDN, Security,
  Networking or SaaS Solid communication, written and presentation skills Ability
  to work on several projects and activities concurrently Highly driven individuals
  that are curious, team players and work with a sense of urgency Bachelor''s Degree
  or equivalent in relevant work experience The role requires up to 50% travel to
  attend meetings with prospects or customers, attend conferences and other industry
  events, and to collaborate with your Cloudflare teammates. Examples of one or more
  desirable skills, knowledge and experience Fundamental understanding of customer
  network and/or application architectures. Detailed understanding of workflow from
  user to application including hybrid architectures with Azure, AWS, GCP. Understanding,
  knowledge or experience of application and/or network security Understanding, knowledge
  or experiences with SaaS application environments Understanding, knowledge or experience
  with VPN and remote access challenges Understanding, knowledge or experience with
  SIEM and log analytics platforms Client OS fundamentals and software distribution
  Other desirable skills areas include: Experience interacting with senior level/executives
  to communicate a message of network and security transformation Routing, subnetting,
  split tunnels. SD-WAN, local internet breakout End user and application security
  risks - DDoS, malware, phishing, viruses Knowledge of competitive market around
  CDN providers and internet security technologies Compensation Compensation may be
  adjusted depending on work location. For Maryland based hires: Estimated annual
  salary of $184,000 - $253,000. For New York City, New Jersey and Washington D.C.
  based hires: Estimated annual salary of $202,000 - $278,000. This role is eligible
  to earn incentive compensation under Cloudflare''s Sales Compensation Plan. The
  estimated annual salary range includes the on-target incentive compensation that
  may be attained in this role under the Sales Compensation Plan. Equity This role
  is eligible to participate in Cloudflare''s equity plan. Benefits Cloudflare offers
  a complete package of benefits and programs to support you and your family. Our
  benefits programs can help you pay health care expenses, support caregiving, build
  capital for the future and make life a little easier and fun! The below is a description
  of our benefits for employees in the United States, and benefits may vary for employees
  based outside the U.S. Health &amp; Welfare Benefits Medical/Rx Insurance Dental
  Insurance Vision Insurance Flexible Spending Accounts Commuter Spending Accounts
  Fertility &amp; Family Forming Benefits On-demand mental health support and Employee
  Assistance Program Global Travel Medical Insurance Financial Benefits Short and
  Long Term Disability Insurance Life &amp; Accident Insurance 401(k) Retirement Savings
  Plan Employee Stock Participation Plan Time Off Flexible paid time off covering
  vacation and sick leave Leave programs, including parental, pregnancy health, medical,
  and bereavement leave'
