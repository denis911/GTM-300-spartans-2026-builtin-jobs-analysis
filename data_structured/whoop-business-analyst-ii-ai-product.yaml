description_html: '<p>At WHOOP, we''re on a mission to unlock human performance and
  healthspan. WHOOP empowers members to perform at a higher level through a deeper
  understanding of their bodies and daily lives.</p><p><br></p><p>We are hiring a
  Business Analyst II to partner closely with our AI Product team, helping WHOOP advance
  our AI-powered experiences. This role sits at the intersection of analytics, product,
  and artificial intelligence, generating insights, informing strategy, and helping
  operationalize AI in ways that create powerful member experiences and drive positive
  long term health outcomes.</p><p><br></p><p>We are looking for an individual who
  is deeply curious about AI, fluent in data, driven by member experience, and is
  looking to deeply understand and tackle complex analytics challenges. This person
  should feel empowered to foster their own curiosity and raise support for ideas
  that meaningfully impact the WHOOP member experience.</p><p><br></p><p><i>This role
  is based in the WHOOP office located in Boston, MA. The successful candidate must
  be prepared to relocate if necessary to work out of the Boston, MA office.&nbsp;</i></p><p><b>RESPONSIBILITIES:</b></p><ul><li><b>Strategic
  Partnership:</b> Collaborate with Product, Data Science, Engineering, and UX teams
  to support translating AI product goals into measurable questions, analyses, and
  success metrics.</li><li><b>Insights to Impact: </b>Analyze how AI features influence
  engagement, retention, personalization, and member outcomes, and provide clear recommendations
  that inform product decisions.</li><li><b>Data Exploration &amp; Opportunity Identification:
  </b>Explore WHOOP’s datasets to identify trends and surface opportunities for improving
  AI-driven experiences.</li><li><b>Product Health &amp; Performance Metrics:</b>
  Support defining, tracking, and maintaining KPIs related to key AI performance metrics,
  including engagement, quality, latency, and cost.</li><li><b>Experimentation &amp;
  Validation:</b> Design and analyze A/B tests to measure the impact of AI-driven
  product features.</li><li><b>Engineering Collaboration: </b>Work with software and
  data engineers to ensure data accuracy, improve data availability, and contribute
  to discussions around data structure and instrumentation.</li><li><b>Cross-Functional
  Insight Integration:</b> Partner with UX Research, Product, and Member Insights
  to connect quantitative findings with qualitative feedback and behavioral observations.</li></ul><p></p><p><b>QUALIFICATIONS:</b></p><ul><li>2+
  years of experience in an analytical role, preferably within a product focused environment.</li><li>Demonstrated
  ability to distill complex problems into clear, actionable, data-driven insights
  and communicate them effectively to stakeholders.</li><li>Strong technical and analytical
  skills, including proficiency in SQL and familiarity with data visualization tools
  (e.g., Sigma, Amplitude, Hex, or similar). Familiarity with modern data warehouses
  (e.g., Snowflake) and analytics workflows (e.g., dbt, ELT) is a plus.</li><li>Foundation
  in A/B testing and experience applying experimentation methods to evaluate product
  performance.</li><li>High intellectual curiosity and a self-starting mindset; comfortable
  working in a fast-paced, evolving environment.</li><li>Strong commitment to embracing
  and leveraging AI tools in day-to-day tasks, ensuring AI-assisted work aligns with
  the same high-quality standards as personal contributions.</li></ul><p></p><p></p><p>Interested
  in the role, but don’t meet every qualification? We encourage you to still apply!
  At WHOOP, we believe there is much more to a candidate than what is written on paper,
  and we value character as much as experience. As we continue to build a diverse
  and inclusive environment, we encourage anyone who is interested in this role to
  apply.</p><p><br></p><p>WHOOP is an Equal Opportunity Employer and participates
  in E-verify to determine employment eligibility.&nbsp; It is unlawful in Massachusetts
  to require or administer a lie detector test as a condition of employment or continued
  employment. An employer who violates this law shall be subject to criminal penalties
  and civil liability.</p><p><br></p><p><i>The WHOOP compensation philosophy is designed
  to attract, motivate, and retain exceptional talent by offering competitive base
  salaries, meaningful equity, and consistent pay practices that reflect our mission
  and core values.</i></p><p><br></p><p><i>At WHOOP, we view total compensation as
  the combination of base salary, equity, and benefits, with equity serving as a key
  differentiator that aligns our employees with the long-term success of the company
  and allows every member of our corporate team to own part of WHOOP and share in
  the company’s long-term growth and success.</i></p><p><br></p><p><i>The U.S. base
  salary range for this full-time position is $100,000 - $125,000. Salary ranges are
  determined by role, level, and location. Within each range, individual pay is based
  on factors such as job-related skills, experience, performance, and relevant education
  or training.&nbsp;</i></p><p><br></p><p><i>In addition to the base salary, the successful
  candidate will also receive benefits and a generous equity package.</i></p><p><br></p><p><i>These
  ranges may be modified in the future to reflect evolving market conditions and organizational
  needs. While most offers will typically fall toward the starting point of the range,
  total compensation will depend on the candidate’s specific qualifications, expertise,
  and alignment with the role’s requirements.</i></p><p></p>'
description_text: 'At WHOOP, we''re on a mission to unlock human performance and healthspan.
  WHOOP empowers members to perform at a higher level through a deeper understanding
  of their bodies and daily lives. We are hiring a Business Analyst II to partner
  closely with our AI Product team, helping WHOOP advance our AI-powered experiences.
  This role sits at the intersection of analytics, product, and artificial intelligence,
  generating insights, informing strategy, and helping operationalize AI in ways that
  create powerful member experiences and drive positive long term health outcomes.
  We are looking for an individual who is deeply curious about AI, fluent in data,
  driven by member experience, and is looking to deeply understand and tackle complex
  analytics challenges. This person should feel empowered to foster their own curiosity
  and raise support for ideas that meaningfully impact the WHOOP member experience.
  This role is based in the WHOOP office located in Boston, MA. The successful candidate
  must be prepared to relocate if necessary to work out of the Boston, MA office.&nbsp;
  RESPONSIBILITIES: Strategic Partnership: Collaborate with Product, Data Science,
  Engineering, and UX teams to support translating AI product goals into measurable
  questions, analyses, and success metrics. Insights to Impact: Analyze how AI features
  influence engagement, retention, personalization, and member outcomes, and provide
  clear recommendations that inform product decisions. Data Exploration &amp; Opportunity
  Identification: Explore WHOOP’s datasets to identify trends and surface opportunities
  for improving AI-driven experiences. Product Health &amp; Performance Metrics: Support
  defining, tracking, and maintaining KPIs related to key AI performance metrics,
  including engagement, quality, latency, and cost. Experimentation &amp; Validation:
  Design and analyze A/B tests to measure the impact of AI-driven product features.
  Engineering Collaboration: Work with software and data engineers to ensure data
  accuracy, improve data availability, and contribute to discussions around data structure
  and instrumentation. Cross-Functional Insight Integration: Partner with UX Research,
  Product, and Member Insights to connect quantitative findings with qualitative feedback
  and behavioral observations. QUALIFICATIONS: 2+ years of experience in an analytical
  role, preferably within a product focused environment. Demonstrated ability to distill
  complex problems into clear, actionable, data-driven insights and communicate them
  effectively to stakeholders. Strong technical and analytical skills, including proficiency
  in SQL and familiarity with data visualization tools (e.g., Sigma, Amplitude, Hex,
  or similar). Familiarity with modern data warehouses (e.g., Snowflake) and analytics
  workflows (e.g., dbt, ELT) is a plus. Foundation in A/B testing and experience applying
  experimentation methods to evaluate product performance. High intellectual curiosity
  and a self-starting mindset; comfortable working in a fast-paced, evolving environment.
  Strong commitment to embracing and leveraging AI tools in day-to-day tasks, ensuring
  AI-assisted work aligns with the same high-quality standards as personal contributions.
  Interested in the role, but don’t meet every qualification? We encourage you to
  still apply! At WHOOP, we believe there is much more to a candidate than what is
  written on paper, and we value character as much as experience. As we continue to
  build a diverse and inclusive environment, we encourage anyone who is interested
  in this role to apply. WHOOP is an Equal Opportunity Employer and participates in
  E-verify to determine employment eligibility.&nbsp; It is unlawful in Massachusetts
  to require or administer a lie detector test as a condition of employment or continued
  employment. An employer who violates this law shall be subject to criminal penalties
  and civil liability. The WHOOP compensation philosophy is designed to attract, motivate,
  and retain exceptional talent by offering competitive base salaries, meaningful
  equity, and consistent pay practices that reflect our mission and core values. At
  WHOOP, we view total compensation as the combination of base salary, equity, and
  benefits, with equity serving as a key differentiator that aligns our employees
  with the long-term success of the company and allows every member of our corporate
  team to own part of WHOOP and share in the company’s long-term growth and success.
  The U.S. base salary range for this full-time position is $100,000 - $125,000. Salary
  ranges are determined by role, level, and location. Within each range, individual
  pay is based on factors such as job-related skills, experience, performance, and
  relevant education or training.&nbsp; In addition to the base salary, the successful
  candidate will also receive benefits and a generous equity package. These ranges
  may be modified in the future to reflect evolving market conditions and organizational
  needs. While most offers will typically fall toward the starting point of the range,
  total compensation will depend on the candidate’s specific qualifications, expertise,
  and alignment with the role’s requirements.'
