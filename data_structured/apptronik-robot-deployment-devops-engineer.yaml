company_overview: Apptronik is building robots for the real world to improve human
  quality of life and to help solve the ever-increasing labor shortage problem. Our
  team has been building some of the most advanced robots on the planet for years,
  dating back to the DARPA Robotics Challenge. We apply our expertise across the full
  robotics stack to some of the most important and impactful problems our society
  faces, and expect our products and technology to change the world for the better.
  We value passion, creativity, and collaboration to help us overcome existing technological
  barriers in the industry to create truly innovative products.
