description_html: '<p><em>We are interested in every qualified candidate who is eligible
  to work in the United States. However, we are not able to sponsor visas or take
  over sponsorship at this time.</em></p><p><strong>About the role:</strong></p><p>The
  Financial Data Engineer Team effectively and sustainably develops data strategy
  and supplies financial data solutions and tools across the organization. We integrate,
  transform, and enhance data products at both project and enterprise levels to promote
  streamlined processes, increased efficiencies, and more informed decision-making.
  This team is characterized by high energy, dynamism, and operates within a business-critical
  domain. This role offers an opportunity to significantly impact the data landscape,
  and we seek confident, experienced individuals eager to deliver financial data solutions
  with a proven ability to learn rapidly and execute effectively.</p><p><strong>Responsibilities:</strong></p><ul><li>Support
  the data needs of Strategy, Product, Compliance, Operations, Accounting, and Finance
  teams</li><li>Opportunity to lead technical initiatives by architecting the solution
  and collaborating with team members and peers to execute the solution</li><li>Architect,
  design, implement, and maintain multi-layered SQL and Python processes.</li><li>Enhance
  the tooling and Python Frameworks to support complex Extract Transform Load (ETL)
  and/or Extract Load Transform (ELT) processes</li><li>Act diligently to respond
  to urgent projects and tasks</li><li>Troubleshooting discrepancies in existing databases,
  data pipelines, warehouses, and reporting</li><li>Collaborating with principals,
  peers, leadership, and the business</li><li>Work as a “full stack” Data Engineer
  contributing to each phase of the SDLC, building a new pipeline between two data
  sources or working with the business to design and develop a new dashboard</li><li>Advise
  on Best Practices and innovative designs/solutions&nbsp;</li><li>Perform other functions
  as assigned by management to support the operation of the business</li></ul><p><strong>Requirements:</strong></p><ul><li>A
  Bachelor’s degree or Masters in Computer Science, Information System, or equivalent
  experience.</li><li>1-3 years of experience in financial data engineering with a
  focus on database related technologies</li><li>Hands-on experience of SQL and database
  related technologies, particularly PostgreSQL.</li><li>1-3 years of experience working
  with Cloud Data Warehouse Technologies such as Snowflake or Redshift.</li><li>1+
  years of hands-on experience working with Python</li><li>Deep understanding of accounting
  principles and finance data system techniques.</li><li>Deep understanding of object
  oriented programming methodologies and design patterns.</li><li>Exposure to architecting,
  designing, and implementing ETL or ELT solutions with peers and stakeholders.</li><li>Exposure
  to Agile methodologies.</li><li>Ability to work off-hours as needed</li></ul><p><strong>Plus:</strong></p><ul><li>1+
  years of experience working with AWS RDS, Aurora, Lambda, S3, Apache Kafka is desirable.</li></ul><p><strong>Compensation:</strong></p><p>This
  position includes various levels within our career ladder. The actual annual salary
  will be determined based on qualifications, skills, experience, and level assessed
  during the hiring process and may fall outside of the ranges shown.&nbsp;</p><p>Budgeted
  annual salary ranges:</p><p>Data Engineer I: $63,000 - $84,000<br>Data Engineer
  II: $75,000 - $92,000</p><p>Additional compensation for this role may include a
  bonus. All full-time employees are eligible to participate in Company benefits,
  described in more detail here.</p><p><p><strong>Benefits &amp; Perks:</strong></p><ul><li>Our
  hybrid roles require in-office work Tuesday through Thursday, with remote flexibility
  on Mondays and Fridays. This schedule fosters collaboration, team connection, and
  strategic planning, enhancing communication and effectiveness to drive results.</li><li><span>Health,
  dental, and vision insurance including mental health benefits</span></li><li><span>401(k)
  matching plus a roth option (U.S. Based employees only)</span></li><li><span>PTO
  &amp; paid holidays off</span></li><li><span>Sabbatical program (for eligible roles)</span></li><li><span>Summer
  hours (for eligible roles)</span></li><li><span>Paid parental leave</span></li><li><span>DEI
  groups (B.L.A.C.K. @ Enova, HOLA @ Enova, Women @ Enova, Pride @ Enova, South Asians
  @ Enova, APEX @ Enova, and Parents @ Enova)</span></li><li><span>Employee recognition
  and rewards program</span></li><li><span>Charitable matching and a paid volunteer
  day…Plus so much more!</span></li></ul><p><strong>About Enova</strong></p><p><span>Enova
  International is a leading financial technology company that provides online financial
  services through our AI and machine learning-powered Colossus™platform. We serve
  non-prime consumers and businesses alike, while offering world-class technology
  and services to traditional banks—in order to create accessible credit for millions.</span><span>&nbsp;</span></p><p><span>Being
  a values-driven organization is at the core of Enova’s success. We live our values
  by listening to our customers, challenging assumptions, thinking big, setting high
  expectations, and hiring and developing the best. Through our values and our commitment
  to making Enova an awesome place to work, we maintain an environment of inclusion
  and culture where our employees can thrive. You can learn more about Enova’s values
  and culture </span><span>here</span><span>.&nbsp;</span></p><p><span>It is our policy
  to provide equal employment opportunity for all persons and not discriminate in
  employment decisions by placing the most qualified person in each job, without regard
  to any other classification protected by federal, state, or local law. California
  Applicants: Click</span><span> </span><span>here</span><span> to review our California
  Privacy Policy for Job Applicants.</span></p></p>'
