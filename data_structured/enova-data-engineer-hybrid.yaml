company_overview: 'Enova International (NYSE: ENVA) is a leading online financial
  services company that serves small businesses and consumers who are underserved
  by traditional banks. For over 20 years, Enova has provided over $67 billion in
  loans and financing to more than 14 million customers by offering a suite of market-leading
  products powered by the company''s world-class analytics, machine learning algorithms
  and proprietary technology. You can learn more about the company and its portfolio
  of businesses at www.enova.com.'
