description_html: '<p>Standard Template Labs is a stealth-mode, AI-native startup
  reimagining the future of IT Service and Configuration Management. Backed by leading
  investors, we''re leveraging AI, graph-based architecture, and exceptional design
  to transform how enterprises manage and engage with their technology ecosystems.</p><p>We’re
  looking for a hands-on Product Manager who excels at working directly with enterprise
  customers and turning messy, real-world problems into shipped product. You’ll spend
  time in the field with customers, deeply understand how IT, support, and operations
  teams actually work, and transform ambiguous needs into clear product direction.
  Partnering closely with engineering and design, you’ll lead the delivery of AI-powered
  features at scale, across large, enterprise organizations.</p><p></p><b><strong>What
  You’ll Do</strong></b><ul><li><p>Work directly with enterprise customers to observe
  real workflows, uncover friction and failure points, and identify opportunities
  where AI can meaningfully improve outcomes.</p></li><li><p>Take ambiguous, imperfect
  inputs - customer conversations, operational data, edge cases - and synthesize them
  into clear product requirements, PRDs, and prioritized roadmaps.</p></li><li><p>Own
  features end-to-end, from problem definition and solution design through build,
  launch, and iteration.</p></li><li><p>Collaborate tightly with engineering and design
  to ensure solutions are practical, scalable, and grounded in how customers actually
  operate.</p></li><li><p>Use customer feedback, product usage, and operational metrics
  to continuously refine and improve shipped features, balancing speed with quality
  and reliability.</p></li></ul><b><strong>What We’re Looking For</strong></b><b>Core
  Requirements</b><ul><li><p>Proven ability to work directly with customers and turn
  messy, real-world problems into shipped product.</p></li><li><p>4+ years of product
  management experience, ideally in enterprise SaaS.</p></li><li><p>Strong instincts
  for breaking down complex workflows into solvable, well-scoped product opportunities.</p></li><li><p>Comfort
  working closely with engineers, with a solid understanding of software development
  concepts and tradeoffs.</p></li><li><p>Excitement about building in an AI-first
  environment where experimentation, iteration, and learning are core to how products
  are built.</p></li></ul><b><strong>Nice to Have</strong></b><ul><li><p>Experience
  building AI-powered, automation-heavy, or data-driven products.</p></li><li><p>Familiarity
  with APIs, distributed systems, and enterprise integrations.</p></li><li><p>Exposure
  to enterprise deployment, security, compliance, or onboarding challenges.</p></li><li><p>Startup
  or high-growth experience where shipping matters more than perfection.</p></li></ul><b><strong>Why
  This Role</strong></b><ul><li><p>Direct, ongoing access to enterprise customers
  and ownership over meaningful, high-impact problems.</p></li><li><p>A fast-moving,
  AI-native environment where you can go from idea to production quickly.</p></li><li><p>Close
  collaboration with experienced engineering and design partners who value strong
  product judgment.</p></li><li><p>A role centered on real execution—shipping product,
  learning from customers, and making tangible improvements every week.</p></li></ul><p></p><p>As
  an equal opportunity employer, we don’t tolerate discrimination or harassment of
  any kind. Whether that’s based on race, ethnicity, age, gender identity, citizenship,
  religion, sexual orientation, disability, pregnancy, veteran status or any other
  protected characteristic as outlined by federal, state or local laws. The reasonably
  estimated yearly salary for this role at is: $130,000—$210,000 USD</p>'
