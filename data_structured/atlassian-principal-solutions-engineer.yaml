company_overview: Atlassian creates teamwork solutions for high-performing teams.
  Our portfolio of collaboration and work management software products includes Jira,
  Confluence, Trello, Loom and Rovo. More than 300,000 businesses worldwide rely on
  Atlassian’s technology, including 80 percent of Fortune 500 companies. Our solutions
  support various business teams and they help organizations plan, track, and deliver
  their biggest ideas together.
