company_overview: Loop is a fully automated delivery intelligence platform for modern
  food brands that helps restaurants become more profitable. We address issues by
  automating back-office operations, providing financial transparency, and streamlining
  reconciliation processes. As delivery channels grow, they now account for over 25%
  of restaurant revenue, yet high commission fees (20-35%) and order inaccuracies
  (3-4% of sales) pose significant challenges to profitability.Loop has raised $6M
  (~ 50cr) in venture capital from Base10 Partners, Afore Capital and many more. Visit
  our website to know more!
