description_html: '<p><strong>We are Rokt, a hyper-growth ecommerce leader. </strong>Rokt
  is the global leader in ecommerce, unlocking real-time relevance in the moment that
  matters most. Rokt''s AI Brain and ecommerce Network powers billions of transactions
  connecting hundreds of millions of customers, and is trusted to do this by the world''s
  leading companies.</p><p>We are a team of builders helping smart businesses find
  innovative ways to meet customer needs and generate incremental revenue. Leading
  companies drive 10-50% of additional revenue-and often all their profits-from the
  extra products or services they sell. This economic edge unleashes a world of possibilities
  for growth and innovation.</p><p>At Rokt, we practice transparency in career paths
  and compensation. We believe in transparency, which is why we have a well-defined
  career ladder with transparent compensation and clear career paths based on competency
  and ability. Rokt''stars constantly strive to raise the bar, pushing the envelope
  of what is possible.</p><p><strong>We are looking for a ClientSuccess Manager (Specialty
  Retail) </strong></p><p><strong>Target total compensation ranges</strong> from $128,000
  - $165,000, including a fixed annual salary of $100,000 - $110,000, an employee
  equity plan grant, and world-class benefits. </p><p>As a Client Success Manager
  in New York, you will own a portfolio of specialty retailers and act as the "quarterback"
  across Rokt-building durable executive relationships, driving measurable revenue
  growth, and expanding multi-product adoption. You''ll combine consultative account
  leadership with strong operational rigor, using data and AI-enabled insights to
  identify expansion opportunities, accelerate time-to-value, and scale repeatable
  best practices across your book of business.</p><p><strong>About the role:</strong></p><ul><li>Own
  and grow a portfolio of specialty retail client relationships, delivering measurable
  outcomes across revenue expansion, retention, and multi-product adoption.</li><li>Serve
  as the single-threaded owner for post-launch success in your accounts: driving clear
  plans, tight execution, and accountable follow-through across internal partners
  (e.g., BD, Ops, Product, RPD).</li><li>Build and maintain senior stakeholder relationships,
  translating client priorities into Joint Business Plans and crisp, measurable next
  steps.</li><li>Use data and AI-enabled analysis to segment your book, identify whitespace,
  prioritize the "highest leverage" expansion paths, and proactively surface risks
  and opportunities early.</li><li>Create scalable playbooks and repeatable operating
  rhythms (cadences, QBRs, adoption frameworks) that improve portfolio performance
  and can be reused across the wider specialty retail pod.</li></ul><p><strong>Requirements</strong></p><p><strong>About
  you:</strong></p><ul><li>5+ years of experience in Customer Success / Account Management
  / Client Partnerships (ideally in SaaS, ecommerce, marketplace, martech/adtech,
  or similar consultative environments).</li><li>Proven track record growing accounts
  through cross-sell / upsell and multi-solution adoption (not just relationship management).</li><li>Strong
  executive communication skills: able to clearly articulate strategy, value, and
  tradeoffs in writing and live discussions.</li><li>Highly autonomous operator with
  strong project ownership: you can run complex, cross-functional workstreams end-to-end
  and make data-backed decisions in real time.</li><li>Comfortable using analytics
  and AI tools to accelerate account planning, performance tracking, customer segmentation,
  and operational workflows.</li></ul><p><strong>Benefits</strong></p><p><strong>About
  Rokt’stars:</strong></p><p>As a mission-driven, hyper-growth community of curious
  explorers, our ambition is to unlock real-time relevancy in ecommerce and beyond.
  Our bias for action means we are not afraid to quickly venture into uncharted territories,
  take risks, or challenge the status quo; in doing so we either win or learn. We
  work together as one aligned team, never letting egos get in the way of brilliant
  ideas. We value diversity, transparency, and smart humble people who enjoy building
  a disruptive business together. We pride ourselves on being a force for good as
  we make the world better.&nbsp;</p><p><strong>About The Benefits:</strong></p><p>We
  leverage best-in-class technology and market-leading innovation in AI and ML, with
  all of that being underlined by building and maintaining a fantastic and inclusive
  culture where people can be their authentic selves, and offering a great list of
  perks and benefits to go with it:</p><ul><li>Become a shareholder. Every Rokt’star
  gets equity in the company</li><li>Enjoy catered lunch every day and healthy snacks
  in the office. Plus join the gym on us!&nbsp;</li><li>Access generous retirement
  plans like a 4% dollar-for-dollar 401K matching plan and get fully funded premium
  health insurance! </li><li>Dog-friendly office </li><li>Extra leave (bonus annual
  leave, sabbatical leave etc.)&nbsp;</li><li>Work with the greatest talent in town</li><li>See
  the world! We have offices in New York, Seattle, Sydney, Tokyo and London</li></ul><p>We
  believe we’re better together. We love spending time together and are in the office
  most days (teams are in the office minimum 4 days per week).&nbsp;</p><p>We at Rokt
  choose to create a company that is as diverse and inclusive as the world we live
  in by attracting, growing &amp; keeping the best talent. Equal employment opportunities
  are available to all applicants without regard to race, religion, color, national
  origin, gender, sexual orientation, age, marital status, veteran status, or disability
  status.</p><p>If this sounds like a role you’d enjoy, apply here, and you’ll hear
  from our recruiting team.</p>'
description_text: 'We are Rokt, a hyper-growth ecommerce leader. Rokt is the global
  leader in ecommerce, unlocking real-time relevance in the moment that matters most.
  Rokt''s AI Brain and ecommerce Network powers billions of transactions connecting
  hundreds of millions of customers, and is trusted to do this by the world''s leading
  companies. We are a team of builders helping smart businesses find innovative ways
  to meet customer needs and generate incremental revenue. Leading companies drive
  10-50% of additional revenue-and often all their profits-from the extra products
  or services they sell. This economic edge unleashes a world of possibilities for
  growth and innovation. At Rokt, we practice transparency in career paths and compensation.
  We believe in transparency, which is why we have a well-defined career ladder with
  transparent compensation and clear career paths based on competency and ability.
  Rokt''stars constantly strive to raise the bar, pushing the envelope of what is
  possible. We are looking for a ClientSuccess Manager (Specialty Retail) Target total
  compensation ranges from $128,000 - $165,000, including a fixed annual salary of
  $100,000 - $110,000, an employee equity plan grant, and world-class benefits. As
  a Client Success Manager in New York, you will own a portfolio of specialty retailers
  and act as the "quarterback" across Rokt-building durable executive relationships,
  driving measurable revenue growth, and expanding multi-product adoption. You''ll
  combine consultative account leadership with strong operational rigor, using data
  and AI-enabled insights to identify expansion opportunities, accelerate time-to-value,
  and scale repeatable best practices across your book of business. About the role:
  Own and grow a portfolio of specialty retail client relationships, delivering measurable
  outcomes across revenue expansion, retention, and multi-product adoption. Serve
  as the single-threaded owner for post-launch success in your accounts: driving clear
  plans, tight execution, and accountable follow-through across internal partners
  (e.g., BD, Ops, Product, RPD). Build and maintain senior stakeholder relationships,
  translating client priorities into Joint Business Plans and crisp, measurable next
  steps. Use data and AI-enabled analysis to segment your book, identify whitespace,
  prioritize the "highest leverage" expansion paths, and proactively surface risks
  and opportunities early. Create scalable playbooks and repeatable operating rhythms
  (cadences, QBRs, adoption frameworks) that improve portfolio performance and can
  be reused across the wider specialty retail pod. Requirements About you: 5+ years
  of experience in Customer Success / Account Management / Client Partnerships (ideally
  in SaaS, ecommerce, marketplace, martech/adtech, or similar consultative environments).
  Proven track record growing accounts through cross-sell / upsell and multi-solution
  adoption (not just relationship management). Strong executive communication skills:
  able to clearly articulate strategy, value, and tradeoffs in writing and live discussions.
  Highly autonomous operator with strong project ownership: you can run complex, cross-functional
  workstreams end-to-end and make data-backed decisions in real time. Comfortable
  using analytics and AI tools to accelerate account planning, performance tracking,
  customer segmentation, and operational workflows. Benefits About Rokt’stars: As
  a mission-driven, hyper-growth community of curious explorers, our ambition is to
  unlock real-time relevancy in ecommerce and beyond. Our bias for action means we
  are not afraid to quickly venture into uncharted territories, take risks, or challenge
  the status quo; in doing so we either win or learn. We work together as one aligned
  team, never letting egos get in the way of brilliant ideas. We value diversity,
  transparency, and smart humble people who enjoy building a disruptive business together.
  We pride ourselves on being a force for good as we make the world better.&nbsp;
  About The Benefits: We leverage best-in-class technology and market-leading innovation
  in AI and ML, with all of that being underlined by building and maintaining a fantastic
  and inclusive culture where people can be their authentic selves, and offering a
  great list of perks and benefits to go with it: Become a shareholder. Every Rokt’star
  gets equity in the company Enjoy catered lunch every day and healthy snacks in the
  office. Plus join the gym on us!&nbsp; Access generous retirement plans like a 4%
  dollar-for-dollar 401K matching plan and get fully funded premium health insurance!
  Dog-friendly office Extra leave (bonus annual leave, sabbatical leave etc.)&nbsp;
  Work with the greatest talent in town See the world! We have offices in New York,
  Seattle, Sydney, Tokyo and London We believe we’re better together. We love spending
  time together and are in the office most days (teams are in the office minimum 4
  days per week).&nbsp; We at Rokt choose to create a company that is as diverse and
  inclusive as the world we live in by attracting, growing &amp; keeping the best
  talent. Equal employment opportunities are available to all applicants without regard
  to race, religion, color, national origin, gender, sexual orientation, age, marital
  status, veteran status, or disability status. If this sounds like a role you’d enjoy,
  apply here, and you’ll hear from our recruiting team.'
