description_html: <b><strong>The Opportunity</strong></b><p>We’re hiring a <strong>Growth
  &amp; GTM Engineer</strong> to help architect, scale, and own our go-to-market engine.
  You’ll report to our <strong>GTM Lead</strong> and work directly with the <strong>CEO</strong>
  on high-impact GTM and operational projects. You’ll be accountable for driving pipeline,
  demand, and conversion through both experimentation and system-level rigor.</p><p>You’ll
  build the systems that generate demand, refine conversion, and create a hyper-efficient
  GTM motion. Some weeks you’ll ship growth experiments; other weeks you’ll own a
  re-vamp of order forms and invoicing. Everything you build should either reduce
  manual effort or increase pipeline and revenue.</p><p></p><b><strong>What's Freeplay?</strong></b><p>Freeplay
  is the end-to-end platform for software teams to ship great AI products. We give
  product development teams the power to test, evaluate, monitor &amp; optimize AI
  in production. Our customers use Freeplay to build better LLM features, chatbots,
  and agents. Today we serve leading software companies from growing startups to Fortune
  100 companies.</p><p></p><b><strong>Your Mission</strong></b><p>As our Growth &amp;
  GTM Engineer, you’ll design the data foundations, signals, automations, and experiments
  that turn messy go-to-market workflows into a scalable revenue engine:</p><ul><li><p>Use
  intent signals, enrichment data, and routing logic to build high-quality target
  lists that put SDRs and AEs in front of the right opportunities at the right time.</p></li><li><p>Build
  automated GTM workflows - from list refreshes to timely follow-ups - so opportunities
  are acted on quickly and never fall through the cracks.</p></li><li><p>Prototype
  and ship growth experiments from ABM plays to lead magnets. Test quickly, learn
  fast, and double down on what works.</p></li><li><p>Eliminate bottlenecks in GTM
  and sales processes by building automations that replace manual work with scalable
  workflows.</p></li><li><p>Partner closely with product, marketing and sales so experiments,
  systems, and messaging all reinforce each other.</p></li><li><p>Take ownership of
  high-leverage projects across the Growth &amp; GTM stack - from invoicing to YouTube
  retargeting - and deliver them end to end.</p></li><li><p>Architect and maintain
  clean, automated data pipelines across HubSpot, Snowflake, Clay, n8n, and more so
  every funnel metric is trustworthy.</p></li></ul><p></p><b><strong>About You</strong></b><ul><li><p>You’re
  a builder at heart - whether it’s hacking together an n8n flow, scripting in Python,
  or enriching HubSpot records from a Clay table, you love turning messy workflows
  into elegant systems.</p></li><li><p>You know when to be scrappy and when to engineer
  - sometimes the effective path is a quick Google Sheet, other times it’s vibe-coding
  a workflow from scratch in Cursor.</p></li><li><p>You think commercially - you measure
  your work by pipeline created, deals accelerated, or hours saved.</p></li><li><p>You’re
  fluent with data and tooling - SQL, APIs, enrichment, and automations don’t intimidate
  you.</p></li><li><p>You thrive in ambiguity - give you a fuzzy GTM problem and you’ll
  ask the right questions, test an idea, and ship a solution fast.</p></li><li><p>You’re
  intensely curious - rather than just start executing on a task you’re given, your
  instinct is to think critically about the goals, ask clarifying questions, and think
  creatively about other and better ways to solve the problem</p></li><li><p>You collaborate
  well with sales, product, and marketing, translating needs into systems that actually
  move the needle.</p></li><li><p>You want more ownership and responsibility than
  any big company would hand you - and you’re excited by the idea of being in the
  room where GTM strategy and execution meet.</p></li></ul><p></p><b><strong>Bonus
  Points</strong></b><ul><li><p>Experience building in modern GTM stacks - HubSpot,
  Clay, n8n, Hightouch, Snowflake, HeyReach, etc.</p></li><li><p>Hands-on with no-code/low-code
  + code - you’ve hacked in Zapier, vibe-coded in Cursor, spun up quick apps in Replit/Lovable/v0,
  or built landing pages in Framer.</p></li><li><p>Experience in an early-stage startup
  - you’re comfortable wearing many hats and moving fast.</p></li><li><p>Background
  in RevOps or SalesOps, especially automating SDR/AE workflows and building account
  lists.</p></li><li><p>Exposure to DevOps, MLOps, or LLMOps platforms - you’re curious
  about how AI is reshaping software and GTM workflows, and you have a point of view
  on what matters.</p></li></ul><p></p><b><strong>Compensation &amp; Benefits</strong></b><ul><li><p>Competitive
  salary commensurate with experience, plus equity package.</p></li><li><p>Medical,
  dental, and vision insurance.</p></li><li><p>Premium hardware setup (MacBook, monitor,
  peripherals).</p></li><li><p>Four weeks of Paid Time Off per year (and we encourage
  you to take it!).</p></li></ul><p></p><b><strong>Location</strong></b><p>We prefer
  candidates able to work full-time on-site in Boulder, CO three days per week (Wed/Thurs
  remote optional).</p><p></p>
description_text: 'The Opportunity We’re hiring a Growth &amp; GTM Engineer to help
  architect, scale, and own our go-to-market engine. You’ll report to our GTM Lead
  and work directly with the CEO on high-impact GTM and operational projects. You’ll
  be accountable for driving pipeline, demand, and conversion through both experimentation
  and system-level rigor. You’ll build the systems that generate demand, refine conversion,
  and create a hyper-efficient GTM motion. Some weeks you’ll ship growth experiments;
  other weeks you’ll own a re-vamp of order forms and invoicing. Everything you build
  should either reduce manual effort or increase pipeline and revenue. What''s Freeplay?
  Freeplay is the end-to-end platform for software teams to ship great AI products.
  We give product development teams the power to test, evaluate, monitor &amp; optimize
  AI in production. Our customers use Freeplay to build better LLM features, chatbots,
  and agents. Today we serve leading software companies from growing startups to Fortune
  100 companies. Your Mission As our Growth &amp; GTM Engineer, you’ll design the
  data foundations, signals, automations, and experiments that turn messy go-to-market
  workflows into a scalable revenue engine: Use intent signals, enrichment data, and
  routing logic to build high-quality target lists that put SDRs and AEs in front
  of the right opportunities at the right time. Build automated GTM workflows - from
  list refreshes to timely follow-ups - so opportunities are acted on quickly and
  never fall through the cracks. Prototype and ship growth experiments from ABM plays
  to lead magnets. Test quickly, learn fast, and double down on what works. Eliminate
  bottlenecks in GTM and sales processes by building automations that replace manual
  work with scalable workflows. Partner closely with product, marketing and sales
  so experiments, systems, and messaging all reinforce each other. Take ownership
  of high-leverage projects across the Growth &amp; GTM stack - from invoicing to
  YouTube retargeting - and deliver them end to end. Architect and maintain clean,
  automated data pipelines across HubSpot, Snowflake, Clay, n8n, and more so every
  funnel metric is trustworthy. About You You’re a builder at heart - whether it’s
  hacking together an n8n flow, scripting in Python, or enriching HubSpot records
  from a Clay table, you love turning messy workflows into elegant systems. You know
  when to be scrappy and when to engineer - sometimes the effective path is a quick
  Google Sheet, other times it’s vibe-coding a workflow from scratch in Cursor. You
  think commercially - you measure your work by pipeline created, deals accelerated,
  or hours saved. You’re fluent with data and tooling - SQL, APIs, enrichment, and
  automations don’t intimidate you. You thrive in ambiguity - give you a fuzzy GTM
  problem and you’ll ask the right questions, test an idea, and ship a solution fast.
  You’re intensely curious - rather than just start executing on a task you’re given,
  your instinct is to think critically about the goals, ask clarifying questions,
  and think creatively about other and better ways to solve the problem You collaborate
  well with sales, product, and marketing, translating needs into systems that actually
  move the needle. You want more ownership and responsibility than any big company
  would hand you - and you’re excited by the idea of being in the room where GTM strategy
  and execution meet. Bonus Points Experience building in modern GTM stacks - HubSpot,
  Clay, n8n, Hightouch, Snowflake, HeyReach, etc. Hands-on with no-code/low-code +
  code - you’ve hacked in Zapier, vibe-coded in Cursor, spun up quick apps in Replit/Lovable/v0,
  or built landing pages in Framer. Experience in an early-stage startup - you’re
  comfortable wearing many hats and moving fast. Background in RevOps or SalesOps,
  especially automating SDR/AE workflows and building account lists. Exposure to DevOps,
  MLOps, or LLMOps platforms - you’re curious about how AI is reshaping software and
  GTM workflows, and you have a point of view on what matters. Compensation &amp;
  Benefits Competitive salary commensurate with experience, plus equity package. Medical,
  dental, and vision insurance. Premium hardware setup (MacBook, monitor, peripherals).
  Four weeks of Paid Time Off per year (and we encourage you to take it!). Location
  We prefer candidates able to work full-time on-site in Boulder, CO three days per
  week (Wed/Thurs remote optional).'
