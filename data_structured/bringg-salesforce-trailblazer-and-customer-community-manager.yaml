description_html: '<p>Are you a strategic operator with deep Salesforce expertise
  and a passion for building scalable, efficient systems? Do you thrive at the intersection
  of process, technology, and business impact?<br>Zenkraft is looking for a Salesforce
  Trailblazer and Customer Community Manager to help drive operational excellence
  across the organization while leveraging Salesforce as a core platform for scale,
  particularly with our 700+ customers.</p><p>In this role, you’ll partner closely
  with Sales, Customer Success, Marketing, and&nbsp; Finance to optimize processes,
  improve visibility, and ensure the business is operating smoothly and efficiently.<br>You’ll
  be a trusted advisor, systems thinker, and hands-on problem solver—someone who loves
  turning complexity into clarity and action.&nbsp;&nbsp;</p><p><strong>What you’ll
  do</strong></p><p>*Own and continuously improve core business operations processes
  across Sales, Marketing, Customer Success, and Finance.</p><p>*Serve as the Salesforce
  platform owner from a business operations perspective, ensuring alignment between
  systems, processes, and strategy.</p><p>*Design and optimize workflows, automation,
  and reporting to support revenue growth, forecasting accuracy, and operational efficiency.</p><p>*Lead
  a large-scale customer community, act as the in-house Salesforce Experience Cloud
  authority,<br>and partner with all teams to deliver reporting and customer understanding
  that drive better decision-making.</p><p>*Assist with defining requirements for
  Customer Community Portal deployment and own reporting and maintenance of the platform</p><p>*Help
  streamline business processes surrounding case management, documentation updates,
  and customer discussion forums</p><p>*Partner with leadership to define KPIs, dashboards,
  and metrics that drive data-informed decision-making.</p><p>*Translate business
  requirements into scalable Salesforce and operational solutions.</p><p>*Drive cross-functional
  initiatives, ensuring alignment, accountability, and timely execution.</p><p>*Support
  revenue operations, including pipeline management, renewals, forecasting, and reporting.</p><p>*Identify
  gaps, inefficiencies, and risks in current processes and proactively propose solutions.</p><p>*Stay
  current on Salesforce platform enhancements and recommend improvements that unlock
  business value.</p><p>&nbsp;</p><p><strong>What we are looking for</strong></p><p>*2+
  years of experience as a Salesforce Trailblazer.</p><p>*Strong hands-on experience
  with Salesforce administration, including reporting, automation (Flows, Flows, Flows),
  data models, permissions, and overall org maintenance.</p><p>*Experience with administration
  or implementation of Salesforce Experience Cloud, Salesforce Service Cloud, and
  Salesforce Knowledge Base is preferred.</p><p>*Salesforce certifications are a plus</p><p>*Proven
  ability to design and scale operational processes that support growth.</p><p>*Exceptional
  analytical and problem-solving skills with strong attention to detail.</p><p>*Excellent
  communication skills, with the ability to work effectively with executives and cross-functional
  teams.</p><p>*Comfortable owning initiatives end-to-end and operating with a high
  degree of autonomy.</p><p>*Experience supporting teams.</p><p>**This role is currently
  open to candidates who are legally authorized to work and reside in the US,&nbsp;the&nbsp;UK,
  or Eastern Europe**</p><p><strong>About Zenkraft</strong></p><p>Zenkraft builds
  native Salesforce solutions that connect Salesforce solutions with global shipping
  and logistics providers. Our products help businesses automate shipping, tracking,
  billing, and logistics workflows directly within Salesforce. Our customers range
  from fast-growing startups to large global enterprises.</p><p>We are a distributed,
  product-led company that values ownership, clarity, and execution. Every team member
  brings deep expertise and plays a meaningful role in shaping how we grow and scale.</p><p><strong>Why
  our work matters</strong></p><p>Logistics is complex, and operational inefficiency
  slows companies down. Zenkraft enables businesses to run smarter, faster, and more
  accurately by embedding logistics workflows directly into Salesforce—reducing friction,
  increasing visibility, and improving outcomes.</p><p>&nbsp;</p><p><strong>What the
  job will bring you</strong></p><p><span>Ownership</span>: Significant autonomy and
  responsibility over how the business operates and scales.</p><p><span>Impact</span>:
  Direct influence on revenue, efficiency, and customer experience.</p><p><span>Connection</span>:
  A close-knit remote team that invests in strong relationships and meets annually
  in person.</p><p><span>Challenge</span>: A fast-paced environment solving meaningful,
  complex problems.</p><p><em>The&nbsp;salary&nbsp;range&nbsp;for&nbsp;this&nbsp;position&nbsp;is&nbsp;expected&nbsp;to&nbsp;be&nbsp;between&nbsp;$</em>80,800<em>-$</em>105,000<em>&nbsp;OTE&nbsp;annually.&nbsp;The&nbsp;salary&nbsp;range&nbsp;is&nbsp;determined&nbsp;by&nbsp;experience,&nbsp;seniority,&nbsp;and&nbsp;additional&nbsp;factors.</em></p>'
description_text: 'Are you a strategic operator with deep Salesforce expertise and
  a passion for building scalable, efficient systems? Do you thrive at the intersection
  of process, technology, and business impact? Zenkraft is looking for a Salesforce
  Trailblazer and Customer Community Manager to help drive operational excellence
  across the organization while leveraging Salesforce as a core platform for scale,
  particularly with our 700+ customers. In this role, you’ll partner closely with
  Sales, Customer Success, Marketing, and&nbsp; Finance to optimize processes, improve
  visibility, and ensure the business is operating smoothly and efficiently. You’ll
  be a trusted advisor, systems thinker, and hands-on problem solver—someone who loves
  turning complexity into clarity and action.&nbsp;&nbsp; What you’ll do *Own and
  continuously improve core business operations processes across Sales, Marketing,
  Customer Success, and Finance. *Serve as the Salesforce platform owner from a business
  operations perspective, ensuring alignment between systems, processes, and strategy.
  *Design and optimize workflows, automation, and reporting to support revenue growth,
  forecasting accuracy, and operational efficiency. *Lead a large-scale customer community,
  act as the in-house Salesforce Experience Cloud authority, and partner with all
  teams to deliver reporting and customer understanding that drive better decision-making.
  *Assist with defining requirements for Customer Community Portal deployment and
  own reporting and maintenance of the platform *Help streamline business processes
  surrounding case management, documentation updates, and customer discussion forums
  *Partner with leadership to define KPIs, dashboards, and metrics that drive data-informed
  decision-making. *Translate business requirements into scalable Salesforce and operational
  solutions. *Drive cross-functional initiatives, ensuring alignment, accountability,
  and timely execution. *Support revenue operations, including pipeline management,
  renewals, forecasting, and reporting. *Identify gaps, inefficiencies, and risks
  in current processes and proactively propose solutions. *Stay current on Salesforce
  platform enhancements and recommend improvements that unlock business value. &nbsp;
  What we are looking for *2+ years of experience as a Salesforce Trailblazer. *Strong
  hands-on experience with Salesforce administration, including reporting, automation
  (Flows, Flows, Flows), data models, permissions, and overall org maintenance. *Experience
  with administration or implementation of Salesforce Experience Cloud, Salesforce
  Service Cloud, and Salesforce Knowledge Base is preferred. *Salesforce certifications
  are a plus *Proven ability to design and scale operational processes that support
  growth. *Exceptional analytical and problem-solving skills with strong attention
  to detail. *Excellent communication skills, with the ability to work effectively
  with executives and cross-functional teams. *Comfortable owning initiatives end-to-end
  and operating with a high degree of autonomy. *Experience supporting teams. **This
  role is currently open to candidates who are legally authorized to work and reside
  in the US,&nbsp;the&nbsp;UK, or Eastern Europe** About Zenkraft Zenkraft builds
  native Salesforce solutions that connect Salesforce solutions with global shipping
  and logistics providers. Our products help businesses automate shipping, tracking,
  billing, and logistics workflows directly within Salesforce. Our customers range
  from fast-growing startups to large global enterprises. We are a distributed, product-led
  company that values ownership, clarity, and execution. Every team member brings
  deep expertise and plays a meaningful role in shaping how we grow and scale. Why
  our work matters Logistics is complex, and operational inefficiency slows companies
  down. Zenkraft enables businesses to run smarter, faster, and more accurately by
  embedding logistics workflows directly into Salesforce—reducing friction, increasing
  visibility, and improving outcomes. &nbsp; What the job will bring you Ownership
  : Significant autonomy and responsibility over how the business operates and scales.
  Impact : Direct influence on revenue, efficiency, and customer experience. Connection
  : A close-knit remote team that invests in strong relationships and meets annually
  in person. Challenge : A fast-paced environment solving meaningful, complex problems.
  The&nbsp;salary&nbsp;range&nbsp;for&nbsp;this&nbsp;position&nbsp;is&nbsp;expected&nbsp;to&nbsp;be&nbsp;between&nbsp;$
  80,800 -$ 105,000 &nbsp;OTE&nbsp;annually.&nbsp;The&nbsp;salary&nbsp;range&nbsp;is&nbsp;determined&nbsp;by&nbsp;experience,&nbsp;seniority,&nbsp;and&nbsp;additional&nbsp;factors.'
