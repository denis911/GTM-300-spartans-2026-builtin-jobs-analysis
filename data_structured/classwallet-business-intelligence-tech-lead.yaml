company_overview: We recently updated our Vision and Values as we are more than simply
  a technology. In our evolved Vision statement, we now emphasize the word, "integrity"
  as we know it is the combination of technology and PEOPLE that truly sets us apart.
  Our clients look good because their citizens are better served using our platform
  and processes that include real people supporting the effort. A notable addition
  to our Values is that, "we care deeply about the people we serve," further emphasizing
  the Mission and how we approach the day-to-day. Our Values are used to make difficult
  business decisions. They are not simply slogans but expectations interwoven into
  the fabric of the culture. A pioneer in financial and government technology, ClassWallet's
  technology is used by public agencies across 35 states to maximize the positive
  impact of public funding on people’s lives. Since 2014, the ClassWallet platform
  has been used to deliver more than $4 billion in public funds to millions of citizens,
  and has helped clients achieve the highest standards of program integrity and efficiency.
  With customer loyalty and satisfaction exceeding some of the world's largest brands,
  ClassWallet was recognized by J.D. Power in 2024 for providing "An Outstanding Customer
  Service Experience" for Phone Support. ClassWallet is headquartered in Hollywood,
  Florida, and ranks as the 88th fastest-growing software company on the prestigious
  Inc. 5000 list.
