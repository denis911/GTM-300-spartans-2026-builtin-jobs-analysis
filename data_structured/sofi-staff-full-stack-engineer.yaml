description_html: '<p><p><strong>Employee Applicant Privacy Notice</strong></p><p><strong>Who
  we are:</strong></p><p><p>Shape a brighter financial future with us.</p><p>Together
  with our members, we’re changing the way people think about and interact with personal
  finance.</p><p>We’re a next-generation financial services company and national bank
  using innovative, mobile-first technology to help our millions of members reach
  their goals. The industry is going through an unprecedented transformation, and
  we’re at the forefront. We’re proud to come to work every day knowing that what
  we do has a direct impact on people’s lives, with our core values guiding us every
  step of the way. <strong>Join us to invest in yourself, your career, and the financial
  world.</strong></p></p></p><p><strong>The role:</strong></p><p><strong><br></strong>As
  a Staff Full Stack Engineer you’ll play a critical, hands-on role in building, deploying,
  and optimizing scalable, enterprise-class, production-grade, full-stack custom applications.
  The ideal candidate has 8+ years of engineering experience, a proven record of full-stack
  delivery, and deep expertise in designing software solutions from complex UIs and
  business process workflows to the back-end data sources. You will work across cross-functional
  delivery teams to shape technical architecture, champion best practices, and directly
  produce high-value solutions for our users.</p><p><br><strong>What you’ll do:&nbsp;</strong><br><ul><li>Architect,
  design, and build end-to-end user-facing software applications using rich interactive
  user-interfaces with your expertise working with information extracted from databases
  and APIs (including leveraging native database functions such as Snowflake Cortex
  or equivalent for advanced AI workloads).</li><li>Manage deployment pipelines and
  infrastructure as code using ArgoCD, GitLab CI/CD, and AWS best practices.</li><li>Collaborate
  with the AI engineers on the team to implement production grade multi-agentic AI
  applications, enabling autonomous, stateful, and collaborative agent workflows for
  complex, real-world problem solving</li><li>Own technical decompositions of new
  product requirements; lead delivery from ideation to deployment and continual improvement</li><li>Deploy,
  optimize, and monitor complex business process workflows on enterprise frameworks</li><li>Automate
  real-time and batch data flows using orchestration tools such as Apache Airflow.</li><li>Participate
  in code and design reviews, and make technical decisions for design and architecture
  of software solutions.</li><li>Collaborate with Product, Design, and Engineering
  to deliver high-impact solutions and foster a growth-mindset environment.</li><li>Stay
  current with the latest trends in software engineering, GenAI, LLM infrastructure,
  and the evolving tooling ecosystem; generate ideas to expand product capabilities
  and technical reach.</li></ul><strong>What you’ll need:</strong><br><ul><li>Bachelor’s
  or Master’s degree in Computer Science, Engineering, or a related technical field.</li><li>8+
  years of professional software engineering experience, with a focus on full-stack
  frameworks and engineering to develop custom product delivery specializing in AI</li><li>Solid
  devops and infrastructure-as-code experience using ArgoCD and GitLab for deployment,
  CI/CD, and environment management.</li><li>Advanced proficiency in React, Node.js,
  and front-end–to–back-end custom app development.</li><li>Extensive hands-on experience
  with database platforms - Snowflake strongly preferred, including advanced features,
  AI/ML integrations, and Snowflake Cortex.</li><li>Deep expertise in orchestrating
  real-time and scheduled pipelines with Airflow.</li><li>Track record of delivering
  high-quality, production-grade, scalable, and highly available cloud-based services.</li><li>Strong
  communicator; able to collaborate and drive decision-making with cross-functional
  stakeholders.</li><li>Willingness to take ownership, and champion learning and innovation
  within the organization.</li></ul><strong>Nice to have:</strong><br><ul><li>Exposure
  to other cloud-native or AI workflow orchestration platforms.</li><li>Prior fintech
  or high-throughput consumer product experience.</li><li>Experience deploying and
  scaling LLM-powered chatbots or retrieval-augmented generation (RAG) platforms.</li></ul></p><p><p><strong>Compensation
  and Benefits</strong></p><p>The base pay range for this role is listed below. Final
  base pay offer will be determined based on individual factors such as the candidate’s
  experience, skills, and location.&nbsp;</p><p>&nbsp;</p><p>To view all of our comprehensive&nbsp;and
  competitive&nbsp;benefits, visit our&nbsp;<strong>Benefits at SoFi&nbsp;</strong>page!</p><b><span>SoFi
  provides equal employment opportunities (EEO) to all employees and applicants for
  employment without regard to race, color, religion (including religious dress and
  grooming practices), sex (including pregnancy, childbirth and related medical conditions,
  breastfeeding, and conditions related to breastfeeding), gender, gender identity,
  gender expression, national origin, ancestry, age (40 or over), physical or medical
  disability, medical condition, marital status, registered domestic partner status,
  sexual orientation, genetic information, military and/or veteran status, or any
  other basis prohibited by applicable state or federal law.</span></b><b><span>The
  Company hires the best qualified candidate for the job, without regard to protected
  characteristics.</span></b><b><span>Pursuant to the San Francisco Fair Chance Ordinance,
  we will consider for employment qualified applicants with arrest and conviction
  records.</span></b><b><span>New York applicants: Notice of Employee Rights</span></b><b><span>SoFi
  is committed to an inclusive culture. As part of this commitment, </span><span>SoFi
  </span><span>offers reasonable accommodations to candidates with physical or mental
  disabilities. If you need accommodations to participate in the job application or
  interview process, please let your recruiter know or email </span>accommodations@sofi.com.</b><b><span>Due
  to insurance coverage issues, we are unable to accommodate remote work from Hawaii
  or Alaska at this time.</span></b><p><strong>Internal Employees</strong></p><p>If
  you are a current employee, do not apply here - please navigate to our Internal
  Job Board in Greenhouse to apply to our open roles.</p></p>'
description_text: 'Employee Applicant Privacy Notice Who we are: Shape a brighter
  financial future with us. Together with our members, we’re changing the way people
  think about and interact with personal finance. We’re a next-generation financial
  services company and national bank using innovative, mobile-first technology to
  help our millions of members reach their goals. The industry is going through an
  unprecedented transformation, and we’re at the forefront. We’re proud to come to
  work every day knowing that what we do has a direct impact on people’s lives, with
  our core values guiding us every step of the way. Join us to invest in yourself,
  your career, and the financial world. The role: As a Staff Full Stack Engineer you’ll
  play a critical, hands-on role in building, deploying, and optimizing scalable,
  enterprise-class, production-grade, full-stack custom applications. The ideal candidate
  has 8+ years of engineering experience, a proven record of full-stack delivery,
  and deep expertise in designing software solutions from complex UIs and business
  process workflows to the back-end data sources. You will work across cross-functional
  delivery teams to shape technical architecture, champion best practices, and directly
  produce high-value solutions for our users. What you’ll do:&nbsp; Architect, design,
  and build end-to-end user-facing software applications using rich interactive user-interfaces
  with your expertise working with information extracted from databases and APIs (including
  leveraging native database functions such as Snowflake Cortex or equivalent for
  advanced AI workloads). Manage deployment pipelines and infrastructure as code using
  ArgoCD, GitLab CI/CD, and AWS best practices. Collaborate with the AI engineers
  on the team to implement production grade multi-agentic AI applications, enabling
  autonomous, stateful, and collaborative agent workflows for complex, real-world
  problem solving Own technical decompositions of new product requirements; lead delivery
  from ideation to deployment and continual improvement Deploy, optimize, and monitor
  complex business process workflows on enterprise frameworks Automate real-time and
  batch data flows using orchestration tools such as Apache Airflow. Participate in
  code and design reviews, and make technical decisions for design and architecture
  of software solutions. Collaborate with Product, Design, and Engineering to deliver
  high-impact solutions and foster a growth-mindset environment. Stay current with
  the latest trends in software engineering, GenAI, LLM infrastructure, and the evolving
  tooling ecosystem; generate ideas to expand product capabilities and technical reach.
  What you’ll need: Bachelor’s or Master’s degree in Computer Science, Engineering,
  or a related technical field. 8+ years of professional software engineering experience,
  with a focus on full-stack frameworks and engineering to develop custom product
  delivery specializing in AI Solid devops and infrastructure-as-code experience using
  ArgoCD and GitLab for deployment, CI/CD, and environment management. Advanced proficiency
  in React, Node.js, and front-end–to–back-end custom app development. Extensive hands-on
  experience with database platforms - Snowflake strongly preferred, including advanced
  features, AI/ML integrations, and Snowflake Cortex. Deep expertise in orchestrating
  real-time and scheduled pipelines with Airflow. Track record of delivering high-quality,
  production-grade, scalable, and highly available cloud-based services. Strong communicator;
  able to collaborate and drive decision-making with cross-functional stakeholders.
  Willingness to take ownership, and champion learning and innovation within the organization.
  Nice to have: Exposure to other cloud-native or AI workflow orchestration platforms.
  Prior fintech or high-throughput consumer product experience. Experience deploying
  and scaling LLM-powered chatbots or retrieval-augmented generation (RAG) platforms.
  Compensation and Benefits The base pay range for this role is listed below. Final
  base pay offer will be determined based on individual factors such as the candidate’s
  experience, skills, and location.&nbsp; &nbsp; To view all of our comprehensive&nbsp;and
  competitive&nbsp;benefits, visit our&nbsp; Benefits at SoFi&nbsp; page! SoFi provides
  equal employment opportunities (EEO) to all employees and applicants for employment
  without regard to race, color, religion (including religious dress and grooming
  practices), sex (including pregnancy, childbirth and related medical conditions,
  breastfeeding, and conditions related to breastfeeding), gender, gender identity,
  gender expression, national origin, ancestry, age (40 or over), physical or medical
  disability, medical condition, marital status, registered domestic partner status,
  sexual orientation, genetic information, military and/or veteran status, or any
  other basis prohibited by applicable state or federal law. The Company hires the
  best qualified candidate for the job, without regard to protected characteristics.
  Pursuant to the San Francisco Fair Chance Ordinance, we will consider for employment
  qualified applicants with arrest and conviction records. New York applicants: Notice
  of Employee Rights SoFi is committed to an inclusive culture. As part of this commitment,
  SoFi offers reasonable accommodations to candidates with physical or mental disabilities.
  If you need accommodations to participate in the job application or interview process,
  please let your recruiter know or email accommodations@sofi.com. Due to insurance
  coverage issues, we are unable to accommodate remote work from Hawaii or Alaska
  at this time. Internal Employees If you are a current employee, do not apply here
  - please navigate to our Internal Job Board in Greenhouse to apply to our open roles.'
