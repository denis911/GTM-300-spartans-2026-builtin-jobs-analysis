company_overview: 'SoFi wasn’t built to be a bank. Or a technology company. We were
  built for one mission: help people achieve financial independence so they can realize
  their ambitions.Redefining an entire industry isn’t easy work—and it’s not for the
  faint of heart. It takes a certain kind of team. People with diverse perspectives
  and expertise, united by a common sense of purpose. People willing to challenge
  assumptions but always do the right thing. People proving that innovation and responsibility
  don’t have to compete, but can come together to create something truly unconventional
  in the world.For the last eight years, we’ve been charting this new path forward.
  We call it The SoFi Way.At SoFi, we don’t just talk about culture: we live it. The
  SoFi Way is how we show up every day, how we make decisions, and how we build for
  our members, clients, and each other.'
