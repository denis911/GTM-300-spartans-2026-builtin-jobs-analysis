date_posted: '2026-03-09'
description_html: '<p>You don''t just demo software, you change how people think about
  what''s possible. If you want to be the person in the room who makes engineers lean
  forward and executives say "when can we start," read on.</p><b><strong>The Company</strong></b><p>Sendbird
  is on a mission to build the AI workforce of tomorrow. For over a decade, we built
  the infrastructure behind conversations chat, voice, video, messaging APIs and became
  the #1 CPaaS platform for in-app communications. 4,000+ brands trust us. 7 billion
  messages flow through our platform every month. 300 million monthly active users.</p><p>We
  powered conversations for DoorDash, Match Group, Noom, Yahoo Sports, Rakuten, and
  thousands of others. We were good at what we did. Really good.</p><p>We also saw
  it early: AI would fundamentally reshape how businesses talk to customers. The infrastructure
  we''d spent a decade building would become commoditized. The value would move up
  the stack into intelligence, into experience, into outcomes.</p><p>We had a choice:
  protect what we built, or reinvent ourselves.</p><p>We chose reinvention.</p><p>In
  December 2024, we made the full strategic pivot to AI first customer experience.
  By February 2025, we''d launched our AI agent for enterprise CX built on a decade
  of conversation data, now with intelligence on top. And in November 2025, we rebranded
  to Delight.ai.</p><p>The name says it all. AI''s real promise isn''t efficiency
  or cost savings. It''s giving customers back something they lost the feeling of
  being truly understood and cared for. Not satisfied. Delighted.</p><b><strong>The
  Product</strong></b><p>Delight.ai is the AI concierge for customer experience. Most
  AI agents forget you the moment the conversation ends. Ours doesn''t. Delight.ai
  builds memory over time, learns preferences, and connects context across every channel
  chat, SMS, email, voice, WhatsApp without losing the thread. We''re building AI
  that makes customers feel understood, seen, and remembered.</p><b><strong>Why Sales
  Engineer</strong></b><p>AI is reshaping how enterprises think about customer communication.
  Sophisticated buyers no longer just want to know if our platform works. They want
  to know if it works for them, at their scale, inside their architecture, with their
  team.</p><p>We''re at an inflection point: a decade of conversation infrastructure,
  now with AI on top, and a pipeline of buyers who need a technical partner, not a
  pitch deck. The Sales Engineers who thrive here earn trust from a principal engineer
  and a VP of Product in the same meeting, and use AI natively to work faster, demo
  smarter, and operate at a scale a traditional SE simply couldn''t.</p><b><strong>The
  Role</strong></b><p>You own the technical sales cycle, from discovery through solution
  design to close, turning complex customer problems into confident reasons to choose
  Sendbird. You thrive at the intersection of technical depth and business impact,
  know the difference between a demo that informs and one that inspires, and use AI
  natively to move faster and do more than a traditional SE could alone.</p><b><strong>You
  might be this person if:</strong></b><ul><li>Mapping a customer''s architecture
  is a puzzle to solve, not a box to check, and you''ve already spun up a Claude Project
  or n8n workflow to automate the research before the call ends.</li><li>You read
  a room fast, shifting depth and language on the fly between a skeptical backend
  engineer and a time pressed CTO.</li><li>Your demos tell a story. You don''t walk
  through features, you show people a future they hadn''t imagined, using AI powered
  prototypes and agentic tools to make it land.</li><li>You build Claude Projects,
  custom GPTs, and agentic workflows for your team out of genuine curiosity, not because
  your job requires it.</li><li>You treat every discovery call like a research project,
  backed by AI-assisted prep agents and follow-up automations in Make or n8n so the
  repetitive work runs without you.</li><li>You figure out what the customer needs
  before they tell you, propose the architecture, and ship it. If a bespoke dashboard
  or Claude powered automation would close the deal, you build it.</li><li>You''re
  energized by multiple complex deals at once, partly because AI agents and workflow
  automation have eliminated the parts that don''t require you.</li></ul><b><strong>You
  need to have</strong></b><ul><li>3+ years in Sales Engineering (pre-sales) at a
  developer focused platform SaaS and/or CPaaS company</li><li>Bachelor''s degree
  (CS, EE) or equivalent combination of education and experience</li><li>Hands-on
  fluency with RESTful APIs, mobile SDKs, and integration workflows, with a clear
  understanding of how modern customer engagement workflows are built and scaled</li><li>Working
  knowledge of at least one development environment (JavaScript/React, iOS/Swift,
  Android/Kotlin, Unity, React Native, or Flutter)</li><li>Practical experience with
  generative AI concepts including LLMs, AI agents, and agentic workflows. You''ve
  built with these tools, not just read about them</li><li>Familiarity with AI tooling
  such as Claude or ChatGPT, and automation platforms such as Make, Zapier, or n8n.
  Experience stringing together APIs or building lightweight automations is a strong
  plus</li><li>Confidence navigating security and compliance conversations (SOC 2,
  ISO-27001/42001, HIPAA, GDPR) with technical and non-technical stakeholders</li><li>Strong
  written and verbal communication in English</li><li>Ability to travel for customer
  onsite visits</li></ul><b><strong>What you''ll actually do</strong></b><ul><li>Own
  the technical narrative across the full deal cycle, from discovery calls and technical
  deep dives to executive presentations, alongside Account Executives at every stage.</li><li>Run
  structured discovery with engineers, product managers, and architects to surface
  real pain points and map them to Sendbird''s APIs, SDKs, and AI agent capabilities,
  using AI assisted prep workflows to come in sharper every time.</li><li>Design solution
  architectures tailored to each customer''s stack and goals, whether they''re building
  an AI powered in-app chat experience, deploying an AI support agent, or scaling
  to millions of users.</li><li>Build and deliver demos that go beyond feature walkthroughs,
  using agentic tools and custom prototypes to show customers what their product could
  actually become with Sendbird underneath it.</li><li>Automate repeatable pre sales
  work, including lead research, follow up summaries, and demo environment setup,
  using tools like Claude, Make, or n8n, freeing you for the work AI can''t do.</li><li>Articulate
  Sendbird''s security and compliance posture clearly and confidently, helping enterprise
  buyers move through procurement with confidence.</li><li>Work closely with Product
  and Engineering to feed pre sales insights back into the roadmap, serving as a direct
  line between the market and the people building the product.</li><li>Track emerging
  trends in AI agents, developer tooling, and communication infrastructure, and bring
  those insights into customer conversations.</li></ul><b><strong>What We Offer Includes
  (but is not limited to)</strong></b><ul><li>20 days PTO, 13 paid US company holidays,
  7 sick days, 1 volunteer day, plus 2 rest/rejuvenation and birthday days off</li><li>Company
  subsidized medical, dental, vision insurance</li><li>Flexible spending accounts</li><li>Parental
  leave</li><li>Life and disability insurance</li><li><em>Be Your Best Self</em>:
  An annual stipend of $3,500 (prorated after 3 months) for expenses ranging from
  professional development classes and training, to personality assessments, gym memberships,
  books, fitness classes, mental health services, and massages</li></ul><b><strong>Pay
  Transparency</strong></b><p>For cash compensation, we set standard ranges for all
  roles based on function, level, and geographic location.&nbsp; To determine our
  ranges, we utilize a variety of compensation data benchmarked against similar-stage
  growth companies. &nbsp; A reasonable estimate of the current salary range for this
  role is $200,000.00 - $235,000.00.&nbsp; This range is specific to the San Francisco
  Bay market.&nbsp; We consider several factors when making final compensation decisions
  including, but not limited to, skill sets, experience and training, licensure and
  certifications, and other business and organizational needs which may cause your
  specific offer to vary from the amount listed above.</p><b><strong>Flexible Work
  Policy</strong></b><p>We offer a flexible work schedule at Sendbird.&nbsp; We also
  value collaboration and relationship building.&nbsp; With those values in mind,
  we require all employees within an hour''s commute range of their local office to
  gather with their team in the office three days per week as a minimum.&nbsp; Some
  of our roles require a more frequent in-office schedule.&nbsp; Please work with
  your manager to understand the office time requirements for your position.</p><b><strong>What
  diversity and inclusion mean to us</strong></b><p>There is no such thing as a perfect
  candidate and the best employees come from a wide range of backgrounds, experiences,
  and skill sets. Sendbird is a place where everyone can learn and grow. We respect,
  promote, and encourage diversity for equal employment opportunities and encourage
  you to apply if this role excites you.</p><b><strong>Why Sendbird</strong></b><p>We
  just made one of the boldest pivots in our company''s history and we''re already
  seeing it pay off. If you want to sell something that''s genuinely changing how
  enterprises think about AI and customer experience, this is it. You''ll have real
  ownership, real access to leadership, and real impact on how we win. We move fast.
  We build things that matter. Come help us close the deals that define what delight.ai
  becomes.</p><p><em>This is a hybrid role based in our San Mateo office (3 days/week).
  This role reports to the Global Head of Technical Services, based in San Mateo,
  CA</em></p>'
