company_overview: Canoe offers first-of-its kind AI technology powering the future
  of alternative investments.Canoe has reimagined the future of alternative investments
  with cloud-based, machine-learning technology for document collection, data extraction,
  and data science initiatives. We transform complex documents into actionable intelligence
  within seconds and empower allocators with tools to unlock new efficiencies for
  their business.Since the beginning, we’ve maintained a focused, client-first approach
  to building and enhancing our technology and will continue to do so. By introducing
  automation to alternatives document collection and data management workflows, institutional
  investors, wealth managers, and general partners are seeing dramatic improvements
  in data accuracy and access, team efficiency, and client satisfaction.
