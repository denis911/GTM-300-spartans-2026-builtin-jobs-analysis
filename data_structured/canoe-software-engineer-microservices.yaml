description_html: '<strong>COMPANY: </strong>Canoe Intelligence<br><strong>WEBSITE</strong>:
  https://canoeintelligence.com/<br><strong>TITLE: </strong>Software Engineer, Microservices<br><strong>LOCATION:</strong>
  New York City (hybrid) or Fully Remote in the United States<br><strong>SALARY</strong>:
  $115,000 - 135,000 + Equity (based on NYC, will be adjusted for geo)<br><strong>The
  Role:</strong><br>We are seeking a Software Engineer to join our Data Services team,
  responsible for building the microservices that power Canoe''s industry-leading
  Alts Data Platform. This team owns the core backend services that ingest, process,
  and serve data across Canoe products, and will play a critical role in the platform''s
  continued growth and evolution.<br>You will play a key role in designing and building
  scalable, reliable, and maintainable services. This role is hands-on and execution-focused,
  with meaningful ownership over service design, implementation, and production operations.
  You will help shape how Canoe builds and operates backend systems, and contribute
  directly to the team''s technical direction over time.<br><strong>What You''ll Do:</strong><br><ul><li>Design,
  build, and maintain backend microservices primarily using Python.</li><li>Build
  synchronous REST APIs (primarily with FastAPI) and background job processing systems
  that support event-driven architectures.</li><li>Develop services that run in AWS,
  including Lambda-based workloads and supporting infrastructure.</li><li>Design and
  work with relational data models backed by PostgreSQL, and object storage using
  S3.</li><li>Collaborate closely with Data Engineering and AI / ML Engineers to integrate
  data pipelines, automation, and intelligence into Canoe systems.</li><li>Participate
  in cross-functional teams as the backend engineering representative.</li><li>Build
  observable systems and be an organization leader in operational excellence.</li><li>Take
  ownership of services end-to-end, including production support and ongoing improvements.</li></ul><br><strong>What
  We''re Looking For:</strong><br><ul><li>Minimum 5 years of experience in software
  development, with a focus on backend or microservices systems.</li><li>Strong experience
  building web services in Python, including REST APIs.</li><li>Experience with FastAPI
  (or equivalent Python web frameworks).</li><li>Experience working with AWS services,
  including Lambda.</li><li>Experience working with PostgreSQL and relational data
  modeling.</li><li>Familiarity with background job processing and event-driven system
  patterns.</li><li>High agency and a strong sense of ownership and accountability.</li><li>Curiosity
  and a willingness to learn new technologies and approaches.</li><li>Strong communication
  skills and a history of working well with both technical and non-technical stakeholders.</li><li>Openness
  to, and advocacy for, AI-assisted development tooling, with experience using coding
  agents such as Claude Code or similar tools.</li><li>Bachelor''s degree in Computer
  Science, Engineering, or a related field (or equivalent experience).</li></ul><br><strong>What
  You''ll Get:</strong><br><ul><li>Medical, dental, vision benefits</li><li>Flexible
  PTO</li><li>401(k)</li><li>Flexible work from home policy</li><li>Home office stipend</li><li>Employee
  Assistance Program</li><li>Gym/Wifi reimbursement</li><li>Education assistance</li><li>Parental
  Leave</li></ul><br><strong>Our Values:</strong><br><ul><li>Client First -&gt; Listen,
  and deliver client-centric solutions</li><li>Be An Owner -&gt; Take initiative,
  improve situations, drive positive outcomes</li><li>Excellence -&gt; Always set
  the highest standard for yourself and others</li><li>Win Together -&gt; 1 + 1 =
  3</li></ul><br><strong>Who We Are:</strong><br>Canoe is reimagining alternative
  investment data processes for hundreds of leading institutional investors, capital
  allocators, asset servicing firms and wealth managers. By combining industry expertise
  with the most sophisticated data capture technologies, Canoe''s technology automates
  the highly-frustrating, time-consuming, and costly manual workflows related to alternative
  investment document and data management, extraction and delivery. With Canoe, clients
  can refocus capital and human resources on business performance and growth, increase
  efficiency, and gain deeper access to their data. Canoe''s AI-driven platform was
  developed in 2013 for Portage Partners LLC, a private investment firm.<br>Canoe
  is an equal opportunity employer. All aspects of employment including the decision
  to hire, promote, discipline, or discharge, will be based on merit, competence,
  performance, and business needs. We do not discriminate on the basis of race, color,
  religion, marital status, age, national origin, ancestry, physical or mental disability,
  medical condition, pregnancy, genetic information, gender, sexual orientation, gender
  identity or expression, veteran status, or any other status protected under federal,
  state, or local law.'
