description_html: '<b><strong>Why Patch, why now</strong><br></b><p>Patch exists to
  <strong>put the planet back in balance</strong> by scaling unified climate action
  through software, market infrastructure, and culture-driven execution. Every day
  our platform not only curates the world’s most trusted carbon-removal and environmental
  datasets—it also <strong>moves 100s of millions of dollars</strong> to projects
  that cut, capture, or store CO₂ for good.</p><p>Our culture is built on three non-negotiables:</p><ul><li><p><strong>We
  build the future we want</strong> – we don’t wait for permission; we shape the market.</p></li><li><p><strong>We’re
  all in this together</strong> – direct, empathetic teamwork inside Patch and across
  the climate ecosystem.</p></li><li><p><strong>We amp it up</strong> – urgency and
  unreasonably high standards because the planet can’t wait.</p></li></ul><p>If that
  mindset energizes you, read on.</p><p></p><b><strong>About the role</strong></b><p>As
  a Go-to-Market (GTM) Engineer you will sit at the intersection of product, sales,
  operations, and data—turning complex customer needs into scalable, automated solutions.
  You will own the technical backbone that enables our go-to-market motion to run
  with precision and speed, helping our GTM teams unlock new opportunities and accelerate
  growth.</p><p>This role blends systems thinking, lightweight engineering, and a
  deep understanding of GTM workflows. You will architect the tools, integrations,
  and processes that power our customer journey end-to-end, ensuring our teams can
  move quickly and consistently while maintaining high quality. If you enjoy solving
  ambiguous problems, creating leverage for cross-functional teams, and building scalable
  systems from scratch, this is an exceptional opportunity.</p><p></p><b><strong>What
  you''ll tackle</strong></b><ul><li><p>Design and build the systems, automations,
  and integrations that enable our GTM teams to work efficiently and consistently.</p></li><li><p>Partner
  closely with Sales, Marketing, Product, and Operations to translate business needs
  into technical solutions.</p></li><li><p>Work across Salesforce, Clay, HubSpot,
  Zapier, and Gong, owning the architecture, integrations, and workflows that connect
  these systems end to end.</p></li><li><p>Create scalable data pipelines and unified
  views that improve GTM visibility, forecasting, and prioritization.</p></li><li><p>Develop
  repeatable, automated processes that reduce manual work and improve accuracy across
  the customer lifecycle.</p></li><li><p>Diagnose system issues, eliminate process
  bottlenecks, and implement long-term fixes rather than short-term patches.</p></li><li><p>Evaluate
  and implement new tools, ensuring they integrate seamlessly into our broader ecosystem.</p></li><li><p>Support
  experimentation across GTM teams by rapidly building prototypes and iterating based
  on feedback.</p></li><li><p>A defined first 90-day plan: audit systems, implement
  quick wins, map GTM architecture, ship one high-impact automation.</p></li><li><p>A
  6–12 month roadmap: build unified GTM data layer, redesign key workflows, deploy
  major integrations, and establish a stable operating cadence.</p></li></ul><p></p><b><strong>What
  makes you a great match</strong></b><ul><li><p>A strategic builder with 5+ years
  of hands-on experience designing scalable GTM systems within a high-growth startup
  environment</p></li><li><p>A commercial mindset who thinks about the ROI of their
  work, constantly asking questions like "Does this workflow actually help someone
  close a deal?" You understand that automation should drive revenue outcomes, not
  just efficiency.</p></li><li><p>An operator who dives into ambiguous problems, rolls
  up their sleeves, and collaborates closely with cross-functional partners</p></li><li><p>A
  systems thinker who can zoom out to long-term architecture decisions while executing
  quickly on near-term needs</p></li><li><p>A technical problem solver fluent in APIs,
  automation platforms, relational data structures, and CRM customization</p></li><li><p>A
  clear communicator who can translate between go-to-market teams and technical functions
  with ease</p></li><li><p>A meticulous executor who values accuracy, reliability,
  and repeatability across all workflows and data pipelines</p></li><li><p>An owner-mindset
  individual who thrives in building from 0→1 and improving from 1→n</p></li><li><p>A
  data-oriented decision-maker who brings analytical rigor to evaluating opportunities,
  measuring impact, and prioritizing work</p></li></ul><p></p><b><strong>What you''ll
  get</strong></b><ul><li><p>A mission-obsessed crew shipping with speed and sky-high
  standards</p></li><li><p>Competitive salary and meaningful equity</p></li><li><p>Onsite
  culture in San Francisco with bi-annual off-sites for deep strategy and team bonding</p></li><li><p>Time-off-as-needed
  vacation and generous parental leave</p></li><li><p>Monthly wellness stipend (mental
  and physical)</p></li></ul><p>If shaping the story of climate action—while using
  AI as a force multiplier—sounds like your kind of challenge, we’d love to meet you.</p><p></p><p>Let’s
  rebalance the planet together.</p><p></p><p><strong>Commitment to Diversity:</strong></p><p>Patch
  is committed to a policy of Equal Employment Opportunity and will not discriminate
  against an applicant, candidate, or employee on the basis of race, color, religion,
  creed, national origin or ancestry, sex, gender, gender identity, gender expression,
  sexual orientation, age, physical or mental disability, medical condition, marital/domestic
  partner status, military or veteran status, genetic information or any other legally-recognized
  protected basis under federal, state or local laws, regulations or ordinances.</p><p></p><p><em>If
  you are extended an offer, that offer may be contingent upon your successful completion
  of a background check, which will be conducted in accordance with applicable laws.
  We may obtain one or more background screening reports about you, solely for employment
  purposes.</em></p>'
description_text: 'Why Patch, why now Patch exists to put the planet back in balance
  by scaling unified climate action through software, market infrastructure, and culture-driven
  execution. Every day our platform not only curates the world’s most trusted carbon-removal
  and environmental datasets—it also moves 100s of millions of dollars to projects
  that cut, capture, or store CO₂ for good. Our culture is built on three non-negotiables:
  We build the future we want – we don’t wait for permission; we shape the market.
  We’re all in this together – direct, empathetic teamwork inside Patch and across
  the climate ecosystem. We amp it up – urgency and unreasonably high standards because
  the planet can’t wait. If that mindset energizes you, read on. About the role As
  a Go-to-Market (GTM) Engineer you will sit at the intersection of product, sales,
  operations, and data—turning complex customer needs into scalable, automated solutions.
  You will own the technical backbone that enables our go-to-market motion to run
  with precision and speed, helping our GTM teams unlock new opportunities and accelerate
  growth. This role blends systems thinking, lightweight engineering, and a deep understanding
  of GTM workflows. You will architect the tools, integrations, and processes that
  power our customer journey end-to-end, ensuring our teams can move quickly and consistently
  while maintaining high quality. If you enjoy solving ambiguous problems, creating
  leverage for cross-functional teams, and building scalable systems from scratch,
  this is an exceptional opportunity. What you''ll tackle Design and build the systems,
  automations, and integrations that enable our GTM teams to work efficiently and
  consistently. Partner closely with Sales, Marketing, Product, and Operations to
  translate business needs into technical solutions. Work across Salesforce, Clay,
  HubSpot, Zapier, and Gong, owning the architecture, integrations, and workflows
  that connect these systems end to end. Create scalable data pipelines and unified
  views that improve GTM visibility, forecasting, and prioritization. Develop repeatable,
  automated processes that reduce manual work and improve accuracy across the customer
  lifecycle. Diagnose system issues, eliminate process bottlenecks, and implement
  long-term fixes rather than short-term patches. Evaluate and implement new tools,
  ensuring they integrate seamlessly into our broader ecosystem. Support experimentation
  across GTM teams by rapidly building prototypes and iterating based on feedback.
  A defined first 90-day plan: audit systems, implement quick wins, map GTM architecture,
  ship one high-impact automation. A 6–12 month roadmap: build unified GTM data layer,
  redesign key workflows, deploy major integrations, and establish a stable operating
  cadence. What makes you a great match A strategic builder with 5+ years of hands-on
  experience designing scalable GTM systems within a high-growth startup environment
  A commercial mindset who thinks about the ROI of their work, constantly asking questions
  like "Does this workflow actually help someone close a deal?" You understand that
  automation should drive revenue outcomes, not just efficiency. An operator who dives
  into ambiguous problems, rolls up their sleeves, and collaborates closely with cross-functional
  partners A systems thinker who can zoom out to long-term architecture decisions
  while executing quickly on near-term needs A technical problem solver fluent in
  APIs, automation platforms, relational data structures, and CRM customization A
  clear communicator who can translate between go-to-market teams and technical functions
  with ease A meticulous executor who values accuracy, reliability, and repeatability
  across all workflows and data pipelines An owner-mindset individual who thrives
  in building from 0→1 and improving from 1→n A data-oriented decision-maker who brings
  analytical rigor to evaluating opportunities, measuring impact, and prioritizing
  work What you''ll get A mission-obsessed crew shipping with speed and sky-high standards
  Competitive salary and meaningful equity Onsite culture in San Francisco with bi-annual
  off-sites for deep strategy and team bonding Time-off-as-needed vacation and generous
  parental leave Monthly wellness stipend (mental and physical) If shaping the story
  of climate action—while using AI as a force multiplier—sounds like your kind of
  challenge, we’d love to meet you. Let’s rebalance the planet together. Commitment
  to Diversity: Patch is committed to a policy of Equal Employment Opportunity and
  will not discriminate against an applicant, candidate, or employee on the basis
  of race, color, religion, creed, national origin or ancestry, sex, gender, gender
  identity, gender expression, sexual orientation, age, physical or mental disability,
  medical condition, marital/domestic partner status, military or veteran status,
  genetic information or any other legally-recognized protected basis under federal,
  state or local laws, regulations or ordinances. If you are extended an offer, that
  offer may be contingent upon your successful completion of a background check, which
  will be conducted in accordance with applicable laws. We may obtain one or more
  background screening reports about you, solely for employment purposes.'
