  YOUR IMPACT&nbsp; We are seeking a GTM Engineer to lead the design, implementation,
  and optimization of AI-driven tools, automations, and processes across the marketing
  department. This role is responsible for ensuring that our marketing organization
  leverages AI safely, efficiently, and creatively — from campaign automation to content
  production and analytics. In this role, you will be an internal consultant working
