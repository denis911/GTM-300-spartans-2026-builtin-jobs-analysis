description_html: '<p><strong><em>OUR MISSION</em></strong></p><p><strong><strong>At
  Redwood, we empower our customers with lights-out automation for their mission-critical
  business processes.</strong></strong></p><br><p><strong><em>ABOUT US</em></strong></p><p>Redwood
  Software is the leader in full stack automation fabric solutions for mission-critical
  business processes. With the first SaaS-based composable automation platform specifically
  built for ERP, we believe in the transformative power of automation. Our unparalleled
  solutions empower you to orchestrate, manage and monitor your workflows across any
  application, service or server — in the cloud or on premises — with confidence and
  control.&nbsp;</p><br><p>Redwood’s global team of automation experts and customer
  success engineers provide solutions and world-class support designed to give you
  the freedom and time to imagine and define your future. Get out of the weeds and
  see the forest, with Redwood Software.</p><br><p><strong><em>CORE VALUES</em></strong></p><p>One
  Team. One Redwood</p><p>Make Your Own Weather</p><p>Obsess over Customer Success</p><p>Work
  the Problem</p><p>Be Curious</p><p>Own the Outcome</p><p>Respect Each Other</p><br><p><strong><em>YOUR
  IMPACT&nbsp;</em></strong></p><p>We are seeking a GTM Engineer to lead the design,
  implementation, and optimization of AI-driven tools, automations, and processes
  across the marketing department. This role is responsible for ensuring that our
  marketing organization leverages AI safely, efficiently, and creatively — from campaign
  automation to content production and analytics.</p><br><p>In this role, you will
  be an internal consultant working hands-on with our marketing team members to map
  their workflow into steps that can be automated with a combination of AI, automation
  tools such as <u>Make.com</u> or Workato, and point marketing AI tools such as Tofu,
  <u>Regie.ai</u>, RevSure, etc. You will also help integrate our marketing tech stack
  with our AI tech stack.</p><ul><li><p>Map marketing workflows and identify opportunities
  for automation (content creation, segmentation, reporting, QA).</p></li><li><p>Serve
  as an internal consultant to campaign engineers, content creators, and demand-gen
  leads.</p></li><li><p>Train and support marketing teams on AI best practices and
  responsible adoption.&nbsp;</p></li><li><p>Measure impact/ROI of AI tools; continuously
  monitor and optimize automation performance and ROI.</p></li><li><p>Evaluate when
  we should automate ourselves in tools such as <u>Make.com</u> versus getting an
  AI marketing tool such as Tofu, <u>Regie.AI</u>, etc.</p></li><li><p>Build and maintain
  automations across systems using automation platforms such as <u>Make.com</u>, n8n,
  Workato, etc.</p></li><li><p>Design API-driven integrations between AI platforms
  and existing MarTech stack, keeping attribution in mind.</p></li><li><p>Explore
  opportunities to build scalable API processes to automate bulk updates as brand,
  legal or programming developments require changes across email, form, landing page
  or programs. Finding creative processes to uplevel the tactical requirements as
  the company grows or campaigns pivot</p></li><li><p>Develop prompt libraries, fine-tuned
  models, and reusable automation templates.<br>&nbsp;</p></li></ul><p><strong>&nbsp;</strong></p><p><strong><em>YOUR
  EXPERIENCE</em></strong></p><p><strong><strong>Marketing &amp; AI Knowledge</strong></strong></p><ul><li><p>5+
  years in marketing operations, marketing technology, demand gen or related fields
  with an understanding of B2B GTM&nbsp;</p></li><li><p>Deep understanding of MarTech
  platforms (Salesforce, Marketo, Outreach, Mutiny, etc.)&nbsp;</p></li><li><p>Basic
  understanding of a marketing funnel and campaign attribution with familiarity in
  pipeline and revenue metrics as they pertain to marketing and sales development.</p></li><li><p>Experience
  working with AI marketing software such as Tofu, <u>Regie.ai</u>, RevSure, etc.</p></li><li><p>Strong
  grasp of generative AI (e.g., GPT, Claude, Gemini), predictive modeling, and workflow
  automation platforms (e.g., Make.com, Zapier, Workato).</p></li><li><p>Ensure all
  AI-driven processes adhere to data privacy, compliance, and brand standards.</p></li><li><p>Experience
  evaluating and implementing emerging AI tools for marketing automation</p></li><li><p>Deep
  curiosity about how AI can reshape marketing workflows and drive GTM efficiency</p></li><li><p>Comfort
  operating in fast-evolving AI and MarTech environments<br>&nbsp;</p></li></ul><p><strong><strong>Technical
  Skills</strong></strong></p><ul><li><p>Coding: Proficiency in Python and JavaScript
  for automation scripts, data transformations, and API integrations.</p></li><li><p>APIs:
  Ability to design, test, and deploy API calls between marketing systems (REST, GraphQL).</p></li><li><p>Data:
  Familiarity with SQL, JSON, and ETL pipelines for marketing data processing.</p></li><li><p>Automation
  Frameworks: Experience building workflows in Make.com, Airflow, or similar.</p></li><li><p>AI
  Agents: support the design and maintenance of agents and workflows that can create
  cohesive workflows across tools&nbsp;</p></li></ul><br><p><strong><strong>Business
  &amp; Soft Skills</strong></strong></p><ul><li><p>Strong project management and
  cross-functional collaboration skills.</p></li><li><p>Excellent communication skills
  — able to explain AI workflows to both technical and non-technical stakeholders.</p></li><li><p>Ability
  to analyze and measure demand, performance and ROI as it relates to marketing campaigns
  and influence.</p></li><li><p>Ability to balance speed and innovation with compliance
  and brand governance.</p></li></ul><p><p><p><p><p><em>If you like growth and working
  with happy, enthusiastic over-achievers, you''ll enjoy your career with us!</em></p><br><p><strong>THE
  LEGAL BIT</strong><br>Redwood is an equal opportunity employer. Redwood prohibits
  unlawful discrimination based on race, colour, religion, sex, gender identity, marital
  or veteran status, age, national origin, ancestry, citizenship, physical or mental
  disability, medical condition, genetic information or characteristics (or those
  of a family member), sexual orientation, pregnancy or any other consideration made
  unlawful by regional or local laws. We also prohibit discrimination based on a perception
  that anyone has any of those characteristics or is associated with a person who
  has or is perceived as having any of those characteristics. All such discrimination
  is unlawful and will have a zero tolerance policy applied to it.<br>&nbsp;</p><p>Redwood
  will comply with all local data protection laws, including GDPR when it comes to
  the handling and processing of personal data. Should you wish for us to remove your
  personal data from our recruitment database, please email us directly at Recruitment@Redwood.com</p></p></p></p></p>'
