  and point marketing AI tools such as Tofu, Regie.ai , RevSure, etc. You will also
  help integrate our marketing tech stack with our AI tech stack. Map marketing workflows
  and identify opportunities for automation (content creation, segmentation, reporting,
  QA). Serve as an internal consultant to campaign engineers, content creators, and
  demand-gen leads. Train and support marketing teams on AI best practices and responsible
  adoption.&nbsp; Measure impact/ROI of AI tools; continuously monitor and optimize
  automation performance and ROI. Evaluate when we should automate ourselves in tools
  such as Make.com versus getting an AI marketing tool such as Tofu, Regie.AI , etc.
  Build and maintain automations across systems using automation platforms such as
  Make.com , n8n, Workato, etc. Design API-driven integrations between AI platforms
  and existing MarTech stack, keeping attribution in mind. Explore opportunities to
  build scalable API processes to automate bulk updates as brand, legal or programming
  developments require changes across email, form, landing page or programs. Finding
  creative processes to uplevel the tactical requirements as the company grows or
  campaigns pivot Develop prompt libraries, fine-tuned models, and reusable automation
  templates. &nbsp; &nbsp; YOUR EXPERIENCE Marketing &amp; AI Knowledge 5+ years in
  marketing operations, marketing technology, demand gen or related fields with an
  understanding of B2B GTM&nbsp; Deep understanding of MarTech platforms (Salesforce,
  Marketo, Outreach, Mutiny, etc.)&nbsp; Basic understanding of a marketing funnel
  and campaign attribution with familiarity in pipeline and revenue metrics as they
  pertain to marketing and sales development. Experience working with AI marketing
  software such as Tofu, Regie.ai , RevSure, etc. Strong grasp of generative AI (e.g.,
  GPT, Claude, Gemini), predictive modeling, and workflow automation platforms (e.g.,
  Make.com, Zapier, Workato). Ensure all AI-driven processes adhere to data privacy,
  compliance, and brand standards. Experience evaluating and implementing emerging
  AI tools for marketing automation Deep curiosity about how AI can reshape marketing
  workflows and drive GTM efficiency Comfort operating in fast-evolving AI and MarTech
  environments &nbsp; Technical Skills Coding: Proficiency in Python and JavaScript
  for automation scripts, data transformations, and API integrations. APIs: Ability
  to design, test, and deploy API calls between marketing systems (REST, GraphQL).
  Data: Familiarity with SQL, JSON, and ETL pipelines for marketing data processing.
  Automation Frameworks: Experience building workflows in Make.com, Airflow, or similar.
  AI Agents: support the design and maintenance of agents and workflows that can create
  cohesive workflows across tools&nbsp; Business &amp; Soft Skills Strong project
  management and cross-functional collaboration skills. Excellent communication skills
  — able to explain AI workflows to both technical and non-technical stakeholders.
  Ability to analyze and measure demand, performance and ROI as it relates to marketing
  campaigns and influence. Ability to balance speed and innovation with compliance
  and brand governance. If you like growth and working with happy, enthusiastic over-achievers,
  you''ll enjoy your career with us! THE LEGAL BIT Redwood is an equal opportunity
