company_overview: Every day there’s another cyber-attack on the news. Hackers stole
  twenty million credit card numbers from a retailer, or they shut down an oil pipeline,
  or crippled a hospital. These attacks are more than just disruptive; they’re big
  business for organized crime and rogue states. Wiz is here to prevent them from
  happening where companies and governments build applications today -- in the cloud.
  From Barclays to Home Depot, Wiz helps the biggest organizations in the world protect
  their Amazon, Microsoft, and Google cloud environments. We have only been selling
  the product for six months, and so far, 10% of the Fortune 500 already use Wiz.
  But this is just the beginning. Come join the fastest growing enterprise software
  company in history in one of the fastest growing industries -- the cloud -- and
  help us make cloud a safe place where creativity and innovative ideas can flourish.
