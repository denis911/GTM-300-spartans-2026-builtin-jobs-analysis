description_html: '<p><p><span>Come join the company that is reinventing cloud security
  and empowering businesses to thrive in the cloud. As the fastest-growing startup
  ever, </span><span>Wiz is on a mission to help organizations secure cloud environments
  that will accelerate their businesses. Trusted by security teams all over the world,
  we have a proven<span>&nbsp;</span>track record of success<span>&nbsp;</span>and
  a culture that values world-class talent.&nbsp;&nbsp;</span></p><p><span>Our Wizards
  from over 20 countries work together to protect the infrastructure of our hundreds
  of customers, including over 50% of the Fortune 100, who trust us to scan and secure
  over 230 billion files daily. We’re the leading player in a massive and growing
  market, but it’s still early enough for you to make a significant impact. At Wiz,
  you’ll have the freedom to think creatively, dream big, and use your full range
  of skills to contribute to our record growth. Come join our team and help us create
  secure cloud environments that allow the best companies to move faster.&nbsp;</span></p></p><b><strong>SUMMARY</strong></b><p>The
  Business Systems Team is central to Wiz''s operational excellence and growth, ensuring
  the reliability and evolution of key business systems that support critical functions
  across the organization. Composed of technical administrators, developers, and analysts,
  the team focuses on maintaining and optimizing these business systems to drive efficiency
  and effectiveness. Combining strategic oversight with tactical execution, the Business
  Systems Team directly contributes to the success of Wiz''s core business objectives
  as the company scales.&nbsp;</p><p>As the Lead GTM Systems Engineer, you will serve
  as the technical architect and primary escalation point for our Post-Sales and Marketplace
  ecosystems. Your mission is to drive operational excellence and scalability by owning
  the technical health, development, and support of our post-sales stack, currently
  centered on Planhat, Kantata, and Tackle.io. Reporting into the Business Systems
  leadership, you will ensure these platforms are not isolated silos but are seamlessly
  integrated into our Salesforce core, maintaining a unified data thread from contract
  signature through to service delivery. You are responsible for building the automated
  workflows that enable our Services and Success teams to scale at an enterprise level,
  ensuring every data point is accurate and ready for Board-level reporting.</p><p>The
  ideal candidate is a seasoned technologist and a proactive, hands-on engineer who
  views automation through the lens of ROI and business process maturity. You bring
  deep technical proficiency across Salesforce Core, including Salesforce CPQ or Revenue
  Cloud (RCA), and possess a sophisticated understanding of how Professional Services
  Automation (PSA) and Customer Success (CS) platforms must interact to prevent revenue
  leakage.</p><p>As a techno-functional leader, you recognize that the GTM landscape
  is dynamic; you possess the architectural mindset to evaluate and integrate new
  technologies as our systems scope evolves over time. You are a champion of Agile
  methodologies, capable of defining how we track work, managing stakeholder expectations
  through iterative delivery, and mentoring the team on best practices. You don''t
  just solve for the immediate requirement; you architect with a long-term vision
  for the ecosystem, ensuring our tech stack remains a competitive advantage.</p><b><strong>WHAT
  YOU’LL DO</strong></b><ul><li><strong>Integration Ownership:</strong> Serve as the
  primary technical owner for the Salesforce to Planhat integration. You will design
  and maintain data syncs, ensuring that health scores, usage data, and customer data
  flow accurately between systems.</li><li><strong>Team Mentorship &amp; Operational
  Maturity:</strong> Serve as a technical mentor to junior admins while driving internal
  process improvements, including standard operating procedures for documentation,
  deployment workflows, and technical debt management.</li><li><strong>Stakeholder
  Management: </strong>Partner closely with cross-functional leadership to translate
  business requirements into technical roadmaps while managing expectations through
  Agile delivery.</li><li><strong>System Development and Automation:</strong> Design
  and maintain robust configurations within Kantata and Tackle.io; establish automation
  standards that bridge the gap between Sales and Post-Sales to reduce manual entry
  and ensure data integrity.</li><li><strong>End User Support and Enablement:</strong>
  Provide expert technical support to the Global Customer Success and RevOps teams,
  troubleshooting complex logic issues within Planhat and ensuring accurate marketplace
  revenue reporting in Tackle.</li><li><strong>GTM Systems SME:</strong> Act as a
  technical advisor for new GTM tooling evaluations, partnering with the GTM Systems
  Analysis team to assess how new software fits into the existing architecture.</li><li><strong>Platform
  Performance &amp; Security:</strong> Establish proactive monitoring to identify
  sync errors while ensuring the GTM stack remains secure, compliant, and optimized
  for scalable business operations.</li></ul><b><strong>WHAT YOU’LL BRING</strong></b><ul><li>8+
  years of experience as a GTM Systems Engineer, Business Systems Administrator, specifically
  supporting high growth SaaS organizations with 2+ years in a lead or manager role</li><li>PSA
  and CS Tooling Expertise: Extensive experience managing Professional Services Automation
  (PSA) and Customer Success (CS) platforms, with a proven track record of building
  custom integrations, data mappings, and health score logic tied to Salesforce. experience
  with Planhat and Kantata is highly preferred.</li><li>Systems Stewardship: A security-first
  and data integrity mindset applied to the entire GTM ecosystem, with a proven track
  record of ensuring system architecture remains secure and compliant as an organization
  scales.</li><li>Salesforce Architecture Proficiency: Deep technical knowledge across
  the Salesforce Core platform, with a sophisticated understanding of Quote-to-Cash
  workflows; hands-on experience with Salesforce CPQ or Revenue Cloud (RCA) is highly
  preferred.</li><li>API and Connectivity Skills: Deep understanding of APIs (REST,
  SOAP) and secure integration protocols to facilitate custom connections where native
  connectors fall short.</li><li>Automation Mindset: Relentlessly pursues fully automated
  solutions to manual GTM processes, especially regarding the transition from Closed
  Won in Salesforce to Customer Onboarding.</li><li>Strong Analytical Skills: Ability
  to diagnose and resolve complex data sync issues between multi directional platforms
  while maintaining data integrity for Finance and Legal.</li><li>Excellent Communication:
  Strong interpersonal skills with the ability to work effectively across both technical
  and functional teams, translating complex logic into business outcomes.</li><li>Detail
  Oriented: Exceptional attention to detail, particularly regarding revenue data,
  marketplace transaction records, and compliance.</li></ul><p><p><p><p><span><span><strong><span>Benefits</span></strong></span><span>&nbsp;</span></span></p><p><span><span>Wiz
  offers a competitive package of benefits and programs to support you and your family.
  Below provides a description of our current benefits for employees in the US. Specific
  benefits may vary by location.</span><span>&nbsp;</span></span></p><p><span><strong><span>Health
  &amp; Welfare Benefits</span></strong><span>&nbsp;</span></span></p><ul><li><span><span>Medical,
  dental and vision insurance</span><span>&nbsp;</span></span></li><li><span><span>Home
  Office Setup reimbursement</span><span>&nbsp;</span></span></li><li><span><span>Flexible
  Spending Accounts</span><span>&nbsp;</span></span></li><li><span><span>Monthly Connectivity
  reimbursement</span><span>&nbsp;</span></span></li><li><span><span>Employee Assistance
  Program (EAP)</span><span>&nbsp;</span></span></li></ul><p><span><strong><span>Financial
  Benefits</span></strong><span>&nbsp;</span></span></p><ul><li><span><span>Short-
  and Long-term Disability Insurance</span><span>&nbsp;</span></span></li><li><span><span>Life
  &amp; Accident Insurance</span><span>&nbsp;</span></span></li><li><span><span>401(k)
  Retirement Savings Plan (with employer match)</span><span>&nbsp;</span></span></li></ul><p><span><strong><span>Time
  Off</span></strong><span>&nbsp;</span></span></p><ul><li><span><span>Flexible paid
  time off + 11 paid holidays</span><span>&nbsp;</span></span></li><li><span><span>Paid
  leave programs, including parental, pregnancy health, medical and bereavement leave</span><span>&nbsp;</span></span></li></ul><p><span><span><strong><span>Compensation</span></strong></span><span>&nbsp;</span></span></p><p><span><span>Starting
  compensation will be determined based on various factors, including but not limited
  to, the candidate''s job-related experience, skills and geographic location. Your
  Talent Partner can share more about the specific salary range during the hiring
  process.</span><span>&nbsp;</span></span></p><p><span><span>This role is eligible
  to participate in Wiz’s equity plan and may also include </span><span>incentive
  compensation</span><span>.</span><span>&nbsp;</span></span></p><p><span><span>The
  annual base salary range for this full-time position is listed below.</span><span>&nbsp;</span></span></p></p><p>US
  Base Pay Range</p><p><span>$166,000</span><span>—</span><span>$229,000 USD</span></p></p></p><p><p><em><span><span>Applicants
  must have the legal right to work in the country where the position is based,&nbsp;</span><span>without
  the need for</span> <span>visa </span><span>sponsorship.</span> <span>This</span><span>
  role does not offer</span> <span>visa</span></span> <span><span>sponsorship</span><span>.</span></span></em></p><p>Wiz
  is an equal opportunity employer. We do not discriminate based upon race, religion,
  color, national origin, sex (including pregnancy, childbirth, reproductive health
  decisions, or related medical conditions), sexual orientation, gender identity,
  gender expression, age, status as a protected veteran, status as an individual with
  a disability, genetic information, political views or activity, or other applicable
  legally protected characteristics.&nbsp;</p><p>By submitting your application, you
  acknowledge that Wiz will process your personal data in accordance with Wiz''s Privacy
  Policy.</p></p>'
