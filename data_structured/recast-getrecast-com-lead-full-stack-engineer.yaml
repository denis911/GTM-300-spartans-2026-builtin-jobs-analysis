company_overview: 'Recast is building the world’s most rigorous MMM platform. Here''s
  how we''re different:1. We take accuracy (really) seriously.From configuration,
  to stability checks, to parameter recovery exercises, to ongoing backtests – the
  Recast process holds every model to an incredibly high performance standard before
  and after delivery.2. We don’t hide anything.At Recast, we turn the black box into
  a glass box. We show uncertainty for all point estimates, send weekly model accuracy
  scorecards and publish all model docs openly. It helps our clients build trust in
  their models and hold us accountable as their vendor.3. We’re obsessed with model
  quality.More than 30% of the Recast team holds a PhD in math or statistics. Our
  research into upper & lower funnel channel interaction, time-varying ROIs, spike
  modeling, and more, continues to improve Recast''s proprietary media mix model.Download
  our free MMM E-Book: https://getrecast.com/ebookCheck out the MMM Academy: https://getrecast.com/mmm-academy/Subscribe
  to our weekly newsletter: https://getrecast.com/newsletter'
