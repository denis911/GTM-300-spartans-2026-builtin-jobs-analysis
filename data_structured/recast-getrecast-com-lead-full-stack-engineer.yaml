description_html: <p>We're hiring a Lead Full Stack Engineer to work with the Recast
  application engineering team for our marketing mix modeling platform.</p><p>&nbsp;</p><p><strong>What
  you might do in your first 6 months:</strong></p><ul><li>Build, test, troubleshoot,
  and integrate front-end elements into our application using Ruby on Rails, modern
  javascript frameworks and vanilla js, and styling with CSS and frameworks like Tailwind</li><li>Help
  us develop new features and functionality to allow our customers to better serve
  the information they need when they need it.</li><li>Add self-serve reporting and
  data visualization features so that our clients can dig in and build their own reports</li><li>Lots
  of interacting with your colleagues to overcome challenging and new problems to
  solve. We work very collaboratively and need colleagues who aren’t afraid to jump
  in and help in whatever way they can!</li></ul><p>&nbsp;</p><p><strong>Things you
  have experience in:</strong></p><ul><li>Full-Stack web-development experience with
  Ruby on Rails or other similar web frameworks (Django / Flask / MVC)</li><li>Front-End
  experience with JS frameworks and libraries such as React, Vue, Svelte, etc.</li><li>Styling
  for the web using either plain CSS or libraries like SASS, LESS, Tailwind, etc.</li><li>You
  have decent design-sense and can take an app from idea to MVP quickly and independently</li><li>Working
  with javascript plotting libraries like D3, cube.js, or plotly</li><li>Experience
  working with other engineers on your team to teach them using different techniques
  - pairing, mobbing, reviews, etc.</li><li>Working directly with a product team to
  ensure that the vision and the technical execution needs match up.</li><li>Estimating
  both how difficult technical projects will be, and also how long they may take given
  different inputs.</li><li>Working at a fast-paced SaaS startup</li></ul><p>&nbsp;</p><p><strong>Things
  that should excite you that might scare off other folks:</strong></p><ul><li>Working
  directly with data scientists to productionize their code</li><li>Taking ideas that
  might start out vague to some, and helping to turn them into concrete implementations
  collaboratively with colleagues both inside and outside Engineering</li><li>Working
  with lots of complex data structures and pushing-the-limits visualizations</li><li>Teaching
  others on your team and learning just as much from them - we are all student-teachers</li><li>Building
  tools that interface with JAX &amp; other ML-like libraries</li></ul><p>&nbsp;</p><p>*Please
  note salary ranges are estimated for US-based employees. Candidates from other geographies
  may have the salary range adjusted based on their local markets.</p>
description_text: 'We''re hiring a Lead Full Stack Engineer to work with the Recast
  application engineering team for our marketing mix modeling platform. &nbsp; What
  you might do in your first 6 months: Build, test, troubleshoot, and integrate front-end
  elements into our application using Ruby on Rails, modern javascript frameworks
  and vanilla js, and styling with CSS and frameworks like Tailwind Help us develop
  new features and functionality to allow our customers to better serve the information
  they need when they need it. Add self-serve reporting and data visualization features
  so that our clients can dig in and build their own reports Lots of interacting with
  your colleagues to overcome challenging and new problems to solve. We work very
  collaboratively and need colleagues who aren’t afraid to jump in and help in whatever
  way they can! &nbsp; Things you have experience in: Full-Stack web-development experience
  with Ruby on Rails or other similar web frameworks (Django / Flask / MVC) Front-End
  experience with JS frameworks and libraries such as React, Vue, Svelte, etc. Styling
  for the web using either plain CSS or libraries like SASS, LESS, Tailwind, etc.
  You have decent design-sense and can take an app from idea to MVP quickly and independently
  Working with javascript plotting libraries like D3, cube.js, or plotly Experience
  working with other engineers on your team to teach them using different techniques
  - pairing, mobbing, reviews, etc. Working directly with a product team to ensure
  that the vision and the technical execution needs match up. Estimating both how
  difficult technical projects will be, and also how long they may take given different
  inputs. Working at a fast-paced SaaS startup &nbsp; Things that should excite you
  that might scare off other folks: Working directly with data scientists to productionize
  their code Taking ideas that might start out vague to some, and helping to turn
  them into concrete implementations collaboratively with colleagues both inside and
  outside Engineering Working with lots of complex data structures and pushing-the-limits
  visualizations Teaching others on your team and learning just as much from them
  - we are all student-teachers Building tools that interface with JAX &amp; other
  ML-like libraries &nbsp; *Please note salary ranges are estimated for US-based employees.
  Candidates from other geographies may have the salary range adjusted based on their
  local markets.'
