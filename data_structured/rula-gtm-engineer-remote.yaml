company_overview: 'We believe that when access to quality mental healthcare improves,
  patients, providers, and payers all benefit. And that’s why we’re on a mission to
  make mental healthcare work for everyone. We remove barriers and strengthen connection
  points between patients, providers, and payers to improve mental health outcomes.
  With Rula, it’s easy for patients to find a high-quality therapist or psychiatric
  practitioner who meets their unique needs, accepts insurance, and is taking new
  patients. For providers, Rula offers the flexibility of private practice, while
  also filling caseloads and offering the necessary behind-the-scenes support. Rula
  handles the marketing, credentialing, billing, and admin tasks so providers can
  focus on what they do best: providing care to those in need. Rula is a remote-first
  company with teams who specialize in the areas of Clinical, Partnerships, Operations,
  Marketing, Engineering, Product, and more. We’re committed to reimagining how mental
  health is treated.'
