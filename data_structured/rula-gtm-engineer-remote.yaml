description_html: '<p>We believe that mental health is just as important as physical
  health. We recognize that mental health issues can be complex and multifaceted,
  and we are dedicated to treating the whole person, not just the symptoms.</p><p>We
  aim to create a world where mental health is no longer stigmatized or marginalized,
  but rather is embraced as an integral part of one''s overall well-being.&nbsp;</p><p>We
  believe that by providing quality care that is both evidence-based and compassionate,
  we can empower individuals to take charge of their mental health and achieve their
  full potential. We are passionate about making a positive impact on the lives of
  those struggling with mental health issues and we strive to be a force for positive
  change in the field of mental healthcare.</p><p>Rula is a remote-first company.
  We currently hire in most U.S. states, with the exception of Hawaii.</p><p><strong>About
  the Role</strong></p><p>We''re building Rula''s first GTM Engineering function.
  You''ll use agentic coding tools to design and ship the automation layer that helps
  our sales and customer success teams move faster: producing workflows that save
  50+ hours/week, building AI agents with measurable efficiency gains, and creating
  code-driven solutions that turn manual processes into scalable systems and raw data
  into actionable intelligence.</p><p>This is ground-floor: you''ll work directly
  with sales leaders, rapidly prototype solutions, and prove measurable impact on
  our mission to make mental healthcare work for everyone. If you''re excited about
  building a crucial part of the business in an emerging space, this is the role for
  you.</p><p><strong>Required Qualifications</strong></p><ul><li><p>5+ years of experience
  in GTM-adjacent roles (Revenue Operations, Sales Operations, Marketing Operations,
  Solutions Engineering, GTM tooling, or similar)</p></li><li><p>Agentic engineering
  fluency: experience using coding agents like Claude Code, Cursor, or similar. You
  use these tools daily to write, test, and iterate on code, not just for autocomplete</p></li><li><p>Hands-on
  experience with Clay and GTM automation tools (n8n, trigger.dev, pipedream) with
  evidence of building bespoke workflows, not just using templates</p></li><li><p>Deep
  understanding of CRM concepts, including object models, data relationships, lifecycle
  stages, and how GTM data flows through a CRM</p></li><li><p>API and integration
  fundamentals (REST APIs, webhooks, authentication, and how to connect systems)</p></li><li><p>Demonstrated
  building portfolio: GitHub, shipped bespoke solutions, or technical work samples
  showing what you''ve actually created</p></li><li><p>AI/LLM building experience:
  RAG systems, context engineering, deployed agents built with code (not configured
  in platforms)</p></li></ul><p><strong>Preferred Qualifications</strong></p><p><em>While
  having the preferred qualifications enhances your candidacy, having all of them
  is not mandatory. We encourage all interested applicants to apply, even those who
  may not meet every preferred requirement.</em></p><ul><li><p>SQL proficiency (complex
  queries, CTEs, window functions for GTM data analysis)</p></li><li><p>Python scripting
  and data manipulation</p></li><li><p>Data warehouse experience (Snowflake, BigQuery,
  dbt, or similar)</p></li><li><p>Understanding of attribution models and GTM crediting</p></li><li><p>Experience
  working in healthcare industry, highly regulated environments, and/or complex B2B
  sales environment</p></li><li><p>Experience in a startup or high-growth, agile environment
  with shifting priorities</p></li><li><p>Salesforce expertise (Apex, AgentForce,
  Einstein)</p></li></ul><p><strong>We''re serious about your well-being! As part
  of our team, full-time employees receive:</strong></p><ul><li><p><strong>100% remote
  work environment: </strong>Working hours to support a healthy work-life balance,
  ensuring you can meet both professional and personal commitments (must be based
  in United States, currently not hiring in Hawaii)</p></li><li><p><strong>Attractive
  pay and benefits</strong>: Full transparency of pay ranges regardless of where you
  live in the United States</p></li><li><p><strong>Comprehensive health benefits</strong>:
  Medical, dental, vision, life, disability, and FSA/HSA</p></li><li><p><strong>401(k)
  plan access</strong>: Start saving for your future</p></li><li><p><strong>Generous
  time-off policies</strong>: Including 2 company-wide shutdown weeks each year for
  self-care (for most employees)</p></li><li><p><strong>Paid parental leave</strong>:
  Available for all parents, including birthing, non-birthing, adopting, and fostering</p></li><li><p><strong>Employee
  Assistance Program (EAP)</strong>: Support for your mental and physical health</p></li><li><p><strong>New
  hire home office stipend</strong>: Set up your workspace for success</p></li><li><p><strong>Quarterly
  department stipend</strong>: Fund team-building activities or in-person gatherings</p></li><li><p><strong>Wellness
  events and lunch &amp; learns</strong>: Explore a variety of engaging topics</p></li><li><p><strong>Community
  and employee resource groups</strong>: Participate in groups that celebrate employee
  identity and lived experiences, fostering a sense of community and belonging for
  all</p></li></ul><p><strong>Our team</strong></p><p>We believe that diversity, equity,
  and inclusion are fundamental to our mission of making mental healthcare work for
  everyone.&nbsp; We are dedicated to having a culture of inclusion that will support
  our employees in feeling safe, seen, heard, and valued.</p>'
