company_overview: Telling the story of your product is hard, and today's consumers
  want you to show them your product, not just talk about it. Arcade is an interactive
  demo platform that enables teams to create effortlessly beautiful demos -- in minutes.
  Designed for ease of use, Arcade removes the creative and technical barriers often
  felt by teams wanting to showcase their product on a website, content, or social
  media.
