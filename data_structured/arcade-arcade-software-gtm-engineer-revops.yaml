description_html: <b><strong>About Arcade</strong></b><p>Our mission is to empower
  teams to become great storytellers.</p><p>Our vision is to build dynamic visual
  experiences.</p><p>More than 22,000 teams use Arcade to tell better, more engaging
  product stories, and we need your help spreading the word! Culturally, we are a
  team of ex-Atlassians, AngelList, and Shopify teammates. We believe in building
  beautiful, easy-to-use products that meaningfully improve how software companies
  showcase their product at every stage of a customer journey.<br></p><p></p><b><strong>The
  Role</strong></b><p>We’re hiring a GTM Engineer (RevOps) to help build the systems
  and automation that power efficient growth. This role sits at the center of our
  GTM efforts, partnering closely with Sales, Marketing, and Customer Success to reduce
  manual work, improve visibility, and turn strategy into scalable execution.</p><p>You’ll
  design and own AI-powered workflows across the customer journey, helping Arcade
  move faster, operate smarter, and build a modern GTM engine designed to scale.<br></p><p></p><b><strong>Who
  You Are</strong></b><p>You’re a hands-on builder who combines revenue insight with
  technical execution, designing systems and automation that power efficient GTM execution.
  You’re comfortable operating at both the strategic level and in the details configuring
  workflows, integrations, and tooling to bring ideas to life.</p><p>You have a strong
  point of view on how modern GTM teams should operate in an AI-first world, and you’re
  excited by the opportunity to rethink legacy RevOps models. You care deeply about
  clean data, operational leverage, and building systems that make teams faster, smarter,
  and more effective.<br></p><p></p><b><strong>What You’ll Do</strong></b><p>As a
  GTM Engineer (RevOps) at Arcade, you will help design and power our go-to-market
  engine end-to-end.</p><p>Your responsibilities will include:</p><ul><li><p>Own and
  evolve Arcade’s GTM systems and automation, designing AI-powered workflows across
  the full customer journey — from inbound routing and enrichment to deal execution,
  onboarding, expansion, and renewals.</p></li><li><p>Identify friction across the
  funnel and turn it into scalable solutions, designing system improvements, running
  GTM experiments, and operationalizing what performs.</p></li><li><p>Integrate and
  optimize Arcade’s GTM tech stack, ensuring reliable data flow across Salesforce,
  enrichment platforms, engagement tools, analytics, and AI systems.</p></li><li><p>Maintain
  accurate, trusted GTM data foundations, including schemas, governance standards,
  and reporting that improve visibility and decision-making.</p></li><li><p>Partner
  closely with GTM leadership to support forecasting, pipeline visibility, segmentation,
  routing logic, and rules of engagement as Arcade scales — while continually evaluating
  new technologies to help make our GTM motion increasingly AI-first.<br></p></li></ul><b><strong>Skills
  and Qualifications</strong></b><p>We’re open-minded about who you are and where
  you come from. Great GTM builders don’t all follow the same path — what matters
  most is your ability to design systems that help revenue teams move faster and operate
  better.</p><p>You’ll likely thrive in this role if you have:</p><ul><li><p>2–4+
  years of experience in Revenue Operations, GTM Systems, Sales Operations, or a related
  role in a high-growth B2B SaaS environment.</p></li><li><p>Strong hands-on experience
  with Salesforce, Clay, and modern GTM tooling —including automation, enrichment,
  engagement, and analytics.</p></li><li><p>Exposure to AI-powered GTM tools and strong
  judgment around where AI meaningfully drives efficiency.</p></li><li><p>The ability
  to translate business goals into scalable systems, turning ambiguous GTM needs into
  clear workflows and technical solutions.</p></li><li><p>Comfort working with GTM
  data and reporting, including schemas, governance, and dashboards that improve visibility
  and decision-making.</p></li><li><p>A systems-first mindset, with ownership, curiosity,
  and comfort operating in fast-moving environments.<br></p></li></ul><b><strong>Nice-to-haves</strong></b><ul><li><p>Exposure
  to Marketing Ops fundamentals, including lead lifecycle definitions and basic handoff
  processes between Marketing and Sales.</p></li><li><p>Understanding of campaign
  attribution and how marketing activity ties to pipeline and revenue reporting.</p></li><li><p>Appreciation
  for campaign and CRM data hygiene, including naming conventions and clean metadata.</p></li><li><p>Experience
  supporting or working alongside CRM–MAP integrations (e.g., Salesforce and HubSpot).<br></p></li></ul><b><strong>Benefits</strong></b><ul><li><p>Competitive
  salary and meaningful equity</p></li><li><p>Unlimited PTO and sick days</p></li><li><p>401k,
  and top tier Health, Dental and Vision insurance</p></li><li><p>Remote work stipend
  and commuter benefits</p></li><li><p>Meeting light culture</p></li><li><p>Biannual
  company retreats</p></li><li><p>Latest productivity software such as Notion, Linear
  and Superhuman</p></li><li><p>A team that values diversity and inclusion<br></p></li></ul><b><br><strong>Compensation</strong></b><ul><li><p>$140,000
  - $175,000 per year, depending on experience and location, plus equity.<br></p></li></ul><b><br><strong>Our
  values ❤️</strong></b><ul><li><p><strong>Be a coach:</strong> We want the best for
  our customers and ourselves. We coach people to help them achieve their best potential.
  An “Arcader” is both a teammate and a customer. There is a reason that the same
  word describes both.</p></li><li><p><strong>Carry the weight:</strong> We are owners.
  Let’s empower each other. When we see something that needs change, we lead through
  it.</p></li><li><p><strong>An open book:</strong> We are open as a team and as a
  product. We don’t put walls up unless it’s necessary. We become better when we share
  information. We are open to diversity of opinion, backgrounds, and thought.</p></li><li><p><strong>Play
  as a team:</strong> We <strong>play</strong> because we’re a creator tool. Life
  is short. Let’s build something meaningful. We <strong>play as a team</strong> because
  great teams build great things together. We keep those standards high.</p></li><li><p><strong>Be
  kind:</strong> We can be honest and kind. We can have high standards and be kind.
  We can say no and be kind. Kindness can vary across cultures, upbringings, and languages
  - but we try our best to be kind.<br></p></li></ul><p>Arcade is proud to be an equal
  opportunity employer. We celebrate diversity and are committed to creating an inclusive
  environment for all employees.</p>
description_text: 'About Arcade Our mission is to empower teams to become great storytellers.
  Our vision is to build dynamic visual experiences. More than 22,000 teams use Arcade
  to tell better, more engaging product stories, and we need your help spreading the
  word! Culturally, we are a team of ex-Atlassians, AngelList, and Shopify teammates.
  We believe in building beautiful, easy-to-use products that meaningfully improve
  how software companies showcase their product at every stage of a customer journey.
  The Role We’re hiring a GTM Engineer (RevOps) to help build the systems and automation
  that power efficient growth. This role sits at the center of our GTM efforts, partnering
  closely with Sales, Marketing, and Customer Success to reduce manual work, improve
  visibility, and turn strategy into scalable execution. You’ll design and own AI-powered
  workflows across the customer journey, helping Arcade move faster, operate smarter,
  and build a modern GTM engine designed to scale. Who You Are You’re a hands-on builder
  who combines revenue insight with technical execution, designing systems and automation
  that power efficient GTM execution. You’re comfortable operating at both the strategic
  level and in the details configuring workflows, integrations, and tooling to bring
  ideas to life. You have a strong point of view on how modern GTM teams should operate
  in an AI-first world, and you’re excited by the opportunity to rethink legacy RevOps
  models. You care deeply about clean data, operational leverage, and building systems
  that make teams faster, smarter, and more effective. What You’ll Do As a GTM Engineer
  (RevOps) at Arcade, you will help design and power our go-to-market engine end-to-end.
  Your responsibilities will include: Own and evolve Arcade’s GTM systems and automation,
  designing AI-powered workflows across the full customer journey — from inbound routing
  and enrichment to deal execution, onboarding, expansion, and renewals. Identify
  friction across the funnel and turn it into scalable solutions, designing system
  improvements, running GTM experiments, and operationalizing what performs. Integrate
  and optimize Arcade’s GTM tech stack, ensuring reliable data flow across Salesforce,
  enrichment platforms, engagement tools, analytics, and AI systems. Maintain accurate,
  trusted GTM data foundations, including schemas, governance standards, and reporting
  that improve visibility and decision-making. Partner closely with GTM leadership
  to support forecasting, pipeline visibility, segmentation, routing logic, and rules
  of engagement as Arcade scales — while continually evaluating new technologies to
  help make our GTM motion increasingly AI-first. Skills and Qualifications We’re
  open-minded about who you are and where you come from. Great GTM builders don’t
  all follow the same path — what matters most is your ability to design systems that
  help revenue teams move faster and operate better. You’ll likely thrive in this
  role if you have: 2–4+ years of experience in Revenue Operations, GTM Systems, Sales
  Operations, or a related role in a high-growth B2B SaaS environment. Strong hands-on
  experience with Salesforce, Clay, and modern GTM tooling —including automation,
  enrichment, engagement, and analytics. Exposure to AI-powered GTM tools and strong
  judgment around where AI meaningfully drives efficiency. The ability to translate
  business goals into scalable systems, turning ambiguous GTM needs into clear workflows
  and technical solutions. Comfort working with GTM data and reporting, including
  schemas, governance, and dashboards that improve visibility and decision-making.
  A systems-first mindset, with ownership, curiosity, and comfort operating in fast-moving
  environments. Nice-to-haves Exposure to Marketing Ops fundamentals, including lead
  lifecycle definitions and basic handoff processes between Marketing and Sales. Understanding
  of campaign attribution and how marketing activity ties to pipeline and revenue
  reporting. Appreciation for campaign and CRM data hygiene, including naming conventions
  and clean metadata. Experience supporting or working alongside CRM–MAP integrations
  (e.g., Salesforce and HubSpot). Benefits Competitive salary and meaningful equity
  Unlimited PTO and sick days 401k, and top tier Health, Dental and Vision insurance
  Remote work stipend and commuter benefits Meeting light culture Biannual company
  retreats Latest productivity software such as Notion, Linear and Superhuman A team
  that values diversity and inclusion Compensation $140,000 - $175,000 per year, depending
  on experience and location, plus equity. Our values ❤️ Be a coach: We want the best
  for our customers and ourselves. We coach people to help them achieve their best
  potential. An “Arcader” is both a teammate and a customer. There is a reason that
  the same word describes both. Carry the weight: We are owners. Let’s empower each
  other. When we see something that needs change, we lead through it. An open book:
  We are open as a team and as a product. We don’t put walls up unless it’s necessary.
  We become better when we share information. We are open to diversity of opinion,
  backgrounds, and thought. Play as a team: We play because we’re a creator tool.
  Life is short. Let’s build something meaningful. We play as a team because great
  teams build great things together. We keep those standards high. Be kind: We can
  be honest and kind. We can have high standards and be kind. We can say no and be
  kind. Kindness can vary across cultures, upbringings, and languages - but we try
  our best to be kind. Arcade is proud to be an equal opportunity employer. We celebrate
  diversity and are committed to creating an inclusive environment for all employees.'
