description_html: '<b>GTM Lead Engineer</b><p><strong>Reports to:</strong> Chief Customer
  Officer<br><strong>Location:</strong> London (preference) or New York. Both 4 days
  a week onsite. </p><p></p><b>The Mission</b><p>We have a product that works, a team
  delivering results, and a PLG motion converting prosumer users into enterprise contracts
  — all without a systematic GTM function. Now it''s time to build one.</p><p>Your
  mission: design, build, and run the revenue engine that takes us to $100M ARR. You
  are equal parts strategist, systems builder, and operator — the CTO of our go-to-market
  motion.</p><p></p><b>The Role</b><p>We''ve grown fast on inbound and product. What
  comes next is the precision layer on top — the systems, signals, and automation
  that turn a fast-growing company into a high-frequency revenue machine.</p><p>You''ll
  design our outbound infrastructure, engineer AI-powered prospecting workflows, and
  build the signal layer that tells Sales and CS exactly where to focus. In the early
  days, you''ll run the motion yourself. As we scale, you''ll own the architecture
  that powers everyone else.</p><p></p><b>What You''ll Own</b><p><strong>Outbound
  Infrastructure</strong> — Build the full outbound stack from scratch: email domains,
  deliverability, sending tools, CRM workflows, enrichment pipelines. Full autonomy
  on tooling decisions.</p><p><strong>AI-Powered Prospecting</strong> — Clay-powered
  enrichment waterfalls, intent signals, lead scoring, and personalised outreach at
  scale. Define the ICP, source and segment target account lists.</p><p><strong>GTM
  Automation</strong> — Eliminate manual work across the full sales and CS motion.
  Automate prep, follow-up, and note-taking so the team spends time on what actually
  moves revenue.</p><p><strong>Signal Layer</strong> — Surface churn risk, expansion
  triggers, and pipeline health automatically. Build briefings and alerts so Sales
  and CS always know where to focus — without asking for a report.</p><p><strong>Stack
  Architecture</strong> — Own the strategic view of the GTM tech stack. Cut what''s
  redundant, add what''s missing, turn a list of tools into a coherent system.</p><p></p><b>What
  Success Looks Like at Six Months</b><ul><li><p>A live outbound engine generating
  measurable pipeline</p></li><li><p>Automated churn, expansion, and pipeline signals
  delivered to Sales and CS</p></li><li><p>At least one AI-powered workflow demonstrably
  moving a revenue metric</p></li><li><p>The most painful manual work designed out,
  not delegated</p></li><li><p>You''re setting the agenda, not waiting for one</p><p></p></li></ul><b>Who
  You Are</b><ul><li><p>Technical GTM operator with deep knowledge of the modern stack
  — Clay, Instantly/Smartlead, Apollo, Gong, CRM automation</p></li><li><p>Builder,
  not just configurer — you''ve done this the hard way and now use AI to do it ten
  times faster</p></li><li><p>Commercial and technical in equal measure — you connect
  data signals to revenue outcomes</p></li><li><p>Systems thinker — when you see a
  manual process, your instinct is to automate it</p></li><li><p>Able to code or script
  automations and work with APIs without needing engineering support</p></li><li><p>5–10
  years in GTM engineering, RevOps, or outbound-focused growth at a B2B SaaS company</p><p></p></li></ul><b>Why
  Fyxer?</b><p>We believe a small, exceptional team working with extreme focus will
  always outperform a large, bloated organisation.</p><ul><li><p><strong>Autonomy</strong>
  — real ownership from day one</p></li><li><p><strong>Velocity</strong> — senior
  responsibility far earlier than anywhere else</p></li><li><p><strong>Scale</strong>
  — on track to hit $100M ARR by end of 2026; join at the foundational stage</p></li></ul>'
