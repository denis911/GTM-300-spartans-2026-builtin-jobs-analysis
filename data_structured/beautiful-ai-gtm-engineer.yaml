description_html: '<b><strong>Change the way the world presents.</strong></b><p><strong>About
  Beautiful.ai</strong></p><p>Today, Beautiful.ai powers presentations for thousands
  of organizations worldwide, from fast-growing startups to Fortune 500 enterprises.
  Companies like SAP, HP, Rakuten, and LIV Golf rely on Beautiful.ai to communicate
  ideas with clarity and impact. As we continue to scale, we are redefining what modern
  presentation software looks like by combining intelligent design, automation, and
  AI to help teams move faster and tell better stories.</p><p><strong>About the Role</strong></p><p>Beautiful.ai
  is building the future of presentations with AI. As we scale across product-led
  growth and sales-assisted motions, we’re looking for someone who doesn’t just manage
  systems, they use systems to drive pipeline. This role sits at the intersection
  of growth, marketing, sales, automation, and AI to help connect strategy → automation
  → execution → pipeline.&nbsp;You’ll help design and execute growth campaigns while
  building the automation and systems behind them. This isn’t just a backend RevOps
  role, you’ll actively help generate qualified pipelines for the business.</p><p><strong>What
  You’ll Own</strong></p><ul><li>Manage and operate the GTM tool stack</li><li>Build
  and automate workflows</li><li>Build pipeline through Smart Campaigns</li><li>Launch
  and support outbound campaigns (email, LinkedIn, sequencing)</li><li>Build segmented
  target lists using Apollo, Common Room, Clay, and other enrichment tools</li><li>Create
  workflows that automate personalization at scale</li><li>Partner with marketing
  to run experiments across inbound and outbound channels</li><li>Help create campaign
  messaging and content (email copy, landing page inputs, enablement materials)</li><li>General
  pipeline reporting and analysis</li><li>Your goal: You’re not just routing leads,
  you’re helping generate them</li></ul><p><strong>Automate Everything</strong></p><ul><li>Build
  lead routing, enrichment, and lifecycle workflows in Salesforce and HubSpot</li><li>Use
  tools like Zapier, n8n, and Clay to automate prospect research and outbound personalization</li><li>Implement
  AI-powered scoring and segmentation models</li><li>Reduce manual SDR work through
  smart automation</li><li>Your goal: Increase pipeline per rep without increasing
  headcount</li></ul><p><strong>Turn Data Into Growth Decisions</strong></p><ul><li>Monitor
  campaign performance (conversion rates, speed-to-lead, reply rates)</li><li>Build
  dashboards tracking pipeline generation by source and segment</li><li>Identify drop-offs
  in the funnel and run experiments to fix them</li><li>Your goal: Continuously improve
  targeting quality through better data hygiene</li></ul><p><strong>Maintain the Growth
  Tech Stack</strong></p><ul><li>You don’t need to be an architect, but you should
  be comfortable wiring systems together and figuring things out.</li><ul><li>Salesforce</li><li>HubSpot</li><li>Apollo</li><li>CommonRoom</li><li>Mode</li><li>Amplitude</li><li>RevenueHero</li><li>Snowflake
  or BigQuery</li></ul></ul><p><strong>Who You Are</strong></p><ul><li>1-3 years in
  Growth, RevOps, Sales Ops, Marketing Ops, or a technical GTM role</li><li>Background
  in marketing or sales, you understand how pipeline actually gets built</li><li>Comfortable
  writing campaign copy and thinking about messaging. Strong in Salesforce (flows,
  reporting, objects)</li><li>Working knowledge of SQL and Hands-on with automation
  tools (Zapier, n8n, Make, etc.)</li><li>Curious about AI and how to use it to increase
  efficiency and personalization</li></ul><p><strong>What Makes You Different</strong></p><ul><li>You
  think in experiments, not static processes</li><li>You care about reply rates and
  conversion rates, not just clean data</li><li>You look at manual tasks and immediately
  think: “How can we automate this?”</li><li>You understand that systems exist to
  drive revenue, not just organization</li></ul><p><strong>Benefits</strong></p><ul><li><span>100%
  Medical/Dental/Vision insurance covered for the employee / 60%-65% covered for dependents</span></li><li><span>FSA
  and Commuter Benefits</span></li><li><span>Life / AD&amp;D and Disability Coverage</span></li><li><span>Competitive
  Equity with a 4 year vesting schedule</span></li><li><span>Parental leave for birthing
  or non-birthing parents</span></li><li><span>Comprehensive 401K program</span></li><li><span>Open
  vacation policy and a fully remote work policy</span></li></ul><p><p><p><p>We are
  happy to share the set target salary range for the seniority level outlined in all
  of our job descriptions. Candidates should keep in mind that the final offer will
  depend on multiple factors such as: your valuable experience and expertise, geographic
  location, overall compensation, and prevailing market rates.&nbsp;</p></p><p>Remote
  - USA Pay Range</p><p><span>$80,000</span><span>—</span><span>$120,000 USD</span></p></p></p><p><p>Beautiful.ai
  is an equal opportunity employer and enthusiastically encourages people from a wide
  variety of backgrounds and experiences to apply. We do not discriminate on the basis
  of race, color, religion, sex (including pregnancy), gender, national origin, citizenship,
  age, mental or physical disability, veteran status, marital status, sexual orientation
  or any other basis prohibited by law.</p><p>‍<strong>RECRUITMENT AGENCY POLICY</strong></p><p>Beautiful.ai&nbsp;does
  not accept any agency resumes. Please do not forward resumes to our employees or
  email aliases.&nbsp;Beautiful.ai&nbsp;is not responsible for any fees related to
  unsolicited resumes.</p></p>'
