description_html: '<p>Veeva Systems is building the industry cloud for Life Sciences
  to help companies work in a more efficient and connected way.&nbsp;Learn more about
  our products, vision and values, and status as a public benefit corporation on our
  website.</p><p>Crossix is a business within Veeva dedicated to advancing healthcare
  marketing with analytics, innovative planning, targeting, measurement, and optimization
  solutions.&nbsp; Positioned at the center of big data, innovative technology, and
  omnichannel media, Veeva Crossix provides most life sciences companies with insights
  to help make strategic business decisions and drive improved patient outcomes.&nbsp;</p><p>We
  expect significant growth in Crossix as we look toward 2030 and we are looking for
  great people to make it happen.</p><p><strong>The Role</strong></p><p>We are hiring
  recent university graduates to grow the next generation of data analysts through
  our Analytics Development Program.</p><p>We believe in pushing high potential people
  to achieve excellence. Our program is specifically designed to provide a challenging
  environment to learn quickly and deliver value early, equipping you with the resources
  to drive your growth as an analytics professional and future leader.&nbsp;&nbsp;</p><p>&nbsp;
  &nbsp;</p><p>Our Analytics team builds effective business strategies for Life Sciences
  customers by leveraging Veeva’s comprehensive and unique industry data, Data Cloud,
  as well as other industry data sets. We inform our customers to be more accurate
  in their targeting and segmentation, field team activation, and understanding of
  patient and healthcare professional behaviors.&nbsp;</p><p>The Marketing Data Analyst
  (MDA) is a member of the internal analytics team focused on product analytics.&nbsp;
  This team’s primary function is to produce the analytical reports that are incorporated
  into Veeva Crossix products and shared with customers.</p><p><strong>The anticipated
  start date is July 2026.&nbsp;</strong></p><p>Candidates should only apply to one
  role in one Generation Veeva program. Review the Analytics Services Associate role
  to inform your decision within the Analytics Development Program.&nbsp;</p><p><strong>What
  You''ll Do</strong></p><ul><li>Own the end-to-end execution, quality control, and
  timely delivery of high value, recurring analytical reports across a large client
  portfolio</li><li>Link marketing exposure data to transactional health data to help
  pharmaceutical and Life Sciences companies optimize their marketing efforts</li><li>Transform
  client questions into hypotheses that are testable with data using Crossix’s proprietary
  coding language </li><li>Communicate results of marketing campaign analyses to our
  client services teams</li><li>Mobilize a variety of tools and platforms, including
  SQL, Excel, and data visualization suites</li></ul><p><strong>REQUIREMENTS | We
  are looking for graduates who meet the following requirements:</strong></p><ul><li>Self-starter
  and team player; hungry to grow in independence and responsibilities</li><li>Desire
  to work within an intense, challenging environment </li><li>Intermediate SQL, Python,
  or comparable coding language skill</li><li>Bachelor’s degree with 3.0 to 4.0 GPA
  in any major&nbsp; </li><li>Recent university graduate (no postgraduate work experience)</li><li>Strong
  verbal and written communication skills&nbsp; </li><li>Excellent attention to detail</li><li>High
  work ethic. Veeva is a hard-working company</li><li>Located near New York City and
  able to work in the office 4 days/week</li><li>High integrity and honesty. Veeva
  is a PBC and a “do the right thing” company and we expect that from all employees</li></ul><p><strong>THE
  PROCESS | Our process is different from most. It is designed to be fast, efficient
  and respectful. Here are the steps:</strong></p><ul><li>You submit your resume,
  short cover letter of questions, and take a personality test</li><li>Within one
  week we will notify you via email if we would like to go to the next step or not</li><li>The
  next step is a 60-minute job interview followed by a case exercise. </li><li>Within
  one week after this step, we will give you an offer or let you know that we do not
  wish to move forward</li><li>You will have two weeks to accept our offer or not.
  If you accept, we will hold a spot for you and expect you to show up on your start
  date. Accepting an offer and continuing to interview for other roles would be an
  ethical violation in our view</li></ul><p><strong>Compensation</strong></p><ul><li>Starting
  base pay (Cash + RSU): $82,500</li></ul><p><strong>Work Authorization</strong>:
  Qualified candidates must be legally authorized to be employed in the United States.
  Veeva does not provide sponsorship for employment visa status (e.g., H-1B, OPT,
  or TN status) for this employment position.</p><p>Veeva is an equal opportunity
  employer. All qualified applicants will receive consideration for employment without
  regard to race, color, sex, sexual orientation, gender identity or expression, religion,
  national origin or ancestry, age, disability, marital status, pregnancy, protected
  veteran status, protected genetic information, political affiliation, or any other
  characteristics protected by local laws, regulations, or ordinances. If you need
  assistance or accommodation due to a disability or special need when applying for
  a role or in our recruitment process, please contact us at talent_accommodations@veeva.com.</p>'
