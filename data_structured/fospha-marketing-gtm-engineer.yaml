  Do you want to learn how modern GTM engines actually work — the tools, the data,
  the workflows — and then make them better? Are you commercially hungry, technically
  curious, and genuinely excited about what GenAI can do for B2B marketing? If that
  sounds like you, keep reading... About us Fospha is dedicated to building the world''s
  most powerful measurement solution for online retail. For over a decade, we''ve
  helped teams make smarter decisions with full‑funnel marketing insights, forecasting,
  and optimisation. With Fospha, every team moves faster and grows smarter. Trusted
  by leading brands across three continents, including Huel, Oh Polly, and Dyson ,
  Fospha manages $4 billion in annual ad spend. We''re scaling fast across London,
  Mumbai, and Austin – and we''re now looking for a GTM Engineer to join our Marketing
  team.&nbsp;You''ll be responsible for building, running, and improving the activation
  layer that turns our marketing strategy into qualified pipeline — across ABM, outbound,
  inbound, events, and partner-led motions. Ready to build something? Let''s go .
  🚀 The Role This is not a traditional BDR role. You won''t be cold-calling from a
  list. Instead, you''ll be the engine behind how Fospha''s marketing activity converts
  into real commercial conversations. You''ll own and evolve the workflows, tools,
  and processes that sit between our marketing campaigns and Sales — making sure the
  right accounts are identified, enriched, activated, and handed over with the right
  context at the right time. Think of yourself as the person who builds and operates
  the activation infrastructure behind everything Marketing does: ABM campaigns targeting
  enterprise beauty and apparel brands, partner-led events with TikTok, Snap, and
  Google, thought leadership distribution, and signal-based outbound. You''ll work
  across Marketing, Sales, RevOps, and Partnerships daily, and you''ll be expected
  to actively hunt for new business opportunities — whether that''s spotting intent
  signals in data, working the room at industry events like Shoptalk and eTail, or
  finding creative ways to book meetings with target accounts. Critically, you''ll
  be joining a company that''s serious about GenAI . Fospha runs an active GenAI Hub
  where teams build MCP servers, experiment with Claude Code, and create internal
  tools that genuinely change how work gets done. We don''t just talk about AI — we
  expect you to dive in, build things, and find new ways to make our GTM machine faster
  and smarter. This role is based in our London office and is designed for someone
  who is early in their career but exceptionally driven — someone who wants to understand
  the full GTM stack and grow into a senior commercial, operations, or growth role.
  Key Responsibilities Build and run the activation layer Own and iterate on Fospha''s
  ABM, outbound, and inbound activation workflows — understanding how signals, enrichment,
  sequencing, and timing drive pipeline creation Operate and improve tooling across
  the GTM stack (HubSpot, Dripify, LinkedIn automation) to increase the efficiency
  and conversion of every marketing motion Hunt for opportunities Proactively identify
  and pursue early-stage sales opportunities by monitoring market signals, intent
  data, job changes, engagement patterns, and inbound activity Represent Fospha at
  leading industry events — sourcing opportunities on the ground, running follow-up
  sequences, and booking meetings with target accounts Lead initial discovery calls
  with prospective customers, qualifying opportunities before handing to Account Executives
  Connect Marketing to Revenue Ensure the right accounts and contacts are prioritised,
  enriched, and passed to Sales with proper context and timing Work closely with Sales
  on opportunity handoff — learning how deals progress and feeding insights back to
  improve targeting and messaging Track and report on activation performance: response
  rates, acceptance rates, meetings booked, pipeline influenced, and conversion through
  the MEL → MAL → MQL → SQL funnel Build with GenAI Use and contribute to Fospha''s
  GenAI Hub — experimenting with tools like Claude Code, MCP servers, and AI-powered
  workflows to automate and improve GTM processes Build internal systems and processes
  that give Marketing a genuine operational edge — whether that''s automating lead
  enrichment, creating AI-driven personalisation at scale, or building dashboards
  that surface the right insights Be a champion for new ways of working — we want
  someone who sees a manual process and immediately thinks "I can build something
  better" In addition to your core responsibilities, we expect you to be excited by
  the opportunity Gen AI brings and find new ways of working utilising our Gen AI
  hub! What are we looking for? We hire for potential and mindset. You should apply
  if you: Are technically curious — you love learning new tools, building workflows,
  and figuring out how systems connect Are commercially driven — you care about pipeline,
  revenue, and winning new business Are genuinely excited by GenAI — not just as a
  buzzword, but as something you actively use and want to build with (experience with
  tools like Claude, ChatGPT, Cursor, or similar is a strong signal) Have strong communication
  skills and are comfortable working across Marketing, Sales, Partnerships, and RevOps
  Are organised and data-literate — you track what works, learn from what doesn''t,
  and iterate fast Want a role with real ownership and progression — this role can
  grow into senior positions across Growth, RevOps, GTM Strategy, or Sales Nice to
  Have (But Not Essential) Experience with GTM or marketing automation tools (e.g.
  HubSpot, Apollo, Dripify, or similar) Exposure to ABM, outbound, or demand generation
  in a B2B context Any experience building with AI tools — personal projects, automations,
  scripts, or internal tools Internship or early experience in growth, operations,
  or sales Our Values and Principles You will be able to demonstrate examples of our
  core principles: Seek inclusion &amp; diversity: We create an environment where
  everyone feels welcome, and people are encouraged to speak and be heard Work Hard,
  Work Well, Work Together: We take responsibility for making things happen, independently
  and together; we help colleagues in need and close loops, making sure our work is
  complete and has lasting impact Grow: We are proactive, curious and unafraid of
  failure Customer at the heart: We care about the customer, feel their pain and love
  building product that solves their biggest problems Candour with caring: We deliver
  candid feedback with kindness and receive it with gratitude What we can offer you
  Competitive base salary and commission&nbsp;&nbsp; Be part of one of the UK''s fastest-growing
  scaleups, trusted by brands like Gymshark, Dyson, and Huel Hands-on access to modern
  GTM tools and an active GenAI environment where you''re encouraged to build Work
  directly with experienced leaders across Marketing, Sales, RevOps, and Partnerships
  Be part of a leading global venture builder, Blenheim Chalcot Flexible benefits
  including Private Medical and Dental, gym subsidies, life assurance, and pension
  25 days of paid holiday + your birthday off! Free snacks in the office Quarterly
  team socials'
