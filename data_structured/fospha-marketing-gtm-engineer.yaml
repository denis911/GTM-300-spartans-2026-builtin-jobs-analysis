description_html: '<p></p><p>Are you the kind of person who gets excited about building
  systems?</p><p>Do you want to learn how modern GTM engines actually work — the tools,
  the data, the workflows — and then make them better?</p><p>Are you commercially
  hungry, technically curious, and genuinely excited about what GenAI can do for B2B
  marketing?</p><p><strong>If that sounds like you, keep reading...</strong></p><br><p><span><strong>About
  us</strong></span></p><p>Fospha is dedicated to building the world''s most powerful
  measurement solution for online retail. For over a decade, we''ve helped teams make
  smarter decisions with full‑funnel marketing insights, forecasting, and optimisation.
  With Fospha, every team moves faster and grows smarter.</p><p>Trusted by leading
  brands across three continents, including <strong>Huel, Oh Polly, and Dyson</strong>,
  Fospha manages <strong>$4 billion</strong> in annual ad spend.</p><p>We''re scaling
  fast across <strong>London, Mumbai, and Austin</strong> – and we''re now looking
  for a <strong>GTM Engineer </strong>to join our <strong>Marketing</strong> team.&nbsp;You''ll
  be responsible for building, running, and improving the activation layer that turns
  our marketing strategy into qualified pipeline — across ABM, outbound, inbound,
  events, and partner-led motions.</p><p><strong>Ready to build something? Let''s
  go</strong>. 🚀</p><br><p><span><strong>The Role</strong></span></p><p>This is <strong>not</strong>
  a traditional BDR role. You won''t be cold-calling from a list. Instead, you''ll
  be the engine behind how Fospha''s marketing activity converts into real commercial
  conversations.</p><p>You''ll own and evolve the workflows, tools, and processes
  that sit between our marketing campaigns and Sales — making sure the right accounts
  are identified, enriched, activated, and handed over with the right context at the
  right time. Think of yourself as the person who builds and operates the <strong>activation
  infrastructure</strong> behind everything Marketing does: ABM campaigns targeting
  enterprise beauty and apparel brands, partner-led events with TikTok, Snap, and
  Google, thought leadership distribution, and signal-based outbound.</p><p>You''ll
  work across <strong>Marketing, Sales, RevOps, and Partnerships</strong> daily, and
  you''ll be expected to actively hunt for new business opportunities — whether that''s
  spotting intent signals in data, working the room at industry events like Shoptalk
  and eTail, or finding creative ways to book meetings with target accounts.</p><p>Critically,
  you''ll be joining a company that''s serious about <strong>GenAI</strong>. Fospha
  runs an active GenAI Hub where teams build MCP servers, experiment with Claude Code,
  and create internal tools that genuinely change how work gets done. We don''t just
  talk about AI — we expect you to dive in, build things, and find new ways to make
  our GTM machine faster and smarter.</p><p>This role is based in our <strong>London
  office</strong> and is designed for someone who is <strong>early in their career
  but exceptionally driven</strong> — someone who wants to understand the full GTM
  stack and grow into a senior commercial, operations, or growth role.</p><br><p><span><strong>Key
  Responsibilities</strong></span></p><p><strong>Build and run the activation layer</strong></p><ul><li>Own
  and iterate on Fospha''s ABM, outbound, and inbound activation workflows — understanding
  how signals, enrichment, sequencing, and timing drive pipeline creation</li><li>Operate
  and improve tooling across the GTM stack (HubSpot, Dripify, LinkedIn automation)
  to increase the efficiency and conversion of every marketing motion</li></ul><p><strong>Hunt
  for opportunities</strong></p><ul><li>Proactively identify and pursue early-stage
  sales opportunities by monitoring market signals, intent data, job changes, engagement
  patterns, and inbound activity</li><li>Represent Fospha at leading industry events
  — sourcing opportunities on the ground, running follow-up sequences, and booking
  meetings with target accounts</li><li>Lead initial discovery calls with prospective
  customers, qualifying opportunities before handing to Account Executives</li></ul><p><strong>Connect
  Marketing to Revenue</strong></p><ul><li>Ensure the right accounts and contacts
  are prioritised, enriched, and passed to Sales with proper context and timing</li><li>Work
  closely with Sales on opportunity handoff — learning how deals progress and feeding
  insights back to improve targeting and messaging</li><li>Track and report on activation
  performance: response rates, acceptance rates, meetings booked, pipeline influenced,
  and conversion through the MEL → MAL → MQL → SQL funnel</li></ul><p><strong>Build
  with GenAI</strong></p><ul><li>Use and contribute to Fospha''s GenAI Hub — experimenting
  with tools like Claude Code, MCP servers, and AI-powered workflows to automate and
  improve GTM processes</li><li>Build internal systems and processes that give Marketing
  a genuine operational edge — whether that''s automating lead enrichment, creating
  AI-driven personalisation at scale, or building dashboards that surface the right
  insights</li><li>Be a champion for new ways of working — we want someone who sees
  a manual process and immediately thinks <em>"I can build something better"</em></li></ul><p><em>In
  addition to your core responsibilities, we expect you to be excited by the opportunity
  Gen AI brings and find new ways of working utilising our Gen AI hub!</em></p><br><p><span><strong>What
  are we looking for?</strong></span></p><p>We hire for potential and mindset. You
  should apply if you:</p><ul><li>Are <strong>technically curious</strong> — you love
  learning new tools, building workflows, and figuring out how systems connect</li><li>Are
  <strong>commercially driven</strong> — you care about pipeline, revenue, and winning
  new business</li><li>Are <strong>genuinely excited by GenAI</strong> — not just
  as a buzzword, but as something you actively use and want to build with (experience
  with tools like Claude, ChatGPT, Cursor, or similar is a strong signal)</li><li>Have
  <strong>strong communication skills</strong> and are comfortable working across
  Marketing, Sales, Partnerships, and RevOps</li><li>Are <strong>organised and data-literate</strong>
  — you track what works, learn from what doesn''t, and iterate fast</li><li>Want
  a role with <strong>real ownership and progression</strong> — this role can grow
  into senior positions across Growth, RevOps, GTM Strategy, or Sales</li></ul><b>Nice
  to Have (But Not Essential)</b><ul><li>Experience with GTM or marketing automation
  tools (e.g. HubSpot, Apollo, Dripify, or similar)</li><li>Exposure to ABM, outbound,
  or demand generation in a B2B context</li><li>Any experience building with AI tools
  — personal projects, automations, scripts, or internal tools</li><li>Internship
  or early experience in growth, operations, or sales</li></ul><br><p><span><strong>Our
  Values and Principles</strong></span></p><p>You will be able to demonstrate examples
  of our core principles:</p><ul><li><strong>Seek inclusion &amp; diversity:</strong>
  We create an environment where everyone feels welcome, and people are encouraged
  to speak and be heard</li><li><strong>Work Hard, Work Well, Work Together:</strong>
  We take responsibility for making things happen, independently and together; we
  help colleagues in need and close loops, making sure our work is complete and has
  lasting impact</li><li><strong>Grow:</strong> We are proactive, curious and unafraid
  of failure</li><li><strong>Customer at the heart:</strong> We care about the customer,
  feel their pain and love building product that solves their biggest problems</li><li><strong>Candour
  with caring:</strong> We deliver candid feedback with kindness and receive it with
  gratitude</li></ul><br><p><span><strong>What we can offer you</strong></span></p><ul><li>Competitive
  base salary and commission&nbsp;&nbsp;</li><li>Be part of one of the UK''s fastest-growing
  scaleups, trusted by brands like Gymshark, Dyson, and Huel</li><li>Hands-on access
  to modern GTM tools and an active GenAI environment where you''re encouraged to
  build</li><li>Work directly with experienced leaders across Marketing, Sales, RevOps,
  and Partnerships</li><li>Be part of a leading global venture builder, <strong>Blenheim
  Chalcot</strong></li><li>Flexible benefits including Private Medical and Dental,
  gym subsidies, life assurance, and pension</li><li><strong>25 days of paid holiday
  + your birthday off!</strong></li><li>Free snacks in the office</li><li>Quarterly
  team socials</li></ul><br>'
