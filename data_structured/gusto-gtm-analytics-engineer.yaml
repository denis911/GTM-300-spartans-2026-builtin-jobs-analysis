  the Role The Revenue Operations team at Gusto is a full-stack team responsible for
  data, analytics, and operational excellence in pursuit of scaling our revenue growth.
  The Go-To-Market Analytics team is one functional area, responsible for defining
  and owning the metrics for scaling our Sales teams.&nbsp; Gusto is looking for a
  Revenue Analytics Engineer to build and maintain foundational data infrastructure
  that is crucial to growing and scaling our Sales efforts. In this role, you will
  partner with our GTM analysts to scope and deliver data products for an audience
  ranging from company and revenue leadership to operational and frontline sales.
  In doing so, you will own significant portions of our sales data from end-to-end,
  focusing on the transformation, design, and visualization workflows. In addition,
  you will establish best practices for systems design and workflows to maximize usefulness
  of AI at scale.&nbsp; This role will report to the Head of Go-To-Market analytics,
  and partner closely with Data Science, Data Platform, and Business Technology teams.&nbsp;
  Here’s what you’ll do day-to-day: Establish relationships with internal stakeholders
  to determine business needs, scoping and delivering solutions through data products
  Design, build, and maintain data pipelines and dashboards to automate “keep the
  lights on” work out of manually-managed processes Build a data foundation by incorporating
  business logic into raw data tables, laying the groundwork to enable value-add insights
  Create a dynamic reporting environment based on stakeholder needs Identify data
  discrepancies and set best practices for data logic to create a clean and well-documented
  environment Collaborate with broader data organization as steward to the definition
  and process management of core Gusto metrics Here’s what we''re looking for: Education
  or work experience in Engineering or Computer Science, or a related technical field&nbsp;
  7+ years of experience in an analytics engineering, business intelligence, or technical
  data analytics role Experience with SQL and ETL optimization techniques, especially
  within cloud-based data warehouses like Redshift, Snowflake, etc. Command-line experience
  and familiarity with version control collaboration tools (git) Experience with data
  pipeline management technologies with dependency checking, such as Airflow, as well
  as schema design and data modeling tools (dbt) Experience with data visualization
  technologies, e.g., Tableau, Looker, Sigma, Mode, Hex Experience with Python and
  data ingestion tools Ability to problem-solve open-ended problems and project manage
  dependencies and timelines to optimal outcomes Ability to demonstrate tools, business
  intuition, and attention to detail for data validation and QA&nbsp; Our cash compensation
  amount for this role is targeted at $138,000-156,000 in Denver &amp; most remote
  locations, and $168,000-189,000 in New York &amp; San Francisco Bay Area. Stock
  equity is additional. Final offer amounts are determined by multiple factors including
  candidate experience and expertise and may vary from the amounts listed above. Gusto
  has physical office spaces in Denver, San Francisco, and New York City. Employees
  who are based in those locations will be expected to work from the office on designated
  days approximately 2-3 days per week (or more depending on role). The same office
  expectations apply to all Symmetry roles, Gusto''s subsidiary, whose physical office
  is in Scottsdale. Note: The San Francisco office expectations encompass both the
  San Francisco and San Jose metro areas.&nbsp; When approved to work from a location
  other than a Gusto office, a secure, reliable, and consistent internet connection
  is required. This includes non-office days for hybrid employees. Our customers come
  from all walks of life and so do we. We hire great people from a wide variety of
  backgrounds, not just because it''s the right thing to do, but because it makes
  our company stronger. If you share our values and our enthusiasm for small businesses,
  you will find a home at Gusto.&nbsp; Gusto is proud to be an equal opportunity employer.
  We do not discriminate in hiring or any employment decision based on race, color,
  religion, national origin, age, sex (including pregnancy, childbirth, or related
  medical conditions), marital status, ancestry, physical or mental disability, genetic
  information, veteran status, gender identity or expression, sexual orientation,
  or other applicable legally protected characteristic. Gusto considers qualified
  applicants with criminal histories, consistent with applicable federal, state and
  local law. Gusto is also committed to providing reasonable accommodations for qualified
  individuals with disabilities and disabled veterans in our job application procedures.
  We want to see our candidates perform to the best of their ability. If you require
  a medical or religious accommodation at any time throughout your candidate journey,
  please fill out this form and a member of our team will get in touch with you. Gusto
  takes security and protection of your personal information very seriously. Please
  review our Fraudulent Activity Disclaimer. Personal information collected and processed
  as part of your Gusto application will be subject to&nbsp;Gusto''s Applicant Privacy
  Notice.'
