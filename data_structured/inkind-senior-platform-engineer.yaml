description_html: '<p><strong>Job Title:</strong> Senior Platform Engineer</p><p><strong>Reports
  to:</strong> Director of Engineering</p><p><strong>About the role</strong></p><p>The
  Senior Platform Engineer at inKind is responsible for owning, evolving, and operating
  our cloud infrastructure as the foundation of a growing financial and hospitality
  technology platform. This role exists to ensure that our systems are secure, reliable,
  observable, and capable of scaling as both traffic and organizational complexity
  increase.</p><p>This is a deeply technical, hands-on role with real ownership. You
  will design, implement, and operate our AWS infrastructure; make forward-looking
  decisions about how our platform should evolve; and carry those decisions through
  implementation, migration, and steady-state operation. When the platform changes—new
  AWS services, runtime upgrades, architecture shifts—you are ahead of it, not reacting
  to it.</p><p>You’ll work closely with application engineers, but your focus is the
  platform itself: compute, networking, data stores, deployment workflows, observability,
  and operational correctness. In a small but growing team, this role sets the standard
  for how infrastructure is designed, changed, and trusted.</p><p><strong>Who you
  are</strong></p><ul><li>Infrastructure Owner: You take responsibility for systems
  in production and feel accountable for their behavior over time</li><li>Systems
  Thinker: You understand how compute, storage, networking, and application behavior
  interact under real load</li><li>Pragmatic Operator: You know when to modernize,
  when to migrate, and when stability matters more than novelty</li><li>Infrastructure
  Decision-Maker: You can evaluate tradeoffs (EKS vs ECS, Redis vs Valkey, EC2 vs
  Fargate) and carry those decisions through safely</li><li>Operationally Grounded:
  You’ve run systems in production, handled incidents, and learned from failures</li><li>Security-Aware:
  You design infrastructure with least privilege, network isolation, and secure defaults</li><li>Clear
  Communicator: You explain infrastructure decisions and risk in a way engineers and
  leadership can understand</li></ul><p><strong>Role Responsibilities</strong></p><p><strong>Platform
  &amp; Cloud Infrastructure</strong></p><ul><li>Own and evolve our AWS infrastructure
  across compute, networking, storage, and managed services</li><li>Design and maintain
  infrastructure that supports high availability, predictable performance, and financial
  correctness</li><li>Lead platform-level architectural decisions, including service
  migrations and runtime changes (e.g., Redis → Valkey, EKS → ECS/Fargate)</li><li>Ensure
  infrastructure choices align with reliability, cost, and operational simplicity—not
  just trend adoption</li></ul><p><strong>Deployment, Reliability &amp; Operations</strong></p><ul><li>Design
  and maintain deployment pipelines that are safe, repeatable, and observable</li><li>Own
  system reliability through capacity planning, failure modeling, and controlled change
  management</li><li>Lead incident response and root-cause analysis for infrastructure-level
  failures</li><li>Participate in on-call rotations and continuously improve operational
  ergonomics</li></ul><p><strong>Observability, Security &amp; Governance</strong></p><ul><li>Build
  and maintain strong observability across infrastructure and services (metrics, logs,
  tracing, alerting)</li><li>Ensure secure configuration of AWS resources, IAM policies,
  secrets management, and network boundaries</li><li>Proactively identify infrastructure
  risks related to scale, cost, or security and address them before they become incidents</li></ul><p><strong>Technical
  Leadership &amp; Collaboration</strong></p><ul><li>Partner closely with application
  engineers to ensure platform constraints and capabilities are well understood</li><li>Drive
  infrastructure changes through hands-on implementation</li><li>Establish standards
  and best practices for infrastructure, deployment, and operations as the team grows</li><li>Mentor
  other platform engineers and help raise the overall operational maturity of the
  organization</li></ul><p><strong>Minimum Qualifications</strong></p><ul><li>8+ years
  of experience building and operating production infrastructure in cloud environments</li><li>Deep
  experience with AWS core services (EC2, ECS/EKS, VPC, IAM, RDS, ElastiCache, ALB/NLB,
  CloudWatch, etc.)</li><li>Strong understanding of containerized workloads and orchestration
  tradeoffs</li><li>Proven experience designing systems for high availability, fault
  tolerance, and controlled failure</li><li>Hands-on experience with infrastructure
  as code (Terraform, CloudFormation, or equivalent)</li><li>Demonstrated ability
  to plan and execute infrastructure migrations safely</li><li>Experience debugging
  real production incidents involving networking, scaling, or service degradation</li></ul><p><strong>Preferred
  Qualification</strong></p><ul><li>Experience operating infrastructure for financial
  systems or other high-reliability domains</li><li>Firsthand experience scaling infrastructure
  through periods of rapid growth</li><li>Strong opinions about observability and
  operational hygiene, informed by past failures</li><li>Experience simplifying, retiring,
  or rearchitecting over-engineered infrastructure</li><li>Comfort working closely
  with a Rails-based application stack while remaining tool-agnostic</li></ul><p><strong>Some
  Of Our Benefits:&nbsp;</strong></p><ul><li>Generous PTO and company holiday policy
  + company paid Short Term Disability</li><li>100% employer covered health and dental
  insurance for our direct employees (a set plan is covered, with higher tier healthcare
  coverage available at employee’s additional cost; dependent coverage is at employee’s
  cost); vision plan available at employee’s additional cost</li><li>Child Care Benefits
  and generous parental leave</li></ul><p><strong>Salary</strong>:&nbsp;</p><ul><li>$190,000
  - $200,000, DOE + Benefits</li></ul><p><b><em>inKind is an Equal Opportunity Employer.
  We believe that diversity is vital to inKind''s ability to provide our clients with
  the best recommendations and are committed to fostering a varied and inclusive work
  environment. Your race, color, ancestry, religion, gender, gender identity, national
  origin, sexual orientation, age, marital status, disability status, veteran status,
  or any other protected category have no bearing on our hiring decisions.<br>By submitting
  this application, you acknowledge that inKind Cards, Inc. may share the information
  you provide with trusted third-party service providers, including fraud detection
  and application processing partners, to evaluate your application and ensure the
  integrity of our hiring process. Your information will be handled in accordance
  with our <u>Privacy Policy</u>. For California residents and others with applicable
  rights, please review our privacy notice for information about your rights regarding
  your personal data.</em></b></p>'
description_text: 'Job Title: Senior Platform Engineer Reports to: Director of Engineering
  About the role The Senior Platform Engineer at inKind is responsible for owning,
  evolving, and operating our cloud infrastructure as the foundation of a growing
  financial and hospitality technology platform. This role exists to ensure that our
  systems are secure, reliable, observable, and capable of scaling as both traffic
  and organizational complexity increase. This is a deeply technical, hands-on role
  with real ownership. You will design, implement, and operate our AWS infrastructure;
  make forward-looking decisions about how our platform should evolve; and carry those
  decisions through implementation, migration, and steady-state operation. When the
  platform changes—new AWS services, runtime upgrades, architecture shifts—you are
  ahead of it, not reacting to it. You’ll work closely with application engineers,
  but your focus is the platform itself: compute, networking, data stores, deployment
  workflows, observability, and operational correctness. In a small but growing team,
  this role sets the standard for how infrastructure is designed, changed, and trusted.
  Who you are Infrastructure Owner: You take responsibility for systems in production
  and feel accountable for their behavior over time Systems Thinker: You understand
  how compute, storage, networking, and application behavior interact under real load
  Pragmatic Operator: You know when to modernize, when to migrate, and when stability
  matters more than novelty Infrastructure Decision-Maker: You can evaluate tradeoffs
  (EKS vs ECS, Redis vs Valkey, EC2 vs Fargate) and carry those decisions through
  safely Operationally Grounded: You’ve run systems in production, handled incidents,
  and learned from failures Security-Aware: You design infrastructure with least privilege,
  network isolation, and secure defaults Clear Communicator: You explain infrastructure
  decisions and risk in a way engineers and leadership can understand Role Responsibilities
  Platform &amp; Cloud Infrastructure Own and evolve our AWS infrastructure across
  compute, networking, storage, and managed services Design and maintain infrastructure
  that supports high availability, predictable performance, and financial correctness
  Lead platform-level architectural decisions, including service migrations and runtime
  changes (e.g., Redis → Valkey, EKS → ECS/Fargate) Ensure infrastructure choices
  align with reliability, cost, and operational simplicity—not just trend adoption
  Deployment, Reliability &amp; Operations Design and maintain deployment pipelines
  that are safe, repeatable, and observable Own system reliability through capacity
  planning, failure modeling, and controlled change management Lead incident response
  and root-cause analysis for infrastructure-level failures Participate in on-call
  rotations and continuously improve operational ergonomics Observability, Security
  &amp; Governance Build and maintain strong observability across infrastructure and
  services (metrics, logs, tracing, alerting) Ensure secure configuration of AWS resources,
  IAM policies, secrets management, and network boundaries Proactively identify infrastructure
  risks related to scale, cost, or security and address them before they become incidents
  Technical Leadership &amp; Collaboration Partner closely with application engineers
  to ensure platform constraints and capabilities are well understood Drive infrastructure
  changes through hands-on implementation Establish standards and best practices for
  infrastructure, deployment, and operations as the team grows Mentor other platform
  engineers and help raise the overall operational maturity of the organization Minimum
  Qualifications 8+ years of experience building and operating production infrastructure
  in cloud environments Deep experience with AWS core services (EC2, ECS/EKS, VPC,
  IAM, RDS, ElastiCache, ALB/NLB, CloudWatch, etc.) Strong understanding of containerized
  workloads and orchestration tradeoffs Proven experience designing systems for high
  availability, fault tolerance, and controlled failure Hands-on experience with infrastructure
  as code (Terraform, CloudFormation, or equivalent) Demonstrated ability to plan
  and execute infrastructure migrations safely Experience debugging real production
  incidents involving networking, scaling, or service degradation Preferred Qualification
  Experience operating infrastructure for financial systems or other high-reliability
  domains Firsthand experience scaling infrastructure through periods of rapid growth
  Strong opinions about observability and operational hygiene, informed by past failures
  Experience simplifying, retiring, or rearchitecting over-engineered infrastructure
  Comfort working closely with a Rails-based application stack while remaining tool-agnostic
  Some Of Our Benefits:&nbsp; Generous PTO and company holiday policy + company paid
  Short Term Disability 100% employer covered health and dental insurance for our
  direct employees (a set plan is covered, with higher tier healthcare coverage available
  at employee’s additional cost; dependent coverage is at employee’s cost); vision
  plan available at employee’s additional cost Child Care Benefits and generous parental
  leave Salary :&nbsp; $190,000 - $200,000, DOE + Benefits inKind is an Equal Opportunity
  Employer. We believe that diversity is vital to inKind''s ability to provide our
  clients with the best recommendations and are committed to fostering a varied and
  inclusive work environment. Your race, color, ancestry, religion, gender, gender
  identity, national origin, sexual orientation, age, marital status, disability status,
  veteran status, or any other protected category have no bearing on our hiring decisions.
  By submitting this application, you acknowledge that inKind Cards, Inc. may share
  the information you provide with trusted third-party service providers, including
  fraud detection and application processing partners, to evaluate your application
  and ensure the integrity of our hiring process. Your information will be handled
  in accordance with our Privacy Policy . For California residents and others with
  applicable rights, please review our privacy notice for information about your rights
  regarding your personal data.'
