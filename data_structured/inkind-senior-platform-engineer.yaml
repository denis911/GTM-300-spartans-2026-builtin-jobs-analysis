company_overview: inKind's mission is to support the success of independent restaurants
  and hospitality groups by providing funding and enriching customers' dining experiences
  with the inKind platform. At inKind, we believe restaurants are integral parts of
  our communities, and recognize the economic realities of being a successful operator.
  To better support hospitality ventures, we created a unique funding model that focuses
  on ensuring the success of our partners and providing customers a way to discover
  new restaurants nationwide.
