description_html: <b><strong>About Revic</strong></b><p>Great sellers are the lifeblood
  of every business. They build relationships, understand needs, and close deals that
  drive growth. But too often, they're buried under administrative work, disconnected
  tools, and processes that pull them away from what they do best—selling.</p><p>We
  believe salespeople deserve better. They deserve technology that works for them,
  not against them.</p><p>Revic is an AI-native sales acceleration engine built to
  uplift sales professionals. We handle the complexity—analyzing data, identifying
  opportunities, triggering the right workflows—so reps can focus on the human side
  of sales. The conversations. The relationships. The moments that matter.</p><p>Our
  platform learns what's working, defines who to sell to, and gives reps the context
  they need to move with confidence and precision. It removes the friction that slows
  them down and amplifies their natural strengths.</p><p>Sales will always be human.
  Revic exists to make sure it stays that way—by letting AI handle everything else.</p><b><br><strong>Why
  This Role Exists</strong></b><p>This role exists to turn GTM signal into company-wide
  execution.</p><p>As Revic’s Founding GTM AI Engineer, you will work directly with
  Revic’s CEO, Head of Revenue, and Head of Engineering to design and build the systems
  that translate real customer conversations and GTM data into automated actions across
  the entire organization.</p><p>This role sits at the center of Revic’s operating
  system. You will ensure insights captured in Revic don’t remain trapped in dashboards
  or call recordings, but instead drive real-time responses across GTM, product, and
  engineering.</p><p>This is a foundational, high-impact role. The systems you build
  will influence how decisions are made, how teams prioritize work, and how Revic
  learns and scales.</p><b><br><strong>What You’ll Do</strong></b><p>Build Intelligence-Driven
  Systems</p><ul><li><p>Partner closely with the CEO, Head of Revenue, and Head of
  Engineering to identify high-leverage opportunities for AI-driven automation</p></li><li><p>Design
  systems that continuously analyze Revic data, call recordings, and customer interactions</p></li><li><p>Translate
  insights into automated, organization-wide workflows</p></li></ul><p>Trigger GTM
  Actions Automatically</p><ul><li><p>Use Revic data and conversations to dynamically
  update outbound and inbound messaging</p></li><li><p>Generate GTM content (blogs,
  LinkedIn posts, enablement assets) from real customer language</p></li><li><p>Surface
  emerging objections, value propositions, and buying signals</p></li><li><p>Turn
  customer conversations into living inputs for how Revic positions and sells</p></li></ul><p>Extend
  GTM Signal Beyond GTM</p><ul><li><p>Route insights from sales calls directly into
  product and engineering prioritization</p></li><li><p>Inform feature discovery,
  validation, and roadmap decisions</p></li><li><p>Identify recurring friction, gaps,
  and unmet customer needs</p></li><li><p>Reduce reliance on anecdotal feedback by
  systematizing customer signal</p></li></ul><p>Operate as a Founding Builder</p><ul><li><p>Act
  as a connective layer between GTM, product, and engineering</p></li><li><p>Identify
  where human interpretation slows the organization down and replace it with systems</p></li><li><p>Move
  from idea to prototype to production with urgency and ownership</p></li><li><p>Help
  define how this intelligence layer scales as Revic grows</p></li></ul><p>Own automation
  across three core areas</p><ul><li><p>Outbound &amp; pipeline automation (SDR-like
  agents, targeting, follow-ups)</p></li><li><p>Pre-sales automation (context gathering,
  iteration, deal support)</p></li><li><p>Post-sales &amp; Customer Success automation
  (task creation, updates, workflow handoffs)</p></li></ul><b><br><strong>Why This
  Role Is Critical</strong></b><p>Most companies collect GTM data. Very few operationalize
  it across the organization.</p><p>This role ensures:</p><ul><li><p>Sales insights
  don’t die in call recordings</p></li><li><p>Product and engineering decisions are
  informed by real buyer conversations</p></li><li><p>Messaging evolves automatically
  as the market changes</p></li><li><p>Leadership can act faster with less manual
  synthesis</p></li></ul><p>You are building the connective tissue between customers,
  leadership, and execution.</p><b><br><strong>You belong here if….</strong></b><ul><li><p>You
  think in systems and feedback loops, not one-off automations</p></li><li><p>You
  understand how GTM data can influence every part of a company</p></li><li><p>You’ve
  built workflows or tools that changed how teams operate, not just how they report</p></li><li><p>You’re
  comfortable collaborating directly with executive leadership</p></li><li><p>You
  thrive in ambiguity and are excited to build foundational infrastructure</p></li></ul><b><br><strong>What
  Success Looks Like</strong></b><ul><li><p>GTM data drives decisions across Revic
  automatically</p></li><li><p>Messaging and content evolve continuously based on
  real customer input</p></li><li><p>Engineering priorities reflect structured customer
  signal</p></li><li><p>Leadership operates with faster feedback loops and clearer
  market visibility</p></li></ul><b><br><strong>Logistics &amp; offer</strong></b><p><strong>Competitive
  base</strong> + <strong>meaningful equity</strong> (we're not another 0.001% shop)</p><p><strong>Premium
  health, dental, vision</strong> - we take care of our people</p><p><strong>Location
  -</strong> San Francisco Bay Area | New York City / Metro Area | Remote (US)</p><p><strong>Offsite
  -</strong> We trade slack for sunshine, every quarter we meet in-person</p><p><strong>The
  intangibles:</strong></p><ul><li><p>Work shoulder-to-shoulder with Revic’s leadership
  team</p></li><li><p>Shape how decisions are made across the company</p></li><li><p>Build
  systems that compound in value as Revic scales</p></li><li><p>Learn faster than
  any course could ever teach you — from real data, real users, real stakes.</p></li></ul>
