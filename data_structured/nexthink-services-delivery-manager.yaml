  have over 75 nationalities working with us, from all cultures and backgrounds, speaking
  many different languages. Total Rewards @ Nexthink At Nexthink, we offer one of
  the most comprehensive and generous benefits plans. Your total rewards compensation
  package includes base salary and may also include a commission or performance bonus
  plan. We provide our US employees with 100% covered company benefits that consist
  of health, dental, vision as well as access to life insurance, long-term disability,
  and accidental death/personal loss coverage. In addition, we offer: Flexible Hours
  and unlimited vacation (employees have unlimited paid time off on top of the 15
  days of holidays we offer), 11 company-paid holidays, and 3 extra days for volunteering.
  Hybrid work model that balances office and remote work, with structured onboarding
  to foster connections and team integration. Free access to professional training
  platforms to explore your interests and enhance your skills. Up to 16 weeks of paid
  leave for birthing parents/primary caregivers, 6 weeks for secondary caregivers.
  Plan for the future with a 401(k) plan featuring up to 4% company matching contributions,
  vesting immediately, to grow your retirement savings. Bonuses for referring successful
  hires after three months of continuous employment. Base salary ranges are determined
  by country, role, level, experience, and skills . The range displayed on each job
