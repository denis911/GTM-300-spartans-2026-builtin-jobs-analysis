description_html: 'Base Salary Range: 83000 - 130000<br><b>Company Description</b><br>Nexthink
  is the leader in digital employee experience management software. The company provides
  IT leaders with unprecedented insight allowing them to see, diagnose and fix issues
  at scale impacting employees anywhere, with any application or network, before employees
  notice the issue. As the first solution to allow IT to progress from reactive problem
  solving to proactive optimization, Nexthink enables its more than 1,200 customers
  to provide better digital experiences to more than 15 million employees. Dual headquartered
  in Lausanne, Switzerland and Boston, Massachusetts, Nexthink has 9 offices worldwide.<br><b>Job
  Description</b><br>The SDM manages the delivery of scoped Managed Services to Nexthink
  customers. They play a pivotal role in supporting the customer to realise value
  from the Nexthink platform, and as such will be working closely with the Customer
  Success Manager and the Account Manager to ensure that the Managed Service is aligned
  with the account success plan, and with the value metrics being tracked for the
  customer.<br>The role will coordinate the daily activities of the Managed Services
  team, and oversee the request queue, focusing on the highest priorities and the
  biggest impact to the customer, while providing quality assurance, and delivering
  within the agreed service levels.<br>The role is a combination of technical and
  business skills; having the ability to assess technical requests, troubleshoot platform
  issues, and also to be able to explain the service, how it is supporting the customer
  strategy, and the value to stakeholders at all levels within the customer.<br><strong>Responsibilities</strong><br><ul><li>Act
  a single point of contact for the customer for all managed service elements in scope</li><li>Participate
  in the Customer''s Nexthink steering group meetings</li><li>Advise on and be part
  of the Customer''s governance for Nexthink</li><li>Gather customer''s requirements,
  analyse and provide feedback</li><li>Effectively handle customer requests and priorities</li><li>Understand
  Customer Digital Experience goals, strategic plans and constraints in order to advise
  on the best use of Nexthink</li><li>Conduct analysis of Customer''s Nexthink data
  and provide actionable insights to customers</li><li>Identify and justify automation
  opportunities based on value to the Customer</li><li>Support customer''s initiatives
  on Nexthink areas of operations</li><li>Build content based on customers'' requirements
  and manage and collaborate with the remote MS team for advanced scripting</li><li>Provide
  new insights to integrate Nexthink with existing solutions and internal processes</li><li>Work
  with the CSMs to position Nexthink with customers'' service owners</li><li>Deliver
  service elements against a set of Service Levels</li><li>Identify and deliver against
  agreed use cases</li><li>Work with the Account teams to support the operationalization
  of Nexthink inside the Customer organization</li><li>Prepare weekly, monthly and
  quarterly reporting both internally to the Managed Services'' management and also
  to the customer</li><li>Prepare all customer facing and internal deliverables</li><li>Coordinate
  and communicate about all aspects of the Managed Services activities with other
  teams, such as Sales, Support and Customer Success</li><li>Escalate internally and
  externally when required</li><li>Stay current on product development/releases to
  a level required for the above activities</li></ul><br><b>Qualifications</b><br><ul><li>BA/BS
  preferred in computer science, computer engineering </li><li>Minimum of 5 years
  of experience in technical consulting, analytics &amp; automation</li><li>Demonstrated
  skills in data analysis</li><li>Drive to provide actionable insights and automation</li><li>Experience
  in transformation projects (e.g. Win10, O365)</li><li>Extensive technical knowledge
  of end-user computing</li><li>Collaborative ability to work with dispersed teams,
  such as the CTOs, product management, and support, to get the right solution delivered
  and drive feature innovation gathered from customer input</li><li>Deep knowledge
  of IT operations</li><li>Ability to learn new technologies quickly</li><li>Demonstrated
  ability to collect and manage customer feedback, understand customer pain points,
  and provide viable solutions</li><li>Excellent communication, social awareness,
  customer-facing, and teamwork skills</li><li>Exceptional problem management skills</li><li>Ability
  to handle challenging environments</li><li>Enthusiasm for working in an international,
  collaborative, and fast-paced environment and learning new technologies</li><li>Excellent
  knowledge of Microsoft Windows and Linux clients and their applications</li></ul><br><strong>Preferred:</strong><br><ul><li>Practical
  knowledge of SQL, XML, windows PowerShell,</li><li>Practical experience with data
  integration methods and technologies,</li><li>Relevant software industry experience
  in any of the following: IT systems, enterprise or infrastructure management, application
  development and management, security, and/or analytics.</li></ul><br><b>Additional
  Information</b><br>We are the pioneers and trailblazers of a global IT Market Category
  (DEX) that is shaping the future of how the world works, giving our customers''
  IT Teams total digital visibility across their enterprise. Our innovative solutions
  integrate real-time analytics, automation, and employee feedback across all endpoints.
  This enables our IT teams to solve complex technical challenges, create ever more
  productive workplaces, and deliver happy, satisfied employees in the digital workplace.<br>With
  over 1000 employees across 5 continents, Nexthink operates as One Team, connecting,
  collaborating and innovating to continuously grow. We call our employees ''Nexthinkers''
  and our commitment to diversity, inclusion, and equity is second to none. We currently
  have over 75 nationalities working with us, from all cultures and backgrounds, speaking
  many different languages.<br><strong>Total Rewards @ Nexthink</strong><br>At Nexthink,
  we offer one of the most comprehensive and generous benefits plans.  Your total
  rewards compensation package includes base salary and may also include a commission
  or performance bonus plan.  We provide our US employees with <em><strong>100% covered
  company benefits</strong></em> that consist of health, dental, vision as well as
  access to life insurance, long-term disability, and accidental death/personal loss
  coverage. <br>In addition, we offer: <br><ul><li> Flexible Hours and unlimited vacation
  (employees have unlimited paid time off on top of the 15 days of holidays we offer),
  11 company-paid holidays, and 3 extra days for volunteering.</li><li> Hybrid work
  model that balances office and remote work, with structured onboarding to foster
  connections and team integration.</li><li> Free access to professional training
  platforms to explore your interests and enhance your skills.</li><li> Up to 16 weeks
  of paid leave for birthing parents/primary caregivers, 6 weeks for secondary caregivers.</li><li>
  Plan for the future with a 401(k) plan featuring up to 4% company matching contributions,
  vesting immediately, to grow your retirement savings.</li><li> Bonuses for referring
  successful hires after three months of continuous employment.</li></ul><br><em><strong>Base
  salary ranges are determined by country, role, level, experience, and skills</strong></em>.
  The range displayed on each job posting reflects Nexthink''s good faith determination
  of the minimum and maximum targets for new hire salaries across all US locations.
  Individual pay is determined by related factors, including job skills, experience,
  and relevant education or training, which may impact a final offer. Your Talent
  Acquisition Partner can share more about the specific salary range during the hiring
  process.'
