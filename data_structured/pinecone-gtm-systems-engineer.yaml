  Horowitz, ICONIQ, Menlo Ventures, and Wing Venture Capital. About the Team and Role:
  At Pinecone, we’re building the core infrastructure that powers modern AI applications
  — from semantic search to agentic workflows at scale. Our customers rely on Pinecone
  to ship production-grade AI systems, and our go-to-market engine needs to be just
  as technically sharp. We’re going fully AI-Native, and this role will be the steward
  of it for all of GTM. We’re looking for a GTM Systems Engineer to build and scale
  the technical backbone of Pinecone’s revenue motion. This is a highly impactful
  role sitting at the intersection of Sales, Revenue Operations, Marketing, and Data,
  with a mandate to use AI, automation, and systems design to help our sales teams
  move faster, sell smarter, and scale efficiently. You’ll own how tools, data, and
  AI come together to support pipeline generation, deal execution, forecasting, and
  expansion. This is a builder role for someone who is excited about pioneering the
  new era of GTM with an AI first approach. Responsibilities: Design, build, and optimize
  sales and revenue operations workflows across the full customer lifecycle (lead
  → opportunity → close → expansion). Manage the AI Specialist and GTM Engineering
  teams to support all levels of the strategy you design for GTM. Partner closely
  with Sales, Sales Operations, Marketing, and Data teams to identify bottlenecks
  and translate GTM strategy into scalable technical systems. Apply AI and automation
  (LLMs, agents, APIs, workflows) to improve sales productivity, pipeline quality,
  forecasting accuracy, and deal velocity. Integrate and extend core GTM tools (e.g.
  CRM, enrichment, orchestration, internal tooling) to create a unified, reliable
  sales operating system. Architect and deploy AI-powered prototypes and production
  workflows that proactively eliminate friction in sales processes. Own system reliability,
  data quality, and operational best practices across GTM tooling. Create clear technical
  documentation and enablement materials so teams can confidently use and extend the
  systems you build. Requirements: 6+ years of experience in Sales Operations, Data,
  Marketing, Revenue Operations, or GTM Systems at a high-growth SaaS or developer-focused
  company. Deep, hands-on expertise with Salesforce (and related sales tooling); experience
  with marketing tools is a plus but not the focus. Experience with automation and
  data orchestration platforms (e.g. Workato, Clay, custom pipelines). Proven track
  record of applying AI and advanced automation to real GTM or sales problems (LLMs,
  RAG, prompt engineering, agents). Strong proficiency in Python or JavaScript/TypeScript
  for building integrations, automation, and internal tools. Strong analytical instincts
  and comfort working directly with GTM data (SQL and/or BI tools are a plus). Ability
  to clearly communicate complex technical ideas to sales leaders and non-technical
  stakeholders. A builder’s mindset: pragmatic, systems-oriented, and biased toward
  shipping solutions that scale. Comfort operating in ambiguity and shaping the role
  as Pinecone’s GTM motion evolves. Perks &amp; Benefits: Comprehensive health coverage
  including medical, dental, vision, and mental health resources 401(k) Plan Equity
  award Flexible time off Paid parental leave Annual Company Retreat WFH Equipment
  Stipend All qualified applicants will receive considerations for employment without
  regard to race, color, religion, sex, age, disability, marital status, familial
  status, sexual orientation, pregnancy, gender identity, gender expression, national
  origin, ancestry, citizenship status, veteran status, and any other legally protected
  status under federal, state, or local anti-discrimination laws.'
