description_html: '<p><strong><u>About Pinecone</u></strong></p><p>Pinecone is the
  leading vector database for building accurate and performant AI applications at
  scale in production. Pinecone''s mission is to make AI knowledgeable. More than
  9000 customers across various industries have shipped AI applications faster and
  more confidently with Pinecone''s developer-friendly technology. Pinecone is based
  in New York and raised $138M in funding from Andreessen Horowitz, ICONIQ, Menlo
  Ventures, and Wing Venture Capital.</p><p><strong><u>About the Team and Role:</u></strong></p><p>At
  Pinecone, we’re building the core infrastructure that powers modern AI applications
  — from semantic search to agentic workflows at scale. Our customers rely on Pinecone
  to ship production-grade AI systems, and our go-to-market engine needs to be just
  as technically sharp. We’re going fully AI-Native, and this role will be the steward
  of it for all of GTM.</p><p>We’re looking for a GTM Systems Engineer to build and
  scale the technical backbone of Pinecone’s revenue motion. This is a highly impactful
  role sitting at the intersection of Sales, Revenue Operations, Marketing, and Data,
  with a mandate to use AI, automation, and systems design to help our sales teams
  move faster, sell smarter, and scale efficiently.</p><p>You’ll own how tools, data,
  and AI come together to support pipeline generation, deal execution, forecasting,
  and expansion. This is a builder role for someone who is excited about pioneering
  the new era of GTM with an AI first approach.</p><p><strong><u>Responsibilities:</u></strong></p><ul><li><p>Design,
  build, and optimize sales and revenue operations workflows across the full customer
  lifecycle (lead → opportunity → close → expansion).</p></li><li><p>Manage the AI
  Specialist and GTM Engineering teams to support all levels of the strategy you design
  for GTM.</p></li><li><p>Partner closely with Sales, Sales Operations, Marketing,
  and Data teams to identify bottlenecks and translate GTM strategy into scalable
  technical systems.</p></li><li><p>Apply AI and automation (LLMs, agents, APIs, workflows)
  to improve sales productivity, pipeline quality, forecasting accuracy, and deal
  velocity.</p></li><li><p>Integrate and extend core GTM tools (e.g. CRM, enrichment,
  orchestration, internal tooling) to create a unified, reliable sales operating system.</p></li><li><p>Architect
  and deploy AI-powered prototypes and production workflows that proactively eliminate
  friction in sales processes.</p></li><li><p>Own system reliability, data quality,
  and operational best practices across GTM tooling.</p></li><li><p>Create clear technical
  documentation and enablement materials so teams can confidently use and extend the
  systems you build.</p></li></ul><p><u> </u><strong><u>Requirements:</u></strong></p><ul><li><p>6+
  years of experience in Sales Operations, Data, Marketing, Revenue Operations, or
  GTM Systems at a high-growth SaaS or developer-focused company.</p></li><li><p>Deep,
  hands-on expertise with Salesforce (and related sales tooling); experience with
  marketing tools is a plus but not the focus.</p></li><li><p>Experience with automation
  and data orchestration platforms (e.g. Workato, Clay, custom pipelines).</p></li><li><p>Proven
  track record of applying AI and advanced automation to real GTM or sales problems
  (LLMs, RAG, prompt engineering, agents).</p></li><li><p>Strong proficiency in Python
  or JavaScript/TypeScript for building integrations, automation, and internal tools.</p></li><li><p>Strong
  analytical instincts and comfort working directly with GTM data (SQL and/or BI tools
  are a plus).</p></li><li><p>Ability to clearly communicate complex technical ideas
  to sales leaders and non-technical stakeholders.</p></li><li><p>A builder’s mindset:
  pragmatic, systems-oriented, and biased toward shipping solutions that scale.</p></li><li><p>Comfort
  operating in ambiguity and shaping the role as Pinecone’s GTM motion evolves.</p></li></ul><p><strong><u>Perks
  &amp; Benefits:</u></strong></p><ul><li><p>Comprehensive health coverage including
  medical, dental, vision, and mental health resources</p></li><li><p>401(k) Plan</p></li><li><p>Equity
  award</p></li><li><p>Flexible time off</p></li><li><p>Paid parental leave</p></li><li><p>Annual
  Company Retreat</p></li><li><p>WFH Equipment Stipend</p></li></ul><p>All qualified
  applicants will receive considerations for employment without regard to race, color,
  religion, sex, age, disability, marital status, familial status, sexual orientation,
  pregnancy, gender identity, gender expression, national origin, ancestry, citizenship
  status, veteran status, and any other legally protected status under federal, state,
  or local anti-discrimination laws.</p>'
