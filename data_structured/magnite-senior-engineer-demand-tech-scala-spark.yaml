description_html: '<p><b><b>Senior Software Engineer, Demand Tech</b></b></p><p><b><b>Boston,
  MA</b></b></p><p><b><b>Hybrid Schedule (M/F remote, T/W/TH in-office)</b></b></p><p><span>At
  Magnite, we cultivate an environment of continuous growth and collaboration. Our
  work impacts what millions of people read, watch, and buy, and we’re looking for
  people to help us tackle that responsibility with creativity and focus. Magnite
  (NASDAQ: MGNI) is the world’s largest independent sell-side advertising platform.
  Publishers use our technology to monetize their content across all screens and formats
  including CTV / streaming, online video, display, and audio.&nbsp;</span></p><p><b><b>About
  this team:</b></b></p><p><span>Our team specializes in building traffic-shaping
  technology to prioritize the highest-value ad requests at scale. With over 1 trillion
  daily transactions, a 1% improvement in ad request prioritization impacts 10+ billion
  transactions daily.</span></p><p><b><b>In this role, you will:</b></b></p><ul><li><p><span>Develop
  large-scale distributed systems and solve deep technical and mathematical challenges</span></p></li><li><p><span>Solve
  for large-scale data analysis</span></p></li><li><p><span>Solve problems involving
  complex mathematical algorithms to optimise traffic consumption</span></p></li><li><p><span>Develop
  high-performance software and write optimised, low-latency software that routes
  high volumes of ad request traffic and targets p99 latencies &lt;= 20ms while maximising
  throughput</span></p></li><li><p><span>Cost optimisation: improving profit margins
  by lowering the infrastructure cost basis to optimise traffic</span></p></li></ul><p><b><b>We''re
  looking for someone with:</b></b></p><ul><li><p><span>4+ years of software development
  experience, and a BS/MS Computer Science or equivalent work experience.</span></p></li><li><p><span>A
  hunger to learn while working with a sense of urgency. We strive to improve and
  operate at a high level while maintaining development velocity. It is not uncommon
  for our team to perform multiple high-impact deployments throughout the course of
  a day.</span></p></li><li><p><span>A desire for ownership. We are responsible for
  the entire software development lifecycle, from requirements gathering to production
  support. Joining the On-Call rotation for our applications is a requirement.</span></p></li></ul><p><b><b>It
  would also be beneficial if you had:</b></b></p><ul><li><p><span>The ability to
  engage in critical and creative thinking. We expect engineers to present and debate
  tradeoffs to solve the problems we face</span></p></li><li><p><span>An openness
  to working with the functional programming (FP) paradigm. We attempt to pragmatically
  apply FP principles where applicable and expect you will too</span></p></li><li><p><span>Experience
  in designing and implementing high-quality applications, preferably with Scala and
  Spark.</span></p></li><li><p><span>Familiarity with Kubernetes and other CNCF projects
  like Prometheus, Argo, helm, etc. are a plus</span></p></li></ul><p><b><b>Our current
  tech stack:</b></b></p><ul><li><p><span>Scala for core application development</span></p></li><li><p><span>Spark
  Structured Streaming, Kafka, Kubernetes, Airflow, Argo Workflows</span></p></li><li><p><span>Combination
  of Terraform, Helm, and Argo for Cloud-based Kubernetes deployments</span></p></li></ul><p><b><b>Comprehensive
  Perks and Benefits</b><span>:&nbsp;</span></b></p><ul><li><p><span>Superb Healthcare
  Coverage for You and Your Family from Day One</span></p></li><li><p><span>Generous
  Time Off&nbsp;&nbsp;</span></p></li><li><p><span>Holiday Breaks, Summer Fridays,
  and Quarterly Mental Health Days</span></p></li><li><p><span>Equity and Employee
  Stock Purchase Plan</span></p></li><li><p><span>Family-Focused Benefits and Parental
  Leave&nbsp;</span></p></li><li><p><span>401k Retirement Savings Plan with Employer
  Match</span></p></li><li><p><span>Cell Phone Subsidy</span></p></li><li><p><span>Fitness
  and Wellness Reimbursement</span></p></li></ul><p><b><b>Company Culture:&nbsp;</b></b></p><p><span>We
  believe collaboration is essential to success. Magnite’s hybrid schedule includes
  two days worked remotely (Monday and Friday) and three days on-site (Tuesday, Wednesday
  and Thursday). Our offices provide catered lunches, beverages, snacks, training
  and development, and office events to support your work week.&nbsp; We also understand
  you have appointments, families, hobbies, and other commitments. Magnite strives
  to maintain a healthy work/life integration for all employees so you can bring your
  best every day - both at work and at home.</span></p><ul><li><p><span>Community
  Service and Volunteer Events</span></p></li><li><p><span>Company-Matched Charitable
  Contributions</span></p></li><li><p><span>Wellness Coach and Mental Health Support</span></p></li><li><p><span>Career
  Development Initiatives and a Career Growth Framework</span></p></li><li><p><span>Culture
  and Inclusion Programs</span></p></li><li><p><span>Bonusly Peer-to-Peer Recognition
  Program</span></p></li></ul><p><b><b>About Us</b></b></p><p><span>The world''s leading
  agencies and brands trust our platform to access brand-safe, high-quality ad inventory
  and execute billions of advertising transactions each month. Anchored in bustling
  New York City, sunny Los Angeles, mile-high Denver, historic London, and down under
  in Sydney, Magnite has offices across North America, EMEA, LATAM, and APAC.</span></p><p><span>The
  base salary range for this position, across all United States geographies, is $140,000
  - $160,000 per year. The upper portion of the salary range is typically reserved
  for existing employees who demonstrate strong performance over time. This position
  is also eligible for annual bonus and company equity.</span></p><p><i>Magnite is
  an Equal Opportunity Employer and does not discriminate against applicants due to
  race, color, religion, national origin, age, sex, marital status, ancestry, physical
  or mental disability, veteran status, gender identity, sexual orientation or any
  other federal, state or local protected class.</i></p><p><i>Our Commitment: We aim
  to incorporate a wide range of voices into our Magnite culture, cultivating an environment
  where employees feel welcomed, cared for, and encouraged to freely share ideas.
  We are committed to employee growth, collaboration, inclusion, and innovation.&nbsp;
  We invest in Magnite’s local communities. We seek talent from all backgrounds to
  champion corporate values of seeing the big picture and being catalysts of change.</i><b><i>&nbsp;</i></b></p><p><b><b>Want
  to learn more about us?</b><span>&nbsp;&nbsp;</span></b></p><p><b><span>Check out
  our </span><u>blog</u><span> for Magnite announcements and Ad Tech industry news!&nbsp;</span></b></p><p><b><b>Recruiting
  Agency Notice</b></b></p><p><span>Magnite does not accept agency resumes and is
  not responsible for any fees related to unsolicited resumes. </span></p>'
