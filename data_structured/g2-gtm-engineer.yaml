  GTM strategy, or growth—preferably in B2B SaaS Demonstrated success deploying AI
  into GTM workflows (lead scoring, pipeline insights, AI summaries, outbound triggers,
  etc.) Hands-on experience with GenAI and automation tools (e.g., GPT-4, Claude,
  Zapier, Clay, Airtable, Notion) Strong data literacy across Salesforce, Snowflake,
  Looker, and/or equivalent platforms Cross-functional operator who collaborates with
  Sales, CS, and Marketing—not just for them Bias for speed: quick iteration, hypothesis
  testing, and continuous learning Our Commitment to Inclusivity and Diversity At
