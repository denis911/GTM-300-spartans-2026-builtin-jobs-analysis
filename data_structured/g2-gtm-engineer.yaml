description_html: '<p><strong>About G2 - The Company</strong><br></p><p>G2 is the
  world''s largest and most trusted software marketplace. When you join G2, you’re
  joining the industry’s leading team that helps businesses reach their peak potential
  by powering decisions and strategies with trusted insights from real software users.</p><p></p><p>Now,
  we have joined forces with <u>Capterra</u>, <u>SoftwareAdvice</u>, and <u>GetApp</u>
  to create the largest source of online data and software insights to fuel intelligent
  buying in the age of AI. With 200M+ combined annual visitors and 6M verified reviews,
  we are now the centralized place to enable software buyers to make better and faster
  decisions with confidence.</p><p></p><p>And we are just getting started! We are
  setting out to transform the global B2B software industry and become the most trusted
  data foundation for buyers and sellers of software for the age of AI.</p><p></p><p>Does
  that sound exciting to you? Come join us as we try to reach our next PEAK!</p><p></p><p><strong>About
  G2 - Our People</strong></p><p></p><p>At G2, everything we are and what we do is
  grounded in our  PEAK values— (<em>P</em>erformance + <em>E</em>ntrepreneurship
  + <em>A</em>uthenticity + <em>K</em>indness. Working at G2 means you are part of
  a value-driven, growing global community that climbs PEAKs together. We cheer for
  each other’s successes, learn from our mistakes, and support and lean on one another
  during challenging times. With ambition and entrepreneurial spirit we push each
  other to take on challenging work, which will help us all to grow and learn.</p><p></p><p>You
  will be part of a global, diverse team of smart, dedicated, and kind individuals
  - each with unique talents, aspirations, and life experiences. At the heart of our
  community and culture are our people-led ERGs, which celebrate and highlight the
  diverse identities of our global team. As an organization, we are intentional about
  our <u>DEI</u> and philanthropic work (like our <u>G2 Gives</u> program) because
  it encourages us all to be better people.</p><p></p><b>About The Role</b><p>At G2,
  our mission is to make the go-to-market (GTM) engine faster, smarter, and more personalized—powered
  by AI. We’re looking for a hands-on strategist and builder, not an “AI visionary.”
  As G2’s first GTM AI Engineer, you’ll partner with our Revenue, Marketing, and CS
  teams to identify high-impact use cases, prototype AI-powered workflows, and operationalize
  what works.</p><p>This role sits at the heart of how G2 modernizes GTM—bridging
  planning in Piper with execution in Salesforce, Salesloft, G2 Intent, and Slack.
  You’ll shape AI adoption across the GTM motion: high visibility, high impact, and
  high autonomy</p><p></p><b>In This Role, You Will:&nbsp;</b><ul><li><p>&nbsp;<strong>Map
  GTM bottlenecks:</strong> Partner with RevOps, Sales, Marketing, and CS to identify
  where AI can reduce manual effort, increase speed, or improve targeting.</p></li><li><p><strong>Prototype
  fast:</strong> Use GPT-4, Claude, Zapier, Clay, Hex, Notion, and similar tools to
  quickly ship working workflows.</p></li><li><p><strong>Run pilots:</strong> Deploy
  in-field with SDRs, AEs, and CSMs. Shadow, iterate, and learn.</p></li><li><p><strong>Measure
  ROI:</strong> Quantify hours saved, pipeline influenced, and conversion lifts.</p></li><li><p><strong>Operationalize
  workflows:</strong> Document and transition working flows to GTM Systems, Enablement,
  or Marketing Ops for scale.</p></li></ul><b><strong>Key Impact Areas</strong></b><ul><li><p><strong>Translate
  GTM strategy into execution:</strong> Operationalize Piper artifacts into real-time
  workflows that drive pipeline growth and faster prospect follow-up.</p></li><li><p><strong>Deploy
  self-serve AI tools:</strong> Launch Slack-triggered workflows that reduce prep/admin
  time by 25–40% and dynamically prioritize accounts.</p></li><li><p><strong>Automate
  connected workflows:</strong> Improve hand-offs across Salesforce, Salesloft, Gong,
  and G2 Intent, cutting time-to-action by 20–30%.</p></li><li><p><strong>Partner
  across functions:</strong> Increase adoption of GTM tools by 60–80% by aligning
  AI workflows with how reps and CSMs actually work.</p></li><li><p><strong>Benchmark
  against best-in-class:</strong> Build internal orchestration modeled on leading
  GTM platforms like Qualified.</p></li></ul><p></p><b>Minimum Qualifications:</b><p>We
  realize applying for jobs can feel daunting at times. Even if you don’t check all
  the boxes in the job description, we encourage you to apply anyway.&nbsp;</p><ul><li><p>&nbsp;3–5+
  years in RevOps, GTM strategy, or growth—preferably in B2B SaaS</p></li><li><p>Demonstrated
  success deploying AI into GTM workflows (lead scoring, pipeline insights, AI summaries,
  outbound triggers, etc.)</p></li><li><p>Hands-on experience with GenAI and automation
  tools (e.g., GPT-4, Claude, Zapier, Clay, Airtable, Notion)</p></li><li><p>Strong
  data literacy across Salesforce, Snowflake, Looker, and/or equivalent platforms</p></li><li><p>Cross-functional
  operator who collaborates with Sales, CS, and Marketing—not just for them</p></li><li><p>Bias
  for speed: quick iteration, hypothesis testing, and continuous learning</p></li></ul><p></p><p><strong>Our
  Commitment to Inclusivity and Diversity</strong></p><p></p><p>At G2, we are committed
  to creating an inclusive and diverse environment where people of every background
  can thrive and feel welcome. We consider applicants without regard to race, color,
  creed, religion, national origin, genetic information, gender identity or expression,
  sexual orientation, pregnancy, age, or marital, veteran, or physical or mental disability
  status. Learn more about our commitments <u>here</u>.&nbsp;</p><p></p><p>--</p><p><br>For
  job applicants in California, the United Kingdom, and the European Union, please
  review <u>this applicant privacy notice</u> before applying to this job.</p><p></p><p><strong>How
  We Use AI Technology in Our Hiring Process</strong><br>G2 incorporates AI-powered
  technology to enhance our candidate evaluation process. These tools may assist with
  initial application screening, skills assessment analysis, and identifying candidates
  whose qualifications align with specific role requirements. While AI technology
  supports our recruitment workflow, all final hiring decisions remain under human
  oversight and judgment.<br></p><p><strong>Your Choice Matters:</strong> If you would
  prefer that your application be reviewed without AI assistance, you can opt out
  by entering your email address in the email entry field at the bottom of the Automated
  Processing Legal Notice. Choosing to opt out will not disadvantage your application
  in any way—we will ensure your materials receive a thorough manual review by our
  hiring team.<br>For additional details about how we handle your information throughout
  the application process, please review G2''s Applicant Privacy Notice.</p>'
