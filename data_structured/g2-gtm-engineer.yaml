company_overview: G2 is the world's largest and most trusted software marketplace
  and source of data in the age of AI. More than 100 million people annually — including
  employees at all Fortune 500 companies — use G2 to make smarter software decisions
  based on authentic peer reviews. Thousands of software and services companies of
  all sizes partner with G2 to build their reputation, manage their software spend,
  and grow their business — including Salesforce, HubSpot, Zoom, and Adobe.G2 is democratizing
  software, disrupting the traditional analyst model, and building trust by showcasing
  the authentic voice of millions of software buyers. When you choose software based
  on the experiences of people just like you, you can reach your true potential.We’re
  proud that over 60% of the Forbes Cloud 100 are G2 customers. And we’re even prouder
  to partner with them on building their reputation, managing their software spend,
  gaining valuable software insights, and growing their business.
