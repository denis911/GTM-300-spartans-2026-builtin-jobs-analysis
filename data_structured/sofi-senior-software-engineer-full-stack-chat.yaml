description_html: '<p><p><strong>Employee Applicant Privacy Notice</strong></p><p><strong>Who
  we are:</strong></p><p><p>Shape a brighter financial future with us.</p><p>Together
  with our members, we’re changing the way people think about and interact with personal
  finance.</p><p>We’re a next-generation financial services company and national bank
  using innovative, mobile-first technology to help our millions of members reach
  their goals. The industry is going through an unprecedented transformation, and
  we’re at the forefront. We’re proud to come to work every day knowing that what
  we do has a direct impact on people’s lives, with our core values guiding us every
  step of the way. <strong>Join us to invest in yourself, your career, and the financial
  world.</strong></p></p></p><p><strong>The Role:</strong></p><p>We are seeking a
  <em>Senior Full-Stack Software Engineer to join the Chat engineering</em> team at
  SoFi. This team will play a pivotal role in supporting our members'' financial journeys
  by developing an intelligent, conversational AI-powered chat interface. This system
  will help streamline support queries from members and provide personalized financial
  insights and guidance. Chat is a critical component of how members interact with
  SoFi and building it will require a thoughtful approach to UI and product experience.&nbsp;&nbsp;</p><p>You
  will have a high degree of ownership and be involved in the entire product life
  cycle. We are looking for someone who can take accountability for both the code
  and finished product. At SoFi, we pride ourselves on the collaboration between Product,
  Design and Engineering and so you will be involved in the entire product lifecycle,
  from ideation through building, deploying and continual improvement and evolution.&nbsp;
  We also pride ourselves on a philosophy of continuous learning, and you should likewise
  be committed to furthering your own career growth as well as to providing mentorship
  for your fellow team members.&nbsp;</p><p><strong>What you’ll do:</strong></p><ul><li>Development,
  testing and deployment of software systems</li><li>Drive technical architecture,
  design decisions and cross-functional discussions for the product</li><li>Mentor
  other engineers, support the technical culture, and help grow the team</li><li>Actively
  participate in reviews to ensure code quality, efficiency, and adherence to best
  practices</li><li>Generate ideas for new initiatives and technologies</li><li>Help
  translate product requirements into technical solutions</li><li>Communicate with
  project leads, product managers and other software developers</li><li>Adapt existing
  practices, processes and frameworks to deliver tasks</li><li>Collaborate with peers
  as well as cross functional teams to coordinate and deliver projects&nbsp;</li><li>Take
  initiative and produce timely results in a fast-paced and sometimes ambiguous environment</li></ul><p><strong>What
  you’ll need:</strong></p><ul><li>Bachelor’s Degree, ideally in a technical field,
  but we understand great engineers come from all sorts of different backgrounds and
  also consider relevant work experience</li><li>4+ years programming experience including
  Full stack experience with React/Typescript and Kotlin/ Java</li><li>Our core stack
  is React / Kotlin / Spring / PostgreSQL, and we run on Kubernetes in a service oriented
  architecture with over 100 services in production.&nbsp;</li><ul><li>You should
  have 2+ years, Java or Kotlin programming experience&nbsp;</li><li>You should have
  a good understanding of relational databases&nbsp;</li><li>You should have 2+ years
  of experience building React based web applications</li></ul><li>Experience working
  in a collaborative coding environment, refining designs together, working through
  code reviews and managing pull requests</li><li>Pragmatic approach towards handling
  tech debt versus shipping new features</li></ul><br><p><strong>Nice to have:</strong></p><ul><li>Experience
  building LLM based applications&nbsp;</li><li>Experience scaling highly available,
  mission critical systems</li></ul><p><p><strong>Compensation and Benefits</strong></p><p>The
  base pay range for this role is listed below. Final base pay offer will be determined
  based on individual factors such as the candidate’s experience, skills, and location.&nbsp;</p><p>&nbsp;</p><p>To
  view all of our comprehensive&nbsp;and competitive&nbsp;benefits, visit our&nbsp;<strong>Benefits
  at SoFi&nbsp;</strong>page!</p><b><span>SoFi provides equal employment opportunities
  (EEO) to all employees and applicants for employment without regard to race, color,
  religion (including religious dress and grooming practices), sex (including pregnancy,
  childbirth and related medical conditions, breastfeeding, and conditions related
  to breastfeeding), gender, gender identity, gender expression, national origin,
  ancestry, age (40 or over), physical or medical disability, medical condition, marital
  status, registered domestic partner status, sexual orientation, genetic information,
  military and/or veteran status, or any other basis prohibited by applicable state
  or federal law.</span></b><b><span>The Company hires the best qualified candidate
  for the job, without regard to protected characteristics.</span></b><b><span>Pursuant
  to the San Francisco Fair Chance Ordinance, we will consider for employment qualified
  applicants with arrest and conviction records.</span></b><b><span>New York applicants:
  Notice of Employee Rights</span></b><b><span>SoFi is committed to an inclusive culture.
  As part of this commitment, </span><span>SoFi </span><span>offers reasonable accommodations
  to candidates with physical or mental disabilities. If you need accommodations to
  participate in the job application or interview process, please let your recruiter
  know or email </span>accommodations@sofi.com.</b><b><span>Due to insurance coverage
  issues, we are unable to accommodate remote work from Hawaii or Alaska at this time.</span></b><p><strong>Internal
  Employees</strong></p><p>If you are a current employee, do not apply here - please
  navigate to our Internal Job Board in Greenhouse to apply to our open roles.</p></p>'
description_text: 'Employee Applicant Privacy Notice Who we are: Shape a brighter
  financial future with us. Together with our members, we’re changing the way people
  think about and interact with personal finance. We’re a next-generation financial
  services company and national bank using innovative, mobile-first technology to
  help our millions of members reach their goals. The industry is going through an
  unprecedented transformation, and we’re at the forefront. We’re proud to come to
  work every day knowing that what we do has a direct impact on people’s lives, with
  our core values guiding us every step of the way. Join us to invest in yourself,
  your career, and the financial world. The Role: We are seeking a Senior Full-Stack
  Software Engineer to join the Chat engineering team at SoFi. This team will play
  a pivotal role in supporting our members'' financial journeys by developing an intelligent,
  conversational AI-powered chat interface. This system will help streamline support
  queries from members and provide personalized financial insights and guidance. Chat
  is a critical component of how members interact with SoFi and building it will require
  a thoughtful approach to UI and product experience.&nbsp;&nbsp; You will have a
  high degree of ownership and be involved in the entire product life cycle. We are
  looking for someone who can take accountability for both the code and finished product.
  At SoFi, we pride ourselves on the collaboration between Product, Design and Engineering
  and so you will be involved in the entire product lifecycle, from ideation through
  building, deploying and continual improvement and evolution.&nbsp; We also pride
  ourselves on a philosophy of continuous learning, and you should likewise be committed
  to furthering your own career growth as well as to providing mentorship for your
  fellow team members.&nbsp; What you’ll do: Development, testing and deployment of
  software systems Drive technical architecture, design decisions and cross-functional
  discussions for the product Mentor other engineers, support the technical culture,
  and help grow the team Actively participate in reviews to ensure code quality, efficiency,
  and adherence to best practices Generate ideas for new initiatives and technologies
  Help translate product requirements into technical solutions Communicate with project
  leads, product managers and other software developers Adapt existing practices,
  processes and frameworks to deliver tasks Collaborate with peers as well as cross
  functional teams to coordinate and deliver projects&nbsp; Take initiative and produce
  timely results in a fast-paced and sometimes ambiguous environment What you’ll need:
  Bachelor’s Degree, ideally in a technical field, but we understand great engineers
  come from all sorts of different backgrounds and also consider relevant work experience
  4+ years programming experience including Full stack experience with React/Typescript
  and Kotlin/ Java Our core stack is React / Kotlin / Spring / PostgreSQL, and we
  run on Kubernetes in a service oriented architecture with over 100 services in production.&nbsp;
  You should have 2+ years, Java or Kotlin programming experience&nbsp; You should
  have a good understanding of relational databases&nbsp; You should have 2+ years
  of experience building React based web applications Experience working in a collaborative
  coding environment, refining designs together, working through code reviews and
  managing pull requests Pragmatic approach towards handling tech debt versus shipping
  new features Nice to have: Experience building LLM based applications&nbsp; Experience
  scaling highly available, mission critical systems Compensation and Benefits The
  base pay range for this role is listed below. Final base pay offer will be determined
  based on individual factors such as the candidate’s experience, skills, and location.&nbsp;
  &nbsp; To view all of our comprehensive&nbsp;and competitive&nbsp;benefits, visit
  our&nbsp; Benefits at SoFi&nbsp; page! SoFi provides equal employment opportunities
  (EEO) to all employees and applicants for employment without regard to race, color,
  religion (including religious dress and grooming practices), sex (including pregnancy,
  childbirth and related medical conditions, breastfeeding, and conditions related
  to breastfeeding), gender, gender identity, gender expression, national origin,
  ancestry, age (40 or over), physical or medical disability, medical condition, marital
  status, registered domestic partner status, sexual orientation, genetic information,
  military and/or veteran status, or any other basis prohibited by applicable state
  or federal law. The Company hires the best qualified candidate for the job, without
  regard to protected characteristics. Pursuant to the San Francisco Fair Chance Ordinance,
  we will consider for employment qualified applicants with arrest and conviction
  records. New York applicants: Notice of Employee Rights SoFi is committed to an
  inclusive culture. As part of this commitment, SoFi offers reasonable accommodations
  to candidates with physical or mental disabilities. If you need accommodations to
  participate in the job application or interview process, please let your recruiter
  know or email accommodations@sofi.com. Due to insurance coverage issues, we are
  unable to accommodate remote work from Hawaii or Alaska at this time. Internal Employees
  If you are a current employee, do not apply here - please navigate to our Internal
  Job Board in Greenhouse to apply to our open roles.'
