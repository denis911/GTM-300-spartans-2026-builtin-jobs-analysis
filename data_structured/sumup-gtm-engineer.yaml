description_html: '<b>About SumUp</b><p>We believe in the everyday hero. Those who
  have the courage to follow their passion and who have the strength and determination
  to realise their dreams.</p><p>Small business owners are at the heart of all we
  do, so we''re creating powerful, easy-to-use financial solutions to help them run
  their businesses. With a founder’s mentality and a ''team-first’ attitude, our diverse
  teams across Europe, South America and the United States work together to ensure
  that small business owners can be successful doing what they love.</p><p><strong>The
  Role&nbsp;</strong><strong><br></strong>As a Growth Manager / GTM Engineer, you’ll
  play a key role in scaling SumUp’s outbound sales motion. Your focus will be on
  implementing our outbound strategy and generating high-quality sales-qualified leads
  across multiple channels.</p><p>You’ll execute, analyse, and optimise AI-powered
  SDR campaigns, craft engaging messaging for target audiences, and support the creation
  of marketing materials. By partnering closely with our sales team, you’ll provide
  feedback on lead quality and ensure a seamless handover process.</p><p>This is a
  high-impact role where you’ll drive continuous testing and optimisation of automated
  outbound campaigns to maximise conversion rates and help us reach ambitious growth
  goals.</p><p><strong>What you’ll do</strong></p><ul><li>Launch, monitor, and optimise
  outbound campaigns across different channels&nbsp;</li><li>Generate and qualify
  high-quality leads, ensuring a steady flow of opportunities for our Sales team</li><li>Develop
  compelling messaging and content to drive reply and engagement rates</li><li>Work
  with SDRs and AEs to improve list quality, monitor conversion rates, and share actionable
  insights</li><li>Test and iterate campaigns regularly to boost performance and increase
  automation across core markets</li><li>Support the Outbound Growth Lead in reporting,
  analysis, and process improvement</li><li>Track and report on SQL generation, opportunity
  creation, conversion ratios and closed revenue impact</li></ul><p><strong>You’ll
  be great for this role if you have</strong></p><ul><li>3+ years of experience in
  outbound sales or marketing automation<br>Hands-on experience with Sales Engagement
  platforms (e.g. Clay, Artisan, Apollo.io)</li><li>Knowledge of automation tools
  (Make, Zapier, N8N, or similar)</li><li>Strong copywriting and A/B testing skills
  to optimise messaging</li><li>A proven track record of hitting or exceeding outbound
  targets</li><li>Strong analytical and problem-solving skills, with the ability to
  use data to uncover new lead opportunities</li><li>Excellent communication skills
  and the ability to work with cross-functional teams</li><li>Comfort with ambiguity
  and a growth mindset to thrive in a fast-changing environment</li></ul><br><b>🇬🇧
  Why you should join SumUp (London)</b><ul><li>🌎 Opportunity to work with a truly
  global, multicultural team from our central Covent Garden location, wrapped in historic
  charm and modern flair.&nbsp;</li><li>🌈 Commitment to Diversity and Inclusion: be
  part of a workplace that values and promotes diversity, fostering an inclusive environment
  where everyone''s perspectives are respected and embraced</li><li>🚀 Enrolment onto
  our VSOP program: you will own a stake in SumUp’s future success</li><li>🏖 Generous
  time off: enjoy 28 days of paid leave, plus bank holidays and special leaves</li><li>🏥
  Health matters: Vitality health cover, including optical and dental</li><li>🚗 Life
  made easier: salary-sacrifice commuter benefits via Gogeta</li><li>💼 Financial security:
  retirement scheme (SumUp matches 7% when you contribute 5%)</li><li>🛡 Peace of mind:
  life insurance from MetLife for 2× your salary</li><li>🌴 Break4me: 1-month sabbatical
  after 3 years of service🔗 Referral Bonus: earn additional rewards by referring talented
  individuals to join the SumUp team</li></ul><p>At SumUp, we’re on a mission to empower
  small businesses around the world with simple, affordable tools to help them start,
  run, and grow. More than 4 million merchants across 36 markets trust us as their
  financial partner — and we’re just getting started.</p><p>We’re a global team of
  3,000+ people from over 90 nationalities, united by curiosity, collaboration, and
  care. Our&nbsp;core values<span>Opens in new window</span>&nbsp;and&nbsp;culture<span>Opens
  in new window</span>&nbsp;shape everything we do, fostering inclusion, learning,
  and belonging.</p><p>SumUp is proud to be an Equal Employment Opportunity employer,
  committed to building a safe, respectful, and diverse workplace where everyone can
  thrive.</p><p>👉 Explore more about our culture on our&nbsp;careers site, or follow
  us on&nbsp;LinkedIn<span>Opens in new window</span>&nbsp;and&nbsp;Instagram<span>Opens
  in new window</span>.</p><p><strong>Job Application Tip</strong></p><p>We recognise
  that candidates feel they need to meet 100% of the job criteria in order to apply
  for a job. Please note that this is only a guide. If you don’t tick every box, it’s
  ok too because it means you have room to learn and develop your career at SumUp.</p><br><p><p><strong>Job
  Application Tip</strong></p><p><span>We recognise that candidates feel they need
  to meet 100% of the job criteria in order to apply for a job. Please note that this
  is only a guide. If you don’t tick every box, it’s ok too because it means you have
  room to learn and develop your career at SumUp.</span></p></p>'
