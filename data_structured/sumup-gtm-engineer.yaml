company_overview: SumUp believes that every business should have access to affordable,
  easy-to-use financial solutions, no matter their size. That’s why more than 3 million
  businesses worldwide rely on SumUp to run their business. What started out as one
  card reader has now turned into a range of payment hardware, banking solutions,
  marketing, and loyalty tools, invoicing, and so much more. From sales and marketing
  to product and engineering, our cross-functional US team works together to ensure
  that small business owners can be successful doing what they love.
