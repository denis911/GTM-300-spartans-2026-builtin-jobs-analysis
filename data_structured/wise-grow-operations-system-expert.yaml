  to contribute towards our mission and able to progress in their careers. If you
  want to find out more about what it''s like to work at Wise visit&nbsp;Wise.Jobs.
  Keep up to date with life at Wise by following us on&nbsp;LinkedIn&nbsp;and&nbsp;Instagram.'
