description_html: '<b>Location</b><p>This is an in-person role in the Phoenix, AZ
  office. Candidates must be based within a 50-mile commuting distance of the office
  and able to be physically present in the office 4 days a week.&nbsp;</p><b>About
  the Role</b><p>We are hiring a <strong>Manager, IT SOX &amp; Internal Audit,</strong>
  to lead Opendoor’s IT SOX program, technology audit coverage, system-implementation
  reviews, and automation initiatives. This role is highly technical and hands-on,
  partnering with Engineering, Security, Data, and Product to deliver a modern, AI-enabled
  approach to risk and controls.</p><p>You will lead IT risk assessments, manage<strong>
  </strong><span>Information Technology General Controls (ITGCs)</span><strong> </strong>and
  automated control testing strategies, conduct deep technical reviews, support system
  implementations, and build automation using SQL, Python, and modern data tools.</p><p>This
  role is critical to building a scalable, efficient, automation-first SOX program.</p><b>What
  You’ll Do</b><b>IT SOX Leadership &amp; Program Ownership</b><ul><li><p>Lead Opendoor’s
  IT SOX 404 program covering ITGCs, automated controls, and key system-generated
  reports.</p></li><li><p>Drive the annual IT risk assessment and SOX scoping process.</p></li><li><p>Lead
  walkthroughs, design assessments, testing strategies, and remediation.</p></li><li><p>Manage
  external auditors/consultants and ensure PCAOB-aligned execution.<br>&nbsp;</p></li></ul><b>System
  Implementation Reviews &amp; Project Support</b><ul><li><p>Lead IT SOX reviews for
  new system implementation, cloud launches, infrastructure changes, and major upgrades.</p></li><li><p>Participate
  early in solution design to identify SOX and IT risks.</p></li><li><p>Ensure each
  implementation includes adequate automated controls, access governance, and monitoring.</p></li><li><p>Support
  a smooth and compliant implementation by mitigating risks early and ensuring required
  controls are designed, tested, and deployed.<br>&nbsp;</p></li></ul><b>Automation
  &amp; Modern Audit Capabilities</b><ul><li><p>Use SQL and Python to automate testing,
  population validation, evidence analysis, and workflows.</p></li><li><p>Build or
  enhance continuous monitoring scripts and data-driven audit procedures.</p></li><li><p>Evaluate
  and audit AI/ML workflows, pipelines, and automation tools for controls and monitoring
  requirements.</p></li><li><p>Partner with Engineering, Security, and Data Engineering
  to implement automated controls and reduce manual operational work.<br>&nbsp;</p></li></ul><b>Cloud,
  Security &amp; Technology Governance</b><ul><li><p>Lead audits covering AWS infrastructure,
  Snowflake security, Databricks governance, and identity/access governance.</p></li><li><p>Evaluate
  DevOps processes, change management, code deployment, and infrastructure-as-code.</p></li><li><p>Review
  data flows, security controls, and operational reliability across cloud systems.</p></li><li><p>Partner
  with InfoSec and Engineering to drive long-term remediation and control improvement.<br>&nbsp;</p></li></ul><b>SOX
  Program Management</b><ul><li><p>Maintain IT SOX documentation, RCMs, narratives,
  and testing strategy.</p></li><li><p>Manage evidence collection and ensure accuracy
  and completeness of audit documentation.</p></li><li><p>Track issues and remediation
  progress, prepare dashboards, and support SOX tooling enhancements.<br>&nbsp;</p></li></ul><b>Cross-Functional
  Leadership</b><ul><li><p>Serve as the primary advisor for IT SOX, cloud security
  controls, automation, and system implementation risks.</p></li><li><p>Partner with
  Engineering, Product, Security, Data, and Accounting.</p></li><li><p>Support operational
  audits, investigations, and special projects involving systems, cloud, or data quality.<br>&nbsp;</p></li></ul><b>What
  You Will Bring</b><p><strong>Minimum Qualifications</strong></p><ul><li><p>A minimum
  of 5+ years of IT SOX, IT audit, or Technology Risk experience.</p></li><li><p>Experience
  reviewing or supporting system implementations, cloud migrations, and major upgrades.</p></li><li><p>Expertise
  with data conversion testing, UAT planning, configuration reviews, and cutover readiness.</p></li><li><p>Technical
  expertise in AWS, Snowflake, Databricks, and modern engineering environments.</p></li><li><p>Proficiency
  in SQL and Python, with hands-on automation or audit scripting experience.</p></li><li><p>Understanding
  of AI/ML risk, data pipelines, and automation workflows (preferred).</p></li><li><p>Strong
  knowledge of COBIT, COSO, PCAOB, NIST, and IT security frameworks.</p></li><li><p>Experience
  managing auditors or consulting teams.</p></li><li><p>Excellent communication and
  stakeholder management skills.<br>&nbsp;</p></li></ul><p><strong>Preferred Qualifications</strong></p><ul><li><p>Some
  Big 4 Accounting experience in addition to industry experience</p></li><li><p>Certifications:
  CISA, CISSP, CIA, CPA, AWS Cloud Practitioner, or similar</p></li><li><p>Experience
  with SOC 1/SOC 2, PCI, ISO 27001, GDPR, or other cloud compliance frameworks</p></li><li><p>Background
  in high-growth technology or AI-driven organizations</p></li><li><p>Experience designing
  or auditing automated controls or continuous monitoring processes</p></li></ul><br><b>Compensation</b><p>Our
  compensation reflects the cost of labor across several  U.S. geographic markets,
  and we pay differently based on those defined markets. Base pay is one part of our
  total compensation package and is determined within a range. This provides the opportunity
  to progress as you grow and develop within a role. The U.S. pay range for this position in
  Phoenix, AZ is $109,600.00 - $137,000.00 annually. Pay within this range varies
  by work location and may also depend on your qualifications, job-related knowledge,
  skills, and experience. Your recruiter can share more about the specific salary
  range for the job location during the hiring process. We also offer a comprehensive
  package of benefits including paid time off, 12 paid holidays per year, medical/dental/vision
  insurance, basic life insurance, and 401(k) to eligible employees.</p><p>&nbsp;#LI-LS</p><p>#LI-Onsite</p><br><p><p><p><p><p><p><p><p><p><p><p><p><p><p>At
  Opendoor our mission is to tilt the world in favor of homeowners and those who aim
  to become one. Homeownership matters. It''s how people build wealth, stability,
  and community. It''s how families put down roots, how neighborhoods strengthen,
  how the future gets built. We''re building the modern system of homeownership giving
  people the freedom to buy and sell on their own terms. We’ve built an end-to-end
  online experience that has already helped thousands of people and we’re just getting
  started.</p></p></p></p></p></p></p></p></p></p></p></p></p><p></p></p>'
