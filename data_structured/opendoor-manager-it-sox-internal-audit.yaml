company_overview: 'Founded in 2014, Opendoor’s mission is to empower everyone with
  the freedom to move. We believe the traditional real estate process is broken and
  confusing. It often comes with unexpected costs, the added burden of coordinating
  multiple third parties and the uncertainty of a transaction falling through. Our
  goal is simple: build a digital, end-to-end customer experience that makes buying
  and selling a home simple, certain and fast. We have assembled a dedicated team
  with diverse backgrounds and talents across engineering, operations, design, operations,
  mortgage, finance, legal, and more to deliver strong results. More than 85,000 customers
  have selected us as a trusted partner in handling one of their largest financial
  transactions.'
