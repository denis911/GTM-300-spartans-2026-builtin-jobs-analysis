description_html: '<b><strong>About the Company</strong></b><p>Rain makes the next
  generation of payments possible across the globe. We’re a lean and mighty team of
  passionate builders and veteran founders. Our infrastructure makes stablecoins usable
  in the real-world by powering card transactions, cross-border payments, B2B purchases,
  remittances, and more. We partner with fintechs, neobanks, and institutions to help
  them launch solutions that are global, inclusive, and efficient. You will have the
  opportunity to deliver massive impact at a hypergrowth company that is funded by
  some of the top investors in fintech, crypto, and SaaS, including Sapphire Ventures,
  Norwest, Galaxy Ventures, Lightspeed, Khosla, and several more. If you’re curious,
  bold, and excited to help shape a borderless financial future, we’d love to talk.</p><p></p><b><strong>Our
  Ethos</strong></b><p>We believe in an open and flat structure. You will be able
  to grow into the role that most aligns with your goals. Our team members at all
  levels have the freedom to explore ideas and impact the roadmap and vision of our
  company.</p><p></p><b><strong>About the Team</strong></b><p>We’re hiring a GTM Engineer
  — a systems-minded builder who will architect the tools, workflows, and automations
  that power our entire go-to-market engine. As Rain scales rapidly across card programs,
  payments, and global money movement, we need someone who can unify our GTM stack,
  accelerate deals, improve visibility across the funnel, and make every customer-facing
  team operate with precision.</p><p></p><p>Reporting to the VP of BD, this role bridges
  GTM strategy, systems architecture, and technical execution. You’ll work closely
  with Business Development, Marketing, Customer Success, and Product to design scalable
  processes, eliminate friction, and create a clean, automated foundation for pipeline
  management, forecasting, onboarding, and renewals. You’ll also be the connective
  tissue between our GTM teams and the data infrastructure that shows us who to target,
  how to win, and where to expand.</p><p></p><b><strong>What you''ll do</strong></b><ul><li><p>Build
  Rain’s GTM systems from the ground up — architect the CRM, workflows, routing logic,
  and automations that power BD, Marketing, and Customer Success</p></li><li><p>Design
  and own opportunity, pipeline, and deal-acceleration workflows, ensuring every stage
  is clear, measurable, and efficient</p></li><li><p>Implement AI-native automations
  that surface next-best actions, trigger follow-ups, and reduce manual work across
  GTM teams</p></li><li><p>Unify the GTM tech stack (CRM, sequencing tools, data enrichment,
  call intelligence, analytics) into one scalable, coherent system</p></li><li><p>Partner
  with BD leadership to establish operating rhythms: forecasting, pipeline reviews,
  account planning, renewal workflows</p></li><li><p>Ensure clean, trustworthy data
  — implement controls, validation, QA, and governance to maintain high-quality GTM
  intelligence</p></li><li><p>Build dashboards and reporting layers that give BD,
  Marketing, CS, and Execs visibility into pipeline health, funnel performance, and
  revenue drivers</p></li><li><p>Work with Product and Data to integrate product usage
  signals into GTM workflows for scoring, expansion, and proactive outreach</p></li><li><p>Streamline
  customer handoffs from BD → Implementations → Customer Success → Growth</p></li><li><p>Continuously
  improve the GTM foundation, recommending new tools, refining processes, and raising
  operational throughput across the org</p></li></ul><b><strong>What we''re looking
  for</strong></b><ul><li><p>A systems-first GTM builder — you’ve designed or owned
  GTM workflows, pipelines, and automations at a high-growth B2B company</p></li><li><p>Technical
  and hands-on — strong familiarity with CRM configuration, workflow logic, GTM tools,
  and SQL</p></li><li><p>AI-native — you actively use AI tools, understand their tradeoffs,
  and know how to automate GTM motions intelligently</p></li><li><p>Commercially minded
  — you understand how revenue is generated, where deals get stuck, and how to create
  leverage across the funnel</p></li><li><p>Customer-centric — you care about clean
  handoffs, predictable experience, and giving GTM teams the information they need
  to win</p></li><li><p>Clear communicator — able to translate GTM complexity into
  simple workflows and dashboards that teams rely on</p></li><li><p>Execution-driven
  — you ship quickly, iterate fast, and solve problems before they become blockers</p></li><li><p>Experienced
  — 4–7+ years in GTM Ops, RevOps, Sales Ops, Sales Engineering, or adjacent roles
  at fast-growing B2B SaaS, fintech, or payments companies</p></li></ul><b><strong>Nice
  to have, but not mandatory</strong></b><ul><li><p>Experience as a founding or early
  GTM systems hire</p></li><li><p>Experience with stablecoins, payments, card programs,
  or financial infrastructure</p></li><li><p>Prior work with outbound automation,
  AI agents, or GTM experimentation frameworks</p></li><li><p>Background integrating
  product usage data into sales workflows</p></li><li><p>Salesforce or HubSpot admin
  experience</p></li></ul><p></p><b><strong>Things that enable a fulfilling, healthy,
  and happy experience at Rain:</strong></b><ul><li><p><strong>Unlimited time off</strong>
  🌴 Unlimited vacation can be daunting, so we require Rainmakers to take at least
  10 days off.</p></li><li><p><strong>Flexible working</strong> ☕ We support a flexible
  workplace. If you feel comfortable at home, please work from home. If you’d like
  to work with others in an office, feel free to come in. We want everyone to be able
  to work in the environment in which they are their most confident and productive
  selves. New Rainmakers will receive a stipend to create a comfortable home environment.</p></li><li><p><strong>Easy
  to access benefits </strong>🧠For US Rainmakers, we offer comprehensive health, dental
  and vision plans for you and your dependents, as well as a 100% company subsidized
  life insurance plan.</p></li><li><p><strong>Retirement goals</strong>💡Plan for the
  future with confidence. We offer a 401(k) with a 4% company match.</p></li><li><p><strong>Equity
  plan </strong>📦 We offer every Rainmaker an equity option plan so we can all benefit
  from our success.</p></li><li><p><strong>Rain Cards</strong> 🌧️ We want Rainmakers
  to be knowledgeable about our core products and services. To support this mission,
  we issue a card for our team to use for testing.</p></li><li><p><strong>Health and
  Wellness</strong> 📚 High performance begins from within. Rainmakers are welcome
  to use their card for eligible health and wellness spending like gym memberships/fitness
  classes, massages, acupuncture - whatever recharges you!</p></li><li><p><strong>Team
  summits</strong> ✨ Summits play an important role at Rain! Time spent together helps
  us get to know each other, strengthen our relationships, and build a common destiny.
  Expect team and company off-sites both domestically and internationally.</p></li></ul>'
