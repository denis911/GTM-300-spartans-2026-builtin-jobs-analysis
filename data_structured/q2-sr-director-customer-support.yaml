  fairness, and consistency. Delegate effectively and measure success by how independently
  the organization operates. Create a calm, high-performance culture grounded in trust,
  discipline, and clear expectations. Experience-Driven &amp; Change Leadership Move
  the organization beyond SLA-only thinking to customer effort, confidence, outcomes,
  and sentiment. Use XLA, VOC, and sentiment analysis to guide investment and prioritization.
  Lead large-scale transformation through ambiguity and resistance with empathy and
  decisiveness. Navigate difficult conversations directly while balancing human-centered
  leadership with operational rigor. Bring Your Passion, Do What You Love. Here’s
  What We’re Looking For: What Success Looks Like Within the first 12–18 months, the
  Senior Director of Technical Customer Support will have: Scaled a predictable, pod-based
  global support model operating at high maturity across regions Reduced case variation
  and operational noise through disciplined systems, not heroics Embedded AI-assisted
  workflows as the default way work gets done across squads Improved customer experience
  outcomes (XLA, sentiment, confidence) without increasing cost or organizational
  stress Strengthened escalation hygiene, resulting in earlier, cleaner, and fewer
  escalations Built a leadership team that operates independently, with clear ownership
  and accountability Improved alignment with Engineering, SRE, and DevOps through
  better diagnostics, routing, and root-cause clarity Created a calmer, more resilient
  organization that relies on repeatable systems rather than individuals Success in
  this role is measured by organizational capability and predictability, not personal
  intervention. Required Qualifications Bachelor’s degree in a relevant field with
  15+ years of related experience; or advanced degree with 10+ years; or equivalent
  experience. 12+ years of progressive leadership experience in technical customer
  support, including leading large, globally distributed organizations. Proven success
  modernizing and scaling support organizations through operating-model transformation.
  Demonstrated systems-thinking mindset with the ability to design workflows, governance,
  and operating rhythms. Strong track record operationalizing AI, automation, or advanced
  tooling in support environments. Deep technical fluency in cloud-native architectures,
  configuration-driven platforms, and build/release processes. Data-driven leader
  with measurable success reducing variation and improving predictability. Exceptional
  executive communication and cross-functional partnership skills. Preferred Qualifications
  ITIL, Six Sigma, Lean, or similar certifications. Experience with tools such as
  Jira, ServiceNow, PagerDuty, Grafana, Splunk, or equivalent platforms. Background
  in fintech, enterprise SaaS, or regulated technology environments. Prior experience
  in SRE, DevOps, or engineering-adjacent leadership roles. Experience operating pod-based
  or squad-based support models at scale. Bilingual (English/Spanish or English/Hindi)
  a plus. Senior Director or equivalent enterprise-level leadership experience. Based
  in or willing to relocate to Austin, TX. This position requires fluent written and
  oral communication in English. Applicants must be authorized to work for any employer
  in the U.S. We are unable to sponsor or take over sponsorship of an employment Visa
  at this time. Health &amp; Wellness Hybrid Work Opportunities Flexible Time Off&nbsp;
  Career Development &amp; Mentoring Programs&nbsp; Health &amp; Wellness Benefits,
  including competitive health insurance offerings and generous paid parental leave
  for eligible new parents&nbsp; Community Volunteering &amp; Company Philanthropy
  Programs&nbsp; Employee Peer Recognition Programs – “You Earned it” Click here to
  find out more about the benefits we offer. Our Culture &amp; Commitment: We’re proud
  to foster a supportive, inclusive environment where career growth, collaboration,
  and wellness are prioritized. And our benefits go beyond healthcare—offering resources
