company_overview: 'Want to feel truly valued at work? Check out Q2! Our unique company
  culture and super-hero employees, are what sets us apart. We know how to get it
  done and still have fun! Q2 builds the leading mobile banking software platform
  serving Credit Unions, Banks (large and small), Community Banks and Financial Institutions.
  Our mission is to build stronger and diverse communities by strengthening their
  financial institutions. Q2 prioritizes innovation, collaboration and celebrating
  our employees who make our mission successful. Q2 is a national "Best Place to Work"
  Award winner 3 years running! Join our "Circle of Awesomeness"! #Q2Peeps'
