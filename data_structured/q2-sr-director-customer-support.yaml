description_html: '<b><b>As passionate about our people as we are about our mission.</b></b><p></p><p><b><u>Why
  Join Q2?</u></b></p><p>Q2 is a leading provider of digital banking and lending solutions
  to banks, credit unions, alternative finance companies, and fintechs in the U.S.
  and internationally. Our mission is simple: build strong and diverse communities
  through innovative financial technology—and we do that by empowering our people
  to help create success for our customers.</p><p></p><p><b><u>What Makes Q2 Special?</u></b></p><p><p>Being
  as passionate about our people as we are about our mission. We celebrate our employees
  in many ways, including our “Circle of Awesomeness” award ceremony and day of employee
  celebration among others! We invest in the growth and development of our team members
  through ongoing learning opportunities, mentorship programs, internal mobility,
  and meaningful leadership relationships. We also know that nothing builds trust
  and collaboration like having fun. We hold an annual Dodgeball for Charity event
  at our Q2 Stadium in Austin, inviting other local companies to play, and community
  organizations we support to raise money and awareness together.</p></p><p></p><p>We
  are seeking a Senior Director of Technical Customer Support to lead, scale, and
  mature Q2’s global Customer Support organization as part of our future-state Support
  operating model.</p><p>This role exists to run and evolve the system, not to preserve
  legacy support behaviors. The Senior Director will transform support from reactive
  and hero-driven to predictable, experience-driven, AI-augmented, and pod-based.
  Success is measured by improved predictability, reduced variation, stronger customer
  experience outcomes (XLA), and an organization that operates consistently through
  disciplined systems rather than individual heroics.</p><p>This leader will oversee
  a large, globally distributed organization delivering configuration-driven, technically
  complex support in a highly regulated environment, while partnering closely with
  Engineering, SRE, DevOps, Product, and Incident Operations.</p><p></p><p></p><p></p><p><b><u>A
  Typical Day:</u></b></p><p><b>Enterprise-Level Strategy &amp; Systems Leadership</b></p><ul><li>Partner
  with the VP &amp; SVP of Support and executive stakeholders to define, execute,
  and continuously evolve Q2’s global Support vision and operating model.</li><li>Design,
  scale, and govern pod-based support structures, operating rhythms, and maturity
  models across regions.</li><li>Diagnose operational challenges as system failures
  first, not individual performance issues.</li><li>Clearly articulate “what good
  looks like” and enforce consistent standards across teams, geographies, and leaders.</li><li>Drive
  long-term strategy focused on predictability, scalability, and experience-level
  outcomes (XLA).</li></ul><p><b>Global Operational Excellence &amp; Discipline</b></p><ul><li>Lead
  24/7 global support operations across the U.S., India, and Mexico with executive-level
  accountability.</li><li>Enforce SOPs, QA standards, escalation hygiene, and rigorous
  case lifecycle management at scale.</li><li>Use data and experience signals to reduce
  case variation, noise, and rework.</li><li>Establish and maintain predictable operating
  rhythms; reject inconsistency masked as autonomy.</li><li>Own KPIs across SLA, XLA,
  customer sentiment, efficiency, and cost-to-serve.</li></ul><p><b>AI-Enabled &amp;
  Technical Oversight</b></p><ul><li>Champion and enforce enterprise-wide adoption
  of AI-assisted workflows, automation, and advanced tooling.</li><li>Ensure AI usage
  becomes embedded in daily workflows and exceeds 95% adoption across squads.</li><li>Provide
  executive oversight of complex technical support involving cloud-native architectures,
  containerized deployments, configuration changes, and redeployments.</li><li>Partner
  deeply with Engineering, SRE, DevOps, and IOC to improve diagnostics, observability,
  routing, and root-cause analysis.</li><li>Ensure support processes integrate cleanly
  with CI/CD pipelines and operate effectively within regulated and secure environments.</li></ul><p><b>Leadership
  That Scales</b></p><ul><li>Lead and develop Directors, Senior Managers, Pod Managers,
  and Squad Leaders.</li><li>Build durable leadership bench strength and succession
  pipelines.</li><li>Drive “comfort with the uncomfortable” with thoughtful and intentional
  change mgmt.</li><li>Hold leaders accountable with clarity, fairness, and consistency.</li><li>Delegate
  effectively and measure success by how independently the organization operates.</li><li>Create
  a calm, high-performance culture grounded in trust, discipline, and clear expectations.</li></ul><p><b>Experience-Driven
  &amp; Change Leadership</b></p><ul><li>Move the organization beyond SLA-only thinking
  to customer effort, confidence, outcomes, and sentiment.</li><li>Use XLA, VOC, and
  sentiment analysis to guide investment and prioritization.</li><li>Lead large-scale
  transformation through ambiguity and resistance with empathy and decisiveness.</li><li>Navigate
  difficult conversations directly while balancing human-centered leadership with
  operational rigor.</li></ul><p><b><u>Bring Your Passion, Do What You Love. Here’s
  What We’re Looking For:</u></b></p><p><b><span>What Success Looks Like</span></b></p><p><span>Within
  the first 12–18 months, the Senior Director of Technical Customer Support will have:</span></p><ul><li><span>Scaled
  a predictable, pod-based global support model operating at high maturity across
  regions</span></li><li><span>Reduced case variation and operational noise through
  disciplined systems, not heroics</span></li><li><span>Embedded AI-assisted workflows
  as the default way work gets done across squads</span></li><li><span>Improved customer
  experience outcomes (XLA, sentiment, confidence) without increasing cost or organizational
  stress</span></li><li><span>Strengthened escalation hygiene, resulting in earlier,
  cleaner, and fewer escalations</span></li><li><span>Built a leadership team that
  operates independently, with clear ownership and accountability</span></li><li><span>Improved
  alignment with Engineering, SRE, and DevOps through better diagnostics, routing,
  and root-cause clarity</span></li><li><span>Created a calmer, more resilient organization
  that relies on repeatable systems rather than individuals</span></li><li><span>Success
  in this role is measured by organizational capability and predictability, not personal
  intervention.</span></li></ul><p><b>Required Qualifications</b></p><ul><li>Bachelor’s
  degree in a relevant field with 15+ years of related experience; or advanced degree
  with 10+ years; or equivalent experience.</li></ul><ul><li>12+ years of progressive
  leadership experience in technical customer support, including leading large, globally
  distributed organizations.</li><li>Proven success modernizing and scaling support
  organizations through operating-model transformation.</li><li>Demonstrated systems-thinking
  mindset with the ability to design workflows, governance, and operating rhythms.</li><li>Strong
  track record operationalizing AI, automation, or advanced tooling in support environments.</li><li>Deep
  technical fluency in cloud-native architectures, configuration-driven platforms,
  and build/release processes.</li><li>Data-driven leader with measurable success
  reducing variation and improving predictability.</li><li>Exceptional executive communication
  and cross-functional partnership skills.</li></ul><p><b>Preferred Qualifications</b></p><ul><li>ITIL,
  Six Sigma, Lean, or similar certifications.</li><li>Experience with tools such as
  Jira, ServiceNow, PagerDuty, Grafana, Splunk, or equivalent platforms.</li><li>Background
  in fintech, enterprise SaaS, or regulated technology environments.</li><li>Prior
  experience in SRE, DevOps, or engineering-adjacent leadership roles.</li><li>Experience
  operating pod-based or squad-based support models at scale.</li><li>Bilingual (English/Spanish
  or English/Hindi) a plus.</li><li>Senior Director or equivalent enterprise-level
  leadership experience.</li><li>Based in or willing to relocate to Austin, TX.</li></ul><p></p><p><i><span>This
  position requires fluent written and oral communication in English.</span> </i></p><p><i><span>Applicants
  must be authorized to work for any employer in the U.S. We are unable to sponsor
  or take over sponsorship of an employment Visa at this time.</span></i></p><p></p><p><b><span><span><span><u>Health
  &amp; Wellness</u></span></span></span></b></p><ul><li><p><span><span><span>Hybrid
  Work Opportunities</span></span></span></p></li><li><p><span><span><span>Flexible
  Time Off&nbsp;</span></span></span></p></li><li><p><span><span><span>Career Development
  &amp; Mentoring Programs&nbsp;</span></span></span></p></li><li><p><span><span><span>Health
  &amp; Wellness Benefits, including competitive health insurance offerings and generous
  paid parental leave for eligible new parents&nbsp;</span></span></span></p></li><li><p><span><span><span>Community
  Volunteering &amp; Company Philanthropy Programs&nbsp;</span></span></span></p></li><li><p><span><span><span>Employee
  Peer Recognition Programs – “You Earned it”</span></span></span></p></li></ul><p></p><p>Click
  here to find out more about the benefits we offer.</p><p></p><p><b><u>Our Culture
  &amp; Commitment:</u></b></p><p></p><p>We’re proud to foster a supportive, inclusive
  environment where career growth, collaboration, and wellness are prioritized. And
  our benefits go beyond healthcare—offering resources for physical, mental, and professional
  well-being. Click here to find out more about the benefits we offer. Q2 employees
  are encouraged to give back through volunteer work and nonprofit support through
  our Spark Program (see more). We believe in making an impact—in the industry and
  in the community.</p><p></p><p>We are an Equal Opportunity Employer. All qualified
  applicants will receive consideration for employment without regard to race, color,
  religion, sex, sexual orientation, gender identity, national origin, age, disability,
  genetic information, or veteran status.</p><p></p><p><br><i><span>Applicants in
  California or Washington State may not be exempt from federal and state overtime
  requirements</span></i></p>'
