  AI-augmented, and pod-based. Success is measured by improved predictability, reduced
  variation, stronger customer experience outcomes (XLA), and an organization that
  operates consistently through disciplined systems rather than individual heroics.
  This leader will oversee a large, globally distributed organization delivering configuration-driven,
  technically complex support in a highly regulated environment, while partnering
  closely with Engineering, SRE, DevOps, Product, and Incident Operations. A Typical
  Day: Enterprise-Level Strategy &amp; Systems Leadership Partner with the VP &amp;
  SVP of Support and executive stakeholders to define, execute, and continuously evolve
