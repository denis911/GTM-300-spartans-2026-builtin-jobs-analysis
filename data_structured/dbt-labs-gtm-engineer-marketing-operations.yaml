company_overview: At dbt Labs, we make data work. Our open-source software, dbt, enables
  anyone who knows SQL to engineer, document, and test data pipelines. By empowering
  analysts to work like and with data engineers, dbt drastically increases an organization's
  ability to model and serve analytics. We’ve built a community of 100,000+ people
  and are backed by top investors including Andreessen Horowitz and Sequoia Capital.
  dbt is already used and loved by thousands of companies and dbt Cloud enables this
  workflow at scale. dbt Labs headquarters are in Philadelphia, Pennsylvania, but
  we are a distributed team and advocate for a remote-first culture. We want our people
  to work from the places where they are happiest, healthiest, and most inspired to
  do great things.
