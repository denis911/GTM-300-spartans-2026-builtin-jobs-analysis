description_html: '<p><p><strong>About Us&nbsp;</strong></p><p>dbt Labs is the pioneer
  of analytics engineering, helping data teams transform raw data into reliable, actionable
  insights. Since 2016, we’ve grown from an open source project into the leading analytics
  engineering platform, now used by over 90,000 teams every week, driving data transformations
  and AI use cases.&nbsp;</p><p>As of February 2025, we’ve surpassed $100 million
  in annual recurring revenue (ARR) and serve more than 5,400 dbt Platform customers,
  including AstraZenica, Sky, Nasdaq, Volvo, JetBlue, and SafetyCulture.&nbsp;</p><p>We’re
  backed by top-tier investors including Andreessen Horowitz, Sequoia Capital, and
  Altimeter. At our core, we believe in empowering data practitioners:</p><ul><li>Reliable,
  high-quality data is the fuel that propels AI-powered data engineering.   </li><li>AI is changing data work, fast. dbt’s data control plane keeps data engineers
  ahead of that curve.</li><li>We empower engineers to deliver reliable, governed
  data faster, cheaper, and at scale.</li></ul><p>dbt Labs is now synonymous with
  analytics engineering, defining the modern data stack and serving as the data control
  plane for enterprise teams around the world. And we’re just getting started.. We’re
  growing fast and building a team of passionate, curious people across the globe.
  Learn more about what makes us special by checking out our values.</p></p><p>We''re
  searching for a high-impact, results-driven individual to join our team as a GTM
  Engineer, focused on revolutionizing our marketing operations and go-to-market (GTM)
  motion. This is a critical role that will leverage cutting-edge AI and automation
  to build the scalable technical backbone that accelerates customer acquisition and
  expansion across the entire GTM organization. You''ll partner closely with Marketing,
  Sales, and Data teams to translate strategic vision into high-performing, measurable
  systems.</p><p><strong>In this role, you can expect to:</strong></p><ul><li>Streamline
  and optimize marketing processes—including campaign creation, audience segmentation</li><li>Partner
  with Marketing, Marketing Intelligence and Sales Operations teams to identify and
  scope opportunities for AI-driven solutions and technology adoption across teams</li><li>Integrate
  AI APIs, MCP Servers, and other automation tools to build agents and workflows that
  improve Marketing’s Go-to-Market motions</li><li>Own how and where we utilize AI
  to drive optimization, productivity, and cost savings</li><li>Architect, build,
  and deploy AI prototypes and scalable automated workflows (integrating LLMs and
  AI APIs) to proactively eliminate friction and drive efficiency gains across end-to-end
  marketing processes</li><li>Create and maintain technical documentation and training
  materials to ensure adherence to operational best practices and increase team self-sufficiency</li><li>Own
  and manage a 15+ Marketing tooling suite</li><li>Own integrations, optimizations,
  and access management across the marketing tech stack, including vendor management,
  administration, and maintaining a forward-looking tooling roadmap</li><li>Partner
  closely with SDR and Sales leaders to support lead funnel management and routing,
  lead processing, SLA management, and lead scoring and qualification frameworks</li></ul><br><p><strong>You
  are a good fit if you have:</strong></p><ul><li>6+ years of demonstrated experience
  in Marketing Operations or Revenue Operations within a high-growth SaaS environment</li><li>Hands-on,
  expert-level experience with Salesforce and Hubspot</li><li>Hands-on experience
  with data orchestration and automation platforms, like Clay, Workato</li><li>Hands-on
  experience owning a mar tech stack of multiple tools, vendor evaluation and management,
  with the ability to scale, optimize and understand redundancies for a large tech
  stack</li><li>A proven track record of applying AI or advanced automation to solve
  complex business problems, with practical experience with AI concepts (LLMs, RAG,
  prompt engineering)</li><li>Exceptional communication and executive presence, with
  the ability to clearly articulate complex technical strategies to both technical
  and non-technical stakeholders</li><li>A "builder" and "practical innovator" mindset:
  who turns problems into scalable solutions</li><li>Highly analytical and process-driven,
  focused on efficiency and scalability</li><li>Proficiency in SQL, or BI visualization
  tools (e.g., Tableau, Looker, Power BI, Omni)</li><li>Experience supporting or building
  lead management infrastructure, including routing logic, scoring models, and SLA
  frameworks in partnership with SDR and Sales teams</li><li>Nice to have: proficiency
  in Python or JavaScript/TypeScript for building automation scripts and handling
  API requests</li></ul><br><p><strong>Compensation</strong></p><p>We offer competitive
  compensation packages commensurate with experience, including salary, equity, and
  where applicable, performance-based pay. Our Talent Acquisition Team can answer
  questions around dbt Lab’s total rewards during your interview process. In select
  locations (including Boston, Chicago, Denver, Los Angeles, Philadelphia, Austin,
  New York City, San Francisco, Washington, DC, and Seattle), an alternate range may
  apply, as specified below.<br>- The typical starting salary range for this role
  is:<br>$127,000 - $160,000 USD<br>- The typical starting salary range for this role
  in the select locations listed is:<br>$141,000 - $180,000 USD</p><p><strong>Benefits</strong></p><ul><li>Competitive
  salary</li><li>Equity stake</li><li>Benefits&nbsp;<strong>-</strong>&nbsp;dbt Labs
  offers:

  <ul><li>Unlimited vacation (and yes we use it!)</li><li>401k with 3% guaranteed
  contribution</li><li>Excellent healthcare</li><li>Paid Parental Leave</li><li>Wellness
  stipend</li><li>Home office stipend, and more!</li></ul></li></ul><p>*Equity or
  comparable benefits may be offered depending on the legal limitations</p><b>What
  to expect in the hiring process&nbsp;<strong>(all video interviews unless accommodations
  are needed):</strong></b><b>Interview with Talent Acquisition Partner</b><ol><li><ol><li>Interview
  with Hiring Manager</li><li>Team Interviews</li><li>Team Interviews</li></ol></li></ol><p><p>dbt
  Labs is an equal opportunity employer, committed to building an inclusive team that
  welcomes diverse perspectives, backgrounds, and experiences. Even if your experience
  doesn’t perfectly align with the job description, we encourage you to apply—we value
  potential just as much as a perfect resume.</p><p><span>Want to learn more about
  our focus on Diversity, Equity and Inclusion at dbt Labs? Check out our DEI page.</span></p><p><em><span>dbt
  Labs reserves the right to amend or withdraw the posting at any time. For employees
  outside the United States, dbt Labs offers a competitive benefits package. RSUs</span>&nbsp;or
  comparable benefits may be offered depending on the legal or country limitations.</em></p><p>Privacy
  Notice</p><p>Supplement to Privacy Notice - Californians</p><p>Supplement to Privacy
  Notice - EEA/UK</p></p>'
