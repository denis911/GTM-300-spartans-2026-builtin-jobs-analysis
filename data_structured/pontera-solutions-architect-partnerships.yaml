description_html: '<p><p>Pontera is a fintech company on a mission to help people
  retire better. Our software platform enables retirement savers to get the help they
  need managing their 401(k) and other retirement plan accounts as part of a personalized
  strategy by their trusted financial advisor.&nbsp;</p><p>Pontera is used by financial
  advisors across the nation– from SMB to Fortune 500 RIA firms, independent broker-dealers,
  plan custodians, and plan advisors.&nbsp;</p><p>Backed by leading venture capital
  firms including ICONIQ Growth and Lightspeed Venture Partners, Pontera is built
  by talented individuals who share a dedication to helping people retire with greater
  security.&nbsp;</p><p>Our team is fast-growing and driven to become one of the largest
  fintech companies in the world.&nbsp; Our culture is built on a people-first principle:
  in a complex and numbers-driven industry, we never lose sight of the people we serve
  and work alongside. That’s where you come in.</p></p><p><b>DESCRIPTION</b><p><p>This
  role, within the Business Development team, is critical to accelerating our product
  strategy and commercial objectives by bringing new integrated capabilities to market.
  As the Solutions Architect, Partnerships you will own the strategy and execution
  of our integration roadmap with our Strategic Partners, including the translation
  of commercial opportunities into tangible product development initiatives. You will
  act as the primary interface between partner’s Product and Operational leaders and
  Pontera’s Engineering, Product, and Business Development teams, managing complex
  projects end-to-end. We are looking for a solutions-driven leader who can bring
  best-in-class project management, technical proficiency, and strategic thinking
  to unlock opportunities with the largest Wealth Management Technology platforms,
  Custodians, and TAMPs and accelerate Pontera’s growth.</p></p></p><p><p><p><p><b>RESPONSIBILITIES</b><p><ul><li><strong>Project
  Management (PMO):</strong> Serve as the central Project Management Office (PMO)
  for complex, strategic integrations. This includes overseeing the full implementation
  cycle from conception through to launch, and managing timelines, risks, and cross-functional
  dependencies across R&amp;D, GTM, and Product teams.</li><li><strong>Solutions Architecture:</strong>
  Lead deep scoping and solutioning discussions with partner Product, Engineering,
  and Implementation teams. This involves defining clear technical requirements, conducting
  appropriate handoffs with R&amp;D and Product, and routinely engaging with key customers
  to gather feedback on integration needs.</li><li><strong>Roadmap &amp; Prioritization:</strong>
  Own and manage the integration roadmap in close collaboration with the Director
  of Strategic Partnerships and Director of R&amp;D. Prioritize development based
  on commercial value, technical feasibility, and alignment with partnership strategy.
  Additionally, implement internal processes that allow us to source, prioritize,
  and execute on customer and internal feedback related to our integrations.</li><li><strong>Relationship
  Management &amp; GTM:</strong> Build and maintain relationships and open lines of
  communication with partners'' technical teams, including Product, Engineering, Implementation,
  and Data Operations leadership. Develop comprehensive collateral, user guides, and
  other integration-focused content in collaboration with external stakeholders and
  Product Marketing to drive adoption.</li></ul></p></p></p><p><p><b>REQUIREMENTS</b><p><ul><li>7+
  years of experience in an Integrations, Technology Partnerships, PMO, or Product
  Management role within FinTech, WealthTech, or high-growth SaaS.</li><li>Highly
  solutions-oriented with a track record of translating ambiguous commercial needs
  into defined technical specifications.</li><li>Exceptional communication skills,
  capable of bridging complex technical concepts for Executive, Commercial, and Engineering
  audiences.</li><li>Deep understanding of API integrations, data structures, and
  the software development lifecycle, as well as a strong handle of enterprise SaaS
  business models and GTM motions.</li><li>Proven expertise in project management
  and the ability to serve as a PMO for external-facing initiatives.</li></ul><b><strong>WHAT
  WE OFFER</strong></b><ul><li><strong>Compensation</strong>: $180,000 to $200,000
  annually</li><li><strong>Opportunity</strong>: Have a major impact at a fast-growing
  startup that is revolutionizing the FinTech industry</li><li><strong>Team Culture</strong>:
  A collegial, collaborative, fun work environment with frequent team events</li><li><strong>Equity</strong>:
  All new hires are eligible for equity grant participation</li><li><strong>Healthcare</strong>:
  Comprehensive &amp; affordable insurance benefits with a variety of plan options</li><li><strong>Retirement</strong>:
  401(k) with employer match &amp; employer-sponsored access to a retirement advisor</li><li><strong>Family
  Benefits</strong>: Paid parental leave &amp; reimbursement program for family planning
  services (such as fertility treatments, adoption, or surrogacy</li><li><strong>Professional
  Development</strong>: Sponsored learning &amp; development program (to cover classes,
  certifications, and more!)</li><li><strong>Food Perks</strong>: Fully stocked kitchen
  &amp; lunch reimbursement program</li><li><strong>Work Flexibility</strong>: A hybrid
  office work model (In-Office Tues/Weds/Thurs and WFH Mon/Fri) &amp; generous PTO
  day</li></ul><p>Pontera is an equal opportunity employer, and all qualified applicants
  will receive consideration for employment without regard to race, color, religion,
  sex, sexual orientation, gender identity, national origin, disability status, protected
  veteran status, or any other characteristic protected by law.</p></p></p></p></p></p>'
description_text: 'Pontera is a fintech company on a mission to help people retire
  better. Our software platform enables retirement savers to get the help they need
  managing their 401(k) and other retirement plan accounts as part of a personalized
  strategy by their trusted financial advisor.&nbsp; Pontera is used by financial
  advisors across the nation– from SMB to Fortune 500 RIA firms, independent broker-dealers,
  plan custodians, and plan advisors.&nbsp; Backed by leading venture capital firms
  including ICONIQ Growth and Lightspeed Venture Partners, Pontera is built by talented
  individuals who share a dedication to helping people retire with greater security.&nbsp;
  Our team is fast-growing and driven to become one of the largest fintech companies
  in the world.&nbsp; Our culture is built on a people-first principle: in a complex
  and numbers-driven industry, we never lose sight of the people we serve and work
  alongside. That’s where you come in. DESCRIPTION This role, within the Business
  Development team, is critical to accelerating our product strategy and commercial
  objectives by bringing new integrated capabilities to market. As the Solutions Architect,
  Partnerships you will own the strategy and execution of our integration roadmap
  with our Strategic Partners, including the translation of commercial opportunities
  into tangible product development initiatives. You will act as the primary interface
  between partner’s Product and Operational leaders and Pontera’s Engineering, Product,
  and Business Development teams, managing complex projects end-to-end. We are looking
  for a solutions-driven leader who can bring best-in-class project management, technical
  proficiency, and strategic thinking to unlock opportunities with the largest Wealth
  Management Technology platforms, Custodians, and TAMPs and accelerate Pontera’s
  growth. RESPONSIBILITIES Project Management (PMO): Serve as the central Project
  Management Office (PMO) for complex, strategic integrations. This includes overseeing
  the full implementation cycle from conception through to launch, and managing timelines,
  risks, and cross-functional dependencies across R&amp;D, GTM, and Product teams.
  Solutions Architecture: Lead deep scoping and solutioning discussions with partner
  Product, Engineering, and Implementation teams. This involves defining clear technical
  requirements, conducting appropriate handoffs with R&amp;D and Product, and routinely
  engaging with key customers to gather feedback on integration needs. Roadmap &amp;
  Prioritization: Own and manage the integration roadmap in close collaboration with
  the Director of Strategic Partnerships and Director of R&amp;D. Prioritize development
  based on commercial value, technical feasibility, and alignment with partnership
  strategy. Additionally, implement internal processes that allow us to source, prioritize,
  and execute on customer and internal feedback related to our integrations. Relationship
  Management &amp; GTM: Build and maintain relationships and open lines of communication
  with partners'' technical teams, including Product, Engineering, Implementation,
  and Data Operations leadership. Develop comprehensive collateral, user guides, and
  other integration-focused content in collaboration with external stakeholders and
  Product Marketing to drive adoption. REQUIREMENTS 7+ years of experience in an Integrations,
  Technology Partnerships, PMO, or Product Management role within FinTech, WealthTech,
  or high-growth SaaS. Highly solutions-oriented with a track record of translating
  ambiguous commercial needs into defined technical specifications. Exceptional communication
  skills, capable of bridging complex technical concepts for Executive, Commercial,
  and Engineering audiences. Deep understanding of API integrations, data structures,
  and the software development lifecycle, as well as a strong handle of enterprise
  SaaS business models and GTM motions. Proven expertise in project management and
  the ability to serve as a PMO for external-facing initiatives. WHAT WE OFFER Compensation
  : $180,000 to $200,000 annually Opportunity : Have a major impact at a fast-growing
  startup that is revolutionizing the FinTech industry Team Culture : A collegial,
  collaborative, fun work environment with frequent team events Equity : All new hires
  are eligible for equity grant participation Healthcare : Comprehensive &amp; affordable
  insurance benefits with a variety of plan options Retirement : 401(k) with employer
  match &amp; employer-sponsored access to a retirement advisor Family Benefits :
  Paid parental leave &amp; reimbursement program for family planning services (such
  as fertility treatments, adoption, or surrogacy Professional Development : Sponsored
  learning &amp; development program (to cover classes, certifications, and more!)
  Food Perks : Fully stocked kitchen &amp; lunch reimbursement program Work Flexibility
  : A hybrid office work model (In-Office Tues/Weds/Thurs and WFH Mon/Fri) &amp; generous
  PTO day Pontera is an equal opportunity employer, and all qualified applicants will
  receive consideration for employment without regard to race, color, religion, sex,
  sexual orientation, gender identity, national origin, disability status, protected
  veteran status, or any other characteristic protected by law.'
