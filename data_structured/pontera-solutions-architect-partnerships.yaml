company_overview: Pontera is a fintech company on a mission to help millions of Americans
  retire better by enabling financial advisors to manage, balance, and report on clients'
  assets in 401(k)s, 403(b)s, and other workplace-sponsored accounts. Our secure,
  purpose-built platform, seamlessly integrated with advisors' portfolio management
  tools, is designed to work across many account types and help advisors improve financial
  outcomes through more comprehensive investment management. Pontera is used by financial
  advisors across the nation—from SMB to Fortune 500 RIA firms, independent broker-dealers,
  plan custodians, and plan advisors. Backed by leading venture capital firms including
  ICONIQ Growth and Lightspeed Venture Partners, Pontera is built by talented individuals
  who share a dedication to helping people retire with greater security. At the core
  of our team is a strong belief that helping people retire comfortably is of critical
  importance. Pontera is designed to help advisors not only analyze their clients’
  held away accounts to provide greater visibility, but to enable advisors to take
  action and manage accounts on their clients’ behalf, improving the client experience,
  potentially adding accretive performance, and helping to mitigate compliance and
  security concerns around managing held away accounts. Each of us believes strongly
  in the mission of helping millions of people achieve the best retirement possible.
