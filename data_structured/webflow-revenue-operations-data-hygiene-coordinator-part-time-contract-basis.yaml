description_html: '<p><strong>Employment Type:</strong> Temporary, Part-Time (15 hours
  per week)<br><strong>Duration:</strong> This is a temporary position for approximately
  6 months, with the possibility of extension based on business needs.<br><strong>Pay:
  </strong>$25 / per hour<br><strong>Department:</strong> Revenue Operations<br><strong>Location:</strong>
  SF HQ and US Remote<br><strong>Reports to:</strong> Revenue Operations</p><b><strong>About
  the Role</strong></b><p>We are looking for a detail oriented RevOps Data Hygiene
  Coordinator to support day to day Salesforce data cleanup and maintenance. This
  role is highly executional and focused on accuracy, consistency, and following defined
  processes.</p><p>This is a great opportunity for a college student or recent graduate
  who wants hands on exposure to Revenue Operations, Salesforce, and SaaS sales workflows.
  You will work from clear guidelines and dashboards and will not be responsible for
  building automations, designing systems, or making strategic decisions.</p><b><strong>Job
  Description:</strong></b><ul><li>Review Salesforce and Salesforce CPQ records to
  identify human errors such as missing fields, incorrect selections, or inconsistent
  data.</li><li>Identify and merge duplicate Account records, triaging an existing
  merge request process.</li><li>Own day to day Account hierarchy maintenance, including
  processing hierarchy change requests and validating parent child relationships.</li><li>Support
  ad hoc data cleanup projects related to reporting, forecasting, or territory carving.</li><li>Review
  sales crediting and commission related fields for completeness and obvious errors
  prior to downstream processing.</li></ul><b><strong>You might be a good fit if:&nbsp;</strong></b><ul><li>Currently
  enrolled college student or recent graduate, or equivalent practical experience.</li><li>Extremely
  high attention to detail and comfort working with repetitive tasks.</li><li>Interest
  in Revenue Operations, Sales Operations, or business systems.</li><li>Ability to
  follow documented processes consistently.</li><li>Comfort working in Salesforce
  or willingness to learn quickly.</li><li>Strong written communication and basic
  spreadsheet skills.</li></ul><b><strong>Nice to Have but Not Required</strong></b><ul><li>Prior
  exposure to Salesforce or CRM systems.</li><li>Experience with data entry, QA, or
  administrative operations.</li><li>Interest in SaaS or go to market teams.</li></ul><b><strong>Working
  Details</strong></b><ul><li>Hours: Temporary Part time 15 hours/week</li><li>Location:
  SF HQ and US Remote</li><li>Training: Full onboarding and clear documentation provided.</li></ul><p>Temporary
  employees may be eligible for paid holiday and time off, statutory leaves of absence,
  and company-sponsored medical benefits depending on their Fixed Term Contract, hours
  and their country/state of employment.</p>'
description_text: 'Employment Type: Temporary, Part-Time (15 hours per week) Duration:
  This is a temporary position for approximately 6 months, with the possibility of
  extension based on business needs. Pay: $25 / per hour Department: Revenue Operations
  Location: SF HQ and US Remote Reports to: Revenue Operations About the Role We are
  looking for a detail oriented RevOps Data Hygiene Coordinator to support day to
  day Salesforce data cleanup and maintenance. This role is highly executional and
  focused on accuracy, consistency, and following defined processes. This is a great
  opportunity for a college student or recent graduate who wants hands on exposure
  to Revenue Operations, Salesforce, and SaaS sales workflows. You will work from
  clear guidelines and dashboards and will not be responsible for building automations,
  designing systems, or making strategic decisions. Job Description: Review Salesforce
  and Salesforce CPQ records to identify human errors such as missing fields, incorrect
  selections, or inconsistent data. Identify and merge duplicate Account records,
  triaging an existing merge request process. Own day to day Account hierarchy maintenance,
  including processing hierarchy change requests and validating parent child relationships.
  Support ad hoc data cleanup projects related to reporting, forecasting, or territory
  carving. Review sales crediting and commission related fields for completeness and
  obvious errors prior to downstream processing. You might be a good fit if:&nbsp;
  Currently enrolled college student or recent graduate, or equivalent practical experience.
  Extremely high attention to detail and comfort working with repetitive tasks. Interest
  in Revenue Operations, Sales Operations, or business systems. Ability to follow
  documented processes consistently. Comfort working in Salesforce or willingness
  to learn quickly. Strong written communication and basic spreadsheet skills. Nice
  to Have but Not Required Prior exposure to Salesforce or CRM systems. Experience
  with data entry, QA, or administrative operations. Interest in SaaS or go to market
  teams. Working Details Hours: Temporary Part time 15 hours/week Location: SF HQ
  and US Remote Training: Full onboarding and clear documentation provided. Temporary
  employees may be eligible for paid holiday and time off, statutory leaves of absence,
  and company-sponsored medical benefits depending on their Fixed Term Contract, hours
  and their country/state of employment.'
