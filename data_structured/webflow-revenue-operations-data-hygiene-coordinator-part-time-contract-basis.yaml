company_overview: 'Webflow empowers teams — from startups to the Fortune 500 — to
  design, build, and grow for the web, all without writing a single line of code.
  Simply put: we’re changing the way the internet gets built. Instead of relying on
  long dev cycles or heavy engineering support, Webflow lets teams move from idea
  to launch faster — bringing creativity and speed together in one place. Designers,
  marketers, and developers use Webflow to collaborate visually, experiment freely,
  and publish confidently. Whether you’re launching your first landing page or reimagining
  a global brand site, Webflow gives you the flexibility to do it your way.More than
  300,000 organizations use Webflow to build experiences that connect with their audiences
  and scale with their ambitions. Our customers span industries and time zones, but
  they share the same goal: to create beautiful, performant websites that grow their
  business and tell their story.As the web evolves, we’re building for what’s next.
  Our AI-native platform helps teams design smarter, publish faster, and optimize
  every part of their web presence, all from one connected workspace.'
