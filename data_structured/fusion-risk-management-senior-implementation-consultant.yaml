location: USA
date_posted: '2026-03-09'
description_html: '<strong>The Role</strong><br>Fusion''s Implementation Consultant
  II is a key client facing role within our Customer Team. Implementation Consultants
  are highly sought after for their knowledge of Salesforce, the Fusion Framework
  ®, and our clients. Our mission is to enable our clients to get the most out of
  our software, through a positive project experience. Implementation Consultants
  will work within large and small teams and work with various clients in different
  scales of complexity. We rely on our Senior Implementation Consultants to help the
  clients understand our platform as well as delivering project scope to a high standard.
  <br><strong>Key Responsibilities:</strong><br><ul> <li>Support the end-to-end delivery
  of Fusion projects, implementing cloud-based software on the Force.com platform</li></ul><ul><li>Follow
  Fusion''s project methodology and tools to drive our teams and our clients to successful
  outcomes</li></ul><ul><li>Learn industry basics and the functional solutions of
  the Fusion Framework ®</li></ul><ul><li>Hands-on configuration using Force.com and
  Fusion tools</li></ul><ul><li>Lead and support other technical tasks including testing,
  documentation, environment migrations, and user story management</li></ul><ul><li>Lead
  general project activities including attending meetings, taking notes, and giving
  demonstrations</li></ul><ul><li>Consistently and effectively communicate with internal
  stakeholders and client teams</li></ul><ul><li>Achieve technical certifications
  throughout your career at Fusion (e.g. Salesforce App Builder, Salesforce Administrator,
  and others)</li></ul><ul><li>Leverage AI tools to enhance efficiency, problem-solving,
  and innovation in your daily work.</li></ul><ul><li>Document and share AI use cases
  and best practices to support continuous learning and elevate team performance.</li>
  </ul> <br><strong>Knowledge, Skills, and Abilities:</strong><br><ul> <li>Ability
  to learn new skills with the support of your manager and via self-paced training
  courses</li></ul><ul><li>Ability to work on multiple projects simultaneously</li></ul><ul><li>Collaborative
  approach working with teams of varying sizes and clients in different industries</li></ul><ul><li>Professional
  written, verbal, and presentation skills</li></ul><ul><li>Tools: Jira, MS Office
  Suite, Salesforce CRM, Force.com platform, Gearset</li></ul><ul><li>Familiarity
  with AI tools and a willingness to incorporate them into day-to-day work to improve
  efficiency and effectiveness.</li> </ul> <br><strong>Qualifications (Education and
  Experience) </strong><br><ul> <li>2-5 years of experience working with external
  clients on technology projects</li></ul><ul><li>Bachelor''s degree or higher in
  Information Systems, Business Administration, Computer Science, or a related discipline
  preferred</li></ul><ul><li>Salesforce Business Analyst Certification</li> </ul>
  <br><strong>Milestones for the First Six Months </strong><br><strong>In one month,
  you will: </strong><br><ul> <li>Complete all HR-related onboarding requirements</li></ul><ul><li>Participate
  in Fusion New Hire Bootcamp and Industry trainings</li></ul><ul><li>Start project
  work (assignment or shadow)</li> </ul> <br><strong>In three months, you will: </strong><br><ul>
  <li>Demonstrate consistent use of Fusion tools and procedures</li></ul><ul><li>Begin
  project work with small to medium cases with manager support</li></ul><ul><li>Start
  to work with project manager to contribute and collaborate on larger project scopes</li></ul><ul><li>Start
  delivering system demos to clients with assistance</li> </ul> <br><strong>In six
  months, you will: </strong><br><ul> <li>Lead system demos to clients with support
  from your team</li></ul><ul><li>Be able to communicate technical information to
  clients</li></ul><ul><li>Begin to build rapport with clients</li></ul><ul><li>Independently
  drive the successful completion of assigned work</li> </ul> <br><strong>Compensation
  &amp; Benefits: </strong><br>The annual base salary range for this position is $100,000-$115,000,
  depending on the candidate''s experience, qualifications, and relevant skill set.
  The position is also eligible for an annual bonus. In addition, Fusion offers a
  comprehensive suite of employee benefits including but not limited to medical, dental,
  vision, and a 401(k) plan. <br><strong>Disclaimers:</strong><br>Fusion is an Equal
  Opportunity Employer. All qualified applicants will receive consideration for employment
  without regard to race, color, religion, disability, age, pregnancy, military service
  or discharge status, genetic information, sex, sexual orientation, gender identity,
  or national origin. Nothing in this job posting should be construed as an offer
  or guarantee of employment.'
description_text: 'The Role Fusion''s Implementation Consultant II is a key client
  facing role within our Customer Team. Implementation Consultants are highly sought
  after for their knowledge of Salesforce, the Fusion Framework ®, and our clients.
  Our mission is to enable our clients to get the most out of our software, through
  a positive project experience. Implementation Consultants will work within large
  and small teams and work with various clients in different scales of complexity.
  We rely on our Senior Implementation Consultants to help the clients understand
  our platform as well as delivering project scope to a high standard. Key Responsibilities:
  Support the end-to-end delivery of Fusion projects, implementing cloud-based software
  on the Force.com platform Follow Fusion''s project methodology and tools to drive
  our teams and our clients to successful outcomes Learn industry basics and the functional
  solutions of the Fusion Framework ® Hands-on configuration using Force.com and Fusion
  tools Lead and support other technical tasks including testing, documentation, environment
  migrations, and user story management Lead general project activities including
  attending meetings, taking notes, and giving demonstrations Consistently and effectively
  communicate with internal stakeholders and client teams Achieve technical certifications
  throughout your career at Fusion (e.g. Salesforce App Builder, Salesforce Administrator,
  and others) Leverage AI tools to enhance efficiency, problem-solving, and innovation
  in your daily work. Document and share AI use cases and best practices to support
  continuous learning and elevate team performance. Knowledge, Skills, and Abilities:
  Ability to learn new skills with the support of your manager and via self-paced
  training courses Ability to work on multiple projects simultaneously Collaborative
  approach working with teams of varying sizes and clients in different industries
  Professional written, verbal, and presentation skills Tools: Jira, MS Office Suite,
  Salesforce CRM, Force.com platform, Gearset Familiarity with AI tools and a willingness
  to incorporate them into day-to-day work to improve efficiency and effectiveness.
  Qualifications (Education and Experience) 2-5 years of experience working with external
  clients on technology projects Bachelor''s degree or higher in Information Systems,
  Business Administration, Computer Science, or a related discipline preferred Salesforce
  Business Analyst Certification Milestones for the First Six Months In one month,
  you will: Complete all HR-related onboarding requirements Participate in Fusion
  New Hire Bootcamp and Industry trainings Start project work (assignment or shadow)
  In three months, you will: Demonstrate consistent use of Fusion tools and procedures
  Begin project work with small to medium cases with manager support Start to work
  with project manager to contribute and collaborate on larger project scopes Start
  delivering system demos to clients with assistance In six months, you will: Lead
  system demos to clients with support from your team Be able to communicate technical
  information to clients Begin to build rapport with clients Independently drive the
  successful completion of assigned work Compensation &amp; Benefits: The annual base
  salary range for this position is $100,000-$115,000, depending on the candidate''s
  experience, qualifications, and relevant skill set. The position is also eligible
  for an annual bonus. In addition, Fusion offers a comprehensive suite of employee
  benefits including but not limited to medical, dental, vision, and a 401(k) plan.
  Disclaimers: Fusion is an Equal Opportunity Employer. All qualified applicants will
  receive consideration for employment without regard to race, color, religion, disability,
  age, pregnancy, military service or discharge status, genetic information, sex,
  sexual orientation, gender identity, or national origin. Nothing in this job posting
  should be construed as an offer or guarantee of employment.'
