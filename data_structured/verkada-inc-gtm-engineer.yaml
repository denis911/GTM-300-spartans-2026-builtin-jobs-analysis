company_overview: Verkada is the world’s largest cloud-based B2B physical security
  platform, offering a seamless blend of tech and safety. With six product lines —
  video security cameras, access control, environmental sensors, alarms, workplace
  systems, and intercoms — all integrated on one cloud platform, Verkada is designed
  for simplicity and scalability. Our real-time insights help organizations keep their
  spaces safe and comfortable while taking swift action to minimize security risks,
  workplace hassles, and costly inefficiencies. Founded in 2016 and backed by over
  $460M in funding, we’ve grown fast, with 16 offices spread across four continents,
  2,000+ employees, and 26,000+ customers in 85+ countries — including 82 of the Fortune
  500.Created by Stanford computer scientists and security experts, alongside Cisco
  Meraki’s co-founder and COO Hans Robertson, Verkada calls San Mateo, CA home. We
  also have offices in Salt Lake City, Tampa, Phoenix, Austin, London, Sydney, Taiwan,
  New York, Philadelphia, Toronto, Mexico City, Seattle, Tokyo, and Korea.
