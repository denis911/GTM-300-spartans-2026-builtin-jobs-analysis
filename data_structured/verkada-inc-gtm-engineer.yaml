description_html: <p><b><strong>Who We Are</strong></b><p>Verkada is transforming
  how organizations protect their people and places with an integrated, AI-powered
  platform. A leader in cloud physical security, Verkada helps organizations strengthen
  safety and efficiency through one connected software platform that includes solutions
  for video security, access control, air quality sensors, alarms, intercoms, and
  visitor management.<br>Over 30,000 organizations worldwide, including more than
  100 companies in the Fortune 500, trust Verkada as their physical security layer
  for easier management, intelligent control, and scalable deployments. Founded in
  2016, Verkada has expanded rapidly with 15 offices and 2,200+ full-time employees.</p></p><p><b>About
  the Role</b><p>As a GTM Engineer on the Growth Engineering team, you will be at
  the forefront of developing and sustaining the vital growth infrastructure at Verkada.
  This role requires someone with a profound technical acumen combined with a passion
  for tackling complex business challenges. You will be instrumental in engineering
  robust, scalable systems that underpin our most mission-critical growth strategies
  and initiatives. This role will report into our Engineering Manager.&nbsp;</p><p>We
  are committed to a thriving in-office culture. This role requires that you be on-site
  at our HQ in San Mateo, CA 5 days a week.</p><b>What You'll Do</b><ul><li>Design
  and implement reliable and observable infrastructure that will help power Verkada's
  growth engine.</li><li>Contribute to the maintenance and enhancement of backend
  systems to process the purchase journey and optimize automated workflows.</li><li>Build
  a complex multivariate experimentation infrastructure to improve the marketing funnel's
  efficiency.</li><li>Ensure the seamless integration of new technologies and platforms
  with existing infrastructure.</li><li>Work cross functionally with Sales, Marketing,
  and Product, teams to translate complex business requirements, define feature specifications
  and implement them to provide end users with a better product experience.</li><li>Drive
  innovation in marketing technology, continuously seeking ways to improve efficiency
  and effectiveness in our growth efforts.</li></ul><b>What You Bring</b><ul><li>Bachelor’s
  degree in Computer Science (or similar degree).</li><li>3+ years of experience in
  a Software Engineering role using backend technologies (python or similar language).</li><li>Experience
  owning software architecture and API design.</li><li>Ability to learn new systems
  / technologies quickly. Big plus if you enjoy proactively experimenting with new
  technologies and approaching traditional business challenges with unique engineering
  ideas.</li><li>Ability and strong interest in communicating cross-functionally with
  non-technical stakeholders to derive requirements and architect solutions without
  a PM.</li><li>Experience shipping large-scale, highly visible, external facing features/products
  is a plus.</li></ul><b>US Employee Benefits</b><p>Verkada is committed to fostering
  a workplace environment that prioritizes the holistic health and wellbeing of our
  employees and their families by offering comprehensive wellness perks, benefits,
  and resources. Our benefits and perks programs include, but are not limited to:</p><ul><li>Healthcare
  programs that can be tailored to meet the personal health and financial well-being
  needs - Premiums are 100% covered for the employee under at least one plan and 80%
  for family premiums under all plans</li><li>Nationwide medical, vision and dental
  coverage</li><li>Health Saving Account (HSA) with annual employer contributions
  and Flexible Spending Account (FSA) with tax saving options</li><li>Expanded mental
  health support</li><li>Paid parental leave policy &amp; fertility benefits</li><li>Time
  off to relax and recharge through our paid holidays, firmwide extended holidays,
  flexible PTO and personal sick time</li><li>Professional development stipend</li><li>Fertility
  Stipend&nbsp;</li><li>Wellness/fitness benefits</li><li>Healthy lunches provided
  daily</li><li>Commuter benefits</li></ul><b>Additional Information</b><ul><li>We
  do sponsor and take over sponsorship of employment visas for this role. If we make
  you an offer, we will make every reasonable effort to get you a visa.</li></ul></p><p><p><p><p><span><strong><span>Annual
  Pay Range</span></strong></span></p><p>At Verkada, we want to attract and retain
  the best employees, and compensate them in a way that appropriately and fairly values
  their individual contribution to the company. With that in mind, we carefully consider
  a number of factors to determine the appropriate starting pay for an employee, including
  their primary work location and an assessment of a candidate's skills and experience,
  as well as market demands and internal parity. A Verkada employee may be eligible
  for additional forms of compensation, depending on their role, including sales incentives,
  discretionary bonuses, and/or equity in the company in the form of restricted stock
  units (RSUs)</p><p>Below is the annual on-target earnings (OTE) range for full-time
  employees for this position, comprised of base compensation and commissions (if
  applicable).</p></p><p>Estimated Annual Pay Range</p><p><span>$100,000</span><span>—</span><span>$200,000
  USD</span></p></p></p><p><b><strong>Verkada Is An Equal Opportunity Employer</strong></b><p>As
  an equal opportunity employer, Verkada is committed to providing employment opportunities
  to all individuals. All applicants for positions at Verkada will be treated without
  regard to race, color, ethnicity, religion, sex, gender, gender identity and expression,
  sexual orientation, national origin, disability, age, marital status, veteran status,
  pregnancy, or any other basis prohibited by applicable law.</p><p><em>Your application
  will be handled in accordance with our Candidate Privacy Policy.&nbsp;</em></p></p>
