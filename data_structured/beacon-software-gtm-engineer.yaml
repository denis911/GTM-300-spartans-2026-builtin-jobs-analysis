company_overview: 'Beacon is the permanent home for Main Street software and services
  supporting the real economy. We buy, build, and grow exceptional vertical software
  businesses, preserving their legacy while expanding the scale of their founders’
  ambitions.Our model is different. Unlike private equity, we don’t buy to flip. We
  hold forever, investing in product, customers, and teams for the long term. Founders
  who join Beacon gain more than capital: they access in-house engineering, AI, design,
  and fintech expertise, as well as a network spanning Silicon Valley, Wall Street,
  and Main Street. We simplify the back office, accelerate growth with proven playbooks,
  and give founders the freedom to focus on what they do best: building great software
  for their markets.Every company under the Beacon umbrella remains independent, with
  its own brand and customers, but benefits from shared resources and immediate value
  creation. Our approach has already helped portfolio companies win major RFPs, modernize
  technology stacks, and expand market share.Beacon was founded by experienced operators
  and investors from companies like D1 Capital, Instacart, Sequoia Capital, and Databricks
  who believe ambitious software deserves a forever home. Our success is measured
  founder by founder, company by company, and we’re just getting started.'
