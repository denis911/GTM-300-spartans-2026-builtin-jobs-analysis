description_html: '<p><p>Beacon Software is a permanent capital holding company which
  acquires and grows essential businesses. We are a profitable series B+ firm that
  combines great technologists, operators and M&amp;A professionals to accelerate
  the scale of the ambition of the dozens of businesses we own and operate. We are
  supported by capital from tier-1 venture capital, crossover, and endowment investors
  as well as the founders of the leading technology companies from the past decade.</p><p>We
  are growing our team in Toronto, San Francisco, and New York. Apply below.</p></p><b>GTM
  Engineer</b><p>We''re looking for a GTM Engineer to build and optimize our revenue-generating
  machine across our portfolio of 8-10+ companies. This role is about transforming
  our growth function from executing playbooks to engineering systematic revenue acceleration.
  You''ll design experiments, build scalable systems, and deploy AI-powered automation
  to drive pipeline growth and reduce sales cycles across our portfolio.</p><p>This
  is not a traditional marketing or sales role. You''re building the manufacturing
  processes for a GTM factory—designing the systems that our offshore contractors
  and portfolio company teams will execute at scale.</p><b><strong>What You''ll</strong>
  Own</b><p><strong>GTM Experimentation &amp; Playbook Engineering</strong>: Launch
  20+ experiments per quarter testing messaging, channels, targeting, pricing, and
  sales processes. Transform wins into documented, repeatable playbooks that contractors
  can execute independently. Analyze what works at one portfolio company and rapidly
  deploy across similar businesses.</p><p><strong>AI &amp; Automation Implementation</strong>:
  Deploy AI tools and custom automation to eliminate manual GTM work. Train teams
  to leverage AI for lead enrichment, email sequencing, and outreach personalization.
  Build Beacon''s competitive advantage through intelligent automation of revenue
  generation.</p><p><strong>Marketing Strategy &amp; Content</strong>: Develop and
  test inbound strategies (SEO, GEO, content marketing). Coordinate with agencies
  and portfolio companies to improve messaging, case studies, and mixed media usage.
  Generate 100+ qualified MQLs per quarter through systematic experimentation.</p><p><strong>Sales
  Process Optimization</strong>: Diagnose pipeline bottlenecks by analyzing where
  deals stall and why conversion rates drop. Reduce average sales cycle length by
  20% through systematic process improvements and funnel optimization.</p><b>Success
  Metrics</b><ul><li>Launch 20+ documented GTM experiments per quarter with clear
  learnings</li><li>Increase average portfolio company pipeline generation by 50%
  year-over-year</li><li>Deploy 3-5 proven, scalable playbooks across multiple portfolio
  companies</li><li>Reduce average sales cycle length by 20% through process optimization</li><li>Generate
  100+ qualified MQLs per quarter across the portfolio</li></ul><b>Who You Are</b><ul><li><strong>Entrepreneurial
  Builder</strong>: Ideally an ex-founder/early stage operator (first 5 GTM hires)
  who has built GTM motions from scratch and understands what it takes to generate
  revenue in ambiguous environments</li><li><strong>Systematic Experimenter</strong>:
  You design rapid tests, measure results rigorously, and scale what works</li><li><strong>AI-Native
  Operator</strong>: You see automation opportunities everywhere and know how to deploy
  tools that multiply human effort</li><li><strong>Data-Driven</strong>: You diagnose
  problems through funnel analysis and let metrics guide your strategy</li><li><strong>Startup
  Operator</strong>: You''ve worked in fast-growing B2B SaaS companies and understand
  the full GTM motion from lead gen to close</li></ul><b>Requirements</b><ul><li>4-6+
  years in growth, product marketing, or sales engineering roles at B2B SaaS companies</li><li><strong>Alternatively,
  founder/0-to-1 operator experience strongly preferred</strong> - you''ve built a
  GTM motion from zero to one</li><li>Proven track record of running systematic GTM
  experiments and scaling winners</li><li>Deep familiarity with modern GTM tools (HubSpot,
  Apollo, Outreach, Clay, etc.)</li><li>Comfortable with AI tools and automation platforms</li><li>Strong
  analytical skills with the ability to diagnose pipeline bottlenecks and conversion
  issues</li><li>Excellent written communication for creating playbooks and documentation</li><li>Self-starter
  who thrives in ambiguous, high-autonomy environments</li></ul><p><p><strong>Our
  Values at Beacon Software</strong></p><ul><li><span>Humility</span>: We acknowledge
  that the path to getting to the right answer involves being wrong along the way.
  We have strong beliefs which are weakly held. We actively seek new ideas and believe
  we can learn from anyone at any time.&nbsp;</li><li><span>Honesty</span>: We are
  truth seeking in our approach to business problems. Business is a repeat game and
  we believe that human relationships generate alpha. We understand that trust is
  earned over a lifetime and can be lost in an instant.&nbsp;</li><li><span>Hunger</span>:
  We play to win. We hold ourselves to high standards and will not be outworked. We
  take pride in having a deep sense of responsibility to ourselves, each other, our
  partners, and our customers. We believe to whom much is given much is expected.</li><li><span>Horizon</span>:
  We seek to build a generational software company. This will take decades. We manage
  our expectations and those of our partners to take advantage of the 8th wonder of
  the world - compounding growth.</li></ul></p>'
