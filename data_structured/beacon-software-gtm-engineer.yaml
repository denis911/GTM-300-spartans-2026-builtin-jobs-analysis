  You design rapid tests, measure results rigorously, and scale what works AI-Native
  Operator : You see automation opportunities everywhere and know how to deploy tools
  that multiply human effort Data-Driven : You diagnose problems through funnel analysis
  and let metrics guide your strategy Startup Operator : You''ve worked in fast-growing
  B2B SaaS companies and understand the full GTM motion from lead gen to close Requirements
  4-6+ years in growth, product marketing, or sales engineering roles at B2B SaaS
  companies Alternatively, founder/0-to-1 operator experience strongly preferred -
  you''ve built a GTM motion from zero to one Proven track record of running systematic
  GTM experiments and scaling winners Deep familiarity with modern GTM tools (HubSpot,
  Apollo, Outreach, Clay, etc.) Comfortable with AI tools and automation platforms
  Strong analytical skills with the ability to diagnose pipeline bottlenecks and conversion
  issues Excellent written communication for creating playbooks and documentation
  Self-starter who thrives in ambiguous, high-autonomy environments Our Values at
  Beacon Software Humility : We acknowledge that the path to getting to the right
  answer involves being wrong along the way. We have strong beliefs which are weakly
  held. We actively seek new ideas and believe we can learn from anyone at any time.&nbsp;
  Honesty : We are truth seeking in our approach to business problems. Business is
  a repeat game and we believe that human relationships generate alpha. We understand
  that trust is earned over a lifetime and can be lost in an instant.&nbsp; Hunger
  : We play to win. We hold ourselves to high standards and will not be outworked.
  We take pride in having a deep sense of responsibility to ourselves, each other,
  our partners, and our customers. We believe to whom much is given much is expected.
  Horizon : We seek to build a generational software company. This will take decades.
  We manage our expectations and those of our partners to take advantage of the 8th
  wonder of the world - compounding growth.'
