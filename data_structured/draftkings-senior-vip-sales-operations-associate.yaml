description_html: 'At DraftKings, AI is becoming an integral part of both our present
  and future, powering how work gets done today, guiding smarter decisions, and sparking
  bold ideas. It''s transforming how we enhance customer experiences, streamline operations,
  and unlock new possibilities. Our teams are energized by innovation and readily
  embrace emerging technology. We''re not waiting for the future to arrive. We''re
  shaping it, one bold step at a time. To those who see AI as a driver of progress,
  come build the future together.<br><b>The Crown Is Yours</b><br>As a Senior Associate,
  Sales Operations - Process &amp; Enablement, you''ll play a critical role in scaling
  how our VIP Sales Team operates. You''ll sit at the intersection of sales execution,
  enablement, and compliance, building clear, repeatable processes that help the organization
  move faster and operate with confidence. In this high-ownership role, you''ll partner
  cross-functionally with Sales, Compliance, Legal, Marketing, Responsible Gaming,
  and Analytics to drive operational excellence and measurable performance gains.
  You''ll help strengthen the operational and enablement foundation that supports
  productivity, consistency, and revenue growth.<br><b>What you''ll do</b><br><ul><li>Own
  and continuously evolve key Sales programs, ensuring they remain accurate, scalable,
  compliant, and tightly aligned with revenue-driving business objectives.</li><li>Partner
  with Sales Leadership to define program scope and deliver targeted enablement initiatives,
  while collaborating with Operations to resolve process-related cases and uphold
  regulatory and business requirements.</li><li>Identify friction points across Sales
  workflows and proactively implement improvements that increase productivity, reduce
  risk, and accelerate revenue growth.</li><li>Design and deliver high-impact enablement
  programs, including structured training, documentation, and scalable resources that
  reinforce consistent, revenue-driving behaviors.</li><li>Design, document, and continuously
  improve Standard Operating Procedures that drive clarity, consistency, and adoption
  across the Sales Team.</li><li>Lead cross-functional initiatives that align Sales
  Operations with broader organizational priorities and enhance overall commercial
  performance.</li><li>Build and maintain organized, accessible documentation repositories
  that enable long-term scalability, operational consistency, and knowledge sharing.</li><li>Drive
  change management efforts by clearly communicating updates, documenting process
  enhancements, and ensuring strong adoption across the Sales Team.</li></ul><br><b>What
  you''ll bring</b><br><ul><li>A minimum of 2 years of experience in Sales and Sales
  Enablement within a fast-paced or high-growth environment, supporting revenue-generating
  teams through process development, program ownership, and enablement execution.</li><li>Adaptability
  and resilience, with the ability to quickly adjust to shifting priorities, navigate
  ambiguity, and deliver results in an evolving environment.</li><li>Demonstrated
  strength in documentation, process design, and operational execution, with exceptional
  organizational skills and attention to detail.</li><li>Strong written and verbal
  communication skills, with the ability to translate complex processes into clear,
  actionable guidance and influence cross-functional stakeholders without direct authority.</li><li>Familiarity
  with CRM platforms, sales productivity tools, and knowledge management systems;
  experience working in a regulated or compliance-focused environment is strongly
  preferred.</li></ul><br>#LI-MZ1 <br><b>Join Our Team</b><br>We''re a publicly traded
  (NASDAQ: DKNG) technology company headquartered in Boston. As a regulated gaming
  company, you may be required to obtain a gaming license issued by the appropriate
  state agency as a condition of employment. Don''t worry, we''ll guide you through
  the process if this is relevant to your role.<br>The US base salary range for this
  full-time position is 70,500.00 USD - 88,100.00 USD, plus bonus, equity, and benefits
  as applicable. Our ranges are determined by role, level, and location. The compensation
  information displayed on each job posting reflects the range for new hire pay rates
  for the position across all US locations. Within the range, individual pay is determined
  by work location and additional factors, including job-related skills, experience,
  and relevant education or training. Your recruiter can share more about the specific
  pay range and how that was determined during the hiring process. It is unlawful
  in Massachusetts to require or administer a lie detector test as a condition of
  employment or continued employment. An employer who violates this law shall be subject
  to criminal penalties and civil liability.'
