company_overview: It's simple, at DraftKings, we believe life is more fun when you're
  in on the action. For that reason, we’re committed to responsibly creating the world’s
  favorite games and betting experiences. We’re developing the most innovative and
  entertaining real money products and offers; to forever transform how people experience
  sports; to be a fully vertically integrated sports betting operator. It's our ultimate
  goal to build the best, most trusted, and most customer-centric destination for
  our players. We’re defining what it means to build and deliver the most extraordinary
  sports and entertainment experiences. Our global team is trailblazing new markets,
  developing cutting-edge products, and shaping the future of responsible gaming.
