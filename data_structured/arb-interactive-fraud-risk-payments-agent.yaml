description_html: '<p>We are ARB Interactive, the team behind Modo Casino, one of
  the top Social+ platforms in the US. Founded in 2022, we''ve grown to nearly 200
  team members and were named one of LinkedIn''s 2025 Top 50 Startups in the United
  States. We move fast, think big, and love bold ideas that push boundaries (and buttons).
  From new rewards to fresh game mechanics, every challenge is a chance to innovate
  and have fun doing it. Our culture is collaborative, curious, and full of laughter
  because great ideas grow best between coffee, code, and a few epic high-fives.</p><p>We
  are seeking an experienced Fraud, Risk, &amp; Payments Agent with a proven track
  record in iGaming, e-commerce and/or financial institutions. The ideal candidate
  will leverage their technical expertise to protect our platform from fraudulent
  activities while ensuring smooth payment processing for our valued players.</p><p></p><p><strong>Key
  Responsibilities:</strong></p><ul><li><p>Review and investigate suspicious transactions,
  user behaviors, and payment patterns</p></li><li><p>Process payment disputes, chargebacks,
  and refunds according to company policies</p></li><li><p>Monitor and analyze fraud
  trends using various detection tools and platforms</p></li><li><p>Write detailed
  investigation reports and maintain accurate case documentation</p></li><li><p>Collaborate
  with Payment Processors and Third-Party Vendors to resolve complex cases</p></li><li><p>Support
  VIP player transactions and provide excellent customer service</p></li><li><p>Assist
  in updating fraud prevention rules and risk parameters</p><p></p></li></ul><p><strong>Schedule:
  This position requires availability to work 9:00 AM - 5:00 PM ET, including weekends.
  Schedule may vary based on business needs.</strong></p><p></p><p><strong>Technical
  Requirements:</strong></p><ul><li><p>Proficiency in fraud detection platforms (e.g.,
  Kount, Riskified, Sift etc. )</p></li><li><p>Experience with payment processing
  systems (e.g., Fiserv, Nuvei, and Chargeback.com)</p></li><li><p>Strong knowledge
  of CRM platforms and ticketing systems</p></li><li><p>Familiarity with SQL for data
  querying and analysis</p></li><li><p>Experience with social casino back-office tools</p></li></ul><p></p><p><strong>Required
  Skills:</strong></p><ul><li><p>3+ years of fraud prevention experience in social
  casino or gaming industry</p></li><li><p>Exceptional attention to detail in documentation
  and reporting</p></li><li><p>Strong analytical and problem-solving abilities</p></li><li><p>Excellent
  written and verbal communication skills</p></li><li><p>Ability to work independently
  and make sound decisions</p></li><li><p>Experience handling high-value player accounts</p></li><li><p>Knowledge
  of compliance regulations and industry standards</p></li></ul><p><strong>Diversity
  Commitment:</strong> We are focused on building a diverse and inclusive team. We
  welcome people of all backgrounds, experiences, abilities, and perspectives and
  are an equal opportunity employer. We do not discriminate on the basis of race,
  religion, color, national origin, gender, sexual orientation, age, marital status,
  veteran status, or disability status.</p><p></p><p><strong>Important Security Notice</strong>:
  Our recruitment team will only contact candidates through official channels using
  @arbinteractive.com email addresses and via our recruiting platform, Ashby. If you
  find a position on a third party careers page (LinkedIn, Indeed, etc.), the job
  posting will redirect you to our careers page (https://jobs.ashbyhq.com/arb-interactive)
  to begin your application. We will never request payment, banking information, or
  personal identification details during the application process. </p><p></p><p>If
  you''re ever uncertain about the legitimacy of communication claiming to be from
  our company, please forward it to recruiting@arbinteractive.com for verification
  before responding or clicking any links. </p>'
