description_html: '<p>Skydio is the leading US drone company and the world leader
  in autonomous flight, the key technology for the future of drones and aerial mobility.
  The Skydio team combines deep expertise in artificial intelligence, best-in-class
  hardware and software product development, operational excellence, and customer
  obsession to empower a broader, more diverse audience of drone users, from utility
  inspectors to first responders, soldiers in battlefield scenarios and beyond.</p><p><strong>About
  the role:<br></strong> Join Skydio’s GTM AI team to build the data systems and AI-driven
  tools that power our go-to-market engine. You will work at the intersection of revenue
  operations, AI, and data engineering, shipping production-grade solutions that improve
  data quality, surface insights, and enable intelligent automation. This role focuses
  on designing structured datasets and internal applications that support AI workflows.
  You will also contribute to maintaining and optimizing the broader GTM technology
  stack.</p><p><strong>How you''ll make an impact:</strong></p><ul><li><p><strong>AI
  data infrastructure:</strong> Design and build structured datasets that power LLM
  workflows and AI agents. Write data transformations, clean messy CRM data, and define
  reliable schemas across GTM systems.</p></li><li><p><strong>Data pipelines and automation:</strong>
  Build pipelines to ingest, transform, and validate data from core GTM systems. Improve
  data integrity and create reusable data models for analytics and AI use cases.</p></li><li><p><strong>Internal
  tools and applications:</strong> Develop lightweight internal tools using TypeScript
  and React that allow non-technical teams to interact with structured data, trigger
  workflows, and access insights.</p></li><li><p><strong>GTM systems optimization:</strong>
  Support Salesforce and related platforms with data quality improvements, workflow
  enhancements, and operational reliability initiatives.</p></li><li><p><strong>Applied
  AI enablement:</strong> Design structured object sets and feature tables that improve
  LLM performance and reliability. Contribute to building practical AI-driven workflows
  for GTM teams.<br></p></li></ul><p><strong>What makes you a good fit:</strong></p><ul><li><p><strong>Love
  for data:</strong> You enjoy working with complex datasets and take pride in turning
  messy, inconsistent data into structured and reliable systems.</p></li><li><p><strong>AI
  curiosity:</strong> You want to understand the full stack of applied AI, from data
  modeling and semantic retrieval to LLM reasoning and action orchestration.</p></li><li><p><strong>Builder
  mindset:</strong> You enjoy building solutions from the ground up and iterating
  quickly.</p></li><li><p><strong>Business intuition:</strong> You understand, or
  want to learn, how GTM teams operate and what drives revenue outcomes.</p></li><li><p><strong>Project
  management skills:</strong> You can create project plans that track high-level progress
  while also managing detailed task execution.</p></li><li><p><strong>Excellent communicator:</strong>
  You work effectively with sales teams to understand needs, gather requirements,
  and deliver solutions that support deal execution.<br></p></li></ul><p><strong>Bonus
  points:</strong></p><ul><li><p>Prior Salesforce experience</p></li><li><p>Experience
  working with data warehouses (SQL skills highly preferred)</p></li><li><p>Experience
  building Business Intelligence dashboards</p></li><li><p>Experience with prompt
  engineering and  building AI or LLM-powered workflows</p></li></ul><p></p><p><strong>What
  you’ll gain:</strong></p><ul><li><p>Real portfolio pieces including AI tools and
  workflows used by the GTM team</p></li><li><p>End-to-end understanding of GTM systems
  at a high-growth robotics company</p></li><li><p>Direct mentorship from the GTM
  AI team</p></li></ul><p></p><p><strong>Compensation:</strong> </p><ul><li><p>The
  hourly rate for this position is $47/hr for Undergrad, $53/hr for Graduate students,
  and $58/hr for PhD students*. Compensation will vary based on factors, including
  skill level, proficiencies, transferable knowledge, and experience. Interns are
  eligible to receive the following benefits: Paid vacation time, sick leave, holiday
  pay and 401K savings plan. This position and all associated benefits are subject
  to applicable federal, state, and local laws, as well as the Company’s policies
  and eligibility criteria.</p><p>*Compensation for certain positions may vary based
  on the position’s location.<br>#LI-ZD1</p></li></ul><p>At Skydio we believe that
  diversity drives innovation. We have created a multidisciplinary environment that
  embraces the power of diverse perspectives to create elegant solutions for complex
  problems. We are committed to growing our network of people, programs, and resources
  to nurture an inclusive culture.</p><p>Qualified applicants will receive consideration
  for employment without regard to race, color, religion, sex, sexual orientation,
  gender identity, national origin, disability, protected veteran status, or other
  characteristics protected by federal, state or local anti-discrimination laws.</p><p>For
  positions located in the United States of America, Skydio, Inc. uses E-Verify to
  confirm employment eligibility. To learn more about E-Verify, including your rights
  and responsibilities, please visit https://www.e-verify.gov/</p>'
