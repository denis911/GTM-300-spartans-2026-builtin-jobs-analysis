company_overview: At SailPoint, we believe enterprise security must start with identity
  at the foundation. Today’s enterprise runs on a diverse workforce of not just human
  but also digital identities—and securing them all is critical. Through the lens
  of identity, SailPoint empowers organizations to seamlessly manage and secure access
  to applications and data at speed and scale. Our unified, intelligent, and extensible
  platform delivers identity-first security, helping enterprises defend against dynamic
  threats while driving productivity and transformation. Trusted by many of the world’s
  most complex organizations, SailPoint secures the modern enterprise.
