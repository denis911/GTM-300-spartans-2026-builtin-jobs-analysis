description_html: '<p>SailPoint is the <span><u>leader in Identity Security</u></span>.
  SailPoint customers represent half of the Fortune 500 and half of the ASX 50. This
  customer strength provides us with a great community of customers, partners and
  analysts who trust SailPoint and our team to solve complex challenges. SailPoint
  continues to grow globally and expanding our global presence creates opportunities
  for top salespeople to become a part of our awesome culture.</p><p>We are recognized
  by analysts such as Gartner, Forrester and KuppingerCole as the leader in the market
  and we continue to push ourselves to define the market rather than follow what the
  analysts or competitors are marketing. Organizations struggle to understand who
  has access to what applications and data, and we help them answer these key questions.
  Identity security is the central control point for risk management for the enterprise.</p><p>We
  are proud of our team and the culture we have built which has led to our employees
  voting us “best places to work” – 15 years in a row.</p><b>About the Role</b><p>SailPoint
  is looking for a strategic and execution-oriented <b>Regional Pipeline Manager</b>
  to help drive operational rigor, alignment, and performance across our global go-to-market
  organization. This role sits at the intersection of Sales, Marketing, Sales Development,
  and Partners, and is responsible for turning strategy into execution — and execution
  into measurable business impact.</p><p>You will own cross-functional demand planning,
  performance cadences, and strategic programs that improve pipeline creation, sales
  productivity, and revenue outcomes. The right candidate is not an order-taker or
  project tracker; they are a <b>business partner who diagnoses problems, recommends
  change, and leads improvement.</b>&nbsp;This is a highly visible role that regularly
  interfaces with executive leadership and influences how the business runs.</p><p><b>What
  You’ll Do</b></p><b>Drive GTM Alignment &amp; Demand Planning</b><ul><li><p>Build
  and manage the centralized demand plan across Sales, Marketing, SDR, and Partner
  organizations</p></li><li><p>Facilitate cross-functional planning sessions to align
  pipeline coverage, capacity, and targets</p></li><li><p>Identify gaps in pipeline
  generation and recommend corrective strategies</p></li><li><p>Ensure accountability
  across stakeholders for pipeline contribution and execution</p></li></ul><b>Lead
  Performance Management Cadences</b><ul><li><p>Own and run operational cadences (weekly,
  monthly, quarterly business reviews)</p></li><li><p>Establish standard metrics and
  performance frameworks across the GTM organization</p></li><li><p>Translate data
  into clear business narratives and actions</p></li><li><p>Partner with leadership
  to proactively identify performance risks and opportunities</p></li></ul><b>Deliver
  Strategic Insights &amp; Recommendations</b><ul><li><p>Analyze business performance
  to uncover root causes, not just report outcomes</p></li><li><p>Develop recommendations
  that influence territory strategy, coverage models, pipeline strategy, and execution</p></li><li><p>Provide
  executive-level presentations with clear storylines and action plans</p></li><li><p>Act
  as a thought partner to senior leaders on how to improve revenue outcomes</p></li></ul><b>Execute
  Sales Plays &amp; Strategic Programs</b><ul><li><p>Design and operationalize global
  and regional sales plays</p></li><li><p>Coordinate execution across Sales, SDRs,
  Marketing, and Partners</p></li><li><p>Monitor adoption and effectiveness and iterate
  based on performance</p></li><li><p>Lead cross-functional initiatives that improve
  productivity and revenue performance</p></li></ul><b></b><b>What Success Looks Like</b><ul><li><p>Sales
  leaders trust your insights and proactively seek your input</p></li><li><p>Cross-functional
  teams operate from a single plan instead of siloed efforts</p></li><li><p>Programs
  drive measurable improvements in pipeline, conversion, or productivity</p></li><li><p>Executives
  use your recommendations to make business decisions</p></li></ul><b></b><b>Required
  Experience</b><ul><li><p>10+ years in Revenue Operations, Sales Operations, Pipeline
  Management or GTM Strategy (Sales Ops preferred)</p></li><li><p>Experience partnering
  directly with Sales, Marketing, SDR, and Partner organizations</p></li><li><p>Demonstrated
  history of analyzing business performance(pipeline health) and recommending strategic
  changes</p></li><li><p>Strong executive communication and presentation skills</p></li><li><p>Experience
  running operational cadences (forecast, pipeline, QBRs, planning cycles)</p></li><li><p>Proven
  ability to influence without authority across multiple senior stakeholders</p></li></ul><b></b><b>Preferred
  Experience</b><ul><li><p>Enterprise B2B SaaS experience</p></li><li><p>Experience
  supporting global field sales organizations</p></li><li><p>Experience designing
  or running sales plays / pipeline programs</p></li><li><p>Familiarity with CRM and
  analytics ecosystems (Salesforce, BI tools, etc.)</p></li></ul><b></b><b>Key Competencies</b><ul><li><p>Strategic
  thinker who operates hands-on</p></li><li><p>Structured problem solver</p></li><li><p>Data
  storyteller</p></li><li><p>Cross-functional influencer</p></li><li><p>Driver of
  accountability and continuous improvement</p></li><li><p>Comfortable challenging
  the status quo</p></li></ul><b></b><b>Travel</b><ul><li><p>Travel Required as per
  business needs.</p></li></ul><p></p><p></p><p>Benefits and Compensation listed vary
  based on the location of your employment and the nature of your employment with
  SailPoint.</p><p></p><p>As a part of the total compensation package, this role may
  be eligible for the SailPoint Corporate Bonus Plan or a role-specific commission,
  along with potential eligibility for equity participation. SailPoint maintains broad
  salary ranges for its roles to account for variations in knowledge, skills, experience,
  market conditions and locations, as well as reflect SailPoint’s differing products,
  industries, and lines of business. Candidates are typically placed into the range
  based on the preceding factors as well as internal peer equity. <span>We estimate
  the base salary, for US-based employees, will be in this range from (min-mid-max,
  USD): </span></p>$140,800 - $237,440.00<p><span>Base salaries for employees based
  in other locations are competitive for the employee’s home location.</span></p><p></p><p>Benefits
  Overview</p><p>1. Health and wellness coverage: Medical, dental, and vision insurance</p><p>2.
  Disability coverage: Short-term and long-term disability</p><p>3. Life protection:
  Life insurance and Accidental Death &amp; Dismemberment (AD&amp;D)</p><p>4. Additional
  life coverage options: Supplemental life insurance for employees, spouses, and children</p><p><span>5.
  Flexible spending accounts for health care, and dependent care; limited purpose
  flexible spending account</span></p><p>6. Financial security: 401(k) Savings and
  Investment Plan with company matching</p><p><span>7. Time off benefits: Flexible
  vacation policy</span></p><p>8. Holidays: 8 paid holidays annually</p><p>9. Sick
  leave</p><p>10. Parental support: Paid parental leave</p><p>11. Employee Assistance
  Program (EAP) and Care Counselors</p><p>12. Voluntary benefits: Legal Assistance,
  Critical Illness, Accident, Hospital Indemnity and Pet Insurance options</p><p>13.
  Health Savings Account (HSA) with employer contribution</p><p></p><p>SailPoint is
  an equal opportunity employer and we welcome all qualified candidates to apply to
  join our team.&nbsp; All qualified applicants will receive consideration for employment
  without regard to race, color, religion, sex, sexual orientation, gender identity,
  national origin, disability, protected veteran status, or any other category protected
  by applicable law. &nbsp;</p><p>Alternative methods of applying for employment are
  available to individuals unable to submit an application through this site because
  of a disability. Contact applicationassistance@sailpoint.com or mail to 11120 Four
  Points Dr, Suite 100, Austin, TX 78726, to discuss reasonable accommodations. &nbsp;NOTE:
  Any unsolicited resumes sent by candidates or agencies to this email will not be
  considered for current openings at SailPoint.</p>'
