description_html: '<p>Runpod is pioneering the future of AI and machine learning,
  offering cutting-edge cloud infrastructure for full-stack AI applications. Founded
  in 2022, we are a rapidly growing, well-funded company with a remote-first organization
  spread globally. Our mission is to create a foundational platform for developers
  to build and run custom AI systems that scale. Join us as we shape the future of
  AI.</p><p>We’re looking for a Sr Director of Software Engineering to lead and scale
  Runpod’s&nbsp;<strong>product-delivery engineering </strong>organization. This role
  owns the end-to-end delivery of customer-facing platform features - from roadmap
  execution to high-quality launches - across multiple teams. You’ll build the operating
  rhythm, culture, and technical direction that help Runpod ship quickly, safely,
  and consistently as demand scales.&nbsp;</p><p>You will partner tightly with Product,
  Design, GTM, and Infrastructure leadership.Your focus is ensuring our customers
  experience Runpod as the fastest, most intuitive path to training and running AI
  inference workloads.&nbsp;</p><p><strong>Responsibilities&nbsp;</strong></p><ul><li><strong>Own
  Product Feature Delivery: </strong>Lead multiple engineering teams responsible for
  shipping new features and improving Runpod’s customer experience across console,
  APIs, and developer workflows. Ensure predictable, high-velocity execution.&nbsp;</li><li><strong>Translate
  Roadmap into Results: </strong>Partner with Program management, Product and GTM
  to shape strategy, define quarterly goals, and convert requirements into clear technical
  scopes, milestones, and measurable outcomes.&nbsp;</li><li><strong>Build a High-Output
  Org: </strong>Hire, mentor, and grow engineering managers and senior ICs. Create
  a culture of ownership, speed, and craft in a remote-first environment.&nbsp;</li><li><strong>Drive
  Cross-Functional Launch Excellence: </strong>Run feature lifecycle processes - discovery
  support, design/architecture reviews, build phases, QA and rollout plans, release
  comms, and post-launch iteration.&nbsp;</li><li><strong>Continuously Improve Engineering
  System &amp; Flow: </strong>Drive measurable improvements in delivery and reliability
  through metrics such as cycle time, throughput, defect failure rate, incident frequency,
  escape defects, adoption, and retention.</li><li><strong>Customer-Backed Prioritization:&nbsp;</strong>Ensure
  engineering work aligns to user impact and business value. Constantly leverage customer
  insights, product analytics, and operational data to refine priorities.</li><li><strong>Quality
  &amp; Velocity Leadership:&nbsp;</strong>Balance speed and reliability by improving
  automated testing, staging/preview environments, observability for product surfaces,
  and regression prevention.</li><li><strong>Architectural Stewardship Without Becoming
  a Bottleneck:&nbsp;</strong>Provide architectural oversight for product systems
  (backend services, APIs, user workflows, integrations), ensuring scalability and
  coherence without bottlenecking teams.</li><li><strong>Partner with Infrastructure
  Leadership:&nbsp;</strong>Coordinate dependencies cleanly with infra/SRE teams to
  ensure high quality product delivery.&nbsp;</li></ul><p><strong>Requirements&nbsp;</strong></p><ul><li><strong>Engineering
  Leadership Experience: </strong>7+ years leading software engineering teams including
  managers and/or multiple squads (80+ person group), with a proven record of shipping
  customer-facing products.&nbsp;</li><li><strong>Product Delivery Strength: </strong>Demonstrated
  ability to take complex roadmap goals from concept through launch, balancing scope,
  risk, timelines, and quality.&nbsp;</li><li><strong>Full-Stack or Backend Product
  Expertise: </strong>8+ years building SaaS, platforms, or developer-facing products.
  Comfortable with modern backend stacks and pragmatic architectural decisions.&nbsp;</li><li><strong>Remote-First
  Operating Excellence: </strong>Experience building culture, accountability, and
  momentum across distributed teams.&nbsp;</li><li><strong>Process &amp; Metrics Mindset:
  </strong>Strong use of delivery metrics (cycle time, throughput, escape defects,
  reliability, adoption), and experience improving team flow.&nbsp;</li><li><strong>Communication
  &amp; Collaboration: </strong>Clear written and verbal communication, strong stakeholder
  management, and calm leadership through ambiguity.&nbsp;</li><li><strong>Successful
  completion of a background check.&nbsp;</strong></li></ul><p><strong>Preferred Qualifications</strong></p><ul><li>Experience
  building cloud or developer platforms, APIs, or workflow-heavy products used by
  technical customers.&nbsp;</li><li>Expertise with AI/ML product surfaces such as
  job orchestration UX, model deployment flows, observability dashboards, or billing/usage
  systems.&nbsp;</li><li>Track record of scaling product teams in high-growth environments.</li><li>Open-source
  contributions or recognition with communities of developers.</li></ul><p><strong>What
  You’ll Receive:</strong></p><ul><li>The competitive base pay for this position ranges
  from ($225,000 - $325,000). This salary range may be inclusive of several career
  levels at Runpod and will be narrowed during the interview process based on a number
  of factors, including the candidate’s experience, qualifications, and location</li><li>Meaningful
  equity in a fast-growing company- everyone on the team receives stock options —
  your impact drives our growth, and you share in the upside.</li><li>Generous medical,
  dental &amp; vision plans — we cover 100% for all employees and partial for dependents.&nbsp;</li><li>Flexible
  PTO- take the time you need to recharge</li><li>Most roles are remote work first
  with an inclusive, collaborative teams utilizing slack as the main form of internal
  communication&nbsp;</li><li>Join a passionate team on the cutting edge of AI infrastructure
  — where culture, learning, and ownership are at the heart of how we scale.</li><li>$1,200
  Home Office &amp; Equipment Stipend-<strong> </strong>We set you up for success
  from day one with gear and support to create your ideal workspace</li></ul><p>Runpod
  is committed to maintaining a workplace free from discrimination and upholding the
  principles of equality and respect for all individuals. We believe that diversity
  in all its forms enhances our team. As an equal opportunity employer, Runpod is
  committed to creating an inclusive workforce at every level. We evaluate qualified
  applicants without regard to race, color, religion, sex, sexual orientation, gender
  identity, national origin, age, marital status, protected veteran status, disability
  status, or any other characteristic protected by law. We welcome every qualified
  candidate eligible to work in the United States; however, we are currently unable
  to sponsor employment visas</p>'
