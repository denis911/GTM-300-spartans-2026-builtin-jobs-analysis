company_overview: We're a global community of bold visionaries and resourceful doers
  who are shaping the future of Dropbox—and with it the future of work. Our Virtual
  First model combines the flexibility of a distributed workplace with the power of
  human connection, making space for both meaningful work and meaningful relationships.
  With our start-up mindset and enterprise-level opportunities, you can be who you
  are and grow into who you’re meant to be. Here, you can own your impact to make
  work more intuitive, joyful, and human—for you as a Dropboxer and for hundreds of
  millions of people worldwide. If you're ready to push boundaries—and yourself—Dropbox
  is ready for you.
