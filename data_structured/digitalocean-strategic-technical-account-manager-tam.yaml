description_html: '<p><p>Dive in and do the best work of your career at DigitalOcean.
  Journey alongside a strong community of top talent who are relentless in their drive
  to build the simplest scalable cloud. If you have a growth mindset, naturally like
  to think big and bold, and are energized by the fast-paced environment of a true
  industry disruptor, you’ll find your place here. &nbsp;We value winning together—while
  learning, having fun, and making a profound difference for the dreamers and builders
  in the world.&nbsp;</p></p><p>We are looking for a Strategic Technical Account Manager
  who is passionate about making an impact, builds genuine relationships with senior
  stakeholders, and understands how to integrate infrastructure choices into business
  strategy.</p><p>As a Strategic Technical Account Manager (TAM) at DigitalOcean,
  you will join a dynamic team dedicated to revolutionizing cloud computing and AI.&nbsp;</p><b><strong>What
  You’ll Do:</strong></b><p><strong>Strategic Relationship Management</strong></p><ul><li>Own
  the technical relationship with DigitalOcean’s highest-value customers, including
  Fortune 500 companies and global technology leaders.</li><li>Serve as the trusted
  technical advisor and executive-facing point of contact, building deep, lasting
  relationships with VP- and SVP-level stakeholders.</li><li>Drive regular technical
  and strategic alignment sessions (QBRs, EBRs), proactively shaping the customer’s
  roadmap to maximize the value of DigitalOcean infrastructure.</li><li>Operate as
  a thought partner, challenging customers to modernize, optimize, and scale AI/ML
  and GPU workloads using cutting-edge cloud architecture patterns.</li></ul><p><strong>Executive
  Presence &amp; Influence</strong></p><ul><li>Engage with C-level and VP-level contacts
  with confidence, clarity, and authority.</li><li>Deliver high-impact, boardroom-ready
  presentations on architecture decisions, cost-performance tradeoffs, and innovation
  opportunities.</li><li>Navigate complex org structures, ensuring DigitalOcean maintains
  executive alignment and account control at every level.</li></ul><p><strong>Technical
  Consultation &amp; Innovation Support</strong></p><ul><li>Provide expert guidance
  on designing and scaling AI/ML, containerized, and GPU-intensive workloads on DigitalOcean.</li><li>Assist
  customers with architectural planning, workload migration, performance tuning, and
  incident response.</li><li>Collaborate directly with engineering and product teams
  to address customer roadblocks and influence the product roadmap based on enterprise
  needs.</li></ul><p><strong>Growth, Retention &amp; Advocacy</strong></p><ul><li>Own
  technical success across a portfolio of DigitalOcean’s largest and most strategic
  accounts.</li><li>Identify opportunities for workload expansion, cost optimization,
  and operational efficiency.</li><li>Act as the voice of the customer, providing
  structured feedback to influence DigitalOcean''s offerings and go-to-market strategies.<br>Lead
  cross-functional account planning with Account Management, Product, and Engineering.</li></ul><b><strong>What
  You’ll Add to DigitalOcean:</strong></b><p><strong>Enterprise Customer Experience</strong></p><ul><li>7+
  years supporting enterprise or strategic accounts in a customer-facing technical
  role (TAM, Solutions Architect, or equivalent).</li><li>Experience working with
  large-scale organizations like AMD, Intel, or similar, including managing executive-level
  relationships and navigating matrixed stakeholders.</li><li>Deep understanding of
  cloud architecture for AI/ML, including GPU orchestration, inference/training pipelines,
  and model deployment.</li></ul><p><strong>Technical Depth</strong></p><ul><li>Proficient
  in at least one major cloud platform (AWS, GCP, Azure) and familiar with DigitalOcean
  or other developer-focused platforms.</li><li>Strong hands-on skills with Linux
  systems, networking, containers (Docker/Kubernetes), and automation (Terraform,
  Ansible).<br><span>Programming/scripting</span> in Python, Go, or similar—especially
  relevant to AI/ML and MLOps use cases.</li><li>Understanding of AI/ML infrastructure
  stacks: PyTorch, TensorFlow, ONNX, Hugging Face, NVIDIA Triton, etc.</li><li>Understanding
  of AI/ML infrastructure, including frameworks like PyTorch, TensorFlow, and ONNX,
  with hands-on experience optimizing GPU workloads on both NVIDIA (CUDA, TensorRT)
  and AMD (ROCm, MIOpen) platforms.</li><li>Comfort with modern DevOps and data stack
  tools (CI/CD, GitOps, observability, pipelines).</li></ul><p><strong>Executive Presence
  &amp; Communication</strong></p><ul><li>Proven ability to engage with and influence
  executive decision-makers.</li><li>Exceptional communication skills, including the
  ability to translate complex technical topics into strategic business impact.</li><li>Comfortable
  presenting to large audiences, running technical workshops, and defending architectural
  decisions.</li></ul><b>Bonus Points</b><ul><li>Cloud certifications (AWS SA Pro,
  GCP PCA, Azure Architect) or NVIDIA certifications.</li><li>Experience with high-performance
  computing, edge AI, or hybrid/multicloud strategies.</li><li>Background in startup
  or high-growth environments where agility and influence matter.</li><li>Familiarity
  with DigitalOcean’s developer ecosystem, API, and service portfolio.</li></ul><b>Compensation
  Range:&nbsp;</b><ul><li>$174,240 - $217,800</li></ul><p><span>*This is a remote
  role</span></p><p><em><span>#LI-Remote</span></em></p><p><b><strong>Why You’ll Like
  Working for DigitalOcean</strong></b><ul><li><strong>We innovate with purpose. </strong>You’ll
  be a part of a cutting-edge technology company with an upward trajectory, who are
  proud to simplify cloud and AI so builders can spend more time creating software
  that changes the world. As a member of the team, you will be a Shark who thinks
  big, bold, and scrappy, like an owner with a bias for action and a powerful sense
  of responsibility for customers, products, employees, and decisions.</li><li><strong>We
  prioritize career development.</strong> At DO, you’ll do the best work of your career.
  You will work with some of the smartest and most interesting people in the industry.
  We are a high-performance organization that will always challenge you to think big.
  Our organizational development team will provide you with resources to ensure you
  keep growing. We provide employees with reimbursement for relevant conferences,
  training, and education. All employees have access to LinkedIn Learning''s 10,000+
  courses to support their continued growth and development.</li><li><strong>We care
  about your well-being.&nbsp;</strong>Regardless of your location, we will provide
  you with a competitive array of benefits to support you from our Employee Assistance
  Program to Local Employee Meetups to flexible time off policy, to name a few. While
  the philosophy around our benefits is the same worldwide, specific benefits may
  vary based on local regulations and preferences.</li><li><strong>We reward our employees.
  </strong>The salary range for this position is based on market data, relevant years
  of experience, and skills. You may qualify for a bonus in addition to base salary;
  bonus amounts are determined based on company and individual performance. We also
  provide equity compensation to eligible employees, including equity grants upon
  hire and the option to participate in our Employee Stock Purchase Program.</li><li><strong>DigitalOcean
  is an equal-opportunity employer. </strong>We do not discriminate on the basis of
  race, religion, color, ancestry, national origin, caste, sex, sexual orientation,
  gender, gender identity or expression, age, disability, medical condition, pregnancy,
  genetic makeup, marital status, or military service.</li></ul><p><strong>Application
  Limit:</strong>&nbsp;You may apply to a maximum of 3 positions within any 180-day
  period. This policy promotes better role-candidate matching and encourages thoughtful
  applications where your qualifications align most strongly.</p></p>'
