description_html: <p>Voice (civic tech startup — free nonpartisan app where voters
  rate their politicians on breaking news) is hiring a freelance GTM Engineer to build
  and scale our consumer acquisition engine.</p><p>Paid retainer, ~10-15h/week, remote.
  First GTM hire, reporting directly to the founder.</p><p><strong>What you'll do</strong></p><ul><li>Build
  and optimize paid acquisition campaigns across Meta, Google, and emerging channels</li><li>Set
  up SEO infrastructure and content pipelines for organic growth</li><li>Design and
  ship lifecycle email/push sequences (onboarding, retention, re-engagement)</li><li>Build
  and maintain organic social media listening and posting automations</li><li>Work
  in our marketing tools codebase — optimize, debug, and extend automations for user
  acquisition at scale</li></ul><p><strong>Requirements</strong></p><ul><li>You've
  built consumer acquisition systems, not just managed dashboards</li><li>Comfortable
  in a codebase — can read, optimize, and ship code (Python, JS, or AI-assisted)</li><li>Hands-on
  experience with paid media, SEO, and lifecycle marketing</li><li>You understand
  webapp conversion funnels from impression to activated user</li><li>US timezone
  preferred</li></ul><p><strong>Bonus</strong></p><ul><li>Experience with civic tech,
  news apps, or mission-driven consumer products</li><li>Familiarity with PostHog,
  Supabase, or modern analytics stacks</li></ul><p><strong>Interested?</strong> DM
  me with your LinkedIn and a quick example of an acquisition system you've built.</p>
