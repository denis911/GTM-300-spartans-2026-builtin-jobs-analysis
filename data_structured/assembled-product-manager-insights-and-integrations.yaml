description_html: '<b>About Assembled</b><p>Great customer support requires human
  agents and AI in perfect balance, and Assembled is the only unified platform that
  orchestrates both at scale. Companies like Canva, Etsy, and Robinhood use Assembled
  to coordinate their entire support operation — in-house agents, BPOs, and AI — in
  a single operating system. With AI Agents that resolve cases end-to-end, AI Copilot
  for agent assistance, and AI-powered workforce management that optimizes both human
  and AI capacity, Assembled helps teams deliver faster, better service while making
  smarter decisions about how to staff and automate. Backed by $70M from NEA, Emergence
  Capital, and Stripe, we''re building the platform that makes AI and human collaboration
  actually work.</p><p></p><b><strong>The Role</strong></b><p>Product Management at
  Assembled articulates the most important problems to solve in a way that will delight
  customers and grow the business. To do this, you should expect to partner closely
  with support teams at the world''s best brands – small and large – and regularly
  meet with prospects to paint the vision and learn about their problems and what
  resonates. PMs here also grease the works across the company to make everything
  go smoother, from understanding impact to enabling teams to evangelizing new ways
  to leverage AI to shouting out wins.</p><p>In this role, you will work primarily
  with the Data Platform and Integrations teams. These teams are bringing critical
  support case data into Assembled and making it actionable in ways that make end
  consumer support experiences and the behind the scenes operations better. A small
  sample of recently shipped work by these teams includes: </p><ul><li><p>An MCP server
  for natural language inquiries about Assembled data</p></li><li><p>New Insights
  Dashboard and reports on AI Support Agent efficacy, Copilot impact, and how AI and
  human team members are working together to solve customers'' problems</p></li><li><p>A
  Chrome extension for support agent notifications and productive work tracking</p></li><li><p>Integrations
  with major telephony and contact platforms to unblock enterprise customers and availability-aware
  AI to human agent call handoffs</p></li><li><p>Massive improvements in availability
  and consistency of metrics</p></li></ul><p>In this role, you''ll build high-impact
  insights from our new data platform foundation and chart a path for scaling and
  deepening our integrations across the support ecosystem with well-designed APIs
  and a strategy around where to build vs partner.</p><p></p><b><strong>Qualifications</strong></b><ul><li><p><strong>Must
  have a minimum of 3 years of product management experience in enterprise SaaS and
  have seen what good product management looks like </strong></p><ul><li><p>You will
  be working with high autonomy and <em>already </em>need to be good at Product Management
  fundamentals - this role is a chance to grow as a business leader</p></li><li><p>You
  must have proven impact setting the direction for a business-impacting area (beyond
  feature-level PM work)</p></li><li><p>Experience shipping multiple complex, high-impact
  initiatives in parallel – you''ll be working with 2 Engineering teams and operating
  as the first PM in NY (while the rest of the team is based in SF)</p></li></ul></li><li><p>Must
  have experience in a growing, venture-backed startup where the business needs and
  teams will continue to evolve and change quickly</p></li><li><p>Strong technical
  product skills: you love getting deep in the data and technical details and have
  or can quickly form perspectives on integration strategies, data stacks, and infrastructure
  choices to best serve our customers needs</p></li><li><p>Collaborative, helpful
  style, with a track record of building strong partnerships, trust, and respect across
  functions –&nbsp;especially with technical teams – and making the people around
  you more effective</p></li><li><p>Strong written and verbal communication skills:
  this is a rigorous writing culture that welcomes discussion and feedback</p></li><li><p>Customers
  come first and you have strong discovery and communication skills to work directly
  with senior stakeholders as a representative of the company</p></li><li><p>Bias
  to action and innate sense of urgency</p></li><li><p>Analytical mindset and ability
  to meaningfully engage with data </p></li><li><p>Technical fluency to drill into
  complex design and implementation challenges</p></li><li><p>Excited to work in person
  in our New York office 3-5 days a week. <em>If you do not currently reside in the
  New York metro area, please be sure to address this in your application.</em></p></li></ul><p></p><b><strong>Your
  day to day will include:</strong></b><ul><li><p><strong>Working directly with prospects
  and customers to deeply understand problems and needs and build together.</strong>
  Research, partner across functions, and analyze feedback and usage data and ensure
  what we''re building solves problems across our customer base in delightful and
  impactful ways.</p></li><li><p><strong>Partnering with internal teams to enable
  their roadmaps.</strong> You might be enabling people with clear problem definitions
  or new data insights; prototyping data visualizations with AI; understanding the
  nuances of a platform we are integrating with (like Amazon Connect, Five9, and Genesys);
  or figuring out how to drive more actionable insights from our data.</p></li><li><p><strong>Champion
  high product quality and impact.</strong> We hold a high bar for usability, visual
  design, accuracy, and shipping work that moves the needle for our customers and
  our business.</p></li><li><p><strong>Foster a fast-paced, growth-mindset, empathetic
  culture.</strong> The needs of our customers are changing quickly as companies grow
  (or shrink) and navigate new ways of working. At the same time, our company has
  more than doubled the number of customers in the past year. The ability to thrive
  in ambiguity and change and help us proactively shape the function and culture is
  critical.</p></li></ul><p></p><p><em>We know great candidates don’t always meet
  every requirement listed in a job description. If the role excites you and you believe
  you can make an impact at Assembled, we encourage you to apply. We value diverse
  perspectives and are committed to building an inclusive workplace where everyone
  feels like they belong and has the opportunity to do their best work. We look forward
  to hearing from you!</em></p><p></p><p><em>For United States Applicants:</em><br><em>Assembled
  participates in E-Verify and will provide the federal government with your Form
  I-9 information to confirm that you are authorized to work in the United States.</em><br><em>For
  United Kingdom Applicants:</em><br><em>Assembled is required to verify your right
  to work in the UK and will conduct a Right to Work check prior to employment in
  accordance with applicable law.</em></p>'
