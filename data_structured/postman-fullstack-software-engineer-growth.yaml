title: Fullstack Software Engineer, Growth
company: Postman
category: Software
location: San Francisco, California, USA
date_posted: '2026-03-09'
description_html: '<p><b><strong>Who Are We?</strong></b><p>Postman is the world’s
  leading API platform, used by more than 45 million+ developers and 500,000 organizations,
  including 98% of the Fortune 500. Postman is helping developers and professionals
  across the globe build the API-first world by simplifying each step of the API lifecycle
  and streamlining collaboration—enabling users to create better APIs, faster.</p><p>The
  company is headquartered in San Francisco and has offices in Boston, New York, Austin,
  Tokyo, London, and Bangalore - where Postman was founded. Postman is privately held,
  with funding from Battery Ventures, BOND, Coatue, CRV, Insight Partners, and Nexus
  Venture Partners. Learn more at postman.com or connect with Postman on X via @getpostman.</p><p>P.S:
  We highly recommend reading The "API-First World" graphic novel to understand the
  bigger picture and our vision at Postman.</p></p><b><strong>The Opportunity</strong></b><p>We
  are investing in a Growth Engineering team at Postman to help developers and teams
  onboard to a powerful product experience that starts with single-player developers,
  and grows into teams that collaborate on the artifact of the APIs like how teams
  collaborate with the artifact of a design file using Figma. We are building this
  team for a number of reasons, notably:</p><ol><li>Optimize sign-up and onboarding
  experience for both individuals and teams</li><li>Help users uncover the power of
  Postman (it’s so much more than “just” an API client), gradually and at the right
  moment</li><li>Guide users to key activation moments (like creating their first
  collection, or inviting a member to their team) that lead to expansion and a stickier
  product experience</li></ol><p>In effect: we know we have a product experience and
  funnel that works quite well. Now we want to optimize, tune, and make it even more
  amazing (and measure even more). We’re looking for an experienced engineer who has
  worked on projects that generated measurable business impact. You’ll work closely
  with Postman’s engineering leadership and our product and design teams to achieve
  our mission of connecting 100M developers in the world. We specifically hope this
  person is you, because while the team is small right now, we want an eager, curious
  engineer who cares about building experiences that delight, convert, and measurably
  impact the business and work with a team of like-minded individuals who care deeply,
  too.</p><p>We have built a ubiquitous, loved developer product and you’d be joining
  the solid and growing team in the United States. If you’re curious, see why I joined
  and hear about my experience in joining the rocket ship of an opportunity that is
  Postman.</p><b><strong>What You’ll Do</strong></b><p>To achieve our goals, we’ll
  need a talented, experienced, and thoughtful engineer with a special interest and
  aptitude for growth. We are looking for someone who cares deeply about the details
  and spends time building user interfaces that delight users. We need an engineer
  who can be somewhat self-directed and who has great taste, judgment, and can iterate
  (and ship!) quickly to achieve the iterative improvements to our first-time user
  experience. To quote Frank Slootman (former Snowflake CEO):</p><p><em>“Strategy
  is overrated and execution is severely underrated. Mostly all companies plan well
  and mostly all companies fail at execution. Make execution the king in your company.”
  </em>– Frank Slootman, Amp it Up</p><p>Execution is key on the Growth Engineering
  team. We’ll need someone who relentlessly leads by example on execution and ships
  measurably impactful changes regularly to the user experience of Postman. We’ll
  progress and continuously improve towards achieving our goals and metrics and most
  importantly we’ll deliver an increasingly delightful product experience that developers
  love to use. You should expect to:</p><ul><li><strong>Own and deliver. </strong>Deliver
  improvements to the core product experience that help us achieve our goals around
  onboarding and activation</li><li><strong>Deliver little big changes. </strong>Deliver
  small, measured changes that meaningfully impact end users and successful activation
  of these users</li></ul><p><strong>Experiment and identify winners. We have a great
  foundation of experimentation on the team and you will need to leverage and improve
  this foundation to ship A/B tested changes that we know have an impact on our goals.&nbsp;</strong></p><ul><li><strong>Own
  end-to-end workflows. </strong>Own end-to-end and understand core workflows, driving
  measurable improvements to user experience particularly focused on first-time user
  experience (sign-up, onboarding, and beyond)</li><li><strong>Deeply understand the
  user. </strong>Collaborate and work with end users (developers!) using Postman to
  understand their core workflows and then use that knowledge to improve our product</li><li><strong>Learn
  and grow. </strong>Broaden your knowledge of the core product and the domain over
  time, starting with first-time UX but eventually branching out into driving improvement
  to deeper experiences on the Postman user’s journey, and&nbsp;</li><li><strong>Collaborate
  across boundaries and geographies. </strong>Collaborate on team processes to streamline
  collaboration across US and India team members</li></ul><b><strong>About You</strong></b><p>Must
  have:</p><ul><li>At least 8+ years of experience building frontend or full-stack
  projects and user experiences.&nbsp;</li><li>Track record of delivering impactful
  and engaging user experiences that delight users</li><li>Deep expertise in building
  the modern web with JavaScript, HTML, and CSS. You likely have used libraries or
  frameworks like React or Next.js, but we care much more about the fundamentals than
  the tech stack.</li><li>Excellent communication skills. We’re a hybrid team and
  we’re going to be moving fast together. Good communication is key.</li><li>Detail
  oriented. We have to care about the details, and while we don’t expect you to be
  a designer, you need to care about the product experience that our teams are shipping.</li><li>Measure
  twice, cut once. We expect that you are analytical by nature and have experience
  in delivering features, improvements, and changes that leverage analytics tools
  (like LaunchDarkly) and experimentation techniques.&nbsp;</li><li>Customer obsession.
  As we are a core product with years of muscle memory, we need an engineer who is
  able and willing to leverage the voice of the customer to expedite decision making,
  develop conviction, and most importantly delight our user.</li><li>Based in the
  San Francisco Bay Area.</li></ul><p>Nice-to-have:</p><ul><li>Experience working
  with or using full-stack JavaScript / TypeScript</li><li>Experience working in a
  React application with state management tools like MobX</li><li>Experience working
  on B2B product and/or developer tools</li></ul><p>This role is based in the greater
  San Francisco area, and the reasonably estimated salary for this role ranges from
  $210,000 to $240,000 plus a competitive equity package. Actual compensation is based
  on the candidate''s skills, qualifications, and experience.&nbsp;</p><p><b><strong>What
  Else?</strong></b><p>In addition to Postman''s pay-on-performance philosophy, and
  a flexible schedule working with a fun, collaborative team, Postman offers a comprehensive
  set of benefits, including full medical coverage, flexible PTO, wellness reimbursement,
  and a monthly lunch stipend. Along with that, our wellness programs will help you
  stay in the best of your physical and mental health. Our frequent and fascinating
  team-building events will keep you connected, while our donation-matching program
  can support the causes you care about. We’re building a long-term company with an
  inclusive culture where everyone can be the best version of themselves.&nbsp;</p><p>At
  Postman, we embrace a hybrid work model. For all roles based out of San Francisco
  Bay Area, Boston, Austin, Tokyo, Bangalore, Hyderabad, London, and New York, employees
  are expected to come into the office 3-days a week. We were thoughtful in our approach
  which is based on balancing flexibility and collaboration and grounded in feedback
  from our workforce, leadership team, and peers. The benefits of our hybrid office
  model will be shared knowledge, brainstorming sessions, communication, and building
  trust in-person that cannot be replicated via zoom.</p><b><strong>Our Values</strong></b><p>At
  Postman, we create with the same curiosity that we see in our users. We value transparency
  and honest communication about not only successes, but also failures. In our work,
  we focus on specific goals that add up to a larger vision. Our inclusive work culture
  ensures that everyone is valued equally as important pieces of our final product.
  We are dedicated to delivering the best products we can.</p><b><strong>Equal opportunity</strong></b><p>Postman
  is an Equal Employment Opportunity and Affirmative Action Employer. Qualified applicants
  will receive consideration for employment without regard to race, color, religion,
  sex, sexual orientation, gender perception or identity, national origin, age, marital
  status, protected veteran status, or disability status. Headhunters and recruitment
  agencies may not submit resumes/CVs through this website or directly to managers.
  Postman does not accept unsolicited headhunter and agency resumes. Postman will
  not pay fees to any third-party agency or company that does not have a signed agreement
  with Postman.</p></p>'
