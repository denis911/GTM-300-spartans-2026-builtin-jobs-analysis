company_overview: Tractian is a machine intelligence company that offers industrial
  monitoring systems. Tractian builds streamlined hardware-software solutions to give
  maintenance technicians and industrial decision-makers comprehensive oversight of
  their operations. It is democratizing access to sophisticated real-time monitoring
  and asset operations tools.Tractian's solutions are used in environments that address
  a combined total of 5% of global industrial output. The company’s broad market reach
  is evidenced in its customer base from various industries, such as John Deere, Procter
  & Gamble, Caterpillar, Goodyear, Carrier, Johnson Controls, and Bimbo, the owner
  of the brands Little Bites and Thomas Bagels. Tractian's customers see a 6-12x ROI
  with savings of $6,000 per monitored machine annually on average.In a major milestone
  and a first for the industry, Tractian launched the AI-Assisted Maintenance category
  in the industrial sector. In this new paradigm, artificial intelligence identifies
  machine problems and suggests preventive actions to be taken, giving invaluable
  insight and support to maintenance professionals. It is important to highlight that
  the intent of Assisted Maintenance is firmly rooted in augmenting maintenance professionals
  to provide more assertive diagnosis with human-in-the-loop feedback. Tractian's
  mission is to elevate this category of workers in a highly impactful way. The Assisted
  Maintenance category will provide unimaginable support for maintenance professionals.
  By combining shop floor expertise with our technology, maintainers will be able
  to anticipate and address issues with unprecedented accuracy and speed
