company_overview: Nasuni transforms how enterprises store, protect, and access their
  file data.The Nasuni File Data Platform replaces legacy file servers, NAS, backup,
  and disaster recovery with one secure, cloud-based solution. It lets global teams
  access and collaborate on files anywhere, scale effortlessly across hybrid-cloud
  environments, and recover instantly from ransomware or outages.Trusted by leading
  companies in manufacturing, media, AEC, and more, Nasuni helps IT teams cut costs,
  simplify operations, and get file data ready for AI and analytics.For customers,
  Nasuni means faster performance, lower cost, built-in resilience, and Unstructured
  Data Management ready for AI. For candidates, it’s a chance to join a fast-growing
  leader shaping the future of hybrid-cloud data, where innovation, collaboration,
  and impact drive every role.For more information, visit www.nasuni.com.
