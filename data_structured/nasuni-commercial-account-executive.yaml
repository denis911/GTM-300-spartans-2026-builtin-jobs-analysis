description_html: '<p><span><strong><span>Commercial Account Executive - </span></strong></span><span><strong><span>Boston
  Seaport - Hybrid (3 days onsite)</span></strong></span></p><p><span>Nasuni is seeking
  a motivated and skilled Commercial Account Executive to join our Commercial Sales
  team, focused on mid-market sales hunting. This role requires a dynamic individual
  with a strong background in commercial sales, excellent channel partnership experience,
  and a proven track record of quota-carrying sales success. As an integral part of
  Nasuni’s growth strategy, you will be responsible for acquiring net new customers,
  building<span>&nbsp;</span>pipeline, and driving revenue growth through collaboration
  with channel partners and alliances.</span></p><p><span><strong><span>Responsibilities:</span></strong></span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Pipeline
  Management:</span></strong><span>&nbsp;</span>Build and manage a pipeline that is
  3X assigned quota, ensuring consistent progress through all sales stages.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Prospecting
  and Qualification:</span></strong><span>&nbsp;</span>Identify and prioritize high-value
  prospects, qualify opportunities, and uncover customer use cases where Nasuni’s
  solutions deliver the greatest impact.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Customer
  Engagement:</span></strong><span>&nbsp;</span>Present Nasuni’s hybrid cloud storage
  solutions to prospective clients, addressing objections, and negotiating deals to
  close business.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Channel
  Collaboration:</span></strong><span>&nbsp;</span>Partner with leading VARs such
  as CDW, SHI, Insight, WWT, Trace3, and Presidio, as well as cloud alliance partners
  like AWS, Microsoft, and Google, to drive sales opportunities.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Relationship
  Building:</span></strong><span>&nbsp;</span>Develop and nurture relationships with
  key decision-makers and champions within target accounts.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Market
  Expertise:</span></strong><span>&nbsp;</span>Maintain deep knowledge of Nasuni’s
  products and services, as well as data infrastructure technologies, to effectively
  position solutions in the marketplace.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Daily
  Activity:</span><span>&nbsp;</span></strong>Maintain a high level of activity, including
  calls, LinkedIn messaging, emails, meetings, and partner visits to promote Nasuni’s
  value proposition.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Collaboration:</span></strong><span>&nbsp;</span>Work
  closely in our Boston Seaport HQ with inside sales, channel, alliances, and marketing
  teams to align strategies and drive success.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Reporting:</span></strong><span>&nbsp;</span>Accurately
  forecast and track opportunities in Salesforce.</span></p><p><span><strong><span>Qualifications:</span></strong></span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Experience:</span></strong><span>&nbsp;</span>1-3
  years of quota-carrying sales experience, ideally having progressed from SDR or
  Senior SDR roles.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Industry
  Knowledge:</span></strong><span>&nbsp;</span>Familiarity with cloud, storage, backup,
  recovery, SaaS, or similar enterprise IT solutions. Understanding of data center
  technologies such as virtualization, servers, networking, and hybrid cloud storage
  is a plus.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Channel
  Sales:</span></strong><span>&nbsp;</span>Demonstrated success in selling through
  channel partners and leveraging cloud alliance partnerships.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Sales
  Skills:</span></strong><span>&nbsp;</span>Exceptional prospecting, communication
  (both interpersonal and presentation), negotiation, and closing skills.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Organization:</span></strong><span>&nbsp;</span>Strong
  organizational and time management abilities to handle multiple priorities effectively.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Mindset:</span></strong><span>&nbsp;</span>Determined,
  resilient, and curious with a hunter’s mentality to win new logos and drive business
  growth.</span></p><p><span><strong><span>•<span>&nbsp;</span></span></strong><span><strong>Tools</strong>:</span><span>&nbsp;</span>Proficiency
  in Salesforce or similar CRM tools.</span></p><p><span><strong><span>•<span>&nbsp;</span></span><span>Collaboration:</span></strong><span>&nbsp;</span>Thrive
  in a fast-paced, team-oriented environment.</span></p><p><span><strong>•</strong><span><strong>
  Hybrid Work</strong>: 3 Days Onsite with Sales Team in Boston Seaport&nbsp;</span></span></p><p><span><strong>About
  Nasuni:</strong></span></p><p><span>Nasuni is the leading hybrid cloud storage solution
  that powers business growth with effortless scalability, built-in security, and
  fast edge performance using a unique cloud-native architecture. The Nasuni File
  Data Platform delivers operational excellence by consolidating NAS and backup, eliminating
  data silos, and making management easy and flexible without changes to apps or workflows.
  Its built-in security offers proactive defense and rapid recovery, lowering organization’s
  risk from the detrimental effects of ransomware attacks and other disasters. Synchronized
  access to file data everywhere ensures user productivity by supporting remote and
  hybrid work.</span></p><p><span><strong>Why work at Nasuni?</strong></span></p><p><span>As
  part of our commitment to your well-being, we are pleased to offer comprehensive
  benefits packages to employees across the US.&nbsp;&nbsp;Benefits packages generally
  include:</span></p><ul><li><span>Best in class employee onboarding and training</span></li><li><span>“Take
  What You Need” paid time off policy</span></li><li><span>Comprehensive health, dental
  and vision plans</span></li><li><span>Company-paid life and disability insurance</span></li><li><span>401(k)
  and Roth IRA retirement plan</span></li><li><span>Generous employee referral bonuses</span></li><li><span>Flexible
  remote work policy</span></li><li><span>10 paid holidays</span></li><li><span>Wide
  array of wellbeing offerings</span></li><li><span>Pre-tax savings accounts with
  company contributions</span></li><li><span>An Employee Assistance Program to help
  deal with life’s difficulties and stressors</span></li><li><span>Great team culture
  and social activities</span></li><li><span>Collaborative workspaces</span></li><li><span>Free
  on-site fitness centers and stocked kitchens in select office locations</span></li><li><span>Professional
  development resources</span></li></ul><p><span><strong><span>Compensation Transparency:</span></strong><span>&nbsp;</span></span></p><p><span><span>In
  accordance with&nbsp;U.S. pay transparency laws, Nasuni is committed to providing
  visibility into compensation for all U.S.-based roles. Click&nbsp;</span><span><span>HERE</span></span><span>
  to view our compensation ranges&nbsp;by&nbsp;job&nbsp;grade. Actual compensation
  will be based on a variety of factors, including a candidate’s experience, skills,
  education, and work location.</span></span></p><p><em>To all recruitment agencies:&nbsp;Nasuni
  does not accept agency resumes. Please do not forward resumes to our job boards,
  Nasuni employees or any other company location. Nasuni is not responsible for any
  fees related to unsolicited resumes.</em></p><p><em>Nasuni is an equal opportunity
  employer. The equal employment opportunity policy at Nasuni protects employees and
  job applicants from discrimination on the bases of race, religion, color, sex (including
  pregnancy, gender identity, and sexual orientation), parental status, national origin,
  age, disability, family medical history or genetic information, political affiliation,
  military service, or other non-merit based factors. These protections extend to
  all management practices and decisions, including recruitment and hiring practices,
  appraisal systems, promotions, and training and career development programs.</em></p><br><p><p><em>This
  privacy notice relates to information collected (whether online or offline) by Nasuni&nbsp;Corporation
  and our corporate affiliates (collectively, “Nasuni”) from or about you in your&nbsp;capacity
  as a Nasuni employee, independent contractor/service provider or as an&nbsp;applicant
  for an employment or contractor relationship with Nasuni.&nbsp;</em></p></p>'
description_text: 'Commercial Account Executive - Boston Seaport - Hybrid (3 days
  onsite) Nasuni is seeking a motivated and skilled Commercial Account Executive to
  join our Commercial Sales team, focused on mid-market sales hunting. This role requires
  a dynamic individual with a strong background in commercial sales, excellent channel
  partnership experience, and a proven track record of quota-carrying sales success.
  As an integral part of Nasuni’s growth strategy, you will be responsible for acquiring
  net new customers, building &nbsp; pipeline, and driving revenue growth through
  collaboration with channel partners and alliances. Responsibilities: • &nbsp; Pipeline
  Management: &nbsp; Build and manage a pipeline that is 3X assigned quota, ensuring
  consistent progress through all sales stages. • &nbsp; Prospecting and Qualification:
  &nbsp; Identify and prioritize high-value prospects, qualify opportunities, and
  uncover customer use cases where Nasuni’s solutions deliver the greatest impact.
  • &nbsp; Customer Engagement: &nbsp; Present Nasuni’s hybrid cloud storage solutions
  to prospective clients, addressing objections, and negotiating deals to close business.
  • &nbsp; Channel Collaboration: &nbsp; Partner with leading VARs such as CDW, SHI,
  Insight, WWT, Trace3, and Presidio, as well as cloud alliance partners like AWS,
  Microsoft, and Google, to drive sales opportunities. • &nbsp; Relationship Building:
  &nbsp; Develop and nurture relationships with key decision-makers and champions
  within target accounts. • &nbsp; Market Expertise: &nbsp; Maintain deep knowledge
  of Nasuni’s products and services, as well as data infrastructure technologies,
  to effectively position solutions in the marketplace. • &nbsp; Daily Activity: &nbsp;
  Maintain a high level of activity, including calls, LinkedIn messaging, emails,
  meetings, and partner visits to promote Nasuni’s value proposition. • &nbsp; Collaboration:
  &nbsp; Work closely in our Boston Seaport HQ with inside sales, channel, alliances,
  and marketing teams to align strategies and drive success. • &nbsp; Reporting: &nbsp;
  Accurately forecast and track opportunities in Salesforce. Qualifications: • &nbsp;
  Experience: &nbsp; 1-3 years of quota-carrying sales experience, ideally having
  progressed from SDR or Senior SDR roles. • &nbsp; Industry Knowledge: &nbsp; Familiarity
  with cloud, storage, backup, recovery, SaaS, or similar enterprise IT solutions.
  Understanding of data center technologies such as virtualization, servers, networking,
  and hybrid cloud storage is a plus. • &nbsp; Channel Sales: &nbsp; Demonstrated
  success in selling through channel partners and leveraging cloud alliance partnerships.
  • &nbsp; Sales Skills: &nbsp; Exceptional prospecting, communication (both interpersonal
  and presentation), negotiation, and closing skills. • &nbsp; Organization: &nbsp;
  Strong organizational and time management abilities to handle multiple priorities
  effectively. • &nbsp; Mindset: &nbsp; Determined, resilient, and curious with a
  hunter’s mentality to win new logos and drive business growth. • &nbsp; Tools :
  &nbsp; Proficiency in Salesforce or similar CRM tools. • &nbsp; Collaboration: &nbsp;
  Thrive in a fast-paced, team-oriented environment. • Hybrid Work : 3 Days Onsite
  with Sales Team in Boston Seaport&nbsp; About Nasuni: Nasuni is the leading hybrid
  cloud storage solution that powers business growth with effortless scalability,
  built-in security, and fast edge performance using a unique cloud-native architecture.
  The Nasuni File Data Platform delivers operational excellence by consolidating NAS
  and backup, eliminating data silos, and making management easy and flexible without
  changes to apps or workflows. Its built-in security offers proactive defense and
  rapid recovery, lowering organization’s risk from the detrimental effects of ransomware
  attacks and other disasters. Synchronized access to file data everywhere ensures
  user productivity by supporting remote and hybrid work. Why work at Nasuni? As part
  of our commitment to your well-being, we are pleased to offer comprehensive benefits
  packages to employees across the US.&nbsp;&nbsp;Benefits packages generally include:
  Best in class employee onboarding and training “Take What You Need” paid time off
  policy Comprehensive health, dental and vision plans Company-paid life and disability
  insurance 401(k) and Roth IRA retirement plan Generous employee referral bonuses
  Flexible remote work policy 10 paid holidays Wide array of wellbeing offerings Pre-tax
  savings accounts with company contributions An Employee Assistance Program to help
  deal with life’s difficulties and stressors Great team culture and social activities
  Collaborative workspaces Free on-site fitness centers and stocked kitchens in select
  office locations Professional development resources Compensation Transparency: &nbsp;
  In accordance with&nbsp;U.S. pay transparency laws, Nasuni is committed to providing
  visibility into compensation for all U.S.-based roles. Click&nbsp; HERE to view
  our compensation ranges&nbsp;by&nbsp;job&nbsp;grade. Actual compensation will be
  based on a variety of factors, including a candidate’s experience, skills, education,
  and work location. To all recruitment agencies:&nbsp;Nasuni does not accept agency
  resumes. Please do not forward resumes to our job boards, Nasuni employees or any
  other company location. Nasuni is not responsible for any fees related to unsolicited
  resumes. Nasuni is an equal opportunity employer. The equal employment opportunity
  policy at Nasuni protects employees and job applicants from discrimination on the
  bases of race, religion, color, sex (including pregnancy, gender identity, and sexual
  orientation), parental status, national origin, age, disability, family medical
  history or genetic information, political affiliation, military service, or other
  non-merit based factors. These protections extend to all management practices and
  decisions, including recruitment and hiring practices, appraisal systems, promotions,
  and training and career development programs. This privacy notice relates to information
  collected (whether online or offline) by Nasuni&nbsp;Corporation and our corporate
  affiliates (collectively, “Nasuni”) from or about you in your&nbsp;capacity as a
  Nasuni employee, independent contractor/service provider or as an&nbsp;applicant
  for an employment or contractor relationship with Nasuni.&nbsp;'
