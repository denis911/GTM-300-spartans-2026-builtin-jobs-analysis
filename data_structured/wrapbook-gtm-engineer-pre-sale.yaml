description_html: '<p><strong>About Us:</strong></p><p>Wrapbook is a smart, intuitive
  platform that makes production payroll and accounting easier, faster, and more secure.
  We provide a unified payroll platform that seamlessly connects your entire team—production,
  accounting, cast, and crew—all in one place. Wrapbook empowers production teams
  to manage projects, pay cast and crew, track expenses, and generate data-driven
  insights, while enabling workers to manage timecards, track pay, and onboard to
  new projects from any device. Wrapbook brings clarity and dependability to production
  payroll, while increasing the productivity of your whole team.</p><p>Trusted by
  companies of all sizes, Wrapbook powers payroll for some of the industry’s top production
  companies, including SMUGGLER, Tuff, and GhostRobot. Our growing team of 250+ people
  across the USA and Canada, including entertainment and technology experts from SAG-AFTRA,
  DGA, IATSE, Teamsters, Amazon, Microsoft, Facebook, and more. Wrapbook is backed
  by top-tier investors, including Jeffrey Katzenberg’s WndrCo, Andreessen Horowitz,
  and A* Capital. We have raised $130M and are in a strong financial position.<br></p><p><strong>The
  Opportunity - GTM Engineer (Pre-Sale) - Remote (USA / Canada) </strong></p><p>Wrapbook
  is building the operating system for the project economy, starting with one of the
  most complex payroll, compliance, and insurance environments in the world. As the
  business scales, growth depends not just on demand—but on execution capacity, operational
  reliability, and customer trust.</p><p>Revenue Operations at Wrapbook owns the revenue
  system—the processes, data, systems, and operating cadence that make growth predictable
  and scalable across the customer lifecycle. RevOps partners closely with Marketing,
  Sales, Client Operations, Finance, and Engineering, while remaining independent
  in measurement, forecasting, and performance inspection.</p><p>The GTM Engineer
  (Pre-Sale) designs and builds the systems that power how we generate and convert
  demand. The purpose of the role is to reduce repetitive, manual work for GTM teams
  and embed automation and AI where it helps most—supporting predictable, efficient
  revenue growth while freeing marketers and sellers to focus on judgment, creativity,
  and customer engagement.</p><p>The role does this by turning real GTM motions into
  durable, production-ready Salesforce workflows. It partners closely with Marketing
  and Sales Operations on process and GTM motions, and with GTM Systems Architecture
  and Engineering on system design—using Salesforce configuration, light development,
  and automation to ensure solutions are consistent, scalable, and safe as the business
  grows.</p><p>This role also partners closely with the corresponding GTM Engineer
  (Post-Sale) to ensure clean handoffs, shared data models, and end-to-end lifecycle
  integrity from first touch through delivery.</p><p></p><p><strong>What you''ll do:</strong></p><ul><li><p>Design
  and maintain pre-sale GTM workflows in Salesforce, including routing, scoring, qualification,
  handoffs, and deal support.</p></li><li><p>Partner with Marketing Operations to
  implement lead management and enrichment workflows in Salesforce—including lifecycle
  state, enrichment timing, routing impact, and data quality checks—so GTM teams operate
  on accurate, trusted data.</p></li><li><p>Partner closely with Marketing and Sales
  Operations to translate GTM processes and motions into scalable, inspectable workflows.</p></li><li><p>Configure
  Salesforce using Flows, custom objects, validation rules, reports, dashboards, and
  light development where appropriate.</p></li><li><p>Partner with the GTM Systems
  Architect to implement system designs and provide execution feedback that informs
  future architectural decisions.</p></li><li><p>Partner with the SFDC Systems Engineer
  on complex development, integrations, and platform-level changes.</p></li><li><p>Implement
  automation and AI-assisted workflows with appropriate guardrails and human-in-the-loop
  controls.</p></li><li><p>Reduce repetitive, manual GTM work by replacing it with
  durable, failure-resilient workflows.</p></li><li><p>Establish monitoring and validation
  mechanisms for high-impact GTM workflows.</p></li><li><p>Ensure Salesforce configurations
  remain secure, auditable, and reliable as volume and complexity grow.</p></li><li><p>Partner
  closely with the GTM Engineer (Post-Sale) to ensure clean handoffs, shared data
  models, and end-to-end lifecycle integrity.<br></p></li></ul><p><strong>What you''ll
  have: </strong></p><ul><li><p>4–6+ years of experience in Salesforce administration,
  business systems, RevOps, or GTM operations engineering roles.</p></li><li><p>Strong
  hands-on experience with Salesforce configuration (Flows, custom objects, reports,
  dashboards).</p></li><li><p>Salesforce Administrator certification strongly preferred.</p></li><li><p>Working
  familiarity with Apex, APIs, and integrations, with comfort partnering on deeper
  development.</p></li><li><p>Experience supporting Marketing and Sales teams in a
  B2B SaaS environment.</p></li><li><p>Strong understanding of demand generation,
  pipeline creation, and pre-sale GTM workflows.</p></li><li><p>Experience designing
  workflows that are reliable, observable, and easy to operate at scale.</p></li><li><p>Comfort
  operating in ambiguous, high-impact environments with real business consequences.</p></li><li><p>Strong
  systems thinking and a bias toward replacing manual work with scalable processes.</p></li><li><p>Experience
  in fintech, payroll, or regulated environments is a plus, but not required.</p></li></ul><p></p><p><strong>Technologies
  &amp; Platforms (Representative, Not Exhaustive) </strong></p><ul><li><p>CRM &amp;
  System of Record: Salesforce (Flows, custom objects, reports, dashboards, light
  Apex).</p></li><li><p>GTM Tooling (Current Environment, Evolving): Marketing automation,
  sales engagement, lead enrichment, conversation intelligence, and routing tools
  (e.g., Marketo, Outreach, Gong, Omni, and related platforms).</p></li><li><p>Integrations:
  APIs, webhooks, event-driven workflows (in partnership with the SFDC Systems Engineer).</p></li><li><p>Automation
  &amp; AI: AI-assisted routing, qualification, prioritization, and human-in-the-loop
  workflows.</p></li><li><p>Reliability &amp; Governance: Validation rules, monitoring,
  auditability, and change control.</p></li></ul><p></p><p><strong>Why Join Us</strong></p><p>At
  Wrapbook, creativity meets technology — and not just in the product.</p><p>In addition
  to a competitive salary and all the benefits you can expect from a fast-growing
  technology company, you’ll get access to a team of creative problem solvers and
  the chance to see your contributions make large impacts. Benefits include:</p><ul><li><p>Unlimited
  Paid Time Off</p></li><li><p>Work from anywhere in Canada and USA</p></li><li><p>Health
  and Dental benefits</p></li><li><p>Up to $1,500 USD/ $2,025 CAD towards IT set up
  for your home</p></li><li><p>Up to 2% matching RRSP / 401K</p></li><li><p>Learning
  and Development opportunities</p></li><li><p>Up to $50 USD/ $67.50 CAD towards Internet/Cell
  phone service</p></li></ul><p><strong>Our Pledge to Fostering an Inclusive and Safe
  Workplace:</strong></p><p>Wrapbook pledges to be a harassment- and discrimination-free
  space for everyone, regardless of age, disability, ethnicity, gender identity or
  expression, nationality, neurotype, personal appearance, political affiliation,
  professional background, race, religion, or sexual identity or orientation.</p><p><strong>Apply
  Now</strong></p><p>Have we got your attention? Submit your application today and
  a member of our Talent team will be in touch with you shortly!</p><p>#LI-Remote</p>'
