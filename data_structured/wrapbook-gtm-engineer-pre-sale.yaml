company_overview: Employers in media production and the entertainment industry are
  constantly hiring. Freelance employees move between projects and could get onboarded
  30 or more times in a single year. And yet, much of the industry uses physical paperwork
  with no easy way to track payments, often struggling with compliance (due to ever-changing
  laws and union rules), and has few automation processes in place when it comes time
  to send payroll reports to their accountants. Wrapbook is an intuitive payroll and
  insurance solution for those balancing multiple projects. With digital solutions,
  simplified compliance, and comprehensive reporting, we take the stress away so employers
  and project-based workers can focus on the big picture. Commercial producers, filmmakers,
  and anyone creating media deserve robust solutions to meet their unique demands.
  With Wrapbook, you only have to ask for documents from cast and crew once. Our platform
  lets you move all the onboarding forms associated with any crew from a project to
  any future ones, giving you back hours. By swapping out paper timecards with digital
  ones, approving payroll is now a piece of cake. Crew can log into Wrapbook from
  any device to enter their hours and expenses. Providing producers with the right
  tools to onboard crew and process payments helps them put routine work on auto-pilot.
  That way, they can focus on more compelling tasks. Let us tackle paperwork, payroll,
  and insurance, so you can continue creating the work that matters.
