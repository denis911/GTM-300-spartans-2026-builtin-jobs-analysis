description_html: <b><strong>Build, Deploy, and Maintain AI for an Unpredictable World</strong></b><p>Striveworks
  helps organizations harness the power of artificial intelligence to solve real-world
  national security and business challenges by serving as the command center between
  data, models, and business outcomes. Founded by data scientists and engineers, Striveworks
  set out to make the journey from deployment to ongoing optimization simple and effective.</p><p>With
  Striveworks, organizations aren’t just deploying AI—they’re building systems that
  remain reliable, adaptable, and ready to scale in an unpredictable world. Mission-critical
  operations require models that perform where they’re deployed, scale as workloads
  grow, and adapt rapidly as AI capabilities advance. Striveworks meets these demands,
  increasing reliability and performance while lowering costs—and enabling confident,
  data-driven decision-making in dynamic environments.</p><b><strong>The Role</strong></b><p>As
  a Staff Machine Learning Engineer at Striveworks, you will be challenged—and trusted—on
  day one to be both a core contributor and a customer-facing technical leader on
  the projects and direction of the company. In this mission-critical work, you will
  design AI-powered solutions, you will bring them into being—from data shaping and
  ingestion, through analytics, to end-user delivery—and you will inform future platform
  capabilities.</p><p>You’re right for this opportunity if you value and possess technical
  expertise and enjoy pushing the boundaries of your own capabilities. You are passionate
  about applying both software engineering and data science to solve real-world problems.
  You are comfortable simultaneously leading a team, executing directly on critical
  elements of the plan, and presenting vision and outcomes to your customer.</p><p>Your
  day-to-day will include:</p><ul><li>Working with customers, engineers, and other
  stakeholders to define clear requirements that solve the customers’ problems and
  leverage the capabilities of our AI operations platform.</li><li>Translating requirements
  into a technical approach, design, scoping estimate, and execution plan.</li><li>Leading
  execution teams to achieve on-time completion of project deliverables mapped to
  customer business value while making key individual contributions throughout the
  process.</li><li>Designing, orchestrating, and automating complex data pipelines
  and algorithms within modern architectures (cloud, event-driven, microservices,
  etc.).</li><li>Guiding the development of machine learning models and custom analytics
  applied to image, video, text, geospatial, time series, and structured data.&nbsp;&nbsp;</li><li>Raising
  insights, opportunities, challenges, and feedback in order to improve group-level
  practice, capture reusable functionality, expand company opportunities, and accelerate
  time to value.</li><li>Conducting mission-critical fieldwork and interfacing with
  customers and other stakeholders at their work sites.</li></ul><p>This position
  offers a fully remote work environment, or you can work hybrid/on site at our office
  in northwest Austin, TX, with up to 20% travel.&nbsp;</p><b><strong>The Right Fit</strong></b><p>In
  addition to the specific skills and expertise detailed below, we are looking for
  individuals who share our values. Sharing a set of values allows us to move at the
  speed of trust.&nbsp;</p><p>Collectively, we value a high-trust work environment
  where people respect each other and use candor kindly and constructively. We value
  work that intersects passion and perseverance, we geek out about the potential of
  our contributions, and we find joy in working hard on things that matter. Finally,
  we value taking ownership, having agency, and feeling individual responsibility
  for collective results.</p><p>Here’s what we’re looking for:</p><ul><li>Advanced
  degree in data science, machine learning, computer science, or a related discipline
  and 10+ years of relevant experience&nbsp;</li><li>Broad proficiency in programming
  languages common to machine learning (excellence in Python is essential, as is knowledge
  of libraries like TensorFlow, PyTorch, and scikit-learn) and systems programming
  (e.g., Go, Rust, C++, Java, Scala, etc.)</li><li>Proficiency in the design and delivery
  of algorithms, data structures, and production analytics and in the use of design
  patterns in cloud environments</li><li>Demonstrated experience defining, scoping,
  planning, and delivering complex technical solutions in production environments</li><li>Proficiency
  with modern software engineering tools and processes (Agile, version control, issue
  tracking, CI/CD, debugging, etc.)</li><li>Demonstrated ability to lead, manage,
  and mentor small cross-functional teams that work across office, remote, and customer
  sites</li><li>Ability to communicate complex topics with professionalism, competence,
  and clarity to internal and external stakeholders (both technical and non-technical)
  via documents, presentations, and conversations</li><li>Eligibility and willingness
  to obtain and maintain a Secret (or above) US security clearance</li><li>Due to
  the nature of this role, candidates must have US citizenship</li></ul><b><strong>The
  Wish List</strong></b><p>We’re very interested in candidates who possess the above
  qualifications, and we appreciate and consider the addition of:</p><ul><li>Experience
  with Kubernetes (k8s) and horizontally scaled architectures</li><li>Knowledge of
  messaging systems such as NATS, Kafka, RabbitMQ, or similar</li><li>Experience building
  AI agents and workflows</li><li>Experience with complex and varied data types, such
  as multi-spectral imagery, full motion video, acoustic or sonar signals, synthetic
  aperture radar, or hardware telemetry</li><li>Experience delivering technology solutions
  in secure government environments</li><li>Active Secret (or above) US security clearance</li></ul><p>The
  anticipated base pay range for this position is $200,000–$250,000/year. Striveworks’
  total compensation package includes a competitive base salary, equity grants, and
  cash bonuses.&nbsp;</p><b><strong>The Benefits</strong></b><ul><li>Medical/dental/vision
  insurance</li><li>Voluntary life, long-term disability, accident, and hospital indemnity
  insurance</li><li>HSA and FSA (including dependent care FSA) plans&nbsp;</li><li>401(k)
  plan</li><li>Unlimited PTO</li><li>Paid parental leave</li></ul><p><em>Striveworks
  is an Equal Opportunity Employer and does not discriminate in employment on the
  basis of race, color, religion, belief, sex (including pregnancy and gender identity
  or expression), national origin, social or ethnic origin, political affiliation,
  sexual orientation, marital status, disability, genetic information, age, membership
  in an employee organization, retaliation, parental status, military service, or
  other non-merit factors. Striveworks will not tolerate discrimination or harassment
  of any kind.</em></p><p><em>If you require assistance or a reasonable accommodation
  in the application process, please contact Operations at </em><em>hr@striveworks.us</em><em>.</em></p><p><em>In
  compliance with federal law, all persons hired will be required to verify their
  identity and eligibility to work in the United States and to complete an employment
  eligibility verification form upon hire.</em></p><p><em>Striveworks is a participating
  employer in the E-Verify program.</em></p>
