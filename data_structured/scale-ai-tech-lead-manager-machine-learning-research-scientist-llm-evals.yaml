  subject to Board of Director approval. Your recruiter can share more about the specific
  salary range for your preferred location during the hiring process, and confirm
  whether the hired role will be eligible for equity grant. You’ll also receive benefits
  including, but not limited to: Comprehensive health, dental and vision coverage,
  retirement benefits, a learning and development stipend, and generous PTO. Additionally,
  this role may be eligible for additional benefits such as a commuter stipend. Please
  reference the job posting''s subtitle for where this position will be located. For
  pay transparency purposes, the base salary range for this full-time position in
  the locations of San Francisco, New York, Seattle is: $280,000 — $380,000 USD PLEASE
  NOTE:&nbsp; Our policy requires a 90-day waiting period before reconsidering candidates
  for the same role. This allows us to ensure a fair and thorough evaluation of all
  applicants. About Us: At Scale, our mission is to develop reliable AI systems for
  the world''s most important decisions. Our products provide the high-quality data
  and full-stack technologies that power the world''s leading models, and help enterprises
  and governments build, deploy, and oversee AI applications that deliver real impact.
  We work closely with industry leaders like Meta, Cisco, DLA Piper, Mayo Clinic,
  Time Inc., the Government of Qatar, and U.S. government agencies including the Army
  and Air Force. We are expanding our team to accelerate the development of AI applications.
  We believe that everyone should be able to bring their whole selves to work, which
