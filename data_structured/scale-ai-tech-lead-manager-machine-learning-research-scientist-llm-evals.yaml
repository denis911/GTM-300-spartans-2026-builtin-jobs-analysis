  protocols. Implement scalable and reproducible evaluation pipelines using modern
  ML frameworks. Publish research findings in top-tier AI conferences and contribute
  to open-source benchmarking initiatives. Remain up-to-date on ongoing research in
  the team, help work through technical challenges, and be involved in design decisions
  Remain deeply involved in the research community, both understanding trends, and
  setting them Thrive in a high-energy, fast-paced startup environment and are ready
