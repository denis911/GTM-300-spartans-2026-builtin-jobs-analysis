  Experience supporting and leading a team of research scientists and research engineers
  Excellent written and verbal communication skills Published research in areas of
  machine learning at major conferences (NeurIPS, ICML, ICLR, ACL, EMNLP, CVPR, etc.)
  and/or journals Previous experience in a customer facing role. Compensation packages
