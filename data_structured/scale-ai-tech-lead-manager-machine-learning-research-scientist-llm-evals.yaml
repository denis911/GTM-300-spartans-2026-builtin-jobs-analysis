description_html: '<p>As the leading data and evaluation partner for frontier AI companies,
  Scale is dedicated to advancing the evaluation and benchmarking of large language
  models (LLMs). We are building industry-leading LLM evals, setting new standards
  for model performance assessment. Our mission is to develop rigorous, scalable,
  and fair evaluation methodologies to drive the next generation of AI capabilities.</p><p>Our
  Research teams work with the industry’s leading AI labs to provide high quality
  data and accelerate progress in GenAI research. As the Tech Lead Manager of the
  LLM Evals Research team, you will lead a talented team of research scientists and
  research engineers focused on developing and implementing novel evaluation methodologies,
  metrics, and benchmarks to assess the capabilities and limitations of our cutting-edge
  LLMs. This role is critical for designing and executing a roadmap that defines best
  practices in data driven AI development and will accelerate the next generation
  of generative AI models in partnership with top foundational model labs.&nbsp;</p><b><strong>You
  will:</strong></b><ul><li>Lead a team of highly effective research scientists and
  research engineers on LLM evals.</li><li>Conduct research on the effectiveness and
  limitations of existing LLM evaluation techniques.</li><li>Design and develop novel
  evaluation benchmarks for large language models, covering areas such as instruction
  following, factuality, robustness, and fairness.&nbsp;</li><li>Communicate, collaborate,
  and build relationships with clients and peer teams to facilitate cross-functional
  projects.</li><li>Collaborate with internal teams and external partners to refine
  metrics and create standardized evaluation protocols.</li><li>Implement scalable
  and reproducible evaluation pipelines using modern ML frameworks.</li><li>Publish
  research findings in top-tier AI conferences and contribute to open-source benchmarking
  initiatives.</li><li>Remain up-to-date on ongoing research in the team, help work
  through technical challenges, and be involved in design decisions</li><li>Remain
  deeply involved in the research community, both understanding trends, and setting
  them</li><li>Thrive in a high-energy, fast-paced startup environment and are ready
  to dedicate the time and effort needed to drive impactful results.</li></ul><b><strong>Ideally
  you''d have:</strong></b><ul><li>5+ years of hands-on experience in large language
  model, NLP, and Transformer modeling, in the setting of both research and engineering
  development</li><li>Experience and track of recording in landing major research
  impacts in a fast-paced environment</li><li>Experience supporting and leading a
  team of research scientists and research engineers</li><li>Excellent written and
  verbal communication skills</li><li>Published research in areas of machine learning
  at major conferences (NeurIPS, ICML, ICLR, ACL, EMNLP, CVPR, etc.) and/or journals</li><li>Previous
  experience in a customer facing role.</li></ul><p><p><p><p><em>Compensation packages
  at Scale for eligible roles include base salary, equity, and benefits. The range
  displayed on each job posting reflects the minimum and maximum target for new hire
  salaries for the position, determined by work location and additional factors, including
  job-related skills, experience, interview performance, and relevant education or
  training. Scale employees in eligible roles are also granted equity based compensation,
  subject to Board of Director approval. Your recruiter can share more about the specific
  salary range for your preferred location during the hiring process, and confirm
  whether the hired role will be eligible for equity grant. You’ll also receive benefits
  including, but not limited to: Comprehensive health, dental and vision coverage,
  retirement benefits, a learning and development stipend, and generous PTO. Additionally,
  this role may be eligible for additional benefits such as a commuter stipend.</em></p></p><p>Please
  reference the job posting''s subtitle for where this position will be located. For
  pay transparency purposes, the base salary range for this full-time position in
  the locations of San Francisco, New York, Seattle is:</p><p><span>$280,000</span><span>—</span><span>$380,000
  USD</span></p></p></p><p><p><strong><em>PLEASE NOTE:&nbsp;</em></strong><em>Our
  policy requires a 90-day waiting period before reconsidering candidates for the
  same role. This allows us to ensure a fair and thorough evaluation of all applicants.</em></p><p><strong>About
  Us:</strong></p><p><em>At Scale, our mission is to develop reliable AI systems for
  the world''s most important decisions. Our products provide the high-quality data
  and full-stack technologies that power the world''s leading models, and help enterprises
  and governments build, deploy, and oversee AI applications that deliver real impact.
  We work closely with industry leaders like Meta, Cisco, DLA Piper, Mayo Clinic,
  Time Inc., the Government of Qatar, and U.S. government agencies including the Army
  and Air Force. We are expanding our team to accelerate the development of AI applications.</em></p><p><em>We
  believe that everyone should be able to bring their whole selves to work, which
  is why we are proud to be an inclusive and equal opportunity workplace. We are committed
  to equal employment opportunity regardless of race, color, ancestry, religion, sex,
  national origin, sexual orientation, age, citizenship, marital status, disability
  status, gender identity or Veteran status.&nbsp;</em></p><p><em>We are committed
  to working with and providing reasonable accommodations to applicants with physical
  and mental disabilities. If you need assistance and/or a reasonable accommodation
  in the application or recruiting process due to a disability, please contact us
  at accommodations@scale.com. Please see the United States Department of Labor''s
  </em><em>Know Your Rights poster</em><em> for additional information.</em></p><p><em>We
  comply with the United States Department of Labor''s </em><em>Pay Transparency provision</em><em>.&nbsp;</em></p><p><em><strong>PLEASE
  NOTE: </strong>We collect, retain and use personal data for our professional business
  purposes, including notifying you of job opportunities that may be of interest and
  sharing with our affiliates. We limit the personal data we collect to that which
  we believe is appropriate and necessary to manage applicants’ needs, provide our
  services, and comply with applicable laws. Any information we collect in connection
  with your application will be treated in accordance with our internal policies and
  programs designed to protect personal data. Please see our privacy policy for additional
  information.</em></p></p>'
