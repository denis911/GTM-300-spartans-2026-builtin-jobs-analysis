description_html: '<b><strong>About the Role</strong></b><p>Latent is building a world-class
  GTM engine — and we’re missing a very specific type of person. The GTM Engineer
  who operates like a product manager for the go-to-market org.</p><p>Your mandate:</p><ul><li><p>Work
  horizontally across marketing, sales, solutions, and post-sales</p></li><li><p>Understand
  how GTM work <em>actually</em> gets done today</p></li><li><p>Design and ship internal
  tools, automations, systems, and micro-products that <strong>10× the output of the
  GTM team</strong></p></li><li><p>Use AI, workflow design, and lightweight tooling
  to turn messy, high-volume information into clean, repeatable, measurable motion<br></p></li></ul><p>If
  you’re successful, you’ll materially influence Latent’s growth trajectory and play
  a central role in how we scale our GTM function.</p><p></p><b><strong>What You’ll
  Do</strong></b><p>Our GTM team generates an enormous amount of raw signal — executive
  conversations, CPO initiatives, Gong calls, product content, ROI models, and live
  deal insights. Today, we only capture a fraction of that value.</p><p>Your first
  major mission is to <strong>turn that raw GTM noise into a structured, compounding
  system</strong> that points to areas each person needs to focus on, that day, and
  makes marketing, sales, and solutions smarter with every interaction.</p><b><strong>Over
  time, you’ll expand your scope across:</strong></b><ul><li><p>Events and webinars</p></li><li><p>Account-based
  motions</p></li><li><p>Paid/owned channels</p></li><li><p>Product marketing</p></li><li><p>Partnerships</p></li><li><p>Sales
  playbook automation</p></li><li><p>Pipeline diagnostics and forecasting workflows<br></p></li></ul><p>Your
  focus: ensure <strong>every GTM contributor operates at their highest possible level</strong>.</p><p></p><b><strong>Examples
  of What You’ll Own</strong></b><b><strong>1. Full lifecycle ownership of internal
  “products”</strong></b><p>From discovery → spec → build → rollout → adoption → iteration.<br>
  You’ll talk to internal users (AEs, SDRs, AMs, Marketing), look at usage data, and
  continually refine.</p><p></p><b><strong>2. Building internal tools, automations,
  and micro-products</strong></b><p>Using no-code / low-code / light code tools (Zapier,
  Make, n8n, Notion, Airtable, Supabase, Retool, Webflow, scripts, AI agents), you
  will ship systems that:</p><ul><li><p>Convert a single webinar or CIO interview
  into dozens of multichannel GTM assets</p></li><li><p>Turn Gong calls into structured
  insights aligned to CPO initiatives, leakage categories, or ROI drivers</p></li><li><p>Make
  it trivial to spin up repeatable ABM sequences, playbooks, and executive outreach</p></li></ul><p>Auto-surface
  account intel, usage signals, and deal blockers to AEs in real time<br></p><b><strong>3.
  Build Latent’s GTM “intelligence layer”</strong></b><p>Design systems that ingest:</p><ul><li><p>Customer
  conversations</p></li><li><p>PA/340B/Appeals workflow insights</p></li><li><p>Content
  and messaging</p></li><li><p>Campaign performance</p></li><li><p>Pipeline and forecast
  signals</p></li><li><p>Competitive notes and turn them into a <strong>searchable,
  reusable, action-driving knowledge graph</strong> for the GTM org.</p></li></ul><b><strong>4.
  Run experiments that move real numbers</strong></b><p>Prototype, instrument, and
  measure experiments that improve:</p><ul><li><p>Top-of-funnel reach</p></li><li><p>Personalization
  and segmentation</p></li><li><p>Speed to lead</p></li><li><p>Conversion by stage</p></li><li><p>Rep
  productivity<br>Cycle time</p></li></ul><p>You’ll define success and be accountable
  to real metrics.</p><p></p><b><strong>What Makes Us Excited About You</strong></b><b><strong>You’re
  a first principles thinker who loves to build.</strong></b><p>You see chaos — tools,
  workflows, spreadsheets, disconnected signals — and your brain instantly starts
  drawing boxes and arrows.</p><b><strong>You’re obsessed with new tools and frontier
  tech.</strong></b><p>You experiment with AI agents, workflows, micro-apps, and integrations
  because you''re curious, not because someone asked you to.</p><b><strong>You’re
  fluent in data and comfortable being scrappy.</strong></b><p>Pulling from Salesforce,
  Gong, Notion, analytics tools, spreadsheets, and content repositories doesn’t intimidate
  you. You can shape raw data into something people actually use.</p><b><strong>You
  care about outcomes, not output.</strong></b><p>You want to move charts and real
  numbers — lead flow, conversion, cycle time, rep velocity, pipeline coverage. You’re
  comfortable designing the metric and proving impact.</p><b><strong>You’re a cross-functional
  glue.</strong></b><p>You can sit with an SDR, an AE, an Account Manager, and a CPO-level
  exec and translate their needs into tools that make them say, “Oh wow, this changes
  my job.”</p><b><strong>You’re creative and unafraid to be wrong.</strong></b><p>You
  generate ideas constantly, test them quickly, and iterate without ego.</p><p></p>'
description_text: 'About the Role Latent is building a world-class GTM engine — and
  we’re missing a very specific type of person. The GTM Engineer who operates like
  a product manager for the go-to-market org. Your mandate: Work horizontally across
  marketing, sales, solutions, and post-sales Understand how GTM work actually gets
  done today Design and ship internal tools, automations, systems, and micro-products
  that 10× the output of the GTM team Use AI, workflow design, and lightweight tooling
  to turn messy, high-volume information into clean, repeatable, measurable motion
  If you’re successful, you’ll materially influence Latent’s growth trajectory and
  play a central role in how we scale our GTM function. What You’ll Do Our GTM team
  generates an enormous amount of raw signal — executive conversations, CPO initiatives,
  Gong calls, product content, ROI models, and live deal insights. Today, we only
  capture a fraction of that value. Your first major mission is to turn that raw GTM
  noise into a structured, compounding system that points to areas each person needs
  to focus on, that day, and makes marketing, sales, and solutions smarter with every
  interaction. Over time, you’ll expand your scope across: Events and webinars Account-based
  motions Paid/owned channels Product marketing Partnerships Sales playbook automation
  Pipeline diagnostics and forecasting workflows Your focus: ensure every GTM contributor
  operates at their highest possible level . Examples of What You’ll Own 1. Full lifecycle
  ownership of internal “products” From discovery → spec → build → rollout → adoption
  → iteration. You’ll talk to internal users (AEs, SDRs, AMs, Marketing), look at
  usage data, and continually refine. 2. Building internal tools, automations, and
  micro-products Using no-code / low-code / light code tools (Zapier, Make, n8n, Notion,
  Airtable, Supabase, Retool, Webflow, scripts, AI agents), you will ship systems
  that: Convert a single webinar or CIO interview into dozens of multichannel GTM
  assets Turn Gong calls into structured insights aligned to CPO initiatives, leakage
  categories, or ROI drivers Make it trivial to spin up repeatable ABM sequences,
  playbooks, and executive outreach Auto-surface account intel, usage signals, and
  deal blockers to AEs in real time 3. Build Latent’s GTM “intelligence layer” Design
  systems that ingest: Customer conversations PA/340B/Appeals workflow insights Content
  and messaging Campaign performance Pipeline and forecast signals Competitive notes
  and turn them into a searchable, reusable, action-driving knowledge graph for the
  GTM org. 4. Run experiments that move real numbers Prototype, instrument, and measure
  experiments that improve: Top-of-funnel reach Personalization and segmentation Speed
  to lead Conversion by stage Rep productivity Cycle time You’ll define success and
  be accountable to real metrics. What Makes Us Excited About You You’re a first principles
  thinker who loves to build. You see chaos — tools, workflows, spreadsheets, disconnected
  signals — and your brain instantly starts drawing boxes and arrows. You’re obsessed
  with new tools and frontier tech. You experiment with AI agents, workflows, micro-apps,
  and integrations because you''re curious, not because someone asked you to. You’re
  fluent in data and comfortable being scrappy. Pulling from Salesforce, Gong, Notion,
  analytics tools, spreadsheets, and content repositories doesn’t intimidate you.
  You can shape raw data into something people actually use. You care about outcomes,
  not output. You want to move charts and real numbers — lead flow, conversion, cycle
  time, rep velocity, pipeline coverage. You’re comfortable designing the metric and
  proving impact. You’re a cross-functional glue. You can sit with an SDR, an AE,
  an Account Manager, and a CPO-level exec and translate their needs into tools that
  make them say, “Oh wow, this changes my job.” You’re creative and unafraid to be
  wrong. You generate ideas constantly, test them quickly, and iterate without ego.'
