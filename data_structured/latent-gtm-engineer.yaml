company_overview: Latent is redefining medication access through clinical AI, partnering
  with leading health systems to streamline prior authorizations, 340B compliance,
  and appeals. By optimizing pharmacy workflows and enabling centralization, Latent
  accelerates time-to-therapy for patients, supports scalable pharmacy expansion,
  and reduces administrative burdens on staff. Learn more about our mission at www.latenthealth.com/.
