description_html: '<b>About aion</b><p>aion is the world’s first and only AI infrastructure
  research lab: a full-stack solution for building, fine-tuning, and deploying AI
  at scale. Whether you''re a startup founder, enterprise team, or independent developer,
  aion gives you everything you need to go from concept to production in one seamless
  platform.</p><p>By abstracting away infrastructure complexity, aion unifies compute
  orchestration, training workflows, data pipelines, model versioning, and deployment
  into a single, streamlined experience. No more fragmented stacks or cloud lock-in,
  just fast, scalable, and accessible AI infrastructure.</p><p>Led by serial entrepreneurs
  Jayden Watson and Christian Angermayer, aion is well-funded by top-tier VCs and
  strategic partners. Headquartered in the U.K., we operate globally with core teams
  in London, SF, and NYC.</p><b>About the Role</b><p>As a Go-to-Market (GTM) Engineer,
  you will own the revenue-adjacent technical motion of aion’s GTM strategy. This
  is a sales- and partnerships-focused role that blends technical fluency with commercial
  execution.</p><p>You will work directly with aion’s founders, sales leadership,
  and strategic partners to turn interest into pilots, pilots into customers, and
  customers into long-term platform adoption. This role is ideal for someone who enjoys
  being technical and commercial—equally comfortable in a whiteboard session with
  engineers or a deal discussion with decision-makers.</p><b>What You’ll Do</b><b>Sales
  Enablement &amp; Pipeline</b><ul><li>Technical GTM: Support sales conversations
  with technical depth—demos, architectures, proof-of-concepts</li><li>Customer pilots:
  Scope, launch, and support trials and pilot deployments with startups and enterprises</li><li>Deal
  acceleration: Remove technical friction from the sales cycle<br></li></ul><b>Partnerships
  &amp; Alliances</b><ul><li>Strategic partners: Identify and build relationships
  with cloud providers, AI tooling companies, research labs, and ecosystem players</li><li>Co-selling
  &amp; co-marketing: Design joint GTM motions with partners (events, integrations,
  bundled offerings)</li><li>Founder-level selling: Work closely with leadership on
  high-impact strategic deals<br></li></ul><b>Market Feedback Loop</b><ul><li>Customer
  insights: Feed real-world GTM and sales learnings back into Product and Engineering</li><li>Use-case
  definition: Help define and refine ICPs, verticals, and core AI infrastructure use
  cases</li><li>Metrics: Own GTM KPIs tied to pipeline, conversions, deal velocity,
  and revenue influence<br></li></ul><b>Success Looks Like</b><ul><li>Clear, repeatable
  GTM motion for aion</li><li>Strong partner ecosystem with active co-selling</li><li>Faster
  sales cycles and higher conversion rates</li><li>Meaningful revenue and pipeline
  contribution<br></li></ul><br><b>Requirements</b><ul><li>3–7+ years in GTM, Sales
  Engineering, Partnerships, or Solutions Engineering</li><li>Strong technical foundation
  (cloud, AI infra, developer tools, or data platforms)</li><li>Comfortable discussing
  model training, inference, deployment, and infra tradeoffs</li><li>Commercially
  sharp: understands how deals get done</li><li>Builder mindset with high ownership
  and urgency</li><li>Willing to travel for customers, partners, and strategic events</li></ul><br><b>Benefits</b><ul>
  <li>Join the ground floor of a mission-driven AI startup revolutionizing compute
  infrastructure.</li> <li>Work with a high-caliber, globally distributed team backed
  by major VCs.</li> <li>Competitive compensation and benefits.</li> <li>Fast-paced,
  flexible work environment with room for ownership and impact.</li> </ul><ul><li>Hybrid
  model: 3 days in-office, 2 days remote with flexibility to work remotely for part
  of the year.<br> </li></ul><p>In case you got any questions about the role please
  reach out to hiring manager on linkedin or X.</p>'
description_text: 'About aion aion is the world’s first and only AI infrastructure
  research lab: a full-stack solution for building, fine-tuning, and deploying AI
  at scale. Whether you''re a startup founder, enterprise team, or independent developer,
  aion gives you everything you need to go from concept to production in one seamless
  platform. By abstracting away infrastructure complexity, aion unifies compute orchestration,
  training workflows, data pipelines, model versioning, and deployment into a single,
  streamlined experience. No more fragmented stacks or cloud lock-in, just fast, scalable,
  and accessible AI infrastructure. Led by serial entrepreneurs Jayden Watson and
  Christian Angermayer, aion is well-funded by top-tier VCs and strategic partners.
  Headquartered in the U.K., we operate globally with core teams in London, SF, and
  NYC. About the Role As a Go-to-Market (GTM) Engineer, you will own the revenue-adjacent
  technical motion of aion’s GTM strategy. This is a sales- and partnerships-focused
  role that blends technical fluency with commercial execution. You will work directly
  with aion’s founders, sales leadership, and strategic partners to turn interest
  into pilots, pilots into customers, and customers into long-term platform adoption.
  This role is ideal for someone who enjoys being technical and commercial—equally
  comfortable in a whiteboard session with engineers or a deal discussion with decision-makers.
  What You’ll Do Sales Enablement &amp; Pipeline Technical GTM: Support sales conversations
  with technical depth—demos, architectures, proof-of-concepts Customer pilots: Scope,
  launch, and support trials and pilot deployments with startups and enterprises Deal
  acceleration: Remove technical friction from the sales cycle Partnerships &amp;
  Alliances Strategic partners: Identify and build relationships with cloud providers,
  AI tooling companies, research labs, and ecosystem players Co-selling &amp; co-marketing:
  Design joint GTM motions with partners (events, integrations, bundled offerings)
  Founder-level selling: Work closely with leadership on high-impact strategic deals
  Market Feedback Loop Customer insights: Feed real-world GTM and sales learnings
  back into Product and Engineering Use-case definition: Help define and refine ICPs,
  verticals, and core AI infrastructure use cases Metrics: Own GTM KPIs tied to pipeline,
  conversions, deal velocity, and revenue influence Success Looks Like Clear, repeatable
  GTM motion for aion Strong partner ecosystem with active co-selling Faster sales
  cycles and higher conversion rates Meaningful revenue and pipeline contribution
  Requirements 3–7+ years in GTM, Sales Engineering, Partnerships, or Solutions Engineering
  Strong technical foundation (cloud, AI infra, developer tools, or data platforms)
  Comfortable discussing model training, inference, deployment, and infra tradeoffs
  Commercially sharp: understands how deals get done Builder mindset with high ownership
  and urgency Willing to travel for customers, partners, and strategic events Benefits
  Join the ground floor of a mission-driven AI startup revolutionizing compute infrastructure.
  Work with a high-caliber, globally distributed team backed by major VCs. Competitive
  compensation and benefits. Fast-paced, flexible work environment with room for ownership
  and impact. Hybrid model: 3 days in-office, 2 days remote with flexibility to work
  remotely for part of the year. In case you got any questions about the role please
  reach out to hiring manager on linkedin or X.'
