description_html: '<b><strong>We’re financing the future of energy</strong></b><p>Crux
  is the capital platform for the clean economy. We modernize capital raising and
  deployment for clean energy and critical infrastructure with solutions across advisory,
  investments, technology, and intelligence.</p><p>Our team of 95+ is composed of
  experts in energy, tax, finance, government, and technology. We have raised $77
  million in capital from some of the best investors, including Andreessen Horowitz,
  Lowercarbon Capital, New System Ventures, Overture, Ardent Venture Partners, QED,
  Canapi, and others. These funds are joined by strategic investors including Pattern
  Energy, Clearway Energy, EDF Renewables, Intersect Power, LS Power, Orsted, Hartree
  Partners, Liberty Mutual Strategic Ventures, MassMutual Ventures, and OMERS Ventures.</p><p></p><b><strong>An
  inflection point in American energy and manufacturing</strong></b><p>Energy demand
  is growing for the first time in decades, driving an urgent need for more affordable
  and reliable electricity. More electricity requires new clean energy infrastructure
  and strong domestic supply chains for minerals and components — as well as large
  amounts of capital.</p><p>Traditional project financing is opaque, fragmented, and
  analog. At Crux, we’re changing that. Through unmatched insights and expertise,
  white-glove service, purpose-built tools, and risk underwriting, we power a more
  prosperous, clean, and secure energy future.</p><p>We are scaling quickly and looking
  for team members who are eager to combine deep expertise with an AI- and tech-forward
  mindset.</p><p></p><b><strong>The Role</strong></b><p>We are hiring a <strong>GTM
  Engineer</strong> to build and scale the technical infrastructure across all internal
  operations. This role is designed for a technical operator who thrives at the intersection
  of engineering and scaling businesses—someone who gets excited about architecting
  the data infrastructure that drives our entire customer acquisition engine, building
  scrappy automations that accelerate commercial teams, and integrate AI into scalable
  solutions.</p><p>This is a hands-on, technical role embedded within our Operations
  team. You''ll own the technical implementation of our internal tech stack, build
  custom integrations and automation workflows, and leverage AI/ML to optimize across
  the business. You''ll work closely with our Engineering team while serving as the
  technical backbone for MarOps, BizOps, RevOps, and Sales Ops.</p><p>We''re looking
  for someone who combines strong technical skills with business context—you understand
  APIs, data pipelines, and automation platforms, but you also think about conversion
  rates, attribution models, and revenue impact. You''re the type of person who sees
  a manual process and immediately starts architecting the automated solution.</p><p>If
  you''re energized by building technical systems that directly drive business growth,
  working with cutting-edge tools, and scaling business operations through code and
  automation, this role is for you.</p><p></p><b><strong>What you''ll do</strong></b><ul><li><p>Build
  automation infrastructure: Design and implement sophisticated automation workflows
  using Zapier, n8n, Make, and custom API integrations to eliminate manual marketing
  processes</p></li><li><p>Implement AI-powered tools: Build and deploy AI/ML solutions
  for cross-functional business solutions</p></li><li><p>Design custom integrations:
  Create APIs, webhooks, and data connectors between our tools (HubSpot, Omni, InCycle)
  and internal systems</p></li><li><p>Collaborate cross-functionally: Partner with
  technical and business teams to align marketing infrastructure with product development
  and growth strategies</p></li></ul><b><strong>Who you are</strong></b><ul><li><p><strong>Full-Stack
  Growth Technologist</strong>: You''re comfortable working across the entire marketing
  tech stack—from front-end tracking and analytics to back-end data processing and
  automation workflows.</p></li><li><p><strong>API &amp; Integration Expert</strong>:
  You have hands-on experience building integrations between marketing tools, CRMs,
  and internal systems. You''re comfortable with REST APIs, webhooks, and data transformation.</p></li><li><p><strong>AI/Automation
  Enthusiast</strong>: You''re excited about leveraging AI and machine learning to
  optimize marketing processes. You''ve implemented AI-powered tools for lead scoring,
  content optimization, or process automation.</p></li><li><p><strong>Business-Minded
  Builder</strong>: While you''re technical, you think about business outcomes. You
  understand conversion funnels, attribution models, and how technical infrastructure
  impacts revenue growth. Every automation is tied to revenue impact—thinks in terms
  of pipeline generated, hours saved, conversion improved.</p></li><li><p><strong>Startup
  Builder</strong>: You thrive in fast-paced startup environments where you need to
  build scalable solutions quickly, iterate based on feedback, and take ownership
  of critical business infrastructure.</p></li><li><p><strong>Analytical Thinker</strong>:
  You naturally gravitate toward data to validate assumptions before building; you
  can quickly identify which metrics actually matter vs. vanity numbers.</p></li><li><p><strong>Problem
  Solver &amp; Collaborator</strong>: You operate with ownership in unclear swim lanes.
  You can scope a fuzzy request, ask smart questions, and move toward impact. You
  enjoy partnering with Growth, Commercial, and PDE</p></li></ul><b><strong>What we
  bring</strong></b><ul><li><p><strong>Backing, traction &amp; brand</strong>:</p><ul><li><p><strong>We
  have raised $77 million in capital </strong>from some of the best venture and strategic
  investors, including Andreessen Horowitz, Lowercarbon Capital, New System Ventures,
  Ardent Venture Partners, Pattern, Clearway, EDFR, Intersect, LS Power, Orsted, Hartree
  Partners, Liberty Mutual Strategic Ventures, MassMutual Ventures, and OMERS Ventures.</p></li><li><p><strong>Have
  been profitable </strong>and are growing exponentially</p></li><li><p><strong>We
  have closed over 120+ transactions </strong>in just the last 2 years, facilitating
  billions of dollars of capital flowing into renewables projects</p></li></ul></li><li><p><strong>Culture
  &amp; working dynamic</strong></p><ul><li><p><strong><u>Remote-first operating model</u></strong>:
  Work from anywhere in the US and Canada, or work out of our optional offices in
  DC (open), NYC (opening Q1’26). Optional co-working opportunities with co-workers
  in Bay Area, Seattle, Denver, Boston, LA, and beyond.</p></li><li><p><strong><u>High
  growth &amp; high ownership culture</u></strong>: We grow quickly by giving extremely
  talented people a lot of responsibility.</p></li><li><p><strong><u>Best of financial
  services &amp; technology</u></strong>: We have brought together a team that are
  experts in clean energy finance, and the best technologies. Use your expertise while
  getting to be on the cutting edge of applying AI to your day and your clients’ experience.</p></li><li><p><strong><u>Regular
  team offsites</u></strong>: We sustain culture by bringing the entire company together
  3 times a year. Individual teams may also meet up more frequently.</p></li></ul></li><li><p><strong>Benefits</strong></p><ul><li><p><strong><u>Healthcare</u></strong>:
  We cover 100% of premiums for employees with a variety of plans on Aetna (nationwide)
  and Kaiser (WA and California) and subsidize 70%  for dependents (total as a group),
  if relevant.</p></li><li><p><strong><u>Dental &amp; vision</u></strong>: We cover
  100% of premiums for employees and 50% for dependents (each), if relevant.</p></li><li><p><strong><u>Holidays</u></strong>:
  10 company holidays per year.</p></li><li><p><strong><u>Paid time off</u>:</strong>
  20 days per year.</p></li><li><p><strong><u>401k</u></strong>: We support a 401k
  account but don''t have a matching program set up at this time (typical for an early-stage
  startup).</p></li><li><p><strong><u>Parental leave</u></strong>: 16 weeks for birthing
  parents and 12 weeks for non-birthing parents.</p></li></ul></li><li><p><strong>Compensation</strong>:</p><ul><li><p><strong>Compensation</strong>:
  Base salary and bonus ranging between compensation between $135,000 - $195,000,
  depending on leveling. Company wide bonus tied to revenue goals. Competitive equity
  in the form of stock options. We are open on compensation for the right candidate.</p></li><li><p><strong><u>Stock
  options</u> </strong>in a rapidly growing company.<br><strong>Values</strong></p><ul><li><p><strong><u>Care
  for each other</u></strong>:<strong> </strong>We want to work on a team where people
  support each other - in their growth, in their work, and towards our shared mission.
  When we do that, we have fun.</p></li><li><p><strong><u>Build and improve rapidly</u></strong>:
  We move quickly. To do that, we focus, consistently ask ourselves if we are prioritizing
  the right things, and execute them as best as possible.</p></li><li><p><strong><u>Focus
  unremittingly on customers</u></strong>: Our first obligation is to our customers
  and partners, and we keep their needs front and center in everything we do.</p></li><li><p><strong><u>Demonstrate
  ownership</u></strong>: We are all owners of Crux. This is our team, our company,
  our product and we show that to each other.</p></li><li><p><strong><u>Convene a
  team that reflects the breadth of experiences in the country</u></strong>: We’re
  building a team with a wide range of backgrounds and a culture where everyone can
  thrive.</p></li></ul></li></ul></li></ul><p><em>We provide equal employment opportunities
  to all applicants without regard to race, color, religion, age, sex, national origin,
  disability status, genetics, protected veteran status, sexual orientation, gender
  identity or expression, or any other characteristic protected by law.</em></p><b></b>'
