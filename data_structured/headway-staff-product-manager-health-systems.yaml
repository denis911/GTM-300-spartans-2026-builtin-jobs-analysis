description_html: '<p><p>Headway’s mission is a big one – to build a new mental health
  care system everyone can access. We’ve built technology that helps people find great
  therapists with the first software-enabled national network of providers accepting
  insurance.&nbsp;</p><p>1 in 4 people in the US have a treatable mental health condition,
  but the majority of providers don’t accept insurance, making therapy too expensive
  for most people. Headway is building a new mental healthcare system that everyone
  can access by making it easy for therapists to accept insurance and scale their
  practice.&nbsp;</p><p>Headway was founded in 2019. Since then, we’ve grown into
  a diverse, national network of over 60,000 mental healthcare providers across all
  50 states who run their practice on our software and have served over 1 million
  patients. We’re a Series D company with over $325m in funding from a16z (Andreessen
  Horowitz), Accel, GV (formerly Google Ventures), Spark Capital, Thrive Capital,
  Forerunner Ventures and Health Care Service Corporation.</p><p>We want your time
  here to be the most meaningful experience of your career. <strong>Join us, and help
  change mental healthcare for the better.</strong></p></p><b><strong>About The Role</strong></b><p>At
  Headway, we’re building a new mental healthcare system that everyone can access.
  To do this, we need to create products that work seamlessly for both patients seeking
  care and providers delivering it.&nbsp; Every month, one million patients in the
  US ask their physicians for a referral to a mental health provider. Most of these
  physicians, mainly part of large hospital groups (AKA Health Systems) don’t have
  a reliable partner to refer their patients to today. As a result, millions of patients
  each year end up stranded, without the mental healthcare they seek. We are looking
  to bring on a Staff Product Manager to help tackle this thorny but ambitious problem,
  by building out our health system product and strategy to effectively engage and
  retain health system customers, receiving referrals and connecting these patients
  to care.</p><b><strong>What you’ll do at Headway:</strong></b><ul><li>Build products
  that make Headway the go-to referral partner for individual physicians, hospitals,
  and health systems, helping more patients access care and driving growth in appointments.</li><li>Partner
  closely with our Go-to-Market team to support the onboarding and success of new
  health system partners.</li><li>Develop tools and experiences that activate new
  health systems, increase referring physician engagement, and strengthen retention
  and wallet share.</li><li>Collaborate with fellow Product Managers across our Patient
  vertical to ensure a seamless experience from referral intake through patient care,
  bridging health system needs with patient outcomes.</li></ul><b><strong>You’ll be
  great for this role if you:</strong></b><ul><li>Have a proven track record of building
  products from early beginnings to scale, driving adoption and measurable outcomes.</li><li>Bring
  experience building partnership-driven products within consumer marketplaces, enabling
  growth and value on all sides of the ecosystem.</li><li>A comfortable operating
  at multiple altitudes — from driving high level strategic discussions and aligning
  multiple stakeholders, to hands-on product execution.</li><li>Are able to navigate
  a complex and ambiguous environment, identify gaps, and drive towards results.</li></ul><p><strong>Compensation
  and Benefits:</strong></p><p>The expected base pay range for this position is $<span>212,000
  - $265,000</span>, based on a variety of factors including qualifications, experience,
  and geographic location. In addition to base salary, this role may be eligible for
  an equity grant, depending on the position and level.</p><p><em>We are committed
  to offering a comprehensive and competitive total rewards package, including robust
  health and wellness benefits, retirement savings, and meaningful ownership opportunities
  through equity. Compensation decisions are made holistically, ensuring fairness
  and alignment with market benchmarks while recognizing individual contributions
  and potential.</em></p><ul><li>Benefits offered include:</li><ul><li>Equity compensation</li><li>Medical,
  Dental, and Vision coverage</li><li>HSA / FSA</li><li>401K</li><li>Work-from-Home
  Stipend</li><li>Therapy Reimbursement</li><li>16-week parental leave for eligible
  employees</li><li>Carrot Fertility annual reimbursement and membership</li><li>13
  paid holidays each year as well as a Holiday Break during the week between December
  25th and December 31st</li><li>Flexible PTO</li><li>Employee Assistance Program
  (EAP)</li><li>Training and professional development</li></ul></ul><p>#LI-AC1</p><p><p>We
  believe a team''s strength is in its people, and we cannot achieve this mission
  without a team that reflects the diversity of this problem – across race, ethnicity,
  gender, sexuality, age, national origin, religion, family status, disability, military
  status, and experience. Headway is committed to the full inclusion of all qualified
  individuals. As part of this commitment, Headway will ensure that persons with disabilities
  are provided with reasonable accommodations. If reasonable accommodation is needed
  to participate in the job application or interview process, to perform essential
  job functions, and/or receive other benefits and privileges of employment, please
  inform the recruiter when they contact you to schedule your interview.</p><p>Headway
  participates in E-Verify. To learn more, click here.</p><p>A notice to Headway applicants:
  To protect yourself against phishing and recruitment fraud, please note that Headway
  only accepts applications through our official careers page at https://headway.co/careers.
  Headway will never refer you to external websites, ask for payment or personal information,
  or conduct interviews via messaging apps. All official communication will come from
  a @findheadway.com email address. If you are contacted by someone claiming to be
  from Headway via an unofficial channel, please do not share any information and
  report it as spam.</p></p>'
description_text: 'Headway’s mission is a big one – to build a new mental health care
  system everyone can access. We’ve built technology that helps people find great
  therapists with the first software-enabled national network of providers accepting
  insurance.&nbsp; 1 in 4 people in the US have a treatable mental health condition,
  but the majority of providers don’t accept insurance, making therapy too expensive
  for most people. Headway is building a new mental healthcare system that everyone
  can access by making it easy for therapists to accept insurance and scale their
  practice.&nbsp; Headway was founded in 2019. Since then, we’ve grown into a diverse,
  national network of over 60,000 mental healthcare providers across all 50 states
  who run their practice on our software and have served over 1 million patients.
  We’re a Series D company with over $325m in funding from a16z (Andreessen Horowitz),
  Accel, GV (formerly Google Ventures), Spark Capital, Thrive Capital, Forerunner
  Ventures and Health Care Service Corporation. We want your time here to be the most
  meaningful experience of your career. Join us, and help change mental healthcare
  for the better. About The Role At Headway, we’re building a new mental healthcare
  system that everyone can access. To do this, we need to create products that work
  seamlessly for both patients seeking care and providers delivering it.&nbsp; Every
  month, one million patients in the US ask their physicians for a referral to a mental
  health provider. Most of these physicians, mainly part of large hospital groups
  (AKA Health Systems) don’t have a reliable partner to refer their patients to today.
  As a result, millions of patients each year end up stranded, without the mental
  healthcare they seek. We are looking to bring on a Staff Product Manager to help
  tackle this thorny but ambitious problem, by building out our health system product
  and strategy to effectively engage and retain health system customers, receiving
  referrals and connecting these patients to care. What you’ll do at Headway: Build
  products that make Headway the go-to referral partner for individual physicians,
  hospitals, and health systems, helping more patients access care and driving growth
  in appointments. Partner closely with our Go-to-Market team to support the onboarding
  and success of new health system partners. Develop tools and experiences that activate
  new health systems, increase referring physician engagement, and strengthen retention
  and wallet share. Collaborate with fellow Product Managers across our Patient vertical
  to ensure a seamless experience from referral intake through patient care, bridging
  health system needs with patient outcomes. You’ll be great for this role if you:
  Have a proven track record of building products from early beginnings to scale,
  driving adoption and measurable outcomes. Bring experience building partnership-driven
  products within consumer marketplaces, enabling growth and value on all sides of
  the ecosystem. A comfortable operating at multiple altitudes — from driving high
  level strategic discussions and aligning multiple stakeholders, to hands-on product
  execution. Are able to navigate a complex and ambiguous environment, identify gaps,
  and drive towards results. Compensation and Benefits: The expected base pay range
  for this position is $ 212,000 - $265,000 , based on a variety of factors including
  qualifications, experience, and geographic location. In addition to base salary,
  this role may be eligible for an equity grant, depending on the position and level.
  We are committed to offering a comprehensive and competitive total rewards package,
  including robust health and wellness benefits, retirement savings, and meaningful
  ownership opportunities through equity. Compensation decisions are made holistically,
  ensuring fairness and alignment with market benchmarks while recognizing individual
  contributions and potential. Benefits offered include: Equity compensation Medical,
  Dental, and Vision coverage HSA / FSA 401K Work-from-Home Stipend Therapy Reimbursement
  16-week parental leave for eligible employees Carrot Fertility annual reimbursement
  and membership 13 paid holidays each year as well as a Holiday Break during the
  week between December 25th and December 31st Flexible PTO Employee Assistance Program
  (EAP) Training and professional development #LI-AC1 We believe a team''s strength
  is in its people, and we cannot achieve this mission without a team that reflects
  the diversity of this problem – across race, ethnicity, gender, sexuality, age,
  national origin, religion, family status, disability, military status, and experience.
  Headway is committed to the full inclusion of all qualified individuals. As part
  of this commitment, Headway will ensure that persons with disabilities are provided
  with reasonable accommodations. If reasonable accommodation is needed to participate
  in the job application or interview process, to perform essential job functions,
  and/or receive other benefits and privileges of employment, please inform the recruiter
  when they contact you to schedule your interview. Headway participates in E-Verify.
  To learn more, click here. A notice to Headway applicants: To protect yourself against
  phishing and recruitment fraud, please note that Headway only accepts applications
  through our official careers page at https://headway.co/careers. Headway will never
  refer you to external websites, ask for payment or personal information, or conduct
  interviews via messaging apps. All official communication will come from a @findheadway.com
  email address. If you are contacted by someone claiming to be from Headway via an
  unofficial channel, please do not share any information and report it as spam.'
