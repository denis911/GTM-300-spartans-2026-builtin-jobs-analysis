description_html: '<p>Acquia empowers the world’s most ambitious brands to create
  digital customer experiences that matter. With open source Drupal at its core, the
  Acquia Digital Experience Platform (DXP) enables marketers, developers, and IT operations
  teams at thousands of global organizations to rapidly compose and deploy digital
  products and services that engage customers, enhance conversions, and help businesses
  stand out.</p><p>Headquartered in Boston, MA, Acquia is a Great Place to Work-CertifiedTM
  company, is listed as one of the world’s top software companies by The Software
  Report, and is positioned as a market leader by the analyst community. We are Acquia.
  We are building for the future and we want you to be a part of it!&nbsp;</p><p><strong>Career
  Exploration at Acquia</strong>&nbsp;</p><p>Our recruitment process is designed to
  empower you in making the most informed decisions. Acquia is committed to providing
  an inclusive, transparent, efficient, and educational interview experience that
  cultivates exploration into career opportunities at Acquia</p><p>You will discover
  the opportunity to grow your career here and learn from a global team that empowers
  you to exceed boundaries and achieve the extraordinary.</p><b><strong>Job Summary</strong></b><p>Acquia
  is seeking an&nbsp;<strong>Solutions Engineer</strong> to join our <strong>Pre-sales
  team</strong>. In this role, you will act as a technical advisor and evangelist,
  working with prospective customers to develop strong technical solutions that map
  to their business needs. You will serve as a <strong>key conduit between our business
  development team and our engineers</strong>, helping sales staff position Acquia’s
  solutions while bringing customer feedback back to our product development teams.
  As an associate-level professional, you will focus on <strong>learning and becoming
  an expert</strong> in the Acquia Cloud Platform, ensuring you can provide trusted
  advice and expertise to our future clients.</p><b><strong>Key Responsibilities</strong></b><ul><li><strong>Develop
  a deep knowledge</strong> of Acquia’s products, solutions, and value propositions.</li><li><strong>Gather
  customer business needs</strong> to tailor the right solution with Acquia products
  to help the customer succeed.</li><li><strong>Create solution proposals, presentations,</strong>
  and other customer communications.</li><li><strong>Research, scope, and estimate</strong>
  Drupal solutions for enterprise-grade applications.</li><li><strong>Combat competitive
  threats</strong> in accounts and educate potential customers on Acquia’s key values
  and benefits.</li><li><strong>Facilitate a smooth transition from sales to delivery</strong>
  by orienting the appropriate teams to the solution design.</li><li><strong>Lead
  or participate in customer-facing meetings</strong> and maintain excellent relationships
  with partners and prospects.</li><li><strong>Engage with the product team</strong>
  to drive customer requests and influence the product roadmap.</li></ul><b><strong>Required
  Education and Experience</strong></b><ul><li><strong>B.S. or similar technical degree</strong>,
  with a strong preference for <strong>Computer Science</strong>, IT, or Information
  Services.</li><li><strong>1-3 years of working experience</strong> in a customer-facing
  role; previous experience in sales or a pre-sales environment is highly preferred.</li><li><strong>Experience
  at a SaaS company</strong>, or familiarity with <strong>Drupal</strong> and cloud
  architectures.</li><li><strong>Passion for the web and open-source development</strong>.</li></ul><b><strong>Desired
  Skills and Attributes</strong></b><ul><li><strong>Loves technology and problem solving</strong>,
  with a desire to go in-depth on technical solutions.</li><li><strong>Excellent communication
  and interpersonal skills</strong>, with the ability to present technical concepts
  to both small and medium-sized audiences, including <strong>C-level executives</strong>.</li><li><strong>Demonstrates
  good questioning techniques</strong> and effective interpretation skills to understand
  customer use cases and challenges.</li><li><strong>Willingness to learn</strong>
  and collaborate with AI tools to enhance processes and achieve goals.</li></ul><p><strong>Ability
  to multitask</strong> in a fast-paced environment and work effectively as a team
  player on complex projects.</p><p>We are an organization that embraces innovation
  and the potential of AI to enhance our processes and improve our work. We are always
  looking for individuals who are open to learning new technologies and collaborating
  with AI tools to achieve our goals.</p><p>Acquia is proud to provide best-in-class
  benefits to help our employees and their families maintain a healthy body and mind.
  Core Benefits include: competitive healthcare coverage, wellness programs, take
  it when you need it time off, parental leave, recognition programs, and much more!</p><p>The
  annual base salary for this full-time position is $90,000 - $100,000. This role
  is also eligible for additional variable compensation. Final compensation will be
  commensurate with your experience and will be determined by a variety of factors,
  including city of residence, relevant skillset, and job-related knowledge.</p><p>Acquia
  is an equal opportunity (EEO) employer. Qualified applicants will receive consideration
  for employment without regard to race, color, religion, sex, national origin, disability,
  protected veterans status or any other protected status or characteristic under
  federal, state or local law unrelated to the ability to perform the job.</p><p>Interested
  residents of Colorado may contact NA-recruiting@acquia.com as it relates to regulation
  C.R.S. § 8-5-201. Information regarding benefits are linked here.</p>'
description_text: 'Acquia empowers the world’s most ambitious brands to create digital
  customer experiences that matter. With open source Drupal at its core, the Acquia
  Digital Experience Platform (DXP) enables marketers, developers, and IT operations
  teams at thousands of global organizations to rapidly compose and deploy digital
  products and services that engage customers, enhance conversions, and help businesses
  stand out. Headquartered in Boston, MA, Acquia is a Great Place to Work-CertifiedTM
  company, is listed as one of the world’s top software companies by The Software
  Report, and is positioned as a market leader by the analyst community. We are Acquia.
  We are building for the future and we want you to be a part of it!&nbsp; Career
  Exploration at Acquia &nbsp; Our recruitment process is designed to empower you
  in making the most informed decisions. Acquia is committed to providing an inclusive,
  transparent, efficient, and educational interview experience that cultivates exploration
  into career opportunities at Acquia You will discover the opportunity to grow your
  career here and learn from a global team that empowers you to exceed boundaries
  and achieve the extraordinary. Job Summary Acquia is seeking an&nbsp; Solutions
  Engineer to join our Pre-sales team . In this role, you will act as a technical
  advisor and evangelist, working with prospective customers to develop strong technical
  solutions that map to their business needs. You will serve as a key conduit between
  our business development team and our engineers , helping sales staff position Acquia’s
  solutions while bringing customer feedback back to our product development teams.
  As an associate-level professional, you will focus on learning and becoming an expert
  in the Acquia Cloud Platform, ensuring you can provide trusted advice and expertise
  to our future clients. Key Responsibilities Develop a deep knowledge of Acquia’s
  products, solutions, and value propositions. Gather customer business needs to tailor
  the right solution with Acquia products to help the customer succeed. Create solution
  proposals, presentations, and other customer communications. Research, scope, and
  estimate Drupal solutions for enterprise-grade applications. Combat competitive
  threats in accounts and educate potential customers on Acquia’s key values and benefits.
  Facilitate a smooth transition from sales to delivery by orienting the appropriate
  teams to the solution design. Lead or participate in customer-facing meetings and
  maintain excellent relationships with partners and prospects. Engage with the product
  team to drive customer requests and influence the product roadmap. Required Education
  and Experience B.S. or similar technical degree , with a strong preference for Computer
  Science , IT, or Information Services. 1-3 years of working experience in a customer-facing
  role; previous experience in sales or a pre-sales environment is highly preferred.
  Experience at a SaaS company , or familiarity with Drupal and cloud architectures.
  Passion for the web and open-source development . Desired Skills and Attributes
  Loves technology and problem solving , with a desire to go in-depth on technical
  solutions. Excellent communication and interpersonal skills , with the ability to
  present technical concepts to both small and medium-sized audiences, including C-level
  executives . Demonstrates good questioning techniques and effective interpretation
  skills to understand customer use cases and challenges. Willingness to learn and
  collaborate with AI tools to enhance processes and achieve goals. Ability to multitask
  in a fast-paced environment and work effectively as a team player on complex projects.
  We are an organization that embraces innovation and the potential of AI to enhance
  our processes and improve our work. We are always looking for individuals who are
  open to learning new technologies and collaborating with AI tools to achieve our
  goals. Acquia is proud to provide best-in-class benefits to help our employees and
  their families maintain a healthy body and mind. Core Benefits include: competitive
  healthcare coverage, wellness programs, take it when you need it time off, parental
  leave, recognition programs, and much more! The annual base salary for this full-time
  position is $90,000 - $100,000. This role is also eligible for additional variable
  compensation. Final compensation will be commensurate with your experience and will
  be determined by a variety of factors, including city of residence, relevant skillset,
  and job-related knowledge. Acquia is an equal opportunity (EEO) employer. Qualified
  applicants will receive consideration for employment without regard to race, color,
  religion, sex, national origin, disability, protected veterans status or any other
  protected status or characteristic under federal, state or local law unrelated to
  the ability to perform the job. Interested residents of Colorado may contact NA-recruiting@acquia.com
  as it relates to regulation C.R.S. § 8-5-201. Information regarding benefits are
  linked here.'
