description_html: '<p><p><b><span>Job Summary:</span></b><span>&nbsp;</span></p></p><p><p>The
  Software Engineer position is part of the Front Office Suite (FOS) engineering team
  responsible for designing, developing, and testing essential front office components
  on of Clearwater Analytics'' Beacon platform. You will work closely with our clients,
  which include investment banks, asset managers, hedge funds, insurance companies,
  and commodities trading companies. &nbsp;</p><p><b>What You’ll Do</b>&nbsp;</p><p>Work
  on developing, testing, and supporting various components to support our clients
  in the financial technology space. These include:&nbsp;</p><ul><li><p>Market data
  ingestion&nbsp;</p></li><li><p>Time series framework&nbsp;</p></li><li><p>Trade
  ingestion/high frequency trades&nbsp;</p></li><li><p>ETL/Data pipelines&nbsp;</p></li><li><p>Integrations
  with third-party systems&nbsp;</p></li><li><p>Adding features to Beacon’s framework
  for easy developing and deploying of applications.&nbsp;</p></li><li><p>Providing
  ongoing support and enhancement of the Beacon Platform&nbsp;</p></li></ul><p><b>What
  We’re Looking For</b>&nbsp;</p><ul><li><p>3-5 years of software engineering experience&nbsp;</p></li><li><p>Work
  experience with financial instruments&nbsp;</p></li><li><p>High proficiency in Python&nbsp;</p></li><li><p>Fundamentals
  of software engineering such as data structures and algorithms&nbsp;</p></li><li><p>Exposure
  to database programming (SQL)&nbsp;</p></li><li><p>Strong problem-solving skills&nbsp;</p></li></ul><p><b>What
  Will Make You Stand Out</b>&nbsp;</p><ul><li><p>Familiarity with streaming technologies
  like Kafka and Redis&nbsp;</p></li><li><p>Familiarity with SQL and NoSQL database
  technologies&nbsp;</p></li><li><p>Familiarity with cloud computing such as AWS or
  Azure&nbsp;</p></li><li><p>Exposure to multiple programming languages and paradigms</p></li></ul></p><p><b><span>Salary
  Range</span></b></p>$137,770.00 - $178,250.00<p><i><span><span>This is the pay range
  the Company believes it will pay for this position at the time of this posting.
  Consistent with applicable law, compensation will be determined based on relevant
  experience, other job-related qualifications/skills, and geographic location (to
  account for comparative cost of living). The Company reserves the right to modify
  this pay range at any time. For this role, benefits include: health/vision/dental
  insurance, 401(k), PTO, parental leave, and medical leave, STD/LTD insurance benefits.
  Clearwater Analytics is An Equal Opportunity/Affirmative Action Employer. All qualified
  applicants will receive consideration for employment without regard to race, color,
  religion, sex, sexual orientation, gender identity, national origin, disability
  or veteran status, age or any other federally protected class.</span></span></i></p>'
