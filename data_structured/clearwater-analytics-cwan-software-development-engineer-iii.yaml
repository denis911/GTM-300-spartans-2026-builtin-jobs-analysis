company_overview: 'CWAN was founded on a simple belief: investment professionals deserve
  modern technology that actually works for them. Not legacy systems that slow them
  down. Not fragmented data that creates confusion. But one comprehensive platform
  that gives you complete visibility and crystal-clear insights.The result? Investment
  management that works as seamlessly as your investment strategy.Since our founding
  in 2004, CWAN has been the trusted technology partner powering the world’s leading
  institutional investors — from insurance companies, asset managers, and hedge funds
  to asset owners like corporations, endowments, and pension funds managing over $10
  trillion in assets.'
