description_html: '<p><p><span>Apollo.io</span> is the leading go-to-market solution
  for revenue teams, trusted by over 500,000 companies and millions of users globally,
  from rapidly growing startups to some of the world''s largest enterprises. Founded
  in 2015, the company is one of the fastest growing companies in SaaS, raising approximately
  $250 million to date and valued at $1.6 billion. <span>Apollo.io</span> provides
  sales and marketing teams with easy access to verified contact data for over 210
  million B2B contacts and 35 million companies worldwide, along with tools to engage
  and convert these contacts in one unified platform. By helping revenue professionals
  find the most accurate contact information and automating the outreach process,
  <span>Apollo.io</span> turns prospects into customers.&nbsp;Apollo raised a series
  D in 2023 and is backed by top-tier investors, including Sequoia Capital, Bain Capital
  Ventures, and more, and counts the former President and COO of Hubspot, JD Sherman,
  among its board members.</p></p><b><span>Your Role &amp; Mission</span></b><p>We’re
  looking for a <strong><span>Senior</span> <span>Growth Engineer</span></strong>
  to join our team and accelerate our product’s growth through rapid experimentation,
  data analysis, and scalable technical solutions. You’ll work at the intersection
  of engineering, product, and marketing to optimize funnels, automate growth loops,
  and implement features that drive measurable impact.</p><b><span>Daily Adventures
  &amp; Responsibilities</span></b><ul><li><strong>Own and drive growth initiatives
  end-to-end</strong> — identify opportunities, design experiments, ship solutions,
  and measure impact on key metrics (NRR, GRR, CAC, activation, and expansion).</li><li><strong>Design
  and implement experimentation frameworks</strong> (A/B testing, feature flags, instrumentation)
  to ensure reliable measurement and fast iteration.</li><li><strong>Collaborate cross-functionally</strong>
  with Product, Marketing, Data, and Engineering to translate growth hypotheses into
  shipped, measurable features.</li><li><strong>Leverage data and AI</strong> to personalize
  user experiences, optimize engagement, and reduce friction across the user journey.</li><li><strong>Raise
  the technical bar</strong> by ensuring growth experiments are production-quality,
  performant, secure, and maintainable.</li><li><strong>Act as a technical leader</strong>
  in growth — influencing roadmap decisions, mentoring others, and helping define
  best practices for experimentation and analytics.</li><li><strong>Develop and execute
  engineering strategies</strong> that enable rapid experimentation and data-driven
  decision-making.</li><li><strong>Architect and build scalable systems</strong> that
  support growth initiatives, such as onboarding flows, personalization engines, and
  viral loops.</li><li><strong>Ensure technical excellence</strong> through best practices
  in performance optimization, security, and scalability.</li></ul><b><span><strong>Skills
  &amp; Relevant Experience</strong></span></b><ul><li>7+ years of professional software
  engineering experience, with significant ownership of shipped product features.</li><li>Strong
  <strong>full-stack experience,</strong> including:

  <ul><li>Frontend: JavaScript/Typescript, React</li><li>Backend: RoR, Node.js, Python,
  or similar</li><li>Databases, APIs, and cloud infrastructure (AWS/GCP)</li></ul></li><li>Hands-on
  experience with <strong>analytics and experimentation:</strong><ul><li>A/B testing
  frameworks (e.g LaunchDarkly, Optimizely, Amplitude, Google Analytics, or custom)</li><li>Analytics
  platforms (Amplitude, Mixpanel, statsig, etc)</li></ul></li><li>Proven ability to
  <strong>use data to drive decisions</strong>, not just report on it</li><li>Excellent
  leadership, communication, and stakeholder management skills.</li><li><strong>AI
  &amp; Modern Tooling</strong><ul><li>Practical experience using AI/LLMs to:

  <ul><li>Accelerate development</li><li>Build product features</li><li>Improve productivity</li></ul></li></ul></li><li><strong>Mindset:</strong><ul><li><strong>Outcome-oriented:</strong>
  You care about business impact, not just shipping code</li><li><strong>Experimental</strong>:
  You’re comfortable forming hypothesis, testing quickly, and iterating based on real
  data</li><li><strong>Biased toward action:</strong> You thrive in ambiguity and
  move forward with imperfect information</li><li><strong>Metrics-driven:</strong>
  Obsession with metrics (LTV, CAC, retention) and rapid iteration</li><li><strong>High
  ownership:</strong> You treat growth problems as yours to solve</li></ul></li><li><strong>Nice-to-Haves:</strong><ul><li>Experience
  on a growth, product-led, or experimentation team</li><li>Background at a startup
  or scaling product</li><li>Prior experience mentoring or leading engineers in ambiguous
  problem spaces</li></ul></li></ul><p><span><strong>Key Characteristics of Growth
  Engineers</strong></span></p><ul><li><strong>Entrepreneurial</strong>: Independent,
  resourceful, and proactive in seeking growth opportunities.</li><li><strong>Experimental</strong>:
  Willing to test hypotheses and iterate on strategies based on real-world feedback.</li><li><strong>Data-Driven</strong>:
  Focused on analyzing data to inform decisions and measure success.</li><li><strong>Curious</strong>:
  Always learning and exploring new technologies and methods to drive growth.</li></ul><p><p><strong>Our
  tech stack</strong> is React/Redux/NodeJS on the frontend, Ruby/Ruby on Rails/MongoDB/Elasticsearch
  on the backend, and Kubernetes/Docker/Ansible/Terraform in infrastructure.</p><p><strong><span>Apollo.io
  Tech Blog: </span></strong><span>Deep dives into engineering, product design, and
  company-culture stories from the Apollo team, offering behind-the-scenes insight
  into how Apollo builds and scales its B2B sales platform.</span></p></p><p><p><p><p>The
  listed Pay Range reflects the total cash compensation inclusive of annual base salary
  and annual bonus as applicable. For sales roles, the range provided is the role’s
  On Target Earnings ("OTE") range, meaning that the range includes both the sales
  commissions/sales bonus target and annual base salary for the role. This salary
  range may be inclusive of several career levels at Apollo and will be narrowed during
  the interview process based on a number of factors, including the candidate’s experience,
  qualifications, and location. Applicants interested in this role who are not located
  in the US may request the annual salary range for their location during the interview
  process.</p><p>Additional benefits for this role may include: equity; company bonus
  or sales commissions/bonuses; 401(k) plan; at least 10 paid holidays per year, flex
  PTO, and parental leave; employee assistance program and wellbeing benefits; global
  travel coverage; life/AD&amp;D/STD/LTD insurance; FSA/HSA and medical, dental, and
  vision benefits.</p></p><p>Tier 1 Pay Range (San Francisco, New York City, Seattle)</p><p><span>$218,600</span><span>—</span><span>$300,520
  USD</span></p></p><p><p>Tier 2 Pay Range (All other US Locations)</p><p><span>$190,100</span><span>—</span><span>$261,360
  USD</span></p></p></p><p><b>We are AI Native</b><p>Apollo.io is an AI-native company
  built on a culture of continuous improvement. We’re on the front lines of driving
  productivity for our customers—and we expect the same mindset from our team. If
  you''re energized by finding smarter, faster ways to get things done using AI and
  automation, you''ll thrive here.</p><b>Why You’ll Love Working at Apollo</b><p>At
  Apollo, we’re driven by a shared mission: to help our customers unlock their full
  revenue potential. That’s why we <strong>take extreme ownership</strong> of our
  work, <strong>move with focus and urgency</strong>, and <strong>learn voraciously</strong>
  to stay ahead.</p><p>We invest deeply in your growth, ensuring you have the resources,
  support, and autonomy to&nbsp;<strong>own your role and make a real impact</strong>.
  Collaboration is at our core—we’re <strong>all for one</strong>, meaning you’ll
  have a team across departments ready to help you succeed. We encourage <strong>bold
  ideas and courageous action</strong>, giving you the freedom to experiment, take
  smart risks, and drive big wins.</p><p>If you’re looking for a place where your
  work matters, where you can push boundaries, and where your career can thrive—Apollo
  is the place for you.&nbsp;</p><p>Learn more&nbsp;here!</p></p>'
