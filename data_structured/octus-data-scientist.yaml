description_html: '<p><p><strong>Octus</strong></p><p>Octus is a leading global provider
  of credit intelligence, data, and analytics. Since 2013, tens of thousands of professionals
  across hedge fund, investment banking, management consulting, and law firm verticals
  have come to rely on Octus to make better, faster, and more confident decisions
  in pace with the fast-moving credit markets. <br>For more information, visit: https://octus.com/</p><p><strong>Working
  at Octus</strong></p><p>Octus hires growth-minded innovators and trailblazers across
  the globe to drive our business and culture. Our core values – Action Oriented,
  Customer First Mindset, Effective Team Players, and Driven to Excel – define an
  organizational ethos that’s as high-performing as it is human. Among other perks,
  Octus employees enjoy competitive health benefits, matched 401k and pension plans,
  PTO, generous parental leave, gym subsidies, educational reimbursements for career
  development, recognition programs, pet-friendly offices (US only), and much more.&nbsp;<br><strong>Role</strong></p></p><p>Octus
  delivers breaking news and market-moving intelligence through cutting-edge data
  and technology for hedge funds, investment banks, and law firms- and we’re transforming
  how professionals access complex and opaque information. As part of our high-performing
  AI Innovation team, you’ll help design, build, and productionize modern GenAI and
  LLM-powered systems that support both client-facing features and internal operational
  efficiency. You’ll work end to end—from shaping ambiguous problems into scalable
  solutions to deploying reliable AI models in production - collaborating closely
  with product, engineering, and infrastructure teams. This is a hybrid role based
  in NYC (3 days in office per week). Curious about what we’re building? Check out
  our flagship GenAI product,&nbsp;<strong>CreditAI</strong> here and our AI framework
  here.</p><p><strong>Responsibilities</strong></p><ul><li>Apply strong problem-solving
  and critical thinking skills to break down complex, ambiguous requirements into
  clear, implementable technical components and system designs.</li><li>Design, build,
  and maintain AI-powered and data-driven systems with a focus on modern language
  and multimodal models, including LLM-driven applications, RAG pipelines, and agentic
  workflows.</li><li>Evaluate and productionize commercial and open-source LLMs, choosing
  appropriate models, tools, and techniques for each use case. Develop multi-step
  agentic workflows that incorporate tools, external data sources, memory, and control
  logic.</li><li>Manage the orchestration of production LLM workflows and agentic
  systems, ensuring reliability and efficiency through prompt routing, state management,
  retries, fallbacks, and error handling. Design, test, and iteratively refine prompts
  and system instructions using prompt engineering and tuning techniques to improve
  model reliability, accuracy, and task performance.</li><li>Maintain production-grade
  code and services with automated monitoring and performance tracking, using metrics
  and alerts to guide continuous improvements in models, prompts, and pipelines.</li><li>Apply
  systems thinking to design and optimize AI and LLM systems, balancing quality, scalability,
  latency, cost, and operational complexity, while implementing efficiency improvements
  using model selection, prompt design, batching, caching, and retrieval strategies.</li><li>Define
  and implement evaluation and observability frameworks for AI systems, including
  automated testing, task-specific benchmarks, regression testing for prompts, human-in-the-loop
  validation, and performance monitoring.</li><li>Build and integrate AI models into
  backend systems and APIs to support both real-time and batch inference, ensuring
  solutions are production-ready, scalable, and efficient.</li><li>Apply NLP and ML
  techniques to tasks such as information extraction, semantic search and retrieval,
  text classification, summarization, and reasoning over text and documents.</li><li>Collaborate
  closely with engineering and infrastructure teams to deploy solutions using containerized
  and cloud-based environments (e.g., GitHub, Docker, AWS), applying modern deployment
  and infrastructure practices.</li><li>Collaborate with product managers, business
  stakeholders, and domain experts to translate complex, ambiguous business problems
  into actionable technical solutions, and communicate progress, trade-offs, and outcomes
  to relevant stakeholders.</li><li>Continuously learn and adapt to advancements in
  NLP and Generative AI to ensure solutions remain innovative and effective.</li></ul><p><strong>Requirements</strong></p><ul><li>Bachelor’s
  or Master’s degree in Computer Science, Engineering, or a related technical field
  (or equivalent practical experience).</li><li>2+ years of experience as a Data Scientist,
  Machine Learning Engineer, or applied AI practitioner, with a strong foundation
  in computer science, algorithms, and software development.&nbsp;</li><li>Advanced
  programming skills in Python, with experience building production-grade systems
  beyond research or experimentation.</li><li>Solid understanding of machine learning
  and applied AI concepts, with experience taking solutions from prototype to production.</li><li>Hands-on
  experience designing, building, and deploying LLM-driven or GenAI applications,
  including familiarity with vector databases, embeddings pipelines, or semantic search
  systems.</li><li>Practical experience with cloud-based deployments and infrastructure
  tools (e.g., AWS, Docker, GitHub) and an understanding of modern DevOps practices,
  containerization, orchestration, caching strategies, and cost-aware design.</li><li>Strong
  problem-solving skills and systems thinking, with the ability to balance trade-offs
  across model quality, scalability, inference latency, cost, and operational complexity.</li><li>Ability
  to interpret and implement research ideas and algorithms, actively contributing
  to research and development initiatives while translating them into production solutions.</li><li>Excellent
  communication and collaboration skills, with experience working closely with product
  managers, engineers, and domain experts to deliver actionable technical solutions.</li><li>Passion
  for learning and staying current with the rapidly evolving AI/ML landscape, including
  emerging best practices for GenAI applications.</li><li>Strong ownership and initiative,
  with the ability to independently drive projects from problem definition to delivery,
  while being a team player and contributing to the overall success of the data science
  team.</li></ul><p>At Octus, we consider a range of factors in connection with compensation
  decisions, including experience, skills, location, and our business needs and limitations.
  As a result, compensation may vary within and across similar roles and positions.
  Please note that the salary range information below is a good faith estimate for
  this position and actual compensation for any individual may fall outside this range
  if warranted by the circumstances applicable to that individual. If we identify
  a role that would be suitable for a broader range of skills and experience such
  that we would consider hiring at multiple levels then the range listed below may
  reflect that breadth.</p><p>The salary range estimate for this position is $130,000-$145,000.</p><p>The
  actual compensation will be at Octus’ sole discretion and will be determined by
  the aforementioned and other relevant factors. This position is eligible for a performance-based
  annual bonus.</p><p><p><strong>Equal Employment Opportunity</strong></p><p>Octus
  is committed to providing equal employment opportunities to all employees and applicants
  for employment without regard to race, colour, religion, sex, sexual orientation,
  gender identity, national origin, age, disability, genetic information, marital
  status, pregnancy, veteran status, or any other legally protected status. We strive
  to create an inclusive and diverse work environment where all individuals are valued,
  respected, and treated fairly. We believe that diversity enriches our workplace
  and enhances our ability to innovate and succeed.</p></p>'
