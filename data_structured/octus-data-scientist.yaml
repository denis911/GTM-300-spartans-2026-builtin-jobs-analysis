  summarization, and reasoning over text and documents. Collaborate closely with engineering
  and infrastructure teams to deploy solutions using containerized and cloud-based
  environments (e.g., GitHub, Docker, AWS), applying modern deployment and infrastructure
  practices. Collaborate with product managers, business stakeholders, and domain
  experts to translate complex, ambiguous business problems into actionable technical
  solutions, and communicate progress, trade-offs, and outcomes to relevant stakeholders.
  Continuously learn and adapt to advancements in NLP and Generative AI to ensure
  solutions remain innovative and effective. Requirements Bachelor’s or Master’s degree
  in Computer Science, Engineering, or a related technical field (or equivalent practical
  experience). 2+ years of experience as a Data Scientist, Machine Learning Engineer,
  or applied AI practitioner, with a strong foundation in computer science, algorithms,
  and software development.&nbsp; Advanced programming skills in Python, with experience
  building production-grade systems beyond research or experimentation. Solid understanding
  of machine learning and applied AI concepts, with experience taking solutions from
  prototype to production. Hands-on experience designing, building, and deploying
  LLM-driven or GenAI applications, including familiarity with vector databases, embeddings
  pipelines, or semantic search systems. Practical experience with cloud-based deployments
  and infrastructure tools (e.g., AWS, Docker, GitHub) and an understanding of modern
  DevOps practices, containerization, orchestration, caching strategies, and cost-aware
  design. Strong problem-solving skills and systems thinking, with the ability to
  balance trade-offs across model quality, scalability, inference latency, cost, and
  operational complexity. Ability to interpret and implement research ideas and algorithms,
  actively contributing to research and development initiatives while translating
  them into production solutions. Excellent communication and collaboration skills,
  with experience working closely with product managers, engineers, and domain experts
  to deliver actionable technical solutions. Passion for learning and staying current
  with the rapidly evolving AI/ML landscape, including emerging best practices for
  GenAI applications. Strong ownership and initiative, with the ability to independently
  drive projects from problem definition to delivery, while being a team player and
  contributing to the overall success of the data science team. At Octus, we consider
  a range of factors in connection with compensation decisions, including experience,
  skills, location, and our business needs and limitations. As a result, compensation
