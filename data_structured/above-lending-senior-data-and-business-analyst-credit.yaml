description_html: <p>Above Lending is a next-generation financial services company.
  We provide simple and transparent products aimed at helping our clients achieve
  their personal finance goals. With competitive rates and personalized support, our
  mission is to simplify the lending process and help borrowers attain financial well-being.
  We are committed to making credit more affordable and accessible.</p><p><br></p><p><span>We’re
  looking for a strategic and driven </span><b>Senior Business Analyst </b><span>to
  join our growing team. This individual will sit at the intersection of data science,
  credit strategy, and business analytics, supporting functions with a focus on analyzing
  performance across the client lifecycle from originations to loan performance. The
  ideal candidate will have strong analytical skills, an understanding of credit risk,
  and a passion for uncovering insights that drive business decisions.</span></p><p><br></p><p><span>You’ll
  play a critical role in identifying opportunities to improve origination outcomes,
  credit performance, and the overall lending strategy.</span></p><p><b>What You'll
  Do</b></p><ul><li>Analyze credit and originations performance, surfacing trends
  and measuring the impact of business initiatives on risk, funnel efficiency, and
  customer acquisition.</li><li>Build analytics that track progress towards company
  KPIs and drivers of performance that are critical to achieving originations and
  credit goals.&nbsp;</li><li>Partner with Product, Operations, and Data teams to
  validate releases, streamline underwriting processes, and ensure credit policies
  align with business objectives.</li><li>Collaborate with model development teams
  to support deployment, monitoring, and backtesting of credit and underwriting models.</li><li>Monitor
  dashboards and performance tracking tools to guide strategic decisions and support
  cross-functional partners.</li><li>Identify and investigate early warning signs
  of credit deterioration or operational inefficiencies.</li><li>Present findings
  and recommendations to non-technical stakeholders, including Senior Leadership,
  to influence decision-making.</li></ul><p></p><p><b>What You'll Bring</b></p><ul><li>Bachelor's
  or Master’s degree in Data Science, Finance, Economics, Statistics, Business, Engineering,
  or a related analytical field.</li><li>3–7 years of experience in credit risk, or
  strategy; preferably within consumer lending, fintech, or startup environments.</li><li>Strong
  SQL skills required; proficiency in Excel, and experience with data visualization
  tools (Tableau) preferred.</li><li>Working knowledge of Python or R is a plus.</li><li>Familiarity
  with credit reports, credit scoring models, and consumer loan performance metrics.&nbsp;Ability
  to interpret complex data and communicate insights clearly to cross-functional partners.</li><li>Detail-oriented
  with excellent organizational skills and the ability to manage multiple projects
  in a fast-paced environment.</li><li>A proactive mindset and desire to dig into
  both strategic and tactical challenges to drive measurable impact.</li></ul><p></p><p><b>What
  We Offer</b></p><ul><li>Considerable employer contributions for health, dental and
  vision programs&nbsp;&nbsp;</li><li>Flexible time-off&nbsp;policy</li><li>401(K)
  match with immediate 100% vesting</li><li>Merit advancement opportunities&nbsp;</li><li>Monthly
  Work From Home Stipend</li><p><br></p></ul><p></p><p></p><p>Join our dynamic team
  and contribute to Above Lending’s success as we continue to provide innovative lending
  solutions to our customers.</p><p><br></p><p><i>Under the California Consumer Privacy
  Act (“CCPA”), Above Lending is informing California residents who are our job applicants,
  contractors or prospective employees (together “job applicants”) about the categories
  of personal information we collect about you and the purposes for which we will
  use this information. This notice and our Privacy Policy contain important information
  relating to the CCPA and apply only to personal information that is subject to the
  CCPA. Please see our website for the full CCPA statement.</i></p><p><br></p><p>*Above
  Lending is an equal opportunity Employer*</p><p><i>Above Lending does not accept
  unsolicited resumes from individual recruiters or third-party recruiting agencies
  in response to job positions.&nbsp; No fee will be paid to their parties who submit
  unsolicited candidates directly to Above Lending employees or the Above Lending
  Finance and HR teams.&nbsp; No placement fee will be paid to any third party unless
  such a request has been made by the Above Lending HR team.</i></p><p></p>
description_text: Above Lending is a next-generation financial services company. We
  provide simple and transparent products aimed at helping our clients achieve their
  personal finance goals. With competitive rates and personalized support, our mission
  is to simplify the lending process and help borrowers attain financial well-being.
  We are committed to making credit more affordable and accessible. We’re looking
  for a strategic and driven Senior Business Analyst to join our growing team. This
  individual will sit at the intersection of data science, credit strategy, and business
  analytics, supporting functions with a focus on analyzing performance across the
  client lifecycle from originations to loan performance. The ideal candidate will
  have strong analytical skills, an understanding of credit risk, and a passion for
  uncovering insights that drive business decisions. You’ll play a critical role in
  identifying opportunities to improve origination outcomes, credit performance, and
  the overall lending strategy. What You'll Do Analyze credit and originations performance,
  surfacing trends and measuring the impact of business initiatives on risk, funnel
  efficiency, and customer acquisition. Build analytics that track progress towards
  company KPIs and drivers of performance that are critical to achieving originations
  and credit goals.&nbsp; Partner with Product, Operations, and Data teams to validate
  releases, streamline underwriting processes, and ensure credit policies align with
  business objectives. Collaborate with model development teams to support deployment,
  monitoring, and backtesting of credit and underwriting models. Monitor dashboards
  and performance tracking tools to guide strategic decisions and support cross-functional
  partners. Identify and investigate early warning signs of credit deterioration or
  operational inefficiencies. Present findings and recommendations to non-technical
  stakeholders, including Senior Leadership, to influence decision-making. What You'll
  Bring Bachelor's or Master’s degree in Data Science, Finance, Economics, Statistics,
  Business, Engineering, or a related analytical field. 3–7 years of experience in
  credit risk, or strategy; preferably within consumer lending, fintech, or startup
  environments. Strong SQL skills required; proficiency in Excel, and experience with
  data visualization tools (Tableau) preferred. Working knowledge of Python or R is
  a plus. Familiarity with credit reports, credit scoring models, and consumer loan
  performance metrics.&nbsp;Ability to interpret complex data and communicate insights
  clearly to cross-functional partners. Detail-oriented with excellent organizational
  skills and the ability to manage multiple projects in a fast-paced environment.
  A proactive mindset and desire to dig into both strategic and tactical challenges
  to drive measurable impact. What We Offer Considerable employer contributions for
  health, dental and vision programs&nbsp;&nbsp; Flexible time-off&nbsp;policy 401(K)
  match with immediate 100% vesting Merit advancement opportunities&nbsp; Monthly
  Work From Home Stipend Join our dynamic team and contribute to Above Lending’s success
  as we continue to provide innovative lending solutions to our customers. Under the
  California Consumer Privacy Act (“CCPA”), Above Lending is informing California
  residents who are our job applicants, contractors or prospective employees (together
  “job applicants”) about the categories of personal information we collect about
  you and the purposes for which we will use this information. This notice and our
  Privacy Policy contain important information relating to the CCPA and apply only
  to personal information that is subject to the CCPA. Please see our website for
  the full CCPA statement. *Above Lending is an equal opportunity Employer* Above
  Lending does not accept unsolicited resumes from individual recruiters or third-party
  recruiting agencies in response to job positions.&nbsp; No fee will be paid to their
  parties who submit unsolicited candidates directly to Above Lending employees or
  the Above Lending Finance and HR teams.&nbsp; No placement fee will be paid to any
  third party unless such a request has been made by the Above Lending HR team.
