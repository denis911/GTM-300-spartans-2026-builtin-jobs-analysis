  too many hands. You''ll architect integrations between CRM, billing, contracts,
  and finance—building the workflows that turn enterprise sales from a manual slog
  into something elegant. Quote-to-cash shouldn''t take weeks. Contract amendments
  shouldn''t require spreadsheets. We need systems that scale with ambition. Analytics
  infrastructure that surfaces truth We''re flying fast, which means we need instruments.
  You''ll build the data pipelines and dashboards that show us what''s actually happening:
  consumption patterns, churn signals, expansion opportunities. Not vanity metrics—the
  kind of real-time visibility that changes how we make decisions. What We''re Looking
  For Technical Skills 3-5+ years as a Software Engineer, Systems Engineer, or RevOps
  Engineer at a B2B AI or SaaS company Programming proficiency: Python, JavaScript/TypeScript,
  SQL CRM expertise: Hands-on experience with cloud-based CRMs such as Attio, Salesforce,
  or HubSpot Integration platforms: Experience building with Workato, Zapier, Tray.io,
  or similar iPaaS tools API development: RESTful APIs, webhooks, OAuth, authentication
  protocols—you understand these as contracts, not just endpoints Data pipelines:
  Proven experience building ETL/ELT workflows, data transformation, and warehouse
  integration Billing systems: Familiarity with Stripe Billing, Metronome, Lago, Chargebee,
  or similar usage-based billing platforms Business &amp; Domain Knowledge Experience
  with usage-based pricing, consumption billing, and complex contract structures Understanding
  of multi-jurisdictional business operations (US/EU structures a plus) Track record
  of making build-vs-buy decisions and living with the consequences How You Work Cross-functional
  collaboration: You translate fluently between finance speak, sales speak, and engineering
  speak Business acumen: You connect technical solutions directly to revenue outcomes
  Problem-solving: You debug complex data flows and system integration issues independently—because
  you can''t help yourself Communication: You explain technical concepts clearly to
  non-technical stakeholders without condescension Attention to detail: You ensure
  data accuracy and integrity because you know messy data leads to messy decisions
  Ownership mentality: You identify problems and ship solutions without waiting for
  permission Preferred Experience Experience at a high-growth startup scaling from
  $1M to $100M+ ARR (ideally during the messy middle) Familiarity with API-first or
  usage-based products Experience with data visualization tools (Tableau, Looker,
  Metabase) Knowledge of sales tax, VAT compliance, and multi-currency billing Prior
  experience navigating dual US/EU entity structures &nbsp;'
