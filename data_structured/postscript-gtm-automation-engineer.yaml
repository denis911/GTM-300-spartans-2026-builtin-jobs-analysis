description_html: <p><p>Trusted by more than 18,000 Shopify and Shopify Plus stores—like
  Brooklinen, Ruggable, True Classic and Dr. Squatch—Postscript gives ecommerce brands
  the tools they need to run a world-class SMS marketing program.&nbsp;</p><p>We’re
  on a mission to make SMS the number-one revenue channel for ecommerce merchants
  by delivering an easy-to-use platform where they can grow their subscriber list,
  develop and test their messaging strategy, deliver excellent customer service, and
  drive sales and loyalty—all in one place. We believe SMS is the most important marketing
  and sales channel of the decade, and that vision drives everything we do.</p><p>Postscript
  was founded in 2018 as a 100% remote organization. With more than 250 employees
  (and counting!), we’re backed by Greylock, Y Combinator, and other top investors.</p></p><p>We
  are building a new kind of team at the intersection of GTM, Data, and AI Tools.
  We believe AI offers a massive opportunity to revolutionize the GTM function, empowering
  builders to architect intelligent systems that drive revenue.</p><p>We are looking
  for a <strong>GTM Automation Engineer</strong> who is technically "scrappy," deeply
  understands the Sales/Marketing engine, and is eager to use AI coding tools (Claude
  Code, Cursor, Replit) to build custom solutions that fit our unique business needs.</p><p>You'll
  be partnering with GTM leadership to infuse critical context into the systems and
  working with operations to layer AI into the entire process. You will be the technical
  architect behind our AI-driven GTM motion, building agents that research prospects,
  workflows that automate customer touchpoints, and internal apps that give our sales
  team superpowers.&nbsp;</p><p>This position is fully remote.&nbsp;</p><b><strong>Who
  You Are</strong></b><ul><li><strong>A "Scrappy" Builder:</strong> You don't need
  a Jira ticket or a 3-month roadmap. You see a problem, you choose the best tool
  (Code vs. No-Code), and you ship a solution today.</li><li><strong>GTM Fluent:</strong>
  You speak the language of revenue. You know what an MQL is, you understand the pain
  of a messy Salesforce instance, and you know exactly why sales reps hate entering
  data.</li><li><strong>AI-Native:</strong> You’ve realized that tools like Claude
  Code and Replit have given you superpowers. You aren't afraid to write Python or
  SQL because you know how to leverage AI to get 80% of the way there instantly.</li><li><strong>Product
  &amp; UX Instinct:</strong> You know that internal tools often fail because they
  are hard to use. You care about the interface and the workflow, ensuring that your
  solutions are intuitive enough for a busy sales rep to adopt without a training
  manual.</li><li><strong>High Ownership:</strong> You thrive in ambiguity. You don't
  just build what is asked; you proactively identify bottlenecks in our funnel and
  destroy them with automation.</li></ul><b><strong>What You’ll Do</strong></b><ul><li><strong>Systematize
  the GTM Motion:</strong> Partner with Sales and Marketing leadership to map out
  their workflows, identifying high-leverage opportunities to replace manual grunt
  work with automated precision.</li><li><strong>Build "Hybrid" Automations:</strong>
  Design and maintain workflows that seamlessly blend low-code tools (Zapier, n8n,
  Retool) with custom scripts (Python, SQL) where flexibility is needed.</li><li><strong>Develop
  Internal Tools:</strong> Use AI-assisted coding workflows (Replit, Claude Code)
  to rapidly build and deploy internal web apps that solve specific business problems
  (e.g., a custom lead scoring app or a renewal risk dashboard).</li><li><strong>Orchestrate
  Data:</strong> Ensure data flows reliably between our core systems (Salesforce,
  HubSpot, Outreach, Snowflake). You will be the guardian of data integrity.</li><li><strong>Experiment
  &amp; Iterate:</strong> Act as the lab for the GTM org. Test new AI agents, enrichment
  tools, and APIs. If it works, scale it; if it doesn't, kill it and move on.</li></ul><b><strong>Requirements</strong></b><ul><li><strong>Deep
  GTM Experience:</strong> 4+ years working in Revenue Operations, Sales Engineering,
  or Business Systems. You must understand the B2B SaaS customer lifecycle.</li><li><strong>Automation
  Expertise:</strong> Proven track record of building complex workflows that handle
  real business logic. You know when to use a webhook and when to build a native integration.</li><li><strong>Technical
  Versatility:</strong> You might not be a "classically trained" software engineer,
  but you are dangerous with code. You are comfortable reading API documentation,
  writing SQL queries, and debugging Python scripts with the help of AI.</li><li><strong>Communication:</strong>
  You can explain technical constraints to a VP of Sales and business value to a Head
  of Engineering.</li></ul><p><strong>What You’ll Love About Us</strong></p><ul><li><strong>Define
  a New Discipline:</strong> You will be one of the first "AI-Native" GTM Engineers,
  defining how companies use LLMs to automate operations.</li><li><strong>High Impact:</strong>
  Your work directly affects the company's bottom line. You aren't optimizing a background
  process; you are optimizing revenue.</li><li><strong>The Best Tools:</strong> We
  provide full access to the latest AI stack. If there is a tool that makes you faster,
  we want you to have it.</li><li><strong>High growth startup:</strong> plenty of
  room for you to directly impact the company and grow your career!</li><li><strong>Remote-first:</strong>
  Fully remote company, so work from home or wherever!</li><li><strong>Salary range
  of USD $159,000-$180,000 base plus significant equity (we do not have geo based
  salaries)</strong></li></ul><p><p><em>For information about how we use your personal
  data, please see our U.S. Job Applicant&nbsp;Privacy Notice</em></p><p><em>You are
  welcome here. Postscript is an ever-evolving place of equal employment for talented
  individuals.</em></p></p>
description_text: 'Trusted by more than 18,000 Shopify and Shopify Plus stores—like
  Brooklinen, Ruggable, True Classic and Dr. Squatch—Postscript gives ecommerce brands
  the tools they need to run a world-class SMS marketing program.&nbsp; We’re on a
  mission to make SMS the number-one revenue channel for ecommerce merchants by delivering
  an easy-to-use platform where they can grow their subscriber list, develop and test
  their messaging strategy, deliver excellent customer service, and drive sales and
  loyalty—all in one place. We believe SMS is the most important marketing and sales
  channel of the decade, and that vision drives everything we do. Postscript was founded
  in 2018 as a 100% remote organization. With more than 250 employees (and counting!),
  we’re backed by Greylock, Y Combinator, and other top investors. We are building
  a new kind of team at the intersection of GTM, Data, and AI Tools. We believe AI
  offers a massive opportunity to revolutionize the GTM function, empowering builders
  to architect intelligent systems that drive revenue. We are looking for a GTM Automation
  Engineer who is technically "scrappy," deeply understands the Sales/Marketing engine,
  and is eager to use AI coding tools (Claude Code, Cursor, Replit) to build custom
  solutions that fit our unique business needs. You''ll be partnering with GTM leadership
  to infuse critical context into the systems and working with operations to layer
  AI into the entire process. You will be the technical architect behind our AI-driven
  GTM motion, building agents that research prospects, workflows that automate customer
  touchpoints, and internal apps that give our sales team superpowers.&nbsp; This
  position is fully remote.&nbsp; Who You Are A "Scrappy" Builder: You don''t need
  a Jira ticket or a 3-month roadmap. You see a problem, you choose the best tool
  (Code vs. No-Code), and you ship a solution today. GTM Fluent: You speak the language
  of revenue. You know what an MQL is, you understand the pain of a messy Salesforce
  instance, and you know exactly why sales reps hate entering data. AI-Native: You’ve
  realized that tools like Claude Code and Replit have given you superpowers. You
  aren''t afraid to write Python or SQL because you know how to leverage AI to get
  80% of the way there instantly. Product &amp; UX Instinct: You know that internal
  tools often fail because they are hard to use. You care about the interface and
  the workflow, ensuring that your solutions are intuitive enough for a busy sales
  rep to adopt without a training manual. High Ownership: You thrive in ambiguity.
  You don''t just build what is asked; you proactively identify bottlenecks in our
  funnel and destroy them with automation. What You’ll Do Systematize the GTM Motion:
  Partner with Sales and Marketing leadership to map out their workflows, identifying
  high-leverage opportunities to replace manual grunt work with automated precision.
  Build "Hybrid" Automations: Design and maintain workflows that seamlessly blend
  low-code tools (Zapier, n8n, Retool) with custom scripts (Python, SQL) where flexibility
  is needed. Develop Internal Tools: Use AI-assisted coding workflows (Replit, Claude
  Code) to rapidly build and deploy internal web apps that solve specific business
  problems (e.g., a custom lead scoring app or a renewal risk dashboard). Orchestrate
  Data: Ensure data flows reliably between our core systems (Salesforce, HubSpot,
  Outreach, Snowflake). You will be the guardian of data integrity. Experiment &amp;
  Iterate: Act as the lab for the GTM org. Test new AI agents, enrichment tools, and
  APIs. If it works, scale it; if it doesn''t, kill it and move on. Requirements Deep
  GTM Experience: 4+ years working in Revenue Operations, Sales Engineering, or Business
  Systems. You must understand the B2B SaaS customer lifecycle. Automation Expertise:
  Proven track record of building complex workflows that handle real business logic.
  You know when to use a webhook and when to build a native integration. Technical
  Versatility: You might not be a "classically trained" software engineer, but you
  are dangerous with code. You are comfortable reading API documentation, writing
  SQL queries, and debugging Python scripts with the help of AI. Communication: You
  can explain technical constraints to a VP of Sales and business value to a Head
  of Engineering. What You’ll Love About Us Define a New Discipline: You will be one
  of the first "AI-Native" GTM Engineers, defining how companies use LLMs to automate
  operations. High Impact: Your work directly affects the company''s bottom line.
  You aren''t optimizing a background process; you are optimizing revenue. The Best
  Tools: We provide full access to the latest AI stack. If there is a tool that makes
  you faster, we want you to have it. High growth startup: plenty of room for you
  to directly impact the company and grow your career! Remote-first: Fully remote
  company, so work from home or wherever! Salary range of USD $159,000-$180,000 base
  plus significant equity (we do not have geo based salaries) For information about
  how we use your personal data, please see our U.S. Job Applicant&nbsp;Privacy Notice
  You are welcome here. Postscript is an ever-evolving place of equal employment for
  talented individuals.'
