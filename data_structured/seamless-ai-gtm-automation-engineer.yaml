description_html: '<p><strong>Scope of Position:</strong></p><p>Seamless is hiring
  a GTM Automation Engineer to fuel pipeline growth through data intelligence and
  scalable automation. This role sits at the intersection of RevOps, engineering,
  and GTM execution, and is responsible for building the systems that deliver the
  right contacts to the right teams at the right time and automate end to end workflows
  for the GTM teams You will analyze contact and account data, build and optimize
  automations (primarily in n8n), and design workflows that combine data from Seamless.AI,
  Salesforce, dialers, Salesloft, and internal databases. You’ll use JavaScript and
  regex to filter, clean, enrich, and transform data with a high emphasis on accuracy,
  automation reliability, and GTM impact. In addition you’ll build custom backend
  processes that connect Salesforce and our database. This position reports directly
  to the VP of Business Operations and works closely with Sales leadership on ICP
  strategy and&nbsp; segmentation.&nbsp;</p><p><strong>Responsibilities:</strong></p><ul><li>Data
  Analysis &amp; Segmentation</li><ul><li>Analyze which contacts, industries, and
  personas drive the most pipeline and revenue.</li><li>Build filters, segments, and
  scoring models to prioritize high-intent contacts.</li><li>Leverage Seamless and
  Salesforce data to track coverage, penetration, and engagement.</li><li>Partner
  with Sales and Marketing to define “who to target next” and why.</li><li>Provide
  weekly reports and dashboards showing new contact adds, team coverage, and opportunity
  impact.</li></ul><li>Own Automation &amp; Integration</li><ul><li>Inherit, improve,
  and build n8n workflows or similar to automate contact sourcing, enrichment, and
  delivery to CRM or marketing tools.</li><li>Integrate AI agents with enterprise
  systems via APIs, databases, and automation tools.</li><li>Experiment rapidly to
  improve AI-driven interactions, response quality, and automation capabilities.</li><li>Write
  custom JavaScript and regex scripts for filtering, deduplication, and data cleaning.</li><li>Integrate
  Seamless data to Salesforce&nbsp;</li></ul><li>Data Quality &amp; Intelligence</li><ul><li>Monitor
  accuracy, completeness, deduplication, and freshness of contact and account data.</li><li>Identify
  and fill coverage gaps across key segments (e.g., ICPs, personas, industries).</li><li>Stay
  current on LLM and copilot capabilities and convert new features into practical,
  highvalue business improvements.&nbsp;</li></ul></ul><p><strong>Skillset:</strong></p><ul><li>You
  automate with purpose – You’ve applied automation and AI frameworks to business
  problems and deployed solutions that meaningfully improved accuracy, efficiency,
  and productivity</li><li>You understand our data backbone – You’re very familiar
  with Salesforce and CRM data structures understanding their capabilities, constraints
  and design patterns and how to integrate or upload data to them.&nbsp;&nbsp;&nbsp;</li><li>Must
  have knowledge and experience with AI agent tools such as N8N and other tools like
  Zapier, Clay, Celigo and APIs, webhooks, and scripting in Python, JavaScript,&nbsp;
  SQL and SOQL</li><li>Proficiency in JavaScript, Nodejs, and regex for data manipulation
  and transformation.</li><li>Experience working with marketing ops or sales ops teams.</li><li>Strong
  data visualization skills (e.g., in Tableau, Google Sheets, or Salesforce Reports).</li><li>Familiarity
  with APIs (Seamless.AI API, Salesforce API, etc)</li><li>Experience with product
  analytics tools (Amplitude, Segment, Tableau).</li><li>Proficiency with modern database
  technologies (PostgreSQL, Vector DBs, OpenSearch, DynamoDB)</li><li>Strong stakeholder
  management skills a must; regular and effective communication with internal users
  and consumers is a critical aspect of this position.&nbsp;</li></ul><p><strong>Education
  &amp; Requirements:</strong></p><ul><li>Bachelor''s degree</li><li>You’re an experienced
  builder – You have 6+ years of experience in analytics engineering, data science,
  or a similar role, with advanced SQL and javascript skills</li></ul><p><strong>About
  Seamless.AI:</strong></p><p><strong>Seamless.AI</strong> has been delivering the
  world''s best sales leads since 2015. Our product is the first real time, B2B search
  engine helping sales teams maximize revenue, increase sales, and easily acquire
  their total addressable market using artificial intelligence.&nbsp;</p><p>Seamless
  delivers the world’s best sales leads. Through our product, we help sales teams
  maximize revenue, increase sales, and easily acquire their total addressable market
  using artificial intelligence; by development of a robust real-time contact and
  company search engine as well as a suite of technically-advanced tools to support
  sales and lead generation. We have been recognized as one of Ohio’s fastest growing
  companies and have been recently ranked No. 7 in LinkedIn''s Top 50 Startups of
  2022, featured in Forbes as #1 Software company in Ohio in 2022, and on G2’s “Top
  100 Highest Satisfaction Products for 2022” list!&nbsp;</p><p>We are an equal opportunity
  employer and value diversity at our company. We do not discriminate on the basis
  of race, religion, color, national origin, gender, sexual orientation, age, marital
  status, veteran status, or disability status. Visa Sponsorship is not included in
  our hiring package. Applicants must be authorized to work in the U.S.</p><p><p>Since
  2015,&nbsp;Seamless.AI&nbsp;has helped sales teams maximize revenue with the world’s
  first real-time B2B search engine. As one of Ohio’s fastest-growing companies, we’ve
  earned top industry accolades, including G2’s 2025 Best Software Products (#1 Highest
  Satisfaction Product), Purpose Jobs’ 2024 Best Places to Work, and LinkedIn’s Top
  50 Tech Startups (2020, 2022, 2023). We are committed to a diverse, inclusive workplace
  and do not discriminate based on race, religion, gender, sexual orientation, age,
  or other protected statuses. Visa sponsorship is not available; applicants must
  be authorized to work in the U.S.</p></p>'
