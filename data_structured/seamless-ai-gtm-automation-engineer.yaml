company_overview: 'Prospecting and relationship-building can be a labor-intensive,
  costly and opaque process undermined by outdated technology, information, and data
  entry. We share that frustration, which is why we have created a tool that allows
  you to Seamlessly connect with your target market, build profitable relationships
  and acquire new clients - all by using the power of AI.We are built on the core
  purpose of creating “great lives for great people,” which extends beyond our great
  employees to our clients, partners, and supporters. This guiding principle informs
  every decision we make, while also attracting a diverse body of intelligent and
  talented people who, in turn, reinforce these values daily to everyone we engage
  with.Mission: To help every professional globally create new relationships and opportunities,
  faster than ever before using the power of artificial intelligence. We want to help
  the world connect to opportunity and positively impact billions!'
