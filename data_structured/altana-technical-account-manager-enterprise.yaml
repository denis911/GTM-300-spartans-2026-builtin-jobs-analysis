company_overview: Altana is the world's product network, empowering a new era of global
  commerce by uniting businesses and governments on a trusted, AI-powered platform
  to build a safer, more resilient supply chain. The United States and allied governments
  use Altana’s product network to enforce tariffs and manage their borders. Five of
  the world’s 10 largest logistics providers use Altana to efficiently manage cross-border
  trade, and 140 million buyer-supplier connections are managed on the network.
