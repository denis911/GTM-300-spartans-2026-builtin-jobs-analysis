description_html: '<p><p>Altana is the network for trusted trade. Our AI-powered product
  network empowers governments and businesses to build a more resilient and secure
  global economy while keeping trade flowing.</p></p><p><strong>The Opportunity at
  Altana</strong></p><p>We''re looking for a dedicated Technical Account Manager (TAM)
  who will have the exciting opportunity to collaborate closely with our Enterprise
  customers, guiding them in effectively and efficiently operating Altana''s Atlas
  platform. As a TAM, you''ll be the driving force behind user adoption, product enablement,
  and value realization, ensuring overall customer success. You''ll be our customers''
  champion, serving as their day-to-day relationship manager, conducting regular check-ins,
  and leading Quarterly Business Reviews (QBRs). Additionally, you''ll be instrumental
  in developing pipelines for product usage, up-selling, and cross-selling expansions.</p><p><strong>You
  Will</strong></p><ul><li>Drive the onboarding and adoption process for new users,
  making sure they harness the full potential of Altana''s offerings.</li><li>Assist
  customers with in-depth analysis to optimize their experience and results.</li><li>Act
  as the first point of contact for support requests, quickly engaging the right resources
  to resolve issues.</li><li>Own customer calls and Quarterly Business Reviews, leveraging
  data-driven insights to astonish our clients while promptly relaying valuable feedback
  to the appropriate teams.</li><li>Collaborate with Account Executives to identify
  and capitalize on expansion opportunities, transforming them into reality.</li><li>Be
  held accountable for effectively synthesizing and communicating feedback to the
  product team.</li><li>Collaborate with our implementation engineering team to ensure
  successful delivery and work closely with our sales engineering team to identify
  and prioritize growth opportunities.</li></ul><p><strong>About You</strong></p><ul><li>5+
  years of account management experience, ideally working with a complex data platform</li><li>You
  can demonstrate a history of successfully expanding accounts year over year.</li><li>You
  have a strong understanding of SaaS financial metrics, allowing you to make data-informed
  decisions.</li><li>You''re open to feedback and thrive on cross-functional collaboration
  to drive continuous improvements.</li><li>You are willing to learn the fundamental
  concepts of data fusion and machine learning and can effectively communicate our
  product''s value to both technical and commercial audiences.</li><li>Your ability
  to establish positive relationships and influence others is a key asset, complemented
  by excellent communication and interpersonal skills, balancing approachability with
  persistence.</li><li>You exhibit good judgment and a willingness to dive into the
  nitty-gritty to achieve team objectives.</li><li>Experience in the supply chain
  and logistics industry is a plus, although not required.&nbsp;</li></ul><p>This
  role is based in Brooklyn, NY, USA with hybrid work flexibility and candidates must
  be within commuting distance from our Williamsburg office.</p><p><strong>US Salary
  Range and Benefits</strong></p><p>$150,000 - $170,000 USD</p><p>The salary range,
  to the extent specified for this role, is a good faith statement of the minimum
  and maximum levels of the annual based salary for the position.&nbsp; The base salary
  offered to a successful candidate will depend on a wide range of compensation factors,
  including, but not limited to, work experience, education and/or training, critical
  skills, and/or business considerations. Competitive equity grants are included in
  the majority of full time offers; and are considered part of Altana''s total compensation
  package. Altana also offers either a discretionary bonus or a variable compensation
  plan depending on the role. Additionally, Altana offers top-tier benefits for full-time
  employees, including:</p><ul><li>Flexible Time Off: Altana operates with a Flexible
  Time Oﬀ (FTO) policy that gives you agency over your own time oﬀ so you can maximize
  your work-life balance.</li><li>Parental Leave: We oﬀer industry leading Paid Parental
  Leave (PPL), providing 14 weeks of leave for non-birthing, adoptive, and foster
  parents and up to 26 weeks of leave for birthing parents, all paid at 100% of your
  base salary.</li><li>Health Benefits: We have a full suite of medical, vision, and
  dental benefits with generous employer contributions, designed to give you flexibility
  and choice for your individual health situation. Our high deductible health plan
  is 100% employer paid for employees and supplemented with an employer contribution
  to your Health Savings Account (HSA). There is also a Flexible Spending Account
  (FSA) option.</li><li>Supplemental Benefits: Altana provides life, short- and long-term
  disability, and AD&amp;D insurance coverage, all at no cost to you, so you know
  that you and your loved ones are covered in case of an emergency.</li><li>401(k)
  Savings: Save for and invest in your future using our Fidelity 401(k) retirement
  savings program.</li><li>Commuter Benefits: Save money on your commute by setting
  aside pre-tax funds for public transit or parking!</li><li>Wellness: Because we
  value mental and emotional health, every Altana employee has access to a free premium
  subscription to Calm, the #1 app for meditation, sleep, and mindfulness.</li><li>Pet
  Insurance: Pets are family too! Keep them healthy with Wishbone insurance and /
  or our Total Pet vet service and telehealth discount plan.</li><li>Employee Assistance
  Program: Free access to confidential personal support.</li><li>Dependent Care FSA:
  You will have access to a Dependent Care FSA, which allows you to set aside pre-tax
  funds for childcare expenses</li></ul><p>The recruiter assigned to this role can
  share more information about the specific compensation and benefit details associated
  with this role during the hiring process.</p><p><b><strong>Our Values</strong></b><p>Our
  values are the core beliefs that shape who we are, what we stand for, and how we
  behave.They form the foundation of Altana’s culture and integrity and guide how
  we hire, design, build, and connect with each other and our customers.</p><ul><li><strong>Trust:</strong>
  Our customers and partners entrust us with missions of the highest importance. We
  honor that by keeping our word, meeting commitments, and ensuring every action we
  take reinforces confidence in us. We rely on each other to deliver, to speak openly,
  and to hold ourselves accountable.</li><li><strong>Resilience: </strong>In a world
  of uncertainty and complexity, our work must withstand challenges, evolve with conditions,
  and ensure reliability over time. Resilience is both how we operate and what we
  deliver. It’s how we respond when things don’t go to plan –– we adapt, we support
  each other, and we keep moving forward.</li><li><strong>Stewardship:</strong> We
  are stewards of every mission we touch. Because our work impacts lives and futures,
  we hold ourselves accountable to delivering mission impact and never compromising.
  Our responsibility extends beyond individual projects to the broader system of global
  trade. We believe that stewardship starts from within so that we can bring focus,
  creativity, and excellence to our work. Each of us is personally responsible for
  fostering a workplace where people can thrive. And we are stewards of the greater
  good of the company. By holding ourselves and each other accountable, we build a
  culture of innovation and collective success that reflects the scale of our mission.</li><li><strong>Courage:
  </strong>Courage is what unlocks the seemingly impossible for our customers. It’s
  the core value that drives us make bold moves and take on big, complicated network
  problems—the ones others avoid. We know success isn''t guaranteed, but we have the
  audacious vision to believe a solution is possible and to build it. Courage fuels
  our growth mindset. It means embracing challenges that make us stronger, and it’s
  demonstrated by how we approach hard conversations and complex projects.</li></ul><p>At
  Altana, we believe that a diverse workforce enables greater creativity, performance,
  and adaptability. We’re proud to be an equal opportunity employer and welcome you
  to join us as you are. Our employment opportunities and decisions are based on business
  needs and individual qualifications, without regard to race, color, religious creed,
  national origin, ancestry, age, physical or mental disability, medical condition,
  marital status, sexual orientation, gender identity or expression, genetic information,
  family care or medical leave status, military or veteran status, or any other characteristic
  protected by the laws or regulations in the areas in which we operate. We prohibit
  discrimination and harassment of any type, in any situation.</p><p><em>Offers related
  to employment at Altana will come from an Altana.ai email address. We will never
  ask for payment as part of the interview or onboarding process.&nbsp;</em></p></p>'
