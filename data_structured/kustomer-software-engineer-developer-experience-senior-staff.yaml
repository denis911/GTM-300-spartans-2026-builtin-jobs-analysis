description_html: '<p><strong>About Kustomer</strong></p><p>Kustomer is the industry
  leading conversational CRM platform perfecting every customer experience.  Built
  with intelligent tools such as AI and Automation, no code-configuration and a connected
  data platform that unifies data from multiple sources through a single timeline,
  Kustomer empowers businesses to operate with greater efficiency and deliver more
  personalized service to customers across any channel, making every interaction more
  meaningful and memorable. Today, Kustomer is the core platform for some of the leading
  customer service brands like Sweetgreen, Starz, Vuori, Resy and Cotopaxi.</p><p></p><p>Kustomer
  was founded in 2015 by serial entrepreneurs Brad Birnbaum and Jeremy Suriel and
  has raised over $230M in funding backed by leading VCs. Meta announced its intention
  to acquire Kustomer in 2020 and completed the transaction in 2022. Kustomer joined
  Meta’s Business Messaging Group to transform the way people and businesses communicate
  through modern messaging channels.</p><p></p><p>In 2023, Kustomer spun out from
  Meta as a standalone company backed by original partners, Battery, Redpoint and
  Boldstart Ventures, who have invested $60M. In 2025, Kustomer announced a $30M Series
  B led by Norwest, with continued support from Battery, Redpoint, and boldstart.
  This milestone reflects strong conviction in our vision and fuels our next chapter
  of growth: expanding our AI-native platform, accelerating product innovation, and
  scaling our exceptional team.</p><p></p><p>Our Krew is made up of passionate and
  collaborative people who really care about what they do and the people they help.
  We look for people who are passionate about enhancing the customer service experience
  for everyone involved, as it''s the core of what we do. We''re growing our business
  with no plans of slowing down. We actively seek individuals who want to learn and
  be challenged every day. We have also transitioned to a remote friendly company,
  with Krew members located throughout the U.S. and U.K. coming together for Kamp
  Kustomer each year.</p><p></p><p><strong>About the Role</strong></p><p>Kustomer
  is hiring an impactful Developer Experience Engineer to join our Foundation team<strong>.
  </strong>In this role, you will improve developer experience across the engineering
  organization by identifying friction points, modernizing tools, and enabling engineers
  to work faster and more effectively. This is a founding engineer role; the first
  of its kind at Kustomer. There’s no playbook yet; you’ll build this function from
  the ground up. You will build and evolve systems, workflows, and AI-powered tooling
  that engineers rely on day-to-day, focusing on impact rather than isolated internal
  tools. In this role, you will accelerate product delivery, formalizing backlog improvements,
  and helping Kustomer engineers 10x their efficiency.  <br>AI is a core part of how
  we build. You''ll use AI tools daily to move faster and raise the bar on what you
  ship. You''ll also help build AI-powered product capabilities that meaningfully
  improve the customer experience.</p><p></p><p>We''re looking for engineers with
  strong technical judgment, a high bar for craft, and real curiosity about how systems,
  product, and AI intersect. You take initiative, thrive in ambiguous problem spaces,
  and own your work end to end, from design through production. Not because someone''s
  tracking it, but because you genuinely care about what you''re building. If you
  want your work to directly shape the product and the team around you, we''d love
  to hear from you.<br><strong>You''ll be responsible for:</strong></p><ul><li><p>Design,
  build, and deploy AI agents and automation that accelerate every phase of the SDLC,
  from code generation and review through testing, deployment, and monitoring, making
  AI and agentic participants a core part of how software gets built at Kustomer.</p></li><li><p>Stay
  at the forefront of AI and automation tooling, rapidly evaluating and incorporating
  forward thinking solutions to continuously push quality, efficiency, reliability,
  and development velocity.</p></li><li><p>Partner with engineers across teams to
  identify friction, design solutions, and iterate quickly, championing best practices
  that drive real adoption of AI-powered tools across the engineering organization.</p></li></ul><p></p><p><strong>Your
  qualifications:</strong></p><ul><li><p>Proven experience in a developer experience,
  developer tooling or platform engineering role</p></li><li><p>Experience evaluating,
  implementing and advocating for AI developer tools to solve complex engineering
  problems</p></li><li><p>5+ years of full-stack programming background with the ability
  to design systems end-to-end with high-level programming languages like Go, Python,
  JavaScript, etc.</p></li><li><p>Ability to see the big picture across engineering
  and product to identify systemic inefficiencies</p></li><li><p>Experience with containers
  and deployment with ECS and Terraform is a big plus</p></li><li><p>Degree in Computer
  Science or a related disciplines</p></li></ul><p><strong>HIPAA Compliance</strong></p><p><em>All
  roles at Kustomer may involve handling sensitive personal data.</em></p><p></p><p><strong>Benefits</strong></p><p>Kustomer&nbsp;offers&nbsp;an&nbsp;array&nbsp;of&nbsp;benefits&nbsp;including&nbsp;competitive&nbsp;salaries
  and stock&nbsp;options. In the U.S. we offer 100% healthcare coverage, 401K, WiFi
  and Mobile reimbursement, and a generous vacation policy; in the UK we also offer
  pension, supplemental health insurance and other perks.</p><p></p><p><strong>Diversity
  &amp; Inclusion at Kustomer</strong></p><p>Kustomer is committed to bringing together
  individuals from different backgrounds and perspectives.</p><p>We strive to create
  an inclusive environment where everyone can thrive, feel a sense of belonging, and
  do great work together.We are proud to be an equal opportunity employer open to
  all qualified applicants regardless of race, color, ancestry, religion, sex, national
  origin, sexual orientation, age, citizenship, marital status, disability, gender
  identity or expression, Veteran status, or any other legally protected status.</p><p></p><p><em><strong>Disclaimer:</strong></em>
  Kustomer only contacts candidates from company email addresses ending in kustomer.com
  and does not seek funds from candidates in any circumstances.</p><p></p>'
description_text: 'About Kustomer Kustomer is the industry leading conversational
  CRM platform perfecting every customer experience. Built with intelligent tools
  such as AI and Automation, no code-configuration and a connected data platform that
  unifies data from multiple sources through a single timeline, Kustomer empowers
  businesses to operate with greater efficiency and deliver more personalized service
  to customers across any channel, making every interaction more meaningful and memorable.
  Today, Kustomer is the core platform for some of the leading customer service brands
  like Sweetgreen, Starz, Vuori, Resy and Cotopaxi. Kustomer was founded in 2015 by
  serial entrepreneurs Brad Birnbaum and Jeremy Suriel and has raised over $230M in
  funding backed by leading VCs. Meta announced its intention to acquire Kustomer
  in 2020 and completed the transaction in 2022. Kustomer joined Meta’s Business Messaging
  Group to transform the way people and businesses communicate through modern messaging
  channels. In 2023, Kustomer spun out from Meta as a standalone company backed by
  original partners, Battery, Redpoint and Boldstart Ventures, who have invested $60M.
  In 2025, Kustomer announced a $30M Series B led by Norwest, with continued support
  from Battery, Redpoint, and boldstart. This milestone reflects strong conviction
  in our vision and fuels our next chapter of growth: expanding our AI-native platform,
  accelerating product innovation, and scaling our exceptional team. Our Krew is made
  up of passionate and collaborative people who really care about what they do and
  the people they help. We look for people who are passionate about enhancing the
  customer service experience for everyone involved, as it''s the core of what we
  do. We''re growing our business with no plans of slowing down. We actively seek
  individuals who want to learn and be challenged every day. We have also transitioned
  to a remote friendly company, with Krew members located throughout the U.S. and
  U.K. coming together for Kamp Kustomer each year. About the Role Kustomer is hiring
  an impactful Developer Experience Engineer to join our Foundation team . In this
  role, you will improve developer experience across the engineering organization
  by identifying friction points, modernizing tools, and enabling engineers to work
  faster and more effectively. This is a founding engineer role; the first of its
  kind at Kustomer. There’s no playbook yet; you’ll build this function from the ground
  up. You will build and evolve systems, workflows, and AI-powered tooling that engineers
  rely on day-to-day, focusing on impact rather than isolated internal tools. In this
  role, you will accelerate product delivery, formalizing backlog improvements, and
  helping Kustomer engineers 10x their efficiency. AI is a core part of how we build.
  You''ll use AI tools daily to move faster and raise the bar on what you ship. You''ll
  also help build AI-powered product capabilities that meaningfully improve the customer
  experience. We''re looking for engineers with strong technical judgment, a high
  bar for craft, and real curiosity about how systems, product, and AI intersect.
  You take initiative, thrive in ambiguous problem spaces, and own your work end to
  end, from design through production. Not because someone''s tracking it, but because
  you genuinely care about what you''re building. If you want your work to directly
  shape the product and the team around you, we''d love to hear from you. You''ll
  be responsible for: Design, build, and deploy AI agents and automation that accelerate
  every phase of the SDLC, from code generation and review through testing, deployment,
  and monitoring, making AI and agentic participants a core part of how software gets
  built at Kustomer. Stay at the forefront of AI and automation tooling, rapidly evaluating
  and incorporating forward thinking solutions to continuously push quality, efficiency,
  reliability, and development velocity. Partner with engineers across teams to identify
  friction, design solutions, and iterate quickly, championing best practices that
  drive real adoption of AI-powered tools across the engineering organization. Your
  qualifications: Proven experience in a developer experience, developer tooling or
  platform engineering role Experience evaluating, implementing and advocating for
  AI developer tools to solve complex engineering problems 5+ years of full-stack
  programming background with the ability to design systems end-to-end with high-level
  programming languages like Go, Python, JavaScript, etc. Ability to see the big picture
  across engineering and product to identify systemic inefficiencies Experience with
  containers and deployment with ECS and Terraform is a big plus Degree in Computer
  Science or a related disciplines HIPAA Compliance All roles at Kustomer may involve
  handling sensitive personal data. Benefits Kustomer&nbsp;offers&nbsp;an&nbsp;array&nbsp;of&nbsp;benefits&nbsp;including&nbsp;competitive&nbsp;salaries
  and stock&nbsp;options. In the U.S. we offer 100% healthcare coverage, 401K, WiFi
  and Mobile reimbursement, and a generous vacation policy; in the UK we also offer
  pension, supplemental health insurance and other perks. Diversity &amp; Inclusion
  at Kustomer Kustomer is committed to bringing together individuals from different
  backgrounds and perspectives. We strive to create an inclusive environment where
  everyone can thrive, feel a sense of belonging, and do great work together.We are
  proud to be an equal opportunity employer open to all qualified applicants regardless
  of race, color, ancestry, religion, sex, national origin, sexual orientation, age,
  citizenship, marital status, disability, gender identity or expression, Veteran
  status, or any other legally protected status. Disclaimer: Kustomer only contacts
  candidates from company email addresses ending in kustomer.com and does not seek
  funds from candidates in any circumstances.'
