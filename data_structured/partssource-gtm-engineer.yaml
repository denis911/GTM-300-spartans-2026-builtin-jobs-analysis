description_html: '<p><p>PartsSource is the<strong> leading technology and software
  platform for managing mission-critical healthcare equipment</strong>. Trusted by
  over 5,000 US hospitals and 15,000 clinical sites, PartsSource empowers providers
  and service organizations to maximize clinical availability for patient care and
  automates the procurement of parts, services and training through a unique digital
  experience.</p><p>PartsSource team members are deeply committed to our mission of
  <strong>Ensuring Healthcare is Always On®</strong>, which is foundational to our
  success and growth. Our vibrant culture is built upon aligned values, shared ownership,
  mutual respect, and a passion for collaborating to solve complex customer problems.</p></p><b>About
  the Job Opportunity</b><p>The <strong>Go-to-Market (GTM) Engineer</strong> plays
  a critical role in architecting, optimizing, and scaling PartsSource’s commercial
  technology ecosystem across Marketing, Sales, and Customer Success. This role blends
  systems thinking, hands-on execution, and business acumen to ensure GTM tools, data,
  automation, and AI work together to drive measurable revenue impact. You will own
  the reliability, governance, and performance of the GTM stack while partnering cross-functionally
  to improve efficiency, insight, and growth outcomes.</p><b>What You’ll Do</b><b>GTM
  Technology Architecture &amp; Optimization</b><ul><li><p>Own end-to-end GTM stack
  design across CRM, marketing automation, analytics, and CS systems</p></li><li><p>Evaluate
  tools for adoption, ROI, cost efficiency, and risk reduction</p></li><li><p>Identify
  redundancies, gaps, and technical debt; lead consolidation or replacement initiatives</p></li><li><p>Establish
  documentation, standards, and scalable system architectures</p></li></ul><b>Data,
  Signal &amp; Intent Orchestration</b><ul><li><p>Design and implement enrichment
  and signal workflows across firmographic, technographic, and intent data</p></li><li><p>Build
  CRM-ready objects and actionable segments using orchestration tools (e.g., Clay
  or similar)</p></li><li><p>Define data quality standards, governance models, and
  ROI measurement frameworks</p></li><li><p>Ensure signal-driven workflows improve
  funnel conversion without adding noise</p></li></ul><b>AI-Enabled Commercial Operations</b><ul><li><p>Identify
  and deploy AI use cases across attribution, lead scoring, forecasting, and next-best-action
  workflows</p></li><li><p>Implement LLM-powered automation and agentic workflows
  to improve GTM productivity</p></li><li><p>Establish AI governance guardrails related
  to data access, privacy, and compliance</p></li><li><p>Measure adoption and business
  impact of AI-enabled capabilities</p></li></ul><b>Delivery, Enablement &amp; Measurement</b><ul><li><p>Lead
  GTM initiatives from requirements through rollout, training, and adoption measurement</p></li><li><p>Partner
  with IT, Security, and Data teams to ensure scalability and compliance</p></li><li><p>Build
  dashboards and reporting for funnel performance, lifecycle metrics, and tool effectiveness</p></li><li><p>Enable
  GTM teams with reliable systems, clean data, and actionable insights</p></li></ul><b>What
  You’ll Bring</b><p><strong>Your Background</strong></p><ul><li><p>4+ years in GTM
  systems, revenue operations, sales/marketing operations, or business systems roles</p></li><li><p>Hands-on
  experience integrating CRM, marketing automation, analytics, and CS platforms</p></li><li><p>Experience
  with enrichment, orchestration, and intent tooling (e.g., Clay, ZoomInfo, 6sense,
  Demandbase, Bombora)</p></li><li><p>Experience designing LLM orchestration, automation
  workflows, and AI-enabled use cases</p></li><li><p>Strong understanding of data
  flows, APIs/iPaaS, attribution models, and funnel metrics</p></li><li><p>Healthcare,
  B2B SaaS, or PE-backed growth environment experience preferred</p></li></ul><b>Who
  We Want to Meet</b><ul><li><p><strong>Act Like an Owner – <em>Accountability &amp;
  Execution</em></strong>: You take ownership of GTM systems and deliver reliable,
  scalable outcomes.</p></li><li><p><strong>Serve with Purpose – <em>Business Impact</em></strong>:
  You connect GTM infrastructure decisions to measurable revenue and efficiency gains.</p></li><li><p><strong>Adapt
  to Thrive – <em>Managing Ambiguity</em></strong>: You stay effective while priorities,
  tools, and requirements evolve.</p></li><li><p><strong>Collaborate to Win – <em>Influence
  &amp; Communication</em></strong>: You align Sales, Marketing, CS, IT, and Data
  partners around shared outcomes.</p></li><li><p><strong>Challenge the Status Quo
  – <em>Data-Informed Decision Making</em></strong>: You use data and experimentation
  to improve how GTM operates.</p></li></ul><p><p><strong><span>Benefits &amp; Perks</span></strong><span> </span><span>&nbsp;</span></p><ul><li><span>Competitive
  compensation package with&nbsp;salary, incentives,&nbsp;company ownership/equity,
  and comprehensive benefits (401k match, health, college debt reduction,&nbsp;and&nbsp;more!)</span><span>&nbsp;</span></li></ul><ul><li><span>Career&nbsp;and
  professional development&nbsp;through training,&nbsp;coaching&nbsp;and new&nbsp;experiences.</span><span>&nbsp;</span></li></ul><ul><li><span>Hybrid
  culture with new &amp; beautiful&nbsp;workspaces&nbsp;that balance flexibility,
  collaboration, and productivity.</span><span>&nbsp;</span></li></ul><ul><li><span>Inclusive
  and diverse community of passionate professionals&nbsp;learning and growing together.</span><span>&nbsp;</span></li></ul><p><span> </span><span>&nbsp;</span></p><p><strong><span>Interested?</span></strong><span> </span><span>&nbsp;</span></p><p><span>We’d&nbsp;love
  to hear from you!&nbsp;&nbsp;Submit your resume and an optional cover letter explaining
  why&nbsp;you’d&nbsp;be a great fit.</span><span>&nbsp;</span></p><p><strong>About
  PartsSource</strong></p><p>Since 2001, PartsSource has evolved into the leading
  technology and software platform for managing mission-critical equipment, serving
  over half of the U.S. hospital infrastructure. Our digital systems modernize and
  automate the procurement of parts, services, technical support, and training for
  HTM professionals to efficiently and effectively maintain their mission-critical
  equipment. PartsSource employs over 700 employees nationwide that committed to supporting
  healthcare providers and ensuring healthcare always on.</p><p>In 2021, Bain Capital
  invested in the business, further accelerating our growth and positive impact within
  the healthcare industry.</p><p><strong>Read more about us here:</strong></p><p>·
  PartsSource Named to Newsweek’s List of the Top 200 America’s Most Loved Workplaces
  for 2024 </p><p>· PartsSource® Named Among the Top 50 Healthcare Technology Companies
  of 2025 </p><p>· PartsSource® Named Among the Top 25 Healthcare Software Companies
  of 2025 </p><p>· PartsSource President and CEO Philip Settimi Named to Top 50 Healthcare
  Technology CEO List 2025 </p><p>· WSJ: Bain Capital Private Equity Scoops Up PartsSource</p><br><p><strong>EEO</strong></p><p>PartsSource,
  Inc., and its affiliates and subsidiaries, provides equal employment opportunities
  to all employees and applicants for employment and prohibits discrimination and
  harassment of any type without regard to race, color, religion, age, sex, national
  origin, disability status, genetics, protected veteran status, sexual orientation,
  gender identity or expression, or any other characteristic protected by federal,
  state or local laws.</p><p>&nbsp;</p><p>This policy applies to all terms and conditions
  of employment, including recruiting, hiring, placement, promotion, termination,
  layoff, recall, transfer, leaves of absence, compensation and training.</p><br><p>Legal
  authorization to work in the U.S. is required.</p><br></p>'
