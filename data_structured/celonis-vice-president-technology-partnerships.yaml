description_html: '<p><p>We''re Celonis, the global leader in Process Intelligence
  technology and one of the world''s fastest-growing SaaS firms. We believe there
  is a massive opportunity to unlock productivity by placing AI, data and intelligence
  at the core of business processes - and for that, we need your help. Care to join
  us?</p></p><p><strong>The role</strong></p><p>As the VP of Tech Partnerships, you
  will lead the strategic expansion of our technology ecosystem from our Silicon Valley
  hub. This role focuses on a dual objective: establishing Celonis as a deeply integrated
  platform within the modern data stack while building high-impact distribution channels
  through Tier-1 technology partners. You will lead two critical pillars: Data Partnerships,
  integrating Celonis into the enterprise IT and data stack, and GTM &amp; OEM Partnerships
  to collaborate with Systems of Record Partners for mutual growth and customer value.</p><br><p><strong>The
  work you’ll do</strong></p><p><strong> Data Partnerships - </strong>Building strategic
  technical alliances to ensure seamless data access and high-fidelity connectivity.</p><ul><li>System
  of Record Partners: Collaborate with Tier-1 System of Record (SoR) vendors to evolve
  their API strategies for high-fidelity process mining. Focus on establishing the
  technical foundation required for successful GTM collaboration.</li><li>iPaaS &amp;
  Ecosystem Integration: Define the global strategy for Connectivity Specialists.
  Work to ensure the integration layers of the enterprise are optimized to funnel
  high-quality data into Celonis</li><li>Data Infrastructure Leadership: Build strong
  alliances with Lakehouse and Warehouse leaders. Drive initiatives that position
  Celonis as a key intelligence layer for enterprise AI.</li></ul><p><strong> GTM
  &amp; OEM Partnerships </strong>- Establish new scalable distribution channels.</p><ul><li>OEM
  &amp; Embedded Strategy: Identify and secure strategic software vendors to develop
  new, high-scale distribution channels.</li><li>Commercial GTM Programs: Develop
  effective co-selling and commercial programs that drive mutual value.</li><li>&nbsp;Strategic
  Deal Management: Lead the end-to-end negotiation and commercial structuring of complex
  distribution agreements, ensuring technical synergies result in measurable ACV and
  logo growth.</li></ul><p><strong>The qualifications you’ll need</strong></p><ul><li>15+
  years of experience spanning Technology Alliances, Strategic Sales, and Business
  Development. You have a proven track record in establishing and scaling new distribution
  channels and have experience in building out technology partner programs.</li><li>Cross-Functional
  Leadership: Track record of influencing Product and Engineering roadmaps. You can
  bridge the gap between technical architecture and commercial objectives.</li><li>Commercial
  Deal Experience: Success in closing complex OEM and distribution agreements with
  global technology leaders.</li><li>Silicon Valley Presence: A leader in the West
  Coast tech community with a strong network across the ERP, Hyperscaler, and Data
  Infrastructure landscape.</li></ul><br><p>Visa sponsorship is not offered for this
  role.</p><p><p><p><span>The base salary range below is for the role in the specified
  location, based on a Full Time Schedule. <br>Total compensation package will include
  base salary + bonus/commission + equity + benefits (health, dental, life, 401k,
  and paid time off). Please note that the base salary range is a guideline, and that
  the actual total compensation offer will be determined based on various factors,
  including, but not limited to, applicant''s qualifications, skills, experiences,
  and location.</span></p><p>The base salary range below is for the role in California,
  based on a Full Time Schedule.  </p><p><span>$250,000</span><span>—</span><span>$300,000
  USD</span></p></p></p><p><p><strong>What Celonis Can Offer You:</strong></p><ul><li><strong>Pioneer
  Innovation:</strong>&nbsp;Work with the leading, award-winning process mining technology,
  shaping the future of business.</li><li><strong>Accelerate Your Growth:</strong>&nbsp;Benefit
  from clear career paths, internal mobility, a dedicated learning program, and mentorship
  opportunities.</li><li><strong>Receive Exceptional Benefits:</strong>&nbsp;Including
  generous PTO, hybrid working options, company equity (RSUs), comprehensive benefits,
  extensive parental leave, dedicated volunteer days, and&nbsp;much more. Interns
  and working students explore your benefits here.</li><li><strong>Prioritize Your
  Well-being:</strong>&nbsp;Access to resources such as gym subsidies, counseling,
  and well-being programs.</li><li><strong>Connect and Belong:</strong>&nbsp;Find
  community and support through dedicated inclusion and belonging programs.</li><li><strong>Make
  Meaningful Impact:</strong>&nbsp;Be part of a company driven by strong&nbsp;values&nbsp;that
  guide everything we do: Live for Customer Value, The Best Team Wins, We Own It,
  and Earth Is Our Future.</li><li><strong>Collaborate Globally:</strong>&nbsp;Join
  a dynamic, international team of talented individuals.</li><li><strong>Empowered
  Environment:</strong>&nbsp;Contribute your ideas in an open culture with autonomous
  teams.</li></ul><p><strong>About Us:</strong></p><p>Celonis makes processes work
  for people, companies and the planet. The Celonis Process Intelligence Platform
  uses industry-leading process mining and AI technology and augments it with business
  context to give customers a living digital twin of their business operation. It’s
  system-agnostic and without bias, and provides everyone with a common language for
  understanding and improving businesses. Celonis enables its customers to continuously
  realize significant value across the top, bottom, and green line. Celonis is headquartered
  in Munich, Germany, and New York City, USA, with more than 20 offices worldwide.</p><p>Get
  familiar with the Celonis Process Intelligence Platform by watching this video.<strong><br></strong></p><p><strong>Celonis
  Inclusion Statement:</strong></p><p>At Celonis, we believe our people make us who
  we are and that “The Best Team Wins”. We know that the best teams are made up of
  people who bring different perspectives to the table. And when everyone feels included,
  able to speak up and knows their voice is heard - that''s when creativity and innovation
  happen.<strong><br></strong></p><p><strong>Your Privacy:</strong></p><p>Any information
  you submit to Celonis as part of your application will be processed in accordance
  with Celonis’ Accessibility and Candidate Notices</p><p>By submitting this application,
  you confirm that you agree to the storing and processing of your personal data by
  Celonis as described in our Privacy Notice for the Application and Hiring Process.</p><p>Please
  be aware of common job offer scams, impersonators and frauds. Learn more here.</p></p>'
