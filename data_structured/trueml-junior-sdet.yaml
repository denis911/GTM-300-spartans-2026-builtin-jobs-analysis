description_html: '<p><i><b>Why TrueML?</b></i></p><p>&nbsp;</p><p><span>TrueML is
  a mission-driven financial software company that aims to create better customer
  experiences for distressed borrowers. Consumers today want personal, digital-first
  experiences that align with their lifestyles, especially when it comes to managing
  finances. TrueML’s approach uses machine learning to engage each customer digitally
  and adjust strategies in real time in response to their interactions.</span></p><p><span>&nbsp;</span></p><p><span>The
  TrueML team includes inspired data scientists, financial services industry experts
  and customer experience fanatics building technology to serve people in a way that
  recognizes their unique needs and preferences as human beings and endeavoring toward
  ensuring nobody gets locked out of the financial system.</span></p><p><br></p><p><span>We
  are looking for an aspiring Quality Engineer to join our team and help us ensure
  our software is world-class. </span></p><p><span>This is a foundational role designed
  for someone eager to master the Software Development Lifecycle (SDLC) while working
  at the intersection of quality and innovation. Your goal is to ensure a seamless
  user experience by identifying defects early and leveraging GenAI tools to accelerate
  our testing capabilities. </span></p><p><span>You won’t just be "checking boxes"—you’ll
  be learning to build a culture of quality.</span></p><p><b>Work-Life Benefits</b></p><ul><li>Unlimited
  PTO</li><li>Medical benefit contributions in congruence with local laws and type
  of employment agreement</li></ul><p></p><p><b>What You''ll Do:</b></p><ul><li>Ensure
  Product Excellence: Execute functional, regression, and integration tests across
  our Web and API layers to ensure every release meets our high standards.</li><li>Bridge
  the Gap Between Bugs and Fixes: Act as a "detective" by identifying, documenting,
  and tracking defects in Jira, providing developers with the clear logs and reproduction
  steps they need to succeed.</li><li>Accelerate with AI: Work alongside senior mentors
  to use AI-powered tools (like GitHub Copilot and Gemini) to generate test cases
  and write your first automated test scripts.</li><li>Own the Data: Contribute to
  the creation and maintenance of essential test data, ensuring our testing environments
  reflect real-world scenarios.</li><li>Collaborate in an Agile World: Embed yourself
  in the Scrum process, participating in sprint ceremonies and translating user stories
  into actionable test plans.</li><li>Grow Your Technical Toolkit: Move from manual
  execution toward automated scripting, following established standards to build scalable
  testing suites.</li></ul><p></p><p><b>Required Qualifications:</b></p><ul><li>Associate’s
  degree in Computer Science, Engineering, Information Systems, or a related field
  <b>or equivalent practical experience</b>.</li><li>1–2 years of relevant experience
  in software testing, quality assurance, or a related technical role (including internships,
  co-ops, or academic projects).</li><li>Basic understanding of software development
  lifecycles and testing methodologies (e.g., functional, regression, integration
  testing).</li><li>Familiarity with basic testing concepts and terminology (e.g.,
  test cases, test data, defects, severity/priority).</li><li>Basic proficiency with
  operating systems and common software applications.</li><li>Exposure to bug tracking
  systems (e.g., Jira).</li><li>Strong verbal and written communication skills, with
  the ability to clearly describe issues and test results.</li><li>Demonstrated ability
  to follow instructions, learn new tools and processes, and complete assigned tasks
  with supervision.</li><li>Interest in and willingness to use GenAI tools (e.g.,
  GitHub Copilot, Gemini, AI test generators) to assist with scripting, test design,
  and information discovery.</li></ul><p></p><p><b>Preferred Qualifications:</b></p><ul><li>Academic
  or practical exposure to scripting/programming languages (e.g., Python, JavaScript,
  TypeScript, Java) for basic test scripting or automation.</li><li>Familiarity with
  Agile methodologies (e.g., Scrum or Kanban) and working with user stories.</li><li>Experience
  with any test management tools (e.g., Xray, TestRail) is a plus.</li><li>Experience
  using AI-powered tools in an academic, personal, or professional context (e.g.,
  for code completion, documentation search, or generating test ideas).</li><li>Internship,
  co-op, or project experience involving software testing, QA, or development.</li></ul><p></p><p></p><p><span>We
  are a dynamic group of people who are subject matter experts with a passion for
  change. Our teams are crafting solutions to big problems every day. If you’re looking
  for an opportunity to do impactful work, join TrueML and make a difference.</span></p><p><br></p><p><i><b>Our
  Dedication to Diversity &amp; Inclusion</b></i></p><p>&nbsp;</p><p><span>TrueML
  is an equal-opportunity employer. We promote, value, and thrive with a diverse &amp;
  inclusive team. Different perspectives contribute to better solutions, and this
  makes us stronger every day. We do not discriminate on the basis of race, religion,
  color, national origin, gender, sexual orientation, age, marital status, veteran
  status, or disability status.</span></p><p></p>'
description_text: 'Why TrueML? &nbsp; TrueML is a mission-driven financial software
  company that aims to create better customer experiences for distressed borrowers.
  Consumers today want personal, digital-first experiences that align with their lifestyles,
  especially when it comes to managing finances. TrueML’s approach uses machine learning
  to engage each customer digitally and adjust strategies in real time in response
  to their interactions. &nbsp; The TrueML team includes inspired data scientists,
  financial services industry experts and customer experience fanatics building technology
  to serve people in a way that recognizes their unique needs and preferences as human
  beings and endeavoring toward ensuring nobody gets locked out of the financial system.
  We are looking for an aspiring Quality Engineer to join our team and help us ensure
  our software is world-class. This is a foundational role designed for someone eager
  to master the Software Development Lifecycle (SDLC) while working at the intersection
  of quality and innovation. Your goal is to ensure a seamless user experience by
  identifying defects early and leveraging GenAI tools to accelerate our testing capabilities.
  You won’t just be "checking boxes"—you’ll be learning to build a culture of quality.
  Work-Life Benefits Unlimited PTO Medical benefit contributions in congruence with
  local laws and type of employment agreement What You''ll Do: Ensure Product Excellence:
  Execute functional, regression, and integration tests across our Web and API layers
  to ensure every release meets our high standards. Bridge the Gap Between Bugs and
  Fixes: Act as a "detective" by identifying, documenting, and tracking defects in
  Jira, providing developers with the clear logs and reproduction steps they need
  to succeed. Accelerate with AI: Work alongside senior mentors to use AI-powered
  tools (like GitHub Copilot and Gemini) to generate test cases and write your first
  automated test scripts. Own the Data: Contribute to the creation and maintenance
  of essential test data, ensuring our testing environments reflect real-world scenarios.
  Collaborate in an Agile World: Embed yourself in the Scrum process, participating
  in sprint ceremonies and translating user stories into actionable test plans. Grow
  Your Technical Toolkit: Move from manual execution toward automated scripting, following
  established standards to build scalable testing suites. Required Qualifications:
  Associate’s degree in Computer Science, Engineering, Information Systems, or a related
  field or equivalent practical experience . 1–2 years of relevant experience in software
  testing, quality assurance, or a related technical role (including internships,
  co-ops, or academic projects). Basic understanding of software development lifecycles
  and testing methodologies (e.g., functional, regression, integration testing). Familiarity
  with basic testing concepts and terminology (e.g., test cases, test data, defects,
  severity/priority). Basic proficiency with operating systems and common software
  applications. Exposure to bug tracking systems (e.g., Jira). Strong verbal and written
  communication skills, with the ability to clearly describe issues and test results.
  Demonstrated ability to follow instructions, learn new tools and processes, and
  complete assigned tasks with supervision. Interest in and willingness to use GenAI
  tools (e.g., GitHub Copilot, Gemini, AI test generators) to assist with scripting,
  test design, and information discovery. Preferred Qualifications: Academic or practical
  exposure to scripting/programming languages (e.g., Python, JavaScript, TypeScript,
  Java) for basic test scripting or automation. Familiarity with Agile methodologies
  (e.g., Scrum or Kanban) and working with user stories. Experience with any test
  management tools (e.g., Xray, TestRail) is a plus. Experience using AI-powered tools
  in an academic, personal, or professional context (e.g., for code completion, documentation
  search, or generating test ideas). Internship, co-op, or project experience involving
  software testing, QA, or development. We are a dynamic group of people who are subject
  matter experts with a passion for change. Our teams are crafting solutions to big
  problems every day. If you’re looking for an opportunity to do impactful work, join
  TrueML and make a difference. Our Dedication to Diversity &amp; Inclusion &nbsp;
  TrueML is an equal-opportunity employer. We promote, value, and thrive with a diverse
  &amp; inclusive team. Different perspectives contribute to better solutions, and
  this makes us stronger every day. We do not discriminate on the basis of race, religion,
  color, national origin, gender, sexual orientation, age, marital status, veteran
  status, or disability status.'
