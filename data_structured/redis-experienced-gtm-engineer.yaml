description_html: '<p><p><strong>Who we are</strong></p><p>We''re Redis. We built
  the product that runs the fast apps our world runs on. (If you checked the weather,
  used your credit card, or looked at your flight status online today, you’re welcome.)
  At Redis, you’ll work with the fastest, simplest technology in the business—whether
  you’re building it, telling its story, or selling it to our 10,000+ worldwide customers.
  We’re creating a faster world with simpler experiences. You in?</p></p><b>&nbsp;</b><p><strong>About
  the Team</strong></p><p>We’re a small and fast-moving team with a simple mandate:
  remove friction from how Redis goes to market. We build systems, workflows, and
  AI-powered tools that help Marketing and SDR teams move faster, work smarter, and
  generate more pipeline with less manual effort. We’re looking for someone who is
  naturally curious, self-motivated, and a problem-solver who thrives in environments
  where the opportunities for impact are massive, and they get to own the end-to-end
  workstream.</p><br><p><strong>About the Role</strong></p><p>As a GTM Engineer focused
  on Marketing and SDR teams, you’ll sit at the intersection of engineering, automation,
  and go-to-market strategy. Your mission is to identify high-leverage problems in
  how we generate demand and engage prospects, and then build solutions that materially
  improve outcomes.</p><br><p>You’ll own the full lifecycle:</p><ul><li>Uncovering&nbsp;pain&nbsp;points&nbsp;or&nbsp;inefficiencies&nbsp;with&nbsp;Marketing&nbsp;and&nbsp;SDR&nbsp;teams</li><li>Defining&nbsp;what&nbsp;“better”&nbsp;looks&nbsp;like</li><li>Designing&nbsp;the&nbsp;solution</li><li>Building,&nbsp;shipping,&nbsp;and&nbsp;iterating</li></ul><p>This
  role is ideal for someone who enjoys both thinking like a product manager and building
  like an engineer—and who wants their work to directly influence pipeline, velocity,
  and customer engagement.</p><p>You’ll partner closely with Marketing Operations
  and collaborate with peers across Revenue Operations, Customer Success, and Solutions
  Architecture to deliver scalable, secure, and measurable improvements to how Redis
  goes to market.</p><p><strong>What You’ll Do</strong></p><ul><li>Partner&nbsp;with&nbsp;Marketing&nbsp;and&nbsp;SDR&nbsp;teams&nbsp;to&nbsp;identify,&nbsp;scope,&nbsp;and&nbsp;prioritize&nbsp;high-impact&nbsp;opportunities&nbsp;for&nbsp;automation&nbsp;and&nbsp;AI.</li><li>Design&nbsp;and&nbsp;build&nbsp;workflows,&nbsp;automations,&nbsp;and&nbsp;data&nbsp;pipelines&nbsp;that&nbsp;make&nbsp;the&nbsp;jobs&nbsp;of&nbsp;the&nbsp;Marketing&nbsp;and&nbsp;SDR&nbsp;teams&nbsp;faster,&nbsp;easier,&nbsp;and/or&nbsp;more&nbsp;productive.</li><li>Explore&nbsp;APIs,&nbsp;SDKs,&nbsp;and&nbsp;emerging&nbsp;AI&nbsp;tools&nbsp;to&nbsp;test&nbsp;new&nbsp;ways&nbsp;of&nbsp;accelerating&nbsp;GTM&nbsp;execution.</li><li>Be&nbsp;equal&nbsp;parts&nbsp;product&nbsp;manager,&nbsp;translating&nbsp;customer&nbsp;needs&nbsp;into&nbsp;features,&nbsp;and&nbsp;an&nbsp;engineer&nbsp;building&nbsp;solutions.</li><li>Balance&nbsp;speed&nbsp;with&nbsp;durability&nbsp;by&nbsp;partnering&nbsp;with&nbsp;operations&nbsp;and&nbsp;systems&nbsp;teams&nbsp;to&nbsp;ensure&nbsp;solutions&nbsp;are&nbsp;secure,&nbsp;maintainable,&nbsp;and&nbsp;scalable.</li><li>Operate&nbsp;with&nbsp;autonomy&nbsp;—&nbsp;owning&nbsp;projects&nbsp;from&nbsp;problem&nbsp;discovery&nbsp;through&nbsp;solution&nbsp;delivery&nbsp;and&nbsp;iteration.</li></ul><br><p><strong>Qualifications</strong></p><ul><li>5+&nbsp;years&nbsp;of&nbsp;experience&nbsp;building&nbsp;or&nbsp;supporting&nbsp;GTM&nbsp;systems&nbsp;in&nbsp;a&nbsp;GTM&nbsp;Engineering,&nbsp;Business&nbsp;Technology,&nbsp;Solutions&nbsp;Engineering,&nbsp;or&nbsp;similar&nbsp;role.</li><li>Hands-on&nbsp;experience&nbsp;applying&nbsp;AI,&nbsp;automation,&nbsp;or&nbsp;APIs&nbsp;to&nbsp;problems&nbsp;(you&nbsp;should&nbsp;be&nbsp;able&nbsp;to&nbsp;walk&nbsp;us&nbsp;through&nbsp;concrete&nbsp;examples).</li><li>Familiarity&nbsp;with&nbsp;modern&nbsp;AI&nbsp;and&nbsp;automation&nbsp;tools&nbsp;(e.g.,&nbsp;OpenAI,&nbsp;Cursor,&nbsp;n8n,&nbsp;v0/Vercel,&nbsp;Glean,&nbsp;or&nbsp;similar).</li><li>Strong&nbsp;problem-solving&nbsp;skills&nbsp;and&nbsp;comfort&nbsp;working&nbsp;through&nbsp;ambiguity.</li><li>A&nbsp;bias&nbsp;for&nbsp;action:&nbsp;you&nbsp;move&nbsp;from&nbsp;idea&nbsp;→&nbsp;experiment&nbsp;→&nbsp;solution&nbsp;quickly.</li><li>Clear&nbsp;communicator&nbsp;who&nbsp;can&nbsp;work&nbsp;effectively&nbsp;with&nbsp;both&nbsp;technical&nbsp;and&nbsp;non-technical&nbsp;partners.</li><li>Thrives&nbsp;in&nbsp;a&nbsp;small,&nbsp;high-growth&nbsp;environment&nbsp;with&nbsp;significant&nbsp;ownership&nbsp;and&nbsp;autonomy.</li></ul><br><p><strong>Required
  Skills</strong></p><ul><li>Ability&nbsp;to&nbsp;write&nbsp;prototype-&nbsp;or&nbsp;production-level&nbsp;code&nbsp;in&nbsp;Python,&nbsp;JavaScript/TypeScript,&nbsp;or&nbsp;a&nbsp;similar&nbsp;language.</li><li>Experience&nbsp;with&nbsp;GTM&nbsp;platforms&nbsp;such&nbsp;as&nbsp;Salesforce,&nbsp;Marketo,&nbsp;Pocus,&nbsp;Asana,&nbsp;or&nbsp;related&nbsp;tools.</li><li>Exposure&nbsp;to&nbsp;experimentation,&nbsp;analytics,&nbsp;or&nbsp;performance&nbsp;measurement&nbsp;in&nbsp;a&nbsp;GTM&nbsp;context.</li></ul><br><p>The&nbsp;estimated&nbsp;gross&nbsp;base&nbsp;annual&nbsp;salary&nbsp;range&nbsp;for&nbsp;this&nbsp;role&nbsp;is&nbsp;<em>
  $114 000 – $170 000&nbsp; pe</em>r year in New York, California, Washington, Colorado,
  and Rhode Island. Actual compensation may vary and is dependent on various factors,
  including a candidate’s work location, qualifications, experience, and competencies.
  Base annual salary is one component of Redis’ total compensation and competitive
  benefits package, which may include 401(k), unlimited time off, learning and development
  opportunities, and comprehensive health and wellness benefits. This role may include
  discretionary bonuses, stock options, commuter benefits based on location, or a
  commission plan. Salary history is not used in compensation package decisions. Redis
  utilizes market pay data to determine compensation, so posted compensation ranges
  are subject to change as new market data becomes available.</p><br><p>#LI-PT2&nbsp;</p><p>#REMOTE</p><p><p><p><span>As
  a global company, we value a culture of curiosity, diversity of thought, and innovation
  from our employees, customers, and partners. Redis is committed to a diverse and
  inclusive work environment where all employees’ differences are celebrated and supported,
  and everyone feels safe to bring their authentic selves to work. </span><span>Redis
  is dedicated to equal employment opportunities regardless of race, color, ancestry,
  religion, sex, national orientation, sexual orientation, age, marital status, disability,
  gender identity, gender expression, Veteran status, or any other classification
  protected by federal, state, or local law. We strive to create a workplace where
  every voice is heard, and every idea is respected.</span></p></p><p><span>&nbsp;</span></p><p><span>Redis
  is committed to working with and providing access and reasonable accommodation to
  applicants with mental and/or physical disabilities. If you think you may require
  accommodations for any part of the recruitment process, please send a request to&nbsp;recruiting@redis.com.
  All requests for accommodations are treated discreetly and confidentially, as practical
  and permitted by law.</span></p><p>&nbsp;</p><p>Any offer of employment at Redis
  is contingent upon the successful completion of a background check, consistent with
  applicable laws.&nbsp;</p><p>&nbsp;</p><p><span>Redis reserves the right to retain
  data longer than stated in the privacy policy in order to evaluate candidates.</span></p></p>'
