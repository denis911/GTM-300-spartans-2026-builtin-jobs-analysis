description_html: <p><p><strong>Who we are:</strong></p><p>Motive empowers the people
  who run physical operations with tools to make their work safer, more productive,
  and more profitable. For the first time ever, safety, operations and finance teams
  can manage their drivers, vehicles, equipment, and fleet related spend in a single
  system. Combined with industry leading AI, the Motive platform gives you complete
  visibility and control, and significantly reduces manual workloads by automating
  and simplifying tasks.</p><p>Motive serves nearly 100,000 customers – from Fortune
  500 enterprises to small businesses – across a wide range of industries, including
  transportation and logistics, construction, energy, field service, manufacturing,
  agriculture, food and beverage, retail, and the public sector.</p><p>Visit gomotive.com
  to learn more.</p></p><b><strong>About the Role:</strong></b><p>As a Senior Solutions
  Engineer on our Enterprise team, you’ll play a key role in driving successful outcomes
  for Motive’s Enterprise customers. You’ll partner closely with Account Executives
  to shape deal strategy, showcase the value of our platform, and act as a trusted
  advisor to technical and business stakeholders. This role requires a balance of
  technical expertise, business acumen, and strong communication skills, as you map
  customer challenges to Motive’s solutions and influence buying decisions. Reporting
  directly to an Enterprise Solutions Engineering leader, you’ll collaborate across
  Sales, Product, Engineering, and Customer Success to ensure customer needs are met
  while driving Motive’s growth and strategic success.</p><b><strong>What You'll Do:</strong></b><ul><li>Partner
  with Enterprise Account Executives to shape deal strategy, drive discovery conversations,
  and deliver high-impact demonstrations that influence executive-level decisions</li><li>Showcase
  Motive’s value by tailoring demos that resonate across technical, operational, and
  business audiences — positioning yourself as a trusted advisor to customers</li><li>Translate
  complex customer challenges into clear, compelling solutions that deliver measurable
  business outcomes</li><li>Develop deep expertise in the competitive landscape, playing
  a key role in winning strategic displacement opportunities</li><li>Establish yourself
  as a product authority — mastering today’s platform while shaping conversations
  around future innovations</li><li>Collaborate on RFIs and RFPs to position Motive
  as the partner of choice for Enterprise organizations</li><li>Act as a visible connector
  between Sales and cross-functional teams (Product, Engineering, Customer Success,
  Marketing), ensuring customer insights fuel continuous improvement and innovation</li></ul><b><strong>What
  We're Looking For:</strong></b><ul><li>5+ years of experience supporting Enterprise-level
  sales in a pre-sales or solutions engineering role (SaaS and hardware experience
  a plus)</li><li>Bachelor’s degree preferred; advanced degree a plus</li><li>Experience
  in a customer-facing pre-sales field role with the flexibility and willingness to
  travel 30%+</li><li>Deep knowledge of value-based selling frameworks and methodologies
  (e.g., MEDDIC, MEDDPICC, Command of the Message) and solutions engineering methodologies
  (e.g., Demo2Win, Great Demo!, or comparable)</li><li>Exceptional communication and
  presentation skills, with the ability to influence technical and executive audiences</li><li>Strong
  analytical and problem-solving abilities with a solutions-oriented mindset</li><li>Demonstrated
  success supporting complex solution sales within Enterprise organizations</li><li>Hands-on
  experience with Enterprise sales cycles and navigating multiple stakeholders</li><li>Experience
  with APIs, integrations, and technical solution design</li></ul><p><p><p><em><span><strong>Pay
  Transparency</strong><br>Your compensation may be based on several factors, including
  education, work experience, and certifications. For certain roles, total compensation
  may include restricted stock units. Motive offers benefits including health, pharmacy,
  optical and dental care benefits, paid time off, sick time off, short term and long
  term disability coverage, life insurance as well as 401k contribution (all benefits
  are subject to eligibility requirements). Learn more about our benefits by visiting</span></em><em><span>
  </span></em><em><span>Motive Perks &amp; Benefits</span></em>.</p><p>The on-target
  earnings (base pay + commissions) for this role:</p><p><span>$160,000</span><span>—</span><span>$200,000
  USD</span></p></p></p><p><p><em>Creating a diverse and inclusive workplace is one
  of Motive's core values. We are an equal opportunity employer and welcome people
  of different backgrounds, experiences, abilities and perspectives.&nbsp;</em></p><p><em>Please
  review our Candidate Privacy Notice&nbsp;here.</em></p><p><em>UK Candidate Privacy
  Notice here.</em></p><p><em><span>The applicant must be authorized to receive and
  access those commodities and technologies controlled under U.S. Export Administration
  Regulations.&nbsp;</span>It is Motive's policy to require that employees be authorized
  to receive access to Motive products and technology.&nbsp;</em></p></p>
