company_overview: Motive builds technology to improve the safety, productivity, and
  profitability of businesses that power the physical economy. The Motive Automated
  Operations Platform combines IoT hardware with AI-powered applications to automate
  vehicle and equipment tracking, driver safety, compliance, maintenance, spend management,
  and more. Motive serves more than 120,000 businesses, across a wide range of industries
  including trucking and logistics, construction, oil and gas, food and beverage,
  field service, agriculture, passenger transit, and delivery. Visit gomotive.com
  to learn more.
