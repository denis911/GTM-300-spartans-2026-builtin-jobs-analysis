  experience: Familiarity with CPQ and order-management objects, product catalog governance,
  consumption- vs subscription-based pricing, tax &amp; billing integrations, and
  data reconciliation with downstream ERPs. Execution and quality focus: Proven ability
  to build, test, and deploy scoped solutions in a regulated, change-controlled environment—keeping
  integrations intact and documentation audit-ready. Collaborative problem-solver:
  Strong cross-functional communication skills and a track record of partnering with
  finance and operations teams to design resilient revenue workflows at scale. (Nice-to-have)
  Salesforce certifications (Platform Developer I/II, Application Architect) or prior
  experience in AI-driven or high-growth SaaS businesses. About OpenAI OpenAI is an
  AI research and deployment company dedicated to ensuring that general-purpose artificial
  intelligence benefits all of humanity. We push the boundaries of the capabilities
  of AI systems and seek to safely deploy them to the world through our products.
  AI is an extremely powerful tool that must be created with safety and human needs
  at its core, and to achieve our mission, we must encompass and value the many different
  perspectives, voices, and experiences that form the full spectrum of humanity.&nbsp;
  We are an equal opportunity employer, and we do not discriminate on the basis of
  race, religion, color, national origin, sex, sexual orientation, age, veteran status,
  disability, genetic information, or other applicable legally protected characteristic.
  For additional information, please see OpenAI’s Affirmative Action and Equal Employment
  Opportunity Policy Statement . Background checks for applicants will be administered
  in accordance with applicable law, and qualified applicants with arrest or conviction
  records will be considered for employment consistent with those laws, including
  the San Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance
  for Employers, and the California Fair Chance Act, for US-based candidates. For
  unincorporated Los Angeles County workers: we reasonably believe that criminal history
  may have a direct, adverse and negative relationship with the following job duties,
  potentially resulting in the withdrawal of a conditional offer of employment: protect
  computer hardware entrusted to you from theft, loss or damage; return all computer
  hardware in your possession (including the data contained therein) upon termination
  of employment or end of assignment; and maintain the confidentiality of proprietary,
  confidential, and non-public information. In addition, job duties require access
  to secure and protected information technology systems and related data security
  obligations. To notify OpenAI that you believe this job posting is non-compliant,
  please submit a report through this form. No response will be provided to inquiries
