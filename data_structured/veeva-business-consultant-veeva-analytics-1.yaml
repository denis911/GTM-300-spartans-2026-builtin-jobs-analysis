description_html: '<p>Veeva Systems is a mission-driven organization and pioneer in
  industry cloud, helping life sciences companies bring therapies to patients faster.
  As one of the fastest-growing SaaS companies in history, we surpassed $2B in revenue
  in our last fiscal year with extensive growth potential ahead.</p><p><br></p><p>At
  the heart of Veeva are our values: Do the Right Thing, Customer Success, Employee
  Success, and Speed. We''re not just any public company – we made history in 2021
  by becoming a&nbsp;public benefit corporation&nbsp;(PBC), legally bound to balancing
  the interests of customers, employees, society, and investors.</p><p><br></p><p>As
  a&nbsp;Work Anywhere&nbsp;company, we support your flexibility to work from home
  or in the office, so you can thrive in your ideal environment.</p><p><br></p><p>Join
  us in&nbsp;transforming the life sciences industry, committed to making a positive
  impact on its customers, employees, and communities.</p><p><br></p><p><b>The Role</b></p><p><br></p><p><span>Within
  Business Consulting, Veeva Analytics provides the fastest path to actionable insights
  through our integrated and technology enabled analytics approach.&nbsp;Veeva’s solutions
  eliminate the legacy barrier of data preparation by bringing&nbsp; pre-integrated,
  industry best-in-class data to generate high-impact insights.&nbsp; Our analyses
  jump start field activation, pinpoint the right HCPs and patient populations, driving
  higher engagement and improving patient outcomes.</span></p><p><br></p><p><span>The
  role of the Consultant is to help identify the source of the business issues,leverage
  industry data, and provide analytics to deliver solutions that drive successful
  business outcomes. These include focusing on business processes like HCP segmentation
  &amp; targeting, commercial analytics, forecasting, field execution, and commercial
  performance.&nbsp; Ultimately, building critical customer relationships within the
  Commercial Business of our customers.&nbsp;The majority of your time will be spent
  supporting client engagement teams and working with a wide variety of clients to
  deliver data/analytics-driven consulting engagements.&nbsp; You should have a strong
  subject matter understanding of life sciences and the sales/commercial operations
  processes, tools, and supporting brand strategies.&nbsp; In addition, you have an
  aptitude for applying analytics while being able to interpret industry data to deliver
  solutions that drive insight and decision-making.&nbsp; Lastly, you have strong
  consulting experience to serve as the day-to-day engagement resource leading projects
  with the engagement leadership team. Typical projects include applying claims, sales,
  and projected data to customer needs.&nbsp;</span></p><p><br></p><p><span>This is
  a remote, full-time permanent role with Veeva with the preference that candidates
  live on the East Coast in order to meet requirements to be at customer(s) site(s)
  as required.</span></p><p><br></p><p><span>Veeva Systems does not anticipate providing
  sponsorship for employment visa status (e.g., H-1B, OPT) for this employment position.
  </span></p><p><b>What You’ll Do</b></p><ul><li>Analyze complex datasets and translate
  them into solution based recommendations and advisory for our clients across programs
  such as: HCP Segmentation &amp; Targeting, Forecasting,&nbsp; Commercial Analytics
  &amp; Field KPI definition</li><li>Serve as a key member of the project team supporting
  key deliverables and timelines</li><li>Establish relationships with client personnel
  at appropriate levels within the commercial organization</li><li>Monitor progress,
  manage risk, and ensure key stakeholders are kept informed about progress and expected
  outcomes</li><li>Demonstrate the ability to assimilate to new knowledge</li><li>Possess
  business acumen</li><li>Stay abreast of current business and industry trends relevant
  to the client''s business</li><li>Remain current on new developments in advisory
  services capabilities and industry knowledge</li></ul><p></p><p><b>Requirements</b></p><ul><li>Bachelor’s
  degree is required</li><li>3+ years of experience with the pharmaceutical industry</li><li>Background
  in the pharmaceutical industry specifically Segmentation, Targeting, and Commercial
  Analytics</li><li>Strong understanding of data and analytics and how they drive
  business outcomes</li><li>Strong analytical and problem-solving skills and excellent
  oral and written communication skills</li><li>Proficiency in SQL and Python with
  the ability to quickly master new tools as needed</li><li>Familiarity with syndicated
  life science data sets including claims, engagement, and reference data&nbsp;</li><li>Strong
  track record of experience delivering client advisory engagements</li><li>Core management
  consulting skills, including workshop facilitation, client presentations, project
  management, and ability to develop structured approaches/methodologies to business
  problems</li><li>Willingness to learn and help grow our team and culture</li><li>Ability
  to travel roughly 40% but this can vary depending on engagement</li></ul><p></p><p><b>Perks
  &amp; Benefits</b></p><ul><li>Medical, dental, vision, and basic life insurance</li><li>Flexible
  PTO and company paid holidays</li><li>Retirement programs</li><li>1% charitable
  giving program</li></ul><p></p><p><b>Compensation</b></p><ul><li>Base pay: $70,000
  - $140,000</li><li>The salary range listed here has been provided to comply with
  local regulations and represents a potential base salary range for this role. Please
  note that actual salaries may vary within the range above or below, depending on
  experience and location. We look at compensation for each individual and base our
  offer on your unique qualifications, experience, and expected contributions. This
  position may also be eligible for other types of compensation in addition to base
  salary, such as variable bonus and/or stock bonus.</li></ul><p></p><p></p><p><span>#LI-Remote</span></p><p><br></p><p>Veeva’s
  headquarters is located in the San Francisco Bay Area with offices in more than
  15 countries around the world.</p><p><br></p><p>Veeva is an equal opportunity employer.
  All qualified applicants will receive consideration for employment without regard
  to race, color, sex, sexual orientation, gender identity or expression, religion,
  national origin or ancestry, age, disability, marital status, pregnancy, protected
  veteran status, protected genetic information, political affiliation, or any other
  characteristics protected by local laws, regulations, or ordinances. If you need
  assistance or accommodation due to a disability or special need when applying for
  a role or in our recruitment process, please contact us at&nbsp;talent_accommodations@veeva.com.</p><p></p>'
