description_html: <b><strong>About </strong><strong>Nooks.ai</strong><strong>:</strong></b><p>Nooks
  is the AI Sales Assistant Platform (ASAP) that automates the busywork so reps can
  focus on the human part of selling and generate more sales pipeline. Nooks has helped
  thousands of sales reps hit quota, saved customers hundreds of thousands of hours,
  and powered hundreds of millions of dollars in pipeline. Nooks is loved by sales
  teams at companies like Hubspot, Rippling, and hundreds more.</p><p>We’re a team
  of high performers raising over $70M from top VCs, including Kleiner Perkins, which
  made its first sales-tech investment in over 10 years by investing in Nooks. Over
  the past two years, we’ve grown ARR by 4x and then 3x, and we plan to 3x it again
  this year.</p><p>For more information, visit <u>Nooks.ai</u>.</p><p></p><b>The role</b><p>As
  our first GTM Engineer, you’ll serve as the technical co-pilot for our Sales Development
  organization — owning setup, optimization, and enablement within the Nooks platform.
  You’ll translate new product releases into scalable SDR workflows and playbooks
  for both our internal team and external customers.</p><p>Focused on driving pipeline
  generation efficiency, you’ll report directly to the Head of Sales Development while
  partnering closely with Product, Engineering, RevOps, and Enablement. This role
  is ideal for someone who has grown up in a high-performing sales development environment,
  brings strong technical fluency, and thrives on creative problem-solving.</p><p>You’ll
  design, build, and enable teams on how to maximize our tech stack to accelerate
  pipeline velocity and improve efficiency. This is a high-impact, highly visible
  opportunity for someone who loves building systems, driving operational rigor, and
  directly influencing revenue outcomes in a fast-paced startup environment.</p><p><strong>This
  person must be able to commute to our SF office 3x/week to continue fostering a
  collaborative cross-functional culture.</strong></p><p></p><b>Responsibilities</b><ul><li><p>Partner
  cross-functionally with Engineering and Product to stay ahead of new features and
  roadmap updates, translating insights into actionable enablement for the Sales Development
  team</p></li><li><p>Set up new features, products and playbooks within the Nooks
  platform to ensure improved efficiency within the sales teams + build best in class
  process for our customers</p></li><li><p>Utilize analytics and data to report on
  improved efficiencies and impact to increased pipe generation across the GTM function</p></li><li><p>Provide
  product feedback and ideas to our product/engineering team on an ongoing basis to
  help contribute to the vision and value of Nooks for our customers</p></li><li><p>Partner
  with sales enablement to put together new playbooks and enablement content on how
  best to utilize all connecting technology in the GTM org</p></li><li><p>Identify
  and resolve process bottlenecks, data issues and inconsistencies in process, systems
  and strategy</p><p></p></li></ul><b>Requirements</b><ul><li><p>2+ years of relevant
  sales development experience selling into sales leaders sales</p></li><li><p>Experience
  prospecting into B2B SaaS Mid-Market / Enterprise size companies</p></li><li><p>Experience
  and ability to thrive in a rapidly changing early stage start up</p></li><li><p>Ability
  to manage multiple projects + timelines while working with cross departments</p></li><li><p>Strong
  analytic skills and the ability to leverage data to determine how we should prioritize
  improvements</p></li><li><p>Deep familiarity with systems like Nooks, Hubspot, ZoomInfo,
  and Sales Nav</p></li><li><p>This is a hybrid role - must be able to travel to our
  SF office 3x/week</p></li></ul><p></p><b><strong>Equal Employment Opportunity Statement</strong></b><p>Nooks
  is an equal opportunity employer committed to fostering a diverse and inclusive
  workforce. We believe in providing equal employment opportunities to all individuals
  regardless of race, color, religion, gender, gender identity, sexual orientation,
  national origin, age, disability, veteran status, or any other characteristic protected
  by law.  </p><p>Nooks does not discriminate in hiring, promotion, compensation,
  or any other employment practices, and we are committed to ensuring a workplace
  that is free from discrimination, harassment, and retaliation. We encourage individuals
  from all backgrounds to apply and join our team.</p>
