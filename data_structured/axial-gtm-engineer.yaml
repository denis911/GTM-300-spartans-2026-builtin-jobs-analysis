company_overview: 'Axial (axial.net) operates the largest marketplace on the internet
  for buying, selling, and financing American small businesses (businesses with $5M-$100M
  in revenues).Over 20,000 professional investors, M&A advisors and CEOs use Axial''s
  tools, data, and marketplace to source, manage and execute small business M&A transactions.
  Axial members have closed over 2,500 deals since 2010, amounting to more than $25
  Billion in closed transaction volume.Market OverviewAt the core of the US economy
  are "lower middle market" businesses - businesses generating $5M to $100M in revenue.
  In the US alone, there are over 350,000 companies in this size range. These small
  businesses are neither large enough to go public, nor are they able to attract great
  advice from national or global investment banks. In addition, the wholesale absence
  of reliable data on transactions and market participants has made this the most
  broken underperforming segment of private capital markets.Axial is transforming
  the status quo in this capital market, providing companies, their trusted advisors,
  and their capital partners with high quality purpose-built tools, unique data, and
  marketplace infrastructure.Below are the values we subscribe to as a company:--
  Obsess Over Member Trust: Your daily choices reflect your awareness that we facilitate
  vital life-altering transactions. You take this responsibility seriously and it’s
  top of mind.-- Expect and Deliver Excellence: You demonstrate consistency so that
  your colleagues feel confident partnering and relying on you. You demonstrate a
  personal commitment to continuous improvement.-- Communication Matters: You are
  concise and articulate in your communication, external or internal. You listen well
  and genuinely.-- Invent and Simplify: You are open-minded, looking for great new
  ideas that can elevate and even transform the member experience. You find novel
  ways to simplify complex status quos.-- Be an Owner: You think about the long-term
  effects of your decisions. You invest real time in building relationships with your
  colleagues.'
