description_html: <b><strong>GTM Engineer</strong></b><p><strong>Location:</strong>
  Remote (Global)</p><b><strong>About Unframe</strong></b><p>Unframe partners with
  large enterprises to design and deploy production-grade AI systems. Our deals are
  complex, multi-threaded, and high impact. We sell to business and technical leaders
  who expect rigor, credibility, and measurable outcomes.</p><p>We are scaling quickly
  and investing in the infrastructure behind our revenue engine.</p><b><strong>The
  Role</strong></b><p>We’re hiring a GTM Engineer to build the systems that power
  our GTM motion and enterprise sales execution.</p><p>You will design and implement
  the automation, tooling, and data infrastructure that turns GTM strategy into repeatable
  pipeline. You’ll work directly with Sales Leadership, Enablement, Marketing, and
  Solutions to remove friction, increase selling time, and scale outbound in a thoughtful
  way.</p><p>If you enjoy creating systems that make sales teams materially more effective,
  this role is for you.</p><b><strong>What You’ll Own</strong></b><p><strong>Automation
  &amp; Systems</strong></p><ul><li>Design automations that eliminate manual work
  for AEs and SDRs</li><li>Build and maintain integrations across Salesforce and adjacent
  GTM tools</li><li>Improve lifecycle workflows that support complex deal cycles</li><li>Raise
  the bar on data quality, enrichment, and system reliability</li></ul><p><strong>Outbound
  Infrastructure</strong></p><ul><li>Build and optimize outbound workflows across
  CRM, sequencing, enrichment, and data tools</li><li>Translate ICP and vertical strategy
  into account selection and prioritization systems</li><li>Create scalable outbound
  motions that generate qualified enterprise pipeline</li><li>Continuously test and
  improve routing, segmentation, and engagement logic</li></ul><p><strong>Sales Productivity</strong></p><ul><li>Identify
  bottlenecks in pipeline creation and deal execution</li><li>Build dashboards that
  surface leading indicators</li><li>Partner with Enablement to ensure systems reinforce
  how we want to sell</li></ul><p><strong>Technical Execution</strong></p><ul><li>Work
  deeply in Salesforce and modern GTM tooling</li><li>Use APIs, automation platforms,
  and light scripting where needed</li><li>Evaluate new tools pragmatically, with
  scale and maintainability in mind</li></ul><b><strong>What We’re Looking For</strong></b><ul><li>3–6
  years in Sales Ops, RevOps, Growth Ops, or a GTM Engineering-style role</li><li>Experience
  supporting enterprise or complex B2B sales</li><li>Proven track record building
  outbound or pipeline automation</li><li>Strong CRM fluency (Salesforce preferred)</li><li>Experience
  with sequencing and enrichment platforms</li><li>Comfortable working with structured
  data (SQL or similar is a plus)</li></ul><p>You think in systems.<br>You default
  to building instead of manually patching.<br>You care about durability, not just
  speed.<br>You are comfortable operating without a fully built playbook.</p><b><strong>Why
  This Role Matters</strong></b><p>Our enterprise sales motion is powerful but complex.
  The GTM Engineer is the force multiplier that makes it scalable. Your work will
  directly impact pipeline generation, seller productivity, and revenue growth.</p><p><p>If
  you’re a strong, independent builder who thrives on ownership, cares deeply about
  quality, and wants to have a real impact — we’d love to meet you.</p></p>
