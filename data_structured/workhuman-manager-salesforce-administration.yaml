  some of the world’s leading global brands connect culture to shared purpose. The
  Workhuman Cloud empowers employees to thank, talk and celebrate each other, creating
  an environment that sparks gratitude and human connection while increasing employee
  engagement and productivity.&nbsp;&nbsp; Did you know we have an award-winning culture
  across EMEA and North America: We were named as #5 Best Workplace in the Great Place
  to Work Awards in Ireland in 2022 in the large sized workplace category. We were
