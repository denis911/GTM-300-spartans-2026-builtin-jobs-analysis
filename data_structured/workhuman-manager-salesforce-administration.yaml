company_overview: Workhuman® is helping companies meet today’s biggest human capital
  challenges - including unprecedented turnover, employee engagement, hybrid work
  environments, and DE&I - through the Workhuman Cloud®, a secure SaaS platform that
  provides the industry’s best-in-class Social Recognition® solution. Co-Headquartered
  in Dublin, Ireland, and Framingham, Massachusetts, USA, Workhuman has been pioneering
  the human workplace to improve the employee experience at work, with solutions that
  engage with approx. seven million customer employees in 30+ languages, in 180 countries,
  generating 100 million moments of human connection. Workhuman, employs over 1,000
  people – including over 500 humans in North America who sell and market our solutions
  and services at scale, committed to helping companies improve returns on their most
  important investment– their people.
