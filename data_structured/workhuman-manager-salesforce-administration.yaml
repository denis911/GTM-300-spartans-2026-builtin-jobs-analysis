description_html: '<b>Job Description:</b><p><b>About the Role</b></p><p>We are looking
  for a <b>Manager, Salesforce Administration</b> to lead and evolve our Salesforce
  ecosystem. This is a strategic, hands-on role that combines advanced administration
  with leadership responsibilities. You will manage a team of Salesforce developers,
  oversee integrations, and ensure our platform supports complex GTM processes across
  Sales, Marketing, and Customer Success. Expertise in <b>Revenue Cloud</b> and <b>Service
  Cloud</b> is a must.</p><p><p><b><span>This is a hybrid role which requires at least
  3 days a week onsite in our<span>&nbsp;</span></span><span>new</span><span><span>&nbsp;</span>Framingham,
  MA office</span></b><span>&nbsp;</span></p></p><p><p><b><span>Applicants must have
  valid permanent work authorization in the U.S. (e.g., U.S. citizen, permanent resident).
  We are unable to offer visa sponsorship for this role.</span></b><span>&nbsp;</span></p></p><p><b>Key
  Responsibilities</b></p><ul><li><p><b>Platform Strategy &amp; Ownership</b></p><ul><li><p>Serve
  as the primary owner of Salesforce configuration and architecture.</p></li><li><p>Design
  and implement advanced automation to streamline business processes.</p></li><li><p>Manage
  complex security models, including roles, profiles, and permission sets.</p></li><li><p>Design
  scalable solutions leveraging Revenue Cloud (CPQ, Billing) and Service Cloud capabilities.</p></li></ul></li></ul><ul><li><p><b>Team
  Leadership</b></p><ul><li><p>Manage and mentor Salesforce developers, ensuring alignment
  with business priorities.</p></li><li><p>Oversee development lifecycle, code reviews,
  and deployment processes.</p></li></ul></li></ul><ul><li><p><b>Integration Expertise</b></p></li><li><ul><li><p>Lead
  integration strategy with third-party systems (ERP, Marketing Automation, Data Enrichment
  tools).</p></li><li><p>Ensure API-based solutions and middleware integrations are
  secure and optimized.</p></li></ul></li><li><p><b>Data Governance &amp; Reporting</b></p><ul><li><p>Maintain
  data integrity through audits, deduplication, and validation rules.</p></li><li><p>Partner
  with RevOps to enable accurate forecasting and reporting.</p></li></ul></li></ul><ul><li><p><b>Stakeholder
  Collaboration</b></p><ul><li><p>Act as a trusted advisor to GTM leadership, translating
  business needs into technical solutions.</p></li><li><p>Drive cross-functional projects
  to enhance user experience and system efficiency.</p></li></ul></li></ul><ul><li><p><b>Documentation
  &amp; Enablement</b></p><ul><li><p>Maintain system documentation and process flows.</p></li><li><p>Conduct
  training sessions for end-users and power users.</p></li></ul></li></ul><p><b>Qualifications</b></p><ul><li><p><b>Experience:</b>
  5+ years in Salesforce Administration, with leadership experience managing developers.</p></li><li><p><b>Certifications:</b>
  Salesforce Administrator required; Advanced Administrator, Revenue Cloud Consultant,
  and Service Cloud Consultant strongly preferred.</p></li><li><p><b>Technical Skills:</b></p><ul><li><p>Expert
  in declarative tools (Flows, Lightning Experience).</p></li><li><p>Familiarity with
  Apex, SOQL, and deployment tools.</p></li><li><p>Proven experience with <b>Revenue
  Cloud</b> and <b>Service Cloud</b> implementations.</p></li></ul></li><li><p><b>Integration
  Expertise:</b> Hands-on experience with APIs, middleware, and enterprise system
  integrations.</p></li><li><p><b>Soft Skills:</b> Strong leadership, communication,
  and stakeholder management skills.</p></li></ul><p><i>The base salary range for
  this position is $115,000 - $130,000. Offered base compensation within this range
  will be determined based on the candidate’s qualifications, experience, geographic
  location, and other factors relevant to the scope and responsibilities of this role.
  This role is also eligible for bonus or other variable compensation based on job
  performance and our standard benefits package, which supports employee well-being
  and work-life balance.</i></p><p><i><span>Thank you for considering joining our
  team. We strive to create an inclusive and accessible application process for all
  candidates. If you encounter any difficulties or have specific accessibility requirements
  while applying for this position, please don''t hesitate to reach out to us at </span></i><u><span>g</span></u><u><span><span><span>lobalrecruitment@workhuman.com</span></span></span></u><span><span> </span></span><i><span>for
  assistance. We are committed to ensuring equal access to opportunities for all individuals.</span></i></p><b></b><b><b>The
  Company:</b></b><p><i><span>At </span></i>&nbsp;Workhuman®<i><span> our mission
  is to bring more humanity to the workplace. We recognise and embrace individuals’
  differences and believe that workforce diversity and inclusion are essential to
  our long-term growth and success. Even if you don’t think you “check every single
  box” above, please still consider applying. We’re looking for a human who is collaborative,
  and innovative with a growth mindset. </span></i><span>We love what we do because
  we’re shaping the future of work through our people and our technology. Our human
  cloud-based applications are helping some of the world’s leading global brands connect
  culture to shared purpose. The Workhuman Cloud empowers employees to thank, talk
  and celebrate each other, creating an environment that sparks gratitude and human
  connection while increasing employee engagement and <span>productivity.&nbsp;&nbsp;</span></span></p><p></p><p><b><span>Did
  you know we have an award-winning culture across EMEA and North America:</span></b></p><ul><li><p><span>We
  were named as #5 Best Workplace in the Great Place to Work Awards in Ireland in
  2022 in the large sized workplace category. We were also recognised as a Best Workplace
  for Women and a Best Workplace in Technology in 2020, 2021 and 2022.</span></p></li><li><p><span>In
  2021 we were named as #2 Best Workplace in Europe in the medium sized workplace
  category.</span></p></li><li><p><span>&nbsp;We were also recognised as #2 Best Large
  Places to Work in Boston by Built In for 2023 as well as a Best Place to Work in
  Boston, U.S. Best Large Places to Work and U.S. Best Places to Work.</span></p></li><li><p><span>There
  are currently over 7.5 million users on the Workhuman® cloud across 180 countries.</span></p></li><li><p><span>Our
  core values are Respect, Determination, Innovation and Imagination.</span></p></li></ul><p><i><span>Workhuman
  is an Equal Opportunity Employer and is committed to the principle of equal employment
  opportunity for all employees. We proudly provide a work environment free of discrimination
  and harassment. Employment decisions at Workhuman are based on solely on business
  needs, job requirements and individual qualifications, without regard to race, color,
  religion or belief, national, social, or ethnic origin, sex (including pregnancy),
  age, sexual orientation, gender identity and/or expression, marital, civil union
  or domestic partnership status, past or present military service, or any other status
  protected by the laws or regulations in the locations where we operate. Workhuman
  believes that diversity and inclusion among our teammates is critical to our success
  as a global company, and we seek to recruit, develop and retain the most talented
  people from a diverse candidate pool.</span></i></p>'
