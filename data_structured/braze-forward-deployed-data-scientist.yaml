description_html: '<p><p>At Braze, we have found our people. We’re a genuinely approachable,
  exceptionally kind, and intensely passionate crew.</p><p>We seek to ignite that
  passion by setting high standards, championing teamwork, and creating work-life
  harmony as we collectively navigate rapid growth on a global scale while striving
  for greater equity and opportunity – inside and outside our organization.</p><p>To
  flourish here, you must be prepared to set a high bar for yourself and those around
  you. There is always a way to contribute: Acting with autonomy, having accountability
  and being open to new perspectives are essential to our continued success.</p><p>Our
  deep curiosity to learn and our eagerness to share diverse passions with others
  gives us balance and injects a one-of-a-kind vibrancy into our culture.</p><p>If
  you are driven to solve exhilarating challenges and have a bias toward action in
  the face of change, you will be empowered to make a real impact here, with a sharp
  and passionate team at your back. If Braze sounds like a place where you can thrive,
  we can’t wait to meet you.</p></p><p><strong>WHAT YOU''LL DO</strong></p><p>As our
  customer base continues to grow with the excitement around BrazeAI, we’re expanding
  our team! Join our Forward-Deployed Data Scientist group of creative technical experts
  who partner with customers to ensure their success. In this role, you will:</p><ul><li>Collaborate
  with customer Analytics/BI teams and Braze colleagues on implementations, including
  use case definition, data integration, pipeline setup, and ML model configuration</li><li>Extend
  product capabilities by improving architecture and developing reusable data pipelines,
  APIs, and components</li><li>Work closely with the RL pipeline development team
  to refine and advance our reinforcement learning (self-learning) algorithms</li><li>Contribute
  to shaping BrazeAI product strategy and roadmap through customer-facing insights
  and technical expertise</li><li>Provide ongoing technical expertise to ensure successful
  adoption, measurable outcomes, and long-term customer success</li></ul><p><strong>WHO
  YOU ARE</strong></p><ul><li>Education: Bachelor’s degree in Computer Science, Data
  Science, Mathematics, Engineering, or a related field required; Master’s or PhD
  in a relevant technical discipline preferred</li><li>Experience: 3–5+ years of hands-on
  experience as a Data Scientist, Machine Learning Engineer, or similar role working
  with large-scale data and production environments. Experience in customer-facing
  or consulting roles is strongly preferred</li><li>Strong technical expertise: Proficient
  in Python (Pandas) and core ML libraries (TensorFlow, Keras, scikit-learn, CatBoost,
  XGBoost). Skilled in SQL for querying/manipulating datasets, with experience in
  machine learning pipelines and model deployment</li><li>Engineering best practices:
  You write well-structured, modular, documented code; follow strong development practices
  (Git, CI/CD, testing frameworks, type-hinting, code reviews); and can build scalable,
  maintainable solutions</li><li>Nice-to-have skills: Experience with DevOps tools
  (Airflow, Kubernetes, Terraform, GCP), data integration/ETL and pipeline optimization,
  or reinforcement learning algorithms</li><li>Customer collaborator: Comfortable
  working directly with clients and cross-functional teams, aligning stakeholders,
  and translating technical concepts into clear business value</li><li>Entrepreneurial
  problem-solver: You identify opportunities and risks early, troubleshoot obstacles,
  and drive creative solutions</li><li>Continuous learner: You stay current with industry
  trends, explore new tools/technologies, and thrive in environments that push you
  to grow</li><li>Clear communicator: Able to explain complex technical ideas persuasively
  to both technical and non-technical audiences</li></ul><p>For candidates based in
  the United States, the pay range for this position at the start of employment is
  expected to be between $124,200 - $148,500/year with an expected On Target Earnings
  (OTE) between $138,000 - $165,000/year (including bonus or commission). Your exact
  offer may vary depending on multiple individualized factors, including market location,
  job-related knowledge, skills, and experience. In addition to cash compensation,
  Braze offers full- and part- time employees a comprehensive Total Rewards package
  that includes equity grants of restricted stock (RSUs) so that all Braze employees
  own a piece of our company.</p><p><p><p><strong>WHAT WE OFFER<br></strong></p><p><em>Braze
  benefits vary by location, and we encourage you to review our specific benefits
  offerings for each country </em><em>here</em><em>. More details on benefits plans
  will be provided if you receive an offer of employment.</em></p><p>From offering
  comprehensive benefits to fostering hybrid ways of working, we’ve got you covered
  so you can prioritize work-life harmony. Braze offers benefits such as:</p><ul><li>Competitive
  compensation that may include equity</li><li>Retirement and Employee Stock Purchase
  Plans</li><li>Flexible paid time off</li><li>Comprehensive benefit plans covering
  medical, dental, vision, life, and disability</li><li>Family services that include
  fertility benefits and equal paid parental leave</li><li>Professional development
  supported by formal career pathing, learning platforms, and a yearly learning stipend</li><li>A
  curated in-office employee experience, designed to foster community, team connections,
  and innovation</li><li>Opportunities to give back to your community, including an
  annual company-wide Volunteer Week and donation matching&nbsp;</li><li>Employee
  Resource Groups that provide supportive communities within Braze</li><li>Collaborative,
  transparent, and fun culture recognized as a Great Place to Work®</li></ul><p><strong>ABOUT
  BRAZE<br></strong>Braze is the leading customer engagement platform that empowers
  brands to Be Absolutely Engaging.™ Braze helps brands deliver great customer experiences
  that drive value both for consumers and for their businesses. Built on a foundation
  of composable intelligence, BrazeAI™ allows marketers to combine and activate AI
  agents, models, and features at every touchpoint throughout the Braze Customer Engagement
  Platform for smarter, faster, and more meaningful customer engagement. From cross-channel
  messaging and journey orchestration to Al-powered decisioning and optimization,
  Braze enables companies to turn action into interaction through autonomous, 1:1
  personalized experiences.<br>The company has repeatedly been recognized as a Leader
  in marketing technology by industry analysts, and was voted a G2 “Best of Marketing
  and Digital Advertising Software Product” in 2025.<br>Braze was also named a 2025
  Best Companies To Work For by U.S. News &amp; World Report, a 2025 America’s Greatest
  Companies by Newsweek, and a 2025 Fortune Best Workplace in Technology™ by Great
  Place To Work®, among other accolades. Braze is also proudly certified as a Great
  Place to Work® in the U.S., the UK, Australia, and Singapore.<br>The company is
  headquartered in New York with offices in Austin, Berlin, Bucharest, Chicago, Dubai,
  Jakarta, London, Paris, San Francisco, São Paulo, Singapore, Seoul, Sydney and Tokyo.</p><strong>BRAZE
  IS AN EQUAL OPPORTUNITY EMPLOYER</strong><p>At Braze, we strive to create equitable
  growth and opportunities inside and outside the organization.</p><p>Building meaningful
  connections is at the heart of everything we do, and that includes our recruiting
  practices. We''re committed to offering all candidates a fair, accessible, and inclusive
  experience – regardless of age, color, disability, gender identity, marital status,
  maternity, national origin, pregnancy, race, religion, sex, sexual orientation,
  or status as a protected veteran. When applying and interviewing with Braze, we
  want you to feel comfortable showcasing what makes you <em>you</em>.</p><p>We know
  that sometimes different circumstances can lead talented people to hesitate to apply
  for a role unless they meet 100% of the criteria. If this sounds familiar, we encourage
  you to apply, as we’d love to meet you.</p><em>Please see our</em><em> </em><em>Candidate
  Privacy Policy</em><em> for more information on how Braze processes your personal
  information during the recruitment process and, if applicable based on your location,
  how you can exercise any privacy rights.</em></p></p>'
