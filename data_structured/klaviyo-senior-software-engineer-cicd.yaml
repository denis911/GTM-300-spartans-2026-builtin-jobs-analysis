description_html: '<p><p><em>At Klaviyo, we value the unique backgrounds, experiences
  and perspectives each Klaviyo (we call ourselves Klaviyos) brings to our workplace
  each and every day. We believe everyone deserves a fair shot at success and appreciate
  the experiences each person brings beyond the traditional job requirements. If you’re
  a close but not exact match with the description, we hope you’ll still consider
  applying. Want to learn more about life at Klaviyo? Visit klaviyo.com/careers&nbsp;to
  see how we empower creators to own their own destiny.</em></p></p><p><strong>Why
  You Should Join the Developer Infrastructure Team</strong></p><p>Our core focus
  is empowering engineers to ship code efficiently and safely. We own the CI/CD pipelines
  and infrastructure automation that drastically improves developer productivity.
  As the Lead for this team, you will define the technical roadmap for the software
  pipeline from idea to delivery, enabling every engineer in the company to ship at
  terminal velocity with total confidence. By building the foundational tools that
  streamline the path to production, you will play a pivotal role in maximizing developer
  throughput, minimizing deployment friction, and ensuring our organization can move
  fast without the fear of breaking things.</p><p><strong>What You''ll Achieve: Key
  Responsibilities</strong></p><p>As a Senior Software Engineer for this team, you
  will drive the evolution of our CI/CD pipeline to enable seamless development and
  deployments across the organization:</p><ul><li><strong>Scalable Tooling &amp; Coverage:</strong>
  Design and build the next generation of tools that simplify CI/CD pipelines. You
  will lead efforts to help bring all teams and repos up to best in class standards
  at scale .</li><li><strong>Set Engineering Standards:</strong> Contribute to the
  standards for our repositories. You will refine the benchmarks for PRs, cycle time,
  velocity, code quality metrics, and systemic reliability that all teams will follow.</li><li><strong>AI-Driven
  Strategy:</strong> Spearhead our efforts to leverage AI within the CI/CD lifecycle
  as well as using AI to accelerate our own development efforts.&nbsp;</li><li><strong>Cross-Functional
  Collaboration:</strong> Work closely with internal users to understand their use
  cases and help roll out and act as a consultant for teams to enable them to leverage
  the best known good CI/CD workflows.</li><li><strong>Operational Excellence:</strong>
  Oversee the health and performance of our entire CI/CD pipeline, taking responsibility
  for the stability of the environment that hundreds of engineers rely on daily.</li></ul><b><strong>What
  Makes This Role Exciting</strong></b><ul><li><strong>High-Leverage Leadership:</strong>
  You are not just building features; you are building the platform that defines the
  developer experience for the entire company.</li><li><strong>Innovation at the Edge:</strong>
  You will have the autonomy to experiment with emerging technologies like AI and
  LLMs to solve the age-old problems of flakiness and slow feedback loops.</li></ul><p><strong>Who
  You Are:&nbsp;</strong></p><ul><li><strong>Analytical Problem Solver:</strong> You
  have 5+ years of software engineering experience with a focus on writing clean,
  maintainable code. You excel at debugging complex issues and performing root-cause
  analysis, using those learnings to implement systemic improvements that prevent
  future regressions.</li><li><strong>Master of Root-Cause Analysis:</strong> You
  don''t just fix symptoms; you hunt down systemic failures. You excel at debugging
  deep-stack issues and transforming those lessons into automated preventions.</li><li><strong>Technical
  Generalist: </strong>You are comfortable working across the stack. Whether it is
  debugging a React component in an E2E test or optimizing a Python integration test,
  you are ready to dive in.</li><li><strong>AI Visionary:</strong> You are passionate
  about the intersection of AI and Software Quality. You have a clear perspective
  on how AI can automate the mundane parts of testing and accelerate the SDLC.</li><li><strong>Extreme
  Ownership:</strong> You take pride in the end-to-end health of the platform. You
  are proactive in identifying technical debt and are a relentless advocate for engineering
  excellence.</li><li><strong>CI/CD Expert:</strong> You have deep experience with
  modern CI/CD tools and a sophisticated understanding of how to integrate automated
  testing into high-frequency deployment pipelines.</li></ul><p><strong>Technologies
  we use (not exhaustive):</strong></p><ul><li><strong>Backend:</strong> Python, Django,
  Go</li><li><strong>Frontend:</strong> React, TypeScript, JavaScript</li><li><strong>Testing
  Frameworks:</strong> Playwright, Cypress, Pytest, Jest</li><li><strong>Infrastructure
  and CI:</strong> AWS, Kubernetes, Terraform, Helm, Buildkite</li><li><strong>Data:</strong>
  MySQL, Redis, Kafka</li><li><strong>AI Tools:</strong> Integration with Claude,
  Cursor, Copilot, or internal AI enablement frameworks</li></ul><br><br><p>We use
  Covey as part of our hiring and / or promotional process. For jobs or candidates
  in NYC, certain features may qualify it as an AEDT. As part of the evaluation process
  we provide Covey with job requirements and candidate submitted applications. We
  began using Covey Scout for Inbound on April 3, 2025.</p><p>Please see the independent
  bias audit report covering our use of Covey here</p><p><p><p><p><strong>Massachusetts
  Applicants:<br></strong>It is unlawful in Massachusetts to require or administer
  a lie detector test as a condition of employment or continued employment. An employer
  who violates this law shall be subject to criminal penalties and civil liability.</p><p>Our
  salary range reflects the cost of labor across various U.S. geographic markets.
  The range displayed below reflects the minimum and maximum target salaries for the
  position across all our US locations. The base salary offered for this position
  is determined by several factors, including the applicant’s job-related skills,
  relevant experience, education or training, and work location.</p><p>In addition
  to base salary, our total compensation package may include participation in the
  company’s annual cash bonus plan, variable compensation (OTE) for sales and customer
  success roles, equity, sign-on payments, and a comprehensive range of health, welfare,
  and wellbeing benefits based on eligibility.&nbsp;</p><p>Your recruiter can provide
  more details about the specific salary/OTE range for your preferred location during
  the hiring process.</p></p><p>Base Pay Range For US Locations:</p><p><span>$148,000</span><span>—</span><span>$222,000
  USD</span></p></p></p><p><p><strong>Get to Know Klaviyo</strong></p><p>We’re Klaviyo
  (pronounced clay-vee-oh). We empower creators to own their destiny by making first-party
  data accessible and actionable like never before. We see limitless potential for
  the technology we’re developing to nurture personalized experiences in ecommerce
  and beyond. To reach our goals, we need our own crew of remarkable creators—ambitious
  and collaborative teammates who stay focused on our north star: delighting our customers.
  If you’re ready to do the best work of your career, where you’ll be welcomed as
  your whole self from day one and supported with generous benefits, we hope you’ll
  join us.</p><p><em>AI fluency at Klaviyo includes responsible use of AI (including
  privacy, security, bias awareness, and human-in-the-loop). We provide accommodations
  as needed.&nbsp;</em></p><p><em>By participating in Klaviyo’s interview process,
  you acknowledge that you have read, understood, and will adhere to our&nbsp;Guidelines
  for using AI in the Klaviyo interview Process. For more information about how we
  process your personal data, see our&nbsp;Job Applicant Privacy Notice.<br></em></p><p><em>Klaviyo
  is committed to a policy of equal opportunity and non-discrimination. We do not
  discriminate on the basis of race, ethnicity, citizenship, national origin, color,
  religion or religious creed, age, sex (including pregnancy), gender identity, sexual
  orientation, physical or mental disability, veteran or active military status, marital
  status, criminal record, genetics, retaliation, sexual harassment or any other characteristic
  protected by applicable law.</em></p><p><p><p><p><p><p><p><p><p><p><p><p><em>IMPORTANT
  NOTICE: Our company takes the security and privacy of job applicants very seriously.
  We will never ask for payment, bank details, or personal financial information as
  part of the application process. All our legitimate job postings can be found on
  our official career site. Please be cautious of job offers that come from non-company
  email addresses (@klaviyo.com), instant messaging platforms, or unsolicited calls.</em></p><p>&nbsp;</p><p><strong>By
  clicking "Submit Application" you consent to Klaviyo processing your Personal Data
  in accordance with our Job Applicant Privacy Notice.&nbsp; If you do not wish for
  Klaviyo to process your Personal Data, please do not submit an application.<em>&nbsp;
  </em></strong><em>You can find our Job Applicant Privacy Notice&nbsp;</em><em>here</em><em>&nbsp;and
  here (FR).</em></p></p></p></p></p></p></p></p></p></p></p></p><p><p><p><p><p><p>&nbsp;</p></p></p></p></p></p></p>'
