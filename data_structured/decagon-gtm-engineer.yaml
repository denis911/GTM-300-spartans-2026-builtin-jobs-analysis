description_html: <p><strong>About Decagon</strong></p><p>Decagon is the leading conversational
  AI platform empowering every brand to deliver concierge customer experiences.</p><p>Our
  technology enables industry-defining enterprises like Avis Budget Group, Block’s
  Cash App and Square, Chime, Oura Health, and Hunter Douglas to deploy AI agents
  that power personalized, deeply satisfying interactions across voice, chat, email,
  SMS, and every other channel.</p><p>We’re building a future where customer experiences
  are being redefined from support tickets and hold music to faster resolutions, richer
  conversations, and deeper relationships. We’re proud to be backed by world-class
  investors who share that vision, including a16z, Accel, Bain Capital Ventures, Coatue,
  and Index Ventures, along with many others.</p><p>We’re an in-office company, driven
  by a shared commitment to excellence and velocity. Our values — Just Get It Done,
  Invent What Customers Want, Winner’s Mindset, and The Polymath Principle — shape
  how we work and grow as a team.</p><p></p><p><strong>About the Team</strong></p><p>Decagon’s
  Revenue Operations team is a multidisciplinary group of operators combining strategic
  thinking, analytical rigor, and high-velocity execution. Covering GTM-wide strategy,
  operations and analytics, we are proactive, data-driven partners to leadership –
  providing critical insights, driving operational efficiency and getting things done.<br></p><p><strong>About
  the Role</strong></p><p>We are seeking a GTM Engineer to reimagine, automate and
  optimize the full GTM motion. This is a role for a developer-minded operator who
  wants to build custom solutions rather than just manage SaaS configurations. Working
  closely with senior leadership and field teams, you will integrate best-in-class
  tools and build AI agents to drive efficiencies across the full GTM motion. This
  is a high-impact, high-agency position to shape the GTM strategy of a category-defining
  AI company.<br>We believe in building together and fast. This is a fully in-office
  role is based in our San Francisco or New York office 5 days a week.</p><p></p><p><strong>In
  This Role You Will</strong></p><ul><li><p><strong>Optimize the Stack:</strong> lead
  the technical integration and optimization of external tools (e.g., Salesforce,
  Clay, Gong, enrichment APIs) into a cohesive, automated engine</p></li><li><p><strong>Build
  AI Agents:</strong> design and deploy agents that optimize account research, reduce
  manual data entry, and enhance outbound personalization using various tools &amp;
  APIs</p></li><li><p><strong>Engineer Data Flows:</strong> build the webhooks and
  middleware that sync data between our product, CRM and other internal systems with
  100% integrity</p></li><li><p><strong>Programmatic GTM:</strong> partner with leadership
  to translate sales strategy into automated workflows, custom internal tools, and
  programmatic outbound campaigns</p></li></ul><p></p><p><strong>Your background looks
  something like this</strong></p><ul><li><p><strong>Technical Foundation:</strong>
  3+ years in GTM Engineering or technical RevOps. You are comfortable writing code
  (Python, JS, or SQL) and working with APIs. Prior experience in GTM or Revenue Operations
  is desirable</p></li><li><p><strong>Builder DNA:</strong> you are a curious learner
  and builder, and skilled at new AI tools like Clay, Claude Code, Parallel, Unify,
  Gumloop/n8n/Zapier, and scraping/indexing the web. You are a nerd at heart when
  it comes to GTM enablement tooling</p></li><li><p><strong>GTM Expertise:</strong>
  understanding of the sales funnel &amp; processes; you understand the business logic
  behind the data you’re moving</p></li><li><p><strong>Integration Mastery:</strong>
  track record of stitching together a GTM stack and managing complex data waterfalls</p></li><li><p><strong>Get
  it done posture:</strong> a bias toward action and building "v1" today. You thrive
  in the ambiguity of a fast-paced AI startup</p></li><li><p><strong>Ownership mindset:</strong>
  end-to-end ownership of the GTM infrastructure and the outcomes it produces<br></p></li></ul><p><strong>Benefits</strong></p><ul><li><p>Health,
  dental, and vision insurance</p></li><li><p>Take what you need vacation policy</p></li><li><p>Career
  growth opportunities within a fast-growing AI company</p></li></ul><p></p><p><strong>Compensation</strong></p><p>$185,000
  - $235,000 + Equity <br></p>
description_text: 'About Decagon Decagon is the leading conversational AI platform
  empowering every brand to deliver concierge customer experiences. Our technology
  enables industry-defining enterprises like Avis Budget Group, Block’s Cash App and
  Square, Chime, Oura Health, and Hunter Douglas to deploy AI agents that power personalized,
  deeply satisfying interactions across voice, chat, email, SMS, and every other channel.
  We’re building a future where customer experiences are being redefined from support
  tickets and hold music to faster resolutions, richer conversations, and deeper relationships.
  We’re proud to be backed by world-class investors who share that vision, including
  a16z, Accel, Bain Capital Ventures, Coatue, and Index Ventures, along with many
  others. We’re an in-office company, driven by a shared commitment to excellence
  and velocity. Our values — Just Get It Done, Invent What Customers Want, Winner’s
  Mindset, and The Polymath Principle — shape how we work and grow as a team. About
  the Team Decagon’s Revenue Operations team is a multidisciplinary group of operators
  combining strategic thinking, analytical rigor, and high-velocity execution. Covering
  GTM-wide strategy, operations and analytics, we are proactive, data-driven partners
  to leadership – providing critical insights, driving operational efficiency and
  getting things done. About the Role We are seeking a GTM Engineer to reimagine,
  automate and optimize the full GTM motion. This is a role for a developer-minded
  operator who wants to build custom solutions rather than just manage SaaS configurations.
  Working closely with senior leadership and field teams, you will integrate best-in-class
  tools and build AI agents to drive efficiencies across the full GTM motion. This
  is a high-impact, high-agency position to shape the GTM strategy of a category-defining
  AI company. We believe in building together and fast. This is a fully in-office
  role is based in our San Francisco or New York office 5 days a week. In This Role
  You Will Optimize the Stack: lead the technical integration and optimization of
  external tools (e.g., Salesforce, Clay, Gong, enrichment APIs) into a cohesive,
  automated engine Build AI Agents: design and deploy agents that optimize account
  research, reduce manual data entry, and enhance outbound personalization using various
  tools &amp; APIs Engineer Data Flows: build the webhooks and middleware that sync
  data between our product, CRM and other internal systems with 100% integrity Programmatic
  GTM: partner with leadership to translate sales strategy into automated workflows,
  custom internal tools, and programmatic outbound campaigns Your background looks
  something like this Technical Foundation: 3+ years in GTM Engineering or technical
  RevOps. You are comfortable writing code (Python, JS, or SQL) and working with APIs.
  Prior experience in GTM or Revenue Operations is desirable Builder DNA: you are
  a curious learner and builder, and skilled at new AI tools like Clay, Claude Code,
  Parallel, Unify, Gumloop/n8n/Zapier, and scraping/indexing the web. You are a nerd
  at heart when it comes to GTM enablement tooling GTM Expertise: understanding of
  the sales funnel &amp; processes; you understand the business logic behind the data
  you’re moving Integration Mastery: track record of stitching together a GTM stack
  and managing complex data waterfalls Get it done posture: a bias toward action and
  building "v1" today. You thrive in the ambiguity of a fast-paced AI startup Ownership
  mindset: end-to-end ownership of the GTM infrastructure and the outcomes it produces
  Benefits Health, dental, and vision insurance Take what you need vacation policy
  Career growth opportunities within a fast-growing AI company Compensation $185,000
  - $235,000 + Equity'
