description_html: '<p><p><span>Liftoff</span><span> is a leading AI-powered performance
  marketing platform for the mobile app economy. Our end-to-end technology stack helps
  app marketers acquire and retain high-value users, while enabling publishers to
  maximize revenue across programmatic and direct demand.</span></p><p><span>Liftoff’s
  solutions, including Accelerate, Direct, Monetize, Intelligence, and Vungle Exchange,
  support over 6,600 mobile businesses across 74 countries in sectors such as gaming,
  social, finance, ecommerce, and entertainment. Founded in 2012 and headquartered
  in Redwood City, CA, Liftoff has a diverse, global presence.</span></p></p><b><strong>About
  Liftoff Security Team</strong></b><p>The Liftoff security team is dedicated to protecting
  Liftoff’s customers, users, and employees. Our team architects Liftoff’s security
  posture, designs and builds infrastructure and security improvements, consults with
  other teams as they develop and launch new products and features, and proactively
  plans for the unknown. Our work spans the entire company and technology stack, from
  infrastructure to web and mobile applications, as well as IT systems. We collaborate
  with key stakeholders to balance business needs while minimizing security risks.
  Our approach to security is deeply rooted in software engineering principles, emphasizing
  automation and the development of well-designed security tools.</p><b><strong>Responsibilities</strong></b><ul><li>Establish
  secure software development standards and integrate security-minded thinking into
  the development process.</li><li>Create frictionless paths for engineering teams
  to securely build and deploy software.</li><li>Perform security assessments of systems
  and services to ensure compliance with security best practices.</li><li>Partner
  with key stakeholders across the organization to build a culture of security-minded
  builders.</li><li>Assess vendors to ensure their internal security controls meet
  Liftoff’s security requirements and their products enable secure employee usage.</li><li>Triage
  incoming threat events and vulnerabilities and ensure timely remediation and resolution
  of the issues.</li><li>Conduct post-incident reviews, document findings, and implement
  necessary remediations.</li><li>Develop tooling and automation to detect and mitigate
  active security threats within our systems.</li></ul><b><strong>Requirements</strong></b><ul><li>5+
  years of experience in security engineering or software engineering.</li><li>Experience
  collaborating with cross-functional teams to deliver impactful security initiatives.</li><li>Comfortable
  reading, writing, and maintaining code in multiple languages.</li><li>Strong understanding
  of application security best practices.</li><li>Ability to quickly understand complex
  engineering architectures and systems.</li><li>Demonstrated ability to prioritize
  security efforts using a risk-based approach.</li><li>Proficiency in Go, Python,
  Clojure, or JavaScript.</li><li>Experience working on or collaborating with high-velocity,
  high-performing software engineering teams.</li><li>Proven track record of scaling
  cloud infrastructure security.</li><li>Excellent written and verbal communication
  skills.</li></ul><p>Working at Liftoff is fast-paced, fun, and challenging, and
  we thrive on innovation. Come join our team and help shape the future of the mobile
  app ecosystem. If this role sounds interesting to you, we would love to hear from
  you!&nbsp;&nbsp;</p><p><strong>Locations:</strong></p><p>This role is eligible for
  full-time remote work in one of our entities/states and Canada: CA, CO, ID, IL,
  FL, GA, MA, MI, MN, MO, NJ, NV, NY, OR, PA, TX, UT, and WA.</p><p><em>We are a remote-first
  company with US hubs in Redwood City, Los Angeles, and New York City.</em></p><p><strong>Travel
  Expectations:</strong></p><p>We offer several opportunities for in-person team gatherings,
  including but not limited to project meetings, regional meetups, and company-wide
  events. We expect our employees to attend these gatherings at least once per quarter.
  These gatherings provide essential opportunities for collaboration, communication,
  and team building.</p><p><strong>Compensation:&nbsp;</strong></p><p>Liftoff offers
  all employees a full compensation package that includes equity and health/vision/dental
  benefits associated with your country of residence. Base compensation will vary
  based on the candidate''s location and experience.</p><p>The following are our base
  salary ranges for this role:&nbsp;</p><ul><li><strong>SF Bay Area, Los Angeles/Orange
  County, NYC, Seattle</strong>: $220,000 - $240,000</li><li><strong>All other California
  and Washington state locations, Austin, Boston, Denver, Portland:</strong>&nbsp;$202,400
  - $220,800</li><li><strong>All other cities and towns in our approved states:&nbsp;</strong>$189,200
  - $206,400</li></ul><p>#LI-EL1</p><p>We use Covey as part of our hiring and/or promotional
  process for jobs in NYC and certain features may qualify it as an AEDT.&nbsp; As
  part of the evaluation process, we provide Covey with job requirements and candidate-submitted
  applications. We began using&nbsp;Covey Scout for Inbound&nbsp;on January 22, 2024.</p><p>Please
  see the independent bias audit report covering our use of Covey&nbsp;here.</p><p><p>Liftoff
  offers a fast-paced, collaborative, and innovative work environment where employees
  are empowered to grow and make an impact. We’re shaping the future of the mobile
  app ecosystem—join us and help accelerate what’s next.</p><br><p>Liftoff’s compensation
  strategy includes competitive salaries, equity, and benefits designed to support
  employee well-being and performance. We benchmark compensation based on role, level,
  and location to ensure fairness and market alignment. Benefits may include medical
  coverage, wellness stipends, and additional perks based on your country of residence.</p><br><p>Liftoff
  is an equal opportunity employer. We are committed to creating an inclusive environment
  for all employees and applicants regardless of race, ethnicity, national origin,
  age, marital status, disability, sexual orientation, gender identity, religion,
  veteran status, or any other characteristic protected by applicable law.</p><p><strong>Agency
  and Third Party Recruiter Notice:</strong></p><p><span>Liftoff does not accept unsolicited
  resumes from individual recruiters or third-party recruiting agencies in response
  to job postings. No fee will be paid to third parties who submit unsolicited candidates
  directly to our hiring managers or Recruiting Team. All candidates must be submitted
  via our Applicant Tracking System by approved Liftoff vendors who have been expressly
  requested to make a submission by our Recruiting Team for a specific job opening.
  No placement fees will be paid to any firm unless such a request has been made by
  the Liftoff Recruiting Team and such a candidate was submitted to the Liftoff Recruiting
  Team via our Applicant Tracking System.</span></p></p>'
