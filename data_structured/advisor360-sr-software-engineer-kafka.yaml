  requiring three days per week onsite in our Needham, MA headquarters.&nbsp; &nbsp;
  We are seeking a Senior Software Engineer to help operate, support, and evolve our
  internal platform and service integrations. This role has a strong focus on Apache
  Kafka , while also working across a broader ecosystem of shared services such as
  Redis, Auth0, ELK, and Orkes . You will act as a platform engineer and technical
  partner for internal teams, helping them integrate reliably with Kafka and other
  core services through libraries, services, tooling, and best practices. This role
  combines deep technical expertise, hands-on development, and cross-team collaboration.
  Responsibilities: Own and support the Kafka platform used by multiple engineering
  teams Design, build, and maintain shared libraries, SDKs, and services that simplify
  Kafka integration Partner with application teams to design and troubleshoot event-driven
  and asynchronous workflows Operate and support additional shared services and integrations,
  including Redis, Auth0, ELK, and Orkes Develop integration patterns, reference architectures,
  and reusable components for internal consumption Debug complex production issues
  spanning messaging, authentication, observability, and orchestration layers Establish
  and promote best practices for Kafka topics, schemas, producers, consumers, and
  error handling Improve reliability, performance, and observability of Kafka and
  other shared services Collaborate with SRE, DevOps, and security teams on platform
  reliability, access controls, and compliance Contribute to documentation, examples,
  and internal enablement efforts Qualifications: 5+ years of professional software
  engineering experience Strong, hands-on experience with Apache Kafka in production
  environments (required) Experience operating or integrating distributed systems
  at scale Proficiency in building backend services and libraries (.NET, Python or
  similar) Experience debugging and supporting complex, multi-service systems Solid
  understanding of event-driven and asynchronous architectures Strong collaboration
  and communication skills Background in platform engineering, developer experience,
  or internal tooling Preferred experience with other platforms Redis (caching, pub/sub,
  or data access patterns) Identity and access management systems (e.g., Auth0) Observability
  stacks such as ELK (Elasticsearch, Logstash, Kibana) Workflow orchestration platforms
  (e.g., Orkes or similar) Cloud-native platforms, Kubernetes, or managed service
  offerings What Success Looks Like: Kafka is reliable, well-governed, and easy for
  teams to integrate with Internal teams leverage shared libraries and patterns rather
  than building custom integrations Platform and service integrations are observable,
  secure, and scalable Cross-team dependencies are reduced through clear standards
  and tooling &nbsp; &nbsp; Why You’ll Love Working With Us:&nbsp; It’s not just about
  work—it’s about building a career and enjoying the ride! Here’s what you can expect:
  &nbsp; The estimated base salary range for this position is $ 152,000 -$173,000
  plus bonus &amp; equity. Advisor360 provides an estimate of the compensation for
  roles that may be hired as required by state regulations. Compensation may vary
  based on factors including, but not limited to, individual candidate experience,
  skills, and qualifications. Additionally, Advisor360 leverages current market data
  to determine compensation, therefore posted compensation figures are subject to
  change as new market data becomes available. The salary, other forms of compensation,
  and benefits information is accurate as of the date of this posting. Advisor360
  reserves the right to modify this information at any time, subject to applicable
  law. We believe in recognizing and rewarding performance. Our compensation package
  includes competitive base salaries, annual performance-based bonuses, and the chance
  to share in the equity value you and your colleagues create during your time with
  the company. We offer comprehensive health benefits, including dental, life, and
  disability insurance. We also trust our employees to manage their time effectively,
  which is why we offer an unlimited paid time off program to help you perform at
  your best every day.&nbsp;&nbsp; Join us on this journey. Advisor360° is an equal
  opportunity employer committed to a diverse workforce. We believe diversity drives
  innovation and are therefore building a company where people of all backgrounds
  are truly welcome and included. Everyone is encouraged to bring their unique, authentic
  selves to work each and every day. The way we see it, we are here to learn from
  each other. While we are interested in qualified applicants who are permanently
  eligible to work for any employer in the United States, we are unable to sponsor
  or transfer sponsorship for employment visas at this time. To all recruitment agencies:
  We do not accept unsolicited agency resumes and are not responsible for any fees
  related to unsolicited resumes.'
