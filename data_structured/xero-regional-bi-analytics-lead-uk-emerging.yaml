company_overview: Xero is small business accounting software that provides a platform
  on which businesses can build a fully integrated solution. It’s designed to make
  life better for people in small business, their advisors, and communities around
  the world. Xero minimises tedious admin by automating routine tasks, delivers valuable
  insights when needed, and brings together business data, trusted advisors, and powerful
  apps in one intuitive platform. By alleviating pain points, Xero empowers small
  business owners to supercharge their business, simplifying the complex and freeing
  up time from manual admin so they can focus on what really matters to build the
  business they’ve always envisaged.
