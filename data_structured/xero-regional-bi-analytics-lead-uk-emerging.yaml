description_html: <p><strong>The role / impact</strong></p><p>As the BI/Analytics
  Lead for the UK region, you will act as a strategic intelligence hub, empowering
  our sales teams to make data-driven decisions at the right time. This is a senior
  individual contributor role where you will join a high-performing function that
  is being built from the ground up, providing direct strategic influence as a trusted
  advisor to regional leadership.</p><p>The role offers a unique balance for a practitioner
  who enjoys both deep technical execution and business partnership. You will be responsible
  for turning complex sales data into clear, actionable guidance that helps our sellers
  and managers identify operational insights to improve performance and transform
  the business.</p><p></p><p><strong>The team / how they connect</strong></p><p>You
  will join the Sales Analytics &amp; Insights team, a global group within Sales Operations
  currently expanding across Australia, New Zealand, the UK, and North America. We
  are a full-stack analytics team that collaborates closely to deliver everything
  from governed data reporting to predictive modelling and experimentation.</p><p></p><p><strong>The
  team is currently working on / Initially, you will focus on</strong></p><ul><li><p>Developing
  and executing a regional analytics roadmap to support strategic decision-making
  and sales performance.</p></li><li><p>Building out a suite of interactive dashboards
  and diagnostic reports using Tableau and other modern BI tools.</p></li><li><p>Innovating
  with our advanced tech stack, which includes Snowflake, DBT, and the integration
  of AI and Data Science.</p></li><li><p>Partnering with senior stakeholders across
  Finance and Product to align competing priorities and drive critical company decisions.</p><p></p></li></ul><b><strong>Where
  and how you can work</strong></b><p>Xero is a Great Place to Work UK accredited.
  This role offers flexible working arrangements, and we support a hybrid model where
  you can balance your time between our modern office spaces and working from home.
  We use boost days to bring our people together for connection and collaboration,
  ensuring you feel supported regardless of where you are located.</p><p></p><p><strong>Here
  are some of the things we are looking for</strong></p><ul><li><p>You possess a mastery
  of SQL for data extraction and manipulation, alongside extensive experience as a
  technical practitioner in a stakeholder-facing role.</p></li><li><p>Your background
  includes a commercial mindset with a deep understanding of SaaS business models
  and sales metrics.</p></li><li><p>You have a proven ability to translate complex
  data into compelling stories that influence both technical and non-technical audiences.</p></li><li><p>Applying
  advanced statistical methodologies and analytics techniques to solve complex business
  problems is something you do with ease.</p></li><li><p>You bring an owner mindset
  to your work, proactively identifying operational debt and advocating for system
  improvements to senior leadership.</p></li><li><p>Sharing knowledge is important
  to you, and you have a demonstrated aptitude for coaching and mentoring peers to
  uplift the overall proficiency of the function.</p><p></p></li></ul><p>Apply even
  if your experience isn't a perfect match! At Xero, we hire based on your skills,
  passion, and the unique perspective you can bring to enhance our culture and team.</p><b></b>
description_text: The role / impact As the BI/Analytics Lead for the UK region, you
  will act as a strategic intelligence hub, empowering our sales teams to make data-driven
  decisions at the right time. This is a senior individual contributor role where
  you will join a high-performing function that is being built from the ground up,
  providing direct strategic influence as a trusted advisor to regional leadership.
  The role offers a unique balance for a practitioner who enjoys both deep technical
  execution and business partnership. You will be responsible for turning complex
  sales data into clear, actionable guidance that helps our sellers and managers identify
  operational insights to improve performance and transform the business. The team
  / how they connect You will join the Sales Analytics &amp; Insights team, a global
  group within Sales Operations currently expanding across Australia, New Zealand,
  the UK, and North America. We are a full-stack analytics team that collaborates
  closely to deliver everything from governed data reporting to predictive modelling
  and experimentation. The team is currently working on / Initially, you will focus
  on Developing and executing a regional analytics roadmap to support strategic decision-making
  and sales performance. Building out a suite of interactive dashboards and diagnostic
  reports using Tableau and other modern BI tools. Innovating with our advanced tech
  stack, which includes Snowflake, DBT, and the integration of AI and Data Science.
  Partnering with senior stakeholders across Finance and Product to align competing
  priorities and drive critical company decisions. Where and how you can work Xero
  is a Great Place to Work UK accredited. This role offers flexible working arrangements,
  and we support a hybrid model where you can balance your time between our modern
  office spaces and working from home. We use boost days to bring our people together
  for connection and collaboration, ensuring you feel supported regardless of where
  you are located. Here are some of the things we are looking for You possess a mastery
  of SQL for data extraction and manipulation, alongside extensive experience as a
  technical practitioner in a stakeholder-facing role. Your background includes a
  commercial mindset with a deep understanding of SaaS business models and sales metrics.
  You have a proven ability to translate complex data into compelling stories that
  influence both technical and non-technical audiences. Applying advanced statistical
  methodologies and analytics techniques to solve complex business problems is something
  you do with ease. You bring an owner mindset to your work, proactively identifying
  operational debt and advocating for system improvements to senior leadership. Sharing
  knowledge is important to you, and you have a demonstrated aptitude for coaching
  and mentoring peers to uplift the overall proficiency of the function. Apply even
  if your experience isn't a perfect match! At Xero, we hire based on your skills,
  passion, and the unique perspective you can bring to enhance our culture and team.
