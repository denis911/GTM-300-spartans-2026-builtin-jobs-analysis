  institutions and individuals to transaction with confidence. We’re building the
  future of identity verification in the United States replacing a clunky, ineffective,
  and expensive status quo with solutions that are 10x faster, smarter, and more accurate.
  We’ve seen tremendous traction and are growing extremely quickly. Our real-time
  APIs have helped verify hundreds of millions of identities, starting with financial
  services and rapidly expanding into new markets. SentiLink is backed by world-class
  investors including Craft Ventures, Andreessen Horowitz, NYCA, and Max Levchin.
  We’ve earned recognition from TechCrunch, CNBC, Bloomberg, Forbes, Business Insider,
  PYMNTS, American Banker, LendIt, and have been named to the Forbes Fintech 50 list
  every year since 2023. Last but not least, we’ve even made history - we were the
  first company to go live with the eCBSV and testified before the United States House
  of Representatives on the future of identity. SentiLink supports a variety of ways
  to work, ranging from fully remote to in-office. We operate as a digital-first company
  with strong collaboration across the U.S. and India. We maintain physical offices
  in Austin, San Francisco, New York City, Seattle, Los Angeles, and Chicago in the
  U.S., and in Gurugram (Delhi) and Bengaluru in India. If you’re located near one
  of these offices, we would love for you to spend time in the office regularly. Some
  roles are hybrid or in-office by design. For example, our engineering team in India
  works primarily from our Gurugram office. Role: SentiLink is hiring its first Go-To-Market
  (GTM) Engineer to sit at the intersection of RevOps, Sales, Partner Success, Marketing,
  Solutions Analytics, Engineering and more. You’ll own the technical backbone of
  our revenue engine: you''ll build systems, workflows, and AI-powered tools to help
  our GTM team move faster and deliver world-class experiences to banks, fintechs,
  and financial institutions. SentiLink has unique insights into the problems our
  prospects and partners care about most. We need someone who can build tools that
  put those insights directly in the hands of our GTM team. Your first project: create
  a system that automatically identifies compelling, data-backed sales hooks and surfaces
  them to reps during outreach, so every conversation leads with something genuinely
  useful. This is a 0→1 role with high visibility, real ownership, and direct impact
  on how SentiLink scales. This is a remote, US-based role. Responsibilities: Design
  and maintain tools and processes to supercharge our GTM engine Connect and build
  the GTM tech stack into a cohesive, scalable system Identify and execute on automation
  opportunities across the full funnel Build tools to uncover and surface opportunities
  for revenue generation Partner with GTM teams Work closely with our revenue organization
  to translate business needs and pain points into clean, scalable solutions Deeply
  understand our GTM motion to proactively identify process and analytics improvements
  Requirements: 4+ years in GTM systems, revenue operations, and/or software/product
  engineering Hands-on experience with CRMs, revenue forecasting, and internal tools
  for non-technical teams Fintech, fraud, identity, or regulated B2B background preferred
  Technical foundation: SQL fluency Salesforce experience preferred Python and/or
  JavaScript fluency preferred Clay Sales Intelligence experience preferred Scrappy
  with AI tooling LLM power user Experience building agents Experimental mindset:
  able to move quickly from idea → prototype → production GTM Experience Experience
  working alongside Sales, Partner Success, and Marketing teams Builder''s mindset
  You thrive in 0→1 environments, take ownership, and iterate quickly with real-world
  feedback Compensation: $130,000 - $160,000/year + equity + benefits Perks: Employer
  paid group health insurance for you and your dependents 401(k) plan with employer
  match (or equivalent for non US-based roles) Flexible paid time off Regular company-wide
  in-person events Home office stipend, and more! Corporate Values: Follow Through
  Deep Understanding Whatever It Takes Do Something Smart'
