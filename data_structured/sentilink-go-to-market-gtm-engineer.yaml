company_overview: SentiLink, the leader in identity verification technology, provides
  financial institutions and fintechs with best-in-class solutions to prevent synthetic
  fraud, identity theft and emerging forms of first-party fraud, as well as compliance-focused
  KYC Insights and access to the eCBSV SSN verification service. Founded in 2017 by
  Naftali Harris and Max Blumenfeld, creators of the risk and fraud systems at online
  lender Affirm, SentiLink has raised $85M to date from investors including Andreessen
  Horowitz, Craft Ventures, and NYCA Partners, among others.
