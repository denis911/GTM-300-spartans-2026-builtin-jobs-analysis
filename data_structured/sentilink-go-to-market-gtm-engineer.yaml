description_html: '<p><u>SentiLink</u> provides innovative identity and risk solutions,
  empowering institutions and individuals to transaction with confidence. We’re building
  the future of identity verification in the United States replacing a clunky, ineffective,
  and expensive status quo with solutions that are 10x faster, smarter, and more accurate.</p><p>We’ve
  seen tremendous traction and are growing extremely quickly. Our real-time APIs have
  helped verify hundreds of millions of identities, starting with financial services
  and rapidly expanding into new markets. SentiLink is backed by world-class investors
  including Craft Ventures, Andreessen Horowitz, NYCA, and Max Levchin.</p><p>We’ve
  earned recognition from TechCrunch, CNBC, Bloomberg, Forbes, Business Insider, PYMNTS,
  American Banker, LendIt, and have been named to the <u>Forbes Fintech 50</u> list
  every year since 2023. Last but not least, we’ve even made history - we were the
  first company to go live with the <u>eCBSV</u> and testified before the <u>United
  States House of Representatives</u> on the future of identity.</p><p>SentiLink supports
  a variety of ways to work, ranging from fully remote to in-office. We operate as
  a digital-first company with strong collaboration across the U.S. and India. We
  maintain physical offices in Austin, San Francisco, New York City, Seattle, Los
  Angeles, and Chicago in the U.S., and in Gurugram (Delhi) and Bengaluru in India.
  If you’re located near one of these offices, we would love for you to spend time
  in the office regularly. Some roles are hybrid or in-office by design. For example,
  our engineering team in India works primarily from our Gurugram office.</p><p></p><b><strong>Role:
  </strong></b><p>SentiLink is hiring its first Go-To-Market (GTM) Engineer to sit
  at the intersection of RevOps, Sales, Partner Success, Marketing, Solutions Analytics,
  Engineering and more. You’ll own the technical backbone of our revenue engine: you''ll
  build systems, workflows, and AI-powered tools to help our GTM team move faster
  and deliver world-class experiences to banks, fintechs, and financial institutions.</p><p>SentiLink
  has unique insights into the problems our prospects and partners care about most.
  We need someone who can build tools that put those insights directly in the hands
  of our GTM team. Your first project: create a system that automatically identifies
  compelling, data-backed sales hooks and surfaces them to reps during outreach, so
  every conversation leads with something genuinely useful.</p><p>This is a 0→1 role
  with high visibility, real ownership, and direct impact on how SentiLink scales.</p><p>This
  is a remote, US-based role.</p><p></p><b><strong>Responsibilities:</strong></b><ul><li><p><strong>Design
  and maintain tools and processes to supercharge our GTM engine</strong></p><ul><li><p>Connect
  and build the GTM tech stack into a cohesive, scalable system</p></li><li><p>Identify
  and execute on automation opportunities across the full funnel</p></li><li><p>Build
  tools to uncover and surface opportunities for revenue generation</p></li></ul></li><li><p><strong>Partner
  with GTM teams</strong></p><ul><li><p>Work closely with our revenue organization
  to translate business needs and pain points into clean, scalable solutions</p></li><li><p>Deeply
  understand our GTM motion to proactively identify process and analytics improvements</p></li></ul></li></ul><b><strong>Requirements:</strong></b><ul><li><p>4+
  years in GTM systems, revenue operations, and/or software/product engineering</p></li><li><p>Hands-on
  experience with CRMs, revenue forecasting, and internal tools for non-technical
  teams</p></li><li><p>Fintech, fraud, identity, or regulated B2B background preferred</p></li><li><p><strong>Technical
  foundation:</strong></p><ul><li><p>SQL fluency</p></li><li><p>Salesforce experience
  preferred</p></li><li><p>Python and/or JavaScript fluency preferred</p></li><li><p>Clay
  Sales Intelligence experience preferred</p></li></ul></li><li><p><strong>Scrappy
  with AI tooling</strong></p><ul><li><p>LLM power user</p></li><li><p>Experience
  building agents</p></li><li><p>Experimental mindset: able to move quickly from idea
  → prototype → production</p></li></ul></li><li><p><strong>GTM Experience</strong></p><ul><li><p>Experience
  working alongside Sales, Partner Success, and Marketing teams</p></li></ul></li><li><p><strong>Builder''s
  mindset</strong></p><ul><li><p>You thrive in 0→1 environments, take ownership, and
  iterate quickly with real-world feedback</p></li></ul></li></ul><b><strong>Compensation:</strong></b><ul><li><p>$130,000
  - $160,000/year + equity + benefits</p><p></p></li></ul><b><strong>Perks:</strong></b><ul><li><p>Employer
  paid group health insurance for you and your dependents</p></li><li><p>401(k) plan
  with employer match (or equivalent for non US-based roles)</p></li><li><p>Flexible
  paid time off</p></li><li><p>Regular company-wide in-person events</p></li><li><p>Home
  office stipend, and more!</p></li></ul><p></p><b><strong>Corporate Values:</strong></b><ul><li><p>Follow
  Through</p></li><li><p>Deep Understanding</p></li><li><p>Whatever It Takes</p></li><li><p>Do
  Something Smart</p></li></ul>'
