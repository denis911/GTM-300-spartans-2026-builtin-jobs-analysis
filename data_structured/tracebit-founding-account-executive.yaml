description_html: '<p>Tracebit is helping some of the world’s best security teams
  at Snyk, Docker, Riot Games and many more to ‘assume breach’ at scale. Tracebit
  detects intrusions in cloud environments using canaries - decoy assets deployed
  to deceive attackers.</p><p>We''re at a massive inflection point and there has never
  been a more exciting time to join us:</p><ul><li><p>We are backed by some of the
  very <strong>best</strong> investors (Accel, Tapestry and more).</p></li><li><p>We
  are growing <strong>very</strong> quickly (we doubled ARR last quarter and will
  triple this year), having recently closed some incredible customers that we can’t
  disclose publicly!</p></li><li><p>We are one of <strong>the</strong> most exciting
  startups to be part of in the UK, have seen some great feedback from the market
  and are ready for explosive growth.</p></li><li><p>Regularly featured on top startup
  lists from industry veterans… Creandum’s <u>Euro Seed top 50 list</u>, Sifted’s
  <u>2025 London Startups To Watch</u>, Notions <u>Cloud Top 100</u>, AlbionVC’s <u>NHI
  Breakdown</u>, MMCs <u>Proactive Security Analysis</u>, Accel’s <u>Euroscape Top
  Startups 2024</u>, etc.</p></li><li><p><u>Our research</u> has recently helped fix
  a P1 security flaw in Google’s Gemini CLI.</p></li><li><p>We''re Seed stage, and
  have grown the company from 2 to 14 people in 18 months,, with <strong>plans to
  triple</strong> this in the coming year.</p></li></ul><p>We have strong traction
  in the US (80% of our customer base and forward-looking business). We''ve done this
  with a small team based in London. We''ve hit product-market fit and it''s time
  to accelerate our growth by building our US sales team in New York.</p><p>Therefore,
  we are searching for a highly driven, emotionally intelligent and energetic individual
  to join Tracebit to help build our GTM practice from the ground up.</p><p>You will
  report to our Founding <u>Sales Lead</u>, who previously spent 5 years at Snyk as
  an early employee during a hyper-growth period from $18M to $300M ARR and 200 to
  1,200 employees. You will also work closely with Tracebit''s Co-Founders, <u>CEO</u>
  and <u>CTO</u>, who were both early employees at Tessian which was sold to Proofpoint
  in 2023.</p><p>This is a unique opportunity to join an early-stage, high-growth
  cybersecurity company, where you''ll have real influence on our business growth
  with the opportunity to expedite your career as Tracebit grows.</p><p></p><b><strong>About
  The Role:</strong></b><p>As our first US-based Account Executives, you''ll be instrumental
  in building our US GTM engine. You''ll work closely with our London-based Founding
  Sales Lead to establish repeatable sales processes while closing your own deals.</p><p><strong>What
  you''ll do:</strong></p><ul><li><p><strong>Close deals with some of the most exciting
  logos globally.</strong> You will own the full sales cycle from discovery through
  to contract signature on key deals into the $50-100k + ARR range, working across
  SMB and Mid-Market companies.</p></li><li><p><strong>Work both inbound and outbound
  opportunities. </strong>Convert warm inbound leads from our growing user base and
  product-led motion. Run targeted outbound campaigns into accounts that match our
  ICP. You’ll own your own business.</p></li><li><p><strong>Help build our sales playbook.
  </strong>We have GTM motions in place, but we want you to help re-write them. You
  will help to design a sales function - refining our discovery questions, demo flow,
  objection handling, and closing tactics.</p></li><li><p><strong>Partner with the
  product and customer success teams. </strong>Provide feedback on what prospects
  share and what would accelerate deals. You’ll learn a lot about the product and
  help shape our roadmap based on market feedback.</p></li><li><p><strong>Represent
  Tracebit at industry events. </strong>Attend key cybersecurity conferences (Black
  Hat, RSA, etc.) to build pipeline and strengthen relationships with prospects.</p></li><li><p><strong>Operate
  with high velocity. </strong>You''ll be managing multiple deals simultaneously,
  moving fast while maintaining deal quality. Expect to run many active opportunities.</p></li></ul><p>This
  is a hands-on closing role in a fast-moving startup. You''ll have autonomy to experiment,
  direct access to founders, and the opportunity to grow at a rapid place.</p><p></p><b><strong>Who
  we''re looking for:</strong></b><ul><li><p><strong>You''ve sold technical products
  before. </strong>3-5 years selling B2B SaaS, ideally in cybersecurity or developer
  tooling. You''ve closed deals in the $50K-100K+ range and know how to navigate technical
  buyers. You don''t need to be an engineer, but you can hold your own in conversations
  with CISOs and security engineers.</p></li><li><p><strong>You can own the full sales
  cycle. </strong>You''ve run deals from the first call to the signed contract. You
  know how to qualify, demo, handle objections, navigate procurement, and close. You''re
  comfortable with both 30-day velocity deals and longer complex sales cycles.</p></li><li><p><strong>You''re
  a builder, not just an executor. </strong>You''ve ideally been an early sales hire
  before (or want to be). You''re excited about figuring things out as you go rather
  than following a prescriptive playbook. You''ll help refine our pitch, messaging,
  and sales process based on what you''re learning in the field.</p></li><li><p><strong>You''re
  hungry and self-sufficient. </strong>You don''t wait for leads to be handed to you.
  You''re comfortable building your own pipeline, working inbound opportunities, and
  finding creative ways to get in front of the right people.</p></li><li><p><strong>You
  thrive in startup environments. </strong>You''re energized by fast iteration, ambiguity,
  and working closely with founders and product teams. You''ve experienced the pace
  of an early-stage company and know it''s not for everyone.</p></li><li><p><strong>The
  right characteristics.</strong> We think the Founding Account Executives at Tracebit
  will succeed by being highly emotionally intelligent, have great hunger and grit,
  demonstrate attention to detail and are hard-working, entrepreneurial individuals.</p></li><li><p><strong>Bonus
  points if: </strong>You were among the first AEs at a startup and/or you''ve sold
  into security or technical teams.</p></li></ul><p></p><b><strong>FAQs</strong></b><p><strong>Where
  is the office?</strong></p><p>We''re setting up our New York office in Manhattan.
  You''ll work closely with our London-based team and eventually other US-based team
  members as we grow.</p><p><strong>Are you doing hybrid/remote?</strong></p><p>Short
  answer: No, but flexible on a day-to-day basis.</p><p>Long answer: We are building
  the company on a foundation of office-based culture. We think we''ll build the best
  company at the fastest pace while having a lot of fun by physically working together
  5 days a week. On a case-by-case basis (leaving early for a holiday, staying home
  for a builder, working remote for a few days to visit family, etc.) we''re very
  reasonable and flexible. We respect that this is not for everyone.</p><p><strong>Can
  you sponsor visas?</strong></p><p>We are not able to sponsor visas for this role.</p>'
description_text: 'Tracebit is helping some of the world’s best security teams at
  Snyk, Docker, Riot Games and many more to ‘assume breach’ at scale. Tracebit detects
  intrusions in cloud environments using canaries - decoy assets deployed to deceive
  attackers. We''re at a massive inflection point and there has never been a more
  exciting time to join us: We are backed by some of the very best investors (Accel,
  Tapestry and more). We are growing very quickly (we doubled ARR last quarter and
  will triple this year), having recently closed some incredible customers that we
  can’t disclose publicly! We are one of the most exciting startups to be part of
  in the UK, have seen some great feedback from the market and are ready for explosive
  growth. Regularly featured on top startup lists from industry veterans… Creandum’s
  Euro Seed top 50 list , Sifted’s 2025 London Startups To Watch , Notions Cloud Top
  100 , AlbionVC’s NHI Breakdown , MMCs Proactive Security Analysis , Accel’s Euroscape
  Top Startups 2024 , etc. Our research has recently helped fix a P1 security flaw
  in Google’s Gemini CLI. We''re Seed stage, and have grown the company from 2 to
  14 people in 18 months,, with plans to triple this in the coming year. We have strong
  traction in the US (80% of our customer base and forward-looking business). We''ve
  done this with a small team based in London. We''ve hit product-market fit and it''s
  time to accelerate our growth by building our US sales team in New York. Therefore,
  we are searching for a highly driven, emotionally intelligent and energetic individual
  to join Tracebit to help build our GTM practice from the ground up. You will report
  to our Founding Sales Lead , who previously spent 5 years at Snyk as an early employee
  during a hyper-growth period from $18M to $300M ARR and 200 to 1,200 employees.
  You will also work closely with Tracebit''s Co-Founders, CEO and CTO , who were
  both early employees at Tessian which was sold to Proofpoint in 2023. This is a
  unique opportunity to join an early-stage, high-growth cybersecurity company, where
  you''ll have real influence on our business growth with the opportunity to expedite
  your career as Tracebit grows. About The Role: As our first US-based Account Executives,
  you''ll be instrumental in building our US GTM engine. You''ll work closely with
  our London-based Founding Sales Lead to establish repeatable sales processes while
  closing your own deals. What you''ll do: Close deals with some of the most exciting
  logos globally. You will own the full sales cycle from discovery through to contract
  signature on key deals into the $50-100k + ARR range, working across SMB and Mid-Market
  companies. Work both inbound and outbound opportunities. Convert warm inbound leads
  from our growing user base and product-led motion. Run targeted outbound campaigns
  into accounts that match our ICP. You’ll own your own business. Help build our sales
  playbook. We have GTM motions in place, but we want you to help re-write them. You
  will help to design a sales function - refining our discovery questions, demo flow,
  objection handling, and closing tactics. Partner with the product and customer success
  teams. Provide feedback on what prospects share and what would accelerate deals.
  You’ll learn a lot about the product and help shape our roadmap based on market
  feedback. Represent Tracebit at industry events. Attend key cybersecurity conferences
  (Black Hat, RSA, etc.) to build pipeline and strengthen relationships with prospects.
  Operate with high velocity. You''ll be managing multiple deals simultaneously, moving
  fast while maintaining deal quality. Expect to run many active opportunities. This
  is a hands-on closing role in a fast-moving startup. You''ll have autonomy to experiment,
  direct access to founders, and the opportunity to grow at a rapid place. Who we''re
  looking for: You''ve sold technical products before. 3-5 years selling B2B SaaS,
  ideally in cybersecurity or developer tooling. You''ve closed deals in the $50K-100K+
  range and know how to navigate technical buyers. You don''t need to be an engineer,
  but you can hold your own in conversations with CISOs and security engineers. You
  can own the full sales cycle. You''ve run deals from the first call to the signed
  contract. You know how to qualify, demo, handle objections, navigate procurement,
  and close. You''re comfortable with both 30-day velocity deals and longer complex
  sales cycles. You''re a builder, not just an executor. You''ve ideally been an early
  sales hire before (or want to be). You''re excited about figuring things out as
  you go rather than following a prescriptive playbook. You''ll help refine our pitch,
  messaging, and sales process based on what you''re learning in the field. You''re
  hungry and self-sufficient. You don''t wait for leads to be handed to you. You''re
  comfortable building your own pipeline, working inbound opportunities, and finding
  creative ways to get in front of the right people. You thrive in startup environments.
  You''re energized by fast iteration, ambiguity, and working closely with founders
  and product teams. You''ve experienced the pace of an early-stage company and know
  it''s not for everyone. The right characteristics. We think the Founding Account
  Executives at Tracebit will succeed by being highly emotionally intelligent, have
  great hunger and grit, demonstrate attention to detail and are hard-working, entrepreneurial
  individuals. Bonus points if: You were among the first AEs at a startup and/or you''ve
  sold into security or technical teams. FAQs Where is the office? We''re setting
  up our New York office in Manhattan. You''ll work closely with our London-based
  team and eventually other US-based team members as we grow. Are you doing hybrid/remote?
  Short answer: No, but flexible on a day-to-day basis. Long answer: We are building
  the company on a foundation of office-based culture. We think we''ll build the best
  company at the fastest pace while having a lot of fun by physically working together
  5 days a week. On a case-by-case basis (leaving early for a holiday, staying home
  for a builder, working remote for a few days to visit family, etc.) we''re very
  reasonable and flexible. We respect that this is not for everyone. Can you sponsor
  visas? We are not able to sponsor visas for this role.'
