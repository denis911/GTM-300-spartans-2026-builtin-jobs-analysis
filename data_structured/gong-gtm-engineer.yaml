description_html: <p><p>Gong harnesses the power of AI to transform how revenue teams
  win. The Gong Revenue AI Operating System unifies data, insights, and workflows
  into a single, trusted system that observes, guides, and acts alongside the world’s
  most successful revenue teams. Powered by the Gong Revenue Graph, AI-powered intelligence,
  specialized agents, and trusted applications, Gong helps more than 5,000 companies
  around the world deeply understand their teams and customers, automate critical
  sales workflows, and close more deals with less effort. For more information, visit
  www.gong.io.</p><p>At Gong, you will join a company built on innovative products,
  ambitious goals, and passionate people. We are shaping the future of revenue intelligence
  and we want people who are excited to build what comes next. You will work with
  a team that dreams big, moves fast, and cares deeply about the craft and about each
  other. Here, transparency and trust are core to how we operate, and every person
  has the opportunity to make a visible impact. If you want to grow, stretch, and
  do work that truly matters, Gong is the place to do the best work of your career.</p></p><p>Gong
  is on the hunt for a <strong>GTM Engineer </strong>to help us build customer-facing
  intelligent workflows, creating an agentic customer journey. In this role, you'll
  be part of a team creating automations that elevate the customer experience by delivering
  timely and relevant information, resources, and calls to action. You will partner
  with various other teams including Outcomes, Customer Success, RevOps, and Product.</p><b>RESPONSIBILITIES</b><p>You
  will own the design and development of automation projects serving our customers.
  Your main responsibilities will include:</p><ul><li><strong>Identifying and Prioritizing
  High-Impact Use Cases:</strong> You will uncover high-leverage opportunities across
  the customer lifecycle and prioritize which automation initiatives to build.</li><li><strong>Designing
  and Implementing End-to-End Workflows:</strong> You will use tools like Workato,
  Retool, LLMs, and Gong to embed AI into customer-facing workflows so the right insight
  or action happens at the right moment, without manual intervention.&nbsp;</li><li><strong>Building
  &amp; Fine-Tuning Solutions:</strong> You will focus on the technical build of AI-driven
  tools, including defining, iterating, and optimizing<strong> </strong>integrations
  with GTM systems, managing data retrieval, and ensuring solutions can handle rapid
  scaling across internal and external users.</li><li><strong>New Feature Integration:</strong>
  You will serve as the technical expert for integrating and testing pre-release and
  new product functionality. Your successful technical builds may become prototypes
  for future core product features.</li><li><strong>Cross-Functional Collaboration:</strong>
  You will partner with stakeholders across the organization to validate technical
  requirements, test prototypes and integrations, and ensure seamless, high-quality
  deployment of automations within the broader Gong ecosystem.</li></ul><b>QUALIFICATIONS</b><ul><li><strong>5+
  years </strong>of hands-on experience in Business Systems, GTM engineering, Data/Analytics
  engineering, Solutions Engineering, or a similar role in high-growth B2B SaaS.</li><li><strong>Automation
  Expertise:</strong> You have a proven track record of building and deploying automations,
  with significant experience using platforms like Workato, n8n, or Retool.</li><li><strong>Passion
  for Technology:&nbsp;</strong>You can evaluate emerging AI and automation technologies
  and determine where they create real business leverage versus noise.</li><li><strong>Systems
  Architecture:</strong> You understand how data moves across complex systems and
  can design solutions that maintain data integrity and system performance.</li><li><strong>Problem-Solving:</strong>
  You are adept at identifying inefficiencies and developing creative, scalable solutions.</li></ul><b>PERKS
  &amp; BENEFITS&nbsp;</b><ul><li>We offer Gongsters a variety of medical, dental,
  and vision plans, designed to fit you and your family’s needs.</li><li>Wellbeing
  Fund - flexible wellness stipend to support a healthy lifestyle.</li><li>Mental
  Health benefits with covered therapy and coaching.</li><li>401(k) program to help
  you invest in your future.</li><li>Education &amp; learning stipend for personal
  growth and development.</li><li>Flexible vacation time to promote a healthy work-life
  blend.</li><li>Paid parental leave to support you and your family.</li><li>Company-wide
  recharge days each quarter.</li><li>Work from home stipend to help you succeed in
  a remote environment.</li></ul><p><strong>The annual salary hiring range for this
  position is $120,000-$183,000 USD.&nbsp; </strong></p><p>Compensation is based on
  factors unique to each candidate, including, but not limited to, job-related skills,
  qualification, education, experience, and location. At Gong, we have a location-based
  compensation structure, which means there may be a different range for candidates
  in other locations. The total compensation package for this position, in addition
  to base compensation, may include incentive compensation, bonus, equity, and benefits.
  Some of our sales compensation programs also offer the potential to achieve above
  targeted earnings for those who exceed their sales targets.&nbsp;</p><p>We are always
  looking for outstanding Gongsters! So if this sounds like something that interests
  you regardless of compensation, please reach out. We may have more roles for you
  to consider and would love to connect.</p><p><strong>We have noticed a rise in recruiting
  impersonations across the industry, where scammers attempt to access candidates'
  personal and financial information through fake interviews and offers. All Gong
  recruiting email communications will always come from the @gong.io domain. Any outreach
  claiming to be from Gong via other sources should be ignored.</strong></p><p><em>Gong
  is an equal-opportunity employer. We believe that diversity is integral to our success,
  and do not discriminate based on race, color, religion, age, sex, sexual orientation,
  gender identity, national origin, disability, military status, genetic information,
  or any other basis protected by applicable law.</em></p><p><em>To review Gong's
  privacy policy, visit https://www.gong.io/gong-io-job-candidates-privacy-notice/
  for more details.</em></p><p><em>#LI-AM1</em></p>
description_text: 'Gong harnesses the power of AI to transform how revenue teams win.
  The Gong Revenue AI Operating System unifies data, insights, and workflows into
  a single, trusted system that observes, guides, and acts alongside the world’s most
  successful revenue teams. Powered by the Gong Revenue Graph, AI-powered intelligence,
  specialized agents, and trusted applications, Gong helps more than 5,000 companies
  around the world deeply understand their teams and customers, automate critical
  sales workflows, and close more deals with less effort. For more information, visit
  www.gong.io. At Gong, you will join a company built on innovative products, ambitious
  goals, and passionate people. We are shaping the future of revenue intelligence
  and we want people who are excited to build what comes next. You will work with
  a team that dreams big, moves fast, and cares deeply about the craft and about each
  other. Here, transparency and trust are core to how we operate, and every person
  has the opportunity to make a visible impact. If you want to grow, stretch, and
  do work that truly matters, Gong is the place to do the best work of your career.
  Gong is on the hunt for a GTM Engineer to help us build customer-facing intelligent
  workflows, creating an agentic customer journey. In this role, you''ll be part of
  a team creating automations that elevate the customer experience by delivering timely
  and relevant information, resources, and calls to action. You will partner with
  various other teams including Outcomes, Customer Success, RevOps, and Product. RESPONSIBILITIES
  You will own the design and development of automation projects serving our customers.
  Your main responsibilities will include: Identifying and Prioritizing High-Impact
  Use Cases: You will uncover high-leverage opportunities across the customer lifecycle
  and prioritize which automation initiatives to build. Designing and Implementing
  End-to-End Workflows: You will use tools like Workato, Retool, LLMs, and Gong to
  embed AI into customer-facing workflows so the right insight or action happens at
  the right moment, without manual intervention.&nbsp; Building &amp; Fine-Tuning
  Solutions: You will focus on the technical build of AI-driven tools, including defining,
  iterating, and optimizing integrations with GTM systems, managing data retrieval,
  and ensuring solutions can handle rapid scaling across internal and external users.
  New Feature Integration: You will serve as the technical expert for integrating
  and testing pre-release and new product functionality. Your successful technical
  builds may become prototypes for future core product features. Cross-Functional
  Collaboration: You will partner with stakeholders across the organization to validate
  technical requirements, test prototypes and integrations, and ensure seamless, high-quality
  deployment of automations within the broader Gong ecosystem. QUALIFICATIONS 5+ years
  of hands-on experience in Business Systems, GTM engineering, Data/Analytics engineering,
  Solutions Engineering, or a similar role in high-growth B2B SaaS. Automation Expertise:
  You have a proven track record of building and deploying automations, with significant
  experience using platforms like Workato, n8n, or Retool. Passion for Technology:&nbsp;
  You can evaluate emerging AI and automation technologies and determine where they
  create real business leverage versus noise. Systems Architecture: You understand
  how data moves across complex systems and can design solutions that maintain data
  integrity and system performance. Problem-Solving: You are adept at identifying
  inefficiencies and developing creative, scalable solutions. PERKS &amp; BENEFITS&nbsp;
  We offer Gongsters a variety of medical, dental, and vision plans, designed to fit
  you and your family’s needs. Wellbeing Fund - flexible wellness stipend to support
  a healthy lifestyle. Mental Health benefits with covered therapy and coaching. 401(k)
  program to help you invest in your future. Education &amp; learning stipend for
  personal growth and development. Flexible vacation time to promote a healthy work-life
  blend. Paid parental leave to support you and your family. Company-wide recharge
  days each quarter. Work from home stipend to help you succeed in a remote environment.
  The annual salary hiring range for this position is $120,000-$183,000 USD.&nbsp;
  Compensation is based on factors unique to each candidate, including, but not limited
  to, job-related skills, qualification, education, experience, and location. At Gong,
  we have a location-based compensation structure, which means there may be a different
  range for candidates in other locations. The total compensation package for this
  position, in addition to base compensation, may include incentive compensation,
  bonus, equity, and benefits. Some of our sales compensation programs also offer
  the potential to achieve above targeted earnings for those who exceed their sales
  targets.&nbsp; We are always looking for outstanding Gongsters! So if this sounds
  like something that interests you regardless of compensation, please reach out.
  We may have more roles for you to consider and would love to connect. We have noticed
  a rise in recruiting impersonations across the industry, where scammers attempt
  to access candidates'' personal and financial information through fake interviews
  and offers. All Gong recruiting email communications will always come from the @gong.io
  domain. Any outreach claiming to be from Gong via other sources should be ignored.
  Gong is an equal-opportunity employer. We believe that diversity is integral to
  our success, and do not discriminate based on race, color, religion, age, sex, sexual
  orientation, gender identity, national origin, disability, military status, genetic
  information, or any other basis protected by applicable law. To review Gong''s privacy
  policy, visit https://www.gong.io/gong-io-job-candidates-privacy-notice/ for more
  details. #LI-AM1'
