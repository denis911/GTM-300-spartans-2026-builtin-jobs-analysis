description_html: '<p><b>Company Overview</b></p><p><br></p><p><span>At Eve, we’re
  redefining what’s possible in legal technology. Our mission is to empower plaintiff
  law firms with AI-driven solutions that elevate how they operate, serve clients,
  and grow.</span></p><p><br></p><p><span>We believe the future of law will be built
  by “AI-Native Law Firms” — firms that are managed, scaled, and optimized by intelligent
  systems rather than manual processes and endless administrative work. Eve’s technology
  augments the capabilities of attorneys across every stage of a case — from intake
  and document review to strategy and settlement — so they can focus on what truly
  matters: achieving the best outcomes for their clients.</span></p><p><br></p><p><span>Our
  vision is simple yet transformative: enable every firm to operate at its highest
  potential through the power of AI.</span></p><p><br></p><p><span><b>Why Join Eve:</b></span></p><p><br></p><p><b><span>Product-market
  fit:</span></b><span> Eve is used by over 550+ law firms, and we’re growing fast.</span></p><p><b><span>Backed
  by top investors:</span></b><span> We’ve raised over $160M from world-class partners
  including Spark Capital, Andreessen Horowitz(A16z), Menlo Ventures, and Lightspeed.</span></p><p><b><span>Built
  by a world-class team: </span></b><span>Engineers, designers, and operators from
  places like Scale, Meta, Airbnb, Cruise, Square, Rubrik, and Lyft are building Eve
  from the ground up.</span></p><p><b><span>AI-Native from day one: </span></b><span>We’re
  on the bleeding edge of AI, collaborating directly with teams at OpenAI and Anthropic
  to build best-in-class AI workflows tailored for legal work.</span></p><p><b>Explosive
  growth:</b><span> We are growing 2X revenue Quarter over Quarter.</span></p><p><br></p><p><b>The
  Role</b></p><p><br></p><p><span>At Eve, you''ll have the opportunity to build and
  scale infrastructure that directly accelerates our growth engine. As our first Go-to-market
  Engineer, you will own and build Eve''s infrastructure that powers our growth engine.
  You''ll bridge the gap between engineering excellence and GTM innovation, creating
  automated systems that transform how we identify, attract, engage, and convert&nbsp;
  prospects. Working at the intersection of data engineering, marketing automation,
  and sales, this role is central to our GTM strategy — building the technical foundation
  that powers personalized, scalable, and measurable marketing operations.</span></p><p><b>What
  You Will Accomplish</b></p><ul><li><b>Optimize the Stack: </b>lead the technical
  integration and optimization of external tools (e.g., Hubspot, Clay, Gong, enrichment
  APIs) into a cohesive, automated engine</li><li><b>Build AI Agents: </b>design and
  deploy agents that optimize account research, reduce manual data entry, and enhance
  outbound personalization using various tools &amp; APIs</li><li><b>Engineer Data
  Flows:</b> build the webhooks and middleware that sync data between our product,
  CRM and other internal systems with 100% integrity</li><li><b>Programmatic GTM:</b>
  partner with leadership to translate sales strategy into automated workflows, custom
  internal tools, and programmatic outbound campaigns</li><li><b>Personalized Internal
  Tools: </b>Design and build custom internal tools and lightweight product surfaces
  that support GTM and revenue operations.<b>&nbsp;</b></li><li><b>Collaborate with
  Marketing, Sales, and Product teams: </b>to translate business requirements into
  technical solutions.</li></ul><p></p><p><b>You Will Thrive In This Role If You Have</b></p><ul><li><b>6+</b>
  years of software engineering experience with expertise full stack engineering experience.</li><li><b>Tooling
  and Process Improvement: </b>Identify complex, manual marketing and sales processes,
  then develop custom tooling to streamline these operations and drive significant
  efficiency gains.&nbsp;</li><li><b>Cross-Functional Partnership:</b> Partner closely
  with Marketing, RevOps, Sales, Product, and Engineering to translate real-world
  workflows into technical solutions. Be the technical point of contact that unblocks
  revenue teams. </li><li><b>Strong proficiency in Python, JavaScript, and SQL. </b>Comfortable&nbsp;
  building web applications, internal tools and integrations.&nbsp;</li><li><b>Proficiency
  with AI tools, LLMs, and AI agents </b>for content generation, data analysis.&nbsp;</li><li><b>Ownership
  and Execution: </b>Full ownership of projects, from initial concept to successful
  delivery, often with minimal supervision. Thrives in uncertain environments, effectively
  prioritizing rapid progress alongside dependable execution.&nbsp;</li><li><b>Communication
  and Collaboration:</b> Clear written and verbal communicator who works effectively
  with technical and non-technical partners across GTM, Revenue Operations, and Product.</li></ul><p></p><p></p><p><span><b>Benefits:</b></span></p><p><br></p><p><span>💰
  Competitive Salary &amp; Equity</span></p><p><span>💹 401(k) Program with Employer
  Matching</span></p><p><span>⚕️ Health, Dental, Vision and Life Insurance</span></p><p><span>🩼
  Short Term and Long Term Disability</span></p><p><span>🚗 Commuter Benefits</span></p><p><span>🧑‍💻
  Autonomous Work Environment</span></p><p><span>🖥️ Office Setup Reimbursement</span></p><p><span>🏝
  Flexible Time Off (FTO) + Holidays</span></p><p><span>🚀 Quarterly Team Gatherings</span></p><p><span>🥪
  In office Perks</span></p><p><br></p><p></p>'
description_text: 'Company Overview At Eve, we’re redefining what’s possible in legal
  technology. Our mission is to empower plaintiff law firms with AI-driven solutions
  that elevate how they operate, serve clients, and grow. We believe the future of
  law will be built by “AI-Native Law Firms” — firms that are managed, scaled, and
  optimized by intelligent systems rather than manual processes and endless administrative
  work. Eve’s technology augments the capabilities of attorneys across every stage
  of a case — from intake and document review to strategy and settlement — so they
  can focus on what truly matters: achieving the best outcomes for their clients.
  Our vision is simple yet transformative: enable every firm to operate at its highest
  potential through the power of AI. Why Join Eve: Product-market fit: Eve is used
  by over 550+ law firms, and we’re growing fast. Backed by top investors: We’ve raised
  over $160M from world-class partners including Spark Capital, Andreessen Horowitz(A16z),
  Menlo Ventures, and Lightspeed. Built by a world-class team: Engineers, designers,
  and operators from places like Scale, Meta, Airbnb, Cruise, Square, Rubrik, and
  Lyft are building Eve from the ground up. AI-Native from day one: We’re on the bleeding
  edge of AI, collaborating directly with teams at OpenAI and Anthropic to build best-in-class
  AI workflows tailored for legal work. Explosive growth: We are growing 2X revenue
  Quarter over Quarter. The Role At Eve, you''ll have the opportunity to build and
  scale infrastructure that directly accelerates our growth engine. As our first Go-to-market
  Engineer, you will own and build Eve''s infrastructure that powers our growth engine.
  You''ll bridge the gap between engineering excellence and GTM innovation, creating
  automated systems that transform how we identify, attract, engage, and convert&nbsp;
  prospects. Working at the intersection of data engineering, marketing automation,
  and sales, this role is central to our GTM strategy — building the technical foundation
  that powers personalized, scalable, and measurable marketing operations. What You
  Will Accomplish Optimize the Stack: lead the technical integration and optimization
  of external tools (e.g., Hubspot, Clay, Gong, enrichment APIs) into a cohesive,
  automated engine Build AI Agents: design and deploy agents that optimize account
  research, reduce manual data entry, and enhance outbound personalization using various
  tools &amp; APIs Engineer Data Flows: build the webhooks and middleware that sync
  data between our product, CRM and other internal systems with 100% integrity Programmatic
  GTM: partner with leadership to translate sales strategy into automated workflows,
  custom internal tools, and programmatic outbound campaigns Personalized Internal
  Tools: Design and build custom internal tools and lightweight product surfaces that
  support GTM and revenue operations. &nbsp; Collaborate with Marketing, Sales, and
  Product teams: to translate business requirements into technical solutions. You
  Will Thrive In This Role If You Have 6+ years of software engineering experience
  with expertise full stack engineering experience. Tooling and Process Improvement:
  Identify complex, manual marketing and sales processes, then develop custom tooling
  to streamline these operations and drive significant efficiency gains.&nbsp; Cross-Functional
  Partnership: Partner closely with Marketing, RevOps, Sales, Product, and Engineering
  to translate real-world workflows into technical solutions. Be the technical point
  of contact that unblocks revenue teams. Strong proficiency in Python, JavaScript,
  and SQL. Comfortable&nbsp; building web applications, internal tools and integrations.&nbsp;
  Proficiency with AI tools, LLMs, and AI agents for content generation, data analysis.&nbsp;
  Ownership and Execution: Full ownership of projects, from initial concept to successful
  delivery, often with minimal supervision. Thrives in uncertain environments, effectively
  prioritizing rapid progress alongside dependable execution.&nbsp; Communication
  and Collaboration: Clear written and verbal communicator who works effectively with
  technical and non-technical partners across GTM, Revenue Operations, and Product.
  Benefits: 💰 Competitive Salary &amp; Equity 💹 401(k) Program with Employer Matching
  ⚕️ Health, Dental, Vision and Life Insurance 🩼 Short Term and Long Term Disability
  🚗 Commuter Benefits 🧑‍💻 Autonomous Work Environment 🖥️ Office Setup Reimbursement
  🏝 Flexible Time Off (FTO) + Holidays 🚀 Quarterly Team Gatherings 🥪 In office Perks'
