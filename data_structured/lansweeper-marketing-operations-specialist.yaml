  preferred.</li><li> Experience with <strong> Marketing Cloud Growth/Next </strong>
  or <strong> Marketing Cloud Account Engagement (Pardot) </strong> .</li><li> Knowledge
  of <strong> data management </strong> , <strong> UTM tracking </strong> , <strong>
  list segmentation </strong> , and <strong> lead attribution </strong> .</li><li>
  Familiarity with <strong> Jira </strong> , <strong> Google Tag Manager </strong>
  , <strong> Google Analytics </strong> , and basic <strong> HTML/CSS </strong> for
  email QA.</li></ul><br><strong> Soft skills: </strong><br><ul><li> Strong organizational
  and <strong> QA mindset </strong> with exceptional attention to detail.</li><li>
  Excellent communication skills and ability to manage multiple stakeholders.</li><li>
  Collaborative, proactive attitude focused on continuous improvement.</li></ul><br><b><strong>
  Our Offer </strong></b><br><ul><li><strong> Competitive salary </strong> aligned
  with industry benchmarks.</li><li><strong> Uncapped commission plan </strong> with
  high earning potential.</li><li><strong> Flexibility in working hours and remote
  work options. </strong></li><li><strong> Comprehensive benefits </strong> and ongoing
  learning opportunities.</li><li><strong> High-impact role </strong> in a global,
  fast-growing SaaS organization.</li><li> Hybrid schedule for Austin-based candidates
  (at least 2 days/week on-site).</li></ul><br><b><strong> Company Info </strong></b><br>Lansweeper
  is the Technology Asset Intelligence platform that transforms raw asset data into
  trusted, actionable insights-spanning hardware, software, cloud, IoT, and OT. <br>With
  a single solution, organizations gain full visibility across their technology estate,
  empowering IT, security, operations and finance teams to make smarter, faster decisions.
  <br>We help our customers: <br><ul><li> Tame hybrid infrastructures</li><li> Manage
  compliance risks</li><li> Reduce complexity by delivering timely, accurate visibility
  and seamless integration into their ecosystems</li></ul><br>From universal asset
  discovery to AI-powered intelligence, Lansweeper delivers clarity and confidence
  to organizations worldwide. <br>Our culture is built on four values: <br><ul><li>
  One Team - united across boundaries</li><li> We Care - customers and people at the
