description_text: 'Context &amp; Impact Lansweeper is growing fast, and our global
  marketing engine needs a skilled Marketing Operations Specialist to ensure consistent,
  high-quality campaign execution and data accuracy. You''ll be the operational backbone
  of marketing - building, QA''ing, and optimizing campaigns across email, forms,
  and automation workflows to keep our engine running smoothly. In your first year,
  your goals will focus on: Driving flawless campaign delivery and data integrity
  across Salesforce and Marketing Cloud. Strengthening lead routing, attribution accuracy,
  and nurture automation performance. Supporting the marketing team''s ability to
  generate qualified pipeline and actionable insights. Challenge The main challenges
  you''ll face are: Ensuring cross-platform data accuracy between Salesforce, Marketing
  Cloud, and reporting dashboards. Managing multiple campaign requests and Jira tickets
  simultaneously without missing SLAs. Continuously improving workflows and QA processes
  for speed, scalability, and precision. Key Responsibilities Build, QA, and launch
  emails, landing pages, and nurture programs across Marketing Cloud Growth/Next or
  Account Engagement (Pardot). Manage event lead imports and routing into Salesforce,
  ensuring correct campaign association, deduplication, and attribution. Own campaign
  data hygiene: maintain UTM standards, validate tracking, and run recurring audits.
  Collaborate with Campaign Managers to execute initiatives on time and within SLA.
  Monitor and resolve sync errors between Salesforce and marketing automation platforms.
  Drive process documentation: maintain naming conventions, SOPs, and QA checklists.
  Report campaign performance and propose continuous improvements. Key Requirements
  Hard skills: Proven experience in B2B Marketing Operations or Campaign Operations.
  Hands-on use of Salesforce CRM (Leads, Campaigns, Reports); Salesforce Associate
  or Admin certification preferred. Experience with Marketing Cloud Growth/Next or
  Marketing Cloud Account Engagement (Pardot) . Knowledge of data management , UTM
  tracking , list segmentation , and lead attribution . Familiarity with Jira , Google
  Tag Manager , Google Analytics , and basic HTML/CSS for email QA. Soft skills: Strong
  organizational and QA mindset with exceptional attention to detail. Excellent communication
  skills and ability to manage multiple stakeholders. Collaborative, proactive attitude
  focused on continuous improvement. Our Offer Competitive salary aligned with industry
  benchmarks. Uncapped commission plan with high earning potential. Flexibility in
  working hours and remote work options. Comprehensive benefits and ongoing learning
  opportunities. High-impact role in a global, fast-growing SaaS organization. Hybrid
  schedule for Austin-based candidates (at least 2 days/week on-site). Company Info
  Lansweeper is the Technology Asset Intelligence platform that transforms raw asset
  data into trusted, actionable insights-spanning hardware, software, cloud, IoT,
  and OT. With a single solution, organizations gain full visibility across their
  technology estate, empowering IT, security, operations and finance teams to make
  smarter, faster decisions. We help our customers: Tame hybrid infrastructures Manage
  compliance risks Reduce complexity by delivering timely, accurate visibility and
  seamless integration into their ecosystems From universal asset discovery to AI-powered
  intelligence, Lansweeper delivers clarity and confidence to organizations worldwide.
  Our culture is built on four values: One Team - united across boundaries We Care
  - customers and people at the center We Grow - learning, sharing, improving We Deliver
  - focusing on what truly matters Team Info You''ll join the Marketing team , reporting
  to the VP Marketing , and collaborating closely with Campaign Managers, RevOps,
  and Sales across North America and Europe. Team size: mid-sized global team based
  in Austin. Call to Action Ready to join us? Click Apply now or share this role with
  someone in your network. US: Diversity Statement - Equal Employment Opportunity
  It is Lansweeper''s policy to provide equal employment opportunity to all applicants
  and employees. Lansweeper disapproves of, and will not tolerate, unlawful discrimination
  against any applicant or employee because of race, color, national origin or ancestry,
  gender (including pregnancy, childbirth, or related medical conditions), gender
  identity, age, religion, disability, family care status, veteran status, marital
  status, sexual orientation, or any other basis protected by local, state, or federal
  laws .'
