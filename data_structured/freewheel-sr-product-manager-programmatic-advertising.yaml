description_html: 'FreeWheel, a Comcast company, provides comprehensive ad platforms
  for publishers, advertisers, and media buyers. Powered by premium video content,
  robust data, and advanced technology, we''re making it easier for buyers and sellers
  to transact across all screens, data types, and sales channels. As a global company,
  we have offices in nine countries and can insert advertisements around the world.<br><b>Job
  Summary</b><br>Responsible for the product management activities of the Freewheel
  Streaming Hub Direct Sales Management team. Primary focus on building programmatic
  ad-decisioning and optimization capabilities, partnering with Data Science to design
  and implement advanced Machine Learning and AI models within FreeWheel''s SSP platform
  Programmatic Module. This role will own a product area within the Direct Sales Management
  of products but will also partners with other Streaming Hub product managers to
  design and implement key features underpinning the Freewheel programmatic strategy
  across several investment areas: Programmatic Module, FW SSP and Marketplace Platform
  (Private and Exchange). Supports the Direct Sales Management team in reaching the
  team objectives and keeps leadership team informed of key developments and issues
  in their areas of responsibilities. Partners with other product team members across
  Freewheel to successfully deliver on dependencies. Responsible for the relationship
  with engineering peers within the Direct Sales Management team.<br><b>Job Description</b><br><b>Core
  Responsibilities</b><br><ul><li>Plans and maintains the overall roadmap, strategy
  and objectives for a product area that focusing on building programmatic ad decisioning
  and optimization capabilities for Programmatic Module.</li><li>Owns coordination
  with other PMs to drive designs across use cases for that product area</li><li>Owns
  the coordination with the engineering teams responsible for delivery of the product
  area</li><li>Owns designs and implementation for key capabilities within the Direct
  Sales Management product suite Programmatic Module area.</li><li>Partners with Go-to-market
  teams for the release of key capabilities within the Direct Sales Management product
  suite Programmatic Module area.</li><li>Applies understanding of internal product
  technologies and is aware of other technologies in programmatic advertising industry.</li><li>Works
  with stakeholders to clearly identify opportunities, outline business cases and
  prioritize features within the Direct Sales Management Programmatic Module roadmap</li><li>Demonstrates
  good project and time management skills, ensures timely delivery of projects, and
  effectively escalates issues</li><li>Consistent exercise of independent judgment
  across areas of ownership</li><li>Regular, consistent and punctual attendance. Must
  be able to work nights and weekends, variable schedule(s) and overtime as necessary</li><li>Other
  duties and responsibilities as assigned.</li></ul><br><b>Employees at all levels
  are expected to:</b><br><ul><li>Understand our Operating Principles; make them the
  guidelines for how you do your job.</li><li>Own the customer experience - think
  and act in ways that put our customers first, give them seamless digital options
  at every touchpoint, and make them promoters of our products and services.</li><li>Know
  your stuff - be enthusiastic learners, users and advocates of our game-changing
  technology, products and services, especially our digital tools and experiences.</li><li>Win
  as a team - make big things happen by working together and being open to new ideas.</li><li>Be
  an active part of the Net Promoter System - a way of working that brings more employee
  and customer feedback into the company - by joining huddles, making call backs and
  helping us elevate opportunities to do better for our customers.</li><li>Drive results
  and growth.</li><li>Support a culture of inclusion in how you work and lead.</li><li>Do
  what''s right for each other, our customers, investors and our communities.</li></ul><br><b>Disclaimer:</b><br><ul><li>This
  information has been designed to indicate the general nature and level of work performed
  by employees in this role. It is not designed to contain or be interpreted as a
  comprehensive inventory of all duties, responsibilities and qualifications.</li></ul><br>Comcast
  is an equal opportunity workplace.  We will consider all qualified applicants for
  employment without regard to race, color, religion, age, sex, sexual orientation,
  gender identity, national origin, disability, veteran status, genetic information,
  or any other basis protected by applicable law.<br><b>Skills:</b><br>Roadmap Management;
  Machine Learning (ML); Programmatic Advertising; Functional Requirements; Cross-Functional
  Collaboration; Agile Methodology<br><b>Salary:</b><br>Primary Location Pay Range:
  $147,741.60 - $221,612.40<br>Comcast intends to offer the selected candidate base
  pay within this range, dependent on job-related, non-discriminatory factors such
  as experience. The application window is 30 days from the date job is posted, unless
  the number of applicants requires it to close sooner or later.<br>Base pay is one
  part of the Total Rewards that Comcast provides to compensate and recognize employees
  for their work. Most sales positions are eligible for a Commission under the terms
  of an applicable plan, while most non-sales positions are eligible for a Bonus.
  Additionally, Comcast provides best-in-class Benefits to eligible employees. We
  believe that benefits should connect you to the support you need when it matters
  most, and should help you care for those who matter most. That?s why we provide
  an array of options, expert guidance and always-on tools, that are personalized
  to meet the needs of your reality ? to help support you physically, financially
  and emotionally through the big milestones and in your everyday life. Please visit
  the  compensation and benefits summary  on our careers site for more details.<br><b>Education</b><br>Bachelor''s
  Degree<br>While possessing the stated degree is preferred, Comcast also may consider
  applicants who hold some combination of coursework and experience, or who have extensive
  related professional experience.<br><b>Relevant Work Experience</b><br>5-7 Years'
