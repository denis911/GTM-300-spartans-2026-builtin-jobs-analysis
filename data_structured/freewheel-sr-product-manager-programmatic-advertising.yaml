  peers within the Direct Sales Management team. Job Description Core Responsibilities
  Plans and maintains the overall roadmap, strategy and objectives for a product area
  that focusing on building programmatic ad decisioning and optimization capabilities
  for Programmatic Module. Owns coordination with other PMs to drive designs across
  use cases for that product area Owns the coordination with the engineering teams
  responsible for delivery of the product area Owns designs and implementation for
  key capabilities within the Direct Sales Management product suite Programmatic Module
  area. Partners with Go-to-market teams for the release of key capabilities within
  the Direct Sales Management product suite Programmatic Module area. Applies understanding
  of internal product technologies and is aware of other technologies in programmatic
  advertising industry. Works with stakeholders to clearly identify opportunities,
  outline business cases and prioritize features within the Direct Sales Management
  Programmatic Module roadmap Demonstrates good project and time management skills,
  ensures timely delivery of projects, and effectively escalates issues Consistent
  exercise of independent judgment across areas of ownership Regular, consistent and
  punctual attendance. Must be able to work nights and weekends, variable schedule(s)
  and overtime as necessary Other duties and responsibilities as assigned. Employees
  at all levels are expected to: Understand our Operating Principles; make them the
  guidelines for how you do your job. Own the customer experience - think and act
  in ways that put our customers first, give them seamless digital options at every
  touchpoint, and make them promoters of our products and services. Know your stuff
  - be enthusiastic learners, users and advocates of our game-changing technology,
  products and services, especially our digital tools and experiences. Win as a team
  - make big things happen by working together and being open to new ideas. Be an
  active part of the Net Promoter System - a way of working that brings more employee
  and customer feedback into the company - by joining huddles, making call backs and
  helping us elevate opportunities to do better for our customers. Drive results and
  growth. Support a culture of inclusion in how you work and lead. Do what''s right
  for each other, our customers, investors and our communities. Disclaimer: This information
  has been designed to indicate the general nature and level of work performed by
  employees in this role. It is not designed to contain or be interpreted as a comprehensive
  inventory of all duties, responsibilities and qualifications. Comcast is an equal
  opportunity workplace. We will consider all qualified applicants for employment
  without regard to race, color, religion, age, sex, sexual orientation, gender identity,
  national origin, disability, veteran status, genetic information, or any other basis
  protected by applicable law. Skills: Roadmap Management; Machine Learning (ML);
  Programmatic Advertising; Functional Requirements; Cross-Functional Collaboration;
  Agile Methodology Salary: Primary Location Pay Range: $147,741.60 - $221,612.40
  Comcast intends to offer the selected candidate base pay within this range, dependent
  on job-related, non-discriminatory factors such as experience. The application window
  is 30 days from the date job is posted, unless the number of applicants requires
  it to close sooner or later. Base pay is one part of the Total Rewards that Comcast
  provides to compensate and recognize employees for their work. Most sales positions
  are eligible for a Commission under the terms of an applicable plan, while most
  non-sales positions are eligible for a Bonus. Additionally, Comcast provides best-in-class
  Benefits to eligible employees. We believe that benefits should connect you to the
  support you need when it matters most, and should help you care for those who matter
  most. That?s why we provide an array of options, expert guidance and always-on tools,
  that are personalized to meet the needs of your reality ? to help support you physically,
  financially and emotionally through the big milestones and in your everyday life.
  Please visit the compensation and benefits summary on our careers site for more
  details. Education Bachelor''s Degree While possessing the stated degree is preferred,
  Comcast also may consider applicants who hold some combination of coursework and
  experience, or who have extensive related professional experience. Relevant Work
  Experience 5-7 Years'
