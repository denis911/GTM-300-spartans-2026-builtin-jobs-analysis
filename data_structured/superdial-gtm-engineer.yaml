description_html: '<p>SuperDial is building AI-powered automation to fix broken workflows
  in healthcare revenue cycle management. We work with fast-growing healthcare organizations
  to eliminate manual processes, accelerate cash flow, and free up teams to focus
  on higher-impact work. We’re early, ambitious, and execution-obsessed.</p><p>We’re
  looking for a GTM Engineer who is equal parts operator and builder. This role owns
  the systems behind our go-to-market motion: CRM architecture, attribution, outbound
  infrastructure, paid acquisition tooling, and the automation layer that ties everything
  together. You’ll turn strategy into reliable workflows, clean data, and measurable
  pipeline.</p><p>You’ll work closely with leadership and sales to build the revenue
  data spine, ship fast, test constantly, and create scalable GTM infrastructure from
  the ground up.</p><p><strong>About the Role</strong></p><p><strong>CRM Architecture
  &amp; Data Hygiene</strong></p><ul><li><p>Own our CRM setup and lifecycle logic
  so reporting reflects reality (not manual fields)</p></li><li><p>Define clear stages
  and handoffs across inbound, outbound, events, partners, and sales</p></li><li><p>Implement
  and maintain CRM hygiene: properties, required fields, routing, and automation</p></li><li><p>Build
  a durable attribution layer (UTMs, source capture, channel normalization) that persists
  across sessions and forms</p></li><li><p>Ensure key funnel milestones can be measured
  and tied to pipeline outcomes</p></li></ul><p><strong>GTM Tooling &amp; Automation</strong></p><ul><li><p>Own
  and manage the GTM tech stack (CRM, enrichment, outbound tools, analytics, paid
  platforms)</p></li><li><p>Build automated workflows across inbound and outbound
  systems using APIs, webhooks, and native integrations</p></li><li><p>Maintain clean
  data, tracking, and dashboards for leadership and sales</p></li><li><p>Create repeatable
  systems so campaigns and programs run with low operational overhead</p></li></ul><p><strong>Outbound
  Infrastructure (Email + LinkedIn)</strong></p><ul><li><p>Own outbound infrastructure
  across Apollo, Clay-powered enrichment workflows, and LinkedIn automation tooling</p></li><li><p>Build
  scalable targeting, segmentation, and personalization workflows</p></li><li><p>Manage
  deliverability and sending health as a core growth lever</p></li><li><p>Continuously
  test new signals, triggers, and automations to improve conversion and meeting quality</p></li></ul><p><strong>Paid
  Acquisition Infrastructure</strong></p><ul><li><p>Own paid acquisition systems end-to-end
  from tracking to reporting</p></li><li><p>Implement conversion instrumentation and
  ensure paid attribution connects to downstream pipeline</p></li><li><p>Build audience
  logic and retargeting tied to lifecycle stage and CRM data</p></li><li><p>Partner
  with creative/resources as needed, but own the performance infrastructure and measurement</p></li></ul><p><strong>Experimentation
  &amp; Performance</strong></p><ul><li><p>Monitor funnel performance across inbound,
  outbound, paid, events, and partner channels</p></li><li><p>Run experiments and
  A/B tests across tracking, routing, targeting, and conversion paths</p></li><li><p>Identify
  bottlenecks and build systems that reduce leakage and improve speed-to-lead</p></li><li><p>Share
  insights clearly with leadership and sales and ship improvements quickly</p></li></ul><p><strong>About
  You</strong></p><ul><li><p>Experience in GTM engineering, technical growth, RevOps,
  or highly technical growth operations</p></li><li><p>Strong hands-on experience
  with HubSpot (or Salesforce) and modern GTM stacks</p></li><li><p>Direct experience
  with outbound tooling and enrichment workflows (Apollo/Clay + related systems)</p></li><li><p>Comfortable
  working with data, attribution, and funnel reporting</p></li><li><p>Familiar with
  APIs, webhooks, and systems integrations (light scripting a plus)</p></li><li><p>Fast
  learner who thrives in ambiguity and likes building from scratch</p></li></ul><p><strong>Bonus
  Points</strong></p><ul><li><p>Experience scaling outbound infrastructure and deliverability</p></li><li><p>Experience
  owning paid acquisition measurement and attribution</p></li><li><p>SQL, Python,
  or strong technical analytics skills</p></li><li><p>Experience in B2B SaaS or healthcare</p></li><li><p>Experience
  supporting sales teams and improving pipeline conversion</p></li></ul><p><strong>Compensation</strong></p><p>Base
  salary for this role is $125,000. We also offer equity and benefits as part of our
  total compensation package. Final offers may vary based on experience and qualifications
  — we’re always open to exceptional talent.</p><p><strong>Why SuperDial?</strong></p><p>Be
  part of a mission-driven team transforming one of the most broken systems in the
  U.S. Work directly with experienced founders and senior operators in AI, healthcare,
  and automation. Join us and help shape the future of AI in healthcare.</p>'
description_text: 'SuperDial is building AI-powered automation to fix broken workflows
  in healthcare revenue cycle management. We work with fast-growing healthcare organizations
  to eliminate manual processes, accelerate cash flow, and free up teams to focus
  on higher-impact work. We’re early, ambitious, and execution-obsessed. We’re looking
  for a GTM Engineer who is equal parts operator and builder. This role owns the systems
  behind our go-to-market motion: CRM architecture, attribution, outbound infrastructure,
  paid acquisition tooling, and the automation layer that ties everything together.
  You’ll turn strategy into reliable workflows, clean data, and measurable pipeline.
  You’ll work closely with leadership and sales to build the revenue data spine, ship
  fast, test constantly, and create scalable GTM infrastructure from the ground up.
  About the Role CRM Architecture &amp; Data Hygiene Own our CRM setup and lifecycle
  logic so reporting reflects reality (not manual fields) Define clear stages and
  handoffs across inbound, outbound, events, partners, and sales Implement and maintain
  CRM hygiene: properties, required fields, routing, and automation Build a durable
  attribution layer (UTMs, source capture, channel normalization) that persists across
  sessions and forms Ensure key funnel milestones can be measured and tied to pipeline
  outcomes GTM Tooling &amp; Automation Own and manage the GTM tech stack (CRM, enrichment,
  outbound tools, analytics, paid platforms) Build automated workflows across inbound
  and outbound systems using APIs, webhooks, and native integrations Maintain clean
  data, tracking, and dashboards for leadership and sales Create repeatable systems
  so campaigns and programs run with low operational overhead Outbound Infrastructure
  (Email + LinkedIn) Own outbound infrastructure across Apollo, Clay-powered enrichment
  workflows, and LinkedIn automation tooling Build scalable targeting, segmentation,
  and personalization workflows Manage deliverability and sending health as a core
  growth lever Continuously test new signals, triggers, and automations to improve
  conversion and meeting quality Paid Acquisition Infrastructure Own paid acquisition
  systems end-to-end from tracking to reporting Implement conversion instrumentation
  and ensure paid attribution connects to downstream pipeline Build audience logic
  and retargeting tied to lifecycle stage and CRM data Partner with creative/resources
  as needed, but own the performance infrastructure and measurement Experimentation
  &amp; Performance Monitor funnel performance across inbound, outbound, paid, events,
  and partner channels Run experiments and A/B tests across tracking, routing, targeting,
  and conversion paths Identify bottlenecks and build systems that reduce leakage
  and improve speed-to-lead Share insights clearly with leadership and sales and ship
  improvements quickly About You Experience in GTM engineering, technical growth,
  RevOps, or highly technical growth operations Strong hands-on experience with HubSpot
  (or Salesforce) and modern GTM stacks Direct experience with outbound tooling and
  enrichment workflows (Apollo/Clay + related systems) Comfortable working with data,
  attribution, and funnel reporting Familiar with APIs, webhooks, and systems integrations
  (light scripting a plus) Fast learner who thrives in ambiguity and likes building
  from scratch Bonus Points Experience scaling outbound infrastructure and deliverability
  Experience owning paid acquisition measurement and attribution SQL, Python, or strong
  technical analytics skills Experience in B2B SaaS or healthcare Experience supporting
  sales teams and improving pipeline conversion Compensation Base salary for this
  role is $125,000. We also offer equity and benefits as part of our total compensation
  package. Final offers may vary based on experience and qualifications — we’re always
  open to exceptional talent. Why SuperDial? Be part of a mission-driven team transforming
  one of the most broken systems in the U.S. Work directly with experienced founders
  and senior operators in AI, healthcare, and automation. Join us and help shape the
  future of AI in healthcare.'
