company_overview: 'The #1 AI-powered, cloud based pre-construction software built
  BY estimators, FOR estimators! Eliminate the most tedious parts of the takeoff process
  by letting AI automatically detect, measure, compare and label project spaces and
  features in seconds, not hours. SAVE TIME: AI-powered technology and machine learning
  lets you complete your takeoff 80% fasterSAVE MONEY: Eliminate costly errors and
  allow team members to focus on value-add tasks (instead of tedious clicking and
  counting)COLLABORATE: Cloud-based collaboration allows multiple team members or
  sub contractors to work on the same takeoff, in real timeANALYZE & COMPARE: Instantly
  analyze any drawing (no matter the file type), plus compare drawing sets and quantify
  changes with a few clicksTALK TO YOUR PLANS WITH AI: Our unique, proprietary "Togal.CHAT"
  technology allows you to "talk" to your plans! (See Togal.CHAT in action on our
  website!)For a personalized demo of the pre-construction software experts are calling
  a "no brainer", head to www.togal.ai'
