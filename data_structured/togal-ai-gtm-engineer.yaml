description_html: <p>We are an innovative technology company providing a cutting-edge,
  AI-powered cloud platform for the construction industry. Created by industry experts
  with deep estimating experience, our software dramatically streamlines the pre-construction
  process. Our solution uses advanced machine learning to automate traditionally time-consuming
  takeoff tasks, helping estimators work up to 80% faster while reducing costly errors.
  </p><p>Our collaborative platform enables real-time teamwork, instant drawing analysis,
  and features a revolutionary conversational AI interface that transforms how professionals
  interact with construction plans. Founded by construction industry veterans, our
  award-winning application automates the takeoff process, enabling estimators to
  analyze blueprints in seconds rather than hours or days.</p><p></p><p>Togal has
  a working outbound engine and an existing GTM engineering function. We’re hiring
  a second GTM Engineer to increase the impact of our revenue systems as we grow Enterprise
  outbound motions and accelerate PLG for SMB.</p><p>This role owns infrastructure,
  <em>and </em>our outbound motion. You will design, harden, and evolve the systems
  that power targeting, activation, routing, and revenue visibility across two distinct
  motions:</p><ul><li><p>Sales-led Enterprise (account-based, signal-driven, multi-threaded,
  long-cycle)</p></li><li><p>PLG (self-serve, persona-driven, high-velocity)</p></li></ul><p>Reporting
  to the Head of Growth, you’ll work alongside our existing GTM Engineer to increase
  the sophistication and leverage of our entire go-to-market stack.</p><p><strong>Your
  Role Will:</strong></p><ul><li><p>Expand and optimize our existing outbound infrastructure
  (CRM data model, signal/activation/intent scoring, differentiated outbound campaigns).</p></li><li><p>Ensure
  reliable end-to-end data synchronization across the GTM stack, maintaining data
  quality and minimizing operational risk through well-managed integrations and data
  pipelines.</p></li><li><p>Design and maintain account-based workflows (segmentation,
  triggers, sequencing, multi-threading).</p></li><li><p>Continuously improve data
  quality, enrichment, and routing logic.</p></li><li><p>Identify opportunities for
  automation, and execute integration of AI into the enterprise sales process, and
  customer success function.<br></p></li></ul><p><strong>Qualifications</strong></p><ul><li><p>3+
  years of GTM engineering, RevOps, or technical growth roles</p></li><li><p>Bachelor’s
  degree in computer science, business, or marketing-related field</p></li><li><p>Great
  knowledge of growth marketing best practices and trends with a B2B focus</p></li><li><p>Technical
  knowledge and experience with these types of platforms:</p><ul><li><p>Strong proficiency
  in Clay is a must</p></li><li><p>CRM (Hubspot)</p></li><li><p>AI and workflow automation
  (Clay, n8n, <u>Make.com</u>, Claude Code)</p></li><li><p>Cold Outbound (<u>Instantly.ai</u>,
  SmartLead, HeyReach, Lemlist)</p></li><li><p>Sales engagement (Gong, Outreach)</p></li><li><p>Enrichment
  and Activation Data Providers (such as Clay, Wiza, IcyPeas, LeadMagic, Navattic,
  <u>Vector.co</u>, Amplitude, AirOps)</p></li><li><p>AI Providers (Gemini, OpenAI,
  Claygent, Codex/Claude Code)</p></li></ul></li><li><p>Hands-on experience designing,
  executing, and scaling outbound GTM campaigns, including list building, enrichment,
  segmentation, routing, and activation across sales and marketing systems.</p></li><li><p>Excellent
  organizational and project management skills</p></li></ul><p></p><p><strong>“Nice
  to Have’s”</strong></p><ul><li><p>Computer Science Degree</p></li><li><p>Knowledge
  of construction technology and/or the construction industry</p></li><li><p>Startup
  experience preferred</p></li><li><p>Experience in a customer-facing role</p></li><li><p>Experience
  with performance marketing/ads management</p></li></ul><p></p><p>We are an equal
  opportunity employer committed to building a diverse team. We welcome applications
  from candidates of all backgrounds who are passionate about using technology to
  transform the construction industry.</p><p><em>Join us in revolutionizing pre-construction
  estimating with the power of AI!</em></p>
