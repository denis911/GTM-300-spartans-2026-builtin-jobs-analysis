description_html: '<b><strong>About Us</strong></b><p>PandaDoc helps teams close deals
  faster by transforming how they create, manage, and sign documents. In a world of
  fragmented tools and manual workflows, PandaDoc brings proposals, contracts, quotes,
  payments, and eSignatures into one powerful platform—deeply integrated with the
  systems revenue teams rely on every day.</p><p>Trusted by tens of thousands of growing
  companies and large organizations alike, PandaDoc is chosen for its flexibility,
  automation, and ability to streamline revenue operations while saving teams time
  and reducing friction across the sales lifecycle.</p><p>In-person collaboration
  is an important part of PandaDoc’s culture. We require team members to work from
  our offices on Mondays and Thursdays, our designated Anchor Days. Certain teams
  or positions may require additional in-office workdays.</p><b><strong>About The
  Team</strong></b><p>The RevTech team at PandaDoc owns Salesforce (and the entire
  GTM Tech Stack)&nbsp; as the central nervous system for our revenue engine. We design,
  build, and operate the systems that power how PandaDoc sells, markets, and supports
  customers—using Salesforce as the source of truth and orchestration layer across
  our entire GTM stack.</p><p>This team blends deep Salesforce expertise with strong
  systems thinking across RevOps. We work closely with Operations, Sales, Marketing,
  Customer Success, Finance, and Engineering to remove friction, automate manual work,
  and ensure our revenue teams can operate at scale.</p><b><strong>About The Role</strong></b><p>This
  is a <strong>Salesforce-first/GTM Systems role</strong>. You will own and evolve
  Salesforce as the backbone of PandaDoc’s go-to-market operations, designing scalable
  data models, automation, and integrations that support our entire revenue lifecycle.</p><p>You
  will build AI-powered workflows and deeply connected systems across Salesforce,
  PandaDoc, and the broader GTM ecosystem. This role blends hands-on Salesforce administration
  and development with systems design and experimentation. You will identify friction
  across the funnel, architect durable solutions, and ship tools that make every seller
  faster and every customer interaction smarter.</p><b><strong>What You’ll Achieve</strong></b><ul><li>Own
  Salesforce as the primary GTM platform, including data architecture, automation,
  permissions, workflows.</li><li>Design and maintain complex Salesforce automations
  using Flows, validation rules, and programmatic solutions where appropriate.</li><li>Build
  AI-powered workflows for lead and account routing, scoring, enrichment, personalization,
  and prioritization—anchored in Salesforce.</li><li>Integrate Salesforce with PandaDoc
  and the broader GTM stack, including Clay, ZoomInfo, LeanData, Chili Piper, Actively
  AI, SalesLoft, Outreach, and related tools.</li><li>Turn ambiguous business problems
  into clear Salesforce system designs, experiments, and implementation plans.</li></ul><br><b><strong>Skills
  You’ll Need to Bring</strong></b><b><strong>Salesforce-first GTM systems experience
  (5+ years)</strong></b><p>You have deep, hands-on experience administering and building
  in Salesforce within a GTM context. You’ve owned Salesforce orgs or major functional
  areas and understand how design decisions impact seller experience, data quality,
  and downstream automation. Experience supporting Sales, Marketing, Customer Success,
  or Revenue Operations teams is required.</p><b><strong>Strong Salesforce administration
  and development skills</strong></b><p>You are comfortable designing data models,
  building Flows, managing permissions, and creating reports and dashboards. You enjoy
  building in Salesforce and may have experience with Apex, Lightning components,
  or other advanced customization.</p><b><strong>GTM systems and toolchain fluency</strong></b><p>You’ve
  worked across a modern GTM stack and understand how Salesforce orchestrates tools
  like LeanData, Chili Piper, Actively AI, SalesLoft, Outreach, enrichment providers,
  and marketing platforms. You know how to evaluate, implement, and scale GTM tools
  without creating unnecessary complexity.</p><b><strong>AI-aware systems thinking</strong></b><p>You
  understand how AI and automation can improve routing, scoring, forecasting, personalization,
  and overall GTM efficiency. You think holistically about how data flows through
  Salesforce and downstream systems, and how automation can remove friction while
  maintaining trust and explainability.</p><b><strong>Technical fluency with data
  and integrations</strong></b><p>Bonus: You’re comfortable writing APEX and SQL,
  working with REST APIs, and building or maintaining integrations that move data
  reliably into and out of Salesforce. You understand data governance, schemas, and
  system boundaries.</p><b><strong>Clear, empathetic communication and collaboration</strong></b><p>You
  communicate clearly whether documenting Salesforce architecture, explaining tradeoffs
  to stakeholders, or partnering with non-technical teams. You enjoy working closely
  with Sales, Marketing, Customer Success, Finance, and Engineering and elevate the
  quality of decision-making across the org.</p><b><strong>Bonus Points</strong></b><ul><li>Salesforce
  certifications (Administrator, Advanced Administrator, Platform App Builder, or
  Developer).<br>Experience building or maintaining complex routing and attribution
  logic at scale.</li><li>Experience supporting high-growth B2B SaaS GTM teams.</li></ul><p>A
  strong opinion about what <em>good</em> Salesforce feels like for sellers—and the
  ability to build toward it.<br></p><b><strong>The annual OTE is up to 135k OTE</strong></b><br><b><strong>Company
  Overview: </strong></b><p>PandaDoc empowers more than 60,000 growing organizations
  to thrive by taking the work out of document workflow. PandaDoc provides an all-in-one
  document workflow automation platform that helps fast scaling teams accelerate the
  ability to create, manage, and sign digital documents including proposals, quotes,
  contracts, and more.&nbsp; For more information, please visit https://www.pandadoc.com&nbsp;</p><b><strong>Company
  Culture:</strong></b><p>We''re known for our work-life balance, kind co-workers,
  &amp; creative virtual team-bonding events. And although our Pandas are located
  across the globe, we stay connected with the help of technology and ensure that
  everyone on our team feels, well, like a team.</p><p>Pandas work best when they''re
  happy. We retain our talent by upholding our values of integrity &amp; transparency,
  and selling a product that changes the lives of our customers.&nbsp;</p><p>Check
  out our LinkedIn to learn more.</p><b><strong>Benefits:</strong></b><p>Employees
  may be able to purchase company stock (or receive annual bonuses)<br>Employees (and
  their families) may enroll in the company''s medical, dental, vision, short &amp;
  long term disability, life insurance, FSA and 401k plans. Employees will also receive
  13.34+ hours of paid time off per month, 6 self care days, birthday PTO day, and
  12 company paid holidays off per year.</p><br><p><strong>PandaDoc is an Equal Opportunity
  Employer.</strong> We are committed to equal treatment of all employees without
  regard to race, national origin, religion, gender, age, sexual orientation, veteran
  status, physical or mental disability or other basis protected by law.</p><br><p><strong>Application
  Deadline: 2/27/2026</strong></p>'
