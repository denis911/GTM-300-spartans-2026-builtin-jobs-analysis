  marketing operations, or performance marketing. Hands-on experience with AI or automation
  tools in a marketing context (e.g., ChatGPT, Claude, Jasper, Zapier). Proficiency
  with digital marketing tools: Google Ads, GA4, SEO platforms (Ahrefs, SEMrush),
  and CMS platforms Strong understanding of SEO, paid media, analytics, and content
  workflows. Ability to synthesize complex data into clear, actionable strategies.
  Curiosity, adaptability, and a strong interest in emerging technologies. This role
  is based out of our Boston office 2/3 days a week, So please only apply if this
  location is a&nbsp; suitable commute Preferred (Nice to Have): Experience with prompt
  engineering or training AI models for marketing purposes. Background in marketing
  automation platforms (e.g., HubSpot, Marketo). &nbsp; Additional Information What
  We Offer: Competitive compensation, including Restricted Stock Units&nbsp; Employee
  Stock Purchase Plan (ESPP) Flying Start - Our immersive Global Induction Program&nbsp;
  Work with brilliant people that will keep you on your toes, learn more about their
  journeys by checking out #InsideFlywire on social media Dynamic &amp; Global Team
  (we have been collaborating virtually for years!) Wellbeing Programs (Mental Health,
  Wellness) with Global FlyMates&nbsp; Be a meaningful part in our success - every
  FlyMate makes an impact Competitive time off including FlyBetter Days to volunteer
  in a cause you believe in and Digital Disconnect Days! Great Talent &amp; Development
  Programs Submit today and get started! We are excited to get to know you! Throughout
  our process you can expect to meet with different FlyMates including the Hiring
  Manager, Peers on the team, the VP of the department, and a skills assessment. Your
  Talent Acquisition Partner will walk you through the steps and be your “go-to” person
  for any questions. Flywire is an equal opportunity employer. With over 30 nationalities
  across 12 different offices, and diversity and inclusion at the core of our people
  agenda, we believe our FlyMates are our greatest asset, and we’re excited to watch
  our unique culture evolve with each new hire. Flywire is an equal opportunity employer.
  The US base salary range for this full-time position is $ 70,000-$95,000 plus commission,
  restricted stock units and benefits. Our salary ranges are determined by role, position
  level, and location. The range displayed on this job posting reflects the minimum
  and maximum target for new hire salaries for the position across all US locations.
  Within the range, individual pay is determined by work location and several other
  factors, including job-related skills, experience, relevant education and training.&nbsp;
