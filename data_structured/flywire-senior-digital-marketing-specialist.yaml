description_html: '<b>Company Description</b><p></p><p><strong>Are you ready to trade
  your job for a journey? Become a FlyMate!</strong></p><p>Passion, excitement &amp;
  global collaboration are all core to what it means to be a FlyMate. At Flywire,
  we’re on a mission to deliver the world’s most important and complex payments. We
  use our Flywire Advantage - the combination of our next-gen payments platform, proprietary
  payment network and vertical specific software, to help our clients get paid, and
  help their customers pay with ease - no matter where they are in the world.</p><p>What
  more do we need to truly be unstoppable? Perhaps, that is you!&nbsp;</p><p><strong>Who
  we are:&nbsp;</strong><br>Flywire is a global payments enablement and software company,
  founded more than a decade ago to solve high-stakes, high-value payments in higher
  education. We’ve since scaled into new regions and industry verticals and expanded
  our product offerings to deliver meaningful value to our clients around the world.&nbsp;</p><p>Today
  we support more than 4,800 clients across the global education, healthcare, travel
  &amp; B2B industries, with diverse payment methods across 240 countries &amp; territories
  and more than 140 currencies.</p><p>With over 1,200 global FlyMates, representing
  more than 40 nationalities, and in 12 offices world-wide, we’re looking for FlyMates
  to join the next stage of our journey as we continue to grow.<br>&nbsp;</p><p></p><b>Job
  Description</b><p></p><p><strong>The Opportunity</strong></p><p>We’re looking for
  a forward-thinking and tech-savvy Senior Digital Marketing Specialist to lead the
  execution and optimization of digital campaigns, web content, and performance marketing
  — while also identifying and integrating AI technologies to drive efficiency, personalization,
  and growth. This role blends digital marketing expertise with a passion for innovation,
  automation, and data-driven decision-making.</p><p><strong>Key Responsibilities:</strong><br><strong>Digital
  Campaigns &amp; Execution</strong></p><ul><li>Plan, launch, and manage digital marketing
  campaigns across paid, owned, and earned channels.</li><li>Own the setup and performance
  of paid media campaigns (Google Ads, LinkedIn, etc.), including targeting, messaging,
  optimizations and reporting; evaluate and test new channels</li><li>Collaborate
  with vertical teams to strategize on relevant audiences, messaging, and goals</li></ul><p><strong>Website
  &amp; SEO/GEO Management</strong></p><ul><li>Manage website content publishing and
  optimization using our CMS platform and A/B testing tools (Optimizely)&nbsp;</li><li>Conduct
  regular SEO/GEO audits (technical and on-page) and implement enhancements</li><li>Optimize
  site structure, metadata, and content for both user experience and search visibility
  (SEO and GEO).</li></ul><p><strong>AI Integration &amp; Process Innovation</strong></p><ul><li>Research,
  evaluate, and implement AI tools across marketing workflows (e.g., content generation,
  ad optimization, segmentation, analytics).</li><li>Build and maintain AI-assisted
  automations to improve campaign delivery, reporting, and personalization.</li><li>Collaborate
  with cross-functional teams to test AI solutions in real-world marketing processes
  and scale successful implementations.</li></ul><p><strong>Data Analysis &amp; Reporting</strong></p><ul><li>Analyze
  campaign performance and web analytics to generate actionable insights.</li><li>Build
  dashboards and regular reports using tools like Google Analytics 4, Looker Studio,
  and AI-driven analytics platforms.</li><li>Measure impact of AI initiatives on marketing
  KPIs and business outcomes.<br>&nbsp;</li></ul><p></p><b>Qualifications</b><p></p><p><strong>What
  we are looking for</strong></p><ul><li>4–6 years of experience in digital marketing,
  marketing operations, or performance marketing.</li><li>Hands-on experience with
  AI or automation tools in a marketing context (e.g., ChatGPT, Claude, Jasper, Zapier).</li><li>Proficiency
  with digital marketing tools: Google Ads, GA4, SEO platforms (Ahrefs, SEMrush),
  and CMS platforms</li><li>Strong understanding of SEO, paid media, analytics, and
  content workflows.</li><li>Ability to synthesize complex data into clear, actionable
  strategies.</li><li>Curiosity, adaptability, and a strong interest in emerging technologies.</li><li>This
  role is based out of our Boston office 2/3 days a week, So please only apply if
  this location is a&nbsp; suitable commute</li></ul><p><strong>Preferred (Nice to
  Have):</strong></p><ul><li>Experience with prompt engineering or training AI models
  for marketing purposes.</li><li>Background in marketing automation platforms (e.g.,
  HubSpot, Marketo).<br>&nbsp;</li></ul><p></p><b>Additional Information</b><p></p><p><strong>What
  We Offer:</strong></p><ul><li>Competitive compensation, including Restricted Stock
  Units&nbsp;</li><li>Employee Stock Purchase Plan (ESPP)</li><li>Flying Start - Our
  immersive Global Induction Program&nbsp;</li><li>Work with brilliant people that
  will keep you on your toes, learn more about their journeys by checking out #InsideFlywire
  on social media</li><li>Dynamic &amp; Global Team (we have been collaborating virtually
  for years!)</li><li>Wellbeing Programs (Mental Health, Wellness) with Global FlyMates&nbsp;</li><li>Be
  a meaningful part in our success - every FlyMate makes an impact</li><li>Competitive
  time off including FlyBetter Days to volunteer in a cause you believe in and Digital
  Disconnect Days!</li><li>Great Talent &amp; Development Programs</li></ul><p><strong>Submit
  today and get started!</strong></p><p>We are excited to get to know you! Throughout
  our process you can expect to meet with different FlyMates including the Hiring
  Manager, Peers on the team, the VP of the department, and a skills assessment. Your
  Talent Acquisition Partner will walk you through the steps and be your “go-to” person
  for any questions.</p><p>Flywire is an equal opportunity employer. With over 30
  nationalities across 12 different offices, and diversity and inclusion at the core
  of our people agenda, we believe our FlyMates are our greatest asset, and we’re
  excited to watch our unique culture evolve with each new hire.</p><p>Flywire is
  an equal opportunity employer.</p><p>The US base salary range for this full-time
  position is $ 70,000-$95,000 plus commission, restricted stock units and benefits.
  Our salary ranges are determined by role, position level, and location. The range
  displayed on this job posting reflects the minimum and maximum target for new hire
  salaries for the position across all US locations. Within the range, individual
  pay is determined by work location and several other factors, including job-related
  skills, experience, relevant education and training.&nbsp;</p><p>#LI-hybrid</p><p></p>'
