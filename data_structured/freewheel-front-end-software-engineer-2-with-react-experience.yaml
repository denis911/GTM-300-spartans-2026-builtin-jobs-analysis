description_html: 'FreeWheel, a Comcast company, provides comprehensive ad platforms
  for publishers, advertisers, and media buyers. Powered by premium video content,
  robust data, and advanced technology, we''re making it easier for buyers and sellers
  to transact across all screens, data types, and sales channels. As a global company,
  we have offices in nine countries and can insert advertisements around the world.<br><b>Job
  Summary</b><br>Are you passionate about building fast, intuitive, and beautiful
  web applications? Join FreeWheel as a Frontend Engineer, where you''ll play a key
  role in creating seamless and high-performing user experiences for our industry-leading
  enterprise products. In this role, you''ll work closely with experienced engineers,
  product managers, and designers to build features for our enterprise web applications.
  You''ll contribute to user-facing functionality that helps our customers transact
  across screens, data types, and sales channels - all while gaining hands-on experience
  in the fast-paced world of video advertising technology.<br><b>Job Description</b><br><b>What
  You''ll Do</b><br><ul><li>Work with senior developers, product managers, and designers
  to help build user-friendly web interfaces.</li><li>Write clean, maintainable code
  using React, TypeScript, and other modern frontend tools.</li><li>Assist in developing
  and improving frontend features for our enterprise applications.</li><li>Participate
  in code reviews and learn best practices for building high-quality software.</li><li>Help
  test and debug your own code and support QA in identifying and fixing issues.</li><li>Contribute
  to the development of shared UI components and design systems.</li><li>Learn how
  to integrate frontend features with backend APIs.</li><li>Stay current on industry
  trends and emerging technologies.</li><li>Take ownership of smaller tasks and features
  with support and guidance from more experienced team members.</li></ul><br><b>What
  you bring</b><br><ul><li>1+ years of professional experience building production-grade
  web applications.</li><li>Experience with React, TypeScript, and modern web development
  practices.</li><li>Strong user empathy and product-focused mindset</li><li>Experience
  working within cross-functional teams in agile environments.</li><li>Excellent communication
  and collaboration skills.</li><li>Familiarity with design systems and component-driven
  development.</li></ul><br>Core Responsibilities<br>Review and understand requirements.<br>Develop
  and debug application code using modern web or mobile or streaming media programming
  languages and frameworks. Implementation of features.<br>Use applicable unit testing
  frameworks to ensure code quality and adequate test coverage.<br>Apply thoughtful
  consideration to security, accessibility, privacy, and performance during development.<br>Establish
  logging, monitoring and alerting solutions.<br>Analyze production data to ensure
  front-ends are optimized for speed, scalability, performance, and security.<br>Work
  with operations team to troubleshoot and resolve production issues.<br>Ensure applications
  are resilient and highly available.<br>Keep current with technological developments
  within the industry.<br>Ensure application compatibility with upcoming hardware
  and software updates.<br>Review literature, patents and current practices relevant
  to the solution of assigned projects.<br>Adhere to company guidelines around security,
  accessibility, and privacy.<br>Work independently on features while also participating
  in architecture and solution design.<br>Consistent exercise of independent judgment
  and discretion in matters of significance.<br>Regular, consistent and punctual attendance.
  Must be able to work nights and weekends, variable schedule(s) as necessary.<br>Other
  duties and responsibilities as assigned.<br>Employees at all levels are expected
  to:<br>Understand our Operating Principles; make them the guidelines for how you
  do your job.<br>Own the customer experience - think and act in ways that put our
  customers first, give them seamless digital options at every touchpoint, and make
  them promoters of our products and services.<br>Know your stuff - be enthusiastic
  learners, users and advocates of our game-changing technology, products and services,
  especially our digital tools and experiences.<br>Win as a team - make big things
  happen by working together and being open to new ideas.<br>Be an active part of
  the Net Promoter System - a way of working that brings more employee and customer
  feedback into the company - by joining huddles, making call backs and helping us
  elevate opportunities to do better for our customers.<br>Drive results and growth.<br>Support
  a culture of inclusion in how you work and lead.<br>Do what''s right for each other,
  our customers, investors and our communities.<br>Disclaimer:<br>This information
  has been designed to indicate the general nature and level of work performed by
  employees in this role. It is not designed to contain or be interpreted as a comprehensive
  inventory of all duties, responsibilities and qualifications.<br>Comcast is an equal
  opportunity workplace.  We will consider all qualified applicants for employment
  without regard to race, color, religion, age, sex, sexual orientation, gender identity,
  national origin, disability, veteran status, genetic information, or any other basis
  protected by applicable law.<br><b>Skills:</b><br>JavaScript; Troubleshooting; React.js<br><b>Salary:</b><br>Primary
  Location Pay Range: $93,022.91 - $139,534.36<br>Comcast intends to offer the selected
  candidate base pay within this range, dependent on job-related, non-discriminatory
  factors such as experience. The application window is 30 days from the date job
  is posted, unless the number of applicants requires it to close sooner or later.<br>Base
  pay is one part of the Total Rewards that Comcast provides to compensate and recognize
  employees for their work. Most sales positions are eligible for a Commission under
  the terms of an applicable plan, while most non-sales positions are eligible for
  a Bonus. Additionally, Comcast provides best-in-class Benefits to eligible employees.
  We believe that benefits should connect you to the support you need when it matters
  most, and should help you care for those who matter most. That?s why we provide
  an array of options, expert guidance and always-on tools, that are personalized
  to meet the needs of your reality ? to help support you physically, financially
  and emotionally through the big milestones and in your everyday life. Please visit
  the  compensation and benefits summary  on our careers site for more details.<br><b>Education</b><br>Bachelor''s
  Degree<br>While possessing the stated degree is preferred, Comcast also may consider
  applicants who hold some combination of coursework and experience, or who have extensive
  related professional experience.<br><b>Relevant Work Experience</b><br>2-5 Years'
description_text: 'FreeWheel, a Comcast company, provides comprehensive ad platforms
  for publishers, advertisers, and media buyers. Powered by premium video content,
  robust data, and advanced technology, we''re making it easier for buyers and sellers
  to transact across all screens, data types, and sales channels. As a global company,
  we have offices in nine countries and can insert advertisements around the world.
  Job Summary Are you passionate about building fast, intuitive, and beautiful web
  applications? Join FreeWheel as a Frontend Engineer, where you''ll play a key role
  in creating seamless and high-performing user experiences for our industry-leading
  enterprise products. In this role, you''ll work closely with experienced engineers,
  product managers, and designers to build features for our enterprise web applications.
  You''ll contribute to user-facing functionality that helps our customers transact
  across screens, data types, and sales channels - all while gaining hands-on experience
  in the fast-paced world of video advertising technology. Job Description What You''ll
  Do Work with senior developers, product managers, and designers to help build user-friendly
  web interfaces. Write clean, maintainable code using React, TypeScript, and other
  modern frontend tools. Assist in developing and improving frontend features for
  our enterprise applications. Participate in code reviews and learn best practices
  for building high-quality software. Help test and debug your own code and support
  QA in identifying and fixing issues. Contribute to the development of shared UI
  components and design systems. Learn how to integrate frontend features with backend
  APIs. Stay current on industry trends and emerging technologies. Take ownership
  of smaller tasks and features with support and guidance from more experienced team
  members. What you bring 1+ years of professional experience building production-grade
  web applications. Experience with React, TypeScript, and modern web development
  practices. Strong user empathy and product-focused mindset Experience working within
  cross-functional teams in agile environments. Excellent communication and collaboration
  skills. Familiarity with design systems and component-driven development. Core Responsibilities
  Review and understand requirements. Develop and debug application code using modern
  web or mobile or streaming media programming languages and frameworks. Implementation
  of features. Use applicable unit testing frameworks to ensure code quality and adequate
  test coverage. Apply thoughtful consideration to security, accessibility, privacy,
  and performance during development. Establish logging, monitoring and alerting solutions.
  Analyze production data to ensure front-ends are optimized for speed, scalability,
  performance, and security. Work with operations team to troubleshoot and resolve
  production issues. Ensure applications are resilient and highly available. Keep
  current with technological developments within the industry. Ensure application
  compatibility with upcoming hardware and software updates. Review literature, patents
  and current practices relevant to the solution of assigned projects. Adhere to company
  guidelines around security, accessibility, and privacy. Work independently on features
  while also participating in architecture and solution design. Consistent exercise
  of independent judgment and discretion in matters of significance. Regular, consistent
  and punctual attendance. Must be able to work nights and weekends, variable schedule(s)
  as necessary. Other duties and responsibilities as assigned. Employees at all levels
  are expected to: Understand our Operating Principles; make them the guidelines for
  how you do your job. Own the customer experience - think and act in ways that put
  our customers first, give them seamless digital options at every touchpoint, and
  make them promoters of our products and services. Know your stuff - be enthusiastic
  learners, users and advocates of our game-changing technology, products and services,
  especially our digital tools and experiences. Win as a team - make big things happen
  by working together and being open to new ideas. Be an active part of the Net Promoter
  System - a way of working that brings more employee and customer feedback into the
  company - by joining huddles, making call backs and helping us elevate opportunities
  to do better for our customers. Drive results and growth. Support a culture of inclusion
  in how you work and lead. Do what''s right for each other, our customers, investors
  and our communities. Disclaimer: This information has been designed to indicate
  the general nature and level of work performed by employees in this role. It is
  not designed to contain or be interpreted as a comprehensive inventory of all duties,
  responsibilities and qualifications. Comcast is an equal opportunity workplace.
  We will consider all qualified applicants for employment without regard to race,
  color, religion, age, sex, sexual orientation, gender identity, national origin,
  disability, veteran status, genetic information, or any other basis protected by
  applicable law. Skills: JavaScript; Troubleshooting; React.js Salary: Primary Location
  Pay Range: $93,022.91 - $139,534.36 Comcast intends to offer the selected candidate
  base pay within this range, dependent on job-related, non-discriminatory factors
  such as experience. The application window is 30 days from the date job is posted,
  unless the number of applicants requires it to close sooner or later. Base pay is
  one part of the Total Rewards that Comcast provides to compensate and recognize
  employees for their work. Most sales positions are eligible for a Commission under
  the terms of an applicable plan, while most non-sales positions are eligible for
  a Bonus. Additionally, Comcast provides best-in-class Benefits to eligible employees.
  We believe that benefits should connect you to the support you need when it matters
  most, and should help you care for those who matter most. That?s why we provide
  an array of options, expert guidance and always-on tools, that are personalized
  to meet the needs of your reality ? to help support you physically, financially
  and emotionally through the big milestones and in your everyday life. Please visit
  the compensation and benefits summary on our careers site for more details. Education
  Bachelor''s Degree While possessing the stated degree is preferred, Comcast also
  may consider applicants who hold some combination of coursework and experience,
  or who have extensive related professional experience. Relevant Work Experience
  2-5 Years'
