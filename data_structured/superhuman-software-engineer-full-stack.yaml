description_html: '<p><em>Superhuman offers a dynamic hybrid working model for this
  role. This flexible approach gives team members the best of both worlds: plenty
  of focus time along with in-person collaboration that helps foster trust, innovation,
  and a strong team culture. &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;<br></em></p><b><strong>About
  Superhuman</strong></b><p>Grammarly is now part of Superhuman, the AI productivity
  platform on a mission to unlock the superhuman potential in everyone. The Superhuman
  suite of apps and agents brings AI wherever people work, integrating with over 1
  million applications and websites. The company’s products include Grammarly’s writing
  assistance, Coda’s collaborative workspaces, Mail’s inbox management, and Go, the
  proactive AI assistant that understands context and delivers help automatically.
  Founded in 2009, Superhuman empowers over 40 million people, 50,000 organizations,
  and 3,000 educational institutions worldwide to eliminate busywork and focus on
  what matters. Learn more at&nbsp;superhuman.com and about our values here.</p><b><strong>The
  Opportunity</strong></b><p>To achieve our ambitious goals, we’re looking for Full-Stack
  Software Engineers to join our engineering teams. As a Full-Stack Engineer at Superhuman,
  you will play a critical role in building core parts of the Superhuman product offering,
  infrastructure, and features to help 40 million users write more clearly and effectively
  every day. You’ll have the opportunity to work across both Front-End and Back-End,
  contributing to highly visible, impactful projects.</p><p>Superhuman engineers and
  researchers have the freedom to innovate and uncover breakthroughs—and, in turn,
  influence our product roadmap. The complexity of our technical challenges is growing
  rapidly as we scale our interfaces, algorithms, and infrastructure. You can hear
  more from our team on our technical blog.</p><p>Superhuman is growing rapidly. There
  are opportunities to join a team, learn from experienced peers, and build product
  offerings and teams from the ground up. Within our growing engineering organization,
  there is plenty of room for ownership and direct impact on users.</p><p>As a Full-Stack
  Engineer, you will:</p><ul><li>Start building and pushing code in your first week
  and ship impactful features in your first few months.</li><li>Build and support
  production services with high call rates on the Back-End and develop rich user interfaces
  on the Front-End.&nbsp;</li><li>Target high availability for consumer and enterprise
  customers.&nbsp;</li><li>Learn how to build infrastructure as code (IaC).</li><li>Collaborate
  widely with internal teams such as Core, Growth, Enterprise, Trust, and Data to
  deliver delightful product offerings to our customers.&nbsp;</li><li>Contribute
  to an engineering culture with a strong emphasis on documentation, testing, and
  user experience.</li><li>Evaluate the systems and technology in place today while
  proposing systems and architecture that can scale for the future.&nbsp;</li><li>Have
  the opportunity to mentor new hires.</li></ul><b><strong>Qualifications</strong></b><ul><li>Brings
  at least three years of experience in Full-Stack development.</li><li>Displays excellent
  software engineering fundamentals, including knowledge of algorithms and data structures.</li><li>Is
  ready to tackle infrastructure challenges when needed.</li><li>Knows modern web
  client development and testing tools.</li><li>Has experience building, deploying,
  and debugging production systems at scale.</li><li>Demonstrates perseverance when
  faced with tough technical issues.</li><li>Cares about the end-user experience and
  strives to ensure high quality.</li><li>Has a demonstrated ability to work independently
  with minimal guidance, proactively manages tasks and priorities across multiple
  projects, analyzes and executes work efficiently, collaborates effectively with
  cross-functional teams, and thrives in fast-paced, results-driven environments</li></ul><p>We
  invite you to share your knowledge, experience, and goals with us to help us find
  the best team match for you. Tell us your superpower!</p><b><strong>Compensation
  and Benefits</strong></b><p>Superhuman offers all team members competitive pay along
  with a benefits package encompassing the following and more:&nbsp;</p><ul><li>Excellent
  health care (including a wide range of medical, dental, vision, mental health, and
  fertility benefits)</li><li>Disability and life insurance options</li><li>401(k)
  and RRSP matching&nbsp;</li><li>Paid parental leave</li><li>20 days of paid time
  off per year, 12 days of paid holidays per year, two floating holidays per year,
  and flexible sick time</li><li>Generous stipends (including those for caregiving,
  pet care, wellness, your home office, and more)</li><li>Annual professional development
  budget and opportunities</li></ul><p>Superhuman takes a market-based approach to
  compensation, which means base pay may vary depending on your location. Our US locations
  are categorized into two compensation zones based on proximity to our hub locations.</p><p>&nbsp;</p><p>Base
  pay may vary considerably depending on job-related knowledge, skills, and experience.
  The expected salary ranges for this position are outlined below by compensation
  zone and may be modified in the future.</p><p>&nbsp;</p><p>Zone 1: $163,500 - $284,000/year
  (USD)</p><b><strong>We encourage you to apply</strong></b><p>At Superhuman, we value
  our differences, and we encourage all—especially those whose identities are traditionally
  underrepresented in tech organizations—to apply. We do not discriminate on the basis
  of race, religion, color, gender expression or identity, sexual orientation, ancestry,
  national origin, citizenship, age, marital status, veteran status, disability status,
  political belief, or any other characteristic protected by law. Superhuman is an
  equal opportunity employer and a participant in the US federal E-Verify program
  (US). We also abide by the Employment Equity Act (Canada).</p>'
description_text: 'Superhuman offers a dynamic hybrid working model for this role.
  This flexible approach gives team members the best of both worlds: plenty of focus
  time along with in-person collaboration that helps foster trust, innovation, and
  a strong team culture. &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; About Superhuman
  Grammarly is now part of Superhuman, the AI productivity platform on a mission to
  unlock the superhuman potential in everyone. The Superhuman suite of apps and agents
  brings AI wherever people work, integrating with over 1 million applications and
  websites. The company’s products include Grammarly’s writing assistance, Coda’s
  collaborative workspaces, Mail’s inbox management, and Go, the proactive AI assistant
  that understands context and delivers help automatically. Founded in 2009, Superhuman
  empowers over 40 million people, 50,000 organizations, and 3,000 educational institutions
  worldwide to eliminate busywork and focus on what matters. Learn more at&nbsp;superhuman.com
  and about our values here. The Opportunity To achieve our ambitious goals, we’re
  looking for Full-Stack Software Engineers to join our engineering teams. As a Full-Stack
  Engineer at Superhuman, you will play a critical role in building core parts of
  the Superhuman product offering, infrastructure, and features to help 40 million
  users write more clearly and effectively every day. You’ll have the opportunity
  to work across both Front-End and Back-End, contributing to highly visible, impactful
  projects. Superhuman engineers and researchers have the freedom to innovate and
  uncover breakthroughs—and, in turn, influence our product roadmap. The complexity
  of our technical challenges is growing rapidly as we scale our interfaces, algorithms,
  and infrastructure. You can hear more from our team on our technical blog. Superhuman
  is growing rapidly. There are opportunities to join a team, learn from experienced
  peers, and build product offerings and teams from the ground up. Within our growing
  engineering organization, there is plenty of room for ownership and direct impact
  on users. As a Full-Stack Engineer, you will: Start building and pushing code in
  your first week and ship impactful features in your first few months. Build and
  support production services with high call rates on the Back-End and develop rich
  user interfaces on the Front-End.&nbsp; Target high availability for consumer and
  enterprise customers.&nbsp; Learn how to build infrastructure as code (IaC). Collaborate
  widely with internal teams such as Core, Growth, Enterprise, Trust, and Data to
  deliver delightful product offerings to our customers.&nbsp; Contribute to an engineering
  culture with a strong emphasis on documentation, testing, and user experience. Evaluate
  the systems and technology in place today while proposing systems and architecture
  that can scale for the future.&nbsp; Have the opportunity to mentor new hires. Qualifications
  Brings at least three years of experience in Full-Stack development. Displays excellent
  software engineering fundamentals, including knowledge of algorithms and data structures.
  Is ready to tackle infrastructure challenges when needed. Knows modern web client
  development and testing tools. Has experience building, deploying, and debugging
  production systems at scale. Demonstrates perseverance when faced with tough technical
  issues. Cares about the end-user experience and strives to ensure high quality.
  Has a demonstrated ability to work independently with minimal guidance, proactively
  manages tasks and priorities across multiple projects, analyzes and executes work
  efficiently, collaborates effectively with cross-functional teams, and thrives in
  fast-paced, results-driven environments We invite you to share your knowledge, experience,
  and goals with us to help us find the best team match for you. Tell us your superpower!
  Compensation and Benefits Superhuman offers all team members competitive pay along
  with a benefits package encompassing the following and more:&nbsp; Excellent health
  care (including a wide range of medical, dental, vision, mental health, and fertility
  benefits) Disability and life insurance options 401(k) and RRSP matching&nbsp; Paid
  parental leave 20 days of paid time off per year, 12 days of paid holidays per year,
  two floating holidays per year, and flexible sick time Generous stipends (including
  those for caregiving, pet care, wellness, your home office, and more) Annual professional
  development budget and opportunities Superhuman takes a market-based approach to
  compensation, which means base pay may vary depending on your location. Our US locations
  are categorized into two compensation zones based on proximity to our hub locations.
  &nbsp; Base pay may vary considerably depending on job-related knowledge, skills,
  and experience. The expected salary ranges for this position are outlined below
  by compensation zone and may be modified in the future. &nbsp; Zone 1: $163,500
  - $284,000/year (USD) We encourage you to apply At Superhuman, we value our differences,
  and we encourage all—especially those whose identities are traditionally underrepresented
  in tech organizations—to apply. We do not discriminate on the basis of race, religion,
  color, gender expression or identity, sexual orientation, ancestry, national origin,
  citizenship, age, marital status, veteran status, disability status, political belief,
  or any other characteristic protected by law. Superhuman is an equal opportunity
  employer and a participant in the US federal E-Verify program (US). We also abide
  by the Employment Equity Act (Canada).'
