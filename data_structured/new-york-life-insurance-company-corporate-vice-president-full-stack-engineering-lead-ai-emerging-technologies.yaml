description_html: '<strong>Location Designation:</strong> Hybrid - 3 days per quarter
  <br>The Full Stack Engineering Lead will report to the DevSecOps Center for Enablement
  (C4E) and lead the design and delivery of high-impact solutions using emerging technologies
  such as AI, advanced automation, and modern data platforms. This role partners closely
  with business and technology teams to understand domain-specific challenges and
  opportunities, translating them into innovative, secure, and scalable solutions
  aligned with enterprise standards, architectural patterns, and best practices. The
  role also plays a key part in redefining engineering boundaries to advance New York
  Life''s technology leadership.<br><strong>What You''ll Bring:</strong><br><ul><li>Architect,
  design, and implement end-to-end full stack solutions using modern frameworks and
  cloud-native technologies</li><li>Lead the end-to-end design and development of
  platforms that enhance the developer experience</li><li>Define and execute strategies
  for AI and GenAI solutions, including Agentic AI use cases</li><li>Implement innovative
  approaches to reduce developer onboarding friction and improve productivity</li><li>Collaborate
  with data scientists, software engineers, platform engineers, security teams, and
  business leaders to deliver AI-driven solutions</li><li>Identify, assess, and mitigate
  ethical, legal, and security risks associated with AI systems</li><li>Stay current
  with emerging technologies, GenAI models, Model Context Protocols, and Agentic AI,
  incorporating forward-looking capabilities into solution designs</li><li>Lead, mentor,
  and guide engineering teams to deliver robust, scalable, and secure solutions</li><li>Balance
  speed-to-market with technical quality and long-term sustainability</li><li>Run
  pilots with emerging and proven technologies, creating reusable assets and integrating
  successful solutions into enterprise operations</li><li>Ensure solutions align with
  enterprise architecture standards and leverage shared platforms, tools, and processes</li><li>Build
  strong partnerships across Technology Enablement teams (cloud, security, data) and
  business stakeholders</li><li>Communicate effectively across technical and non-technical
  audiences to ensure alignment and drive informed decision-making</li></ul><br><strong>What
  You''ll Bring:</strong><br><ul><li>Bachelor''s or Master''s degree in Computer Science,
  Computer Engineering, Systems Analysis, or a related field (or equivalent experience
  and certifications)</li><li>8+ years of experience in full stack engineering and
  architecture, including AI and GenAI solutions</li><li>Strong experience in software
  architecture, engineering best practices, and technology governance</li><li>Hands-on
  experience with front-end technologies such as React, Angular, and JavaScript</li><li>Hands-on
  experience with back-end technologies such as Java, Spring Boot, Node.js, and C#</li><li>Experience
  with AI frameworks such as TensorFlow and PyTorch</li><li>Proficiency in Python
  and experience with AI orchestration frameworks such as LangChain</li><li>Experience
  with vector databases, knowledge graphs, and modern data processing techniques</li><li>Strong
  understanding of Agile development methodologies, DevSecOps practices, and CI/CD
  pipelines</li><li>Experience with Infrastructure as Code (e.g., Terraform)</li><li>Cloud
  platform experience, preferably AWS</li><li>Deep understanding of architectural
  patterns, principles, and frameworks</li><li>Strong analytical skills with the ability
  to connect technical solutions to business outcomes</li></ul><br><strong>Preferred
  Qualifications</strong><br><ul><li>Experience delivering end-to-end AI solutions,
  including data ingestion, vectorization, model integration, and deployment platforms</li><li>Experience
  implementing enterprise platforms such as content management systems, low-code platforms,
  or application builders</li><li>Knowledge of security protocols and secure system
  design</li><li>Financial services industry experience</li></ul><br><strong>Pay Transparency</strong><br>Salary
  Range: $147,500-$211,000 <br>Overtime eligible: Exempt <br>Discretionary bonus eligible:
  Yes <br>Sales bonus eligible: No <br>Actual base salary will be determined based
  on several factors but not limited to individual''s experience, skills, qualifications,
  and job location. Additionally, employees are eligible for an annual discretionary
  bonus. In addition to base salary, employees may also be eligible to participate
  in an incentive program.<br><strong>Company Overview </strong><br>At New York Life,
  our 180-year legacy of purpose and integrity fuels our future. As we evolve into
  a more technology-, data-, and AI-enabled organization, we remain grounded in the
  values that drive lasting impact. <br>Our diverse business portfolio creates opportunities
  to make a difference across industries and communities-inviting bold thinking, collaborative
  problem-solving, and purpose-driven innovation. Here, you''ll find the rare balance
  of long-standing stability and forward momentum, supported by an inclusive team
  that honors tradition while embracing progress. <br>As a Fortune 100 mutual company,
  we offer a place to grow your skills, contribute to meaningful work, and deliver
  solutions that matter. Your ideas drive what''s next, and your growth powers it.
  <br><strong>Our Benefits</strong><br>We provide a full package of benefits for employees
  - and have unique offerings for a modern workforce, including leave programs, adoption
  assistance, and student loan repayment programs. Based on feedback from our employees,
  we continue to refine and add benefits to our offering, so that you can flourish
  both inside and outside of work.Click hereto discover more about our comprehensive
  benefit options or visit our NYL Benefits Site.<br><strong>Our Commitment to Inclusion</strong><br>At
  New York Life, fostering an inclusive workplace is fundamental to who we are and
  how we serve our communities. We have a longstanding commitment to creating an environment
  where individuals can contribute their best and succeed together. This foundation
  is rooted in our core values of humanity and integrity, ensuring that every employee
  feels valued and supported. By embracing a broad range of perspectives and experiences,
  we achieve greater success and fulfill our promise of providing financial security
  and peace of mind to families across all communities. Click here to learn more about
  New York Life''s leadership in this space. <br>Recognized as one of Fortune''s World''s
  Most Admired Companies, New York Life is committed to improving local communities
  through a culture of employee giving and volunteerism, supported by the Foundation.
  We''re proud that due to our mutuality, we operate in the best interests of our
  policy owners. To learn more about career opportunities at New York Life, please
  visit the Careers page of www.NewYorkLife.com.<br>Visit our LinkedIn to see how
  our employees and agents are leading the industry and impacting communities.<br>Visit
  our Newsroom to learn more about how our company is constantly evolving to meet
  our clients'' and employees'' needs.<br>Job Requisition ID: 93211'
description_text: 'Location Designation: Hybrid - 3 days per quarter The Full Stack
  Engineering Lead will report to the DevSecOps Center for Enablement (C4E) and lead
  the design and delivery of high-impact solutions using emerging technologies such
  as AI, advanced automation, and modern data platforms. This role partners closely
  with business and technology teams to understand domain-specific challenges and
  opportunities, translating them into innovative, secure, and scalable solutions
  aligned with enterprise standards, architectural patterns, and best practices. The
  role also plays a key part in redefining engineering boundaries to advance New York
  Life''s technology leadership. What You''ll Bring: Architect, design, and implement
  end-to-end full stack solutions using modern frameworks and cloud-native technologies
  Lead the end-to-end design and development of platforms that enhance the developer
  experience Define and execute strategies for AI and GenAI solutions, including Agentic
  AI use cases Implement innovative approaches to reduce developer onboarding friction
  and improve productivity Collaborate with data scientists, software engineers, platform
  engineers, security teams, and business leaders to deliver AI-driven solutions Identify,
  assess, and mitigate ethical, legal, and security risks associated with AI systems
  Stay current with emerging technologies, GenAI models, Model Context Protocols,
  and Agentic AI, incorporating forward-looking capabilities into solution designs
  Lead, mentor, and guide engineering teams to deliver robust, scalable, and secure
  solutions Balance speed-to-market with technical quality and long-term sustainability
  Run pilots with emerging and proven technologies, creating reusable assets and integrating
  successful solutions into enterprise operations Ensure solutions align with enterprise
  architecture standards and leverage shared platforms, tools, and processes Build
  strong partnerships across Technology Enablement teams (cloud, security, data) and
  business stakeholders Communicate effectively across technical and non-technical
  audiences to ensure alignment and drive informed decision-making What You''ll Bring:
  Bachelor''s or Master''s degree in Computer Science, Computer Engineering, Systems
  Analysis, or a related field (or equivalent experience and certifications) 8+ years
  of experience in full stack engineering and architecture, including AI and GenAI
  solutions Strong experience in software architecture, engineering best practices,
  and technology governance Hands-on experience with front-end technologies such as
  React, Angular, and JavaScript Hands-on experience with back-end technologies such
  as Java, Spring Boot, Node.js, and C# Experience with AI frameworks such as TensorFlow
  and PyTorch Proficiency in Python and experience with AI orchestration frameworks
  such as LangChain Experience with vector databases, knowledge graphs, and modern
  data processing techniques Strong understanding of Agile development methodologies,
  DevSecOps practices, and CI/CD pipelines Experience with Infrastructure as Code
  (e.g., Terraform) Cloud platform experience, preferably AWS Deep understanding of
  architectural patterns, principles, and frameworks Strong analytical skills with
  the ability to connect technical solutions to business outcomes Preferred Qualifications
  Experience delivering end-to-end AI solutions, including data ingestion, vectorization,
  model integration, and deployment platforms Experience implementing enterprise platforms
  such as content management systems, low-code platforms, or application builders
  Knowledge of security protocols and secure system design Financial services industry
  experience Pay Transparency Salary Range: $147,500-$211,000 Overtime eligible: Exempt
  Discretionary bonus eligible: Yes Sales bonus eligible: No Actual base salary will
  be determined based on several factors but not limited to individual''s experience,
  skills, qualifications, and job location. Additionally, employees are eligible for
  an annual discretionary bonus. In addition to base salary, employees may also be
  eligible to participate in an incentive program. Company Overview At New York Life,
  our 180-year legacy of purpose and integrity fuels our future. As we evolve into
  a more technology-, data-, and AI-enabled organization, we remain grounded in the
  values that drive lasting impact. Our diverse business portfolio creates opportunities
  to make a difference across industries and communities-inviting bold thinking, collaborative
  problem-solving, and purpose-driven innovation. Here, you''ll find the rare balance
  of long-standing stability and forward momentum, supported by an inclusive team
  that honors tradition while embracing progress. As a Fortune 100 mutual company,
  we offer a place to grow your skills, contribute to meaningful work, and deliver
  solutions that matter. Your ideas drive what''s next, and your growth powers it.
  Our Benefits We provide a full package of benefits for employees - and have unique
  offerings for a modern workforce, including leave programs, adoption assistance,
  and student loan repayment programs. Based on feedback from our employees, we continue
  to refine and add benefits to our offering, so that you can flourish both inside
  and outside of work.Click hereto discover more about our comprehensive benefit options
  or visit our NYL Benefits Site. Our Commitment to Inclusion At New York Life, fostering
  an inclusive workplace is fundamental to who we are and how we serve our communities.
  We have a longstanding commitment to creating an environment where individuals can
  contribute their best and succeed together. This foundation is rooted in our core
  values of humanity and integrity, ensuring that every employee feels valued and
  supported. By embracing a broad range of perspectives and experiences, we achieve
  greater success and fulfill our promise of providing financial security and peace
  of mind to families across all communities. Click here to learn more about New York
  Life''s leadership in this space. Recognized as one of Fortune''s World''s Most
  Admired Companies, New York Life is committed to improving local communities through
  a culture of employee giving and volunteerism, supported by the Foundation. We''re
  proud that due to our mutuality, we operate in the best interests of our policy
  owners. To learn more about career opportunities at New York Life, please visit
  the Careers page of www.NewYorkLife.com. Visit our LinkedIn to see how our employees
  and agents are leading the industry and impacting communities. Visit our Newsroom
  to learn more about how our company is constantly evolving to meet our clients''
  and employees'' needs. Job Requisition ID: 93211'
