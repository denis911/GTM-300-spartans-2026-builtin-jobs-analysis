title: GTM Systems Engineer (AI & Automation)
company: Lucid Software
category: Software
location: Raleigh, North Carolina, USA
date_posted: '2026-02-17'
description_html: '<p><span>Lucid Software is the leader in visual collaboration and
  work acceleration, helping teams see and build the future by turning ideas into
  reality. Our products include the Visual Collaboration Suite (Lucidchart and Lucidspark)
  and airfocus. We hold true to our core values: innovation in everything we do, passion
  &amp; excellence in every area, individual empowerment, initiative and ownership,
  and teamwork over ego. At Lucid, we value diverse perspectives and are dedicated
  to creating an environment and culture that is respectful and inclusive for everyone.
  Lucid is a hybrid workplace. We promote a healthy work-life balance by allowing
  employees to work remotely, from one of our offices, or a combination of the two
  depending on the needs of the role and team.</span></p><p><span>Since the company’s
  founding, Lucid Software has received numerous global and regional recognitions
  for its products, business, and workplace culture. These include being listed to
  the Forbes Cloud 100, Fast Company Most Innovative Companies, Fortune Best Workplaces
  in Technology, and PEOPLE’s Companies that Care. Lucid’s solutions are used by more
  than 100 million users across the globe, making Lucid the most used visual collaboration
  platform by the Fortune 500. Our customers include Google, GE, and NBC Universal,
  and we partner with leaders such as Google, Atlassian, and Microsoft.&nbsp;</span></p><p><span>Lucid
  has an exciting opportunity for a talented individual to join our Revenue Operations
  function. The Revenue Operations team drives key lead generation and GTM systems
  initiatives for the company, supporting our visual productivity suite. We’re looking
  for a GTM Systems &amp; Automation Manager who can help us support our go-to-market
  strategy by scaling and optimizing our Marketing and Sales technologies and practices
  to accelerate revenue with predictable performance.</span></p><p><span><strong>Responsibilities:</strong></span></p><ul><li><span>Design
  and implement scalable automation logic across the full funnel, identifying operational
  bottlenecks and delivering technical solutions that improve GTM efficiency and reliability</span></li><li><span>Ensure
  reliable end-to-end data synchronization across the GTM stack, maintaining data
  quality and minimizing operational risk through well-managed integrations and data
  pipelines</span></li><li><span>Orchestrate multi-step data enrichment and transformation
  workflows using platforms such as Clay, Workato, or Zapier to source, enrich, validate,
  and activate data across systems</span></li><li><span>Create, refine, and maintain
  automated engagement sequences that trigger email, call, and social outreach based
  on behaviors, lifecycle stages, or data changes</span></li><li><span>Build, update,
  and maintain dashboards and reporting systems that measure funnel performance, campaign
  effectiveness, and other key metrics</span></li><li><span>Help evaluate, implement,
  and optimize GTM technologies, including AI and emerging tools for lead research,
  enrichment, personalization, and workflow optimization</span></li><li><span>Partner
  cross-functionally with Business Systems, GTM Operations, Analytics, and other stakeholders
  to define scalable processes, maintain documentation, ensure system alignment, and
  uphold data governance and privacy standards</span></li></ul><p><span><strong>Requirements:</strong></span></p><ul><li><span>5+
  years of experience designing and implementing automated GTM systems, including
  data enrichment, transformation, lifecycle automation, and cross-platform integrations
  across marketing and sales technologies</span></li><li><span>Technical knowledge
  and experience with these types of platforms:</span></li><ul><li><span>Marketing
  automation (Marketo, Iterable, Customer.io)</span></li><li><span>CRM (Salesforce,
  Hubspot)</span></li><li><span>AI and workflow automation (Workato, Hightouch, Zapier,
  Clay)</span></li><li><span>Sales engagement (Salesloft, Gong, Outreach)</span></li><li><span>Enrichment
  (Clay, ZoomInfo, Apollo)</span></li></ul><li><span>Hands-on experience supporting
  and scaling outbound GTM campaigns, including list building, enrichment, segmentation,
  routing, and activation across sales and marketing systems</span></li><li><span>Proven
  team player and collaborator with the ability to work effectively with both technical
  and non-technical partners</span></li><li><span>Strong written and verbal communication
  skills, organization, and attention to detail</span></li><li><span>Comfortable working
  in a fast-paced, dynamic environment</span></li><li><span>Natural problem solver
  and a quick learner with a builder mindset</span></li></ul><p><span><strong>Preferred
  Qualifications</strong></span></p><ul><li><span>Experience working at a product-led
  company or marketing operations/revenue technology agency</span></li><li><span>Exposure
  to multiple GTM motions is a plus&nbsp;</span></li></ul><p><span>#LI-MK1</span></p>'
description_text: 'Lucid Software is the leader in visual collaboration and work acceleration,
  helping teams see and build the future by turning ideas into reality. Our products
  include the Visual Collaboration Suite (Lucidchart and Lucidspark) and airfocus.
  We hold true to our core values: innovation in everything we do, passion &amp; excellence
  in every area, individual empowerment, initiative and ownership, and teamwork over
  ego. At Lucid, we value diverse perspectives and are dedicated to creating an environment
  and culture that is respectful and inclusive for everyone. Lucid is a hybrid workplace.
  We promote a healthy work-life balance by allowing employees to work remotely, from
  one of our offices, or a combination of the two depending on the needs of the role
  and team. Since the company’s founding, Lucid Software has received numerous global
  and regional recognitions for its products, business, and workplace culture. These
  include being listed to the Forbes Cloud 100, Fast Company Most Innovative Companies,
  Fortune Best Workplaces in Technology, and PEOPLE’s Companies that Care. Lucid’s
  solutions are used by more than 100 million users across the globe, making Lucid
  the most used visual collaboration platform by the Fortune 500. Our customers include
  Google, GE, and NBC Universal, and we partner with leaders such as Google, Atlassian,
  and Microsoft.&nbsp; Lucid has an exciting opportunity for a talented individual
  to join our Revenue Operations function. The Revenue Operations team drives key
  lead generation and GTM systems initiatives for the company, supporting our visual
  productivity suite. We’re looking for a GTM Systems &amp; Automation Manager who
  can help us support our go-to-market strategy by scaling and optimizing our Marketing
  and Sales technologies and practices to accelerate revenue with predictable performance.
  Responsibilities: Design and implement scalable automation logic across the full
  funnel, identifying operational bottlenecks and delivering technical solutions that
  improve GTM efficiency and reliability Ensure reliable end-to-end data synchronization
  across the GTM stack, maintaining data quality and minimizing operational risk through
  well-managed integrations and data pipelines Orchestrate multi-step data enrichment
  and transformation workflows using platforms such as Clay, Workato, or Zapier to
  source, enrich, validate, and activate data across systems Create, refine, and maintain
  automated engagement sequences that trigger email, call, and social outreach based
  on behaviors, lifecycle stages, or data changes Build, update, and maintain dashboards
  and reporting systems that measure funnel performance, campaign effectiveness, and
  other key metrics Help evaluate, implement, and optimize GTM technologies, including
  AI and emerging tools for lead research, enrichment, personalization, and workflow
  optimization Partner cross-functionally with Business Systems, GTM Operations, Analytics,
  and other stakeholders to define scalable processes, maintain documentation, ensure
  system alignment, and uphold data governance and privacy standards Requirements:
  5+ years of experience designing and implementing automated GTM systems, including
  data enrichment, transformation, lifecycle automation, and cross-platform integrations
  across marketing and sales technologies Technical knowledge and experience with
  these types of platforms: Marketing automation (Marketo, Iterable, Customer.io)
  CRM (Salesforce, Hubspot) AI and workflow automation (Workato, Hightouch, Zapier,
  Clay) Sales engagement (Salesloft, Gong, Outreach) Enrichment (Clay, ZoomInfo, Apollo)
  Hands-on experience supporting and scaling outbound GTM campaigns, including list
  building, enrichment, segmentation, routing, and activation across sales and marketing
  systems Proven team player and collaborator with the ability to work effectively
  with both technical and non-technical partners Strong written and verbal communication
  skills, organization, and attention to detail Comfortable working in a fast-paced,
  dynamic environment Natural problem solver and a quick learner with a builder mindset
  Preferred Qualifications Experience working at a product-led company or marketing
  operations/revenue technology agency Exposure to multiple GTM motions is a plus&nbsp;
  #LI-MK1'
