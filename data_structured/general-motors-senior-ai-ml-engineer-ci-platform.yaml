description_html: '<b>Description</b><br>This role is categorized as hybrid. This
  means the successful candidate is expected to report to the office in [Austin, Detroit,
  Warren, Milford, Mountain     View     or Sunnyvale] a minimum of 3 days per week.
  This position can be considered Remote if the successful candidate is in the Seattle,
  Washington area.   <br><strong> About Us </strong>   <br>The AI Cloud and Developer
  Infrastructure organization is responsible for delivering and maintaining the tools
  and services engineers here at GM use every day to do their best work and drive
  our cars forward. Tools and services we work on enhancing the entire development
  process of engineers at GM - how/where code is checked out, modified, compiled,
  tested, merged, and eventually deployed. Our goal is to ensure our AV engineers
  and others here have world class tools and a seamless development experience so
  that they can focus on the problems that matter most in their domain.  <br><strong>
  The Role </strong>   <br>We are looking for a Senior Engineer with an extensive
  engineering background, experience using a variety of developer tools and technologies,
  and who is passionate about developer productivity. As a leader on this team, we
  are looking for someone who cares deeply about the technical development of other
  engineers on the team and can effectively balance the needs and priorities of the
  business, our users, and the growth of our engineers.  <br>The way this engineer
  will deliver impact may vary depending on the situation, but they will be expected
  to be able to identify how they can best have impact with minimal guidance.  <br><strong>
  The Team </strong>   <br>The Continuous Integration (CI) Platform team owns our
  CI infrastructure along with the tools that improve the CI customer experience.  We
  are part of the AI and Cloud Developer Productivity Organization and own the building
  blocks to produce high quality CI experiences and workflows. This includes services
  such as the Remote Build Execution (RBE) service which allows GM AI to reliably
  test at scale and the build artifact storage which is a FUSE based network file
  system used in conjunction with RBE. Our goal is to accelerate AV development by
  supporting developer workflows for building, testing, and releasing software.  <br><strong>
  What You''ll Do (Responsibilities) </strong>   <br><ul>  <li> Identify engineering
  pain points and propose/design/implement solutions that are reliable, scalable,
  and maintainable</li>  </ul>  <br><ul>  <li> Influence the team''s technical roadmap</li>  </ul>  <br><ul>  <li>
  Evaluate new tools and technologies through PoCs</li>  </ul>  <br><ul>  <li> Ship
  improvements to our AV development toolchains and services which have a measurable
  and direct impact on engineering productivity and our core company metrics</li>  </ul>  <br><ul>  <li>
  Drive software engineering best practices within your team, and create tooling which
  encourages these</li>  </ul>  <br><ul>  <li> Help steer the engineering culture
  on the team</li>  </ul>  <br><ul>  <li> Guide the team to find the right balance
  between delivering impact and addressing technical debt</li>  </ul>  <br><ul>  <li>
  Mentor and grow engineers on the team</li>  </ul>  <br><ul>  <li> Set the example
  for high levels of accountability</li>  </ul>  <br><ul>  <li> Execute and deliver
  impact both individually and through the team</li>  </ul>  <br><ul>  <li> Set strong
  boundaries when selecting external requests and pushing back on requests that do
  not align with our team vision</li>  </ul>  <br><strong> Minimum Qualifications
  (Must-Have) </strong>   <br><ul>  <li> 3+ years of experience designing, building
  and operating production systems at scale in the cloud</li>  </ul>  <br><ul>  <li>
  Bachelors Degree in Computer Science or related field or equivalent work experience</li>  </ul>  <br><ul>  <li>
  Experience designing highly scalable, reliable, and maintainable services</li>  </ul>  <br><ul>  <li>
  Experience writing in Go, Python, or other languages at production scale</li>  </ul>  <br><ul>  <li>
  Understanding of Unix/Linux, SSH, and networking fundamentals</li>  </ul>  <br><ul>  <li>
  Attention to detail, and a desire to improve processes and systems around you</li>  </ul>  <br><ul>  <li>
  Ability to lead and influence others, both internal and external to the team</li>  </ul>  <br><ul>  <li>
  Ability to research, document, communicate, and defend proposals, and provide and
  take critical feedback</li>  </ul>  <br><ul>  <li> Ability to effectively make trade-offs
  and communicate the reasoning</li>  </ul>  <br><ul>  <li> Ability to manage competing
  priorities, focus on shipping, and work effectively under pressure</li>  </ul>  <br><ul>  <li>
  Passion for mentoring and growing junior engineers</li>  </ul>  <br><ul>  <li> Passion
  for self-driving technology and its potential impact on the world</li>  </ul>  <br><strong>
  Preferred Qualifications (Nice-to-Have) </strong>   <br><ul>  <li> Experience working
  with GCP</li>  </ul>  <br><ul>  <li> Experience working with Docker and Kubernetes</li>  </ul>  <br><ul>  <li>
  Experience owning or contributing to Open-Source projects</li>  </ul>  <br><strong>
  Compensation: </strong>  The compensation information is a good faith estimate only.
  It is based on what a successful applicant might be paid in accordance with applicable
  state laws. The compensation may not be representative for positions located outside
  of New York, Colorado, California, or Washington.   <br><ul>  <li>  <strong> The
  salary range for this role: </strong>  is $170,000 to $240,000. The actual base
  salary a successful candidate will be offered within this range will vary based
  on factors relevant to the position.</li>  </ul>  <ul>  <li>  <strong> Bonus Potential:
  </strong>  An incentive pay program offers payouts based on company performance,
  job level, and individual performance.</li>  <li>  <strong> Benefits: </strong>  GM
  offers a variety of health and wellbeing benefit programs. Benefit options include
  medical, dental, vision, Health Savings Account, Flexible Spending Accounts, retirement
  savings plan, sickness and accident benefits, life insurance, paid vacation &amp;
  holidays, tuition assistance programs, employee assistance program, GM vehicle discounts
  and more.</li>  </ul>  <br>This job may be eligible for relocation benefits. <br>This
  role is categorized as hybrid. This means the selected candidate is expected to
  report to a specific location at least 3 times a week {or other frequency dictated
  by their manager}. <br><b>About GM</b><br>Our vision is a world with Zero Crashes,
  Zero Emissions and Zero Congestion and we embrace the responsibility to lead the
  change that will make our world better, safer and more equitable for all.<br><b>Why
  Join Us</b><br>We believe we all must make a choice every day - individually and
  collectively - to drive meaningful change through our words, our deeds and our culture.
  Every day, we want every employee to feel they belong to one General Motors team.<br><b>Total
  Rewards | Benefits Overview</b><br>From day one, we''re looking out for your well-being-at
  work and at home-so you can focus on realizing your ambitions. Learn how GM supports
  a rewarding career that rewards you personally by visiting Total Rewards resources.
  <br><b>Non-Discrimination and Equal Employment Opportunities (U.S.)</b><br>General
  Motors is committed to being a workplace that is not only free of unlawful discrimination,
  but one that genuinely fosters inclusion and belonging. We strongly believe that
  providing an inclusive workplace creates an environment in which our employees can
  thrive and develop better products for our customers.<br>All employment decisions
  are made on a non-discriminatory basis without regard to sex, race, color, national
  origin, citizenship status, religion, age, disability, pregnancy or maternity status,
  sexual orientation, gender identity, status as a veteran or protected veteran, or
  any other similarly protected status in accordance with federal, state and local
  laws. <br>We encourage interested candidates to review the key responsibilities
  and qualifications for each role and apply for any positions that match their skills
  and capabilities. Applicants in the recruitment process may be required, where applicable,
  to successfully complete a role-related assessment(s) and/or a pre-employment screening
  prior to beginning employment. To learn more, visit How we Hire.<br><b>Accommodations</b><br>General
  Motors offers opportunities to all job seekers including individuals with disabilities.
  If you need a reasonable accommodation to assist with your job search or application
  for employment, email us [email protected] or call us at 800-865-7580. In your email,
  please include a description of the specific accommodation you are requesting as
  well as the job title and requisition number of the position for which you are applying.'
