description_html: '<b><strong>About the Company</strong></b><p>Rain makes the next
  generation of payments possible across the globe. We’re a lean and mighty team of
  passionate builders and veteran founders. Our infrastructure makes stablecoins usable
  in the real-world by powering card transactions, cross-border payments, B2B purchases,
  remittances, and more. We partner with fintechs, neobanks, and institutions to help
  them launch solutions that are global, inclusive, and efficient. You will have the
  opportunity to deliver massive impact at a hypergrowth company that is funded by
  some of the top investors in fintech, crypto, and SaaS, including Sapphire Ventures,
  Norwest, Galaxy Ventures, Lightspeed, Khosla, and several more. If you’re curious,
  bold, and excited to help shape a borderless financial future, we’d love to talk.</p><p></p><b><strong>Our
  Ethos</strong></b><p>We believe in an open and flat structure. You will be able
  to grow into the role that most aligns with your goals. Our team members at all
  levels have the freedom to explore ideas and impact the roadmap and vision of our
  company.</p><p></p><b><strong>About the Role</strong></b><p>Reporting to the Head
  of Business Operations, you’ll be a high-leverage operator helping Rain scale. Your
  job is to drive alignment + execution: building the operating system that keeps
  us pointed at the right problems, and jumping in to provide hands-on support for
  the most important company priorities.</p><p>You’ll alternate between strategy and
  operational work. One week analyzing spikes in Customer Support data, the next week
  negotiating a long-term deal with a software vendor. If you like working on different
  problems and you get energy from turning ambiguity into action, this role is for
  you.</p><p></p><b><strong>What You''ll Do</strong></b><ul><li><p><strong>Improve
  Rain’s operating cadence - </strong> evolve our planning cycles, OKRs, and business
  reviews so teams are aligned on goals, tradeoffs, and progress.</p></li><li><p><strong>Drive
  high-impact, cross-functional initiatives - </strong>lead projects and manage programs
  that span the entire team.</p></li><li><p><strong>Define and operationalize our
  metrics - </strong>partner with team leads to define Rain’s core KPIs, build a simple
  company scorecard, and stand up dashboards that give leaders a real-time view of
  how we’re doing.</p></li><li><p><strong>Bring structure to ambiguous problems -
  </strong>take fuzzy questions (“which market should we be prioritizing?”, “how can
  we get customers live faster?”) and turn them into clear hypotheses, analyses, and
  plans. Then be the driving force that makes it happen.</p></li></ul><p></p><b><strong>Who
  You Are</strong></b><ul><li><p>A structured problem-solver who can break messy,
  cross-functional problems into clear components and a pragmatic plan.</p></li><li><p>Able
  to operate at all altitudes — zooming out to work on strategy with leadership, then
  zooming in to get the work done. You’re eager to solve problems and no work is below
  you.</p></li><li><p>An excellent communicator and program manager who can synthesize
  complexity into crisp narratives, drive productive meetings, and influence without
  formal authority.</p></li><li><p>A strong bias-for-action operator who moves quickly,
  unblocks themselves, and cares about outcomes over polished docs or frameworks.</p></li><li><p>Highly
  analytical and metrics-minded: comfortable in spreadsheets, dashboards, and basic
  SQL/BI, and more interested in the “so what” than just the numbers.</p></li><li><p>Low-ego,
  collaborative, and energized by being the connective tissue of the organization.</p></li><li><p>Experience
  in fintech, payments, crypto, card programs, or financial infrastructure.</p></li><li><p>7–10+
  years of experience in Business Operations, Strategy, Consulting, Investment Banking,
  PE/VC, Product Management or similar high-analytical / high-ownership roles.</p></li></ul><p></p><b><strong>Nice
  to Have</strong></b><ul><li><p>Direct experience setting up or running a company
  operating system (OKRs, QBRs, planning cycles, operating reviews) or program management/transformation
  function.</p></li><li><p>Comfort with SQL and modern analytics tools (dbt, Looker,
  Hex, or similar) and working closely with Data/Engineering.</p></li><li><p>Prior
  experience as a Founder or Product Manager.</p></li><li><p>Experience at a high-growth
  tech or fintech startup.<br></p></li></ul><p></p><b><strong>Things that enable a
  fulfilling, healthy, and happy experience at Rain:</strong></b><ul><li><p><strong>Unlimited
  time off</strong> 🌴 Unlimited vacation can be daunting, so we require Rainmakers
  to take at least 10 days off.</p></li><li><p><strong>Flexible working</strong> ☕
  We support a flexible workplace. If you feel comfortable at home, please work from
  home. If you’d like to work with others in an office, feel free to come in. We want
  everyone to be able to work in the environment in which they are their most confident
  and productive selves. New Rainmakers will receive a stipend to create a comfortable
  home environment.</p></li><li><p><strong>Easy to access benefits </strong>🧠For US
  Rainmakers, we offer comprehensive health, dental, and vision plans for you and
  your dependents, as well as a 100% company subsidized life insurance plan.</p></li><li><p><strong>Retirement
  goals</strong>💡Plan for the future with confidence. We offer a 401(k) with a 4%
  company match.</p></li><li><p><strong>Equity plan </strong>📦 We offer every Rainmaker
  an equity option plan so we can all benefit from our success.</p></li><li><p><strong>Rain
  Cards</strong> 🌧️ We want Rainmakers to be knowledgeable about our core products
  and services. To support this mission, we issue a card for our team to use for testing.</p></li><li><p><strong>Health
  and Wellness</strong> 📚 High performance begins from within. Rainmakers are welcome
  to use their card for eligible health and wellness spending like gym memberships/fitness
  classes, massages, acupuncture - whatever recharges you!</p></li><li><p><strong>Team
  summits</strong> ✨ Summits play an important role at Rain! Time spent together helps
  us get to know each other, strengthen our relationships, and build a common destiny.
  Expect team and company off-sites both domestically and internationally.</p></li></ul>'
description_text: 'About the Company Rain makes the next generation of payments possible
  across the globe. We’re a lean and mighty team of passionate builders and veteran
  founders. Our infrastructure makes stablecoins usable in the real-world by powering
  card transactions, cross-border payments, B2B purchases, remittances, and more.
  We partner with fintechs, neobanks, and institutions to help them launch solutions
  that are global, inclusive, and efficient. You will have the opportunity to deliver
  massive impact at a hypergrowth company that is funded by some of the top investors
  in fintech, crypto, and SaaS, including Sapphire Ventures, Norwest, Galaxy Ventures,
  Lightspeed, Khosla, and several more. If you’re curious, bold, and excited to help
  shape a borderless financial future, we’d love to talk. Our Ethos We believe in
  an open and flat structure. You will be able to grow into the role that most aligns
  with your goals. Our team members at all levels have the freedom to explore ideas
  and impact the roadmap and vision of our company. About the Role Reporting to the
  Head of Business Operations, you’ll be a high-leverage operator helping Rain scale.
  Your job is to drive alignment + execution: building the operating system that keeps
  us pointed at the right problems, and jumping in to provide hands-on support for
  the most important company priorities. You’ll alternate between strategy and operational
  work. One week analyzing spikes in Customer Support data, the next week negotiating
  a long-term deal with a software vendor. If you like working on different problems
  and you get energy from turning ambiguity into action, this role is for you. What
  You''ll Do Improve Rain’s operating cadence - evolve our planning cycles, OKRs,
  and business reviews so teams are aligned on goals, tradeoffs, and progress. Drive
  high-impact, cross-functional initiatives - lead projects and manage programs that
  span the entire team. Define and operationalize our metrics - partner with team
  leads to define Rain’s core KPIs, build a simple company scorecard, and stand up
  dashboards that give leaders a real-time view of how we’re doing. Bring structure
  to ambiguous problems - take fuzzy questions (“which market should we be prioritizing?”,
  “how can we get customers live faster?”) and turn them into clear hypotheses, analyses,
  and plans. Then be the driving force that makes it happen. Who You Are A structured
  problem-solver who can break messy, cross-functional problems into clear components
  and a pragmatic plan. Able to operate at all altitudes — zooming out to work on
  strategy with leadership, then zooming in to get the work done. You’re eager to
  solve problems and no work is below you. An excellent communicator and program manager
  who can synthesize complexity into crisp narratives, drive productive meetings,
  and influence without formal authority. A strong bias-for-action operator who moves
  quickly, unblocks themselves, and cares about outcomes over polished docs or frameworks.
  Highly analytical and metrics-minded: comfortable in spreadsheets, dashboards, and
  basic SQL/BI, and more interested in the “so what” than just the numbers. Low-ego,
  collaborative, and energized by being the connective tissue of the organization.
  Experience in fintech, payments, crypto, card programs, or financial infrastructure.
  7–10+ years of experience in Business Operations, Strategy, Consulting, Investment
  Banking, PE/VC, Product Management or similar high-analytical / high-ownership roles.
  Nice to Have Direct experience setting up or running a company operating system
  (OKRs, QBRs, planning cycles, operating reviews) or program management/transformation
  function. Comfort with SQL and modern analytics tools (dbt, Looker, Hex, or similar)
  and working closely with Data/Engineering. Prior experience as a Founder or Product
  Manager. Experience at a high-growth tech or fintech startup. Things that enable
  a fulfilling, healthy, and happy experience at Rain: Unlimited time off 🌴 Unlimited
  vacation can be daunting, so we require Rainmakers to take at least 10 days off.
  Flexible working ☕ We support a flexible workplace. If you feel comfortable at home,
  please work from home. If you’d like to work with others in an office, feel free
  to come in. We want everyone to be able to work in the environment in which they
  are their most confident and productive selves. New Rainmakers will receive a stipend
  to create a comfortable home environment. Easy to access benefits 🧠For US Rainmakers,
  we offer comprehensive health, dental, and vision plans for you and your dependents,
  as well as a 100% company subsidized life insurance plan. Retirement goals 💡Plan
  for the future with confidence. We offer a 401(k) with a 4% company match. Equity
  plan 📦 We offer every Rainmaker an equity option plan so we can all benefit from
  our success. Rain Cards 🌧️ We want Rainmakers to be knowledgeable about our core
  products and services. To support this mission, we issue a card for our team to
  use for testing. Health and Wellness 📚 High performance begins from within. Rainmakers
  are welcome to use their card for eligible health and wellness spending like gym
  memberships/fitness classes, massages, acupuncture - whatever recharges you! Team
  summits ✨ Summits play an important role at Rain! Time spent together helps us get
  to know each other, strengthen our relationships, and build a common destiny. Expect
  team and company off-sites both domestically and internationally.'
