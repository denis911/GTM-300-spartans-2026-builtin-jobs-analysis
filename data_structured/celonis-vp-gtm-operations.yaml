company_overview: 'Celonis makes processes work — for people, companies, and the planet.
  Powered by process mining and AI, the Celonis Process Intelligence Platform integrates
  process data and business context to create a living digital twin of business operations.
  We enable thousands of companies worldwide to understand how their business actually
  runs and, together with their partners, build intelligent solutions that transform
  and continuously improve the way they operate — unlocking billions in value.Celonis
  is headquartered in Munich, Germany, and New York City, USA, with more than 20 offices
  worldwide.# Approximately half of the top 200 companies of the Forbes Global 2000
  are Celonis customers.# More than 30% of the Fortune Global 500, and more than 25%
  of the Fortune 500 are Celonis customers.# To date, Celonis customers have realized
  more than $8 billion in value, and identified more than $18 billion in value. Celonis
  has been recognized as: # Germany’s most valuable startup and one of the most valuable
  in New York City# One of the world’s 50 most valuable private companies# The first
  German decacorn and one of only 48 in the world# The second largest unicorn in Europe'
