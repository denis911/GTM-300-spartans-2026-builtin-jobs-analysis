description_html: '<p><p>We''re Celonis, the global leader in Process Intelligence
  technology and one of the world''s fastest-growing SaaS firms. We believe there
  is a massive opportunity to unlock productivity by placing AI, data and intelligence
  at the core of business processes - and for that, we need your help. Care to join
  us?</p></p><p><strong>The Role:</strong><br>This role leads Strategy and Operations
  for the selling teams at Celonis outside of the regional core sales teams. In that
  regard, this is a critical role to help define, evolve and run the GTM for the business
  as Celonis grows. With rapid expansion globally, a deepening partner ecosystem and
  a broadened set of areas where Celonis can impact customers, this is a critical
  time to be joining. This is also a chance to help shape what the overall role and
  remit of Revenue Operations should be, setting the bar for how the organization
  helps deliver the in quarter business, and shapes the health of future quarters
  and years.</p><p><strong>The work you’ll do:</strong><strong><br></strong></p><ul><li>Help
  set the strategy for an integrated GTM, with clarity of roles, handoffs, accountabilities
  and ratios. Lay out a plan for how those evolve over time as we scale</li><li>Define
  the key metrics, KPIs and processes that cut across functions to bring our teams
  together</li><li>Define and support where needed the key programs that help our
  sales functions create pipe, close business and deliver for our customers</li><li>Ensure
  day-to-day support on running the business (business performance, comp, planning,
  forecasting etc.) across pre-sales, post-sales, and ecosystem</li><li>Connect with
  the sales teams and their leadership in the Regions to gather feedback and ensure
  that they have full understanding of the role of our functions, and we are ultimately
  improving our GTM productivity, and the health of our business</li><li>Build and
  scale a team that embodies high performance culture in an emotionally aware and
  passionate way</li><li>Proven ability to be a critical and thoughtful business partner.
  A challenger as well as a supporter and driver</li><li>Proven ability to develop,
  coach and inspire a highly motivated team of Ops rockstars</li><li>Knowledge of
  enterprise SaaS selling, including market positioning</li><li>Knowledge of working
  with partners and establishing ecosystem-awareness and engagement in a sales team</li><li>Ability
  to operate in a global environment, with thoughtfulness on balancing global standardization
  with localization for impact</li></ul><p><strong>The qualifications you need:</strong></p><ul><li>Proven
  ability to be a critical and thoughtful business partner. A challenger as well as
  a supporter and driver</li><li>Proven ability to develop, coach and inspire a highly
  motivated team of Ops rockstars</li><li>Knowledge of enterprise SaaS selling, including
  market positioning</li><li>Knowledge of working with partners and establishing ecosystem-awareness
  and engagement in a sales team</li><li>Ability to operate in a global environment,
  with thoughtfulness on balancing global standardization with localization for impact</li></ul><p><p><strong>What
  Celonis Can Offer You:</strong></p><ul><li><strong>Pioneer Innovation:</strong>&nbsp;Work
  with the leading, award-winning process mining technology, shaping the future of
  business.</li><li><strong>Accelerate Your Growth:</strong>&nbsp;Benefit from clear
  career paths, internal mobility, a dedicated learning program, and mentorship opportunities.</li><li><strong>Receive
  Exceptional Benefits:</strong>&nbsp;Including generous PTO, hybrid working options,
  company equity (RSUs), comprehensive benefits, extensive parental leave, dedicated
  volunteer days, and&nbsp;much more. Interns and working students explore your benefits
  here.</li><li><strong>Prioritize Your Well-being:</strong>&nbsp;Access to resources
  such as gym subsidies, counseling, and well-being programs.</li><li><strong>Connect
  and Belong:</strong>&nbsp;Find community and support through dedicated inclusion
  and belonging programs.</li><li><strong>Make Meaningful Impact:</strong>&nbsp;Be
  part of a company driven by strong&nbsp;values&nbsp;that guide everything we do:
  Live for Customer Value, The Best Team Wins, We Own It, and Earth Is Our Future.</li><li><strong>Collaborate
  Globally:</strong>&nbsp;Join a dynamic, international team of talented individuals.</li><li><strong>Empowered
  Environment:</strong>&nbsp;Contribute your ideas in an open culture with autonomous
  teams.</li></ul><p><strong>About Us:</strong></p><p>Celonis makes processes work
  for people, companies and the planet. The Celonis Process Intelligence Platform
  uses industry-leading process mining and AI technology and augments it with business
  context to give customers a living digital twin of their business operation. It’s
  system-agnostic and without bias, and provides everyone with a common language for
  understanding and improving businesses. Celonis enables its customers to continuously
  realize significant value across the top, bottom, and green line. Celonis is headquartered
  in Munich, Germany, and New York City, USA, with more than 20 offices worldwide.</p><p>Get
  familiar with the Celonis Process Intelligence Platform by watching this video.<strong><br></strong></p><p><strong>Celonis
  Inclusion Statement:</strong></p><p>At Celonis, we believe our people make us who
  we are and that “The Best Team Wins”. We know that the best teams are made up of
  people who bring different perspectives to the table. And when everyone feels included,
  able to speak up and knows their voice is heard - that''s when creativity and innovation
  happen.<strong><br></strong></p><p><strong>Your Privacy:</strong></p><p>Any information
  you submit to Celonis as part of your application will be processed in accordance
  with Celonis’ Accessibility and Candidate Notices</p><p>By submitting this application,
  you confirm that you agree to the storing and processing of your personal data by
  Celonis as described in our Privacy Notice for the Application and Hiring Process.</p><p>Please
  be aware of common job offer scams, impersonators and frauds. Learn more here.</p></p>'
