company_overview: For well over a century, Cox Enterprises has been shaping the future
  with daring ideas and values-driven thinking.Since our founding in 1898, our relentless
  spirit of innovation has driven us to disrupt industries and enhance the quality
  of life in the communities we serve. Through our major divisions — Cox Communications,
  Cox Automotive and Cox Farms — our people have countless opportunities to grow and
  make an impact in the communications and automotive industries, as well as in new
  ventures in agriculture, cleantech, digital media and more.As a privately-held,
  family-owned business, we know that people are our most valuable asset. We offer
  a supportive and inclusive environment with flexible career growth, amazing benefits
  and work-life balance at the forefront.Our mission, our ways of working and our
  commitment to people are what make our workplace culture remarkably flexible and
  resilient. Join us to build a better future and make your mark.
