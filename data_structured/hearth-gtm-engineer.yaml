description_html: '<p><span>Location: NYC (Hybrid, 3x/week)</span></p><p><span>Compensation:
  $130k–$170k base salary range based on level and experience, plus a generous pre-IPO
  equity package</span></p><p><br></p><p><b><strong>About Hearth</strong></b></p><p><span>Hearth
  is the AI growth system for local home improvement small businesses. We build revenue-critical
  software for home improvement contractors — the roofers, HVAC techs, and builders
  who keep America running.</span></p><p><br></p><p><span>Our platform helps real
  business owners win more jobs, protect profit margins, and manage homeowner relationships
  professionally so they can build generational companies for their families and communities.</span></p><p><br></p><p><span>We
  are now building the next layer: a personal AI employee for every small business
  in the trades focused on autonomously generating sales for America’s home improvement
  pros. An assistant who answers every call 24/7, qualifies leads, books appointments,
  follows up on quotes and estimates, and helps small business owners go from missing
  half of their business to capturing all of it.</span></p><p><br></p><p><span>With
  15,000+ paying customers, default profitability, and backing from some of the world’s
  best investors (Founder’s Fund, 8VC, Human Capital, etc.), Hearth is focused on
  bringing AI to the trades.</span></p><p><br></p><p><br></p><p><br></p><b><b><strong>The
  Opportunity</strong></b></b><p><span>We are transforming our revenue operations
  from a reactive, ticket-driven support function into an AI-first GTM engineering
  organization. The GTM Engineer is the founding hire that kicks off this transformation.</span></p><p><br></p><p><span>We
  are searching for a true builder who can create leveraged, AI-powered revenue systems
  from scratch — someone who has been doing GTM Engineering before the title existed.
  You will be the founding member of our Automation &amp; AI GTM pod, working alongside
  GTM teams and product. Your mandate: make every GTM team member — Marketing, CS,
  Sales — more productive through intelligent automation.</span></p><p><br></p><p><span>This
  role is for someone who wants to invent step-function transformation rather than
  incremental improvements— rebuilding GTM motions not just for today’s world, but
  capitalizing on where the world is going. You won’t be optimizing what exists.</span></p><p><br></p><b><b><strong>What
  You''ll Do:</strong></b></b><ul><li><b><strong>Retention revenue systems — </strong></b><span>Partner
  with product to scale the successful human interventions that drive our key leading
  indicators for customer outcomes that have direct impact on retention.</span></li><li><b><strong>Marketing
  operations — </strong></b><span>Solve critical marketing ops bottlenecks and enable
  a high-velocity marketing automation function through our recently purchased HubSpot
  instance, seamlessly leveraging data from HubSpot, Salesforce, and Redshift.</span></li><li><b><strong>Outbound
  engine — </strong></b><span>Audit and rebuild our outbound motion end-to-end: lead
  sourcing, scoring, and distribution to drive a 2–5x increase in ARR/Rep/Day.</span></li><li><b><strong>AI
  Go Team — </strong></b><span>Seed the internal team working with our AI PM to optimize
  systems and drive AI revenue goals. You are the founding member.</span></li><li><b><strong>Data
  quality — </strong></b><span>Improve data and deduplication issues in partnership
  with the data team, building resilient, production-grade automations across Clay,
  Salesforce, and HubSpot.</span></li></ul><p><br></p><b><b><strong>What We’re Looking
  For:</strong></b></b><ul><li><b><strong>Product mindset. </strong></b><span>You
  think in terms of a roadmap, prioritize by business impact, and proactively identify
  opportunities rather than waiting for tickets. You own outcomes, not tasks.</span></li><li><b><strong>End-to-end
  shipper. </strong></b><span>From identifying the problem, to designing the workflow,
  to building it, to deploying it in production, to measuring impact. No handoffs
  to engineering. You ship the whole thing.</span></li><li><b><strong>First principles
  thinker. </strong></b><span>You don’t optimize existing solutions. You identify
  the core problem and desired state. Deconstruct what needs to be true. Remove, subtract,
  reinvent processes to get outcomes — you think from a blank canvas.</span></li><li><b><strong>AI/LLM
  fluency. </strong></b><span>You’ve used AI tools (Claude, GPT, etc.) to build real
  workflows, not just experimented. You’ve done it, not just talked about it. Prompt
  engineering, API integration, agentic solutions — you understand where LLMs add
  value and where they don’t.</span></li><li><b><strong>GTM Ops automation depth.
  </strong></b><span>Clay, n8n, Zapier at an advanced level, or custom-built equivalents.
  You spend your free time testing and trialing the latest and greatest. You are teaching
  us, not the other way around.</span></li><li><b><strong>Salesforce depth. </strong></b><span>Everything
  we expect from a strong RevOps person. Comfort building flows, automation rules,
  and working with the SFDC data model. You don’t need to be a certified admin, but
  you need to ship inside Salesforce.</span></li><li><b><strong>HubSpot and marketing
  automation. </strong></b><span>Everything we expect from a strong marketing ops
  person. You can own the marketing automation stack and make it hum.</span></li><li><b><strong>Startup
  velocity. </strong></b><span>You’ve worked somewhere that ships fast and iterates.
  Comfort with ambiguity, scrappiness, wearing multiple hats. You’re energized by
  that, not stressed by it.</span></li></ul><p><b><strong>Ideal Qualifications:</strong></b></p><ul><li><span>Python/SQL
  skills for data manipulation and custom integrations</span></li><li><span>Experience
  in B2B SaaS, transactional sales teams (inbound, outbound), home services, or financial
  services verticals</span></li><li><span>Track record creating actionable content
  about GTM engineering on Substack, LinkedIn, or X — real stuff, not AI fluff</span></li></ul><p><br></p><b><b><strong>What
  We’re Not Looking For:</strong></b></b><ul><li><span>You’re a traditional RevOps
  person who changed your positioning to “GTM Engineer” and sprinkled “AI” and “Clay”
  into your LinkedIn profile</span></li><li><span>You read tweets and content about
  AI but haven’t actually shipped end-to-end AI workflow solutions with a clear story
  and revenue impact</span></li><li><span>You “use AI” by talking to ChatGPT/Claude
  like Google or prompting for projects — not by building production systems</span></li><li><span>You
  run reports and manage tickets rather than building systems that eliminate tickets</span></li><li><span>You
  need heavy management or hand-holding</span></li><li><span>You’ve purchased tools
  and taken credit rather than building the automations yourself</span></li><li><span>You’re
  looking for a “chill” job rather than an opportunity to do your life’s work and
  build something truly impactful</span></li></ul><p><br></p><b><b><strong>Why This
  Role:</strong></b></b><ul><li><b><strong>Real impact on real people. </strong></b><span>Our
  customers are business owners building real things. Over 50% go out of business
  without software like Hearth. When you ship a workflow that works, a contractor
  in Phoenix closes a job they would have missed, and a roofer in Texas stops losing
  40% of inbound calls because he’s on a job site, and a fence pro in Delaware gets
  to come home for dinner with his family. The feedback loop between your work and
  someone’s livelihood is short and tangible.</span></li><li><b><strong>Founding role
  with a team-building path. </strong></b><span>This is the first GTM Engineer at
  Hearth. You set the roadmap, prove the model, and shape how the team is built.</span></li><li><b><strong>A
  real business with serious traction and massive upside. </strong></b><span>Hearth
  is growing, profitable, and already has 15,000+ customers. This isn’t a proof of
  concept — this is an opportunity to build the most ambitious version of a revenue
  machine that powers a trillion dollar market. Early enough for meaningful equity
  and late enough for strong foundations.</span></li><li><b><strong>AI-first, not
  AI-adjacent. </strong></b><span>Hearth is investing in AI across the business. You’ll
  work directly with our AI PM, have tools to experiment, and your job is literally
  to build the future of how revenue gets generated.</span></li></ul><p><br></p><p><b><strong>Our
  Core Values</strong></b></p><ul><li><b><strong>Truth.&nbsp;</strong></b><span>We
  value honesty and data. We seek to understand what is reality, so we can effectively
  respond to it.</span></li><li><b><strong>Slope.</strong></b><span>&nbsp;Rate of
  change over time. We hire and reward based on a team member’s potential, capacity,
  and growth-mindset, rather than a fancy resume.&nbsp;</span></li><li><b><strong>Mutual
  Benefit.&nbsp;</strong></b><span>The best outcomes happen when everyone wins - customers,
  team members, and the company. We seek to understand each other’s aspirations and
  create alignment to get there.</span></li><li><span>&nbsp;</span><b><strong>Competitive
  Greatness.&nbsp;</strong></b><span>We desire an opportunity and environment from
  which to pull the greatest versions of ourselves out into the world, rather than
  just a “job”.&nbsp;</span></li></ul><p><br></p><p><b><strong>Location</strong></b></p><p><span>This
  role will be located in NYC along with the rest of the technical Hearth team, the
  CEO, and other key roles in the business. Hearth believes in the energy, connection,
  and serendipity of in-person/hybrid work culture (3+ days/week) for builders who
  are committed to building truly innovative software and making a significant positive
  impact in the world.</span></p><p><br></p><p><b><strong>Benefits</strong></b></p><ul><li><span>Mission-driven,
  values-based culture.</span></li><li><span>Competitive pay.</span></li><li><span>Unmatched
  opportunities to learn and develop; front-row seat at a fast-growing tech startup</span></li><li><span>Generous
  PTO, plus paid company holidays.</span></li><li><span>Stock options.</span></li><li><span>Medical,
  dental, and vision options.</span></li><li><span>401(k)</span></li><li><span>Free
  Employee Assistance Program</span></li><li><span>Parental Leave Program</span></li><li><span>Pet
  Insurance</span></li></ul><p><br></p><p><b><strong>More About Us</strong></b><br><span>Hearth
  embraces diversity. We are proud to be an equal opportunity workplace and do not
  discriminate on the basis of sex, race, color, age, sexual orientation, gender identity,
  religion, national origin, citizenship, marital status, veteran status, or disability
  status. We consider employment for qualified applicants with arrest and conviction
  records.</span></p>'
