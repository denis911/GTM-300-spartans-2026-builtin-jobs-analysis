company_overview: Hearth exists because 50 - 80% of small businesses in the trades
  (roofers, plumbers, etc.) fail within their first five years. Our mission is to
  change that forever and empower small businesses to build and grow successful companies.We've
  built an all-in-one platform that helps SMBs grow sales, protect profits, and save
  time. With over 10,000 customers, Hearth is a vertical SaaS platform powered by
  a financial services layer that is currently powering billions in home improvement
  projects. Backed by the same investors as SpaceX, Stripe, Palantir, AirBnb, Rippling,
  Affirm, Brex, and OpenAI (FoundersFund, 8VC, Human Capital), we aim to protect small
  business entrepreneurship in America, redefine what is possible in running a trades
  business in today's rapidly changing world, and bring forth a future where every
  small business owner in the trades can succeed.
