description_html: '<b>Description </b><br>We deliver our customers peace of mind every
  day by helping them protect what they value most. Our passion for placing the customer
  at the center of everything we do is driving a transformational shift at Liberty
  Mutual. Operating as a tech startup within a Fortune 100 company, we are leading
  a digital disruption that will redefine how people experience insurance. <br>Liberty
  Mutual Insurance is actively searching for an experienced System Support Analyst.
  In this role you will use business and technical knowledge to participate in the
  re-engineering of business operations to improve business results. Evaluate business
  requirements and models data and/or system requirements. Analyze and document business
  problems of moderate complexity. Develops test plans and tests and approves new
  system behaviors. Coordinates upgrades and rollouts of moderate scope. <br><strong>
  Policy Domain role </strong><br><ul><li>Owns and maintains the Research /Process
  Documentation ensuring service and Policy API research, workflows, and decisions
  are current and organized.</li><li>Serves as support contact for Policy Domain and
  shared service questions/issues, triaging requests, clarifying business context,
  and routing work to the appropriate delivery or platform teams.</li><li>Investigates
  service and Policy API behaviors and defects by analyzing logs, payloads, and dependency
  flows; documents root cause, business impact, and recommended remediation.</li><li>Partners
  with Product Owners, engineers, and downstream consumers to translate policy and
  business rules into clear service/API requirements, use cases, and process documentation.</li><li>Develops
  and maintains SOPs, runbooks, and troubleshooting guides for common service and
  Policy API scenarios, reducing time-to-resolution and repeat incidents.</li><li>Curates
  FAQs, how-to guides, and change summaries for core services in Confluence and proactively
  communicates change impacts to stakeholders.</li></ul><br><strong> Output/Forms
  role </strong><br><ul><li>Represent the Product Owner team in ceremonies and cross-functional
  meetings; facilitate discussions and clearly communicate decisions and share-outs
  to stakeholders.</li><li>Provide proactive production support-troubleshoot, escalate,
  and keep impacted teams informed-while balancing operational priorities and new
  work.</li><li>Support new product development, enhancements, and compliance by researching
  platform impacts, identifying dependencies, defining intake requirements, and helping
  create user acceptance criteria.</li><li>Write and validate business rules and transaction
  scoping logic (coverage-based interrogation) and assist with testing to confirm
  current and post code update platform functionality.</li><li>Multitask across lines
  of business, coverages, transaction types, and legacy vs modernized books; collaborate
  closely with technology and business partners and leverage familiarity with customer-facing
  materials (forms, declarations, notices) when needed.</li><li>Write SQL to triage
  data issues, perform data profiling and policy retrieval.</li></ul><br>This is a
  remote position for candidates who reside within 50 miles of a hub office, will
  be required to go in office 2 days per week. Please note this policy is subject
  to change. <br><b>Qualifications</b><br><ul><li> Bachelor`s degree in business or
  technical discipline or equivalent experience. </li><li> Minimum of 3 years related
  experience. </li><li> General knowledge of business operations, objectives and strategies
  as well as business process and information flow. </li><li> General knowledge of
  IT concepts, strategies and methodologies. </li><li> General knowledge of diverse
  technologies and new and current architectures. </li><li> General understanding
  of re-engineering issues and challenges. </li><li> Skills in object, data and/or
  process modeling; financial analysis and planning; business process design. </li><li>
  Negotiation skills; oral and written communication skills.                                                                                                                                                                                                                                                                    </li></ul><br><b>About
  Us</b><br><b>Pay Philosophy:</b> The typical starting salary range for this role
  is determined by a number of factors including skills, experience, education, certifications
  and location. The full salary range for this role reflects the competitive labor
  market value for all employees in these positions across the national market and
  provides an opportunity to progress as employees grow and develop within the role.
  Some roles at Liberty Mutual have a corresponding compensation plan which may include
  commission and/or bonus earnings at rates that vary based on multiple factors set
  forth in the compensation plan for the role.<br>At Liberty Mutual, our goal is to
  create a workplace where everyone feels valued, supported, and can thrive. We build
  an environment that welcomes a wide range of perspectives and experiences, with
  inclusion embedded in every aspect of our culture and reflected in everyday interactions.
  This comes to life through comprehensive benefits, workplace flexibility, professional
  development opportunities, and a host of opportunities provided through our Employee
  Resource Groups. Each employee plays a role in creating our inclusive culture, which
  supports every individual to do their best work. Together, we cultivate a community
  where everyone can make a meaningful impact for our business, our customers, and
  the communities we serve.<br>We value your hard work, integrity and commitment to
  make things better, and we put people first by offering you benefits that support
  your life and well-being. To learn more about our benefit offerings please visit:
  https://LMI.co/Benefits <br>Liberty Mutual is an equal opportunity employer. We
  will not tolerate discrimination on the basis of race, color, national origin, sex,
  sexual orientation, gender identity, religion, age, disability, veteran''s status,
  pregnancy, genetic information or on any basis prohibited by federal, state or local
  law.<br><b>Fair Chance Notices</b><br><ul><li> California </li><li> Los Angeles
  Incorporated </li><li> Los Angeles Unincorporated </li><li> Philadelphia </li><li>
  San Francisco </li></ul><br>USD $67000.00 - $126000.00'
description_text: 'Description We deliver our customers peace of mind every day by
  helping them protect what they value most. Our passion for placing the customer
  at the center of everything we do is driving a transformational shift at Liberty
  Mutual. Operating as a tech startup within a Fortune 100 company, we are leading
  a digital disruption that will redefine how people experience insurance. Liberty
  Mutual Insurance is actively searching for an experienced System Support Analyst.
  In this role you will use business and technical knowledge to participate in the
  re-engineering of business operations to improve business results. Evaluate business
  requirements and models data and/or system requirements. Analyze and document business
  problems of moderate complexity. Develops test plans and tests and approves new
  system behaviors. Coordinates upgrades and rollouts of moderate scope. Policy Domain
  role Owns and maintains the Research /Process Documentation ensuring service and
  Policy API research, workflows, and decisions are current and organized. Serves
  as support contact for Policy Domain and shared service questions/issues, triaging
  requests, clarifying business context, and routing work to the appropriate delivery
  or platform teams. Investigates service and Policy API behaviors and defects by
  analyzing logs, payloads, and dependency flows; documents root cause, business impact,
  and recommended remediation. Partners with Product Owners, engineers, and downstream
  consumers to translate policy and business rules into clear service/API requirements,
  use cases, and process documentation. Develops and maintains SOPs, runbooks, and
  troubleshooting guides for common service and Policy API scenarios, reducing time-to-resolution
  and repeat incidents. Curates FAQs, how-to guides, and change summaries for core
  services in Confluence and proactively communicates change impacts to stakeholders.
  Output/Forms role Represent the Product Owner team in ceremonies and cross-functional
  meetings; facilitate discussions and clearly communicate decisions and share-outs
  to stakeholders. Provide proactive production support-troubleshoot, escalate, and
  keep impacted teams informed-while balancing operational priorities and new work.
  Support new product development, enhancements, and compliance by researching platform
  impacts, identifying dependencies, defining intake requirements, and helping create
  user acceptance criteria. Write and validate business rules and transaction scoping
  logic (coverage-based interrogation) and assist with testing to confirm current
  and post code update platform functionality. Multitask across lines of business,
  coverages, transaction types, and legacy vs modernized books; collaborate closely
  with technology and business partners and leverage familiarity with customer-facing
  materials (forms, declarations, notices) when needed. Write SQL to triage data issues,
  perform data profiling and policy retrieval. This is a remote position for candidates
  who reside within 50 miles of a hub office, will be required to go in office 2 days
  per week. Please note this policy is subject to change. Qualifications Bachelor`s
  degree in business or technical discipline or equivalent experience. Minimum of
  3 years related experience. General knowledge of business operations, objectives
  and strategies as well as business process and information flow. General knowledge
  of IT concepts, strategies and methodologies. General knowledge of diverse technologies
  and new and current architectures. General understanding of re-engineering issues
  and challenges. Skills in object, data and/or process modeling; financial analysis
  and planning; business process design. Negotiation skills; oral and written communication
  skills. About Us Pay Philosophy: The typical starting salary range for this role
  is determined by a number of factors including skills, experience, education, certifications
  and location. The full salary range for this role reflects the competitive labor
  market value for all employees in these positions across the national market and
  provides an opportunity to progress as employees grow and develop within the role.
  Some roles at Liberty Mutual have a corresponding compensation plan which may include
  commission and/or bonus earnings at rates that vary based on multiple factors set
  forth in the compensation plan for the role. At Liberty Mutual, our goal is to create
  a workplace where everyone feels valued, supported, and can thrive. We build an
  environment that welcomes a wide range of perspectives and experiences, with inclusion
  embedded in every aspect of our culture and reflected in everyday interactions.
  This comes to life through comprehensive benefits, workplace flexibility, professional
  development opportunities, and a host of opportunities provided through our Employee
  Resource Groups. Each employee plays a role in creating our inclusive culture, which
  supports every individual to do their best work. Together, we cultivate a community
  where everyone can make a meaningful impact for our business, our customers, and
  the communities we serve. We value your hard work, integrity and commitment to make
  things better, and we put people first by offering you benefits that support your
  life and well-being. To learn more about our benefit offerings please visit: https://LMI.co/Benefits
  Liberty Mutual is an equal opportunity employer. We will not tolerate discrimination
  on the basis of race, color, national origin, sex, sexual orientation, gender identity,
  religion, age, disability, veteran''s status, pregnancy, genetic information or
  on any basis prohibited by federal, state or local law. Fair Chance Notices California
  Los Angeles Incorporated Los Angeles Unincorporated Philadelphia San Francisco USD
  $67000.00 - $126000.00'
