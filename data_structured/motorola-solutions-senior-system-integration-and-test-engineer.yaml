description_html: <b><b>Company Overview</b></b><p>At Motorola Solutions, we believe
  that everything starts with our people. We’re a global close-knit community, united
  by the relentless pursuit to help keep people safer everywhere. We build and connect
  technologies to help protect people, property and places. Our solutions foster the
  collaboration that’s critical for safer communities, safer schools, safer hospitals,
  safer businesses, and ultimately, safer nations. Connect with a career that matters,
  and help us build a safer future.</p><b><br><b>Department Overview</b></b>Silvus
  Technologies was acquired by Motorola Solutions in 2025, and is now part of its
  ecosystem of safety and security technologies.<br> <br>With deep roots in DARPA
  research, Silvus Technologies develops world-class advanced communications technologies
  that are reshaping the tactical communications landscape. From pure line-of-sight
  to extreme non-line-of-sight, Silvus radios form a self-healing, self-forming mesh
  network, enabling secure and reliable connectivity, including video and high-bandwidth
  data.<b><br>Job Description</b><p>THE OPPORTUNITY</p><p>Silvus is seeking a <i>Senior
  System Integration and Test Engineer</i> who will report to the <i>Senior Engineering
  Director </i>on the Irvine Engineering team. The successful individual in this role
  will conduct a wide range of technical activities relating to system integration
  and test engineering and will work closely with different teams, including design
  engineering as well as sales and product engineering teams, to drive product development
  and testing and be a key component in enabling the development of cutting-edge systems
  and technologies.</p><p>This position is expected to help define and test new products
  and features, assist the internal design and sales engineering teams as well as
  customers with technical support and testing requests, perform technical analysis
  and systems integration duties, and engineer complete solutions to complex problems.
  This role works closely with internal Engineering teams as well as provide in-person
  support with up to 25% travel, both domestic and international.</p><p><span>This
  position</span> <span>is</span> 100% onsite, Monday through Friday, at <span>Silvus
  Technologies’ Engineering and R&amp;D Office in <b>Irvine, CA</b>, near the vibrant
  Irvine Spectrum.</span></p><p>The following is a list of at least some of the current
  essential job functions of the position. Management may assign or reassign duties
  and responsibilities at any time at its discretion.</p><p>ROLE AND RESPONSIBILITIES</p><ul><li>Design
  and test complete solutions using Silvus HW and SW products that solve unique, technical
  problems.</li><li>Prepare integration test plans and execute them. This may involve
  the lower-level embedded firmware and hardware testing as well as the product-level
  functional testing.</li><li>Define new products and features to fill gaps and perform
  product evaluations and field tests and trials for new product features and accessories.</li><li>Respond
  to requests and questions from internal teams as well as customers, providing debugging
  and troubleshooting support, systems integration engineering, product recommendations,
  engineering analysis, and other services both remotely and/or in person. Also support
  these requests via in-house lab or field testing and validation, as needed.</li><li>Test
  and harden existing features through firmware and hardware changes in realistic
  applications.</li><li>Support the Sales Engineering team by helping prepare for
  demonstrations, training, testing, or recreating bugs and issues they see in the
  field.</li><li>Support the Sales Engineering team in creating and maintaining customer-facing
  documents and content including manuals, user guides, videos, application notes,
  etc. to support customers and internal teams more efficiently.</li><li>Perform other
  related duties of which the above are representative.</li><li><i>Travel Requirement:</i>
  Occasional travel up to 25%, both domestic and international (e.g., max 1 week out
  of the month typically confined to the workweek) to provide in-person engineering
  support to customers and the sales team including demonstrations, troubleshooting,
  system integration, and training.</li></ul><p>REQUIRED QUALIFICATIONS</p><ul><li>Bachelor’s
  degree in Electrical Engineering, Engineering Technology, Computer Engineering,
  Computer Science, or other relevant fields plus a minimum 5 years of relevant industry
  experience, specifically in embedded firmware development and testing, scripting,
  embedded Linux, C/C++, and python; OR a minimum of 3 years of relevant industry
  experience with an advanced degree in Electrical Engineering, Engineering Technology,
  Computer Engineering, Computer Science.</li><li>Proficiency with lab instruments
  such as signal generators, spectrum analyzers, and logic analyzers.</li><li>Willingness
  to travel and work at customer sites.</li><li><b><u>Must be a U.S. Citizen</u></b>
  due to clients under U.S. government contracts.</li><li><b>Employment is contingent
  upon the successful clearance of a background check and drug test.</b></li></ul><p>PREFERRED
  KNOWLEDGE, SKILLS, AND ABILITIES</p><ul><li>Proven experience with wireless and
  radio communication systems, RF signal propagation principles,</li><li>and digital
  communication technologies.</li><li>Demonstrated experience with TCP/IP networking.</li><li>Excellent
  organizational skills, attentiveness to details, and ability to multi-task and quickly
  switch gears.</li><li>Strong verbal and written communications skills to effectively
  communicate internally and with customers.</li><li>Ability to work independently,
  take initiative, and effectively interact with cross-functional teams and customers.</li><li>Proficiency
  with PC office applications.</li></ul><b><br>Basic Requirements</b><ul><li>Bachelor’s
  degree in Electrical Engineering, Engineering Technology, Computer Engineering,
  Computer Science, or other relevant fields plus a minimum 5 years of relevant industry
  experience, specifically in embedded firmware development and testing, scripting,
  embedded Linux, C/C++, and python; OR a minimum of 3 years of relevant industry
  experience with an advanced degree in Electrical Engineering, Engineering Technology,
  Computer Engineering, Computer Science.</li><li>Proficiency with lab instruments
  such as signal generators, spectrum analyzers, and logic analyzers.</li><li>Willingness
  to travel and work at customer sites.</li><li><b><u>Must be a U.S. Citizen</u></b>
  due to clients under U.S. government contracts.</li></ul><b><br>Travel Requirements</b>10-25%<b><br>Relocation
  Provided</b>Domestic<b><br>Position Type</b>Experienced<b><br>Referral Payment Plan</b>Yes<p><b>Our
  U.S.&nbsp;Benefits&nbsp;include:</b></p><ul><li><p>Incentive Bonus Plans</p></li><li><p>Medical,
  Dental, Vision&nbsp;benefits</p></li><li><p>401K with Company Match</p></li><li><p>10
  Paid Holidays</p></li><li><p>Generous&nbsp;Paid&nbsp;Time Off Packages</p></li><li><p>Employee
  Stock Purchase Plan</p></li><li><p>Paid&nbsp;Parental &amp; Family Leave</p></li><li><p>and
  more!</p></li></ul><p><br><i><b>EEO Statement</b></i></p><p></p><p><span>Motorola
  Solutions is an Equal Opportunity Employer. All qualified applicants will receive
  consideration for employment without regard to race, color, religion or belief,
  sex, sexual orientation, gender identity, national origin, disability, veteran status
  or any other legally-protected <span><span><span><span><span><span><span><span><span><span>characteristic.&nbsp;</span></span></span></span></span></span></span></span></span></span></span></p><p></p><p><span>We
  are proud of our people-first and community-focused culture, empowering every Motorolan
  to be their most authentic self and to do their best work to deliver on the promise
  of a safer world. If you’d like to join our team but feel that you don’t quite meet
  all of the preferred skills, we’d still love to hear why you think you’d be a great
  addition to our team.</span></p><p></p><p>We’re committed to providing an inclusive
  and accessible recruiting experience for candidates with disabilities, or other
  physical or mental health conditions. To request an accommodation, please complete
  this&nbsp;Reasonable Accommodations Form&nbsp;so we can assist you.</p><p></p><p></p>
description_text: 'Company Overview At Motorola Solutions, we believe that everything
  starts with our people. We’re a global close-knit community, united by the relentless
  pursuit to help keep people safer everywhere. We build and connect technologies
  to help protect people, property and places. Our solutions foster the collaboration
  that’s critical for safer communities, safer schools, safer hospitals, safer businesses,
  and ultimately, safer nations. Connect with a career that matters, and help us build
  a safer future. Department Overview Silvus Technologies was acquired by Motorola
  Solutions in 2025, and is now part of its ecosystem of safety and security technologies.
  With deep roots in DARPA research, Silvus Technologies develops world-class advanced
  communications technologies that are reshaping the tactical communications landscape.
  From pure line-of-sight to extreme non-line-of-sight, Silvus radios form a self-healing,
  self-forming mesh network, enabling secure and reliable connectivity, including
  video and high-bandwidth data. Job Description THE OPPORTUNITY Silvus is seeking
  a Senior System Integration and Test Engineer who will report to the Senior Engineering
  Director on the Irvine Engineering team. The successful individual in this role
  will conduct a wide range of technical activities relating to system integration
  and test engineering and will work closely with different teams, including design
  engineering as well as sales and product engineering teams, to drive product development
  and testing and be a key component in enabling the development of cutting-edge systems
  and technologies. This position is expected to help define and test new products
  and features, assist the internal design and sales engineering teams as well as
  customers with technical support and testing requests, perform technical analysis
  and systems integration duties, and engineer complete solutions to complex problems.
  This role works closely with internal Engineering teams as well as provide in-person
  support with up to 25% travel, both domestic and international. This position is
  100% onsite, Monday through Friday, at Silvus Technologies’ Engineering and R&amp;D
  Office in Irvine, CA , near the vibrant Irvine Spectrum. The following is a list
  of at least some of the current essential job functions of the position. Management
  may assign or reassign duties and responsibilities at any time at its discretion.
  ROLE AND RESPONSIBILITIES Design and test complete solutions using Silvus HW and
  SW products that solve unique, technical problems. Prepare integration test plans
  and execute them. This may involve the lower-level embedded firmware and hardware
  testing as well as the product-level functional testing. Define new products and
  features to fill gaps and perform product evaluations and field tests and trials
  for new product features and accessories. Respond to requests and questions from
  internal teams as well as customers, providing debugging and troubleshooting support,
  systems integration engineering, product recommendations, engineering analysis,
  and other services both remotely and/or in person. Also support these requests via
  in-house lab or field testing and validation, as needed. Test and harden existing
  features through firmware and hardware changes in realistic applications. Support
  the Sales Engineering team by helping prepare for demonstrations, training, testing,
  or recreating bugs and issues they see in the field. Support the Sales Engineering
  team in creating and maintaining customer-facing documents and content including
  manuals, user guides, videos, application notes, etc. to support customers and internal
  teams more efficiently. Perform other related duties of which the above are representative.
  Travel Requirement: Occasional travel up to 25%, both domestic and international
  (e.g., max 1 week out of the month typically confined to the workweek) to provide
  in-person engineering support to customers and the sales team including demonstrations,
  troubleshooting, system integration, and training. REQUIRED QUALIFICATIONS Bachelor’s
  degree in Electrical Engineering, Engineering Technology, Computer Engineering,
  Computer Science, or other relevant fields plus a minimum 5 years of relevant industry
  experience, specifically in embedded firmware development and testing, scripting,
  embedded Linux, C/C++, and python; OR a minimum of 3 years of relevant industry
  experience with an advanced degree in Electrical Engineering, Engineering Technology,
  Computer Engineering, Computer Science. Proficiency with lab instruments such as
  signal generators, spectrum analyzers, and logic analyzers. Willingness to travel
  and work at customer sites. Must be a U.S. Citizen due to clients under U.S. government
  contracts. Employment is contingent upon the successful clearance of a background
  check and drug test. PREFERRED KNOWLEDGE, SKILLS, AND ABILITIES Proven experience
  with wireless and radio communication systems, RF signal propagation principles,
  and digital communication technologies. Demonstrated experience with TCP/IP networking.
  Excellent organizational skills, attentiveness to details, and ability to multi-task
  and quickly switch gears. Strong verbal and written communications skills to effectively
  communicate internally and with customers. Ability to work independently, take initiative,
  and effectively interact with cross-functional teams and customers. Proficiency
  with PC office applications. Basic Requirements Bachelor’s degree in Electrical
  Engineering, Engineering Technology, Computer Engineering, Computer Science, or
  other relevant fields plus a minimum 5 years of relevant industry experience, specifically
  in embedded firmware development and testing, scripting, embedded Linux, C/C++,
  and python; OR a minimum of 3 years of relevant industry experience with an advanced
  degree in Electrical Engineering, Engineering Technology, Computer Engineering,
  Computer Science. Proficiency with lab instruments such as signal generators, spectrum
  analyzers, and logic analyzers. Willingness to travel and work at customer sites.
  Must be a U.S. Citizen due to clients under U.S. government contracts. Travel Requirements
  10-25% Relocation Provided Domestic Position Type Experienced Referral Payment Plan
  Yes Our U.S.&nbsp;Benefits&nbsp;include: Incentive Bonus Plans Medical, Dental,
  Vision&nbsp;benefits 401K with Company Match 10 Paid Holidays Generous&nbsp;Paid&nbsp;Time
  Off Packages Employee Stock Purchase Plan Paid&nbsp;Parental &amp; Family Leave
  and more! EEO Statement Motorola Solutions is an Equal Opportunity Employer. All
  qualified applicants will receive consideration for employment without regard to
  race, color, religion or belief, sex, sexual orientation, gender identity, national
  origin, disability, veteran status or any other legally-protected characteristic.&nbsp;
  We are proud of our people-first and community-focused culture, empowering every
  Motorolan to be their most authentic self and to do their best work to deliver on
  the promise of a safer world. If you’d like to join our team but feel that you don’t
  quite meet all of the preferred skills, we’d still love to hear why you think you’d
  be a great addition to our team. We’re committed to providing an inclusive and accessible
  recruiting experience for candidates with disabilities, or other physical or mental
  health conditions. To request an accommodation, please complete this&nbsp;Reasonable
  Accommodations Form&nbsp;so we can assist you.'
