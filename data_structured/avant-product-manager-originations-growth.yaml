company_overview: Our mission is to move financial lives forward. We utilize data
  and technology to connect everyday Americans to financial solutions, empowering
  our customers to achieve their financial goals and build financial health.We are
  a data-driven platform at the intersection of technology and credit*, built to meet
  the financial needs of millions of middle-income Americans. We use data and machine
  learning to deliver access to a suite of financial products and services anchored
  by credit cards, personal loans, and a personal financial management tool. Since
  Avant (AvantCredit®) was founded in 2012, we have connected over 4 million unique
  customers to over y $12.5 billion in personal loans and more than 2.8 million credit
  cards.. We are driven by purpose with a passion to empower people to achieve their
  financial goals, and that is why we’ve built a mission-driven company with our customers
  at its core. We honor the journey our customers are going through by serving their
  needs with the integrity, transparency, and trust they deserve. Every Avantee embraces
  our values of authenticity, collaboration, problem-solving, customer centricity,
  and initiative.Are you ready to join us in moving financial lives forward? If you
  want to live the Avant values, build your career, and grow your skills, get in touch!See
  available opportunities at www.avant.com/jobs.*Avant, LLC is a financial technology
  company, not a bank. Avant-branded credit products are issued by WebBank.
