description_html: <p><span>Avant is looking for a Product Manager (PM) to support
  our Originations Growth Pod. Our originations platform is at the heart of everything
  we do to achieve growth for both loan and credit card.&nbsp; The Originations Growth
  Product Manager will partner with our Engineering team to deliver features to achieve
  our key business commitments for application funnel efficiency. They will be responsible
  for product planning and execution throughout the Product Life Cycle, including
  gathering and prioritizing product and customer requirements, and working closely
  with engineering to ensure business and customer satisfaction goals are met to drive
  delivery and quality standards.&nbsp;</span></p><p><span>The PM team’s charter is
  to help bring the business vision and strategy to life. As a PM you will be focused
  on solutioning business needs and leading delivery with engineering.&nbsp;&nbsp;</span></p><br><p><b><span>What
  You’ll Do at Avant:</span></b></p><ul><li><p><span>Manage the originations growth
  platform product intake process.</span></p></li><li><p><span>Own the platform stability
  and features, analyzing customer needs and pain points to translate them into product
  ideas.</span></p></li><li><p><span>Understand and empathize with customers and come
  up with user personas to build deep understanding to represent the customer’s voice
  and solve for their needs throughout the product development processes.</span></p></li><li><p><span>Work
  with business stakeholders and originations engineering partners to come up with
  a roadmap and help prioritize the roadmap by making key tradeoff decisions.</span></p></li><li><p><span>Carry
  out impact assessment for roadmap items, flag and address any key risks, issues
  and dependencies.</span></p></li><li><p><span>Work with internal teams to execute
  on the roadmap.</span></p></li><li><p><span>Translate product strategy into detailed
  business and user requirements.</span></p></li><li><p><span>Actively prioritize
  product backlog and coordinate planning to build and enhance our verifications platform.</span></p></li><li><p><span>Create
  engineering requests with detailed technical requirements and clearly stage success
  criteria for testing and product acceptance.</span></p></li><li><p><span>Assess
  launched products and tools to measure their outcome against the planned objectives
  and key results.</span></p></li><li><p><span>Analyze metrics and data, identify
  trends and issues and come up with hypothesis recommendations and carry out experiments.</span></p></li><li><p><span>Answer
  questions related to the product and its capabilities.</span></p></li><li><p><span>Be
  at the forefront of the creation and maintenance of product documentation.</span></p></li><li><p><span>Potential
  for people management. </span><br>&nbsp;</p></li></ul><p><b><span>Why you’re a fit
  at Avant:</span></b></p><ul><li><p><span>Bachelor’s or Master's Degree in business,
  computer science, data science or in “STEM” Majors (Science, Technology, Engineering
  and Math).&nbsp; MBA is a plus.&nbsp;</span></p></li><li><p><span>Ideally 5-7+ years
  of experience working with technology products with at least 5 years in Product
  Management working in fintech or similar industry</span></p></li><li><p><span>High
  proficiency in SQL and familiarity with Python</span></p></li><li><p><span>Demonstrated
  experience in defining a product strategy, creating a delivery plan, executing on
  that plan and learning from iterating on the plan to achieve the desired outcomes</span></p></li><li><p><span>High
  customer empathy&nbsp;</span></p></li><li><p><span>Agile development in a production
  environment at a startup or tech organization</span></p></li><li><p><span>Experience
  collaborating with engineers and designers to understand the technical scope of
  products and features</span></p></li><li><p><span>Strong communication skills and
  ability to interface with multiple stakeholders across the organization, with an
  eye towards building cross-functional collaboration and support</span></p></li><li><p><span>You
  are excited about building the business of Avant as a cohesive whole, not just building
  features or products in isolation</span></p></li><li><p><span>Strong interpersonal
  skills, communication skills, analytical skills, combined with intellectual curiosity,
  and a desire and ability to "get sh!t done!"</span></p></li><li><p><span>People
  management experience is a plus.</span></p></li></ul><p></p><p></p><p><span>This
  role is based on our downtown Chicago Office, located in the Merchandise Mart. We
  highly value collaboration and our hybrid schedule (M, T, Th in-office) enables
  flexibility to balance work and individual priorities.</span></p><p></p><p></p><p><b><b>Compensation
  Range:</b></b></p><p>The base salary range for this job is USD $130,000 - USD $175,000/
  Year</p><p></p><p></p><p><b>Employees new to Avant typically come in below the midpoint
  of the pay range.</b><span> The compensation range is based on the level outlined
  in the job posting, and compensation decisions are dependent on each applicant's
  experience, skills and abilities.&nbsp;</span></p><p><i>[If an outstanding applicant's
  experience and skill level is above or below the qualifications outlined in the
  job posting, we reserve the right to make an offer at a different level than the
  one listed in this job posting, which may have a different compensation range.]</i></p><p><span>This
  role is eligible for additional incentives, including an annual bonus. These rewards
  are allocated based on level, impact and performance in the role.</span></p><p></p><p></p><p><b>Our
  benefits include:</b></p><ul><li><p>Choice of great Medical, Dental, and Vision
  Insurance Plan options</p></li><li><p>401(k) match</p></li><li><p>Flexible Time
  Off</p></li><li><p>Flexible Work Environment - (i.e. Mon/Tues/Thurs in-person)</p></li><li><p>Generous
  Paid Parental Leave, Adoption Assistance and Post-parental leave ramp-up program&nbsp;</p></li><li><p>Lunch
  Allowance (Fooda) and In-office Snacks</p></li><li><p>Summer Fridays&nbsp;</p></li><li><p>Fun
  In-Office and Virtual Social Events</p></li><li><p><i>And who doesn’t love the swag</i></p></li></ul><p><b>Check
  out our</b><b> <u>Avant Blog</u></b><b>!</b></p><p>We believe that a diverse set
  of backgrounds and experiences helps us create the most innovative solutions for
  our customers. We invite you to apply to our positions even if you do not meet 100%
  of the qualifications listed in the description. If you’re passionate about our
  mission and aligned to our values, we hope you’ll come contribute to our awesome
  culture.</p><p><b>Why Avant is the place for you:</b></p><p>At Avant, we believe
  our values make a difference:</p><p><b>Authenticity.</b> We show up to work as our
  whole selves and make sure others can too.</p><p><b>Collaboration.</b> We can only
  succeed when we do so as a team.</p><p><b>Problem-Solving.</b> The harder the problem,
  the more satisfying the solution.</p><p><b>Customer.</b> We are all owners of the
  customer experience.</p><p><b>Initiative.</b> Plan. Adapt. Get Sh!t Done.</p><p><b>We
  believe that great ideas come from anyone and anywhere, that everyone is an owner
  who drives change, and that we have more fun when we work together. We're problem
  solvers who love collaborating with intelligent and highly-motivated people to reshape
  the face of digital banking. Avant offers terrific perks and benefits, fun social
  events with employees who actually like hanging out together, and a flexible growth
  environment where trying your hand at new projects and being the active owner of
  your career path is encouraged and supported.</b></p><p><span><span>To learn more
  about how Avant collects and uses your personal information, please see the </span></span><span><u><span>Avant
  Privacy Policy</span></u></span><span><span>.</span></span></p>
