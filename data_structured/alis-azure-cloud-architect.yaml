description_html: '<b>Company Description</b><p></p><p><strong>Azure Cloud &amp; DevOps
  Engineer&nbsp;</strong></p><p><strong>Contract ( 6 months) to hire</strong></p><p><strong>Visa
  Sponsorship:</strong> Not available. Candidates must be authorized to work in the
  U.S. without the need for current or future sponsorship (including <strong>OPT/STEM
  OPT</strong>)</p><p><u>This role requires a minimum of <strong>three visits per
  year</strong> to our Chicago headquarters, beginning with the final round interview.
  We are looking for candidates who are not only able and willing but truly excited
  to engage with the team in person.</u></p><p><strong>*If you are based in the Chicagoland
  area, you’ll be required to work onsite for your first 90 days. After that, your
  schedule (in-office, hybrid, or remote) will be determined in alignment with performance
  and team needs.</strong></p><p><strong>Hourly/Yearly Rate: </strong>$52.00 - $72.00
  /&nbsp; $110,000-$150,000</p><p><strong>Application Process:</strong></p><p>To be
  considered for this role, please include a cover letter.</p><p><strong>Interview
  steps may include:</strong></p><ol><li><p>Phone Screen with a recruiter&nbsp;</p></li><li><p>Video
  Interview with Hiring Manager&nbsp;</p></li><li><p>Homework Assignment</p></li><li><p>In
  Person interview in our Chicago office&nbsp;</p></li></ol><p></p><b>Job Description</b><p></p><p><strong>About
  the Role</strong></p><p>The Tech and R&amp;D team is looking for a pro at building
  digital highways. The Azure Cloud &amp; DevOps Engineer to be the backbone of our
  infrastructure. You’ll be the person who keeps the lights on, the deployments fast,
  and the security tight.</p><p><strong>What You’ll Be Doing</strong></p><ul><li><p>Ensure
  uptime and performance through monitoring, incident response, and preventive measures.</p></li><li><p>Build
  and maintain CI/CD pipelines for smooth software releases.</p></li><li><p>Implement
  security best practices across infrastructure, applications, and data.</p></li><li><p>Manage
  Azure infrastructure with IaC tools (Terraform, ARM, Bicep).</p></li><li><p>Automate
  processes, optimize costs, and ensure compliance.</p></li><li><p>Collaborate with
  developers, operations, and security teams.</p></li><li><p>Stay current with Azure,
  .NET, and DevOps best practices.</p></li></ul><p></p><b>Qualifications</b><p></p><p><strong>You’ll
  Thrive in This Role If You Have</strong></p><ul><li><p>A Bachelor’s in Computer
  Science&nbsp;</p></li><li><p>3+ years of experience as an Azure Cloud Engineer with
  a deep focus on IaaS, PaaS, networking, and the Well-Architected Framework.<strong>
  Please note:</strong> Extensive hands-on experience with live production systems
  is a requirement for this role.</p></li><li><p>1+ years of hands-on experience using
  Terraform or Bicep to manage production infrastructure. We are looking for candidates
  who have moved beyond lab environments and have managed complex, real-world deployments.</p></li><li><p>You
  have experimented with AI agents like Claude and Codex and are "pro-AI" when it
  comes to accelerating Azure solution design and automation.</p></li><li><p>Experience
  with CI/CD pipelines (Azure DevOps, Git/Bitbucket).</p></li><li><p>1+ years of hands-on
  experience with Azure Services</p></li><li><p>1+ years of hands-on experience with
  scripting (PowerShell, Bash) and Azure IaC (Terraform, ARM, or Bicep).</p></li><li><p>Hands-on
  with Docker, container orchestration, and Azure monitoring tools.</p></li><li><p>Familiarity
  with .NET build processes.</p></li><li><p>Strong communication skills - able to
  explain technical concepts clearly and work cross-functionally</p></li></ul><p><strong>What
  Success Looks Like</strong></p><ul><li><p><strong>Security by Default: </strong>Our
  security posture is baked into the code. You’ve successfully implemented "Guardrails,
  not Gates," allowing developers to move fast without breaking compliance.</p></li><li><p><strong>Infrastructure
  as a Product: </strong>You have moved us away from manual tweaks toward 100% Infrastructure
  as Code (IaC). Everything is version-controlled, documented, and repeatable.</p></li><li><p><strong>Cost
  &amp; Performance Harmony: </strong>You’ve optimized our Azure spend so we aren’t
  overpaying for unnecessary&nbsp; resources, ensuring we get the highest performance
  for every dollar spent.</p></li><li><p><strong>The Bridge Builder: </strong>You
  aren''t just a "ticket taker." You are a trusted partner to the Developer and Security
  teams, proactively suggesting improvements and helping others level up their cloud
  knowledge.</p></li></ul><p></p><b>Additional Information</b><p></p><p><strong>Why
  You’ll Love It Here</strong></p><ul><li><p>15&nbsp;days of PTO ( year 1)&nbsp;&nbsp;</p></li><li><p>8
  Company Holidays ( office will be closed)&nbsp;</p></li><li><p>2 Floating Holidays&nbsp;</p></li><li><p>Subsidized
  Medical, dental and vision insurance&nbsp;</p></li><li><p>401k Plan + Up to 4% Matching</p></li><li><p>Pre-tax
  Commuter Benefits&nbsp;</p></li><li><p>Flexible Work arrangements available&nbsp;</p></li><li><p>Casual
  Dress&nbsp;</p></li><li><p>Referral Bonuses&nbsp;</p></li><li><p>Employee Assistance
  Fund</p></li><li><p>Paid Parental Leave</p></li><li><p>Paid Jury duty &amp; Bereavement
  Leave&nbsp;</p></li><li><p>Length of stay rewards&nbsp;</p></li><li><p>Company bonus
  pool</p></li><li><p>HSA and FSA</p></li><li><p>Life Insurance policy subsidized
  by Company</p></li></ul><p><em>ALIS values and promotes diversity. We are an equal
  opportunity employer and consider qualified applicants without regard to race, color,
  religion, sex, national origin, ancestry, age, genetic information, sexual orientation,
  gender identity, marital or family status, veteran status, medical condition or
  disability. All candidates are subject to a background check.</em></p><p></p>'
