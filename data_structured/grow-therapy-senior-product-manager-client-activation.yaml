company_overview: 'We see technology not as a layer on top of care, but as the connective
  tissue that helps it grow.Grow Therapy is an online therapy platform that helps
  you find a therapist who gets you—and takes your insurance. Grow was founded to
  create end-to-end systems that make therapy easier on both sides: helping therapists
  launch and grow thriving private practices by removing the friction of credentialing,
  billing, and insurance, so they can focus on care, and helping clients actually
  find and afford it.Our founders come from Harvard Medical School, Stripe, and Blackstone,
  and bring Grow’s mission to life from the inside out, pairing bold vision with a
  culture of balance, belonging, and whole-person wellness.We believe change starts
  by empowering therapists. Grow’s smart platform helps independent providers build
  sustainable practices by handling credentialing, billing, and referrals, so they
  can focus on what matters. With business tools, a supportive clinical community,
  and opportunities like CE events and speaking engagements, Grow helps therapists
  practice with more autonomy and less administrative strain, reducing no-shows, increasing
  demand, and creating more space for care.We then help people find those licensed
  therapists who reflect their lived experience, whether that means shared racial
  or cultural background, language, identity, or life stage. Our platform makes it
  easy to search by specialty, availability, and insurance so clients can book care
  that fits their life and budget.Today, Grow supports thousands of therapists and
  prescribers across all 50 states and has delivered care to over 1 million clients.
  We’re in-network with 100+ major insurers, including Aetna, Cigna, Medicare, Medicaid,
  and UnitedHealthcare, and have raised more than $178M from leading investors like
  Sequoia Capital, Goldman Sachs Alternatives, TCV, Transformation Capital, SignalFire,
  and Plus Capital.We believe in benefits that support the whole you. That means two
  hours each week to care for your mental health, free access to therapy through Grow,
  $500 learning and $300 wellness stipends, a $1,000 remote office setup, free in-office
  meals, and flexible PTO with a paid December recharge week.We’re building the future
  of mental healthcare and that starts with how we care for our own team. If you’re
  excited by bold challenges and meaningful impact, Grow with us.'
