description_html: '<p><p><strong>About Us:</strong></p><p>Grow Therapy is on a mission
  to serve as the trusted partner for therapists growing their practice, and patients
  accessing high-quality care. Powered by technology, we are a three-sided marketplace
  that empowers providers, augments insurance payors, and serves patients. Following
  the mass increase in depression and anxiety, the need for accessibility is more
  important than ever. To make our vision for mental healthcare a reality, we’re building
  a team of entrepreneurs and mission-driven go-getters. Since launching in February
  2021, we’ve empowered more than ten thousand therapists and hundreds of thousands
  of clients across the country and insurance landscape. We’ve raised more than $178mm
  of funding from Sequoia Capital, Transformation Capital, TCV, SignalFire, and others.</p><br></p><b><strong>About
  the Role</strong></b><p>As a <strong>Senior Product Manager for Client Activation</strong>
  at Grow, you’ll be at the heart of defining product direction, prioritizing work
  that drives measurable outcomes, and influencing product culture across the organization.</p><p>Getting
  a client to book their first therapy appointment is only the beginning of the journey
  — to have a meaningful impact on Clients’ lives we need to make sure they can successfully
  make it to their appointments, form a meaningful connection with their provider,
  and come back.</p><p>We''re looking for a Senior Product Manager to lead our Client
  Activation team, which is responsible for ensuring clients can frictionlessly book
  an appointment and successfully return for a second session with a provider who
  is right for them. This is one of the highest-impact product areas at Grow and every
  improvement in activation translates directly into thousands more clients starting
  a meaningful care journey.</p><p>You''ll own the end-to-end experience from the
  moment a client books a provider through to their second completed appointment —
  removing friction, helping them find the right provider and keeping clients engaged
  in the early part of their care journey.&nbsp;</p><b><strong>What You’ll Do</strong></b><ul><li>Drive
  product strategy and define clear roadmaps in collaboration with cross-functional
  partners, including Engineering, Design, Analytics, and Go-to-Market teams.<br></li><li>Lead
  the end-to-end product development lifecycle from discovery to delivery, ensuring
  quality and customer value.<br></li><li>Partner with engineering and design teams
  to make tradeoffs between complexity, user experience, and business impact.<br></li><li>Use
  data, qualitative insights, and user research to inform decisions and measure product
  impact.<br></li><li>Communicate product vision, opportunity framing, and status
  to senior leadership.<br></li><li>Mentor and collaborate with other product managers,
  fostering a culture of shared learning and continuous improvement.<br></li><li>Ensure
  alignment on product goals and success metrics across diverse stakeholder groups.</li></ul><b><strong>What
  You Bring</strong></b><ul><li>5+ years of product management experience building
  consumer-facing digital products, ideally with a focus on activation, onboarding,
  or growth.<br></li><li>Demonstrated ability to lead cross-functional teams and deliver
  impactful products in a fast-paced environment.<br></li><li>Strong analytical skills
  and a comfort with data analysis and experimentation; you make decisions with data
  and know how to use data to uncover user needs<br></li><li>Excellent communication
  skills with the ability to influence across levels.<br></li><li>A track record of
  owning outcomes, not just outputs — you care about whether the thing you shipped
  actually moved the needle.</li></ul><ul><li>Technical background (e.g., engineering,
  CS degree, or significant technical product experience).<br></li><li>Hands-on experience
  with data, APIs, infrastructure products, or platform services.<br></li><li>Experience
  with consumer-facing or data-intensive product domains.<br></li><li>Experience working
  with mobile products and performance optimization.</li></ul><b><strong>Role Details:</strong></b><p>Employment
  Type: Full Time, Exempt</p><ul><li><strong>Base Compensation:</strong> The base
  compensation range for this position is<br>$182,000–$227,000 USD Annually&nbsp;</li></ul><p><strong>This
  is hybrid (onsite from our NYC, San Francisco, or Seattle hub location three days
  per week: Tuesday, Wednesday, Thursday)&nbsp;</strong></p><br><br><p><p><strong>Full
  Time Employee Benefits:</strong></p><ul><li><strong>Comprehensive Health Coverage:</strong>
  Medical, dental, and vision insurance, plus life and disability coverage.</li><li><strong>Parental
  Leave &amp; Family Support: </strong>Up to 18 weeks paid leave and a new child stipend.</li><li><strong>Financial
  Wellness:</strong> 401(k) program and equity opportunities.</li><li><strong>Meals
  &amp; Home Office Support: </strong>Stipends for home office setup and ongoing funds
  for meals, with tailored perks for both remote and in-office employees.</li><li><strong>Time
  Off to Recharge:</strong> Flexible PTO, 12 paid holidays, and a full winter break
  week.</li><li><strong>Wellness &amp; Development: </strong>Annual stipends to put
  towards personal &amp; professional growth.</li><li><strong>Mental &amp; Physical
  Health Support:</strong> No-cost&nbsp;access to therapy through the Grow platform,
  weekly flexible hours for self-care (“Mental Health Mornings/Afternoons”) and memberships
  to leading wellness apps (such as One Medical, Headspace, and Talkspace).</li><li><strong>Extra
  Perks: </strong>Pet insurance discounts, commuter benefits, and global travel assistance.</li></ul><p><em>Research
  shows that some groups hesitate to apply unless they meet every qualification. If
  you’re excited about this role but don’t check every box, we encourage you to apply.
  At Grow, we value diverse experiences, transferable skills, and the unique strengths
  each person brings.</em></p><p><em>Grow Therapy is proud to be an equal opportunity
  workplace and is an affirmative action employer. We are committed to equal employment
  opportunity regardless of race, color, ancestry, religion, sex, national origin,
  sexual orientation, age, citizenship, marital status, disability, gender identity
  or Veteran status. We also consider qualified applicants regardless of criminal
  histories, consistent with legal requirements.&nbsp;</em></p><p><span><strong><em>Use
  of AI Tools:</em></strong><strong><em> </em></strong><em>By submitting your application,
  you acknowledge and consent to the use of automated tools as part of our recruitment
  process. Specifically, we use a third-party AI tool,</em><em>&nbsp;Gem</em><em>,
  to assist in the&nbsp;</em><strong><em>initial screening of resumes</em></strong><em>.
  This tool analyzes resumes based on role-specific criteria provided by our recruiters
  to identify potentially strong matches for the role. </em><strong><em>I</em></strong><strong><em>mportantly,
  no hiring decisions are made by the AI tool</em></strong><strong><em>.</em></strong><em>&nbsp;All
  decisions about which candidates move forward are made by our human recruiting team
  after independent review.</em><em>More information about Gem’s approach to compliance
  with&nbsp;</em><em>California FEHA regulations on automated decision systems</em><em>&nbsp;and&nbsp;</em><em>New
  York Local Law 144</em><em>&nbsp;can be found on the Gem compliance website.</em><em>We
  are committed to transparency and fairness in our hiring practices. If you have
  questions about how our AI tools work, or would like more information about how
  your application will be processed, please contact us at talentops@growtherapy.com</em><em>.</em><em>
  If you require an accommodation due to a disability, or have concerns about the
  use of AI in the hiring process, please also contact us. We are happy to provide
  assistance or offer an alternative method of participating in the recruitment process.</em></span></p></p>'
