company_overview: Kalshi is the largest legal prediction market in the U.S., enabling
  traders to buy and sell contracts on the outcome of real-world events- from interest
  rate decisions and inflation numbers to whether a bill passes Congress or a major
  company CEO steps down. Approved by the CFTC, Kalshi created a new asset class called
  event contracts, which allow market participants to hedge against uncertainty or
  capitalize on upcoming events with economic impact. It's the first platform to bring
  this level of legitimacy and accessibility to the prediction market space.Backed
  by Sequoia, Y Combinator, Charles Schwab, and Henry Kravis, Kalshi is bridging the
  gap between traditional finance and real-world speculation.Kalshi markets are now
  available on Robinhood and Webull, making event trading more accessible than ever.
