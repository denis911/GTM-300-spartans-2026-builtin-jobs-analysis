description_html: '<p><p><strong>Who we are</strong></p><p>We''re Redis. We built
  the product that runs the fast apps our world runs on. (If you checked the weather,
  used your credit card, or looked at your flight status online today, you’re welcome.)
  At Redis, you’ll work with the fastest, simplest technology in the business—whether
  you’re building it, telling its story, or selling it to our 10,000+ worldwide customers.
  We’re creating a faster world with simpler experiences. You in?</p></p><b>About
  the team</b><p>We’re a small and fast-moving team with a simple mandate: remove
  friction from how Redis goes to market. We build systems, workflows, and AI-powered
  tools that help Marketing and SDR teams move faster, work smarter, and generate
  more pipeline with less manual effort.&nbsp;</p><br><p>We’re looking for someone
  who is naturally curious, self-motivated, and a problem-solver who thrives in environments
  where the opportunities for impact are massive, and they get to own the end-to-end
  workstream.</p><b>About the role</b><p>As a GTM Engineer focused on Marketing and
  SDR teams, you’ll sit at the intersection of engineering, automation, and go-to-market
  strategy. Your mission is to identify high-leverage problems in how we generate
  demand and engage prospects, and then build solutions that materially improve outcomes.</p><br><p>You’ll
  own the full lifecycle:</p><ul><li>Uncovering pain points or inefficiencies with
  Marketing and SDR teams</li><li>Defining what “better” looks like</li><li>Designing
  the solution</li><li>Building, shipping, and iterating</li></ul><br><p>This role
  is ideal for someone who enjoys both <strong>thinking like a product manager and
  building like an engineer</strong>—and who wants their work to directly influence
  pipeline, velocity, and customer engagement.</p><br><p>You’ll partner closely with
  Marketing Operations and collaborate with peers across Revenue Operations, Customer
  Success, and Solutions Architecture to deliver scalable, secure, and measurable
  improvements to how Redis goes to market.</p><br><b>What you’ll do&nbsp;</b><ul><li>Partner
  with Marketing and SDR teams to identify, scope, and prioritize high-impact opportunities
  for automation and AI.</li><li>Design and build workflows, automations, and data
  pipelines that make the jobs of the Marketing and SDR teams faster, easier, and/or
  more productive.</li><li>Explore APIs, SDKs, and emerging AI tools to test new ways
  of accelerating GTM execution.</li><li>Be equal parts product manager, translating
  customer needs into features, and an engineer building solutions.</li><li>Balance
  speed with durability by partnering with operations and systems teams to ensure
  solutions are secure, maintainable, and scalable.</li><li>Operate with autonomy
  — owning projects from problem discovery through solution delivery and iteration.</li></ul><br><b>What
  skills we’re looking for</b><p><strong>Must have</strong></p><ul><li>2–5 years of
  experience building or supporting GTM systems in a GTM Engineering, Business Technology,
  Solutions Engineering, or similar role.</li><li>Hands-on experience applying AI,
  automation, or APIs to problems (you should be able to walk us through concrete
  examples).</li><li>Familiarity with modern AI and automation tools (e.g., OpenAI,
  Cursor, n8n, v0/Vercel, Glean, or similar).</li><li>Strong problem-solving skills
  and comfort working through ambiguity.</li><li>A bias for action: you move from
  idea → experiment → solution quickly.</li><li>Clear communicator who can work effectively
  with both technical and non-technical partners.</li><li>Thrives in a small, high-growth
  environment with significant ownership and autonomy.</li></ul><br><p><strong>Nice
  to have</strong></p><ul><li>Ability to write prototype- or production-level code
  in Python, JavaScript/TypeScript, or a similar language.</li><li>Experience with
  GTM platforms such as Salesforce, Marketo, Pocus, Asana, or related tools.</li><li>Exposure
  to experimentation, analytics, or performance measurement in a GTM context.</li></ul><br><p><em>The
  estimated gross base annual salary range for this role is <span>$96,000</span>&nbsp;–
  <span>$144,000 </span>per year in New York, California, Washington, Colorado, and
  Rhode Island. Actual compensation may vary and is dependent on various factors,
  including a candidate’s work location, qualifications, experience, and competencies.
  Base annual salary is one component of Redis’ total compensation and competitive
  benefits package, which may include 401(k), unlimited time off, learning and development
  opportunities, and comprehensive health and wellness benefits. This role may include
  discretionary bonuses, stock options, commuter benefits based on location, or a
  commission plan. Salary history is not used in compensation package decisions. Redis
  utilizes market pay data to determine compensation, so posted compensation ranges
  are subject to change as new market data becomes available.</em></p><br><br><p>#LI-PT2&nbsp;</p><p>#REMOTE</p><p><p><p><span>As
  a global company, we value a culture of curiosity, diversity of thought, and innovation
  from our employees, customers, and partners. Redis is committed to a diverse and
  inclusive work environment where all employees’ differences are celebrated and supported,
  and everyone feels safe to bring their authentic selves to work. </span><span>Redis
  is dedicated to equal employment opportunities regardless of race, color, ancestry,
  religion, sex, national orientation, sexual orientation, age, marital status, disability,
  gender identity, gender expression, Veteran status, or any other classification
  protected by federal, state, or local law. We strive to create a workplace where
  every voice is heard, and every idea is respected.</span></p></p><p><span>&nbsp;</span></p><p><span>Redis
  is committed to working with and providing access and reasonable accommodation to
  applicants with mental and/or physical disabilities. If you think you may require
  accommodations for any part of the recruitment process, please send a request to&nbsp;recruiting@redis.com.
  All requests for accommodations are treated discreetly and confidentially, as practical
  and permitted by law.</span></p><p>&nbsp;</p><p>Any offer of employment at Redis
  is contingent upon the successful completion of a background check, consistent with
  applicable laws.&nbsp;</p><p>&nbsp;</p><p><span>Redis reserves the right to retain
  data longer than stated in the privacy policy in order to evaluate candidates.</span></p></p>'
