company_overview: 'We bring together one of the world’s largest libraries of multimodal
  clinical and molecular data with a robust suite of AI tools to help physicians personalize
  care in real time, connect patients with therapies and clinical trials, and enable
  partners to accelerate discovery and development of new treatments.With ~8 million
  de-identified research records and 350+ petabytes of data, Tempus partners with
  more than half of U.S. oncologists and the majority of the top 20 global pharma
  companies. Our teams are pioneering work across oncology, neurology, psychiatry,
  cardiology, and beyond—transforming how care is delivered and therapies are developed.At
  Tempus, every role contributes to our mission: to help each patient benefit from
  the experiences of those who came before.For more information, visit tempus.com.'
