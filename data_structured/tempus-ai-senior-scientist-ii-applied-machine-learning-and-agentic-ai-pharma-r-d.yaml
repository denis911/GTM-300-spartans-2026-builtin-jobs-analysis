description_html: '<p><span><b><span>Passionate about precision medicine and advancing
  the healthcare industry?</span></b></span></p><p></p><p><span><span>Recent advancements
  in underlying technology have finally made it possible for AI to impact clinical
  care in a meaningful way. Tempus'' proprietary platform connects an entire ecosystem
  of real-world evidence to deliver real-time, actionable insights to physicians,
  providing critical information about the right treatments for the right patients,
  at the right time.</span></span></p><p></p><p><span>Senior Scientist II, Applied
  Machine Learning and Agentic AI, Pharma R&amp;D</span></p><p><span>The Senior Scientist
  II, Applied Machine Learning and Agentic AI will lead the technical development
  of cutting-edge agentic frameworks designed to automate the discovery of novel prognostic
  and predictive models in oncology. This role sits at the intersection of advanced
  Large Language Model (LLM) orchestration and RWD. You will be responsible for architecting
  sophisticated "deep agents" capable of hypothesis generation, experimental design,
  and multimodal ML and AI modeling utilizing foundation models.</span></p><p><span>As
  a senior technical contributor, you will act as a force multiplier for the team,
  taking ownership of system design, code quality, and the strategic roadmap for agentic
  capabilities. Beyond system architecture, you will innovate on core scientific methodology
  by developing new predictive models and causal inference frameworks to rigorously
  analyze vast multimodal oncology data, effectively scaling scientific discovery
  from a manual process to a high-throughput, automated engine.</span></p><b><span>Description</span></b><ul><li><p>Data
  Expertise: <span>Tempus has one of the largest multimodal patient datasets ever
  collected, providing a unique opportunity to work with extensive and diverse data.
  Become an expert in Tempus’ vast epidemiological, clinical, genomic, transcriptomic
  and pathology imaging data, along with the latest tools and techniques for their
  analysis and modeling.&nbsp;</span></p></li><li><p>Teamwork and collaboration<span>:&nbsp;</span></p><ul><li><p><span>Work
  with Research, Engineering &amp; Data Science teams across Tempus’ expansive data
  science community to develop and deliver innovative computational solutions.</span></p></li><li><p><span>Co-develop
  solutions with Pharma partner science and clinical teams</span></p></li></ul></li></ul><ul><li><p>Drug
  R&amp;D Expertise:<span> </span><span>Work with leading pharmaceutical companies.
  Gain proficiency in their strategies, drug modalities, and pipelines to identify
  where the Tempus platform can add value.</span></p></li><li><p>Scientific Communication:
  <span>Skillfully navigate client interactions to extract and communicate the most
  impactful insights driving new R&amp;D opportunities; effectively communicate complex
  technical results and methodologies to diverse external stakeholders.</span></p></li><li><p>Scientific
  Leadership &amp; Influence<span>: Empower computational biologists and RWE scientists
  through targeted AI guidance and hands on coaching to increase AI tool adoption
  to maximize impact.</span></p></li><li><p>Personal development:<span> Continuously
  immerse yourself in the latest industry trends, best practices, and advancements
  in machine learning and AI to revolutionize drug R&amp;D</span></p></li></ul><b><span>Responsibilities</span></b><ul><li><p>Agentic
  AI Architecture<span>: Design and build complex, state-of-the-art agentic workflows.
  Develop agents capable of long-horizon planning, tool use and "co-scientist" reasoning.</span></p></li><li><p>Multimodal
  Modeling<span>: Leverage oncology foundation models to integrate DNA, RNA, H&amp;E,
  and clinical data into predictive algorithms.&nbsp;</span></p></li><li><p>Scientific
  Innovation<span>: Collaborate with clinical scientists and pharma partners to define
  high-value use cases, such as clinical trial design support and treatment de-escalation.</span></p></li></ul><b><span>Qualifications</span></b><ul><li><p>Education
  and experience:</p><ul><li><p><span>Minimum</span></p><ul><li><p><span>PhD (or Masters
  degree with 5+ years of relevant experience).</span></p></li><li><p><span>Plus an
  additional 2+ years of relevant industry or post-doctoral experience that involves
  medicine and AI.&nbsp;</span></p></li></ul></li><li><p><span>Combining:</span></p><ul><li><p><span>Quantitative
  and computational skills, specifically in AI agent based workflows (e.g. Applied
  Machine Learning, Generative AI, Mathematics, biostatistics).</span></p></li><li><p><span>Biological,
  medical, or drug development knowledge and data (e.g. oncology, RWE, medical science,
  or clinical drug development).</span></p></li></ul></li></ul></li><li><p>Technical/Scientific
  Skills:</p><ul><li><p>Agentic Frameworks<span>: Expert-level proficiency in Python
  and orchestration frameworks, specifically LangGraph (strongly preferred) or similar.
  Experience building deep agents with complex state management and graphs.</span></p></li><li><p>LLM
  Application<span>: Deep knowledge of prompt engineering, RAG (Retrieval-Augmented
  Generation), function calling, and evaluating non-deterministic LLM outputs.</span></p></li><li><p>Machine
  Learning<span>: Strong foundation in survival analysis (CoxPH, RSF) and evaluation
  metrics for oncology models.&nbsp;</span></p></li><li><p>Software Engineering<span>:
  Adherence to software best practices (unit testing, git) and experience designing
  scalable systems.</span></p></li><li><p><span>Experience working with </span>clinical
  trial or real-world data<span>, clinical guidelines (e.g., NCCN for oncology) and
  emerging RWE methodologies&nbsp;</span></p></li></ul></li><li><p>Track record of
  success<span>: proven in peer reviewed publications or other proven impact.</span></p></li><li><p>Communication
  Skills: <span>Excellent written and verbal communication skills, with the ability
  to present complex information clearly and persuasively to diverse audiences.&nbsp;&nbsp;</span></p></li><li><p>Motivated<span>:
  Thrive in a fast-paced environment and willing to shift priorities seamlessly.</span></p></li></ul><b><span>Preferred
  Skillsets/Background</span></b><ul><li><p><span>Experience in integrative modeling
  of multi-modal clinical and omics data, preferably with multimodal embeddings and
  foundation models.&nbsp;</span></p></li><li><p><span>Strong understanding of data
  and artificial intelligence in Oncology.</span></p></li><li><p><span>Understanding
  of cancer biology and clinical data.</span></p></li><li><p><span>Experience with
  deploying ML models in cloud environments.</span></p></li></ul><p>NYC: $115,000-$175,000</p><p><p><p><p><p><p><p><p>The
  expected salary range above is applicable if the role is performed from New York
  and may vary for other locations (California, Colorado, Illinois). Actual salary
  may vary based on qualifications and experience. Tempus offers a full range of benefits,
  which may include incentive compensation, restricted stock units, medical and other
  benefits depending on the position.</p></p></p></p></p></p></p></p><p><p></p></p><p></p><p>We
  are an equal opportunity employer. We do not discriminate on the basis of race,
  religion, color, national origin, gender, sexual orientation, age, marital status,
  veteran status, or disability status.&nbsp;</p>'
