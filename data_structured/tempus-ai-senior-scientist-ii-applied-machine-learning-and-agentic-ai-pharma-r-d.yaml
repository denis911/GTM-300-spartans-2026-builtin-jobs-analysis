  architecture, you will innovate on core scientific methodology by developing new
  predictive models and causal inference frameworks to rigorously analyze vast multimodal
  oncology data, effectively scaling scientific discovery from a manual process to
  a high-throughput, automated engine. Description Data Expertise: Tempus has one
  of the largest multimodal patient datasets ever collected, providing a unique opportunity
  to work with extensive and diverse data. Become an expert in Tempus’ vast epidemiological,
  clinical, genomic, transcriptomic and pathology imaging data, along with the latest
  tools and techniques for their analysis and modeling.&nbsp; Teamwork and collaboration
  :&nbsp; Work with Research, Engineering &amp; Data Science teams across Tempus’
  expansive data science community to develop and deliver innovative computational
  solutions. Co-develop solutions with Pharma partner science and clinical teams Drug
  R&amp;D Expertise: Work with leading pharmaceutical companies. Gain proficiency
  in their strategies, drug modalities, and pipelines to identify where the Tempus
  platform can add value. Scientific Communication: Skillfully navigate client interactions
  to extract and communicate the most impactful insights driving new R&amp;D opportunities;
  effectively communicate complex technical results and methodologies to diverse external
  stakeholders. Scientific Leadership &amp; Influence : Empower computational biologists
  and RWE scientists through targeted AI guidance and hands on coaching to increase
  AI tool adoption to maximize impact. Personal development: Continuously immerse
  yourself in the latest industry trends, best practices, and advancements in machine
  learning and AI to revolutionize drug R&amp;D Responsibilities Agentic AI Architecture
  : Design and build complex, state-of-the-art agentic workflows. Develop agents capable
  of long-horizon planning, tool use and "co-scientist" reasoning. Multimodal Modeling
  : Leverage oncology foundation models to integrate DNA, RNA, H&amp;E, and clinical
  data into predictive algorithms.&nbsp; Scientific Innovation : Collaborate with
  clinical scientists and pharma partners to define high-value use cases, such as
  clinical trial design support and treatment de-escalation. Qualifications Education
  and experience: Minimum PhD (or Masters degree with 5+ years of relevant experience).
  Plus an additional 2+ years of relevant industry or post-doctoral experience that
  involves medicine and AI.&nbsp; Combining: Quantitative and computational skills,
  specifically in AI agent based workflows (e.g. Applied Machine Learning, Generative
  AI, Mathematics, biostatistics). Biological, medical, or drug development knowledge
  and data (e.g. oncology, RWE, medical science, or clinical drug development). Technical/Scientific
  Skills: Agentic Frameworks : Expert-level proficiency in Python and orchestration
  frameworks, specifically LangGraph (strongly preferred) or similar. Experience building
  deep agents with complex state management and graphs. LLM Application : Deep knowledge
  of prompt engineering, RAG (Retrieval-Augmented Generation), function calling, and
  evaluating non-deterministic LLM outputs. Machine Learning : Strong foundation in
  survival analysis (CoxPH, RSF) and evaluation metrics for oncology models.&nbsp;
  Software Engineering : Adherence to software best practices (unit testing, git)
  and experience designing scalable systems. Experience working with clinical trial
  or real-world data , clinical guidelines (e.g., NCCN for oncology) and emerging
  RWE methodologies&nbsp; Track record of success : proven in peer reviewed publications
  or other proven impact. Communication Skills: Excellent written and verbal communication
  skills, with the ability to present complex information clearly and persuasively
  to diverse audiences.&nbsp;&nbsp; Motivated : Thrive in a fast-paced environment
  and willing to shift priorities seamlessly. Preferred Skillsets/Background Experience
  in integrative modeling of multi-modal clinical and omics data, preferably with
  multimodal embeddings and foundation models.&nbsp; Strong understanding of data
  and artificial intelligence in Oncology. Understanding of cancer biology and clinical
  data. Experience with deploying ML models in cloud environments. NYC: $115,000-$175,000
  The expected salary range above is applicable if the role is performed from New
  York and may vary for other locations (California, Colorado, Illinois). Actual salary
  may vary based on qualifications and experience. Tempus offers a full range of benefits,
