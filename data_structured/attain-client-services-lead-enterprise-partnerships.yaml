description_html: '<p><strong>About Attain</strong></p><p><em>Built for consumers
  and companies, alike.&nbsp;</em></p><p>In a world driven by data, we believe consumers
  and businesses can coexist. Our founders had a vision to empower consumers to leverage
  their greatest asset—their data—in exchange for modern financial services. Built
  with this vision in mind, our platform allows consumers to access savings tools,
  earned wages and rewards without cost or hidden fees. In exchange, they give permission
  to use their real-time data for research, insights and targeted advertising.</p><p>At
  Attain, your contribution will help us build a more equitable and efficient data
  sharing ecosystem—whether helping consumers access modern financial services or
  businesses leverage data to achieve better outcomes. You’ll have the opportunity
  to work directly with hands-on leaders and mission-driven individuals everyday.</p><p><em>We
  are hiring this role to be based out of either Chicago, IL or New York, NY. At the
  moment, we are targeting candidates who are currently based in those markets. Thank
  you for understanding!&nbsp;</em></p><p><strong>About the role</strong></p><p>As
  our Client Services Lead – Enterprise Partnerships, you will serve as the primary
  strategic and operational partner for our most valuable platform clients. Your role
  is to ensure seamless execution, deepen relationships with these key partners and
  deliver industry-leading audience and measurement solutions. You will play a pivotal
  role in managing high-touch relationships, proactively addressing complex challenges
  and collaborating cross-functionally to enhance Attain’s presence within the programmatic
  ecosystem. The ideal candidate has a strong background in ad-tech client services,
  data activation and measurement, combined with a strategic mindset to support the
  continued success of our largest partners.</p><p><strong>Preferred Qualifications</strong></p><ul><li>5+
  years of experience in digital advertising, with a strong focus on audiences, measurement
  and insights</li><li>Deep knowledge of DSPs and ad platforms, audience targeting
  and measurement offerings, particularly within our enterprise partnerships list</li><li>Proven
  track record of managing and scaling key partnerships&nbsp;</li><li>Proven experience
  developing scalable playbooks, sales collateral, and operational workflows that
  enable non-technical teams to successfully sell and service complex data products.&nbsp;</li><li>Strong
  analytical skills with the ability to interpret campaign and audience performance,
  providing actionable recommendations, client communication and measurement reporting</li><li>Exceptional
  project management skills and the ability to juggle multiple high-priority initiatives</li><li>Experience
  with pre-sale feasibility checks, partner enablement and technical troubleshooting</li><li>A
  consultative approach to upselling data activation and measurement solutions</li><li>Proficiency
  in Excel (Pivot Tables, VLOOKUPs, data analysis) and BI tools (Looker, Tableau,
  or similar)</li></ul><p><strong>What a typical week might look like</strong></p><p><em><strong>High-Touch
  Partner Engagement and Optimization</strong></em></p><ul><ul><li>Act as the primary
  point of contact for platform partners, ensuring a seamless experience with Attain’s
  data and measurement offerings</li><li>Provide dedicated support for ongoing campaigns,
  ensuring clients maximize value from Attain’s audience and measurement solutions</li><li>Review
  campaign and audience performance regularly, providing proactive insights and recommendations
  for optimization</li></ul></ul><p><em><strong>Cross-Functional Collaboration and
  Partner Enablement</strong></em></p><ul><ul><li>Work closely with Product and Engineering
  teams to ensure seamless integrations and resolve technical issues</li><li>Lead
  education sessions and enablement workshops for Attain’s audience and measurement
  solutions within partner teams</li><li>Collaborate with the broader Client Services
  team to standardize processes and scale best practices</li></ul></ul><p><em><strong>Strategic
  Growth and Expansion</strong></em></p><ul><ul><li>Identify upsell opportunities
  for additional audience segments, measurement solutions, and deeper integrations</li><li>Build
  case studies and success stories to reinforce Attain’s value proposition in-market</li><li>Support
  outbound go-to-market initiatives with sellers to expand adoption within our enterprise
  partners</li></ul></ul><p><em><strong>Feasibility Checks and Pre-Sale Support</strong></em></p><ul><ul><li>Evaluate
  data availability, audience feasibility, and measurement suitability for incoming
  RFPs from enterprise partners</li><li>Collaborate with internal teams (Product,
  Engineering, and Sales) to identify solutions that align with client needs</li><li>Troubleshoot
  potential data activation or measurement challenges before launch</li></ul></ul><p><strong>At
  the end of your first year, you will have…</strong></p><ul><li>Successfully onboarded
  and grown relationships with our enterprise partners</li><li>Helped standardize
  feasibility checks for measurement to improve pre-sale efficiency</li><li>Increased
  data and measurement adoption by identifying and executing upsell opportunities
  within key partners</li><li>Established best-in-class operational workflows for
  high-touch partner management</li><li>Led internal and external training sessions,
  positioning Attain as an indispensable partner in the audiences, insights and measurement
  space</li><li>Played a critical role in scaling Attain’s presence within top DSPs
  and ad-platforms</li></ul><p><em>We’re excited to hear from you.&nbsp;</em></p><p><em>At
  Attain, we are passionate about finding people to continuously help us grow our
  organization. We encourage you to apply, even if your experience doesn’t match every
  detail of the job description. If we don’t see something that immediately fits,
  we will keep your resume on file for future opportunities.</em></p><p><strong>About
  the role&nbsp;</strong></p><p>As our Sales Team continues to grow, we are looking
  for a Client Services Lead who will serve as a primary strategic partner for Attain’s
  key advertiser and agency relationships. Reporting to the Associate Director of
  Client Services, you will be responsible for the end-to-end success of client campaigns—from
  strategic planning and data activation to performance measurement and long-term
  retention.</p><p>You are a hands-on expert in the programmatic and data landscape,
  acting as a trusted advisor to clients while ensuring operational excellence in
  every engagement. Your digital media expertise and relationship-building skills
  will be the foundation that helps our customer base scale as our offerings expand
  beyond insights, programmatic media, and measurement.</p><p><strong>Preferred Qualifications</strong></p><ul><li>5+
  years of experience in digital advertising, programmatic media, or data-driven marketing.</li><li>Deep
  expertise in the ad-tech ecosystem, including DSPs, SSPs, DMPs, and data-driven
  insights.</li><li>Bachelor’s degree in Marketing, Business, or a related field.</li><li>Proven
  ability to build and upsell media execution and measurement strategies to traders,
  agency teams, and executives.</li><li>Strong analytical skills with the ability
  to translate complex data into actionable strategic insights for clients.</li><li>Excellent
  presentation and organizational skills, with experience managing multiple high-value
  priorities in a fast-paced environment.</li></ul><p><strong>What a typical week
  might look like</strong></p><ul><li><strong>Strategic Account Management:</strong>
  Lead the day-to-end relationship for a portfolio of high-value accounts, acting
  as their primary point of contact to ensure strategic alignment and satisfaction.</li><li><strong>Campaign
  Strategy &amp; Execution:</strong> Oversee the entire lifecycle—from initial kick-off
  and onboarding to final reporting—ensuring measurable business growth through data-driven
  recommendations.</li><li><strong>Growth &amp; Retention: </strong>Partner with Sales
  to identify upsell opportunities and expand Attain’s data activation and measurement
  footprint within existing accounts.</li><li><strong>Cross-Functional Collaboration:
  </strong>Work with Product and Engineering teams to surface client feedback and
  influence the development of new data and measurement solutions.</li><li><strong>Process
  Innovation:</strong> Contribute to the development of scalable playbooks and best
  practices for campaign management and client communication.</li><li><strong>Mentorship:
  </strong>Provide guidance and share best practices with Client Services Managers
  and Specialists on the team.</li></ul><p><strong>At the end of your first year,
  you’ll have helped us</strong></p><ul><li>Successfully managed and grown a portfolio
  of key accounts with high retention and satisfaction rates.</li><li>Onboarded net-new
  business while building the operational components of our measurement and data activation
  offerings.</li><li>Raised the bar of our organizational expertise in the marketplace
  by leading cross-functional education sessions.</li><li>Utilized your programmatic
  experience to collaborate with sellers and grow our outbound go-to-market strategies.</li></ul><p><em>We’re
  excited to hear from you. At Attain, we are passionate about finding people to continuously
  help us grow our organization. We encourage you to apply, even if your experience
  doesn’t match every detail of the job description.</em></p>'
