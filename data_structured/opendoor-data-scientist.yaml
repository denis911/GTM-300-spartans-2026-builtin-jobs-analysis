description_html: '<p><span><strong>Data Scientist, Pricing</strong></span></p><p><em><strong>Location:
  In office 4 days a week</strong>; Seattle WA.</em></p><br><p>Opendoor is transforming
  one of the largest, most complex markets in the world — residential real estate
  — using data at massive scale. Every pricing signal we generate directly impacts
  how we value homes, how we manage risk, and how efficiently capital moves through
  our marketplace. The work is highly leveraged: the quality of our pricing decisions
  influences conversion, margins, customer trust, and the company’s financial performance.</p><p>We
  are looking for mid to senior level Data Scientists. In this role, you will be a
  core driver of how Opendoor prices real estate at scale. You’ll operate at the intersection
  of economics, machine learning, experimentation, and product strategy — tackling
  ambiguity, shaping the pricing roadmap, and building models/analyses that materially
  move the business. Your insights will influence how we evaluate millions of dollars
  of housing inventory — and directly shape outcomes for our customers, our balance
  sheet, and the health of our marketplace.</p><p><strong>What You’ll Do</strong></p><ul><li>Build
  and maintain pricing metrics, dashboards, and frameworks.</li><li>Run experiments
  and causal analyses to measure impact and drive decisions.</li><li>Develop predictive
  + statistical models that improve pricing accuracy.</li><li>Partner closely with
  Product, Engineering, and Operations teams to influence roadmap and model deployment.</li><li>Deliver
  insights and narratives that inform executive strategy.</li></ul><p><strong>Skills
  &amp; Qualifications</strong></p><ul><li>Deep statistical reasoning: hypothesis
  design, experimental design, causal inference, and ability to distinguish signal
  vs noise.</li><li>Proven end-to-end ML ownership: data acquisition, feature engineering,
  model development, validation, deployment, and ongoing monitoring.</li><li>Strong
  SQL + Python proficiency; comfortable working with production data pipelines and
  modern ML tooling (e.g., Spark, Airflow, Ray, SageMaker, Vertex, etc.).</li><li>Demonstrated
  ability to translate complex analytical findings into clear business recommendations
  and influence cross-functional decision-making.</li><li>Experience working with
  ill-defined problems and driving clarity on problem definition, success metrics,
  and realistic tradeoffs.</li><li>High data-quality bar: disciplined approach to
  validation, bias analysis, and making decisions rooted in evidence vs intuition.</li><li>Effective
  communicator — able to tell the story behind the model to both highly technical
  and non-technical audiences.</li></ul><br><p><span><em>Base salary range for this
  role varies. Generally, the base salary range is $143,200 – $213,000 annually +
  RSUs + bonus + ESPP + additional employee benefits (medical/dental/vision, life
  insurance, unlimited PTO, 401K).</em></span></p><p>#LI-Onsite</p><p><span>#</span></p><p><span>#LI-KC1</span></p><p><p><p><p><p><p><p><p><p><p><p><p><p><p>At
  Opendoor our mission is to tilt the world in favor of homeowners and those who aim
  to become one. Homeownership matters. It''s how people build wealth, stability,
  and community. It''s how families put down roots, how neighborhoods strengthen,
  how the future gets built. We''re building the modern system of homeownership giving
  people the freedom to buy and sell on their own terms. We’ve built an end-to-end
  online experience that has already helped thousands of people and we’re just getting
  started.</p></p></p></p></p></p></p></p></p></p></p></p></p><p></p></p>'
description_text: 'Data Scientist, Pricing Location: In office 4 days a week ; Seattle
  WA. Opendoor is transforming one of the largest, most complex markets in the world
  — residential real estate — using data at massive scale. Every pricing signal we
  generate directly impacts how we value homes, how we manage risk, and how efficiently
  capital moves through our marketplace. The work is highly leveraged: the quality
  of our pricing decisions influences conversion, margins, customer trust, and the
  company’s financial performance. We are looking for mid to senior level Data Scientists.
  In this role, you will be a core driver of how Opendoor prices real estate at scale.
  You’ll operate at the intersection of economics, machine learning, experimentation,
  and product strategy — tackling ambiguity, shaping the pricing roadmap, and building
  models/analyses that materially move the business. Your insights will influence
  how we evaluate millions of dollars of housing inventory — and directly shape outcomes
  for our customers, our balance sheet, and the health of our marketplace. What You’ll
  Do Build and maintain pricing metrics, dashboards, and frameworks. Run experiments
  and causal analyses to measure impact and drive decisions. Develop predictive +
  statistical models that improve pricing accuracy. Partner closely with Product,
  Engineering, and Operations teams to influence roadmap and model deployment. Deliver
  insights and narratives that inform executive strategy. Skills &amp; Qualifications
  Deep statistical reasoning: hypothesis design, experimental design, causal inference,
  and ability to distinguish signal vs noise. Proven end-to-end ML ownership: data
  acquisition, feature engineering, model development, validation, deployment, and
  ongoing monitoring. Strong SQL + Python proficiency; comfortable working with production
  data pipelines and modern ML tooling (e.g., Spark, Airflow, Ray, SageMaker, Vertex,
  etc.). Demonstrated ability to translate complex analytical findings into clear
  business recommendations and influence cross-functional decision-making. Experience
  working with ill-defined problems and driving clarity on problem definition, success
  metrics, and realistic tradeoffs. High data-quality bar: disciplined approach to
  validation, bias analysis, and making decisions rooted in evidence vs intuition.
  Effective communicator — able to tell the story behind the model to both highly
  technical and non-technical audiences. Base salary range for this role varies. Generally,
  the base salary range is $143,200 – $213,000 annually + RSUs + bonus + ESPP + additional
