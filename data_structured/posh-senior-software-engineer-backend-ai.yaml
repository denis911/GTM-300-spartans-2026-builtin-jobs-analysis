company_overview: Posh is the first social media platform dedicated to real-life social
  experiences. We have democratized event creation, making it easy for anyone to host
  events and empowering organizers to curate unique experiences. In doing so, Posh
  enables consumers to discover social events in their community, connect with peers
  around shared interests, and start and scale their own social communities.
