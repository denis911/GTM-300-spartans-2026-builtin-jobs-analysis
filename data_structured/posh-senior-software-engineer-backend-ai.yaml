description_html: <b><strong>About Posh</strong></b><p>We are all social creatures,
  but the dominant “social” companies today have evolved into digital loneliness machines,
  driving isolation, anxiety, and mental health challenges around the world.</p><p>Human
  connection is lost. Posh is a beacon guiding us back.</p><p>Posh enables anyone
  to build an IRL community based on shared interests, while connecting consumers
  with the communities of people just like them. Founded by event organizers who were
  frustrated with the growing loneliness epidemic and the tools available to build
  their own event brand, we’ve built the ultimate platform for launching, monetizing,
  and finding IRL communities of people just like you. In just 5 years, Posh has grown
  to a team of 65, expanded to 7M+ users, secured $70m in venture funding, and facilitated
  over $300M in transactions.</p><b></b><b><strong>About the Role</strong></b><p>We’re
  looking for a <strong>Senior Backend Engineer</strong> to join our newly formed
  AI R&amp;D pod—a small, fast-moving team dedicated to building the future of AI-native
  product experiences at Posh.</p><p>This is a backend-focused role with a strong
  emphasis on systems architecture and AI implementation. You will be responsible
  for building the intelligent, scalable, and reliable systems that power our AI features.
  Your work will focus on designing and deploying sophisticated <strong>Multi-Agent
  Systems</strong>, moving beyond simple RAG to create truly autonomous and helpful
  user experiences.</p><p>You’ll work closely with frontend engineers and product
  designers to bring cutting-edge AI tools to our platform. Expect to build robust
  APIs, architect data flows for evaluations and fine-tuning, and pioneer new ways
  to leverage AI within our existing infrastructure. This represents a unique opportunity
  to build the foundational backend of our AI products, with the chance to ship experimental
  features to a large, growing, and highly engaged user base.</p><p>This is a 5 day
  a week commitment  at our NYC office in SoHo.</p><b><strong>What You’ll Learn &amp;
  Achieve</strong></b><ul><li><p><strong>Build and Scale AI Services:</strong> Design,
  build, and maintain scalable backend services and APIs for AI-powered features,
  writing primary production code in <strong>Python</strong>.</p></li><li><p><strong>Architect
  Multi-Agent Systems:</strong> Move beyond standard RAG to design and implement complex,
  hierarchical <strong>Multi-Agent Systems</strong> that can perform sophisticated,
  multi-step tasks.</p></li><li><p><strong>Implement Evaluation and Fine-Tuning:</strong>
  Build robust frameworks to evaluate the quality of AI systems and manage fine-tuning
  pipelines to continuously improve model performance.</p></li><li><p><strong>Own
  Cloud Infrastructure with IaC:</strong> Define, deploy, and manage our AI infrastructure
  using <strong>Terraform</strong>. You'll be responsible for scaling our container-based
  serverless solutions while ensuring reliability and performance.</p></li><li><p><strong>Optimize
  for Efficiency:</strong> Deeply analyze the tradeoffs between model performance,
  latency, and cost to make pragmatic, business-aware technical decisions when using
  managed AI services.</p></li><li><p><strong>Integrate Across the Stack:</strong>
  Collaborate with our core engineering teams by occasionally working in <strong>TypeScript
  (Node.js)</strong> to integrate AI features into our main application.</p></li></ul><b><strong>What
  We’re Looking For</strong></b><ul><li><p><strong>3–6+ years of backend or full-stack
  engineering experience</strong>, with a proven track record of shipping high-quality,
  scalable systems in fast-paced environments.</p></li><li><p><strong>Deep expertise
  in Python</strong> and its ecosystem for web services and data processing.</p></li><li><p><strong>Strong
  experience with Infrastructure as Code (Terraform)</strong>, a major cloud platform
  (e.g., GCP, AWS, Azure), and deploying containerized applications.</p></li><li><p>A
  passion for shaping <strong>0→1 products</strong> in a lean, fast-paced R&amp;D
  environment where you'll help define new playbooks for AI-native experiences.</p></li></ul><p><strong>Bonus
  points</strong> for:</p><ul><li><p><strong>Pragmatic AI/ML Exposure:</strong> Familiarity
  with managed AI services (e.g., Vertex AI, AWS Bedrock), working with LLMs, or building
  advanced AI systems is a plus. Experience with model evaluation frameworks (e.g.,
  RAGAs, LangSmith, DeepEval) or fine-tuning is helpful but not required. The ability
  to think about tradeoffs between cost, latency, and performance is valuable.</p></li><li><p>Experience
  with open-source agentic frameworks (e.g., LangGraph, CrewAI, Strands, etc) is a
  plus.</p></li><li><p>Experience with MLOps, data engineering, or a background in
  consumer, marketplace, or event-driven platforms.</p></li></ul><b><strong>Why This
  Role Matters</strong></b><p>We believe AI will reshape how people plan and participate
  in real-world experiences. The companies that integrate AI directly into their product
  to create visible, daily value will define the next generation of consumer software.</p><p>At
  Posh, we’re not here to build infrastructure for others. We’re here to lead our
  category with a product that feels intelligent, personal, and effortlessly useful.
  And we’re just getting started.</p><p>Posh provides equal employment opportunities
  to all employees and applicants for employment and prohibits discrimination and
  harassment of any type without regard to race, color, religion, age, sex, national
  origin, disability status, genetics, protected veteran status, sexual orientation,
  gender identity or expression, or any other characteristic protected by federal,
  state or local laws.</p><p>This policy applies to all terms and conditions of employment,
  including recruiting, hiring, placement, promotion, termination, layoff, recall,
  transfer, leaves of absence, compensation and training.</p><p>Posh is committed
  to providing reasonable accommodations for qualified individuals with disabilities
  in our job application procedures. Please let us know if you need assistance or
  accommodation due to a disability</p>
description_text: 'About Posh We are all social creatures, but the dominant “social”
  companies today have evolved into digital loneliness machines, driving isolation,
  anxiety, and mental health challenges around the world. Human connection is lost.
  Posh is a beacon guiding us back. Posh enables anyone to build an IRL community
  based on shared interests, while connecting consumers with the communities of people
  just like them. Founded by event organizers who were frustrated with the growing
  loneliness epidemic and the tools available to build their own event brand, we’ve
  built the ultimate platform for launching, monetizing, and finding IRL communities
  of people just like you. In just 5 years, Posh has grown to a team of 65, expanded
  to 7M+ users, secured $70m in venture funding, and facilitated over $300M in transactions.
  About the Role We’re looking for a Senior Backend Engineer to join our newly formed
  AI R&amp;D pod—a small, fast-moving team dedicated to building the future of AI-native
  product experiences at Posh. This is a backend-focused role with a strong emphasis
  on systems architecture and AI implementation. You will be responsible for building
  the intelligent, scalable, and reliable systems that power our AI features. Your
  work will focus on designing and deploying sophisticated Multi-Agent Systems , moving
  beyond simple RAG to create truly autonomous and helpful user experiences. You’ll
  work closely with frontend engineers and product designers to bring cutting-edge
  AI tools to our platform. Expect to build robust APIs, architect data flows for
  evaluations and fine-tuning, and pioneer new ways to leverage AI within our existing
  infrastructure. This represents a unique opportunity to build the foundational backend
  of our AI products, with the chance to ship experimental features to a large, growing,
  and highly engaged user base. This is a 5 day a week commitment at our NYC office
  in SoHo. What You’ll Learn &amp; Achieve Build and Scale AI Services: Design, build,
  and maintain scalable backend services and APIs for AI-powered features, writing
  primary production code in Python . Architect Multi-Agent Systems: Move beyond standard
  RAG to design and implement complex, hierarchical Multi-Agent Systems that can perform
  sophisticated, multi-step tasks. Implement Evaluation and Fine-Tuning: Build robust
  frameworks to evaluate the quality of AI systems and manage fine-tuning pipelines
  to continuously improve model performance. Own Cloud Infrastructure with IaC: Define,
  deploy, and manage our AI infrastructure using Terraform . You''ll be responsible
  for scaling our container-based serverless solutions while ensuring reliability
  and performance. Optimize for Efficiency: Deeply analyze the tradeoffs between model
  performance, latency, and cost to make pragmatic, business-aware technical decisions
  when using managed AI services. Integrate Across the Stack: Collaborate with our
  core engineering teams by occasionally working in TypeScript (Node.js) to integrate
  AI features into our main application. What We’re Looking For 3–6+ years of backend
  or full-stack engineering experience , with a proven track record of shipping high-quality,
  scalable systems in fast-paced environments. Deep expertise in Python and its ecosystem
  for web services and data processing. Strong experience with Infrastructure as Code
  (Terraform) , a major cloud platform (e.g., GCP, AWS, Azure), and deploying containerized
  applications. A passion for shaping 0→1 products in a lean, fast-paced R&amp;D environment
  where you''ll help define new playbooks for AI-native experiences. Bonus points
  for: Pragmatic AI/ML Exposure: Familiarity with managed AI services (e.g., Vertex
  AI, AWS Bedrock), working with LLMs, or building advanced AI systems is a plus.
  Experience with model evaluation frameworks (e.g., RAGAs, LangSmith, DeepEval) or
  fine-tuning is helpful but not required. The ability to think about tradeoffs between
  cost, latency, and performance is valuable. Experience with open-source agentic
  frameworks (e.g., LangGraph, CrewAI, Strands, etc) is a plus. Experience with MLOps,
  data engineering, or a background in consumer, marketplace, or event-driven platforms.
  Why This Role Matters We believe AI will reshape how people plan and participate
  in real-world experiences. The companies that integrate AI directly into their product
  to create visible, daily value will define the next generation of consumer software.
  At Posh, we’re not here to build infrastructure for others. We’re here to lead our
  category with a product that feels intelligent, personal, and effortlessly useful.
  And we’re just getting started. Posh provides equal employment opportunities to
  all employees and applicants for employment and prohibits discrimination and harassment
  of any type without regard to race, color, religion, age, sex, national origin,
  disability status, genetics, protected veteran status, sexual orientation, gender
  identity or expression, or any other characteristic protected by federal, state
  or local laws. This policy applies to all terms and conditions of employment, including
  recruiting, hiring, placement, promotion, termination, layoff, recall, transfer,
  leaves of absence, compensation and training. Posh is committed to providing reasonable
  accommodations for qualified individuals with disabilities in our job application
  procedures. Please let us know if you need assistance or accommodation due to a
  disability'
