description_html: '<p><strong>Reports to:</strong> Director, Sales Engineering, IIS</p><p><strong>Location</strong>:
  Remote US</p><p><strong>Compensation</strong>: $205,000 to $215,000 OTE (80/20 split),
  plus equity</p><br><p><strong>What We Do:</strong></p><p>Huntress is a fully remote,
  global team of passionate experts and ethical badasses on a mission to break down
  the barriers to cybersecurity. Whether creating purpose-built security solutions,
  hunting down hackers, or impacting our community, our people go above and beyond
  to change the security game and make a real difference.</p><p>Founded in 2015 by
  former NSA cyber operators, Huntress protects all businesses—not just the 1%—with
  enterprise-grade, fully owned, and managed cybersecurity products at the price of
  an affordable SaaS application. The Huntress difference is our One Team advantage:
  our technology is designed with our industry-defining Security Operations Center
  (SOC) in mind and is never separated from our service.</p><p>We protect 4M+ endpoints
  and 7M+ identities worldwide, elevating underresourced IT teams with protection
  that works as hard as they do. As long as hackers keep hacking, Huntress keeps hunting.</p><p><strong>What
  You''ll Do</strong></p><p>We are looking for a highly motivated and collaborative
  Channel Sales Engineer to serve as a strategic technical advisor and enablement
  leader for large national resellers and distributors. You will focus on scaling
  technical enablement across broad partner teams—building training programs, standardized
  demos, and repeatable technical assets that help partners independently position
  and deliver the Huntress platform. This is a consultative, program-focused role
  where you help national partners build a sustainable Huntress practice, increasing
  their ability to sell, demonstrate, and support the Huntress Managed Security Platform
  at scale.</p><b><strong>Core Responsibilities</strong></b><ul><li>Scale technical
  enablement for national resellers and distributors through high-volume training
  and train‑the‑trainer programs on the Huntress platform and products.</li><li>Act
  as strategic technical overlay for key nationals/distis—aligning Huntress with their
  Microsoft-first motions and managed security offerings.</li><li>Scale technical
  education efforts (Huntress, Defender coexistence, Entra ID / M365 flows, SIEM integrations)
  that partner SEs can run independently.</li><li>Own technical escalations and feedback
  loops—unblock complex Defender / Entra / Azure / SIEM scenarios and feed structured
  insights back to Product, PMM, and SOCl.</li></ul><b><strong>What You Bring</strong></b><ul><li>6+
  years in channel-facing technical roles (Sales Engineering, Partner SE, Solutions
  Architect, etc.) with large VAR/distributor ecosystems.</li><li>Strong grasp of
  VAR / disti economics—how they build security practices, package managed services,
  and make money (rebates, MDF, volume discounts, MACC, SPIFs).</li><li>Proven force
  multiplier running large-scale enablement (50+ rep lunch &amp; learns, floor blitzes,
  national webinars) and enabling partner sellers/SEs at scale.</li><li>Ability to
  simplify complex security into clear battle cards, one-pagers, talk tracks, and
  demo narratives grounded in Huntress EDR, ITDR, SIEM, and SOC workflows.</li><li>Hands-on
  with deal registration and conflict management for nationals/distis; you protect
  partner margin and keep Huntress easy to do business with.</li><li>Strong demo and
  storytelling skills plus a programmatic mindset—you define success criteria, track
  enablement KPIs, iterate programs, and are willing to travel ~25%.</li><li>Demonstrated
  experience working with REST APIs (authentication, JSON payloads, rate limits, and
  error handling)</li></ul><b><strong>Preferred Experience</strong></b><ul><li>Direct
  experience with nationals / distis like CDW, SHI, Insight, TD SYNNEX, Ingram, or
  similar in a security or Microsoft-focused overlay role.</li><li>Prior work building
  or scaling security practices (EDR/MDR, identity, or SIEM) inside large resellers
  or distributors.</li><li>Hands-on exposure to SOC or incident response—incident
  calls, walking customers through incident reports, or working alongside SOC teams.</li><li>Practical
  experience designing or operating SIEM / log aggregation for multiple sources (Defender,
  Entra ID, Azure, firewalls, VPNs/MFA, on‑prem AD, SaaS).</li><li>Familiarity with
  Microsoft Defender, Entra ID, and Azure in real customer environments, ideally including
  “Microsoft + MDR” or “Defender + Huntress” style solutions.&nbsp;</li></ul><p><strong>What
  We Offer:&nbsp;</strong></p><ul><li>100% remote work environment - since our founding
  in 2015</li><li>Generous paid time off policy, including vacation, sick time, and
  paid holidays</li><li>12 weeks of paid parental leave</li><li>Highly competitive
  and comprehensive medical, dental, and vision benefits plans&nbsp;</li><li>401(k)
  with a 5% contribution regardless of employee contribution</li><li>Life and Disability
  insurance plans</li><li>Stock options for <strong>all</strong> full-time employees&nbsp;</li><li>One-time
  $500 reimbursement for building/upgrading home office</li><li>Annual allowance for
  education and professional development assistance&nbsp;</li><li>$75 USD/month digital
  reimbursement</li><li>Access to the BetterUp platform for coaching, personal, and
  professional growth</li></ul><p>&nbsp;&nbsp;</p><p><em>Huntress is committed to
  creating a culture of inclusivity where every single member of our team is valued,
  has a voice, and is empowered to come to work every day just as they are.</em><em>&nbsp;</em></p><p><em>We
  do not discriminate based on race, ethnicity, color, ancestry, national origin,
  religion, sex, sexual orientation, gender identity, disability, veteran status,
  genetic information, marital status, or any other legally protected status. </em><em>&nbsp;</em></p><p><em>We
  do discriminate against hackers who try to exploit businesses of all sizes.</em></p><p><strong>Accommodations:</strong><em>&nbsp;</em></p><p><em>If
  you require reasonable accommodation to complete this application, interview, or
  pre-employment testing or participate in the employee selection process, please
  direct your inquiries to </em><em>accommodations@huntresslabs.com</em><em>. Please
  note that non-accommodation requests to this inbox will not receive a response.&nbsp;</em></p><p><em><span><em>Huntress
  uses artificial intelligence tools to assist in reviewing and evaluating job applications,
  including&nbsp;resume screening, skills assessment, and candidate matching and comparisons.
  These AI tools support our human recruiters in the initial review process but do
  not make final hiring decisions without human involvement. By submitting your application,
  you acknowledge this use of AI in our recruitment process. Please review our Candidate
  Privacy Notice for more details on our practices and your data privacy rights.</em></span></em></p><p><strong>#BI-Remote&nbsp;</strong></p>'
