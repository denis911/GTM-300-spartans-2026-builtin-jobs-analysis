description_html: '<p><p>Headway’s mission is a big one – to build a new mental health
  care system everyone can access. We’ve built technology that helps people find great
  therapists with the first software-enabled national network of providers accepting
  insurance.&nbsp;</p><p>1 in 4 people in the US have a treatable mental health condition,
  but the majority of providers don’t accept insurance, making therapy too expensive
  for most people. Headway is building a new mental healthcare system that everyone
  can access by making it easy for therapists to accept insurance and scale their
  practice.&nbsp;</p><p>Headway was founded in 2019. Since then, we’ve grown into
  a diverse, national network of over 60,000 mental healthcare providers across all
  50 states who run their practice on our software and have served over 1 million
  patients. We’re a Series D company with over $325m in funding from a16z (Andreessen
  Horowitz), Accel, GV (formerly Google Ventures), Spark Capital, Thrive Capital,
  Forerunner Ventures and Health Care Service Corporation.</p><p>We want your time
  here to be the most meaningful experience of your career. <strong>Join us, and help
  change mental healthcare for the better.</strong></p></p><b><strong>About the role:</strong></b><p>There
  is a lot that we''re building at Headway, but ensuring that our underlying systems
  behind our insurance platform reliably power patient, provider, and payer (insurance
  customer) experiences is mission critical in our efforts to make mental healthcare
  more accessible and affordable for everyone. As Head of Engineering for the Platform
  Group (also know as our Insurance Group), you''ll be the first hire in a new altitude
  of leadership, inheriting a strong, growing set of engineering pods that deliver
  critical systems behind benefits and eligibility services, claims, billing infrastructure,
  payments, and customer support tooling. Your mandate will be to guide and scale
  this group as Headway grows, ensuring it continues to deliver reliable, secure,
  and high-impact technology at scale.</p><p>Reporting to Headway’s CTO, you’ll be
  a senior leader within our rapidly growing Engineering Org, responsible for strategic
  planning, organizational design, and talent development. You’ll set the technical
  vision and operating model for the group, ensuring our systems evolve to meet the
  complexity and growth of our marketplace. You’ll be responsible for enabling experiments,
  accelerating development velocity, and scaling infrastructure that supports one
  of the most important dimensions of our business: making insurance work seamlessly
  for providers, patients, and payers.</p><p>Your teams will be highly cross-functional,
  partnering closely with other engineering, product, design, data, customer success,
  growth, clinical, and other functions to understand the needs of our insurance partners
  and deliver solutions that redefine how mental healthcare integrates with the broader
  healthcare ecosystem.</p><b><strong>Who you are:</strong></b><p>We’re looking for
  a platform-minded engineering executive who is relationship-obsessed, drives results,
  and enables teams to deliver with technical excellence. This is an exciting opportunity
  for a mission-aligned leader to scale one of the most critical engineering groups
  at Headway and make an immediate impact on the way we expand mental healthcare access.</p><ul><li>Build
  the vision and roadmap for the next chapter of our Insurance Engineering group,
  driving company-level objectives and powering best-in-class provider, patient, and
  payer experiences</li><li>Contribute to the broader company strategy and technical
  roadmap as a member of the engineering leadership team</li><li>Partner with senior
  leaders across product, business, data, design, clinical, legal, and compliance
  to ensure alignment on strategic goals and execution against highly impactful OKRs
  and KPIs</li><li>Lead and scale multiple engineering pods, ensuring process, architectural,
  and product alignment across the group</li><li>Develop and grow your managers and
  team of teams through mentorship, feedback, and career development frameworks</li><li>Recruit
  and build diverse, high-performing engineering teams that thrive on collaboration
  and technical excellence</li><li>Shape engineering culture, process, and operating
  norms as Headway grows from 150 to 250+ engineers in the coming year</li></ul><b>Below
  are additional experiences we think help engineering leaders succeed at Headway:</b><ul><li>You
  have 8+ years of experience as an engineering leader, including managing engineering
  directors/managers, with a track record of building and scaling high-performing
  organizations that deliver business impact through technical innovation</li><li>You
  have previous experience as a Software Engineer, and a strong technical foundation
  that allows you to guide and challenge technical decisions</li><li>You are able
  to see things at a 300-ft view, while also diving deep into highly technical challenges
  that affect scale, reliability, and user experience</li><li>You have a strong product
  mindset, having built cross-functional relationships that build trust and enable
  great user experiences</li><li>You have a passion for building resilient, scalable
  platforms that unlock growth in new product areas</li><li>It’s a nice to have if
  you’ve had experience in health tech or with complex platform domains such as insurance,
  payments, or billing</li><li>BS, MS in Computer Science or related field</li></ul><b><strong>Our
  interview process</strong></b><p>After you apply to Headway, here are some details
  of what to expect during the interview process.</p><ul><li><strong>Initial screen</strong>:
  You’ll connect with someone in recruiting so you can learn more about the team,
  Headway’s mission and exciting growth, and we can get a better idea of your background.&nbsp;</li><li><strong>First
  rounds:</strong> You''ll meet with an engineering leader on the team to go deeper
  into your technical and people leadership experiences</li><li><strong>Final rounds</strong>:
  You’ll meet several more team members for one technical and multiple behavioral
  interviews, leaving you with a fuller picture of what it’s like to work at Headway.</li><li><strong>References
  and the Offer</strong>: Our favorite part of the process! We''ll send over all of
  the details, including specifics on employee equity, and congratulatory messages
  from excited future team members!</li></ul><b><strong>Compensation and Benefits:</strong></b><p>The
  expected base pay range for this position is<strong> </strong>$<span>312,000 - $390,000</span>,
  based on a variety of factors including qualifications, experience, and geographic
  location. In addition to base salary, this role may be eligible for an equity grant,
  depending on the position and level.</p><p><em>We are committed to offering a comprehensive
  and competitive total rewards package, including robust health and wellness benefits,
  retirement savings, and meaningful ownership opportunities through equity. Compensation
  decisions are made holistically, ensuring fairness and alignment with market benchmarks
  while recognizing individual contributions and potential.</em></p><ul><li>Benefits
  offered include:</li><ul><li>Equity compensation</li><li>Medical, Dental, and Vision
  coverage</li><li>HSA / FSA</li><li>401K</li><li>Work-from-Home Stipend</li><li>Therapy
  Reimbursement</li><li>16-week parental leave for eligible employees</li><li>Carrot
  Fertility annual reimbursement and membership</li><li>13 paid holidays each year
  as well as a Holiday Break during the week between December 25th and December 31st</li><li>Flexible
  PTO</li><li>Employee Assistance Program (EAP)</li><li>Training and professional
  development</li></ul></ul><p>#LI-CA1</p><p><p>We believe a team''s strength is in
  its people, and we cannot achieve this mission without a team that reflects the
  diversity of this problem – across race, ethnicity, gender, sexuality, age, national
  origin, religion, family status, disability, military status, and experience. Headway
  is committed to the full inclusion of all qualified individuals. As part of this
  commitment, Headway will ensure that persons with disabilities are provided with
  reasonable accommodations. If reasonable accommodation is needed to participate
  in the job application or interview process, to perform essential job functions,
  and/or receive other benefits and privileges of employment, please inform the recruiter
  when they contact you to schedule your interview.</p><p>Headway participates in
  E-Verify. To learn more, click here.</p><p>A notice to Headway applicants: To protect
  yourself against phishing and recruitment fraud, please note that Headway only accepts
  applications through our official careers page at https://headway.co/careers. Headway
  will never refer you to external websites, ask for payment or personal information,
  or conduct interviews via messaging apps. All official communication will come from
  a @findheadway.com email address. If you are contacted by someone claiming to be
  from Headway via an unofficial channel, please do not share any information and
  report it as spam.</p></p>'
