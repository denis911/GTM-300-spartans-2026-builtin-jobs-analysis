company_overview: 'We’re powering a better social safety net.Building healthier and
  happier communities starts with supporting the whole person. That’s why Findhelp
  was founded in 2010: to connect all people in need to the programs that serve them
  with dignity and ease. Our software platform enables community organizations, governments,
  and businesses across industries to easily manage and coordinate care. From screening
  and closed-loop referrals to outcomes tracking and actionable health equity insights,
  Findhelp is leading the modernization of the social safety net.For more information,
  visit https://company.findhelp.com.'
