  and mental ability, political affiliation, race, religion, creed, sexual orientation,
  socio-economic status, veteran status, or any other protected class, in accordance
  with applicable laws. Accommodations are available for applicants with disabilities.
  Here are some of the ways we support our staff: •Culture Committee&nbsp; •Leadership
  Development Training •Paid Volunteering Time'
