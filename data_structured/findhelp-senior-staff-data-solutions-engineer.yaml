description_html: '<p><b><span>We’re changing the way people connect to social care.&nbsp;</span></b></p><p><br></p><p><span>At
  Findhelp, we’ve built a comprehensive platform of products and services that make
  it easy for you to connect people to resources, follow them on their journey, and
  track your impact in a fast and reliable way.&nbsp;Our industry-leading social care
  network includes more than half a million local, state, and national programs that
  serve every ZIP Code in the country, from rural areas to major metropolitan centers.&nbsp;</span></p><p><span>Findhelp
  is headquartered in Austin, Texas and has been enabling healthcare, government,
  education, and other organizations to connect people with the social care resources
  that serve them, with privacy and security, since 2010.</span></p><p><br></p><p><span>As
  a mission driven organization, we are focused on creating a positive impact by connecting
  people in need to the programs that serve them with dignity and ease. Powered by
  our proprietary technology that enables people to find the resources available in
  their area, we have helped millions of Seekers find food, health, housing and employment
  programs.</span></p><p><br></p><p><span>The R&amp;D Department is made up of different
  disciplines including software and database engineers, quality, technical implementation.&nbsp;
  R&amp;D designs and develops requested product features, fixes bugs within our platform,
  provides technical analysis and estimation, ensures successful integration installations,
  manages and monitors the health of our platform, and develops automation and tooling
  for efficient and reliable software development processes. R&amp;D works cross-functionally
  with many other departments in the organization as a team to fulfill Findhelp’s
  mission of connecting all people in need and the programs that serve them with dignity
  and ease.</span></p><p><span>We are seeking a highly skilled Sr Staff Data Solution
  Engineer to join our team. As a Staff Data Solution Engineer, you will coordinate
  and contribute to the design, development, and implementation of data solutions
  for our customers and team. You will be responsible for working closely with External
  customers, Internal business stakeholders and Engineering teams to understand the
  current and future data needs. This role offers an exciting opportunity to work
  on diverse projects, solve complex problems, and contribute to the success of our
  data-driven initiatives.</span></p><p><b>Responsibilities:</b></p><ul><li>Client
  Collaboration:&nbsp; Engage with clients to understand their data requirements and
  challenges. Serve as a strong technical counterpart and trusted advisor to customer
  success teams.</li><li>Data Solution Design: Translate business requirements to
  analytical dashboard designs and operational data delivery solutions that meet the
  needs of a diverse and growing user audience.</li><li>Data Management: Leverage
  knowledge of relational databases to analyze and optimize schemas, queries, and
  data movement (ETL).</li><li>Problem Solving: Tackle new and complex data-related
  problems with creativity and a structured approach. Identify opportunities for simplification,
  process improvement and efficiency gains.</li><li>Continuous Learning: Stay up-to-date
  with industry trends, emerging technologies, and best practices in Analytics, data
  modeling, and use of AI.</li><li>Architecture analysis: Understand data from source
  to target and inform design, considering optimal methods for data capture, logging,
  transformation, warehousing, and delivery.</li><li>Incident Resolution: Investigate
  and resolve user-reported incidents related to Dashboards/ reports data issues&nbsp;</li></ul><p></p><p><b>Qualifications:</b></p><ul><li>5+
  years of relevant technical experience working in Data warehousing &amp; Analytics</li><li>4+
  years of experience with dashboard development with tools like Looker Studio, Tableau,
  Power BI&nbsp;</li><li>Strong SQL programming skills with the ability to write complex
  queries and optimize database performance.</li><li>Proficiency in database systems
  such as MySQL and BigQuery</li><li>Experience in data storytelling, presenting clear
  and compelling insights to stakeholders.</li><li>Experience in creating metrics
  and KPIs&nbsp; tied to business goals.</li><li>Excellent problem-solving skills
  and the ability to work on new and challenging data problems.&nbsp;</li><li>Exceptional
  communication and customer-facing skills, with the ability to explain technical
  concepts to non-technical audiences.</li><li>Experience in&nbsp; data modeling,
  ETL processes, and data warehousing&nbsp; techniques in cloud platforms like GCP,
  Azure or AWS</li><li>Experience with Python for data manipulation, scripting, or
  automation.</li></ul><p></p><p></p><p><b>We value being together&nbsp;</b></p><p><span>We
  believe being together enables stronger relationships, collaboration, and culture.</span></p><p><b>This
  position is in office and candidates must be located in Austin, Texas, or Madison,
  Wisconsin.</b></p><p><br></p><p><b><span>Perks at Findhelp&nbsp;</span></b></p><p><span>•401k
  &amp; equity grants</span></p><p><span>•Free food and onsite gym at our Austin HQ&nbsp;</span></p><p><span>•Paid
  parental leave</span></p><p><span>•Competitive PTO &amp; 10 paid holidays</span></p><p><span>•Employee
  only paid Health, Dental, and Vision insurance</span></p><p><span>•Dog-friendly
  office in Austin HQ</span></p><p><span>•24/7 access to telemedicine and counseling</span></p><p><span>•Book
  Purchasing Program</span></p><p><br></p><p><b><span>We’re building a diverse, inclusive
  team</span></b></p><p><br></p><p><span>You’re welcome here. We want everyone to
  be able to easily connect to the help they need, and we want our teams to reflect
  and represent our communities. It is our policy to recruit, hire, train, and promote
  individuals, as well as administer any and all Company policies, without regard
  to age, color, disability, ethnicity, family or marital status, gender identity
  or expression, language, national origin or ancestry, physical and mental ability,
  political affiliation, race, religion, creed, sexual orientation, socio-economic
  status, veteran status, or any other protected class, in accordance with applicable
  laws. Accommodations are available for applicants with disabilities.</span></p><p><br></p><p><span>Here
  are some of the ways we support our staff:</span></p><p><span>•Culture Committee&nbsp;</span></p><p><span>•Leadership
  Development Training</span></p><p><span>•Paid Volunteering Time</span></p><p><br></p><p><br></p><p></p>'
