  and best practices in Analytics, data modeling, and use of AI. Architecture analysis:
  Understand data from source to target and inform design, considering optimal methods
  for data capture, logging, transformation, warehousing, and delivery. Incident Resolution:
  Investigate and resolve user-reported incidents related to Dashboards/ reports data
  issues&nbsp; Qualifications: 5+ years of relevant technical experience working in
  Data warehousing &amp; Analytics 4+ years of experience with dashboard development
  with tools like Looker Studio, Tableau, Power BI&nbsp; Strong SQL programming skills
  with the ability to write complex queries and optimize database performance. Proficiency
  in database systems such as MySQL and BigQuery Experience in data storytelling,
  presenting clear and compelling insights to stakeholders. Experience in creating
  metrics and KPIs&nbsp; tied to business goals. Excellent problem-solving skills
  and the ability to work on new and challenging data problems.&nbsp; Exceptional
  communication and customer-facing skills, with the ability to explain technical
  concepts to non-technical audiences. Experience in&nbsp; data modeling, ETL processes,
  and data warehousing&nbsp; techniques in cloud platforms like GCP, Azure or AWS
  Experience with Python for data manipulation, scripting, or automation. We value
  being together&nbsp; We believe being together enables stronger relationships, collaboration,
  and culture. This position is in office and candidates must be located in Austin,
  Texas, or Madison, Wisconsin. Perks at Findhelp&nbsp; •401k &amp; equity grants
  •Free food and onsite gym at our Austin HQ&nbsp; •Paid parental leave •Competitive
  PTO &amp; 10 paid holidays •Employee only paid Health, Dental, and Vision insurance
  •Dog-friendly office in Austin HQ •24/7 access to telemedicine and counseling •Book
  Purchasing Program We’re building a diverse, inclusive team You’re welcome here.
  We want everyone to be able to easily connect to the help they need, and we want
