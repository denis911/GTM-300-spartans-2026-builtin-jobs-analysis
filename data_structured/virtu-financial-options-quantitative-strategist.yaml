description_html: '<p>Virtu is a leading financial firm that leverages cutting edge
  technology to deliver liquidity to the global markets and innovative, transparent
  trading solutions to our clients. As a market maker, Virtu provides deep liquidity
  that helps to create more efficient markets around the world. Our market structure
  expertise, broad diversification, and execution technology enables us to provide
  competitive bids and offers in over 19,000 securities, at over 235 venues, in 36
  countries worldwide&nbsp;</p><br><p>The firm’s complementary core offerings—market
  making, client execution services, and trading venues—give Virtu a competitive advantage
  in developing and applying innovative tools that deliver efficiencies and performance
  across the organization.&nbsp;We continuously develop and employ innovative technology,
  trading strategies and risk management systems that drive superior and highly scalable
  trading platforms, and are looking for an experienced Quantitative Strategist to
  help us propel our technology forward in the options trading space.&nbsp;</p><br><p><strong>Quantitative
  Strategist - Options Desk</strong></p><p><strong>ROLE OVERVIEW</strong></p><p>As
  a Quantitative Strategist on our Options desk, you will collaborate with our team
  of experienced traders, quants, and developers in a collegiate and collaborative
  environment that encourages cross-team exposure globally.</p><p><strong>KEY RESPONSIBILITIES</strong></p><ul><li>Leverage
  your expertise to develop new predictive models, generate signals, and translate
  them into viable trading strategies</li><li>Collaborate with the team to implement
  and integrate new signals into our current trading infrastructure</li><li>Calibrate
  strategies across different products and adapt to changing market regimes</li><li>Partner
  with traders to enhance existing processes and systems</li><li>Apply observational
  skills and modern statistical methods to build effective predictive models</li><li>Research
  and implement innovative volatility trading strategies and signals</li><li>Analyze
  and optimize existing strategies to drive performance improvements</li><li>Develop
  sophisticated risk models and frameworks to manage cross-product portfolio risks
  in volatile markets</li></ul><p><strong>IDEAL CANDIDATE PROFILE</strong></p><p>You
  will join a select team of experienced options quants, traders, and software engineers
  in a fast-paced yet collaborative environment. The ideal candidate will have:</p><ul><li>Advanced
  degree (preferably PhD) in Science, Mathematics, Engineering, or other quantitative
  field</li><li>3-5 years of experience in Quantitative Research at an Automated Market
  Maker</li><li>Expertise in implied and realized volatility modeling, volatility
  risk management and calibration, trading signals, event modeling, order placement
  logic, PnL analysis, and microstructure effects</li><li>Strong understanding of
  risk management and valuation models</li><li>Proven track record building volatility
  and/or delta signals as an options market making quant</li><li>Experience analyzing
  large datasets to systematically identify new patterns</li><li>Proficient programming
  skills, particularly in C/C++ and Python</li><li>Exceptional quantitative, mathematical,
  and problem-solving abilities</li></ul><br><p>Salary Range: $150,000 - $250,000
  (salary range is exclusive of bonuses, benefits or other categories of compensation)</p><p><em>Virtu
  Financial is an equal opportunity employer, committed to a diverse and inclusive
  workplace, welcoming you for who you are and does not discriminate on the basis
  of race, national origin, gender, gender identity, sexual orientation, protected
  veteran status, disability, age, or other legally protected status.</em></p>'
description_text: 'Virtu is a leading financial firm that leverages cutting edge technology
  to deliver liquidity to the global markets and innovative, transparent trading solutions
  to our clients. As a market maker, Virtu provides deep liquidity that helps to create
  more efficient markets around the world. Our market structure expertise, broad diversification,
  and execution technology enables us to provide competitive bids and offers in over
  19,000 securities, at over 235 venues, in 36 countries worldwide&nbsp; The firm’s
  complementary core offerings—market making, client execution services, and trading
  venues—give Virtu a competitive advantage in developing and applying innovative
  tools that deliver efficiencies and performance across the organization.&nbsp;We
  continuously develop and employ innovative technology, trading strategies and risk
  management systems that drive superior and highly scalable trading platforms, and
  are looking for an experienced Quantitative Strategist to help us propel our technology
  forward in the options trading space.&nbsp; Quantitative Strategist - Options Desk
  ROLE OVERVIEW As a Quantitative Strategist on our Options desk, you will collaborate
  with our team of experienced traders, quants, and developers in a collegiate and
  collaborative environment that encourages cross-team exposure globally. KEY RESPONSIBILITIES
  Leverage your expertise to develop new predictive models, generate signals, and
  translate them into viable trading strategies Collaborate with the team to implement
  and integrate new signals into our current trading infrastructure Calibrate strategies
  across different products and adapt to changing market regimes Partner with traders
  to enhance existing processes and systems Apply observational skills and modern
  statistical methods to build effective predictive models Research and implement
  innovative volatility trading strategies and signals Analyze and optimize existing
  strategies to drive performance improvements Develop sophisticated risk models and
  frameworks to manage cross-product portfolio risks in volatile markets IDEAL CANDIDATE
  PROFILE You will join a select team of experienced options quants, traders, and
  software engineers in a fast-paced yet collaborative environment. The ideal candidate
  will have: Advanced degree (preferably PhD) in Science, Mathematics, Engineering,
  or other quantitative field 3-5 years of experience in Quantitative Research at
  an Automated Market Maker Expertise in implied and realized volatility modeling,
  volatility risk management and calibration, trading signals, event modeling, order
  placement logic, PnL analysis, and microstructure effects Strong understanding of
  risk management and valuation models Proven track record building volatility and/or
  delta signals as an options market making quant Experience analyzing large datasets
  to systematically identify new patterns Proficient programming skills, particularly
  in C/C++ and Python Exceptional quantitative, mathematical, and problem-solving
  abilities Salary Range: $150,000 - $250,000 (salary range is exclusive of bonuses,
  benefits or other categories of compensation) Virtu Financial is an equal opportunity
  employer, committed to a diverse and inclusive workplace, welcoming you for who
  you are and does not discriminate on the basis of race, national origin, gender,
  gender identity, sexual orientation, protected veteran status, disability, age,
  or other legally protected status.'
