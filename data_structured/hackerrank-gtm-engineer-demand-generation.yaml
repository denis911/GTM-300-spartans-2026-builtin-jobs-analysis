description_html: <p><p>HackerRank helps companies like NVIDIA, Amazon, and Microsoft
  hire and upskill the next generation of developers based on skills, not pedigree.
  Our platform is trusted by over 2,500 of the world’s most innovative companies to
  build strong engineering teams ready for what’s next.<br>Software has entered an
  era where humans and AI build side by side. As this shift accelerates, the definition
  of strong technical talent is changing. We give companies better ways to identify
  and invest in next-generation skills.<br>People at HackerRank care deeply about
  the impact of their work and sweat the small details so our customers can be wildly
  successful with products they genuinely love to use. We move with urgency and believe
  great outcomes come from high standards</p></p><b><strong>About the role</strong></b><p>The
  Growth Marketing team is the engine behind pipeline acceleration at HackerRank.
  We operate at the intersection of creativity, analytics, and automation, managing
  paid channels, orchestrating ABM plays, and optimizing every touchpoint that turns
  interest into opportunity. As the team responsible for bringing in qualified leads
  and nurturing them across the funnel, we directly impact revenue and go-to-market
  success.</p><p>As our Demand-focused GTM Engineer, you’ll be the driving force that
  turns marketing strategy into pipeline. You will own the day-to-day execution of
  multi-channel demand programs including paid social, ABM plays, email nurture, and
  direct mail while managing budgets, creative assets, and stakeholders. You’ll analyze
  campaign data, optimize performance, and scale efforts to maximize impact. If juggling
  timelines, audience lists, and bid strategies is your wheelhouse, this is your chance
  to help HackerRank hit the next level of growth.</p><b><strong>What you’ll do</strong></b><ul><li>Execute
  and optimize full-funnel demand generation programs across paid media and owned
  channels.</li><li>Lead the day-to-day management of paid media, audience targeting,
  creative rotation, pacing, and bid strategies.</li><li>Drive ABM campaigns (1:Many,
  1:Few, and 1:1), collaborating with SDRs, design, and content to engage key accounts.</li><li>Run
  diagnostics across GTM funnel systems, report on campaign performance, and implement
  A/B and multivariate tests.</li><li>Streamline campaign operations with documented
  playbooks and automation to reduce manual effort and increase speed.</li></ul><b><strong>Who
  you are</strong></b><ul><li>Connects strategy with hands‑on execution across channels
  and tools.</li><li>Passionate about data, testing, and finding signal in the noise.</li><li>Proven
  track record driving pipeline growth through high‑performing ABM programs.</li><li>You
  bring 5+ years in B2B demand generation or growth marketing (agency or SaaS).</li><li>Hands‑on
  with LinkedIn Ads and at least one more paid platform (Meta, Reddit, etc.).</li><li>Experience
  running 1:Many, 1:Few, and 1:1 ABM campaigns with measurable results.</li><li>Fluent
  with CRM and marketing automation (e.g., Salesforce, HubSpot).</li><li>Strong in
  reporting, attribution modeling, and funnel diagnostics (pivot tables, UTM tracking,
  etc.).</li><li>Skilled at conversion tracking and syncing audience segments (Tag
  Manager, Analytics events, etc.).</li><li>Familiar with low‑code and automation
  tools such as Clay, Make, N8N, or Zapier.</li></ul><b><strong>Even better if you
  have</strong></b><ul><li>Experience with APIs, webhooks, dashboarding, or ETL.</li><li>You
  bring light creative skills with tools like Figma or Canva.</li><li>Have copywriting
  chops to iterate messaging and improve campaign performance.</li></ul><b><strong>You
  will thrive in this role if</strong></b><ul><li>You love turning strategy into scalable,
  high-performing campaigns.</li><li>Experimentation excites you,&nbsp; you test,
  learn, and double down on what works.</li><li>You thrive at the intersection of
  data, creativity, and collaboration.</li><li>Driving measurable growth while keeping
  customer experience front and center motivates you.</li></ul><b><strong>Compensation</strong></b><p>This
  role is eligible for incentive-based pay, with an annual total potential earnings
  range of $120,000 – $150,000, including base salary and incentive-based compensation
  (based on quota attainment).&nbsp;</p><b><strong>Want to stand out?</strong></b><p>Send
  your name, Linkedin, and message in JSON to this endpoint:</p><p>👉 https://hook.eu2.make.com/swxvg5yiu1c5fmiag2ccmfs3fu3em92k</p><p><p><strong>Want
  to learn more about HackerRank?</strong>&nbsp;Check out&nbsp;HackerRank.com&nbsp;to
  explore our products, solutions and resources, and dive into our story and mission&nbsp;here.</p><p>HackerRank
  is a proud equal employment opportunity and affirmative action employer. We provide
  equal opportunity to everyone for employment based on individual performance and
  qualification. We never discriminate based on race, religion, national origin, gender
  identity or expression, sexual orientation, age, marital, veteran, or disability
  status. All your information will be kept confidential according to EEO guidelines.&nbsp;</p><p>Linkedin
  | X&nbsp;|&nbsp;Blog&nbsp;|&nbsp;Instagram&nbsp;|&nbsp;Life@HackerRank</p><p><em>Notice
  to prospective HackerRank job applicants:</em></p><ul><li><em>Our Recruiters use
  @hackerrank.com email addresses.</em></li><li><em>We never ask for payment or credit
  check information to apply, interview, or work here.</em></li></ul></p>
