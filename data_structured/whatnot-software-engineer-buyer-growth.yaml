description_html: <b><strong>🚀 Join the Future of Commerce with Whatnot!</strong></b><p>Whatnot
  is the largest live shopping platform in North America and Europe to buy, sell,
  and discover the things you love. We’re re-defining e-commerce by blending community,
  shopping, and entertainment into a community just for you. As a remote co-located
  team, we’re inspired by innovation and anchored in our <u>values</u>. With hubs
  in the US, UK, Germany, Ireland, Poland, and Australia, we’re building the future
  of online marketplaces –together.</p><p>From fashion, beauty, and electronics to
  collectibles like trading cards, comic books, and even live plants, our live auctions
  have something for everyone.</p><p>And we’re just getting started! As one of the
  <u>fastest growing marketplaces</u>, we’re looking for bold, forward-thinking problem
  solvers across all functional areas. Check out the latest Whatnot updates on our
  <u>news</u> and <u>engineering</u> blogs and join us as we enable anyone to turn
  their passion into a business, and bring people together through commerce.</p><p></p><b>💻
  Role </b><p>The Buyer Growth team is responsible for driving Whatnot’s top-of-funnel
  growth and first-time buyer success. We focus on acquisition, activation, and early
  retention, partnering closely with product, data, design, and marketing to build
  experiences that bring new users into the ecosystem and turn them into loyal customers.
  In this role, you will</p><ul><li><p><strong>Lead and scale critical growth initiatives</strong>
  such as onboarding flows, referral systems, guest browsing, notification systems</p></li><li><p><strong>Design
  and own end-to-end systems</strong>, from backend services to frontend experiences,
  that impact millions of users. Drive architectural decisions to ensure systems are
  reliable, scalable, and extensible as we scale rapidly.</p></li><li><p><strong>Work
  across product, marketing, and data science</strong> to identify high-leverage growth
  opportunities and rapidly iterate on experiments.</p></li><li><p><strong>Instrument,
  monitor, and improve funnels</strong> to drive measurable lifts in new user conversion
  and retention.</p></li><li><p><strong>Mentor other engineers</strong> and contribute
  to raising the bar for engineering excellence across the team.</p></li></ul><p><strong>We
  offer flexibility to work from home or from one of our global office hubs, and we
  value in-person time for planning, problem-solving, and connection. Team members
  in this role must live within commuting distance of our Seattle, New York City,
  San Francisco, or Los Angeles hub.</strong></p><p></p><b>👋 You </b><p>Curious about
  who thrives at Whatnot? We’ve found that low ego, a growth mindset, and leaning
  into action and high impact goes a long way here.</p><ul><li><p>5+ years of full-time,
  generalist software engineering experience in high growth tech companies, and a
  track record of delivering impactful, user-facing products autonomously.</p></li></ul><ul><li><p>Bachelor’s
  Degree in Computer Science or related field or equivalent work experience</p></li><li><p>A
  strong foundation in <strong>backend and frontend</strong> development. You’re comfortable
  moving between layers and integrating systems end-to-end.</p></li><li><p>Excellent
  product instincts. You first think about users rather than the best technical solution.</p></li><li><p>Ability
  to take ownership of an ambiguous area and define and then drive impact.</p></li><li><p>Ability
  to flexibly work across multiple workstreams, thriving in a fast-paced environment</p></li><li><p>Preferred
  Qualifications:</p><ul><li><p>Experience building E-commerce or Social products</p></li><li><p>Expertise
  in <strong>mobile</strong> and/or <strong>full stack web development</strong> frameworks</p></li><li><p>Familiarity
  with growth engineering strategies, A/B testing, and analytics</p></li></ul></li></ul><p></p><b><strong>🎁
  Benefits</strong></b><ul><li><p>Flexible Time off Policy and Company-wide Holidays
  (including a spring and winter break)</p></li><li><p>Health Insurance options including
  Medical, Dental, Vision</p></li><li><p>Work From Home Support</p><ul><li><p>Home
  office setup allowance</p></li><li><p>Monthly allowance for cell phone and internet</p></li></ul></li><li><p>Care
  benefits</p><ul><li><p>Monthly allowance for wellness</p></li><li><p>Annual allowance
  towards Childcare</p></li><li><p>Lifetime benefit for family planning, such as adoption
  or fertility expenses</p></li></ul></li><li><p>Retirement; 401k offering for Traditional
  and Roth accounts in the US (employer match up to 4% of base salary) and Pension
  plans internationally</p></li><li><p>Monthly allowance to dogfood the app</p><ul><li><p>All
  Whatnauts are expected to develop a deep understanding of our product. We're passionate
  about building the best user experience, and all employees are expected to use Whatnot
  as both a buyer and a seller as part of their job (our dogfooding budget makes this
  fun and easy!).</p></li></ul></li><li><p>Parental Leave</p><ul><li><p>16 weeks of
  paid parental leave + one month gradual return to work *company leave allowances
  run concurrently with country leave requirements which take precedence.</p></li></ul></li></ul><b><strong>💛
  EOE</strong></b><p>Whatnot is proud to be an Equal Opportunity Employer. We value
  diversity, and we do not discriminate on the basis of race, religion, color, national
  origin, gender, sexual orientation, age, marital status, veteran status, parental
  status, disability status, or any other status protected by local law. We believe
  that our work is better and our company culture is improved when we encourage, support,
  and respect the different skills and experiences represented within our workforce.</p>
description_text: '🚀 Join the Future of Commerce with Whatnot! Whatnot is the largest
  live shopping platform in North America and Europe to buy, sell, and discover the
  things you love. We’re re-defining e-commerce by blending community, shopping, and
  entertainment into a community just for you. As a remote co-located team, we’re
  inspired by innovation and anchored in our values . With hubs in the US, UK, Germany,
  Ireland, Poland, and Australia, we’re building the future of online marketplaces
  –together. From fashion, beauty, and electronics to collectibles like trading cards,
  comic books, and even live plants, our live auctions have something for everyone.
  And we’re just getting started! As one of the fastest growing marketplaces , we’re
  looking for bold, forward-thinking problem solvers across all functional areas.
  Check out the latest Whatnot updates on our news and engineering blogs and join
  us as we enable anyone to turn their passion into a business, and bring people together
  through commerce. 💻 Role The Buyer Growth team is responsible for driving Whatnot’s
  top-of-funnel growth and first-time buyer success. We focus on acquisition, activation,
  and early retention, partnering closely with product, data, design, and marketing
  to build experiences that bring new users into the ecosystem and turn them into
  loyal customers. In this role, you will Lead and scale critical growth initiatives
  such as onboarding flows, referral systems, guest browsing, notification systems
  Design and own end-to-end systems , from backend services to frontend experiences,
  that impact millions of users. Drive architectural decisions to ensure systems are
  reliable, scalable, and extensible as we scale rapidly. Work across product, marketing,
  and data science to identify high-leverage growth opportunities and rapidly iterate
  on experiments. Instrument, monitor, and improve funnels to drive measurable lifts
  in new user conversion and retention. Mentor other engineers and contribute to raising
  the bar for engineering excellence across the team. We offer flexibility to work
  from home or from one of our global office hubs, and we value in-person time for
  planning, problem-solving, and connection. Team members in this role must live within
  commuting distance of our Seattle, New York City, San Francisco, or Los Angeles
  hub. 👋 You Curious about who thrives at Whatnot? We’ve found that low ego, a growth
  mindset, and leaning into action and high impact goes a long way here. 5+ years
  of full-time, generalist software engineering experience in high growth tech companies,
  and a track record of delivering impactful, user-facing products autonomously. Bachelor’s
  Degree in Computer Science or related field or equivalent work experience A strong
  foundation in backend and frontend development. You’re comfortable moving between
  layers and integrating systems end-to-end. Excellent product instincts. You first
  think about users rather than the best technical solution. Ability to take ownership
  of an ambiguous area and define and then drive impact. Ability to flexibly work
  across multiple workstreams, thriving in a fast-paced environment Preferred Qualifications:
  Experience building E-commerce or Social products Expertise in mobile and/or full
  stack web development frameworks Familiarity with growth engineering strategies,
  A/B testing, and analytics 🎁 Benefits Flexible Time off Policy and Company-wide
  Holidays (including a spring and winter break) Health Insurance options including
  Medical, Dental, Vision Work From Home Support Home office setup allowance Monthly
  allowance for cell phone and internet Care benefits Monthly allowance for wellness
  Annual allowance towards Childcare Lifetime benefit for family planning, such as
  adoption or fertility expenses Retirement; 401k offering for Traditional and Roth
  accounts in the US (employer match up to 4% of base salary) and Pension plans internationally
  Monthly allowance to dogfood the app All Whatnauts are expected to develop a deep
  understanding of our product. We''re passionate about building the best user experience,
  and all employees are expected to use Whatnot as both a buyer and a seller as part
  of their job (our dogfooding budget makes this fun and easy!). Parental Leave 16
  weeks of paid parental leave + one month gradual return to work *company leave allowances
  run concurrently with country leave requirements which take precedence. 💛 EOE Whatnot
  is proud to be an Equal Opportunity Employer. We value diversity, and we do not
  discriminate on the basis of race, religion, color, national origin, gender, sexual
