title: GTM Engineer
company: Profound
category: Marketing Tech
location: New York, New York, USA
date_posted: '2026-03-07'
description_html: <p>Profound is on a mission to help companies understand and control
  their AI presence. We believe most organizations will choose their long-term AI
  technology partners in the next nine months, and we want Profound to be the most
  preferred partner.</p><p>As a GTM Engineer, you will build the infrastructure that
  powers our entire go-to-market motion. Part systems architect and part problem detective,
  you will identify bottlenecks across the business, design automated solutions, and
  manufacture tools that give every team leverage. Your work will directly shape how
  Sales, Customer Success, Marketing, and Operations scale.</p><p></p><b><strong>What
  you’ll do</strong></b><ul><li><p>Scope high-impact problems autonomously by shadowing
  Sales, Customer Success, Marketing, and Operations teams to identify efficiency
  gaps and prioritize projects with unbounded upside</p></li><li><p>Build scalable
  automation systems by designing and deploying agentic workflows using tools such
  as n8n, Claude API, MCP servers, and other AI-native platforms</p></li><li><p>Manufacture
  tools rather than operate them, creating systems others can run independently</p></li><li><p>Own
  the full technical stack across data pipelines, API integrations, schema design,
  and automation platforms to connect disparate systems</p></li><li><p>Ship tools
  that people actually use, focusing not just on deployment but on enablement and
  adoption</p></li><li><p>Think architecturally about data, understanding how information
  flows through the organization and structuring schemas that power intelligent automation</p></li><li><p>Experiment
  relentlessly with new platforms, APIs, and AI-native tools, staying ahead of rapid
  changes in the ecosystem</p></li></ul><p></p><b><strong>Who you are</strong></b><ul><li><p>High-agency
  builder who can scope problems, design solutions, and ship working tools without
  hand-holding</p></li><li><p>Technically fluent and comfortable writing code in Python
  or JavaScript, building in n8n, integrating APIs, and understanding data architecture</p></li><li><p>AI-native
  thinker who defaults to asking how work can be automated and regularly experiments
  with agents, MCP, and workflow frameworks</p></li><li><p>Fast learner with slope
  over position, able to quickly pick up new tools and systems</p></li><li><p>Systems
  thinker who sees how components connect and can architect solutions that create
  compounding value</p></li><li><p>Pragmatic about build versus buy decisions, knowing
  when to leverage existing tools rather than reinvent them</p></li><li><p>Empathetic
  collaborator who understands that automating work requires communication and trust</p></li><li><p>Strong
  problem selector who can identify high-leverage initiatives and push back on low-impact
  requests</p></li><li><p>Experience with GTM workflows such as sales, customer success,
  or marketing operations</p></li><li><p>Familiarity with tools like Clay, PhantomBuster,
  Apify, Dust, or similar automation platforms</p></li><li><p>Experience building
  with LLM APIs, vector databases, or agentic workflows</p></li><li><p>Comfortable
  operating in ambiguity and structuring your own roadmap</p></li></ul><p></p><b><strong>Location</strong></b><p>This
  is an on-site role based in our Union Square, NYC office, designed for builders
  who thrive on speed, iteration, and meaningful impact.</p><p>For this role, the
  expected base salary range is $140,000 to $200,000. Profound’s total compensation
  package is designed to be competitive and includes base salary, equity, and a full
  range of benefits and perks. Final compensation will depend on factors such as your
  skills, experience, qualifications, and location, and will be determined during
  the interview process. Our recruiting team will share more details about the full
  compensation package and benefits as you move through hiring.</p>
