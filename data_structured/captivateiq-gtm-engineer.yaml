company_overview: CaptivateIQ is on a journey to modernize the world of incentive
  compensation. Our hope is that people will feel more connected at work if there
  is greater transparency in how they are rewarded for their efforts.We believe that
  getting paid should be fun and that work should be a breeze for compensation plan
  administrators. That’s why we’ve created a robust, flexible commission management
  platform that enables sales, finance, and operations teams to sync their data, design
  any plan, and build workflows that work best for their organization.
