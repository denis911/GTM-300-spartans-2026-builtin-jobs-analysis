description_html: '<p><span>CaptivateIQ is transforming the way companies plan, manage,
  and optimize sales performance. We started by revolutionizing incentive compensation
  management, and now we''re expanding our platform to solve broader sales planning
  challenges. Recognized by industry analysts like Forrester and G2 and backed by
  top-tier investors, including Sequoia, ICONIQ, Accel, and Sapphire Ventures,&nbsp;
  we empower high-growth companies like Netflix, Figma, and Stripe with the flexibility
  and insights needed to drive revenue performance.</span></p><p><br></p><p><span>Join
  a talented, fast-growing team committed to solving some of the most complex and
  impactful problems in sales performance management.</span></p><p><br></p><p><b>About
  the Role</b></p><p><span>This role exists to make our go-to-market engine faster,
  cleaner, and more scalable by turning manual GTM work into reliable systems and
  AI-powered workflows. The goal is simple: reduce the time teams spend on busywork,
  improve targeting and follow-through, and give leadership trustworthy visibility
  into what’s working across campaigns, channels, and the full customer lifecycle.</span></p><p><br></p><p><span>You’ll
  operate as a builder at the center of our GTM stack, partnering across RevOps, Sales,
  Marketing, and CS to spot bottlenecks and design practical solutions. Sometimes
  that’s an AI copilot that helps reps act on signals. Sometimes it’s a data pipeline
  that finally makes attribution and lifecycle reporting consistent. Sometimes it’s
  automation that quietly removes 20 steps from a process no one has time to fix.</span></p><p><br></p><p><b>Job
  Location</b></p><p><span>The candidate selected for this opportunity must reside
  near one of the following locations:</span></p><p><br></p><p><b>Hybrid (in-office
  3 days per week)</b></p><p><span>- Austin, TX</span></p><p><br></p><p><b>Remote</b></p><p><span>-
  Raleigh, NC</span></p><p><span>- Nashville, TN</span></p><p><span>- Toronto, Canada</span></p><p><b>Responsibilities</b></p><ul><li>Map
  GTM bottlenecks: Partner with RevOps, Sales, Marketing, and CS to identify where
  AI can reduce manual effort, increase speed, or improve targeting.</li><li>Create
  AI-powered automations, copilots, and agents to support GTM Teams.</li><li>Design
  and maintain scalable data pipelines that unify data across Hubspot, Salesforce,
  Outreach, Gong, ChurnZero, etc).</li><li>Implement systems that measure campaign,
  channel, and program effectiveness.</li><li>Identify and design automated workflows
  to support our team’s internal operations.</li><li>Innovate and experiment. Pilot
  new tools, integrations, and AI workflows.</li></ul><p></p><p><b>Requirements</b></p><ul><li>5+
  years as a Marketing Analyst or technical role in Marketing Operations/RevOps</li><li>You
  are comfortable with writing code (Python/SQL) and working with APIs. Bonus if you
  have a background in data engineering or ETL tools.&nbsp;</li><li>Deep knowledge
  of Salesforce Architecture</li><li>Fluency in other GTM tools (Clay, HubSpot/Marketo,
  Outreach / Apollo, Gong, Nooks Dialier/Orum, 6sense, Usergems, etc), APIs, and automation
  platforms (Zapier, Workato).</li><li>Curious, scrappy builder with a love for experimentation
  who thrives in ambiguity, enjoys automating manual work, and owns projects end-to-end.</li><li>The
  ability to translate business problems into elegant, maintainable system solutions</li><li>Strong
  attention to detail and high standards for data quality and process consistency</li><li>Proven
  ability to design and scale processes across global marketing teams.</li><li>Self-starter
  who thrives in fast-paced, collaborative, and remote environments.</li></ul><p></p><p><b>Benefits</b></p><ul><li>Comprehensive
  Healthcare: 100% coverage for medical, dental, and vision for all FTEs, with roughly
  75% coverage for dependents.</li><li>Flexible Time Off: Flexible vacation days plus
  quarterly mental health days to ensure you have the space to recharge.</li><li>Annual
  Stipends: Dedicated funds for your professional development and caretaking needs.</li><li>Work
  Anniversary Bonuses: Annual bonuses to celebrate your milestones and contributions
  to the CaptivateIQ team that grow as your tenure does.</li><li>Retirement Savings
  (US-Only): A 401(k) plan to help you invest in and secure your future.</li><li>Premium
  Tools: The latest Apple hardware to empower you to do your best work.</li><li>Inclusive
  Community: Active Employee Resource Groups (ERGs) that celebrate shared identities
  and support our DEI goals by fostering an environment where diverse talent thrives.</li></ul><p></p><p><b>Notice
  for Prospective Candidates</b></p><ul><li>Only emails from @captivateiq.com should
  be trusted.</li><p>We are aware of active recruitment scams using the CaptivateIQ
  name, in which individuals pose as our recruiters and post fake remote job openings
  and make fake job offers on the Internet. Please note, we will never do the following:</p><li>Attempt
  to correspond with a candidate using a free web-based account, such as an email
  address that ends in @gmail.com, @yahoo.com, @hotmail.com, etc.&nbsp;</li><li>Make
  an offer of employment without conducting multiple rounds of interviews face-to-face
  using secure video-conferencing technology.</li><li>Ask candidates to cash checks
  to buy equipment on behalf of CaptivateIQ.</li><li>Ask candidates to make a payment
  in order to be considered for a position.</li><li>Make early requests for candidates''
  personal information such as date of birth, passport details, credit card numbers,
  bank details and social security number, etc.</li><li>Please note that we’ll only
  ask for more sensitive personal information in connection with background checks
  after an offer is made.</li></ul><p></p><p></p><p><i>CaptivateIQ participates in
  E-Verify, web-based system that allows enrolled employers to confirm the eligibility
  of their employees to work in the United States</i></p><p></p>'
description_text: 'CaptivateIQ is transforming the way companies plan, manage, and
  optimize sales performance. We started by revolutionizing incentive compensation
  management, and now we''re expanding our platform to solve broader sales planning
  challenges. Recognized by industry analysts like Forrester and G2 and backed by
  top-tier investors, including Sequoia, ICONIQ, Accel, and Sapphire Ventures,&nbsp;
  we empower high-growth companies like Netflix, Figma, and Stripe with the flexibility
  and insights needed to drive revenue performance. Join a talented, fast-growing
  team committed to solving some of the most complex and impactful problems in sales
  performance management. About the Role This role exists to make our go-to-market
  engine faster, cleaner, and more scalable by turning manual GTM work into reliable
  systems and AI-powered workflows. The goal is simple: reduce the time teams spend
  on busywork, improve targeting and follow-through, and give leadership trustworthy
  visibility into what’s working across campaigns, channels, and the full customer
  lifecycle. You’ll operate as a builder at the center of our GTM stack, partnering
  across RevOps, Sales, Marketing, and CS to spot bottlenecks and design practical
  solutions. Sometimes that’s an AI copilot that helps reps act on signals. Sometimes
  it’s a data pipeline that finally makes attribution and lifecycle reporting consistent.
  Sometimes it’s automation that quietly removes 20 steps from a process no one has
  time to fix. Job Location The candidate selected for this opportunity must reside
  near one of the following locations: Hybrid (in-office 3 days per week) - Austin,
  TX Remote - Raleigh, NC - Nashville, TN - Toronto, Canada Responsibilities Map GTM
  bottlenecks: Partner with RevOps, Sales, Marketing, and CS to identify where AI
  can reduce manual effort, increase speed, or improve targeting. Create AI-powered
  automations, copilots, and agents to support GTM Teams. Design and maintain scalable
  data pipelines that unify data across Hubspot, Salesforce, Outreach, Gong, ChurnZero,
  etc). Implement systems that measure campaign, channel, and program effectiveness.
  Identify and design automated workflows to support our team’s internal operations.
  Innovate and experiment. Pilot new tools, integrations, and AI workflows. Requirements
  5+ years as a Marketing Analyst or technical role in Marketing Operations/RevOps
  You are comfortable with writing code (Python/SQL) and working with APIs. Bonus
  if you have a background in data engineering or ETL tools.&nbsp; Deep knowledge
  of Salesforce Architecture Fluency in other GTM tools (Clay, HubSpot/Marketo, Outreach
  / Apollo, Gong, Nooks Dialier/Orum, 6sense, Usergems, etc), APIs, and automation
  platforms (Zapier, Workato). Curious, scrappy builder with a love for experimentation
  who thrives in ambiguity, enjoys automating manual work, and owns projects end-to-end.
  The ability to translate business problems into elegant, maintainable system solutions
  Strong attention to detail and high standards for data quality and process consistency
  Proven ability to design and scale processes across global marketing teams. Self-starter
  who thrives in fast-paced, collaborative, and remote environments. Benefits Comprehensive
  Healthcare: 100% coverage for medical, dental, and vision for all FTEs, with roughly
  75% coverage for dependents. Flexible Time Off: Flexible vacation days plus quarterly
  mental health days to ensure you have the space to recharge. Annual Stipends: Dedicated
  funds for your professional development and caretaking needs. Work Anniversary Bonuses:
  Annual bonuses to celebrate your milestones and contributions to the CaptivateIQ
  team that grow as your tenure does. Retirement Savings (US-Only): A 401(k) plan
  to help you invest in and secure your future. Premium Tools: The latest Apple hardware
  to empower you to do your best work. Inclusive Community: Active Employee Resource
  Groups (ERGs) that celebrate shared identities and support our DEI goals by fostering
  an environment where diverse talent thrives. Notice for Prospective Candidates Only
  emails from @captivateiq.com should be trusted. We are aware of active recruitment
  scams using the CaptivateIQ name, in which individuals pose as our recruiters and
  post fake remote job openings and make fake job offers on the Internet. Please note,
  we will never do the following: Attempt to correspond with a candidate using a free
  web-based account, such as an email address that ends in @gmail.com, @yahoo.com,
  @hotmail.com, etc.&nbsp; Make an offer of employment without conducting multiple
  rounds of interviews face-to-face using secure video-conferencing technology. Ask
  candidates to cash checks to buy equipment on behalf of CaptivateIQ. Ask candidates
  to make a payment in order to be considered for a position. Make early requests
  for candidates'' personal information such as date of birth, passport details, credit
  card numbers, bank details and social security number, etc. Please note that we’ll
  only ask for more sensitive personal information in connection with background checks
  after an offer is made. CaptivateIQ participates in E-Verify, web-based system that
  allows enrolled employers to confirm the eligibility of their employees to work
  in the United States'
