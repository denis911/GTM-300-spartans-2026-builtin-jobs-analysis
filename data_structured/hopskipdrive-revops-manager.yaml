company_overview: We help get students to their destinations, safely and on time.
  Our technology connects school partners to a network of highly vetted drivers with
  small vehicles and wheelchair-accessible vehicles, complementing the yellow bus,
  filling in gaps, and enabling schools to support student transportation needs.Our
  partnerships with school districts, child welfare agencies and nonprofits ensure
  equitable educational access for our most vulnerable populations, including youth
  in foster care, youth experiencing homelessness, and youth with special needs.
