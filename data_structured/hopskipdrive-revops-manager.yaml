description_html: <p><p>At HopSkipDrive, our goal is to create opportunity for all
  through mobility.&nbsp;</p><p>We’re a technology company that solves complex transportation
  challenges where there is a heightened need for safety, equity, and care. Through
  our marketplace, we connect kids, older adults, or anyone needing extra support
  to highly-vetted caregivers on wheels. Through our software, we solve the biggest
  transportation challenges facing schools and school districts around the country.&nbsp;</p><p>Founded
  by three moms as a solution to their own transportation challenges, we’ve now facilitated
  more than five million rides across over 17 states around the country. We continue
  to expand at a rapid pace, making the Inc. 5000 list four times, as well as the
  Deloitte 500 Fast-Growing Technology list. HopSkipDrive is a Series D company and
  has raised $100M in funding to date.</p></p><p><strong>Who We Are:</strong></p><p>As
  a lean, high-impact Revenue Operations team of four we take pride in building the
  scalable infrastructure and strategic frameworks that power HopSkipDrive’s mission.
  We are the connective tissue between compensation, systems, and departmental strategy,
  and you will join us to sharpen our sales execution and help us build a world-class
  engine for growth. We do, and you will, support the business through the following
  responsibilities:</p><ul><li>Partner with sales leadership to translate high-level
  growth goals into day-to-day execution strategies and execution, incl. establishing&nbsp;
  a trusted “single source of truth” for revenue data incl. territory plans, quotas,
  attainment etc.&nbsp;</li><li>Analyze sales performance &amp; attainment data to
  identify bottlenecks, surface opportunities for managers, and suggest potential
  pivots</li><li>Maintain and improve CRM hygiene, and contribute to the optimization
  of workflows alongside senior RevOps leadership</li><li>Lead sales enablement initiatives
  by developing documentation that empower the team to utilize our systems and processes
  effectively</li><li>Support refinement of end to end processes to increase velocity
  and improve win rates across all segments</li><li>Support the sales forecasting
  process by maintaining pipeline standards and providing leadership with visibility
  into rep &amp; customer performance.</li><li>Support pricing updates, renewal workflows&nbsp;
  and&nbsp; incentive compensation administration, ensuring that commission structures
  align with sales behavior and company revenue targets</li><li>You’ll report directly
  to the Director of Revenue Operations and work closely with senior team members
  to support strategic initiatives.</li></ul><p><strong>Who You Are:</strong></p><p>You
  are a strategic operator who thrives at the intersection of data and human performance,
  possessing the confidence to advise sales leaders and the technical grit to build
  the systems they rely on.&nbsp; With the following skills, you’ll make a tangible
  and immediate impact:</p><ul><li>3-5&nbsp; years of&nbsp; experience in Sales Operations
  or RevOps, specifically within a high-growth B2B SaaS or marketplace environment.</li><li>Exceptional
  analytical skills with the ability to turn raw data into a compelling narrative
  that influences executive decision-making.</li><li>A track record of successful
  stakeholder management, demonstrating the ability to challenge the status quo while
  maintaining strong collaborative relationships.</li><li>Strong project management
  discipline, with the ability to balance long-term strategic builds with the immediate,
  "keep-the-lights-on" needs of a sales floor.</li><li>Expertise in the tech stack,
  including experience with tools like Salesforce, Tableau, Coefficient etc. Salesforce
  proficiency on understanding of stages, workflows, validation rules, and reporting
  dashboards</li><li>A proactive, "owner" mindset, fueled by the desire to identify
  gaps before they become problems and build scalable solutions from scratch</li></ul><p><strong>Our
  Investment In You:</strong></p><p>We want you to be an owner in our company and
  share in executing our vision, so every full-time employee has equity. In addition,
  we offer flexible vacation, medical, dental, vision and life insurance, 401(k),
  FSA, and an opportunity to work for a uniquely positioned, VC-backed company in
  a hugely attractive space with significant upside potential. HopSkipDrive is proud
  to operate as a drug-free workplace. HopSkipDrive is also committed to fair and
  equitable compensation practices. The salary range for this role is $90,000-$120,000.&nbsp;
  This position is remote and, as such, compensation will ultimately be in line with
  the location in which the position is filled. Final compensation for this role will
  be determined by several factors such as a candidate’s relevant work experience,
  skill set, certifications, and specific work location. The total compensation package
  for this role also includes equity stock options.</p><p>HopSkipDrive is proud to
  be an equal opportunity employer.&nbsp; All qualified applicants will receive consideration
  for employment without regard to race, color, religion, gender, gender identity
  or expression, sexual orientation, national origin, genetics, disability, age, veteran
  status, or any other protected class.</p><p>* This role will be fully remote in
  one of the following states <strong>AZ, CA, CO, DC, FL, GA, IL, IN, KS, MA, MD,
  MI, MN, MO, NC, NJ, NM, NV, NY, OK, OR, SC, TN, TX, UT, VA, WA, WI</strong>**</p><br>
