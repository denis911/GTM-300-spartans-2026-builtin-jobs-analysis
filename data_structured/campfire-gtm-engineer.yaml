description_html: '<b><strong>About the Role</strong></b><p>As a Revenue Operations
  / GTM Engineer Associate at Campfire, you’ll be a key driver in scaling our go-to-market
  engine and revenue infrastructure. You will bridge the gap between strategy and
  execution—designing, building, and operationalizing systems and processes that enable
  Sales, Marketing, and Customer Success to operate with speed and precision. In this
  role, you’ll work closely with leadership to deliver scalable execution, reliable
  data insights, and cross-functional alignment.</p><p>You will:</p><ul><li><p>Own
  technical and process initiatives in the revenue stack, from idea through execution
  and ongoing optimization</p></li><li><p>Be the “engineer” in RevOps: applying technical
  tools, automation, and integrations to support GTM motion</p></li><li><p>Partner
  as a trusted operator with GTM teams, surfacing gaps, engineering scalable solutions,
  and driving adoption</p></li></ul><p>This is a hands-on, high-impact role ideal
  for someone who thrives in a startup environment and wants to build foundational
  revenue systems from the ground up.</p><p></p><p></p><b><strong>Key Responsibilities</strong></b><ul><li><p>Design,
  build, and iterate core GTM workflows, automations, and systems (e.g. lead-to-opportunity,
  lead tracking &amp; routing)</p></li><li><p>Maintain and integrate across the revenue
  tech stack—ensuring data integrity, consistency, and automation across tools (e.g.
  CRM, marketing automation, billing, analytics)</p></li><li><p>Translate business
  requirements from Sales, Marketing, and Customer Success into technical designs,
  build specifications, and roadmaps</p></li><li><p>Develop dashboards, metrics, and
  alerts to ensure GTM teams have self‑service visibility into performance and levers</p></li><li><p>Lead
  process improvement initiatives: identify inefficiencies, propose and pilot new
  workflows, and scale them broadly<br></p></li></ul><p></p><p></p><b><strong>Requirements</strong></b><ul><li><p>1–3
  years experience in Revenue Operations, GTM Operations, Sales Ops, or a similar
  technical operations role at a scaling SaaS/tech company</p></li><li><p>Strong technical
  skills: familiarity with CRM systems (Salesforce or HubSpot), and automation tools</p></li><li><p>Meticulous
  attention to data quality, integrity, and consistency across systems</p></li><li><p>Excellent
  communication and stakeholder management skills—able to interface with both technical
  and non-technical partners</p></li><li><p>Bias toward action and ability to execute
  autonomously in an evolving, often ambiguous environment</p></li><li><p>A builder
  mindset: enjoys solving problems, automating manual work, and iterating quickly</p></li></ul>'
description_text: 'About the Role As a Revenue Operations / GTM Engineer Associate
  at Campfire, you’ll be a key driver in scaling our go-to-market engine and revenue
  infrastructure. You will bridge the gap between strategy and execution—designing,
  building, and operationalizing systems and processes that enable Sales, Marketing,
  and Customer Success to operate with speed and precision. In this role, you’ll work
  closely with leadership to deliver scalable execution, reliable data insights, and
  cross-functional alignment. You will: Own technical and process initiatives in the
  revenue stack, from idea through execution and ongoing optimization Be the “engineer”
  in RevOps: applying technical tools, automation, and integrations to support GTM
  motion Partner as a trusted operator with GTM teams, surfacing gaps, engineering
  scalable solutions, and driving adoption This is a hands-on, high-impact role ideal
  for someone who thrives in a startup environment and wants to build foundational
  revenue systems from the ground up. Key Responsibilities Design, build, and iterate
  core GTM workflows, automations, and systems (e.g. lead-to-opportunity, lead tracking
  &amp; routing) Maintain and integrate across the revenue tech stack—ensuring data
  integrity, consistency, and automation across tools (e.g. CRM, marketing automation,
  billing, analytics) Translate business requirements from Sales, Marketing, and Customer
  Success into technical designs, build specifications, and roadmaps Develop dashboards,
  metrics, and alerts to ensure GTM teams have self‑service visibility into performance
  and levers Lead process improvement initiatives: identify inefficiencies, propose
  and pilot new workflows, and scale them broadly Requirements 1–3 years experience
  in Revenue Operations, GTM Operations, Sales Ops, or a similar technical operations
  role at a scaling SaaS/tech company Strong technical skills: familiarity with CRM
  systems (Salesforce or HubSpot), and automation tools Meticulous attention to data
  quality, integrity, and consistency across systems Excellent communication and stakeholder
  management skills—able to interface with both technical and non-technical partners
  Bias toward action and ability to execute autonomously in an evolving, often ambiguous
  environment A builder mindset: enjoys solving problems, automating manual work,
  and iterating quickly'
