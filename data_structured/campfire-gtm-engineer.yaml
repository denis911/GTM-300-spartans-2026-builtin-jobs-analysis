company_overview: Campfire is the AI-native ERP for mid-size and enterprise companies
  to close fast and scale faster. Features include a powerful general ledger, invoicing,
  billing, revenue accounting and reporting, financial statements, AI-powered conversational
  reporting, and automated accounting workflows such as bank reconciliation. The product
  is natively integrated with industry leading solutions such as Ramp, Rippling, Salesforce,
  and has over 100+ API endpoints to build custom integrations and workflows. Campfire's
  customers range from 50 to 5,000 employees with a variety of business models including
  SaaS, usage, consulting and transactions including customers such as Replit and
  Advisor360.The company is headquartered in San Francisco and backed by Accel, Foundation
  Capital, Y Combinator and Capital49 (Airwallex).
