description_html: '<p><strong>About us:</strong></p><p>Parabola is an AI workflow
  builder for operations and finance teams. We make it easy to organize and transform
  messy data from anywhere—even PDFs, emails, and spreadsheets—so that forward-thinking
  teams can automate the work they thought would always be manual.</p><p>Teams at
  companies like Brooklinen, On Running, SKIMS and Flexport use Parabola to save hundreds
  of hours and deliver on projects that used to feel out of reach. Whether it’s reconciling
  inventory across multiple 3PLs, auditing invoices, or manually exporting the same
  report every Monday, Parabola gives teams the power to automate it—all without needing
  engineering support.</p><p></p><p>Parabola is backed by OpenView Partners, Matrix
  Partners, Thrive Capital and more.</p><p></p><p><strong>About the role:</strong>
  </p><p>We’re looking for a GTM Engineer to supercharge the systems that power our
  modern revenue engine. You’ll have the surface area to own high impact projects
  from 0 to 1 working closely with Marketing, Sales, and Operations leadership to
  ensure our GTM systems and workflows are clean, highly modern, and scalable. The
  ideal person for this role is incredibly high ownership, highly curious, a true
  systems thinker, and passionate about leveraging modern tools to make the lives
  of the people around them better. We’re at an incredibly exciting inflection point
  at Parabola and excited to give someone the opportunity to play a highly visible
  and impactful role in our next chapter!</p><p></p><p><strong>Here’s what you’ll
  do:</strong></p><ul><li><p>Own end-to-end implementation of GTM Ops projects across
  our GTM stack—you’ll have the surface area to build, ship, and iterate as a true
  owner.</p></li><li><p>Maintain data quality, system hygiene, and reliable workflows
  across our wider tech stack (not just the CRM).</p></li><li><p>Enable marketing
  team to succeed in communicating to prospects and customers at scale while maintaining
  best practices around domain health, enrichment, etc.</p></li><li><p>Improve marketing
  attribution (first-touch + last-touch), including tracking standards and reporting.</p></li><li><p>Build
  and improve “source of truth” models that capture and surface prospect activity
  through the funnel (lead → opp → customer).</p></li><li><p>Support revenue recognition
  for closed-won deals (process, data flow, reporting, exports as needed).</p></li><li><p>Manage
  tools outside the CRM to enable scaled outbound/marketing (email + LinkedIn) in
  a compliant, responsible way.</p></li></ul><p></p><p><strong>Here’s what we (think)
  you’ll need to do it:</strong></p><ul><li><p>GTM Ops experience at a high-growth
  B2B SaaS company.</p></li><li><p>Hands-on builder: comfortable configuring, integrating,
  and debugging end-to-end.</p></li><li><p>Strong grasp of GTM funnels + lifecycle
  stages (and the “why” behind process + reporting decisions).</p></li><li><p>Highly
  execution-oriented: you don’t need to be the shot caller—you ship high-quality work
  with clear direction.</p></li><li><p>Operational rigor: attention to detail, strong
  documentation habits, and respect for data/privacy/compliance.</p></li><li><p>Bias
  towards using AI tools and coding solutions that make the experience of interacting
  with CRM data smoother for team (e.g., portal for BDR to see relevant prospect activity
  on top of SFDC).</p></li><li><p>Excited to be in office in NYC or SF ~3-4 days a
  week.</p></li></ul><p></p><p><strong>Nice to have</strong></p><ul><li><p>Familiarity
  with attribution methodologies + lifecycle reporting best practices.</p></li><li><p>Experience
  designing activity tracking / prospect engagement models.</p></li><li><p>Comfort
  with basic SQL and/or data warehouse concepts (even if not required).</p></li><li><p>Experience
  with our current GTM tech stack including Salesforce, HubSpot, Outreach, Cargo,
  HeyReach, Attention, Apollo, Instantly, etc.</p></li></ul><p></p><p><strong>Salary
  Range:</strong> $150,000-$180,000</p><p><em>This OTE represents the minimum and
  maximum for this role based in San Francisco and New York. The salary given for
  this position is dependent on multiple factors, including years of experience, interview
  performance and anticipated responsibilities of the role. Our base salary is one
  component of Parabola’s competitive total package, which also includes equity and
  premium health and wellness benefits.</em></p>'
description_text: 'About us: Parabola is an AI workflow builder for operations and
  finance teams. We make it easy to organize and transform messy data from anywhere—even
  PDFs, emails, and spreadsheets—so that forward-thinking teams can automate the work
  they thought would always be manual. Teams at companies like Brooklinen, On Running,
  SKIMS and Flexport use Parabola to save hundreds of hours and deliver on projects
  that used to feel out of reach. Whether it’s reconciling inventory across multiple
  3PLs, auditing invoices, or manually exporting the same report every Monday, Parabola
  gives teams the power to automate it—all without needing engineering support. Parabola
  is backed by OpenView Partners, Matrix Partners, Thrive Capital and more. About
  the role: We’re looking for a GTM Engineer to supercharge the systems that power
  our modern revenue engine. You’ll have the surface area to own high impact projects
  from 0 to 1 working closely with Marketing, Sales, and Operations leadership to
  ensure our GTM systems and workflows are clean, highly modern, and scalable. The
  ideal person for this role is incredibly high ownership, highly curious, a true
  systems thinker, and passionate about leveraging modern tools to make the lives
  of the people around them better. We’re at an incredibly exciting inflection point
  at Parabola and excited to give someone the opportunity to play a highly visible
  and impactful role in our next chapter! Here’s what you’ll do: Own end-to-end implementation
  of GTM Ops projects across our GTM stack—you’ll have the surface area to build,
  ship, and iterate as a true owner. Maintain data quality, system hygiene, and reliable
  workflows across our wider tech stack (not just the CRM). Enable marketing team
  to succeed in communicating to prospects and customers at scale while maintaining
  best practices around domain health, enrichment, etc. Improve marketing attribution
  (first-touch + last-touch), including tracking standards and reporting. Build and
  improve “source of truth” models that capture and surface prospect activity through
  the funnel (lead → opp → customer). Support revenue recognition for closed-won deals
  (process, data flow, reporting, exports as needed). Manage tools outside the CRM
  to enable scaled outbound/marketing (email + LinkedIn) in a compliant, responsible
  way. Here’s what we (think) you’ll need to do it: GTM Ops experience at a high-growth
  B2B SaaS company. Hands-on builder: comfortable configuring, integrating, and debugging
  end-to-end. Strong grasp of GTM funnels + lifecycle stages (and the “why” behind
  process + reporting decisions). Highly execution-oriented: you don’t need to be
  the shot caller—you ship high-quality work with clear direction. Operational rigor:
  attention to detail, strong documentation habits, and respect for data/privacy/compliance.
  Bias towards using AI tools and coding solutions that make the experience of interacting
  with CRM data smoother for team (e.g., portal for BDR to see relevant prospect activity
  on top of SFDC). Excited to be in office in NYC or SF ~3-4 days a week. Nice to
  have Familiarity with attribution methodologies + lifecycle reporting best practices.
  Experience designing activity tracking / prospect engagement models. Comfort with
  basic SQL and/or data warehouse concepts (even if not required). Experience with
  our current GTM tech stack including Salesforce, HubSpot, Outreach, Cargo, HeyReach,
  Attention, Apollo, Instantly, etc. Salary Range: $150,000-$180,000 This OTE represents
  the minimum and maximum for this role based in San Francisco and New York. The salary
  given for this position is dependent on multiple factors, including years of experience,
  interview performance and anticipated responsibilities of the role. Our base salary
  is one component of Parabola’s competitive total package, which also includes equity
  and premium health and wellness benefits.'
