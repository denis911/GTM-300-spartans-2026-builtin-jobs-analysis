description_html: '<b><b>Sierra Space Careers: Dare to Dream</b></b><p><p><span><span>We
  honor those that are not afraid to dream big dreams, those that tenaciously chase
  their dreams even when others say it cannot be done, those that achieve big dreams
  and change everything. Those are Dreams Worth Chasing.&nbsp;</span></span><span>&nbsp;</span></p></p><p><p><span>&nbsp;</span></p></p><p><p><span><span>At
  Sierra Space we envision a future where humanity lives and works in space, on moons,
  and on distant planets. Our mission </span><span>isn’t</span><span> restricted to
  the few, instead we see a future where all people can choose to live, work, discover
  and explore beyond our planet. Our company is building a platform in space to </span><span>benefit</span><span>
  life on Earth and together we will alter the course of humanity.&nbsp;</span></span><span>&nbsp;</span></p><p></p></p><p><p><span><span>We
  have a bold mission. We are a bold company. Together, we are an extraordinary team.</span></span></p></p><p></p><p></p><b><b>About
  the Role</b></b>The Software Engineer II role involves designing, developing, and
  testing software applications for space systems and technologies. This mid-level
  position requires a strong understanding of programming languages and software development
  principles, as well as the ability to work both independently and as part of a team.
  Responsibilities include writing clean, maintainable code, collaborating with team
  members to understand project requirements, and contributing to the development
  of innovative software solutions. This role offers the opportunity to work on cutting
  edge projects in the space industry, stay current with industry trends, and advance
  in a dynamic and collaborative <br>environment.<p></p><p></p><b><b>About You</b></b><p>Our
  mission is driven by the unwavering passion to push the boundaries of what is possible.
  We seek those who Dare to Dream — to envision the extraordinary and pursue it relentlessly
  – to join us on this transformational journey.&nbsp;&nbsp;</p><p>We’re looking for
  dreamers who align with our values, vision and audacious goals – while also meeting
  the minimum qualifications below. The preferred qualifications are a bonus, not
  a requirement.</p><br><br><p>Sierra Space’s Defense division focuses on the design,
  build, and operations of small satellites in support of commercial services and
  national security space.</p><p>As a Flight Software Engineer, your primary responsibility
  will be designing and developing flight software and algorithms solutions for spacecraft
  missions for both civilian and DoD applications.&nbsp; These designs stem from understanding,
  analyzing and evaluating satellite and constellation capabilities, mission concepts,
  and system requirements. Your work will ensure we meet customer requirements by
  making data-driven decisions in architecting, implementing and testing the design
  in a testbed prototype and subsequent delivery of the flight code. Along the way,
  you will contribute to analyses of various architectures that include space vehicles,
  satellites, sensors, communications, and ground infrastructure, evolving or creating
  new approaches based on analysis results. You will also contribute to evaluating
  the mission effectiveness of the candidate approaches, balancing mission objectives
  against factors such as development and lifecycle costs.&nbsp;</p><p>The Software
  Engineer participates in all portions of the software life cycle (concept development,
  requirements definition, design, development, testing, and deployment) of flight
  software to support ongoing and future small satellite programs. This individual
  must have a strong working knowledge of object-oriented design using C++ and must
  have a strong background in developing flight code on embedded processors.&nbsp;
  The candidate must also be comfortable working in an Agile Scrum environment.</p><p><b>Key
  Responsibilities: </b></p><ul><li><p>Design, develop, and test software applications
  for space systems and technologies.</p></li><li><p>Write clean, maintainable code
  following best practices and coding standards.</p></li><li><p>Architect and implement
  complex software systems to meet project requirements.</p></li><li><p>Collaborate
  with team members to understand project requirements and contribute to the development
  of software solutions.</p></li><li><p>Utilize version control systems such as Git
  to manage code changes and collaborate with team members.</p></li><li><p>Participate
  in code reviews to ensure code quality and adherence to development standards.</p></li><li><p>Troubleshoot
  and resolve software-related issues in a timely manner.</p></li><li><p>Document
  software configurations, processes, and procedures for future reference.</p></li><li><p>Stay
  current with industry trends and advancements in software development and space
  technologies.</p></li></ul><p><b>Minimum Qualifications: &nbsp;</b></p><ul><li><p>Requires
  a bachelor’s degree in a related field (or equivalent work experience in lieu of
  degree).</p></li><li><p>Typically, 2+ years of related experience.</p></li><li><p>Strong
  understanding of at least one programming language, and general knowledge of others.</p></li><li><p>Strong
  understanding of software development principles.</p></li><li><p>Ability to design,
  code, test, and debug complex software applications.</p></li><li><p>Experience with
  different software development methodologies such as Agile and Scrum/Kanban.</p></li><li><p>Ability
  to work independently and as part of a team.</p></li><li><p>The ability to obtain
  and maintain a U.S. Security Clearance is required</p></li></ul><p><b>Preferred:</b></p><ul><li><p>Technical
  understanding of C++ and Object-Oriented Programming</p></li><li><p>Experience with
  spacecraft flight software development</p></li><li><p>Experience implementing client-server
  applications using socket I/O using TCP/UDP.</p></li><li><p>Experience implementing
  loosely coupled applications using PUB/SUB messaging</p></li><li><p>Familiarity
  with Open Standards such as CCSDS, C2MS, Open Mission Systems (OMS), and Universal
  C2 Interface (UCI)</p></li><li><p>Experience developing mission management and/or
  payload control software</p></li><li><p>Experience with software tools for requirements
  tracking, code reviews, static analysis, library and artifact repository, and automated
  build</p></li><li><p>Knowledge of software development methodologies such as Agile/Scrum</p></li><li><p>Experience
  and knowledge of Software Design Patterns</p></li><li><p>Experience using SysML/UML
  to create Software Designs</p></li><li><p>Experience testing and debugging on both
  Software in the Loop (SITL) and Hardware in the Loop (HITL, on target platform)
  environments</p></li><li><p>Experience with Source Code Configuration Management
  platforms (GIT, SVN)</p></li><li><p>Experience developing on Linux</p></li><li><p>Experience
  with network configurations including netconf</p></li><li><p>Experience with embedded
  programming including new board build up</p></li><li><p>Experience optimizing computer
  system performance including optimization for timing</p></li></ul><br><br><p><b><span>Compensation:</span></b></p><p><u><span>Pay
  Range:</span></u></p>$102,960.00 - $141,570.00<br><br><p>Your actual base compensation
  will be determined on a case-by-case basis and may vary based on job-related knowledge
  and skills, education,&nbsp;experience, internal equity and market competitiveness.</p><p><p><b>Physical/Mental/Emotional
  Requirements:</b></p></p><p><ul><li><p>Frequently walk, sit, stand, climb stairs
  and steps</p></li><li><p>Frequently repeat same hand, arm, and finger motion many
  times to include finger and hand dexterity</p></li><li><p>Rarely lifting or carrying
  up to 20 lbs.</p></li></ul><p><b>Working Conditions:</b></p><ul><li><p>Rarely exposed
  to outdoor elements (high/low temperatures, sun, rain/snow, etc.)</p></li><li><p>Rarely
  exposed to fumes or hazardous chemicals/materials</p></li><li><p>Rarely exposed
  to loud noises</p></li></ul><p><b>IMPORTANT NOTICE:</b><br><span>This position requires
  the ability to obtain and maintain a U.S. Security Clearance. U.S. Citizenship status
  is required as this position needs an active U.S. Security Clearance for employment.
  Non-U.S. citizens may not be eligible to obtain a security clearance.&nbsp; The
  Department of Defense Consolidated Adjudications Facility (DoD CAF), a federal government
  agency, handles the adjudicative aspects of the security clearance eligibility process
  for industry applicants. Adjudicative factors which affect the outcome of the eligibility
  determination include, but are not limited to, allegiance to the U.S., foreign influence,
  foreign preference, criminal conduct, security violations and illegal drug use.</span></p></p><p></p><p></p><p><b><b><span>Elevate
  Your Career</span></b></b></p><p><p><span><span>At Sierra Space, we are committed
  to your personal and professional development. We empower you to make profound and
  meaningful contributions and foster a vibrant culture of collaboration, where teamwork
  ignites breakthrough innovations.</span></span><span>&nbsp;</span></p></p><p><p><span><span>&nbsp;</span></span><br><span><span>Sierra
  Space offers annual incentive pay based upon performance that is </span><span>commensurate</span><span>
  with the level of the position.</span></span><span><span>&nbsp;</span></span><br><span><span>&nbsp;</span></span><br><span><span>We
  also offer</span><span> a generous benefit package, including medical, dental, and
  vision plans, 401(k) with 150% match up to 8%, life insurance, 3 weeks paid time
  off, and more.</span></span></p></p><p></p><p></p><p><span>At Sierra Space we are
  at the very doorstep of unlocking the future and the work in front of us is hard,
  but it is </span><span>truly important</span><span> and meaningful. Achieving our
  mission requires dedication, relentless pursuit of a dream and an unwavering passion
  for pushing the boundaries to </span><span>accomplish</span><span> what others might
  believe to be impossible. We seek those who too, Dare to Dream and will join us
  in a pursuit to achieve the </span><span>extraordinary.</span></p><p></p><p></p><p><i>Application
  Deadline: This role will remain posted until a qualified pool of candidates are
  </i><i>identified. </i></p><p></p><p><i><b>Please note: Sierra Space does not accept
  unsolicited resumes from contract agencies or search firms. Any unsolicited resumes
  submitted to our website or to Sierra Space team members not through our approved
  vendor list or Talent Acquisition will be considered property of Sierra Space, and
  we will not be obligated to pay any referral fees.</b></i></p><p></p><p>Sierra Space
  Corporation&nbsp;is an equal opportunity employer and is committed to working with
  and providing reasonable accommodations to applicants with disabilities. If you
  need special assistance or a reasonable accommodation related to applying for employment
  with&nbsp;Sierra Space&nbsp;or at any stage of the recruitment process, please&nbsp;contact
  us.</p>'
