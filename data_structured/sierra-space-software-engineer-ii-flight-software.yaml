company_overview: Securing The Freedom of OperationsHeadquartered in Colorado, Sierra
  Space is a mission-proven Defense Tech company delivering satellite platforms, critical
  subsystems, reusable spaceplanes, hypersonic technologies, propulsion systems, and
  infrastructure for the nation’s most critical missions.With more than three decades
  of heritage and a record of flight-proven success in space, Sierra Space is trusted
  by U.S. National Security, Civil customers, and global allies. Our technologies
  safeguard our nation, sustain human exploration in space, and ensure the freedom
  of operations beyond Earth.Sierra Space is defining the new era of Space Defense,
  strengthening deterrence today and preserving freedom of action for generations
  to come.
