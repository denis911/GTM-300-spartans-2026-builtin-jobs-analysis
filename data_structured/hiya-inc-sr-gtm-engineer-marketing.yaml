description_html: '<b><strong>About Hiya</strong></b><p>At Hiya, we''re making calls
  safe, useful, and human again.</p><p>Voice is the most human form of communication,
  yet it''s become one of the least trusted. Spam, scams, and AI manipulation have
  eroded what was once a simple way to connect.</p><p>Each month our AI voice technology
  analyzes 28+ billion calls, protecting over 550 million users and 800+ businesses
  worldwide. Partnering with a growing global network including, AT&amp;T, Samsung,
  British Telecom EE, Rogers, MasOrange, Bell Canada, MasMovil, and Virgin Media O2,
  we''re not just stopping bad actors, we''re helping people feel good and confident
  about picking up the phone again.</p><p>This is a pivotal moment for voice. As new
  threats and technologies accelerate, so does demand for trusted voice communication.
  Hiya is growing 40%+ year over year, expanding globally, and defining what voice
  becomes next.</p><p>Join us. You won''t just work on what voice is today, you''ll
  shape what it becomes tomorrow: smarter, safer, and genuinely worth answering again.</p><p></p><b>About
  the Role</b><p>We''re hiring a <strong>Senior Marketing Engineer – Web &amp; AI</strong>
  to transform Hiya''s website into an AI-powered, revenue-driving digital growth
  engine. This role sits at the intersection of marketing, engineering, and product—responsible
  for leading our migration from Webflow to a headless CMS architecture while partnering
  closely with Marketing leadership to bring positioning, campaigns, and GTM initiatives
  to life through high-performing digital experiences.</p><p>You will own website
  KPIs including traffic growth, engagement, conversion rate, and pipeline contribution,
  while architecting systems that enable rapid experimentation and global expansion.</p><p>This
  is a high-ownership role with direct impact on how Hiya reaches customers, communicates
  value, and scales globally—making it central to our ability to restore trust in
  voice at scale and deliver on the promise of safer, more useful phone calls.</p><p>We''re
  looking for a <strong>marketing-minded engineer or technical marketer</strong>—someone
  who understands buyer psychology and funnel performance as deeply as frontend architecture,
  and who sees AI as a structural capability for reimagining how digital experiences
  are built, personalized, and scaled.</p><p>As AI continues to reshape how calls
  are placed, screened, and answered, our digital presence must evolve with the same
  level of intelligence and adaptability we bring to the voice channel itself.</p><p></p><b>What
  You''ll Do</b><ul><li><p>Own the end-to-end buyer journey across awareness, consideration,
  and conversion stages, translating positioning and campaign strategy into compelling,
  high-converting web experiences</p></li><li><p>Lead migration from Webflow to a
  modern headless CMS (e.g., Contentful, Sanity, Storyblok), architecting a scalable
  React/Next.js-based frontend that maintains strong engineering standards while enabling
  marketing speed</p></li><li><p>Build modular systems that enable rapid deployment
  of campaigns and landing pages, increasing experimentation velocity across enterprise
  and PLG segments</p></li><li><p>Integrate AI agents and LLM APIs to power dynamic
  content generation, personalized experiences, SEO/GEO optimization workflows, and
  scalable localization—reimagining what''s possible in digital marketing</p></li><li><p>Own
  international website expansion across 20+ markets, designing and scaling multi-language,
  multi-region architecture with localization workflows, regional SEO optimization,
  and global compliance standards</p></li><li><p>Architect and implement event tracking,
  data layers, and attribution frameworks, maintaining hands-on ownership of tools
  such as Google Analytics 4, Amplitude, and Google Tag Manager</p></li><li><p>Ensure
  clean data flow between website, CRM, marketing automation, and PLG systems, aligning
  web experimentation with paid, organic, lifecycle, and product initiatives</p></li><li><p>Develop
  hypotheses and testing roadmaps to improve performance of top pages, owning website
  KPIs and making tradeoffs between speed, quality, and scale</p></li><li><p>Maintain
  best-in-class mobile and desktop experiences, Core Web Vitals, performance benchmarks,
  UX clarity, messaging effectiveness, and accessibility standards</p></li></ul><b>What
  Success Looks Like</b><ul><li><p>Hiya''s website becomes a measurably stronger growth
  driver—improving traffic, engagement, conversion rates, and pipeline contribution
  in ways that directly support company OKRs and revenue goals</p></li><li><p>The
  headless CMS migration is completed on time and establishes a foundation that scales
  globally, supports rapid experimentation, and reduces friction for marketing and
  engineering teams</p></li><li><p>AI-powered capabilities (personalization, content
  generation, localization) are integrated thoughtfully and measurably improve performance,
  demonstrating clear ROI and setting the standard for how Hiya uses AI in GTM</p></li><li><p>As
  trust is built through delivery, your influence expands beyond website execution
  to shape broader digital strategy, experimentation culture, and how Hiya reaches
  customers across channels</p></li></ul><b>What We''re Looking For</b><p><strong>Required:</strong></p><ul><li><p>5–8+
  years in growth engineering, frontend engineering, or product-focused web development,
  ideally in B2B SaaS or PLG environments</p></li><li><p>Strong React/Next.js (or
  similar modern frontend framework) experience with demonstrated ability to build
  scalable, high-performance web applications</p></li><li><p>Hands-on experience leading
  headless CMS implementations or migrations</p></li><li><p>Proficiency with web analytics
  tools (Google Analytics 4, Amplitude, etc.) and implementing A/B testing and experimentation
  frameworks</p></li><li><p>Strong understanding of technical SEO, GEO, AEO, and performance
  optimization</p></li><li><p>Experience integrating APIs and third-party systems
  into web platforms</p></li><li><p>Demonstrated ability to translate marketing strategy
  into technical execution and balance engineering rigor with marketing speed</p></li></ul><p><strong>Preferred:</strong></p><ul><li><p>Familiarity
  with CRM and marketing automation systems (HubSpot, Salesforce, Segment)</p></li><li><p>Experience
  integrating AI APIs (OpenAI, Anthropic, etc.) or building multi-channel support
  solutions (chatbots, AI Voice Agent, etc.)</p></li><li><p>Experience building multi-language
  and international web properties</p></li><li><p>Strong communication and collaboration
  skills, with a track record of working effectively across marketing, product, and
  engineering teams</p></li></ul><p></p><b><strong>How We Work</strong></b><p>Hiya
  is not a passive environment. We expect people to take ownership, form opinions,
  and engage directly with hard problems.</p><p>We work with a high degree of <strong>transparency
  and autonomy</strong>. Context is shared openly, and decisions are discussed, challenged,
  and then made. Once a call is made, we commit and move forward.</p><p>You''ll be
  expected to work through ambiguity, weigh tradeoffs, and take responsibility for
  results, while keeping a high bar for quality and customer trust.</p><p>Every team
  member at Hiya is expected to live our core values:</p><ul><li><p>Serve, our customers
  and partners by holding a high bar for trust and quality</p></li><li><p>Own, share
  in success and open up to failures</p></li><li><p>Lead, listen, show up with a point
  of view but commit entirely once a decision has been made</p></li><li><p>Improve,
  even if it means changing course or contradicting ourselves</p></li><li><p>Do, rather
  than observe</p></li></ul><b><strong>Our Interview Process</strong></b><p>Process
  Overview</p><p>Our standard interview process follows this sequence:</p><ul><li><p><strong>Initial
  Screen:</strong> We confirm baseline alignment, role interest, relevant experience,
  and logistics.</p></li><li><p><strong>Hiring Manager (HM) Screen:</strong> We evaluate
  role fit, expectations, and execution readiness.</p></li><li><p><strong>Take Home
  Assignment:</strong> You''ll complete a <strong>take-home, role-relevant assignment</strong>
  designed to reflect the kind of work you would do at Hiya. The assignment focuses
  on how you think, prioritize, and explain your approach. You''ll review your work
  and discuss your reasoning with the interview panel.</p></li><li><p><strong>Assignment-Based
  Interview Loop:</strong> Interviewers will explore how you think through the work,
  ask questions, respond to feedback, and adapt your approach. Each interviewer focuses
  on specific competencies and how you make decisions, navigate tradeoffs, and collaborate
  in real time.</p></li><li><p><strong>Future Hiya Value Interview:</strong> An independent
  conversation focused on your long-term potential, judgment under ambiguity, and
  ability to create sustained value as scope and complexity increase.</p></li></ul><p></p><b>How
  We Invest in You</b><p><strong>Compensation &amp; Ownership</strong></p><ul><li><p><strong>Base
  Salary: </strong>$133,500- $194,000</p><ul><li><p>Compensation is determined by
  role scope, skills, experience, location, and market data.</p></li></ul></li><li><p><strong>Equity
  Compensation:</strong> ownership aligned with your impact and the company''s growth</p></li></ul><p><strong>Benefits
  &amp; Support</strong></p><ul><li><p>Employer-sponsored Insurance</p><ul><li><p>Medical,
  dental, and vision (PPO &amp; HDHP); 50% dependent coverage</p></li><li><p>Health,
  flexible spending, and dependent care accounts</p></li><li><p>Life, AD&amp;D, and
  accident coverage, with company-paid life and long-term disability</p></li></ul></li><li><p>401(k)
  with 3% company match (via Fidelity)</p></li><li><p>Flexible vacation policy and
  paid company holidays</p></li><li><p>Paid parental leave</p></li><li><p>Work-from-home
  equipment stipend</p></li><li><p>$1,000 annually to invest in your learning and
  growth</p></li><li><p>$1,000/year in charitable donation matching</p></li><li><p>Team
  lunch 2x per week</p></li></ul><b><strong>Come Work With Us!</strong></b><p>We''re
  building a team with diverse perspectives, identities, and professional experiences.
  We evaluate candidates through a business lens and believe that diversity and unique
  viewpoints make our company stronger, more dynamic, and a great place to build a
  career.</p><p>We''ve been recognized by Built In, GeekWire, Comparably, G2, Forbes,
  and Deloitte Technology Fast 500 for our culture, innovation, leadership, compensation,
  and more. At Hiya, we''re a people-centric company focused on helping each employee
  grow both personally and professionally. We create a culture of support and empowerment
  that challenges the status quo, resulting in an energized team that''s passionate
  about their work. You''ll love working here if you''re looking for an innovative
  challenge that''s disrupting an industry. Come join us!</p>'
