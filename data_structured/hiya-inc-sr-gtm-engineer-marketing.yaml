company_overview: Hiya is trusted by global businesses, carriers, and consumers to
  enable secure, engaging connections and stop unwanted calls. Hiya is pioneering
  the next generation of AI-powered voice intelligence with real-time analysis and
  an AI assistant to enhance voice protection, productivity, and call performance.
  Hiya connects businesses with their customers, helps carriers secure their networks,
  and protects people from spam and fraud calls. Our SaaS applications — Hiya Connect
  and Hiya Protect — serve more than 500 million users on the Hiya Network, powering
  call protection and identity for AT&T, British Telecom, EE, Virgin Media O2, Samsung,
  Ericsson, Rogers, Telenor, and more.
