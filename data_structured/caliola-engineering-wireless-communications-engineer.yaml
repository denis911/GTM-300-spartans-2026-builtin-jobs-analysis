company_overview: Caliola Engineering, LLC’s staff of systems, security, and software
  engineers team with PhD researchers to identify and solve mission-critical problems
  for customers across the US Government. We have subject matter expertise in wireless
  communications, cryptography, protected MILSATCOM, software defined radio, and unmanned
  airborne systems. Our team has experience developing and transitioning innovative
  technologies to Programs of Record.We are a 100% woman owned small business (WOSB)
  headquartered in Colorado Springs, CO. We focus on NAICS codes 541715 (Research
  and Development in the Physical, Engineering, and Life Sciences) and 541330 (Engineering
  Services).
