description_html: '<strong>Wireless Communications Engineer</strong><br><strong>Job
  Family:</strong> Research Scientist<br><strong>City/State:</strong> Colorado Springs,
  CO<br><strong>Type and Schedule:</strong> Full-Time, Salary/Exempt, Hybrid (minimum
  60% on site).<br><strong>Annualized Salary Range:</strong> $116,405 - $160,056 commensurate
  with experience.<br><strong>About Us:</strong> Caliola is a woman-owned small business
  that is improving and protecting our Nation''s way of life through secure collaboration
  and resilient communications. Our engineers, subject matter experts, and veterans
  are developing and delivering trusted solutions for mission-critical communications.
  We seek teammates who share our core values:<br><strong>I3 for C3 - Insight, Innovation,
  and Integrity for Command, Control, and Communications</strong><br>These values
  guide how we work every day. At Caliola, you will find technically challenging,
  mission-focused work within a flexible and collaborative culture that is uncommon
  in the defense industry. We offer flexible PTO, subsidized health insurance, 401(k)
  matching, professional development, and a competitive compensation structure designed
  to support long-term growth.<br>Our performance has driven rapid growth and national
  recognition, being named twice to the Deloitte Technology Fast 500™ and inclusion
  on the 2025 Inc. 5000 list of America''s fastest-growing private companies. We have
  also been recognized as a Colorado Company to Watch, a ColoradoBiz Top Company in
  Aerospace &amp; Defense, and the #2 Gazette''s Best Workplace (medium size) in 2025.<br>Headquartered
  in Colorado Springs, CO, we operate in a leading aerospace and defense hub with
  proximity to major military installations. Set against the Rocky Mountains, the
  region offers year-round outdoor recreation and a high quality of life for professionals
  and families considering relocation.<br>As a part of our selection process, we ask
  all applicants to complete a short, 10-12 minute survey from Culture Index. This
  is a survey, not a test; no passing or failing. The purpose of this survey is to
  identify your unique strengths as they relate to our open positions. Please copy
  and paste the following link into a separate browser window to complete: https://go.cultureindex.com/s/5i6Gpe3wge
  <br><strong>Position Description:</strong> Caliola''s Wireless Communications Engineers
  support the team by leading the development and analysis of various communications
  systems and waveforms. Your work will impact the design of new innovative HF radios,
  improve the performance of legacy operational communications systems, and research
  new ideas across the space of resilient wireless communications. As a systems engineer,
  you will be responsible for feasibility studies, algorithm development/integration,
  and system performance evaluation. You will work closely with cross-disciplinary
  teams of software and hardware engineers to solve important problems. A solid understanding
  of theoretical communications systems behavior, commitment to high quality performance
  evaluation, and an excellent work ethic are required to be successful in this position.<br><strong>Technical
  Responsibilities:</strong><br><ul> <li>Design, develop, prototype, and test innovative
  algorithms and signaling techniques.</li> <li>System-level benchtop and field testing.</li>
  <li>Perform trade studies across different algorithmic approaches, parameterizations,
  and performance metrics.</li> <li>Lead feasibility/trade studies across system architectures,
  parameterizations, and performance metrics.</li> <li>Communicate results both internally
  and externally in writing, through multimedia, and live presentations.</li> <li>Lead
  small cross-functional teams to solve challenging problems.</li> </ul> <br><strong>What
  We Require:</strong><br><ul> <li>MS with 3 years'' experience or PhD in Electrical
  Engineering or related discipline.</li> <li>Expertise in digital communication theory,
  including coding, modulation, detection. and estimation.</li> <li>Experience with
  C++ and/or Python.</li> <li>Strong technical communication skills are necessary.</li>
  <li>Experience with physical layer modeling &amp; simulation.</li> <li>This position
  requires the ability to obtain and maintain a security clearance, which is issued
  by the U.S. Government. Security clearances may only be granted to U.S. citizens.
  In addition, applicants who accept a conditional offer of employment may be subject
  to government security investigation(s) and must meet eligibility requirements for
  access to classified information.</li> </ul> <br><strong>What We Value:</strong><br><ul>
  <li>Experience with medium access control protocol design and implementation.</li>
  <li>Experience with FPGA implementation tradeoffs for physical layer designs.</li>
  <li>Experience with modern version control software (git) and build systems (cmake).</li>
  <li>Experience mentoring and training junior staff members.</li> <li>Experience
  with radar systems.</li> <li>Experience with positioning, navigation, and timing
  systems.</li> <li>Active security clearance.</li> </ul> <br><strong>Minimum Physical
  Requirements:</strong><br><ul> <li>Must possess excellent verbal and written communication
  skills in English.</li> <li>Ability to transition between sitting and standing as
  required.</li> <li>Ability to safety lift and/or move up to 25 pounds.</li> <li>Ability
  to bend, stoop, and reach.</li> <li>Ability and dexterity to grasp, handle, and
  manipulate small items such as, but not limited to, cellphones, laptops, USB drives,
  business cards, documents.</li> </ul> <br>Please contact Human Resources with questions
  about ADA accommodations. <br><strong>Expression of Interest:</strong> By applying
  for this job, you are expressing interest in this position and could be considered
  for other career opportunities at Caliola Engineering. Should a match be identified
  between your skillset and Caliola''s requirements for this or a future opening,
  you may be contacted.<br><strong>At Caliola, we believe that true innovation can
  only occur when teammates bring their authentic selves to collaborate in a supportive,
  encouraging environment. We are an Equal Opportunity Employer. All qualified applicants
  will receive consideration for employment without regard to race, color, religion,
  sex, sexual orientation, gender identity, national origin, disability or veteran
  status, age, or any other federally protected class.</strong> <br><strong>Caliola
  participates in E-Verify, an internet-based system used to confirm the employment
  eligibility of all new hires. Upon hire, all employees are required to complete
  Form I-9 to verify their identity and employment eligibility to work in the United
  States.</strong> <br>All candidates will be required to pass a basic background
  screening.'
