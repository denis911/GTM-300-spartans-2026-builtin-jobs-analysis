  The purpose of this survey is to identify your unique strengths as they relate to
  our open positions. Please copy and paste the following link into a separate browser
  window to complete: https://go.cultureindex.com/s/5i6Gpe3wge Position Description:
  Caliola''s Wireless Communications Engineers support the team by leading the development
  and analysis of various communications systems and waveforms. Your work will impact
  the design of new innovative HF radios, improve the performance of legacy operational
  communications systems, and research new ideas across the space of resilient wireless
  communications. As a systems engineer, you will be responsible for feasibility studies,
  algorithm development/integration, and system performance evaluation. You will work
  closely with cross-disciplinary teams of software and hardware engineers to solve
  important problems. A solid understanding of theoretical communications systems
  behavior, commitment to high quality performance evaluation, and an excellent work
  ethic are required to be successful in this position. Technical Responsibilities:
  Design, develop, prototype, and test innovative algorithms and signaling techniques.
  System-level benchtop and field testing. Perform trade studies across different
  algorithmic approaches, parameterizations, and performance metrics. Lead feasibility/trade
  studies across system architectures, parameterizations, and performance metrics.
  Communicate results both internally and externally in writing, through multimedia,
  and live presentations. Lead small cross-functional teams to solve challenging problems.
  What We Require: MS with 3 years'' experience or PhD in Electrical Engineering or
  related discipline. Expertise in digital communication theory, including coding,
  modulation, detection. and estimation. Experience with C++ and/or Python. Strong
  technical communication skills are necessary. Experience with physical layer modeling
  &amp; simulation. This position requires the ability to obtain and maintain a security
  clearance, which is issued by the U.S. Government. Security clearances may only
  be granted to U.S. citizens. In addition, applicants who accept a conditional offer
  of employment may be subject to government security investigation(s) and must meet
  eligibility requirements for access to classified information. What We Value: Experience
  with medium access control protocol design and implementation. Experience with FPGA
  implementation tradeoffs for physical layer designs. Experience with modern version
  control software (git) and build systems (cmake). Experience mentoring and training
  junior staff members. Experience with radar systems. Experience with positioning,
  navigation, and timing systems. Active security clearance. Minimum Physical Requirements:
  Must possess excellent verbal and written communication skills in English. Ability
  to transition between sitting and standing as required. Ability to safety lift and/or
  move up to 25 pounds. Ability to bend, stoop, and reach. Ability and dexterity to
  grasp, handle, and manipulate small items such as, but not limited to, cellphones,
  laptops, USB drives, business cards, documents. Please contact Human Resources with
  questions about ADA accommodations. Expression of Interest: By applying for this
  job, you are expressing interest in this position and could be considered for other
  career opportunities at Caliola Engineering. Should a match be identified between
  your skillset and Caliola''s requirements for this or a future opening, you may
  be contacted. At Caliola, we believe that true innovation can only occur when teammates
  bring their authentic selves to collaborate in a supportive, encouraging environment.
  We are an Equal Opportunity Employer. All qualified applicants will receive consideration
  for employment without regard to race, color, religion, sex, sexual orientation,
  gender identity, national origin, disability or veteran status, age, or any other
  federally protected class. Caliola participates in E-Verify, an internet-based system
  used to confirm the employment eligibility of all new hires. Upon hire, all employees
  are required to complete Form I-9 to verify their identity and employment eligibility
  to work in the United States. All candidates will be required to pass a basic background
  screening.'
