company_overview: 'As the world’s largest asset manager, BlackRock partners with investors
  around the globe to help them (and those on whose behalf they invest) plan for life’s
  most important goals – like retirement, home ownership and their children’s education.
  Our clients range from governments, foundations and other large institutions to
  those investing on behalf of individuals, including firefighters, nurses, teachers
  and factory workers. BlackRock was founded with the idea of creating a better asset
  management firm — one that was purpose-driven, focused on clients and risk management,
  and propelled by data and technology. Our breakthrough Aladdin® platform is BlackRock’s
  technological backbone, helping investors see and manage their whole portfolios
  in one place – from constructing investments to monitoring risk and executing trades.
  Used by hundreds of external institutions around the world, Aladdin combines powerful
  analytics and a common language to help investment teams make faster, more informed
  decisions across public and private markets. It’s a key part of our business and
  one of the reasons we’re trusted to manage more assets than any other investment
  manager today.At BlackRock, we challenge conventions and raise the bar for what’s
  possible. We harness technology to unlock new solutions, simplify complexity, and
  deliver investment strategies that meet people where they are. Whether it’s retirement
  planning, wealth building or navigating market shifts, we’re here to help clients
  invest more easily, more affordably and with more choice as we chart a path toward
  financial well-being together. Learn more: Careers.BlackRock.com'
