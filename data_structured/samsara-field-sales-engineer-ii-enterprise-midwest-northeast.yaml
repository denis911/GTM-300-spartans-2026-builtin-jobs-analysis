company_overview: 'Samsara (NYSE: IOT) is the pioneer of the Connected Operations®
  Platform, which is an open platform that connects the people, devices, and systems
  of some of the world’s most complex operations, allowing them to develop actionable
  insights and improve their operations. With tens of thousands of customers across
  North America and Europe, Samsara is a proud technology partner to the people who
  keep our global economy running, including the world’s leading organizations across
  industries in transportation, construction, wholesale and retail trade, field services,
  logistics, manufacturing, utilities and energy, government, healthcare and education,
  food and beverage, and others. The company''s mission is to increase the safety,
  efficiency, and sustainability of the operations that power the global economy.'
