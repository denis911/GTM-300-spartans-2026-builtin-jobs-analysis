description_html: '<p><p><span><strong>Who we are</strong></span></p><p><span>Samsara
  (NYSE: IOT) is the pioneer of the Connected Operations™ Cloud, which is a platform
  that enables organizations that depend on physical operations to harness Internet
  of Things (IoT) data to develop actionable insights and improve their operations.
  At Samsara, we are helping improve the safety, efficiency and sustainability of
  the physical operations that power our global economy. Representing more than 40%
  of global GDP, these industries are the infrastructure of our planet, including
  agriculture, construction, field services, transportation, and manufacturing — and
  we are excited to help digitally transform their operations at scale.</span></p><p><span>Working
  at Samsara means you’ll help define the future of physical operations and be on
  a team that’s shaping an exciting array of product solutions, including Video-Based
  Safety, Vehicle Telematics, Apps and Driver Workflows, and Equipment Monitoring.
  As part of a recently public company, you’ll have the autonomy and support to make
  an impact as we build for the long term.</span></p></p><p><strong>About the role:</strong></p><p>As
  a Field Sales Engineer at Samsara, you’d be an integral part of a diverse team working
  to help modernize essential industries through the application of cutting-edge IoT
  solutions.&nbsp; Your work would directly contribute to a cleaner, more efficient,
  and productive supply chain by creating safer roadways, reducing fuel consumption
  and emissions, and providing a consolidated platform for connecting operations.&nbsp;
  Our daily customer engagements include conversations around how IoT can positively
  impact logistics management, workplace safety programs, fleet maintenance strategies,
  global asset management, and regulatory compliance.&nbsp; This means a successful
  SE at Samsara will develop a thorough understanding of the application of IoT hardware
  and sensors, hands-on hardware installation strategies, managing data collection
  over carrier networks, presenting a robust cloud infrastructure, and building third-party
  system integrations (via our open API) to ensure the best technical solution is
  presented to Samsara customers.</p><p><strong>This is a remote position open to
  candidates within the Central or Eastern time zones. This position requires travel
  up to 50% of the time and proximity to an international airport is preferred.</strong></p><p><strong>You
  should apply if:&nbsp;</strong></p><ul><li><strong>You want to impact the industries
  that run our world: </strong>Your efforts will result in real-world impact—helping
  to keep the lights on, get food into grocery stores, and most importantly, ensure
  workers return home safely.</li><li><strong>You have an innate curiosity about how
  businesses work: </strong>One day you’ll meet with someone in waste management and
  the next you may be learning about the inner workings of a food distribution center.
  Our top sales team members seek to learn the ins and outs of the businesses they
  support in order to make a larger impact.&nbsp;</li><li><strong>You build genuine
  relationships with your customers:</strong> The industries we serve have relied
  on pen-and-paper solutions for years and haven’t been met with the type of technology
  we offer. Our customers value earned trust and human relationships built over time.</li><li><strong>You
  want to be with the best:</strong> Samsara’s high-performance culture means you’ll
  be surrounded by the best and challenged to go farther than you have before.&nbsp;</li><li><strong>You
  are a team player:</strong> At Samsara, sales is a team sport. We help each other
  out by sharing best practices and focusing on winning as a team.</li></ul><p><strong>In
  this role, you will:</strong>&nbsp;</p><ul><li>Become an expert on Samsara products:
  where the rubber of cutting-edge tech (IoT, AI, computer vision) meets the road
  of driving digital transformation for physical operations.</li><li>Articulate to
  prospects how businesses like theirs use Samsara today to solve obstacles common
  to their industry.</li><li>Deliver the work products that get deals done.&nbsp;
  Think discoveries, demonstrations, value assessments, proof of concept implementations,
  etc.</li><li>Walk installers through any scenario, explaining best practices for
  installing Samsara products and helping build deployment plans.</li><li>Write sample
  proof-of-concept scripts against our open API that solve real-world problems for
  companies that deliver essential services (for example), and document them for your
  fellow SE’s to use.</li><li>Open the door for deeper entrenchment into accounts
  (integration, upsell, cross-sell) by becoming a consultant to your customers.</li><li>Act
  as a liaison between Samsara’s product and sales teams, translating technical feedback
  and enrolling the right customers in our beta programs.</li><li>Champion, role model,
  and embed Samsara’s cultural principles (Focus on Customer Success, Build for the
  Long Term, Adopt a Growth Mindset, Be Inclusive, Win as a Team) as we scale globally
  and across new offices.</li></ul><p><strong>Minimum requirements for the role:</strong></p><ul><li>Bachelor’s
  of Science degree from a 4-year accredited university.</li><li>5 years of experience
  working with customers in a pre-sales, customer success, or customer/product support
  capacity.</li><li>Possess the attitude and aptitude for continuous growth and development.</li><li>Ability
  to influence stakeholders based on your technical sales acumen and a solid understanding
  of business processes and change management.</li><li>Ability to explain complex
  technical concepts to non-technical audiences.</li><li>Previous experience managing
  hardware and/or software product evaluations.</li><li>Basic understanding of electronics
  and electrical systems.</li><li>Experience with the following concepts: technical
  consulting, cloud software, cloud-connected hardware, computer networking, business
  systems integration, automation, and control systems.</li></ul><p><strong>An ideal
  candidate also has:</strong></p><ul><li>Bachelor’s of Science degree or advanced
  education in Electrical Engineering, Computer Science, Mechanical Engineering, Industrial
  Engineering, or related discipline.</li><li>8+ years of enterprise experience working
  with customers in a pre-sales environment.</li><li>Understanding of vehicle diagnostic
  systems, including Controller Area Networks (CAN bus) and Power Take Off (PTO) applications.</li><li>Skilled
  in the art of identifying customer value - identifying on delivering what is most
  important to the customer and tuning out the noise.</li><li>Hobbyist interest in
  working with things driven by electronic systems (car audio installation/classic
  car restoration, home automation, building things with Raspberry Pi, Arduino, etc.).</li><li>Consistent
  track record of success selling complex technical solutions through strategic sales
  cycles.</li><li>Work experience in task automation scripting and transferring data
  between systems using Bash, Python, JavaScript, or equivalent language.</li><li>Work
  experience building solutions leveraging open APIs.</li></ul><p><p><p><p><span>The
  range of annual on-target earnings (OTE) range for full-time employees for this
  position is below. Please note that OTE pay may vary depending on factors including
  your city of residence, job-related knowledge, skills, and experience. Learn more
  about our total rewards and benefits below.</span></p></p><p>Annual OTE Salary</p><p><span>$198,050</span><span>—</span><span>$233,000
  USD</span></p></p></p><p><p><strong>Total Rewards</strong></p><p>At Samsara, we
  build for the people who keep the global economy moving. We want owners, not passengers,
  which is why our rewards are designed to fuel high-impact builders. Our compensation
  program delivers above-market total compensation through a combination of base salary,
  performance-based bonus/variable pay, and equity (for eligible roles) in a high-growth
  public company. We meaningfully differentiate pay for our top performers, who have
  the opportunity to earn above-market compensation that can outpace the broader market
  over time.</p><p>Beyond compensation, we provide the foundations that enable long-term
  success: a flexible, employee-led remote model, a professional development stipend,
  comprehensive health and parental leave plans, and more. If you’re ready to build
  for the long term and own the outcome, your journey starts here.</p><p><strong>Flexible
  Working&nbsp;</strong></p><p><span>At Samsara, we embrace a flexible working model
  that caters to the diverse needs of our teams. Our offices are open for those who
  prefer to work in-person and we also support remote work where it aligns with our
  operational requirements. For certain positions, being close to one of our offices
  or within a specific geographic area is important to facilitate collaboration, access
  to resources, or alignment with our service regions. In these cases, the job description
  will clearly indicate any working location requirements. Our goal is to ensure that
  all members of our team can contribute effectively, whether they are working on-site,
  in a hybrid model, or fully remotely. All offers of employment are contingent upon
  an individual’s ability to secure and maintain the legal right to work at the company
  and in the specified work location, if applicable.</span></p><p><strong>Belonging
  at Samsara</strong></p><p>At Samsara, we welcome everyone regardless of their background.
  All qualified applicants will receive consideration for employment without regard
  to race, color, religion, national origin, sex, gender, gender identity, sexual
  orientation, protected veteran status, disability, age, and other characteristics
  protected by law. We depend on the unique approaches of our team members to help
  us solve complex problems and want to ensure that Samsara is a place where people
  from all backgrounds can make an impact.</p><p><strong>Accommodations&nbsp;</strong></p><p>Samsara
  is an inclusive work environment, and we are committed to ensuring equal opportunity
  in employment for qualified persons with disabilities. Please email accessibleinterviewing@samsara.com
  or click here if you require any reasonable accommodations throughout the recruiting
  process.</p><p><strong>Our Commitment to Authenticity</strong></p><p>We use Tofu,
  a fraud detection tool, to validate the authenticity of applications and protect
  against identity fraud. This ensures we are connecting with real people and allows
  us to prioritize genuine candidates. Please see Samsara’s Candidate Privacy Notice
  for more information.</p><p><strong>Fraudulent Employment Offers</strong></p><p>Samsara
  is aware of scams involving fake job interviews and offers. Please know we do not
  charge fees to applicants at any stage of the hiring process. Official communication
  about your application will only come from emails ending in @samsara.com, @us-greenhouse-mail.io
  or @mail3.guide.co. For more information regarding fraudulent employment offers,
  please visit our&nbsp;blog post here.</p></p>'
