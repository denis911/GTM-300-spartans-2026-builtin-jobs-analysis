description_html: '<b><strong>AI at Zapier</strong></b><p>At <u>Zapier</u>, we build
  and use automation every day to make work more efficient, creative, and human. So
  if you’re using AI tools while applying here - that’s great! We just ask that you
  use them <strong>responsibly and transparently</strong>.</p><p>Check out our guidance
  on <strong>How to Collaborate with AI During Zapier’s Hiring Process</strong><strong>,</strong>
  including how to use AI tools like ChatGPT, Claude, Gemini, or others during our
  hiring process - and when not to.</p><p><br></p><p>Job posted: 02/11/2026</p><p>Location:
  Americas</p><p></p><p>Hi there! </p><p>We''re looking for a Director of GTM Finance
  to partner with our sales and marketing teams as we scale. You''ll help shape how
  we invest, where we grow, and how finance influences decisions across the business.
  If you love crunching numbers, in-depth financial analysis, and leading a cross-functional
  team, read on…</p><ul><li><p><u>Our Commitment to Applicants</u></p></li><li><p><u>Culture
  and Values at Zapier</u></p></li><li><p><u>Zapier Guide to Remote Work</u></p></li><li><p><u>Zapier
  Code of Conduct</u></p></li><li><p><u>Diversity and Inclusivity at Zapier</u></p></li></ul><p><br></p><b>About
  You</b><ul><li><p>You have 8-10+ years of experience in FP&amp;A or strategic finance,
  ideally with an investment banking foundation early in your career.</p></li><li><p>You
  have experience at high-growth tech companies and have partnered closely with sales
  and/or marketing organizations to drive business outcomes.</p></li><li><p>You leverage
  GTM metrics (CAC, LTV, pipeline coverage, sales productivity, ARR/NRR) to identify
  opportunities, shape investment decisions, and influence strategy at the executive
  level.</p></li><li><p>You''re a strong financial modeler who builds analyses that
  drive real decisions, not just reports.</p></li><li><p>You''re a clear communicator
  who can translate complex financial insights into actionable recommendations for
  senior business leaders.</p></li><li><p>You have experience leading a team and care
  deeply about developing talent and building a strong team culture.</p></li></ul><p></p><b>Things
  You''ll Do</b><ul><li><p>Partner with sales and marketing leadership to inform investment
  decisions and resource allocation, working at both the strategic level with executives
  and deeply with operators across the org.</p></li><li><p>Drive efficiency in customer
  acquisition by building analytical infrastructure to optimize LTV:CAC and marketing
  spend effectiveness.</p></li><li><p>Support sales growth targets through capacity
  planning, productivity analysis, and proactive identification of trends that inform
  org design and investment decisions.</p></li><li><p>Own performance reporting and
  forecasting for GTM, ensuring finance has a seat at the table when key decisions
  are made.</p></li><li><p>Lead and develop a strong team with opportunity for expansion
  as the function grows.</p></li><li><p>Position finance as a proactive business partner
  that shapes GTM strategy, not just tracks it.</p></li></ul><p></p><b><strong>How
  to Apply</strong></b><p>At Zapier, we believe that diverse perspectives and experiences
  make us better, which is why we have a non-standard application process designed
  to promote inclusion and equity. We''re looking for the best fit for each of our
  roles, regardless of the type of companies in your background, so we encourage you
  to apply even if your skills and experiences don’t exactly match the job description.
  All we ask is that you answer a few in-depth questions in our application that would
  typically be asked at the start of an interview process. This helps speed things
  up by letting us get to know you and your skillset a bit better right out of the
  gate. Please be sure to answer each question; the resume and CV fields are optional.</p><p>Education
  is not a requirement for our roles; however, if you receive an offer, you will need
  to include your most recent educational experience as part of our background check
  process.</p><p>After you apply, you are going to hear back from us—even if we don’t
  see an immediate fit with our team. In fact, throughout the process, we strive to
  never go more than seven days without letting you know the status of your application.
  We know we’ll make mistakes from time to time, so if you ever have questions about
  where you stand or about the process, just ask your recruiter!</p><p>Zapier is an
  equal-opportunity employer and we''re excited to work with talented and empathetic
  people of all identities. Zapier does not discriminate based on someone''s identity
  in any aspect of hiring or employment as required by law and in line with our commitment
  to Diversity, Inclusion, Belonging and Equity. Our code of conduct provides a beacon
  for the kind of company we strive to be, and we celebrate our differences because
  those differences are what allow us to make a product that serves a global user
  base. Zapier will consider all qualified applicants, including those with criminal
  histories, consistent with applicable laws.</p><p>Zapier prioritizes the security
  of our customers'' information and is dedicated to adhering to all applicable data
  privacy laws. You can review our privacy policy here.</p><p>Zapier is committed
  to inclusion. As part of this commitment, Zapier welcomes applications from individuals
  with disabilities and will work to provide reasonable accommodations. If reasonable
  accommodations are needed to participate in the job application or interview process,
  please contact jobs@zapier.com.</p><p></p><p></p><b><strong>Application Deadline:</strong></b><p>The
  anticipated application window is 30 days from the date job is posted, unless the
  number of applicants requires it to close sooner or later, or if the position is
  filled.</p><p><em>Even though we’re an all-remote company, we still need to be thoughtful
  about where we have Zapiens working. Check out</em><em> this resource</em><em> for
  a list of countries where we currently cannot have Zapiens permanently working.</em></p>'
description_text: 'AI at Zapier At Zapier , we build and use automation every day
  to make work more efficient, creative, and human. So if you’re using AI tools while
  applying here - that’s great! We just ask that you use them responsibly and transparently
  . Check out our guidance on How to Collaborate with AI During Zapier’s Hiring Process
  , including how to use AI tools like ChatGPT, Claude, Gemini, or others during our
  hiring process - and when not to. Job posted: 02/11/2026 Location: Americas Hi there!
  We''re looking for a Director of GTM Finance to partner with our sales and marketing
  teams as we scale. You''ll help shape how we invest, where we grow, and how finance
  influences decisions across the business. If you love crunching numbers, in-depth
  financial analysis, and leading a cross-functional team, read on… Our Commitment
  to Applicants Culture and Values at Zapier Zapier Guide to Remote Work Zapier Code
  of Conduct Diversity and Inclusivity at Zapier About You You have 8-10+ years of
  experience in FP&amp;A or strategic finance, ideally with an investment banking
  foundation early in your career. You have experience at high-growth tech companies
  and have partnered closely with sales and/or marketing organizations to drive business
  outcomes. You leverage GTM metrics (CAC, LTV, pipeline coverage, sales productivity,
  ARR/NRR) to identify opportunities, shape investment decisions, and influence strategy
  at the executive level. You''re a strong financial modeler who builds analyses that
  drive real decisions, not just reports. You''re a clear communicator who can translate
  complex financial insights into actionable recommendations for senior business leaders.
  You have experience leading a team and care deeply about developing talent and building
  a strong team culture. Things You''ll Do Partner with sales and marketing leadership
  to inform investment decisions and resource allocation, working at both the strategic
  level with executives and deeply with operators across the org. Drive efficiency
  in customer acquisition by building analytical infrastructure to optimize LTV:CAC
  and marketing spend effectiveness. Support sales growth targets through capacity
  planning, productivity analysis, and proactive identification of trends that inform
  org design and investment decisions. Own performance reporting and forecasting for
  GTM, ensuring finance has a seat at the table when key decisions are made. Lead
  and develop a strong team with opportunity for expansion as the function grows.
  Position finance as a proactive business partner that shapes GTM strategy, not just
  tracks it. How to Apply At Zapier, we believe that diverse perspectives and experiences
  make us better, which is why we have a non-standard application process designed
  to promote inclusion and equity. We''re looking for the best fit for each of our
  roles, regardless of the type of companies in your background, so we encourage you
  to apply even if your skills and experiences don’t exactly match the job description.
  All we ask is that you answer a few in-depth questions in our application that would
  typically be asked at the start of an interview process. This helps speed things
  up by letting us get to know you and your skillset a bit better right out of the
  gate. Please be sure to answer each question; the resume and CV fields are optional.
  Education is not a requirement for our roles; however, if you receive an offer,
  you will need to include your most recent educational experience as part of our
  background check process. After you apply, you are going to hear back from us—even
  if we don’t see an immediate fit with our team. In fact, throughout the process,
  we strive to never go more than seven days without letting you know the status of
  your application. We know we’ll make mistakes from time to time, so if you ever
  have questions about where you stand or about the process, just ask your recruiter!
  Zapier is an equal-opportunity employer and we''re excited to work with talented
  and empathetic people of all identities. Zapier does not discriminate based on someone''s
  identity in any aspect of hiring or employment as required by law and in line with
  our commitment to Diversity, Inclusion, Belonging and Equity. Our code of conduct
  provides a beacon for the kind of company we strive to be, and we celebrate our
  differences because those differences are what allow us to make a product that serves
  a global user base. Zapier will consider all qualified applicants, including those
  with criminal histories, consistent with applicable laws. Zapier prioritizes the
  security of our customers'' information and is dedicated to adhering to all applicable
  data privacy laws. You can review our privacy policy here. Zapier is committed to
  inclusion. As part of this commitment, Zapier welcomes applications from individuals
  with disabilities and will work to provide reasonable accommodations. If reasonable
  accommodations are needed to participate in the job application or interview process,
  please contact jobs@zapier.com. Application Deadline: The anticipated application
  window is 30 days from the date job is posted, unless the number of applicants requires
  it to close sooner or later, or if the position is filled. Even though we’re an
  all-remote company, we still need to be thoughtful about where we have Zapiens working.
  Check out this resource for a list of countries where we currently cannot have Zapiens
  permanently working.'
