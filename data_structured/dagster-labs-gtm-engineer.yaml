  your home or a coworking space. Dagster Labs fosters a collaborative, remote-first
  culture, ensuring you have all the tools and support needed to thrive, no matter
  where you are. Responsibilities: Systems &amp; Insights Pull and analyze data from
  Salesforce, HubSpot, Clay, Common Room and other market intelligence tools to inform
  strategy Create territory reports and prioritization models that scale Build repeatable
  templates for campaigns, account plans, and reporting Work with RevOps to develop
  workflows across Clay, LinkedIn Sales Navigator, ZoomInfo, and other prospecting
  tools Build and maintain workflow automations using n8n or similar tools to streamline
  data flows and repetitive processes Territory &amp; Account Strategy Build data-driven
  frameworks for account prioritization based on revenue potential, strategic value,
  buying signals, and product fit Conduct whitespace analysis and expansion mapping
  for named accounts Create alerting and monitor trigger events (funding rounds, hiring
  patterns, tech stack changes, executive moves) to identify in-market opportunities
  Campaign Planning &amp; Strategic Direction Partner with marketing and sales to
  develop account-specific messaging and positioning tailored to persona and buying
  stage Create GTM playbooks for Enterprise motions (new business and named account
  expansion) Provide strategic direction for focus campaigns on key pursuits; defining
  approach for LinkedIn ads, custom landing pages, executive dinners, and industry
  events (execution handled by Marketing and Sales teams) Must-have Qualifications
  4-6 years in sales, marketing, RevOps, or enablement with exposure to complex Enterprise
  B2B sales cycles Experience with GTM tools (our stack includes HubSpot, Salesforce,
  Clay, and Common Room, but you don’t need to know them all Day 1) SQL fluency to
  pull account lists, analyze pipeline, and build prioritization models in Snowflake
  and Salesforce Proven ability to design account-specific, multi-channel strategies
  and translate them into execution briefs Systems thinking: ability to see patterns,
  build frameworks, and create repeatable processes Experience balancing competing
  priorities and building trust with sales teams in matrix organizations Nice-to-have
  Qualifications Experience in technical or developer tools Python experience Familiarity
  with market intelligence platforms (LinkedIn Sales Navigator, ZoomInfo, 6sense)
  Background building 0→1 functions or processes Understanding of data orchestration,
  modern data stacks, or technical buyer personas You belong here We are committed
  to building an inclusive team and an open-source community where no one feels out
  of place. We know that teams with diverse backgrounds state their assumptions more
  explicitly, think more rigorously, and build better software. Plus it''s more fun
  and interesting to work with a wide variety of perspectives. You should apply to
  work at Dagster Labs if you want to work in, and help to build and strengthen, a
  high-performing software development environment where people of all backgrounds
  are welcome. Our Stack Dagster is built in Python and TypeScript , and runs seamlessly
  across macOS, Linux, and Windows. Our frontend is powered by React and GraphQL ,
  delivering a modern, intuitive developer experience. We value engineers who are
  comfortable working across the stack and making thoughtful contributions. The estimated
  OTE range for this role is $135,000 to $180,000. Other resources: The launch of
  Dagster blog post Launching Dagster Cloud to GA blog post Dagster’s Data Platform
  Week release in Nov 2024 Software-Defined Assets blog post, Data Council talk, and
  animated explainer Our latest episode on the Data Engineering Podcast Our philosophy
  on code reviews &nbsp;'
